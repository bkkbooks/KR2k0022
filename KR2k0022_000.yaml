body:
  text: 咸淳臨安志地理類三都會郡縣之屬提要臣等謹案咸淳臨安志九十三卷元潛説友撰説友字君髙處州人宋淳祐甲辰進士咸淳庚午以中奉大夫權户部尚書知臨安軍府事封縉雲縣開國男時賈似道勢方熾説友曲意附和故得進越四年以誤捕似道私秫罷明年起守平江元兵至棄城先遁及宋亡在福州降元受其宣撫使之命後以官軍支米不得王積翁以言激衆遂為李雄剖腹死其人殊不足道而其書則頗有條理前十五卷為行在所録記宫禁曹司之事自十六卷以下乃為府志區畫明晰體例井然可為都城紀載之法其宋代詔令編于前代之後則用徐陵玉臺新咏置梁武于第七卷例也他所序録亦理析條分可資考據故明人作西西湖志諸書多採用之朱彝尊謂宋人地志幸存者若宋次道之志長安梁叔子之志三山范致能之志吳郡施武子之志會稽羅端良之志新安陳夀老之志赤城每患其太簡惟潛氏此志獨詳然其書流傳既久往往闕佚不全舊無完集彝尊從海鹽胡氏常熟毛氏先後得宋槧本八十卷又借抄一十三卷而其碑刻七卷終闕無可考補今亦姑仍其舊焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀咸淳臨安志原序恭惟聖宋受命奄甸萬方大明中天爝磷自息乃太平興國三年吳越以其地歸我職方氏是嵗杭始置守丞建炎升府遂為行在所按府志杭舊屬會稽禹於此舍航而陸故名恭聞光堯大駕初臨登郡治中和嘗作為歌詩慨懷夏后氏之烈聖心曠數千百載而神交固有幾乎禹迹之外其亦見夫流風通俗得過化之所存而有感焉耳嘗試觀之有車船橇􅞬之迹故其人至于今忠以勤有苗山封爵功德之會故其人至于今勸於為善有織貝橘柚之貢故其人至于今知尊君而愛親錢氏生長其間性習自然國三世四王而終不失其臣節逮宋之興也深察夫人心歸德之天如川斯赴莫之能止則一旦決然舍去其固有之業以受命于朝忠懿誠忠矣抑杭之人何莫非忠懿天地之間燥濕風雲萬物一氣杭獨為天下先者以先王聲教之所漸者逺知帝王正統所在焉故也自時厥後我國家視之如在甸服率選公卿大臣寵綏之豈徒以地大故要必有所甚重者湛恩醲化涵浸滋久益固結而不可解南渡艱難之際旄倪提攜左簞右壺牛酒相屬於道頓首六虯之下如見父母誓有殞無二雖屢更大震撼而莫之變迄用永我命於兹新邑迹是三百年間杭之有功於國家也甚大而祖宗之有德於杭亦深矣開慶羣小誤國召戎一時謀臣或倡異議幾搖根本賴先皇帝蔽自上志獨倚今太傅辨章國公外頓八紘內維九鼎宗廟社稷之靈恃以妥寧卒之披攘蒙霿再奠宇宙至今八街九陌歌鼓四時往往相與咨欷不圖復見今日烏乎我理宗有德於杭也不又大歟杭之福諸夏之福也肆皇上克篤前烈宅中圖大不以愚臣為不肖命殿是邦幸遇朝廷治平年穀屢登浩穰之府化為簡靜因得以蓋其疵粃暇日視故府閲郡乘或病其漏且舛乃葺而正之增而益之凡為圖為表為志總百卷而冠以行在所録尊王室也既成上之天府以備考數之萬一焉禹貢稱冀州既載釋者謂以貢賦役事載之書其於天子所自治之國謹重固如此九州攸同言歸舊京聖子神孫尚克念我光堯懷禹之遺志云中奉大夫權户部尚書兼詳定勑令官兼知臨安軍府事兼管內勸農使兩浙西路安撫使馬步軍都總管兼點檢行在贍軍激賞酒庫所縉雲縣開國男食邑三百户潛説友謹序
