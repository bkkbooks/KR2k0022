body:
  text: 咸淳臨安志卷二宋潛説友撰行在所録宫闕二祖宗諸閣太祖皇帝太宗皇帝龍圖閣真宗皇帝天章閣仁宗皇帝寶文閣神宗皇帝顯謨閣哲宗皇帝徽猷閣徽宗皇帝敷文閣紹興十年五月詔曰恭惟徽宗皇帝躬天縱之睿資輔以日就之聖學因而制治修禮樂恢學校發揮典墳緝熙治具宸章奎畫發為號令著在簡篇者煥乎若三辰之文麗天垂光賁飾羣物所以詒謀立教作則萬世殆與詩書相表裏將加裒輯崇建層閣以嚴寶藏用傳示於永久其閣恭以敷文為名祇遹舊章宜置學士直學士待制直閣以次列職備西清之咨訪為儒學之華寵其著於令髙宗皇帝煥章閣淳熙十五年十月置詔曰朕仰惟髙宗皇帝恢廣運之德懋中興之功耆定羣方鼎新百度制禮作樂治具畢張寢兵措刑仁風大播蓋自緝熙之學見乎經緯之文擴斯道於精微之傳觀象妙於尊明之養凡敷言之是訓暨肆筆之成書煟有洪輝卓為丕憲方加裒輯將謹寶藏載稽帝世之隆無越堯章之煥因揭名於層宇仍列職於清廂庶克奉承用詒永久其閣恭以煥章為名置學士直學士待制直閣式循故實以待賢才其俾攸司具著于令孝宗皇帝華文閣慶元二年五月置詔曰朕惟孝宗皇帝睿闡聖圖粹昭玉度經緯天地道存渾噩之書鼓舞雷風仁蕩溫純之命寫之琬琰炳若丹青太微三光之庭丕闡鳯巢之勢上帝羣玉之府邃通龍紀之聨寶典謨訓誥之垂黻禮樂刑政之用華協堯章之煥文光舜哲之明並輯鴻徽孔嚴燕翼其閣恭以華文為名置學士待制直閣茂遵邦憲寵陟儒英庸飾攸司其刋諸令光宗皇帝寶謨閣嘉泰元年十一月置詔曰朕惟昔在光宗皇帝天亶神明日新聖學發於號令雷風彰鼓舞之神煥乎文章雲漢麗昭回之飾鈎畫凛鸞鳳之飛動光芒燦珠璧以陸離宜在襲藏式嚴安奉龜書闡瑞交輝東壁之珍虹彩凝祥寅上西清之御寶列羲圖之祕謨新禹命之承冠以美名揭於層宇肅萬靈之擁護掩羣玉之菁華其閣恭以寶謨為名置學士直學士待制直閣以待鴻儒以昭燕翼著於甲令副在有司寧宗皇帝寶章閣寶慶二年正月置詔曰朕仰惟寧宗皇帝挺仁聖之資躬粹純之行就將熙緝德共日新淵懿聰明動與天合粵從更化尤謹修攘輿地寢歸賞功班慶發為謨訓歡均邇遐所謂詔令見德化之成璽書明萬里之外者殆兼其盛經不云乎惟天之命於穆不已天之所以為天也文王之德之純文王之所以為文也純亦不已我寧考之文蓋本諸此宜其經緯自然軌範萬世河圖琬琰光耀寶鎮也朕方將欽裒睿製昭奉嚴儲宜揭鴻名以隆燕翼其閣恭以寶章為名仍置學士直學士待制直閣以才德之宜稱者為之著諸令甲式永昭回理宗皇帝顯文閣咸淳元年六月置詔曰朕惟理宗皇帝在宥四十一年垂休億萬餘載日務緝熙之學天開經緯之文泝道統於洙泗之前崇理學於伊濓之後鏗鏘韶濩之作昭回雲漢之章自惟沖人獲承先訓凡厥心侍之要得於面命之餘堯曰大哉彰煥乎其有之美文所為也形於乎不顯之詩寶閣功成奎文具列用體中庸之垂教以昭下武之繼文其閣恭以顯文為名置學士直學士待制直閣等官以待儒英式彰鴻烈著在令典用飭攸司謹按祖宗諸閣皆以藏御製御書圖籍寶瑞等惟天章閣自東京時以奉列聖御容中興以來駕所幸處必擇地安奉恭稱曰天章閣神御紹興二十四年十一月始討論制度重建天章一閣而諸閣所藏皆在其中自龍圖至顯文之閣凡二十四字合為一扁中興後天章閣不以除官蓋不特天字非臣下稱呼亦以神御所在不可與他閣例言也見嶽珂愧郯録北宫德夀宫在望仙橋髙宗皇帝將倦勤即秦檜舊第築新宫紹興三十二年六月戊辰詔以德夀為名乙亥內出御札曰朕宅帝位三十有六載荷天之靈宗廟之福邊事敉寧國威益振惟祖宗傳序之重兢兢焉懼不克任憂勤萬機弗遑暇佚思欲釋去重負以介夀臧蔽自朕心亟決大計皇太子賢聖仁孝聞於天下周知世故久繫民心其從東宫付以社稷惟天所相非朕敢私皇太子可即皇帝位朕稱太上皇帝退處德夀宫皇后稱太上皇后一應軍國事並聽皇帝處分朕以淡泊為心頤神養志豈不樂哉尚賴文武忠良同德合謀永底於治丙子行內禪禮畢遂移仗居焉德夀宫德夀殿二扁皆孝宗皇帝恭書康夀殿嘗産金芝太上皇帝御製贊并序曰康夀殿産金芝一本發於左棟煥然榮茂若彰懷沖履正之德因圖而贊之律身以道既濟則亨沖和鍾芝十有二莖煌煌競秀結液蟠英益茂德本天開地成太上雅好湖山之勝恐數蹕煩民鑿大池宫內引水注之疊石為山象飛來峯有堂名冷泉孝宗皇帝嘗賦詩曰山中秀色何佳哉一峯獨立名飛來參差翠麓儷如畫石骨蒼潤神所開忽聞倣像來宫囿指顧已驚成列岫規模絶似靈隱前面勢恍疑天竺後孰云人力非自然千巖萬壑藏雲煙上有崢嶸倚空之翠壁下有潺湲潄玉之飛泉一堂虛敞臨清沼枝蔭交加森羽葆山頭草木四時春閲盡嵗寒長不老聖心仁智情優間壺中天地非人間蓬萊方丈渺空濶豈若坐對三神山日長雅趣超塵俗散步逍遙快心目山光水色無盡時長將挹向杯中渌太上御跋曰吾兒自幼岐嶷進德修業如雲升川增一日千里豈特義方之訓師保之功蓋生知夙成有不由言傳而自得者吾比就寬間之地疊石為山引湖為泉作小亭於其旁用為娛老之具且俾吾兒萬幾之暇時來逰豫父子杯酒相屬挹山光而聽泉流濯喧埃而發清興恍若徜徉乎靈隱天竺之間其樂可勝既哉吾兒乃肆筆成章形容盡美雖吟咏之作帝王之餘事然造語用意髙出百世之上非巨儒積力可窺其粗亦有以見天縱之多能覽之欣然老眼為之增明矣有樓名聚逺太上親題其額仍大書蘇軾賴有髙樓能聚逺一時收拾付間人之句于屏間禁籞四面東則香逺梅堂清深竹堂月臺梅坡松菊三徑菊芙蓉竹清妍酴醿清新木犀芙蓉岡南則載欣大堂乃御宴處射廳臨賦荷花燦錦金林禽至樂池上半綻紅郁李清曠木犀瀉碧金魚池西則冷香古梅文杏館靜樂牡丹浣溪大樓子海棠北則絳華欏木亭俯翠茅香春桃又有亭曰盤松嘗御製贊曰天錫瑞木得自嶔岑枝蟠數萬幹不倍尋怒騰龍勢靜奏琴音凌寒鬱茂當暑隂森封以腴壤灑以碧潯越千萬年以慰我心重華宫即德夀宫孝宗皇帝淳熙十六年正月詔改名重華二月壬戌內降詔曰朕以菲質循堯之道兢業萬幾厯嵗彌長賴兩儀九廟之德邉鄙不聳年穀順成底于小康爰自宅憂以來勉親聽斷不得日奉先帝之几筵躬行聖母之定省固已慊然于懷况乎春秋寖髙思釋重負皇太子惇仁孝聰哲久司匕鬯軍國之務厯試參決宜付大寶撫綏萬邦俾豫一人獲遂事親之心永膺天下之養不其美歟皇太子可即皇帝位朕移御重華宫遂內禪如紹興三十二年之禮重華宫重華殿二扁皆光宗皇帝用隆興故事恭書重華宫有一淨室夀皇終日宴坐其間几上惟書籍一部及筆硯楮墨而已近璫嘗奏髙宗皇帝留下寶器圖書陛下盍時取觀夀皇聖諭云先帝中興功德盛大故宜享此朕豈敢自比先帝皆鎖閉不開元夕後三日宣嗣秀王伯圭宴集伯圭奏陛下對此良辰美景亦領略之否夀皇聖諭云十四日嗣帝過此排當十五日不飲是夜但鼓琴兩曲左右報月色甚佳遂出巡簷賞月已而飲湯一杯至二鼓就寢大凡飲酒不可連日令人神思不清人主沒人道若不自禁制任意恣縱何所不可非獨酒一事也近璫奏當修重華宫舊例須關朝廷出錢下臨安府轉運司應辦夀皇聖諭云此間無用錢處所積甚多只用重華庫錢不必關聞南內暨役成更不官差一匠一夫已上三事據倪思記所聞於伯圭子師禹見經鉏堂雜志慈福宫即重華宫以奉憲聖太皇太后夀慈宫即慈福宫以奉夀成皇太后東宫紹興三十一年五月孝宗皇帝為皇太子始有詔討論東宫典故越旬日即受禪乾道元年莊文太子受册嘗下禮工部太常寺皆無典故可稽惟武臣張孝傑能記政和制度止係廳堂并諸官屬人從屋宇七年光宗皇帝升儲乃詔於麗正門內之東蓋達太子宫門淳熙二年始創射堂為遊藝之地囿中有榮觀玊淵清賞等堂及鳳山樓皆次第建置寧宗皇帝由嘉邸理宗皇帝由沂邸入繼大統不遑築宫今上皇帝由青宫始於禁中營建大扺不以為定所資善堂起於紹興初孝宗皇帝育宫中遂造書院於行宫門內曰資善堂以為就學之地亦無定處學士院在和寧門內蓋沿唐北門之制也玉堂髙宗皇帝用淳化二年賜承旨蘇易簡故事御書賜學士周麟之等刻石廳上有記臣麟之近於經帷奏事因言昨被旨撰皇子賜字上宣諭曰凡學士院故事不欲廢也臣恭聆玉音竊仰聖主深略緯文逺猷繩武事無巨細允迪前徽一出言不忘典故而禁林自祖宗以來優寵詞臣賚貺非一昔有巨麗今獨闕焉睿訓及之不可默已即具奏國朝淳化初太宗皇帝嘗以飛白書玉堂等四字賜翰林學士承旨蘇易簡謂宰相曰易簡告朕求此數字卿可召至中書授之他日為翰林中美事字徑二尺餘龍鵠之勢曲盡神妙曩更變故石本亦罕有存者恭惟皇帝陛下聖筆天縱超冠百王萬幾燕間染翰弗輟龍文龜畫刋在翠琰布列中外焜耀羣目學宫儒館賁飾尤多惟是玉堂直廬密邇清禁臣愚猥以末伎誤膺簡擢典司內命丁辰晏清書詔甚稀鈴絛不鳴愒日無補曽勿能考援故事禆緝濶典以為萬年無窮之休臣則有罪敢昧死以請制曰可越翼日內出玉堂二大字以賜奎璧煥爛自天而下光氣昭倬發蔀燭幽開緘竦瞻爵躍詠嘆視前世所謂畫起平雲點蹲芒玉者不足以進於此顧臣謭劣大懼弗稱及入謝復得請於都省宣示宰執自中祕暴書俾侍從館閣官咸得觀仰仍以石本分賜士林歆艷皇乎哉中興之偉觀一代之彌文也臣謹按玉堂本漢别殿在未央宫與清涼宣溫神仙長年金華白虎麒麟列峙相望史不詳著而略見於李尋翼奉傳然則玉堂蓋殿名也待詔者有直廬在焉故尋自謂久汚玉堂之直易簡所乞太宗所賜實取諸此後以避英廟諱至紹聖初始掇取二字榜於院而識者非之謂不當以前代殿名皇朝寶札揭之於臣下止息之地今臣建請則所不敢惟是仰承德意勒石旌事以永億載之傳廣四方之藏侈儒生萬一之遇使天下後世咸知皇帝陛下典學稽古迪文右賢藝兼于道能潤色洪業不廢故事如此是則渥恩出于非常舊典振於已墜皆不失太宗皇帝本意豐功盛烈釀化懿綱巍巍乎與淳化比隆矣輒舉大概書於下方用對揚明天子丕顯休命慶元五年更造玉堂殿詔止以玉堂為名據翰林遺事玉堂本以待乘輿行幸非得常居惟禮上之時略坐其東受院吏參謁景定五年詔復寓直舊制御製詩一首并序賜直院牟子才馬廷鸞曰學士寓直玉堂此盛典也今復見之爰以詩賜右掖摛文步武髙綾衾寓直熖蘭膏當年宫錦飛雙鵠今日仙圖看巨鰲詩賜玉堂蘇易簡光搖蓮炬令狐綯明時盛事今重見爰製篇章示衮褒臣子才等刻石恭跋玉堂地切禁省諸學士職其間者皆有儤宿之直以備天子顧問唐人每以北廳階前花甎道為入直之候故舊規交宿例有早入晚入伴入之名國朝因唐制然學士皆早入直又單直無復伴入故太宗以來雙日夜直隻日下後遂定雙日鎖院隻日宣麻而隻日至晚乃下直真宗時昉輪講筵官備宣引咨訪故每夕兩員略如舊或遇學士獨員元豐則三直免一宿元祐則兩直免一宿始猶有特旨免宿以示優異者後遂令請告者以次遞宿則益嚴矣南渡日不暇給及髙宗肆筆玉堂寓直有所隆興初乃詔講官輪直如真宗時而孝宗優待詞臣若周必大諸臣所記尤近代罕見臺諫以暫攝寓舊弼以內宴留宿又皆誇為盛事焉此宿直之大概也因循浸弛數十年來內宿有厯視為文具未聞有一人踏花甎道候日影者景定甲子五月辛未有詔復舊制偶臣子才再入叨首直忽貂使自天而下賜臣子才臣廷鸞以御書御製五十六言詩一首敘引紀復直為盛事者又十八字金石鏘蔚奎璧昭回拜復跪觀心目焜耀臣子才臣廷鸞皆奉和以進縉紳學士傳誦稱説以為甚盛舉嘗觀自昔帝王善為歌詩者莫如虞舜然皆有所為而為之南風之歌為阜財解愠也賡歌之詩為勑天之命也卿雲之歌為配天之靈也緼之於心發而為詩達其心之所之於君臣天人之間豈後世歌大風而見霸心詠微涼而起愛心者比今聖製盛矣豈特以私臣子才臣廷鸞而已要有為而為之所以示右文重復古也聖人之文詞立道備無此言則天下之理有闕詎不然哉且自昔人主在位久則土木甲兵狗馬畢弋禱祠方技之事或不免於是上臨御四十一年矣聖心與道一恬淡寡欲每禁中清坐往往夜分不寐益思親近儒生學士訪求治安而心之所發又率有關世道其所以貽燕謀於萬世昭無窮而垂罔極者可謂逺矣臣子才臣廷鸞既猥被盛賜竊窺聖作不過借綯易簡以示寵褒然綯在大中其事至淺鮮自謂最承恩遇而入對延英未嘗不汗洽浹背則其平日決無犯顔敢諫之事易簡之賢遭逢盛時蓋非綯所敢望苐大言等作其詞微侈恐有宋玉景差不流之失臣等所願砥礪名義激昻志氣求無負天子所以寵褒之者文章小技蓋不足云乃相與謀勒諸樂石用攄景光而臣子才臣廷鸞所和文義至陋固不敢附見下方而具著其所以然者使觀者有考焉是年十月丙午摛文堂在玉堂之後東西兩閣以處詞臣寧宗皇帝用政和五年賜承旨強淵明故事御書扁賜學士髙文虎有記臣仰惟皇帝陛下聰文英濬卓冠百王孝儉恭勤超越千古璣玉瑁翠之奉弗玩弗親聲色燕曼之娛是屏是逺惟思延尚儒雅博考藝文汲汲皇皇如恐弗及聽朝日昃兩臨講惟宮庭清間常御翰墨是以帝學時敏造乎髙明聖筆文成核乎精妙誠皇王之極摯書契之罕聞也臣猥以謭才待罪翰苑略無美報可稱渥恩惟是直廬密接清禁若初肇祉爰在中興嵗月寢遷區宇滋圮非所以奉宸盡輯儒紳也臣進讀邇英冒塵淵聽願加新闢式侈眷私聖度優容臣言隨格於是外而京守內而典司祇承詔音遄力營創咸繹上意遹圖厥功中矗崇基載登奎榜旁連翬舍迭處詞臣扄廡區分圖籍彪列靖深厰奧視昔逾閎悉惟元勳力贊英斷肆應隆旨仍名玉堂親灑宸毫增寵禁直乃十一月以摛文堂三字下賜小臣昭回之光照映天地婉結之妙經麗辰星皇乎韙哉臣切以列聖繼承惠遇多士明謨𫐠作振迪斯文粵自太宗首賜飛白至於髙廟復被奎鉤今又天輝下臨寶翰洊錫皇文帝藻疊矩而重規河圖洛書交燭而並耀允謂千載之曠逢一時之丕鑠矣初玉堂為西漢殿名與清涼宣溫金華麒麟列於未央宫旁分嚴扄以居待詔所謂玉堂之直翼奉嘗厯是選淳化宸翰蓋取諸此紹興初以避英宗廟諱只榜以二字然臣下止息之地不當以前代殿名聖朝寶札揭之周麟之蓋嘗敘此兹乃濬發睿思垂灑翰題上以昭尊祖之休下以彰待士之寵其視無忌師道被鸞虯之賜至德處俊蒙楫翼之褒參諸顯榮萬萬莫擬臣嘗聞堯以文思而運帝德舜以文明而協帝華夏之厯年祗于文命周之過厯郁乎有文然則帝王相傳以文建治也尚矣皇帝陛下若稽古訓左右賢規訂制而辨儀披圖而諏律文之經也黼黻大猷金玉百度德修而逺格仁洽而政醇文之教也皇化之盛炳炳麟麟增光祖宗潤色鴻業貽謀燕翼其繇是而推焉臣弗佞虔奉寶墨被之翠珉對揚天子顯休于千萬世云慶元六年正月一日講讀官宿直位次在院內隆興元年詔經筵官直宿稍復祖宗故事八月直院劉珙以直宿位次屋宇窄狹乞行展蓋從之周必大玉堂雜記云隆興初用真宗故事輪講筵學士院官直宿禁林每夕兩員以備宣引咨訪其後以兩人難獨召若同召則議論難盡止命一員遞宿間遇除授宣鎖講筵官已入直率聞命蒼黃而出或偶值本院官直宿就留鎖院則不係當日與否往往特宣云每直兩日謂之頭直末直今上皇帝即位詔仍宿直以便訪問咸淳臨安志卷二
