body:
  text: 咸淳臨安志卷四宋潛説友撰行在所録朝省尚書省中書省門下省樞密院國初循唐舊制即中書之北置院神宗皇帝朝又遷於中書省之西今院在都堂東止為樞屬列曹之所蓋樞密使率以宰相領故知院以下皆聚於都堂在和寧門北舊顯寧寺紹興二十七年建都堂刻周官一篇於正坐之屏堂上列詔令御製御書石刻髙宗皇帝廷尉天下之平也髙柔不以明帝喜怒而毁法遊肇不以宣武敕命而曲筆况可觀望臣庶而容心者乎曹劌謂小大之獄雖不能察必以情為忠之屬也可以一戰不其然乎可布告中外應為吾士師者各務仁平濟以哀矜天髙聽卑福善禍淫莫遂爾情罰及爾身置此坐右永以為訓仍札付臺屬憲臣常加檢察月具所平反過刑獄以聞三省嵗終鈎考當議殿最右紹興三年正月九日詔恤刑翰林學士臣綦崈禮恭書紹興三年行在臨安府春正月乙丑內云闕獄之吏付臣頤浩等施行之丁卯有旨命尚書右司刻石以墨本頒天下親札賜大理置之廳事庚午又示六曹兩省侍從官吏咸知德意左右司條上刻石所當請者辛未命臣子畫篆其首曰紹興恤刑手詔且使臣崈禮書其後而置政事堂以垂訓永久天語哀矜雲章飛動讀者悚然或至感泣識仁聖之用心也臣崈禮既承命乃拜手稽首言曰昔舜紹堯之治象以典刑而勑天下以欽哉欽哉惟刑之恤哉可謂至矣詳考其書方蠻夷猾夏冦賊姦宄得臯陶為士而五刑五流之用惟明克允猶勉之曰刑期於無刑民協于中時乃功勑札之意蓋主於此語其明效則好生之德洽於民心用不犯於有司而終復推美於臯陶曰俾豫從欲以治四方風動惟乃之休嗚呼欽哉恤哉才兩言耳其利之博不亦至矣乎惟我祖宗相承以仁治天下慎於用刑同符前古凡大辟具獄必覆按再三有司讞疑常傳生議誅雖大惡罪不以族而吏入人死則廢之終身百有六十餘年行之不變是以德洽人心不忘戴宋故雖中僨而復興陛下襲積纍之休紹艱難之業詔書哀痛多罪已之詞法令損益申從寬之制布在有司咸可考也顧念兵興而來郡邑凋敝獄市之寄或非其人箠楚之下不無寃坐日者出五御史分行諸道既俾檢察詔令平反刑獄方臨遣焉而未復命也重以吏罕盡公或牽于權勢聽訟則上下其手議法則輕重其心刑罰不中深軫聖慮親詔中外用申警之仁心仁聞朝傳夕播交孚丕應無逺弗格先刻石之頒固已入人肝脾而淪于骨髓矣聽之輿誦酌之羣情臣知中原之易定而大業可復也豈特長勺一戰之勝為足道哉抑臣聞之聖人立教垂訓以待人也恕而責人也嚴待之恕則所不可能者不以望諸人責之嚴則所可能者不容于不勉恭惟明詔稱髙柔遊肇事而言不及臯陶則姑以其所可能者望人此聖人之恕也惟待之既恕則其責之必嚴彼懷私顧望而玩法鬻獄者亦可以懲矣聖意諄諄方且誨之以仁平諭之以禍福丁寧懇惻不啻慈父哲兄之詔其子弟至於定察舉之令增賞罰之科俾有司月上而三省嵗考顓以平反課其殿最欽恤之旨備形德音茍有識知孰敢不勉由斯而往遂使人人自以為臯陶而偷刻之風還之忠厚不難致也雖然不精不誠不能動人故動人以行不以言明詔布告方見于言辭之間而臣已必其能感人者豈無自耶臣家寶藏建炎時賜研中使語臣蓋上所常用者研刻御書曰摻觚濡墨兮中有殺生造次必思兮今世可行大哉言乎夫以殺生之重不忘致於下筆出令之際而平居几研必對斯銘常以自警於間燕之時然則好生之德本於聖性發為誠言豈惟今日之詔臣以是虞舜躬行之效四方風動將在兹乎因并記其事以昭示天下朕日與二三大臣宵旰圖政而士風習安泰之久驕怠不恤事機以偃蹇自如為髙以緘默不言為智朝廷有期會而不應責限一日而違輒踰月省部之於監司監司之於郡守文符屢下視之漠然居官者惟務茍且指日望遷使逺者動輒遲延力求脫去凡此非庸懦即挾勢而然緩急豈肯協濟國事可丁寧告戒並宰執臺諫率克所職檢察中外有仍前驕怠者具以名聞當議重置於法惟無庇親故無徇愛憎賞不遺逺罰不阿近務在必行仍榜明堂右紹興二十九年六月癸巳戒飭士風驕怠左僕射臣湯思退謹記闕文民闕虞舜莫如作書為戒闕哉惟時亮天功成王董正治官語凡數千百言闕為耶亦由任無為夫無為者闕糾逖莫所使明黜陟公訓告不有闕仰成於上兹所謂萬事咸理而後人主端拱無為而天下功者也恭惟皇帝陛下神聖慈武受命中興體天之剛自強不息當昃未饋未明求衣以圖回萬微之務深慮士狃安泰怠心易生抱虛求進或幾於成乃譯聖志裁明詔駿發睿藻揭示在廷戒休而董威仁寬而義嚴渾乎虞典之約而周也噩乎周官之詳而要也日月之光照耀雷霆之聲震疊萬方黎獻羣視胥聽奔走率職文武各致其能小大無越其思庶有以承休命贊萬分成恢定之功登太平之治而闕六盛行將見之臣等叨服近司不能總領衆職以稱上意大恩宏覆特寬司敗宸翰訓飭兢兢縮栗竊惟明詔之下闕以縉紳之士闕周戴奉以周御名著之金石示萬方與虞之書並傳無極乃請上刻石于尚書省而拜手書于下方纍降指揮禁約不得以苞苴相貿易交結權要非不嚴切訪聞邇來尚或有之其在州縣則科於民在軍旅則掊剋卒伍盈車接艦珍甘技巧以為賂遺無名之斂遍及軍民可不痛革夫居上位者必有所欲而後人得因所欲以濟請託之私凡我在位皆清白及侍御僕從罔非正人則苞苴何所自入哉申嚴戒飭如有違犯重置典憲斷在必行臺諫糾彈毋憚大吏在外監司按劾右紹興二十九年六月丁酉禁約苞苴左僕射臣湯思退謹記臣思退等言伏覩六月丁酉手詔戒諭臣寮崇尚廉潔禁止賂遺臣等恭惟皇帝陛下秉至德昭大明神聖之資稟于天授恭儉之行厲於身修清心損已既形於識記卻貢罷獻屬發於詔旨凡四方之以式於少府者蠲減無慮數百千萬蠙淮之魚蛋海之珠意其病民止勿復取純約之風行廉能之效著尚慮中外之臣狃習勿悛流貨市交以紊邦治乃躬灑宸翰昭示外朝丁寧告戒俾遵於度臣等拜傳跽誦震眩心目竊惟古先哲王之治天下善為之本而法輔之蓋徒善則人不之畏徒法則人不之服善法相須乃克用人今陛下修身而善立御衆而法行羣工庶臣孰敢不正敢不欽應在昔成湯逺聲色薄貨財陳六事而戒苞苴辨三風而繩徇貨暨周文王卑服即功庶民惟正之供德聖功神實基大業惟皇有作視古一揆用能恢中興之績成太平之治實天下幸甚臣等昧死請以詔書勒之堅珉置於文昌都省使薦紳士大夫見者竦目聞者傾耳回心易行以廉相矜以稱明詔惟陛下制曰可越八日己未刻詔書于石孝宗皇帝朕嗣承大業夙夜求濟顧德弗類歷日彌久國家之勢未復乎安強所賴薦紳大夫明憲度總方略率作興事闕規闕圖屬闕告在位申飭闕柙使各崇尚名節恪守官常謹好惡於用舍之際者亦深切著明矣而百執事之間玩嵗愒日未喻朕志闕之俗猶在闕之習尚存便文闕為智模稜不決闕拱默為忠純以繆闕寬厚隆虛名以闕尚務闕從締交以附闕甚者責之事則身闕激之言則氣索曾微特立獨行之操安得仗節死義之風朕甚不闕天下之風俗之好惡朕所趣鄉薦紳大夫其知之矣朕躬秉是道嘉與宇內之士共繇闕而俗習闕豈廉恥道喪日久所入者深歟抑告闕惻未能孚於衆也書不云格則承之庸之否則威之繼自今其惟易慮激昻底勵毋蹈故轍豫則爾嘉爾或不從朕則罰及爾身弗可悔布告天下使明知朕意石刻漫滅多闕文右乾道六年十月戒飭士大夫宰臣虞允文等立石跋語並漫滅不可辨識朕崇節儉以先天下無暴征無苛取期吾元元躋於富庶之休家國之間宜若公私交裕矣今顧不然豐年樂嵗中外少事或未免於匱乏州迫其縣縣迫吾民其故安在毋乃賦入寡而用度衆歟吏二千石有能不能歟將輕費妄用莫知撙節歟朕既深居九重無以遍察故分道置臺寄耳目於爾漕臣職當計度欲其計一道盈虛而經度之也職在按察欲其蚤正素治毋使至於病民也厥或異此朕何賴焉且汝不聞黍苗之詩乎我任我輦我車我牛謂美召伯能成轉餫之功也後世以是名官寧無意耶曰陰雨膏之言能養民如膏雨也其卒章曰王心則寧言家給人足乃能安王之心也汝等得不深思古誼視所部為一家周知其經費而通融其有無廉察其能否而裁抑其耗蠧數者備矣郡計何患乎不足郡計足則屬邑寬屬邑寬則民力裕民力裕則吾宵旰之慮釋國有信賞於汝何吝若乃有餘者取之不足者聽之逮其乏事然後從而劾之斯亦晚矣是則黜罰之行奚獨郡守而已諸道轉運其明知朕意右淳熙六年三月飭漕臣裕民力右丞相臣趙雄等恭跋淳熙六年三月丁丑臣雄臣淮臣良臣奏事殿中天慈惻怛有民力未裕之歎因出親筆手詔示臣等再拜跪受退即捧讀紬繹至再至三仰見聖明總核庶職軫憂元元所以加惠至厚天下幸甚臣等恭惟陛下儉德冠乎帝王仁心同乎天地爰自即位池臺弗增車服隨給橫恩妄豫毫髮不私厚賦重征蠲貸略盡是宜民力全實無愧前古之盛乃名藩大府猶以病告致勤九重宵旰之念士大夫交議莫識所由及恭覩宸奎敕戒漕臣將使審計經度任州縣有無之責乃知聖鑒髙逺推見本原德意志慮非臣等所及臣等謹奉明指寅布中外越二日又請刋石以副墨遍賜諸道制曰可臣等竊以天下譬猶一身一身之間血脈流貫則四支和平天下之勢上下通融則百職修舉此理之必然也昔劉晏號古今計臣之冠究所設施不過取羡補乏蠲荒斂豐其後興利之臣乃不問有無一切殫竭國計未贏而民力憊矣是故轉漕之任一道是寄盈虛緩急所當共體若乃智慮不通規為不豫悉取其有餘以徼強濟之名安視其不足而諉曠敗之責自謀善矣謂公上何非置使之本意也今雲章昭回聖謨廣大凡厥奉承曷敢不敬敢不丕應詩云肅肅王命仲山甫將之邦國若否仲山甫明之臣等不佞尚能恪意悉力以助揚聖意若其受詔不虔與夫稱職有闕則當甄序以昭賞罰既入石謹拜手稽首而書於下方朕惟監司郡守民之休戚繫焉察其人而任之宰相之職也苟選授之際惟計履歷之淺深不問人才之賢否則政治之闕孰甚於斯今後二三大臣宜體國愛民精加考擇既按以資格又考其才行合是二者始可進擬夫然後事得其宜用無不當如非其人將見動違三尺民受其弊而無所訴雖日降指揮約束但為文具而叢脞於上何益治道哉故傳曰為政在人卿等其謹之毋忽右淳熙九年五月詔大臣精擇監司郡守右丞相臣王淮等恭跋臣淮等猥以菲才叨輔大政仰惟皇帝陛下神心淵懿經緯萬方旰食宵衣罔不惟民之念乃五月丙子內出御筆手詔宣示臣等辭旨懇切訓戒丁寧謂民情之慘舒繫政治之得失監司郡守責任尤重選授之際勿専履歷惟才行是擇臣等拜手自訟失職之咎聖恩寬大未忍加誅越七日癸未奏事延和臣俯伏待罪天顔怡悅賜以慰藉且曰兹用人之弊所從來久方勉卿等相與勵翼匪専為今日設也臣又再拜言曰昔成王作周官以戒其臣亦曰舉能其官惟爾之能稱匪其人惟爾不任蓋用人宰相職也厥或不任責將焉歸然自古用人為難資格可以待平進而其失也枸未免賢愚同滯之譏才望可以示奬拔而其失也肆至有私意抑揚之患合是二者幸詔臣等聖謨髙古確然用人之大法臣等敢不洗心滌慮恪遵丕訓刋諸樂石置政事堂之東監觀自警繼自今周旋審繹必求名實相應以無負陛下拜刺史守相之意敬書下方用貽永久比以聽政之暇嘗製春賦一篇因嘉雨暘之時而喜農功之興也今書以示卿等玉厯告新春令既班覽天宇之澄穆喜物情之舒間乃思髙明之觀歌七月之詩而知王業之難厥初有神勾芒司權木德在行而東闕斗杓直寅而左旋鼓一氣於羣動紛萬生之自然羲和於是以緩轡而逶迤乎北陸之躔曉光曈曨寒威乍收輕塵不驚晴煙飛浮聊憑虛以注目欣芳郊之可逰想都人其往來莫不意適而心休俯觀長江東並海門息靈胥之怒濤浴扶桑之朝暾越山前陳蒼翠穹隆雲氣杳靄疑神人之所宫千巖萬壑雖不可以歷覽而足以想像於胸中遐瞻原隰彌望不窮浹土膏之流潤將勸功於九農碧草萋其帶露逰絲飄其曵空丹緑兮衆芳超遙兮春風春風兮來歸信吹萬之不同散霏雨之漠漠泛平波之溶溶若夫朝霽夕陰異態殊觀回薄太虛不可控摶者春之容也蔥蔥林林萬彚一律魚躍鳶飛各遂所適者春之功也雖然天地之氣猶環無端既莫索其至隱顧孰窺乎本原惟寒暑之迭運蓋陰陽之相生彼三春九夏之異其亦猶大道之強名且夫碧實朱英穠苞艷葩榮於春者冬必瘁枿於夏者秋必花擢喬松於嵗寒出竒卉於天涯知深仁之被物曽何間四時與幽遐吾將觀登臺之熙熙包八荒而為家穆然若東風之振稿灑然若膏雨之萌芽則生生之德無時不在又何羡乎眩目之芳華已而舉觴襟懷豁焉望飛雲之縹眇送歸鴻之翩躚心逰乎造物之表寄妙用於無言右春賦右僕射臣蔣芾等謹記皇帝宅位之六載儲精思道求所以調四氣肓萬物者動靜語默以天為宗雨暘以時農事將興帝心樂焉乃二月辛丑出御書御製春賦以賜臣等既下拜登受竊伏思念帝王之德莫大於法天天道之妙不可得而見也可得而見者天時之運行而已四氣之序而春首之萬物之衆而春生之溥博淵深無所不被求天道之端孰要乎此孔子作春秋書春于王之上而以正次焉春者天之所為也正者王之所為也欲使王者上承天之所為而下以正其所為蓋一經之大要也陛下聰明睿知得孔子不傳之學於千有餘載之上故能承天意以從事宏謨擴度包括幽遐則與春同其大湛恩厚澤涵濡微小則與春同其仁範圍著於德業發揮形於賦詠大哉帝王之言其視春秋之書異代而同旨鍧乎雷霆之聲也焕乎雲漢之章也漢髙大風之歌武帝瓠子之作方斯逺矣臣等待罪邇列獲拜非常之賜口誦心惟以謂陛下法天之德於此乎見顧惟昧陋無以仰贊裁成輔相之妙惟是倡率在位毋聚衆以妨農無嚴刑以傷生毋竭川澤毋殺胎夭日夜思所謂布德和令行慶施惠者以稱陛下仁民愛物兼容并包之意庶於代工之義無愧焉謹以宸章刋之樂石復敘鑽仰之誠書於下方以對揚天子之丕顯休命先是宰執奏事上曰人主不可不知民事朕近嘗作春賦倣蘇軾赤壁賦為之大意言農事方興要使無失其時宰臣魏杞請窺聖作故賜之朕聞君人者以任使百官為事者也百官者分其職而治其事者也故設是官必有是事任是事必有是人任得其宜則百職舉而衆事立任失其宜則百職廢而衆事隳何則人材有能有不能固不可一概論也離婁之明足以察秋毫使之正五音則非所宜也師曠之聰足以正五音使之察秋毫則非所宜也嘗觀古先哲王命官之際未嘗不擴獨智以照臨稽衆論而遴選以謂不如是則或違其所長而強其所短譬之用直木以為輪曲木以為桷鮮有克勝其任者矣於是精擇其材之所宜俾居是官而任是事如舜之咨四嶽求其能熙帝載者僉以伯禹為宜舜知用伯禹之得其宜也故命之曰女往哉又求其能典三禮者僉以伯夷為宜舜知用伯夷之得其宜也故命之曰女往欽哉至於稷之播百穀契之敷五教臯陶之明五刑垂之共工益之作虞夔之典樂龍之納言凡九官十二牧之屬明明在朝濟濟布列猶耳目口鼻之不相為用猶義負偃植之各安所施而又三載始考績三考然後黜陟幽明擇之既如此之精待之又如此之久此虞氏之朝所以無曠官而重華之治所以亘萬世而不可及也後之人君有志於圖治者非不欲求其材之所宜而任使之也人臣之欲致其君者亦非不欲因其所咨而舉得其宜也然得人之盛卒與虞舜相逺何哉豈非擇之不精而任之不久歟嗚呼邪偽亂真比比皆是知人則哲前聖所難以美惡取之則或失於貌以辨訥取之則或失於言捨言與貌而求諸毁譽之間則又有無辜之毁無實之譽然則人之才否終不可得而見耶曰天機動於自然而趣操得於行已固有不期見而見者茍在上者察材能之實去好惡之私虛以接下奮剛斷而不疑在下者存公正之心捨親舊之比忠以事上臨利害而不移擇不厭精待不厭久小有以成小而天下無廢事大有以成大而天下無廢政如是則太平之基可立先王之治可追顧不韙歟右用人論左僕射臣陳俊卿等謹記乾道五年十月十五日皇帝詔臣俊卿臣允文臣克家對選德殿坐論用人之道使各疏所見以聞臣俊卿等既退悉昧死上愚對越十一月五日皇帝復御選德殿出御製用人論幸賜臣俊卿等臣等下拜登受伏自惟念一介諸生遭值盛明待罪宰輔不能竭盡小臣事君之義罪當萬死皇帝陛下天縱日躋之聖淵懿之學度越百代而任賢使能之志駿發睿藻風厲邇列軼古中興臣淺陋誠不足以測識聖作萬分敬用侈金石之垂昭示無極敢拜手稽首言曰粵自皇降而帝炳諸典謨以冠德卓蹤者莫崇乎勛華禹益臯陶密勿之輔交修法宫動容貌出辭氣欽俞吁咈不越知人官人之訓載籍之傳維風可觀也今皇帝豐茂世之規監于唐典振起衆治宣召四方之士而器使之天日一臨賢佞忠邪莫得遁其情狀而量材度德飭戒不忘奎文天章紆餘閎肆皇乎載賡之歌凛乎奉璋之詩丁寧周密視典謨有加焉規摹蓋宏矣臣等惟天下之治匪人材罔攸濟梁百尺之觀航千仞之淵亦惟深山大澤之材是度是用材弗於良實敗乃事功然因能任官進賢絀不肖者大臣之職是心一不公則私欲蝕之亂其聰明逆曵倒植之譏響答而麕至必杜邪枉之門開中正之塗不倚不偏如陛下之所詔則百辟卿士穆穆布列若燭照數計而龜卜也臣等敢不早夜誦而法式之精白一心以對揚明天子之丕顯休命御書益稷篇賜新進士乾道八年寧宗皇帝朕惟方今大計在寬民力眷兹二浙實拱行都尤當優恤以厚根本况承平嵗久生齒日繁程其賦租之餘重以身丁之斂吏弗加省民輸益艱中夜以思靡遑安處非不知國用所係儲積宜豐顧寧損於縣官以少紓於百姓爰敷曠澤庸示至懷其兩浙路身丁錢絹可自開禧二年永與除放付三省右開禧二年十二月免兩浙身丁錢參知政事臣張巖等謹記臣等聞聖人用心惟知約已以裕乎民未嘗竭民之力以自養故取於民有節藏富于民而民不貪禹菲飲食惡衣服故能致九功之惟敘文王卑服即康功田功故能使萬邦惟正之供然則恭儉節用誠聖人愛民之本富民之要歟恭惟皇帝陛下仁義見乎躬行恭儉由乎天性宫室苑囿未嘗營也而因於舊服飾器用未嘗華也而安於質憂勤念慮一紀于兹朝訪夕咨無非細民疾苦之事乃嵗在乙丑十二月十九日因立春之朝布寬大之澤御筆手詔取二浙之民身丁錢四十三萬一千餘緡絹一十二萬五千有竒自開禧二年永與除放詔書一出父老扶杖而觀莫不感泣流涕相與歎息已而鼓腹四出歡聲如雷感動之機其速如此聖上豈不知經常不可以有虧用度不可以無備一旦捐以與民兹豈細事蓋寧輟母食無令兒飢寧減君賦毋令民困上蓋慮之熟也節一人之用活千萬人之命散一時之利成千萬世之仁君瘠則民肥百姓足而君孰不足此固天之道祖宗之意禹文王之用心也臣等敢不精白一心奉承美意銷歎息之心於田里集和平之福于國家臣等豈勝大願謹昧死摹勒奎畫被之琬琰以昭萬世使無忘聖天子之意理宗皇帝比年以來朝綱浸弛時事日乖所以並命二相夾輔王室正賴開明公道振起治功肅紀綱以尊朝廷用正人以強國勢救楮幣以紓邦計郤冦騎以固邉陲清吏道使無貪黷之風淑士氣使無囂浮之習軍制當定則飭將帥以去虛挂之籍人心當結則戒守令以行寬恤之恩此皆今日至切之務昨來並相往往各分朋黨互持己見或借學校之言或買遊士之譽交相捭闔隂肆傾排是以猜忌成風衆弊膠轕今朕用縉紳之公言從中外之人望登庸碩輔參運化權繼自今勿牽人情勿徇私意户庭必肅使門無雜賔親幹必飭使人無異議以玄齡如晦為法謀斷必惟其是以趙鼎張浚為戒議論悉主乎公務為正大之規以副倚毗之意故兹札示宜體至懷右淳祐十一年賜丞相謝方叔等昔王巖叟奏疏於先朝有曰朝廷之弊莫甚於容僥幸以養蠧尚姑息以惠姦朕觀比年以來其弊大率類此良由廉恥道喪貪兢成風監司郡守以賂而求何以厲其氷霜之操元戎主將以貨而得何以窒其溪壑之欲頑鈍亡恥者隂結於旁蹊嗜利無厭者依憑乎城社薦舉銓曹之良法也或交手而貿鬻朝著名流之清選也或入劄而指陳庸庸碌碌者計日以望遷循循默默者扳援而梯進其間有為外臺之按奏言路之抨彈自知擯却於公朝乃為夤緣於制閫郯章奏辟躐等希榮不思格法之難行直欲營求而得請辟闕至攙於部闕制差無異於堂差遂使國體浸輕政柄旁落外閫之權反重於朝廷朝廷之令不行于郡國此僥幸姑息之弊末流一至於此然中書萬化之原本宰相百辟之表儀源清則流以清表正則影自正繼自今毋養蠧毋惠姦毋以姑息市私恩毋容僥幸廢公法監司専廉察之權風采不振者去之郡守任宅生之寄簠簋不飭者斥之將帥不恤士卒狼貪虎噬者屏之士大夫不安命義蠅營狗茍者黜之此皆庶官之事又有關於國體之大者臺諫天子之耳目給舍朝廷之綱紀無非所以維持公論主張國是夫何近年諫臺無特立之操或聽命于廟堂給舍多朋比之私或稟承於要路甚者専攻上身以沽訐直之譽迎逢權勢以為躐進之媒是宜振起頺綱挽回陋習使朝廷有清明之氣象可也正朝廷以正百官正百官以正萬民朕之責也亦惟賴爾股肱之助也書曰襄我二人汝有合哉詩曰在時二人朕以周召望卿卿宜勉副朕意右淳祐十二年戒飭僥幸姑息之弊左丞相謝方叔等謹記臣等嘗謂周官乃成王戒羣臣之書有曰以公滅私民其允懷蓋公則天理私則人欲公則建諸天地而不悖質諸鬼神而無疑私則作于其心害于其政作于其政害于其事夫委質為臣茍能以公心滅私欲則以此事君儼如對越推以治民民其有不懷服者此成王之訓迪厥官蓋欲于心學中求之也後世大臣之事君不求之于心而徒求之于政故以自欺為心而事業暗昧不及古人房玄齡出于王通之門亦嘗問通以正主庇民之道其問善矣而通之説則曰能遺其身然後能無私無私然後能至公至公然後以天下為心而道可行矣惜乎其言是也其序紊也公則自無私矣以天下為心則必能遺其身矣其先後次第本末如此河汾師友講磨猶有欠闕此玄齡之止于為玄齡而唐之止于為唐也臣等恭惟皇帝陛下以聰明睿智神武之姿全剛健篤實輝光之德踐祚滋久純亦不已自昔帝王初年何嘗不厲精求治往往始勤終怠鮮能全其清明惟皇上清心寡欲原本純正是以德盛而仁愈熟氣老而志益新乃者月正元日特灑宸札訓飭大臣以至中外百執事風雷震動雲漢昭回臣等肅容跪讀鼓舞驚歎以聖訓所頒之條目而言謂監司太守以貨求謂元戎主帥以賂得謂薦舉或交手以貿鬻謂內職或入劄以指陳謂郯辟之太多謂閫權之太重此僥幸姑息之弊實以一私壞之又自聖訓所頒之綱領而言則中書之為政本宰相之任道揆正所以表倡羣工彌縫萬務使其源不清則其流必濁其綱不整則其目必棼至若臺諫耳目之官給舍紀綱之地公是公非所當明辨一口附和國何賴焉往者不可諫今惟有革士大夫之心而已苟能以公而滅私克已而復禮純于天而不雜以人則有協和而無朋比有正救而無附麗暗室屋漏之間真能以謹獨為事則私計之營私謁之至常若上帝汝臨鬼神昭布况敢於犯四知之戒以得罪名教乎臣等惟知祗謹服訓彞恪守力踐必首明公私之界限而致於天理人欲之毫釐每事須可以告之于天可以白之于君父可以對人言而無愧怍則庶乎上不負天子下不負所學云虞廷之賞延于世漢氏之官長子孫春秋謂成季之勳宣孟之忠而無後為善者懼矣朕慨思開國以來勳臣之裔有能世濟其美而不能世其祿者仰所在州軍體訪保明以實聞以備録用朕聞祖宗立法悉從寬厚惟贓吏之罰獨不少貸為其蠧國害民也朕待遇臣下未嘗少恩訓廉有銘正欲善誘不謂邇來貪風轉熾國與民俱匱而士大夫之家益肥間有自號清流而居官之汙濁尤甚朕將何賴焉自今小大之臣各宜洗心滌慮毋徇於貨賄其或不悛有淳熙之法在舉而行之非朕得已也右寶祐四年十二月録用勳裔戒飭贓吏右丞相臣程元鳯等恭跋臣等仰惟皇帝陛下德秉乾綱化成常久開三紀風移之運當七日陽復之辰親灑宸奎誕告中外以勳臣無後則示以録用之寵以貪風未殄則申以戒飭之嚴猗歟休哉一勸懲之間興起人心轉移習俗之大機也舜之賞延于世湯之警于有位曾不過是我朝醇化懿綱冠冕千古所以濬行葦忠厚之澤陶羔羊正直之風列聖相承家法具在若紹興則有佐命元勳訪用子孫之詔若隆興則有貪叨無厭抵法不赦之詔夫祖宗以仁立國待士大夫過於厚顧于勳舊則世其祿於貪墨者則災必逮其身非治之寬嚴爾殊也蓋揚善遏惡之公欲使小大之臣别義利之界限審榮辱之樞機舉皆知趣所慕而避所畏此能好能惡乃為仁之至歟皇上監于成憲揭為聖謨恢天地父母之心示風雨霜露之教式是百辟刑于四方凡委質為臣心具天理目擊訓辭思夫旗常之紀詔于司勳者兹者如此寵賂之章速于司敗者如彼可不洗心滌慮砥節勵行以上副九重褒表功德董正治官之意哉臣等待罪丞弼祇佩明綸惟當精白一心為臣工倡謹刻諸翠珉寶為大訓頒示方國以對揚聖天子休命也先是臣元鳯等奏臣仰惟皇帝陛下乾運聖德復見天心茂對新陽洊灑奎畫一則録用勳裔以示勸一則嚴飭貪墨以示懲河漢昭回寰宇瞻聳臣等叨居丞弼恭奉明謨謹當律已率先為賢訪後仰稱九重作新之意擬勒堅珉于都省風厲四方俾勳閥之家得續遺緒以沐聖恩有位之臣各思洗心以承聖訓欲望聖慈特降睿旨許令立石摹本頒示諸路監司守令俾之仰體訓辭知所畏慕世道幸甚朕於贓吏無所貸以其惟威惟虐大為吾民仇民吾赤子而仇之是與冦賊姦宄者同科而何以為天子之命吏古人喻貪以狼以碩鼠直目以物類之惡者蓋不得復言人矣惟彼貪夫憯莫之懲侵牟矯虔罔知盈厭朕夙興夜寐憂苦萬民封培本根每懼弗蔇羣國之吏乃淫從其欲以蠧厥生間聞田里凄砭人眼惻怛以還又甚自愧朕惟民生寡乏由于貪官之肆誅求貪官充斥由于監司之不按察抑無瑕可以戮人軌度其信而後可以治人初亦無以大相過耶我朝戢貪家法具在中興而後特為詳密監司不按劾而臺臣彈奏則坐監司罪此紹興十二年九月之詔也以發擲而為殿最不劾則重行貶黜則是年十月之詔也上下相蒙習為偷惰宜置重憲悉其臧否連銜聞奏違則彈劾又十三年九月與三十二年十二月之詔也又如乾道元年之正月四年之六月淳熙九年之三月十一年之六月慶元二年六年之正月皆有詔而詔不止是也率以外臺耳目不當蔽塞失察之罪凛乎其甚嚴今監司不廉問不按察者間一二見或輒用胸臆而貪者顧得免朕獨安取此兹當嵗首肆用咸與惟新繼自今仰諸路監司各舉其職無或以避礙縱蟊賊每半嵗具劾過贓吏若干來上當視多寡為殿最視殿最加賞罰而主之以必行郡守於民為親又當助監司所不及此當以一嵗為殿最賞罰亦如之或本路本州無所劾而臺諫論列則監司郡守皆以殿定罰咨爾部刺史而下典聽朕言無同於厥辜自取瑕殄其有治狀廉聲孚于衆聽者亦須托實奏聞以俟甄録薦賢受賞朕不汝吝右景定二年正月殿最監司郡守劾貪右丞相臣賈似道等謹記臣等仰惟聖宋之得天下也以仁十四聖一心三百年一日皇帝陛下懋昭聖德勤恤民隱深惟祖宗以仁立國而士大夫以貪仇民異時訓亷一銘布在郡國有人心者皆已如對日星如警雷霆矣乃月正元日內出手札宣示皇心惻怛宸翰昭回謂監司失職故吏不肖吏貪故民窮由是九重閔憂百姓愁嘆府辜階厲則汝之尤將大舉紹興乾道淳熙慶元舊典以按發多寡課監司殿最而黜陟從之且俾助以郡守察以臺諫不寧惟是貪夫不刺者有罰亷士能舉者有賞陽開隂闔秋殺春生大哉王言而今而後吏道不汚庶民允植以永我宗社于千萬年實權輿于是臣等載惟考課以定監司賢否者聖朝之典章取班簿援筆以去不才監司者先正近臣之故事陛下聖仁同符祖宗臣等孱陋逺慚先正亦既祇誦聖謨敢不精白一心以對楊明訓謹拜手稽首書于下方先是臣似道等奏臣等恭惟皇帝陛下一德當極萬年敬休惟欲乂我受民祈天永命肆念仁心仁聞而下不被其澤罔非貪官汙吏鴟義奪攘不厭不止以故元元寡遂至治未臻上勤聖懷憂勞夙夜乃月正元日親灑奎畫俾部刺史而下廉問按發以劾吏之多寡為使指之殿最治一州者則寬其期殿最亦如之宸毫飛動漢章昭回與嵗功以俱新期同宇以皆泰其視先漢當春時議賑貸詔下寬大書斯為卓絶無前矣臣等恭讀聖訓至于再三實為生民立命為萬世開太平非可與異時一發號施令之不匿厥指者並論也部刺史而下能恪守仰遵不負殿而以最聞繼是吏當稱其職民當安其業邦本所在永永不搖社稷長逺終必賴之臣等忝聨邇列親奉德言弗克欽承是為有負謹欲將上項御筆刻之琬琰立之朝堂仍以墨本朌之郡國令勒石所治以永觀省因拜手稽首揚言曰獲上黨穗文之祥不若寶此筆得河洛圖書之祕不若佩此訓欲一道之得福星不欲先懲勸以厲其激揚清濁之志欲萬物之皆吐氣不若嚴誅賞以計旌别淑慝之功使凡見此者皆當竦然而作如在殿陛之側而聞丁寧之音相與濯去舊習以課來效臣等不勝大願奉御筆依周典六計吏治條陳以廉為本乃良而循彼肆貪虐與豺虎均肥闕而家多瘠吾民縱逭於法愧其冠紳貨悖而入災及後人我朝忠厚黜貪為仁咨爾羣辟是訓是遵右訓廉銘民吾同胞疾痛由已報虐以威刑非得已仰惟祖宗若保赤子明謹庶獄惻怛溫旨金科玉條毫析銖纍夫何大吏蔑棄法理逮於郡邑濫用笞箠典聽朕言式克欽止右謹刑銘右相臣史嵩之等恭書臣等仰惟皇朝以仁立國列聖相承加惠元元謂吏治所以達吾之仁愛也貪則黷貨以傷民生酷則淫刑以殘民命害孰甚焉故誅戮不赦于姦贓厚貸每施于奏讞用能培植邦本綿祚無窮肆我皇帝陛下英明慈儉嗣無疆大厯服率由成憲同一仁心乃月正元日親灑宸翰製為訓廉謹刑二銘宣示外朝雲漢昭回奎文炳煥於以警羣工而竦百辟勵廉節而厚嘉師猗歟休哉臣等肅容伏讀若稽在昔漢治莫盛孝文觀其表亷吏有詔除肉刑有詔播告之修莫匪仁術故得吏廉平而民從化刑措之治庶幾成康然未若我皇上聖學緝熙王言深切惟淵衷之懇惻發睿思於詞章洋洋聖謨風動中外所以感發人之良心者又有在於綸綍之表也惟自今實惟賢者益知所勸而貪夫酷吏如其天理之未泯也必將率德改行飭躬愛民而王澤不患其壅底矣臣等歌詠贊歎之餘謹勒之翠珉垂耀罔極仍請以副墨頒諸郡國庶使小大之臣夙夜觀省期無負于君師訓誥丁寧之意敢拜手稽首謹書於下方又奏臣等恭惟皇帝陛下臨政顧治二十一年于兹深惟吏不廉平莫能布宣寬大迪民吉康春正三朝親製兩銘曰訓廉曰謹刑奎文於昭用警于有位臣等待罪丞輔對揚休命敢不共恪已勒堅珉植于都省竊惟訓詞深厚萬姓屬心凡有民社宜存永鑒欲望聖慈特賜睿旨許令摹本頒下諸路監司守令各刋時聽事之上東西對峙庶幾日覩昭回人知感悟必能潔已奉公戢暴除苛期與元元同臻富夀不勝寰宇之幸旨依今上皇帝豫以寡昧嗣承基業緒懼德弗類以為憂危永惟古今天下治亂何常同道同事因各有攸召然未有用君子而不治用小人而不亂者泰否二卦著此審矣要其所以為泰否者時小大之一往一來隂陽之一內一外其機甚可畏也今豫初服正書所謂自貽哲命之時曰自云者夫豈階于外哉是忱在我惟有愛護善類如元氣屏絶憸壬如邪沴庶幾自貽之道因念我朝以賢立國自咸平作興培植以來大者光明俊偉小者靖共豈弟數世流衍邦家尊安非熙豐而後一起一仆汔為姦匿所勝長治可也逮至孝皇尤為篤意由乾道及淳熙彬彬輩出號為極盛不惟在上者為人物之依歸而在下者又為儒學之表倡正人正道相為彪炳雖紹熙慶元嘉定間猶用之不盡又皆此時涵養之功治象於此可以概見豫荷豐芑貽謀之澤環視在列罔匪俊彥實先帝東拔以敷遺者若不待夢寐乎澗阿空谷矣繄爾服休服采之臣尚體豫志必保固凝聚無遐心必搜採薦達無隱情必主于立政而毋専于立名必勤于相規而毋至于相厲使根植壯而有益蕃之望氣類合而無可乘之隙聞風于下者皆知今日杜羣枉之門開衆正之路莫不懷忠信礪廉隅以待舉而士大夫之習為之丕變焉是亦正人心之一機也審爾則奚愧于咸淳之紀元可方二祖之盛際惟豫以懌右咸淳元年正月詔諭羣臣右丞相臣賈似道等恭跋臣恭惟皇帝陛下稟聰文睿哲之資充髙明廣大之學昭哉嗣服政化清明開延衆正丕若咸平淳熙盛際元年春正月上日龍畫穗書從天而下昭回星漢表裏典誥聖意若曰君子在內其象為泰善類必愛護則陽明長憸壬必屏絶則隂慝消咨爾百辟卿士罔或遐心隱情立政惟其實相規惟其正皇極敷言是訓是行庶幾二祖風烈以章先帝休德盛哉鑠呼臣等拜手稽首祇誦明謨竊惟我朝列聖以心立治上接堯舜精一之傳章聖製守臣之針孝祖著用人之論菁莪豐芑澤流垂裕皆始于心畫之訓迪勿以憸人其惟吉士亦克厥宅心為立政綱領文武之德與天地神氣同一運化此陛下駿惠先猷之淵指所謂自貽哲命既得乎正心之原推以正人心如表正景從疇敢不祇若明天子之丕顯休命勉勉我王綱紀四方天下可常泰也乃若光明俊偉為人物依歸臣等愚陋莫能希先朝名臣萬一敢不同心協慮益謹人才進退之機用凝太平之治謹以聖諭鏤之樂石昭示訓戒於萬斯年集用拜賢之福自今以始凡百有位懋敬之無斁謹手稽首書于下方先是臣似道等奏恭惟皇帝陛下聰明聖知受命于穆清初履至尊與天合符發號施令罔有不臧立政用人惟正是乂若稽謂一為元之義克謹厥始監于先憲以宣二祖重光月正元日煥頒奎畫倬彼雲漢昭章下飾聖學淵粹經緯河洛于易明泰通之象于書取初服之訓愛護善類屏絶憸壬視帝堯知人則哲大舜去邪勿疑無異指四方風動咸曰大哉言一哉心莫不精白以承休德夫人主之職惟辨君子小人而已君子國之元氣咸平淳熙天涵地育敷遺數世之仁先帝夀考作人之澤陛下迓續而封殖之萬世之仁也大明當天羣陰潛伏正人日進正論日昌于億萬年無強惟休臣等服在邇聨對揚顯命惟正人心者所以承三聖之功陛下端本澄源此為先務蓋精一之藴自得于聖心之微用能克知灼見旌别淑慝自朝廷百官至于逺近莫不一於正若昔孟春遒鐸之規正月治象之法方斯蔑矣請以御筆刻之琬琰立之朝堂布之天下俾士大夫日新厥習仰稱陛下稽古訓迪之美意臣等不勝大願惟天生民惟君司牧都鄙盈區分劃九服乃建州伯此維與宅民吾同胞咨爾保息朕兹念兹用簡畀爾思昔藝祖紫雲一誓眷焉牧養言如天地爾念哉悉爾心祇祇兢兢乃惠乃康惟廉惟平惟爾典常視民如身視郡如家視屬縣如子是可以為民父母矣勉旃俞往各勤我班瑞之分命右牧民訓昔在先帝字民是訓元元之命繫于縣令肆朕承保亦以命汝凡厥有生皆吾赤子父母于子胡忍弗仁爾廉斯明爾敬斯勤其率自爾中公乃視聽其簡孚爾衆衡乃令政兹猷告于爾志其使我民孝悌力田庶幾乎三代之醇四善三最治狀以聞我朝彞典尚旌爾庸欽哉右字民訓天生丞民皆吾同胞痛癢切身勿瘠民膏凡而戚欣繫命爾曹惟既厥心毋憚爾勞謬以千里根于差毫右牧民銘蒞事必公拊民必惠邇者有訓亦既切至咨爾令長守以勿墜宣朕實意斯為愷悌右字民銘太傅平章軍國重事魏國公臣賈似道等恭書臣等恭惟皇帝陛下行髙恩厚于先帝休德踐祚以來日莫之思夕惕之念罔不在民出見百辟入侍東朝自一話一言罔不曰惟兹勤毖是以展民所詘振民所乏汲汲惟恐弗逮以為良二千石實分吾司牧之寄而令視民滋近殆保姆吾赤子者乃因清燕作為大訓布之天下既克用我教辭罔敢弗欽而父母之心靡有底極又從而銘焉夫訓者提其耳銘者著其心意益嚴則辭愈切至乾道變化炳為日星鼓為風雷散為霜露諄諄然命之教之至也臣等幸塵該輔躬承至化自惟淺聞不能仰窺河洛之祕私竊妄謂仁者以天地萬物為一體惟聖人能充其量在昔先民有作曰吾同胞聖學髙明有取厥旨抑不云乎大君者吾父母之宗子其大臣宗子之家相也臣等職思其居豈惟心是宣是究贊贊襄哉以觀天下歸仁之盛臣等雖劣敢不勉諸是用勒崇垂鴻祇若兹其永無斁謹拜手稽首書于下方又奏臣等竊惟宋興德茂存乎百世湛恩汪濊羣生沾滯昔在藝祖皇帝以不嗜殺人得天下以容養小民戒藩侯太宗皇帝淵懿丕承乃至下取昔人頒令之針表而出之遂成王言書賜郡國立于廳事之南亦越我穆考理宗訓廉謹刑之銘字民之訓載在國史昭如日星德意志慮上暢下泝于是乎八方之外六合之內鼓舞太和皇乎休哉皇帝陛下嗣后丕宅誕保受命盛德至仁雲油天覆乃咸淳六年正月丙寅御製牧民字民二訓揚于王庭下之方國亦既深切著明越八月壬午內出二銘約文敷暢重巽以申蓋聖情發中無一念不在民詔書數下無一事不為民二訓方新而清燕之暇復製二銘以示臣等明謨丕烈稽之三聖而同符德洋恩普放之四海而皆準大哉王言一哉王心臣等不勝大願宣昭聖製頒示字內使郡縣長吏乃一德一心對揚天子之丕顯休命以長我王國御筆依思堂在都堂後經武閣在樞密院藏經武要略理宗皇帝御書扁刻之石宰臣恭跋臣恭惟國朝以仁立國以文致平以武禁暴整亂聖祖神宗不能改也肆我藝祖皇帝肇造區夏四征不庭北漢契丹猶未賔服講武除戎之事無嵗不申警國人而訓之正月壬寅幸造船務觀水戰二月丙寅辛飛山營閲炮車四月庚寅選卒于朱明門九月己巳閲兵于講武殿兩大閲于西郊復七臨幸于教船池搜苗獮狩著為通禮擊刺騎射悉為精藝用能南征北伐罔有敵于我師孝宗皇帝纘戎祖武光濟中興雖醜夷悍師屢書請和而我之武備益自飭謹乾道淳熙間于白石于茅灘于龍山凡五大閲親登將臺鼓作士氣燕射玉津興復曠典武藝有常記拍試有賞格鐵簾之射有遷轉補授六師既肅四方無侮所以葛酋至老不敢渝盟犯塞皇帝陛下惟二祖是承惟七德是經聖化甫更國威大競東亡漣海徐邳窺户之寇西亡蔡息亳鄧抄塞之兵商邱之南大梁之北蕃侯兵將降執繫道亦莫不願歸職方王師載朌北使踵至向者陵轢邊吏甚驁今兹被我衣冠雜以綺裘繡祫僕僕羅拜于殿庭下蓋亦我武惟揚有以動悟之也臣備位宰府共二樞庭目此武功懼無論述乃者清燕遊藝以御目經武之閣四大字宣付臣俾為宥府之鎮臣竊惟建隆以來本兵大計先後釐革條章登載于簡册者其目凡十總命之曰經武要略則有其書矣而未有閣也南渡中興訖嘉定癸酉創閣于本院之北北枕胥山南拱象闕中以所裒書藏于金匱則有是閣矣而未有斯榜也今傑閣麗宏寶書充牣奎翰昭揭雲漢動而日星垂也觀是閣者知武經在焉則知烈祖之德見心畫在焉則見吾皇之聖臣于是肅容拜手跪而言曰風雨之潤也雷霆之威也此天之經也山嶽之鎮靜也江河之澎湃也此地之經也春作夏長秋冬變而肅殺之此四時之經也朝氣鋭暮氣歸中夜之氣又從而收斂之此晝夜之經也其動也如風其止也如山其變化也如隂陽神鬼之不測進則兼弱攻昧退則和衆安民廣運之以神布昭之以聖奮赫之以怒耆定之以功此帝王之經也聖人于易之習坎詩之常武明著其義曰常德行以習教事曰有常德以立武事蓋兵象水也水洊至為坎而君子于教民即戎之事不洊習焉是棄民也王旅如雷霆也雷霆震驚為武而人主于四方既平之後不警戒焉是究武也皆非其常也所謂常者即經也隨變而施宜者權也用之于戰戰所以立和之基用之于和和所以寬守之備體立于不可勝之地用行于和戰守之間其為武經莫善于此彼漢儒之説乃謂反經可以合道若爾則權謀十三家技巧百九十九篇皆經也豈吾帝王之懿哉臣既已摹寫御書刋之翠琰復明辨經之説以對掦天子之威命此見吳泳鶴林集碑不著中書門下後省在都堂西起居舍人兼權直學士院中書舍人洪邁記題名兩省之官十有二唐制也今散騎常侍闕由諫大夫而下别為諌院同門而異户唯給事中中書舍人左右起居實同省其員亦十有二渡江以來蓋損三之一然亦未嘗備也給舍以法從為職凡紫薇黃門之政無論小大實書之實行之其未韙者得以告而還之兩起居日侍殿上備顧問皆名一時清切要官然去來姓名不謹于掌故四十年間已泮散不可考邁兄弟前後四入省舉致志焉邁去右司五年而復至乃竟成之獨建炎年時為不整敘或失其所來及所去官姑存之合為六十有八人其重至三至者三十有三人今廊廟五公皆從吾省干青雲而直上異時莫盛焉權官不書獨紀南陽公所以尊宰相重吾省也題名成又請浙東相公大𨽻表其上乾道三年二月二十五日以居官名氏嵗月識諸壁蓋俾後人考其時之職業而知其人之得失賢否云爾舊兩省闕官攝者例不久故前記勿載近嵗詞掖多先兼而後授瑣闥或經年無正除者遺之其可乎此刻權亦書是亦春秋變例之義也淳熙九年春三月上饒施師點續題有蘇軾石刻元祐元年余為中書舍人時報政患本省事多漏泄欲於舍人廳後作露籬禁同省往來余曰諸公應須簡要清通何必豎籬插棘諸公笑而止至明年竟作之暇日偶讀樂天集有云西省北院新構小軒亭種竹開窗東通騎省與李常侍隔窗小飲作詩乃知唐時得西掖作窗以通東省而今日本省不得往來可歎也四月三十日書給事中王信跋云省中舊有露籬近撤之頗快人意因為小詩有種竹偶然成故事隔忩時可賦新詩之句蓋用東坡仇池筆録所載元祐事也適陳諫議賈過訪舉似之乃云昨日方得此帖事之相符如此同舍請鑱諸石為他日佳話時中書舍人陳居仁李巘起居舍人胡晉臣淳熙丁未秋季紫微閣寧宗皇帝御書扁刻之石兵部侍郎兼中書舍人臣髙文虎恭書臣恭惟皇帝陛下堯之聰思舜之濬文禹之儉勤湯之齊聖文王之純亦不已成王之學有緝熙祇遹慈謨紹履否祚而繩武遵憲動法祖宗考圖表經篤嚮儒學兢兢業業汲汲皇皇用以迪淵謀而新睿德聖能攸縱文治並昭九功所經萬化所穆天以澄著地以謐寧日月之容舟車之暨仁陶義衍逺服邇安至于登崇畯良甄區賢否以正天下以清朝廷而臣奮繇單寒身際熙盛擢置薇掖晉陪金華數蒙渥恩無以稱塞每惟絲綸之地綱紀是司雖曰肅號令處要密夙所推榮逮其辨幾微詔豫奪關繫亦重若稽仁祖顧惠省垣揭名紫薇申錫奎篆所以浹寵靈而播馨烈者甚盛美也自炎正再興聿嚴掌制然舊觀未復有當迪聞乃八月癸巳詳援典彞冒陳講殿祈頒宸畫增耀前規天度惟深臣言是格越九月甲寅御書紫薇閣三字下賜小臣臣拜手稽首對揚王休鳯翥龍盤經緯河洛星鉤日珥闡握乾坤六書之工八法之奧凡髙宗傳之孝廟孝廟授之慈皇至是偉健端閎精微廣大參備衆體允集大成乃以十月戊辰虔奉奎丈妥揭華扁旋乞明指俾登汗青用詔顯榮光示萬世制曰可省户有禁詞臣迭居一旦天光焜耀慶雲葩郁如在上帝羣玉之府如遊太微三光之庭于以振元祐文治之華于以奮紹興規恢之業猗歟偉哉臣竊聞剛健中正天之德也自強不息君之德也故學聚問辨義炳乎乾又聞柔來剛上天之文也文明以止人之文也故化成政明象垂于賁今陛下軌範帝訓股肱勳賢日昃不遑運天之德而黼黻王猷金玉王度勉強行道闡人之文下濟而光彩藻藩飾維時西掖涵沐洪暉况于天地山川乎况于人民萬物乎由是充之自力行始臣恭以藻翰被之翠珉故述其愚附著于下昭侈上賜與闕四日云慶元五年正月十檢正左右司在諫院之右面東起居郎權中書舍人陳居仁記題名天下之事萃于朝廷而經體贊元上燮陰陽下遂物宜又出于一二日萬幾之外非賴掾屬朝夕祥贊則經綸之大務或汩于簿書期會之糾紛漢嘗以重臣録尚書然猶未為常職至有末年事歸臺閣之例雖置尚書左右丞不足論已唐分三省以宰相為長官始置左右司郎中員外郎各二人為丞之副分聽曹事則與丞同其品秩則非諸郎比逮我國家神宗朝置左右司郎中各一人員外郎各一人熙寧間始置檢正五房公事一人逐房始置檢正公事一人以檢核釐正中書門下之務元豐間稍加裁減乃置四人其後又省不置洎太上皇帝朝雖增損不齊要以兩省劇繁未嘗偏廢皇上御極初元詔左右司郎官各置一官後以右司専掌刑房事任為劇乃置兩員蓋內之六曹寺監外之監司郡守稍關治體而非所可専者率上于兩省故僉擬咨白殆無虛時誠政事之根本治道之原委必得其人扶植而順導之故選除視他官為遴異時繇是以入侍以秉政犖犖相望厥後雖進用隨時而雄劇如昔凡官寺皆有題名中興以後獨未之立同寮當暇時命掌故搜案牘考其名字除授遷改之先後得二百六人將刻諸石用垂久逺以居仁濫次其間為粗久乃屬敘其梗概竊謂公掾皆天下選中正以處已恭恪以事上自其常分若夫事有是非可否要當如鹽梅之相資水火之相濟為長者不以逆指為嫌為屬者不以姦分為憚惟理是循初無容心自然上下之情通而小大之政舉朝廷正而天下治豈不權輿于是哉并書所藴以貽同志庶知題名之設非亶為識嵗月而已也淳熙十二年三月承旨檢詳編修在樞密院檢詳楊萬里記題名中書樞密曰二府國朝之制也亦因也樞密之屬曰都承旨副都承旨曰檢詳曰編修在祖宗時都承旨則曾孝寬韓縝檢詳則王存劉奉世編修則顧臨錢長卿皆其選已中興損益至今日都承旨檢詳各一員編修二員蓋六十年矣而壁記未立今都承旨李公昌圖乃克為之屬萬里記焉士之言曰樞屬與宰屬異劇與暇也暇者無事乎爾也樞屬無事乎爾耶無是事則無是官有是官斯有是事矣有是事則必事其事事其事則不暇矣曰暇者無乃不事其事而強諉曰無事乎事其事矣樞屬之職足乎未也等而上之曰使曰副曰知院曰同知曰簽書曰同簽書其號殊其建不並其為長二均也建其長又建其二又建其屬者何上之道下之禆也下無以俾其上曰吾惟事其事足也可乎古者工以藝諫蚔蛙以士師諫工與士師非諫職也然事君之誼有非職者乎無也為樞屬顧曰吾暇無事也否則曰吾事其事足矣否則曰吾禆其上足矣至于事居之誼則曰思不出位又曰吾知守官外乎此非吾職也然則古之工與士師過矣豈惟工與士師孟子曰立乎人之本朝而道不行恥也然則孟子亦過矣其然乎不然吾徒獨得而不思其職也淳熙十三年五月三日將作監兼副都承旨胡矩續記西府之屬舊有題名自中興初至于今八十有七年石已再續矣矩自視欿然乃三得厠名其間其為編修也復紹大父忠簡公之遺躅已而兼檢詳文字今又攝副都承旨列屬殆遍于職掌沿革剽聞其詳蓋樞密本兵枋故自使至簽書文武參用雖副都承旨為之屬亦然所以隨時制置之意深矣其次則檢詳之職嘗考核文書編修之職刪潤時政故専用文臣至于叶贊帷籌與聞朝論其責一也當晚唐時樞密使雖居要地然品秩恩禮未與今等每有密旨受而付中書謂之宣中書受而著之藉為之宣底逮至梁初改樞密院為崇政院以敬翔為院使備顧問參謀議于禁中承上旨則宣于宰相而行之宰相非進對時有所奉請及已受旨應復請者皆因崇政以聞得旨則復宣于宰相則所謂承旨院使實専之後唐同光初復以崇政院謂樞密院置使以命宰臣郭崇韜石晉天福初復以命宰臣桑維翰自是樞密楊使權視宰相承旨遂歸于其屬本朝太平興國中以守一充都承旨始加都字熙寧中以史館兼之元祐中以待制兼之紹興初以兩制兼之自是副都承旨遂為清望官檢詳則肇于熙寧位視檢正編修則肇于慶厯位次檢詳此樞屬之大凡也會碑滿又當續因具列石端俾來者有考焉嘉定六年八月十五日三省樞密院監門在大門南將作監兼左司任希夷記題名門官之設尚矣在周為司門在漢其名不一曰户郎曰門侯皆其任也國朝監省門用內品元豐中裕陵聖訓謂用內侍者以與外庭臣僚無交際得以盡情幾察爰自中興駐蹕臨安三省樞密院俱列皇城之外內侍不時至則參之小使臣人微官薄不足以誰何嘉定六年秋始用諫大夫議增置監門官一員以京師朝官宰邑有治理效者為之初奉命議郎前知嚴州淳安縣楊恕而內侍猶為幾察遵舊制也于時政事之府更葺一新堂宇崇成體隆勢峻嚴嚴翼翼輪焉奐焉至于門廡徑路莫不斥而大之氣象休美過者祇肅于是更置専官以重其任蓋將謹命令所出之原尊朝廷無競之勢示于外者若是則嚴乎中者可知矣居是職者可不思以稱上旨歟或以語楊君曰昕庭退朝飛蓋來下衮繡焜煌車騎雜襲呵道告門先聲震疊又凡入于斯多達官顯人從以蒼頭廬井兒歡譁旁午不特御者洋洋而已司門之官逡巡局蹐兩扉之側其於伺察也不亦難乎又將不有以動其中乎則告之曰昔蕭望之射策甲科尚為小苑東門侯仲翁以抱關譏之答以各從其志其後卒為漢名傳蓋一命以上皆有常職所當盡吾事而已奚有于他慕哉楊君勉之併以告諸來者嘉定六年十月既望三樞省密院架閣在制敕院後主管架閣文字綦更生記題名皇朝景德中置金耀門書庫貯三司文案𨽻尚書省架閣有庫蓋嘗先省而未始及部也崇寧大臣初二天官建議置吏部架閣官其後六曹皆設繼乃省去汔宣和再置再省紹興三年六部悉有架閣庫十有五年置官四人禮兵一人刑工一人吏户各一人曹始備官特詳于部而無復及于省矣省有留牘藏在諸房雖兩嵗一遣架閣然屋室頽漏上雨旁風擲棄地間誰與顧省鼠矢蛛絲蒸鬱糜潰不可收拾吏有絶無才藝他司棄而不收者始竄名是間虛沾名俸而其身未始一到間有檢討漫然不知所存不得已而下取之部回環曲折稽緩後時卒不可得朝廷深察其弊乃議建官即省闥之申維創以為庫初立廳事後植閣三間旁為兩翼蓋因修省之餘材瓦疏壁寢既卑且漏不足以備充倲之藏架閣官綦更生首叨是選力請于朝得緡錢二千有竒增其閣十三共為十有六間列三省察院為四庫衍廳之字挾而成五門內之右為爨室直房以便細事外門之左本庫地也今省府貸以為計簿房右復借為溷圊皆未敢請復庫之門蓋直東出西則吳山右墻嚮南為户部度支左墻枕北當民居之道異時書多地狹尚可相其便者而圖展焉三省密院之書既已各列一庫庫列諸房自未置官以前者為一書置官以後其方來者為一書嵗月可稽門例無雜凡有前朝御筆者則朱箱金鎖炷香有而藏于閣之中所以見尊君之義也扄鐍森嚴出納藉規式詳備吏不得欺是真有益于官不可謂緩而不切者也嘗觀唐六典書載亭長掌固兩屬于尚書省亭長主守省門通傳禁約掌固與亭長皆同畨上悉為省屬今嘉定甲戌朝廷既謂部有司門省則並置明年乙亥以部有掌故省亦建官是唐朝之亭長掌固與景德之省有書庫者今皆舉而復之矣傳曰修廢官四方之政行焉是不容無紀用取架閣官姓名由今洎後刻於下方嘉定九年三月咸淳臨安志卷四
