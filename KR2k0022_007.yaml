body:
  text: 咸淳臨安志卷七宋潜說友撰行在所録祕書省在天井坊之左東都建於禁中紹興初權寓法惠寺十三年十二月詔兩浙運司即殿司寨基重建從秘書丞嚴抑之請也十四年七月九日少監㳺操等上表請車駕臨幸詔曰仰惟祖宗肇開册府累朝不世之士由是而興一代致治之原自此而出朕一新史觀新御榜題肆從望幸之誠以示右文之意遂以二十七日幸焉召群臣觀累朝御書御製書畫古器等省官遷秩有差孝宗皇帝遵故事以淳熈五年九月十二日臨幸賜群臣宴次日出御製近體詩賜丞相史浩以下咸有𢋫載陳均編年綱目淳熈四年五年連書幸袐書省國史無所考恐誤右文殿髙宗皇帝御書扁并右文殿門秘閣在右文殿之後有髙宗皇帝御書扁其兩廡列累朝御製御書石刻及髙宗皇帝真行草書孝宗皇帝臣聞道之真以治身土苴以治天下帝王之功聖人之餘事也五三六經所傳偹矣孔子叙書斷自堯始帝王之制盖莫盛於堯也堯之治至於恊和萬邦黎民於變時雍問之在朝在野皆不自知其然堯之所以君天下者民固無得而名也虞書所述特其緒餘而已煥乎其文章巍乎其成功非書所能盡也虞書不作聪明文思之美天下何傳焉形容其所難名掦厲其所不傳此堯典所以繫之虞書也恭惟光堯夀聖太上皇帝身濟大業紹開中興智周萬物而不以自用功冠百王而不以自伐道全徳備美莫容賛其形之謨訓施之命令者若稽古道皆不約而合孝通乎神明誠参乎化育範圍天地之大而極夫裁成輔相之理徳之乃聖乃神者也仁涵乎有生義肅乎不譓畜揉强暴之民而納之聲明文物之地徳之乃武乃文者也招徠畯良容受忠讜巧言令色者逺焉知人之哲也哀矜犴獄寛免征賦困窮無告者遂焉安民之惠也三十六年之間道洽政治禮制樂作百度粲然治具畢張睿謨聖訓善教良法史官傳之天下誦而歌舞之此可得而稱述者也惟㣲之心輔萬物之自然髙蹈物表脱屣萬乗至道之真與天同功其孰得而形容哉臣以菲質嗣守大器惟徳不逮有渉淵馭朽之憂問安侍膳得之口教面命者聞斯行之矣尊其所知是宜奉以周旋不敢忘怠於是建官設局纂輯大典始於建炎受命之初止於紹興勌勤之日凡九百五條釐為六十卷昭然日星之垂也瞭然龜鑑之掲也繼自今進而得之諄諄之訓退而求之渾渾之書奉而行之庶幾於治乎繼自今發於身加乎民云為注措弗畔於道惟聖政之書實詔之若夫夙寤晨興兢兢業業惟大猷是經惟舊章是循以無負夫詒謀燕翼之意臣不敢不勉右光堯太上皇帝聖政序權叅政事臣蒋芾等謹記臣芾言臣恭惟皇帝陛下躬秉聖質嗣承丕緒夤念光堯夀聖太上皇帝付託之重兢畏祗栗奉若慈訓凡立政用人治民馭軍之道惟舊典成式是憲是守爰自踐祚初載即命大臣纂輯聖政萃為一書越五年書成陛下親御翰墨製為序文以冠篇首臣適待罪政府幸以薄技典領著作乃獲躬覩盛事拜登跽誦震耀心目竊惟自昔帝王昭至徳垂茂憲必有謨訓布在方䇿載籍之傳維見可觀也五帝之盛莫若堯舜然二典之書不並時而作况其餘哉惟我太上皇帝武定亂畧文臻時雍功成不居以授嗣聖陛下孝篤乎事親志勤乎恊帝師繇聖道不敢怠遑作宋一經垂示無極而又駿發睿藻序所以為作者之意父堯子舜會逢一時奎文漢章雕餙萬寳開闢以來詩書所記未之前聞顧惟堅珉未刻無以詔天下與來世鬰聖徳而勿彰閟盛美而不傳臣竊恧焉臣不勝大願願以宸翰勒之秘府與河圖大訓並傳永永無斁以掦陛下聖孝奉皇尊章洪業之志謹昧死以請制曰可顧謂臣芾其以朕所書賜卿臣芾拜手稽首受賜退而書之附於聖政序之下方乾道辛夘春被賜真行草書縂十卷臣下拜瞻玩心目開明竊惟書法自東漢迄於晋唐代有名家然莫不祖述鍾張憲章羲獻而各得一偏未有超軼㧞乎其萃者恭惟光堯夀聖憲天體道太上皇帝髙蹈羲皇之上逰戱翰墨之間初若無意而筆力所到自得之妙集乎大成如春雲行空千状萬態逺視前古有不足進因知天縱之能心與神會非衆庶曲學之所可及也帝王餘事猶能至此顧不休哉右光堯太上皇帝真行草書䟦比以秋日臨幸秘書省因成近體詩一首賜丞相史浩以下玉軸牙籖煥寳章簪紳列侍映秋光宴開芸閣儒風盛坐對蓬山逸興長稽古右文慙菲徳禮賢下士法前王欲臻至治觀熈洽更罄嘉猷為賛㐮右幸秘書省賜詩右丞相臣史浩等恭䟦臣等仰惟皇帝陛下宵旰萬㣲身濟大業彫瑑夸詡浮靡虚之習是抑是黜囿逰池籞宴豫虞樂之奉是損是蠲乃睠三舘實儲藏典訓長育英俊之地自紹興清蹕下臨迄今三紀思欲式刑丕彛增光聖緒粤九月壬申幸秘書省修太平興國故事宴右文殿越翼日癸酉内出御製詩賜臣浩以下昭回光耀叅賁圖書鴻大閎深匹休雅頌臣等下拜登受相與齊祓敷繹宸翰在昔聖人以開物之志立經陳紀通於萬世惟有道之主為能則象成憲立一王法而斯世之張弛士氣之信屈觀國者必占焉雖堯舜禹湯文武之隆揆厥本原稽古右文禮賢下士盖同一軌轍淵然大訓播于詠歌固非墨客槧人所得私以為榮觀臣等昧死請勒諸琬琰貽諸億載與日月雲漢同垂無極制曰可謹具著下方以風示寓内徳意志慮之所鄉云翰林學士周必大恭和二首群玉西崑富典章二星東壁燦輝光秋花迎仗千叢麗法曲傳觴九奏長虎将縱觀修舊事化王政修即是攘戎䇿玁狁殘豸冠陪侍仰明祅豈足㐮蟠木離竒愧豫章幾年封植荷恩光石渠久綴英髦後金鐀深慚學識長御墨奎文瞻列聖靁尊篆鼎備三王願言作徳酬榮遇寜復矜才似智㐮觀秦很石銘屹立中逵若有神靈以戒秦皇之暴虐從欲則善矣又豈可加石以惡名乎宜易之以美名表異之可也因䟦於本銘之後云右很石銘䟦右丞相趙雄等恭書上纉祚之十九年政成徳孚方内阜安萬物得宜允臻于㤗和廼三月辛未召臣雄臣淮臣良臣入侍閒燕從容言天下事甚衆極論古帝王學問有精有粗而治忽分焉最後及唐文章因舉皇甫湜很石銘謂石有至戒而秦弗克省乃更被以醜名惟兹沈寃歴世未灑於是出聖製䟦湜語以賜臣等睿識髙逺宸畫炳麗臣等不足以辱賜謹拜手稽首言曰陛下紹集大統夙宵軫怛不忘中原兹石至㣲猶復慨然興念思為澡滌振㧞矧遺黎故老久淪塗炭者乎且驪山之役秦君臣曽弗聞危懼之言兹石獨屹然中立若示大警寥寥天壤間亡秦之很與石不磨而湜也有銘亦罔克載石意石之不遇千四百年於此矣陛下超神悟於有物之光雪幽憤於無傳之後石之神靈乃今始克用顕異日掃清闗輔出兹石於腥血膏火中時廵方岳而幸過之大書石上以昭示無極則勒銘砥柱刋頌浯溪不足儷已此中原父老所以引領南望日日以兾於仁聖者臣等尚幸見之春賦并用人論已見都堂石刻兹不重著用人論光宗皇帝臣聞乾坤之文不著無以見太極而太極非有待於文也虞夏之書不作無以見堯舜而堯舜非有蘄於書也恭惟至尊夀皇聖帝以妙道治身参之三才而無間以篤行事親質之六藝而無闕以深仁厚澤幸斯世極之根荄鱗羽而無不被宜配雅頌宜襲春秋而臨御二十八年之間凡施凡設歸美髙廟金石之刻無傳名山大川之藏未覩也夙以神器授於㣲身盡遺有迹之累而退託無名之境方将淵乎其藏用冲乎其忘言尚友太極法堯而蹈舜矣則聖政之書何容心哉然而寳章玉册希闊之典儲於三宫廟謨宸㫁温厚之詞施於百辟而詠歌休威摹冩功徳之人又徧天下至於中原之故老蠻貊之君長懐好音歸大號者家有其説國有盟載也豈惟史臣将夫人能記之豈惟今日将後世亦能記之則鋪陳彚次以作一經盖有孺子弗能抑聖父弗得辭者焉矧惟菲薄膺受重寄蚤夜震懼何以嗣服對天之休亦越成書是訓是式率舊因餘庶幾底義是用申命大臣緫領衆作起於初濳至於内禅掇其最凡得六百四十一條為五十卷一言一動皆足以經天緯地垂裕無極猗歟盛哉昔者文王演易周公繫辭父作子述臣竊慕焉於是親序此書之意以附篇首上之慈廷副在禁中右夀皇聖帝聖政序左丞相臣留正等謹記臣正言臣聞前聖之徳業莫盛於堯舜前聖之作述莫盛於孔子然二者相湏而不能以同時恭惟至尊夀皇聖帝道本於稽古功成於恊帝臨御二十有八年仁恩塞穹壤威聞憺蠻貊潤色中興之烈而増光揖遜之美薄海外内萬口同辭以為自舜以來一人而已陛下奉若慈訓克昌丕緒見之行事緝熈光明且欲以欽承允蹈之餘布在方册昭示民極爰命史臣裒輯聖政鋪張表出作宋一經於是書成來上親灑宸翰攄發睿藻冠之篇端日星有爛著於天文而太極之妙自然陳露縉紳鈆槧之流又以為是孔氏之作也臣竊惟有虞之書初與五典並行而無辨更千五百年而得孔氏㫁為書首序之百篇之上然後暴著于萬世由此觀之虞舜雖極治矣常久晦而後彰孔子能祖述矣盖追誦而不相及未有父子兩朝聖以繼聖立徳立言自相發揮皇乎懿哉如今日之盛者也抑臣次舜之事以底豫為孝遭人倫之變也以予賢為公因天命之改也惟我夀皇之事髙廟偹極五福彌歴三紀雍雍穆穆脗無間言曽未倦勤脱屣萬乗授之主鬯神人燕寜累聖一家世世同徳父子之間視舜有光陛下之序此書尤足以垂百王之範補六㙯之闕矣臣以非才待罪宰事適董攸司與訖不朽而藏之禁嚴未冩琬琰無以對揚宏休臣實甚懼用是百拜稽首昧死請以賜本大書深刻以幸來世而又百拜稽首髣髴大㫖敬書於序之下方理宗皇帝朕觀書契以來人極茂建聖賢大訓布在方筞其言治國平天下之道無出於六經而求之六經之要一日不可違者其惟天道乎大㮣易明其理書正其事詩通其情周禮春秋志其變記禮則雜紀焉者也人主知天之當敬視六經格言如金科玉條罔敢踰越則逸徳鮮矣仰惟祖宗丕靈承帝事撫有方夏列聖垂謨無一息不以敬天為心國史登載難以殚舉然未有不本於六經之㫖朕以寡昧寅奉燕詒愳弗克欽若眷命萬幾之暇稽式古典援以己意凡其闗於天道之大而有以啟寅畏之𠂻者毎經表而出之裒列成編目之曰敬天圖庶幾朝夕觀覧對越鍳臨以自警省云耳易六十四卦大象之義各有攸属自出治而言則謂之后自定位而言則謂之上自創法而言則謂之先王自繼體而言則謂之大人餘則緫而謂之君子皆主於人君而言也卦必有象象必有義體而行之人君能與造化同流者其以此耳然他卦大象皆著本卦之名惟乾獨不稱乾而止曰天行徤而以自彊不息歸之君子嗚呼此天徳也人君實以之君即乾乾即天也人君動静語黙政化云為無一而非乾以至先天而天弗違後天而奉天時皆此物也而其要則自閑邪存誠始然則求敬天於易豈不尤䆳於五經歟若昔先王盛時君臣上下相與儆戒兢業於敬天而最為深切著明者聚於書今可攷也曰天無親曰天難諶曰天明畏曰天命不易凡所以推言天命靡常之理言言至到何凜乎其嚴耶惟人君深知天命之靡常而能疾敬徳則可以祈天永命無疆惟休矣不然則不敬厥徳乃早墜厥命豈不甚可畏哉今所纂輯取於書者尤詳噫肆予曷敢不敬詩者動天地感鬼神所以通幽㣲之情而窮交際之理者至矣方商周盛時上而卿大夫士近而侍御臣僕下而比閭族黨無不知天道而識天象憂深思逺指事引𩔖未嘗為廹切之詞駭異之語也方其神祗祖考燕衎和樂而隠然戒懼之意寓焉我将之詩是也方其旱暵為虐遇烖而懼而惻然哀矜之情發焉雲漢之詩是也至於陟降左右緝熈敬止之𩔖則又非可以淺近觀矣端居而誦澡心以思玩味而紬繹之其不曰上帝臨汝無貮爾心乎河汾王通嘗謂如有用我則執周禮以徃且重發周禮敵天命之歎盖其為書大綱小紀詳法略則粲然靡所不載玉帛牲器之文車旗冕服之制豆籩罍爵之陳鐘鼓匏管之奏品節度數必加詳焉至於象緯之考察𤯝灾之抑損亦莫不𨽻之司存而不敢慢凡所以接三才之奥通幽明之理也聖人於此豈徒從事於文物典章之餙於外者而已乎要必有為之本者矣不然則周禮特一書耳又安能敵天命而與之並存哉春秋二百四十二年所書辰星風電之變水旱霜雹之烖螽螟蜮蝝之害靡不畢備而於日食之書尤詳且宻傳者間未免傳以列國證應之説遂使後之星翁歴家分諉於所主方域以啟時君之玩心此則非春秋本指也春秋一統之書也方諸侯專恣王室既卑麟筆褒貶豈獨以禮樂征伐闗於人事者属之周而天變之特書屡書皆繫之王室於書王必曰天王其所望於周者甚深固曰諸侯雖無周而天命未改承天從事周之人主不可不任其責也以周之無政而聖人猶拳拳焉南面而治天下者其可忽諸記禮一經冠之以毋不敬之辭所謂禮儀三百威儀三千待其人然後行者惟以敬之一字而已或謂月令出於呂不韋之手未免滯而不通然奉時承天之義雖細㣲必謹言固不可以人廢也至若中庸大學之書一則曰維天之命於穆不已再則曰惟命不于常援詩書以明義理之正而其本則俱切切於謹獨之訓誠之不可揜必戒於不睹不聞誠之毋自欺必嚴於所視所指二書之㫖深矣可不懼哉右敬天圖端平改元春三月庚子齋居恭黙夜夢一真人峩冠佩玉略似藝祖色黧而貎和亟延朕殿上授之坐親承面命聖謨洋洋敬聼無斁俄而夢覺越三日宗臣善來以舊藏昌陵御容捧進一瞻天日之表如夢中真人無毫髪異廼知在天之靈將啟佑我後與齡錫祉用昭眷命厥惟休哉豈朕之不徳所克負荷以仰承帝寵敢不祗若休命夙夜兢業期於揚我祖之烈光因述古律二十韻紀述以詔後世用傳不朽云文祖膺天命開基本至仁治隆三代主極錫萬邦臣禮樂崇儒術詩書教武勲如天常覆幬薄海悉尊親歴數恢千載皇猷塞萬春𦕈躬承大統令徳媿前人凛凛如承祭孳孳每問津精思形寤寐幽契動威神陟降來天歩將迎荷聖恩矢辭踰訓子侍坐匪同賔仁政因㣲扣宏謨廼歴陳治當先法祖徳勿謂無隣幾務惟中道規恢必有論誦言猶在耳取則敬書紳想像更三畫希竒遇一真居然天所賚儼若夢中身施祉垂孫子遺思浹士民睟容瞻日月綵仗上穹旻所願新其徳毋忘誨爾諄昭哉傳百世燕翼永持循右端平紀夢詩并序右丞相臣㳺佀等恭䟦臣等恭惟太祖皇帝以神武不殺取五季分裂濁亂之天下而清壹之功成治定不私神器而傳之太宗此堯舜以來未有之懿也帝懐明徳本支百世盖十傳而得孝皇是氣數之一還也又三傳而得我皇帝陛下是氣數之再還也於是仙源䨇派大慶始均焉家嫡正體大順始成焉此非太祖之心亦非我皇上之心乃天人之心也寳紹之間謙遜遵飬端平親政如日方升太祖在天鍳我有道曽孫必有不能恝然忘情者故庚子之夢神交面命即堯舜相授受之㫖而聖作之偉妙契疾書即湯武銘盤席之意臣等肅容伏讀有以見聖祖神孫傳心之妙信非三代帝王以下所及也大哉之問它不遑及而仁政為首顯哉之謨諄諄歴陳而中道為要中也者好惡黨偏之俱冺蕩平正直之是遵太祖令洞開諸門皆端直通豁無壅堕謂左右曰此如我心少有斜曲人皆見之觀此中之體也推而逹之仁覆天下矣盖中之外别有仁而道之外别有政也皇情睿思領會㣲言奎畫雲章發揮祖訓彼有作大風歌者特雄心之所感何有於道作秋風辭者乃逸志之所形何闗於政豈足以方今日之事哉樂石既鐫詔臣等措辭其下臣等敢復推述氣數之所以還精神之所以接心法之所以同者昭示來葉云淳祐甲辰臘月壬申夕夢髙宗皇帝於殿上峩冠被服若天尊然拱侍從容言貎悦懌我皇祖所以眷屬之意深矣恭述古風一章紀實以昭在天之靈俾世世萬子孫其無斁淳祐四禩冬是月昏婁中甫親丙夜枕有感清明躬夢至一别殿修梁抗雄虹仙真儵來下尊嚴瞻帝容雲冠髙岌嶪霞佩鏘玲瓏秉執粲玉斧舒徐在其東從官五六軰言稱我髙宗瞿然起敬畏再拜前致恭温辭曲勞問宛與家人同忽覺手進食臣托擎金龍笑言持得起喜色春融融食餘即就賜捧視飱有饛眷焉寓深意詞簡可𩔖充俾思付託重庸茂持守功淵謨在紬繹儼立方祗庸豐隆俄先路笙鶴旋殷空羽伏矗輕舉佳氣正欝葱寐覺肅巾盥渉筆識所從緬懷端平夢藝祖臨絳宫徽言固典聼紀咏愧不工皆於更化日精神潜感通創業中興盛啟佑斯無窮凉菲念厥紹統業當系隆姦倿終屏黜賢俊俱登崇所冀在廷彦恊賛同和𠂻摭實以自儆矢辭成古風右淳祐紀夢詩并序右丞相臣㳺佀等恭䟦臣等仰惟皇帝陛下英資冠古聖度如天臨御寖久而閲理滋多聼㫁至明而藏用尤宻乃淳祐四年十月丁亥御筆逐朋姦者四人十二月己巳寝大臣奪情之命越翼日庚午制拜二相朝野相賀越二日壬申乃夢髙宗皇帝聖容有懌嘉重器之得託賞神孫之能持嘻哉異矣於是皇情載震帝歌爰作陸離天藻摹神交之妙昭回雲章發言外之藴臣等拜手伏讀作而頌曰天人相與之際豈逺乎哉用一人焉而合乎天下之心斯合乎聖祖神宗在天之心矣捨一人焉而合乎天下之心斯合乎聖祖神宗在天之心矣洪惟我髙宗嘘赤燼以興中天之業挈神器而還昌陵之裔固期子孫是保永世無斁有茅其姦㭬我王度我先神后固謂如何人事一返正而神心亦欣豫理之當然無足怪者昔漢武帝感車千秋之夢而罪江充以為髙廟神靈使公教我豈若我皇上英㫁風霆匪待詔教矢言金石爰播聲詩有曰姦侫終屏黜賢俊俱登崇所兾在廷彦恊賛同和𠂻臣等無状不足以上稱登崇而和𠂻之訓則敬聞命矣至於屏黜姦侫知終終之此盛帝去邪勿疑之事也此忠臣願君思絲之説也在天之神靈實聞此言羣臣敢在下風臣等拜舞賛誦之餘請勒諸翠珉以傳輝無極謹百拜書于下方國史院在右文殿東提舉㕔在殿西道山堂在秘閣之後髙宗皇帝御書杜甫山水歌於屏仍詔將作監米友仁書扁景定四年理宗皇帝復錫以奎畫少監臣林希逸謹書臣恭惟髙宗皇帝應興邦啟聖之期直保大定功之始作新基命蒐舉國容睇東璧於珠躔稽西崑於瓊笈乃紹興甲子肇植宏規殿曰右文承以閟閣皆宸筆大書以煥耀之昭回之光上映日月於今六甲再環矣我皇帝陛下神聖文武緝熈光明宏濟時難申休命勅天之歌喜起致祥之治肅和戒告攸備増餙廢故木天輪奐粲然一新臣以么庸備數少令作而念曰於皇邃宇翬跂層聨殿閣有嚴厥名惟赫有堂中峙翼翼峩峩舊額雖存僉曰未稱叨陪經厦躐越奏聞曲荷聖俞廼二月戊寅賜臣以御書道山堂三大字星鈎日珥洛緯河經衆體渾融八法嚴偹能由天縱意在筆前聖祖神孫心畫授受龍旦騰鳯躍輝燭人間臣對掦天休百拜稽首㳙兹吉䖍奉掲安羣工百僚眙􅌓欣舞愚臣竊謂圖書之府大雅不羣本上應於乾文何取名於藏室豈伊儲才待用之地譬彼烟霞縹緲之居盖唐以𢎞文登選學士世所歆羡比之􅌡洲當時諸賢大則著續彌綸小亦流芳典籍姓名千載猶如列仙敬宗何人失身一語聞者鄙謂為此舘羞然則美之以為名欲其居之以自重也棫樸之詩曰倬彼河漢為章於天説者曰嘉植之賁於下猶天文之粲於上也又曰追琢其章金玉其相説者曰追琢者上作成之也金玉者下自貴重也今宸章表絢明正星河士㳺其間敢不企瞻華扁金玉其身以副聖天子夀考作人綱紀四方之意哉臣既状其事乞登信史謹摹而碣之述而美之於以垂無窮而耀無極乎爾左刻圖史監修提舉題名禮部侍郎李燾序國家崇儒尚文因唐舊制必命宰輔兼領三舘其首相曰昭文舘大學士次曰監修自景徳二年王旦始也昭文舘大學士熈寜九年王安石罷遂不復除集賢院大學士元豐三年王珪遷亦不復除惟監修國史相傳至今天聖五年修真宗實史王曽既領昭文兼監修又别勅命曽提舉提舉之名自曽始元豐以前國史别置院寓宣徽南院號曰編修及官制行併歸史舘𨽻祕書省闕𨽻門下國史案今日歴所也元祐復置國史院省明年又置國史院修撰兼知院事而監修國史自王珪後宰輔皆不入銜及修神宗正史呂大防實為提舉而國史院修撰又别勅兼修正史盖日歴即國史也聖祖神宗實録正史亦國史也起居註時政記聖政録及會要亦國史也皆總於一固未有分紹聖復以國史院歸秘書省其後提舉修日歴或命它官而實録正史宰輔兼提舉初不易昭文集賢或廢或改而史舘故在中興之六年始命吕頥浩兼提舉修國史當時國史但指日歴頥浩引元祐故事并及正史自是首相即兼監修監修之名廢於元豐而復於紹興也逮修徽宗實録秦檜亦以監修兼提舉紹興二十六年沈該万侯卨並為左右僕射始分監修及提舉為二至今因之編𩔖聖政初属左尋属右會要則乾道五年右創領焉秘書少監陳騤謂燾曰三舘皆有題名而監修提舉獨闕可乎盍序其沿革次第并刻之燾猥以無能之辭偹數太史牛馬走因不敢辭右刻監少以下題名少監張宦記上即位之五年實改元嵗次辛亥二月丙戌詔以多難未平需才為急其復祕書省置監若少監一人丞著作郎佐郎各一人校書郎正字各二人以待四方雋傑之士又参酌舊制校書郎正字召試學士院而後命之自是採求闕文補綴陋逸而四庫書籍亦云畧偹矣越三載即祕書省復建史舘以修神宗哲宗兩朝實録選本省官兼檢討校勘以侍從官充修撰明年詔放唐十八學士之制監少丞外置著作郎佐郎祕書郎各二員校書郎正字通十二員立為定額又明年移史舘於省之側别為一所以增重其事而校勘官或以他官兼之至紹興九年修徽宗皇帝實録乃即史舘開實録院以本省官或他官兼檢討而修撰官如史舘例明年以未修正史詔罷史舘併為實録院以正名實而著作局惟修纂日歴馬凡在兹選均謂之舘職所以儲蓄英髦以偹任使臺諫禁從於此乎取之故所除授纔十五六而員額之闕幾半盖遴選也異日謨謨廟堂安社稷於談笑垂功名於竹帛者不無其人豈但摩研編削将以頌中興詠聖徳為太平之文餙而已哉宦才朽學落五年間再獲簉跡英㳺實與榮幸竊惟聖祖神宗三舘祕閣之制因革損益麟臺故事載之詳矣獨紹興以來題名未有石刻則擢序之先後居職之久近嵗月遷改将無所攷於是閣續題名記且使來者可述焉紹興十年七月戊申東西二閣監少位焉丞及舘職位於兩廊堂之前為石渠橋其上旁為小亭有呉説書石渠二大字堂下又有李陽氷篆書道山二大字皆石刻著作之庭在道山堂之後胡銓書扁有者佐楊簡賛孔子語孔子曰属辭比事春秋教也属辭比事而不亂則深於春秋者矣天有四時春秋冬夏風雨露露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也簡不勝起敬而賛之曰大哉聖言著庭以属辭比事為職辭不勝其繁事不勝其夥何以不亂亂生於意意生紛然意如雲氣能障太虚之清明能蔽日月之光明舜曰道心人心即道動乎意則為人心孔子曰心之精神是謂聖而每每戒學者毋意毋必毋固毋我意態萬殊而大㮣無踰斯四者聖人深知意之害道也甚故諄諄止絶學者門弟子欲盡記之不勝其記故總而記之曰子絶四動乎意者必謂属辭比事如此春秋冬夏風雨霜露如彼若之何而一又謂風霆流形庻物露生如此属辭比事如此若之何而一易曰艮其背背向不知其為一而况於不一不知不識是為帝則聖人曰中庸庸常也明夫日用平常之心何思何慮虚明無體廣大無際天地範圍於其中四時運於其中風霆雨露霜雪動散於其中萬物發育敷露於其中辭生於其中事生於其中属而比之於其中如鏡中象雖紛擾参而未嘗動也亦未嘗不動也不可以為有也而亦不可以為無也不可度斯矧可射春秋之大義在斯深於春秋繼天有四時一章則取之家語後有小軒置蘇軾畫竹石刻其中曽宏廸識竹石不著名氏相傳為東坡先生歸自海表戱作於闕僧壁好事者取以為屏獻之貴家轉入御府嘉定初出送祕書省寘之著作堂上同舘之士食已列坐焚香瀹茗其下望其傲風霆閲古今之氣使人之意消衆謂土木之質久必壊相與謀夀諸石摹􅘧事竟将題識以傳或曰此石室先生文氏所作也聞者且信且疑莫肯渉筆時宏廸已自少府遷右史明年再入為監石尚未立乃諗於衆曰東坡石室以氣𩔖合故嗜好者胸中自有成竹不在乎筆墨畦逕間也石室嘗曰吾墨竹一派近在彭城試味斯言則舉是壁以為東坡孰云不可衆曰諾乃識之下方東西四閣著作著佐位焉後有池二國史日歴所在著作庭東廡有汗清軒按周必大玉堂雜記淳熈三年十一月二十三日御封付下参政錢良臣辭免監修國史日歴所劄子降詔不允必大因奏自來宰執兼領書局多是内尚書省批出局名既至朝廷降勅合行冩正而省吏止奉行内批宰執亦随勅黄繫銜差誤日久今因荅詔輟具言之國史日歴者書名也日所者官司也今大臣合監修日歴却添一所字似監修造作之官又如勅令所從官詳定宰執提舉今却云提舉勅令所此何理也以至國史院會要玉牒皆為一律合行改正上以為允其後或是或否復混淆矣編纂會要所在著庭西廡書庫日歴會要庫各一經史子集書籍庫六分列於右文殿外東西兩廡又有書板庫在著庭之右寳庫在西廡之外後圃有群玉堂以蘇軾畫竹真蹟為屏有蓬萊前為池度以石橋池之前各累石為山又有芸香亭席珍亭方壺含章亭茹芝舘射圃繹志亭盖自淳熈初陳騤為少監始經營來者増葺頗為華䆳云渾儀臺在含章亭之右勅令所在侍郎橋南中書舍人兼詳定陳居仁記題名乾道四年冬有司言建炎後續㫖幾二萬餘條前後舛不合請削為書俾吏不得舞詔可之六年秋置詳定一局勅令所初本朝重令甲毎詔諸儒纂修自天聖熈寜元祐以來有詳定編勅所編修諸司勅式所重修勅令所其設局不一最後獨存今名渡江因之而累朝大典用以秩序矣書既屢奏御賞頗費侈官吏寖冗紹興末例罷去至是始復之然視曩時官省三之一吏胥省三之二凡供億之事又大省惟不務為虚文而典領則並委二三大臣不敢少損焉示三尺重事必有考其要以詔官府又所置刪定員率資歴未可登他曹則於此乎儲之士得優游其間歛身於防益明習國家憲令以適於務夫謹法度廣賢才上之復是官也抑豈為無指哉刪定有以他官兼詳定有為同者又省去今定為提舉官二以属宰相同提舉一以属執政詳定以專官為之刪定官五盖於今為著曹以典領重也因得附麗姓名於壁淳熈十五年四月淳熈十五年用詳定官林黄中請省罷紹興二年復咸淳臨安志卷七
