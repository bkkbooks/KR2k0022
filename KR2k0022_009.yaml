body:
  text: 咸淳臨安志卷九宋潜說友撰行在所録監當諸局車輅院在嘉會門外為庫四曰玉輅曰金根曰金象曰革木各一又有小庫藏太平等車咸淳二年聖上初郊詔修五輅院之庫屋皆一新之製造御前軍器所在禮部貢院之西中興初置提舉官以內侍或閣門領之事得專逹紹興五年春始𨽻工部詔日輪郎官與軍器監官視其役孝宗皇帝初年復以內省都知李綽為提舉未幾用臺臣請仍𨽻工部乾道四年六月𨽻步軍司其後又以知閣門事為提㸃景定三年改𨽻殿前司凡奏請文移部若監悉不預惟幹辦公事以下得受舉而監長書其到替月日於歷紹興間工匠以二千雜役兵以五百為額今惟工匠七百餘人殿司又自以所𨽻作匠附益之每季上所製器於內庫萬全三指揮東西兩作坊營在所之東北編估打套局在左藏庫門內惠民和劑局在太府寺內之右製藥以給惠民局與暑臘藥之偹宣賜者太平惠民局局凡五紹興五年置從户部侍郎王俁之請也南局在三省前西局在衆安橋北北局在市西坊南南外局在浙江亭北外局在北郭外二局以各處稅官兼領省倉上界在天水院橋北即中興初之南倉紹興十一年詔以省倉上界為名中下界同倉凡三易嘉熙間徙今處為厫八受浙右米以供內人宰執百官親王宗室內侍及給皇城班直與吏之役於省部者省倉中界在東清門外菜市塘乾道三年創為豐儲倉五年易為中界厫凡三十有七以下止平糴倉皆受浙右苖綱經常和糴公田樁積等米以供朝廷科支及大農宣限給餉凡諸軍諸司三學與百司雇募諸局工役等皆給焉省倉下界在東倉鋪創於紹興八年舊址極廣袤景定三年朝廷給緡錢更修乃析三之二建厫屋八十而垣其餘廢屋地於外豐儲倉在仁和縣側倉橋東紹興初徙仁和縣治以其址為北省倉乾道五年更今名景定四年以公田租浩瀚諸倉不足以受乃詔即豐儲增創刑部尚書兼檢正洪燾涖其役咸淳二年八月成為厫百㕔事刻孝宗皇帝御書匪懈二大字為扁著作佐郎林應炎為記國家中興倣漢糴三輔以給中都列置諸倉於城內外嵗受諸郡粟其在仁和縣東三面距河則豐儲倉也倉自紹興間置乾道以豐儲名更嘉定嘗一修治初置倉時議儲百萬斛偹水旱左軍糧自頃和糴法行嵗增造楮為糴本楮日輕糴之人日少計城內外廥積僅足支三月斯倉呺然大耳景定壬戍太傅大丞相樞使魏國公為先皇帝言圖救楮莫如免糴圖免糴莫如買公田公田暫費永寧之圖也詔行之浙右年為屢豐租入益裕江淮之大軍轉般陳陳相因如京師之端平淳祐平糴等倉無所于容向蓄才三月今不啻三年耕之蓄矣越明年增置豐儲倉命領庾事陳公昉軍計趙嗣嚞農丞吳益董其役檢正尚書洪燾匠丞國材繼之撤舊址布新規垣其外三百七十四文崇廣倉門為三間翼以勢墻入門東園亭西吏舍其旁兩便門對峙由東便門入厫從六列南負墻北負河橫各一列杈子厫附焉由西便門入厫從三列南負墻一列北負河桞司祠在焉由倉門折行五十餘步為正㕔右厫並監門㕔後厫凡二列左厫對右為一列夾正㕔旁曰錢庫曰籌斗庫曰綱解房㕔後有退公亭兩旁有閣子又其後有園設石假山植竹成行繚之墻四百尺墻北開門又為厫橫三列勢相向背其靣墻大者為主厫環一倉𢾗之厫百杈子厫二厫前為循廊多不可楹數過道有廊為間亦五十經緯以階用石萬假宣泄以溝甃其底凡百丈將即功洪公猶慮纍土為墻非堅久計語匠丞夷去改築甓上石下灰斫其間倉于是宏壯周密為城內外冠咸淳二年八月八日落成奉孝宗皇帝御扁匪懈二字於㕔事用肅廪人是役也費緡錢八十三萬八百有竒米石四千洪公謂三山林應炎曰兹役重大子為吾識嵗月應炎適執筆𨽻太史凡國家大興役皆得書何敢辭然嘗拜觀國史光堯置倉初意蓋取户部嵗終供億餘粟儲其中時軍旅之後猶能節縮為此今邉虞嘉靖經費有式每聞大司農至春夏交嘗借撥省倉以贍用昔撤有餘以為倉今剜倉以補不足何耶毋乃冗食縣官靡穀者多耶後元宮女才十餘安得太倉不紅腐武宣而後三服官嵗費數巨萬三工官費五千萬雖有三輔公田猶捧土塞河海然則倉儲之豐嗇又關上用之豐儉云豐儲西倉在餘杭門外左家橋北淳熙七年創為厫五十有九端平倉在餘杭門外德勝橋東端平元年浙漕趙與􅊸創以儲漕糴嘉熙三年歸之大農涖以京局官而領於宰士如它倉淳祐十二年咸淳五年皆重修有水榭扁曰介然蓋取太倉針語而併針刻石其中為厫五十有六淳祐倉在餘杭門內斜橋南淳祐九年臨安守趙與􅊸創以儲米之糴於帥司者建置次第皆如端平倉其後朝廷撥支賑糶及付農寺以給諸軍諸司景定三年詔給緡錢重修為厫百平糴倉在仙林寺東淳祐間臨安寺趙與􅊸創以儲臨安之糴今朝廷大農米皆儲咸淳倉在東青門內後軍寨北咸淳四年朝廷議建廪增貯公田嵗入之米乃捐錢買瓊華廢圃益以內酒庫柴炭屋地命臨安守潜說友創建凡為厫百為間五百有二為米六百萬石吏部侍郎兼直學士院馮夢得為記宋有天下以來臺是以務農重榖為元元係命自京徂荒粒民是鮮時有船倉稅倉折中倉之名太宗皇帝太平興國七年至斥故迎春苑為富國倉聖聖其承藏粟衍溢其慮深逺矣今天子即祚之五年有司言寰內嵗比數登行在所諸倉皆盈不增庾積新者將靡所儲胥于是太傅平章魏國公請以瓊華園廢地官豫其直增創如太平故事制曰可其賜楮二百萬命守臣潜說友􅊩其役嵗十有一月鳩工越明年六月成詔以咸淳名之倉之督吏來謂史官馮夢得曰蓋聞聖人積不涸之倉王者用無窮之府所從來尚矣漢太倉在長安城南為楹百二十耳陳陳之粟著牒猶或稱之斯事體大可無紀乎夢得竊惟古者委積之法至周而甚詳周之氏于倉者我知之矣所掌粟入以待邦用藏之于有餘而頒之于不足凡以為民而已方田同井井九百畝一夫授田百畝其中為公田當是時鄉遂畿也其法貢都鄙甸也其法助耕則通力而作收則計畝而分外之一豪不取也夫是以民有常産官有常職邦有常用以時藏餘謂之稱數藉令年有不艾赤子扶持亦皆有常餼恃此以不恐甫田之詩曰我取其陳食我農人自古有年於乎其仁哉自農田不井藪澤肆既使民蒿然千餘年于此矣昔在先帝既再造我區夏斯民欣若更生平旦視朝深念異時嵗下郡國糴官辨于楮與吏並緣為奸日載其怨每與魏公共論兹事以為泉源之渾渾丘山之暴暴也是惟倣佛周官法度之遺焉其可繇是買浙水西六州公田蠲和糴停造楮時人始而愕中而疑久而厭然以服嗚呼難與慮始者民也不能什利者法也今嵗不糴楮不造民不加賦皆得以自有其有而粟之積于轂下者已六百萬斛矣𨽻外司農者不與焉我積我倉如京如坻念兹在兹永言孝思我神后在天之靈其相吾民嘉氣屢應用成兹康年不已懌乎陛下圖匱于豐防儉於逸以克和于稼之難地寧天清五榖稑熟含嘉表瑞常滿習祥是倉之作名以咸淳志時也民曰天子之德而天子曰先帝之心繼自今厥榖惟修厥菑惟播利用後生之功將萬世而下實嘉賴之凡倉厫百厫之間五百有二規置崇巨甍宇齊平卓乎諸倉弗及已倉前舊有河鑿而廣之以便船粟亘以石梁亦名曰咸淳云若夫屋材墻形木工土事之概乃圖而著之矣草料場在天水院橋西受畿內所輸稻麥豆以給騏驥院良馬院與三衙諸府之馬淳祐九年重修厫十有二合同倉在過軍橋下會子庫在本務紹興三十一年詔臨安府置會子務𨽻都茶場悉視川錢法行之用户部侍郎兼知臨安府錢端禮之請也中經省併以𣙜務門官兼領紹定三年復五年因燬重建以都司官提領工匠凡二百四人日印則取紙於左帑而以會歸之自咸淳以來朝廷措置住造錢關止於元年之五月十八界止於三年之三月造會紙局在赤山之湖濵先是造紙於徽州既又於成都乾道四年三月以蜀逺紙弗給詔即臨安府置局從提領官權兵部侍郎陳彌作之請也始局在九曲池後徙今處又有安溪局咸淳二年九月併歸焉亦領以都司工徒無定額今在者一千二百人咸淳五年之三月有㫖住役交引庫在太府寺門內印造茶鹽鈔引而請書押於丞簿法物庫在梅家橋北掌祭祀法服冠佩帶舄及旗幡衫袍等物內侍領之度牒庫在油車巷市舶務在保安門海商之自外舶至京者受其劵而考驗之又有新務在梅家橋之北以受舶綱司農排岸司在前洋街掌拘卸綱運檢察搜空而縶其不登數者三省樞密院激賞錢庫在俞家園三省樞密院激賞酒庫在錢塘縣南左右騏驥院在漾沙坑以二十四匹為額日朝參則二院御者各以三馬南向立於和寧門之外象院在嘉會門外御馬院景定間安南貢象三豢其中左右騎御馬直在七官宅山上左右教駿營在院之左右牛羊司在𣙜貨務後掌御膳及祭祀之牲有滌宫在赤山咸淳臨安志卷九
