body:
  text: 咸淳臨安志卷十宋潜說友撰行在所録三衙殿前司在鳯凰山下麗正門之右有乾道四年御書閣凝香堂整暇堂山之上為月巖有亭曰延桂其最髙處曰介亭崖石嶙峋亭之後為冲天樓極海江湖山竒偉之觀侍衛馬軍司乾道七年虞允文為相移屯建康以為出師之漸號馬軍行司以邉帥兼領元有帥衙在保民坊今為司農寺將作監等公宇侍衛步軍在鐡冶嶺西有乾道七年御書閣湖山堂錦繡樓相公井閣職閣門在和寧門外客省四方館在東華門北客省掌收接諸聖節進奉香及使人往來接伴之禮四方館掌收接諸朔旦正至表及大禮賀表御前忠佐軍頭引見司在文思院後有等子營內諸司入內內侍省皇城司御藥院內東門司天章閣宴設庫後苑御前庫文字房睿思殿庫內藏庫綱房在六部橋東御前酒庫梅園庫在梅家橋南醋庫在望仙橋北御軍器庫內軍器庫御膳所翰林院禁衛所奉安符寶所主管往來國信所在都亭驛同文館提舉修內司在孝仁坊內青平山口御前內轄司在東華門外東庫內東庫在東華門外西庫在孝仁坊內南庫在便門南北庫在新門外青器窰在雄武營山上圓壇左右八作司在內轄司東庫內教樂所在東華門外樂器庫在吳山天明宫側外庫慈元殿皇后殿吳益國位淑妃位昭儀位修容位美人位才人位御前應奉所在東華門外置造軍器處內司偹用庫御輦院在東華門外翰林司儀鑾司御服所御絲鞋所萬夀香所在中軍寨側道場庫通進司御馬院在麗正門右嘉惠門外良馬院在嘉會門外祗候庫主管翰林醫官局主管合同憑由局大內鑰匙庫已上司存並領以內侍惟皇城司則閣門御帶環衛官兼幹辨御膳所御酒庫翰林司儀鑾司則右選為幹辦邸第諸后宅昭慈聖獻孟太后宅在後市街顯仁韋太后宅在薦橋東咸淳五年十月朝廷以中興母后之家恩例視開國昭憲杜太后撥降錢米令臨安府重修家廟憲節邢皇后宅在薦橋南憲聖慈烈吳太后宅在州橋東成穆郭皇后宅在佑聖觀側成恭夏皇后宅在豐樂橋北成肅謝皇后宅在豐禾坊南慈懿李皇后宅在後市街恭淑韓皇后宅在軍將橋恭聖仁烈楊太后宅在漾沙坑夀和聖福皇太后宅在後市街今上皇后宅在崇新門內家廟五室諸賜祭器每四孟月以內御厨兵治祭饌以奉常禮直官贊相行禮諸王府濮安懿王府即嗣王所居為府吳王府在後洋街益王府在新橋秀安僖王府在後洋街莊文太子府在井亭橋劉鄜王府在明慶寺南賜第嵗月無所考開禧三年有㫖即賜第基建家廟儀制並同張韓今其家有御書家廟二字為扁子孫莫得而詳故弗及論著楊和王府在洪橋紹興二十六年詔賜家廟仍下將作監為祭器以賜嵗時行禮太常遣贊相者其所居第有閣夤奉御書孝宗皇帝賜奎畫曰風雲慶會之閣太傅平章賈魏公府在葛嶺景定三年正月理宗皇帝內出御札曰朕惟我朝褒表功德具有彛典如趙普有翊戴之元勳則賜第宅於建隆文彥博有弼亮之偉績則賜家廟于至和今丞相賈似道忠貫日月身佩安危滌除妖氛再造王室其元勳偉績不在趙普彥博下宜賜第宅家廟令有司條具以聞公屢辭詔書下者屢公辭益力乃賜御札曰卿茂建元勳超軼千古社稷宗廟亦嘉賴之第宅家廟之賜猶未足以竟朕褒尚之意今卿免櫝屢陳乃以勞民重費其體國一念及此益用敬嘆特從所請仍以集芳園為賜可令封樁庫支撥緡錢百萬展拓規模就建家廟遂雅志也蓋公舊有别墅在園之南故以賜焉公又辭上復親札勉諭曰賜卿邸第家廟朕之初意也以卿執謙過甚力控遜牘朕不得已有苑囿緡錢之賜卿乃復以給降之夥而有未安厥心之語卿盍思曩者妖氛未息天下大勢何如也自卿建此不世之殊勳民賴之而保其居朕賴之而保其國今雖竭公帑之儲猶未足以酬卿之萬一緡錢百萬尚奚足惜耶卿宜祗服休命毋復贅詞公猶懇避竟弗許於是奉常已討論禮制上於朝乃按舊典作新廟五室同宇饗以四孟月祭器皆尚方所賜凡典領官吏掃灑軍馬與花果月頒之𨽻版曹及京兆府者悉如在京諸賜廟之儀資政楊棟撰廟碑宋有天下治出於一君勸臣承率本至孝動天地感鬼神穆穆明明並受多助是以履危而安遇險而平滔天之害禹成厥功冦賊姦宄臯討有罪至于迓續上帝之休建立社稷之䇿培桐梓集麟鳯驅魑魅剪樲棘泛泛國航磐石維之曄曄皇輿九軌馭之物來而神為之謀事至而人與之會莫知所以然者皆至德大順之應也景定三年正月詔賜今太傅平章軍國重事魏國賈公忠貫日月身佩安危滌除妖氛再造王室勳績不在趙普文彥博下宜賜第宅家廟令有司條具以聞公以勞民費財辭而天筆下者十數公固辭遂命賜集芳園及緡錢百萬建廟公又辭天筆有曰卿盍思曩者妖氛未息天下大勢何如今民保其居朕保其國顧無以酬卿耳百萬緡何足惜耶天命諄勤不敢不拜乃卜賜園正基治位為門再重為宫五室五代祖太師居中左二室髙祖太師祖太師魏國公居之右二室曽祖太師魏國公王考太師忠肅魏郡王居之皆以妣配東西序為祀堂以祀旁親祭器在東房名諱爵里譜系在西房庖庫在中門外大抵皆頌臺所定是年四月廟成祖考安樂天子有慶廟以崇德賜以報功上悅下順休明之典也先是凶憸當柄政斁備弛實啓戎心寶祐六年冬金空國南冦䝉古入蜀守將望風以城降恭惟理宗皇帝聖明獨斷將盡付公以兵事明年改元開慶遂命公自樞密使兩淮宣撫大使知掦州依舊樞密使除京西湖南北四川宣撫大使提舉兩淮兵甲總領湖廣江西京西財賦知江陵府尋節制江西二廣公受詔即日趨荆州辭府事進夷陵麾軍赴蜀斷危梁于麻堆解重圍于合江䝉古退吳蜀通呼喇初與其主期并入雲南之冦會合而東乃乘沿江隙偷舟羅洑擁衆夜渡公自荆疾馳拒守漢鄂身當百萬師晝夜死戰百餘日四面斬敵敵却走既全漢鄂又遣師勦賊于湘潭敵重兵猶駐鄂下流以俟南來之衆江閫遣將覘敵而舟覆師敗敵勢復壘于白鹿磯浮梁斷江東西隔絶烽燧逹甘泉時凶憸雖斥而其醜聚汙合瀆亂中外土墮民解無足憑者朝廷乃創宣閫于洪聨絡九江倚以扞蔽既而屯將遇敵潰敗敵益深入焚掠江西諸郡京城大震此天筆所謂天下大勢何如之時也于是天子飛親札諭公可移軍九江公讀詔泣下飭制臣謹守武昌獨携數百兵從間路夜穿敵脅冦自江西回適與之遇厄險疾擊斬其將掩其衆以行謂江州逺敵徑渡黃岡出敵之東上拜公特進右丞相樞密使茂國公至是七閲月矣顧下流諸將制于洪閫事不統一公東望拜相命以右相勒兵泝水而上謂公在鄂旗鼓忽自東來駭汗顛踣遂大破其壘殱之無一得還敵由是大懲不敢窺江今十年矣此天筆所謂再造王室勳績不下趙文二公者也夫狂敵積數十年猾夏之志謀深氣盛卒然遇之如山裂海翻變異不測而公獨揮天戈西撑南擊及巨狡橫衝則親冒鋒鏑扳棘拔險斡竒飛渡求一生于百死之中豈不知愛其身哉戰陳無勇非孝也聖祖神宗威靈在天乃祖乃父竭忠盡孝不知有身繼其志服其事者在此立此心也目中已無敵矣理考念功勞勤之禮偹至兹斥靈囿開珍府成閟宫昭先烈皆所以彰明公志若昔帝王知教孝之光無所不通也感神與征苖同一至諴力溝洫與孝鬼神同一無間臣告君以七世之廟君命臣以世世享德盤誥聱牙無非上帝先王暨乃父祖馨享之事褒賞申伯曰寖廟既成詠歌中興曰纘戎祖考蓋幽顯一源君臣一體祖孫一氣幾動于彼誠動于此神應之妙非上智不足知之公既入相首建議立皇儲以尊宗廟繫四海心于是旌别淑慝登用賢俊拔去憸邪斥絶苞苴宫府內肅户牖外綢皇綱一振景定五年奉皇太子即位垂紳正笏以安天下四方無虞年榖順成鐘磬鼎彛郊格廟享春秋祭祀逹于黎蒸王通有言美哉公旦之為周也曰必使我子孫相承而宗祀不絶也深乎深乎安家者所以寧天下也存我者所以厚蒼生也程純公謂通有格言非荀楊所及其以是歟家國匹休人已俱立仁也孝之至也作廟之七年庭有碑而詞未立公以命棟夫風動四方允賴萬世禹臯之功大矣其必帝舜申之今斯人安居暇食以奉其先孰不樂此功而仰舜之盛德乃繫之詩以聲于朝其詞曰天作髙山稽山之東兩兩而比神秀有鍾是應泰階是生元輔匪今所鍾厥有宗祖維周諸姫世德可推辟雍名流遂昌大之作牧參井悍將盤錯萬里身危能折其角開厥元帥護我淮甸聲被齊魯招携察變終老北門遺德餘威生者有憚死者無歸惟孝有忠代代所授手整堪輿前烈是究先皇神聖逺料窮漢九天專命世臣付托狂敵謀我殆數十年一旦披猖齊入三邉奉辭往禦震電轟雷天戈所揮䝉斃江開呼喇凶狡隙罅覷巧揖揖漁艘苛征避撓江北有洑偷渡犬鼠初溱漢鄂百萬其旅順流赴危一以當千公何壯哉叱咤笞鞭麾軍南指衡嶽湘潭刲敵無血猶帶嶺嵐冦却且遁睨江洪閫內驚京師殺氣猛狠公怒而起劍屨不俟草坪無路赤壁無艤先有帝敕下流辦賊公拜稽首捐軀臣職躍出其東敵駭旗幢瞻前忽後莫測神蹤厥角如摧弗赦籲哀以快吾事以懲厥魁捷書夜奏天子斷謨帝曰俞哉汝功永孚江湖淮廣酣寢甘飴社稷再安宗廟塤箎天清地寧一人以懌君臣相勑無忘今日何以報功廟宅是營若昔趙文亦有國勳我有靈囿北山之麓其木虬龍其水瑩玉匪我與爾髙皇嘉喜中興以來功孰汝比爰作閟宫斷度尋尺太常所定桷楹孔碩赫赫官儀五廟帝師翼翼承祀圭衮委蛇相武翊成執競訪落國正法度邉停鉦柝惟彼憸人載媷載芟惟此良士實播實函氣郁和薰上際于天大雅無拂春秋有年黍稷馨止辨章受祉邦家之光與宋千祀子子孫孫載嘗楅衡勿替永年熙我頌聲直學士院劉克莊撰祭器欵識維景定三年正月乙丑詔太傅丞相賈公似道奕世勳勞再造王室其賜家廟于行都乃作爼豆俾奉時薦萬子孫是永之園當湖山最佳處亭則清勝蟠翠雪香倚繡挹露玉蘃石則翠巖皆髙宗皇帝御扁至是理宗皇帝又賜六大字曰西湖一曲曰竒勛公遂增築二堂奉而揭之竒勛之右曰秋壑一曲之左曰容堂亦皆天筆也又因集芳之舊稍加營葺以侈君賜其尤為竒觀者曰無邉風月敻出林杪可以瓜見江曰見天地心近而湖山逺而胥濤越岫咸獻狀於楹簷之下初陽臺正臨其上因築精舍紀葛仙故蹟而熙然臺蒼崖如削則刻賜園嵗月焉景定三年正月八日賈似道䝉上恩賜家廟第宅于行都辭勿獲因集芳園鄰舊居就賜給緡錢使營葺焉用謹欽承子子孫孫其毋忘忠報此其大凡餘不悉紀今上即位之三年公上相印引去詔拜太師鎮東軍節度使侍經筵未幾復相公勉就職再閲嵗引去彌切上莫能奪拜辨章許就居賜第以示優禮乃建節樓於容堂之北又名其西之堂曰遂初喜遂便養初志也堂顔則聖上所賜於是三朝雲漢之章昭回相望盛矣哉集芳之名不敢襲舊而更曰後樂云題詠平章賈魏公庚子歸葛嶺舊居詩罷官歸舊宅山水得頻過息影堤邉樹清心湖面波勞無功可紀頑有命相磨見說連朝雨田家正剪禾咸淳三年生日口號君恩猶使居湖曲年未為髙奈病何做却潞公官職了較來謝事不爭多官宇左丞相府右丞相府樞密知院府參知政事府同知樞密府簽書樞密府在太廟北大渠口紹興二十六年詔兩浙轉運司建三執政府又即都省北建左右丞相府後聚建於今處侍從宅在都亭驛東景定四年創為㕔十有二又有堂曰進思理宗皇帝御書刻石堂中吏部尚書陳昉恭跋臣等恭惟國家駐蹕吳會東南旗蓋運應中興太紫圓方侔天作制承平百年官府寺第固已粲乎隱隱各得其所矣爰自紹興給降御前錢造府以居執政乾道闢懷逺驛基以處臺諫而從臣休舍未有攸居國史無述焉景定四年秋從官宅始成其明年夏權禮部尚書臣子才因經度從容奏陳臣等䝉恩獲塵侍從幸得此屋而居又規其南隙地築堂三楹欲為自公退食之餘修進思盡忠之事臣敢昧死請宸翰賜進思二大字示臣子竚瞻秉心宣猷永昭無極奏函朝入天筆夕頒奎章聖藻日月並明旋題雲楣丹雘無色諸臣拜手稽首仰瞻神文相與言曰思之時義大矣哉禹臯之在虞廷其贊贊曰思孜孜曰思周公兼三王思四事孟軻氏兩以思言之荀林甫伯國之臣也其進思盡忠則仲尼取而列之經以為萬世臣子事君之大訓凡士自一命以上莫不職思其憂而侍從者論思獻納之臣也先正司馬文正公光因辭副樞論國事而曰臣未受命則猶從臣也于事無所不可言者古之為從臣蓋如此彼有便文自營而謂君子思不出其位者偷也以樂慆憂而謂天下何思何慮者妄也若夫憧憧往來朋從爾思而所營不過乎患得患失之間其於為人賢不肖又何如哉詩曰倬彼雲漢為章于天於昭皇文丕天之大律也又曰上帝臨汝毋貮爾心論思之臣其勉之臺諫宅在油車巷為㕔五又有㕔為會茶議事之所省院官宅在開元宫前卿監郎官宅在俞家園咸淳七年創七官宅在郭婆井五官宅在仁美坊三官宅在潘閬巷十官宅在舊睦親坊咸淳臨安志卷十
