body:
  text: 咸淳臨安志卷十一宋潜說友撰行在所録學校諸王宫大小學宗學在睦親坊按國朝宗子分為六宅宅各有學學皆有官中興後惟睦親一宅紹興四年始置諸王宫大小學教授各一員專以訓廸南班子弟隆興間省其一嘉定九年始改宫學為宗學即其地改創凡在屬籍者皆以三載一試補弟子員如太學法改教授為宗正學置諭一員𨽻宗正寺十四年四月因臣寮之請復存教授一員與博士諭輪涖講課若沂府諸近屬則别置教授為清望官兼職不在此列宗學扁理宗皇帝御書大成殿御書閣舊在明倫堂之上咸淳六年守臣濳説友奉朝㫖重建而别創明倫於閣之前明倫堂立教堂理宗皇帝御書扁金華應鏞記建學學官題名皇上清静在御百度撙約惟是官府之関于禮樂政教者是整是飭煥然一新顧兹訓廸天技培植化本之地自南渡草剏為屋數楹綿禩幾百沿簡襲陋獨未能有加於昔乃更化之十載規敞廢宇増闢黌舍益聚四方之宗英而追琢之掲名復舊顓𨽻宗寺以卿搃其要而置博士及諭莅其凡越二年四明羅君仲舒范君楷為是職慨然有感于盛舉之不常見而念壮觀之不可狹也乃條其事以告有㫖遷睦親近属之居于他所而盡拓故基以為學凡賜緡錢三萬有竒二君相與獻圖禀畫程功董事縮蠧積贏費簡功倍殿堂齋館靚深礱宻聳動群目復增補員定試格凡陞黜進退之制㮣視太學昔之所以聚而教之者惟及其近而族属之疎不與也昔之所謂掌教者不過講授而課試之法無有也恵篤有叙程督有經于是嘉祐之畧者詳崇觀之廢者舉其愛愈周而為法亦密矣學既成具釋菜之禮以妥之籩豆旅陳紳緌序列有喟于傍者曰虞典樂之教周師氏之詔邈矣今一旦興久曠之盛典覩承平之盛儀何幸與既又有躍而奮者曰唐宗室子與天下士雜進于科舉文章事業彬班踵出鮮由學校自見者凡我宗姓䝉被教育月書季攷與俊造齒敢不勉二君則進而誨之曰學非既其華既其實教非務其未務其本三代之學皆明人倫而周南之化必以信厚終焉昔楚元王遣其子郢客肄業長安授詩浮丘伯淵源所漸流浹數世若辟疆之清静更生之直諒遡其端緒一浮丘實發之漢初未能為宗族立學也區區私相傳授猶能耀名青史吾儕幸周旋于輪奐之區沐浴乎休明之澤盍餐和飲粹上有以追麟趾之風下毋愧浮丘師生可也聼者曰唯會方斵石紀建學以來歴任者名氏乃次其詞書之于首嘉定庚辰臘月望日大小學教授王執中記教授題名有司失其傳不足證武之音諸侯去其籍莫能詳周之爵題名名氏之有闕雖非有以去之其諸失其傳歟宫庠教授雖肇建于景祐之三禩實權輿于至道之改元執政謂環衛之官非親王比當有降殺請以教授為名孫蠙始為之咸平初命諸王府官分兼南北宅教授朱昻張蔚軰嘗為之然而族居散漫無所統一文靖吕公有建睦親宫置教授官之請遂剏潞王而下第宅錫名睦親宅睦親宅教授于此乎取之治平建元本支寖盛教授六員不足于授業有詔増置五員三十以上置講書四員十四以下别置小學教授十有二員以分教之其後睦親廣親二位謂子孫衆多所居湫隘請焉復建睦親廣親北宅于芳林園分諸王居而教授不廢崇寕初以宗學聚而為一徃來者惮之雖有教授名存實廢請令各宮置大小二學増教授二員不置講書教授于是分講五經矣越四季改教授為宗子博士班序胄子博士上云一馬化龍庶事草創有請置宫學大小教授各二員者趙忠簡公當軸惟置諸王宫大小學教授二員隆興省官復廢其一所講者詩書論孟焉耳六七十載之間獲膺兹選不為少矣載諸百官題名十纔七八散在其他題名九人而已或數載闕官亡繇詮次或丐外無傳不知其人非以昔無壁記耶徃者不可及來者猶可為因鍥諸石以久其傳其為丞郎入舘閣徃徃而是由是而除臺官餘十人既而特荷橐貮鼎鉉亦各數人班班可觀焉嗟乎選預文學之館時所傾慕名載滕王之閣私竊以為喜諸王宫學雖非文學館比爰視滕閣夫豈多遜㞐是官也盍思遴選于朝如此其嚴擢用夫人如彼其非次勉旃職業期於逺者大者異時眡此足以自慰他人亦歆艶之其子若孫與有榮焉不然者反是義不在兹乎班資崇庫云乎哉除授季月云乎哉大小學教授周直方記登科題名國家受命于天克昌厥後本支蕃盛英才軰出列聖以義制恩命属籍毋與科目之士競進雖有才能欝而弗施神宗皇帝立賢無方不以親廢乃詔未命者應舉己命者鎻應而同姓擢科始與寒素等崇寕大觀間継興舍法追琢帝胄月書季攷如賢関俊造之選此二者皆國之鉅典也渡江以來三嵗應詔公族之薦于春官者惟舊而舍法未復先是置學宫邸以誨近親屋僅數楹綿蕞特甚儒官雖設課試未偹無以示勸皇上慨然撤宫學而鼎新之更其名曰宗學盖宫止于近親而宗則属之戚踈咸與焉嵗校行藝以次而陞悉視太武學之制三舍規模至是盡復矣猗歟盛哉學建於嘉定九年至十五年始得㫖試上舍生汝是與􅖴首遇兹選會寳璽恩闔學之士免秋薦者百二十人次年春奏名南宫者十有八人併陞舍二士賜第于廷者合二十人盛事創見昔所未有汝是等來諗曰諸生叨被聖化獲玷科級将刻名以侈上賜詎可無以識之敢請因告之曰子之請美矣亦嘗思所以報菁莪樂育之恩乎昔周設四教首及于王之支庻故明倫之義著維城之志篤子孫千億屏衛宗社周用以强唐之天𣲖雖罕繇建學顯而進士一科多宗室子名公鉅卿彬彬可紀為唐光華今上初建學而子軰聨登盍自奮厲無愧于周唐同姓以稱明時作成之意庻乎足以仰酬萬一也諸生咸應曰敢不勉乃次其詞俾刋諸石嘉定十六年六月大小學教授蔡抗記登科續題名淳祐甲辰之冬皇上奮發英㫁更新大化又明年以麟庠之胄苦隳肝膽力扶綱常于是赫奕奎文誕揚黌宇賜之束帛試之春官優之陞擢意氣激昻多士興起至臨軒之日擢第者凡三十三人稽之壁記未有盛于斯者諸生以記石已溢别斵而續之請記焉抗聞之君臣上下之大倫天之經地之義所謂名彛也士君子當國家之急陳義慷慨詞氣激烈如驚湍怒濤萬折而必東者豈有所為而為之哉亦出於秉彜好徳之不可遏焉耳雖然此未仕時者也今仕矣如之何嗚呼士生斯世其未逹也孰不以直道自任一旦儋人之爵立人之朝富貴餌于前患難怵于後志昏于氣義奪於利鮮有不易正為邪而失其素履者是則諸君今日既仕之後益當自勉于學問以培植氣節之根本且知夫士之所當為者不止於是也不然壁記之續自我始後之人歴指其名而數之曰是人也始于正終于正是人也始于正終于邪可不懼哉淳祐丁未八月朔日博士胡泓記兩優釋褐題名士專以文進非古也然知言知人聖有成訓言心聲也聲成文有可觀者觀其文知其人矣我寕宗皇帝在位二十有二年始追舊典建宗學置博士弟子員凡𨽻玉牃無牒無間戚踈于此試焉于此校行藝焉月書季攷循式唯謹又六年昉置上舍生凡内舍行藝之校曰優曰平者咸試之視其等之次第以陞偕南宫進士對䇿大廷累累得人班班可紀獨内舍優校中上舍優等則閲十餘嵗未之有也嘉熈改元陞夫始中是選被恩觧褐士忻榮之淳祐癸邜崇淌復以行藝校優試入上舍優等第一人纔六稔爾兩優觧褐之士再見可謂盛矣太武學進士題名兩優釋褐别表于碑宗庠不容曠也諸生礱石以請識于上方而第列其名既大書之特書之固将屡書不一書而足也於戱休兹宗英以文進以行成以賢且能擢豈直科目云乎哉勲名志節光我邦家列選得人之盛昭學校作人之功上追古昔吾将有望焉是嵗十有一月朔吉四明袁肅記前廊題名寕皇更化九年復建宗學越四年大闢黌宇而列職以表倡諸生者其員有五舉録搃要直學治凡曰講曰課經諭三人叅掌之非行藝兼優不在此位也今天子御極六年廣開來學之路大支之肄業者日益多端榘矱于前廡者任加重而聨事其間曽未有紀嵗月滋久懼寖湮㣲題名之立其容己乎惟宗庠分職與胄監兩學畧同而所以任職者則異羣天下之士教育于兩學而㧞其行能之尤者為之領袖其律人也一於義若夫宗庠則負笈來逰皆同姓之秀而列職以率先之亦同姓之英也凡我兄弟伯叔之懿親親相與雖以義紏正而實主乎恩然則處恩義之間欲兩得之厥惟艱哉外嚴而内寛本為忠厚而濟以法度使相觀而善之中不失所以歡然親睦之意庻幾愛敬友感而能勝其任乎故因兹刻之始畧舉訓齊宗室之要筆諸上方以諗于庀職者紹定三年嵗在庚寅九月既望汲古堂在立教堂後為學官直舍丞相文清李宗勉書扁咸淳六年守濳説友奉朝命増修乂自殿門學門以至前廊位次倉庫吏舍皆葺新之齋舍六貴仁立愛大雅明賢懐徳升俊按宫學元有四齋曰貴仁信厚大雅明賢太學在前洋街理宗皇帝御書二字為扁紹興十二年詔禮部討論太學飬士法仍令臨安府權於府學措置増廣遂置祭酒司業博士正録定養士額十三年六月臨安守臣王㬇即岳飛宅建學成互見國子監詔禮部侍郎兼直學士院王賞為記今不存賞集中亦逸㬇又括民間冒占白地錢為飬士費國朝會要云月得二千八百餘貫朝野雜記云嵗八十二萬緡有竒給監學生綾紙監帖如頴州熊彦詩言嘉祐治平太學中選者各給監帖畫以中㫖右以賛詞告戒丁寜待之甚厚當時士人寳藏其帖傳之子孫以為榮遇近于周綰得其父為監生時帖冩以文綾疊以監印如告身制度乞下國子監依倣以給諸生以示國家待士之意㫖從之十四年司業髙閌等請車駕臨幸詔從之遂以三月己巳祗謁先聖止輦大成殿門外禮畢御敦化堂命髙閌講易㤗卦賜諸王席於廡下啜茶而退遂幸飬正持正二齋學官生員恩數各有差越六日内出御製御書宣聖賛命掲置大成殿今釋奠則樂工數人歌之二十五年又製七十二賢賛親札付臨安府刻石孝宗皇帝以淳熈四年十月乙亥寜宗皇帝以嘉㤗三年正月戊戍臨幸紹興禮淳祐元年正月理宗皇帝将視學首降御筆陞周頥等五臣從祀而削王安石曰朕惟孔子之道自孟軻後不得其傳至我朝周頥張載程顥程頥真見力踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨表裏渾融使中庸大學語孟之書本末洞徹孔子之道益以大明於世朕每觀五臣論著啟沃良多今視學有日宜令學宫列諸從祀以示朕崇奨儒先之意又曰王安石謂天變不足畏祖宗不足法人言不足信此三語為萬世之罪人豈宜崇祀孔子廟庭合與削去於正人心息邪説關係不小令國子監日下施行廼以戊申行禮頒御製伏羲以下道統十三賛宣示諸生七年三月御書朱熹白鹿洞規以賜景定元年内出手札更定學令二年今上皇帝在東宫奉命謁奠先聖遂具奏曰恭凖聖㫖擇用正月十五日令臣謁拜先聖文宣王於太學臣仰體聖心祗承嚴訓區區愚𠂻固有感發焉盖先聖之道至我朝盛時運際之明真儒迭起而後有以纉夫孟氏之傳闕説並駕未知統一迨乾淳間文公臣朱熹與宣公臣張栻成公臣吕祖謙志同道合切偲講磨如義利之辨如近思録之書擇精語詳開牗後學誠有功於聖門中間邪説又幾晦蝕陛下盛德龍興罷斥邪詖表章正學然後人心一正聖道大明天下學士得以㳂河洛而遡洙泗實萬世無疆之休熹等三臣嘗俱被詔追褒特加䘏惠盛典兼凖御筆秩熹於從祀如祖謙栻謂宜同升體例臣愚欲望聖慈特降睿㫖併以臣栻臣祖謙秩於從祀益以昭聖明崇儒重道之盛美所有封爵未審合與不合照典故檢舉施行有㫖封栻華陽伯祖謙開封伯並列崇祀迨聖上踐大寳當咸淳三年正月既郊見即舉行淳祐故事益蒐講闕典先升侑曽子子思詔曰惟孔子獨稱顔回好學固非三千之徒所同也而其學不傳得聖傳者獨曽子傳子思子思傳孟軻忠恕兩語深契一貫之㫖中庸一篇丕闡前聖之藴而孔子之道益著向非顔曽思孟相繼演繹著書垂訓中更管啇楊墨佛老幾何其不遂冺哉今大成殿惟顔孟侑食曽思不與尚為闕典先皇帝推迹道統之傳自伏羲以來著十三賛孔子而下顔曽思孟昭然具在其非以遺我後人乎令禮官學官議其可如曽子升侑并議可升十哲者以聞又從祀邵雍司馬光詔曰邵雍天挺人豪英邁盖世司馬光有徳有言有功有烈朱熹賛之與周張二程俱雍述經世書發先天奥㫖而内聖外王之學實關吾道光著通鑑貽後世治法而真履實踐之美為時儒宗豈與前代諸儒或以章句文詞得祀於學者比朕将臨雍因思朱熹所賛以祀其四而尚遺雍光非闕歟其令學官列諸從祀以示崇奨至是褒表儒先典禮大備自淳熈以來皆於禮畢降詔訓勉諸生聖化涵濡聞者興起紹興額三百人後數増置一千人淳熈開熈間各有増今為額一千七百十有六上舍三十人内舍二百六人外舍一千四百人國子生八十人若累朝繕修之役不具載大成殿先聖冕十二旒服九章按洪天錫通祀輯畧云今上庠先聖之像有日月而無星辰有山龍華蟲火彜而無藻與粉米有兩黻而無黼非虞非周殊不可曉則有司之失也参稽禮典以訂服章之誤必有任斯責者大成殿門建隆三年詔立十六㦸政和元年立二十四㦸紹興建學司業髙閌等請依政和之數從之首善閣髙宗皇帝御書三扁各有石刻又有累朝之御札御製石刻寘閣下紹興十四年幸學荅詔宣王復古采芑著詠於新田世祖緯文建武肇興於太學既撫紹開之運咸推樂育之心朕寅奉基圖敦崇教化稽前王之軌範遵列聖之規模兹偃革以息民乃恢儒而建學聲明丕闡輪奐一新爾等攄望幸之誠述諸儒之志逺繼橋門之盛願觀雲漢之臨請既方堅理宜從欲将欵謁於先聖仍備舉於舊章深諒忠勤實増嘉歎䟦語漫滅淳熈四年幸學詔昔我藝祖肇造帝室禮樂征伐猶未皇暇乃開基之月首幸國學越二月又幸既宏先聖先師之宇復審象而為之賛本原治道厥有深㫖然則掃五季之陋削諸侯之僣垂萬世之統不在斯文乎列聖相承遂為家法太上中興開設學校乗輿臨幸儒術益光肆朕纉圖儲精稽古憲章祖述夙夜不敢忘爰以仲春謁欵先聖躬釋菜之禮闡中庸之義臣工列侍多士濟濟洙泗遺風儷然在目朕甚嘉之明掦訓辭尚廸朕志夫孝於事親忠於事君學之本也業精於勤行成於思學之序也聖賢復起不易斯言子大夫其念哉當為君子之儒毋慕人爵之得使予尊徳樂道之心著化民成俗之效行光於祖宗對於慈訓斯無負於樂育在汝等勉之而已叅知政事臣龔茂良等恭䟦臣聞道在域中惟聖人為成能教行天下惟王者為全功學之為王者事其已久矣自堯舜以來宇宙之間始曉然知有帝王之學如華星䴡日萬目所属謂道以是傳而教所由興也堯以是傳之舜舜謂是道也吾将與天下共之有虞氏之上庠下庠盖欲以是逹之天下也禹湯文武亦皆以其所傳者逹之天下故夏后氏有東序西序商人有右學左學周人則兼用四代之學是故人倫以明典禮以行嗜好以平謡俗以成此數者皆由太學來也國家開造之初藝祖皇帝以峻極之謩生知之性視唐虞三代不約而同故于逾月之頃再幸太學二百年來以是為家法太上皇帝方投戈息馬之日親行酌獻都人縱觀如再開闢皇帝陛下舉縟典于三十年之後乃以春二月乙亥帥群后公卿大夫國之胄子六卿之雋秀設席于前旁逮兩廡命國子祭酒臣光朝講中庸又以是日幸武學行肅揖之儀於戱盛哉奨勸多士具于訓詞此為不刋之典是宜勒之琬琰以風動四方臣光朝以是來白盖述太學諸生之請也臣茂良臣彦穎臣淮臣雄敢拜手稽首以聞制曰可謹退而記其事嘉㤗三年幸學詔朕惟開設學校以垂萬世之統恢崇儒術以追三代之風粤稽我朝具存家法藝祖建隆之肇造廼踰月躬再幸之勤太宗端拱之承平以仲秋行欵謁之禮宏謩維永列聖攸遵髙廟中興嚴大成止輦之敬孝皇繼志祗上丁釋奠之儀肆朕𦕈躬纂兹洪業雖鬰大道敢忘舊章貫古穿今每樂陪於講幄承師問道曽未即於儒宫爰㳙休成聿親臨幸踵堂挾䇿紛鼓箧之生徒賜坐横經聳旋門之觀聼載闡周書董官之訓慨慕成王持盈之規治具畢張人文丕煥予一人方崇化以厲俗爾多士其傾心而嚮風峩峩而纓其冠豈徒趨仕進之路翹翹而刈其楚庻幾收傑異之材惟勉於忠孝以基爾立身之階惟篤於行義以副予作人之術期不負於所學将無愧於前聞叅知政事臣許及之等恭䟦臣仰惟皇帝陛下光撫熈運楙建皇極持盈守成兢業夙夜太平之基増而彌髙禮義之澤流而逾深庻事大備區宇億寜年榖屡豊休祥液洽于是審風俗之樞機遡教化之源委将以作新人文尔乃嘉㤗紀元之三禩月于孟陬吉日戊戌夙駕翠華臨幸璧水三公九卿大夫士莫不咸在簮笏肅如韋布䄡如親屈帝尊祗謁先聖旋紆乾顧肅揖武成止輦横經之堂虚懐重席之講演周官之奥義昭制治之宏橅登進諸生于帝其訓明倫誕播雷動風馳若睹若聞鼓舞詠歎咸以親見聖王師之為幸皇乎休哉誠濶希之鉅典動化之大權也臣誠不侫竊嘗謂王者以潤色祖業為孝人臣以不負天子為忠若稽中興授受一道髙皇首幸于建學之初孝祖釋奠于上丁之日傳為家法有隆無替逮今五祀縟儀三見憲章鼎新為道益昌聖孝之盛亘古莫及若乃誦王言之大體王心之一孝弟以修身仁義以事君㓜學壮行出長入治思所以塞厚望稱隆㫖則凡小大之臣暨逰學之士其敢不勉是用䖍奉戊戍詔書傳諸副墨勒諸堅珉期于紹興淳熈之懿並垂永世惟淺陋不足以稱述萬一臣則有愧寳慶三年諭内外學官詔朕親御路朝首興教化士風所繋尤務作新比年以來習尚澆漓文氣卑薾純厚典實視昔歉焉豈涵養之未充抑薰陶之或闕咨爾訓廸之職毋拘内外之殊各究乃心俾知所嚮矯偏適正崇雅黜浮使人皆君子之歸如古者賢才之盛副予至意惟爾之休國子祭酒臣周直方等恭䟦臣等仰惟皇帝陛下欽承道統丕闡化原初御路朝昭飭庻政維士習未厚文氣尚卑是訓是革肆掦親札下之六舘爰及萬方承學臣工聼服震悚竊諗舊聞實維國朝右文貴士源委深長太宗皇帝以舉子輕薄為文不求義理于是顯示登黜賜進士以儒行之篇孝宗皇帝視學申諭詞臣誨廸諸生當為君子之儒毋專人爵之得盖古文漸復于景祐慶厯之先經藝益輯于乾道淳熈之後儒猷之盛冠古有光無他上諭而下習教道壹而風俗成也粤自先朝聿更元化並延鴻碩之彦復還義理之書先民是程典籍盈門而多士未能咸體休徳純厚之行典實之文視昔歉焉仰勤皇上惟新之命臣等恭讀聖制載繹隆指盖性習寖異氣質難齊擇乎中庸會于有極是謂矯偏適正言以述志文以成言約以範模澤于道徳是謂崇雅黜浮臣等大懼無以稱上意廸士嚮方謹刻諸樂石俾副墨流傳皆知誦堯之言滌心儆省毋負明時之作新臣等淺陋何足稱述萬分一敢百拜稽手記諸下方淳祐元年幸學詔朕惟元聖立教萬世人主北面登降拜跪執弟子禮所以尊儒術彰文化也涼菲紹圖十有八載屬多邉虞欵謁之儀因仍未舉朕甚恧焉思昔英君過魯而祠投戈而講猶皆倥偬之際我太祖肇造日不暇給凡再􅊩國學髙宗中興庻事草創亦垂臨雍之典今三陲候吏小息橋門多士翹首望幸朕何敢有所諉遜以未皇哉乃於孟春親饗原廟之次日詣殿奠獻祗拜像設躬視璧水登延儒臣敷繹大學之㫖搢紳韋布肅肅在列逺想淳熈嘉㤗之盛惟朕兹舉率由舊章匪曰粉藻美觀耳子大夫其思稱朕意明義理以求至善修文行以全良貴涵養忠厚砥礪亷隅進取之學非所以自盡也詩云肆成人有徳小子有造古之人無斁譽髦斯士其尚𢡟哉右丞相臣史嵩之等恭䟦臣等恭惟皇帝陛下宅心道妙興教右文稽式古典淳祐改元正月丙午下明詔戊申夙駕鑾路祗謁先聖釐正崇祀躋五賢黜安石臨視大學陞御崇化堂命國子祭酒臣觱講大學荐紳衿佩覿儀泳仁肅肅雅雅乃頒御製十三賛于學奎璧輝潤晰潜發㣲俾教者學者知所據依精擇力踐用稱明㫖所以加惠斯文甚厚臣等拜手稽首端誦繹復而言曰至哉聖學之精粹也粤八卦九章肇闡道原前聖後賢踵相授受由羲至周其道行由孔至孟其學明迄孟而降申韓老佛六家九流之説蝕人心蠧道真大經大法益晦弗彰後儒始作而曰堯以是傳之舜更禹湯文武周公孔孟而不得其傳信不為無所見抑窮源會流之義未偹也陛下識洞髙明學詣宏奥當聖逺言湮之餘深挹逺紹獨有契于聖心乃克上泝䆳古継天立極之原下𣲖聖門面命心傳之脉于以廸化昭代貽訓方來的乎傳信之符劵昭乎行世之日月也昔漢世宗黜百家尊孔氏後世猶亟稱之方之聖作表章經籍之事淺闡明道統之功大千萬世不可尚已臣等愚陋不能輔宣道化大懼失墜謹奉詔書宸製夀諸堅珉期與多士服膺請事以欽承聖天子尊聞行知之實淳祐四年三月御製御書道統十三賛并序朕獲承祖宗右文之緒祗遹燕謀日奉慈極萬幾餘閒博求載籍推迹道統之傳自伏羲迄於孟子凡逹而在上其道行窮而在下其教明採其大指各為之賛雖未能探賾精㣲姑以寓尊其所聞之意云耳伏羲繼天立極為百王先法度肇建道徳純全八卦成文三墳不傳無言而化至治自然堯大哉帝堯盛徳巍巍垂衣而治光被華夷聖神文武四岳是咨揖遜之典萬世仰之舜於皇聖徳至孝盡倫所以為大樂善取人惟精惟一帝心之純垂拱無為堯道是循禹克勤於邦烝民乃粒歴數在躬厥中允執惡酒好言九功由立不伐不矜振古莫及湯順天應人本乎仁義以質繼忠匪曰求異盤銘一徳桑林六事人紀肇修垂於萬世文王道被南國首正人倫仁政一施必先窮民翼翼小心秉兹徳純丕顯文謨萬邦儀刑武王受天眷命繼志前人遐邇恱服偃武修文惟賢是寳法度彰明建用皇極爰叙彛倫周公羙哉公旦翼輔成周施兼四事才藝俱優制禮作樂惠澤敷流有大勛勞宗社延休孔子聖哉尼父秉徳在躬應聘列國道大莫容六藝既作文教聿崇今古日月萬代所宗顔子學冠孔門徳行科首聞一知十若虚實有樂道簞瓢不易所守歩趨聖師瞠若其後曽子守約博施反躬三省孝為徳先祿仕不忍聖道正傳意會神領一唯忠恕門人深警子思閒居請問世業克昌可離非道孜孜力行發揮中庸體用有常入徳樞要治道權衡孟子生禀淑質教被三遷博通儒術氣養浩然深造自得亞聖之賢髙揖孔氏獨得其傳紹定三年聖製淳祐祗謁先聖就賜國子監宣示諸生咸淳三年幸學詔朕惟我朝以人文化天下藝祖肇基於首善之地獨先幸臨實開我宋奎明之運列聖率循業益大以光先皇帝在宥臨雍講論表章正學菁莪樂育於斯為盛朕以涼菲獲承丕緒永惟天地萬物之始宗廟國家之本學校教化之原有天下者莫先焉乃者初見郊廟罔不顧歆惟元聖立教與天地並人極攸建萬世是師隆禮致敬其曷敢後爰以孟春謁欵原廟之翌日躬拜舍菜於太學禮成俾儒臣執經敷繹中庸之義方領矩歩委蛇乎其中甚稱朕所以崇嚮之意夫學以明人倫也其為目有五而為孝為忠乃倫所由起牗於天𠂻率於秉彛聖人作經壹是皆以此為凖士惟先立乎其大者而輔之以文則措諸事業有餘地矣詩不云乎追琢其章金玉其相又不云乎藹藹王多吉士維君子使朕将培飬以為無窮之用子大夫尚勉之哉右丞相臣賈似道等恭䟦臣等恭惟皇帝陛下敬天尊祖崇學右文乃咸淳三年正月己丑朔祗見於南郊戊申臨辟雍謁元聖永惟先帝御製十三賛道統之傳具有次第爰灑奎畫陞侑曽子子思與顔孟並光漢設學以來千五百年之闕典于是大偹猗歟休哉明大原之授受示後學之㫖歸昭昭乎掲日月而行萬世也已乃御崇化堂命臣宜中講中庸冠帯榗紳誾誾秩秩洗視浴聼於是誕敷綸言其訓爾士帝意若曰學所以明人倫而倫實起于孝忠士先立乎其大而大可措諸事業臣等端笏跪讀拜手稽首而言曰仁親親為大義尊賢為大立愛立敬聖人人倫之至也陛下資兼帝王學貫體用由親親之等而仁民愛物由尊賢之推而敬大臣體群臣夫既有以立天下之大本矣将見立之斯立人知孝於親而父子之大倫立人知忠於君而君臣之大倫立自是而逹之五者之大倫無一不立則措之事業皆可大之業也大哉王言世為天下則矣臣等對掦休命大懼無以布徳意謹摹勒夀諸翠珉以昭永久光堯石經之閣孝宗皇帝御書扁淳熈四年詔臨安府守臣趙磻老建閣奉安石經以墨本寘閣上御書石經易詩書左氏春秋禮記五篇中庸大學學記儒行經觧論語孟子御製宣聖七十二賢賛并序紹興二十六年十二月臣竂言望詔有司奉安石刻于國子監為不朽之傳仍造碑本徧賜州府軍監學校用彰右文之化從之朕自睦隣息兵首開學校教育多士以遂忠良繼幸太學延見諸生濟濟在庭意甚嘉之因作文宣王賛機政餘閒歴取顔囬七十二人亦為製賛用廣列聖崇儒右文之聲復知師弟子間纓弁森森覃精繹思之訓其於治道亦庻幾焉孔子字仲尼魯人開元十七年謚為文宣王賛曰大哉宣聖斯文在兹帝王之式古今之師志則春秋道由忠恕賢於堯舜日月其譽惟時載雍戢此武功肅昭盛儀海宇聿崇顔囬字子淵魯人贈兖國公賛曰徳行首科顯冠學徒不遷不貮樂道以居食非其志在陋自如宜稱賢哉豈止不愚閔損字子騫魯人贈費侯賛曰天經地義孝哉閔騫父母昆弟莫間其言汚君不事志氣軒軒復我汶上出處休然冉耕字伯牛魯人贈鄆侯賛曰徳以充性行以澡身二事在躬日躋而新並馳賢科得顔為隣不幸斯疾命也莫伸冉雍字仲弓魯人贈薛侯賛曰懿徳賢行有一則尊子也履之成性存存騂角有用犂牛莫倫刑政之言惠施元元宰予字子我魯人贈齊侯賛曰辨以餙詐言以致文茍弗執禮宜莫釋紛朽木糞墻置不足云言語之科卓然有聞端木賜字子貢衛人贈黎侯賛曰謙徳知二噐實瑚璉動必機先孰並其辨一使存魯五國有變終相其主譽處悠逺冉求字子有魯人贈齊侯賛曰循良之要在於有政可使為宰千室百乗師門育才治心扶性退則進之琢磨之柄仲由字子路卞人贈衛侯賛曰升堂惟先千乗為權陵暴知非委質可賢折獄言簡結纓禮全惡言不耳仲尼頼焉言偃字子游呉人贈呉侯賛曰道義正已文學擅科為宰武城聊以弦歌割雞之試牛刀謂何前言戯爾博約則多卜商字子夏衛人贈魏侯賛曰文學之目名重一時為君子儒作魏侯師不可復禮始可言詩假盖小嫌聖亦不疵曽參字子輿武城人贈郕伯賛曰夫孝要道用訓羣生以綱百行以通神明因子侍師荅問成經事親之實代為儀刑公西赤字子華魯人贈郜伯賛曰學者行道敝緼亦稱使齊光華偶為肥輕周急之言君子所令答問允嚴理皆先經公伯寮字子同魯人贈任伯賛曰人有賢否道有廢興子如命何營營震驚季孫雖惑景伯莫平師賢一言秩祀亦懲漆雕開字子開魯人贈滕伯賛曰仕進之道要在究習其臣而居咎欲誰執斯未能信謙謙有立闕里説之多士莫及南宮适字子容魯人贈郯伯賛曰先覺既立禮樂並馳尚徳君子爾乃兼之羿奡可慚禹稷可師三復此道載觀白圭申棖字子續魯人贈阿伯賛曰剛毅近仁志操莫渝性非祝鮀面豈子都有一於此剛名可圖云欲則柔盖生之徒原憲字子思魯人贈原伯賛曰軾彼窮閻逹士所遵邦無道廢進退孰倫敝衣非病無財乃貧賜雖不懌清節照人有若字子有魯人贈卞伯賛曰人禀秀德氣貎或同而子儼然温温其容兩端發問未逹機鋒以禮節和斯言可宗司馬耕字子牛宋人贈汶伯賛曰手足其親志異出處魋將為亂子廼脫去在汚能潔危而有慮内省若斯何憂何懼顓孫師字子張陳人贈陳伯賛曰念昔顓孫商德與鄰學如干祿問必書紳參前倚衡忠信是遵色取行違作戒後人髙柴字子羔衛人贈共伯賛曰婉彼子羔學業先聖宗廟之間一出乎正克篤於孝非愚乃令師知其生有煇賢行陳亢字子禽陳人贈頴伯賛曰惟禽之問從容其鯉求以異聞詩禮云爾請一得三誠退而止且知将聖不私其子樊須字子遲齊人贈燕伯賛曰養才以道聖人兼濟始謂不仁問學良喜寓志農圃似揆仁義學稼之辭豈姑舍是林放字子丘魯人贈清河伯賛曰禮之有本子能啟問大哉斯言光昭明訓德輝㤗山誣祭莫奮崇兹祀典盖永令問公冶長字子長齊人贈莒伯賛曰子長宏度髙出倫軰雖在縲紲知非其罪純德備行夫子所美以子妻之尤知英㮣蘧瑗字伯玊衛人贈衛伯賛曰有衛伯玉夫子與居寡過未能薦賛使乎以屍諫君友則史魚果能進賢爛然簡書澹臺滅明字子羽武城人贈江伯賛曰惟子有道天與異容状雖云惡德則甚豊南止江沱學者雲從取士在兹貎或非公曽蒧字晳魯人贈宿伯賛曰惟時義方有子誠孝怡怡聖域俱膺是道暮春舞雩詠歌聖教師故與之和恱宜召宓不齊字子賤魯人贈單伯賛曰君子若人單父之政引肘寤君放魚禀令傳郭勿獲遂能制命百代理邑用規觀聼顔無繇字路魯人贈把伯賛曰人誰無子爾嗣標竒行為世範學為人師請車誠非顧匪其師千載之下足以示慈巫馬施字子期魯人贈鄫伯賛曰天清日明宻雲曷有師命持盖子亦善祐惟夫子期三才充究學者之藥所得遂茂啇瞿字子木魯人贈䝉伯賛曰易之為書彌綸天地五十乃學師則有是子能受授洙泗傳世知幾其神宜被厥祀公孫龍字子石楚人贈黄伯賛曰黄伯著祀公孫是云彌縫中道恊輔斯文藏修方異漸漬其勤史辭不忘播為清芬亷潔字庸衛人贈莒伯賛曰兄弟之邦士有亷庸涵泳素教表掲儒林坫壇探賾洙泗從容作興一時莒父其封叔仲會字子期魯人贈瑕丘伯賛曰瑕丘祚邑子期是為親訓有日廣業於時四教允隆五常以持比肩俊傑聞望斯垂燕伋字思秦人贈漁陽伯賛曰師席髙振大成是集至道克傳賢逹斯執善教之柔儒風可立漁陽之士得跂而及申黨字周魯人贈邵陵侯賛曰侁侁申周四科與儔逸駕文圃鼓枻儒流冠佩既燕言動允休邵陵得封子想清修琴牢字子開衛人贈南陵伯賛曰多能鄙事聖人曲意惟其知之是以不試宗魯雖友弔必以義尚師嘉言祀亦罔替秦商字子丕楚人贈上洛伯賛曰孔父孝友相尚以力俱生賢嗣相與以徳是父是子致法疇克會弁儒林令名無極歩叔乗字子車齊人贈淳于伯賛曰勉勉子車封邑淳于親炙避席唯諾趨隅發問既博雅道是扶抑可尚也不亦美乎顔之僕字叔魯人贈東武伯賛曰賢行顔叔親承尼父志鋭於斯道尊是輔泥在陶鈞木就規矩終縻好爵掦名東武公西箴字子上魯人贈祝阿伯賛曰猗爾子上魯邦之望以徳則貴惟道是倡師聪師明友直友諒伯扵祝阿儒風斯暢石作蜀字子明秦人贈石邑伯賛曰在昔石邑能知所尊𢡟衣有徳克述無言鼓箧槐市掦名里門此道乆親彼羙長存顔髙字子驕魯人贈瑯琊伯賛曰瑯琊之伯其為子驕徽言既彰徳音孔昭已觀舞雩同聲聼韶歴千百禩跂想髙標邽㢲字子欽魯人贈平陸伯賛曰彼美邽子先聖是承墻仭已及堂陛將升良玉斯琢寒水必冰錫壌平陸茂實斯騰任子齊字選魯人贈任城伯賛曰任城建伯其表曰選淑問雅馳才華清逺競辰力行愛日黽勉禮教崇崇令望昄昄曹䘏字子循秦人贈曹伯賛曰肅肅曹伯王室之裔積習樂道切琢明義惟善則優素徳是類史筆有煥令名永祀冉孺字子魯宋人贈把伯賛曰把伯子魯聖學是務厲已斯約好問乃裕周旋中規容止可度允矣昔賢後世所慕伯䖍字子析魯人贈駢伯賛曰有䖍子析全魯之彦儒行既明駢伯乃建兢兢愛道奕奕峩弁懿選嘉訪世享馨薦縣成字子期魯人贈鉅野伯賛曰至聖立教子期安雅擅譽魯邦啟祚鉅野偉矣風猷時哉用舍出倫離類後學是假顔噲字子聲魯人贈朱虚伯賛曰褒錫朱虚在噐輪輿儒室振頌聖門曵裾賢業素藴美材以攄萬世不刋載觀成書孔忠字子蔑魯人贈汶陽伯賛曰惟子挺生道徳之門佩聼至論鯉門弟昆三得三知所問深温君子歸服義不掩恩后處字子里齊人贈營丘伯賛曰温温子里入聞至聖覧道之華秉徳之柄深造閫域不乖言行全齊之封竹素為盛左人逞字行魯人贈臨淄伯賛曰伯彼臨淄左行獨賢睎蹤十哲秀頴三千心悦誠服家至户傳樂只君子文聲益宣公哲哀字秀次齊人贈郳伯賛曰周衰偽隆政出羣公亷耻道㣲家政聿崇不為屈節偽黙自容子於是時凛然清風漆雕徒字子斯魯人贈須句伯賛曰遐想子斯挾䇿聖幃渉道是嗜唯仕可斯在徳乃賢在名乃垂洋洋之風逮今四馳榮旂字子旗魯人贈雩婁伯賛曰伯錫雩婁務學實著三千之徒七十是顧歴告莫行惟徳乃㨿視於前書式彰厥譽秦祖字子南秦人賜沙梁伯賛曰秦有子南賛述作守道之淵成徳之博範若鑄金契猶發藥歴世明祀以梁寵爵秦非字子之魯人贈汧陽伯賛曰樂善哲士伯於汧陽傳道克正垂名允臧執徳以洪用心必剛袤廣業履式彰素王商澤字子季魯人贈睢陽伯賛曰邈矣子季睢陽是伯屏息受業延教登席未踐四科固渉六籍祀典載之好是正直鄭國字子徒魯人贈榮陽伯賛曰伯夫榮陽實惟令徳俊義賢行過不留跡道以自傳妙則心識猗歟偉歟後代之則顔韋字子桞魯人贈蕃伯賛曰祀封於蕃實惟子桞夙欽格言克尊善誘明徳是馨賢業所就大侑於儒傳芳逾茂漆雕哆字子歛魯人贈武成伯賛曰子歛受封爰居武成亹亹其問翩翩其英摳衣時習厥學日明誕敷禮教爵里尊榮壌駟赤字子徒秦人贈北衛伯賛曰式是壌伯昭乎望徒執經請益載道若無詩書規矩問學楷模得志則駕領䄂諸儒施之常字子恒魯人贈乗氏伯賛曰國因乗氏有徳斯彰參稽百行賛理三綱自拔行間榮名甚光在史靄靄歴乆彌芳公祖勾兹字子之魯人贈期思伯賛曰惟彼子之錫作期思與賢並進得聖而師彬彬雅道翼翼令儀一日王言廟食不墮狄黒字晳衛人贈臨濟伯賛曰仰止狄晢抱負淵通㳺泳徳化揚厲素風偉識既異特教乃隆厥知茂焉宓祀無窮奚容箴字子晢魯人贈下邽伯賛曰奚容子晢已望堂室㓜則有造成則祖述文采日化儒効力弼永觀厥成徳音秩秩冉季字子産魯人贈東平伯賛曰東平子産姓著盛時奉時於塾講道之㣲答問其敏淵妙以思升降陛亷尚想英姿秦冉字開蔡人贈彭衙伯賛曰彭衙髙氏經籍是親賛成徳藝叶於彛倫底績聖道期肖素臣優哉優哉學以致身梁鱣字叔魚齊人贈趙伯賛曰室家壮年無子則逐見於信史全齊之俗原本厥初師之何復以學則知揆之宜篤樂欬字子聲齊人贈昌平伯賛曰樂氏子聲錫爵昌平信道之篤見善廼明引領髙爵載惟昌城先賢聿集出為時英按洪邁隨筆唐開元中封孔子為文宣王顔子為兖公閔子至子夏為侯群弟子為伯迨本朝祥符中進封公為國公侯為郡公伯為侯太上皇帝御製賛七十五首有司但具唐爵故宸翰所標皆用開元國邑今當請而正之可也崇化堂元用司業髙閌請仍東都講堂舊名曰敦化後改崇化慶元初改化原未幾復今名理宗皇帝書御扁堂上有御札御製石刻景定元年更學令御札朕於菁峩樂育之仁豊培滋乆登膴仕著休聲多由此途出數年以前間有聚為朋曹堕窳敗業而不能退然自充者豈作人之道猶有闕乎時學官以更定學法來上稍示規益本為一二蹈於匪彛者設也邇來涵濡徳義莫不自待以厚朕甚嘉之前是所定之法獨於進取一途尚狹未足以快飛躍之適今從其厚用著為令爾諸生其益務自修以副朕崇尚作成之美意敬聼毋忽國子祭酒臣江萬里恭䟦臣聞天地之於植物栽者培之自拱把合抱以至于聳壑昻霄無不能盡其材者此天地成物也本朝列聖開設雍庠士出此途蔚為時棟光明碩大與國無窮所用得于所飬如鶴鳴子和聲與嚮隨設遇緩急之機否臧之决油然忠愛不能自已于中而平時自淑身心不使有一毫出于規矩尺度之外教飬之功于斯為盛恭惟皇帝陛下以造化施生之仁續祖宗新美之澤祥風時雨披拂㴠濡與舜帝之欲並生文王之有徳有造壹是隆厚肆念我多士比年體承愛教隆指重厚自将宜有以崇而厲之奎札天頒著為功令廣升秀以示旌淑塗轍夷易安安而進可坐銷于躁兢用養成于貴肆蘄我多士亦孔之厚臣夙列佩衿兹叨領䄂大懼弗克奉宣謹帥其属拜手稽首紬繹帝訓而颺言曰乾坤宗子視均氣同體之秀即其家之秀子弟不啻琪林珍木欲其茁于庭階精神風采維喬維條所以瑞我家而昌氣脉也既銷其蠧加溉其根愛䕶㴠飬一稱乾坤崇廣之造此本朝所以収人物之報者固有相之道焉金玉厥躬不忍怙家庭之寛厚而自律愈嚴洋洋飛躍之中齋栗一心如臨父母此弟子所以答揚慈訓而報萬分也同志勉之惟謹敬勒精琰恭書下方御書朱熹白鹿洞學規父子有親學規不見録國子祭酒臣張磻恭䟦臣等恭惟皇帝陛下天資超古聖學探㣲事闗人倫之常首務修飭道出聖傳之正必示表章乃淳祐七禩三月丙辰内出御書白鹿書堂掲示賜國子監首之以五教之目而所以學之之序其别亦有五継之以篤行之事而所以行之之要其别則有三宸章鈎畫之妙爛乎下餙光儒標次之㫖闡之益明臣等拜手端誦作而歎曰皇乎哉上聖扶植綱常開廸後學之丕規也載惟白鹿洞之始有聞于皇朝也驛賜九經昉于太平興國先聖塑像昉于咸平書堂得名昉于皇祐前之明起後之孫琛或侈旌嘉儒學之寵或擅士子來逰之盛然學之端緒方啟道之本體未彰迨先儒朱熹闡教是堂其學務于明誠兩進敬義偕立于是研覃道體緝叙聖言要使學者講明義理先于修其身用以推諸人彚列臚分関抽鑰啟聖賢誨人之方至是乃底明偹無復遺憾然條貫雖竟統會固存旌别宣明不能無待陛下探賾道妙垂意化原知斯人逸居無教雖堯舜不能不憂知窮理数條乃孔子所傳格物致知之心法知篤行三要皆聖賢教人以擇善固執修身治人之大端舉其綱而目張振其領而裘挈是庸顕設藩餙于以風動教化以其間迹於偏方者施之于同軌同文之逺以其在下而教明者極之於在上而道行然則是學也熈陵發之真皇仁祖昌之而篤近舉逺致廣大而盡精㣲則不得不歸之陛下也昔漢有見善明用心剛如董仲舒能立正誼明道之言武帝幸與同時乃不能表其言而顕其人雖復黜百家尊孔氏而綱要之未明政亦奚補曷若陛下今日之舉教詔以示之指歸挈提而導之從入規範昭掲體用具明于作君作師之道真不可尚已臣等抃蹈欣賛之餘謹請勒之翠珉期與多士服膺請事以欽承聖天子尊徳樂道垂世立教之意監學官題名在堂之左右長樂劉季裴記餘杭虞似良書乾道二年夏四月監學題名成始題名也兩學俱𨽻于監祭酒秩四品司業六品常擇威重有行實者為之掌凡監學之教令與其政治其属博士專掌鼓箧孫業之事國之公卿大夫士之子弟與夫四方之選士學焉正録佐博士以施教典稽其功緒紏其徳行考其才藝書其如法者識其不如法者以逹于愽士愽士以聞于祭酒司業而升黜之故均謂之學官監有丞以治簿書令財賦其次有簿凡監之小事聼焉此其大畧也今夫有職必有事由國子監而上秩髙而選精則職事愈繁故語職優事簡徃徃必反曰學官學官無他吏責惟專以傳道授業論古今成敗考諸儒同異為事群居侃侃如在洙泗此固可樂也季裴職在東膠敢志其所始太學成于紹興十三年武學成于二十六年凡任祭酒者八人司業二十人國子太學武學博士合四十有六人丞十有八人簿十六人正録武學諭五十四人先是筦書庫為者凡十人今不復置皆以年月先後為之序庻來者得以次列云學官位在崇化堂之後東西為祭酒司業位兩廡則國子太武學愽士國子太學正録武諭位凡十登科題名列於楹間國子祭酒髙文虎記進士髙宗皇帝受天葆命系隆我宋乾旋雷動駐蹕東南維建隆肇基八聖緜統凡所以儲大器業振動豪英昌乎登用盛乎維持者率根之庠校精于教育首詔行在所興太御學選師儒置弟子員御名飭鑾輿謁先聖幸兩齋崇化堂命學官講周易㤗卦于是天下學者靡然向風明聖相承授受一道関諸訓廸誠有加焉昔者建武中天下人心戴漢思有以濟大業而系堯緒者皆以為投戈講藝臨雍授經之自本朝之盛眎漢東郡何愧而東都士多至人三萬范曄所傳若岑晊何顒符融井丹服䖍髙彪梁鴻孔僖以下僅十餘人記録之闕繋乎體者如此由紹興以來五六十年士之入太學以萬計而擢科第者千有七百八十六人如雲如川方興未艾勿有栞勒以詔來者寜止如漢史氏闕然莫訂抑何以表章列聖廣延衆俊興建太平之明騐大效乃倣蜀左右生故事為太學登科記此國子録呉君仁傑之志也文虎以二年元日䝉聖恩拜少司成越二十五日詔叅詳南宫時預典貢舉以下奉詔若曰期得器識渾厚議論正平之士副異時公卿大夫選惟頼恊意悉心精加衡鑑網羅實才毋使浮夸輕躁者冐吾名器文虎竊自思念學校之養士科舉之得人與立國之道表裏經緯至于刋諸聖謨形之戒飭則士亦盍自省矣盖國家閒暇廣於緝熈時方艱難勇于經濟此學之所由興而士當侈于歸美故荒嬉精勤之戒韓愈以誨諸生以公滅私之言周官以告多士今位乎監學𨽻于齋舍者相與守此則題名之作豈特美人才衆多而已詩曰豊水有芑武王豈不仕詒厥孫謀以燕翼子凡我有志尚其勉之慶元三年二月二十三日國子録呉仁傑記釋褐國家取士之制其選之愈艱則所得愈精舉今所遴選而甚重者惟大科異等若制舉若宏博之科若南宮進士之首冠與夫臚句所傳上之三人者是已神宗皇帝設三舍以造士于是又有三舍生優選出焉非長才秀民國士天下士不在此選故一旦嶄然自奮于塵滓奥渫之中其道徳之章聞聲望之振起莫不光明雋偉表表人上其仕也至于横翔㨗出馳清騖華都卿相之位極文儒之選而天下不以為過惟其素所藴蓄與其所自植立者有以大鎮服之也凡三嵗大比㧞進士之尤者大都不過四人宏博之科多不過五人雖間缺不取亦時時有之惟制舉不常有而上舍優選亦不常有方其徠天下之英而群試之有司求十百于千萬然後得入太學乂謹察其行藝之可者而陞之必内舍最優之人中上舍而占優等然後得為兩優其躋扳分寸累而弗隊者不一二敗于垂成者皆是也盖自元豊至元祐始得一人焉曰林自又自元祐至崇寜得一人焉曰張相按元豊初令上舍生上等中選者取㫖推恩不與他等故或以階眡匠監丞而参賔幕或以初品京秩而官學省皆異恩也雖方正茂異反不及焉所以重天子之學抑以其行藝之素月積季累選之艱得之精而然與夫國之養士猶山之養材也楩楠豫章干雲之竒材自拱把而至于尋抱其養之也至矣其成之也不易則其待之也不輕恩施之美固其所也乾道紀元之三年嵗在豕韋太學之立兩星終矣紹興天子駿惠先烈作成人才以遺聖子神孫百年之用者其效始見是嵗太學以上舍優選聞有㫖推恩如崇寜二年故事祭酒博士而下即崇化堂集諸生冠帯立東西序奉詔黄賜之釋褐榗笏稽首謝恩于庭下一時歆艶其榮由是兩學之士益淬厲修飭以趨上意纔八置閏而踵相躡者七人得士之盛前此未有可書也已四明髙公以西垣北闔之重下兼大司成既合進士上舍科級題明鑱之石謂兩優之選科級之巨擘也復科别其人而碑之屢書特書以侈一時之盛且以厲學者命仁傑識其事以不能辭公不可則退而執筆紀其大較如此慶元三年四月五日前廡舉録直學位各二學諭位八教諭位一國子祭酒鄭起潜記題名網必有綱絲必有紀太學群天下之英而前廊帥之亦綱紀之意也舉録二員與正録通治其事學諭以下𨽻焉學諭八員敷經訓命課題長諭以下𨽻焉諸生書行藝于籍季終以其可選者考于學諭又十日考于舉録而後上于博士直學二員司出入之禁周知來學之数而察其踰矩者十五以下入小學則置教諭一員以教之斯其大凡也建炎駐蹕呉會紹興十三年立太學今一百有二年為舉録者一百一十有四人學諭四百九十有八人直學一百四十有九人教諭四十有八人登巍科都顕位前後相望事業偉然而碑題未立來者無所考乃命舉録劉實甫范處義鳩工礱石萃其名氏州里序其後先大書深刻列于崇化堂之左夫自補弟子員而陛舍級陞前廊渉歴深矣必業精行成資望俱重始稱其職近制考其滿嵗者上上部録其年勞所以勸也未仕而不茍他日之事業占焉継自今居此位者于前有光是所望也淳祐四年甲辰嵗春正月既望齋舍始建學為齋十曰服膺禔身習是守約存心允蹈養正持志率履誠意今改明善續増七齋曰觀化貫道務本果行崇信今改篤信時中循理皆米友仁書扁紹興二十七年周綰為祭酒又請増置三齋曰節性經徳立禮張孝祥書扁齋各有樓掲題名於東西壁㕔之左右為東西序對列位次後為爐亭又各有亭宇掲以嘉名服膺得善仰髙登瀛禔身猗緑斗光緑光習是龍首桂榮雲津守約雲端存心斗魁延桂允蹈叢桂養正龍津髙宗皇帝幸學之明日降詔曰朕以兵革之後創建太學特為臨幸至飬正持志二齋詳觀諸生硯席之㳺誠嘉多士文學之集所幸二齋長諭已免觧人特與免省未免觧人與免觧其學生並與免将來文觧一次持志雲堦幸學詔書同飬正中大夫周直方記齋壁宋受天命五緯躔奎人文化成國以儒壽帝學更建時惟中興大輅鳴鑾聖皇涖止乃睠持志賁如濡如豊芑之仁㴠育数世弼從魁傑聲光爀然噫盛矣夫今左丞相鄭公以至公大忠冠位台宰盖兼有甘盤傳説之美端平相業厥惟𢡟哉舍選收科寔于此焉出緑幕舊逰九鼎大吕重矣百年壁記石乆而泐爰用改為以詔來者詩不云乎髙山仰止景行行止凡我同志載瞻載咏毋但詡明經之青紫侈稽古之印綬焜燿時人之耳目而已其益𢎞道徳充氣節學顔之學志伊之志以遡公之盛心趾美嗣芳如川方至大書屡書将不一書兹固邦家之光非直齋序之榮也尚克勉旃端平二年十月旦節性龍光衆緑率履龍魁㤗軒和至慈湖楊簡書和至率履有重屋銘曰和至履行也行乎世交際應酬相親相敬可謂和已易曰百姓日用而不知孔子語子思曰心之精神是為聖孟子曰仁人心也和者心之精神日用而不自知猗歟至矣精神日用無體而不可見猗歟至矣同舍每晨鳴版會揖至矣相與笑談不勉不思至矣易曰履和而至灼然灼然必有事於芸苖毋尚疑于聖訓孔子曰改而止改過即止無復他為用力于仁改過而已改過日精神之妙猗歟至矣明善雲章栢臺文光經徳梯雲魁龍紹興中京都相傳有夢經徳生員為省試第一者已而増創三齋乾道丙戍何澹遂由經德冠南宫有詩刻石紀其事又為書其齋顔詩曰太學中興七十年續添經徳夢先傳不才如我慙休應革故從新定勝前倪思和經徳名齋乆歴年名齋之意至今傳不回非以干榮祿故使瞻之在目前恢展規模勝昔年延恩感夢作詩傳大書三字髙題榜氣象更新不類前膠庠重建中興年英俊如林以道傳舍選褎然優占上倫魁行矣競光前循理雲升登龍參前慈湖楊簡書參前子張問行孔子告以言忠信行篤敬立則見其參于前在輿則見其倚于衡夫所見者何也言而忠信實直無他無意也無説也行篤敬無敢慢敬而已矣無意也無説也此無意無説之妙虚明純白曽子曰皜皜即文王不識不知即孔子曰吾有知乎哉無知也即孔子曰純徳孔明易曰光大曰輝光曰光明書亦曰光詩曰學有緝熈于光明皆謂如日月之光無思無為而無所不照知所謂見者見此也此見非思非為動意焉則支則離則放逸則怠荒則偽則欺不動乎意則日用乎庸以此事親事親純白以此事君事君純白以此臨民以此應變無所不純白利害愈明是非愈白大哉聖言簡深感聖人所以指誨學者如此切的著明故奉同舍之命而書嘉定二年壮月時中聚星番易程宏圖記大魁光齋擢第而燕同舍生曰光齋齋之魁天下士者踵為之又光之尤也中興建學垂四十年由時中仕者幾二百人而魁天下士者于今有四是日設席于風雲慶會之閣三大魁實與焉凡舊逰之官于中都者二法從衆宰士太史而下惠然偕徠道義相㤀序以齒不以官樽爼肆陳獻酬有度歡乎其意親燦乎其文接於穆乎中和之至也矧皆抱負挺特唯逺業是期固将先後為時用至若江夏父子椿桂同芳王呉弟兄棣蕚輝映一時榮之酒且酣咸謂兹盛事属宏圖識之因為賦曰盛燕開同舍新榮慶掞庭紫荷聨從槖黄甲聚魁星鍾鼎心俱壮金蘭眼倍青舉杯相属意接武上青冥時淳熈八年夏四月十日三大魁王佐詹騤黄由餘姓名不悉載姑蘇黄由記聚星紹興四年中秋前一日李君琪夢開與同舍訪由云琪適長時中因其齋之前間池為臺名曰聚星願書其額并為識之由問所以名之之因則曰中興置學以來士之耀斯世者相踵是齋又屡魁多士擢辛丑第在朝諸公相與賦詩嘗有黄甲聚魁星之句今扁之爐亭可攷故取以名吾臺偹美前勉後進也由復之曰昔人以賢人君子比於列星謂其徳性清明行實光大耳國家教育之本意固将俾講繹理義變移氣質剔昏立懦𢡟既厥實匪但欲其釣聲問躐科級而已今夫人之貴與天地並然自動静相生五氣順布剛柔参差美惡不齊儻稟其偏自克弗果亂常舛次終身病焉誠能循本反初一出于正則三光五岳之全氣皆􅊀乎我英華煒然而為文中和粹然而為徳開濟生民澤及天下慈祥盎然而為福此聚星所由以名也吾同舍皆四方俊秀而六經孔孟之訓以及聖朝諸儒之所發揮本末具舉炳炳垂世朝夕于斯是究是行意欲少適則徜徉乎臺之上或逰或休或黙或語澡滌物累㴠育善端風雲之趣千古同意異時出為世用歴奎壁騎箕尾左右天極使人望而知敬不益光于前乎皆曰敢不勉于是次其語鑱于石篤信龍斗桂臺状元宰相二亭果行聨魁龍角務本彚征貫道參首巖瞻唯軒龍門觀化桂臺拱奎倫魁宰輔二亭莆田鄭玠記宰輔倫魁題名於壁宰輔題名自廣崔公始公為觀化諸生有老奚夢龍㳺户外蜿蜒罌水中旦視則公盥焉遂朝夕謹奉之至今猶能傳道舊事者端平三年九月乙邜以資政殿學士即家拜右丞相制下百官相慶于廷士相慶于學天子手書趣上道辭勅中使乗驛馳四千里起之辭明年出尚書郎懐他郡印綬徃諭指又辭盖公于是年八十矣方公出藩入從事茂陵三十年厚徳雅量聞于天下上盖不識何如状也退處南海無齊阿之容絶交中朝無金張之助然自缺寳缺紹以至于今十五年間詔書傍午殆温國居洛之所未見公其有以過人歟昔叡聖武公之相也年且耄矣國人為之賦淇奥傳大學者曰有斐君子如切如瑳道學也如琢如磨自修也又曰有斐君子終不可諠兮道盛徳至善民之不能忘也學之不講徳之不修而欲人之不能忘烏乎悕矣今天下之望必曰崔公上獲于君下信于民然則見公之所獲所信終焉不可忘者夫豈徒哉夫豈徒哉吾䣊郡居而彚處朝師傳而暮友習切之瑳之琢之磨之毋以校豪杪獵聲稱為也于是相率掲公之名既為吾黨光又為吾黨勸嘉熈三年七月倫魁題名記觀化之盛也昔在東都嘗通齋登進士第人目之曰渾化盖科目之盛尚矣錢唐建學百餘年其擅魁壘則集英有喬禮部有陳以兩優觧進士褐有顔有何有葉又盛矣唐貴進士本朝益加貴焉集英親䇿上三人最貴太學以兩優選亦貴故事新進士賜第賛者以禮部進士見稍退黄繖臨軒二府大臣奉文卷几上天子親第其文上句下臚衆中問姓名衛兵掖至龍墀前第一人獨班謝其二三人並班謝還就廊廡賦詩同年生已改眎矣盖唱第之榮也中興初三舍仍舊法校試再登優者官以承務郎職以學正録淳熈釐革猶用第二人例補授觧褐之旦祭酒率博士以下序立新進士衣故褐徐出諸生中拜勅崇化堂下還即笏綬與祭酒博士列拜堂上亦觧褐之榮也自秀選俊造之論廢所謂進士者藝之末也雖累千萬人得之者猶藝也然而上之人固榮之貴之非以榮貴其人也皆以共明命而扶民極也詩曰古之人無斁譽髦斯士又曰令聞令望藹藹王多吉士髦之譽吉之聞望非科目之名也吾聞之千人之秀曰英萬人之英曰俊吾願吾䣊嘗以英者俊者自命勿徒以貴者榮者自喜也故併書之列于宰輔題名之右同日記咸淳三年葉夢鼎拜右丞相齋舍始創亭立碑前後記略同不俱載立禮環緑登津學録喬夙記修齋今天子既新監學諸齋營建期副上意無敢鹵莽立禮處西偏地獨敝宜闢長括蒼余自諭三山鄭石領公帑自募工長賢知諭能遜厥成諭乃凝神静慮晝夜規畫操丈尺忖豪釐指授匠者錢仰所給無増而工疑數倍向之磗者易以石向之壁者易以版忩塞者通渠淤者决位序厨湢開豁爽塏東忩後為航齋循欄接武斯湏身在百尺楼上湖山地湧圖書天開一覧無際下則爐亭方廣周宻横斜踈影妙入生綃錦褥細氈鋪設左右摩光黟黒其澤可鑑夜坐燈燭交輝瓶爐香滿郁然潭府琴書詩酒之娯非移於宛轉蹁躚者所可比擬也况乃所頼而用若几案若床第若食飲器皿靡不堅好又臺榭新成花木繁植齋旁舊有亭池築之益髙緑竹環焉鑿之益深清泉冽焉池旁古桞披拂雲霧樓臺側畔楊花過正諸生春風得意秋也而立禮尤宜焉或者議其安富已甚非士之常嗟夫斯天子之學也士幸而偹數生員修身厲行登巍科躋美仕異時得時行道勲塞宇宙與國同休雖周公不能辭其富何必衡門之下頺簷舞月破牗吟風相與叙述無聊寒苦之状然後為得耶余嘉長之賢諭之能共成厥功故為記其大畧若夫事關祖宗積累之久聖天子纂承之勤教飬化育之仁偹見于剏造之盛者其本末嵗時自有名公鉅儒擅當代文筆者在余不敢僣紹定三年十月后土氏之神廟在學東南之隅端平二年爵通侯賜廟額淳祐六年再加封賛書有曰相傳中興名将其英靈未冺而肸蠁甚著盖其故居也理或然歟自是遂明指神為岳忠武王景定二年從監學之請超封王爵即其舊謚易武為文勅曰學以明人倫忠於君者百行之本武必有文偹沒為神者千嵗之英緬懐中興名将之居隂相首善京師之地申以顯號掦其烈光太學土地忠顯廟神正顯昭徳文忠英濟侯氣塞天地之間身為社稷之衛有功不伐卓然禮樂謀帥之風之死靡他凛若春秋復讎之義此維與宅以赫厥靈遡其生之自來㩜爾士之忱龥冠帯不左祍者繋誰之力干羽在東序則遐想其人風化所關肸蠁如在僅䟽侯爵未正王封况鄂國已極於隆名宜廟食増崇於命祀英烈言言可畏而仰以迄於今辟雍湯湯永觀厥成有相之道尚福兹土式勸為臣仍改廟額曰忠顯神之父母妻子下逮将佐皆有命秩華以徽號武學在前洋街太學之東理宗皇帝御書扁紹興十六年宣諭宰執令有司討論祖宗典故仍詔臨安府修建武學創武成王殿祀太公曰昭烈武成王以留侯張良配諸名将從祀用國子司業陳誠之請依太學例試補然教飬之法未備也二十六年又令禮兵部措置條具始立養士額置愽士諭各一博以文臣或武舉髙選諭以武舉人淳熈嘉㤗幸太學謁先聖畢就謁武成王行肅揖之禮立武堂理宗皇帝御書國子祭酒袁爕記登科題名於皇我國家網羅俊彦不局一途凡儒學之士既教之養之而士之有武勇者亦封殖是務武學之設自仁皇始列聖因之教育不廢髙宗跓蹕錢塘念舊典之不可缺也乃紹興十有六年申敕攸司復還偉觀于時南北既通和矣偃兵息民無復餘事而猶垂意于此足以仰見聖哲之心居安慮危先事為偹豈顓以和好為足恃哉夫士不素養無以應猝而所謂士者非徒武勇之謂古人有言所貴于勇敢者貴其敢行禮義也用之于戰勝則無敵用之于禮義則順治成周盛時為将皆命卿分職率属臨敵制勝同是人也武勇者乎君子者乎仲由言可使有勇必又曰且知方也越王勾踐有君子六千人建武中興祭遵為将雖在軍旅不忘爼豆呂䝉就學之後魯肅偉其議論郭汾陽功盖一世實由武舉發身近世狄武㐮最善用兵乃于左氏春秋得之是故為将而不知古今一夫之勇耳自學之復餘七十年嚴于騎射之試所以選㧞竒才也而必講之以師友訓之以徳義覧觀羣書古人是式抑又所以培植其本根焉或由舍選升或以科舉進炳乎相輝可謂盛矣裒其名氏勒諸金石植于學宫而傳之久逺非徒設也其間卓然奮發以功業自表見者足以起人之敬慕厥或湮沒而無傳與草木俱腐者人亦必賤惡之孔子曰君子疾沒世而名不稱焉非貪名也名之不掦由夫實之不至是則可憂也魯穆叔曰太上有立徳其次有立功其次有立言雖乆不廢此之謂不朽夫惟不朽是圖與夫規規目前者大有間矣見賢而思齊見不賢而内自省聖門所以垂教也覧者詳之嘉定十年八月朔日博士嚴昌宗記前廊題名文武一道其來尚矣鈆槧劔楯之分起于近代我國家之建右學其将追復古制而同出于一代之意歟右學建自紹興之丙寅士之被教飬者幾七十年矣六齋之俊升之前廊由前廊而觧褐掇巍科登膴仕者袂相属也顧惟題名未立而嵗月浸逺仕途後先漸不可考于是前廊劉必萬葉蓀邢萬全相與謀而立石焉属愚為之序愚聞之曰豊水有芑武王豈不仕貽厥孫謀以燕翼子數世之仁洪惟紹興之宏規淳熈紹熈之繼述皇上之丕承並用之術尤急先務則七十年來之所教養者至是益光明而盛大矣數世之仁此其騐歟是宜三君之有請而題名之不可以不立也愚舊為掌儀諸生今又偹員博士請固不獲辭也爰為之書嘉定壬申八月望齋舍六成龍首貴謀森緑輔文桂雲中吉叢桂經逺龍津閲禮化龍咸淳臨安志卷十一
