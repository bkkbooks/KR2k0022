body:
  text: 咸淳臨安志卷十二宋潜說友撰行在所録貢院禮部貢院在觀橋西中興初詔諸郡貢士類試於各路轉運所在州紹興五年六月十五日始集於大宗伯其貢院建置嵗月未有所考十年始定取士年分詔略曰永惟三嵗興賢之制肇自治平爰闕典頃緣多事洊歷試期致取士之年屬當宗祀宜從革正用復故常可紹興十年諸州依條發解將省殿試展一年向後科場自十二年省試為凖按繫年録紹興九年十二月御史中丞廖剛言國朝三嵗一舉士率用今年大禮明年科場又明年省試誠經逺之計今明年當試進士復與大禮相妨及是遂用其請今是年貢士就十二年省殿試至十四年諸州發解如故三年一下詔自是遂為定制此詔雖不獨繫行在所以其為駐蹕後三年取士之始故載於此㕔之兩廂列進士題名所載皆目今石刻存者堂上列御札御製石刻省試賜知貢舉御札知貢舉各有恭跋不具録朕既羣天下之秀彥試於春官期得器識偉厚議論正平之士副異時公卿大夫選屬嬰哀疚不能親䇿於廷惟賴卿輩協意悉心精加衡鑑網羅實才毋使浮夸輕躁者冒吾名器朕則汝嘉右慶元二年付葉翥已下省試降御札自此始是年未臨軒故加戒飭後遂以為常朕永惟治要作新人才今羅天下士試之禮闈又將拔其尤異親䇿於廷待遇顧弗至歟而習尚未淑論議多渝安固陋者莫追於古風事浮靡者寧資於時用豈朕求才之意卿輩典試文衡其既乃心公乃聽審於搜採俾得為文爾雅持論從厚之士極一時選厥功茂矣右慶元五年付黃由已下朕惟古鄉舉里選之法弊而後世始設科目延之英彥靡之以好爵共興治功朕踐祚以來再取士矣今雖嬛然在疚復遴選侍從臺省之臣典司文枋士有抱負彪為詞采必刋去浮華體要為尚基異時之實用傳不云乎言心聲也儻或外是抑曷敢焉卿輩其求所以得人而稱朕意者則惟汝嘉右嘉泰二年付木待問已下更化之始屬當多士來試春官去取之間趨嚮所繫卿等宜審加考閲擇其文體醇正議論精確者置於前列其或因問獻言實有可用雖涉訐直勿以為諱庸副招延俊乂共起治功之意朕將親䇿於廷而官使之右嘉定元年付樓鑰已下國家三嵗取士試於南宫蓋公卿大夫由此其選事至重也朕屬在哀疚未遑親策爰咨近列往司衡鑑卿等宜協心盡慮精加考擇夫文辭浮靡者必非偉厚之器議論詭激者必無正平之用去取之際其務審此至若場屋私弊售僞亂真成法具存所當申飭毋使僥幸者濫進而忠朴者見遺庶幾今日設科求賢之意獲收異時分職為民之實右寶慶二年付程珌已下朕側席英俊共成治功大廷䇿士始於今嵗既合郡國之貢試之禮闈將拔其尤以進俾奏對而官使之選擇去取之端可不謹歟夫取士之道器識為先明試以言自古不廢况祖宗以科目得人類多忠實重厚之士皆因其文以占之卿等典司文衡其精乃鑑裁毋尚浮靡毋棄朴直毋拘已見毋徇時習務柬實材以副朕意右紹定二年付王暨以下朕即政以來試士南宫者三矣中間親䇿於廷見謂得士今四方之彥三學之雋雲蒸霧集咸欲各售所學以希官使則夫精鑒裁示趨向俾知科舉取人不但為爵祿之階而實為國家之計先器識後詞藻務忠實斥浮僞豈非取士之權衡得人之徑術乎卿等固所深知更希加勉以副眷倚右紹定五年付陳貴誼已下國家得士之盛昉於貢舉法未始易也而乏才於今意論選之地職考察者寖失其指歟朕方躬親政理寤寐英俊妙柬儒碩董司文衡將以新美天下之士其崇雅黜浮參觀器識理致必遡其淵源毋惑於傅會詞章必主於渾厚毋喜其綴緝絶私臆合衆見庶幾實才罔致遺軼使豐水有芑復還先朝之舊則惟爾嘉其殫厥心以副朕意右端平二年付真德秀以下朕虛心籲俊共圖治功五詔攸司加意貢舉方時多故中外乏材遴柬鴻碩典司文柄其公選精擇先器識而後詞采經術惟純正是尚詞章惟典麗是崇議論貴於可行籌䇿期於有用無取綴緝無徇阿諛庶得忠實英特之才副朕側席之意右嘉熙二年付游似以下朕以眇躬纂紹鴻業屬時多故深懼無以拯危難致安强故悉取內外修攘之事疇咨多士冀陳忠益禆補闕遺其有識治憂時敢言無隱者乃朕所欲急聞卿等宜加精選置之前列使真材得以自見士氣可伸以副朕親䇿之意右嘉熙二年付殿試詳定官趙與歡等朕惟我朝取唐諸科併歸進士名卿碩輔皆繇此途其選重矣肆朕纂承六開貢舉訓飭期望每單厥心比年人情習玩法制寖弛或徇勢利以妨寒畯或縱欺幸以遺真才將何以致棫朴官人之盛爰簡儒彥俾典文衡凡爾攸司宜鑒舊弊一取一舍惟公惟明經學欲其深醇詞章欲其典則言惟合理䇿必濟時毋以穿鑿綴緝為能毋以浮薄險怪為尚參稽互考優劣自分庶使賢雋畢登以副朕期美治功之意右淳祐元年付杜範以下進士設科我朝得人為盛濟艱難致隆平皆此途出比年中外多事每有乏才之歎豈有司衡鑑浸不如昔歟朕妙簡儒英俾司文柄冀得俊髦以亮天功學術必究其淵源毋以涉獵為能詞章必主於典實毋以浮靡為尚毋滋蹈襲毋取雷同昔人典章多能以程文占器識卿等其精意考拔以副朕側席之意右淳祐四年付金淵以下朕惟祖宗盛時名公卿相望厥亦惟科目是進肆朕臨御七選士於南宫矣法一是而得人歉焉豈世果乏材抑有司奉吾詔不勤也矧今政瑟既更賢路加闢爰命爾公於文衡其精鑒裁示趨向因文藝以觀器識崇雅正而黜浮誕俾國家得士之用必如榖粟之足以養人則豫一人汝嘉右淳祐七年付吳潜已下朕惟治古敷納以言用熙庶績漢唐設科取士類多得人而本朝為盛議論根乎六經職業粹於羣下釀化懿綱賴有與立比年士習風靡文氣日醨豈世道所趨而然將選舉有未至也卿等老於文學秉司衡鑒以賦而得仲淹以論而拔蘇軾顧不偉歟貢舉成法最為嚴重宜加申警以取實才右淳祐十年付董槐以下朕臨御以來十詔賔興公卿大夫繇此途出比年經術不窮指趣而惟牽合對偶詞章不本淵源而務雕琢刻削論䇿則非出胸臆而多用帖括斯文關世道消長顧念未有以作新之者卿等方提文衡各宜以對越為心以選擇真才為務去取之際崇雅黜浮使士習由此丕變焉昔仁宗嘉祐初命歐陽修知貢舉時進士文體大壞修乃悉取詞義近古者而險怪相髙者盡黜之文章自是變而復古卿等其勉之右寶祐元年付陸德輿已下朕取士於南宫十詔攸司而又有一於今矣然時艱未濟豈果乏才往往辨論多而建明少浮僞勝而真實希尚何望其庶績之凝也爰柬儒臣董司校藝爾其公而權衡明而鑒裁詞章造理者必有道之士議論可行者必通用之才辨雌霓之訛去師衆之鑿革崑體之異使英豪忠實之彥得以自見而無競維人則豫以懌右寶祐四年付陳顯已下朕惟四方無競維人得真儒則天下無敵本朝以文取士我武維揚能使西賊膽寒者實自科舉出也今賔興之詔凡幾而命之以官者又不知其幾矣然往往臨事乏使豈搜羅之未至歟抑鑒裁之未精歟抑亦去取之不公歟爰柬儒魁董司文柄議論端確者必忠於體國智略雄偉者必善於籌邊識明氣直者必負尊主庇民之學爾其決擇於是使經術詞章卓乎漢唐之上而得賢立太平之基庶幾開寶慶厯之治右開慶元年付張鎮已下朕試天下士於春官凡十有三詔矣名公卿項背相望胥此途出朕又表章儒先崇尚理學以薰陶之㴠養培埴之久莫非夙夜彊學以待問懷忠信以待舉力行以待取者比既謹簡名流執斯文之柄亦能極一時之選如世之所病勦句斷章以命題牽合破碎以害理與夫言理不切乎事論事不根於理皆必無之然不患有司之不明但患有司之不公明自公出公之至則明所從生茍至於公則真才實學當如燭照數計毫髮莫能遁言刈其楚庸玊於成斯為不負朕作人之意爾則命陸贄而可得韓愈命歐陽修而可致鞏軾則豫一人汝嘉右景定三年付楊棟已下國家試士於南宫名公巨卿胥此途出矧自先皇帝表章儒先崇尚正學涵養薰陶之日久矣濟濟多士皆先朝培植以遺我後人者也顧豫在疚未遑進之大庭而親䇿之爰柬儒彥俾司文衡載循申飭之舊章敢忘勉厲之至意惟平乃心惟竭乃力取士必公則可革場屋之私弊托才以實則毋徇詞藝之空文理趣必深長毋使浮靡獲售正氣必昌達毋使忠讜見遺登崇俊良新美初政於以續先朝敷遺之仁則豫汝嘉右咸淳元年付馬廷鸞已下國家右賢興治若古敷猷其取士存乎法所以取之存乎人焉比年以來法弊滋章舉場尤甚今朕將親䇿之始詳延四方之雋永惟我朝莫盛仁祖春官辨等並臻亷茂若時申飭深戒詭譎浮夸雕鐫靡曼之習用復溫純雅正務明先聖之道洋洋聖謨亦惟當時羣有司罔不欽承懋乃搜擇以成得人之盛肆朕謹柬儒彥職我選事庶幾乎仁祖之風烈夫士有所抱負多為虛僞者掩之往往挾其外假能誤衡文者是必題目勿拘於字句去取兼求於論䇿索諸理以觀其學求諸氣以覘其識毋靡浮毋穿鑿毋雷同尚黜乃私心厲而精鑒蒸我髦士進之大廷真才實能式副甄擢蓋天之所以遺朕無窮之用者在此咸體朕意匪曰具文右咸淳四年付雷宜中已下我朝取士之途惟進士一科得賔興遺意事莫重焉出為世用者臺萊把李之材相望也近年士風盛而古意衰習競浮華辭昧體要真才不足以勝謏聞雷同反得以蔽穎出朕甚非之嘗於秋賦澄其源且令覆引汰其謬能者信矣比復豫戒春闈以論䇿定去取經賦第髙下此則蘇軾所謂以文章言論䇿為有用意也兹柬儒彥參典文衡其既乃心其詳乃視毋茍且毋偏執所置先後惟其當不必以不自已出為嫌為國得人益綿豐芑之澤則豫一人以懌右咸淳七年付方逢辰已下聞喜宴賜進士詩振鷺飛翔集鳯庭詔開聞喜宴羣英已看射藝資能事更覺人材在作成冀野乍空千里雋桂林爭占一枝榮他年共慶功名遂莫負䕫龍致主聲右淳熙二年賜詹騤已下中興賜進士詩始此臨軒䇿士豈徒然嗣守丕基務得賢爾吐忠言攄素藴吾縻好爵副詳延愛君憂國毋終怠厚澤深仁賴廣宣錫宴瓊林修故事朕心期待見詩篇右紹熙元年賜余復以下三嵗賔興舉舊章郡儒濟濟競觀光廣求治道惟兼聽樂告嘉言已對揚力學見聞雖博洽處身操履貴端方益堅忠節承休德共贊熙朝庶事康右紹熙四年賜陳亮已下嗣履丕圖治孰先集英清曉盛臚傳謀詢闕政心猶渴喜聽忠規席欲前得路驌驦俱迅逸摩空鸞鵠共聮翩從今恪佩官針去志節毋令愧昔賢右慶元五年賜曽從龍已下側席求賢本至誠羣才濟濟盛簮纓昕庭初奏三千牘雲路俄開九萬程勵爾忠規先氣節助豫仁政必亷平一縻好爵須圖報莫負而今選擇精右開禧元年賜毛自知已下祖宗鴻業付冲人履薄臨深愧眇身不以崇髙矜主勢要將功用責儒臣憂民常軫焦勞念策士欣聞剴切陳好為明時攄素藴始終一節效忠純右嘉定四年賜趙建大已下圖回庶政敢遑安樂與豪英講治原親䇿匪徒循故事虛懷亟欲聽忠言已來多士朋龜助聊示嘉賔燕鹿恩好爵爾靡吾不靳所期直節始終存右嘉定七年賜袁甫已下涼德常思闕失聞宵衣二紀屢臨軒聖經廣大期精究治道恢張許共論振鷺充庭欣盛事嘉魚式燕示明恩朝家端欲收儒效不但虛懷樂讜言右嘉定十年賜吳潜已下宵旰圖回久厲精臨軒七詔䇿羣英聖賢言論期商𣙜內外規模賴講明汕汕嘉魚均樂事呦呦鳴鹿倚新聲髙官厚祿吾無靳共輔邦家致太平右嘉定十三年賜劉渭已下百王賔貢屬賢能事與天通詎聽輕親錫第名來讜直載頒嘉宴示恩榮風雲已際飛騰便梁棟猶須長養成人物盛多關世道尚堅學業究生平右嘉定十六年賜蔣重珍己下冲眇臨軒䇿士初力行古道顧何如欲知明德修身法不越中庸大學書答問八條嘉闡繹輸忠一念見勤劬兹辰宴衎昭恩意請事徽言共佐豫右紹定二年賜黃朴已下䇿士明廷急讜言眇豫涼菲再臨軒灼知治法繇經史嘉與羣英究本原名第一時傳盛事需筵肆秩示隆恩公卿任使從兹選要看他年氣節存右紹定五年賜徐元杰已下三御昕朝䇿俊民况今親政倍留神每嗟汚俗熏濡舊要仗諸賢灑濯新勿把詞華媒利祿須將位育入經綸今辰燕衎毋多贈二字忠清可立身右端平二年賜吳叔告已下漢文創意䇿羣賢正在臨朝十五年自愧眇冲勤慨慕故嘉忠讜樂詳延詞章已定觀英氣事業當無負奏篇明主良臣千載事緬思景行共齊肩右嘉熙二年賜周坦以下凉菲隂圖屢改元賔興六詔五臨軒厲精思振清明政䇿秀欣求讜直言致主莫如仁與義立身休計飽和溫時艱全藉賢經濟勉力應無負選掄右淳祐元年賜徐儼夫已下七開貢舉六臨軒圖濟時艱取直言訪問修攘兼內外敷陳議論有淵源學惟正大為標凖志在忠清是本根錫宴賜詩隆禮意勉旃事業報君恩右淳祐四年賜留夢炎已下我朝家法盛崇儒長養搜揚禮特殊匠圃棟梁收巨用涇舟維楫賴蒸徒俊髦喜見盈庭集忠鯁仍觀極意敷勉力各堅金石節再令復俗致唐虞右淳祐七年賜張淵微已下肆豫臨御九賔興藹藹盈庭俊乂升嘉賴讜言條八事欲乘景運進三登攄忠社稷惟名節濟用邦家必器能豐芑涵濡盛今日勉思德意共欽承右淳祐十年賜方逢辰已下粵從御㝢九臨軒嘉與英髦講治原問舉八條觀素藴對披羣䇿樂忠言事功匪在虛文勝名節須兼實用存精白一心期砥礪豈惟宴衎示榮恩右寶祐元年賜姚勉已下道久於心化未成樂聞爾士對延英誠惟不息其明著治豈多言在力行華國以文由造理事君務實勿沽名得賢功用真無敵能為皇家立太平右寶祐四年賜文天祥已下體天法祖肇新元喜聽羣英進讜言欲治欲齊心必正惟精惟一道常存得人信可宏功業彊國宜先護本根燕衎式頒期逺到好攄素藴整乾坤右開慶元年賜周震炎已下宴開聞喜萃儒冠朝野清平共解顔禮樂三千言中節聲詩十二律循環邦基允賴英賢力人極長扶天地間久逺功名方發軔相期精白古風還右景定三年賜方山京已下遹駿先猷在急賢廣庭親䇿昉今年精微歷歷參前聖忠讜洋洋著大篇天聖得人占上瑞太平宴士秩初筵緬懷豐芑闕澤久逺功名尚勉旃右咸淳四年賜陳文龍已下臨軒再䇿匪虛文要語詒謀敢弗遵昭假天心惟至敬封培邦本在深仁詳延喜見洋洋對來譽知為蹇蹇臣始進便當思逺到會須華國有儒珍右咸淳七年賜張振孫已下别試所在大理寺之西舊在貢院右専以待貢士之避親嫌者厥後繇監漕選皆試於此湫隘不足以容淳祐十二年有㫖令臨安府别創乃斥軍器所萬全指揮營空地為之其元址併入貢院闕神御殿昊天上帝皇地祗太祖皇帝太宗皇帝髙宗皇帝寧宗皇帝理宗皇帝神位皆御書各有龕帳又有從祀諸神位遇祭祀則遣官迎奉禮畢復其所有主管官一員以太史充有先朝所造渾儀一座附藏殿內測驗渾儀所臺上有渾儀下有土圭長一丈五尺表長八尺並准尺堂有刻漏惟土圭以石為之餘皆銅景定中創闕在通江橋北創始於紹興二十六年至紹定間重建殿曰神應奉醫師神應王以岐伯善濟公配講堂曰正紀皆理宗皇帝御書扁判局一教授四生員二百五十冠帶出入月書季考大略視學校齊舍八曰守一全沖精微立本慈幼致用深明稽疾提舉官一以內侍充堂後官院六房院在三橋西五房院在洪橋西國朝舊制三省有六房院樞密院有五房院主事以下集居其中所以絶請謁防泄漏紹興十五年二月詔臨安府兩浙運司依在京例修蓋兩院咸淳臨安志卷十二
