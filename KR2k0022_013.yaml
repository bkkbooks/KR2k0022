body:
  text: 咸淳臨安志卷十三宋潜說友撰行在所録宫觀太乙宫在新莊橋南始於太平興國初即京都祠五福太乙駐蹕以來嵗祀於惠照僧舍言者以為未稱請即行宫北隅擇爽塏地建祠詔禮寺討論權宜設位塑十神像按十神者曰五福君棊大遊小遊天一地一四神臣棊民棊直符凡行五宫四十五年一移所臨之地嵗稔無兵役紹興十七年遂命兩浙運司度地建宫十八年三月成凡一百七十四區殿門曰崇真大殿曰靈休挾殿曰瓊章寶室皇帝本命殿曰介福三清殿曰金闕寥陽齊殿曰齊明又用禮部侍郎沈該言國家乘火德王天下宜即道宫别立殿專奉火德配以閼伯祀以夏至遂又建殿曰明離扁皆髙宗皇帝御書兩廡繪三皇五帝日星嶽瀆九宫貴神等與從祀一百九十有五大略如太平興國舊制每祀用四立日設籩豆簠簋尊罍如上帝禮兩廡以次降殺車駕嘗親謁焉孝宗皇帝建本命殿曰崇禧乾道間以旱親禱即日雨淳熙四年重建道藏成御書瓊章寶藏以賜十三年又御書鐘樓曰瓊音之樓光宗皇帝改介福殿為崇福寧宗皇帝嘉定二年五福太乙自遼東來入吳越遂以冬至日迎奉從太史局之奏也又奏若時其五福不修德政則反為兵災理宗皇帝建長生殿以奉南極今上皇帝建通真殿以奉佑聖申祐殿以奉元命順福殿以奉皇太后元命而易長生之名曰延夀四殿皆御書臻福觀孝宗皇帝嚴事北斗乾道八年建殿以舊齊殿為之淳熙三年更建觀令附太乙宫名觀與殿皆曰璇璣咸淳三年改觀曰臻福殿曰北辰皆錫以御扁崇真觀在宫之南正堂丈室皆寧宗皇帝御書扁齊八曰觀妙潜心泰定集虛頥真集真洞微虛白武林亭在宫之後有小坡亭其上舊扁曰武林理宗皇帝御書二字以賜詳見虎林山西太乙宫在孤山淳祐十二年太史局奏太乙臨梁益請用天聖故事建西太乙宫有㫖從之考國朝會要天聖六年三月司厯者言五福太乙雍熙元年甲申入吳郡之㢲宫曰黃室宫太宗用楚芝蘭術建宫于國城東南館御靈真以集景貺及今四十五年太乙行次當入蜀郡之坤宫曰黃庭宫可于國城西南别建親宫以順方嚮于是詔擇八角鎮地建西太乙宫奉安十神尊像乃析延祥觀地為宫即凉堂建殿曰黃庭之殿其外為景福之門東有延祥之觀以備臨幸其外為福祥之門皆理宗皇帝御書凡宫之事視東太乙咸淳元年即德輝堂為殿奉今上皇帝元命明應堂奉夀和聖福皇太后元命陳朝檜舊有堂蘇軾嘗為僧志詮作詩以記今有小亭孝宗皇帝御書軾詩刻石亭上道人手種幾生前鶴骨龍姿尚宛然雙幹一先神物化九朝三見太平年忽驚華樹依巖出乞與佳名到處傳此柏未枯君記取灰心聊伴小乘禪瑪瑙坡地有瑪瑙石迎真之館理宗皇帝御書扁有齊二曰通真養素萬夀觀在親莊橋西紹興十七年建以奉皇帝元命殿東鄉挹生氣也為三室昊天曰太霄殿玉像聖祖曰寶慶殿金像長生帝曰長生殿神位西則皇帝元命殿曰純福後殿十有二楹為二十二室太祖曰會聖宫曰章武殿由太宗皇帝而右凡六廟皆一宮曰會聖由徽宗皇帝而右凡七廟皆二宫曰會聖曰應天𤣥運塑像皆以存舊京遺制前殿之東又有真宗皇帝室曰延聖章惠皇后曰廣愛溫成皇后曰寧華每四孟朝獻畢車駕由御圃詣諸殿行燒香禮景定二年改道院齊閣以奉夀和聖福皇太后元命晨華館在觀之東佑聖觀在興禮坊內孝宗皇帝舊邸紹興十六年以普安就外第時建明年誕生光宗皇帝乾道四年寧宗皇帝又開甲觀之祥時為恭邸淳熙三年詔改為道宫以奉真武紹定間重建門曰佑聖之觀殿曰祐聖之殿藏殿在西廡曰瓊章寶藏皆理宗皇帝御書嘗御製真武贊曰於赫真武𤣥聖均陽克相炎宋寵綏四方纍朝欽奉顯號徽章佑我宗社萬億無疆又御書黃庭經以賜皆刻之石後殿奉今上皇帝元命西為孝宗皇帝神御殿即明逺樓舊址也孝宗少年時嘗題杜甫詩句於壁云富貴必從勤苦得男兒須讀五車書併刻置殿上理宗皇帝又書全篇鋟於東官㕔之屏碧山學士焚銀魚白馬卻走深巖居古人已用三冬足年少今開萬卷餘晴雲滿户團傾蓋秋水浮階溜決渠富貴必從勤苦得男兒須讀五車書延真館在觀之西有道紀堂虛白齊開元宫在泰和坊內寧宗皇帝潜邸皇朝以火德王東都有開元陽德觀以奉熒惑嘉泰元年四月詔以嘉邸府改充開元宫儀制皆視佑聖觀殿曰明離祀以立夏四年又詔臨安府即殿之右别建閼伯宣明王殿以臣僚言閼伯已封王爵不當抑為真官侍立星像之側紹定間更創先是大宗正司分其地之半遂徙宗司他所悉以其址為宫端平初增創寧宗皇帝神御殿又有殿曰璇璣以奉北斗曰衍慶以奉真武扁皆理宗皇帝御書咸淳三年創順福之殿奉夀和聖福皇太后元命申祐之殿奉今上皇帝元命而易北斗殿之扁曰北辰之殿熙明殿奎畫陽德館在宫之北理宗皇帝御書扁龍翔宫在後市街理宗皇帝潜邸舊魏惠憲王府改為沂靖惠王府淳祐四年建道宫賜名龍翔以奉感生帝大門曰龍翔之宫中門曰昭符之闕殿曰正陽之殿仍下禮官討論祀典淳祐六年七月內禮寺官奏竊考周制禮昊天上帝大裘而冕祀五帝亦如之先儒六天之說蓋昉于此又禮曰王者禘其祖之所自出以其祖配之釋者謂先祈其所由生謂郊天祭地王者先祖皆感太微五帝之精以生鄭元據春秋緯說蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招矩黑則叶光紀此五帝之神名也皆用嵗正月郊祭之蓋特尊焉此感生帝之說所由起也謹按中興禮書紹興十八年十月一日臣僚言竊聞感生帝之說尚矣自周公制禮推稷祖以配天故經曰郊祀后稷以配天鄭康成以謂祀感生而以后稷配其說若曰天之五帝遞王四時王者之興必感其一以生故于夏正之月祭所生帝于南郊而以祖配之周運木德而感于靈威仰乃尊祖后稷以配蒼龍之精後世以周祀感生帝蒼籙延長子孫有則有之咏卜世過三十之期皆配天之效也我朝火德題運赤熛怒實為感生帝祖宗以來崇奉尤謹祥符大觀或至親祠故猗蘭孕秀子孫衆多龜鼎之祚與天無極欲望明詔有司升為上祀于是禮官乞如所請遇上辛日祀感生帝並依國朝舊制大祀禮例差三獻官等行禮備牲牢禮料用十二籩豆設祭歌宫架樂舞受誓戒于望祭齊宫行事內牲牢依見今祀天地禮例用羊豕有詔從之竊惟聖朝火德開統世祀感生實奉赤帝其來已久見今正月上辛差官望祭已係大祀之數所有遺像服色制度有靈休殿廡下畫像可遵今朝廷既别立間館專奉靈斿若用道家之言則有齊醮之法若領于祠官則當依見行禮例施行朝議以為龍翔宫崇奉感生帝既屬羽流合用齊醮之法其正月上辛日望祭自如其舊㫖從之宫門之左曰福慶殿以待車駕欵謁咸淳二年改為理宗皇帝神御殿即宫禁迎玉殿聖像奉安其中正陽之後為醮殿舊膺慶殿南真館在宫之西門曰南真之館中門曰啓晨之門正殿曰三境儲祥以奉三清後殿曰申祐以奉今上皇帝元命又西曰順福殿以奉夀和聖福皇太后元命又有奉南斗曰夀元之殿十一曜曰景緯之殿鐘樓曰和應之樓經樓曰凝真之章藏殿曰琅函寶藏小位次以備車駕燕坐曰仙源羽士之室曰澄虛提㸃官之舍曰泉石自宫門而次今揭扁十有四皆今上皇帝御書館有齊曰履和頤正全真宗陽宫在三聖廟橋東紹興間望風者以其地有鬱葱之祥已而前後環建王邸即紹開兩朝復為今上皇帝育聖之所天瑞地符益大章顯咸淳四年四月詔築宫賜名宗陽門曰宗陽之宫曰開明之門中為無極妙道之殿以奉三清東為順福之殿以奉夀和聖福皇太后元命三清之後為虛皇之殿直北為門曰真應之門中為育瑞之殿以奉感生帝咸淳七年二月芝生殿之右楹本宫圖以進有㫖草木之瑞莫如禾苗芝固瑞矣非所尚也後為申祐之殿以奉今上皇帝元命又為通真之殿以奉祐聖自開明以內左則玊籟之樓景緯之殿夀元之殿右則蘂簡之樓瓊章寶書北辰之殿規制大抵視龍翔宫常以原饗回蹕行欵謁禮有降輦殿曰福臨之殿門曰福臨殿門進膳殿曰端拱後有軒曰徑霜松檜森列有御圃為堂二曰志敬曰清風植四時花果竹木亭二曰丹丘曰元圃亭之北纍石鑿池堂其上前曰垂福後曰清境凡所揭華扁皆聖上御書知仁和縣臣郭應酉撰上梁文聖人繼天立極瑞已兆于初潜上帝儲祉垂恩事莫嚴于昭受若稽舊典爰作殊庭以綿億萬年之基以隆九五位之福載惟肇建之始則應天興聖首彰慶源粵從南渡以來則祐聖開元益昌景運兹祖宗之丕則示帝王之正符恭惟皇帝陛下保合太和緝熙純嘏皇極平康直正以為天下之王諸侯朝覲謳歌咸曰吾君之子飛龍利見遹駿有聲䝉潤澤者必遡其源受庇廕者必推其本宣平坊內宅猶有于神光明逺樓前圃尚存于燕射此大明之所自照而衆陽之所共宗地接重華鍾有道曽孫之慶天生上智見佑我烈考之心是用申舊章以命有司建嘉名而昭丕應移材靈囿斥費水衡作新宫千柱而人不知體元祐儉慈之意祚洪圖萬葉而功不朽法祥符嚴潔之誠赫穹昊之鑒臨儼羣仙之環拱真人在御仰來和天尊之居列緯衣光俯紫薇垣星之坐上永凝于眷命下丕答于輿瞻爰歷靈辰用興巍架伸兹善頌相彼歡謡拋梁東海門天濶日曈曈萬齡耆夀朝慈殿百世仙源育震宫西蜀道平夷太白低忠益潜藩多王氣元和聖德夀天齊南風宣九譯聖恩覃國陽自展郊壇敬始信離明一德參北歷歷衆星皆拱極萬里神州在望中車書混一干戈息上敬天一念臺新創流虹繞電答休符甘雨和風酬景貺下河清育慶扶宗社九韶樂奏鳯來儀萬井年豐麟在野伏願上梁之後社稷尊安乾坤喜答右文母以介繁祉錫皇帝以登太平松喬遊于斯庭長上漢宫之夀郟鄏卜過其歷益綿周鼎之年介真館在宫之西門曰介真之館堂曰太範曰觀復曰灌妙齊曰會真曰澄妙曰常靜亦皆揭以奎藻四聖延祥觀在孤山舊名四聖堂四聖者道經云紫微北極大帝之四將曰天蓬天猷翊聖真武先是顯仁皇太后繪像事甚謹髙宗皇帝以康邸北使將行有見四金甲人執弓劔以衛者紹興十四年慈寧殿斥費即今地建觀凡古佛剎如寶勝報恩智果廣化之在此山者皆它徙十五年內出神像奉安斫以沉香二十年詔復東都延祥舊名殿曰北極四聖之殿門曰會真之門又三清殿曰金闕寥陽法堂曰通真皇帝元命閣曰清寧皆理宗皇帝御書藏殿曰瓊章寶藏孝宗皇帝御書慶元四年起居郎張貴謨為觀記靈應啓聖記所紀太宗建北極四聖觀於京城則左右領二元帥若翊聖真武二真君是也記中托四聖護國福民事甚詳如藝祖建報恩護聖閣太宗立家堂元真殿真宗以明化為寧安宫仁宗於內庭為神報祠皆以四聖之威靈應驗如此伏自靖康之變嵗在丁未顯仁太后北狩佩平日所繪四聖像以行至紹興十有一年南歸因與韋淵語及北方嘗夢見所謂四聖者復止見二人問之云二送聖君還南朝二留衛聖母曹勛被徽宗密㫖持二太后書達南京乞太后密語一二以為信大王奉使時我與夫人相送小僮見大王後有人帶甲執戈者四衆無所覩我獨悟事四聖甚謹此必神祐可以此言之既歸遂於禁中造沉香像同所繪像奉安於慈寧宫越二年委韋淵就西湖擇地建四聖殿兩廡三門成即降賜慈寧所奉聖像於殿至戊辰顯仁以慈寧宫屋三間兩廡立醮堂於殿北庚午復在京延祥觀命道録彭德淳主觀事置道士二十一人撥望湖堂廣化等寺歸觀别建寺以安僧徒又以智果觀音院充本觀道院建殿以奉三清四帝至紹熙五年甲寅孝宗增創鐘樓及本觀所造輪藏為屋幾三百楹徒衆日增合食不翅千指朝廷積賜緡錢以千計田畝以萬計觀址周圍七百餘文考之圖經即孤山也一山蟠踞湖波回環增卑改崇繚以周牆其屋與地相為髙下崇櫩四注堂殿中峙櫺楯蠲疏館舍清靚九天方袍之士委蛇於其中真成雲氣仙靈之宫矣觀之東有通谷穹岫搗垣居水如蓬渚壺梁草木茂接果華四時吐芳而揚烈西則隂林暗靄山行杳窱如西廂清靜之居一泉瀝液清而易挹昭時令日供酌獻奉精饗自足交神塞明以徼福無窮如靈效並著增光在昔則啓聖所記可信不誣矣瀛嶼在觀之西舊有涼堂在御圃纍朝皆嘗臨幸理宗皇帝書其顔曰瀛嶼淳祐十二年建以為西太乙宫遂更創新堂於此而奉御扁其上御圃六一泉詳見臨安志覆以石亭揭御扁前為堂即舊報恩院之觀音殿香月亭在山椒環植梅花仍大書林逋詩一聮刻於屏踈影橫斜水清淺暗香浮動月黃昏挹翠瞰湖為堂盡挹西北諸山之勝清新面山而宅其麓在挹翠之後右四扁及屏皆緝熙殿宸翰香蓮亭射圃金沙井瑞真道館即延祥觀門寧夀觀在七寶山本三茅堂紹興二十年因東都舊名賜觀額殿曰太元奉茅君像徽宗皇帝御畫也有徽宗皇帝欽宗皇帝高宗皇帝神御殿徽廟欽廟神御元在禁中髙廟元在聚景園皆迎奉於此有纍朝所賜御書則髙宗皇帝黃庭度人經寧宗皇帝道紀堂字理宗皇帝養生論又有紹興賜古器玩三種皆希世之珍其一宋鼎鼎髙尺有九寸廣尺有咫兩耳傍出而曲上三足皆具牛首鼎外周環如篆籕腹內銘四五十有一字傳者謂宋孝武帝孝建元年八月作牛鼎以祀太室其銘曰維甲午八月丙午帝若稽古肇作宋器審厥象作牛鼎格於位室從用饗億寧神休惟帝時保萬世其永賴今以焚香殿中其二唐鐘本唐澄清觀舊物紹興間有金聲震於太湖漁者莫能致湖濵寺觀爭以舟迎獨澄清觀迎之鐘凌波而上一引即入於舟丙辰九月二十四日戊午常州澄清觀女冠王玊仙所造河東薛此為之銘曰上德願而鑄洪鐘仙聖佑而人天從霜朝聞兮窈窕月夜聽而雍容蓮華生而腰净頂銜繞於盤龍響上聞於天外聲下徹於九重庶長空於鬼獄魔屏迹而潜蹤尚方出金帛度牒易以賜今禁中每聽鐘聲以為寢興食息之節其三褚遂良書小字隂符經景定庚申今太傅平章軍國重事魏國公賈似道以江漢功成入相理宗皇帝賜內府金幣百巨萬直固辭續有㫖就觀宣索隂符經以賜觀之外曰東山為殿以奉今上皇帝夀和聖福皇太后元命有亭曰寅賔俯見日出有菴曰仁夀東山之南則帝居北則太室今皆為禁地慶元初中大夫陸游為觀碑紹興二十年十月詔賜行在三茅堂名曰寧夀觀因東都三茅寧夀之舊也初章聖皇帝建會靈觀實於崇元殿之側營三茅君殿是為祖宗崇奉之始至是髙宗皇帝方躋天下於仁夀之域尤垂意焉乃命道士蔡君大象知觀事䝉君守亮副之許其徒世守又命內侍劉敖典領置吏胥給清衛兵略用大中祥符故事後十年敖遂請棄官専奉寧夀香火詔如所請賜名能真改左右街都道籙仍領觀事實又用至道中內侍洪正一故事上心眷顧此觀每示優假如此然逮今嵗月寖久未有紀之金石以侈上錫者紹熙五年六月知觀事沖素大師邵君道俊始礱石來請游為文傳示後世遊實紹興朝士屢得對行殿同時廷臣零落殆盡游適後死獲以草野之文登載盛事顧不幸歟伏覩寧夀觀實居七寶山之麓表裏江湖拱輔宫闕前帶馳道後枕崇阜盡得都邑之勝廣殿中峙修廊外翼雲章寶室籖帙富麗浩浩乎道山蓬萊之藏也鐘經二樓翬飛霄漢飄飄乎化人中天之居也金符象簡羽流畢集進趨有容肅恭齊潔濟濟乎茹靈芝飲沆瀣之衆也𨗳以霓旌節以玉磬侍者翼從以登講席琅琅乎徹九天震十方之音也祐陵之御畫德夀重華之宸翰煥乎河洛之圖書也鴻鐘大鼎華蓋寶劍褚遂良吳道子之遺跡卓乎袐府之怪珍也熒光夜氣夜燭天半所以扶衛社稷安鎮夷夏者於是乎在非他官館壇宇可得而比惟我髙宗皇帝實與三茅君自混沌溟涬開闢之初赤明龍漢浩創之前俱以願力應世濟民雖時有古今迹有顯晦其受命上帝以福天下則合若符劵及夫風御上賔威神在天與三十六帝翺翔太虛三茅君亦與焉時臨熙壇顧享明薦用敷佑於我聖子神孫降福發祥時萬時億於乎休哉遊既述觀之所繇興且繫之以銘曰炎祚中否開真人以大誓願濟下民左右虛皇友三真坐令化國風俗淳乃營斯宫示宿因丹碧岌業天與鄰神君龍虎呵重闉鯨鐘橫撞震無垠錦幡寶蓋髙嶙峋天華龍燭晝夜陳歷載九九符堯仁超然脫屣侍帝晨遺澤滲漉萬宇均嵗豐兵偃無吟呻咨爾衆士嚴冠巾以道之真治子身服膺聖訓常如新沖霄往從龍車塵顯應觀在湧金門外始紹興十八年詔有司建觀於城南包家山以奉磁州崔府君東漢崔瑗子玉也封嘉應侯號曰應玉二十四年分靈芝佛剎之半移建今處在湖之東湖水四面繞觀額本宣和所賜靖康間髙宗皇帝出使至磁州神馬引而南建炎初秀王夫人夢府君擁一羊謂曰以此為識遂誕育孝宗皇帝由是纍朝祠祀彌謹中為顯應之殿其神位曰護國顯應興聖普佑真君髙宗皇帝為書殿扁且揭以御名昭其敬也孝宗皇帝為書寶章瓊藏理宗皇帝書洞古經以賜刻之石又有殿奉今上皇帝夀和聖福皇太后皇后元命嘉定三年參知政事樓鑰奉詔撰觀碑寧宗皇帝御題其額嘉定三年十一月朔制詔臣鑰顯應觀為國家集福之地自建立以來未有為之記者汝其碑之文成朕當書其額曰中興顯應觀記而宸翰下頒昭回之光輝耀千載臣既承命謹拜手稽首言曰百神在天地間昭布森列皇朝咸秩無文非有功不祀其間靈效顯著逺邇奔奏者不過數處而護國顯應真君其一也真君崔姓廟在磁州旁為道觀河朔人奉之五百餘年矣靖康中髙宗由康邸再使金磁去金營不百里既出謁祠下神馬擁輿盻蠁炳然州人知神之意勸帝還轅孝宗誕育于嘉興先形絳服擁羊之夢生有神光燭天之祥此皆其最著者也中興駐蹕錢塘初置觀於城南尋徙於西湖之濵分靈芝寺故基為之祠宇宏麗像設森嚴長廊靚深采繪工緻鐵騎戎卒左出右竪戈鋋旗蓋勢若飛動敞西齊堂以挹湖山之秀為崇佑觀以處羽士之流稱其為大神之居髙宗脫屣萬乘嘗同憲聖臨幸以丹堊故暗賜金藻飾一新既又三十餘年矣皇帝皇后聿逮祖考之意載命興葺復賜緡錢俾都監右街鑒義主管教門公事明素大師陳永年買田以增齊供之費所以妥靈而錫福斯民者甚至是誠不可以無紀也竊考神之所自不知者以為北魏之伯淵其知者以為後漢之子玉雖皆名公而實非也續會要等書亦不詳諦或誤後人唐武德元年置磁州貞觀元年州廢而以滏陽屬相至永泰初始復舊仁宗實録景祐二年封崔府君為護國顯應公且言府君正觀中為相州滏陽令再遷蒲州刺史史失其名在滏陽有愛惠民為立祠後因葬其地咸平二年間始賜府君之廟而京師北郊及郡縣奉之如嶽祠至是因民所信嚮而封崇之故詔曰惠在滏邑恩結蒲人又曰案求世系雖史逸其傳尸祝王官而民賴其德使果為子玉與伯淵安得謂史逸其傳歟元符二年即舊號封王大觀賜廟額政和賜冠冕七年加封護國顯應昭惠王宣和三年邵守韓景朝辭承上命葺治祠王曰敷靈觀曰顯應且按舊碑為之記其說略與實録同又言唐太宗夢得之被詔入覲刺蒲州河北採訪使因命刑曹曹弋編録神之靈跡五十餘條傳於世淳熙十三年奉光堯聖㫖改封真君然至今以府君為號尤見其本於為令也初命延福宫使安德軍承宣使張去為為提舉官傳子及孫延慶俱庀此職宣力於觀為多道士初置十餘人今益以衆田止百畝有餘今益以廣啓觀門而許士庶祈禱咸有定期季夏六日相傳以為府君生朝都人無不歸鄉駢擁今夕尤為一時之盛孟冬十日又謂為府君朝元之節或云以是日上升禁庭皆設齊醮北人之寓居者是日亦必至焉乾道六年遣使賀金國正旦臣以假吏從行過磁使介而下相率望拜於驛中蓋往來者必致敬行則先禱於西湖之祠歸則潔羞以謝之臣謹托其始末之實為記而又播以詩云惟漢之司農兮著遺愛於桐鄉使葬我於桐兮必時之奉嘗翳神之仕兮於滏之陽惠及斯民兮久而愈彰擢刺河中兮任河北之採訪生則祠於舊邑兮歿又冢於其旁神之既逺兮雖尊以姓而逸其名神之威靈兮信千載之流芳謂子玉與伯淵兮皆流傳之眇茫獨昭陵之詔録兮載顛末之為詳北方之人兮謹廟食而自唐膺纍朝之封錫兮誠有赫兮龍光功在社稷兮著明效於靖康神馬乘輿兮實顯應於髙皇始孝宗之方娠兮夢絳衣而擁羊逮震夙之夕兮又神光而發祥敞祠宫之百楹兮繚千丈之周牆儼像設之雄尊兮煥金碧之焜煌仰皇明之臨御兮未嘗求福而專鄉乃奎畫以寵嘉兮燦鳯翥以龍翔前三茅而後太乙兮與四聖而相望肆隂隲而默相兮鞏國勢而無疆上宫掖而下士民兮藉神休而禬禳偉明神之英烈兮夫豈斂惠於一方願謁於上帝兮掃攙搶而殄豺狼吾君將中天下而立兮開夀域於八荒神亦歸其所兮報何可忘崇祐館在觀之東祠廟祚德廟在車橋西青蓮寺南初神宗皇帝未有聖嗣吳處厚言程嬰杵臼存趙氏最為忠義乞訪墓廟特加封爵墓在絳州太平縣之趙村墓側有祠元豐四年五月遂封嬰成信侯杵臼忠智侯仍賜額載祀典元符三年臣僚言韓厥之功不在二人下乞與立廟詔從祀祚德崇寧三年封厥義成侯按史記晉文侯始建趙氏於晉國景公之三年大夫屠岸賈欲誅趙氏韓厥告趙朔趣亡朔不肯曰子必不絶趙氏賈與諸將攻趙氏於下宫殺趙朔趙同趙括趙嬰齊皆滅其族趙朔妻有遺腹走公宫生男公孫杵臼程嬰謀取他人兒匿山中程嬰繆語諸將遂殺杵臼與孤兒程嬰乃與趙氏真孤俱匿山中居十五年景公問趙後韓厥具以實告景公乃與厥謀立趙孤兒召而匿之宫中攻屠岸賈滅其族復與趙氏田邑如故嬰遂自殺趙武服齊衰三年為之祭邑春秋祠之世世勿絶左傳成公八年韓厥言於晉侯曰成季之勳宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也乃立武而反其田焉紹興十一年八月中書舍人朱翼言三人者千載之上有功於我家今絳州淪陷之久廟貌存廢不可知乞於行在所卜地權創祠宇仍下禮官討論十三年四月遂立廟仍闕嬰忠節杵臼通勇厥忠定二十三年侍御史林大鼐又言韓厥既立文子傳十世而霸業諸侯其後子孫綿綿真定中山之間即我宋仙孕之靈源也今三人者宜爵秩而公王之擇爽塏而廟貌之四時遣奉嘗官以牲幣用事時國嗣猶未建乃詔兩浙運司新其廟仍封公爵秩中祀慶元初益封淳祐二年又升嬰為忠濟王杵臼忠祐王厥忠利王且增闢廟貌益宏整云苑囿聚景園在清波門外孝宗皇帝致養北宫拓圃西湖之東又斥浮圖之廬九以附益之清波門外為南門湧金門外為北門流福坊水口為水門亭宇皆孝宗皇帝御扁嘗恭請兩宫臨幸光宗皇帝奉三宫寧宗皇帝奉成肅皇太后亦皆同幸嵗久蕪圯令老屋僅存者堂曰攬逺亭曰花光又有亭植紅梅有橋曰栁浪曰學士皆粗見大概惟夾徑老松益婆娑每盛夏芙蕖彌望遊人􅋈舫繞堤外守者培桑蒔果有力本之意焉玊津園在嘉會門外紹興十七年建明年金使蕭秉溫來賀天申節遂燕射其中孝宗皇帝數臨幸命皇太子宰執親王使相侍從及管軍官講燕射禮上親御射淳熙元年嘗御製七言詩以賜曰一天秋色破寒烟别籞連堤壓巨川欣見嵗功成萬寶因行射禮命羣賢騰騰喜氣隨飛羽嫋嫋凄風入控弦文武從來資並用酒餘端有侍臣篇時光宗皇帝在東宫恭和曰秋深欲曉斂輕烟翠木森圍萬里川閶闔啓關傳法駕玊津按武會英賢皇皇聖父明如日挺挺良臣直似弦蹈舞歡呼稱萬夀未饒天保報恩篇右丞相曽懷以下皆有賡載刻之石曽懷等恭書曰淳熙元年秋九月壬寅皇帝幸玊津園行燕射之禮皇太子宰執使相侍從五品以上咸與焉皇帝中的者再喜動在列天顔怡悅賦詩以示臣等且命賡和以進臣等謹拜手稽首而言曰帝王之用文武猶天地之運隂陽咸適厥中乃克有濟故隂陽不偏然後可以擬太和文武兼用然後可以隆至化恭惟皇帝陛下以上聖之資撫中興之治躬持二柄規恢大勳斟酌運平茂建皇極若稽祖宗建隆太平興國故事昭舉盛禮是豈籩豆弧矢云乎哉宸章昭回天語煥發所以示並用久長之意卓然與六經之義同歸實垂世不刋之典也臣備位宰司千載一遇䝉冒恩寵不知所以報塞惟當欽奉聖謨傳之罔極而請刻之石制曰可懷恭和二首曰名園佳氣藹非烟冠佩朝宗似百川五品並令陪燕射四鍭端欲序賔賢恩涵春意魚翻藻威入秋深雁落弦竣事更容窺典雅宸章應陋柏梁篇江山秋日冠輕烟别苑風光勝輞川位設虎侯恢盛典技精楊葉校名賢禮均湛露宣飛斚樂奏鈞天看發弦聖主經文兼緯武全勝巡幸射蛟篇羣臣詩不悉載魏王判寧國府亦嘗命宰執於此燕餞蓋皆以為講禮之所按玉津園乃東都舊名蘇軾嘗賦詩有紫檀南峙表連岡之句蓋亦密邇園壇富景園在新門外之東孝宗皇帝奉憲聖皇太后嘗請游幸又重於數戒有司故營是園以邇北宫規置略倣湖山今亦湮廢悉𨽻慈元殿嵗收花果之入焉翠芳園在錢湖門外南新路口面南屏山舊名屏山園咸淳四年盡徙材植以相宗陽宫之役今惟門閎儼然右先朝苑囿惟以奉親歡修國典故久弗及繕治雖垣頺棟壓益以昭聖明恭儉無于逸于遊之好云玊壺園在錢塘門外本鄜王劉光世園後屬之臨安府守趙與􅊸築堂四面景定間更𨽻修內史又為堂曰明秀今𨽻慈元殿咸淳臨安志卷十三
