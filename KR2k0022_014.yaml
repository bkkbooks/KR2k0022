body:
  text: 咸淳臨安志卷十四宋潜說友撰行在所録禁衛兵班直殿前指揮使左班殿前指揮使右班長入祇候御龍直在保民坊金鎗班銀鎗班散員散指揮骨朶直散祇候招箭班散都頭在豐禾坊北東西班茶酒四班在艮山門内殿直弓箭直弩直散直禁衛在梅家橋西右二十四班於皇城司及三衙舊司選補皆𨽻殿司以中軍統制兼指教統領兼同指教内諸司并宫觀等兵士皇城司親從親事官指揮親從官任大内諸門諸殿宿衛之事親事官任皇城内巡鋪守把及景靈宫等處宿衛在豐樂橋東内親事等五指揮在輦官營北院子指揮黄院子入宫禁皂院子入大内司圊指揮在輦官營北已上諸指揮共三千五百餘人御厨營在天慶坊報恩坊翰林司營在京畿第二將南儀鸞司營在麗正門外候潮門外内軍器庫營在清波門内沿城之南内藏庫在三茅山修内司營在孝仁坊内石頭橋萬松嶺鐵冶嶺𣙜貨務東修内司綱兵營在平糴倉北天水院橋東八作司營在玊津園前崇新門外輦官營在豐禾坊北御馬院使臣營教駿營在嘉會門内外太廟宫觀等兵士太廟營在天慶觀後山上見管八十人夀慈宫營俗呼老兒營在新門外五栁園金剛寺北見存一百六十五人太乙宫營在太學後西太乙宫營在葛嶺萬夀觀營在楊四姑橋沿河東岸佑聖觀營在觀側四聖觀營在葛嶺櫕宫營在南山開化寺巷殿司寨舊司六指揮額管二千人東京衛兵捧日天武在崇新門外觀音寺東拱聖在崇新門外舊象院東驍騎寧朔廣勇在崇新門外螺螄橋東教場在驍騎營後諸軍額管七萬三千人紹興剏置又有分𨽻外郡韶州摧鋒軍泉州左翼軍嘉興府澈浦金山水軍共一萬五千八人不在此數選鋒馬軍教場在馬一將下梢在太平橋西選鋒步軍四寨教場在聖妃廟東寨内在艮山門外䇿選鋒馬軍四寨教場在本軍馬三將在羊坊橋二昭慶寺側二䇿選鋒步軍六寨教場在昭慶寺側寨内在禇家塘三後洋街磗街巷斜橋前軍馬步軍教場在本寨内在螺螄橋東前軍步軍二寨在東青門外右軍馬步軍教場在本寨門外之東在茶槽巡檢司北右軍步軍三寨在長明寺南羅漢寺東四板橋中軍六寨並步軍在皇城周迴七寳山錢湖門裏錢湖門外三䕶聖馬軍四寨在北闗門外北郭税務後二教場在本寨新門外四板橋二教場在本寨䕶聖步軍七寨教場在上欏木橋東最為濶逺俗呼欏木教場孝宗皇帝嘗御閲其中在候潮門外欏木橋福田寺後修江司側瓶場灣盛家衖東南北三遊奕馬軍在端平橋遊奕步軍五寨教場在蒲場巷東横河在崇新門外以北神逺馬軍二寨教場在西馬堘在北闗門外新街西馬堘神勇步軍二寨教場在東馬堘在湖州市米市橋一帶左軍馬軍三寨教場在赤山造紙局側在髙麗寺前法雨寺側馬耳巷左軍步軍三寨教場在行春橋寨内在麥嶺行春橋二後軍馬軍二寨在無星橋北後軍步軍四寨教場在禇家塘側在禇家塘二梅家橋艮山門裏浙江水軍寳祐二年剏招二千八百人咸淳四年増招七千二百人以一萬人為額共十寨在螺螄橋東五太平橋西端平橋東無星橋北龍山二馬軍司寨舊司三指揮額管一千人今步軍帥兼領龍衛在平糴倉北雲騎武騎在觀橋東諸軍額管三萬人今屯建康步軍司寨舊司七指揮額管四千六百人神衛在鐵冶嶺下左虎翼在錢湖門外聚景園側右虎翼在鐵冶嶺上床子弩飛山在錢塘門外王家橋廂軍在鐵冶嶺下御營喝探在錢湖門外諸軍額管二萬三千人紹興創置又有真州六合縣淮効二千人不在此數前軍馬軍在黄泥嶺前軍步軍二寨教場在行春橋在麴院獨角門右軍馬軍二寨教場在長耳巷在小麥嶺南大麥嶺南楊寺西右軍步軍二寨教場在本寨東西在西湖旌徳觀後右軍潜火二寨教場在三茅觀後在三茅觀後萬松嶺東中軍馬軍四寨在西觀音寺南教場在塞北西溪方井一帶三教場在方井北中軍步軍二寨教場在大寨西北在湖州市接待寺西中軍在城將二寨在錢湖門裏白鱔潭郭婆井山上左軍馬軍教場在本寨内在武狀元坊兒門鋪左軍步軍二寨教場在五郎堂寨内在錢糧司嶺下五郎堂前雙塔兒門前左軍在城將寨在錢湖門裏白鱔潭後軍馬步軍教場在本寨一在錢糧司嶺下在錢糧司嶺下按中興初諸將各總重兵禁旅單弱趙鼎以為言紹興二年秋詔三衙措置五年鼎與張浚並相乃以楊沂中所將辛永宗部曲𨽻殿前司顔漸部曲𨽻步軍司皆益以他軍而沂中之衆特盛以解潜部曲𨽻馬軍司而益以劉錡王彦之軍又以都督府庫馬分𨽻至是三衙始浸復矣舊司至今存則東都衛兵之遺也左右金吾街㐲司不係衛兵姑附於此在呉山天明宫側内宿唱和更籌并差赴宰執侍從等處役使紹興二十六年詔兩司各以一百七十五人為額省院兵樞宻院親兵營在三茅觀前金地山鐵冶嶺北禇家塘省馬院在錢湖門外櫕宫后櫕成穆郭皇后成恭夏皇后慈懿李皇后恭淑韓皇后右並在錢湖門外三里南山之修吉寺各殿為上下宫上櫕宫下神御每嵗春秋太常卿朝獻秋監察御史按視内人内侍各以時詣宫所及官吏職掌兵士守衛皆如會稽櫕陵之儀四后宅許春秋朝謁園莊文太子在錢湖門外二里寳林院景獻太子在莊文園之右法因院諸櫕所貴妃陳氏貴妃李氏在慈聖院貴妃慕容氏在資徳院貴妃張氏在永寧崇福院貴妃蔡氏在浄教院貴妃黄氏在西蓮瑞相院惠順貴妃賈氏在崇恩演福寺貴妃閻氏在顯慈集慶寺皇子保寜軍節度使在六通慈徳院皇子永王皇子祁王在崇報顯慶院皇子齊王在廣法院皇孫冲善廣王在上智果院皇子雍王在崇報顯慶院皇姑成國公主在惠因院皇女周漢國端孝公主在崇恩演福寺皇女潤國公主在開化寺館驛都亭驛咸淳臨安志卷十四
