body:
  text: 咸淳臨安志卷十五宋潛説友撰行在所録賦詠殿廷紫宸殿御筵即事七首魏了翁珂繖搖心夢不成忽聽吏皂放衙聲吹燈撥火供晨粥趂到皇城恰六更嚴裝列衛翊宸居百辟滔滔若貫魚後幄宰臣先奏事猶隨郎從立前除有次鞭鞘陸續鳴赭袍當殿萬簮纓羣臣拜舞分行坐十味肴羞酒五行蹴踘尋橦列廣庭吹絲按竹布前榮卿郎朵殿渾無見只聽時時萬嵗聲再坐猶餘四屈巵筋駑肉痺股生胝侍臣醉飽皇歡洽更看終場角抵嬉蛾眉班捲戴花回遙望君王玉色開畫楯諸班謝茶酒尻髙首下一聲雷十七年間作外臣重來三日齒嘉賔天顔不減當年澤點檢同朝共五人後殿侍立三首同前禁城鼓鐸曉逢逢風滿衣裾靴滿霜守得開門騎馬入又同承旨步修廊須臾陛衛儼成行禁蹕聲聲輦出房庭中晴乾則上步出內門既御殿後方引舍人承旨班次引宰執班若有霑濕則先引班就廊頭立定報人齊然後皇帝御殿詩謂輦出房其實所見者步出內門靴笏趨陪西府拜却更絲履立東廂東班丞相前立參政次之舍人在後西則樞密與參政對立承旨在後奏事臣僚下玊階東府奏事訖丞相以兼樞密使留身奏西府事參政先退然後相樞再上奏事先退然後引其餘上殿官奏事舍人承旨殿東來奏事官將下殿然後舍人承旨同知閣陛殿東柱後立一聲門外無公事皇帝還宫侍衛回記立螭所見三首同前曉風鞭袖闖天關濫綴東西兩省班當日入趨東朵殿畨休却逐侍臣還左右各當兩日侍立後殿則俟宰執臣僚奏事下殿即升殿東侍立前後殿則侍立處徑退記注愆期已隔年且如今年春方修十五年秋冬記注濡螭夾案謾云然惟餘一事光千古後殿前朝聽直前晨將榜子關賔閣輦出房時已奏知陛對臣僚才下殿朱衣絲履上東墀上未御殿時先以榜子至閣門云具姓名乞直前奏事閣門既奏知訖直前官仍隨班如常日起居侍立只侯宰執臣僚對畢徑至榻前奏事畢回殿上立位射殿引諸班二首同前畫簾黃幄幕前扉殿門內設皇帝幄殿夾陛渾如後殿儀只自起居更履後却陪二府立多時控矢張弓十作朋射餘回首列前榮須臾當殿聽空授首下尻髙萬嵗聲殿試筆記次韻周必大帝垂清問切恢圖士貢昌言敢𨗳諛髙下共知歸至鑑考評聊許備先驅詳定所先批分數封送編排所然後定其等甲四帷逈隔心常渴初考覆考詳定編排凡四幕皆隔以吏卒欲其聲迹不相聞三榻橫連體叵舒方丈之地並設三榻烏府凛然賢執法紫垣籍甚古通儒上嘗書通儒二字賜錢舍人墨朱同異容兼採初考純用墨書臣名等第送監封彌官封印送覆考所純用朱書臣名等第然後詳定官啓封而酌其中其書臣及等第以朱而書名以墨等級從違得細書考校法第一至第五凡五等每等分上中下至詳定所或從初考或從覆考亦或别定尚醖時頒缸面酒日給常酒外三日一賜黃封缸面酒出法書要録太官日饌腹前臚御厨給食頗豐但品味未嘗易腹前臚出韋昭辨釋名謂肥肉也天香謾炷薰常歇雖賜香而火禁嚴甚不許炷爐貢茗虛霑樣頓殊諸位總賜茶三百斤舊每斤即一紅綾袋凡十餘團今乃給黃袋拆而分之以一餅為一斤殆典吏移易也晨壁搖風愁幕冷就廊廡設次以幕為壁夜窗透月喜簾踈臨階以簾為窗九賔屈指臚連句唱名比逐舉展五日千慮傾心智與愚會待詔恩三日沐湖山尋勝任舟輿給歇泊假三日請御明堂齋殿任希夷肇舉明禋預戒期請臨齋殿御簾帷廊頭萬旅皆花帽殿下千官盡絳衣玉輅時嚴三嵗禮慶霄遙望五雲飛小臣頭白供籩豆親見虞廷覽德輝元日班賀同前百華照曉嵗更初黼座當中列辟趨舞蹈三回嚴贊唱虔恭百拜聽傳呼麾旗簇仗朝儀肅韎韐班庭逺意孚元會五逢叨侍從欲陳嘉頌愧才粗上夀大宴二首同前昔年玊瑞下層霄今日瑶池預祝堯負扆當陽天子坐稱觴顓面宰臣朝九重陛下聽鳴蹕萬嵗山前看舞韶持槖五人沾鎬飲獨憐蒲栁望秋凋霜晴寶殿轉春風瀲灧金巵酒色濃百戲叢中呈霧豹萬花深處仰雲龍笙簧對御呈三弄鼓吹成行疊幾重衰落繆令陪翰苑小臣何以寓形容又赴御宴同前新元六日三陪宴黼扆前頭御榻橫紫袖旁闌宣樂節金貂當殿賜杯行四夷來致三呼祝萬舞歡同九奏聲繆忝詞臣無補報豐年惟願稼如京左史侍班二首同前虎旅分行鐡作檛殿前拜舞一聲譁輔臣對罷無公事日照金鋪扇影斜閶闔新開露氣清舉鞭聮騎入承明絲絇同傍瑶池立廣殿前瞻御榻橫延和殿退朝陸遊雨餘未肯放朝暄穿仗恭承聖主恩清蹕傳聲徐御殿立庭中頃之奏姓名上乃自東廂出御座紫衣引拜許籠門徘徊漫結堯階戀零落難招楚澤魂歸去猶堪誇里巷桐江新賜兩朱轓集英殿䇿士待宣於內軍器庫廊洪谷夔漢庭與目䇿英豪投釣知誰首掣鰲百日紅連綸閣逈萬年枝拂禁城髙闕輦路歸遲月映袍西抹東塗渾忘却一絇短雪不堪搔經筵講筵侍立三首魏了翁晨趨東朵侍天顔奏事班回帝輦還才向內門需少選諸璫又趣講筵班須臾講殿報班齊拜罷東升一半西兩序公卿皆賜坐史臣講讀右階隮開講之日宰執亦與宰相賜黑漆杌子執政以下紫包草坐分列兩行當日講讀官各一員及當日左右史一員自草坐之右行至御案之右讀官先上讀太宗寶訓微退講官次上講經亦以金箆讀過二史一員後立御前親賜密雲龍講罷分行帝在中起揖坐嘗還再拜侍臣趍出輦還宫北宫慶夀德夀宫十首楊萬里長樂宫前望翠華玊皇來賀太皇家青天白日仍飛雪錯認東風轉栁花清曉鞭聲出禁中驚開剩雨及殘風金鴉銜取紅鸞扇飛上玻璃碧海東春色何須羯鼓催君王元日領春回牡丹芍藥薔薇朵都向千官帽上開雙金獅子四金龍噴出香雲繞殿中太上垂衣今上拜百王曽有箇家風帝捧瑶觴玉座前綵衣三世祝堯年天皇八十一萬嵗休説莊椿兩八千天父晨興未出房君王忍冷立風廊忽然鳴蹕珠簾捲萬嵗聲傳震八荒花外班行霧外天何緣子細望龍顔小窺玉色真難老底用臞仙九轉丹甘露祥風天下來今回恩數賽前回都將四海歡聲裏釀作慈皇萬夀杯堯舜同時已甚都祖孫四世古今無誰將寫日摹天手畫作皇王盛事圖甲戌王春試集英小臣曽是老門生蒼顔華髮鵷行裏也聽鈞天九奏聲德夀宫即事六首任希夷金爵觚稜曉色開三朝喜氣一時回聖人先御紅鸞扇天子龍興萬騎來霜曉君王出問安寶香隨輦護朝寒五雲深處三宫宴九奏聲中二聖歡宴歸還駕七香車一夕天開六出花瑞色先凝紫宸殿春光重到玉皇家慈福修齡八十春微陽才動寶書新天家慶事古無有奕葉重光似顯仁萬年觴舉慶重華百辟需雲始拜嘉夀宴開時先雪宴天花舞罷帶宫花直前論奏極精神柱下霜髯侍從臣歸美意中規諫切華封人是潁封人東宫謝東宫燕榮觀臺楊萬里春草池塘太液旁水精宫殿牡丹香慚非綺里攀鴻翼也侍承華宴鳯莊玉唾銀鈎看落筆繡袍金碗拜盈箱迎門兒女牽衣袖搜得隨侯與夜光學士院入直賦景物二首王希吕玊堂晝永暑風微䔩䔩飛花落小池徙倚幽欄憑問訊夏鶯飛出萬年枝小池倒影弄餘輝照耀虛簷極出竒木杪不鳴風力軟闖萍翻藻有魚嬉次希吕韻二首周必大東省南宫切太微夔龍行集鳯凰池更哦殿閣薰風句坐覺微涼生桂枝紫禁同依日月輝蒼顔獨愧羽毛竒水如明鏡雖堪俯笑汝星星誰肯嬉賜茶退入直同前緑槐夾道集昏鴉勑賜催宣坐賜茶歸到玊堂清不寐月鈎初上紫薇花時兩株盛開禁直賜果胡銓禁樹裝成寶纓絡氷盤剪出水晶鹽傳呼天上好消息玊果新頒出御奩石中二首李璧雲影沉沉玉一方倚欄人意似濠梁獨憐雪裏山茶樹也向春風伴海棠梅隂漸密雨晴時靜看花磚日影稀向晚啼鴉來又去上林知占那邊枝玉堂寓直范必大摛文窗户九霄中岸幘燒香愧老農上直馬歸催下鑰傳更人唱促鳴鐘金城嶻嵲雲千雉碧瓦參差月萬重骨冷魂清都不夢玊階蕭瑟聽寒蛩中秋寓宿同前笑看收雲卷雨忙沉沉宫署納空光夜長來伴玊堂宿天近似聞丹桂香鳷鵲樓欄浮瑞氣鳯凰城闕帶新涼遙知勝踐西園會也憶車公對舉觴曉起書事同前江湖垂釣手天漢摛文堂魂清不得眠空虛自生光曉緯淡天闕江濤隱胡牀傳呼九門開奔走千官忙若若誇組綬紛紛夢黃梁微聞鈴下騶竊議馬上郎但計夢長短寧論已行藏拜賜御酒同前歸鴉陸續墮宫槐簾幕參差晚不開小雨遂將秋色至長風時送市聲來近瞻北斗璇璣次猶夢西山翠碧堆慚愧君恩來甲夜殿頭宣勸紫金杯玉堂懷舊二首同前桂海冰天老嵗華直廬重上玊皇家當年曽識青雲鬢惟有東牆一架花雪山刁斗不停撾夜把軍書敢顧家珍重玊堂今夜夢靜聞宫漏隔宫花寓直晚對內殿菩薩蠻詞同前彤樓鼓密催金鑰沉沉青瑣重重幕宣喚晚朝天五雲籠暝煙風急東華路暖扇遮微雨香霧撲人衣上林烏滿枝宿直任希夷金門攢典鼓初停禁柝猶傳第四聲不省人間一回夜如何天上兩般更書生持被苦無寐聖主求衣率未明慚愧論思真忝竊何時邊徼盡銷兵賦梅下小池同前眼見梅花照玉堂只今濃緑覆宫牆樛枝偃蓋雲千疊下蔭清池玊一方和李璧韻洪咨夔曲折宫牆日影方堂深人靜似山梁棕櫚葉底梅花老次第風光到海棠宣鎖留題同前禁門深鎖寂無譁濃墨淋漓兩相麻唱徹五更天未曉一池月浸紫薇花又宣鎖同前樓頭禁鼓試初撾催草江淮督使麻落紙一簾風雨疾不知斜墨陳翻鴉初直玊堂和李壁二絶趙汝談白頭來試枕函方拂石看題歎柏梁賸有故情無話處山茶今日是甘棠宫井城鴉欲動時春猿夢斷北山移攬衣擬草歸田賦猶是金蓮燭半枝鎖宿七首劉克莊西山遺業付門人嵗晚推遷接後塵綵筆夢中先索去不知持底作詞臣制書揮就進明光天筆批回墨尚香草本偶然無貼改非關臣億怕商量轉枕依然夢不成小􅐼頗覺曉寒生昏花却怕宫蓮照垂下紗厨聽六更內厨進膳惟蔬素御帕分香遍竹宫明日金烏迎玊輅始知聖主與天通忩外荼梅幾樹斜薄寒生意巳萌芽主人不作明朝計愁絶無因見放花形稿心灰一禿翁偶然視草禁林中幼吹蔥葉還堪聽老畫葫蘆却未工四壁蠧書常鎖閉數行蘚墨半糢糊院中老吏無存者誰記南塘與鴈湖郊丘郊丘紀事十首周紫芝內門朝日上金鋪寶玉籠函出殿餘紅燭兩行分御道輦官三百奉腰輿奉寶用輦官三百餘人謂之腰輿皆籠燭爇香而前蓋故事也內郎進表未平明八玉排行御路平今夜皇輿宿齋殿九重和氣滿宫城內侍二人號內符寶郎是日進表得旨乃奉寶以出曉趨宗廟拜衣冠雲葉低垂護翠鑾日采回光天意好龍顔生喜近臣歡駕次太廟天意欲雨倐復開霽上大悅班聲催急盡冠裳尚聽嚴更轉警場何事君王虛小次佩環垂玉立寒霜上酌獻既降當御小次而不入露立甚久羣臣駭異日照青城瑞色新風微金殿自無塵麝煤光照烏絲軸親寫宸章賜大臣水晶簾透月翻光宫漏頻傳夜未央寶幄微臣亦何幸侍祠來宿殿西廊紫壇煙暖不飛霜壇下千官列雁行雪色珠冠光射月侍祠臣裏識君王清蹕聲中下輦來景鐘初動八音諧登歌已奏迎仙曲天步雍容上午階壇陛以十二辰為名上所登降皆自午階龍麝香從十里傳繞牆紅蠟自生煙纎雲不度人聲寂風馬雲車下九天樓上紅鸞扇影寒樓前宣赦萬人看清臺奏瑞初呈了五色祥雲簇彩竿禮成上御端門肆赦太史奏五色瑞雲覆于雞竿之上郊祀慶成三首任希夷紫壇熙事樂髙張天胙皇家福簡穰六奏聲中來象物萬燈明處望龍章星珠月璧清宵麗風馬雲車碧落翔屢有詔書崇簡約只將誠意動蒼蒼溫溫和氣襲龍斿薄晚輕雲忽使收穆若清躬升午陛爛然華月滿圓丘燭光不動風前影星彩交輝冕上旒拜貺益恭形聖語卜年增永祿增遒廣樂鏘鳴列炬燃禮成猶想吉初蠲鴛班夜賀天顔喜寶仗朝回物采鮮萬姓竦瞻雙鳯闕一封飛下九重天乾坤清晏歡聲滿今次郊禋盡勝前郊壇齋宫七首同前郊禋從昔重升中八陛崇尊典禮隆聖主寅恭先事舉雲陽新築望祠宫上林日射蒼龍闕九陌風清野馬塵恰似樓臺臨渭水未饒桃李滿天津玉津宏建中興初禁籞風光勝兩都慙愧逢辰瞻蠖濩却思歸老卧廜㢝榮路輝輝日月依雲霄奕奕孔鸞飛輔臣對罷升金殿日日絲絇侍衮衣常日金階白玉堂不知春事到垂楊休驚冉冉花飛片正愛青青麥耀芒帝籍傍連繭館桑禁林喬木晝隂涼却從射殿臨江閣中有通衢夾苑牆漢苑空傳承露盤不聞臨幸又春殘吾君恭儉前無比只向郊祠響玊鑾明堂宗祀慶成周必大親饗嚴三嵗邦彛重九筵祖宗垂統大天地著功全惟睿崇昭報於時展吉蠲發揮皇祐日潤色紹興年稽古千齡契齋心十日專揭名新扁榜御書明堂及明堂之門書册屏葷羶竹册啓以九月七日書假廟隂雲剝升煙皓月圓無風搖燭影有瑞燦星躔不值連宵雨那彰倐霽天貮觴猶翼翼百拜愈乾乾三日行禮上拜百餘歸次徒勞奏酌獻畢有司依舊制請歸小次上弗許立俟亞終獻行禮回班特許朘駕來百官例側班皆止之賀儀隨仗入霈澤御樓宣禮畢即時御垂拱殿受賀黎明御樓聖躬益壯獻胙金絲合簮花錦繡鮮慈皇顔有喜聖孝古無前肆赦才畢即時獻胙德夀宫禁衛皆賜花和氣騰都邑歡聲遍海壖祺祥應曼羡夀祿自綿延臣也芻蕘賤恩斯雨露偏執綏華蓋裏草赦玉堂邉玉堂蓋殿名也第頌甘居後逢辰幸獨先四方今日靖申誦我將篇慶成五首任希夷國重明禋預戒期九筵宏敞肅宗祈階前萬旅皆花帽庭下千官盡絳衣三日齋心嚴殿宿一聲清蹕響簾幃聖躬靡恃皇天眷夙夜寅恭但畏威芝房羽駕備通宵昧爽天興輦路遙原廟出逰卑漢祀太清先獻踵唐朝冕旒穆穆升前殿鐘石鏘鏘達九霄謬忝侍臣分奏告嘉觴肅薦遍宗祧合宫三嵗縟儀收太室先期肇自周玉瓉黃流躬祼鬯大圭元冕薦嘉羞靈臺畢舉三千里鑾路安行十二逰𨗳從却歸齋殿去詰朝牡璧對天休仲辛肆事展明堂磬管鏘鳴更令芳蒼璧肅陳勤聖主二觴嘉薦屬儲皇雲車天上紛紛下月鑑庭中穆穆光八舉親祠俱響答吾皇誠意感穹蒼紫宸朝罷御端門天宇澄清景氣溫丹鳯樓中黃繖立金雞竿上綵旗翻萬人聳聽風雷號四海均霑雨露恩須信卑宫勤肆祀君王本意在元元宗祀夕潘牥玉天無滓月光寒霽色分明在露盤一夜九重全不寐時教中使捲簾看明堂侍祠十絶王庭禮行肆類又稱禋喜見承平景鑠信堪笑漢人誇肸蠁何如明德達精純先皇鴻烈冠重興廟社依然總燕寧今日孝思嚴陟配必知深妥在天靈玉車犬才馳霽色開都人歡呼殷如雷曰暘曰雨元無定都是吾皇一念來唱徹嚴更鳯鑰開侍祠濟濟列崇陔小臣亦忝廊西獻惟秉溫恭對越來玉佩珊珊出禁扉金蓮分炬散芳非祠班咫尺臨黃道惹得天香滿袖歸登歌奏罷樂初成懿懿芬芬薦德馨好是天心彰信順故教華月唾青冥合宫深敞匝修廊萬燭輝輝燦奉璋自有質文昭儉度不須揚厲述齊房左個明堂是集英鵠袍曽此接文明餕餘欵聽鈞天奏疑是吾伊雅頌聲千官移仗拱端門一日雞竿萬里春湯網本疏民自格要知家法在深仁肹蠁豐融富媪釐班回長樂奉愈怡休嘉最易生安逸翼翼當如未祼時太廟太廟致齋洪咨夔風雨殘春晚作晴寶山深靜鵓鳩鳴雲收翠戟龍文潤日透金鋪獸面明蠺出火時桑正沃秧抽頴處麥還成在天列聖孫謀逺流福人間釀太平景靈宫謁景靈宫楊萬里夜雪猶飄天目峯曉晴先暖太清宫雲翻孔雀金花碧日射鴛鴦玊瓦紅百辟焚香宫栁影一鴉飛立殿簷東仰瞻九聖聮龍兖萬嵗千秋對昊穹扈從朝獻四首任希夷齊宿連宵鳯掖西才交五鼓著朝衣明當接盞天興殿免從金輿入殿幃夕郎同列升金殿分立虛皇寶座前天子參神來縟位侍臣夾跪御爐邊扈從齋宫每賜茶玉甌常瀹建溪芽今朝值雨傳宣免只向階前侍翠華禮官前𨗳赭黃袍陟降靈宫九陛髙二十七筵俱再拜精虔不憚聖躬勞接盞天興殿同前遙望黃袍赭色鮮微臣先已立鈞天褥旁跪接金杯酒衣上濃熏寶篆煙閶闔才回紅曲蓋瑣扉亟驟錦鞍韀今晨特為君王霽羽仗方停又沛然九宫壇九宫壇齋宿次尹少稷韻范成大􅋄􅋄馳三里蕭蕭共一餐吏方綿禮蕝公自將詩壇隙月窺牀近窗風刮坐寒鴉鳴未忍散端為合并難後省後省齋宿三首魏了翁書生只慣野人廬誰識潭潭省府居獨坐黃昏誰是伴紫薇閣上四厨書閣上有四厨書久無人拂拭多有蠧爛朱榮鉛砌拱都堂靜閣明窗夾主廊堂後主廊廊之東西分四閣為執政位北有一堂二閣為左右丞相位堂為會議之所北過東為思堂諸府會話中書試童子在焉外省諸司西側畔樞寮却在外東廂朝罷歸來政事堂衣冠牣闕鷺成行須臾排馬還私第一片間庭鎖夕陽後省紫薇花任希夷清曉開軒俯鳯池小山經雨石增輝琉璃葉底珊瑚幹立出池邊是紫薇樞屬西府直舍盆池種蓮二首楊萬里飛空天鏡墮莓苔玊井移蓮向署裁坐看一花隨手長挨門半葉出頭來稍添菱荇相縈帶便有龜魚數往回剩欲繞池三兩匝數聲排馬苦相催西府寒泉汲十尋深澆淺灑碧森森髙花已照紅粧鏡小答新抽紫玉簮鈿破尚餘新雨恨繖疏才作半池隂西湖瘦得盆來大音馱更伴詩人恐不禁御史臺臺中聽雪洪咨夔淅瀝松􅈦夜空山一樣聲冰霜元自徑水月更添清衾薄難留夢窗虛易得明庭烏催奏墨未曉已先鳴祕書省次洪邁館中紅梅韻周必大紅羅亭深宫漏遲宫花四面誰得知南唐苑中有紅羅亭四面專植紅梅見雜志蓬山移植自何世國色含酒紛滿枝初疑太真欲起舞霓裳拂飾天然姿又如東家窺牆女施朱映粉尤相宜不然朝雲頩薄怒自持似對襄王時須臾燕支著雨落整粧俯照含風漪遊蜂戲蝶日採掇嗟爾何異氓之蚩提壺火急就公飲他日墮馬空啼眉次王十朋省中黃梅韻同前化工未幻酴醿菊先放緗梅伴羣玉幽姿著意慕鉛黃正色何心輕蕚緑粧成自淺風味深對此寧辭食無肉可憐涪翁被渠惱中嵗梅屏杯杓醁省中黃梅在酴醿之側黃魯直戲答王觀復酴醿詩云誰將陶令黃金菊幻出酴醿白玉花賦木犀次韻三首同前前生定自為黃卷一念無如魚蠧何今度全身散金粟藝香從此不須多曉翻汗簡困遮羅午對枯枰輒爛柯天遣幽香一喚起醒然頓作出瓶鵝怪底花開已兩回先生儤直未銜杯若猶不領渠儂意猶向階前一再開次韻著庭緗梅同前繭黃織就費天機付與園林晚出枝東觀奇童承詔後南昌故尉欲仙時芳心向日重重展清馥因風細細知詩志品題猶誤在紅梅未是獨開遲祕閣曝書二首周紫芝藝香時近曝書筵縹帙緗囊得縱觀不是聖朝修故事豈知藏室有清官香羅剪帕金描鳯紅字排方玊作籖身到蓬山瞻御墨眼驚奎宿射珠簾題吳説石渠大字同前中郎往昔逰鴻都眼見帚堊心成書乃知𨽻法亦天授後世豈復斯人徒周王百度新復古道家山是圖書府吳侯妙翰絶古今髙榜橫空近風雨大字三尺古所難細書不要烏絲欄四蹄自扶半邉石兩翮忽舉空中鸞知君似是文中虎便恐聲名傳帝所借令頭白下凌雲寄語韋郎耐辛苦和髙似中省中雪洪咨夔升平見一斑未臘得三雪天開銀色界人立水晶闕小團醉後煮清夢梅邊説莫道石渠春不似山隂月省中次韻同前東風婉娩燕來雙禁漏無聲萬緑香寶鴨炷雲朝太紫玉蜍挹露校鉛黃聖賢不斷千年脈宇宙常存一點光老鶴也知虛靜好夜深踏月上修廊院轄檢院即事任希夷禁路風清飛早鴉官卑難望紫宸衙了無公事鈎簾坐一本冬清落細花攝政院分曹正在壁門東兼假猶慚兩院通諫鼓無聲誰訟枉匭函有疏為平戎桞分御路晚煙碧花繞宫牆初日紅退食心間了無補西風吹影鬢如蓬左藏西廡下紙閣負暄戲題并序楊萬里左帑火禁清寒非人間有也而庫官孔仲石假季承史伯載心匠天巧創一火閣不薪不炭暖亦非人間有豫以小暘谷名之且賦絶句水衡仙客住冰天雪嚙風餐更禁煙不是移來小暘谷老夫凍折兩詩肩貢院禮闈奏號畢呈天官侍郎任希夷奉詔程文閲四旬紛來萬卷日橫陳憐渠燈火勤三嵗惱我簾帷度一春勝日鶯花辜樂事它年桃李識何人遙知吏部尋春遍紅紫芳菲得句新省闈試士洪咨夔東風席帽快行催渾為天家造士來捧詔九霄雲氣濕分題五色日華開㨂金沙裏須精鑒脫頴囊中盡異材容愛直言天子聖好聽臚唱響春雷上已銓闈董試二首同前天氣年年只麼新官忙不似舊間身油車畫舫西湖閙可惜埋頭典却春栁暗鴉嬌日正長筆頭風雨響修廊一簾芳碧雙蝴蝶也解尋人姓氏香宫觀冬祠太一六言四首范成大三一舊傳神貺十神今濟時艱願挽靈旗北指為君直搗隂山月色朧明碧瓦蠟煙浮動黃簾岡騎飈輪欲下一天飛霰纎纎雲木棲烏未動風庭警鶴先鳴殘夜百靈夙駕人聞鼻息雷驚行道羽衣縹眇捲班玊佩冬瓏回首金鋪獸面步虛聲在天風太乙宫迎駕任希夷侵夕猶煩雨灑塵鑾輿才御霽光分龍顔喜動雙黃繖花帽裝成五采雲清蹕一聲天下喜簫韶九奏世間聞侍臣扈從沾天宴親舉堯觴更一欣太一宫齋宿洪咨夔寶鑰轟霄啓玉晨風恬雪霽淨無塵東皇太一紫壇曉世界大千青陸春藜杖流光環珮集鋒旗斂影豆籩陳樂歌須仗甘泉筆斧藻天家泰道新太一宫後武林山樓鑰易君求賦武林山日困塵勞無暫間我求挂冠欲歸去念此詩債須當還武林山出武林水靈隱後山無乃是此山亦復用此名細考其求真有以天目兩乳到錢塘一山環湖萬龍翔扶輿磅礴擁王氣皇居壯麗環宫牆湖隂一峯如怒猊勢臨城北尤瑰奇吳越大作緇黃廬為穿百井以厭之從來有龍必有珠此雖培塿千山餘中興南渡為行都崇列原廟太一廬曽因祠事來登眺闤闠塵中有圓嶠薰風時來洗袢暑緑樹隂隂隱殘照我得暫來猶醒心羡君清福住年深長安信美非吾土倦翼惟思歸故林延祥觀後山亭周紫芝附山結真祠朱門照湖水湖流入中池秀色歸淨几風簾邃旌幢神衛森劍履清芬宿華殿瑞霧蒙玊扆髣佛懷神京想像輪奐美祈年開新宫祝釐奉天子良辰復難會嵗暮得斯喜况乃清樾中飛樓見千里雲車儻可乘吾事兹已矣便當賦逺逰未可回屐齒四聖觀涼堂髙似孫水明一色抱神州雨壓輕塵不敢浮山北山南人喚酒春前春後客憑樓射熊館暗花扶扆下鵠池深栁拂舟白首都人能道舊君王曽奉上皇逰苑囿駕幸聚景園楊萬里帝心憂麥復憂桑一念通天轉雨暘五色日華銷積靄三春花草殿餘芳黃雲暖照天顔喜紅藥濃薰禁籞香見説都人爭出郭歡聲舞倦萬垂楊玉津園餞魏王胡銓餞行朱邸帝城春隨例顛忙宴玊津報國獨勞千一慮鈞天同聽十三人金巵宣勸君恩重花露湔愁醉夢真却憶故山猿鶴在便思投劾乞其身聚景園宴集任希夷晚排閶闔披雲霧身躡仙蹤逰禁宇始知天上自清涼不信人間有炎暑庭前青松笙竽聲望處紅渠錦繡雲月卿領客意繾綣冰盤照坐光繽紛薰堂盡却蒲葵扇瑶階細展桃枝簟加籩新來波上菱如珠更剝盤中芡老罷漸無翰墨功臭味喜入芝蘭叢二妙不階阿鳯至四老但許商山同明當入直須隨仗夕陽未卜催歸槳重城街鼓已鼕鼕舉頭桂魄層霄上宴玉津園江樓七首同前風靜潮䀶減江空夕照多星星波上艇隱隱岸邊莎風光連北闕景物傍西湖禁籞濤江上兹樓天下無虛齋留御榻小徑近層崖再拜觀奎畫渾疑侍玊階參天宫柏翠布地禁花紅臺沼如文囿規模有汴風浙江天闕下波惡祖龍知在漢如西渭於周比右伊翼翼瞻齋殿深嚴步苑廊三人俱漢傑一老玷周行栁花馳道雪櫻子上林紅留得青春住從教白髮翁舟過御園二首陸遊聖主憂民罷露臺春風别苑晝常開盡除曼衍魚龍戲不禁芻蕘雉兔來水鳥被人橫翠靄宫花經雨委蒼苔殘年自喜身強健又作清都夢一回水殿西頭起砌臺緑楊閙處杏花開簫韶本與人同樂羽衛才聞嵗一來鷁首波生涵藻荇金鋪雨後上莓苔逺臣侍宴應無日目斷堯雲到晚回聚景園髙似孫翠花不向苑中來可是年年惜露臺水際春風寒漠漠官梅却作野梅開咸淳臨安志卷十五
