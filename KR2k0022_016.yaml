body:
  text: 咸淳臨安志卷十六宋潛説友撰疆域一天地氣運視帝王作興杭昔屬揚揚之山藪川浸職方氏特舉其凡耳杭雖以禹得名弗録也當春秋時是為越境猶未與檇李並書於經郡於嬴國於漢歷吳晉宋齊梁俱以縣𨽻版圖陳隋至唐以錢塘餘杭名郡若州間又為使所治浸顯矣端倪呈露有龍飛鳯舞之象焉曠嵗滋久尚虛厥符逮於五季錢氏興其間乘屢戰之兵力盡有十四州之地卒能世守臣節歸於我宋夫天之所胙必假手於世之豪傑使崎嶇自立於危亂之中保境衛民以待有德然後大聖徐起而收之休養生息遹開中興越至今兹天運日以新地氣日以厚所以翼我丕基者方來而未艾嗚呼此豈人力也哉敘疆域吳越考杭地本屬吳屬越諸家為説不同以為屬吳者晏元獻公類要皇朝郡縣志及乾道舊志皆然而不著其説惟淳祐志引吳越春秋所載越王勾踐入臣於吳羣臣送至浙江臨水祖道又載吳王夫差為越所敗而走止秦餘杭山又史記楚威王伐越盡取吳地至浙江遂謂吳越必以浙江為分界以為屬越者杜佑通典歐陽忞輿地廣記皆云春秋時屬越越敗屬吳東陽王象之本其説謂錢塘舊為越有夫差敗越地始入吳雖皆知為越地而未知分界所在惟太平寰宇記引吳地記云越國西北界至禦兒即檇李今嘉興府崇德縣有禦兒鄉有水名語水語與禦通則是吳越以禦兒為分界二説各有所據今精考之當以後説為是春秋魯定公十四年五月於越敗吳于檇李杜預注云嘉興縣南檇李城又史記世家闔閭十九年伐越勾踐迎擊之檇李賈逵注云檇李越地據此則檇李以南皆為越境杭在其中矣此杭為越地一也吳越春秋勾踐既臣於吳夫差賜之書增其封東至句甬西至檇李南至姑末北至平原越絶書作武原云今海鹽縱橫八百餘里且謂越本興國千里吾雖封之未盡其國則是所封之地皆越故疆又越絶書越地記云語兒鄉故越界本名就李即檇李吳疆越地以為戰地至柴辟亭吳地記云柴辟亭到語兒就李吳侵以為戰地則吳越疆界尤極明白此杭為越地二也若淳祐志所引三説皆有可辨論者其一謂越羣臣祖勾踐於浙江則是吳越以浙江為界殊不知是時勾踐方保棲會稽之山浙江以西皆為吳有宜其祖道止於江濵况又未嘗曰送之境上耶其一謂夫差走餘杭山則餘杭在吳之境內殊不知吳自有秦餘杭山姑蘇志云陽山又名秦餘杭山在長洲西北三十里夫差棲於此死因葬焉至今號夫差墓又越絶書吳地傳云秦餘杭山去毗陵縣五十里有湖水近太湖今餘杭去長洲太湖甚逺豈可以名之偶同強合為一且越在東南吳在西北吳王不西北走蘇常而反東南走餘杭必無此理其一謂楚伐越盡取故吳地至浙江則浙江之西乃吳地殊不知此句自是兩義所謂故吳地者言越故取於吳者也至浙江者言併越元有之地而盡取之也豈可概以為故吳地乎皇極經世以其辭不别白故於楚滅越盡取其地之下書曰東開地至浙江則是浙西以西本非本境乃楚因越地而開者也合是三説則前志之誤可以渙然無疑矣咸淳臨安志卷十六
