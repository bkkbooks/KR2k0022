body:
  text: 咸淳臨安志卷十八宋潛説友撰疆域三星土日辰分野為星紀周禮保章氏以星土辨九州之地所封封域皆有分星以觀妖祥鄭注星紀吳越也史記越之亡熒惑守斗越絶書伍子胥對吳王闔廬曰虹霓牽牛其異女黃氣在上青黑於下日月光明歷南斗吳越為鄰同俗并土前漢天文志斗江湖牽牛婺女揚州又地理志吳地斗分野也今之會稽九江丹陽豫章廬江廣陵六安臨淮盡吳分也越地牽牛婺女之分野也今之蒼梧鬱林合浦交趾九真南海日南皆越分也後漢律歷志注蔡雍月令章句云自斗六度至須女二度謂之星紀之次越之分野後漢郡國志注帝王世記云自斗十一度至婺女七度日星紀之次斗建在子吳越分野晉天文志魏太史令陳卓言郡國所入宿度自南斗十二度至須女七度為星紀吳越之分野屬揚州注云費直起斗十度蔡雍起斗六度又云陳卓范蠡鬼谷張良諸葛亮譙周京房張衡並云斗牽牛須女吳越揚州內會稽入牛一度苻堅欲謀而冦石越曰今嵗星鎮斗牛福德在焉苻融曰嵗鎮斗牛吳越之福隋志自斗十二度至須女七度為星紀於辰在丑為吳越分野唐天文志星紀得雲漢下流百川歸焉故其分野自南河下流窮南紀之曲東南負海為星紀又曰南斗牽牛星紀也丑初起南斗九度餘千四十二杪十二大中南斗二十四度終女四度逾南河得會稽涉越門訖南海為星紀之分古吳越及東南百越之國南斗在雲漢下流當淮海間為吳分牽牛去南河浸逺自豫章迄會稽南踰嶺徼為越分按班固取三統歷十二次配十二野其説雖詳然未及度數至魏陳卓取費直等説然後分畫起某度至某度及唐一行兩戒之説分南北河及吳越門以雲漢紀之則其術詳矣然唐晉二史所指吳越度數亦有少異蓋乾象推遷前後有差殊耳國史兩浙路當天文南斗須女之分曰為丁史記天官書丙丁江淮海岱謂此日天文有異其占在吳越後漢天文志注丁已為吳郡會稽詳見後辰為丑或曰已或曰戍後漢郡國志吳越其辰在丑晉天文志吳越於辰在丑隋志同又日蝕占云太康元年正月己丑朔五色氣貫日占曰丑為斗牛主吳越前漢天文志戌吳越後漢天文志注引星經云斗玊衡第六星主揚州常以五巳日候之丁巳為吳郡會稽謂此日占斗星之色五星為火史天官書吳楚之疆候在熒惑占於鳥衡漢志同後漢天文志注引星經云熒惑主霍山揚荆交州唐天文志星紀鶉尾以負南海本志云負者以其在雲漢之隂也故其神主於衡山熒惑位焉城郭隋楊素創周回三十六里九十步九域志唐昭宗景福二年錢鏐發民夫二十萬及十三都軍士築羅城周七十里資治通鑑城東便門候潮門保安門舊名小堰門新門崇新門俗呼薦橋門東青門俗呼菜市門艮山門城西錢湖門清波門俗呼暗門豐豫門舊名涌金門錢塘門城南嘉會門城北餘杭門俗呼北關門水門保安門南水門北水門天宗門餘杭門據乾道志錢氏舊門南曰龍山東曰竹車南土北土保德北曰北關今人家門首尚有青石樞相對西曰涵水西關在雷峯塔下城中又有門曰朝天門曰炭橋新門曰鹽橋門今並廢土人猶以門稱惟朝天兩土臺尚存餘杭縣祥符志云舊縣城在溪南周回六里二百步東漢熹平二年縣令陳渾徙於溪北後復治於溪西後唐時號為清平軍城洎雍熙初再徙溪北周五百四十三丈髙一丈三尺下廣一丈五尺壕濶二丈五尺錢武肅王又修廣之舊城今間有存者城門四曰榮春湖光迎波永豐周赧王城在縣北三十六里髙一丈五尺周回五里二十六步內有赧王廟周回三百步髙一丈五尺舊傳赧王南遊所立史無是事今不可考舊倉城在縣東南二里安樂山上髙二丈上廣八尺下廣二丈周回四里一百五十步唐永正五年刺史張綱奏置倉宇四十二間天寶八載採訪使奏置常平倉同在城內錢氏廢倉建寺今名善法院倉址仍存臨安縣周回五百二十步池在東北於潛縣祥符志云古城在縣北二百四十步耆老相傳隋開皇十三年越國公楊素築今城周四百五十二步髙一丈五尺厚五尺基厚一丈八尺濠濶一丈八尺深四尺縣東七里九十步有古城傳云武德中置潛州所城髙一丈五尺厚九尺基厚一丈八尺今地名城嶺紫溪廢城在縣南三十里潛川鄉城後村越王城在縣東一十五里按阿頂山峯上有越王城夏后少康之後封於越其支庶或居於此城址猶在又名平越城下有平越村與皇甫巖相近富陽縣周六百步髙一丈壕濶一丈五尺舊傳咸通十年縣令趙訥修築東安郡城在縣北十八里黃武五年置周七百六十步今廢舊志云郡全琮築古城在榮國寺西北隅即今永寧寺城周十二里髙二丈一尺濶二丈有屋七百一十七間樓十二間五代時城在縣東南錢氏以地逼江乃壘磗礫為之略存封邑新城縣縣因山為城周二千五百七十一步髙二丈二尺大順二年杜太師稜築羅隱撰記有門四東曰熙春南曰太平西曰順城北曰寧海又有富春新鎮桐江祠堂四門古城在縣東南三步周回三百丈唐徐敬業起兵所築祥符舊志鹽官縣城周四百六十步髙二丈唐永徽六年築濠濶五丈深四尺祥符舊志古城在縣西北四十一里周六百步髙八尺隋大業十三年築今廢祥符舊志昌化縣周三百六十步壕濶一丈五尺久廢惟古木環城基社稷壇舊在嘉會門內今徙於城西一里小昭慶寺側基瀕湖間圯於水於咸淳四年安撫潛説友築壇壝而新之創齋宇庖屋等凡九楹周以石垣且甓路文記文知仁和縣郭應酉撰重建壇記皇上涖祚之五年冬制詔今户部侍郎潛公為京兆尹始謁羣望又會中春有事于社稷禮成顧謂僚吏曰吾聞夫元祐間文忠蘇公守兹土敬共明神上祝致告有北墉答隂之義當時規置凖古概可想見兹其處乎吏白壇舊在嘉會門內邦志逸所徙嵗月意時紹興駐蹕初也公喟然曰今視昔宜愈益隆重顧藩拔埒荒宜木秃缺環視梵宫卓犖若有矜色先生示本之意隱矣其何以圭表四方于是戒有司庀其役仍舊貫為壇五壇皆三成各有壝風雨雷參焉不書尊社稷也北為齋廬五楹更衣牲庖門序垣甃百用俱修越秋祀執事者更貌易觀陟降齊愈謂是不可無紀則以屬其從事郭應酉會以省覲去亡何辱用赤令拜堂下公命之不置乃弗敢辭按古者天子有大社王社諸侯有國社侯社大社為天下報功王社為京師報功京師天子所自治之國也侯國則各以其分土蕃我王室嬴氏墟侯社為郡三十六京師為內史先王之典盡廢漢興都關中立漢社稷而又為公社猶有王社之遺意焉光武建大社稷於雒陽始命州縣皆置太守令長侍祠自是先王為京師報功之禮始寄之典京師者而實古王社也且古所謂報功非曰相我穡事而巳災而類征而宜帥師而受脤罔不徼福于神我聖朝南渡百年根本安固屬者凶人産釁謀夫靡臧幾使載芟良耜之頌不奏于豳今邦國都鄙下至二十五家之聚尚有爾土厥有幹有年于兹邑壤耋衢稚飽嬉以歌關門積用大穰雖水旱無所患位育固存乎人夫亦惟神之丕况而美報之道蔑以超于郡國反不逮焉丘之猶知殫出畢作一封人之事長吏莫之克祗則我之先皇帝與其時社稷臣再胙九土何其厪且勩也蓋昔者公辨姦最早卒至燎原重感夫社稷之靈蔭民罔極故汲汲焉急人所緩如此始公既釋奠于先聖先師顧視黌舍旁風上雨則亟命葺之與是役也實相先後凡皆政之大本是以冉期之間百爾施置靡不千祀其利疏三河六井以蘇湫底治矼梁二百餘所拓湖岸千餘文墊隘用亨代民賦為緡錢九十萬有竒特未歇也官無欹署吏祿以時軍食化殫為饒廩囷槥亡務使人人獲其所厥施無算校其贏猶能為公家儲酤本凡五百萬緡償少府錢又什二焉夫以國常弛征市不籠貨禹甸周原漢上腴之殖非有加也亦惟今朝廷治平溉其根不抑耗其實而公之治又一本于誠學蓋與造化之功用二氣之良能流行于兩間鈞一真實無妄之理故能使人順賴其德若非土不立非榖不生是則公之有功于京師固與社稷同其大噫社稷之為大也豈若彼幻教詭詞飛竒鈎貨者之誑而今小大庶邦皆有社稷往往此之不為顧彼之久行抑惑矣應酉丕式見德亦既敬止乃諗于公以書之牲石云錢塘縣在縣西仁和縣在舊治之西北餘杭縣舊在縣西南二里於景德三年立後徙於縣西門外五十步溪塘之北臨安縣在縣西南一里於寶祐四年令王橚重修於潛縣在縣西百步瑞應坊內於政和二年令韓瓘修富陽縣在縣西一里二百步記文陳震撰百里地視子男得與徹侯通祀社稷有土有民必相原隰立壇壝示民以本春秋以祈以報齊齊其敬神依人而行故物無疵癘嵗月平康上矣富春距縣廨一里二百步舊有社稷壇四面平野縣令吕公昭亮始作亭繞以墻先是里正掌之漫無訾省旁穴土而版築之覆以茨弗克禦霖潦輒圯牧蓄得以為囿祭之日往遇雨則執事于亭下亭湫隘薦祼興俯不度類亡具甚縣大且劇吏撥煩不給嵗時熟視漫為故常民忘其本始不可以訓祀滋不虔神罔時歆嵗仍不登乃丙子夏六月淫潦至垣復于土壇則盡夷水既退今令曽公至祠下顧瞻愓息屬僚佐曰古者犧牲既成粢盛既潔祭祀以時然有旱乾水溢則咎社稷今反是凶年將誰尤亟其新之則吾民未可以勞于以剔冗蠧會贏餘經工度土相方辨位列為壇陛如禮若風雷雨附其壇于旁甃以甎主以石不屋所以受氣也周匝以垣悉瓦之齊明之日省牲之夕風雨不可無蓋障會邑人更里祠給公帑竭其財規為屋廣狹中度宏敞軒豁巍然中峙向之亭化而為門旁達大逵表以外門揭以扁榜回環周密極其崇嚴洞洞屬屬如神在焉凡役于公者紿庸市于私者如其賈民不知有役也越十月甲子告成邑之耆耋雜然來觀相與曰吾儔疇昔所見不稱豈知善人之本于是乎在哉其自今兹是禱是祠嵗無災沴家有積倉舍是焉依始公之至適嵗五月輸賦亟甚請於州緩之既行施及旁縣方民病于溺具舟楫載糗粻損米之價官償其值籍水潦之田上其簿得蠲稅為石者五千有竒大興學校之廢闕簡民之秀者而自教之户乏藏鏹官質其物不入息修民義役之法俾勿壞又為之道溝術繕津梁邑之西有橋最大冞年幾頽公勸富室易之佐其費不以屬吏人用不擾東走京事濵江多險且泥淖犖負載惴栗盡護以石欄砌之得以無恐未及期利民之事悉舉其大者社稷之相繫民事又大公方志于民其修廢也固宜噫其知本矣推是以往庇民事業當又益大豈直一邑而已哉公名治鳳字君輝晉江人大丞相魯宣靖公之孫今宫賔樞相之弟其源流有自云新城縣在縣西半里鹽官縣舊在縣北二里今徙於縣北一里半於政和二年令歐陽珣修築記文歐陽珣記古者建國設都先立社稷其意以謂民非穀不食穀非土不生立其五土五穀之神而祀之示不忘本也考之成周司徒宗伯之官或設其壝或掌其禮其事可謂至詳而臨祀之時令執事者又有封人之職故每嵗春秋祈報俎豆一設神必顧歆豐年之屢蓋出于此仰惟我國家自掃除妖氛長民之官皆得修社稷之祀肆及生人聰明睿知灼見遐邇尚慮海邦山邑小大之吏務在于簿書期會罔知嚴祀以稱吾重本事神之意故乃者制詔書增崇社稷之制列之為圖以頒焉鹽官雖窮隘僻左而舊壇具存荒穢不治今詔下之日鳩工度材即其舊而新之社壇居其左稷壇居其右就社稷之左右别為壇祀雷雨風師則用之而又設燎壇于其東建齋廳于其北直北為一門自門之左右皆立垣墉以為衛居無事時則扄其門而鑰之前祭之日執事者造而啓焉其它陛級之數廣狹之度悉按圖而為之稽諸禮經若合符契自是嵗時獻薦之吏升降俯仰莫不祗肅嗚呼韙哉夫先王之典禮莫重于祭祀而祭祀之所先莫重于社稷且社稷壇壝苟簡于數千百年而繕修于今日豈非典禮之行自有時耶當明天子承治定之餘慨然以禮文為意故其制作有及于此古人云禮莫大于聖王斯言信哉昌化縣在縣東一百五十步咸淳臨安志卷十八
