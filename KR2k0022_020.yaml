body:
  text: 咸淳臨安志卷二十宋潜說友撰疆域五諸鎮江漲橋鎮在府之北一十八里臨平鎮在府之東四十五里范浦鎮在府之東南二里湯村鎮在府之東三十里本仁和鎮今廢右𨽻仁和縣曺溪鎮在縣北二十五里餘杭鎮在溪南今廢浣坎鎮在縣西一十五里右𨽻餘杭縣東安鎮在縣西一百步南新鎮在縣西五十里於熙寧五年改南新縣為鎮今廢右𨽻新城縣長安鎮在縣西北二十里鹽官鎮在縣西一百步唐會昌三年置今廢右𨽻鹽官縣鄉里錢塘縣管十三鄉太平寰宇記云舊二十五鄉至國初十鄉履泰南鄉管里三放馬烟脂皇妃履泰北鄉管里六黃山石塘掃帚西堰師姑青枝惠民鄉管里六夾城柴場羊角乳臺馬城印墓調露鄉管里六臨潭三堆板橋狗葬潘塘駱家靈芝鄉管里五梁渚笋山前梁後梁胡林孝女南鄉管里四長平橫樂楊山奉口孝女北鄉管里五安溪菉豆下墟上墟雙牌崇化鄉管里六方山篠山百步長秋蔣村上涇欽賢鄉管里六涇山西溪韓家篠弄東木上步定山南鄉管里四沙蕩胡步滕村分金定山北鄉管里四排山徐村牛坊南蕩長夀鄉管里四淡竹大斗凌溪白升安吉鄉管里三楊村社井轉塘仁和縣管十一鄉芳林鄉管里五南城北城芳林桐江會安肇元鄉管里四募善永和長興升平大雲鄉管里四永泰葛墅仲墅華墅豐年鄉管里四長夀五杭博陸前莊長樂鄉管里五赭山長洲金浦崇仁清河安仁東鄉管里三仁和望江芳梅安仁西鄉管里四永仁白石曲江常熟太平鄉管里四華林石塘永安太平廉德鄉管里四上明永樂豐和新安永和鄉管里四華嚴保林平湖義和臨江鄉管里三曲江海門望潮餘杭縣管八鄉太平寰宇記舊十四鄉安樂鄉管里一居賢欽德鄉管里一鳳亭招德鄉管里一由拳同化鄉管里一仙宅孝行鄉管里一進賢常熟鄉管里一福安長安鄉管里一永泰止戈鄉管里二安仁修義臨安縣管二十二鄉太平寰宇記云舊有二十六鄉衣錦南鄉管里五臨水安正宣明碧落勳貴福昌鄉管里五見賢積善自省思齊智過衣錦北鄉管里四上林義成新溪髙陽孝感鄉管里五依仁躬平忠信遷善唯孝臨安鄉管里五石髙行茒山安業祥龍靈鳳鄉管里五敬遜推畔道敬太平承唐鳳亭鄉管里五祥烟昭仁景仁瑞麥鳳亭德義鄉管里五勒山證祥昭明至道新興新安鄉管里五靈溪光被石錫祐山克遜金岫鄉管里五懷恩唐賢髙行崇信志孝興化鄉管里五懷音興國歸唐唐興祥風永寧鄉管里五石門西靜上泉通德天目髙陸鄉管里五猷溪新安開福清泉知仁神龍鄉管里五大林石室龍墟教義永樂慶仙鄉管里五垂流一作𣲖硤里長夀郭賢慶仙國昌鄉管里五上永開善清化福昌亭雲慶雲鄉管里五黃嵗鼓腹擊壤光被和平大雲鄉管里五嵑山大儀千載永安永和天目鄉舊名順化管里一招賢平東鄉管里三仙溪安和上雲平西鄉管里二白石上平鳳翥鄉管里三西隱崇敬黃峴於潜縣管六鄉惟新鄉管里十二歸教新安文桂寶城山鶴上雲嘉慶嘉祥千秋奉德靈林恭順嘉德鄉管里八甘液西霞遵化擇善遵遜遵教遵德遵義波亭鄉管里八黃山樂齊清渚新豐還風中興歸仁逺固豐國鄉管里十二集賢積善崇仁依仁唐谷還朴昭訓豐仁唐城落雲安樂義亭潜川鄉管里八上源太平塘湖永昌樂平藍田唐昌保宇長安鄉管里七豐信安昌居義印渚大象金谷崇化富陽縣管十鄉富春鄉舊名明堂鄉管里二貴樂春明仙山鄉管里三安仁舊名安吉長夀日升慈孝鄉管里四靈泉開化崇愛臨湖豐義鄉管里三惠愛循雉祥風臨江鄉管里三感化屠山看潮惠政鄉管里三儀鳳慶善慶護長夀鄉管里三大元望仙江隂詠歌鄉管里二麗景靈峰永豐鄉管里二楊漲永寧義安鄉管里二善政棲鶴新城縣管十二鄉舊管八鄉後併南新縣四鄉入焉祥禽鄉唐貞觀中有白雀見因以為名管里五白雀遊藝旌德依化感化折桂鄉舊名龍翔鄉今嘉祐中許廣淵登第邑人因以為名管里五光化永嘉折桂大臻西嘉七賢鄉晉咸和中樵者入山見七仙客坐石圍棋表奏于當朝改今名管里四新城招賢永仙盡忠永昌鄉舊名唐昌至國朝改今名管里三芝秀歸德安業新登鄉舊名新城避梁朝諱改今名管里五正素翊贊待賢永定常樂太平鄉管里五髙沙永清永安招德人至昌東鄉舊名昌德與鳳翦為八鄉正明五年既割鳳翦鄉𨽻安國縣因分昌德為昌東昌西復為八鄉管里四昌德葛泉永淳宣德昌西鄉管里三仁義永訓松溪右號下八鄉新安鄉管里二昕慈景山寧善鄉管里二昭明開元南新鄉管里二業安積善廣陵鄉管里二石義湘溪右號上四鄉舊𨽻南新縣至熙寧五年併新城為十二鄉鹽官縣管六鄉時和鄉管里十安義積善臨門興平香花往義奉訓社陂連堆返哺昌亭鄉管里十賢隱守義德政孝義義亭克遜順孫郁義鳳栖正和元吉東鄉管里八乾福正幹靈光節義牧化來蘇擊壤鼓腹元吉西鄉管里七處仁時和招福會山靈昌萬夀長寧靈泉鄉管里五嘉慶修義承休樂正金牛長平鄉管里五擇善清平慶善保家新安昌化縣管四鄉一村太平寰宇記載舊有十三鄉永豐鄉管里十二道義肅清懷惠降化待賔扶養金山唐福湯山安樂唐川懷感玉山鄉管里十一唐秀平度白山百丈塘詢祠山紫澗上渡隱居習善金城吳安鄉管里十一會直方圎扶善居貫祗園無為鼓腹刑清擊壤道泰孝和金山鄉管里十四孝順泉山臨池至孝上和上願來蘇玉泉沈山安樂朱鄉豐樂新義孝和手穵烏八切村管里二鎮山孝義咸淳臨安志卷二十
