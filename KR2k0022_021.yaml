body:
  text: 咸淳臨安志卷二十一宋潜說友撰彊域六橋道府城南自登平坊內石橋起直至天宗水門大河登平橋登平坊內六部橋舊稱都亭驛橋黑橋六部橋北州橋玉牒所對巷安永橋執政府前大渠南下瓦後橋又名衆樂橋衆安橋清湖至此止清湖橋八字橋西至釣橋止黑橋左藏庫東左藏庫橋左藏庫前安濟橋駙馬府前西安福橋安濟橋西通太學前新街丁家橋安福橋西長生老人橋霍史君廟前錢塘縣橋在縣前不通舟楫大和橋俗呼柴垜橋常慶坊內東北薦橋富樂坊東豐樂橋善履坊東油蠟局橋元名新橋鹽橋興德坊東蒲橋鹽橋東不通舟楫咸淳倉橋元名東橋塌坊橋御酒庫東仙林寺橋仙林寺東西橋平糴倉北通濟橋豐儲倉後葛家橋東俗呼梅家橋葛家橋豐儲倉後小梅家橋御酒庫北田家普濟橋通濟橋北白洋池橋白洋池前方家橋小河自內宗陽橋轉西由鍾公橋起至衆安橋轉至觀橋又轉以北直至淳祐倉前接餘杭水門弔橋止鍾公橋通上下抱劍營街清冷橋南通沙皮巷北通漆器墻熙春橋南瓦熙春樓前灌肺橋融和坊對入巷金波橋通和坊內普濟橋金波橋北巧兒橋榮府看街後寶祐橋寶祐坊內亨橋五間樓東平津橋俗呼猫兒橋賢福坊內舍人橋平津橋北永清橋舍人橋北水巷橋蘭陵坊內日新樓橋水巷橋北芳潤橋羲和坊內元名炭橋李博士橋武志坊內棚橋新安坊內新安橋新安坊內鵝鴨橋元名北橋安國坊內安國橋懷逺坊內軍頭司橋延定坊內觀橋報恩坊北至御街上過此橋轉西一直至新莊橋入萬壽觀貢院橋禮部貢院前潘葑庫橋潘葑酒庫前祥符橋祥符寺前小新莊橋普寧坊東清逺橋普寧坊東仁和倉橋仁和縣巷對萬嵗橋仁和縣巷北天水縣橋六部架閣庫前百萬倉橋淳祐倉前永新橋西河自斷河頭直北至衆安橋止自府治前橋由流福坊水路至惠遷橋止自涌金橋入俞家園鑷子橋至白蓮花橋止自八字橋西入清湖橋至北關餘杭水門止普濟橋斷河頭五聖廟後施家橋龍翔宫後侍郎橋郎簡字叔廉王荆公有寄詩甚稱其賢以工部侍郎致仕居此里人德之遂以名橋三橋西樓金文正西酒庫北府衙前橋流福橋元名閘兒橋樓店務橋樓店務前戒子橋慈幼局前定安橋戒子橋北凌家橋豐豫坊口德夀橋油車巷口普安橋運司前渡子橋永安橋一名五聖廟橋在度牒庫後如意橋六房院前臺官衙後橋太常寺後小橋惠遷橋即舊金文橋界于西酒庫惠遷井之間轉北入三橋涌金橋介於涌金三池之中有扁鑷子井橋永安橋西鑷子井東永安橋俞家園張府後鑷子井湖水由此注出六房院後石橋六房院後不通舟楫湖水由此注出曲阜橋紅蓮花橋白蓮花橋並在俞家園不通舟楫將軍橋三橋北曲阜橋韓府前施水坊橋井亭橋南井亭橋甘泉坊東洪福橋清和坊東鞔鼓橋洪福橋北馬家橋鞔鼓橋北八字橋舊名洗麩橋西轉入清湖橋石灰橋十官宅前結縳橋沂王府前下瓦後橋又名衆樂橋衆安橋清湖至此止清湖橋八字橋西至釣橋止黑橋左藏庫東左藏庫橋左藏庫前安濟橋駙馬府前西安福橋安濟橋西通太學前新街丁家橋安福橋西長生老人橋霍史君廟前錢塘縣橋在縣前不通舟楫真珠河橋一名白虎橋在錢塘門裏跨真珠河不通舟楫紀家橋國子監前車橋國子監後青龍橋車橋畔不通舟楫長夀橋茶場巷西元名楊四姑橋新莊橋萬夀觀前車馬門橋景靈宫車馬門側不通舟楫師姑橋鎮城倉西中正橋元名斜橋在餘杭門裏釣橋舊名便橋餘杭水門前城南左廂進隆橋貌門白塔嶺下五聖廟橋步司左軍步一將前大慈橋步司左軍東門崇寧橋夏郎橋貌門裏楊婆橋交木場後李家橋洋泮橋東洋泮橋城南廟南紅橋馬倉巷內美政橋城南廂前南新橋一名朱橋雪醅庫東利涉橋嘉會門外上梁家橋雪醅庫巷下梁家橋顔家街樓跨浦橋浙江亭側渾水閘橋便門外鮝團前東橫河橋便門外南外橫河橋便門外布行蕭公橋南外酒庫前上泥橋大郎巷清水閘橋南外酒庫對衆惠橋候潮門外南下泥橋護聖步軍南門上欏木橋候潮門外直東亦名普濟橋下欏木橋護聖上教場門東上洪橋護聖白旗寨東中教場橋護聖中教場門東柴市橋護聖下教場門裏濟衆橋盛家弄東諸家橋保安門外竹車門南保安閘橋諸家橋西保安閘頭保安橋保安水門外升仙橋富景園前南新草橋富景園東駱家橋城東駱家跳馬軍橋駱家橋西寨前步軍橋四版橋東寨前四版橋善應寺北萬夀橋一名吕公橋四版橋西通利橋景隆觀西米市橋通利橋北五栁園橋米市橋北老兒營後福濟橋一名席潭橋五栁園北章家橋崇新門外直東淳祐橋章家橋北螺螄橋崇新門外拱聖營東普安橋一名橫河橋小粉場前廣濟橋普安橋東安濟橋蒲場巷軍巡鋪前教場門橋逰奕教場門口報恩橋東橫河軍巡鋪前蔡湖橋螺螄橋北蟹行遊奕寨橋遊奕軍真武廟後小蔡湖橋安崇橋南路上安榮橋遊奕橋北前軍橋殿司前軍雙寨門菜市橋東青門外直東太平橋東青門外選鋒軍東端平橋太平橋北十善橋黃姑橋並在東青門外順應橋元名壩子橋艮山門外東無星橋艮山門外仁和尉司前駱駝橋法明寺前繭橋艮山門外走馬塘龔家橋仁和尉司後韋家橋沙河角頭水陸寺北石斗門橋走馬塘東石斗門鋪前廣度橋韋家橋側木版橋仁和縣司側宋家橋沙角頭翁泰橋馮家橋章家橋姚店橋翁塔橋並城東鄭家園後麥莊橋鄭家園後麥莊廟前樟木廟橋城東九里松大路江家橋樟木廟前行人橋城東盧家雪窨南張娜兒橋走馬塘范家村新塘橋姚斗門鋪蔡家大橋石斗門鋪前蔡家小橋城東蔡家村姚馬四橋髙塘灣橫塘路李家橋鴨舍橋大路鴨舍橋城東官園裏孫家橋城東官園裏北猪坊橋城東官園裏金家村資福橋姚