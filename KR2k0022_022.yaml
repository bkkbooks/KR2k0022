  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0022_WYG_022-1a, image: WYG0490/WYG0490-0254a.png}
body:
  text: 咸淳臨安志卷二十二宋潜說友撰山川一禹貢一書奠髙山大川由冀州始自有天地即有山川奠云者豈獨因其自然而無所用吾力哉梁岐曰治太原曰修大陸曰作盖自有經理之功焉杭亦今日之冀也湖山之美甲東南自唐及我宋已盛見稱述翠華南幸嶽君瀆祗率先受職其岭巆嶙峋奫沄泓涵鈞天廣樂之所馮明庭祕宇之所環皆不増而髙不浚而深叢臺甲舍軨軒池籞隆麗詭特之觀所不待論民生其間耕腴而汲甘美採而鮮釣既各足所欲而薪南粲北舳艫相銜與夫江商海賈穹桅巨舶安行於烟濤渺莽之中四方百貨不趾而自集都人士女嵗時㳺冶橈蘭楫桂車流水而馬㳺龍也噫盛矣哉雖然山川信美有待而章由庚崇邱由儀之詩所為作於太平盛治之時者有以也夫叙山川三江攷諸儒釋三江者自漢孔氏而下言人人殊至坡公為説始曉然不畔於經其説曰自豫章江入彭蠡而東至海為南江自岷山至彭蠡以入海為中江自嶓冡至大别入江會彭蠡以入海為北江考古之士往往是之或者乃據韋昭所言以錢塘與松江浦陽為三而不知浦陽乃今富陽即錢塘江也一江而二之是尚足據乎錢塘江自古曰淛河見於莊子其為東南巨浸昭昭也或又以為支流小水故禹貢不載殆亦未然當禹舍杭登陸之時固嘗經行非遺之也盖浙江地勢窪下距海尤近既無事濬治故不復書程泰之侍講謂嘗經䟽𨗳則有甚小而見錄漆沮瀍澗是也無所致力則雖甚大而不書浙江洞庭是也其論當矣故今不敢强同韋氏而著其説以俟覽者擇焉山城内諸山鳳凰山祥符圖經云在城中錢塘舊治正南一十里下瞰大江直望海門山下有鳳凰門有鴈池趙清獻公抃詩云老来重守鳳凰城是也詳見中和堂其右山巔石筍林立最為怪竒舊傳錢武肅王鑿山見怪石排列兩行如從衛拱立趨向因名排衙石及刻詩石上第二峯有白塔塔西有小徑青石崔巍夾道皆峭壁中穿一衕人可往来名曰石衕好事者多題名其間自熈寧中郡守祖無擇對排衙石作介亭亭今在殿前司天風泠然有縹緲憑虚之意山上有聖果院今徙側有梵天院題詠東坡登介亭餞楊傑次公詩籃輿西出登山門嘉與我友尋仙村丹青明滅風篁嶺環佩空響桃花源今晨積霧卷千前朝欲上已蠟屐黒雲白雨如傾盆里豈畏觸熱生病根在家頭陀無為子久與青山為弟昆孤峯盡處亦何有西湖鏡天江抹分臨髙麾手謝好住清風萬壑傳其言風回響答君聼取我亦到處隨君軒髙又登介亭次劉景文韻澤國梅雨餘衰年困蒸溽堂磨新磚頗覺利腰足松根百尺井雨綆飛浄淥流觴聚兒童一笑為捧腹清風信可馭剛氣在巖麓始知共此世物外無三伏長歌入雲去不待絃管逐西湖真西子烟樹㸃眉目濤江少醖藉髙浪翻雪屋俛仰拊四海百世飛鳥速逺追錢氏餘近吊祖侯蠋吾生如寄耳寸晷輕尺玉誰似劉将軍逸韻謝邉幅千言一揮手五車不再讀春巖彩雞舞月峽哀猿哭朝先啼鴂起暮與寒螿續我老廢吟哦頼君時撃觸從今事逺覽發軔此幽谷清游得三昧至樂謝五欲莫作狂道士氣壓劉師服又登介亭次袁公濟韻昏昏墮醉夢奈此六月溽君詩如清風吹我朝睡足登臨得佳句江白照湖淥袖手猶不言黙槀已在腹是時風雨逼藹藹雲歸麓踈星帶微雨金火争見伏惜哉此清景變滅不可逐歸来讀君詩耿耿猶在目却思少年日聲價争塲屋文如翻水成賦作乂手速秋風起鴻㕍我亦繼華躅那知君蹭蹬獨泣荆山玊相見南新道青衫垂破幅早知事大謬恨不十年讀莫嗟馮唐老終勝賈誼哭今年復為僚舊好許重續升沉何足道等是蠻與觸共為湖山主出入窮澗谷衆馳君不争人棄我所欲何時神武門相約挂冠服又述古召飲介亭西風初作十分凉喜見新橙透甲香遲暮賞心驚節物登臨病眼怯秋光慣眠處士雲菴裏倦醉佳人錦瑟傍猶有夢囘清興在卧聞歸路樂聲長白丘濬字道源題聖果寺介亭詩金商肅肅淬龍淵曉揮開東北天天孫引下翡翠烟層層堆列参井邉便于裸瓖蟠危巔城雉岧嶤暗接連地祇欲誇融結權蘚花斸破蟄虫遷皮刳骨露判混元一支一節相貫穿洞庭波浪徹底乾驅来不用暴秦鞭大者臲卼下騰騫尊卑序立鴻㕍聨欲親曜寳禮法専貘豹甝虎竸差肩稟命踧踖不敢前精神張王腰攣拳覇臣納土窮海㙘怪状埋沒㡬百年中和有美既争先磷磷丹漆排雕椽太守擇之繼曩賢念此嵌空清且堅遽于峭絶剏墀軒名之以介非徒然介是長男變初世六二爻辭藴深秘重門待暴乃其卦未兆未萌堪畏避公性中正仍盡瘁悔吝何憂憂道義道義興行皇綱偹乃是擇之之本志平湖巨浸六幕寛此時非獨圖宴憙暑月芙蓉秋月濤截㫁風光千百里鵬雲沆瀣南北透離朱瞪目曠傾耳料公豈戀葦苕地才業施為自兹始或借前筯或赤箠或遏蠻戎順文軌炎上潤下火兼水無燥無烈無圮毁張衡巧製塵灰累八虬困睡金丸止勸公速為蒼生起起輔垂裳聖天子永永勲庸輝信史此亭萬古鎮星紀劉龍洲同郭殿帥逰鳳凰山一首廉纎小雨久於梅喜得新晴亦快哉五色波光麗鳷鵲十分雲氣近蓬莱旌旗側畔官墻轉戈㦸叢中武庫回走馬㸔花生怕晩果然桃李一山開又郭殿帥邀逰鳳凰山結束戰袍騎駟馬冠帶将軍宛如畫前呵小駐有美堂前去弓鳴飛鳥下青林路入轉岧嶤湖亭海觀争為髙誰知鳳舞龍飛外别有樓閣横雲霄回旋左右皆逰歴人物江山兩英特風流標致梅嶺梅磊落襟懐石林石側身更上天上行好風吹下笑談聲山神州后領要束遁走虎豹蔵蛟鯨摩挲苔蘚題詩去萬鼓叢中雜夷舞衆賔捧酒夀主人将軍自是擎天柱觀山㸔水時一来錢塘吴越何小哉指㸃中原百城在功名逼人有機會吴山在城中吴人祠子胥山上因名曰胥山盧元輔作胥山銘燬於火太平寰宇記云北有寒泉迸溢清甘不竭今山上有忠清廟天明宫中興觀清源觀瑞雲院太史局至徳觀皮塲廟聖母廟祀嶽帝母城隍廟承天觀舊有胥山坊今廢七寳山在天慶觀後舊有上方多福寺今徙寳蓮山與七寳山相連舊有寳蓮寺後為楊節使園而徙寺於豐豫門外石佛山在朝天門外胥山坡下元有僧寺後改為都進奏院瑞石山在太廟後今為禁山有瑞石泉在太廟待班閤子西山下金地山在城隍廟南舊有妙果尼寺今徙茒山舊志云在錢塘舊治之南八里其下有茒山小河今夷為民居錢塘縣崇化鄉亦有茒山淺山在漾沙坑今楊郡王府前對山有大佛寺七官宅新糧料院寳月山在祕書省對巷山坡之下舊有寳月寺回頭和尚造寳月山塔寺黒龍潭在寺西一名天井山峨眉山在祕書省對山有八眼井仁和縣大雲鄉亦有峨眉山草塢山原名草場山寳山在御㕑營門内第一巷有廣嚴寺寳奎寺題詠東坡同秦仲二子雨中逰寳奎寺詩云平明已報百吏散半日来陪二子閑立鶴低昂烟雨裏行人出沒𣗳林間扶寳山新開徑云藤梢橘刺元無路竹杖㯶鞋不用風自逺来聞笑語水分流處見江湖四觀佛國青螺髻遍踏仙人碧玉壺野客歸時山月上棠梨葉戰暝禽呼寳山晝睡詩云七尺頑軀走世塵十圍便腹貯天真此中空洞元無物何止容君數百人青平山一作清平在孝仁坊竹園山在府治之西南吴山一脉獨趋而北隠隠隆起隂陽家以為今治所之主山趙安撫與􅊸建閣其上平鑑西湖扁曰竹山閣理宗皇帝御書景定三年魏安撫克愚徙閣而虛其地狗兒山在城内豐樂橋之南虎林山在太一宫髙士堂後有小土阜上有亭曰武林或云一名武林山按髙士楊闕質記亭始末謂嘗訪之耆舊知錢氏有國時此山夐在郭外叢薄䝉密異虎出焉故得名為乕林吴音承訛轉虎為武耳葉紹翁四朝聞見錄乃謂虎林即靈隠山因避唐諱改為武林元非有兩山一為虎林一為武林也樓攻媿為太一宫道士賦詩云武林山出武林水靈隠後山毋乃是此山亦復用此名細考其来真有以云云從来有龍必有珠此雖培塿千山餘盖疑此山為靈隠武林之餘脉是指指二山同為武林矣淳祐志嘗㫁之以為漢志明載武林水所出决非城内之山自漢已名武林亦非因避唐諱而為武盖此地為城中勝地或者自寓武林之名扵此耳今姑循前志書曰虎林山而附著諸説以俟博考咸淳臨安志卷二十二
