body:
  text: 咸淳臨安志卷二十三宋潛説友撰山川二城南諸山包家山在城南近郊壇冷水峪多桃花為春日逰覽之勝名桃花關門上舊有蒸霞二字大慈山在龍山之西有廣福院虎跑泉龍山在嘉會門外去城十里一名卧龍山五雲山在錢塘縣約髙百丈周回一十五里有真際院嶺上有天井大旱不竭定山在錢塘髙七十五丈周回七里一百二步太平寰宇記云定山突出浙江數百丈又郡國志江濤至是輒抑聲過此則雷吼霆怒上有可避處行者賴之秦望山兩朝國史志錢塘有秦望山舊志云在錢塘縣舊治之南一十二里一百步髙一百六十丈周回一百步晏元獻公輿地志秦始皇東逰登此山欲度會稽後唐同光中錢氏於秦望山建上清宫有巨石二十餘株自然成行名曰金洞門晏公云近東南有羅剎石大石崔巍橫截江濤商船海舶經此多為風浪傾覆因呼為羅剎每嵗仲秋既望必迎潮設祭樂工鼓舞其上李建勳詩曰何年遺禹鑿半里大江中白居易詩曰嵌空石面標羅剎壓捺潮頭敵子胥後改名鎮江石五代開平中為潮沙漲沒羅隱詩羅剎江邊地欲浮浮山在錢塘縣東坡守杭日開河奏云潮水自海門來勢若雷霆而浮山峙於江中與漁浦諸山相望犬牙錯入以亂潮水洄洑激射其怒百倍沙磧轉移狀若神鬼雖舟師漁人不能前知其淺深坐視舟船覆溺無如之何今號浮山頭最為險處排山在錢塘縣定山之北鄉排山嶺在定山南鄉屬仁和縣報山在錢塘縣近廟山廟山在錢塘縣去城五十里突出江心潮勢至此方殺壜山在錢塘縣去城五十里近廟山在楊村有慈嚴院院有小嶽祠自端平門都人奉神者皆集焉城西諸山武林山西漢志會稽郡錢塘注武林山武林水所出祥符圖經云在縣西十五里髙九十二丈周回一十二里又曰靈隱山曰靈苑曰仙居飛來峰晏元獻公輿地志云晉咸和元年西天僧慧理登兹山歎曰此是中天竺國靈鷲山之小嶺不知何年飛來佛在世日多為仙靈所隱今此亦復爾邪因挂錫造靈隱寺號其峯曰飛來白猿峰詳見呼猿洞稽留峰太平寰宇記云許由葛洪皆隱此山忘返故號稽留月桂峰僧遵式月桂峯詩序云相傳月中桂子嘗墜此峰生成大樹其華白其實丹一説天聖中天降靈實於此山狀如珠璣識者曰此月中桂子也宋之問詩曰桂子月中落白居易詩云宿因月桂落蓮華峰錢塘記云峯頂有孤石可四十圍頂上四開狀似千葉蓮花武林泉西漢晉地理志皆云錢塘有武林山武林水所出東入於海晏元獻公輿地志云武林山錢塘泉出焉顧夷吾山川記云自南徂東臨浙江一𣲖謂之靈隱浦石門澗陸羽二寺記云南有巉巖舊有卧龍石橫澗中慈雲法師種松於此連巖棧伏龍棧過石門澗之南為連巖棧今廢伏龍者又連巖棧之次也陸羽二寺記云皆靈隱山泉澗中怪石之狀青林巖顧夷吾山川記云靈隱山有林巖龍洞其上皆櫧桂凌冬不凋故其林常青理公巖在天竺山靈鷲院之右陸羽記云昔慧理宴息於下後有僧於巖上周回鐫小羅漢佛菩薩像慈雲法師所謂訪慧理之禪巖弔客兒之山館是也近主僧行果始作閣道屬之巖中以祠理公合澗橋靈山之隂北澗之陽即靈隱寺靈山之南南澗之陽即天竺寺二澗流水號錢源泉繞寺峯南北而下至峯前合為一澗有橋號為合澗呼猿洞陸羽云宋僧智一善嘯有哀松之韻嘗飬猿於山間臨澗長嘯衆猿畢集謂之猿父又遵式白猿峰詩序云西天僧慧理蓄白猿於靈隱寺詩云引水穿廊走呼猿繞檻跳澗則有飯猿臺寺僧舊施食於此巖石室龍泓洞在天竺山靈鷲院理公巖之北晏元獻公云在靈隱山下吳赤烏二年葛仙翁於此得道輿地志曰有石洞徹浙江下過蕭山有採石乳者入其洞聞波浪聲後有人􅈬洞兩畔鑿住世羅漢十六尊王隨寄慈雲法師詩云丹井經臺接巖洞或云龍泓洞即夀聖院龍井非也鍊丹井烹茗井晏元獻公輿地志天竺山下有葛仙翁煉丹井今在下天竺寺藏院又云靈隱山有白少傅烹茗井葛塢朱墅晏元獻公輿地志葛塢在靈隱寺吳方士葛孝先所居也陸羽寺記云晉葛洪亦曽居此朱墅者梁隱士鹽官朱世卿之别墅女兒山玊女巖太平寰宇記靈隱山南一石狀似人形兩髻分明俗謂之女兒山顧野王地志云靈隱山南有玉女巖舊志載東坡玊女洞調水符事并詩于此今考本集公自注云中興寺有玉女洞洞中有飛泉甚甘又留題仙逰潭詩自敘云仙逰潭中興寺東有玉女洞洞南有馬融讀書石室趙夔注在終南山非杭境甚明蓋前志見有玉女字偶同故誤引耳今刪去醴泉陸羽寺記大歷六年忽出醴泉酌之療疾又有卧犀泉暖泉一名渦渚東嶼見陸羽二寺記冷泉亭以下並亭館在飛來峰下唐刺史河南元藇建刺史白居易記刻石亭上政和中僧慧雲又於前作小亭郡守毛友命去之見後詩序壑雷在冷泉亭側趙安撫與􅊸創候仙亭守韓僕射臯建久廢趙安撫與􅊸更造虛白亭守相里君造見山亭守盧給事元輔建觀風亭唐庶子河東裴常棣造樂天記云五亭相望如指之列袁君亭陸羽記云刺史袁仁敬造紫微亭守紫微舍人唐詢暇日至靈隱山顧訪勝概後建亭於此因以名之翠微亭紹興十三年韓蘄王世忠於此建亭後廢乾道五年周安撫淙重建石橋亭在武林山中路近翻經臺月桂亭在月桂峯下夢謝亭晏公輿地志晉謝靈運會稽人其家不宜子乃寄飬於錢塘杜明師明師夜夢東南有賢人相訪翌旦靈運至故號夢謝亭陸羽記云一名客兒亭在靈隱山間盧刺史元輔靈隱寺詩云長松晉家樹絶頂客兒亭丹竈亭陸羽記云葛洪煉丹之所隱居堂晏公輿地志云陸瑋字文該納祿隱居於靈隱山間澗南造隱居堂陸羽二寺記云後漢陸文該學易於隱居堂圖淮南王劉安及九師之像於屋壁東西又名九師堂許邁思真堂陸羽二寺記云許邁字逺逰一名映詳具方外門右自虛白亭以下並廢以前賢遺迹姑仍舊志記文冷泉亭白樂天撰云東南山水餘杭郡為最􅈬郡言靈隱寺為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅髙不信尋廣不纍丈而撮竒得要地搜勝概物無遁形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之日吾愛其泉渟渟風泠泠可以蠲煩析酲起人心情山樹為蓋巖石為屏雲從棟生水與階下坐而玩之者可濯足以林下卧而狎之者可垂釣於枕上矧又潺湲潔徹粹汵柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌見輒除去潛利隂益可勝言哉斯所以最餘杭而甲靈隱也杭自郡城抵四封叢山復湖易為形勝先是領郡者有相里君造虛白亭有韓僕射臯作侯仙亭有裴庶子常棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭于是五亭相望如指之列可謂佳境殫矣能事畢矣後來者雖有敏心巧目無所加焉故吾繼之述而不作題詠飛來峰僧慧洪詩意行忽出門欲留聊植杖雲間飛來峯巋然眉睫上氣勢欲翔舞秀色無千嶂萬物皆我造何曽有來往大千等毫末古今歸俯仰心知目所見皆即自幻妄如窺鏡中容容豈他人像頗怪胡阿師乃作去來想此意果是非一笑聲輒放但復臨冷泉舉手弄清漲又登飛來峰飛來山上千尋塔聞説雞鳴見日升不畏浮雲遮望眼自緣身在最髙層郭祥正詩誰從天竺國分得一峯來占盡湖山秀最宜煙雨開嵐梅詢詩竺慧指此峯飛來自靈鷲猿鳥曽未知煙尚依舊興亡謾千古天地豈關紐祗恐舟壑移他年却西走佛建安朱繼芳詩元是西天住飛來莫去休未憑仙國好似帝王州彼樹亦如寄吾生應更浮白猿呼不應松露滴獼猴蓮華峰郡守盧元輔詩逺客偏尋月桂子老人不記石蓮花姢梅詢詩巨石如芙蕖天然匪雕飾盤礴峯頂邊嬋秋江側涉川試誰探作礪當自惜坐與榮落同正心未嘗易臺徐寅遊靈隱天竺詩石和雲霧蓮花氣月過樓桂子馨理公巖郭祥正詩晉代胡僧理開山第一人欲尋巖下迹猿鳥送餘春呼猿洞梅詢詩古澗飛白猿寂歷不知處風激石上泉僧疑月中樹微茫認松雪髣佛橫樵路寫望增爾思蒼蒼奈煙霧楊蟠詩青松愁絶澗日夜白猿吟掌握多相就安知世上心張履信詩飛來何處峯木杪夜千尺愁猿喚不應月色同一白龍泓洞梅詢詩矯矯淵下龍潛神在靈府雲卧雖有時泥沙可長處隂崖寒氣腥峭壁煙痕古何當救旱暵奮起為霖雨煉丹井梅詢詩仙翁道未成棲神在巖石酌彼山下泉窮年煉金液洞隂春始緑苔甃秋涵碧緬摹不可期憑闌望鳬舄圎法師詩仙去遺迹在冷冷翠嶽邊冷光涵碧甃暗脈泄寒泉月映氷壺淺秋澄古鑑圎羽人居止近間汲灌芝田葛塢朱墅郭祥正詩二葛既成仙猶存煉丹處有時化鶴來徘徊不知去梁國衰微後征君隱逸時至今風味在試聼野猿悲冷泉亭東坡呈唐林夫詩靈隱寺前天竺後兩澗春淙一林鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈回我在錢塘六百日山中暫來不暖席今君欲依靈隱居葛衣草屨隨僧蔬能與冷泉作主一百日不用二十四考書中書梅詢詩古竇鳴幽泉蒼崖結虛宇六月期客逰披襟苦阻暑開窗弄清淺吹鬢疑風雨不見白使君煙蘿為誰語守毛寶文友詩并序昔人以為冷泉未極其妙因加小亭其上然冷然水光滃然山翠以故去者過半豫以謂不必加工但去其尤贅者斯善也如明鏡中而加繢畫非不美好所以為清明者逝矣拂拭災翳舊觀復還詩云面山取勢俯山中亭外安亭自蔽蒙眼界已通無礙物胸中陡覺有真空試尋櫓響驚時變却聼猿啼與舊同事萬事須臾成壞裏我來閲世一初終影曺既明詩朱簷日轉軒窗冷碧嶂雲低草樹香山倒沉波底月夜闌相對㵼寒光月張履信詩水石一闌干僧歸四山靜擕琴譜潤泉浸夜深冷盤隱陸垕看放水詩泉聲飛出閘委折緑隂間此地元無暑多時不入山草欹疑石墜水定見魚還難得同龜鶴遊吟半日間下周紫芝放閘詩二首呼猿洞口水潺潺忽卷奔流九天乞得少陵三峽句為君題作倒流泉萬里西興浦口潮浪花真似海門髙誰將一夜山中雨喚作滄江八月濤徐涓詩畏日炎炎爍太處倚欄氷雪冷生膚百川萬壑非無水洗得人間熱惱無候仙亭樂天醉題蹇步垂朱綬華纓映白鬚何因駐衰老只有且歡娛酒興還應在詩情可便無登山與臨水猶未要人扶又同諸客醉作謝安山下空擕妓栁惲洲邊只賦詩爭及湖亭今日會嘲花詠水贈蛾眉見山亭張無盡商英詩簾捲踈煙醉眼開浮雲飛盡見崔巍苦憾霖雨遮藏久深謝晴風引致來丹桂有時明月滿舊山無路白猿哀禪僧指我真空理心火茫然一夜灰袁君亭郭功父詩民樂袁公惠開亭古道邊能將九里碧長與萬人傳翠微亭張履信詩朝朝烏北出夜夜烏南歸所謀在一食所息在一枝人生竟何得與烏同此機身世忽過慮泉石良自怡月上飛來峯更誰登翠微孤山在西湖中稍西一嶼聳立旁無聫附為湖山勝絶處舊有智果觀音院瑪瑙寶勝院報恩院廣化寺中興詔它徙而即其地建延祥觀淳祐十二年又分建西太一宫詳見行在録柏堂陳文帝天嘉二年建廣化寺寺有當時所植二柏其一已枯東坡作孤山二詠序云柏二株其一為人所薪山下老人自為兒時見其枯矣然堅悍如金石愈於未枯者僧志詮作堂於其側名曰柏堂堂與白居易竹閣相連屬余作二詩記之堂久廢今基在西太一宫有孝宗皇帝御書軾詩刻石覆以小亭白公竹閣舊有廣化寺柏堂之後有小閣多植竹白公每偃息其間仍有詩遂以名今與寺俱徙和靖林處士廬有巢居閣今基並在西太一宫處士墓紹興有旨徙僧廬惟處士林逋墓詔勿遷咸淳四年大風拔木祠幾毁官為重建是年太傅平章魏國賈公領客來逰視蓁莽中有石隱起命搜取視之則熙寧七年福唐陳襄等九人竹閣題名也興懷昔賢乃屏之植祠下又命金華王庭書和靖先生墓五字刻石立墓前在今西太一宫北偏又見塜墓門金沙井舊在廣化寺白樂天嘗酌此泉甘美可愛視其地沙光燦如金撥以杖皆黑今在延祥觀瑪瑙坡舊在寶勝寺地有碎石如瑪瑙故以名有圎法師陶器墳今在西太一宫六一泉舊在報恩院詳見後東坡銘東坡庵東坡既名六一泉又於泉之後鑿巖築室自名曰東坡庵今不存據傅牧西湖古迹事實間泉在瑪瑙坡圎法師詩間泉澄極頂自注云間泉在瑪瑙院僕夫泉在瑪瑙坡側圎法師鑿池得泉有詩云新泉號僕夫四照閣在山巔今不存西閣又名彌勒閣有石塔七層今不存鑑堂今不存辟支塔今不存詳見塔門銘文六一泉東坡銘并序歐陽文忠公將老自謂六一居士豫昔通守錢塘見公于汝隂而南公曰西湖僧慧勤甚文而長于詩吾昔為山中樂三章以贈之子間于民事求人于湖山間而不可得則往從勤乎豫到官三日訪勤于孤山之下抵掌而論人物曰公天人也人見其暫寓人間而不知其乘雲馭風歷五嶽而跨滄海也此邦之人以公不一來為恨公麾斥八極何所不至雖江山之勝莫適為主而竒麗秀絶之氣常為能文者用故吾以謂西湖蓋公兒案間一物耳勤語雖幻怪而理有實然者明年公薨豫哭於勤舍又十八年豫為錢塘守則勤亦化去夂矣訪其舊居則弟子二仲在焉畫公與勤之像事之如生舍下舊無泉豫未至數月泉出講堂之後孤山之趾汪然溢流甚白而甘即其地鑿巖架石為室二仲謂豫師聞公來出泉以相勞苦公可無言乎乃取勤舊語推本其意名之曰六一泉且銘之曰泉之出也去公數千里後公之沒十有八年而名之曰六一不幾於誕乎曰君子之澤豈獨五世而已蓋得其人則可至於百傳嘗試與子登孤山而望吳越歌山中之樂而飲此水則公之遺風餘烈亦或見于斯泉也題詠孤山唐張祐詩樓臺聳碧岑一徑入湖心不雨山長潤無雲水自隂斷橋荒蘚合空院落花深猶憶西窗月鐘聲出北林結白樂天題孤山寺山石榴花示諸僧詩山榴花似紅巾容艷新妍占斷春色相故關行道地香塵擬觸坐禪人瞿曇弟子君知否恐是天魔女化身西湖晚歸望孤山詩栁湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重栟櫚葉戰水風涼煙波淡蕩搖空碧樓殿參差倚夕陽到岸請君回首望蓬萊宫在水中央孤山寺遇雨詩拂波雲色重灑葉雨聲繁水鷺雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門林和靖孤山寺詩雲峯水樹南朝寺秪隔叢篁作並鄰破殿靜披虀臼古齋房間試酪奴春白公睡閣幽如畫張祐詩牌妙入神乘興醉來拖木屐翠苔蒼蘚石磷磷塔孤山寺端上人房寫望詩底處憑欄思渺然孤山後閣西偏隂沉畫軸林間寺零落棋枰葑上田秋景有時飛獨鳥夕陽無事起寒煙遲留更愛吾廬近祗待重來看雪天孤山後寫望云水墨屏風狀總非作詩除是謝元暉溪橋裊裊穿黃落樵斧丁丁斫翠微返照未沉僧獨往長煙如淡鳥橫飛南峯有客鋤園罷間倚籬間忘却歸珠孤山雪中寫望云瓊樹瑶岑掠眼新鮮飈時復揚塵此中自是蓬萊闕何處更尋姑射人滿東坡臘日逰孤山訪惠勤惠思二僧詩天欲雪雲湖樓臺明滅山有無水清出石魚可數林深無人鳥相呼臘日不歸對妻孥名尋道人實自娛道人之居在何許寶雲山前路盤紆孤山孤絶誰肯廬道人有道山不孤紙窗竹屋深自暖擁褐坐睡依團蒲天寒路逺愁僕夫整駕催歸及未晡出山回望雲木合但見野鶻盤浮圗兹逰淡薄歡有餘到家恍如夢蘧蘧作詩火速追亡逋清景一失後難摹相悼歐公詩故人已為土衰鬢亦經秋猶喜孤山下逢説舊逰孤山送陳述古江神子詞翠蛾羞黛怯人看掩霜華淚偷彈且盡一尊收淚唱陽關謾道帝城天樣逺天易見見君難畫堂新締近孤山曲闌干為誰安小舟尋舊事無處問水連天郭祥正詩塵寰山障合月窟一峯孤欲識僧歸處飄然一寶珠尚石林葉夢得詩并序云張景修與吾同為郎夜宿書新省之祠曹廳步月庭下為吾言往嘗以九月望夜道錢塘與詩僧可久泛西湖至孤山已夜分是嵗早寒月色正中湖面渺然如鎔銀傍山松檜參天露下葉間薿薿皆有光微風動湖水晃漾與林葉相射可久清癯苦吟坐中凄然不勝寒索衣無所有以空米囊覆其背謂平生得此無幾吾為作詩記之云霜風獵獵將寒威林下山僧見亦稀怪得題詩無俗語十年肝膈湛寒輝此景暑中想像亦可一灑然也楊誠齋泛舟西湖步登孤山詩曉雨搗珠屑吹作空中塵拂水無落暈映巒有遮痕承華兩端尹嘉招出城闉一尊澆雲師借風開晝昏諸鬟忽脫帽孤鏡亦捲裀西湖翳復皎南山洗如新舍舟步栁堤曵杖啄松門乃是小上林亦有虎守閽桂落賸金粟蓉粧濃繡屏髙堂竹梢上幽榭荷葉濵群仙此小憩呼酒領一欣秋花隔水笑笑我墮紗巾更酬不知籌互嘲還作春行樂戒多取况復仄羲輪歸變兀頽玊那知醉與醒平章賈魏公舊題孤山詩半是樓臺換却村幾回獨立更銷魂斷堤野水梅花宅千古春風月一痕贈孤山周道士詩梅花和靖宅此處往來清肯以詩為事終于世有名山空丹鶴老湖淨白漚明時亦扶笻出何曽踏帝城髙菊澗孤山雪後詩雪後騎驢行步遲孤山何似灞橋時近來行輩無和靖見説梅花不要詩陸盤隱春逰孤山風約晴雲碎欲零獨逰無伴踏芳塵旋移船泊前朝寺盡捲簾看新路人肥緑又添三尺水瘦紅猶有一分春不妨笑我矜持意吟到孤山句更新柏堂東坡詩道人手種幾生前鶴骨龍姿尚宛然雙幹一先神物化九朝三見太平年忽驚華厦依巖出乞與佳名到處傳此柏未枯君記取灰心聊伴小乘禪是楊蟠詩零落雪霜後猶含千載春一株化為石誰種時人郭祥正詩嵗老枝葉爛春深香氣新可憐湖上檜曽識井中人見周紫芝詩臺城依舊繞長河結綺臨春往事多但張妃是西子不知擒虎是閻羅當年已老瓊瑶樹此日空留鐵石柯喬木自存非故國何須仍唱後庭歌竹閣白樂天詩晚坐松簷下宵眠竹閣間清虛當服藥幽獨抵歸山巧未能勝拙忙應不及間無勞别修道即此是玄關不東坡詩海山兜率兩茫然古寺無人竹滿軒白鶴留歸後語蒼龍猶是種時孫兩叢恰似蕭郎筆千畝空懷渭上村欲把新詩問遺像病維摩詰更無言又竹閣見憶詩柏堂南畔竹如雲北閣何人是主人但遣先生披鶴氅不須更畫樂天真處士廬處士孤山小隱詩竹樹繞吾廬清深趣有餘鶴間臨水久蜂懶得花踈酒病妨開卷春隂入荷鋤嘗憐古圖畫多半寫樵漁猿鳥分清絶林蘿擁翠微步穿僧徑出肩搭道衣歸水墅香酤熟煙崖早筍肥功名無一點何處更忘機園井夾蕭森紅芳墮翠隂晝巖松鼠靜春塹竹雞深嵗課非無秫家藏獨有琴顔原遺事在千古壯間心門徑獨蕭然山林屋舍邊水風清晚釣花日重春眠苒苒苔衣滑磷磷石子圎人寰諸洞府應合置間仙又小隱詩道著權名便絶交一峯春翠濕衡茅莊生已慣鴟鳶嚇揚子休譏蝘蜓嘲潏潏藥泉來石竇霖霖茶靄出松梢琴僧近借南薰譜且并間功仔細抄無間搭綸巾擁縹囊此心隨分識興亡黑頭為相雖詔白眼看人亦未妨雲噴石花生劍壁雨敲松子落琴牀清猿幽鳥遙相呌數筆湖山又夕陽魯望無來已百年又生吾輩在林泉誰知隱遁為髙尚敢道文章到聖賢月界曉窗琴嶽潤竹搖秋几墨雲鮮南塘一霎霏微雨更擁漁簔上釣船竺又云山水未深猿鳥少此生猶擬别移居直過天溪流上獨樹為橋小結廬山園小梅詩衆芳搖落獨暄妍占盡芳情向小園踈影橫斜水清淺暗香浮動月黃昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金尊蟲隱居秋日行樂歸來即杜門嘯臺秋色背人羣幽傍草晚相映逺水著煙寒未分髙亢可能稱獨行窮空猶擬賴斯文過從好事今誰是自笑堪如揚子雲庭園廬蠧關寒井對蕭晨自愛棲遲近古人間草遍終勝俗好書堆案轉甘貧橋邊野水通漁路籬外青山見寺鄰懶為躬耕詠梁甫吾生已是太平民結深居雜興并序諸葛孔明謝安石蓄經濟之才雖廬南陽擕妓東山未嘗不以平一宇內躋致生民為意鄙夫則不然胸腹空洞剪然無所存置但能行樵坐釣外寄心于小律詩時或鏖兵景物衡門情味則倒睨二君而反有得色凡所遇興輒成短篇總曰深居雜興詩六首蓋所以狀林麓之幽勝攄几格之間曠且非敢求聲于當世故援筆以顯其事云隱居松籟細錚然何獨微之重碧鮮已被逺峯擎􅑨􅑨更禁初月吐娟娟門庭靜極霖苔露籬院涼生裊菊煙中有病夫披白搭瘦行清坐詠遺編侯四壁垣衣釣具腥已甘衡泌號沉冥伶倫近日無白奴僕當時有衛青花月滿懷看酒譜雲蘿幽信寄茶經茅君使者蕭間甚獨理叢毛向戶庭薄夫何苦事姦姦一室圗書自解顔峯後月明秋嘯去水邊花影晚樵還文章敢道長于古光景渾疑剩却間多少煙霞好猿鳥令人惆悵謝東山宜坐釣行樵那不倦尋雲看月亦應勞煩襟入夜權減瘦骼乘秋斗頓髙猿下任窺煎藥鼎客來慵動碾茶槽牀頭卧架真間却免有情憀揭悼騷遺編坐罷披三豕小軸行當倦五禽廉肆有清嘗遇困刀圭無狀為攻深長卿消渴應難奈元晏羸已不禁約縛隱囊聊閣膝忘懷未得是微吟將和梅聖俞雪中同虛白上人見訪湖上玩佳雪相唯道林早煙村意逺春漲岸痕深地僻過三徑人間試五禽歸橈有餘興寧復北山隂清園廬秋夕蘭杜裛衰香開扉趣自長寒煙宿墟落月上林塘意想殊為適形骸固可忘援琴有餘興聊復寄吟觴山閣偶書繞舍青山看未足故穿林表架危軒但將松籟延佳客嘗帶霖嵐認逺村吳榜自能凌晚汰湘纍何苦屬芳蓀餘生多病期恬飬聊此棲遲一避喧盡春日齋中空階重疊上垣衣白書初長社燕歸落海棠人卧病東風時復動柴扉湖上隱居湖水入籬山繞舍隱居應與世相違間門自掩蒼苔色來客時驚白鳥飛賣藥比常嫌有價灌園終亦愛無機如何天竺林間路猶到秋聲夢翠微題和王給事同諸官留題千兵欵户迂紅斾四壁留拂紫苔他日北上傳故事願將猿鶴比雲來至剪綃零落點酥乾向背稀稠畫亦難日薄縱甘春晚霜深應怯夜來寒澄鮮秪共鄰僧惜冷落猶嫌俗客看憶昔江南舊行路酒旗斜拂墜銀鞍數年間作園林主未有新詩到小梅摘索又開三兩朵團欒空繞百千回荒鄰獨映山初盡晚景相禁雪欲來寄語清香少愁結為君吟罷一銜杯半吟懷長悵負芳時為見梅花輒入詩雪後園林才水邊籬落忽橫枝人憐紅艷多應俗天與清香似有私堪笑胡雖亦風味解將聲調角中吹范文正公寄和靖處士詩片心髙與月徘徊豈為千鍾下釣臺猶笑白雲多事在等間為雨出山來鮑當題林和靖隱居詩湖水春來緑山雲夏亦繁何如隱君子長嘯掩柴門飲東坡書和靖詩後云吳儂生長湖山曲呼吸湖光山淥不論世外隱君子販夫俚婦皆氷玊先生何是絶俗人神清骨冷無由俗我不識君曽夢見瞳子瞭然光可燭遺篇妙字處處有步繞西湖看不足詩如東野不言寒書似西臺差少肉平生髙節已難繼將死微言猶可録自言不作封禪書更肯悲吟白頭曲我笑吳人不好事好作祠堂房修竹不然配食水仙王一盞寒泉薦秋菊水陳文惠堯佐林處士水亭詩城外逋翁宅開亭野寒冷光浮荇葉靜影浸漁竿吠犬時迎客飢禽忽上欄踈籬僧舍近嘉樹鶴庭寬拂砌煙紛裊侵窗筍戟攢小橋橫落日幽徑轉層巒好景吟何盡清歡畫亦難憐君留我意重疊取琴彈草曺既明過林和靖舊址短棹不歸雙鶴去一邱煙寄山隂水邊踈影黃昏月無限風騷在客心西閣僧志文詩楊栁蒹葭覆水濵徘徊南望倚欄頻年光似鳥翩翩過世事如棋局局新嵐積逺山秋氣象月生髙閣夜精神驚飛一陳鳬鷖起蓮葉丹中把釣人四照閣鄭獬詩湖山天下之絶境群山繞湖千百重碧筍四插明鏡緑此閣正落明鏡中當軒不置窗與檻湖光山翠還相通側耳似聞天仙語接手便欲翻長空和靖墓髙九萬拜林和靖墓詩玉函香骨老雲根占斷孤山水月村薦菊泉清涵竹影種梅地冷帶苔痕生前已是全名節身後從誰問子孫惟是年年寒食日遊人來與酹清樽無菊潭吳中孚逰和靖墓詩墳草年年一度青梅花主自飄零定知魂在梅花上只有春風喚得醒門片玉沉山草亦珍斷碑殘石當麒麟君王别為開戶不欲梅花見路人士黃宜山題和靖墓墳邊踈影尚橫斜鶴老苔荒處家獨立東風難著語只擕尊酒酹梅花粟山晉書隋書地理志餘杭郡有粟山祥符志云在錢塘縣西一十七里髙六十二丈周回一十八里二百步太平寰宇記云山下有飛泉二里又云有吳大帝石柱今在東墓嶺側詳見古迹巨石山一名石甑山隋書地理志錢塘有石甑山巍石如甑然太平寰宇記在錢塘縣舊治南三里祥符志云髙六十三丈周回二十三里一百步郡國志云上有七層古塔妙絶人工北有落星二石吳越王錢氏號夀星寶石山後改為匡石山羅隱封石記云或聳秀而層排巨石或岧嶤而朝挹衆山按祥符志定業院山與巨石山雖相連而相去甚逺有二石甑山禾詳巾子峰在錢塘門外舊志云在梵天院後形如巾幘西湖勝迹事實云在夀星寺後題咏林和靖詩巾子山頭烏臼木微霜未落葉先紅楊蟠詩首出郡山內晴窗幾處看不須風雨折開檻滿溪寒霍山在錢塘門外有張真君祠嵗仲春八日傾城士女集焉南屏山在興教寺後怪石聳秀中穿一洞上有石壁若屏障然刻司馬溫公所書家人卦樂記禮樂不可斯須去身中庸道不逺人各一章小南屏山在廣教院後怪石玲瓏亦類屏障慧日峰在淨慈寺後今有慧日閣雷峰在淨慈寺前郡人雷氏築庵居之故名世又謂之中峰題詠林和靖中峯望北山詩拂石玩林壑曠然空色秋歸雲帶層巘踈葦際滄洲固是堪長往何為難久留庶將濠上想聊作郯中逰秋乂中峯詩中峰一徑分盤折上幽雲夕照全村見濤隔岸聞長松標古翠衰藥動微薰自愛蘇門嘯懷賢事不羣雞籠山在龍井風篁嶺側髙而圎若雞籠然赤山在錢湖門外厥土赤埴上有惠因院俗呼髙麗寺玉岑山在錢湖門外惠因寺前一峯聳出衆山繚繞石中有古木倒垂森翠可愛鴉雞峰在西山崇因報德院有怪石狀似鴉雞卓筆峰靈隱無垢院有石筍形如筆卓花家山三賢堂後相對在大麥嶺山後一名蛇山月輪山在龍山左右形圎如月故名馬鞍山在貌門武狀元坊步司在軍後形如馬鞍故名靈石山一名積慶山一名靈石塢在西山放馬場側石嘗見光故名古迹事實云靈石山在南山棲真院之上題詠郭祥正詩靈石山前路山深寺更深不知明月去空惜白雲沉仙姑山在錢塘門外東山同西觀音山在錢塘門外王家橋試院後山是也龍門山在錢塘縣西溪之欽賢鄉地髙峻上有龍池寺觀山黃杜山了頭山茆山篠山楊梅山祥符志云在錢塘縣崇化鄉第七都衆山接連髙一百五十丈周圍三十五里咸淳臨安志卷二十三
