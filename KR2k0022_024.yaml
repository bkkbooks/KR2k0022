body:
  text: 咸淳臨志卷二十四宋潛説友撰山川三城東北諸山臨平山祥符志云去仁和縣舊治五十四里山髙五十三丈周回十八里上有塔有龍洞礪洞事具諸洞有天井在山之頂舊志云方濶約二丈積水深八尺雖旱未嘗涸下有東嶽廟景星觀峙立兩旁又有藕花洲即鼎湖也題詠東坡舟過臨平次杭人裴維甫韻餘杭門外葉飛秋尚記居人挽去舟一别臨平山下路五年雲夢澤南州凄涼楚些緣吾發邂逅秦淮為子留寄謝西湖舊風月故應時許夢中逰又雪霽過臨平邈師房會陳烈少府題詩落帆古戌下積雪髙如邱強邀詩老出踈髯散颼颼僧房有宿火手足漸和柔靜士素寡言相對自忘憂銅爐擢煙穗石鼎浮霜甌征夫念前路急鼓催行舟我行雖有程坐穩且復留大哉天地間此生得浮浮月僧道潛詩風蒲獵獵弄輕柔欲立蜻蜓不自由五臨平山下路藕花無數滿汀洲嵯沈金部汝諧詩云山勢分明飲水孤峯西轉鬱峨不須探問山童藥且挹朝來爽氣多桐扣山在仁和臨平山之西晉武帝時岸壞出石鼓擊之無聲張華取蜀桐木刻作魚形而扣之聲聞數里故名臯亭山唐書地理志錢塘縣有臯亭山祥符志云今屬仁和縣在縣之東北二十里髙百餘丈雲出則雨寧宗皇帝御書三字為扁有崇善靈惠王祠名半山廟旁有水甕及桃花塢題詠敖陶孫詩樵路縈連入翠微清泉白石可忘機雲中犬吠劉安過樹杪春深望帝歸白鶴可留華表語蒼官合受錦衣圍珠襦玉柙今何許一笑人間萬事非青龍山在臯亭山之東髙七十餘丈山脊蒼翠偃曲如龍母山在臯亭山東北約髙一百餘丈比衆山獨髙張翼左右如母顧子因以名之佛日山在母山之東北髙六十餘丈中有佛日淨慧寺詳具佛慧寺石膏山太平寰宇記在錢塘縣舊治西五十七里錢塘記云出石膏色若雪又縣治亥地有獄雨霽時獄中出石膏一名稽留山無毒獸惡蟲太平寰宇記黃鶴山祥符志云在仁和縣舊治東北三十八里寰宇記舊有黃鶴樓今佛日山之北髙約百餘丈巔有龍池一名渥窪北塢有龍洞石裂為路深險不可視山之腰有黃鶴仙洞外甚狹中可容數人深窈而黑時有樵牧爇松明而入愈行愈逺疑有龍在焉池出雲必雨又有潭在山之東故老相傳有詩云但看黃鶴山頂雲化作白龍潭上雨或為僧道潛作超山在仁和縣之東北六十里永和鄉髙三十七丈周二十里亭市山郡國志云杭州亭市山餘石鄉亭市村多陶戶善作大甕今謂之浙甕龍珠山在仁和縣肇元鄉五都髙約六七丈形圎如珠與臯亭黃鶴衆山相望一名巧山泰山在仁和縣南鮑山之北髙約十五六丈民居可三百户名泰村大旗山在仁和縣黃鶴之北髙約五十餘丈有青草塢居民可二百戶名大旗村南鮑山在仁和縣南山之北髙約十餘丈山下有村名南鮑南山在仁和縣大旗山之北髙約四十餘丈東南與佛日山夾境有杜牧塢纍纍數塜世傳杜牧墓無可考太婆山白巖山在錢塘縣方山在錢塘縣崇化鄉髙三十丈全山在錢塘縣孝女鄉髙一十丈周四里苧山在錢塘縣孝女南鄉髙一十丈周回五里楊山在錢塘縣孝女南鄉髙二十丈周回六里唐墓山在錢塘縣孝女南鄉髙一十五丈周回八里有唐孝女墓詳見塜墓門近山在錢塘縣靈芝鄉髙十丈周回一里大遮山烏尖山在錢塘縣孝女北鄉接連餘杭縣及武康縣界髙三百丈飲馬山在錢塘縣髙二十丈周回二里安樂山在錢塘縣髙三十丈周回三里山上有石八郎祠石壁山龍駒山法華山在錢塘縣東抵西堰橋西止欽賢鄉羣山連接不能盡名約髙四十餘丈占十餘里石壁山上有尊司土地三峯山在仁和縣北四十里東髙一十五丈周五里西山髙一十八丈周四里南山髙一十二丈周一里洛山在仁和縣北四十四里髙五十八丈周一十八里峨眉山城內亦有山曰峩眉在仁和縣北七十里大雲鄉髙一十八丈周六里烏頭山在仁和縣肇元鄉青龍山之東髙八十餘丈峰鋭而秀石姥山在烏頭山之東五十餘丈有嶺南接運河塘赤岸嶺之西有真珠塢少宰劉正夫葬焉獨山在仁和縣治之北大雲鄉約髙數十丈每出雲晴則雨雨則晴里人占之屢驗下瞰橫溪回環皆水蕩赭山舊圗志云在仁和舊治東北六十五里濵海産鹽有鹽場馬嘷山郡國志昔吳伐越至此山遇大風車破騎死有馬嘷呼求其主遂名太平寰宇記餘杭縣大滌山洞天互見洞霄宫在縣西南一十八里按茅君傳云第三十四洞名大滌匡蓋之天周回一百里內有日月分精金堂玊室仙官考校災祥之所薑真人主之與華陽林屋邃道往來或言此山清幽大可以洗滌塵心故名穹崇千尺逈壓羣巒中峰之上有許逺逰升天壇丹灶瓦甓尚存政和間猶有卿雲簫吹往來清越崖間多靈芝異草人所不識九鎖山其勢九折縈紆相續曰天關曰藏雲曰飛鸞曰凌虛曰通真曰龍吟曰洞微曰雲璈曰朝元四時山花爛熳清芬襲人下有石門夾道今不存天柱山在洞西南隅乃五十七福地地主王伯元主之按記云天有八柱在中國者三此其一也一在夀陽一在龍舒四隅斗絶聳翠參天神天隱化時有見者山出佳茗為浙右最伏虎巖在大滌洞西南峻壁間若環堵之室南有路下涉崖磴方至其所東晉隱士郭文伏獸於此因以名巖來賢巖在大滌東南秀峰之前嵌空數丈叢竹間有磐石可坐東坡作倅日同蔡凖吳天常樂富國聞人安道俞康直張日華凡七人來為林泉之逰遂名其巖曰來賢今作亭于上名曰宜霜仙迹巖去大滌里許在路側崖上有仙人遺迹苔蘚不生濕潤光澤大滌洞舊傳云元同先生閭邱方逺入逰自華陽而歸所見龍鱗異境花木鮮繁門有石鼓扣之則鳴其間頂平如砥又垂一石如柱號曰隔凡過柱一重如竇內濶丈餘有圎井無底唯聞琅琅之聲乃朝廷投龍處有白鼠長可二尺仙書名為玉芝餌之可以長生棲真洞在大滌山前峻嶺之上按記云大滌先生杜琛語弟子何法仁曰西洞尤廣汝宜居彼可遁世成真遂名棲真洞有罳頂狀若寶蓋龕室幽深乳泉點滴有東西二臺東臺有石閣津涯不可測常有龍爪蟠拏蹴縮之迹逰者以手漫滅之次日驗視如初或以為洞龍出入之徑大觀三年四月山人胡真隱居其中午夜聞鼉鼓數百聲火毬相繼走及黑雲靉靆皆奔出洞外次則迅雷烈風駭震山谷真隱股栗莫知所措移時方止石室洞一名藏書洞在大滌山中峯之前有巖竇石梁洞外泉脈垂溜注於石梁之下洞初未顯吳筠解化於宣城指門人藏書劍於此尋訪果得之又按景行録西麓有巖扉石座自然咸備蓋不止乎書劍亦天師藏真在焉按石精金光經言曲晨飛精藏景録神劍解之道凡暫過太隂紫胞鍊度皆四百年其藏必發蓋數足運會真靈自有以發之耳今天師石室之藏巖扉呀樹益驗此經之説山腰有石窪樽洞上有石茶竈皆仙家遺迹隱士陸凝之永仲嘗築室於是號石室先生云鳴鳳洞去大滌一里許山之上石門阻隘童稚可入者閲其內石屋旁一小路不知其極上有穴泉溜環珮之聲入于方池未嘗減溢耆舊傳云錢氏時因鳳凰來故名亦改為靈鳳鄉鳴鈴洞祥符舊志云在洞霄宫東山之上洞多竅穴風作則鳴舊夲作鳴虛閣龍蛻洞在大滌洞東一里許喬木幽隱巖穴嵌巉深可數丈春夏多蛇虺潛伏皇祐初羽人于洞間獲龍骨數肩齒角皆具因以名之記云五洞潛通此其一也白茆洞在大滌之西南一十里嶺石之上靈象巋然按記云有晉人遇一道士衣巾爽麗自洞而出詢其名字則曰吾白茆先生職此久矣因以名之其洞門如井垂綆而下一二丈至地回環容坐二十人乃第一重也屈身下入又可二丈有仙人酒甕及二石若柱上有一竅通明歸雲洞去大滌五里在西嶺外層岡之上即棲真之後門深可百餘丈石壁光瑩洞有罳頂亞於前洞按記云是神仙回車之便道故曰歸雲常有雲氣往還於洞外又有隟地皆灌木踈篁隱映前谷撫掌泉在洞霄宫殿階之西深可三尺許清冷可鑑古詩云却疑三尺底别是一壺天舊傳錢武肅王至宫有雙鶴飛舞其上因撫掌招之鶴墮而泉涌故號撫掌或言舊名涌泉漕使陳公堯佐因按察至焉問羽士此何水答曰涌泉昔仙人撫掌而泉涌公於是撫掌果如其言按舊志云久旱不竭瑩潔常澄或時五色變異不可測夏寒而辨砂礫冬溫而育萍藻熙寧初有物狀如鮫鰻繞欄楯間兩目如丹時人以杖撲之即墜入泉去須臾隂霧周布一山大水自天柱源來洶涌可畏將墊殿堂乃止唯損去廊屋數間或曰龍之怒也明星瀆在縣東一里二百步周回一百五十步溪之南塘敕使投龍於天柱大滌洞必先祭明星瀆九域志載餘杭古迹亦然耆老相傳云昔人有晝視水中有星燦然故號明星瀆溪下多潭皆遇水決沖注而成自新堰以西第三潭最深瑩而潤者明星瀆也父老云瀆之南瀕路舊有女冠之居遺址尚在瀑泉在洞霄宫憩賔亭外三十餘步三泉吐溜合而成瀑冷泉在洞霄宫外半里路石罅間水脈甚細冬夏不絶瑩然若玉壺之貯沆􅒭也山行者掬飲毛骨竦然炎月投以熱物至晚即氷結新池即今洞霄宫廚院才􅜲源自泉前池溜於坳堂大歷中縣令范愔所鑿李元卿記云執㸑無欲清之僕挈瓶無汲深之勞雲根石去大滌一里許在路傍之西與仙迹相近石狀如雲從地涌出以雲根名之藥圃在大滌洞東山之前夏侯天師種藥於此芝畦术塢百藥之植靡所不有嘗言古聖人以上藥飬神中藥飬性下藥遣病可使人神靈可使人性明可使人病愈故嘗施藥於鄽隨緣深淺而遇有藥圃詩云緑葉紅英遍仙經自討論偶移巖畔菊鋤斷白雲根一日樵者聞圃中有犬嘷自籬而窺見師䇿鞭乘一獸似虎非虎行疾如風入東山而去今四山生草藥六十餘種圃迹猶存清音亭在大滌洞路之中後數丈乃天柱泉發源之竇水流沿洄亭間循除以入於沼清冷可愛亭名取左太沖山水有清音之句祥光亭在大滌洞口錢武肅王微時嘗卧巨石之上指洞而言曰異時或富貴當建亭覆此石及衣錦回營飾頗盛其石今瘞亭下祥符五年中使及漕臣州佐邑令偕集於此忽五色雲出洞中數刻方散因名亭曰祥光樵者間見有仙人奕棋於亭至前則不復見咸平中民有來盜其檻斧之焱熖隨起飛逐盜為之驚止翠微亭自來賢巖前東五十餘步登小坡而上名青檀山路之右皆依巖左臨深坎路旁有巨石與巖對峙號曰小石門過此則巖石轉有泉自石溜下注於巖穴狀如石盂橫探小竅深不可測其水不盈不涸號曰泂酌泂酌之上有巨石圎竅玲瓏號曰月窟月窟之西有穴盛溜最冷號曰氷壺泂酌之下又有泉穴其水最清號曰鏡潭今泉源湮沒皆非舊迤邐至試劔巖其石如劍劈斷旁有巖隙可憩數人行二十餘步有峭壁面北從地涌出髙可二三丈廣二三十丈其上蒼翠玲瓏竒怪萬狀出於天巧莫可形容其秀氣發自來賢至此半里餘始畢露無遺上有石乳焚之最香但有巖自北而生正蔽其前外旁相去猶有數尺深入僅可容人臨坎作亭名曰翠微題詠大滌山楊傑詩大滌洞天玉為室真官典校長生籍金闕九鎖明明開老盡碧桃人不識祖龍求仙徒用力駕海欲驅山下石神人倚住不與行留得巖前隱仙迹吳侍郎昌裔九吟詩并序云青蓮山人吳昌裔擕客山行咏陶嘉月自雙徑來洞霄丹巖翠壑林立環擁神剜鬼刻不可名狀餐雲嗽月偶得九吟留之山中以紀幽踐九鎖云上界神仙住九華故留靈鎖護煙霞雲根欲斷溪回處流出常山幾片花臞棲真云鑿破千年渾沌心石楠當戶洞愔愔詩猶怯春寒在捫石梯雲不敢深見天柱云柱天屹嶫斷鼇根卧草蒙茸伏虎痕想山中明月夜有人長嘯抱崑崙聲石室云竹几蒲團石室中細書抱朴校參同寄碧眼朱髙士何必擕琴下閬風清音云山出涓寒一道泉暗聲落澗玉錚然轆轤引上泥丸頂便是人間赤腳仙來賢云杖挂松花酒一瓢手挼柏子雜香燒山空露冷吟招隱掉首諸賢不受招翠蛟云蒼松翠石束寒流飛下長身白玉虬吐出英雲千尺雨須臾雷霽水痕收時飛玉云誰劈巖扉石竇開中流玉水潄蒼苔有卷雪從天下端是源頭蓄得來碎白元鑒詩天壇絶頂山髣佛翠微間迹久苔紋雲根古木間丹成人已去鶴駕未曽還猶有簫吹響時時下舊山龍髙參政定子禱雨作牽絲晨謁玊皇家喚起慵乞井花醒看滿山枝葉語晚唐句子是萌芽天詩到眉山自一家也將正命攝于邪巧裁大滌成景戲詠庭蛟與洞鴉兒兩間灑落無塵著萬象森羅觸處逢此意要令輩覺擎天一柱愛中峯趙南塘和茂實弟紀逰韻山滌浮埃宇暖霄遁翁行處有人邀仙關寂寂誰開鎖俗駕憧憧自過橋朝氣蘭蓀清帨韘夜聲猿鶴美笙簫浮生一日間難得那計顔姿茂與凋金銀官闕插天華一徑縈蛇嶺冠霞遊子恍疑塵換世山人笑問客還家水輸東北通歸汶峯到西南秀出琊喧寂萬殊從爾好是中佳趣要無涯郭欲闖靈關燭借光窅然深墨定何鄉隱栖舊托文舉仙籍今收魏伯陽芝室丹深巖樹緑松房酒熟洞雲香老生一醉迷凡聖付與時人共校量雨來龍口吐長煙風去鵬程跨大年圯上書存記黃石洞中棋罷失闕仙幾時谷納霜鐘響是處巖排錦樹圎處慣好山路遍正惟好事與流傳橋俠仙初日醉芳醪曽與猿公接戲邀彩霓跨空影淡黃蛇分雨劍痕髙試從嶮處旋天路莫向塵間畫地牢千載祖龍移不去浪教山鬼笑徒勞館祠真嵗奠椒老坡題後間何寥橘中儻值龎眉叟菁裏寧逢獨足魈欲問迷津無纜繫莫夸捷徑有弓招長松怪石森然在又見亭臯一葉飄慵絶愛穿簷碧數竿桃猚嘗此掩柴關栁猶生肘忘我藜不充腸病下山疑有燭龍潛月窟得無笙鶴過雲間積蘇俯視濛濛爾八極吾將契往還此亭此水幾徘徊舊觀今新老眼開行險不盈還一笑窮源未得且頻來湯年間亦旱禱雨禹步乃能冬起雷戲語聊貽道門舊髙明了此復何猜嵂程滄洲公許步虛蘂珠七言詩元蓋之天髙崒自兩天眼支一脈嶙峋四面森翠壁中有瑶柱倚天立窈窈鬱鬱仙者宅涵雲蓄霧九鎖隔石扉誰遣玉􅙞擘通行豈虞虎豹榏雲臺散吏青城客掉頭三島風煙窄南薰駕我來散䇿晴天萬里展笑色祖龍驅山山辟易山人抵住如刻劃武皇情念膏火迫宫壇經營竟奚益惟我章聖薦簡璧心與天同綿寶歷髙皇中天定都邑脫屣大位駐清蹕至今仙館閟奎畫跪拜締視涕霑臆大滌棲真轉石室幽巖邃竇杳莫測似聞句曲通咫尺飈遊何曽有轍迹天壇可望不可陟翠箬閃閃丹氣溢我名何自標洞額大滌崖壁上髣佛有賤名二字得非三生託真籍一念之差甘墮謫拊心靜慮深咎責羽衣窺我慘不懌為我洗盞酌琥珀沉沉古井龍嗜蟄誰令怒吼捲飛帛夜涼健倒風雨急醒悟乃是巖溜滴西瞻氛祲羌堛塞玊華故棲歸未得文舉逺逰記夙昔借一庵地紬隱帙百六行度運會列真校録曉繼夕恫憫含生沛德澤罷征寬斂戢鋒鏑名山是處可棲逸不材我自安社櫟勳業振古名揭日邂逅要知非爾力蠻觸擾擾鏖得失豈容汩我室虛白流鈴擲火九穹碧泰初為鄰夀無極徐大玉獻子詩入得青山第幾重龍蟠鳳舞著仙宗九關雲鎖疑無地數步天開又一峯大滌洞中丹作井昊穹殿下石為松我來自結真人伴杖履翩􅗁是指蹤欵葉靖逸紹翁詩倦身秪欲卧林邱羽客知心解留泉溜涓涓中夜雨天風凜凜四時秋虎巖月淡迷仙路龍洞雲深透别州九錬青山元不鎖碧桃開後更來逰九鎖山徐凝詩人行之字路嶔巇九鎖縈迂勝九嶷祗被白雲生不斷無端點破碧琉璃梯朝端友詩行盡青峯與碧溪何須辛苦覔天九山不鎖尋真路自是人心到後迷伏虎巖唐吳筠詩郭生在童稚已得方外心絶迹遺世務棲真入長林元和感異類猛獸懷德音不憶固無情斯言微且深來賢巖蔡凖詩大滌洞沉沉天柱峯嶫嶫人世悲落花觀松無異葉朝夕樵風生雲鶴間情愜何當採玉芝真蹤從此躡大滌洞白元鑒詩云靈山實秀德仙聖杳難親水溜空沿石雲扄不見人川原世上異日月洞中春欲出虛無境應修有待身棲真洞趙兩山汝吟詩幅巾灑松露雙袖抖衣塵可耐人間暑來尋洞裏春座分雲骨冷屐隱甃紋新鶴近清尊舞如迎欲去賔金鵝山郡國志云小鳴則縣出貴人由拳山在縣南二十六里髙一百八十丈九尺周回一十五里按搜神記云由拳即嘉興縣吳元帝時縣人郭暨猷與由拳山人隱此因以為名郡國志亦曰餘杭山一名由拳髙峻為最旁有由拳村出藤紙又晉書郭文隱於餘杭山常著鹿裘葛巾自種菽麥嘗有猛獸張口向文文視其口中有橫骨乃以手探去之猛獸明旦致一鹿於其室前故亦云郭公山今巖穴中煉藥石竈猶存青障山在縣南三十里髙二百五十丈周圍三十里四面林木鬱茂青若屏障稽亭山在縣南九里髙五十丈周回七里山頂舊有亭相傳秦皇東逰至此登以望會稽故名稽亭山亭基猶存髙陸山在縣西北七十五里一名南興山一名泉山髙三百丈周回五十里南入臨安縣界北入安吉縣界舊傳有髙陸二氏居山側其村號髙陸村故併以名其山今山下亦有髙陸二姓戎山在縣西南二十四里髙一百丈周回四十里舊傳有休村李波提莊在山側波提嘗飬一戎犬守莊犬死瘞於山旁故名戎山相傳唐乾封二年波提耕於戎山頂得碎石青黃色以示銅工工曰礦也烹之可得銅於是百姓競取之然得銅者鮮因不復採舟杭山在縣西北二十五里髙一百七十六丈周回一十里山頂有石穴古老云禹治水維舟之所東坡詩云看山識禹功蓋謂是也相傳其山或有銅礦唐文明元年有得礦者告於官將置監先令百姓同採年餘竟無所得遂寢唐地理志餘杭有銅恐此類岑山在縣南一十五里髙三十五丈周回四里按餘杭土風記云吳步兵校尉諸葛起字岑世居山旁宗族蕃盛皆葬於此因號岑山斷山在縣西南一十四里髙二十丈周回五里其山無岡壟相接故名俗呼為禫山仇山在縣西北一十五里一百六十步髙三十五丈周回五里舊有仇山廟因名又謂之白鹿山耆老云晉宋陽太守嚴昆一作朝葬於此山嘗有白鹿夾墳左右州刺史孔嚴以為異表聞於朝因以名山墓前石柱刻云故寧朔將軍嚴公神道今不存十道四蕃志云青巖山一曰鹿山安樂山在縣東二里髙一百五十步周回五里耆老云錢氏之子於此築庵飬病而愈故號安樂顧望峴在縣西南三十四里髙一百四十步周回五里按土風記云秦始皇至此棄舟登陸往會稽登山顧望因名阿姥堆在縣西五里髙六十丈周回一里按葛洪神仙傳云王方平過蔡經家以千錢與餘杭老姥市酒得五斗許又父老云晉初有裴氏姥居此探衆花醖酒凡士之貧者貰與之經數年忽有三人至姥所飲酒數斗不醉姥怪之謂姥曰余非常士姥當仙去故來相命因授藥數粒姥餌之忽不知所在今堆上花草猶存隂雨時或聞酒香故名阿姥堆荆公送僧惠思歸錢塘詩渌淨堂前湖水淥歸時正復有荷花花前若見餘杭姥為道仙人憶酒家蓋謂此也名見九域志望牛堆在南湖之間其狀隱若隆阜然湖漸湮塞今存無幾石灰堆在縣東南三里杉木森茂今寶輪寺以此為嚮山咸淳臨安志卷二十四
