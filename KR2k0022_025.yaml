body:
  text: 咸淳臨安志卷二十五宋潜說友撰山川四臨安縣天目山在縣西五十里髙三千九百丈周八百里有三十六洞為仙靈所居每嵗秋率一日風雨晦冥俗云山神與江神會淳祐八年禱雨應趙安撫與􅊸奏請封東天目龍王為靈祐公賜廟額曰惠澤山有東西兩目西天目屬於潜已詳載當互考石屏在縣西五十里按舊志云昔秦始皇於西天目山剖石為橋此其遺也黃石室在縣西五十里舊志云昔人建道觀於天目東峯故址尚存相傳有大鐘墜水中徑山在縣北去縣五十里徑山事狀云山乃天目之東北峯有徑路通天目故謂之徑山竒勝特異五峰周抱中有平地人跡不到代宗時有吳郡崑山朱氏子貢禮部道由丹徒至鶴林寺馬素禪師異之遂祝髮名法欽即國一法師大悟宗旨久之辭出逰方請示所止素曰汝乘流而行遇徑即止欽至山下問途於樵者對曰此乃徑塢師記素語遂自東北而登適見苫草以履置罘乃即其下默坐值大雪經旬不食獵師見而幕之析弓歸敬為結草菴欽曰吾將深隱是山獵者言此神龍所據願毋往欽意愈確乃陟重岡之西至髙峯之北臨巖穴中據石床而坐俄有素衣老人拜於前曰吾龍也自師至此吾屬五百皆不安息當挈歸天目山願以此地為立錫之所乃導欽南行至五峯之間指大湫曰吾去後湫當涸矣其中一穴勿湮塞言訖不見頃之雲霧晦冥風雨終夕及平旦視之已為平陸僅存水一穴今龍井是也北峰之陽有草菴云神龍所造今菴基草木不生按徑山記開山之始其事涉怪諸如此類皆存其舊不敢削也然觀天台天童諸山其初皆有方外異人為之通道而蛇龍魑魅之所居始為人境其事大率類此無足怪也記文蔡端明襄逰徑山記臨安縣之北鄙直四十里有徑山在焉山有佛祠號曰承天祠有碑籀述載本初唐崔元翰之文歸登書之石今傳于時云始之山之陽東西之徑二自其西壁絶襟繞轎行少休松檜交錯盤鬱䝉翳尋丈之間獨聞語聲躋稜層披翠蒨盡十里許下視來徑青虬蜿蜒摶若騰霄且及其巔峽束洞隱幾不容並行已而內括一區平盈坦壑四面五峯如手豎指一峯南絶卓為巨擘屋蓋髙下在掌中矣其間小井或云故龍湫也龍亡湫在嵗率常一來雷雨冥曀而鄉人祠焉者憧憧然環山多傑木絲杉翠桎千千萬萬若神官蒼士聫憧植葆駢鄰倚徙洗毅而有待者𨗳溜周舍鏘然璆然若鑾行珮趨而中節者由而峯之北數百步矻然巨石屏張笏立上下左右可冉十尺劃而三之若川字𨽻文曰喝石嵒其傳甚神並巖被谷修竹茂密嘗以契刀刻竹兩節間成景祐三年十二月十五日字云爾由來徑而往坎窗為池遊魚曠空其西徑東折蹴南峯嶺脰之間平地砥然盈畝而半偃松一本其髙丈其䕃四之橫柯不竦如芝孤生松下石泓激泉成沸甘白可愛即之煮茶出北苑第品之無上者最難其水而此宜之偃松之南一目千里吳江之濤可挹越岫之桂可攀雲駁靄褰狀類互出若古圗畫蟲蠧斷裂無有邊幅而隱顯之物尚可名指羣山屬連呈露岡脊矯矯剪剪咸自意氣若小說百端欲聖智之元而不知其下也臨觀久之魁博通雅之思生焉古人有言曰登髙能賦可為大夫旨乎哉豫於斯見之矣曷止大夫之為也大凡言之天鄰地絶山回物靜在處神巧舉可人意雖窮冬闃寂未睹夫春葩之榮薰風之凉秋氣之清然取于豫者猶在也既歸無幾何而曩所歷者重鈎復結無一見焉追而言之若覺而言夢使人悄愴而不知其自也同逰者建安黃瑊君度嶽陽朱師德宗哲又君度之姪子常子美甥杜沂皆從逰其前與謀而後以事紀之者朱宗哲之兄師道希聖杜沂之父叔元君懿揭陽盧幾舉之三人莆陽蔡襄一與之善惜乎不及俱也書所經見往貽之人一通嘗刻竹兩節間之十字其逰之年月日也題詠東坡逰山詩衆峯來自天目山勢若駿馬奔平川中塗勒破千里足金鞍玉鐙相回旋人言山住水亦住下有萬古蛟龍淵道人天眼識王氣結茅宴坐荒山巔精誠貫山石為裂天女下試顔如蓮寒窗暖足來朴握夜鉢咒水降蜿蜒雪眉老人來叩門願為弟子長參禪邇來廢興三百載奔走吳會輸金錢飛樓涌殿壓山破朝鐘暮鼓驚龍眠晴空偶見浮海蜃落日下數投林鳶有生共處覆載內擾擾膏火同烹煎近來愈覺世路隘每到寬處差安便嗟豫老矣百事廢却尋舊學心茫然問龍乞水歸洗眼欲看細字銷殘年盡又與周長官李秀才逰徑山次韻少年飲紅裙酒推不去呼來徑山下試與洗塵霧癡馬惜鄣泥臨流不肯渡獨有汝南君從我無朝暮肯將紅塵腳暫著白雲履嗟我與世人何異笑百步功名一破甑棄置何用顧更憑陶靖節往問征夫路龍亦戀故居百年尚來去至今雨雹夜殿暗風纒霧而我棄鄉國大江忘此渡便欲此山前築室安遲暮又恐大幽獨嵗晚霜入屨同逰得李生仄足隨蹇步孔明不自愛臨老起三顧吾歸便却掃誰踏門前路來又冉逰詩老人登山汗如濯到山困睡呼不覺覺五鼓日三竿始信孤雲山一握平生未省陟艱險兩足慣曽行犖確含暉亭上望東溟淩霄峯頭挹南嶽共愛絲杉翠絲亂誰見玉芝紅玉琢白雲何事自來往明月長圎無晦朔塜上雞鳴猶憶欽山前鳯舞逺睎璞雪窗𤣥兔元不死烟嶺孤猿苦難捉從來白足傲死生不怕黃巾把刀槊榻上雙㾗凜然在劍頭一吷誰能角嗟我昏頑晚聞道與世齟齬空多學靈水先除眼界花清詩為洗心源濁騷人屢欲逃竸病禪老但喜聞剝啄此生更得幾回來從今有暇無辭數又寄澄慧大師淵詩我昔曽為徑山客至今詩筆餘山色師住此山三十年妙語應須得山骨溪城六月水雲蒸飛蛟猛捷如花鷹羡師方丈氷雪冷蘭膏不動長明燈山中故人知我至爭來問信今何似為言百事不如人兩眼猶能看細字和楊次公惠徑山龍井水漏盡雞號厭夜行年來小器溢瓶罌棄官縱未歸東海罷郡猶堪作水衡幻色將空眼光暗勝逰無礙腳殊輕空煩逺致龍淵水寧復臨池似伯英穎濵和東坡逰山詩云去年渡江愛吳山忽忘蜀道輕秦川錢塘後到山最勝下枕湖水相縈旋坐疑吳會無復有扁舟屢上凌濤淵今秋復又徑山寺勢壓衆嶺皆迷顛連峯沓嶂不知數重重相挹如青蓮散為雲霧翳星斗聚作潭井藏蜿蜒欽公未到人絶迹千里受記來安禪荒榛野草置茅屋坐令海賈投金錢至今傳法破煩惱飽食過客宜安眠解裝投錫不復去紛紛四合飛鳥鳶或言處處猶未逺海上人少無煩煎天台㕍蕩最深處水秀石瘦尤清便青山獨往無不可論說好醜徒紛然終當直去無逺近藤鞋竹杖聊窮年朝無咎徑山詩盤崖繞壑步步髙僕痡馬乏逰人勞五峯崛起干雲霄衆山奔走爭來朝我行直欲犯星杓意徹山頂才山腰松間鳥語如相招仰見白塔當林梢檐擕下上若桔橰路窮飛樓欎岧嶤欽翁未來蔽菅茅山精木怪歡逰遨麏馳虺竄猩鼯跳靈景晦昧何由昭忽然飛錫從江臯窮探不憚東峯遙曲腰丈人白絲袍冉拜辭前風雹飄三百年來響鐘鐃閩商海賈輸金刀直欄橫牖山周邅晨參夜諷聲嘈嘈碧杉紫柏羅旌旄客來六月忘炎歊明月菴前醉松醪白雲峯頂瞰吳郊鵝毛一㸃錢塘潮錢王宫闕如纍巢臨之股栗精魄超歸不得寐心搖搖含暉孤亭立崤嶢此地覽景尤難逃五更月落禽嘲嘲陽烏欲上海光燒晦明變化不終朝倐雲匆晴狀莫描夜䦨燈青雨飄蕭偶坐兩客論幻泡探元窮妙窺寂寥破除世事無絲毫不奈詩思猶強豪歸時日沒紅霞消荒崖老木山蟬號榖參寥子逰徑山懷司馬才仲柔桑蔽野麥初齊布催耕雨一犁略彴時橫溪上下薔薇開發水東西重尋勝處追前賞無復斯人手共携回首春風增感慨綿綿黃鳥更悲啼功臣山在縣南一里本名大官山唐昭宗詔改錢鏐所居大官山為功臣山衣錦山舊名石鏡山在縣南一里髙二十六丈周二百六十步太平寰宇記云山之東峯有石鏡徑二尺七寸其光如鏡錢鏐幼時逰此顧其形服冕旒如王者狀其後昭宗改鏐所居營曰衣錦營尋又升為衣錦城宴故老山林皆覆以錦號其幼所嘗戲大木曰衣錦將軍題詠東坡題將軍木云阿堅澤畔菰蒲節元德牆頭羽葆桑不會世間閒草木與人何事管興亡石照云山雞舞破半巖雲菱葉開殘野水春應笑武都山下土枉教明月殉佳人金章王竹竂執禮賦將軍木并序錢王微時嘗避難此木下後貴顯封為將軍木云脫急曽聞匿異人論功僅得號將軍長身已逐雲烟去賴有孫枝記舊勳華石山在縣西二里髙二十五丈有洞穴在水中深不可測按研神記云秦時神人移來鎮此金錢山在縣南九里髙六十丈周二十里本名金容山梁天監元年僧智度居此山忽有神人出見言姓金氏名求願捨此地為精舍僧如其言造寺因呼金錢山垂霤山一本作流在縣西南一十二里髙九十丈周一十四里晉書許邁傳言餘杭郡垂霤山近延陵之茆山是洞庭西門潜通五嶽陳安世茅季偉常所逰處于是立精舍往來茅嶺之洞室臨安山一名安樂山在縣西南十八里髙一百丈周二十三里太平寰宇記云縣取此山為名南有郭文宅基晉書郭文傳文自餘杭山來臨安結廬山中縣令萬寵嘗迎置縣治及蘇峻之亂破餘杭而臨安獨全人以為知幾蕭條山在縣南一十七里髙七十丈周一十二里郭山在縣西南一十八里髙二十丈周五十里舊志按輿地志云郭文嘗居此山有碑文曰髙山岝㠋濬瀨潺湲飈生林下雲興巖端先生存沒安於此山又名曰白石山碧茂山在縣南一十里髙八十丈周二十一里輿地志云東有金牛山洞昔金牛銜玉遺此時人因名焉隋鷹揚郎將駱道興改為碧茂山安國山在縣北二里髙七十丈周二十五里本名曰匡山按梁孝元帝研神記云吳興山墟名曰臨安匡瞻山青松蓋嶺餘無雜木望之可愛時人呼為安國山康山在縣一里半髙三十丈周七里葛仙公山在縣西南二里髙三十丈周二里錢嶺山在縣西南一十里髙三百五十丈周八里八百山在縣東北一十里有三峯甚髙中峰號大將山西峰號紫藤山東峰號八百山周九里按舊志云彭祖嘗居此公山在縣東二十里姥山在縣東二十里集賢山在縣東北八里王屋山在縣北八里東山在縣西三里相傳謝安石髙卧之地按晉書云安石棲遲東山常住臨安山中坐石室臨濬谷悠然嘆曰此亦伯夷何逺山有塔院塔影倒垂題詠東坡逰東西巖詩謝公含雅量世運屬艱難况復情所鍾感慨萃中年正賴絲與竹陶寫有餘歡常恐兒童覺坐令髙趣闌獨携縹眇人來上東西山放懷事物外徙倚弄雲泉一旦功業成管蔡復流言慷慨亘野王哀歌和清彈挽鬚起流涕始知使君賢意長日月促卧病已辛酸慟哭西州門往駕那復還空餘行樂處古木昏蒼烟大平齊洪公題東山金堂石室舊昌羊被髮依然下荒風送嬋姢花落蘂雲移縹眇濕疏篁桓伊筝外深情酒幼度棋邊定力香萬事古今開闔眼樓頭吹面水風凉又三月晦太皥明朝禪祝融杖藜能送幾東風兩崖蘿蔓因依緑一樹桐華自在紅聒聒竊脂農即事喈喈摶黍女趨功細思舉世誰閒得一笑浮圗倒影中窣又和老人即事剗草根須盡傳花葉未多明波撑堵老石卧盤陀煨美甘分芋蒸肥缺裹荷醒然下山去明月滿林阿菜把野園送花枝鄰巷賖搗蟾和綘雪騎斗弄青霞古帖臨禽李新詩續稻瓜晚凉隨杖履携酒訪魚槎又東山即事西風卷宿祲天髙近重陽閣虛自沆􅒭塔靜能琅璫幽花多素英穠香奪春芳老木未黃落繁隂生夏凉棋雋决楚漢杯壯迷彭殤醉帽信孟嘉歸鞭忘葛強萬事貴適意誰能扣蒼蒼又東山塔影詩相輪髙插碧霄漢好是如如不動山弄影翻光顛倒轉微權只在隙窗間僻俞侍郎烈詩文會得吾黨淨居清晝長平生愛山暇日聊徜徉風流謝康樂肥遁計亦良鍾鼎成淹留江湖晚相望山色青未改山名久愈彰松風度晚曲巖花弄晨粧尚疑縹眇人髻鬟下鳴璫凄凉懷古恨野水涵方塘功名不作難出處何可忘人自草木腐看渠日爭光香消酒力微緑隂聼圎吭悠然發遐想莞爾還成章歸途有清泚濯纓詠滄浪西山在縣西五里按晉許邁傳云永和二年自餘杭垂霤山入臨安西山登巖如芝有終老之志題詠平齊洪公東西山詩西山許邁無人問只說東山有謝安富貴光明貧賤晦世情從古兩般看矯折屐棋邊情易矯捋鬚筝畔淚難禁何如拍手招元放玉室金堂深更深玲瓏山在縣西十二里兩山屹起盤曲凡九折上通絶頂名曰九折巖南行百許步有亭下瞰百里山名曰三休亭題詠東坡詩何年僵立兩蒼龍瘦脊盤亘尚倚空翠浪舞翻紅䆉稏白雲穿破碧玲瓏三休亭上工延月九折巖前巧貯風腳力盡時山更好莫將有限趂無窮平齊洪公詩出郭暄欲暑涉林清自秋步隨目力髙身與山氣浮飛來辛夷花拾得蓮葉舟一聲提壺盧四顧叢薄幽語屈九曲屏突兀十二樓泉流澗級峻雲起峯隂稠左摩紫髯兕右拂蒼龍虬牽衣憩更好擁䇿登三休上呼笙簫侣下瞰錦繡州豁落不平事消融無涯憂太極浩初判此山鬱相繆幾人記曽來老苔蝕雕搜玲瓏聼我歌歌徹玲瓏愁有酒且湑我羲娥雪人頭九仙山在縣西四十二里葛洪許邁煉丹之地坡詩自注云九仙謂左元放許邁王謝之流也題詠東坡宿九仙山詩風流王謝古仙真一去空山五百春玉室金堂餘漢士桃花流水失秦人困眠一榻香凝帳夢繞千巖冷逼身夜半老僧呼客起雲峯闕處涌氷輪逰九仙山聞里中兒歌陌上花父老云吳越王妃每嵗春必歸臨安王以書遺妃曰陌上花開可緩緩歸矣吳人用其語為歌含思宛轉聼之凄然而其詞鄙野為易之云陌上花開蝴蝶飛江山猶是昔人非遺民幾度年年老逰女長歌緩緩歸堂陌上山花無數開路人爭看翠軿來若為留得堂去且更從教緩緩廽生前富貴草頭露身後風流陌上花已作遲遲君去魯獨歌緩緩妾回家九州山在縣西十二里舊有九祖儒堂及廟九所俗謂錢九州廟羅隱作碑云錢達字通甫梁大同中為廬陵王國侍郎羽林監及陳祖立遷東海太守娶琅琊王氏生九子皆為郡故號九州山題詠平齊洪公九州山僧房詩路突亭依石林凹渚見沙嶔危幾岣嶁深蔚似琅琊客倦驚寒思僧閒忘嵗華兩窗風露隱一樹枇杷花咸淳臨安志卷二十五
