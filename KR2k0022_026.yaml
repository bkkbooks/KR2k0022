body:
  text: 咸淳臨安志卷二十六宋潜説友撰山川五於潜縣天目山按大藏洞淵集第三十四洞天天目山有兩目左目髙三千丈右目髙二千五百丈洞周回一百里名太微元盖洞天又太平寰宇記山髙三千九百丈廣五百五十里水因山曲折東西有巨源若目然故曰天目東出臨安為大溪盖東流而為苕水西趨於潜為紫溪合桐廬水以滙於浙江又水經於潜縣北天目山山極髙峻東西瀑布下注成沼名蛟龍池池水入西溪合於浙江近世道士唐子霞謂圗經天目山一名浮玉山上有兩池謂之左右目一峯在東號東天目在臨安縣界今西尖峯在縣北四十五里連亘四州杭宣湖徽周回二千里上有飬生之藥蓍草元華皆名著仙經郭璞詩云天目山垂兩乳長龍飛鳯舞到錢塘誠一方之巨鎮也山有銘勒石在龍池東銘曰列岳霞上標峰霧裏翠滴烟巒名不可紀翔鳳林在天目之東北峰髙峻𩔖天柱廬阜上有平地一千五百丈中兩湖乃天目也湖有魚不可捕昔人見龍散子其中水分流下注東通蘇湖南迤杭睦西𣲖宣城北泝安吉上有古木参天鬱然又有龍鬚草覆地逕險林叢人迹罕到龍穴在至道宫殿西架畫梁之側其大逾寸穴外回環之狀徑二寸許若有物盤旋而成欲雨則雲氣出焉雷神宅在西尖半山間東坡記唐道人言俯視雷雨毎大雷電但聞雲中作嬰兒聲殊不聞雷震也雲封菴在山之西北即許真君舊隐外極平敞俯視羣山髙下奔軼若萬馬然常有雲鎖窓扉故號雲封菴仙壇在雲封菴之北相去十餘丈即許真君禮斗之所故基猶存仙樂西峰絶頂人迹罕至隐者常於風清月白之夜聞雲外笙簫聲又云毎隂霾欲舒或夊晴將雨至夜先聞空中絲竹具舉越旦或在峰尖或響巖谷鄉民樵者聼以為候許邁宫在西尖下乃修真之䆳宇也餘址尚存居民至今呼為道士邁徐仙姑石庵在山之北與深坑相隣形若道家輪藏中有石柱至地四面環空及垂石如榻可設卧具古記云仙姑即徐仙之妹於此成道冲雲而昇張公舍在山南峭壁間濶五丈門髙二十餘丈即漢天師隐室旁有張公小舍相去半里一名天師外舍登者捫蘿而入可坐數人石城在西尖西南㟁章村之隣境髙數丈南北五十餘丈其外可履内深窈不可久若城之大小塹玉桃古記云昔人捕獵阻雨於石城之外見林間有白桃一顆摘入手如氷忽又變紅其熱如湯遂採木葉包之藏於布囊下山捫之猶在及至家已失唯木葉存石門有二在半峰嶺東西向各一髙二十餘丈小者百尺自張公舍眺之四扉對峙一山之絶致也古記云西崦落暉未張於錦繪東嵨炎彩先布於氍毹世傳唐元宗有詩云雙扉起巖石塵客過應稀千古掩不得從教雲夜歸石室有二與張公舍不逺常有隂雲怪風生於白晝俗謂徐五二仙修煉之所石倉有二在西尖之西坎衆山鱗叠之間若倉廩然石皷在西嶺外塢南下磴道盤折狀如皷形周可丈餘擊之有聲石柱有二在西尖北塢一長一丈一長二丈堅削平直宛如斵成卧草莽間擊之其聲清越石板近山西北皆有之長短小大不可數計皆平浄如砥古記云秦皇驅鬼兵解之有全解在地者有解未盡者有倒解者今鋸痕線道猶存其解至一半者用石砧架定信非人力所能及好事者欲挈而下輙有風雨蛇虺之變以故人莫敢動新郎新婦石新郎石在西峯半山之中道面東昂立勢髙五丈天然人形與東峰新婦石相望嘉祐中新婦石為雷震碎今新郎石獨存望江石在雲封菴之右隴軒然特立小望江石在半山之西隅髙約百丈下鋭上豐須編梯級乃可登遥望浙江如一線許海門日上紅光曜目鐘樓石在半山岡髙數文望之凝烟聚黛四敞如樓絶𩔖羅浮山之境圍碁山在西尖之北圎廣數尺平坦潤滑不生苔蘚古老云昔有仙人對奕於此芝草巖在西尖之西昔有採藥者見其上有芝草一本五色皆具接長竿採之色遂没後數日仍在左右復出二本皆翠色遂不敢採至今隠顯不常時有遇者因以名其巖響水巖在巾子山重峰之内中有一港登者聞下有水聲冷冷不絶石巷與張公舍相去二百餘歩四圍聳㧞石罅一徑深三十餘丈藤木交隂森然可畏石庵在西尖之頂至為髙絶上覆巨石一片非人力能舉逰者立石遐覧則心神悦暢縣經云秦皇指隂兵叠就又小石菴在西尖之東北側石累成止可一人隠几而坐或云徐仙夜誦洞經咽味元真之處㫁壠在西尖之西南古記云秦皇所鑿後人因以名之至今宛有刀斧痕洪氏可菴山石在天目西麓為紫薇巖俗呼為紫草巖寶福寺在右可庵在左石皆玲瓏竒狀不一詳見後記文洪忠文公山房在寳福寺詳見後記文記文洪氏可庵俞侍郎烈記曰臨安天目山之西麓有逸民洪載字彦積自號耐翁以力農起衣食厪厪給愛泉石若嗜欲相攸紫薇巖之左得佳山峭壁稜層圭角冐土欲出荔蘚碧潤班班呈露翁放杖太息曰是必有異呼奴具畚揷厲斤斧剪雉榛翳輦除土礫則峯巒效竒直如立筍平若截肪岑鋭巘叠争見姿態既有端緒則鋭意欲成之凑嵗儉飢鳩旁近村民用一錢移擔土以漫治凹下灌栵蔽翳既芟除之泉脉欲流復釃導之則平衍清深嵌巖宛曲各有竒状於是名其石之翼然欲升者曰飛雲峭然凝竚者曰玊筍窈然清深命曰藥洞呀然深啟名曰經龕山有峭立石壁而有形屭蹲負其下者曰金鼇泉眼流珠濺沫不為旱潦増損命曰靈泉闕微徑上飛雲頂築亭其巔名曰盤雲取樂天牛氏石記盤坳秀出如靈邱鮮雲之意巖石之下小築數椽扁曰可庵翁燕逰藏息之地庵之東數歩曰長春塢西瞰清池曰含暉徑直前依山植桃數千百株方春和時霞錦燦爛名曰小桃源稍西則為歸蔵之塋始翁得此地神怡意適謂是已足吾心計當生死此中坐而對石則眼恍然明困而支石則意洒然醒客或扣門管領登山擊鮮醉醲必極其酣適然後已聞客譽之石詞則喜津津見顔面毎疑其嗜好之異其中必有自得而人不能言者昔白樂天謂石無聲無文無臭無味而竒章公待之如賔友親之如賢哲重之如寳玉意其趋向之偏亦如人之嗜好醎酸非澹適和平之正王涯别墅有流泉佳木而重墻複壁顧不能庇書畫卒赤其宗嗜尤物而錮之其近禍乃如此獨翁清不近名錮不近禍今亾矣竟葬其下其道機轉物能與此石俱存亡者歟詣吾廬請記不已者翁之孫咨夔以儒學登第且試學官中其科今分教饒學與予交好遂為之記其巔末如此洪忠文公山房魏文靖公記曰寳慶元年吾友洪舜俞自考功郎言事罷歸於潜讀書天目山下寳福僧寺寺靚深舜俞合新故書得萬有三千卷藏之聞復閣下如李氏廬山故事而移書於靖屬予記之余少誦蘇文忠公山房記謂秦漢以来作者益衆書益多學者益以茍簡又謂近嵗市人轉相摹刻書日傳萬紙而士皆束書不觀㳺談無根嗚呼斯言也所以開警後學不為不切至矣而士之病今未之有瘳也無亦聖逺言湮愈傳而愈失時異事改愈變而愈下學士大夫讀之而不知其味行之而不見其端則亦舍之云耳且古之學者始乎禮樂射御書數盖比物知𩔖求仁入徳皆本諸此今禮慝樂淫射御數有其名無其義六書之法惟小篆僅存而莫知好之為士者十名九舛不暇問也五三六經之所傳如仁義中誠性命天道鬼神變化此致知格物之要也今往往善柔為仁果敢為義依違以為中鈍魯以為誠氣質以為性六物以為命𤣥虚以為天道也冥漠以為鬼神也有無以為變化也甚則以察為知以蕩為情以貪為欲以反經為權以㨗給為才以譎詐為術聖賢之言炳如日星而師異指殊其流弊乃爾若夫先王之制又在所當講而風氣既䧏名稱亦訛有一事而數説一物而數名學者亦莫之質也井牧居民之良法也而邱乗卒伍之不合則参以管仲穰苴之法封建經國之大務也而百里五百里之不合則託諸歴代之異制賔興之法自遂以䧏自王畿以外無文則為諸鄉遂之數郊丘禘祫大事也或以郊丘為二或以禘祫為一廟學明堂先務也或以為異所而殊制或以為一廟而八名七世之廟常典也而殷六廟周二祧或親盡而毁或宗無常數莫知折衷三年之䘮達禮也而有為君大夫士廬服異等又謂君卒哭而除皆莫敢以為非大抵始去籍于周末大壊于秦觖望扵漢而盡覆于五代之亂二千年間慿私臆决㒺聞于行帝號官儀承秦舛矣郊祧廟室踵漢誤矣衣冠樂律雜胡制矣學校飬不賔之士科舉取投牒之人資格用自陳之吏刺平人以為軍而聼其坐食髠農夫以規利而縦其自奉授田無限而豪奪武㫁以相尚也出錢輸租而重科覆折以相䝉也嗚呼生斯世也為斯民也而讀聖賢之書以求帝王之法使其心曉然見之且無所于用也况衆言殽亂始以春秋戰國之壊制中以秦漢晉魏之雜儀終以鄭王諸儒之臆説學者之耳目肺腸為其所摇惑而不得以自信于是根本不立而異端得以乗之利祿得以移之文詞得以溺之則有口道六經而心是佛老篤信而實踐者矣則有心是聖學而輯為文詞隨世以就功名者矣六經之書孔孟未及行也今二千年矣而猶莫之行也余長而有聞晩亦多懼舜俞以藏書属記願以所懼者相與切磋究之嗚呼其亦以予言為過矣乎題詠天目山平齋洪公招隐三首雲氣斂兮天目之巔濤江綫横兮海門濺濺扶桑子半兮陽烏翩可俯而掬兮嚥以天井無聲之泉子其隐乎吾與子兮拾荃雲氣冒子天目之址叠湫歕薄兮洞石齒齒列缺正畫兮睡蛟起可仰而擾子浴以天河倒流之水子其隐乎吾與子兮採芷雲氣吐兮天目之腹乳潭沉沉兮鴨潭煜煜徐伍朝往而暮来兮雙碧鹿可挽而舞兮侑以天風歩虚之曲子其隐乎吾與子兮蒔菊雷神宅東坡贈唐道人詩已外浮名更外身區區雷雨若為神山頭只作嬰兒語無限人間失筯人新婦石白樂天有新婦石詩堂堂不語望夫君四畔無家石作鄰蝉髩一梳千嵗髻蛾眉長掃萬年春雪為輕粉慿風拂霞作胭脂使日暾莫道面前無寳鏡月来山下照夫人望江石徐凝有詩登巖背山阿立石秋風裏隐見浙江濤一尺東溝水山房洪公用子有韻門巷蕭然雀可羅藏山萬卷自研磨懶尋玊女登西岳甘伴金仙坐補陀書帶草長塵慮少缽雲花放道縁多酒肴問字如相過引道松間不用呵錦又答景陽朝家久設禮為羅小寄禅窓共講磨紅障泥飛騕褭黄金寳校琢盤陀水虀薦飯鄉風古雪汁烹茶雅道多領去单傳心法去㑹將佛祖一時呵再用韻烟霏深處萬山羅閒裏工夫嵗月磨上採緯書乾鑿度下搜雜志薛延陀手披不厭薫沈水心悟何妨渉具多若問尊經閣中事南豐作記也湏呵岝㠋山在縣西二里舊志云岝㠋者山之髙峻貌也峭聳清絶下浸碧溪旁環翠巘遥望天目為醒心豁目傑特之觀東面有石壁髙五十丈腰有路可通車馬見於林樾掩映間南北有路登山如徑葉丞相衝為今日有名作小飛来之句山巔有曠軒在崇夀院縣治内外山川之秀㕓里之富盡在目擊間舊名昌黎舘邑人以令韓瓘為政明允名軒以寓去思又有雙溪叠障山南中路舊有懐謝亭久廢世傳謝安曽逰晉史言安往来臨安當亦嘗至此山之北有石塔三旁有古松偃覆如盖塔北有跨虚亭亭下崖壁數丈有仙人壇殆𩔖鑿成正在石壁險絶處山下出泉乳色而味清有亭覆之名清白泉前瞰浮溪石橋雄跨其上名趙公橋題詠平齋洪公送人逰山詩驟暖揠芳意薄逰烘輭塵亂山雲氣曉啼鳥杏花春人物少催老物華新換陳一聲鏗爾瑟沂水綠鱗鱗浪山在縣西南三十五里上有三池相接在髙崖絶壁間其水奔流如瀑神龍所宅因祠焉今賜名靈惠廟毎縣之西南隅雲滃然而興稚耋必譁曰浪山雨来矣山後有柯相公潭舊志云柯相公自歙泛舟而下溺於此毎隂翳或聞絲竹聲起潭中浪與山連故名浪山亦名波山有柯相公祠西菩山在縣西十三里嘗現菩薩像因以名山九鎖交陳雙峰對峙明智寺在焉寺前半里許有亭曰轉山取東坡路轉山腰之句東山在縣圃東二百餘歩有白雲菴絶頂有山翁亭記文白雲庵縣令王日盖記曰去縣治百餘歩有山横亘於左上舊有菴曰白雲屋數間西向以僧主之僧亾而守者勿䖍一夕而燼惟鐘樓獨存余来為縣之明年鳩材更剏且南其户仰顧山翁俯瞰東圃岝㠋桃源拱揖敷映而井邑㕓里之綢繆盡在其下余朝而登望炊烟前後之出没則曰吾民庶幾有一飽之適歟退而食為之甘夕而登覩燈光逺近之明滅則曰吾民庶幾有室家之樂歟退而寢為之安民情舒戚吏治臧否皆不逃於目擊之頃則是役也豈徒為逰觀具哉若夫月上山嶣寒光逼人風在木杪琴笙自韻與夫雲獨留而悠曵雨半霽而空濛則又當委諸登髙能賦之流而余則未暇也觀山在縣西北二里有東嶽行祠許邁煉丹井甲子山在縣西北三里有烽侯亭青山在縣西二里縣學正對此峰眉山在縣北三十里有門化院響山在縣北一十六里馬鞍山在縣北二十里金樓山在縣南二十九里地里志云一名霞山獨角山在縣西南三十里有梵安寺何滕墓在焉生仙山在縣南三十里天師張道陵生於此山之西因以名之今集真觀即其宅基名生仙觀山下有煉丹井尚存浮玉山在縣北七里妙樂院山上有石可浮故名浮玊石柱山在縣東五里上有石天然成柱髙二丈圍一丈古篆十數字南陽山在縣東南一里有廣惠行祠無極宫在其右桃源山在縣東二里有許逰觀鳳山在縣南一里旁有道院鶴山在縣東與石柱山相接地出桃味極甘美金鵝山在縣南一里有寂照寺地風山在縣南七里風多自石穴中起阿頂山在縣東一十五里舊志云絶頂有越王城牢山在縣南三十五里上有龍池丁峴山在縣南三十五里武勇山在縣南四十七里有常樂寺佛圖澄所剏相傳云澄嘗與鄉人習武於此攷之晉史石勒之亂沙門遇害者甚衆澄投勒大將軍郭黒畧家亦知兵者也今鄉人嵗以上已迎引尚存習武之遺意馬頭山在縣南四十五里狀如馬頭上有福興禪寺閻湖山在縣南五十里上有龍池濶數丈深不可測雖旱不竭有禱必應毎風雨隂雲出焉白山在縣南五十三里崖髙三十餘丈下臨深潭上有浮石純白山前有廟俗呼為白沙廟或患氣疾浮腫擣石煆服之即愈流襄山在縣南五十里舊志云因堯時洪水為名鑿山在縣西七里亦巖嶺之𩔖良梅山在縣南八十二里閲武山在縣北五十里千秋嶺泗州庵後吴越王錢氏置寨以禦江南李氏因以名焉咸淳臨安志卷二十六
