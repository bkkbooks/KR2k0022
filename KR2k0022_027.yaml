body:
  text: 咸淳臨安志卷二十七宋潜說友撰山川六富陽縣赤松子山在縣東九里髙一百五十丈周回四十里一百步赤松子駕鶴時憩此因得名其形孤圓望之如華蓋又名華蓋山一曰赤亭山又曰雞籠山題詠謝靈運詩宵濟漁浦潭旦及富春郭定山緬雲霧赤亭無淹薄遡流觸驚急臨圻阻參錯亮乏伯昏分險過呂梁壑洊至宜便習兼山貴止託平生協幽期淪躓困微弱久露干祿請始果逺遊諾宿心漸申寫萬事俱零落懷抱既昭曠外物徒龍蠖鳴邱希範詩漁潭霧未開赤亭風已揚擢歌發中流鞞響㳫嶂村童忽相聚野老時一望詭怪石異像嶄絶峯殊狀森森荒樹齊淅淅寒沙漲藤垂島易陟岸傾嶼難傍信是永幽栖豈徒暫清曠坐嘯昔有委卧治今可尚西巖山在縣西北三十里巖有洞洞口有池早晚與潮應石有葛仙翁足指前有煉丹鼎山下有石扣之鏗然人號石鼓世傳有僧坐於巖前一日葛仙翁求其地煉丹僧遂退西巖丹成上升僧亦仙去今號日升里題詠樂天詩千古仙居物象饒道成丹熟晝升霄巖前寶磬傳松韻洞口靈池應海潮崖折百花遲日晚鶴歸清夜唳聲遙登臨漸到希夷境手拂行雲渡石橋小隱山在縣之北一里三十步為縣治主山陽夏公謝絳遷居於此子景初景溫築書室於山之半今故基雙松尚存歷年久山屬於官云淳祐元年春宣葬丞相李文清公宗勉題詠謝綘三詩余近營别墅於小隱巖忽憶癸酉冬奉詔逆虜使于陳橋驛夢中偶賦及寤寫在牘背今因巖名知所賦三言前契矣遂足為八句僕本塵外士功名若毫末因尋小園隱忽見羣芳發昔夢宛可記靈契方茲逹㑹須掛朝纓歸㺯巖前月江雙松亭築居喜物外披徑窮木末層阜繞襟帶澄見毫髮芬芳山密熟決決春泉活樹梢閃猿隕石罅愸銜月坐長百慮寂望逺孤興發何必較萬殊吾自師吾逹有答梅聖俞問隱聖俞一幅書問我小隱居小隱詎異築室數畝餘巖壑不峻崒田園非美腴所欲近邱墓嵗時來掃除先人夢讀史尊道本聖徒絶筆于此詩子孫無忽諸刻石置中堂且使過者趨題榜為服訓義取銘盤盂後嶺雙松亭徑術何威迂下臨富春渚萬象生有無東偏作草舍可以施琴壺門前碧塘水萬本栽荷蕖風來觸香氣長著人衣裾澄水泱泱流黍稻可弗枯柔桑及美果種廣莫記株澗草不識名野禽多異呼坐此易嵗晏自與人世䟱在昔東陵侯瓜壠猶親鋤楊惲謝九列種豆南山隅余嘗有此志來者安敢誣誅茅實張本解組當後圖是時考槃賦從我者誰歟近來傳越名趣向若不殊儻聞邱樊往不顧升斗儲如君美才具日月升雲衢安敢預招挽粗自陳其愚范文正公留題小隱山書室小徑小桃深紅光隱翠隂是非不到耳名利本無心笋迸饒當户雲歸半在林何須聼絲竹山水有清音胡鼻山在縣東五里山峭峻下瞰大江路狹而險行者患之焉乾道中令陸楠因邑士謝安頥之請鑿路欄石以護自此往來者以為便云嘉定癸酉令程珌修之嘉定丙子令曾治鳯重修尉陳震為記至寶慶乙酉令趙汝捍補甃易石欄為石壁置庵業名惠民庵至淳祐戊申令陳夢炎因禱旱立麻源真君祠於山之巔又請撥延夀寺舊額改惠民庵為惠山延夀寺記文陳震記曰邑之東由東門鋪抵赤松可九里多鑿穹石堆崎為路旁瞰大江㠎嶫湍險夜行不禁亡賴之人抵禁肆欺焉乾道間邑令陸楠更闢路創石欄建庵守以僧民以為便嵗久柱折欄壞守僧不存行者惴然至嘉定丙子令尹曽公治鳯始增立石柱一百七十根翼以欄楯復修其舊葺庵以存僧姦人迸迹又自觀山直抵廟山二十里山行病犖確泥行多濘淖公悉砌以石板召匠度費悉以委之視其成計尋丈而償其直不任吏不役里長凡為路一千五十二丈逾月而成與今大參鄭公所砌入京之道相為聫屬端夷廣衍可以久而弗壞矣苐石欄干之設以木為柵遞兵走卒挽船之夫夜過者多竊以為薪易至廢壞非嚴其禁不止舊比掌以里正若縣家加檢防而時葺之不難也惟後之君子以𢎞濟為心毋以創不自我而怠焉幸矣觀山在縣治之東百餘步一峯髙聳橫截大江孫氏嘗於山頂建道觀因得名又號石頭山有亭曰滕覽縣東以水口蕩滉無際以此山為青龍襟抱環合邑賴以立第宅屬居民病於樵採㑹真覺僧貿得之邑令曽治鳯出公帑錢六萬易而屬之官竹木茂蔚自是邑之形勢改觀焉山有嚴君祠於淳祐間縣令李迪更創祠宇下有三亭曰耕春曰逸雲曰虛全山下又立小庵置僧以供灑掃樟巖山在縣北五里獨髙衆峯巖有樟故名又名橫山世傳赤松子煉丹之所山有石巖龍藏其中西北有穴久晴則起霧絪緼如陶烟乃雨候也姥岑山在縣北二十五里山腹有水沼赤萍生其中山下有廟俗號為姥岑王嵗旱禱必雨白龍山在縣北二十里勢若屏風與姥峯相連山側有小沼姥岑白蛇往來其上初樵者入山見蛇吐珠捕而烹食之舉家斃珠後歸里人楊氏數年有羽衣至其家紿取視徑持去楊氏蹤跡之忽不見貝山在縣西三十里髙三百丈廣七十八里西屬新城界山頂有湖有蕭史君廟每旱禱必應胡洑山在縣西南五十里髙三百丈廣一百三十二里上有石樓石城侯景之亂里人姓陸者率鄉鄰保固之全活萬計上有石佛父老傳云澶淵之役嘗見夢于章聖皇帝後有水旱亦嘗遣使禱焉亭山在縣南十八里髙二百丈廣一百五十里晉處士孫文度建亭陽平山在縣南一十五里髙五十丈廣二十里面大江有孫鍾墓在焉詳具塜墓門都輿山在縣西南四十里髙九十丈廣三十五里其狀類馬又名馬山靈巖山一名湖南山在縣南三十里髙八十丈有仁惠龍王廟寶山院釋曇超姓張氏建元末棲錢塘之靈苑山夏嘗講經有一老人來聼問其姓名曰我非人乃龍也居富春鹿山之下昆弟五人余處其長邇者鄉民耕山逼我居室羣龍怒閉膏雨以害田稼今纍月矣余不忍民之焦熬也勸督羣弟執怒不從聞師道行髙妙必能化伏師曰此庵亦要水汝能為我致之乎老人即於庵前撫掌泉自湧出今彼山有撫掌泉師曰汝發此心佛何以加今欲吾往如何龍曰師能往彼設壇戒衆然後浮舟觀山之下講大雲請雨經則雨當降師曰我固願往彼未見信如何龍曰吾當感夢于官民使之迎師次日邑官居民不約同夢遂迎師于靈苑山師離山雨隨注乃就觀山結壇受戒浮舟誦經雨大霑洽羣龍復致謝曰欲為師就此建庵朝夕兾聞講演雞籠山可否師曰此近人居我且歸北山汝别卜地龍遂于湖南山巖請師居之山峻師不能陟龍化為白馬載師登巖卓錫以居今石上馬跡存焉巖下有沼四時不枯遇旱祈求擊鼓鳴鐃其水漸至時現諸物或鰻鱔龜魚蜴蜥之類取而禱之無不立應歷嵗綿逺感應如初焉乾道四年縣令陸楠以父老之請聞于上司乞奏諸朝自後縣令樓潚吕昭亮接續申請至於嘉定三年冬賜靈悟大師而龍以仁惠廟為額錫書至縣令程珌率僚佐合浮屠威儀賔𨗳至于湖南之山先是僧道琳為屋三楹以奉香火至是縣令程珌復佐其費移舊基創佛廬以承奉上㫖以慰其願鹿山在縣西南五里其狀如鹿世傳有羣龍居之興水旱為民害因靈巖大師講經化服其孽遂息俗謂之降龍山事見靈巖山屠山在縣之西南五十餘里世傳有姓申屠結廬以居乃以名其山復以志其里有寺號大雄野史所載禪月以詩見吳越曰一瓶一鉢垂垂老萬水千山得得來王說之館於羅隱之舍隱恨識之晚復以詩遺王有寶劍霜寒十四州之句王謂之曰詩則美矣若能改作四十州當得相見師喟然曰州不可添詩亦不可改孤雲野鶴何天不可飛耶遂杖錫去之至於山下欣然而止有怪石故庵在寺之東偏詳見大雄寺陳剛中所記記文陳剛中作記叙屠山之勝有曰峯巒重復端若拱揖應接不暇湍流怪石神刻鬼劃千巧萬狀中有平田如設萬席挺然僧寺出于林表佳木修竹左右交翠此申屠剛違新室之禍申屠蟠晦黨錮之名避地結廬于今千載子孫因家焉支派分衍至百餘室因姓而名其山山之陽復以申屠志其地又分上下前後焉是山也東揖桐君之廬南望孫君之圃山深林密而無虎豹之藏地僻人稀而無寇盜之患云云新城縣北山在縣北三十里記文朝無咎記去新城北三十里山漸深草木泉石漸幽初猶騎行石齒間旁皆大松曲者如蓋直者如幢立者如人卧者如虯松下草間有泉沮洳伏見墮石井鏘然而鳴松間藤數十尺蜿蜒如大蚢其上有鳥黑如鴝鵒赤冠長喙俯而啄磔然有聲稍西一峯髙絶有蹊介然僅可步繫馬石觜相扶携而上篁篠仰不見日如四五里乃聞雞聲有僧布袍躡履來迎與之語􅌓而顧如麋鹿不可接頂有屋數十間曲折依崖壁為欄楯如蝸鼠繚繞乃得出門牖相值既坐山風颯然而至堂殿鈴鐸皆鳴二三子相顧而驚不知身之在何境也旦暮皆宿于時九月天髙露清山空月明仰視星斗皆光大如適在人上窗門竹數十竿相摩戞聲切切不已竹間梅棕森然如鬼魅離立突鬢之狀二三子又相顧魄動而不得寐遲明皆去既還家數日猶恍惚若有遇因追記之後不復到往往想見其事也烏伊山在縣南五里祥禽鄉髙三百二十丈周八十五里百丈山在縣南五里太平鄉亦名卓筆峰題詠許廣淵詩片雲晴㸃墨滴露夜揮毫題許仲蔚詩云雲葉閒鋪紙烟煤潤灑尖逺疑塞鴈髙欲篆秋蟾㠙山亦名崤山在縣西二十里新登鄉髙二百五十丈周七十里有洞穴深十丈水泓澄旱禱必應三貝山在縣東北二十里昌東鄉髙三百丈有水池半畝深三尺嵗旱祈之應天柱山亦名皇甫真君山在縣西十里七賢鄉地名裘塢唐大中間嵗旱農父汲水灌田遇一老人云何不往此山下禱于獨角仙人言畢徑去農父追及于餘杭縣界遂口授醮謝名位曰皇甫真君也因名其山嵗旱禱多應仙坑山在縣西二十里七賢鄉晉咸和中有七仙客圍碁石上因名山産茶其味特美云咸平元年有獵徒見白鶴三冲天而去石上有碁局未收及獵回不知所在烏山在縣西十五里折桂鄉名苦竹上有龍井禱之應井旁有白鶴仙人祠釋子山在縣西北二十里永昌鄉靈耀寺因以名山靈耀今為三學院果園山在縣西北一里黃山在縣西二里雲山在永昌鄉巧坈山在七賢鄉戴家山在昌西鄉鄭家山在廣陵鄉青巒山在太平鄉有碧沼寺成山在新登鄉有寶乘寺錦邱山在縣西五十里南新鄉瑞應山在縣西五十三里南新鄉三九山在縣西五十一里南新鄉鴉棲山在縣西五十里南新鄉牢山在縣西六十三里新安鄉漁洲山在縣西六十五里南新鄉中有合龍池或曰合靈池巖上有三池深莫能測竒詭萬狀西又一池耆舊言其源與天目龍池通每嵗旱禱雨者旁午于道廟在合龍池之前於淳祐九年勑賜額曰靈惠南山在縣北三十里廣靈鄉題詠許廣淵詩路入青山幾萬重前山行盡路還通小舟棹急巖溪水髙栁絮飛堤岸風春物老時林遍緑晚烟收處日垂紅民居稀濶兼窮僻多使頑夫氣自雄注云廣陵鄉之民于南新舊稱頑很許仲蔚和云青山叠叠水重重古道才容匹馬通飛鳥自由啼晚照落花無著趂春風巖前積靄參差緑天末餘霞㸃綴紅一一廣陵如在眼詩壇誰敢較豪雄塔山在縣題詠朝無咎塔山詩對雨山外圓天一鏡開山頭雲起似浮埃松吟竹舞水紋亂坐見溪南風雨來烟竹杖草履步蒼苔山上孤亭四牖開雨濛濛溪又急小篷時轉碧灘來龍門山在縣西七十五里新安鄉上有龍池鹽官縣金牛山在縣東八十三里髙三百丈周圍一十九里太平寰宇記昔吳楚間金牛自毗陵奔此山而沒因名山側有洞或云建炎初黃灣居民多避難於此燭之深不可測好事者遊焉則有蛇怪審山在縣東北六十五里髙五十三丈周回七里三百步漢審食其墓其間故名有僧崇惠庵基土皆五色有僧智標塔秦皇磨劍石有靈池水旱不盈涸黃山在縣西南四十里一名越城山髙五十丈周回六里二百步其色黃故名紫微山在縣東北六十里舊志曰唐紫微舍人劉禹錫作刺史行縣至是山望硤石湖因名今半山有碑鐫紫微山三字按禹錫未嘗為杭州刺史惟白居易裴夷直自中書舍人出守舊志誤也題詠唐顧况詩家在雙峯蘭若邊數聲清磬發孤烟山連極浦鳥飛盡月上青林人未眠楊基詩野寺孤峯上危樓聳翠微捲簾滄海近洗鉢白雲飛竹影臨經案松花㸃衲衣日斜登望處湖畔一僧歸來又地勢連滄海山名號紫微景開僧坐久路僻客稀峽影清相照河流石自圍塵喧都不到安得此忘歸鐘朱伯虎詩鑿石開山已幾年半天臺殿聳危巒曉聲向雲邊落夜月光從檻底看野色難藏千里秀松風長占一軒寒老僧此處真佳隱應笑塵勞效小官余弼詩孤峯牢落幾何年臺殿於今插半天已是精藍誇絶徼更將寶塔在危巔烟霞色任隂晴變鐘磬聲隨上下傳珍重老僧無别境一生幽趣只山川地富臨詩鑿石誅茅四十年稜層寶樹出諸天更逢勝驚遊客不負身披壞衲田别郡坐看雲散後平湖下壓鳥飛前還知老令忘歸否為惜難移近縣㕓石堆山在縣東南五十里尖山在縣東南六十里蟹山在縣東南六十二里盈山在縣東南六十二里花山在縣東南五十里菩提山在縣東六十里山有靈泉詳見井門袁花山上有小山在縣東六十里贊山在縣東北七十里赭山在縣西南四十五里巖門山在縣西南四十里蜀山在縣西南二十七里隋書地理志云鹽官縣有蜀山雷山在縣西南四十里昌化縣唐山在縣後髙二十丈為縣治主山青山在縣前髙二十丈武隆山在縣西北一里髙五十丈周回二十里有晉葛洪煉丹井唐天后以山名應圖䜟分紫溪縣别置武隆縣㳂革見郡縣表晚山在縣西北十里髙一百四十丈周圍三十里晉許遊所居山下溪灘號許遊灘唐人詩葛井許灘今古傳逺游嘗至於潜縣採藥遺跡為許游觀其事甚明但今復號灘為洗耳灘又引巢父飲牛為侣號橋為白牛橋蓋因由游二字音同而訛耳箕山在縣西北十里神仙所隱百丈山在縣西二十里髙一千五百丈周回二十里一名潜山吳興地志云於潜西有潜山堯時洪水此山潜水中不沒者百丈因名焉山上有太公澤旁有王大伯鹽洞或見鹽數百袋曝於洞口就之不見始疑以為神仙山下兩石對峙髙二三丈號秦王石其二峰並者號雙峰桞相山在縣南三十里髙一千八百丈周回一百三十里東接紫溪縣南入分水縣千頃山參寥子有兹山嵯峨冠天半之句上廣千頃有龍潭蒲葦四密潭中魚有金銀色禱雨輒應西有娑羅巖生娑羅花一株蔚然聳翠初夏開香聞數里海棠瑞香黃菁遍生山麓題詠司馬槱詩瓊葉半開童女頰蕨芽初長小兒拳山中雲雨雖無味何似山河走暮烟一池春水應江潮中起沙鷗數尺髙誰謂風雲逺朝市亂山深處亦波濤欲為龍池游束裝戒蓐食雞鳴天未曙呼兒重蠟屐縈回遡寒溪確犖疲亂石迢迢萬丈嶺宛轉蒼龍脊山髙吐朝氣恍不辨咫尺俯聽雷雨聲仰逐猿猱跡委蛇度花塢緑靜草可席喜如出籠檻身輕飛鳥擲不辭雙足繭逺探蛟龍客傳聞此山頂舊有滄海色爾來三十年潭湫變枯荻至今應江潮尚浮鷗鷺集至理竟未解對之空太息不如西湖遊揮篙泛瑤碧瓊吳珩詩松檜陰中天月清異花靈草不知名路從液山前過人在水晶宫上行千尺翠嵐分月色一軒寒瀨動秋聲登臨不厭躋扳峻貪看雲從舄下生千頃山中月三黃頂上雲相看無一語今日喜逢君新淳熙十三年六月中使奉來德夀宫金捕金銀魚安胡詩云千頃山髙六十里上有寒潭清且泚神龍久向此中蟠作霖肯教蒼生起羣魚從之時浮沉噞喁光彩歲月深自然形質異凡鬛或如美玉或如金或青或紅或間色縱使丹青摸不得幾年潛伏少人知一旦聲名動京國皇家太平媏好竒麟欲效瑞鳳欲儀白環銀甕爭走獻豈得汝輩藏汙池深山大澤多遺寶紆餘卓犖皆娟好願移網罟聊一施嶄然頭角趨明時石室山在縣南四十里巖洞如室銅坑山在縣南五十里東接分水南帶淳安西亘績溪其最髙峰名銅坑窮絶處有龍池三草木廕蔽龜蛇浮游或雲氣籠罩必雨歲旱禱焉福泉山在縣西南五十里神龍所居雲出其中則大雨大明山在縣西九十里南接嚴州昔悟空禪師所隱今山下立慧照院巾子山在縣西北四十五里大鵠頭山在縣西六十里或以為山類鵠頭或以為鵠曾棲止得名勢凌霄漢人不可到惟採藥人結伴攜糧具火信宿上下其中坦平神仙所棲花果人不敢採有龍池濶三百畝四傍如葑田歲旱人攀緣禱雨其上咸淳臨安志卷二十七
