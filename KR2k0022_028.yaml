body:
  text: 咸淳臨安志卷二十八宋潛説友撰山川七巖城外虎頭巖在錢塘門外介於寶巖定業寺後山葛濃錢塘帝都賦云巖則虎頭故老傳云此山舊有巖石突出如虎頭吳越王納土後望氣者云杭州西湖有虎頭山形勝命鑿之連巖青林巖理公巖玉女巖已上四處詳見武林山象鼻巖佛手巖已上二處詳見清修寺餘杭縣伏虎巖來賢巖仙迹巖已上三處見大滌山臨安縣虎頭巖牢山巖並在縣西一十八里貴山巖龍池巖朱積巖並在縣西南二十里髙峰巖浪嶺巖東冷水巖西冷水巖金城巖並在縣西三十五里烽火巖吳居巖並在縣東三十里溠水巖王會巖並在縣北十五里東永安巖西永安巖並在縣北二十里東坡遊東西巖詩云即謝安東山長壠巖石柱巖並在縣西二十五里安定巖在縣西二十五里於潛縣芝草巖響水巖已上二處詳見天目山甲子巖在縣西北三里太陽巖在縣西二十五里雲鶴巖在縣北四十五里大明巖在縣西北三十五里小明巖相去大明巖半里青畤巖烏畤巖白畤巖去小明巖十里三巖皆相望老公巖在縣西二十里安人巖在縣西十里巢山巖在縣北十五里盧山巖在縣西北十五里巖頂方丈餘皆甎甃意古廟基也其上時有音樂聲聞里餘久晴聞之則雨久雨聞之則晴村人以時祭之皇甫巖在縣東一十五里近平越城舊志云後漢皇甫嵩破妖賊許生於此故名有鑄冶郊壇城寨尚存考之漢史靈帝熹平元年會稽人許昭聚衆自稱大將軍立父生為越王攻破郡國遣楊州刺史臧旻丹陽太守陳寅討擊三年十一月大破許生於會稽斬之及考皇甫嵩傳止載討黃巾賊張角之事而不及許昭贊中所云雋捷陳頴亦彌於越是時陳國頴川各有賊起朱雋與皇甫共平之釋者云謂平許昭恐是時嵩以功遜雋或討賊之初曽駐兵於此史逸不載亦未可知然三國志孫堅傳乃云妖賊許昌起於句章自稱陽明皇帝注云靈帝紀曰昌以其父為越王與其子韶扇動諸縣堅以郡司馬募召精勇與州郡同討破之刺史臧旻列上功狀則又與漢史所載不同因并書之白馬巖在縣南六十五里兊村絶頂有龍池仍有石巖袤百餘丈其色皓白逺視之猶白馬然故耆舊相傳以名其巖大陽巖在縣北三十五里寨村東巖獨髙峻四圍甃石如小城鄉老言錢氏屯軍於此本不甚衆但數令兵卒更易服色旗幟繞巖頂以張虛勢巖頂平廣十餘畝一池濶四丈深不可測久旱不涸四岸有竹交覆池上鄉民或縱野燒惟此竹獨存遇天色隂雨時有仙樂之音聞一二里間響水巖在巾子山重峰之內中有一港步履者聞下有水聲泠泠不絶不知流注何處昌化縣墨子巖在縣西南四十里蒲川其髙切雲上有室穴坐其樵者曽見野服三四輩環坐石上問侍者云古墨子也石巖在佛迹山縣南金山二十五里山前對峙名山雄峻綿亘自麓至嶺一日方到有石鼓石坐石碁盤蓋神仙棲獅子巖在縣西五十里山形如獅嶺城內外八蟠嶺在今之大內後萬松嶺在和寧門外西嶺上舊夾道栽松白樂天夜歸詩云萬株松樹青山上十里沙堤明月中東坡臘梅詩亦有萬松嶺下黃千葉之句今第宅民居髙髙下下鱗次櫛比鐵冶嶺在城內步帥衙左虎翼營之東紫坊嶺在城內漾沙坑七官宅側駱駝嶺在城內三茅觀之麓嶺下有市俗呼小壩頭慈雲嶺在方家峪旁為郊壇有後唐石刻篆書梁單閼之嵗興建龍山至涒灘之嵗開慈雲嶺風篁嶺在錢塘門外放馬場西路通龍井嶺最髙峻元豐中僧辨才師淬治修篁怪石風韻蕭爽因名曰風篁東坡嘗詣師師送至嶺上因舉逺公過虎溪事師笑曰杜子美不云乎與子成二老來往亦風流遂作亭嶺上名曰過溪亦曰二老坡公賦詩紀之又探梅詩有問信風篁嶺下梅介亭詩有丹青明滅風篁嶺之句嶺之巔有龍井詳見井門分金嶺在錢塘縣舊治西南到縣六十里滕村嶺在錢塘縣舊治西南到縣五十里青木嶺在錢塘縣舊治之西到縣四十里狗頭嶺在錢塘縣舊治之北到縣五十里五嶺在龍山之北徐村嶺一名薑擦子嶺在錢塘縣定山北鄉白塔嶺在錢塘縣龍山之東礌馬嶺在錢塘縣定山北鄉牛坊嶺在錢塘縣定山北鄉牌山嶺在錢塘縣定山南鄉大麥嶺祥符志云在錢塘舊治西南到縣一十五里今與步司右軍寨相連路通放馬場舊多種麥因以名嶺之巔有觀音閣對山有東坡同王渝楊傑張璹元祐五年三月二日遊三竺過麥嶺題名刻石葛嶺在西湖之西葛仙翁嘗煉丹於此有初陽臺髙宗皇帝即其地創集芳御園理宗皇帝以賜今太傅平章賈魏公建第宅家廟蓋魏公元有别墅在詳見行在録棲霞嶺一名劍門嶺一曰劍門關在錢塘門外顯明院之北舊多桃花開時爛然如霞故以名嶺下有嶽鄂王飛墓駝巘嶺在九里松之東乾道志作駝苑嶺胭脂嶺在九里松麯院路之西土色獨紅因以名之石人嶺一名馮公嶺在靈隱寺西極髙峻有石人卧路旁故名東墓嶺在靈隱之西去城二十餘里大青嶺在東墓嶺之南郎當嶺在大青嶺之南黃泥嶺在行春橋水竹塢步司前軍寨之南胡家嶺在錢塘縣長夀鄉極峭峻頂有石井旱不涸樵歌嶺在錢塘縣大慈山塢石姥嶺在仁和肇元鄉髙五十餘丈灌肺嶺在大街清河坊北舊有坡阜今夷為逵路而名尚存狗兒嶺在教睦坊內亦夷為路臨安縣金鵝嶺在縣一里又名鵝鼻嶺光錢嶺在縣南又名青草嶺錢王嶺在縣西平戎嶺在縣西南二十里又名釜嶺浪嶺在縣西五十里舊志云嶺上有響洞龍鬚嶺在縣西五十里産龍鬚草於潛縣巖嶺在縣北五里五季中錢氏以日者言其地有王氣命鑿之浮雲嶺在縣南二十五里題詠東坡作倅捕蝗至浮雲嶺山行疲苦有懷子由弟二首西來煙陳塞空虛灑遍秋田雨不如新法清平那有此老身窮苦自招渠無人可訴烏銜肉憶弟難慿犬寄書自笑迂踈皆此類區區猶欲理蝗餘犖霜風漸欲作重陽熠熠溪邊野菊黃久廢山行疲確尚能村醉舞淋浪獨眠林下夢魂好回首人間憂患長殺馬毁車從此逝子來何處問行藏竺嶺在縣南十五里近嘉泰橋牧嶺在縣南四十里髙五里嶺上有古松一本盤錯竒怪嘗有兄弟鬩墻欲訟於有司夜行憩其下遲明辨色相視乃伯仲也遂各悔咎息爭而還因名松為木長官龍嶺在縣北二十五里青嶺在縣南二十五里千秋嶺在縣北五十里與寧國接境上有泗州菴楊嶺在縣北三十里東北抵天目山眉山西北逹寧國驛路梅嶺在縣北一十五里北抵天目金門嶺在縣北二十五里通天目仙源黃嶺在縣西二十里地出黃白枇杷亦間出佳茗潛志云枇杷出於黃嶺前烏巾山小錫塘塢者尤珍白色者上黃次之焉淳熙間聞德夀宫嘗密遣人採訪惟烏巾山下汪氏廬前一本實大而味勝嵗倍直以酬之桐嶺在縣西四十里有古寨基楊嶺在縣西三十里新城縣青牛嶺在縣西七十里南新鄉舊名寶福山方丈有東坡題詩於壁題詠東坡詩云暮歸走馬沙河塘青煙裊裊十里香秋行曵杖青牛嶺寒泉咽咽千山靜莫笑山僧耳聾喚不聞百年俱是可憐人還衝細雨山前去白雲正在題詩處時熙寧七年八月二十五日昌化縣龍髯嶺在縣西南四十里地名蒲川石上莎草厚如茵褥嶺有廟廟後有石鏡其下有潭亦龍所宅咸淳臨安志卷二十八
