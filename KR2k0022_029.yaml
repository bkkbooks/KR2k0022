body:
  text: 咸淳臨安志卷二十九宋潛説友撰山川八洞城內外青衣洞在城內三茅觀後故老相傳昔人行至洞口有青衣童子問之不應良久入洞逐之不見聞風雨聲毛髮竦栗而出羅漢洞在今敕令所北舊有金文院疊石為洞塑羅漢其中今廢為酒庫金星洞在鳯凰山介亭下舊志在正覺院政和間廢入神霄宫今宫亦廢山屬殿司洞中生金星草因此得名又今之太廟後禁山有金星洞王柟記將作監題名云有泉清深有石離竒不越闤闠而都山水之勝銘文東坡金星洞銘寶山南麓鳯左翅驚雷劃石逋虯起凝隂噓堅出怪瑋是生神草肖蒼虺離離赤志挾脊尾飛流丹石決癰痏金星非實特取似施及山石亦見謂凡名相因皆此比水樂洞在南山煙霞嶺下舊為錢氏西關淨化院至淳熙六年以其地賜李隸仍建佛宇四望林巒聳秀巖石磻峙有洞虛窈淳涵如淵泉味清甘與龍井埒洞中有水聲如金石音熙寧二年守鄭公獬名之曰水樂洞後二年東坡來為倅遂賦詩近嵗有施宿父子注東坡詩引志林謂錢塘東陽皆有水樂洞此詩為東陽令王都官作今考志林初無此語按坡倅杭三年足迹遍湖山皆有賦咏如楊村風水洞逺在五十里外遊且至再安有近在城南隅乃不一到兼詳詩中語有曰多情海月空留照聞道磬襄東入海遺聲恐在海山間若婺之東陽介在萬山烏覩所謂海其指錢塘巖洞甚明矣太傅平章魏公嘗得此詩真迹題云右賦東陽水樂亭亦無為王令作之語蓋此地𨽻東陽村亦猶風水洞之在楊朴也嘉泰以來洞為楊郡王谷家别圃壘石築亭最號幽雅都人嵗時遊觀集焉歷年多蕪穢弗治水樂絶響今新太傅平章魏國賈公以其密邇同氣南山之墓於往來憩息便遂用厚直得之乃因其舊增葺且命寺僧深求水樂所以廢興者久之不得其説一日公遊焉俯睨旁聼悠然有契曰谷虛而後能應水激而後能有聲今水瀦其中土壅其外欲振響得乎亟命疏壅導瀦有聲從洞間出節奏自然二百年勝概於是始復乃葺亭以所得坡公真迹刻置其上又取詩語名其亭若堂曰聲在曰愛此曰留照曰獨喜他如介堂玉淵漱石宜晚則皆紀其勝處又即山之左麓闢犖確為徑循徑而上亭其三山之巔杭越諸峯江湖海門盡在目睫扁曰上下四方之宇竒觀也洞中泉由愛此引貫其下入於漱石滙於聲在逹於玉淵山之窪為池以受之每一撤楗伏流飛注噴薄如崖瀑然景物之勝視昔有加而淨化院則仍其舊云淨化院有古碑見本寺題詠東坡水樂洞詩君不學白公引涇東注渭五斗黃泥一鐘水又不學哥舒橫行四海頭歸來羯鼓打梁州但向空山石壁下愛此有聲無用之清流流泉無弦石無竅強名水樂人人笑慣見山僧已厭聼多情海月空流照洞庭不復來軒轅至今魚龍舞釣天聞道磬襄東入海遺聲恐來海山間鏘然澗谷含宫徴節奏未成君獨喜不須寫入薰風絃縱有此聲無此耳王大受遊水樂洞詩歷騁空寒六六天更來洗耳聽春泉迅湍激石浮清磬旋溜行沙寫素絃洞口林亭三四曲洞中日月幾千年何人獨得開元律譜入宫商與世傳野薑夔次韻王祕書遊水樂洞詩自是瀛洲客還因趣來解衣吟寂寞携酒上崔巍石洞山山秀梔花樹樹開只應巖下水相送上船來任參政希夷遊水樂洞詩萬舞列帝所九韶奏虞庭羣公日拱北星斗光熒熒兹辰適休沐聫騎來郊坰愛此一泓玉中有太古聲細響叶宫徴大音希咸莖自然天籟鳴獨許幽耳聽鎮以潛虬靈衛以石獸獰佳哉樂兹遊歡言舉彼觥誰與昔經始今已歸明廷巨麗所未覩窈眇真難言健筆哦五字當代推善鳴清幽極模寫細讀令人醒風水洞在楊村慈巖院院舊名恩德有洞極大流水不竭頂上又一洞立夏清風自生立秋則止故名多石子紅點如丹持出即隱置於內如故題詠白樂天遊恩德寺詩并序云豫到郡周嵗方來入寺半日復去俯視朱綬仰睇白雲有愧于心遂留絶句雲水埋藏恩德洞簪裾束縛使君身暫來不宿歸州去應被山呼作俗人林和靖詩平昔嘗聞風水洞重山復水去無窮因緣偶入雲泉路林下先聞接客鐘趙清獻公詩風穴有聲連水洞聼風觀水暫間身杭州未入從容甚且與南山作主人風蘇東坡詩并序往富陽新城李節推先行三日留水洞見待云春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不行溪橋晚溜浮梅萼知君繫馬巖花落出行三日尚逶遲妻奴怪罵歸何時世上小兒誇疾走如君相待今安有又和李節推二首山前乳水洗塵凡山下清風舞桂杉細細龍鱗鋪亂石團團羊角轉空巖馮夷窟宅非梁棟禦寇車輿謝轡銜世事漸艱吾欲去永隨二子脫譏讒風轉鳴空穴泉幽㵼石門虗心聞地籟妄意覔桃源過客詩難好居僧語不繁歸瓶得氷雪清冷慰文園臨江仙詞四大從來都遍滿此間風水何疑故應為我發新詩幽花香澗谷寒藻舞淪漪借與玉川生兩腋天仙未必相思逺慿流水送人歸層巔餘落日草露已沾衣可頴濱和子瞻題風水洞詩風送江湖滿洞天洞門聼入無緣土囊鬱怒聲初散石齒聱牙勢不全樂奏洞庭真跌宕歌傳帝所亦清便可人隱几觀遺韻重使顔成問嗒然張無盡詩嶺頭松竹自生寒兩穴茫茫徹鬼關風竊虎威時弄草泉欺龍睡故離山不嫌淅瀝驚塵耳聊挹清泠洗病顔窗外月髙湘簟冷更無間夢到人間中司馬才仲詩藤梢蔓荒寒蘚花隂空青窈窕石竇兩耳風雨并初聞聲蕭騷活火急銅瓶再聼逗餘響萬羽起寒汀我疑此山空石腳連滄溟中有蛟龍蟄鼻息隱雷霆又疑仙翁去丹灶留岩扃至今爐鼎中水火爭不停山前老比丘霜眉眼如螢能傳古老語擢吾耳昕醒便欲委塵凡脫我隨爽靈暖元居中詩二洞標竒石連巖葺宇新涼生清桂曉漲碧桃春闌擁東方騎來尋北隴人破雲拖蠟屐琢句寫霜筠談劇頻飛屑歌長益落塵為探瓊巘勝不記玉觴巡下客慚長頴髙筵飲德醇追峯到峯頂疑化九霄身識又居中上祖無擇云洞蔽深雲逺俗塵山中曽未朱輪自從白傳來遊後三百年間又一人來張先和云水色風光近使君浥塵輕雨逐車輪暫不宿宜無恨多少行春不到人老許遵云水洞連風洞精籃兩洞前山髙易藏日樹不知年板有華宗什名留少傅篇煙波門外境寂寞變桑田春范文正公詩神仙一去幾千年自遣秦人不得還盡桃花無處覔空餘流水到人間枯許元祐詩野寺依山立松橋避石斜壞梁飛白蟻木挂元蛇道路悲蓬轉功名惜鬢華聊將洞中水試洗眼前花靈化洞在郊臺天真院山頂深百餘步直下濶十餘丈有和靖東坡題名刻於石登雲洞在郊臺天真院山內錢武肅王嘗置登雲臺鐵窗櫺洞在赤山殿司左軍寨內尼菴之側洞口髙數尺舊有蛟龍出入人畏焉鑄鐵窗櫺嵌於石槽以拒之水自窗櫺中出六月如氷過慧因寺前折入西湖大旱不竭秦淮海題名記濯足於慧因澗是也呼猿洞龍泓洞以上二處詳見武林山石屋洞在煙霞石塢南山大仁院洞極髙狀似屋周回鐫羅漢五百十六身中間鑿釋迦佛諸菩薩像直下洞極底有泉詳見大仁院煙霞洞祥符志云在錢塘縣舊治之西一十六里晉開運元年有僧彌洪結菴洞口遇一神人指此山後有聖迹何不顯之洪尋至山後見一洞內有石刻羅漢六尊洪既卒吳越王錢氏夢僧告云吾有兄弟一十八人今方有六王可聚之夢覺訪得煙霞洞有六羅漢遂别刻一十二尊以符所夢其洞極大乃諸洞之首在烏塢內洞旁有巖曰佛手巖象鼻巖詳具清修寺題詠周紫芝登煙霞洞詩瀕湖兩峯髙屹立曉相望蒼涼升海日骯髒露千嶂羸驂絶坡陀巖谷飽追訪緬懷洪荒初藴蓄含萬象渾沌久已死鯈忽真巧匠誰令鑿空手出此竒嶮狀中虗納遊雲谷靜答幽唱暗穴下無底濤聲想悲壯十八志聲聞附石出遺像誰其架修椽置屋雲雨上肯山不知數繞屋森百丈忽於兩峰間萬頃見煙浪澎湃海潮聲往往入藜杖天公愛此山令我拜嘉貺眇焉隔仙凡欲往謾惆悵便當學枯禪綺語蠲宿妄自足伴周旋長年此遐放蝙蝠洞在錢塘縣煙霞石屋洞後內多蝙蝠因以名之故老傳云洞極深廣無泉水建炎間兵火時里人避難於中容數百人因而獲免今在尼菴民屋後棲霞洞在棲霞嶺巔妙智寺側其地多巖石蔽翳榛莾中今之太傅平章賈魏公來遊望而異之命施畚臿倐見竒狀抉藏剔幽千態溢發殆若神剜鬼鑿地靈寶祕有待而後顯者洞之外為亭二曰暢亭曰鑰俗入其中穹然如夏屋雙巨石相倚為閈閎每風從南來穿谽呀而出輒悽神寒骨不可久立故暑遊最勝其石甓小方臺突然坎窞中衡從二石級下逹於坻厥土乃剛燥益南仰視左竇四五豁然通明大者圓徑可丈許嘉木當前如月中桂小者星列自相附屬出洞略亭而北行百餘步有曰水洞循而下可十餘丈受泉一泓深不可測極甘冽魏公嘗調以瀹茗龍洞在臨平山祥符志云自洞門至水際五丈濶一丈五尺髙一丈三尺其水深不可測禱祈多驗細礪洞在臨平山祥符志云深十餘丈濶二丈五尺髙一丈五尺輿地志云臨平山有洞數丈出礪石香林洞在下天竺詳見天竺寺大雄山白龍洞在錢塘縣崇化鄉大雄山故老傳云有白龍藏於洞中嘉定八年趙安撫時侃以旱禱龍祠雨隨至奏於朝封顯靈孚濟侯賜廟額曰敏應護國仁王院洞在錢塘門外掃帚塢有泉出洞中旱禱而雨詳見仁王院海雲洞在仁和縣水和鄉超山上有乾濕二洞黑龍王祠雲洞在錢塘門外古桞林楊和王園因坡陀擁土為之可奪天巧詳見亭門餘杭縣大滌洞棲真洞鳴鳯洞石室洞龍蛻洞鳴鈴洞白茆洞歸雲洞已上八處並見大滌山臨安縣仙人洞在縣北一十五里石洞在縣西五十里舊志云洞兩旁有石室可容百許人中有龍池云是天之一目可濶二畝近池西北無底有穴通江海玉仙洞在鳳翥鄉南山去縣四十里地名黃金漾淳祐十年正月二十六日鄉民樵採見一白獸入洞遂劚開洞口漸進漸深秉燭以視內有三洞深二十餘丈峻壁擁石髙十丈餘色左青右黃白其狀有仙人有玉芝有寶坐又有如幡者如白龍者如獅子者二柱屹立一長八尺圍四尺一長六尺圍丈餘色潔白柱間有井深六尺內橫深不可計間吐煙霧氣微溫白龍體滴水不竭餘怪石不可勝數響洞在縣西五十里浪嶺人語其中則響應趙安撫與􅊸名之曰玉仙洞題詠金華王竹寮執禮遊玉仙諸洞戲題碧雲石崖詩已從鹿巖遊更入龍洞去橫足螃蟹行連臂猿猱度滑徑鏗蠟屐隂崖然樺炬振䇿扶顛隮捫蘿猛扳附塗險幾欲窮境勝忽有遇谽谺通石竇參差流玉乳形開趣彌深興集理自裕便將遺世紛且復恣幽步紆餘窮冥搜淹留迫頽暮題詩識蒼壁聊寫心迹素重遊豈無期恐忘來時路於潛縣仙洞在縣南六十五里盛村其山屹立環以清流絶頂皆怪石林麓欎然洞門石光瑩如鏡中可容數人風月澄清之夕聞有樂聲石燕洞在增口與門堂山連洞口濶五尺長丈餘髙五十餘丈其峭拔處非編梯莫至昔有人秉炬而入自洞門下迤邐漸低若階級至二三里許隂風浩渺水聲潺湲遂不敢前其中蝙蝮白色為火所驚羣飛而出且多燕糞意其秋後所藏湖潭洞三穴皆在谷口東溪東岸雲鶴巖之麓上接天目安溪石崖垂覆林木森茂上二洞投以石杳不知所止惟水聲潺潺下洞常有流水不知其源故老相傳與太湖相通故名冷水谷在桃林北嶺下方圓丈餘源脈邃逺瑩徹如氷雪炎暑尤宜盥滌真玉壺之寒溜也富陽縣巖洞在縣西三十里巖有水池每日潮再至與浙江相應白樂天詩洞口靈池應海潮洞中有足迹世傳葛仙翁遺迹舊有煉丹鼎今不存新城縣新婦洞在縣西北四十里廣陵鄉鄭家山古老相傳云昔見一婦人靚粧而入失其所在因以名之洞有源泉溉田甚廣十餘里間雖歉嵗常豐太平寰宇記云有潭深八九尺水清瑩魚鰻時出沒甚異乾道四年旱令景秉親往行四五里即有微雨沾道間踰二十里至湘溪望拜心禱時星月方明忽隂雲四合大雨傾盆遂上其事畿漕以聞上敕賜靈應廟為額縣西二十里七賢鄉地名長欄又有一洞亦名新婦洞其事未詳仙洞在縣南二十五里太平鄉洞口如屋宇至一二百步漸下有隔石似木橫道人不得入父老相傳通桐廬縣界靈隱洞在縣西六十里新安鄉髙一十丈濶五丈其深莫測中有澗水四時不竭相傳云昔有人遊洞中逾二日忽坐洞門前石上云見神人叱之不覺身出到此蛻龍洞在縣西十八里新登鄉相傳云初開此洞石門九里深不可極得牙骨一斛皆謂龍蟠蛻而去石間尚有鱗爪痕自首至尾宛然龍顔也稍深入為二徑遊人至此不敢復入題詠許廣淵詩山逺洞難窮相傳舊隱龍蟠泥知幾載穿石見遺蹤靈骨巖中換隂雲日下從鄉人祈旱嵗歌舞尚虔恭日又云往昔開鋤古洞存神龍曽隱穴山巒靈蹤何青天去雲氣無時白晝寒穿石分明印鱗爪履泉驚懼作波瀾于今霖雨均方國來客休疑尚此蟠司馬槱詩雷雨何時起蟄龍蒼䀶夭矯石巖空不緣嗜好尋劉纍定向人間試葉公還憩池亭名其池曰躍龍一首云梅萼春前破松髯雨後滋石崖鳴野鶴竹塢竄香狸山腳重重轉溪流泯泯遲殷勤窺洞府又得濯龍池徐評詩薈蔚蒼巖下靈蹤此暫蟠雲雷一夜起風雨滿山寒骨腐苔方緑涎餘石未乾試慿圖畫去聊羡葉公看李處全詩龍化當年去不回空餘古洞出崔巍蒼蒼野色連天逺脈脈泉音穴地來壁上梭飛三尺雨匣中劍躍一聲雷紅雲六月炎蒸處應作商霖澤九垓自陳珏詩潛虬成穴古危岑曾為編氓霈旱霖石怪留千載迹泥蟠難駐九天心老松猶學拏雲勢羣籟渾驚動地吟瀟灑禪關連勝概追遊誰不快煩襟羅宅洞在縣西五十里新安鄉地名羅宅咸淳臨安志卷二十九
