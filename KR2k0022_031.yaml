body:
  text: 咸淳臨安志卷三十一宋潜說友撰山川十江浙江在郡之東南東漢郡國志會稽郡有浙江注引郭璞所注山海經云出歙縣玉山又丹陽郡歙縣注引山海經云三天子都在閩西海北郭璞曰在縣東謂之玉山其水過今建德合婺溪至富春為浙江入於海虞喜志林云今錢塘江口浙山正居江中潮水投山下折而曲一云江有反濤水勢折歸故云浙江史記云水至會稽山隂為浙江盧肇曰浙者折也蓋取其潮出海曲折而倒流也一名浙河山海經云禹治水至於浙河莊周亦曰浙河之水每日晝夜潮再上常以月十日二十五日最小月三日十七日最大小則水漸長不過數尺大則濤山浪屋雷擊電砰有吞天沃日之勢吳越春秋夫差內傳載吳王賜伍子胥死乃取其尸盛以鴟夷之革浮之江中子胥因隨流揚波依潮來往蕩激隄岸又越王外傳越王賜大夫種死葬於西山之下一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水審候者伍子胥也後重水者大夫種也其說荒誕無稽辨論見祠祀門忠清廟諸家所論惟姚寬西溪殘語及徐明叔傳髙麗録有可載者西溪云舊於會稽得一石碑論海潮依附隂陽時刻極有理疑是國初燕肅所為云觀古今諸家海潮之說多矣或為天河激湧葛洪亦云地機翕張洞真正一經盧肇以日激水而潮生封演云月周天而潮應挺空入漢山涌而濤隨施師謂僧隱之之言析木大梁月行而水大竇叔䝉濤志源殊派異無所適從索隱探微宜申確論大率元氣噓吸天隨氣而漲斂溟渤往來潮隨天而進退者也以日者衆陽之母隂生於陽故潮附之於日也月者太隂之精水者隂故潮依之於月也是故隨日而應月依隂而附陽盈於朔望消於朏魄隨於上下弦息於輝朒女六切朔而月見東方故潮有大小焉今起月朔夜半子時潮平於地之子位四刻一十六分半月離於日在地之辰次日移三刻七十二分對月到之位以日臨之次潮必應之過月望復東行潮附日而又西應之至後朔子時四刻一十六分半日月潮水亦俱復㑹於子位於是知潮當附日而右旋以月臨子午潮必平矣月至卯酉汐必盡矣或遲速消息又小異而進退盈虛終不失於時期或曰四海潮平來皆有漸唯浙江濤來則亘如山嶽奮如雷霆水岸橫飛雪崖傍射澎騰奮激吁可畏也或云夾岸有山南曰龕北曰赭謂之海門岸狹勢逼涌而為濤盧肇潮論所謂夾羣山而逺入射一帶以中投者是若言狹逼則東溟自定海吞餘姚奉化二江侔之浙江尤甚逼狹潮來不聞有聲今觀浙江之口起自纂風亭屬會稽北望嘉興大山水濶二百餘里故海南舶船怖於上灘水中沙為灘徒旱切惟泛餘姚小江易舟而浮運河達於杭越蓋以下有沙灘南北亘之隔礙洪波蹙遏潮勢夫月離震兊他潮已生惟浙江水惟洎月徑潮㢲轉來已半濁浪推滯後水益來於是溢於沙灘猛怒頓涌聲勢激射故起而為濤耳非江山淺逼使之然也髙麗録云潮汐往來應期不爽為天地之至信古人嘗論之在山海經以為海鰌出入之度浮屠書以為神龍之變化竇叔䝉海嶠志以為水隨月之盈虧盧肇海潮賦以謂日出於海衝擊而成王充論衡以為水者地之血脉隨氣進退率未之盡大抵天包水水承地而一元之氣升降於太空之中地乘水力以自持且與元氣升降互為抑揚而人不覺亦猶坐於船中而不知船之自運也方其氣升而地沉則海水溢上而為潮及其氣降而地浮則海水縮而為汐計日十二辰由子至已其氣為陽而陽之氣又自有升降以運乎晝由午至亥其氣為隂而隂之氣又自有升降以運乎夜一晝一夜合隂陽之氣凡再升再降故一日之間潮汐皆再焉然晝夜之晷繫乎日升降之數應乎月日臨於子則陽氣始升月臨於午則隂氣始升故夜潮之期日皆臨子晝潮之期月皆臨午焉又日行遲月行速以速應遲每二十九度過半而月行及之日月之㑹謂之合朔故月朔之夜潮日亦臨子月朔之晝潮日亦臨午焉且晝即天上而言之天體西轉日月東行自朔而往月速漸東至於漸遲而漸亦應之以遲於晝故晝潮自朔後迭差而入於夜此所以一日午時二日午末三日未時四日未末五日申時六日申末七日酉時八日酉末也至夜即海下而言之天體東轉日月西行自朔而往月速漸西至於漸遲而潮亦應之以遲於夜故夜潮自朔後迭復而入於晝此所以一日子時二日子末三日丑時四日丑末五日寅時六日寅末七日卯時八日卯末加以時有交變氣有盛衰而潮之所至亦因之為大小當卯酉之月則隂陽之交也氣以交而盛故潮之大也獨異於餘月當朔望之後則天地之變也氣以變而盛故潮之大也獨異於餘日今海中有魚獸殺取皮而乾之至潮時則毛皆起豈非氣感而類應之自然歟每仲秋既望潮怒特甚杭人執旗泅水上以迓子胥弄潮之戲蓋始於此往往有沉沒者至治平中郡守蔡端明作戒弄潮文斗牛之分吳越之中唯江濤之最雄乘秋風而益怒乃其俗習于此觀遊厥有善泅之徒競作弄潮之戲以父母所生之遺體投魚龍不測之深淵自為矜誇時或沉溺精魄永淪于泉下妻孥望哭于水濵生也有涯盍終于天命死而不弔重棄于人倫推豫不忍之心伸爾無窮之戒所有今年觀潮並依常例其軍人百姓輒敢弄潮必行科罰熙寧中兩浙察訪使李承之獨奏請禁止然終不能遏也潮候春秋同初一初二十六十七午末未初大大夜子正夜子末初三初四十八十九未正未末大大夜丑初夜丑末初五初六二十一申正二十寅末下岸漸大夜寅初晚申末初七初入二十二二十三卯初卯末漸小漸小晚酉初晚酉正初九初十二十四二十五辰初辰末小澤交晚酉末晚戍正十一十二二十六二十七巳初巳正起水漸大夜戍末夜亥初十三十四二十八二十九巳末午初漸大漸大夜亥正夜亥末十五三十午正極大夜子初夏初一初二十六十七午末未初大大夜子正夜子末初三初四十八十九未正未末大大夜丑初夜丑正初五初六二十一二十申初寅初下岸小夜丑末晚申正初七初八二十二二十三寅末卯初小小晚申末晚酉初初九初十二十四二十五卯末辰初小澤交晚酉正晚酉末十一十二二十六二十七辰末巳初起水漸大夜戍初夜戍末十三十四二十八二十九巳末午初漸大漸大夜亥初夜亥末十五三十午末大夜子初冬初一初二十六十七午末未正大大夜子初夜子末初三初四十八十九未末申初大大夜丑初夜丑末初五初六二十十二一申正寅末下岸漸小夜寅初晚申末初七初八二十二二十三卯初卯末小小晚酉初晚酉正初九初十二十四二十五辰初辰末小澤交晚酉末夜戍初十一十二二十六二十七巳初巳正起水漸大夜戍正夜戍末十三十四二十八二十九巳末午初漸大漸大夜亥初夜亥正十五三十午正漸大夜亥末捍海塘江挾海潮為杭人患其來已久白樂天刺郡日嘗為文禱於江神然人力未及施也至梁開平四年八月錢武肅始築捍海塘在候潮通江門之外潮水晝夜衝激版築不就因命强弩數百以射濤頭據吳越備史又致禱於胥山祠仍為詩一章函鑰置海門山詩云為報龍王及水府錢江借取築錢城既而潮水避錢塘東擊西陵遂造竹落積巨石植以大木隄岸既成久之乃為城邑聚落凡今之平陸皆昔時江也潮水衝突不常隄岸屢壞至大中祥符五年郡守戚綸與兩浙轉運使陳堯佐申請遣使自京師部掃匠壕寨赴州以掃岸易柱石之制雖免水患而衆頗非其變法焉七年詔江淮發運使李溥同內供奉官盧守勤按視復依錢氏立木積石之制仍令守勤専掌其事是時水方大溢九年郡守馬亮禱於子胥祠下明日潮為之却又漲橫沙數里隄遂以成及景祐中隄復壞兩浙轉運使張夏作石隄十二里因置捍江兵士五指揮専採石修塘隨損隨治杭人德之作廟堤上今昭貺廟是也詳見祠廟門慶厯初夏六月大風驅潮隄再壞郡守楊偕轉運使田瑜協力築堤二千二百丈有丁寶臣記文紹興十年以兩浙轉運副使張滙之請招填捍江軍額二十二年吏部尚書林文鼐建言乞選擇諳曉之士専置一司詢故老究利病脉絡而後興工且言羅剎江濵舊有三浮屠唐末神僧創以鎮潮脉名六和塔積年不修又吳山英烈王廟燼於回祿乞靈無地乞付有司營葺從之自是百餘年間屢修屢壞焉嘉熙戊戍秋潮由海門搗月塘頭日朘月削民廬僧舍坍四十里己亥六月詔趙與歡除端明殿學士知臨安府任責修築與歡奏先於傍近築土塘為救急之術然後於內築石塘又奏近觀潮勢忽覩異物非龍非魚什什伍伍鼓鬛揚鬐欲望早奏告上帝或施强弩火炮以絶其妖又奏日役殿步司官兵五千五百餘人并募夫工及修江司軍兵三千餘人已貼立石倉夾植樁笆版木晝夜運土填築自水寺寺之下江家橋之上近江港口築壩一南北長一百五十丈自團圍頭石塘近江築捺水塘一長六百丈自六和塔以東一帶石隄添新補廢四百餘丈越三月畢工水復其故祝文白樂天禱江神文滔滔大江南國之紀安波則為利洚流則為害故我上帝命神司之今屬潮濤失常奔激西北水無知也如有憑焉漫淫漫淫郊鄽壞敗廬舍人墜墊溺籲天無辜居易祗奉乎璽書興利除害守土守水職與神同是用備物致誠躬自䖍禱庶俾水反歸壑谷遷為陵土不騫推人無蕩析敢以醴幣羊豕沉奠于江惟神裁之無沗祀典記文丁寶臣作石隄記曰江介吳越間杭据其右而地勢下生聚數十萬廬舍隱粼號天下最盛而嵗苦海潮為患於夏秋尤暴常與隄平城中望隄不百數步其勢反在髙仰處不幸一壅而潰其猶决山而注於井沛然可禦哉故其病於民也數矣初自景祐中水災轉運使張公伯起善為捍禦之䇿謂故隄率薪土雜治不一二嵗輒壞雖勤繕完卒不足恃而重勞吾民乃作石隄袤一十二里自是民賴以安後七年夏六月大風驅潮晝夜不落勢益湍怒若將吞于城也隄之土石齧去殆半然猶足以支其危時知府翰林楊公偕轉運使田公瑜急督人徒負土以置斷防卒免墊溺已而老幼泣且言曰水為敗比前嵗甚微張公之仁吾其魚矣二公遂相與議完築條上方略約工四十萬計及籍吏之可使者以驛聞上詔以隄事付之兼命通判屯田錢君尚余君貫兵馬都監閣門祗候杜君正平分董其役發江淮南二浙福建之兵調十縣丁壯合五千人輦石于山畚土于丘持臿節杵之役相屬於數十里之外方苦盛寒無一告勞者是嵗冬十二月新隄成用人之力三十萬减元調度一十萬費又乘其羡贏益蓄護治之備其由二公經畫中節衆僚夙夜叶力之效歟隄長二千二百丈崇五仞廣四丈自龍山距官浦二千丈修舊而成增石五版為十三級自卸香亭下創為二百丈石堅土厚相為膠固平上而方下外彊而內實形勢恆安可恃而無恐矣最堅捍激處更為竹落實以小石布其下及圓折其岸勢務以分殺水怒大率究前之謀所未盡者益以新意而為之也于是邦人相賀於道以為區處資蓄今日可為久安計嗚呼自有天地來何嘗世無禍災惟君子能左右吾民思患而預防之使其雖有而不能為害則幸矣是隄也由伯起克開厥初二公克大厥終合而成績以樹萬世之利後之為政者其念前人之勤俾弗壞則斯民無窮之賜也春秋之義有志於民者志之某預見本末不敢無紀云題詠白樂天詩早潮才落晚潮來一月周流六十回不獨光隂朝復暮杭州老去被潮催劉中山詩八月濤聲吼地來頭髙數丈觸山回須㬰却入海門去卷起沙堆作雪堆范文正公詩何處潮偏盛錢塘無與儔誰能問天意獨此見濤頭海浦吞來盡江城打欲浮勢雄驅島嶼聲怒戰貔貅萬叠雲才起千尋練不收長風方破浪一氣自橫秋髙岸驚先裂羣源怯倒流騰凌大鯨化浩蕩六鼇遊北客觀猶懼吳兒㺯弗憂子胥忠義者無覆巨川舟把酒問東溟潮從何代生寧非天吐納長逐月虧盈暴怒中秋勢雄豪半夜聲堂堂雲陳合屹屹雪山行海面雷霆聚江心瀑布橫巨帆連地震羣楫望風迎踊若蛟龍鬪奔如雨雹驚來知千古信回見百川平破浪功難敵驅山力可并伍胥神不泯憑此發威名千蔡端明詩地捲天回出海東人間何事可爭雄年浪說鴟夷怒一信全疑潄澥空寂靜最宜聞夜枕峥嶸須待駕秋風尋思物理真難到隨月虧圓亦未通東坡中秋看潮五絶定知玉兔十分圓已作霜風九月寒寄語重門休上鑰夜潮留向月中看萬人鼓譟懾吳儂猶似浮江老阿童欲識潮頭髙幾許越山渾在浪花中江邊身世兩悠悠久與滄波共白頭造物亦知人易老故教江水更西流吳兒生長狎濤瀾冒利輕生不自憐東海若知明主意應教波浪變桑田水江神河伯兩醯雞海若東來氣吐霓安得夫差犀手三千强弩射潮低節録試院戲作八月十八潮壯觀天下無鵾鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黑沙白浪相吞屠人八月十八日觀潮南歌子二首海上乘槎侣仙蕚緑華飛升元不用丹砂住在潮頭來處渺天涯雷輥夫差國雲翻海若家坐中安得弄琴牙寫取餘聲歸向水仙誇苒苒中秋過蕭蕭兩鬢華寓身化世一塵砂笑看潮來潮去了生涯方士三山路漁人一葉家早知身世兩聱牙好伴騎鯨公子賦雄誇手瑞鷓鴣碧山影裡小紅旗儂是江南踏浪兒拍欲嘲山簡醉齊聲爭唱浪婆詞西興渡口帆初落漁浦山頭日未欹儂欲送潮歌底曲樽前還唱使君詩江神子鳯凰山下雨初晴水風清曉霞明一朵芙蓉開過尚盈盈何處飛來雙白鷺如有意慕娉婷忽聞江上㺯哀筝若含情遣誰聼烟斂雲收依約是湘靈欲待曲終尋問取人不見數峯青楊巨源送章孝標歸杭州詩曽過靈隱江邊寺獨宿東樓看海門潮色銀河鋪碧落日光金柱出紅盆鄭􅐧夫觀潮詩云怒潮沃日為之隂下有蛟龍不測深若比人間惡風浪長江風浪本無心李泰伯憶錢塘江詩云昔年乘醉舉歸帆隱隱前山日半銜好是滿江涵反照水仙齊著淡紅衫林和靖秋江寫望蒼茫沙觜鷺鸞眠片水無痕浸碧天最愛蘆花經雨後一蓬烟火飯魚船葉水心渡浙江晚霞銷盡月明鈎萬頃無風一水浮長怕舟師深擊楫自今洄洑起中流髙菊澗渡錢塘小立晴江上潮生落照邉晚花低映水春草暗迷烟燕子飛官驛羣鷗引客船關情南浦别相對獨依然看弄潮回弄罷江潮晚入城紅旗颭颭白旗輕不因㑹喫翻頭浪爭得天街鼓樂迎周紫芝觀潮分韵三首人生如微塵同一霄壤間可笑蠛蠓眼但窺甕中天錢塘俯滄海八月壯濤瀾始疑是練橫旋作萬馬翻海門屹中開方壺忽當前不知何巨鰲為我載三山銀光射傑閣玉筍垂朱欄須㬰擊飛雪噴薄上簾顔相看各驚顧日暮殊未還那知在空濛但怪毛髮寒平生雲夢胸始信宇宙寬安得凌雲手大筆如修椽盡挽捲天浪參差入毫端不烈風驚洪濤浩蕩吹海上迅雷忽翻空掩耳嗟及漢兵百萬騎已奪秦關入擊石驚倒流勢若三峽急滄波忽喧豗衆目俱駭栗人言海潮來昔為子胥屈誰當語馮夷四海今已一王春㑹塗山白玉執萬笏江河及喬嶽祠祀已咸秩海神會當知萬嵗拱帝室長神州古都㑹有美東南邦壯哉八月濤卷地奔江驚濤裂巨石洪鐘殷朝撞萬瓦響飛炮千艘碎艂艭灔澦不足數况乃峽與龍翩翩坐中客才器俱無雙九牛可逆拽五鼎乃獨扛詩成咄嗟頃惡語徒喧嚨來朱靜佳錢塘江詩極浦無髙樹蒼茫只逺空潮江水黑日出海門紅兩岸東西浙千帆來去風中原山色外殘夢逐歸鴻海海門在仁和縣東北六十五里有山曰赭山與龕山𨽻紹興府對勢潮水出其間郭璞地記所謂海門一㸃㢲山小又曰海門筆架峯巒起指此也鹽官縣海在縣東南一十里咸淳臨安志卷三十一
