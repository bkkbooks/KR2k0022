body:
  text: 咸淳臨安志卷三十三宋潛説友撰山川十二湖中六井水口并續置井附相國井在甘泉坊側西井一名化成井在李相國祠前水口在安國羅漢寺前方井俗呼四眼井在三省激賞酒庫西白龜池此水不可汲飲止可防虞水口在玉蓮堂北小方井俗呼六眼井在錢塘門內裴府前水口在菩提寺前金牛井今廢南井一名沈公井一名惠遷井在三橋西金文西酒庫北水口在豐豫門外龍王堂前分入流福坊井在通判衙前水口在清波門外鑷子井在涌金門內北水口在豐豫門近楊府漁莊惠利井在洪福橋西水口在玉蓮堂南景靈宫園水池水口在錢塘門外昭慶山門左真珠河在錢塘門內水口在錢塘門外菩提寺後一通九曲下湖右井十水口九瀦而汲者為井導而入者為水口自源而委實相貫通前志各自為門事辭不屬覽者病之今會粹顛末並繫於西湖之後外有靈芝寺前水樓汲注湖水以入釀庫雖不在水口之數亦傅著焉自相國井而下六井始唐刺史李鄴侯以郡城水泉惡引湖水以便民汲白樂天復加開浚國朝嘉祐中沈禮部遘字文通為守日金牛井已廢乃作南井熙寧中陳密學襄重泄治且遷方井東坡為倅記其事刻石相國井亭上及元祐中出守南井亦已廢遂更為規置并他井皆致力焉其詳見於奏乞僧子圭師號狀云勘會杭州平陸本江海故地惟附山乃有甘泉其餘井皆鹹苦唐刺史李泌始引西湖水作六井其後白居易亦治湖浚井以足民用嘉祐中知州沈遘增置一大井在美俗坊今謂之沈公井最得要地四逺取汲而創始滅裂水嘗不應至熙寧中六井與沈公井例皆廢壞知州陳襄選差僧仲文子圭如正思坦四人董治其事修浚既畢歲適大旱民足於水為利甚博臣為通判親見其事經今十八年沈公井復壞終歲枯涸居民去水逺者率以七八錢買水一斛而軍營尤以為苦臣尋訪求熙寧中修井四僧而三人已亡獨子圭在年已七十精力不衰問沈公井復壞之由子圭云熙寧中雖已修浚然不免以竹為管易致廢壞遂擘畫用瓦筒盛以石槽底蓋堅厚錮捍周密水既足用永無壞理又於六井中控引餘波至仁和門外及威果雄節等指揮五營之間創為二井皆自來去井最逺難得水處西湖甘水殆遍一城軍民相慶若非子圭心力才幹無緣成就緣子圭先已蒙恩賜紫欲乞特賜一師號曰惠遷以旌其能取易所謂井居其所而遷之義從之邦人遂以師號為井名乾道四年周安撫淙重修諸井時坡所刻記已廢乃復刻諸石且識其後今又百有餘年所謂惠遷井者石泐流壅泥不可食久矣頃嘗修治乃反以木為管茍簡特甚無幾時輒壞湖水既不應民居穢惡之流復浸淫其間咸淳六年安撫潛説友乃更作石筒袤一千七百尺深廣倍舊外捍內錮益堅縝然後水大至每五十尺穴而封之以備淘浣且於水所從分之處浚海子口以澄其源井之上覆以巨石為四川以便民汲南為溝以達於金文橋之河俾船水以售者取焉撤亭而新之極閎敞旁為神祠置守者使無敢汚慢又别為溝疏惡水行於路之北所以為井慮者備矣水口自淳祐七年趙安撫與􅊸因水涸浚湖奏請云自涌金門北至錢塘門一帶荷蕩正係六井水口舊為府第占據租佃牟利填塞穢濁今已支錢回買先就此處用工欲更於荷蕩界至之外用石砌結疏作石窗立為界限澄濾湖水舟船不得入滓穢不得侵使井口常潔咸享甘泉實為都民久逺之利旨從之且命鋤掘菱荷毋得存留其後又有侵占翳塞者安撫潛説友乃請於朝乞行除拆會殿中鮑御史度劾奏入內內侍省東頭供奉官幹辦御藥院陳敏賢廣造屋宅於靈芝寺前水池庖厨湢室悉處其上諸庫醖造由此池車灌以入天地祖宗之祀將不得蠲潔而虧歆受之福入內內侍省東頭供奉官幹辦內東門司提點御酒庫劉公正廣造屋宅於李相國寺前水池濯穢洗馬無所不施一城食用由此池灌注以入億兆黎元之生將共飲汙膩而起疾疫之災奉御筆陳敏賢降一官放罷劉公正與祠仍拆除所占水口付臨安府交管又清波門水口其始導湖由聚景園經張府小寨分為兩路並通流福坊井折入左司理院前乃置閘池之以防虞又自池入於樓店務前河初園𨽻內司守者利於陸種岸水所入有司莫敢過問而小寨兩路亦為居民障塞渠岸或圮不治又請於朝乞照舊規自學士橋大湖開取水港濶一丈長四十丈至舊來鐵窗櫺水口通流入井仍以租錢量納內司旨從之由是水路之障塞者撤渠岸之頽圮者築且與居民為厲禁然後故流盡復倚閘為門揭以巨扁將刋省劄指揮於石以諗來者又以玉蓮堂豐樂樓兩水口皆為植荷芡者樊其旁汚穢尤盛蓋由前是官利租入仍踵舊弊乃悉除去其籍差開湖兵絶所蒔本根使勿復萌蘖至是講求水口之利亦無遺算矣記文石記樂天記云錢塘湖一名上湖周回三十里北有石函南有筧凡放水溉田每減一寸可溉十五餘頃每一復時可溉五十餘頃此州大抵春多雨夏秋多旱若防隄如法蓄泄及時即瀕湖千餘頃田無凶年矣鹽官界應溉夾公河田須放湖水自錢塘至入河從河入田凖鹽鐵使舊法又須先量河水淺深待溉田畢却還原水尺寸往往旱甚則湖水不充今年修築湖隄髙加數尺水亦隨加即不啻足矣脫或不足即更決臨平湖添注官河又有餘矣假他詞以惑刺史俗云決放湖水不利錢塘縣官多或云魚龍無所托或云茭菱失其利且魚龍與生民之命孰急茭菱稻梁之利孰多斷可知矣又云放湖水則郭內六井無水亦妄也且湖底髙井管低湖中乂有泉數十眼湖耗則泉湧雖盡竭湖水而泉用有餘况前後放湖終不至竭而云六井無水謬矣其郭中六井李泌相公典郡日所作甚利於人與湖相通中有隂竇往往堙塞亦宜數察而通理之雖大旱而井水常足湖中有無稅田約數十頃湖淺則田出湖深則田沒田户多與所由計會盜泄湖水以利私田其石函南筧并諸小筧非灌田時並須封閉築塞數令巡檢小有漏泄罪責所由即無盜泄之弊矣又若霖雨三日以上往往隄決須所由巡守預為之防其筧之南舊有缺岸若水暴漲即於缺岸泄之又不減兼於石函南筧泄之防隄潰也害豫在郡三年仍嵗逢旱湖之利盡見其由恐來者要知故書於石欲讀者易曉故不文其言六井記東坡記云潮水避錢塘而東擊西陵所從來逺矣沮洳斥鹵化為桑麻之區而久乃為城邑聚落凡今州之平陸皆江之故地其水苦惡惟負山鑿井乃得甘泉而所及不廣唐宰相李公長源始作六井引西湖水以足民用其後刺史白公樂天治湖濬井刻石湖上至於今賴之始長源六井其最大者在古清湖為相國井其西為西井少西而北為金牛池又北而西附城為方井為白龜池又北而東至錢塘縣治之南為小方井而金牛之廢久矣至嘉祐中太守沈公文通又於六井之南絶河而東至美俗坊為南井出湧金門並湖而北有水閘三注以石溝貫城而東者南井與相國方井之所從出也若西井則相國之派别者也而白龜池小方井皆為匿溝湖底無所用閘此六井之大略也又熙寧五年秋太守陳公述古始至問民之所病皆曰六井不治民不給於水南井溝庳而井髙水行地中率常不應公曰嘻甚矣吾在此可使民求水而不得乎乃命僧仲文子圭辦其事仲文子圭又引其徒如正思坦以自助凡出力以佐官者二十餘人於是發溝易甃完緝罅漏而相國之水大至坎滿溢流南注於河千艘更載瞬息百斛以方井為近於濁惡而遷之少西不能五步而得其故基父老驚曰此古方井也民李甲遷之於此六十年矣疏涌金池為上中下使浣衣洗馬不及於上池而列二閘於門外其一赴三池而決之河其一納之石檻比竹為五管以出之並河而東絶三橋以入於石溝注於南井水之所從來髙則南井常厭水矣凡為子閘四皆垣墻扃鐍以護之明年春六井畢修而嵗適大旱自江淮至浙右井皆竭民至以罌缶貯水相餉如酒醴而錢塘之民肩足所任舟楫所及南出龍山北至長河鹽官海上皆以飲牛馬給沐浴方是時汲者皆誦佛以祝公余以為水者人之所甚急而旱至於井竭非歲之所常有也以其不常有而忽其所甚急此天下之通患也豈獨水哉故詳其語以告後之人使雖至於久逺廢壞而猶有考也乾道重修井記周龍圖淙撰云乾道三年夏五月淙自兩浙轉運副使改知臨安府越明年狴犴屢空經費稍裕乃以暇日披圖牒考風俗思欲與都人為不朽之利而修井之役始興惟六井自熙寧五年太守陳公始實改作蘇公通守為記其事逮元祐五年蘇公自禁林出守是邦相距才十八年而井已廢壞於是改用瓦筒石槽其詳見於乞修井僧師號奏然自元祐至今已八十年率多堙涸白龜池且為大姓所據淙念此邦為東南都會生齒阜繁況今輦轂所駐四方輻輳百司庶府千乘萬騎資於水者十倍昔時儻廢而不治豈不為民病仰惟聖主惟民是念淙奉承德意不敢循默因奏於上面奉玉音即日濬治遂以六月己亥經始於惠遷井易用新石堅厚髙廣過昔數倍以次至方井沈公井相國井白龜池而蘇公所記之六井畢修捍蔽周密可置數百歲水脈大至率皆盈溢則又治古井之有泉者曰瑞石曰中棚曰義井曰清湖閘井城之內外無不足於水矣竊惟此邦懷蘇公之德逮今不忘既踵公舊規再治六井因訪求熙寧間舊本記文刻之井上而書歲月於其後使億萬生聚知是井之修蓋奉聖天子之命而遵蘇公之規守臣何力之有咸淳重修井記盧侍郎鉞撰云六府以修為功而水居其首蓋生人所資以養有一日不容闕焉者也凡邦國都鄙稍甸郊里之地必有井焉以濟其日用飲食故曰井養而不窮杭為東南一大都會左江右湖民物阜繁厥初因沙塘奠厥攸居故不難於得水然江之融液者常苦惡不若湖之為甘且美也蓋江與海通波湖則受衆山流泉而瀦之味之不同也亦宜唐刺史李鄴侯泌始作六井引兹水以足民用我朝熙寧壬子陳公襄因其舊而襄之元祐庚午蘇公軾又修之于以見六井者杭人之所利賴矧南渡駐蹕以來百司庶府六軍萬姓仰於水者視昔何啻百倍乾道間周龍圖淙詢民之欲踵蘇之規而深致力焉蓋百有餘年於此矣皇上咸淳之六年太傅平章賈魏公任軍國重事朝廷清明宫府一體彈壓輦下今時則易然也夫既處時之易而復受任之久故衆廢具舉而功緒始及於井曰惠遷者溝低於河泥不可食筧舊用木歲久輒壞乃培而髙之復治石而竅其上可用汲流溢而南注於金文橋之河舟者載以粥焉民且饜水矣然猶慮衆流之合汙也乃浚受水之海以澄其源又鑿别溝以疏其惡旁立神祠置守者逺汚慢也西井者舊有亭宇經燬不存今鼎新如惠遷以至相國南井大方小方水口之所自入莫不表而出之流福居六井之外於府治為近其源自聚景園導湖灌輸後填淤成陸湮廢滋久乃自學士橋别開大港水脈以通他如衆河之支分派别壅者疏之狹者廣之石梁之圯者改造之隄岸之夷者培築之而又推本六井之攸始於是鄴侯之廟隘以拓之大卑而增之崇像設儼如塗雘煥如過者改視工告役偹乃以修浚本末來諗俾為記鉞作而言曰人非水不生活水非井不甘潔在易井之六四曰井甃無咎修井也誠齋楊氏釋之曰大哉井之有功於斯人乎大哉修之有功於斯井乎尹能于剸裁之暇汲汲以修井為務蓋得聖經賢傳之旨矣以余觀之井之為井有二自天一生水而坎之中畫自乾來掘地九仞而得泉此自然之井也六井則異是穴平地以為凹池取諸西湖而注之此使然之井也自然者修治易為力使然者修治難為功是役也其工大其費夥其利於民也博法宜書尹姓潛名説友括蒼人三賢堂記程侍郎珌撰云仰稽乾象俯括坤維觀日月之所交參隂陽之所極凡曰帝王之宅必于天地之中理固宜然勢常異是自三皇之曲阜暨五季之大梁迭遷曽不一數或據冀河之勝或都大華之奇或因瀍澗之濱或取崤函之險天開我宋古汴作京代無定都地大則一蓋地大則物衆人多則事繁是以堯先流化於平陽舜亦躬率於蒲坂以其難治施化特先逮至西京俗益非古土木被錦繡倡優僭后服小盜依大盜白晝顯行於逵路閭閻飾子女絲竹遨遊於侯宫澆風川流靡弊膠底知一尹之莫任析三輔以分司二百年間能尹十數前稱張趙後美三王考其設施率先彈壓不曰發姦摘伏則曰枹鼓不鳴至云宣化於京師則未始或書於往牒商邑翼翼四方所觀彼豈不知力莫能逮炎圖再造駐蹕錢塘眷言吳越之中宿號東南之盛矧今也鸞旗豹尾星拱天臨宫闕崔巍江山吞吐雲橫雉堞侵漢連霄鱗比坊衢飛塵踏霧千族之所聚萬貨之所奔賣繒滌器之流懷才抱略胃脯賣漿之輩並騖分鑣木槻金鈲南闤北闠軸接則香車鏤鳳鞍聫則寶騎遊龍剖決既繁儲須益廣左酬右接昕夕不休比歲以來滋病不治粵惟今尹被命四年令修不煩風行如偃萬户安眠於皎月羣姦側立於層氷微爝不驚寸枹息警靡廢不起靡敝不新至若蘇隄浸就頽圮築橋翼岸十軌並馳加以危亭參差對峙芙蓉楊栁圖畫初開百年流風一朝頓復尹曰未也政而不化河汾懼焉乃益學田乃厚學餼學徒肅雍上儕璧宫既而則又曰今化既施古訓未白于是又移祀三賢用昭矩則嗚呼得非彈壓之外固有甚大者耶厥初孤山有寺廣化寺有竹閣以奉香山莫知何年侑以二賢已而廣化化而為觀遷寺北山閣亦隨焉守周侯淙惡其喧囂乃遷三賢附於水仙水仙坐堂三賢在廡過者悲之睨而不顧令尹曰噫吾責何辭規度逾之得之隄防稍西百步宿號花塢後壠如屏衆木搖天前峰如幕晴嵐漲煙十里湖光一碧澄鮮乃請于朝朝命曰然于是諏日程材平幹授工千杵築隄萬斧治宫栽花蒔竹石梁卧虹昔有旗亭徙之橋北一徑窈然與人世隔如宫水精如屋琉璃乃奉三賢即而祀之嗚呼三賢相望禹稷顏回同道異用不同者時髙風直節廩廩巍巍是舉也簿書期會云乎哉獄訟財賦云乎哉雖然為政不難知所後先天之降才有能不能朝廷以為勞且久也擢之地卿復領京兆非才之難而識之難僝工於壬午之臘竣役於癸未之春都人和豫四方來觀咸曰休哉宣教化於吾人暴風烈於昔賢非能行其所學而不汩於俗吏者能若是耶修茅容之廬葺仲舒之墓孠此意於無窮慰我都人之思者非來者之望而誰耶嗚呼吾知三賢欣欣而相語于于而偕來挹山之青飲湖之緑千億其年統湖山風月之盟無疑也尹袁氏名韶今為户部侍郎兼知臨安府云都人以尹之意而謁記於珌既書其凡矣于是又譜為樂章使都人歌而祝之孺有唐卿歷畯乂海林香山之靖聖徒之清善於僧兮而不黨于僧孺姻于虞卿兮而不纍于虞卿六十少二翩然濯纓雍容人間十九周星異日元稹黜德裕嫉僧孺宗閔交仇罔極視斯人兮孰失而孰得耶皇宋四葉丙子歲成峨嵋之下乃生異人新法之議烈烈如氷惠州之厄熙熙如春泰山名節兮鴻毛祿位藜藿鼎食兮嶺梅朝廷彼美一人兮君復孤山兮結屋冥鴻呌月兮謾羅布地之置天駟超河兮不入金羈之束嗚呼捍湖滌井想長慶之良規西菩雙澗裒熙寧之新題梅影橫斜兮寧須封禪之無辭彼士之有可而無否者骨鯁之風衰知進而不知止者廉恥之道微三賢之風百世之師嗟乎廬千載之敗閣兮今新釣石借百年之隄防兮于今返璧招二鶴以重歸兮去來於孤山之側噫嘻有新我祠之賢尹兮寧和璞之重逢有十三弦之可鼓兮豈不還虞氏之遺風玩吉祥之花觀南屏之魚兮未多羡乎修菊之藂儻來者之能必葺兮期分爾席之西東先賢堂記王中書暨撰云今皇帝嗣位之明年改元寶慶既進賢舉廉以厲在位又褒表先朝儒學之望且訪其後而官使之意嚮所形天下風動九月吉日知臨安府袁公韶言于朝曰聖明御極留神治本微臣承乏輦轂下將何以宣布上指為列州率維昔太史忠定越王鎮會稽嘗集郡之先賢立祠鏡湖上歲久弗治近朝家賜錢增葺所以祓飾厥文而垂後法也錢塘為浙右都會名人巨公前後相望獨未有論次章述者今將考此邦人物倣會稽故事創為祠宇俾國人有所矜式于教道其有補朝廷嘉焉即日報可並南山下少北新隄之上有以園廬求售者公往視之則水環其址平湖滿抱林巒映發夷曠靜深乃易以緡錢為之區畫外堂內室周以廊廡門垣橋徑各當位置涓辰賦工民以恱從遂採托郡志旁搜史籍上下數千載間得全節之士自許箕公而下三十有四人女婦之以孝烈著者五人輯其平生大概製贊刻石列之堂室以代繪像又明年移洞晨舊觀於其側俾掌薰潔之事請易其額曰旌德今丞相魯公為大書而揭之既訖工屬暨為記暨聞一鄉之善士生同時居同里耳聞目接固有與之俱化者矣若居雖同里而生不同時其得于父兄長老之傳如楚國先賢襄陽耆舊二傳所載士大夫或未必盡知而凡民何從知之况六飛移蹕今已百年物繁俗靡出城不跬步湖山之麗甲天下良辰美景婆娑遊衍又安知許嚴髙節之在此都也今也周旋祠下挹志士之流風識正女之往行將有起敬起慕若醉醒而夢覺者是豈不為感發人心之地哉公于先賢去取之際進德行而退文藝先節義而後功名使聞之者有益蹈之者無弊權度森然莫不嘆其精且詳焉竊考國家盛時以三司開封為天下劇任號稱省府必用清流而異時登擢畯異往往由此其選蓋本之儒術以觀其識投之盤錯以觀其能祖宗詳試人才蓋有深意官制行三司職歸户部而行都繁穰視開封則一公被遇先帝授軍器少監擢兼府事歷司農太府遂由地官二卿而陟文昌六載於兹淵源流通而上有餘財條教明清而下無犯令羣情肅穆百廢具舉省府二任處之裕如非平時學問明於體用則酬酢事物焉能從容不迫審所先後若此耶先賢名氏傳贊紀述詳矣兹略不敘獨敘建堂本意于以表明時宅牧得賢之美且著京邑所以承流宣化之實俾郡方來觀者知所取則焉寶慶二年六月旦日記先賢贊袁安撫韶撰裳陶唐許箕公一身蘧廬萬物土苴黃屋垂何有于我洗耳之泉晝夜不舍稽留之山可眇天下淪漢嚴先生甄殷陶周起渭去莘先生奚為畢世隱西都之季氣節不伸以此助理匪潔其身虎吳將軍凌公蜮視曹瞞霆掃鋒蝟翼蔽仲謀脫危尾忠不顧身有霣無二豈曰兵家為古國士者晉文正范先生涵今茹古殫見洽聞津航學海從如雲周粟雖甘其忍去殷文正之諡汗簡流芬敢晉中尉褚公龍躍鳳鳴人物之盛雖有他樂亦不請晚覿清姿瞿然興敬吾善者機心會神領義晉孫先生造物與遊盡性窮理暗室不欺佩仁服禹稷同道飢溺由已天嗇其年如顔之死宋龍驤將軍卜壯侯惟節與誼天下大間杲杲龍驤為人所難死輕鴻毛名重泰山凶徒逆儔胡不厚顔宋范先生世降俗漓貨力為已鄰有急難睨而不視溫溫德人藥疾槥死榆隂孟亭必恭敬止齊禇先生瀑布長虹難比其潔剡山白石莫抗其節蒲璧空還不受羈紲館巖之阿太平日月齊顧先生寒松怪節殘骨腹笥蓼莪廢詩晉裒是似山谷諫編蛛網金匱南風帝琴草堂流水齊杜先生軒冕市朝醯雞舞甕肥遁邱園道義為重子亦謝官菽水歸奉橋梓俱零死生同夢梁大中大夫范公帝師之學惜不逢時諤諤忠諫汲直之遺秩二千石秋毫無私家徒壁立萬古清規梁范先生抱甕生涯山澤臞儒匿瑕之德薰浹里閭跨齊歷梁蕭然隱居孰云好爵不如園蔬梁記室禇公頥採羲文學鄙歆向孝通於天日嚴以敬溢米廢餐苫廬滅性超絶古今冠冕百行唐太常卿禇康公潛龍將翔霧雨先集貂珥蟬聫康濟鴻業鳩杖之歸遺恨黃閣蒼梧白楊始終遇合唐太尉禇公受遺老臣立朝孤忠事有至難遑恤我躬逐魄湘水胎禍漢宫委階之笏光摩蒼空唐禮部尚書禇文公發揮聖真經緯邦國端憂言歸廬在空谷松柏滋榮塵鹿攸伏惟孝惟忠其人如玉唐荆州大都督許公氣吞軋犖屈事髯張鯁賊喉牙為國金湯壯哉義士魂兮故鄉名存忠烈廟食相望唐章先生終唐之世垂三百年于杭大州得三人焉孝通神明維德之全殺青闕文我永其傳藏後梁吳越王武肅錢公匹馬一呼奄有吳會櫝而之百年有待子孫其昌生民永賴錦衣故城山川不改後梁給事中羅公浣西草堂白髮參謀竒骨非媚與俗為仇鼉江百篇擬度驊騮異世一轍汗漫天遊皇朝秦王忠懿錢公真人龍興揮斥六合我有土田圖獻閶闔吳芮分茅忠載令甲煌煌大星流光纍葉皇朝吏部侍郎郎公名遺公車萬乘知己膏馥詩書嶺嶠洙泗遨頭倦遊宴林禊汜醫國刀圭力砭州里皇朝知制誥謝公決河之諫砥柱頽波爰田之均概量取禾象璜衆建子襟肩摩乃言底績其德不瑕皇朝諫院錢公大科異等一翁二季白眉最良德稱其位玉立朝紳霜清諫紙犖犖如公百年冇幾皇朝和靖林先生避影林壑清畏人知爾梅多事漏吾天機長風孤騫秋鶴與飛山髙水深無成無虧皇朝翰林學士洗公伊昔綺遊駭耀閭里而公之歸仁及生死甎花日新隧陌風起哲人其萎命也天只皇朝大中大夫錢公翩翩王孫侃侃儒素國有大疑廷抗三疏平生美官一寒如故何以贈終知者明主皇朝龍圖學士陸公雕戈蕩節雍桂延鄜航琛輦賮威行令孚青苖之議千喙囁嚅筆端膚寸膏澤蠶鳬皇朝龍圖閣學士錢公戒得若仇口唾鈎餌疾惡如風筆驅蛇豕孤雲九華一斥不起名振雞林清哉膚使皇朝祕閣吳公帝學巍巍遊戲㺯翰言當格心奚止筆諫棠棣專經谷風共難施屯豐年識者三歎皇朝龍圖閣學士虞公鴻雁安居鼪鼯懷惠皇皇者華君子豈弟若人侵官事特其細投劾以爭所重國體皇朝八行崔先生尸祝於庠惟褚及許異世並詞以盛德故行歸于周為彠為矩仰止髙山尚其踵武皇朝太師崇國張文忠公關洛正傳表微繼絶道扶中興大義昭揭讒波稽天何傷日月揚光於今益暢忠烈孫氏定夫人烈烈共薑英英陵母惟夫人德二美具有嵗晚養堂金章紫綬受報於天俾昌俾夀虞氏夫人彤史無傳女師罔詔展如之人獨懷清操野服岩居名齊德曜爰表芳微來者是效馮孝女孝之大端于終于始有女能之愧彼男子靡室靡家養生喪死揭名鄉關永錫爾類何氏節婦臨難守節哲士難之惟此烈婦白刃勿移殺身成仁其甘如飴松柏之心匪姑焉知聞盛氏孝婦婦之事姑難於事親乃眷淑德今昔異里闕表懿史册揚芬閨門之化式是國人放生池記王給事隨撰云粵若星辰麗天斗宿分揚州之域江漢為紀浙河控餘杭之地斯郡也民俗繁侈山水竒秀捴軍戎之重乃東南之巨鎮無兵火之沴為吳越之福壤羅域之西有湖曰錢塘或謂上湖亦云西湖寶剎相望繚岸百餘寺煙景可愛澄波三十里實二浙之佳致一方之上遊也天禧三年秋七月相國太原公自巖廟之任膺麾符之寄坐召棠以敷化訟息而刑清奉漢條以頒春境肅而物泰未期月衆心熙熙然如登柱史之臺矣明年秋八月公祗奉詔召入覲象闕澤國留昔襦之頌當寧厚晝接之眷因上言是湖也最為勝境俯瀕佛宫居人鮮食盡取其中國家每以歲時祈乃民福星軺至止精設於蘭場羽服陳儀恭投於龍簡願禁採捕仍以放生池名為請皇帝仁及萬有惠濟羣品法神武之不殺守慈儉以為寶奏牘誠激凝旒喜動濬發中旨普令茂育絲綸適降已改觀于方塘罔罟靡施免有歎于頳尾既原生生之樂永煥巍巍之業隨忝職瑣闥承乏方面獲覩善利思勒於金石愧無好詞聊記于歲月者已德生堂記髙內翰文虎撰云皇帝踐祚之五年乾坤清夷瀛宇寧謐施仁霈澤損賦薄刑所以養民本迓天休德至渥也而又厲精圖政綜賢經能功亮績熙小大咸舉乃眷駐蹕實維錢塘命尹神臯聿嚴厥選權尚書工部侍郎臣師􅋷以材學猷力宣聲一時昨拜大農兼治天府凡厥董竂劭農振兵東吏至於簿書期會金榖缿筒以及郊邱之共宫庭之奉百司庶府之須紀綱規目肅肅具敘兹表治行擢登崇班其在四年十月七日師􅋷嘗奏曰臣仰稽聖代襲唐舊因即杭西湖為放生池者天禧中太子太保判杭州王欽若之請也西湖利害難弛者五放生之舊蓋居其一者元祐中龍圖閣學士知杭州蘇軾之議也紹興明詔遹廣至恩化育所覃罟弋有禁淳熙慶夀申飭淵謨蕃殖既昌福應攸侈方當奉三宫之康福綿萬世之本支所宜日長月滋益介多祉顧今穹碑混於草莽條禁隳於姦豪甚非奉寬大勸首善也謀以誕聖之期同致華封之祝在嚴戒令謹隄防籞囿宫林禁當並飭富強挾貴法所必行庶迪帝心用蕃國本制曰可于是相攸度址近接城闉左介石函右通涵碧作亭五楹前有軒榭揭名德生以侈上賜又作亭三楹俯納湖掃祝網縱鱗所臨也又作亭三楹內儷山趾舊刻新銘所峙也植以華表垂之嘉名奉詢畫者錢塘尉扈武也亭成之日都人聚觀和氣歡聲盤薄無際祝皇之夀與天並崇祝皇之基與地同久推而達之天下蓋自兹始猗與盛哉臣竊惟宋受天命列聖重光一以寬仁守為家法兵不輕用刑不妄施雨露所涵舟車所至滲漉亭育潤澤豐美況於萬物乎然鳥獸魚龞咸若夏歷以興以及鳥獸昆蟲周家以盛有天下者發政施仁未有不本諸此師􅋷誠能推廣旨意形於告猷迄俾流恩與宋無極詩云天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增維時有之臣既書其事復系以銘曰天錫宋命世世以仁宋媚于天武文聖神維天曰生皇矣昊昊我其受之代天牧人刑不濫施兵不妄陳孰尸天府永保乂民皇帝明聖膺圖闡珍曰宋家法仁厚如春惟日圖回是憲是遵慈薰惠洽廣莫淵淪孰尸天府告猷有臣謂昔有池西湖之津羅罭所窺防禁弗申廣上之德封奏諄諄皇帝曰嘻汝其作新用侈福澤夀豫君親師􅋷稽首惟恭惟寅勒石湖趾作亭湖濱露囊金監率時搢紳與厥耆老戾止鱗鱗鳶飛魚躍整翰膏鱗天育海涵贅取蕃臻凡百都人揉姦化醇欽上之惠捐罟棄緡仁民之心愛物是均民物一致天人之因人頌皇帝冠德羣倫奉承三宫八千歲椿子孫繩繩子孫振振題詠西湖白樂天春行詩孤山寺北古亭西水面初平雲腳低幾處蚤鶯爭暖樹誰家新燕啄春泥亂花漸欲迷人眼淺草猶能沒馬蹄最愛湖湖東東行不足緑楊隂裏白沙隄湖上春來似畫圖亂峰圍繞水平鋪松排山面千重翠月照波心一粒珠碧毯線頭抽早麥青羅裙𢃄展新蒲未能拋得杭州去一半勾留是此湖醒湖亭夜歸詩畫日湖亭卧心間事亦稀起因殘酒坐待晚涼歸松雨飄藤帽江風送葛衣栁堤行不厭沙軟絮霏霏紅湖上夜飲郊外迎人月湖邊醒酒風誰留使君飲燭在舟中湖中自照詩重重照影看容鬢不見朱顔見白絲失却少年無覔處泥它湖水欲何為湖上招客送春泛舟詩欲送殘春招酒伴家中誰最有風清兩瓶箬下初求得一曲霓裳始教成排比管弦行翠袖指麾船舫點紅旌漫牽好向湖心去恰似菱花鏡上行翠西湖留别詩征途行色慘風煙祖帳離聲咽管絃黛不須留五馬皇恩只許住三年緑藤隂下鋪歌席紅藕花中泊妓船處處回頭盡堪戀就中難别是湖邊水林和靖詩混元神巧本無形匠出西湖作畫屏春淨於僧眼碧晚山濃以佛頭青欒攎粉堵搖魚影蘭杜煙叢閣鷺翎往往鳴榔與橫笛斜風細雨不堪聼泛舟入靈隱詩水天相映淡浟溶隔水青山無數重白鳥背人秋自逺蒼煙和樹晚來濃桐廬道次七里瀨彭蠡湖間五老峯輟棹遲回歸未得上方精舍動疏鐘魚西湖晚歸詩水痕秋落蟹螯肥間過黃公酒舍歸覺船行沉草岸犬聞人語出柴扉蒼山半𢃄寒雲重丹葉踈分夕照微却憶清溪謝太傅當時未解惜蓑衣西湖獨泛詩水氣并山影蒼茫巳作秋林深喜見寺岸靜惜移舟疏葦先寒折殘虹𢃄夕收吾廬在何處歸興起漁謳上湖自石函泛下湖小墅詩平臯望不及雲樹逺依依及向扁舟泊還尋下瀨歸青山連石埭春水入柴扉多謝提壺鳥留人到落暉却西湖泛雪詩浩蕩迷空濶霏霏積水濆舟移忽自山近未全分凍軫間清泛溫爐挹薄熏悠悠詠招隱何許嘆離羣天湖上𥘉春偶作梅花開盡臘亦盡晴暖便如寒食春色半歸湖岸寺人家多上郭門船文禽相並映短草翠瀲欲生浮嫩煙幾處酒旗山影下細風時巳㺯繁絃湖樓寫望湖水混空碧憑欄凝睇勞夕寒山翠重秋靜鳥行髙逺意極千里浮生輕一毫叢林數未遍杳藹隔漁舠和謝祕枝西湖馬上表裏湖山極目春據鞍時此避埃塵蒼蒼煙樹悠悠水除却王維少畫人湖上晚歸卧枕船舷歸思清望中渾恐是蓬瀛橋橫水木巳秋色寺倚雲峰更晚晴翠羽濕飛如見避紅渠香嫋似相迎依稀漸近誅茅地雞犬林蘿隱隱聲煙西湖春日爭得才如杜牧之試來湖上輒題詩春寺院𫾣茶鼓夕照樓臺卓酒旗濃吐雜芳熏巘崿濕飛雙翠破漣漪人間幸有簔兼笠且上漁舟作釣師酬晝師西湖春望笛聲風暖野梅香湖上憑欄日漸長一樣樓臺圍佛寺十分煙雨簇漁鄉鷗橫殘葑多成陳栁映危磯未著行終約吾師指芳草靜吟間步岸華陽范文正公憶西湖詩長憶西湖勝鑑湖春波千頃碧如鋪吾皇不讓明皇美可賜疏狂賀老無西東坡和蔡凖郎中邀遊西湖詩夏潦漲湖深更幽風落木芙蓉秋飛霜暗天雲拂地新蒲出水栁映洲湖上四時看不足惟有人生飄若浮解顔一笑豈易得主人有酒君應留君不見錢塘遊宦客朝推囚暮決獄不因人喚何時休城市不識江湖幽如與蟪蛄語春秋試令江湖處城市却似麋鹿遊汀洲髙人無心無不可得坎且止乘流浮公卿故舊留不得遇所得意終年留君不見拋官彭澤令琴無弦巾有酒醉欲眠時遣客休田間決水鳴幽幽插秧未遍麥巳秋相携燒筍苦竹寺却下踏藕荷花洲船頭斫鮮細縷縷船尾炊玉香浮浮臨風飽食得甘寢肯使細故胸中留君不見壯士憔悴時飢謀食渴謀飲功名有時無罷休夜泛西湖五絶新月生魄迹未安才破五六漸盤桓今夜吐艷如半璧遊人得向三更看三更向闌月漸垂欲落未落景特竒明朝人事誰料得看到蒼龍西沒時蒼龍已沒牛斗橫東方芒角升長庚漁人收筒及未曉船過惟有菰蒲聲菰蒲無邉水茫茫荷花夜開風露香漸見燈明出逺寺更待月黑看湖光湖光非鬼亦非仙風恬浪靜光滿川須臾兩兩入寺去就視不見空茫然春湖上夜歸我飲不盡器半酣味尤長籃輿湖上歸風吹面涼行到孤山西夜色已蒼蒼清吟雜夢寐得句旋已忘尚記梨花村依依聞暗香入城定何時賔客半在亡睡眼忽驚矍繁燈閙河塘市人拍手笑狀如失林麞始悟山野姿異趣難自強人生安為樂吾䇿殊未良醉飲湖上初晴後雨朝曦迎客艷重岡晚雨留人入鄉此意自佳君不會一杯當屬水仙王水光瀲灔晴方好山色空濛雨亦竒欲把西湖比西子淡粧濃抹總相宜遊西湖次曹子方韻詞源灔灔波頭展清唱一聲巖谷滿未容雪積句先髙豈獨湖開心自逺雲山已作歌眉淺山下碧流清似眼樽前侑酒只新詩何異書魚餐蠧簡葦遊西湖雪中次仲殊韻二首夜半幽夢覺稍聞竹聲起續凍折絃為鼓一再行曲終天自明玉樓已峥嶸有懷二三子落筆先飛霙共為竹林會身與孤鴻輕秀語出寒餓身窮詩乃亨禪老復何為笑指孤煙生我獨念粲者誰與豫目成寶雲樓閣閙千門林靜初無一鳥喧閉戶莫教風掃地捲簾疑有月臨軒水光瀲灔猶浮碧山色空濛已斂昏乞得湯休竒絶句始知鹽絮是陳言去杭州十五年復遊西湖我識南屏金鯽魚重來撫檻散齋餘還從舊社得心印似省前生覔手書葑合平湖久蕪漫人經豐嵗尚凋踈誰憐寂寞髙常侍老去狂歌憶孟諸次韻劉景文周次元寒食同遊西湖絮飛春減不成年老境同乘下瀨船藍尾忽驚新火後遨頭要及浣花前山西老將詩無敵洛下書生語更妍共向北山尋二士畫橈鼉鼓䀨清眠雲遊西湖王忠玉張全翁同訪北山清順道潛登垂亭飲泉即赴陳使君夜飲次王忠玉韻北山非自髙千仭付我足西湖亦何有萬象生我目雲深人在塢風靜響應谷與君皆無心信步行看竹竹間逢詩鳴眼色奪湖渌百篇成俯仰二老相追逐故應千頃池養此一雙鵠山髙路已斷亭小膝屢促夜尋三尺井渴飲半甌玉明朝閙絲管寒食雜歌哭使君坐無聊狂客來不速載酒有鴟夷叩門非啄木浮蛆灔金碗翠羽出華屋須臾便陳迹覺夢那可續及君未度江過我勤秉燭一笑換人爵百年終鬼録用沈諫議約遊湖明日得雙蓮於北山沈和小詩因其韻湖上棠隂手自栽問公更得幾回來水仙亦恐公歸去故遣雙蓮一夜開詔書行捧縷金箋樂府應歌相府蓮莫忘今年花發處西湖西畔北山前鱗湖上同述古飲喜逢門外白衣人欲膾湖中赤玉遊舫已裝吳榜穩舞衫初試越羅新欲將魚釣追黃帽未要靴刀抹絳巾芳意十分強半在為君先踏水邊春早到湖上二令先在城頭月落尚啼烏烏榜紅舷早滿湖鼓吹未容迎五馬水雲先已揚雙鳬映山黃帽離頭舫夾道青煙鵲尾爐老病逢春只思睡獨求僧榻寄須臾次韻劉景文西湖席上二老長身屹兩峰常撞大吕應黃鐘將辭鄴下劉公幹却見雲間陸士龍白髮憐君略相似青山許我定相從吾今官已六百石慚愧當年邴曼容對與莫同年雨中飲湖上到處相逢似偶然夢中相各華顛還來一醉西湖雨不見跳珠十五年隨懷西湖寄朝美叔西湖天下景遊者無愚賢深淺所得誰能識其全嗟我本狂直早為世所捐獨專山水樂付與寧非天三百六十寺幽尋遂窮年所至得其妙心知口難傳至今清夜夢耳目餘芳鮮君持使者節風采爍雲煙清流與碧巘安肯為君妍胡不屏騎從暫借僧榻眠讀我壁間詩清涼洗煩煎䇿杖無道路直造意所便應逢古漁父葦間自夤緣問道若有得買魚弗論錢陳密學襄和蘇子瞻通判在告見寄郊原芳意動遊人湖上晴波見躍鱗間逐牙旗千騎逺暗驚梅蕚萬枝新尋僧每拂題詩壁邀客仍將濾酒巾寄語文園何所苦且來相伴一行春和子瞻沿牒京口憶西湖寒食出遊見寄乞得吳山養病身花時曽共憶行春嚶鳴幽鳥還遷木觱沸清泉復采芹皂蓋尋芳丘有李綵樓觀戲巷無人錦袍公子歸何晚獨念溝中菜色民違半嶺春隂漠漠燕飛飛可惜春光與子煙霞紅斾入滿湖風月畫船歸緱笙一闋人何在遼鶴重來事已非猶憶去年題别處鳥啼花落客沾衣間參寥子秋日西湖六首兩山斜抱翠逶迤一水中似渼陂孤榜獨來還獨往鸕鷀鸂鶒莫相疑琤然一葉墮空庭似喚幽人夢欲醒斜倚東屏褰翠幔沉香煙吐博山青南山爽氣對朝扉竹露吹風更濕衣可是吟魂怯清景何妨著屐步苔磯掩飛來雙鷺落寒汀秋水無痕玉鏡清迹蓼黃蘆宜映沙邊危立太分明雲欲跨髙樓曠逺情無端秋雨苦冥冥峥嶸日腳漏處瞥見遙山一抹青西湖夜半捲廷槐卧聼鄰翁曉圃開稚子相呼入林去應知病葉落莓苔同蘇文饒主簿西湖夜泛鳯咮山頭暮靄空月娥飛出廣寒宫初登桂楫橫湖去似覺銀河有路通掠草飛螢星點點眠沙宿鷺玉叢叢從來江捴文才妙請付毫端刻畫中月曽南豐西湖二首左苻千里走東方喜有西湖六涼塞上馬蹄終反覆泰山鴟飽正飛揚懶宜魚鳥心常靜老覺詩書味更長行到平橋初見日滿川風露紫荷香湖面平隨葦岸長碧天垂影入清光一川風露荷花曉六月蓬瀛燕坐涼滄海桴浮成曠蕩明河槎上更微茫何須辛苦求人外自有山鄉及水鄉無趙循道秋日泛西湖湖光山色共爭秋一點塵埃覔處沉沉水底見青天畫舸直疑天上去照泛湖晚歸日腳掩西山四面煙光起片月落湖心破琉璃髓水面天光濶孤煙暝不收休瞻一鈎月挂起旅人愁笙劉景文西湖泛舟呈東坡西湖春意勝當年公領簫泛畫船錦繡一林生水面衣冠萬堵立山前仁恩在物禽魚遂喜氣隨人草木妍半醉插花風調别寫真須是李龍眠目僧慧洪遊西湖西湖招提三百六佳處如春有眉一番雨過吞青空萬頃無波鴨頭緑望湖樓閣獨自登煙霏向背攢寒玉想見襄陽孟浩然此中有句不容續道人常坐西山阿骨清氣明韻出俗久居京闕厭塵土一夕歸心俊如鵠明窗為君研破硯落筆轉頭風雨速龍山深處如定居就彼結鄰容我卜趙忠簡公鼎和鄭有巧遊西湖二首放舟越淮楚更作三吳遊尚餘魂夢怖敢動鄉邦愁湖山自清絶鑑中螺髻浮况復得夫子一笑忘幽憂時時作清言中有湖山秋却念無家客坎止而乘流何當與俱歸嵗晚鄰一丘春晚覺身名誤悠悠定孰親却回苕水棹來看武陵避地將安往尋山莫厭頻百錢挑竹杖雲外踏嶙峋岸臨卬髙孝璹公純留題西湖朱簾白舫亂湖光隔龍舟艤夕陽今日歡遊復明日便將京洛看錢塘溟𪷟乳鴨髙菊澗西湖暮歸風荷百頃占漣漪煙樹飛買斷小舟休喚客暗穿萍葉載詩歸城西湖雜興二首城中無處聼蟬鳴短䇿輕鞋晚出行到栁隂松影下恰才聞得兩三聲十三樓市朝餐飯六一泉亭晚詠歌坐斷竹風無暑氣乳禽鳴處緑隂多憶西湖西湖春二月結客少年遊駿馬黃金勒長身紫綺裘愛花論擔買嗜酒滿船浮兩載緣何事台州又越州曽蘭墅西湖夜景間窗放入四山青古篆無煙氣自清風不鳴條花著露一湖春月萬蛙聲薑白石湖上寓居湖上風恬月淡時卧看雲影入玻璃輕舟忽向窗邊過搖動青蘆一兩枝處處虛堂望眼寬荷花荷葉過闌干遊人去後無歌鼓白水青山生晚寒飛劉龍洲西湖西湖湖上山如畫二十年前曽客來絮滿城歸未得江南老却賀方回長魏鶴山領客泛西湖客賦詩次韻鳴鞘踏月大隄鼓枻穿雲落日黃十里青漪菱草蕩四山紅雨杏花岡客從民氣占春事人在枝頭看艷陽長使舟平風色好世間何處有羊腸楊誠齋西湖雨中泛舟坐上二十人用遲日江山麗四句分韻賦詩余得融字云正月一度遊玉壺二月一度遊真珠是時新霽曉光初西湖獻狀無遺餘君王湖豫告作寒食來看孤山海棠色海棠落盡孤山空山糢糊眼中黑夜來三更湖月明羣仙下墮嬉殊庭東坡和靖相先後李成郭熙在左右惠崇捧硯大如箕大年筆落疾于飛磨墨為雲灑為雨湖波掀舞山傾欹畫作西湖煙雨障今晨挂在孤山上同來諸彥文章公不數錢起兼吳融何如玉船一舉百分滿一笑千峰煙雨散遊西湖蘇公隄逺栁生煙和靖園深竹映關船入芰荷香處去人從雲水國中還似寒如暖清和在欲雨翻晴頃刻間能為蓬萊老仙伯一杯痛快吸湖山水泛舟賞荷鳯城魚鑰晚開銀國子先生領搢紳山光中金鑿落芙蕖香裏葛頭巾小步深登野寺幽古松將影入茶甌鈴聲忽起九天半有塔危峰最上頭岸岸園亭傍水濵裴園飛入水心橫旁人莫問遊何許只揀荷花閙處行餅船開便與世塵踈飄若乘風度太虛坐上偶然遺餌波問無數出龜魚楊西湖舊屬野人家今屬天家不屬他水月亭前且栁集芳園下儘荷花小泛西湖六月船船中人即水中仙外鋪雲錦千弓地中度琉璃百摺天城中擔上買蓮房未抵西湖泛野航旋折荷花剝蓮子露為風味月為香流走送厨珍佐勝遊青李來禽沈故人京尹剩風氷雪黃金白玉斫蝤蛑不人間暑氣正如炊上了湖船便不知湖上四時無好就中最説藕花時遊盡西湖賞盡蓮玉壺落日泊樓船莫嫌當處荷花少剩展湖光幾鏡天范石湖次韻會客湖上西湖氷泮緑生鱗料峭春風欲中人花片不禁寒食雨鬢絲猶帶湧金春江山契濶詩情在京洛追隨客夢新喚取歌聲解愁思為君吹水引杯頻稱次韻韓無咎右司上已泛湖休沐良辰不待晴徑間客此間行春杉欺雨任教冷病眼得山元自明抹黛濃嵐圍坐晚揉藍新緑沒篙清栖鴉未到催歸去想被東風笑薄情金華王竹寮執禮湖山紀遊吳山東南秀蔥鬱盤帝城西湖據其趾御氣通波心餘膏被草木蔚眼皆欣榮今晨天宇穆惠風泛初晴春色正妍妙放懷共揚舲中流入汗漫曠濶無埃氛湖光挾山緑倒射玻璃青絲管響空翠樓觀森峥嶸獻酬雜歌嘯爛熳紛醉醒取樂固莫並興懷一何深緬維昔三賢精爽日以沉但餘畫像在尚想嗚佩襟希古秉微尚崇雅攄恬情羌豫翳蓬藋無復企組纓淡泊自有得榮華非所欣舍舟縱散䇿逸興生崚嶒白雲引遐眺碧岫延深登幽期浩無涯忽到靜者門長松有令姿流水無俗聲絶磴猿可呼出谷鶯始鳴乃知物外境兹象本不驚逝耶初無將至耶亦無迎便將謝塵鞅兹焉支頽齡山鴉接晚翅落日催行幐歸與賦新篇聊復記吾曽波以下長短句蘇東坡南歌子二首山與歌眉斂同醉眼流遊人都上十三樓不羡竹西歌吹古揚州菰黍連昌歜瓊彛倒玉舟誰家水調唱歌頭聲繞碧山飛去曉雲留他古岸開青葑新渠走碧流會看光滿萬家樓記取年扶路入西州佳節連梅雨餘生寄葉舟只將菱角與雞頭更有月明千頃一時留鑑好事近湖上雨晴時秋水半篙初沒朱檻俯窺寒照衰顔華髮醉中欲墮白綸巾溪風漾流月獨棹小舟歸去任煙波飄兀趙忠定公栁梢青水月光中煙霞影裡湧出樓臺空外笙簫雲間笑語人在蓬萊天香暗逐風回正十里荷花盛開買個小舟山南遊遍山北歸來蒼辛稼軒酹江月和韻晚風吹雨戰新荷聲亂明珠璧誰把香奩收寶鏡雲錦周遭紅碧飛鳥翻空遊魚吹浪慣聼笙歌席坐中豪氣看君一飲千石遙想處士風流鶴隨人去已作飛仙客茅舍竹籬今在否松竹已非疇昔欲説當年望湖樓下水與雲寬窄醉中休問斷腸桃葉消息劉龍洲賀新郎睡覺啼鶯曉醉西湖兩峯日日買花簮帽去盡酒徒無人問惟有玉山自倒任拍手兒童爭笑一騎乘風翩然去避魚龍不見波聲悄歌韻逺喚蘇小神仙路近蓬萊島紫雲深參差禁樹有煙花繞人世紅塵西障日百計不如歸好付樂事與他年少費盡栁金梨雪句問沉香亭北何時召心未愜鬢先老沁園春斗酒彘肩風雨渡江豈不快哉被香山居士約林和靖與坡仙老勒駕吾回坡謂西湖正如西子濃抹淡粧臨照臺二公者但掉頭不顧只管傳杯白云天竺去來看金壁崔巍樓觀開况縱橫二澗東西水繞兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先探梅須晴去訪稼軒未晚且此徘徊馬右洲莊文阮郎歸清明寒食不多時香紅漸漸稀畨騰粧束閙蘇隄留春春怎知花褪雨絮沾泥凌波寸不移三三兩兩呌船兒人歸春也歸泣髙竹屋蘇隄芙蓉菩薩蠻紅雲半壓秋波急艷粧露嬌啼色佳夢入仙城風流石曼卿宫袍呼醉醒休捲西風錦明日粉香殘六橋煙水寒劉隨如鎮西湖餞别江神子遊春曽到百花洲夕陽收暮雲留想伴花神騎鶴上揚州回首湖山情味淡重把酒更登樓相思南浦古津頭未拏舟已驚鷗栁外歸鴉點點是離愁空倚陽關三疊吹曲歌不盡水東流盧蒲江烏夜啼漾暖紋波颭颭晴絲雨濛濛輕衫短帽西湖路花氣撲春驄鬪草褰衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風醉洪叔璵菩薩蠻吳姬壓酒浮紅蟻少年未飲心先駐馬緑楊隂酒樓三月春相看成一笑遺恨知多少回首欲魂銷長橋連斷橋芙沈元用小重山湖上秋來蓮蕩空年華都付與木蓉採菱舟子兩相逢雙眉黶一笑與誰濃斜日落冥濛鴛鴦飛起處水無蹤望湖樓上兩三峯人不見林外數聲鐘孤山路俞灝湖隄晚行暝色俄從草色生管絃羅綺盡歸城不應間却孤山路我自扶藜月下行豐樂樓林曄德撰賦以樓成湖上與衆同樂為韻十果里掌平豐樂樓兮波頭截橫誠一時之佳致不日以能成朝野無塵當與時而同樂湖山如畫多對景以舒情錢塘故地之豪奢臨安新府之雄壯三千巷陌兮叢花桞以競妬十萬人家兮列綺羅而夸尚笙歌極天下之選風物駭人間之望流傳今古只誇兩浙之間多少繁華盡簇西湖之上踞虎盤龍橫霓架虹平地聳蓬萊之島飛仙移紫府之宮縈緑楊於南北迷芳草於西東幸太平之日久宜行樂以民同碧天連水水連天魚在琉璃影裏畫閣映山山映閣雁橫錦障圖中珠簾半捲兮映上下之欄干酒旗無力兮亞髙低之樓閣落霞楚天之空濶細雨楊園之淡泊謝屐登臨陶巾落魄休誇隨鹿之遊更任狎鷗之樂玉女巖金沙井依依鄴水之鳬煙霞洞瑪瑙坡隱隱揚州之鶴蘋末風收浪花捲毬梅塢竹閣松亭栁州池涌金於門外泉跳珠於湖頭碧落雲垂兮月照月平沙影倒兮樓疊樓風光相對似逢春而更好湖波長在不與嵗以俱流翻思煙鎖洞庭輸漁樵之間話月沉湘浦付羈旅以凝愁于是陪五陵年少之歡簇三島神仙之衆望樵嶺以富覽指蘭舟而目送葛仙舊陂兮絲池邊之草吳王故苑兮付樽前之夢雕梁巢舊日之燕畫棟彩當年之鳯佳人携手望窮虎跑之泉故老傳杯遙認龍泓之洞山水如故星霜屢逾春風易老於長陌夕陽幾度於平湖勝賞難遇佳期莫辜脆管繁絃奏樂府新聲之曲輕衫短帽醉髙陽舊酒之徒其或鶯花懶兮蓼岸蘋洲露荷隂兮蘭汀蕙渚秋風桂子之興味臘雪梅花之情緒傷髙懷逺兮幾時窮併朱顔而留與望湖樓潘閬詩望湖樓上立竟日懶思還聼水分池界看雲過别山孤舟依岸靜獨鳥向人間回首重門閉蛙聲夕照間到東坡宿望湖樓詩新月如佳人出海初弄色娟娟湖上瀲瀲搖空碧夜涼人未寢山靜聞響屐騷人故多感悲秋更憀栗君胡不相就朱墨紛黝赤我行得所嗜十日忘家宅但恨無友生詩病莫訶詰君來試吟味定作鶴頭側改罷心愈疑滿紙蛟龍黑望湖樓醉書五絶黑雲翻墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖樓下水如天俯放生魚鱉逐人來無主荷花到處開水枕能令山仰風船解與月徘徊靈烏菱白芡不論錢亂繫青菰裏緑盤忽憶嘗新會觀滯留江海得加餐獻花遊女木蘭橈細雨斜風濕翠翹無限芳洲生杜若吳兒不識楚詞招未成小隱聊中隱可得長間勝暫間我本無家更安往故鄉無此好湖山金病起登望湖樓臨江仙詞多病休文都瘦損不堪帶垂腰望湖樓下暗香飄和風春弄袖明月夜聞簫酒醒夢回清漏永隱牀無限更潮佳人不見董嬌嬈徘徊花上月空度可憐宵歸王􅍮公望湖樓回馬上水光山氣碧浮浮落日將又少留從此祗應長入夢夢中還與故人遊湖堂薛昻題云一假風煙不可關出門滿目是湖湖山昔人華厦今何在此日漁舟任自間風觀漸新霄漢上近作涌金樓甚偉龍洲依舊水雲間栁洲祠五龍此兩處與湖堂鼎足相照歸來丘壑多幽趣願與諸賢約往還江湖偉觀車玉峯題十年不向此憑欄景象依然一望間龍蜃吐雲天入水樓臺倒影日銜山僧於僻寺難為隱人在扁舟不是間孤鶴似尋和靖宅盤空飛下復飛還朱繼芳題吳山表裏水為池百有餘年壯帝畿天目逺將雙鳯落海門近拱六龍飛胥濤白雪生秋思大乙紅雲駐夕暉江上沙鷗湖上舫栁邉風裏兩依依范希文題西湖何處可消愁快上人間百尺樓千里山川浮王氣百年形勢壯皇州逋仙宅近梅應古坡老祠空竹自秋立遍闌干無限意六橋歌舞懶回頭州范希禹題望斷菰蒲煙水鄉憑髙不盡意蒼茫神北去山川逺王氣南來天地長晴見白雲歸竺國夜看紅日上扶桑遊人自擁笙歌醉誰為梅花酹一觴咸淳臨安志卷三十三
