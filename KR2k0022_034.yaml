body:
  text: 咸淳臨安志卷三十四宋潛説友撰山川十三湖下在錢塘門外其源出於上湖即西湖一自玉壺水口流出九曲沿城一帶至餘杭門外一自水磨頭石函橋東入䇿選鋒教場楊府雲洞北郭稅務側合為一流如環帶然有二斗門瀦泄之因淳祐七年上湖水涸城內諸井多竭趙安撫與􅊸命工自錢塘尉廨之北望湖亭下鑿渠引天目山之水自餘杭河經蔡家渡河口達於溜水橋斗門凡作數壩用車運水仰注上湖城內水口由是流通人賴其利石湖在錢塘縣定山南鄉明聖湖劉道真錢塘記云湖在縣南二百步父老相傳湖中嘗有金牛見遂以明聖為名酈道元水經注此湖在縣南江側又仁和縣東十八里亦有明聖湖御息湖祥符志云在仁和縣東北一十八里周回三里故老相傳秦始皇東遊暫憩於此因名臨平湖輿地廣記云在仁和縣祥符志云在縣東長樂鄉周圍十里湖中有白龍潭吳志赤烏二年寶鼎見因呼為鼎湖晉武帝咸寧中彗星孛於角占者云臨平湖自漢末壅塞至是復開父老相傳此湖塞天下亂此湖開天下平又吳郡言臨平湖邊得一石函中有小石青白色長四寸廣二寸刻其上作皇帝字孫皓於是改元為天璽晉安帝元興二年臨平湖水赤或以為祥瑞詳具臨平山題詠權德輿臨平湖夜泛詩素彩皓通津孤舟入清曠已愛隔簾看還宜捲簾望隔簾當此時惆悵思君君不知堤張祐臨平湖詩三月平湖草欲齊緑楊分映入長田家起處烏龍吠酒客醒時謝豹啼三楹正當蓮葉渚水塍新擘稻秧畦人間謾説多岐路咫尺神仙洞却迷泛洋湖在仁和縣之北天宗門外像光湖在仁和縣之長樂鄉唐神龍元年湖有五色光明掘地得彌勒石像乃建寺以像光為額且名其湖石橋湖在仁和縣之臨平鎮西永和鄉丁山湖在仁和縣之永和鄉石鼓湖在仁和桐扣山下晉時石鼓出於岸故名餘杭南上湖在溪南五里塘髙一丈四尺上下各廣二丈五尺周回三十二里二十八步與下湖相接南下湖在溪南舊縣西二里六十五步塘髙一丈四尺上廣一丈五尺下廣二丈五尺周回三十四里一百八十一步舊志云按輿地志後漢熹平二年縣令陳渾修隄防開湖灌溉縣境公私田一千餘頃所利七千餘尸嵗久塘圮唐寶厯中縣令歸珧重修百姓祠之立石為記舊有歸府君廟是也唐地里志亦云餘杭南五里有上湖西二里有下湖歸珧宰餘杭築甬道西北大路髙廣徑直百餘里行旅無山水之患自國朝以來縣令主簿並以管幹塘岸入銜任滿無損者有賞故隨時修築云熙寧中因水衝激其岸漸低至紹興中縣令李元弼率民築增三尺州又差捍江兵士及濠寨官助之塘漏則以稿為箔捍護得免者屢矣南湖之塞最為本邑利害父老傳云初慶厯以前嵗調夫開湖其後不復修治遂致堙塞又南湖東南嶽廟之側有石櫺橋五畝塍二處皆陳王遺迹父老云昔湖深水低則引兩湖之水由此入安樂鄉其塍上下各濶丈餘後湖堙塞欽德招德兩鄉之民侵湖成田梅月連雨必苦大浸欲其快於流泄於是塍與橋毁弗修及宣和中知縣江帙躬訪利害紹復前績民賴其賜縣丞成無玷嘗作水利記以紀其功又作五畝塍銘刻之鳯凰山石上紹興甲寅幾漕黃黼重修慶元丙辰正月訖事徐安國為之記記銘水利記曰苕水發源天目經兩都六邑以入具區六邑者二當天目之麓山隘地髙水經三邑處其下流水勢奔放不可為力餘杭界其間襟帶山川地勢平徹當苕水之衝流洪嵗常一再至久雨或數至倐忽瀰漫髙處二丈許然不三日輒平其為患雖亟除而難測以禦也故隄防之設比他為重使是邑也無隄防則野不可耕邑不可居橫流大肆為旁郡害故餘杭之人視水如寇盜隄防如城郭旁郡視餘杭為捍蔽如精兵所聚控扼之地也東漢熹平中陳公為是邑始築兩湖以為水利並溪者曰南下湖環三十四里並山者曰南上湖環三十二里洪流從髙赴卑其勢悍甚得所謂石門函者則折而滙於湖既就寬平其暴必殺溪流紆餘徐引而東湖之水泄於南渠河河流而東接東溪五福渠之水以入於吳興其派别而北者為黃母港十二里與苕溪會於其會處節以石埭曰西函溪流方漲則閉以固東鄉之田俟其稍落則啓函以走渠港之潦下田亟乾水不儲浸若旱暵亦即啓函以灌溉膏腴千頃餘無水旱號為沃壤衣食萬室出賦輸無慮萬斛而計其為旁利又倍蓰也其為塘岸規模甚工得周官善防之意歷年久逺溪湖皆髙隄堰俱圮水或逆行漂沒廬舍西函既自疏罅守者貪略竊啓以渡舟水因大至官趣救目前遽塞之以弭患自函之塞十嵗九潦民日益困土脈沮洳殆成棄地今大夫江公以今宣和四年夏來臨此民屬兵火之餘視民瘠甚為之惻然思所以振之者遍諏耆舊得溪湖利病甚詳民以厭患於隄防來告大夫曰民固困吾不忍若厲然用若請也是將永逸之報幸朝廷寬恩無他賦役備豫於暇日不亦善乎乃以是年冬度工賦事民歡趨之始於西函次五畝塍次緣湖之岸當溪之衝者曰紫陽灘尹家塘次護郊之堤曰中隔塘次緣溪之岸當西函之左右者西踰明星瀆東接廟灣之塘次上湖可泄者渠河受水處曰石櫺橋次緣溪之岸當石門函之左曰間林塘南岸皆全矣凡北岸之塘與南對修由西門之外曰五里塘西山之橫隴當溪之衝者曰龜塘及東鄉之外盡十四壩之防一皆圖治於是決渠之岸無偏強之患其下流逺郡與錢塘接境之田犬牙綺錯而塘在吾邑者曰廟灣曰許家壩曰菱蕩曰塘口曰蜃潭曰化灣與其西岸石瀨曹橋之間十餘壩之岸亦皆增葺凡隄防之設西函巨為最大夫躬勸相撫循之以訖役雪霜風雨往來暴露車殆馬煩徒御疲劇而大夫踐履泥途臨視指顧蚤莫不懈忘疲與痯民知其為我勞也亦忘其勞嘗大雪與民約日霽而來民莫肯去凡函之制因其利而頗加以巧思安以養勇不動之心期以悠久不息之誠應於人而驗於物工師殫其技役夫敏其力堅厚精密巖巖山峙經始十二月甲寅落成於明年三月己巳其髙七仞其厚一百三十丈兩涯橫敞其中啓閉處小陋從狹度敞去相尋有半加膚寸焉故石之工九百七十役庸萬有六千三百用緡錢四十三萬皆函下之民計畝樂輸足用無贏不愆於素函成逺邇縱觀愕眙歎服諸儒為文若詩以紀頌之自餘隄防由東塘而上分委邑佐董之各因其地之民故役不告勞而工並集由廟灣而下則因其塘長而語之靡不聼令併力以趨泊成如期其南岸利害雖皆與西函為表裏而西函最為會要夫南湖之利自漢迄今邑人思詠陳公時節奉祠之不少衰然沙土與漲水俱至水去而淤比嵗益甚父老指湖中若覆簣者言兒時見此隱然隆阜也今欲就平矣蓋適會其極時非併下流郡邑之力不可浚治此未易議也湖日塞則隄不得不增若五畝塍者也時蓋為巨防今不盡復水無可趨齧中隔塘且為城邑病故今五畝塍之制其髙下僅可隱人其長止四百九十五尺其北田岸漸髙屬於山足者凡五百尺下于塍尺許皆空不築湖水過五尺則般塍北空處以流過六尺則般塍以流水之留塍下止五尺溪流平則五尺之水復自石門函還納於溪西湖水般塍者勢緩不為東郡及南渠河病後民因湖塞稍耕其地利水之速去也故隄防有盜決者維時湖與溪皆有塘長官免差科俾專繕治既而役之如皂𨽻然又常以假人民厭苦之罷去既久禁戒寢弛隳者弗增闕者弗茨蟻蛀鼠穿獺龜之穴漫而不訾者水至則潰今稍復增置塘長而蠲其役又於五畝塍舉條令為約束以絶盜決之弊民之蒙惠無窮也嗚呼是舉也修積年之廢墜惟逺慮明斷主之以惻怛濟之以勤敏卒能變棄地為膏壤易蓁蕪為多稼化飢饉為豐年銷驚畏而甘寢斯民安靜樂業耕則有獲養老慈幼仁及閭里風氣清夷疾癘不作德大夫之施固昭矣然功之所被及於旁郡而旁郡之人不知德蓋利愈博則名愈晦我道然也俗吏茍偷嵗月莫肯以民事經意語民事則目為迂濶聞公之風采能不少愧乎欲知時之治否當視循吏之用否孝宣光武號為中興故良二千石多在甘露間而建武詔書重賞卓茂擢為太傅今考公之行事可以知夫宣和之治矣甘露建武誠不足多也然則尊榮顯寵其可辭乎無玷承公命直書其事俾後有考故於功利及物者特書之并政有過人之善者頌之陳公名禪祠有王號不知封爵所始云宣和五年四月朔記石遭兵火不存今流傳民間按東漢陳禪本傳不為餘杭令唐地理志寶厯中令歸珧因漢令陳渾故迹置則塘之利始於陳渾明矣今以渾為禪當是傳寫之誤也熙寧中縣令扈大亮作廟記亦不載其名五畝塍銘曰湯湯苕水發於天目兩湖灌濡嵗堙為陸漲流時至雲日蕩沃旁合百源滙於山足勢溢以傾怒濤奔蹙髙卑之際嵗維板築拓基五畝隨潤北屬水溢乃流如概諸斛蓄泄得宜髙下成熟自塍之壞嵗無半菽茂宰因民無廢不復慮始云艱勸趨則速既堅既厚旁郡蒙福咨爾後人嘉績思續南湖之陽鳯凰之麓石林峥嶸驚湍回曲勒此銘詞尚賦陵谷重修塘記曰紹熙五年秋八月霖潦不止洪發天目諸山倐忽水髙二尺許衝決塘岸百餘所漂沒室屋千五百餘家流户散入旁邑多稼化為腐草逄新天子嗣位視民如傷遣使旁午適侍御黃公黼弭節畿漕奉承德意掩骸賑飢悼湖塘之廢重為三州六邑之害鋭意興復力請於上取棄地於馬監發陳粟於豐儲出錢幣於漕庫關器用於殿司揆時庀徒悉募飢民羸者以畚壯者以築日役數千人所活甚衆填築敗岸幫廣舊隄植木以捍基編竹以簣土增髙既隆於舊橫敞復堅於前環視上下兩湖數千里間如連岡之隱起堅壁之橫亘邑既籍定民可耕殖復以溪塘環繞一邑補治如初獨開林塘附湖當溪水之衝隨築隨隳乃去其激水之平陸以實敗岸之罅隙沿舊隄㨍築其址益厚綿五十餘丈工以夫計二十萬四千二百二十有四錢以緡計二萬八千二百九十有二米以碩計六千六百一十有六經始以是年十月九日至於慶元二年正月二十四日迄事邑令周章董工役簿吕大勳主錢榖丞鄭昌時徐夀卿尉胡甫之佐其事漕屬李耆明葉時兼護之始終盡瘁焉南湖中港沙溪港石門港金湖港鱔魚港西山港湖田港吉都港到進港鮎魚港方家港沿塘港泥孔港曹家港李家港聞家港岱子坑下清坑鐵步坑新港老婆闕港父老云或遇淫雨湖水泛濫遂由五畝塍側流入安樂不可盡塞欲盡免水患唯在開湖而已據水利碑云非併下流郡縣之力不可浚治功力既廣前後為政者不敢遽議議亦不可行湖內舊有望牛堆數處又有湖港湖堰之類今隱然而存者堆一二而已曰港曰坑曰堰皆堙沒不可盡辨焉淳熙二年上司要見本縣南湖變遏利害縣中申明以馬監障固收草其後上司令欽德鄉招德鄉開撩為港以泄南湖水勢尋亦不能行臨安縣金鮮湖在德義鄉俗傳有龍於潛縣觀湖在縣南二十里富陽縣陽陂湖在縣北十里周十六里可溉田萬畝唐地里志貞觀十二年縣令郝其開南六十步有隄登封元年縣令李濬所築東有海西至於筧浦以捍水患正元七年鄭早又增修之涌泉湖在縣西二十五里濶二十餘丈長四百步泉水涌出可溉田數百頃鹽官縣竹浦湖在縣東北六十里周六里髙湖在縣東北一十七里東西二十八里南北一里三步谷湖在縣東北四十六里周四里建寧湖在縣西北二十五里東西一十里南北九里吳建興中開因名建興湖舊志誤作建寧已上四湖今皆廢咸淳臨安志卷三十四
