body:
  text: 咸淳臨安志卷三十五宋潜說友撰山川十四河城內茒山河東自保安水門向西過𣙜貨務橋轉北過茒山并蒲橋至梅家橋德夀宫之東元有茒山河因展拓宫基填塞積漸民户包占惟存去水大溝至蒲橋修內司營填塞所不及者故道尚存自後軍東橋至梅家橋河鹽橋運河南自碧波亭州橋通江橋與保安水門裏橫河過望仙橋直北至梅家橋出天宗水門一派自仁和倉後葛家橋天水院橋至淳祐倉前出餘杭門水門市河俗呼小河東自清冷橋西流至南瓦橫河口轉北由金波橋巧兒橋直北至仁和倉橋轉東與茒山河水合由天水院橋轉北過便橋出餘杭門水門清湖河西自府治前淨因橋過閘轉北由樓店務橋至轉運司橋轉東由渡子橋與涌金池水合流至金文庫與三橋水相合由軍將橋至清湖橋投北由石灰橋至衆安橋又投北與市河相合入鵝鴨橋轉西一派自洗麩橋至紀家橋轉北由車橋至便橋出餘杭門城中四河茒山中廢已久而鹽橋河市河日納潮水流沙渾濁居民規占河道委草壤其間久之乃為平陸官雖以時開浚未幾填塞如故至元祐五年守蘇公軾請之於朝軾於熙寧中通判杭州訪問民間疾苦父老皆云苦運河淤塞逺則五年近則三年率常一開浚不獨勞役兵民而運河自州前至此郭穿闤闠中蓋十四五里每將興工市肆洶動公私騷然自胥吏壕寨兵級等皆能恐喝人戶或云當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之他及工役既畢則房廊邸舍作踐狼籍園囿隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水行數百斛舟人牛力盡跬步千里雖監司使命有數日不能出郭者其餘艱阻固不得言問其所以頻開屢塞之由皆曰龍山浙江兩閘日納潮水沙泥渾濁一汛一淤積日稍久便及四五尺其勢當然不足怪也父老又言錢氏有國時郡城之東有小堰門既云小堰則容有大者昔人以大小二堰隔絶江水不放入城則城中諸河專用西湖水水既清徹無由淤塞而餘杭門外地名半道紅昔亦有堰名為清湖意亦愛惜湖水不令走下自從天禧中故相王欽若知杭州始壞此堰亦快目下舟楫往來今七十餘年矣以意度之必自此後湖水不足用而取足於江潮又况今者西湖日就堙塞而昔之水面半為葑田霖潦之際無所瀦蓄流溢害田而旱乾之月湖自减涸不能復及運河謹按唐朝長慶中刺史白居易浚治西湖作石函記其略曰自錢塘至鹽官界應溉夾河田者皆放湖水入河自河入田若隄防如法蓄泄及時則可溉瀕四千頃由此觀之西湖之水尚能自運河入田以溉千頃則運河足用可知也軾於是時雖知此利害而講求其方未得便要今者䝉恩出典此州自去年七月間到任首見運河乾淺使客出入艱苦萬狀穀米薪芻亦緣此暴貴尋剗刷捍江兵士及諸邑廂軍得一千人自十月興工至今年四月終開浚茒山鹽橋二河各十餘里皆有水八尺以上見今公私舟船通利父老皆言自三十年以來開河未有若此深快者也然潮水日至淤填如舊則三五年間前功復棄軾方講問其策而臨濮縣主簿監在城商稅蘇堅建議曰江潮灌注城中諸河嵗月已久若遽用錢氏故事以堰閘却之令自城外轉過不惟事體稍大而西湖葑合積水不多雖引入城未可全恃宜參酌古今且用中策今城中運河有二其一曰茒山河南抵龍山浙江閘口而北至天宗門其一曰監橋河南至州前碧波亭下東合茒山河而北出餘杭天宗二門東西相望不及三百步二河合於門外以北抵長河堰下今宜於鈐轄司前創置一閘每於潮上則暫閉此閘令龍山浙江潮水徑從茒山河出天宗門候一兩時辰潮平水清然後開閘則鹽橋一河過闤闠中者永無潮水淤塞開淘騷擾之患而茒山河縱復淤填乃在人户稀少村落相半之中雖不免開淘而泥土有可堆積不為人患潮水自茒山河行十餘里至梅家橋下始與鹽橋河相通潮已行逺泥沙澄墜雖入鹽橋河亦不淤填自來潮水茒山鹽橋二河只淤填十里十里已外不曽開淘此已然之明效茒山河既日受潮水無緣涸竭而鹽橋河底低茒山河底四尺梅家橋下量得水深四尺而碧波亭前水深八尺則鹽橋河亦無涸竭之理然猶當過慮以備乏水今西湖水貫城以入於清湖河者大小凡五道一暗門外斗門一所一涌金門外水閘一所閘一集賢亭前水筧一所門一集賢亭後一所一菩提寺前斗一所皆自清湖河而下以北出餘杭門不復與城中運河相灌輸此最可惜宜於涌金門內小河中置一小堰使暗門涌金門二道所引之水入法慧寺東溝中南行九十一丈則鑿為新溝二十六丈以東達於承天寺東之溝又南行九十丈復鑿為新溝一百有七丈以東入於猫兒橋河口自猫兒橋河口入新水門以入於鹽橋河則咫尺之近矣此河下流則江潮清水之所入上流則西湖河水之所注永無乏絶之憂矣而湖水所過皆闤闠曲折之間宜作石匱貯水使民得汲用浣濯且以備火災其利甚博此所謂參酌古今而用中䇿也軾尋以堅之言使通直郎知仁和縣事黃僎相度可否及僚吏躬親驗視一一皆如堅言可成無疑也謹以四月二十日興工開導及作堰閘不過數月可以成就今有合行起請事件謹具畫一如左一今來所創置鈐轄司前一閘雖每遇潮上閉得一兩時辰而公私舟船欲出入閘者自須先期出入必不肯端坐以待閉閘兼更有茒山一河自可通行以此實無阻滯之患而能隔絶江潮徑自茒山河出天宗門至鹽橋一河永無堙塞開淘騷擾之患為利不小恐來者不知本末以阻滯為言輕有變改積以嵗月舊患復作今來起請新置鈐轄司前一閘遇潮上閉訖方得開龍山浙江閘候潮平水清方得開鈐轄司前閘一鹽橋運河岸上有前治平四年提刑元積中所立石刻為人户屋舍侵占牽路已行除拆外具載濶狹丈尺今方二十餘年而兩岸人户復侵占牽路蓋屋數千間却於屋外别作牽路以致河道日漸淺窄准此據理並合拆除本州方行相度而人户相率經州乞據逐人家後丈尺各作木岸以護河堤仍據所侵占地重出價錢官為樁管準備修補木岸乞免拆除屋舍本州已依狀施行去訖今來起請應占牽路人戶所出賃錢並送通判㕔收管準備修補河岸不得别將支用如違並科違定制右謹件如前兼畫成地圖一面隨狀納中興駐蹕河事尤所加意自紹興四年嘗起發近郡廂軍開修馬運副承家等因奏申嚴填塞之禁自是以來為守者率以時察視惟謹至乾道四年周安撫淙出公帑錢大浚治城內外河凡六千二百五十丈又置巡河鋪屋三十所撩河船三十隻計慮益深逺矣清湖河疏引西湖水雖潮汛所不到亦以淤塞相習工力不時隄圮水涸行者舟者胥以為病及咸淳六年中朝廷始命安撫潜說友措置開修且斥幣餘庚其廢一自斷河至清湖橋凡四千二百一十尺一自觀橋西至楊四姑橋凡二千三百三十五尺淺者浚狹者拓圮者築闕者補楗以堅木甃以巨石欄垣門步煥然一新徑術坦夷人行砥上斷河地建吳山每大雨流潦挾草壤雜至乃即其處穿海子口深三丈餘置鐵窗櫺以釃之使浮穢不入於海置澄水閘以限之使惡流不入於河夾河人家濯清挹潔與濵湖無異魚蝦至游泳其中觀橋西連禮闈之太一宫舊沿河皆矮土墻乃易以甎石中貫以木其髙七尺餘袤以尺計者一千九百八十皆前所未有也續有諭㫖宗陽宮前沿河併行修築凡二百七十七丈又因申警防虞復命說友即於和寧門外河之上流開淘為積水計自登平橋至六部橋凡四十丈海子口居四之上甃砌板築置水閘闢水門工役一視諸河而有加焉其他次第浚治尚未艾也清湖橋而下安撫趙與􅊸接續浚築至衆安橋城外運河南自浙江跨浦橋北自渾水閘蕭公橋清水閘衆惠橋欏木橋朱家橋轉西由保安閘至保安水門入城土人呼城外河曰貼沙河一名裏沙河龍山河南自渾水閘由朱橋至南水門外沙河南自竹車門北去繞城東過紅亭稅務今廢前螺螄橋東至蔡湖橋與殿司前軍寨內河相合轉西至遊奕寨前軍寨橋至無星橋與壩子橋河相合入艮山河沿城泛洋湖水轉北至德勝橋與運河相合舊志作外河城外既有裏沙河則此河為外沙河明矣今有外沙巡檢司菜市河南自新門外北沿城景隆觀至章家橋菜市橋壩子橋入泛洋湖轉北至德勝橋與運河合流下塘河南自天宗水門接鹽橋運河餘杭水門接城中小河清湖河二河合於此郭稅務前由清湖堰閘至德勝橋與城東外沙河菜市河泛洋湖水相合分為兩𣲖一由東北上塘過東倉新橋入大運河至長安閘入嘉興曰運河一由西北過德勝橋上北城堰過江漲橋喻家橋北新橋以北入安吉州界曰下塘河題詠髙菊澗九萬下塘二首河水新添三尺髙河邉蘆岸似龜巢波流夜夜飄魚箔空㸃藍燈照樹梢水日出移船日又斜蘆根時復見人家鄉占得秋多少岸岸紅花是蓼花新開運河在餘杭門外北新橋之北通蘇湖常秀潤等河凡諸路綱運及販米客舟皆由此達於行都淳祐七年夏大旱城外運河乾涸趙安撫與􅊸奏請得臨安府客旅船隻經由下塘係有兩路一自東遷至北新橋今已斷流米船不通一自德清沿溪入奉口至北新橋間有積水去處亦皆斷續每米一石步擔費幾十餘千米價之增實由於此若不亟行開浚事關利害今委官相視見得自奉口至梁渚僅有一線之脉止可載十餘石米舟自梁渚至北新橋則皆乾涸不可行舟共三十六里計五千五百三十九丈五尺除已雇募鄉夫差委官屬分假開掘外又契勘塘岸一帶都保久失修築日漸隳坍縴路狹窄艱於行往今就此河所掘之土幫築塘路庶幾水陸皆有利濟實一舉而兩得一自北新橋至狗葬開濶三丈深四尺一自狗葬至奉口開濶一丈自是往來浙右者亦皆稱其便焉下湖河在溜水橋柴場北自選䇿馬軍寨墻八字橋沿東西馬塍羊角埂上泥橋下泥橋直抵步司中軍寨墻北一派自打水樓南折入左家橋河入江漲橋河一派自八字橋西䇿選軍寨神勇軍寨步人橋至古塘橋下折入餘杭塘河一派自西堰橋西溪山一帶至飲馬山亦折入餘杭塘河塘河自北郭稅務驛亭下直抵左家橋係下湖泄水去處餘杭塘河在北關門外江漲橋投西四十五里至餘杭縣奉口河自北新橋三十六里至奉口大溪前沙河在菜市門外太平橋外沙河北水陸寺前入港可通湯鎮赭山巖門鹽場題詠東坡嘗於此督役開河有湯村開運鹽河雨中督役詩居官不任事蕭散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能恤耕農鼕鼕曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒堤上四顧但湖泓線路不容足又與牛羊爭歸田雖賤辱豈失泥中行寄語故山友慎勿厭藜羮後沙河在艮山門外壩子橋北宧塘河在餘杭門外板橋之西淳祐七年亢旱趙安撫與􅊸開浚以通米舟蔡官人塘河在艮山門外九里松塘姚斗門通何店湯鎮赭山施何村河在桐扣山水澾堰東自運河入通裏外沙河地有姓施姓何人居故名赤岸河在赤岸南自運河入通髙塘橫塘諸河方興河在臨平鎮東自運河入通像光赭山湯鎮餘杭南渠河祥符志云在舊縣前一十步大溪之南濶一十五步深五尺出於縣南上下湖東連五福渠以其在舊縣南因名南渠河今上下湖堙塞水亦不與南渠河相通故久不雨則河之涸立見五福渠祥符舊志云在縣東二十六里一十六步深三尺入錢塘縣界一十八里五十步瀕渠有五福廟故以名廟廢已久咸淳臨安志卷三十五
