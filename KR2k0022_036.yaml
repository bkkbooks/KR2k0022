body:
  text: 咸淳臨安志卷三十六宋潜說友撰山川十五溪城外西溪在武林山之西題詠郭祥正詩西溪在湖外一派濯殘陽遊子託漁艇却愁歸路長九溪在赤山烟霞嶺西南通徐村出大江北達龍井安溪在錢塘縣去北闗五十里溪上大遮山有龍王穴舟人相傳風雨之夕龍吐珠有光凌溪在錢塘縣長夀鄉奉口溪在錢塘縣安溪之北十八里餘杭縣苕溪祥符志云濶七十六歩居民填塞今濶六十歩秋冬深五尺春夏深九尺山海經云天目山一名浮玉山髙逺閎深苕溪出焉在淤潜臨安兩縣界東流百五十里經本縣又東流二十七里而至錢塘界又東流六十二里二百歩入安吉州徳清縣耆老傳云夾岸多苕花每秋風飄散水上如飛雪然因名又輿地志云自縣之西名冷溪葢取清冷之意乗舟至此輕若凌虚唐天授三年勅錢塘於潜餘杭臨安四縣租稅綱運徑取道於此公私便之每春日風雲生輙水長數寸土人號為尹公潮俗傳尹公有異術能叱水成潮東溪祥符志云在縣東二十一里十三歩濶二十歩深四尺其源出縣東南青障山東北流入錢塘縣界又自北由孝女鄉流入安吉州徳清縣以溪在縣之東故名東溪一名停辭溪仇溪祥符志云在縣東北二十一里濶二十歩深五尺有二源一出臨安髙陸山東流八十六里至仇山之北一出本縣獨松嶺東流八十里一百歩至仇山合流而東行十二里一百歩又合苕溪行三十六里二百歩入安吉州徳清縣以二水合流處有仇山即嚴山也臨安縣南溪在縣西三里濶四十丈發源于於潜縣天目山東入本縣界四十五里至縣郭東南二里五十歩又東二十八里入餘杭界凡經過縣界者七十三里溪多灘磧遇水漲可勝二十斛舟猷溪在縣北二十六里濶一十歩深一尺水源出髙陸鄉東入餘杭縣界二十六里石鏡溪一名錦溪晏元獻輿地志云在縣東南一里題詠東坡錦溪詩楚人休笑沐猴冠越俗徒誇翁子賢五百年間異人出盡将錦繡裹山川金華王竹寮執禮錦溪次趙令韻二首㣲雲淡月半昏明初換春衫歩屧輕行到小橋幽絶䖏朗吟詩句答溪聲屏困人天氣近清明花信風來拂面輕却鳴騶成獨徃緑楊隂裏聼鶯聲馬溪在縣東北八里於潜縣浮溪在縣西二里濶五十二丈深五尺源自天目山至縣郭七十里下入桐廬縣溉田五十三頃二十五畝父老相傳大歴中俱眡道者過此適溪流泛溢以浄巾浮渡故曰浮溪紫溪在縣南三十里濶四十五丈深七尺源出天目龍湫通昌化栁源兩溪合流入分水縣界溉田四十三頃五十畝古記云晉髙僧佛圖澄就溪浣滌有紫光浮其上因以名唐正元十八年縣令杜泳開三十餘里深五尺濶二丈始通舟檝溪下有燕尾灘最為險惡操舟者病焉至紹熈間前令邵文炳鑿去銛利之石其害遂息又有響石在溪之南相去里餘屹立湍流之側有聲清越藻溪在縣東二十里虞溪在縣北一十五里有虞将軍祠零口溪在縣北五里豐陵溪在縣北十里富陽縣歩溪在縣西三十里濶五丈發源於貝山湖南入浙江湖洑水在縣西南九十里濶五十歩東入錢塘江界地里志云湖洑水中有蜮含沙射人毎遇夏秋人不敢渡歩橋水在縣西三十里源出貝山湖南大小源入大江私水在縣一百六十里源出天目山凌皓村水在春明里凌皓村口有水源可溉田安呉川在縣東一十里東入錢塘縣界舊志云呉之平陽也龜川在江口對境有山曰紫㣲新城縣葛溪在縣西七里折桂鄉葛仙翁於此煉丹有井題詠許廣淵詩穉川仙化後溪以葛為名水激飜空白潭澄到底清山多晴倒影雨過夜添聲月滿寒光入魚龍患太明松溪在縣北五里東鄉至行者橋與葛溪合流入江余溪在縣西二十五里廣陵鄉源出分水縣至巖石與大溪合流西溪在縣西七十里南新鄉源出漁州山底與天目水通流入南新鄉界釜源溪在縣西五十五里南新鄉源出回源池與漁洲水合盤石溪在縣西五十一里新安鄉源出靈門至南新鎮南一里三百歩與漁洲靈池水合流入縣湘溪在縣西三十里廣陵鄉源出新婦洞至張澗與大溪水合昌化縣虞溪在縣東一里又云澞溪在縣東一里自此綿亘三十里凡渉數村曰楊村曰盛村曰楓樹平曰黄蘖皆在此溪上下爾雅陵夾水曰澞紫溪詳具於潜縣晩溪在縣西九里遽溪在縣西十五里其源絶深處山皆壁立水流巨石中湍激可畏舊傳陳霸二仙曽隐此每垂釣石上今枕臂坐迹皆存溪中有鸕鷀塞雙眉潭潭上石壁有雙眉痕人莫知所始董溪在縣西二十五里歴溪在縣西一十五里又云在縣西十里頰口溪在縣西五十里無他溪在縣西三十五里上溪在縣西北八十里楊溪在縣西北八十里平渡溪在縣南七里下阮溪在縣南一十五里伽溪在縣南二十里上博溪在縣南二十八里櫃溪在縣西南三十里沈溪在縣西南五十里蒲溪在縣南六十里社丁溪在縣西南三十里雙溪在縣前一百歩潭城内外黒龍潭在寳月山寳月寺之西莫測深淺亢旱不竭一曰天井山下有天井巷晴則潭水碧色可愛将雨則湛黒郡人以此候晴雨多騐祝文白文公祭黒龍潭文黒龍惟龍其色元其位坎其神壬癸與水通靈昨日歴禱四方寂然無應今故䖍誠潔意改命於黒龍龍無水欲何依神無靈将恐歇澤能救物我實有望於龍物不自神龍豈無求於我若三日之内一雨滂沱是龍之靈亦人之幸禮無不報神其聴之白龍潭在仁和縣臨平鎮東湖舊有龍王廟紹興十四年四月水衝壊塘岸版築不就禱於潭重立廟乃成漁浦潭晏公輿地志在郡西南龍游潭在仁和縣肇元鄉臯亭山時有蜿蜒出沒其門鄉人稱為水甕亢旱禱必雨鉢盂潭在南髙峰詳見祠廟門又仁和縣太平鄉石塘之東亦有潭曰鉢盂玉兒潭晏公志云在郡西五十里浣沙潭在仁和縣臨江鄉羊鈌潭在仁和縣艮山門外臨江鄉西湖三潭土人相傳云在湖中臨安縣玉兒潭晏公輿地志在縣西五十里涴沙潭在縣西五十里龍潭在髙陸鄉猷溪中環以巖石既深且清有石如屋覆其上號渇澤龍王於潜縣上潭在天目山東垂崖之下崖髙五十仭其水紺碧流奔中潭登者畏之但可據石援藤一瞰而已中潭次於垂崖之下三十餘仭其水湛湛流入下潭噴響如雷湍濺巖壁下潭又在其次周圍二十文泓澄汎灧莫窮其底朝廷遣使投龍壁悉捐於此銘文尉安鼎作三潭銘并序云天目三潭神物沕潜曰雨曰暘其應知響渠江安鼎甫涖尉事躬求斯信乃為之銘詞曰二氣委形卑髙奠址子育萬衆名戸弗以凝魂融液神宅龍淵典司下土佐理渾然巨鎮駢峙承天兩目降觀沴災電掃雲撲有冽湀闢𣲖山之幽飛瀑三瀦卷綠摇秋陽驕隂潜邦人穈祝我挹其波用成百糓於顯杓惠麗澤鵬㝠昭以信辭永肅嚴扃鼎以今紹興乙亥秋七月被縣牒致禱還未至而雨是嵗冬末奉從郊祀赦未登遂銘之以昭靈貺乳水潭廣一丈與下潭相去數百歩味甘色白可㵸茗或三潭水涌則混而為一平則乳色自分柯相公潭見浪山靈芝潭在雙溪亭東收山潭在縣南四十五里岝㠋潭在岝㠋山潭有石如磨下有三趾號羅磨見於水面富陽縣鉢盂潭在慶善村龍門山有瀑布注為潭梅梁潭在縣東田疇間水與潮相消長旁有山唐咸通中會稽建禹廟嘗伐梅木為梁一夕風雨晦冥梁忽不見後數日風雨又作梁復在焉視之赤萍滿腹謂此梁為梅潭之龍因以銅索纜之後嘉㤗中禱雨應鹽官縣白龍潭在十一都運河側紹興間號龍王廟昌化縣柯相公潭在縣東南十五里大溪上曰小栁下曰大栁中有大石盤固水勢湍激潭在其下相傳柯相公乗舟溺於此遇澄霽所覆舟可見隂晦則聞水上樂聲羊頭潭在縣西北七十里地名都亭源石壁對峙舊名龍門瀑布百尺界於門中下注深潭有龍宅焉潭底有石形如羊頭兩角嶄然旁有五石杯𩔖祭奠所設或隂晦龍出游其聲如鐘皷嵗旱以罌缶禱其水有鱗屬入之必雨浴仙潭在縣東南三十里欖村何仙姑浴處溪水澄瑩而香澗城外合澗在靈隠天竺之間十八澗在龍井山之西後路通六和塔石門澗陸羽靈隠寺記舊有卧龍石横澗中題詠郭祥正詩云啟閉何人見湍流一澗分仙家無路入空鎻石樓雲金沙澗在靈隠寺側自合澗橋繞靈隠山一帯唐家衕石橋左軍寨門内至行春橋折入歩司前軍寨門由麯院流入湖惠因澗在赤山惠因寺側秦少游龍井題名記云並湖而行出雷峰度南屏濯足於惠因澗呼猿澗詳具呼猿洞洲浦城内外栁浦在鳯凰山下隋置郡處晉呉喜嘗進軍此地今無可考鐵幢浦在今便門側土人相傳云呉越王射潮箭所止處嘗立銕幢因以名之又有聞諸錢氏子孫者謂錢王築塘時髙下置銕幢凡三以衛水此則其一也淳祐戊申趙安撫與􅊸買民地置亭其上題詠王荆公詩憶昨初為海上行日斜來徃看潮生如今身是西歸客回首山川覺有情靈隠浦詳具靈隠山顧夷吾山川記云靈隠山自南徂東臨浙江一派謂之靈隠浦今資國院前是也亦云靈隠歩頭題詠郭祥正詩云有靈何所隠深浦老蒹葭漁父一舟泊却疑秋漢槎白石浦在仁和縣臨江鄉鮮船渡浦湯村浦並在仁和縣臨江鄉富陽縣洲附莧浦在縣西一里濶六十歩東入浙江一名闗浦俗謂闗為莧東梓浦在縣西南五十一里東入浙江舊名青草浦宋将軍孫瑶𦵏於此墳上梓木皆東靡故以名楊横自已浦在春明里地名黄浦橋蛇浦在普惠寺前有溪入江相傳昔有巨蛇由此而出其地遂曲為浦蛇渡江而南㳂山而下其徑尚存世稱為蛇路灣有祠在慶䕶村剡浦今蛇浦人號為龍溪孫洲在縣西南四十二里周二十三里太平寰宇記載呉錄云浙江經富陽中有沙漲呉烈帝為郡吏趨府鄉人餞之於沙上父老曰此沙狹而長君當為長沙太守後果如其言遂名曰孫洲又呉興地理志西南八十里有長洲孫氏數百家居之因以名王洲在縣南五十里周回五百歩王姓居之其地宜橘今楊漲是也唐地理志云有橘以供貢桐洲桐江水東注過孝子許彧故廬新城縣深浦在縣南二十五里昌西鄉乗潮來徃増减溉田五十頃鹽官縣百尺浦在縣西四十里輿地志云越王起百尺樓於浦上望海因以為名今廢咸淳臨安志卷三十六
