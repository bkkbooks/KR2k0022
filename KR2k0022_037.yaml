body:
  text: 咸淳臨安志卷三十七宋潜說友撰山川十六井城内外呉山井在呉山之北錢氏時有韶國師者始開此井品其水味為錢塘第一盖山脉融液獨源所鍾不雜江湖之味故泓深瑩潔異於衆泉淳祐丁未大旱城中諸井皆涸獨此日下萬綆如常時都人神之趙安撫與􅊸奏立祠以旌異焉又為亭覆井上題詠樓参政鑰詩寒泉龍王堂道流王徳正屢求呉山井記而臨安圗經所載甚略無可考證賦長句以遺之錢塘東南一都㑹西湖宛在髙城外鑿爲六井引入城唐相鄴侯功尚在呉山横亘城中央左右江湖盡襟帶寒泉迸溢清且甘發自靈源匪分𣲖天目雨乳龍鳯来秀氣所鍾此其最海瀕斥鹵潤作鹹安得一泉獨滂沛聖朝駐蹕勢日隆民聚五方真衆大旱嵗不乾潦不溢環甃老砂期勿壊抱甕轆轤萬夫汲飛泉仰流筒快似取之不盡用不竭數里赤肩競分賣人言神龍宅其下濟物隂功不勝載川澤固多資灌溉此井尤能濟闤闠皇家徳澤如此泉福祚與之俱不改傅魁行簡䟦大㕘以詩代記呉山井井之恵利得是詩而愈無窮主祠道流王徳正持詩相示予謂後世官民既分凡利在于民者以官治之非徒無益祗有害且捍江有卒開湖有司浚治河渠亦有職利孰為興害孰為去徒蠧財蝕廩而已他時一有修治直重費縣官而後事克舉今王徳正主井旁龍祠道家者流因利為利而不言利沿功為功而不言功徳正勉之窒罅平圮鍾美屏惡民不擾而恵以遷繼正者益勉之官毋奪其職庶乎井之利其永存詩載樓氏家集王徳正䏻求記而不能刋詩以傳亦一欠事也天井在天井巷舊記寳月山上有天井後廢嘉泰二年火因掘土得甃砌處有石版刻云㑹同五年重修遂作亭其上又真際院亦有天井大旱不竭記文殿中林御史采記云臨安今為天府有坊以天井名舊矣土名亦謂天井巷竊意衖中有井従古而然望寳月山黒龍潭不逺最承天雨異於諸井故以天井名之按臨安志大井自相國而下有六十井自呉山而下三十有一初無天井之名獨扵黒龍潭有云寳月山一名天井山下有天井巷天晴則潭水碧色可愛遇有雨先一日變黒然此所謂黒龍潭也非天井也相傳皆謂極太守張公枃之力經年物色莫知天井所嚮遂附㑹其說於黒龍潭之下然此說非特張公枃為然太守周公淙嘗為序引則自乾道丁亥之為是志也已不知有是井矣嘗考其地自清河坊以西有衖直南有天井坊也其井深廣堙沒既久人皆能言之但民居匼匝無所尋訪而志中所載獨此見遺遂不復問往往一方食用多是湖水間有穿成小井僅給一家思欲剖天井之蔵以備萬家之汲不翅如渇嘉泰二年六月六日鬰攸發于故張循王之第延燎巷中七百餘家太守丁公常任得此井於瓦礫之塲視臺誎公廨若引蠅而近始見端倪即趣穿掘清泉迸溢凡數日乃得其極底深五十餘尺廣十餘尺井既復舊汲泉眂之其清可鑑飲之甘美可以滌煩當三伏盛暑可畏此泉乃能續久斷之脉行者居者覩此浚發泠然四逹如醴泉之出扵地不知其有暑氣仰見天府之大所謂天井者亘古常存迄今復見人有得建炎銅錢扵井中者度其湮沒必在建炎之後雖得之扵天者其廢興亦必有時也然則昔人以此井而名此坊亦欲後人有所考耳頋乃不得與六井並載扵志復意料黒龍潭之為此井豈不誤哉今丁公命創亭以覆其上太守李公澄繼之促令幕僚趙汝鐸畢其役使一方萬家日汲扵其下随取随足愈用愈不窮真再見之異無垠之利也昔帝堯之民鑿井而飲猶曰不知帝力何有於我今皇上駐蹕扵此仁恩徳澤汪濊如漏泉皆堯民也井不待鑿天者自還歌詠帝力抑當如何兹又聖朝盛事也敢不併書之是年八月十一日郭公井在萬松嶺下郭婆井在鐵冶嶺北郭兒井在青平山上四眼井在夀域坊仁王院前下四眼井在長慶坊竹竿巷白鱔井在金地山步軍司衙兵寨鰻井在清沙灣上井在鐵冶嶺下上八眼井在寳月山下下八眼井在秘書省相對六眼井在後市街沈婆井在萬松嶺甜𤓰井在六部前舊雙門外大井在四方館之北南倉前大井在舊南省倉前沈公井在太學後紹定中因展拓學基今在學後門又市西坊内北亦有沈公井祥符寺井呉越王開凡九百九十眼後為軍噐所陻塞今僅存數井義井在薦橋北俗呼四眼井水宜染紫與他井異染工多取焉雙井在道明橋東長恵井在豐樂橋西棚心雙井在㝎民坊靈鰻井在鳯凰山南塔寺今額曰梵天寺先是四眀阿育王山有靈鰻井傳云䕶塔神也後錢氏迎育王舎利歸國井中鰻不見錢氏乃於寺廊南鑿石為井而鰻常現僧録賛寧有鰻井記刻塔石上今不存烏龍井在錢武肅王廟前砂井在六和塔寺之南上有鐵井欄龜兒井在西溪覆以石龜穴其背以汲西溪方井在西溪有亭扁曰方井米元章書西四眼井在淨慈寺北煉丹井晏元獻公輿地志云天竺山下葛僊翁煉丹今井在下竺藏院烹茗井見武林山相公井在鐵冶嶺步司衙紹興間節度使趙宻為步帥日浚此井水極清甘軍人呼為相公井上有亭恵利井在清湖洪福橋楊和王府内通西湖水口其孫奉議文晉撤庫屋為井以便衆汲因作亭覆之六井見西湖門金沙井詳見孤山龍井本名龍泓呉赤烏中葛洪煉丹於此道西湖南山登風篁嶺澗泉決決與幽花野草延縁山磴更上嶺背巖壑林樾皆老蒼而西湖已蔽掩不可見氣象愈清古巖骨稜瘦泉流渟涵一泓清澈即之凄然相傳有龍在焉觸石為雲禱者輒應因建龍祠曰恵濟廟井有記秦少㳺撰米元章書咸淳五年安撫潜說友重建門古篆龍井二大字為扁詳見延㤙衍慶寺記文秦少㳺撰龍井記龍井舊名龍泓呉赤烏中方士葛洪嘗煉丹扵此事見圗記其地當西湖之西浙江之北風篁嶺之上寔深山亂石中之泉也每嵗旱禱雨扵他祠不獲則禱扵此有禱輒應故相傳以為有龍居之然泉者山之精氣所發也西湖深靚空濶納光景而涵烟霏菱芡荷花之所附麗龜魚鳥虫之所依憑漫衍而不迫紆餘以成文隂晴之中各有竒態而不可以言盡也故岸湖之山多為所誘而不克以為泉浙江介扵呉越之間一晝一夜濤頭自海而上者再疾擊而逺馳兕虎駭而風雨怒過者摧當者壊乗髙而望之使人毛髮盡立心掉而不禁故岸江之山多為所脅而不暇以為泉惟此地蟠幽而踞阻内無靡麗之誘以散越其精外無豪悍之脅以虧疎其氣故嶺之左右大率多泉龍井其尤者也夫蓄之深者發之逺其養也不苟則其施也無窮龍井之徳盖有至扵是者則其為神物之託也亦奚疑㢤元豐二年辨才法師元靜自天竺謝講事退休扵此山之夀聖院院去龍井一里凡山中之人有事於錢塘與㳺客之将至夀聖者皆取道井旁法師乃即其䖏為亭又率其徒以浮屠法環而咒之庶㡬有慰夫所謂龍者俄有大魚自泉中躍出觀者異焉然後知井之有龍不謬而其名由此益大聞余是嵗自淮南如越省親過錢塘訪法師扵山中法師杖筞送予於風篁嶺上指龍井曰此泉之徳至矣美如西湖不能淫之使遷壮如浙江不能威之使屈受天地之中資隂陽之和以養其源推其緒餘以澤於萬物雖古有道之士又何以加扵此盍為我記之余曰唯還少㳺留題元豐二年秋後一日余自呉興道杭東㑹稽龍井有辨才大師以書邀余入山比出郭日已夕航湖至普寧遇道人参寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間眀月可數毫髮遂棄舟從参寥杖䇿並湖而行出雷峯度南屏濯足扵慧因澗入靈石塢得支徑上風篁嶺憩於龍井亭酌泉投石而飲之自普寜凡經佛寺十五皆寂不間人聲道旁廬舎㦯燈火隠顯草木深鬰流水激激悲鳴殆非人間之境行二鼓矣始至夀聖院謁辨才扵潮音堂明日乃還髙郵秦觀題交鄭丞相清之䟦坡仙至錢塘特與辨才師為世外師歸老龍井坡為作二老亭詩一時名勝多與之逰瑰詞藻翰衣被泉石至今枯槎斷壁間奕奕飛動獨少㳺記文得元章書二妙相輝宜耀不朽而寺失其傳好事者悶然不滿紹定己丑得真蹟扵戸書胡公槻印以他米書不謬每念鑱之寺中以苴放軼一日語京尹趙公公斂衽曰前賢之勝韻不續寔遺吾邦羞寺扵何有亟訪堅珉刻之且捐錢百萬畀住山宗炳建樓植鐘新緇宇之敝扵是龍井之勝若前賢之媺如創見然余每愛少㳺支笻步月敲辨才門夜半清語殆非人間世今留題中寫澗谷經行登危憩寂之境衝烟破暝之態溪潺林影斷續隠見雖善畫不能及題識猶爾况記乎雖然微尹公好古博雅則斯記未必遇雖遇未必遽赫然在人目余幸記之遇顯之速也於是借石咫書其顛末題詠蘓文忠公次葉教授韻記龍井之逰先生魯諸儒飲食清不溽空腸出秀句吟嚼五味足華堂閑絲管眸子漲春渌先生絶走避面冷毒在腹歸来煮瓠葉弟子歌旱麓聲淫及靈臺中有麀鹿伏功名一走兔何用千人逐故應容我輩清坐時閉目髙亭石排衙木杪挂飛屋我來無時節客亦不待速似聞雪髯叟西嶺訪遺躅朝陽入潭洞金碧涵氷玉泉扉夜不扃雲袂本無幅慈皇付寳偈神侣得幽讀訥庵有老人宴坐天魔哭時来獻纓絡法供燈相續吾儕詩酒汙欲往無乃觸齋厨費晨炊車騎滿山谷碩聞第一義鉢飯非所欲便投切雲冠予幼好竒服葛公雙井在治平寺西居人飲此水不染時疾傳言葛公煉丹於此有石函在井中嘗為好事者涸水取去水遂濁惡居人索回石函水甘潔如故觀音井在菜市門外湯鎮路上有亭蓮花井在小林蓮花院記文范令光記臨平山後數十里井鹵惡予客小林四面散汲其味同属與范右之蔡及之納凉蓮花院院有三井叩僧孰勝指露井不良余亟取烹茗清甘寒冽自是日走躄奴二罌靳不輕費品此泉為小林第一井有神焉亦喜自賀吾不復將百味矣雖然唐人詩云除却借書沽酒外更無閑事擾公私余嘗長斯邑頗以不擾見思别十年矣旅如歸今乃汲水櫌人乎及之笑曰亦君甘棠加封殖爾何愛數語以記斯井之逢馮氏井在臯亭山馮氏家詳見古跡臨安縣天井在縣西五十里孫子井在縣西五十里餘杭縣潛公井在丁橋邑人頋向榮即四方往来之衝鑿井甦旅暍而名以帥守之姓記文劉令晞顔撰京兆統縣九惟餘杭置自漢其俗尊愛良吏猶有兩都之遺風焉余承乏之三年按行阡陌問百姓所疾苦耆老因為余譚開慶時事方烽火通甘泉尹臣始議城京師徴發如雨馬方駥鼓而驚之吾父子且不相聊不圗更生之至扵今也十餘年間穀熟蜡通吏無妄賦徭事不興詔書每下務在蠲征已責明良之朝其貺我甚厚然未若遣我賢師帥之為厚也吾閱師帥多矣率病用不足今潜公覃化宣風壹是以仁義為本恥言籠貨事府中不聞疾呼亟步田里宻如而百為克開取諸有而不竭吾農隙嘗試逰都市榜於河湖黝然其澄逝於梁胡鱗然其新登樓而酒賤掬池而泉甘嬉於湖堤之上草木潤而魚鳥樂迹其佚民生救民死備民患者靡不緻宻而猶有餘力捐以予民吾生扵斯老扵斯苐聞輸積吾聚未有代吾輸者夫囷有餘粟機有餘帛然後人裕扵為善今而後吾子弟其知向方矣乎居無何邑有顧向榮者聚族而謀曰丁橋左朝行都右通蜀廣行者重足錯轂且傳遽日夜川流而環運也每盛夏燠暍無所于醒盍鑿井以濟焉族之為浮屠氏普觀又相與謀覆井以亭且築庵其旁以容憩者既買地鳩材僱工傭不澹則相與謁於府公曰嘻勞民勸相井象也農之相旅也如是盍勸諸乃斥緡錢三千佽其役既成耆老又告余曰潜公寔父母我祠而祝之相兹可請名井曰潛公井令其為我識之余應之曰公潤澤若河海井云乎㢤曰不然井養不窮而以寒冽為至善吾恐後之人瞻公之象而未識公之心也使於是焉觀之以篤不㤀吾感其言重歎夫開慶以前井泥莫渫而再造以来得兹寒冽之為不易其曰遺我厚也宜哉公名說友字君髙父括蒼人今以戶部侍郎兼尹事間者圄屢空天子加賜璽書固嘗亟稱其㢘矣於潛縣煉丹井一在雲封庵後許邁宫之中庭其水微涌環注前池通夏不涸一在縣北四十五里天目山許邁煉丹之地一在縣西三里觀山亦許邁煉丹之地一在縣西三十里集真觀天師張道陵煉丹之地天井濶五尺在山東之趾深不可測或云下通龍潭欲雨則先有雲氣瀰漫景物凝晦村老常以為驗題詠唐僧靈一詩昨夜雲生天井東春山一雨㡬回風林花迸逐溪流下欲上龍池通不通佛圗澄井在縣南五十里常樂寺廟之東晉建興初髙僧佛圗澄所鑿耆老相傳云一日鑿成泉清味甘雖旱不涸義井縣前三井城隍廟前四井上市井北郭井寳城坊井十字街上三井南門外井鳯山井舊七仙庵前井東山塢井陳村井丞㕔前井灌湖上井敖干井巖嶺井新城縣黄金灣井去縣二十里介新城桐廬之間地僻無居人淳祐丙午令趙崇侅命寳林寺僧如炳就創接待庵鑿井以飲往来者扁曰趙公泉龍井在縣西十五里折桂鄉地名苦竹杜公井太師杜稜所開賊圍城城中乏水兵民穿土及石深百尺餘不得稜至誠禱之泉立至城以不陷人目為杜公井題詠許廣淵詩㡬䖏城中井標名孰與倫異非深百尺功在活千人大旱流皆涸甘泉恵受均無情知水石誠發應如神壺許仲蔚詩徳地見圗諜神機發杜稜㓂圍炎甚火飲冽扵氷古邑桑田換靈源鑑面澄如今風月夕煮茗詫山僧煉丹井晏公地輿志葛仙翁煉丹之所題詠許廣淵詩葛公髙隠䖏鑿井碧山前煉就長生藥空餘白乳泉鼎蔵今去水氣吐舊成烟午夜風雷作人疑羽佩旋一許仲蔚詩青雲路在天煉鼎亦徒然九轉果何物泓空舊泉競知丹可煮不悟骨非仙汲引殊無状翻尤葛稚川鹽官縣靈泉井在縣東七十里真如禪院菩提山上昔有道士操夜為鬼神講佛書一日井涸神告之曰當有泉發於山俄寺前之西有竇迸出故名記文令錫山陳逸記云邑之東六十里山曰菩提水曰靈泉廟佛其上曰真如余以職事出郊嘗往焉山多喬松修竹前寺如蔽後寺如衛泉在寺旁飲之與吾家山庶子泉頗相伯仲山之浮屠曰昔有道士操夜為鬼神講佛書一日井涸神告之曰當有泉發扵山俄竇扵寺前之西故謂之靈泉事見圗經此邑地半海鹵而有斯泉惜乎陸羽張又新輩未嘗一頋不列扵茶經水品地僻迹逺且不爭名缾鼎之間有若士之有道而不自表暴者庶子泉在二浙之衝缾罌之行不逺萬里好事者謂茶得泉如人得仙丹精神頓異故自御府至扵韻人勝士不可一日無此安知靈泉亦能㸃化甌中廣寒也今泉雖有靈名而煮海之民但以為淡水當其雨潦浸淫蝸蝤逰焉可為太息雖然物之窮通固自有數造物者每乗除而機括之豈獨斯泉未遭也㢤寺本晉寳宅之墟周顯徳二年建云政和五年十二月十六日烏龍井在縣東七十里福濟廟廣四尺深七尺冬夏不竭旱嵗賴以給相傳昔皋蘓将軍之烏馬跑扵地得泉遂以烏龍名之禱雨應如響葛仙翁煉丹井在硤石紫微山石井在縣北一十二里今廢市邑十井故老相傳本縣阮店村章仁藴開今仁賢坊雙廟巷安國寺三井是也仁賢坊井以白石為欄色𩔖玉有刻云當邑章仁藴開此義井第十四口元豐壬戌嵗記則仁藴所開不止十井餘皆湮沒不存咸淳臨安志卷三十七
