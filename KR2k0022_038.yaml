body:
  text: 咸淳臨安志卷三十八宋潛説友撰山川十七泉城外冷泉醴泉並見武林山溫泉在冷泉之上玉泉在錢塘門外九里松北淨空院南齊建元末靈悟大師曇超門山説法龍君來聼為撫掌出泉今龍池前有小方池深不尋丈清徹可鑑異魚數百泳遊其中淳祐八年趙安撫與􅊸甃砌龍潭增築為二池修造撥田並見龍祠并淨空院題詠白樂天題云湛湛玉泉色悠悠浮雲身間心對㝎水清淨兩無塵手把青笻杖頭戴白綸巾興盡下山去知我是誰人公周紫芝題淨空泉二絶誰穿巨石貯清泉不見超舊講筵龍伴白雲歸寶藏魚隨流水下春田空欲尋遺事苦無碑老宿猶傳古律師尚恐蜿蜒在谷水清不敢唾方池僧濟顛題云千章老木冷涵秋今日重耒話舊逰一池寒水浸虗碧清光瑩徹凝不流中有神龍隱頭角為雨為霖滋旱涸聖主垂衣風雨調龍亦安眠在邱壑人來初不睹真龍但見金鯽浮沈中昂頭擺尾得其所我疑便是池中龍殷勤一語龍聽取汝以何緣墮龍伍良由一念嗔所生畢竟難逃鱗甲苦驀然直下便回光願力資深福寰宇真珠泉在大慈崇教院今為張循王真珠園蓋因泉得名周顯德中院東泉水迸出因甃為方池或聞扣擊聲則泉涌如貫珠嘉祐中太子少保元絳名之曰真珠泉今官釀亦取以名靈泉在夀星寺前有亭又廣福院亦有靈泉金沙泉在仁和縣永和鄉坡詩云細泉幽咽走金沙杯泉詳見夀星寺卧犀泉按鄭戩靈隱天竺詩集序云若夫玉巖青壁犀泉龍瀃峯攢千疊松排萬蓋山之境也據此則青壁檻卧犀泉在靈隱天竺之間蕭公泉在靈隱寺後嵗寒泉在龍井山崇因院法華泉在南山滿覺院又普濟院元額法華參寥泉元祐四年參寥子住上智果寺寺有泉東坡因以參寥名之應夢記云僕在黃州參寥自吳中來訪一日夢參寥子賦詩覺而記兩句云寒食清明都過了石泉槐火一時新後七年僕出守錢塘而參寥子始卜居西湖智果院院有泉出石縫間甘冷宜茶寒食之眀日僕與客泛湖自孤山來謁參寥汲泉鑽火烹黃蘖茶忽悟所夢詩兆于七年之前衆客皆歎知傳載所記非虗語也元祐五年二月二十七日眉山蘇軾書併題頴川泉在南髙峯觀音泉在法通寺又傳燈記又真如院噴月泉在南山暗竹園廣福院定光泉在西山長耳相法相院西定光菴側山腰有泉盤曲飛流濺沫可愛水極清甘淳祐丁未亢旱不竭寺僧用筧引泉以供庖白沙泉在靈隱西普園院方丈之西有泉自白沙中出題詠楊蟠百詠詩云不見泉來穴沙平落細聲夜髙寒月漾銀漢太分眀周公惠泉一名北閘泉在湖州寺下閘乾道三年周安撫淙重修邦人德之遂以名扁甘泉在城北董家巷南今屬陳氏惠泉在錢塘縣長夀鄉大老山泉自地涌出亢旱不涸有寺以泉為名氷谷泉在臨平山寂光菴側題詠金部沈汝諧詩甃石才深數尺餘一泓清冷若氷壺泉源㝎與安平接二水輕甘略不殊寒泉舊名薦菊泉在錢塘門外對嘉澤廟詳見廟題詠芝田張偉薦菊泉詩近來湖上風光改古迹三賢亦就遷獨有菊泉能定力一寒堅守嵗山前僧録泉在南山福聖院青衣泉在太廟後三茅觀園內六一泉僕夫泉並見孤山大悲泉在上天竺茯苓泉在靈隱無垢院半山古松婆娑下有甘泉博物志云松脂入地千年化為茯苓因以名武安泉在皇城司營水清甘有青石刻武安泉三字故老云元為殿前司後軍寨故有此名虎跑泉舊傳性空禪師嘗居大慈山無水忽有神人告之曰眀日當有水矣是夜二虎跑地作穴泉涌出因名題詠坡詩云亭亭石塔東峯上此老初來百神仰虎移泉眼趁行腳龍作浪花供撫掌瑞石泉在糧料院北瑞石山下今在御街大廟南有井亭持正泉在六和塔開化寺涌泉在霍山張真君廟西清心院前山坡下紹興間髙宗皇帝日遣人取水瀹茗寺僧至今護以朱欄從石罅中流出廟前折入黃山橋楊府園前小河味極清甘亢旱不竭天澤泉在麯院小隱寺前有亭覆之安平泉在仁和安仁西鄉安隱院舊名安平院有池名安平泉今池邉有亭題詠東坡詩策杖徐徐步此山撥雲尋徑興飄然鑿開海眼知何代種出菱花不記年烹茗僧誇甌泛雪煉丹人化骨成仙當年陸羽空收拾遺却安平一片泉臨安縣馬跑泉在縣北三十里穆公山髙峻﨑嶇有石棋盤坐石之類父老傳為仙人臺及有馬跑泉口足之迹如印諸石樵採多見之溠水漾在雙林院山半瀑泉飛白甚長沿流集賢里東至於海富陽縣顧家泉在春明里溉田四十餘畝卓錫泉在縣西二十里萬齡山大智院詳具大智院鹽官縣雪峯泉在縣東南五里夀聖院記載靈迹昌化縣天井泉在縣西五十里地名葉源有馬塢小山巔有石竅名天井深不可測其中若列梯級通人上下有泉涓涓灌注石面凝結石脂圎者名寒水石如氷筯者名鵝管石晝執燭可入光采奪目或以絲繫石試井聲鼕鼕如鼓盡絲一籰石墜未已井東有銅山神入者褻慢即迷所出舊傳此泉通朱浪村長潭龍孔泉在縣南三十里有金山玉嶺旁通金紫巖嶺下有龍孔泉流不竭巨魚出必雨瀑布泉在縣東南玉嶺後石壁濶數里髙百丈飛泉自紫巗嶺抵石壁沿空飛瀉四時不竭東坡泉在雙溪亭西數十步石竅中出坡公始尋溪源得之以瀹茗人皆鑿石為泓池城內外涌金池在豐豫門裏引西湖水為池吳越王元瓘書三大字刻石識其旁云清泰三年丙申之嵗建午之月特開此池題詠楊蟠詩涌金春色晚吹落碧桃花一片何人得流經十萬家郭祥正詩衆沼皆涵碧斯池獨涌金寶光終夜見不是月華深聖母池在吳山中興觀側圍以石欄有聖母廟白龜池事具六井金牛池事具六井仁和倉池在倉之南故老相傳云仁和倉舊為縣基乃吳公子慶忌故居元有此池詳見古迹眀清池在大理寺議廳池畔有潘閬詩刻白洋池在梅家橋東周回三里淳祐丁未夏旱湖水涸人爭汲此水至有以舟載賣如湖水者一方賴之鴻雁池在龍山之北龍母池在錢糧司嶺金魚池在開化寺後山澗水底有金銀魚放生池詳見西湖瑶池在錢塘門外寶勝寺側多芰荷周回二里遇旱不竭今屬吕氏園飲馬池在西溪飲馬山下一在菜市門外廟子灣碧沼水池在湖州市左八郎廟巷池廣三畝水清甘人多汲飲有扁曰碧沼磨劒池在臨平山下有片石俗傳錢王磨劒于此宫城外水池一在宫城之東淳祐八年趙安撫與􅊸奏請鑿池二十所各濶一丈四尺深四尺五寸通長二百二十丈甃以堅石繚以矮垣咸淳四年安撫潛説友再行修治一在寧和門外咸淳六年十月有旨申警防虞命守臣潛説友即使相宗室待班閣子之後度地鑿池袤百一十尺自是近南居民去水絶逺者皆恃以為安云防虞水池一在邵局牆下一在左院河下一在泰和坊東一在至德觀前一在萬松嶺上一在錢湖門裏一在鐵冶嶺一在七官宅前一在十官宅前一在龍翔宫前一在仁王寺前一在後市街謝府巷口一在府治後門一在三省後一在六部後一在護聖寨前一在便門外蕭公橋西瓦子口一在候潮門外接待寺前一在候潮門外大郎巷一在候潮門外福田寺前一在水府觀後一在護聖教場前於潛縣放生池舊在縣南廣福院東紹熙中令邵文炳建浮溪橋因徙溪上三池在天目之東北峯下有溪曰大徑口小徑口世傳為龍往來之地未至龍湫數步有潭形如仰箕曰箕潭中有巨石潭水注入上池在山東垂崖下崖髙五十仞上有平地數丈名拜斗壇石壁如門峭立對峙以限水之出巨潦泛溢則激而反趨於寧川故山前無水患崖間有石如獅下瞰潭水登者據石援藤而視毛骨慘栗水流入中池又在垂崖三十仞之下噴瀉如雷飛濺巖壁下池接焉池周圍三十餘丈紺碧深邃幽沕莫測三面皆駢石環繞南溪入大溪至紫溪七十二灘皆發源於此巖下有滴乳民採以療病嵗旱潦朝廷率遣使函幣精禱投之於池洄旋泝流而上已而下沉如有物掣之或少慢復浮而出凡禱者皆然池上有亭曰格思下有石蒼潭泓澄可鑒又有乳水潭其上路旁有泉迸出山石間凜然如氷潭水順流而溪今堰水入至道宫曲折而至昭慶廟前為弄珠池月池在縣南門外百步舊以火德星照臨之地遂闢此池二賢堂在池北富陽縣放生池舊在縣東丹霞觀左紹興二十年令孫徹建尉韓彥端記後令程珌移置通濟橋上縣壕東至觀山西至莧浦斗門二宣和四年縣令胡紡開今湮塞尚存縣後一帶新城縣放生池在縣西七里折桂鄉寶勝院前唐天寶中置相傳云池深丈餘周二里內有洞下通桐廬江記文邑人孫清記略曰新城杭之屬邑距郡城一百餘里環縣皆山羣峯秀峙勢若奔走往往應接不暇而溪流貫其中方時雨浩浩湯湯驚湍急甚而莫之能禦逮其止也則朝滿而夕已除矣餘波清淺映帶井疆照耀巖谷眀媚可愛自縣之西行六七里有所謂魚池者父老相傳唐天寶中置為放生之所資之圗經深丈餘周二里內有洞穴下通桐江年代深逺莫可稽察縣人名其溪曰葛溪以謂吳方士葛生仙翁曽煉丹于此魚池之山實其結廬之地因創為寺又即其潭為池以放生豈亦取其溪山之勝故耶其牌尚存乃唐人遺迹古號魚池院國朝祥符初賜名寶勝嘗試憑欄而下瞰淵淵乎其深測之凜然使人毛髮盡立雖明可以燭鬚眉而了不知其紀極也意者放生之久變化無窮而神物所寓或在是耶嵗有小旱邑之吏民多禱于此而其應如響今其院宇日以浸廣樓殿翬飛鐘鼓震動宛若圗畫又為亭以枕其上比昔時為壯麗云題詠許廣淵詩天寶當年寺魚池此日存溪移古岸腳殿壓舊山根月照霜鐘逺風開霧閣昏網綸雖廢禁和氣滿乾坤處令許仲蔚詩唐家舊佛祠樓閣影參差魚散不知水流無斷時山光朝暮變人事古今移惟有好生德恩波尚滿池合靈池在縣西六十五里南新鄉上有漁洲山濶一丈五尺深七尺旱禱必應耆舊言其源與天目龍池通三貝山龍池壕山龍池天柱山龍池回源龍池右並在南新鄉碧沼在寧國院唐大中八年建舊名碧沼院咸通十年改碧流院有金魚可愛盛夏水不竭灌田甚廣鹽官縣放生池在縣西北延恩院東南二百五步靈龜池在縣東北六十里或云舊有尼寺今廢顧况有詩靈池在長平鄉審山水旱不盈涸昌化縣放生池在縣西治平寺龍池在縣西六十里大鵠山濶三百畝四旁如葑田嵗旱人攀緣禱雨輒應凡邑禱祈處在龍井院者名龍湫在龍興寺者名龍潭在洞坑山大鵠頭山者名龍池塘城內外沙河塘唐書地理志在錢塘縣舊治之南五里潮水衝擊錢塘江岸奔逸入城勢莫能禦咸通三年刺史崔彥曽開三沙河以決之曰外沙中沙裏沙政和元年郡守張閣標識其處近南有壩頭壩合從土從霸禮部韻略注障水也俗作埧禇家塘在蒲橋軍寨之北禇家故居謝家塘在菜市門外去城三里菜市塘在菜市門外去城百步五里塘在艮山門外尉司衙側蔡官人塘在艮山門外走馬塘在艮山菜市門外地平坦可馳馬故名舊有花栁號城東新路月塘在艮山門外嘉熙間潮水衝決不存今復漲沙就築為塘地宜瓜有周姓者擅其利土人呼月塘周家算筒瓜土塘一在殿司右軍教場側一在團圍頭石塘北沈家塘在北關吳越右僕射沈嵩之故居又呼沈家灣永和塘在仁和縣永和鄉地接古鼎湖白龍潭俗謂之三里險水勢漲溢一遇卯風震蕩則數百頃中瞬息湮沒鄉民患之紹定己丑邑士范武倡為義役捐財以助修築塘成嵗無水患邑宰范光名命曰永和隄記文許參政應龍永和隄記運河有塘衣帶浙水自帝都東北橋鎮薄吳頭楚尾綿亘千餘里關提封者六州帶主管者十縣仁和首當其一郵遞輦運憧憧旁午惟永和隄阻湖白龍潭之險卯風湍流夤夕鼓蕩一有線流則膏腴數百頃瞬刻就浸繄欲經久不拔是豈一日一人之力哉邑有范任二君倡為義役乃悉心討究謂土力屢潰於成也於是率衆僦上築以石椿以松迄成二百五十丈為錢數千緡范君為費獨當什五董視犒賚尤詳焉傍築道民菴給伏臘俾早晏巡繳事無遺慮整如也肇始于紹定己丑之春告成于是嵗良月之望民間曽無勞動之苦公家坐收興築之利談何易哉隄成請記顛末余嘉其賢勞且諗對曰自今之尹吾邑也無橫斂暴賦以蠧民由是吏日貧而民日富既有餘財矣無深刑酷罰以戕民由是役益簡而生益蕃既有餘力矣及今間暇率就斯役用答令德故輸財而不知費盡瘁而不憚勞令不吾強也余亦欣然而思以謂總總而羣雖各有心其于于望望未嘗不基于寬虐之政廉汙之操雖令不從與不賞而勸者抑豈無其故哉今范今尹光世濟其美連躋科級以儒道字民最再課矣始終不擾與民相安宜其一鄉之善如范君學輸武任君學録安世毅然以身其責也吁佚道使民雖勞不怨凡領民社之寄者何獨不然豈直仁和之長獨擅其美永和之士勇于為義耶故書紹定庚宙陽月吉記宧河塘在北新橋之北接連運河大塘長三十六里淳祐七年趙安撫與􅊸修築塘之西又有一塘曰西塘袤十八里抵安溪通四川驛路年深頺圮亦加築治塘下田以萬計舊苦淫潦自是其患遂息餘杭縣北湖塘髙一丈廣二丈五尺源出諸山唐地里志云縣令歸珧所開溉田千餘頃以其在縣北故名北湖查湖塘髙一丈廣二丈在縣北三十五里其源出諸山即後南陽太守搖泰所封之湖溉田甚廣湖側亭址尚存間林塘在縣西亦號魚行塘石門塘尹家塘西南轉西北號為徑頭中隔塘南湖塘右並在招德鄉樓東塘號月塘灣白塘頭東塘東塘壩和尚塘壩聞壩塘下湖塘化彎壩塘西海塘義林壩塘郭家壩塘寺中壩塘陸家壩塘里新壩塘右並在安樂鄉龜邉塘俗呼龜鱉塘塘水界記曰龜五里塘上湖壩塘苧山壩塘沌湖壩塘右並在同化鄉鹿景塘亭子壩塘右並在孝行鄉陶村塘壩姚湖塘壩係湖壩塘插壩塘陳家壩塘石瀨塘黃湖塘祥壩塘塍右並在常熟鄉莊前壩塘前蒼畈壩塘吳山壩塘感塘曹村壩塘夾堰塘右並在長安鄉臨安縣湖塘在縣西北一百五十步吳諸塘在縣東南四里小塘在縣北二里項家塘在縣西三里淨土寺之側於潛縣容塘徐博家塘皂角塘祐塘溫塘徐太家前塘浪後塘墓後塘余三家塘徐五十一家前塘右在豐國鄉十七都以上十塘承接白塔源等處水流接蔭田一百八十五畝元豐塘在長安二十二都鄉承接仦嶺并青塘水流接蔭田一百畝三角令邵中書文炳重浚樂平官塘在長安鄉元豐塘西令邵中書文炳築治清漣上塘去元豐塘五六里令邵中書文炳復興序文令邵中書文炳溪塘水利序古朁縣隋開皇中隸於杭崇岡復嶺回繚重迾水之發于山者六十有三源集而成溪一曰天目之源幽深峻極渟為龍淵三池灑流自北東橫亘而少西路白塔為東溪其北曰眉山之源眉山而西曰千秋之源皆自宣城穿嶺而下過朱村併而為西溪三水奔湍滙于甲子岝崿山之麓合流南注而為紫溪此其大源也餘皆止發于潛之境其來自近而轉合附環邑左右勢傾而南下無以宿水溪行羣山間廣不能三十丈或束而狹則才數尋耳淺灘鳴瀨五日不雨田未病而溪固涸矣昔人視其勢而約之以埭導其流以溉田蓋莫推其所自後之私其利者稍增益之凡為大堰百四十有七所其細流為堰者又二百二十有三所山狹窮處溪流不逮亦疏鑿以為塘然而潛之地山居其六七窮谷之民尺寸所必爭無曠土平澤以廣其灌注凡為塘一十二所而已田事將興勸耕於郊視溪塘之遺迹而申農里之數令政大堰各立長董率共利之人察其決壞而增築之相畎畝之枯潤時其疏瀹而均注之先後有次苐髙下有承接背約則有罰甚則有刑小堰各從民便使自為之或一家得専或衆有私約而不立之長增視其大小如其堰之政總之溉六鄉十二管之田凡四萬九千七百七十畝有竒非溪塘之所及止于此地之傾側山之重而不得盡其利也夫政之本在養民令之職先勸課平素於民相忘而一切之政人從而朘削之嵗儉飢困嗸然恤賑其文茍免而流殍已衆矣潛今視古畿縣富庶而興禮義當為他郡邑倡興廢補弊撫摩惠養庶幾萬分有一於其間而文炳淺短綿薄心知弗能夜思蚤作不敢不力求之邑而考中興之斷簡求之野而得開寶之遺書熟究之而事明參核之而圗具然後隨緩急之宜以次修復民用樂從咸即其舊聮比而籍載之為一論次以存其概異時計議者或有取於斯焉謀重開元豐塘序長安之鄉小嶺之下有塘曰元豐始於治平之元久弗克就元豐三年嵗在庚申令有崔其姓者乃力興之塘成而獲其利嵗月浸逺稍稍就廢愚民茍目前而不遑恤於是盜塘而田經界既正不可復奪而塘之所存隱然成陸矣咨訪耆老求其故而疏闢之取田户百二十家之夫以用其力給其食用凡三十有四日而罷其廣百有四丈其深丈有五尺水由地中翕然泌涌如井之有源混混乎弗竭也於是别為三渠其東之深與塘底直覆以大石鑿方竇廣八寸許塘水自石竇旋轉而下入於渠其西髙可五尺餘為第二渠如前之制又髙五尺纍石為門於二渠之中斫石為板橫亘其下又積石於水門之外釃三流以注之田植板幹以謹其閉縱大旱則啓其中之水門而從之中旱則啓其西小旱則啓其東已泄而復閉逾三日塘水復所盈宛轉無窮視他塘為最其水自地發非山源之注老農目之以均水畎從其實也旁行曲取於三流之分又不止今所灌之田而已也夫天造地設待人而成方其謀之十有五年之久而後克逮今百十有一年之間湮廢者再事之難成而易毁類如此耳不及今求以復之則他日又將不可考矣然猶以並塘之民私以為業勢不可奪而塘不能悉如其舊慮其未幾而復壞也乃申以董齊之約擇其里之善事而可長者凡八人嵗一更之周而復始疏鑿之以時閉縱之以後先繕補之有備固毁之有防條畫具在使其守而弗失則塘之利庶乎其無窮也重築樂平官塘序去元豐而西里許地曰樂平畈受延湖之源而屬于大溪最為斗峻舊有官埭溉並溪之田僅千畝與所謂元豐塘者蓋相為表裏也山溜旁衝注埭澳奔洪暴漲壅河以遏其上流溪源亦激射而埭乃隨壞民力不能致經久之利拱視而莫之救溪涸立待安於旱乾以幸蠲租而已求之十年之近蓋未聞以下熟告也民何樂而為此哉以武斷者或利其私貧弱之害固不遑恤指其埭而名之以官無肯出力以倡義雖然亦可卜知居是鄉者情之不淑而俗之趣薄也往嵗官一用其力志于茍就而謀或未盡既成數月隨即廢壞禾稼就稿特甚他所今耆老咨嗟求以新之於是相與講成敗之故得利􅊣之實乃伐石作址纍石為髙橫絶溪流厚丈有六尺長十有二丈髙與溪岸等木作榥以護其旁使奔流不得齧射而震撼滿其上則平漫而駃之導渠自埭口南東而下渠之兩旁又釃為輔渠六分注均及繇近而逺渠之所屬無不霑溉百頃取具於官而民不為病貧弱喜於一遇而役不以為難今雖幸成視昔為固然決防之患始於蟻穴責之長以謹視嵗補而加勤豈惟樂平之田博此以無憂上下用勸百四十七堰之規相為不朽則異時為政者之所當念也細清漣上塘序渡上濠溪而南為范家塢層山之麓流所瀦曰清漣塘取其淵渟而碧也轉而名清􅘟又止名為蓮傳久而失之也塘之深丈餘東狹而西長南相去略等周廣九十有一丈纍石而為圍之堅髙可以衛水山徑奔流亦不得而衝齧也塘之下鑿渠而深之東流為澳又北東而接於樂延樂延之地聚落延袤别為東西村其専漣塘之利其西又有上塘亦名之以湖漣周廣視清漣塘而有加焉水自地中泉自發越與元豐塘亦略相似别為二渠其一目塘之東經北而下其一自塘之西循村巷宛轉而北又旋而復西水之所及視東渠為頗逺二塘與元豐塘相望隔逺五六里許皆曰就壅不足為旱乾之備而民亦無有告其上者人情可與樂成而怠於興作固應爾也夫不見其害莫知其利長安之人困於薦飢號啼流徒復除賑恤公與私而不振宜如溪塘之利也然視之邈然棄而弗講今雖盡力以次興復而雨暘時序歲適登稔竊懼夫民猶以為徒設而後日之不加修也則終廢而無以獲其利故復申其説以備告之令邵文炳富陽縣烏狗塘在張明府君廟前長七百二十丈溉田一千二百頃清慈塘在張明府君廟側約濶一丈五尺長四十餘丈溉田七百餘畝木瓜塘溉田五百餘畝陽陂塘溉田一萬餘頃濶九頃右在臨湖里朱林在春明里約一角五十餘步孫彥等修溉田三十餘畝新城縣官塘唐地里志云在縣北五里祥禽鄉濶一頃三十畝溉田八頃八十畝一百八十戶又有九澳東山澳西山澳中澳朱家澳亭子澳丁路澳袁都宅澳真堰澳板澳唐永淳元年開咸平二年景德三年重修鹽官縣捍海塘在縣南三里濶二丈髙一丈唐地里志云長一百二十四里開元九年重築淡塘在縣西嘉定間邑南海沙坍增築隄防以障潮水自市境西至秧田廟約六七里其河尚存由秧田廟而南轉西泥沙湮塞舟楫不通惟舊橋故道略可識洛塘在縣北長四十里袁花塘在縣東長六十里鹹塘在縣西南一里與淡塘通有清海亭春秋閲之所令楊天麟建二十五里塘在縣北至長安嵗久不築久雨則河流決溢多為民害紹興九年令陳恕募民浚河築岸廣三丈視舊廣一丈髙三尺甃以石其患遂息人號甘棠隄艦澳在縣西十九里東西一百五十步昌化縣大塘陂塘並在吳安鄉咸淳臨安志卷三十八
