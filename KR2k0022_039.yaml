body:
  text: 咸淳臨安志卷三十九宋潛説友撰山川十八堰城外清湖堰在餘杭門外稅務東裏沙河堰在餘杭門外仁和橋東餘杭縣東郭堰在舊縣之東南渠河上後漢縣令陳渾置堰廢已久千秋堰在縣東南二里會昌二年廢吳越王復置咸平中又廢景德四年令章得一復置號千秋堰亦號新堰斗門政和中令孫延夀以斗門漲沙易衝決築土以防之宣和間以其材修西函斗門邑人云縣之東南惟安樂一鄉地勢下而田畝廣常患天目湍水暴至故昔人開湖以殺水勢築塘隄以防其溢又於溪之南岸作大斗門二千秋堰斗門與西函斗門是也小函二許家壩化函斗門是也溪水漲則下板以防水入溪水退壩中水髙則啓板以泄之旱則修千秋堰以遏溪流令水自斗門入南渠河以灌安樂鄉之田自縣至錢塘界溪流皆深濶不可為堰獨千秋堰有灘水淺可施人力斗門當安樂上流水勢亦順今既廢斗門則此堰亦廢矣紹興初大旱南渠河至斷流邑人頗思新堰斗門之利溪塘鄰新堰之上最當衝激方其決也首􅊣安樂鄉田而邑錢塘崇化鄉田次之欽德招德二鄉田又次之故每加修繕則安樂與錢塘崇化之人併力為之而責篠木於欽德招德兩鄉其後錢塘之人憚於逺役又以安樂鄉居水患之衝恃其必葺漫不加省安樂之人力既不給因陋就寡嵗月浸久故堰易敝臨安縣五袴堰在縣西三里魚躍堰在縣南一里金鍾堰在縣東三里萬庾堰在縣西四里甘棠堰新溪堰並在縣西二十里灌田甚多軋堰長橋堰黑龍堰並在縣東施村猷溪堰龍口石堰並在髙陸沃山堰在慶雲鄉有潭甚深冬夏不竭於潛縣水捺附後塘堰石堰後千堰紅杏青堰青苦堰銅盆堰社木堰楓木堰青木堰泥塘堰喻畈堰陶浮堰謝家堰目源堰右並在嘉德鄉第一都已上一十四堰承接東西天目兩大源水上流下接蔭田二千一百四十三畝波周堰東河村堰何潭堰葛村堰社青堰念叔畈堰吳家前堰金門塢山堰沈堰牌口堰寨山下連接三堰下清潭堰亭子山堰盛堰朱有堰牌口盛堰沈堰勃浴堰元畝堰右並在嘉德鄉第二都已上二十一堰承接天目大源水上流下接蔭田二千五百四十五畝震青堰破坎堰社木堰西堰吳村堰烏勞堰波眉堰烏磚堰杏梅堰小堰麻車堰廣義橋堰右並在嘉德鄉第三都已上一十二堰承接天目大源水上流下接蔭田三百七十畝堰後門堰大何堰上何堰中何堰下何堰大湧堰上湧堰中湧堰下湧堰泥黃大堰波偷堰趙堰泥酬堰社堰何堰梅口堰張堰山堰八畝堰右並在嘉德鄉第四都已上二十堰承接天目大源水上流下接蔭田二千五百三十八畝一角嘉泰三年今朝百談任內嘉德鄉盛逸盛端等爭充堰長事考縣逺年官印押堰簿自泥黃大堰止地名張堰凡作小堰八所分為八捺注水入田皆承天目大源之水上流下接自元符元年戊寅至嘉泰二年壬戌凡一百五年每嵗于農務前每捺各推小堰管頭三名八捺共二十四名同共集田戶修作朝宰遂以自來輪流堰長姓名年載置旁通圗令上五捺田戶每充應兩年訖即輪下三捺田户充應一年並照田畝捺數多寡均差日後周而復始且出給斷由付八捺田戶家收一本永為定規碟山堰湖道堰右在嘉德鄉第五都已上二堰承接天目大源水上流下接蔭田一千七百畝泉水孔捺下丘捺百筧捺下泉捺小大捺新田小捺右並在嘉德鄉第一都已上六捺承接後峴山等處泉水流接蔭田六十五畝眀空寺前三小捺右三捺在嘉德鄉第三都承接天目大源水流入蔭田三十畝店前堰謝直堰瓦窑堰黃泥偃長堰濕嶺堰烏橋堰李家堰捹口堰湖頭堰莊前堰上宅堰石嶺堰何堰烏昌堰冷水髙堰八畝堰插堰江家堰北陳于堰石潭堰曹堰徐邱堰南陳于堰凡石堰石堰長田堰青山堰烏鼓堰右並在惟新鄉第六都已上二十九堰承接千秋嶺大源水上流下接蔭田九百二十五畝朱家堰牛堰官堰小楊堰板堰青山堰平科堰大堰大楊堰棧堰何家堰朱家堰穿金堰陳千堰後墓堰界干堰黃公堰妙樂寺堰朱村小令堰右並在惟新鄉第七都已上十九堰承接千秋嶺大源水上流下接蔭田一千二百八十六畝徐家前堰周浩口堰馬干溪堰烏郎口堰平陀堰波郎堰田溪堰鎖如上下堰波藉上堰右並在惟新鄉第八都已上九堰承接西天目水發源上流下接蔭田二千一百八十畝豐撑堰大干堰橫溪堰壇石堰柴村堰甲子堰秋堰鶴堰陳堰鳯山堰右並在惟新鄉第九都已上十堰承接天目源水上流下接蔭田六千九百三十畝戴家捺石牛水捺小坑水捺吳家捺何長塢捺小坑捺橋頭捺嶺村捺徐家捺徐家前捺髙丘捺大石捺湖老塢捺橋下捺塢口小捺村前水捺支候村捺橋頭捺炭竈塢捺栁瓜口坑捺東山捺廣陵岸捺烏山下捺低溪水捺喏口捺板如嶺捺髙橋捺塘頭捺右並在惟新鄉第六都已上二十八捺承接千秋嶺山坑水上流下接蔭田七百六畝長干捺埂捺撩車捺長橋捺嚮山捺右並在惟新鄉第七都已上五捺承接千秋嶺水流入蔭田八十二畝茶園堰許村堰清家堰雙棧上下二堰水社堰橫路堰泥干內堰東陳堰東山下堰西陳堰山下堰泥侯堰青山堰板堰仦姑堰吳家堰旱堰冷水堰何干堰皂干堰麻園堰野堰蘇干堰吳干堰髙堰徐百岸堰金竹岸堰牌前堰楊岸堰黃土堰朱相堰樓堰黃堰十畝堰姥鴉堰泥杲堰蘭塢堰社墓堰右並在惟新鄉第十都已上四十堰承接大明巖下并昌化縣蘆嶺坑水上流下接蔭田一千四百八十九畝二角青山堰社塔堰池湖堰小青山堰細堰灑堰橫溪堰波稜堰長潭堰天井堰澤河堰黎干堰鴉鵲堰泥香新堰泥秀干堰富坑干堰右並在惟新鄉第十一都已上一十六堰承接潛川波山源水上流下接蔭田一千一百七十三畝下地堰朱吳堰方圎堰波特堰柯婆堰右並在惟新鄉第十