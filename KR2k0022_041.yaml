body:
  text: 咸淳臨安志卷四十一宋潜說友撰詔令二光宗皇帝奬諭獄空紹興三年十一月朕以仁治天下欲俾四方萬里之民舉不犯於有司况於王畿之近哉然而民俗錯雜獄訟繁多未易肅清也維爾眀敏之才通於經術典司天府纍月於兹寬嚴適中决遣無滯狴犴之明遂至空虛使朕好生之德自邇及逺繇汝而始其可無褒乎璽書寵嘉于以示勸守臣袁說友恭跋曰臣紹興三年十一月乙未日所治府圄空按故事騰章以闈丁酉有詔賜臣說友臣局蹐忭舞懼不足祗承休命竊惟聖有謨訓明微定保其垂則逺矣乾道辛卯陛下以儲君領尹事闕端以德善愛著在樂石大哉王言以崇教勵俗為利為具而方略鈎距武健果敢如趙張二王者較乎無以議為也仰惟明謨大訓昭示罔極臣知先後矣惟臣無狀䝉上推擇使得奏薄技于輦轂之下虙自念負此隆寄怵惕以思罔敢一有逸豫則進而親睹丁寧之㫖退而躬誦琬琰之章謨訓昭然所以惠詔後之守臣誠不止臣一人而已繼自今首善之地使民知嚮方廩廪乎興義抵冒狴犴而桁楊徽纆棲置弗用是實陛下昔之謨訓基焉臣恭拜褒綸震悸無措不勝小臣惓惓歸美之私用敢伐石刋載垂億萬斯年謹昧死識嵗月附見于下方云寧宗皇帝奬諭獄空慶元五年十一月商邑示四方之極漢尹分三輔之圖雖發擲先乎肅清然剸裁貴乎靖謐爾挺儒學之茂精吏治之宜方輦轂之下順其規乃狴犴之中決其滯辟以止辟罔紊寬條刑期無刑具宣德㫖使囹圄空虛之效禁網疏濶之風始乎京師及于方夏贊朕有懌繄汝之能載覽露章罙深嘉歎守臣朱晞顔恭跋曰皇帝即祚之五年秋八月臣以駑材叨二冬卿明年夏六月䝉上推擇使待罪輦轂之下十有一月囹圄適空參考故實以甲辰聞奏丙午有詔賜臣晞顔臣凌兢拜誦榮懼交懷竊以帝王之都必據地之要㑹四方朝貢輻輳軫接人物浩穰非他郡比而臨安城闉內外棟宇鱗比數千百萬家九邑𨽻焉訟日紛委獄犴多充牣仰惟陛下臨御以來厲精政治躬履儉約盡愛敬以悅親心建中和以定國是深仁厚澤契合二儀淳聲和氣覃及動植日者泰階平正九扈登成符瑞總至芝産太室遐邇臣庶莫不精白承休矧是首善之地實先天下被化醲郁得諸親見狴犴空虗桁楊棲卧孰肯衝羅陷穽為太平不齒之民自源徂流天下之大幾致刑措斯拱而俟之耳夫王者必世而後仁陛下措刑之效乃創見于六載聖哲之治其應如響此上德所格臣何力之有焉伏讀璽書曰贊朕有懌繄爾之能宓自惟念臣適遭際㑹備數守臣詎敢貪天之功以為已力書不云乎好生之德洽于民心兹用不犯于有司顧臣淺陋無所知識惟誦臯陶稱舜之語以頌陛下臣不勝犬馬心敢昧死對揚天子之丕顯休命勒諸樂石用永詔于億萬世又嘉泰三年正月天府素浩穰比所繕治庶務尤劇卿通明詳練輔以儒雅從容裁剸弗弛弗苛用能數月之間下安其政庭無留訟狴犴空虛朕以好生為德期於無刑首京師以示四方卿之功茂矣載覽封章良深嘉歎守臣丁常任恭跋曰臣仰惟皇朝列聖相承一以仁厚為家法凡事之繫于刑獄者尤謹之重之告戒而丁寧之必期于無刑止辟而後已夫是以民心戴于下天命眷于上億萬斯年無疆惟休皇帝陛下天性仁恕臨御簡寬節已以厚民明德以謹罰年榖豐登而盜賊少禮義興行而爭訟息畿甸之內親承聖化沐浴膏澤雖當祝融為盩之後百役並興人情恬然罔干于正未幾而民務晏樂用奠厥居臣才譾能薄䝉推擇付以彈壓之寄勉䇿駑鈍大懼弗稱仰賴朝廷威德不繩而肅春陽載熙囹圄告空參考故常正月庚申具奏以聞越三日癸亥特睿詔下賜拜恩震悸退而思所以對揚休命竊惟天地之大德曰生聖人之德配天地澤被萬物者以好生之心與造化相為流通也臣欽誦王言之大有好生為德之訓於戲此天地之所以為萬物父母祖宗之所以夀天下之脉傳無窮而施罔極者盡在是矣臣尚何言敬勒諸金石用以風動四方垂憲萬世臣不勝惓惓歸美之誠謹昧死以志又嘉泰四年七月京師衆大之區獄事繁多刑書填委惟剸裁無滯始足以表倡四方卿本以公平加之潤飾從容剖决務得其情迄無械繫之民卒致圄空之效厥功茂矣良用嘉歎繼自今以往期于無刑以廣朕好生之德顧不美哉守臣王補之恭跋曰臣竊惟行都地大人衆實兼五方之俗簿書獄訟視他州尤繁臣以無狀自去冬承乏守吏夙夜奉職惟謹既七閲月三圄告空法當上聞越二日恭拜敕書賜臣奬諭至有本以公平加之潤飾之語衮褒爛然來自霄極顧臣庸陋何足以仰當明詔萬一然臣嘗聞之制治者君也推君之治而致之民者吏也仰惟陛下以仁聖之資履和平之運十有一年于兹矣邇者御便殿録繫囚情有可矜悉從末減好生之念本于一誠民雖至愚觀感而化遷善逺罪用不犯于有司斯祖宗忠厚之澤陛下力行之效也臣幸得布宣德化猶懼或有壅閉湫底以貽罪誅顧何勞之有焉况刑措者帝王之極功微臣其敢隱上之施以自矜幸是用對揚休命敬勒堅珉昭示罔極使四方之分符守土者咸務勉竭以無忘刑期無刑之意庶幾成康之治復見于今日豈不偉歟又開禧二年二月夫刑所以輔治也惟教之未孚民不幸而入於刑非吾有司蔽斷不留審克亡濫則刑者乃將以厲民豈輔治之意哉卿履潔抱公化流京邑憫兹有衆或底罪辜能單厥心濟以明恕俾狴犴無瘦死之苦而國家廣好生之仁任吾牧守之事者不當如是乎覽奏嘉歎曷維其已守臣趙善防恭跋曰開禧再祀春二月府曹椽言三院無留獄臣待罪守吏以其事聞越五日有詔嘉奬申諭至意臣至祗惕受賜則拜手稽首而為之言曰竊惟刑辟踈密吏治清濁其源在乎人主一心而已蓋念慮所發教令出焉風俗繫焉堯舜成康之盛逺矣若漢距秦未久理官法士猶在豪家右姓猶故而跡其當時斷獄稀簡幾及周世矣後稍變革科條益增效為繩切重報瘦死不可勝計豈吏之良暴民之姦頑遽異于前日邪要其感動之機必有以為之先者仰惟皇帝陛下恭儉仁恕根于天性確守憲度責成股肱與一世相安于簡易自踐祚至今垂十三年德流道洽元元䝉被恩厚不忍輕犯郡國長吏審克奏讞亦既哀矜欽恤是體是承至若都內王化所先故獄屢以空告如臣無狀久當用罷軟罷免然猶得為寬大坐以無事復竊龍光以自榮可謂幸矣獨念璽書之頒將以勸厲在臣豈得私有是敢刻諸堅石以顯示九牧諸道且見臣子歸美報上之義又嘉定十一年正月爾以才被選典領神臯馭吏愛民恩威相濟詰姦禁暴犴獄用虛使朕庶幾成康措刑之風爾尚繼趙張尹京之政載披來奏嘉歎不忘守臣程覃恭跋曰臣恭惟皇帝陛下尊臨大寶守之以仁憲章列聖惟刑之恤嘉與元元生養㴠育熙然如春而宣德流化尤自近始二紀以來京邑圄空徹于宸聽形于詔奬紀于信史者凡六嗚呼休哉上以祈天命下以結人心雖間遇飢饉師旅而根本深固邦畿奠枕者由此故也乃嘉定十有一年正月之吉三獄復無繫囚揆厥有元非聖人久于其道而化成曷濟登兹臣幸得待罪內史即以其事上聞陛下不自神聖歸功有司褒札肆頒榮踰華衮顧臣駑下何以稱塞竊讀訓詞而有感于漢之文宣焉文帝斷獄四百有刑措之風史氏擬諸成康信矣宣帝雖以刑名繩下而並稱七制者惟加意良二千石數以璽書勉厲故前有趙張民用歌之成康丕式今與匹休固已廩廩漢文之上若趙張尹京之政臣雖不敏願企慕之然臣聞髙宗皇帝因廷尉獄空嘗形聖訓云今大理寺臨安府近在闕下雖未敢謂刑措然獄訟清簡寃抑得伸惟諸路吏強官弱民無所訴深恐此弊未革大哉王言詩所謂惠此中國以綏四方者是也今天獄屢空施及京兆臣輒不自量敬勒翠珉昭示德意抑以風動四方使嘉定之盛以比隆紹興永永無極云又嘉定十六年六月朕惟京師首善之地宣德流化當自近始德化不洽刑獄滋繁何以示四方萬里哉爾以通儒尹畿甸明恕勤敏百廢具興嚴威不施隱然彈壓之望刑清獄簡用奏圄空斯可為承流者勸矣披覽來章不忘嘉歎守臣袁韶恭書曰皇帝御宇之二十七載冬十二月臣韶猥以駑才䝉恩推擇使得待罪內史越三載夏六月囹圄告空參考故實謹以奏聞越三日有詔賜臣韶臣拜手感誦以榮以懼竊惟皇朝本仁立國列聖繼承明謹獄事期于無刑而後為仁之至恭惟皇帝陛下愛人育物培養此仁行法立制發越此仁根諸一念充塞天地而首善之區始于京師犴狴囚纍必先清肅故有司八上虛圄之奏然德盛仁熟功用昭著厥惟今日乃陛下嗣位之三十年也此正夫子所謂王者必世而後仁易所謂聖人久于其道而化成與向也斯民間有抵冒皆以被恩寬釋為幸今也回心嚮道不復犯禁而桁楊棲卧矣向也官吏推廣聖意皆以承流宣化為幸今也䝉成奉職不待宣布而上德已洽矣猗歟休哉此陛下積纍盡仁之效顧臣何力之有璽書勉勵榮踰華衮臣知陛下將以臣為風厲四方之首抑臣竊觀陛下今日之仁有特化流天邑而羣黎百姓遍為爾德甚至裔夷醜類一見中國衣冠知所愛慕猶不忍傷易遐邇大小咸歸吾仁之內然則天運至此而變禮樂至此而成如刑章不式特仁道功用中之一爾若昔漢君仁恕相傳至四十年間斷獄數百幾致刑措山東父老願觀德化今陛下歷年愈深仁效愈廣當度越前漢追繼唐虞臣敢對揚休命勒諸堅珉以詔萬世禁侈靡嘉泰元年四月風俗侈靡日甚一日服食器用殊無區别雖屢有約束終未盡革今回祿之後凡百官民户起蓋屋宇一遵制度務從簡朴毋事華飾銷金鋪翠並不許服用除先將宫中首飾衣服等令內東門司日下拘收焚之通衢其中外士庶之家令有司檢照前後條法嚴立罪賞禁止貴近之家尤當遵守如有違犯必罰無赦理宗皇帝奬諭獄空紹定元年四月朕嗣有令緒四載於兹比下詔書風厲郡國惟刑之恤汔未能盡稱朕意也京師衆大之區俗習夥繁異時専彈壓事擲發者猶懼弗集矧曰其不留獄惟卿器識宏亮政修訟理五辭兩造蔽斷平停惠心既孚民重犯法囹圄遂空可謂學有本原治出儒雅逹於國體矣樞機所發首善於此余深寵嘉之詩不云乎商邑翼翼四方之極夀考且寧以保我後生尚益助我宣德流化使天下聞風而勸焉守臣袁韶恭書曰皇帝臨御紹定改元臣猥以菲才備員內史囹圄偶空濫叨詔奬臣謹盥手拜手伏讀而言曰帝堯以仁間天下民畏于不罰帝舜以孝聞天下功底于無刑仁孝大端聖人治本措刑之效捷于影響恭惟本朝仁宗皇帝深恩厚澤日照月臨四十二年之間勝殘去殺刑措無用仁化漸摩之至也神聖相繼大業中興孝宗皇帝躬膺授受篤敬事親二十八載之內京圄屢空萬國歡心民知恥格孝道感發之應也是以聖德駿功顯諸廟號編金鏤玉尊稱盛帝仰惟陛下丕纘鴻圖握符闡珍兼堯舜之令美法二宗之成憲博施以仁子育黎庶克諧以孝承歡太極好生洽民心德教刑四海首善京師兹用不犯將見丕冒率土無一人之獄唐虞雍熙垂拱可致貞觀四年之治不足進矣臣退揆玩愒適覩昌期大懼無以仰承明詔敢不對揚聖謨勒諸堅珉自今以始當不一言庸侈億萬載無疆惟休又淳祐元年十月折獄而無宿諾言足以示民信也用刑而不留獄明足以盡事情也京師衆大之區民物殷阜獄訟由是繁滋非通才敏識決擲如神得無沈寃久繫者乎卿尹正神臯敏事而信斷獄弊訟無一淹留曾幾何時即以囹圄空虛告徐有功所謂不越月踰時可致刑措如卿報政其殆庶幾惟豫汝嘉用申異奬守臣趙與􅊸恭跋曰皇帝御極十有八年肇新化絃恢踈憲網中外臣民洗心覿德臣與􅊸待罪京兆未盡三月訟牒稀簡狴犴空虛具遵故實以聞大灑雲章星臨衮宇言足以示信明足以盡情考古證今有奬有戒臣與􅊸拜手伏讀引誼深思于以知化育之妙根本聖心之仁也夫言出于心無乎不信明發于心自無遁情心誠求之不中不逺之謂也恭惟祖宗以仁立國敬獄明刑德洋恩普而尤加意于首善之區皇帝陛下公恕傳心忠厚流化刑書欽恤洞逹淵衷善貸涵洪發端畿甸蓋自臨政以來內史所治凡再以虛圄告臣與􅊸承乏未幾聽訟粗謹有司不犯庶獄遽清聖仁一心應若桴鼓臣與􅊸何力之有焉抑臣與􅊸聞之獄者民之司命也民者國之命也命脉所係保養甚難推不忍之心軫不獲之慮仁術所充仁聞滋廣昭天漏泉則既有其本矣必也撫摩瘝恫躋登富庶閭里樂生海隅從欲訟銷刑措日引月長則四方牧守之責而商邑實居先焉臣與􅊸是以大懼用模聖訓勒諸琬琰神文劃然朝夕觀省嘉與函生服我天子顯命以永無斁共陶至化臣與􅊸不勝拳拳又淳祐十一年正月京師四方之極地大而事難簡民衆而爭易繁狴犴之清自昔所罕在西京有以亷明治京兆稱者僅能使逰徼獄吏不敢妄繫留人而止而卿典刑臯十年乃屢以空圄告豈非慈信之孚民用不犯稽聽之審折獄惟良乃卿素所長故無訟之效掩於前聞耶方春始和草木群生欣欣自有樂意於時覽奏允懌朕心一札之頒姑申嘉奬未足以揚卿美最也守臣趙與􅊸恭跋曰臣欽聞臯陶稱舜曰好生之德洽于民心用不犯于有司夫民之所以遷善逺罪實聖人務德之效非有司折獄之功也故成王祗勤令德而尹正成周者獲遂其止辟之心孝宣任德不純其久㸃京兆者未免于繫治之過德刑之效其要可睹矣恭惟皇帝陛下簡寬忠厚逺輩慮周哀矜臬事欽恤有銘一遇隂陽稍愆必申飭攸司得無桁楊滯蔓以干和氣丁寧懇惻疇敢弗承二十七八年間京師以圄空聞四矣臣非才待罪輦轂十朞于此亦幸再見踈決之清兹惟我后之德臣何力之有乃䝉睿渥寵以褒綸天語燦于春華皇心融于陽澤臣敢不拜手稽首推廣大賜以對揚丕顯休命而臣又聞之民樂其生則自愛民知自愛則無訟安逸富夀孰無此情役簡刑清脉絡相貫是以聖明在上修已以敬視民如傷養其力而和其心民其忍有司之犯乎廣好生之仁成自愛之俗將見星沈貫索草鞠圜扉始于畿甸逹于海內矣臣願乞身歸伏田里與黃童白叟歌詠聖化顧奬厲之訓曷敢私寶謹摹載樂石昭示無窮使承流首善咸和慈信之孚稽聽之審以副陛下措刑之治也元元幸甚戒飭三衙諸閫端平二年八月朕仰惟藝祖皇帝立國以仁維國以義撫民馭軍恩威不相掩用能賦民養軍而民不憚整軍衛民而軍不怨經制一定國勢奠安慨慕風烈常懼弗逮間者惠陽建安京口髙沙之軍蠢為不靜以駭民聽雖怙終必戳迄申邦憲而事非獲已痛切朕躬夫三綱五常之理在人未始泯絶彼其忘平時撫養之恩背理捐生而以衛民者厲民豈盡本心哉有司奉令不䖍故其病於掊尅而饑寒之不免困於力役而休息之無期鬱悒於阻遏而赴訴之無所殆非一日亦惟朕之不明有以致之詩不云乎祈父豫王之爪牙胡轉豫于恤內而三衙外而列閫暨諸軍主兵官其各體至意上下交飭訓禮示信威以警其玩而恩以恤其私使人人自愛相安于紀律而國勢張時維汝嘉狃故必罰朕不敢赦守臣顔頤仲恭跋曰臣仰惟皇帝陛下更新聖化總攬威權撫民馭兵恪守家法乃者戎行失律斧鉞肆加國法伸而大分明天威振而羣動息然且謙冲懇惻誕布綸言引咎責躬不忍歸過于下臣待罪京邑跪捧璽書感涕橫集惟昔人主所恃以立國者曰民與兵而已民不安其生其責在上不在下兵不安其分其責在下不在上責在上仁以恤之責在下義以裁之百姓有過在豫一人士不用命則拏戮汝其來古矣敬觀國史具載聖謨粵自藝祖開基太宗混一真宗仁宗繼體守文雖太平極盛之時其間豈無動容變色之警獨淳化中李順以窮民擾蜀勦平之餘罪已有詔若咸平至慶厯間劉旴王均韋貴王則􅒰皆以武夫悍卒干紀亂常迄就誅鋤毋煩申諭蓋民之與兵其事不同前聖後聖處置各異今陛下既以真宗仁宗所以待兵者裁之于前乃復以太宗所以待民者恤之于後躬自厚而薄責于人可謂仁之至義之盡也天地之德父母之恩宜如何報哉昔祈父職廢詩人譏之祈父掌封圻田兵爪牙不恤誰執其咎明詔及此蓋欲以京都為諸夏倡也臣敢不佩服訓詞朝夕砥礪誓同樂石永保無磷凡中外介胄之士拜手觀省自今以始既敬既戒共武之服豈止守城郭封疆為不二心之臣而已哉書家語賜守臣嘉熙四年孔子曰政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬寬猛相濟政是以和詩云民亦勞止汔可小康惠此中國以綏四方施之以寬也毋縱詭隨以謹無良式遏寇虐憯不畏明糾之以猛也柔逺能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也守臣趙與歡恭跋曰嘉熙四年十月二十有八日皇帝陛下親灑宸札援家語正論解孔子所善鄭子産之語賜臣與歡仍宣諭曰朕嘗觀鄭子産之為政在乎寬猛相濟卿必有取于斯就書以賜臣敢不夙夜對揚聖訓蓋自端平丙申嵗明禋後三日臣始被命承乏天府至是凡三尹矣臣竊謂立政動化莫尚于中和推而行之守臣責也昔王褒為益州刺史有中和樂職宣布以發揚大漢風化國朝孫沔趙抃守杭或以名堂或以賦咏慨想前猷俱得于寬猛相濟之義臣心竊有契焉載惟子産之政固非姑息以為寬亦非苛虐以為猛其相國而以禮其救世而鑄刑書使都鄙有章廬井有伍是豈姑息之為至于存鄉校以師善焚載書以安衆用乘車以濟人又豈苛虐者所能哉嘗語太叔唯有德能以寬服民其次莫如猛太叔繼之不忍猛而以寬逮其多盜殺之乃止凡前日不忍者至是而忍焉臣是以知非猛無以遂其寬而猛非子産之本心也先儒葉適謂其弛張豫奪雖有芒鍔不可犯而委曲從物以待其定乃子産政體也然則太叔之不忍無亦輿人一年而誦者歟太叔之所悔輿人之三年而誦者歟孔子又嘗稱子産有君子之道而斷之以養民也惠使民也義則其察之亦審矣使子産而親見孔子所以增益其德政將不止是夫以同時之賢如太叔猶未能盡知其心唯孔子之聖雖不同時而能善之又閲數千載而陛下揭之以為訓陛下之心視孔子之心一也臣昔誦先聖之語今也親見聖人而師之顧非幸歟敬摹宸札勒之堅珉不競不絿不剛不柔布政優優百祿是遒和之至也臣願廣中和之大化抑俾來者咸遵聖訓云聖節戒敕烹宰淳祐八年朕惟誕節放生祝夀乃臣子忠愛錫宴食品自有彛式如聞州軍縣鎮緣此廣務烹宰殊失好生之意今宜戒飭不得多殺物命一如景祐三年詔書務令遵守仍於所在放生池刻石守臣趙與􅊸恭跋曰臣恭惟皇帝陛下繼天立極德遍埏垓與物為春恩被動植乃者特以流虹誕節親灑宸奎戒飭藩方毋廣烹宰十行一札雷厲風飛萬類羣生海涵春育大哉王言德至渥也臣叨守京邑職在布宣百拜雲章歡呼抃舞臣竊惟帝王一心越宇宙而同關鍵厯千載而一日心者何仁是也仁者天地生物之心人得之以為仁凡有此心均有此仁特其梏于氣禀之偏物欲之私不能廣而充之耳惟夫帝王此心與天地一清明純粹一毫不雜流動充滿宇宙皆春堯仁如天舜德好生禹之懋德而鳥獸咸若成湯之網周文之沼皆是物也於皇我朝以仁立國列聖傳心上貫三五一以神武不殺為務逮我仁祖心德渾然善推所為舉斯加彼器玩戒龜筒之取禁饌徹羔羊之供宴錫乾元詔蠲豐典四十二年之始仁道大成布濩流行端由心始繼繼不絶以逮今日陛下實緝續熙廣之臣恭想聖衷惻隱天語將形此時此心真見同宇之內含生之倫蠕肖翹跂行喙息莫不自吾仁生意中來也淵乎懿哉陛下此心即祖宗之心堯舜禹湯文之心天地之心也是心也可以回世運可以續天眷可以開太平兹乃宗社萬億斯年無疆之休臣敢不恪遵聖訓仰體宸慈遍告畿邦俾承明式臣已載新堂宇祗奉皇文中拱德生前揭泳飛奎畫昭回金碧交映乃百拜稽首敬與都民登諸樂石以彰天地施生之德以衍國家盛美之傳使嵗嵗祝堯後天罔極顧不偉歟今上皇帝蠲嵗貢景定五年十一月時未改元京師諸夏根本民氣宜紓先帝罷諸行厚之使弗困也嘗云帥漕兩司既無科抑難應供需他日必有復為民病者除祖例內庫窠名外合蠲近例嵗貢以補助其乏闕然後可以責其不病民事惜未行所當繼志以副先帝培護根本之意守臣趙與訔恭書曰臣聞發政施仁文王是也繼志述事武王其達孝矣乎以文王為父武王為之子可謂聖繼聖明繼明矣然文謨之顯顯于丕承之烈此下武之所以美武王也恭惟先皇臨御九有踰四十年厚澤深仁庶幾仁祖猶慮科抑重困斯民申飭攸司悉行蠲免端原正本意實有在嗣天子龍飛之始奉先思孝仁意流行涣發德音停省貢式獨存惟正之供詔㫖春溫信令雷厲實億萬生靈無邉之福豈止為本根培植之地而已真宗皇帝咸平二年宰臣述登極以來寬恩請宣付史館上曰先帝方欲行之朕承先志耳孝宗皇帝紹興三十二年賜御札戒京兆守臣以京邑風化所先久聞循例掊取民間務結私惠自今供饋營辦一切停免聖謨洋洋此家法也昭哉嗣服繩其祖武於萬斯年受天之祜敬拜手載賡是詩以讚改元維新之治刻之堅珉以夀方來奬諭獄空咸淳五年正月刑期於無刑訟必也無訟凡為爽鳩氏者之所難也爾奮繇學館尹正神臯乃月正元日能於地大物衆之區而奏圄空之效豈其得大無訟之㫖用以成我無刑之治惟乃之休則豫以懌明道間程琳尹開封嵗中十獄空者四五今爾能以三獄而空儻復能一嵗常空罔俾程琳専美於前矣尚其式敬以長我王國則豫一人益汝嘉守臣潜說友恭書曰臣恭惟皇帝陛下昭受上帝之命子育兆姓克綏厥猷乃臨御之六年春王正月京師以獄空聞凡厥旄倪蹈詠仁聖咸曰好生德洽兹用不犯于有司自時中乂以及于萬邦自千以始至于千萬嵗皇乎懿哉天以陽長養萬物之道也臣幸得待罪尹正宣鬯皇風治朝清明上備響答䝉賴休澤僅復逭于放紛而何力之有璽書於煥嘉匪其能大懼不克勝荷以隕越于下臣愚竊以為聖德之盛雖不自居至誠之著有不可掩若昔周書立政一篇始陳庶言庶獄庶謹而終獨曰勿誤庶獄重之至也厥後迄至囹圄空虛則亦惟成王之德與周公之功有司牧夫奚與焉矧周告太平適當今日而其效丕應若此作周匹休于斯為盛臣何幸身親見之若夫明道開封之治臣于琳何能為役敢不夙夜祗若休命且載諸不朽以告來者曰兹惟聖天子措刑第一銘又咸淳六年正月我國家以忠厚立國汪汪乎丕天之大律列聖繼厥理罔不敬於庶獄庶謹永惟京師四方之本浩穰於三輔尤為劇民輕犯法狴户滋豐於是開封尹有以圄告空者常制詔寵褒之以風厲天下然而不屢見也朕承先帝休德不忘元元乃者元日深詔執事唯恐有寃失職者卿以經術自輔其政能沃其所滯是能應于欽敬之意去年奏上繫無留文矣今又復然章聞于聽朕甚嘉之卿自尹正神臯居多善狀如代輸民租修復酒政一是廉之推也夫吏廉則法平政所蓄也使郡邑之間皆如輦轂吾民其庶幾乎守臣潜說友恭書曰臣說友恭惟皇帝陛下仁洽道豐克肖天祖宗之德乃月正元日皇極之敷言用訓于郡邑長吏欽恤一意尤懇懇焉臣屬典京師實倡萬國大懼無以稱塞上命竊惟古者四郊之獄王公三公㑹其期漢三輔辭訟者率至公府方今乾坤軒豁民氣無所湫底黃屋清問上台聽成咸庶中正放之四海而凖臣幸得親承聖化謹厥攸司戒百石吏毋妄繫留人于是圄告空如昔嵗先民有言曰此上德所格非尹之功臣獨何人洊被褒寵竊窺詔㫖或者托是以風于有位若先帝訓廉謹刑之意云耳敬刋之琬琰永配二銘以彰謨烈之盛庶其夙夜祗命無斁又咸淳六年七月朕寅念先帝在宥四十一年一是以仁厚誕保受命民深詔有司之牧夫俾弗誤於庶獄京師衆大之地獄訟素號繁滋而嘉熙淳祐間獄以空告者比嵗叠見夷考其時前後尹正實二人焉卿以通務之儒彈壓輦下比及二年囹圄空虛至於再至於三敻掩前聞矣夫刑獄不能無也惟片言以折則獄可空惟明謹不留則獄可空卿發擲敏剖决平不戒以孚民信之矣獄之屢空也固宜朕惟王畿四方之本褒詔數下非徒旌汝也蓋將使庶邦勸于朕欽恤之意守臣潜說友恭書曰臣恭惟皇帝陛下祗承先帝休德數敕有司務行寬大而禁苛暴以為中都官獄天下圭表庶乎屢空則猶有成康之遺風焉在易旅受之以巽且上順道而下順命巽之象也旅明謹不留蓋率由此而臣禀卬太和莫克宣究不自意期年之內申命重加寵之實非鄙臣所能堪稱抑臣伏讀明詔及于勿誤庶獄之㫖若稽周公諸書此最後作夫不有洛誥焉有立政繼自今長我王國至于萬年永保民盛哉鑠乎越不可載已又咸淳七年正月朕聞在唐虞時則畫象而民不犯在成周時則虛圄而刑不用蓋比屋可封人有士行治日多而厯年久朕甚慕之卿自尹神臯三年于兹獄以空告者四發摘精而慝罔伏剖决敏而繫不淹朕心用貺抑嘗觀古之人命司徒敬敷五教正月則施教法于邦國都鄙凡厥庶民乂于棐彛靡有抵法冒禁之事刑期無刑辟以止辟直易易耳朕乃者命卿二版部即古司徒職也倡九牧以阜民典京師而首善繼自今將使天下斷獄稀少豈但屢嵗獄空獨見於輦下庶丕愜于朕志守臣潜說友恭書曰恭惟皇帝陛下至德溥大與天同流先春而後秋篤近而舉逺古者六卿之獄在國中卿士旬而職聽于朝昭其重也然其治迄至囹圄空虛則以先王之教仁漸義摩又有師保萬民者為之卿老使之日遷善逺罪而不知始自邦國達于都鄙若司徒所施特教之粗焉者耳今明辟哲輔比隆成周而宣究非才適逢盛際用能于三年之間四以無繫留告亦惟化成習美之效至聖不居推之臣下輒加賜金書以勞之臣狎被寵恩大懼弗克勝荷敢因詔㫖稽諸周官推本措刑之盛使天下知風之自云咸淳臨安志卷四十一
