body:
  text: 咸淳臨安志卷四十三宋潛説友撰秩官一班孟堅表漢百官其前敘次職分如左右內史京兆尹左馮翊右扶風以至太守二千石建置沿革之繇具是矣而表止於內史三輔官氏遷免太守弗及也詎不謂京師非郡國比書法宜爾耶或曰臨安視漢三輔自中興始前是為守者何以得書曰固之表為一代作今之志為一郡作弗得而略也然則為守者皆以事繫人又何以特詳曰嬴劉而降悉本史傳中興以來金匱之藏尚袐也固所書一百二十餘人有傳者什三表其人於此而著其事於彼今諸所載耳目可睹記者不班班見乎雖然時有古今事有詳略而是非之實昭昭然著於此心之靈有不隨方册存亡者嗚呼是可以觀矣敘秩官封爵考淳祐志牧守止載錢唐侯朱雋且謂其它封國若富春於潛之類並見郡縣升革此不載今按漢制封爵有二等曰王曰侯王則掌治其國有內史以治國民自景武以後惟得食租稅不預政事成帝時又省內史更令相治民如郡太守侯則専以賞功勞大者食縣小者食鄉亭所食國令長皆名相主治民但納租於侯以户數為限合是而觀則如錢塘侯之類不過寵以爵秩厚以租賦實未嘗涖其地治其民得列於牧守也全琮孫德嘗封錢唐侯周魴嘗為錢唐侯相蓋漢制之舊晉氏之初封建諸國略同漢制如嶽如晏皆嘗王吳合用漢荆吳例其他以縣與鄉亭封侯者既於民無關亦於事無考法不當書書之則亦不勝書也如前所載孫全二人皆淳祐志所無故志得以略餘見內史考內史考漢以王國內史治民實為郡守之職杭屬荆吳內史合見於表惜氏名無傳自濞以後國遂為郡至晉復以封諸王仍改太守為內史職官志所謂諸王國以內史掌太守之任是也故今一據正史凡為內史者悉纂入牧守以補前志之闕然晉世子弟封吳者不過二王晏自太康之末訖懷愍終凡二十餘年其以內史見於紀傳者僅顧袐一人嶽一嵗即他徙其時內史亦僅庾冰而已顧庾之外史不絶書而以王封吳者並無所考始嘗疑之反復紀傳參稽旁證然後知晉自置內史以後常與太守通稱不必盡有王而後有內史故作史者亦復互文具見如西晉之顧祕紀書為吳興內史傳則書吳興太守均起義軍討石冰一事也東晉之王珣紀書為吳郡太守傳則書吳國內史均遷為尚書僕射一時也諸如此類甚衆則是晉制又有不盡與漢合者乃若漢省內史而以相治民蓋綏和以後之製東漢因之班史於循吏傳序概以刺史守相為言且引仲舒相江都與京兆內史𢎞寬並論固東漢人也習見當時侯相事故云爾因并著其説都尉考漢因秦舊郡置守尉監守掌治民秩二千石尉佐守典武職秩比二千石景帝中二年更名守為太守尉為都尉是時守尉之職判然不侔淳祐志乃以會稽都尉任延禮髙年興教化宜為牧守之祖固不害其為善善之意惜未深考漢制耳武帝時嘗以吾􅉌夀王為東郡都尉不復置太守賜璽書有謂任四千石之重師古曰兼總二任故云蓋都尉或行太守事自前漢已然惜延傳軼之其後明帝時宰鼂以會稽都尉三國時朱治以吳郡都尉皆行太守事宋百官志謂漢末及三國多以諸郡都尉為郡殆有考於此故今止載任延以下三人而後此都尉史不明載行守事者皆弗録吳吳興二郡考晉宋齊梁不置郡錢唐令富陽令鹽官令新城令並𨽻吳郡餘杭令臨安令於潛令並𨽻吳興郡此淳祐志所書也其意蓋以吳郡為今平江吳興為今安吉皆非杭境故二郡牧守皆闕弗著竊謂不然牧守有所治縣有所統縣以所治言之則吳之治吳吳興之治烏程似與今之杭無與以所統言之則錢唐等四縣之𨽻吳餘杭等三縣之𨽻吳興實同此牧守也所治得書所統不得書則未置吳郡以前亦會稽所統舊志尚以會稽西部都尉任延為牧守之祖而吳郡吳興太守反外之於他郡可不可歟必謂都尉治在錢唐所以列於本郡則考之漢志會稽凡兩都尉西部治錢唐南部治回浦延傳但書拜會稽都尉安知其必為西部耶志者乃直書西部以遷就其説尤不可也沈約志宋州郡有云地理參差由名號驟易境土屢分一郡一縣亟有離合尋校推求未易精悉誠哉是言然郡之分合雖不同縣之𨽻屬猶可考蓋郡之牧守即縣之所事長吏也倘専以今之平江為吳郡安吉為吳興而謂非今之杭則是當時牧守教條不及於錢唐餘杭等七邑豈理也哉又嘗考之自陳後主置錢唐郡隋文帝廢郡置杭州煬帝又改杭州為餘杭郡然後舊𨽻二吳之邑始専屬杭而吳之為蘇吳興之為湖亦於此時相先後而置杭與二吳遂各為封境非四代時比矣故今所志凡四代間守二吳者其名氏事迹以七縣嘗𨽻屬故悉據正史網羅放失詳著於篇庶覽者無遺憾焉古今郡守表舜咨十有二牧揚州居其一杭𨽻焉三代之世當因而不改但名氏皆無傳史稱夏少康封庶子於會稽以奉禹祀披草萊而邑猶未通於上國至魯定公時其後曰勾踐始見春秋傳雖稱越子經止書於越亦未得列於諸侯也若其疆域則有可考證已見郡縣沿革今所表斷自秦分郡置守始九江志亦用此例世紀沿革名氏事迹咸淳臨安志卷四十三
