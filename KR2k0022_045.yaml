body:
  text: 咸淳臨安志卷四十五宋潜說友撰秩官三世紀沿革名氏事蹟齊右自東漢尹興以後至陳末陳伯謀並採托正史增入其僅存氏名而嵗月事蹟無可考及雖有事蹟而臣節有虧者並不録但考之吳興吳郡二乘所載牧守頗多皆雜取他傳記與今志凡例不同又恐觀者以為遺軼悉附載氏名於後若此有彼無者吳興二十人吳郡十四人吳興王羲之謝琰虞􅔎周鎮胡嚴王胡之孔坦孔廞袁琇周札周莛王坦之顧衆陸統江蔚車嗣殷康沈嘉何楷以上晉人禇彥回謝莊邱道護謝淡謝述張崇之蕭慧明殷冲袁思道孔山士沈道思以上宋人袁洵袁昻蕭慧休袁彖王瑩楊文崇以上齊人元仲景張僧繇王騫信都遵蕭猷文皇帝蒨夏侯桓衡陽王昌孫廉杜龕周敏齊明帝蕭鸞王彬以上梁人錢道戢徐綜周文育周䂮周寶安任忠沈欽以上陳人吳郡譙敬王恬沈充傅盛王恬導之子王洽卲之子王卲導之子王謐導之子魏詠之顧含郗鑒殷祐劉牢之張茂賀循應詹魚檀王愷王允之王侃虞潭樂謨張敞以上晉人袁珣張懷栁世隆王誕王思逺禇淵禇澄淵之弟張充南康縣侯子恪江斆王規李元履江革袁昻以上宋人王僧智梁人裴异永陽王伯智衡陽王伯信以上陳人唐右並据前志參以新唐書重行考訂間有增損其名氏雖存而嵗月事蹟無所考者自當用唐以前比例但既見前志姑附著於後相里君造虗白亭元藇之河南人右司郎中作冷泉亭裴常棣河東聞喜人兵部郎中作觀風亭杜陟陸則李幼崔鄯貝州武城人路異殷亮給事中韋敻京兆杜陵人虞部郎中崔恂鄭州人水部郎中獨孤嶼洛陽人侍御史李士挹宗室封亮渤海人司封員外郎雙士恪天水郡人右武衛大將軍定相二州總管杭州刺史吕國公薛自勉河東汾隂人司勳員外郎薛瑩河東汾隂人盧涇范陽卓縣人楊行矩上蔡人栁德義河東人史令卿建康人祠部郎中杜信京兆人刑部員外郎李覯裴珏劉暹字士昭李幼公姑臧大房李力牧百藥族張㝏崔元奬清河大房吏部侍郎崔涓博陵人咸淳臨安志卷四十五
