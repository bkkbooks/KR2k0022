body:
  text: 咸淳臨安志卷五十宋潜說友撰秩官八兩浙轉運二浙自錢氏國除太平興國三年五月始以刑部郎中楊克遜為西南路轉運使宗正寺丞趙齊副之祠部郎中劉保勲為東北路轉運使拾遺鄭遜副之至道三年分天下為十八路兩浙合為一獨得視京東西等並置使副或皆為使或皆為副或為同轉運使或以一員為判官熈寧七年檢正沈括乞分為兩路於杭州置司詔從之建炎四年車駕所幸未有定居乃於東西二使之外添差一員專一随行在應辦錢糧以方孟卿為之又以李承造為劉光世隨軍轉運未幾省至紹興二年添差亦罷淳熈初始置一員或除運副或由判官而陞至今為定制㕔壁有記則自紹興三十二年陳副輝始訪政和以來之氏名刋之石二浙之廣列城十五生齒百萬素號劇部粤自太上皇帝翠華南幸駐蹕錢塘視猶畿甸而漕輓之計責任尤重在位三十六載之間凡推擇者六十有一人肆我主上嗣歴之初眷求外臺之寄輝以不才誤膺是選且獲繼先大父遺躅於四十年之後敢不以榮為懼夙夜黽勉誓殚駑力庶幾圖報萬分之一越明年職事之暇因訪向來歴是官者名氏爵里而題記莫存深懼闕典於是搜閲案牘詢諸老吏嵗月逾逺莫能盡究姑得自政和中應公安道始謹刋石用告來者若輝亦得以托附諸公之末預有榮焉淳祐中呉大監子良作續記曰轉運轉運粟與蒭耳而轉運之職纔若是止乎轉運監司也民利病俗媺惡當廣問細籌訟牒朝暮四面集當燭情偽雪寃枉寮采賢不肖雜襲吏胥或恣横為公私蠧當區别澄汰所兼領郡縣學當新士習振儒風值科詔下當遴擇所部官精考校為國家得士是為布宣天子徳澤是為不負臨遣之意是為轉運之職最大最要者况兩浙三輔地轉運號畿漕對天威咫尺逈不與諸道等然則轉運粟與蒭而止乎顧今之論不但曰粟與蒭又轉而曰畿漕職應辨何暇乎其地上而宫禁次而省部臺寺征需百出片紙下指呼叱咄奔命不容喘下至百司厮吏動挾持以相撼撓旁而游士異色人亦闖伺駢闐扣請少不如意譁讕輙瞬息起財計伸縮不問事可否不問甚或例有無不問為畿漕者心緒絲棼惴惴慄慄左右應無休時專務彌縫為圓熟以逃譏謗敝司存不問敗名檢不問用無以給則朘膏民血不問且既敝精神於此則實無暇乎其他而所謂職之最大最要者亦一切置度外不問嘻是固勢使然邪淳祐五年天子方改紀厲精而畿漕凡三易最後余以愚戇被選三辭不獲命既眎事念生平讀古聖賢書於職之最大最要者何敢矌不力而事隨日改諸應辦亦惴惴慄慄幾殆頼天子聖明廟朝主公論未遽以辠斥雖然由前之説則後之過未易逃由後之説則前之責未易塞以余之愚戇惟二説昧昧弗克究是懼尚堪乆此哉睨庭下二石書前人名氏適遍増一石而三之余名字乃居首益慚赧因其二説鑱焉庶幾有能於前之説又能於後之説者旦夕至而余可以去矣應安道政和五年王汝明劉既濟詹度蔣彛李祉傅其傳胡陳建宣和元年蘇莊宣和二年王復宣和三年王仲閎宣和四年胡直孺宣和五年孟庾宣和五年李堯夫宣和六年曽讜宣和六年程昌弼宣和七年李弼孺宣和七年顔彦誠靖康元年呉昉靖康元年黄敦書靖康元年劉䝉建炎元年范沖建炎元年運副王琮建炎二年運副劉寧止建炎二年添差朱異建炎二年添差成大亨建炎二年運副陳國瑞建炎三年運副李承運建炎三年運副徐康國建炎四年運副方孟卿建炎四年添差李承造建炎四年運副曹紆建炎四年運副劉寧止紹興元年運副盧知原紹興元年添差運使梁汝嘉紹興二年運副馬承家紹興三年運副張致逺紹興三年運副孫逸紹興三年運判王俁紹興四年運副李謨紹興四年添差運判呉革紹興四年運副朱縡紹興五年運副李迨紹興五年都運張澄紹興六年運使張匯紹興六年運副向子諲紹興六年都運汪思温紹興七年運副呉革紹興八年運副梁澤民紹興八年運判蔣璨紹興九年運副林正紹興十年運判張匯紹興十年運副黄敦書紹興十一年運副王㬇紹興十二年運副張叔獻紹興十二年運副李椿年紹興十二年運副王鈇紹興十三年運副趙伯牛紹興十四年運副呉坰紹興十四年運副錢端禮紹興十五年運副湯鵬舉紹興十六年運副沈該紹興十七年運副唐道紹興十七年運副曹泳紹興十八年運副榮薿紹興二十年運判曹戩紹興二十年運判趙士餐紹興二十一年運判張匯紹興二十一年運副趙不羣紹興二十二年運副李莊紹興二十二年運判韓璡紹興二十三年運判黄然紹興二十四年運判鍾世明紹興二十五年運判閻彦昭紹興二十六年運判陳璹紹興二十六年運副張僖紹興二十六年運副李邦獻紹興二十六年運副趙子潚紹興二十七年運副楊沂紹興二十八年運副錢端禮紹興二十九年運副黄仁榮紹興三十年運副吕廣問紹興三十年運副林安宅紹興三十年運副王時升紹興三十一年運副龔濤紹興三十二年添差陳漢紹興三十二年運判陳輝紹興三十二年運判朱夏卿隆興元年運副黄仁榮隆興二年運副陳作隆興二年運判薛良朋隆興二年運副姜詵乾道元年運判方滋乾道元年運判王炎乾道元年運副周淙乾道二年運副劉敏士乾道三年運判姚憲乾道五年運判吕正已乾道五年運判胡昉乾道六年運判沈度乾道六年運判胡堅常乾道七年運判沈复乾道七年運副沈度乾道七年運判曽逮乾道八年運判張宗元乾道九年運判吕搢乾道九年運判胡堅常乾道九年運副吕正已乾道九年運判陳峴淳熈二年運判趙磻老淳熈二年運判呉淵淳熈三年運判韓彦質淳熈五年運判燕世良淳熈七年運判呉琚淳熈七年運判九年陞副再任朱佺淳熈九年運副景秉淳熈九年運副張枃淳熈九年運判十一年陞副除知臨安府錢冲之淳熈十一年運判十二年陞副趙不流淳熈十二年運判十五年除知臨安府丘崈淳熈十四年運副鄭汝諧淳熈十四年運副景秉淳熈十五年運副潘景淳熈十六年運副紹熈元年除工部侍郎沈詵紹熈元年運判三年陞副王厚之紹熈四年運判黄黼紹熈四年運判五年陞副慶元元年除檢正沈詵慶元元年運副王溉慶元二年運副趙師􅋷慶元二年運副三年知臨安府趙善慶元三年運判四年陞副韓邈慶元四年運判五年除戸部侍郎趙善堅慶元五年運副六年知臨安府沈作賔慶元六年運副嘉泰元年除工部侍郎葉簨嘉泰元年運副二年除戸部侍郎趙彦勵嘉泰二年運副三年除太府卿陳景思嘉泰三年運判四年陞副顧熹嘉泰四年運判宫觀詹徽之開禧元年運判二年除軍器監廖俁開禧二年運判程凖開禧二年運判史彌堅開禧二年運判三年陞副十二月初三日知臨安府孟猷開禧三年運判嘉定元年陞副二年除刑部侍郎陳耆夀嘉定二年運判黄犖嘉定二年運判三年除太府卿劉彌正嘉定三年運判四年陞副五年除太府卿呉鏜嘉定五年運判六年陞副七年再任八年除觀察使趙時侃嘉定八年以知臨安府兼權一月免章良肱嘉定八年運判十年陞副十一年除宗正少卿趙伸夫嘉定十一年運判十三年陞副沈皥嘉定十三年運副十四年除太府卿丘夀雋嘉定十四年運副十六年除太府卿朱在嘉定十六年運副寳慶元年除司農卿趙崇龢寳慶元年運副三年再任除工部侍郎陳宗仁紹定元年運判四年除司農卿林介紹定四年運判趙汝憚紹定四年運判衛樸紹定四年運判六年陞副趙汝捍紹定六年運判端平元年除倉部李日邁端平元年運判二年知寧國府顔頥仲端平二年運判是年知臨安府趙與􅊸端平二年運判三年知慶元府趙以夫端平三年運判十一月除左司林申端平三年運判除兵部王埜嘉熈元年運判二年知建寧府曽頴秀嘉熈二年運判三年除左司趙崇賀嘉熈三年運判四年宫觀項容孫嘉熈四年運判除右司王埜淳祐元年運判宫觀魏峻淳祐元年運判二年陞副三年除右司兵部侍郎袁立儒淳祐三年運判五年陞副黎安朝淳祐五年運判趙汝暨淳祐五年運判呉子良淳祐五年運判六年除左司郎官尹煥淳祐六年運判七年除左司章大醇淳祐八年運判八月陞副知慶元府余天任淳祐八年運判九年陞副十二年除權工部侍郎翁甫淳祐十二年運判七月兼知臨安府王克仁淳祐十二年七月除運判寳祐元年四月陞副二年十一月除寳章閤待制兩浙轉運使三年九月除户部侍郎兼知臨安府徐㮚寳祐三年九月除副使四年十二月除權戸部侍郎兼知臨安府饒虎臣寳祐四年七月除副使五年十二月除禮部侍郎趙孟髙寳祐五年十二月除運判六年除副使葉隆禮開慶元年十月為運判十一月知臨安府陶熾開慶元年十一月為運判景定元年五月除大理寺卿洪燾景定元年五月為運判九月陞副使十一月除户部侍郎知臨安府趙與訔景定元年十一月為運副二年五月除寳章閤待制知臨安府魏克愚景定二年五月為運判十一月陞副使三年五月除太府少卿兼知臨安府趙與可景定三年五月為運判八月罷呉勢卿景定三年八月為運判十一月陞副使十二月致仕季鏞景定三年十二月為運判五年二月知紹興府趙與訔景定五年為轉運使十一月除戸部侍郎知臨安府胡太初景定五年十二月為運判咸淳二年除太府卿趙崇絢咸淳二年二月為運判十二月除淮東縂領潛説友咸淳二年十二月為運判三年七月陞副使四年閏正月除司農少卿知臨安府常楙咸淳四年閏正月為運判十月陞副使五年五月除檢正兼權戸部侍郎曹元發咸淳五年八月為運副六年八月除檢正兼權戸部侍郎趙與稙咸淳六年八月為運判七年八月陞副使十一月除戸部判官知臨安府呉益咸淳七年十一月為運判八年五月除戸部判官兼知臨安府洪起畏咸淳八年七月為運判十月罷朱浚咸淳八年十月為運判倅貳北㕔大平興國杭歸版圖倅與守俱置至建炎庚戌以後名氏始有可次第者乾道元年通判胡堅常為壁記官府有題名古也郡有倅貳亦古也臨安為郡東南第一都㑹湖山之勝妙絶天下承平盛時風俗絶厚獄訟稀少視比他州為樂土前此良二千石如唐白傅國朝蘇翰林其政事妙敏如庖丁解牛奏刀砉騞固已磔然四解矣公退之暇則放意詩酒寓興於湖山之問至今蒼崖斷壁二公之墨寳猶有存者則古人為郡之樂二公固自得之想夫所謂半刺史者亦得以平分風月焉越自六飛南渡而臨安遂為輦轂之地守倅之選雖視古為重然風俗日益偷獄訟日益繁加之六宫百司軍旅郊祀無一不取辦於是郡太守窮日力有不能給倅貳方且奉令承教之不暇雖其選甚重而其勞殆與諸州上佐等而堅常不肖承乏北倅自惟綿薄固不足以比方古人然辱在此位恨不得周旋揖遜於白傅蘇翰林之時盖所謂半刺史之樂未易得也位有南北二㕔南㕔自紹興初分治於府治之前獨北㕔遷徙不常故自建炎庚戌至於隆興甲申凡三十有六年自郭君至堅常凡二十有二人而題名記迄未能立遂使姓氏與夫去來日月了不可考盖闕文也於是伐石記之以貽後之來者云呉革續記熈寧中蘇文忠公繇史館來貳杭郡事時四方行新法公於其間常因法以便民民頼以安至今耆舊傳誦公之心猶可概見革竊慕焉後百八十年承乏於此初視印乃太平興國之舊公所嘗佩者也次視㕔壁題名記則斷自建炎而公之名不可尋矣豈印以金能久而題名以石乃不能久耶要公之心不金不石而久久而不磨者也石溢自革而續嘻題名續非難續令名為難傳公之印非難傳公之心為難革願學而未之逮也敢以是諗諸來者郭采劉大中鄭作肅邵相楊穜趙令言朱敦儒蔣延夀吕斌張柟王權黄衮俞召虎俞煒張士襄林衡呉伸章岵方擴劉逺葉桯胡堅陳禾曽協張元成丁逄沈詵朱思程文昺王明發强濟應藏宻張鎡王進之柯春卿方傅黄瀚鄭魏良潘好恭王正民陳鈞沈埴王百度富嘉謀趙善昐魏大中陳卓方叔泰趙汝逵劉保張擢張次賢趙希蓁曹至趙汝鐩黄順卿麋漂尤爚皇甫煜顔耆仲婁紹彭顔頥仲黄崖劉克遜樓杓謝奕修楊纉虞曽楊瑾髙衡孫趙師宫尤煓施徳茂王瑢趙希琚韓識陳奎張修石孝廣呉革張藴陳大方黎彌正袁璟梅鼎郭允行章士元許鑑劉縝趙與禌趙時樒林孟辰項廷曽趙崇鐖趙崇乗莊彌邵家之巽馬元縯呉洪惪王剛中葛稱僧南㕔増置嵗月未有所考名氏著於壁記者自紹定六年王修始錢塘自紹興車駕駐蹕民物繁盛事夥責重視古京兆嘗增置倅員鼎峙闗决考舊題名上南北㕔有𨽻事之所中間或僦民居室遷徙無定紹定庚寅京尹大資趙公請於朝度地於府治之南撤官𪠘民居一新三倅㕔事明年燬於火今大尹侍郎余公視事未幾亟命重建費緡錢萬二千有奇三越月而成修徙居之顧舊碑不存無以傳後因伐石以記名氏并㮣序其始末云王修趙汝皓徐起宗喬幼聞呉當可俞任葉宷章端子惠孔時柴夢規趙時詁林靖謝塈陳光施退翁鄭思問趙師簡趙與澤鮮于應文莫子父方棫趙汝珤樊應亨陶虎魏洸王橚林易趙時瑢黄與仁許鍾莊彌明髙應雷吕撫趙希瓍李雷初夏士林東㕔添差壁記自嘉泰元年趙師石始萬逮為記六飛駐錢塘氏物益繁阜府事日滋故闗决記於分任者為倅倅有南北㕔又有員外置率以處宗室戚里及有朝蹟者然無定員或三之二或二之一未始闕也顧官舍無定棲擇木偷安視䕃傒闕自處若浮梗此㕔壁記所由闕也紹定庚寅太府卿玉牒趙公為尹請諸朝度治所堧地剏㕔事辛夘燬焉越明年壬辰今户部侍郎四明余公開府數月維新百度命更為之浹三旬而成明􅐩髙大奥與曠稱繼自今得安其居以賛其長以無負公朝畀任之意公之賜也逮適承乏既涖其事念前聞人無所稽據後來何觀詢宿吏繙舊牘得趙公師石而下十八人刻石龕於㕔之西壁間所期居是宇者欲人之寧如已之寧覧是刻者欲已之善如人之善是則惓惓之志也又何敢徒以勉人不以勉已乃書以冠其首云姚岩續記熈寧七年東坡先生守宻嘗為通守趙君成伯記題名於㕔壁美其勤於吏職視官事如家事不但紀其名盖紀其實也前一年先生以奉常博士倅杭於時民醇事簡猶有朝推囚暮決獄之詩其勤於王事如此是先生非苟言之實允蹈之中興駐蹕杭陞天府今距先生百九十年岩蜀人也由掌故負丞於兹獲踵華躅大懼弗稱恪守家訓公亷勤三字無作先生羞一日摩挲壁記石已盡乃鑱石續之以遺來者併記先生語致其景慕之心云趙師石蔣藺呉鋼趙時侃趙師偃趙善詠趙希栞趙汝淳趙汝鐩趙立夫趙汝鎚趙汝獻趙師耀趙希吕何處義趙希觀王定萬逮趙與懃陳纉劉希仁徐榮叟石孝該姜彌明王侑豐雲昭張公明薛光趙汝謮包恢韓集徐闕趙希㣲謝奕勲趙與趙崇侇王亞夫趙與證趙崇乗胡弌之鮮于應文李衢劉仰祖謝垕莊彌明謝奕信史森卿姚岩王人英趙孟􅔲錢昌大郭囦曽淵子常楙冷應元木天駿唐震王霖龍史俊卿王宗洙咸淳臨安志卷五十
