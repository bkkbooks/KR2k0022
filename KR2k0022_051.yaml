body:
  text: 咸淳臨安志卷五十一宋潛説友撰秩官九縣令錢塘歷代王允之晉王奕劉道真一本作真道宋元嘉十三年文帝遣揚州治中從事巡行上表曰錢塘令劉道真餘杭令劉道錫為二邦之首最治民之良宰文帝嘉之張祜見宋書王歆之傳沈文季見宋書顧琮傳顧昱見宋書孔覬傳庾炳之有治民之績見宋書蕭赤斧為治百姓所安時議見許吏民請留之孫謙字長遜東管人齊初為錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙辭不受見循吏傳劉彪南齊書沈文季傳申靈勉南齊書朱謙之傳王僧孺劉道戢領錢塘餘杭二縣令陳書列傳傅沉陳時人清亷戒謹居處日貧見傅琰傳羅隱字昭諫郡之新城人有能詩名唐僖宗光啓三年吳越王錢氏表請為錢塘令事具金部郎中沈嵩所撰羅隱墓志國朝張君房祕閣校理見梵天寺昭慶法師塔銘鞏庭均嘗撰錢塘湖山逰覽記林文翁吳彛孫畋周端厚髙若虛周邦績蘇策謝茂迪陳炳方懋德任望之李迎王大隱胡維朱蹕湖州人建炎三年十二月乙酉完顔宗弼犯臨安守臣康允之棄城退保赭山蹕白允之自帶本縣及仁和縣弓手土軍往前路欵敵使杭民為逃死計行二十里遇敵騎蹕中兩流矢傷甚猶叱左右負已擊賊己丑城陷蹕在天竺山亦遇害鄧世昌章萊趙伯衛髙誾張昌詩曹岍胡與可施增陳唐弼孫聽莫漳趙不㥈段子方趙彥丞強濟范華湯麟楊坦蔡咸李祺夀綦松曹格宋價程松辛助蘇朴陳嶧陳衍袁聘儒沈璞蘇麓周概髙不倚王栻樓樾錢紹仁王良能趙善鐫李伯杏劉厚南趙汝苾趙與杰鞏耕張湜吳蒙吕逄年毛遇順姚垣吳革劉居安陳夢炎陳淳祖遊澤汪元春王立愛汪自強衛植徐矩趙良忞曹良度李應雄張必萬吳升王剛中陳渶孫獬孫仁和國朝靳光弼梅詢鞠詠守王化基入朝首以詠薦龎英尹昌齡胡巽邵飾關魯魏中庸趙植吳溫丁鈞夏侯維王庭均張援燕若思馮滋景安上宋儉寶徐疇陳師韓楊洵楊存唐翊張維李坰林季仲竇洸趙公孫孫延直張溥憲王抑葉三益賈逋方升之王鞏吕維中趙復陳永世周邦楊績劉敏士姚憲錢觀李柬趙祐之趙子覺王大本錢沖之韓元象黃立中潘昌甫虞汝翼陳鞏陳德明朱贄榮授辰陸相何洪趙時逄趙善趙善偰辛績鄭域謝庭玉趙希醇李仁方陳晐姚師虎黃涇趙希言盧子章趙希吕郭德暢潘復田廙桂如琥范光陳燮胡巨卿蔡公申阮煒孟繼勇張琥趙希峮施逄辰陳祖明王亞夫趙璧李從周溶孫林璞王得一劉夢髙馬世綸翁宧柴士表王三俊葛炳午鞏桂真紹祖謝翼孫吳洪德林起鼇馬元演重可郭應酉王宗洙曽沖子唐天麟餘杭縣歷代陳渾東漢熹平間為令嘗徙置縣治築南湖塘鑿石門以禦水患百姓為之立祠今太平靈衛王是也范寧字武子解褐為餘杭令六年在縣興學校風化盛行顧揚與郭文同時徐赤符見宋書劉道錫宋元嘉十三年以治最表上樂炎齊人沈憲齊人何敬舛齊人丁遵梁錢道戢陳劉允恭陳人治事詳明臨下清簡囹圄屢空田野開闢百姓為德政碑盧鵬唐貞觀初陳允升唐上元二年有碑以頌德政李復唐大歷四年有德政碑范愔唐大歷五年陳芬唐大歷十年常師儒唐長慶二年歸珧寶歷中因陳渾故迹置上下湖又開北湖溉田千餘頃及築南道人稱賢令國朝陸同方咸平中章德一景德中齊治平中扈大亮治平中李元弼紹聖中楊時龜山先生也其為政務先教化不為煩苛臨事剸裁未嘗形之聲色崇寧末知縣事時蔡京貴盛母前葬餘杭用日者之言欲浚南瀦水為形勢託言欲以便民事下餘杭先生訪問父老咸謂不便即條上其事卒不為民擾孫延夀政和中江帙宣和間有水利記以紀其績據邑志云父老相傳帙掘地決獄政稱神明蓋當時賈人瘞劵以誣寺僧得其情也又云黃頡黃中毛球亦賢令之尤者二黃相繼中面黑而頡面白邑人以黑白别之但嵗月無可考姑附書于江帙之次黃頡黃中毛球張永嗣創建學舍風教盛行鄒惟敘蔡坦之范仲將重建學舍風教盛行江舜俞蔣安定衛闐史才錢墀史庭俊陳濤宋遹朱光胄鄭嘉正趙公碩張端簡王裳鄭烈黃師中李渥關澥孫鐸施廣定魏堯臣廖挺陳序張頠汪擇善孟必先葛嶠江涔周章修築溪湖塘岸以防水患鮑恭叔薛甫王允叔彭大辨張輶丁黼趙師恕常權鍾頴沈杲曽槱趙希焄吕午江先錢肅孫趙希磐黃必大徐齊卿翟潔王斗文李伯恭李良陳惟忠江鶚舉趙必鞏劉漢祖許鍾魯景孫葉成子王元持徐矩髙義和趙與鏐劉希顔曹良冶程士遜臨安縣歷代萬寵丁遵江總遷太子洗焉出為令見陳書張機見陳書庾持見陳書陳思復國朝盧之翰姚祐裴公楙陳師錫建陽人蘇文忠公薦於朝改宣義郎知縣事倪倬錢坦夫趙侁李誾之徐儔黃匪躬王傳錢豫劉開士景宗醇鮑安行陸靜之張巨卿范公序髙槱之陳舉善朱思白彥賢宗嗣尹張伯垓周郁張諫丘琛廖覲王大過沈自門葉嵇何東里趙師日蘇柘陳之純鞏豐沈繹葉嶠王潭沈鎮潘皓伯林樅湯諶趙汝吟婁續祖黃紹祖朱逄王鍨趙汝球周説謝焱趙希絪王與鈞黃仁楙趙汝想王橚葛稱僧蓋漸徐洪家之巽趙汝季可趙熄夫王漢老韓翼甫於潛縣歷代虞府君晉人見錢武肅乾山廟碑逸其名丁表字元章唐麟德中為令有政績邑人為立德政碑杜詠唐正元十八年為令嘗開紫溪河三十餘里人蒙其利許恭唐大中六年為令是年建敕書庫國朝邉肅孫洙字巨源歐陽修包拯吳奎三人舉應賢良方正科遷編校祕閣書籍陸衍張炎民郟亶刁璹與東坡同年熙寧中東坡倅杭行縣過之為賦野翁亭詩有我來觀政問風謡皆云吠犬足生氂之句今與東坡並祠浮溪之上崔遹元豐間為令興元豐塘為邑人利至今呼為崔長官有祠毛國華按東坡捕蝗詩序云梅聖俞集中有毛長官今於潛令國華也聖俞沒十五年而君猶為令今浮溪立三賢堂與蘇刁並祠趙𡵻清獻公長子也見東坡撰清獻公墓志韓瓘忠獻公之孫元城劉大諫之友政和初為令興利除弊因山水之秀而得吉卜始改廳事南嚮凡邑官之居征商𣙜酤之所倉庾庠序皆因其舊而增新之望正寢無根椽片瓦之易示不私於自奉也初邑之子弟未有䇿名薦書至是朱晉始登上第公每逰憩於岝崿山之東軒後人因目為昌黎館林忠厚徐康直陳近仁陸行可樓璹章觀節鄧俊明徐彭年范德沖何佾郭知微錢建江邁黃揚朱江葉衡王子潤邢晦邵説趙不吝王際林良趙師密張大猷范成績鄭東邵文炳大興水利詳見塘堰門趙彥倓郭刊王楫朝百談胡衛王日益沈紀陳熹葉大顯虞衢張欽臣潘履孫徐逺胡紹祖方熙程燾張本徐逢年林靖之王偃尤煓陳綬趙汝􅫑葉溥趙孟敏吕沆吳舜龍趙崇濰吳􅌫朱洵吳應鄭似之李仲熊吳棐趙時柷富陽縣歷代虞翻字仲翔為富春長事見吳志沈嗣之見宋書禇叔度傳何洵見南齊書沈文季傳郝其其唐貞觀十二年開陽陂見唐書地理志李濬唐萬嵗登封六年嘗築陽陂湖隄東自海西至於莧浦以捍水患見唐書地理志閻公見韋同碑亡其名鄭早唐貞元七年嘗增修陽陂湖見唐書地里志栁錫正元十二年建縣市顧升庠開元十年建縣市崔士元永泰元年重建縣學董伸咸通八年建城隍廟趙訥唐咸通十四年築縣城陸仁璋後唐聞人凝梁龍德三年重建縣宇國朝周仁邈乾德五年重建縣治王永徽孫慎陳執禮見文宣王廟記丘荷何去非吳怙立城隍祠胡紡張亨劉夔楊尚友葉文奐陶孫紹慤吕南夫李永陳祖禮韓泰胄趙詵之萬直夫林次膺陸康民徐端甫孫徹錢億年方詢蔣嗣祖唐沅蘇忠規李扶韋才劭陸楠陳字趙汝明宋堅魏仲恭徐木陳大光麋師旦沈耜王行之胡褎魯幵蔡幾丁大同陳嘉猷范之柔陳晃國朱獻臣樓潚吕昭亮程珌鄭伯衍常權曽治鳳何擢趙汝灦李彌髙趙汝捍張修錢眀德周晉譙習王公遇周果王熙載趙與譍葉溥李迪趙希陳夢炎董景愈林子烈林孟辰徐至鄭大年趙汝崖王琦趙與儛王積翁趙時䛚新城縣歷代陸赤奮見南齊書沈文季傳國朝林邵為南新令有逰龍詩薑木太平興國八年立南新縣記碑徐評嘗撰嵗寒橋記朝端友熙寧中為令見黃山谷所撰墓志蘇東坡序其詩云清厚靜深如其為人其子補之時年十七隨侍官所東坡行縣以文謁東坡遂知之許仲蔚字子均有和東坡居士新城十韻詩宋觀王折有碧沼寺詩鄭厚方有碧沼香院詩劉庠有寧國院詩孫紹懿有白蓮堂詩王殳向沆史經衛闐朱寬蔡經李份田欽亮陸演吳康葉嶽范梓馮世亨葉抑莊珙張俊民趙詠景秉劉紀民葉之基管浚吳益徐裕胡垕劉景修方竒之唐大本葉重開溫膚楊恕葛祖夀吳振曽綤趙希益姚東趙崇臤成待問葉嵇莊述錢璧趙澧夫陳旻彭彛謝夢生方熊汪績葉杲趙崇賅余文炳章士元史越翁趙時􅥚趙汝崖崔泰亨陳逺方蒙洪應辰翁􅍲費伯恭王璪曹夢龍陳鎰陳君寶鹽官縣歷代陸遜吳人為海昌屯田都尉併領縣事顧覬之見宋書江山見南史顧歡傳蕭元蔚見南齊書沈文季傳庾持見陳書路宣逺唐開元十一年嘗徙縣市於西南栁遵舊圗志云唐開元中為縣令嘗即縣西為賦亭驛國朝劉宗吉魚承憲成常吉王世昌裴基鄭璨柴樞張昱馬紹儒李夢孚單招祐邊秀周簡張維舟許咸得李成象張廷驥劉舜卿張覲王可回朱允升邵祥朱公綽黃晉綦願吳轂江栩鄭民表潘隆禮劉拱王兢富臨朱伯虎陳齊陳璅何夢錫戴士先張彥輔陸伸陳并陳嘉言韓綬鄭乂王裴丁眘俞授能朱容歐陽珣關睿王昞栁懋吳棫金譽鮑謹好鄭朴吕庭問施塤吳效白彥奎刁雍胡兟田欽亮李份趙伯蕘吕擢劉偉唐德裕劉開士胡堅常邊維熊黃楊朱宋卿盧嶼林祖洽李宗大魏伯恂趙彥駿求承祖陳申葉之望陳恕魯施檯黃誾趙彥適翁謙秦鎬沈紡潘景夔趙伯澐魯興文蔣惟曉吕祖志趙汝禚林申江泰之趙汝艁楊天麟張琥毛諤董子焱沈昌大范慶家余愚王夢得周獻可施濆胡寬惠昌李嗣祖李彭章謨伯鄧得遇劉繹吳由留紹逺趙崇催尤濤昌化縣國朝謝公彥鄭旁韓賁李義叟盛圓吕奎孔延祖范堯年陳師堅范聞李坰聞人琳錢冰沈可何恭直周澥徐楩魯長卿陳友吕亮功黃夀張邁趙子卓陳澥劉授之章著孫願劉士修楊大麟吳大同倪穆陳戒徐宗舒曽光趙伯術卞圜趙芾許時錢孜禇伯起錢昭祖唐大本張任周堪劉大成趙諒章伯奮陳汶沈掞趙希伋鄭挺王登林士巽王臨常顯孫趙汝孰葉頴趙希范趙唯夫趙汝柄趙希􅘊袁瑞葉勳鄭湘之章恬趙希偦薛啓口山葉采徐聞詩黎宣昭趙與鑒陳璨然曹仲良塗久大竇璞屠雷發劉宗憲趙處垕衛植朱端彛劉仲文李長孺袁洵咸淳臨安志卷五十一
