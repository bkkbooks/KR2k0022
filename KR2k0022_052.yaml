body:
  text: 咸淳臨安志卷五十二宋潛説友撰官寺一恭覽國史藝祖皇帝嘗詔諸使刺史知州通判滿任其治所廨宇有所修壞著而為籍遞相付授幕職州縣官受代則對書於考課之歷加殿最焉當是時諸國臣服六合為家一官宇之微至上關聖慮如此豈曰崇飾土木封靡于爾邦亦唯是户庭修令之地非他居室比不可以茍而已矧今皇皇上都臨以萬乘凡百官士民所觀瞻顧弗稱可乎蘇公之治杭也亟請於朝繕修官舍樓櫓倉庫凡二十七所其言曰百餘年間率皆因循支撑以茍嵗月又曰官吏胥徒僥幸茍安不修必大壞夫茍之為患大矣豈獨宫室也哉敘官寺府治舊在鳳凰山之右自唐為治所子城南曰通越門北曰雙門吳越王錢氏造國朝至和元年郡守孫沔重建蔡端明襄撰記并書刻石於門之右石刻今在和寧門內中興駐蹕因以為行宫而徙建州治於清波門北淨因寺故基此據舊志無創建嵗月考會要建炎四年七月六日中書舍人季陵言臨安府治宜遷於祥符寺故基詔胡舜陟同本路漕司相度聞奏又紹興二年正月二十九日知臨安府宋輝言昨得旨將州學改充府治方造廳屋未有當直司等處屋宇詔特許修蓋與舊志不同二事恐在前虛白堂唐長慶中刺史白文公有詩刻石堂上因巖亭見白文公詩忘筌亭見白文公詩碧波亭宴元獻公輿地志云在子城北門外五代史載錢氏大閲兵於碧波亭亭臨水面濶數丈元豐中郡守張銑重建南園巽亭慶歷三年郡守蔣堂建望越亭慶歷中守蔣堂建政和初守張閣遷巽亭於此曲水亭治平中守沈文通建髙齋唐時郡齋名嚴維九日登髙有遲客髙齋瞰浙江之句又葉夢得録話云錢塘州宅之東清暑堂之後舊據城闉橫為屋五間下瞰虛白堂不甚髙大而最超出州宅及園囿之中故為州者多居之謂之髙齋東樓一名望海樓在中和堂之北太平寰宇記名望潮樓髙一十丈唐武德七年置清輝樓唐郡守嚴郎中建見白文公詩雲濤觀政和元年守張閣既徙巽亭以舊址更造石林軒至和中守張沔建號燕思閣又取臨安縣淨土寺立石七株置之閣前蒼然竒怪號七賢石元祐中守蒲宗孟改名石林軒紅梅閣在石林軒側清風亭在中和堂之側直望海門右皆在鳳凰山舊治今姑存其名中和堂錢武肅王閲禮堂舊址至和三年郡守孫沔建堂其上更名中和建炎三年髙宗皇帝車駕臨幸有御筆并詩見御製門後改為偉觀堂蓋取御筆中語此據舊志嵗月未詳既改創府治仍以名堂嘉定六年趙安撫時侃再創於舊七間堂今名見亷堂後之東偏李左史􅌫為記咸淳六年安撫潛説友徙令二堂相直正視之門牖洞然撤去老屋煥乎一新有美堂嘉祐二年梅龍學摯出守仁宗皇帝賜詩見御製門摯乃作堂取賜詩首句名之曰有美歐陽公修為記蔡端明襄書清暑堂治平三年郡守蔡襄建自為記及書今重建於恕堂後右皆舊治內堂名移建於今治簡樂堂在設廳後光宗皇帝以青宫領尹奏疏有訟簡刑清百姓和樂之語後二年郡守胡與可乃為堂托二字扁曰簡樂且丐御畫國子司業薛元鼎為記銘咸淳二年洪安撫燾重建清明平軒在簡樂堂後咸淳五年安撫潛説友因得平章賈魏公三字之褒歸而揭諸便坐以為訓故名見亷堂在中和堂前舊為七間堂嵗久橈腐且庳狹弗與前宇稱咸淳五年十二月安撫潛説友撤而新之樓其上最為髙聳憑檻四望百萬人家森然畫圖中面南諸峯若拱若挹前是郡堂或增或易非出一時以故離立錯峙於觀不整至是由內達外直若引繩無少枉蔽堂成會修復酒政公朝有足見亷能之褒因取以名馮尚書夢得為記聽雨軒在中和堂後景定五年劉安撫良貴建為屋八楹取東坡中和堂後石楠樹與君對床聽夜雨之句為扁咸淳六年安撫潛説友增髙之以為堂後屏蔽恕堂在東廳清暑堂前紹定間余安撫天錫建愛民堂在清暑堂東淳祐九年趙安撫與􅊸建明年四月理宗皇帝宣引賜御書愛民篇因以名堂仍丐御畫為扁講易堂在愛民堂東紹興十六年張安撫澄建名吏隱堂隆興元年陳敷文輝改今名張中書孝祥書葛朝請立方記中廢紹定壬辰余安撫天錫即故址重建教授應㒡記咸淳五年安撫潛説友徙七間堂置其後竹山閣舊在玉蓮堂西竹園山淳祐九年趙安撫與􅊸建閣其上理宗皇帝御書竹山閣扁以賜景定三年魏安撫克愚移置講易堂之東南承化堂在愛民堂後嘉定間袁安撫韶建三桂堂在承化堂側景蘇堂在府治簡樂堂西景定三年魏安撫克愚建松檜堂在中和堂西淳祐間趙安撫與􅊸建咸淳六年安撫潛説友移面勢而葺治之香逺樓舊為玉蓮堂魏安撫克愚牽於隂陽家白虎之説撤屋而徙其扁於西湖之濵咸淳七年安撫潛説友即茀址為大堂六楹樓其上山翠橫陳芙蕖可俯取濓溪香逺益清之語名之遂為郡治最佳處少東為茶亭四楹前鑿方池循除而上則竹山閣之故基平眺湖山水光林影密踈隱見如在圖障中今惟環植以竹稍存竹山之舊云互見竹山閣及西湖玉蓮堂記文雙門記杭中二浙為大州提支郡數十而道通四方海外諸國物貨叢居行商往來俗用不一自錢氏專有吳越治兵蓄財日為戰守朝廷除刺史以來蓋八十年其風俗治迹有足稱者要之起廢弊變繇習斯亦難矣至和元年資政殿學士給事中孫沔自樞密副使來撫是邦六月視事曰此吾鄉也敢易治之鄽里之稅嵗糜中産餘二千家為之籍其地而出其資市賈謾欺取豫不均為之正量衡而一之富黠倚強蝕貧誅利為之索其黨而逐之盜俠閉藏出沒無常為之根株而去之俗尚浮屠歸施無節嚴以約束婦人女子潔亷其行寵以衣珥髙年舊德或復諏訪數月之間所部近逺莫不竦動迎向公訓公知衆之已悅也隨所譬喻勉之以善秋八月語其僚曰諸侯臺門以髙為貴蓋以尊天子所命而示等威也昔錢氏依山阜以為治所而雙門置框木錮金鐵用為敵偹今方內統平吾為守臣於以遵化而流澤每大號令從官屬陳兵校會州之士民即門內張次班列而布宣之門圯而地狹又非禮制豈所以重方面之體乎吾將易而新之即以其説謀之轉運使資以羡錢又詢之於民良家大姓願以力助於是商其用而裁取之凡金植竹木之材必可其直塈陶蓋梓之工必當其庸十一月甲戌興作明年五月訖工十有五日壬申合樂燕飲以落之至於下邑旁郡擕扶老稚闐溢郛郭相與觀聽指是巍然者曰上之命令由是而出下之情偽由是而入一有不誠重為門羞吾屬戒焉是年襄出刺清源州人遮余而言曰我公之為治固有聞於執事矣始者革弊屏惡人畏其明已而拊養鰥惸教敕子弟及其治成井市兒童不收落錢田豐海熟人得其職公作雙門我實為之公歸有時吾思無窮願為紀所作之始而刻之石庶幾傳之子孫益逺不忘初公定雍廣大寇還請涖杭上以其能遜而不伐中道召升宥密未幾以直議不能與衆合遂伸前請至則勵精夙夜不以宴息自處其進退忠義之節與所施為若千里之績固不足書然則人過余再三稱頌殷勤不書無以慰其志中和堂記記曰杭瀕浙河雅為東南一都會民物殷富山水之美名天下歷唐至五季錢氏奄據傳三世閲七紀我宋受天命一六合收版圖歸職方故守吏即王宫為居棟宇宏敞寡儔宜他郡莫及始錢王鏐於其宫作堂名曰閲禮本朝至和中威敏孫公沔來守此土更飭治之易名中和守居負鳳凰山堂跨山馮髙蘇文忠公嘗謂下瞰海門洞視萬里觀覽之傑抑可想見建炎初髙宗皇帝南巡登斯堂賦詩八十言慨然思神禹之功弔子胥之遺烈奎章睿藻流於人間尋易名曰偉觀紹興停鑾浸久因其地創行宫而守廨遂徙於清波門之北今所治是也蓋七十有七載矣惠國趙侯被命尹正之明年綱舉目張善伸姦戢嵗比豐登民情浹和顧廨處闤闠其北窘於燕寢後墉而止外之囂足溷於裏裏之響或徹於塗失官寺崇密之體侯曰此弗可已也夫志有所鬱必以間而紓思有所隱必以靜而得京兆郡國首事物紛劇交至於前剸酢日弗贍儻無晏間之所以休其暇日思政之所當先究心之所欲圖不幾於時沒而不蠲沉迷而忘返乎乃撤廢屋疏汚壞築垣八十四堵為堂三十七楹僝工於孟秋之壬子斷手於季秋之丁未復采舊名榜曰中和人徒見其堂之成而不聞其費且勞徒歎其室之美而不知其意有所寓余嘗造侯因要余觀焉雖無異時凌虛騖逺瓌異絶特之觀然華櫩邃宇修欄曲楹佳花美木植其前竒石翠竹列於後崇廣靚深亦足以攄雅思而滌煩襟蓋堂視故處遐睎近矚景趣各殊而顔猶取昔名者抑侯欲存前賢之意而施於政事者顧將有所推本歟嘗謂中和之名實自威敏發之威敏昭陵名臣立朝犖犖有竒節然其治杭專以擊斷發擲為能其政見為嚴厲顧有取於中和何耶抑其外雖若凛然使人畏且憚而其𠂻剛毅近仁自有得於動化之要道歟君子之所存衆人固不識也夫為吏太剛則折太柔則廢若中和推而見諸行事通百世而無弊此乃職南面之治者所當務也矧今府為翠華駐蹕之地昔者開封尹之任王尊為京兆行縣還上奏曰強不凌弱各得其所寬大之政行平和之氣通若尊此言固尹京之楷也豈必專尚鷹擊毛摯為治而後愈快哉先是王襄為益州刺史欲宣風化於衆庶使王褒作中和樂職宣布之詩選好事者習而歌之轉而上聞宣帝召見皆賜帛蓋中和之詩雖以頌刺史而實以美天子故宣帝曰此盛德事吾何足以當之然則侯之所以拳拳於此者豈特以為政化之經抑亦天保報上之義歟本朝尹京多用名儒以翰林知開封則號省府學士不旋踵必擢丞弼祖宗之世甚重京兆之選蓋如此雖今昔異宜難以概言然其任為華劇而不以輕畀者則今聖上之用侯亦猶昔日祖宗之意也宜侯自厲於猷為以圖報於皇家希蹤於往哲夫豈一日而忽忘之哉􅌫既荷侯諉為記故以所得於舊聞者而併書焉侯名時侃字仲和今以司農卿兼知府事云有美堂記記曰嘉祐二年龍圖閣直學士尚書吏部郎中梅公出守餘杭於其行也天子寵之以詩於是作有美之堂蓋取賜詩之首章而名之以為杭人之榮然公之甚愛斯堂也雖久而不忘今年自金陵遣人走京師命余志之其請至六七而不惓余乃為之言曰夫舉天下之至美與其樂有不得而兼焉者多矣故窮山水登臨之美者必之乎寬間之野寂寞之鄉而後得焉覽人物之盛麗誇都邑之雄富者必據乎四逹之衢舟車之會而後足焉蓋彼放心於物外而此娛意於繁華二者各有適焉然其為樂不得而兼也今夫所謂羅浮天台衡嶽廬阜洞庭之廣三峽之險號為東南竒偉秀絶者乃皆在乎下州小邑僻陋之邦此幽潛之士窮愁放逐之臣之所樂也若乃四方之所聚百貨之所交物盛人衆為一都會而又能兼有山水之美以資富貴之娛者惟金陵錢塘然二邦皆僭竊於亂世及聖宋受命海內為一金陵以後服見誅今其江山雖在而頽垣廢址荒煙野草過而覽者莫不為之躊躇而悽愴獨錢塘自五代時知尊中國效臣順及其亡也頓首請命不煩干戈今其民幸富足安樂又其俗習工巧邑屋華麗蓋十餘萬家環以湖山左右映帶而閩商海賈風帆海舶出入於江濤浩渺煙雲杳靄之間可謂盛矣而帥是邦者必皆朝廷公卿大臣若天子之侍從又有四方逰士為之賔客故喜占形勝治亭榭相與極逰覽之娛然其於所取有得於此者必有遺於彼獨所謂有美堂者山水登臨之美人物邑居之繁一寓目而盡得之蓋錢塘兼有天下之美而斯堂者又盡得錢塘之美焉宜乎公之甚愛而難忘也梅公清謹好學君子也視其所好可以知其人焉清暑堂記記曰京師東南千里入吳越杭於吳為一大都會其地傾而屬海又多陂池以故苦濕方春夏時梅雨蒸鬱礎甓皆汗披纎衣覆大厦猶鼻息奄奄不得曠快非有髙明之居曷以禦之於是清暑之堂作焉清暑負州廨之左直海門之衝其風逺來灑然薄人日以決事佚而忘勞至者莫不恱之或曰昔者召伯將營召以居重愛民力暴處逺野廬於甘棠之下而聽斷焉百姓思之作甘棠之詩以美其事今斯堂也度面藝揭崇宇前有江海浩蕩無窮之勝潮濤蚤莫以時上下奔騰洶湧蔽映日月雷震鼓駭方輿動搖浮商大舶往來聚散乎其中朝霞夕景不繢而彩翠旁走羣山濵海而湖崖隒瀰漫并包巨澤巖岫崒硉圾乎河漢之上蒼煙白雲少頃萬變茂林香草冬榮不凋此所以娛君之視聽也及夫夏日比室煩燠方且披軒闥據髙涼放浪於無何翺翔於至極蕭然而自適或賔友環次鳴管揳瑟釃酒均餌歌呼暝醉此所以懌君之心意也於民乎何有豈不與昔人廬於逺野者異哉余謂之曰惟人之情不得其適則慌然余於是堂也愈吾疾亦於是休吾心焉體康志寧然後究民之不至而教之度民之所有而用之去其所不願就其所便安如得其平於為惠也亦大矣乘其間也燕賔友接和好是亦為政也且召伯之治或失其平雖木棲露寢民莫之思甘棠之政後世仰而慕之甘棠之茇不可常也遂以其説為清暑堂記府治有石刻簡樂堂記銘銘曰輦轂之下雜八方人物缿筒訟牒抵讕相分最號為難理理不得其要則漫漶弗分其究為煩擾故於帥每難其人乾道辛卯東宫以民事判南衙如太虛一聲人自怙懼如半天一照毫髮無所逃既而為堂於設廳之背時出而從容其間若無事可理而畿甸熙熙盡在春風和氣中矣蓋嘗奏疏自期有訟簡刑清百姓和樂語不二年既效又二年胡與可承乏府事乃采其語以名堂仍請大書而榜之銀鈎爛然上肖奎文下飾天邑填以增重示將來法焉元鼎執經偹數宫僚宜為紀其實且銘之曰浩穰繁劇情偽百出雖有智者莫窮日力惟是此心應以虛一鏡照媸妍繩分曲直物晦必明事虛必實姦伏自柅不在發擲事往心間庭空人寂故雖至勞而常至逸允以前星行之昨日至今塗巷歡聲盈溢惟簡則樂此理不易昭揭兹堂以垂千億與可自詭得於今式於是并書之見亷堂記聖天子以恭儉化天下嵗下詔書廣宣厥道越郡國吏罔不用勸元老大臣奉上休德思所以風厲之慮動於耳目而周乎區畫之間夫豈徒哉惟京師卓犖諸夏知逺之近知風之自據會要以觀方來以為莫先於此而簡修之具行焉乃咸淳六年户部侍郎潛君守京兆尹至是二年矣政修人和百為克開千里之內大治每嵗終考其成無一人之獄計所裁縮代九縣輸四五等户租一年樁釀庫本為緡凡五百萬此其大較也髙第轉聞璽書數下嘉其亷平會斯堂落成白於朝我太傅平章魏國公命之曰子以亷能見其名見亷可公蓋欲以識治行而書所見以習天下之為郡國者抑自今至於後日坐斯堂者亦將以存其見而使相為君子也夫灑掃庭內維民之章華衮一字其嚴矣哉嗚呼得見有常者斯可矣嬰以亷恥故人矜節行聖賢揭厲人心之道概如此夫亷非小善也漢時文翁黃霸朱邑尹翁歸之屬居官可紀一是為本史稱良吏廩廩甚盛今朝廷清明宫府一體四方無進獻之事冀州不貢厥惟大惠魚麗萬物盛多既多且旨維其時矣其能將以精白而朝夕曰惟我后之德交相成報以集今日之懿不亦尚乎故嘗論之平仲不受邑以足欲非惡富也是幅利也義也子文不勤民以自封非厭取也是庇民也仁也懷仁義以事其君而亷在其中矣是皆無所為而為之也嗚呼推是心也千載而下猶將見之堂昉役於五年十一月迄工於今年正月基舊為七間堂增而愈崇為屋三十二楹上為樓取簡樂堂內外洞直卓乎其髙美已不鄙屬豫記事係風化善為之書潛君名説友字君髙括蒼人講易堂記葛立方撰云文學政事吾夫子異其科雖由求遊夏叵得兼也且事莫夥於官學莫邃於易逰刃叢劇之地嚌咀奧頥之境能於一時相兼而不相廢者戞戞乎其難哉福唐陳公逄掖時已覃思潔靜精微之教既筮仕靡勞弗宣聲大彰白屬擢二千石若部刺史皆名能官天子知之朝廷夙夜之賢知之旋付衆大之區而牧焉宜也人之言曰臨安十邑缿筒讕辭不知其幾何狴扉鞠域揣髮關械者不知其幾何庾帑金粟衍耗出納不知其幾何簿書會期不知其幾何而公以一身任之無巨細必濟其必有一其源者余嘗讀三墳之書曰太始之數一為太極極者天地之母也天髙地博其數則二謂之太易天地之變也又嘗讀乾鑿度之書曰易變而為一一變為七七變為九者氣變之究乃復變而為一二書所言或自一而出變或自變而歸一易之道無餘藴矣脫能執其甚約以攝至煩無惑乎應酬之不匱也意公之所得有在於斯乎下車踰一時教令所孚民大協和比屋至無吠犬政成矣乃於府治之東為講易堂延龍舒易經師王虛中居之帥子弟從焉蓋欲窮其所未盡也虛中嘗著易論四十篇凖繫解易二十四卷大率顓以古易正文為主異衆人之所同而味衆人所不味鈎深致逺自得於心又豈如前人屋下架屋之比哉先治春秋學為四傳辨失左氏正鑑紹興初嘗抱其書質於先人文康公文康深許之濡削遺之曰逺類康成發公羊之墨守下卑元凱為左氏之忠臣今又得賢主人相依倚以緝熙三聖之傳相輝相扶迭為炳蔚吾知此學之未墜也陳公字晦叔名輝虛中名日休云應撰郡治東偏舊有堂名講易按臨安志隆興改元陳輝因吏隱更名于湖張孝祥書扁嵗久堂圯扁亦莫存獨葛大夫立方所為記碑石尚未泐可考也紹定辛卯冬四明余天錫以小司徒領尹事時臺省府寺百堵皆作容與辦治汔底於成期年政通仁行事愈清簡暇日訊老吏講易故基安在吏具白今為武庫及𨽻人之垣其屋亦老且敗將壓焉乃悉撤去徙庫於衙教場西廡歡謂宜多捐緡錢買旁地地故有廢池水泉冽清池之外峙小山石腳插水下劃如天成喬木數十章左右環映扶疏交蔭天籟互答公出意匠使浚池疏泉輦石增山雜植松篁檜竹佳葩名花以益其勝遂作堂焉牖戶綢繆宏敞深靚前為軒鄉南南風之薰冬日可愛晨花夕月春麗秋輝時至景換攬挹無盡出簷得支徑蛇行斗折一亭負山居然有林壑意少西為書室三間亦爽塏明潔皆堂之附庸也于湖猶子即之在醴幕公命作三大字揭諸楣又取葛碑立前榮於堂之舊觀盡復矣公領客堂上或疑而諗公曰杭大州也自古號東南一都會今又為行在所業巨事叢尹搰搰酬酢之不暇而暇講易乎公笑曰子言過矣易者易也變通不窮之謂易易大傳曰易無思也無為也寂然不動感而遂通天下之故方吾公退餘間焚香默坐萬象森列一真湛如能定而後能應以之鏡見事物電掃庭訟要不逃吾方寸之內斯吾所謂易者在是象數云乎哉誦説云乎哉昔者孟氏明王道一語未嘗及乎易先儒謂善易者莫如孟氏劉斯立以學易名堂有客問易卦六十四今子是學何卦劉子舉手推曰去汝非我同學今吾於此亦云公既以是語客復授簡郡文學使書而記之題詠府治白樂天自湖上歸入錢湖門經由萬松嶺還州治詩半醉間行湖岸東馬鞭敲鐙轡瓏萬株松樹青山上十里沙隄明月中樓角漸移當路影潮頭欲過滿江風歸來未放吹笙散畫戟門開蠟燭紅白初到郡齋寄錢湖州李蘇州俱來滄海郡半作頭翁謾道風煙接何曽笑語同吏稀秋稅畢客散晚庭空霽後當樓月潮來滿座風霅溪殊冷僻茂苑太繁雄惟此錢塘郡間忙恰得中為留題郡齋吟山歌水嘲風月便是三年百滿時春醉眠多閉閣秋因晴望暫褰帷更無一事移風俗惟化州民解詠詩山郡中即事漫漫潮初平熙熙春日至空闊逺江晴明好天氣外有適意物中無繫心事數篇對竹吟一杯望雲醉行擕杖扶力卧讀書取睡久飬病形骸深暗間氣味遙思九城陌擾擾趨名利今朝是隻日朝謁多軒騎寵者防尤悔權者懷憂畏為報髙蓋車恐非真富貴虛白堂白樂天詩平旦起視事亭午卧掩關除親簿領外多在琴書前况有虛白堂坐見海門山潮來一憑檻賔至一開筵終朝對雲水有時聽管絃持此聊過日非忙亦非間山林太寂寞朝闕空喧煩惟兹郡閣內囂靜得中間簷虛白堂前衙退後别無一事到中心移床就日間卧卧詠間詩側枕琴因巖亭白樂天詩箕潁人窮獨蓬壺路阻難何如兼吏隱復得事躋攀巖樹羅階下江雲貯棟間似移天目石疑入武丘山清景徒堪賞皇恩肯放間遙知興未足即被召催還忘筌亭白樂天詩翠巘公門對朱軒野徑連只開新户牖不改舊風煙空室間生白髙情淡入玄酒容同坐勸詩借屬城傳自笑滄江畔遙思綘帳前庭臺隨事冇爭敢比忘筌巽亭蘇舜欽題巽亭詩公自登臨闢草萊赫然危締壓崔嵬涼翻簾幌潮聲過清入琴樽雨氣來疇昔登臨何處好生平懷抱此中間東南地本多幽勝此向東南特壯哉東坡次韻詹適宣德小飲巽亭君方夢謫仙我亦弔文園江上同三黜天涯又一樽濤雷殷白晝梅雪耿黃昏歸去多晴雨應隨御史軒望越亭陳希元詩樹樹西風葉葉秋誰家煙火起滄洲乘間不耐無機性擬動漁翁直釣鈎髙齋嚴維九日登髙齋詩家九日憐芳菊遲客髙齋對浙江漢浦浪花搖素壁西陵樹色入秋窗木奴向熟垂金實桑落新開㵼玉缸四子醉時爭講德笑論黃霸屈為邦東樓樂天詩初領郡政衙退登東樓作鰥惸心所念簡牘手自操何言符竹貴未免州縣勞賴是餘杭郡臺榭繞官曹凌晨親政事向晚恣逰遨山冷微有雪波平未生濤水心如鏡面千里無􅊏毫直下江最濶近東樓更髙煩襟與滯念一望皆遁逃濤杭州春望望海樓明照曉霞護江隄白踏晴沙聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蒂青旗沽酒趂梨花誰家湖寺西南路草緑裙腰一道斜偏知氣象多隨昏重題别東樓東樓勝事我旦移湖卷衣裳白重疊山張屏障緑參差海仙樓塔晴方出江女笙簫夜始吹春雨星攢尋蟹火秋風霞颭弄潮守經年嘲不盡郡齋空作百篇詩太與寄題餘杭郡樓官歷二十政宦逰二十秋江山風月最憶是杭州北郭沙隄尾西湖石岸頭緑觴春送客紅燭夜回舟不敢言遺愛空知念舊逰憑君吟此句題向望濤樓東樓南望八韻不厭東南望江樓對海門風濤生有信天水合無痕鷁帶雲帆動鷗和雪浪翻魚鹽聚為市煙火起成村日腳金波碎峯頭鈿點繁送秋千里雁報冥一聲猿已豁煩襟悶仍開病眼昏郡中登眺處無勝此東軒燈江樓夕望海天東望夕茫茫山勢川形濶復長火萬家城四畔星河一道水中央風吹古木晴天雨月照平沙夏夜霜能就江樓消暑否比君茅舍較清涼郡樓夜宴留客北客勞相訪東樓為一開褰簾待月出把火看潮來艷聽竹枝曲香傳蓮子杯寒天殊未曉歸騎且遲回江樓晚眺景物鮮竒吟玩成篇寄水部張員外淡煙疏雨間斜陽江色鮮明海氣涼蜃散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁點青天字一行好著丹青圖寫取題詩寄與水曹郎東坡望海樓海上濤頭一線來樓前指顧雪成堆從今潮上君須上更看銀山二十回橫風吹雨入樓斜壯觀應須好句誇雨過潮平江海碧電光時掣紫金蛇青山斷處塔層層隔岸人家喚欲譍江上秋風晚來急為傳鐘鼓到西興吟樓下誰家燒夜香玉笙哀怨弄清涼臨風有客秋扇拜月無人見晚粧心沙河燈火照山紅歌鼓喧喧語笑中為問少年在否角巾欹側鬢如蓬復登望海樓五首清輝樓樂天詩并敘嚴十八郎中在郡日改制東南樓因名清輝樓詩云嚴郎制兹樓立名曰清輝未及題花榜遽催還粉闈去來三四年塵土登者稀今年新太守掃灑施簾帷院栁煙婀娜簷花雪霏微看山倚門戶待月闡東扉碧窗戛瑶瑟朱闌飄舞衣燒香捲簾坐風燕雙雙飛君作不得住我來幸因依始知天地間靈境有所歸中和堂趙清獻公詩老來重守鳳凰城千里人心豈易平樂職古賢形歎頌中和終不為虛名陳密學襄中和堂木芙蓉盛開戲呈子瞻詩千林寒葉正疏黃占得珍叢第一芳容易便開三百朵此心應不畏秋霜東坡和千林掃作一畨黃只有芙蓉獨自芳喚作拒霜知未稱細思却是最宜霜豫前後守倅杭凡五年夏秋之間蒸熱不可過獨中和堂東南頰下瞰海門洞視萬里三伏常蕭然也紹聖元年六月舟行赴嶺外熱甚忽憶此處而作是詩忠孝王家千柱宫東坡作吏五年中中和堂上東南頰獨有人間萬里風劉景文季孫陪東坡中和堂賞月中和堂上月盛夏似髙秋天瀉銀河水人披紫綺裘氣飄聞赤壁語勝踴黃樓歸袂接夫子適從何處逰有美堂東坡與太守陳密學襄自有美堂夜歸詩娟娟雲月稍侵軒瀲瀲星河半隱山魚鑰未收清夜永鳳簫猶在翠微間凄風瑟縮經絃柱香霧低迷著髻鬟共喜使君能共樂萬人齊看火城還不有美堂暴雨詩遊人腳底一聲雷滿坐頑雲撥開天外黑風吹海立浙東飛雨過江來十分瀲灔金樽凸千杖敲鏗羯鼓催喚起謫仙泉灑面倒傾蛟室㵼瓊瑰所正月九日有美堂飲醉歸徑睡起得鮮于子駿寄古意作雜興一首答之衆人事紛擾志士獨悄悄何異琵琶絃常遭腰鼓閙三杯忘萬慮醒後還皎皎有如轆轤索已脫重縈繞家人自約敕始慕陳婦孝可憐原巨先放蕩今誰弔平生嗜羊炙識味肯輕飽烹蛇啖蛙蛤頗訝能稍稍憂來自不寐起視天漢渺闌干玉繩低耿耿太白曉九日舟中望有美堂上魯少卿飲處以詩戲之指點雲間數點紅笙歌正擁紫髯翁誰知愛酒龍山客却在漁舟一葉中西閣珠簾捲落暉水沉煙斷佩聲微遙知通德凄涼甚擁髻無言怨未歸述古有美堂宴僚佐虞美人本事集云陳述古守杭已及瓜代未交前數日宴僚佐於有美堂因請二車蘇子瞻賦詞子瞻即席而就寄攤破虞美人湖山信是東南美一望須千里使君能得幾回來便使樽前醉倒且徘徊沙河塘裏燈初上水調誰家唱夜闌風靜欲歸時惟有一江明月碧琉璃兩浙轉運司舊在雙門北為南北兩衙今在豐豫門南有東西二廳東廳寬民堂舊為福星堂淳祐間魏運副峻重建更今名福星樓淳祐間尹運判煥建咸淳三年運副潛説友重修節愛堂寶祐初王運使克仁建振襟堂淳祐間魏運副峻建咸淳三年運副潛説友重修月臺景定元年洪運副燾建西廳廳淳祐元年魏運判峻重建周咨堂淳祐元年魏運判峻建公生明景定三年魏運副克愚建咸淳三年運副潛説友重修繡春堂景定三年魏運副克愚建仁惠堂紹定初陳運副宋仁建咸淳三年運副潛説友重修又植竹其外咸淳臨安志卷五十二
