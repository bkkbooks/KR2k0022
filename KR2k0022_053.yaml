body:
  text: 咸淳臨安志卷五十三宋潛説友撰官寺二幕屬官廳添差及增創職員元無廨宇者皆不書浙西安撫司參議官廳在軍將橋東主管機宜文字廳在豐豫門北城下端平三年任一震建記文太學正湯中撰廳壁記國家以州郡兵民之政總於安撫使所以專牧御之任也故設屬必謹浙右為諸夏根本其使權視他道尤雄其列屬亦倍其遴揀亦加詳焉若主管機宜文字一官多取諸邑最勳門與夫宗戚之賢異時逹官要人往往皆由此出然衆大所區寓廨迄靡定所姓氏亦莫適紀載嘉定間始有以十八人之名登于石者今守上饒趙侯與勤嘗題其額未幾趙侯亦居是官乃請於帥得民廬于湧金門之北而公宇以定規建門廡費略儲矣會徙他官弗克就繼之者或因循不暇問或乃私耗其所儲而紀載之石亦壞不復全三山任君一震始至訪知其然謂趙侯美意不可以不嗣此吾責也慨以白帥户侍趙公與歡帥慨許之捐金二十萬佐以竹木而趙侯亦自上饒以二十萬相其役畿漕謨閣趙公以夫喜而書其扁又益以木于是閈閎堅崇扁顔昭揭又欲方來垂不朽乃伐石更舊刻而屬筆於余俾記其成余惟仕失其義不知其職業者多矣宜其視居止若傳舍然葺且弗思矧肯創乎况於䇿足王畿或者榮進之念日迫以遽又遑恤此哉任君耿介知義蓋不茍其官者繕一門廡特其志效之末而已使任君得展其才而天下仕者皆如任君之用心官其有不理者耶孰為方來當知一官之居歷百年更二人而後備因其難識其人由其細溯其大必將有得於其職矣端平三年十月朔幹辦公事廳在樓店務橋東舊廳在寶蓮山慈湖楊文元公創有莫能名齋自為記記文四明楊簡為浙西撫屬淳熙十一年八月朔既領事而宅僦隘陋外髙中卑無宴息之所客至不可留不可以奉親偶得在官僧居於寶蓮山之巔帥君雅禮士為更其居又使簡惟意規摹之乃創書室於髙爽之地東江西湖雲山千里幽人騷士來其上無不曰竒哉壯哉快哉且曰是不可不命名簡思所以名之東望大江巨濤際天越山對揖衮衮如畫風帆飛鳥夕陽煙蕪朝莫晦明變態百出於是間名之乎如此命名不惟逰逸顛迷沉溺外景要不可謂真識江山西望錢水玉潔如鏡茂林竒峯樓觀輝月煙靄翠蒙模寫不可於是間名之乎如此命名不惟逰逸顛迷沉溺外景要不可謂真識湖山反而即諸本真斂其放情落其外慕窮理窟之幽微探元珠之杳冥不則事理兩融曲暢旁通百川會同歸宿於中又不則悠然無事惟意所之無所造為樂亦熙熙於是名之乎如此命名不惟逰逸顛迷沉溺外景俱不可為實識本真周思天下古今名言無一可以稱此又豈惟簡莫能名正恐盡萬古明智絶識之士竭意悉慮窮日夜之力終莫能名於是榜曰莫能名齋然則終不可得而名之乎曰有能名之者是齋之南髙松扶踈微風過之蕭然有聲是能名吾齋矣是齋之東洪濤駕風怒號翻空是能名吾齋矣是齋之西湖光翠迷忽飛鳥啼是能名吾齋矣是齋之北與其麓鱗比萬屋人物往復啾啾碌碌是能名吾齋矣有嘲曰既曰莫能名又曰是能名何其立説之無常簡曰常淳熙乙巳仲春記記湯正字中識曰慈湖先生為浙西撫屬日作此今六十年中更回祿廨舍移於平地景物遷改遺迹亦不可復尋三山張君興龍來佐幕府捧檄校文過先生之里偶得舊本歸以白之帥尹乃命工重刋置諸堂山尹於少日嘗登先生之門親承訓誨佩服弗忘而張君亦篤學好修之士也相與表發此文垂示後學當有領會妙旨於言意之間者則先生之心可識矣淳祐癸卯孟冬既望繫林希逸撰廳壁記云廳壁有記自唐始著名氏年月春秋法也凡今郡邑皆有之况天府乎然府諸曹掾皆記而帥垣重客獨闕焉客之重非內外諸使客比居以魁人勝士去而凌青遡紫職最優選最遴其間姓字彰彰猶有老卒退吏至今誇説者顧乃略而不書惡可豈橫翔迅武嵗月借徑有不屑不暇者乎抑有之矣偶焉遺斷不補久而遂廢乎然寄客於僦舍不知幾何年定厥攸居今才一紀僦以前斷垣遺址且莫詰於記乎何有淳祐癸卯夏五月三山張君實來追企前修慨惜闕典且曰向慈湖垂芳可百世莫能名一室先生自扁自記自書以秦碑晉帖寶之可也廨雖移此烏可廢秋闈捧鄞檄實為先生故里遂訪求遺墨以歸鈎畫端嚴典型如在袖以白府公府公少嘗問道於先生得之尤喜即捐楮錢五十萬俾勒石以復其舊因録前人名氏僅存者鑱而置諸壁與是記並且俾余發之又曰吾惟掇拾放失不具僅得諸楊公以下恐義無所本奈何余曰公是劉公昔記直講亦曰聞諸耆舊老人得某甲以下若干人不知者蓋闕此前例也况託始於慈湖老宗師乎後君之客如君之心立身立言使皆以慈湖為則是客不愈重乎君曰諾遂書府公節齋趙先生也名與􅊸洽見聞尚文獻中朝有重名以戶部尚書領帥事張君名興龍端平進士第五人賔主之遇偉矣哉僉廳在府治西淳祐八年趙安撫與􅊸重建記文趙大資與􅊸作廳壁記浙西杭為帥府始於宣和南渡移之京口逮紹興初後復於臨安初命大使時其屬有參謀參議主管及書寫機宜文字幹辦公事凖備差遣若帥非二品以上則參謀不復置議幕亦無常員蓋自六飛駐蹕以來實為京畿道東引稽粵北塹淮堧右起南徐略晉陵亘申浦而傅之江錢塘左注浮金山會吳松而漸於海震澤環附四郡富春以西重岡復嶺界新安而止南則溯桐廬抵姑蔑形勢隄防軍馬甲械錢榖之政視諸路為重吳地大俗侈昔號難治牧善良以培根本燭姦宄以銷萌枿帥於此乎究心而僚屬之選亦不輕矣然承平間暇中外阜寧衣冠輻湊行在所仕者以登畿為樂邊防盜賊之警不聞總護常程春秋閲武之外他非機要幕府文書省簡參佐晨興詣曹亡所受事則肩輿出郭門觴咏湖山間其分曰更直於有司者大抵贊決天府訟訴而已青油談笑之地卑圯隘陋嵗久弗屑顧殊未稱元戎大幕之體余嘗備員機宜不自意後十餘載待罪轂下叨承使指垂一紀于兹乃撤僉舍鼎新之會官屬而落成焉因思夫領事以來撫僚先後幾五十人今同堂合席尚以十數斯可謂盛矣而舊無題名詎非闕典且前乎由幕客而升浸浸登侍從執政以秉鈞軸或任雄劇或居清要或出總方面班班不少後乎是又未可涯也姓字弗紀豈所以侈蓉府人物盛多之意哉于是相與搜稡淳熙以前漫不復省得慈湖先生楊公而下若干人凡參議至凖遣及員外置總以歲月為次敘而迭書之參謀惟建炎范正已后無繼者故不書計議則特置昉乎此故書既刋石請余識其首爰述顛末之大略若乃考評賢否而知勸戒砥礪名節以垂悠久則余尚與諸君交相勉之淳熙十二年正月上元日王應鳳續記幕府昉於漢碩畫之臣繇此其選今連帥之賔佐惟浙右為盛畿內八郡兵民皆統焉率其屬為羣牧倡列職惟四方君子僚罔敢自介用逸曰文書省何詣曹為亦幸遇其時皇皇奠枕無征謀檄筆之勞厥惟事從其長觀所為主優繇長育不相吏也或問自紹興乙卯復置使謹簡厥修若陳鵬飛之倫致之幕下則前乎文元楊公豈無顯者來可悉數乎曰有司失其傳矣惟賢者能使所居官大故首書楊公尚賢也古之仕曰䇿名唐以來官無小或有壁記不贊一辭淑慝自見其嚴乎矧邇在天咫聲實易以章徹而名氏莫或嗣書懼久而軼也乃請於前尹小司徒洪公願伐石志之以諗來者待制趙公始建閫問工焉取復給其費既成應鳳以末至辱授簡焉不敢辭竊謂獲乎上有道惟克靖共毋圖利於大夫毋以望空為髙伻嚮即有僚惟助尹人祗辟懋之哉敢正列其義庶幾相規若古僚友置官本末具於前記者皆不書景定辛酉夏五癸未點檢行在贍軍激賞酒庫所主管文字廳幹辦公事廳都錢庫官廳並在俞家園僉廳在府治西南趙安撫與􅊸建兩浙轉運司主管文字廳在轉運司南紹定中趙運判汝憚建添差主管文字廳在豐豫門內北幹辦公事廳在轉運司南紹定中趙運判汝憚建幹辦公事西廳在俞家園主管帳司廳在戒子橋北河西岸巷內記文李沖撰廳壁記國初藩鎮砥平文軌疏逖諸道經賦咸𨽻計司計有使使有屬曰主管文字曰主管帳司厥後又置幹辦公事參贊而長而帳司掌會計以周知出入百物其事為夥中興駐蹕吳會二浙界江岸海南極於閩粵地相錯如繡守令各撫而封置一計司領之非他使比也洎並建二長六增幹辦公事員帳司仍舊制其事為尤夥凡版籍夫家之會稻田租稅房園關市之入十五都送使上供之目宫府郊廟百師土木繕治之共安邉局田廬編佑之籍嵗出內以數百萬計其任僉幕凡芻餉飛挽獄訟期會無細巨不當問鴈鶩抱文書息相吹如霧必有修能贍智以整齊條緒之放紛參考經常之嬴縮夫然後會計當會計當然後莫能容飄忽欺昔人謂官修其方修之云者飭而治之也既飭而治之矣則令名載而行之茍主張是者漫無所訾省若形具而神不運修於何有故今之銓部􅉨􅉨遴諸道帳司之選非有考第升剡治理顯效者勿授况身近長安日邉者耶得諸睹聞繇是官鬯華問為顯人者武相接前端學給事禮部尚書范公名聲垂延其光尤耿余同年延平楊君宴以甲戌冬來視會事精力於職雖黍晷圭景弗懈厥既再閲嵗幕府燕清圖惟賔寀咸有登載獨帳司闕焉亡以詔今垂後且來者笑人寂寂乃輯前人氏名自趙善永而下得十有五彚書彪列屬余為之記余非嫺於文辭者徒以君之所以諗余者印之嘉定十年四月之吉僉廳在運司內之南提領犒賞酒庫所僉廳在運司內臨安府通判北廳隱秀齋東坡書紹興四年始刻石趙令畤書其下咸淳五年馬通判元演得於資國僧舍移置書室且摹三字揭於顔令畤書云德裕御帶馬公以忠直心奉事帷幄以慈仁力安樂諸人剛直亷潔不回於私有前輩風度每見昔之名士一句一字心必愛之比於臨安通守舊治今為行在御藥院者柱間得東坡先生為治中時所題隱秀齋三字雖經兵火而此書獨存德裕遂加調護將刻諸石為几壁之玩又欲顯白於時余輒隨喜因題其下浩春堂平逺樓鳳凰亭通判南廳風月堂南樓通判東廳右並在府治南咸淳五年安撫潛説友重行修治通判馬元演趙希瓍唐震各涖其役內外一新其堂樓亭宇皆為扁以古篆都廳在府治西淳祐六年趙安撫與􅊸重建考祖宗時諸郡皆有都廳宣和三年懷安軍奏尚書省公相廳改作都廳內外都廳並行禁止欲將本軍都廳以僉廳為名從之命諸路依此今帥府復有都廳不知何始題詠東坡詩并序熙寧中軾通守此郡除夜直都廳囚繫皆滿日莫不得返舍因題一詩於壁今二十年矣衰病之餘復忝郡寄再經除夜庭事蕭然三圄皆空蓋同寮之力非拙朽所致因和前篇呈公濟子侔二通守哀前詩中除日當早歸官事乃見留執筆對之泣此繫囚小人營餱糧墮網不知修我亦戀薄祿因循失歸休不須論賢愚均是為食謀誰能暫縱遣閔默愧前修今和王山川不改舊嵗月逝肯留百年一俯仰五勝更囚同寮比岑范德業前人羞坐令老鈍守嘯諾得少休却思二十年出處非人謀齒髮付天公缺壞不可修景定五年守吳侍郎革和并序淳祐己酉革備員杭倅景定癸亥叨恩假守皆獲踵坡公遺躅企髙風於二百載之上俯焉孳孳大懼茀蔇乃十有二月三圄適空方有感於公除夕二詩而北倅趙公崇鐖忽擕真迹來示喜不自制鑱石以夀其傳因借韻二首庸寓平昔景慕之萬一坡仙不可見見此手澤留惻惻父母心念彼圜扉囚浩穰諒難理鈎距乃所羞承乏事偶同自省凛勿休拊卷想哀矜應與古人謀可但瓊琚詞絶妙驚楊修楚至寶在天地當為天地留解后不收拾荆玉泣囚我來拜公祠秋菊以為羞得此侑一觴永歌弗能休願言託翠珉更作不朽謀遼哉百世下髙風超前修右府治有石刻當直司在府治中門內東記文徐願撰重建直司記國朝之制開封府推判官班六品亞尚書郎非敡歷久者不輕畀中興駐蹕錢塘典京邑者視開封尹而兩使職官猶調銓曹嘉定己卯嵗歸其選於廟堂幕府始增重矣惟贊畫之任於郡事無不與聞剖析民訟其一也凡以訟造庭有必待閲實而後白者悉置犴狴寧無滯淹於是別為訊鞠之所幕府實主之雖他郡皆然而衆大之區五方雜襲情偽萬端吏姦捷出而乘之意所軒輊足變白黑涖訊鞫者精神微不及則枉直易位視他郡尤難焉雖然要在求諸心而已此心至明意動斯昏不動於意如水之止兩造在前一以心聽中無私主是非自公直筆而書無所回撓雖老姦巨猾亦將縮手懾服奚其難太府少卿趙公立夫以精明練達之才兼領神臯期年庶政畢張凡公宇咸次第繕葺顧所謂當直司者隘陋欹傾不度不飭必至阤陊捐錢二百萬撤而新之棼撩髙驤戶牖顯敞周旋其間者視不壅氣不煩繇是平直明清生焉亦擬筆之一助也賔筵諸君喜是役之成以願嘗充員幕下屬記其事不得辭願聞君子能使所居官大在職業之修舉非徒棟宇之宏壯也無忝厥官則無愧此屋不然美哉輪奐於政何補今天府政平訟理幕屬亦皆以稱職聞居之無愧矣故樂為識之且以詔來者紹定己丑十二月一日教授東廳在學之南教授西廳在學之西並淳祐二年趙安撫與􅊸重建記文楊誠齋萬里記題名郡有學學有博士所以育英崇化勱相文治其不輕而重也昭矣自祖宗以來貴之浙水以西杭為大都督府必名儒勝流乃得教授其間中興時巡乘輿駐蹕今為天邑四方之士霧集辟雍而臨安亦置學官俾顓掌其郡弟子員之政令清淑欎積家文雅而人英茂圓冠方屨鼓笈鄉校號小賢關凡為之師長匪進士髙等若膠序解褐弗畀厥官不則從下土來聲聞於朝始擢以拜蓋所以誘人材俟拔取非他郡博士擬異時貴重莫望承均乏使則選所表以假之藝閣睨賢則揠其儲而升之七十餘年得人為多有知政事者有運樞極者有踐台斗者有持風憲者有掌絲綸者至於穆穆布列前後森如也嗚呼其盛矣哉若夫道德之崇髙功烈之輝赫聲名之不泯文章之有傳所以自重於而身增重於而國俾宋作古咸五登三者煥焉可述則又在此而不在彼也於戲又盛矣哉慶元丁巳教授楊君範張君元觀移書諗余曰廳壁故無記前人名氏皆逸弗垂非闕歟初命褎之繇紹興迄於今凡得五十人將刻諸金石執事嘗拜是官盍為我記之豫謝曰豫野人也安得與諸任齒隆興甲申豫嘗得是官而竟弗果居是官終身恨之終身羡之雖然弗身是官獲文是􅈦有榮耀焉其弗身之也奚以恨其獲文之也奚以羡則不敢辭乃為之記楊君三山人以上舍釋褐張君旴江人以科級世家皆一時名能文進士有德行道藝方遐其騫者也戊午秋七月中元日僉書判官廳在府治後定安橋西咸淳四年安撫潛説友重建有芙蓉堂觀察判官廳節度推官廳並在府前近民坊觀察推官廳在僉判廳西府院在府治西左司理院在府治東右司理院在府治西司户參軍廳在府治西司法參軍廳在府治東城南廂廳在嘉會門外記文鄭湜作廳壁記自秦郡天下太守掌理其郡內史掌治京師漢更內史為京兆尹大抵其佐吏丞尉外有掾有督郵督郵功曹之極任河東大郡二十一縣田延年為太守分兩部以督郵尹翁歸部汾南閎孺部汾北誅鋤豪強姦邪不敢發又有東西南北中五部號五部督郵孫寶為京兆辟掾侯文東部督郵敕曰今日鷹隼始繫當順天氣取姦惡以成嚴霜之誅然則浩穰之地豪強姦惡為良民害誅鋤之義有不容已分部從事大郡猶爾况京師乎唐都河南本朝為别都有左右軍巡使判官掌凡風火盜賊及推鞠之事左掌水北右掌水南待制劉公安世嘗為之開封都城則有加焉或以光祿寺丞兼左軍巡事或命翰林學士樞密直學士各舉左右廂授事判官一員熙寧三年始以京朝官曽歷通判知縣者四人分治京城四廂凡民有鬬訟事輕者得以決遣從開封府之請首辟蔡公確為幹當京城左右廂公事人猶仍舊稱故史謂公自巡官為監察御史後至宰相繼又以開淘渠塹屬都水監救應火燭屬巡檢司惟檢覆抄劄打量定驗支散凡奔走之役歸之兩使臣中興駐蹕臨安紹興十一年先從開封例城外南北廂置主管公事所又於城內左右廂增二員分減在城詞訟尋罷惟城外如故自是以來七八十年間為此官者率更倅二宰字方在選去而登華近者亦有其人最著者才四三年范公處義為殿中侍御史至袐書監王公柟知臨安府至太府卿外分守符者往往皆是又幸今治平中外綏靖衆大之區編戶日繁南廂四十萬視北廂為倍民安生樂業鬬訟衰止無俟乎誅鋤里閭晏然歌笑之聲相聞有承平京師之遺風焉如湜材下亦得以濫吹於此惟知盡心戮力無負於其職之所當為乃無毫髮可以自見猶冀更滿求自放於山林之間與田夫野老遊想望都門之盛而誇詡之以為美談亦可樂也廳壁未有題名訪諸故牘得自髙公某而下至今凡三十有八人刻諸石使來者得以繼列云嘉定十一年六月五日程珌作續記真宗皇帝嘗謂宰臣曰閭里細民罪止笞者當即處斷毋令淹繫卓哉聖明之見大哉帝王之謨也蓋京師衆且大茫洋煙海氓蚩蚩小不忍輕詣有司未有不尋悔者悔則已縶莫脫矣明主端拱穆清心運四海俯灼窮閻之情旁察吏治之弊故開封分廂者四非欲其易治歟粵自東幸於今百年錢塘版籍百倍往昔南北二廂設於關外而分任之地皆六七十里顧南廂所統尤為延袤北至艮山南底南蕩五方雜居水陸互市國家封疆萬里多在西南若衣冠之朝紫宸琛貢之入太府皆休車弭擔於江皋用是人滋衆事滋夥凡訟於廂庭者率繫縲數日吏屬饜乃得去今姚君之臨涖也蚤受晝省夜決要不踰宿吏不得銖兩索塗稱巷快謂昔罕聞蓋姚君嘗為雕邑賦迫上州急湯火尚從容以集矧廂亡賦惟訟烏得不風斤承蜩乎初江漘舟如鱗率名占強宗官不得使逮君悉籍之俾之番休役旦需涉者免淹滯人謂剛不吐斯其有焉日既間訟稍清眷言壁記老梓且溢乃易石載之而屬記於豫豫為疏其張官初指以告後之登名斯石者姚君以儒名家以能稱吏刃銛而不傷削吏而垕本故形見若是他日事益暇則又闢𪠘門新繫室摧者整漏者密且築堂窿然扁以清風頃頽塌雜市塵今始知為官府僉謂君為中興此官首嘻世之以營繕為作新者末也使得推此道以碩其施其又可量邪寶慶丙戌七月上浣城北廂廳在北關門外咸淳臨安志卷五十三
