body:
  text: 咸淳臨安志卷五十四宋潜說友撰官寺三諸縣官㕔錢塘縣縣治舊在錢塘門裏三十步今景靈宫車馬門裏是也去本州舊治九里後徙於紀家橋之西北以華嚴寺故基建去府治四里樓參政鑰為壁記晝簾堂勤清軒記文錢塘古都㑹繁甲於東南髙宗南巡駐蹕於兹厯三朝五十餘年矣民物百倍於舊附郭二邑事體寖重他郡邑莫敢望紹興二十七年有旨錢塘仁和比開封府祥符兩赤縣中書擇才授任秩滿許以陞擢於是選任又重仁和乃錢塘之分故錢塘尤重焉舊治在錢塘門内尋入景靈宫禁衛乃以華嚴僧坊故基為之在國庠之西南邑鉅事叢才者或病之紹熈二年宋君价始至興滯撥煩坐以無事首作夫子廟以崇儒風建狴獄以清囚繫因又裒彚前任人名氏將刻石以記縣既甚古蒐考史牒自宋元嘉中劉道真至呉越羅隠凡得十人國朝張君房而下抵今凡三十九人具載嵗月亡者缺之使後有考焉君實景文公四世孫風流未逺儒雅飭吏敏於從政故其施設知所先後如此鑰與君素有姻好喜君之優於仕也為之記始末又告之曰壁記不可無也然縣令去民最親賢否不可得欺彼卓太傳元魯山諸公著於民心千載猶不忘盖有不待碑而後傳者君尚勉之丞㕔在縣衙東嘉熈四年徙簿廨西主簿㕔在縣衙西尉司在錢塘門外隆興癸未尉施温舒建嘉泰三年尉髙不倚脩華庚記寳慶元年尉余天任重建袁肅記記文華庚記錢塘尉承平時號八仙裕陵覧西湖圖嘗有真仙尉之語時則有真仙亭東坡帥杭率賔僚來游時則有英游閣林和靖訪謝尉賦秋水芙蕖時則有咏物樓陳后山興寄髙逺形於篇咏願得終身為禦冦亦可想其盛也南渡後公宇弗存僑寄昭慶寺隆興癸未施君温舒徙望湖樓之桃園規制草剏逾四十年因陋就簡漫不加葺其間豈無思復舊觀之人盖自駐蹕為行都錢塘為赤縣尉職始冗百府百需悉倚辦焉文書督趣旁午有呌呼於門吏縮頸潛遁尉惴惴救過不給奚暇營繕為哉嘉泰辛酉永嘉髙君不倚實來環視官舍棟撓掾腐若將壓焉欲増葺之顧自謂身為親民官毫分未及田里不敢問越明年嵗稔官閒乃謀工師乃度經費乃有請於郡若邑雖上下一辭或相兹役然聚財峙粮力猶未及又明年將𤓰及曰是豈可累後人乃捐已俸并郡邑所助撤而新之㕔堂室廬舍二十有一閒堂曰擢桂曰平湖亭曰真仙軒曰清風今大參許公為之𨽻古以扁其楣既成欲以先後涖職姓氏刋諸石嵗月逺者莫考獨張仲顔見於王隨放生碑許淳仁見於東坡奏議他不可復得乃㫁自紹興二十四年而下得十有七人求記於余余以為尉之官最卑有材未易展信足以孚乎下而道不能獲乎上雖有志奚其遂髙君蒞官甫數月以鎻㕔登太常第雍容間雅裁剸有餘題名小事儻職分所闗有一未舉決不暇及今也易隘陋之居為髙明在箠楚塵埃間文之以禮樂百廢具興一毫無擾亦可謂之難矣余故樂為之書且以告後來者云袁肅記官府之居於仕宜山水之樂於隠宜二者不可得兼也居官府矣簿書囂塵之間適與山水㑹盖亦有之然或瞰巖而倚麓或阻澗而臨流是一邱一壑非山水竒觀也至於戸庭之旁四壁而羣峯獻狀几席之上旁睨而巨􅒓揚瀾又亦有之然地靈不足以動大君之品題景物不足以發名勝之吟賞則亦未為山水之遭也間有遭焉者曠而遐野而僻非能依神京之樞極近金城之觚稜也幸而宻邇都邑矣棟撓弗支庭茀不治而山水精神藐若不接過者太息若今錢塘尉治不惟適與山水㑹而又飽湖山之竒觀焉不惟竒觀足以娱目而又有裕陵真仙之褒和靖後山詩人之詠南軒名堂之勝焉不惟品題吟賞之有遭而又依天子建都為赤尉焉不惟跬歩修門而又有如余君子大之賢能使所居官大復創公宇足以稱赤尉之居發山水之秀焉吁其可謂兼仕宦隠居之兩全者矣由嘉泰而上廢興顛末壁記畧具寳慶元年冬余君實來覩治舍傾頹慨而曰今朝廷百司庶府粲然惟新吾秩雖卑豈可因陋不改為耶已而職脩務簡亟請于府尹尚書袁公公喜為開端厚助迺經之營之築石塘二十尋以䕶其趾為屋五十楹加於舊址五之二㕔事門廡既崇既敞堂曰擢桂曰平湖軒曰清風延賔之室曰真仙樓曰英游其下曰咏物皆因前人命名又名其亭曰水雲經始于二年仲秋越六旬告具季冬之月余往過焉輪奐翬飛恍然改觀君因俾記其事余謂風景係乎人不係厥居今夫京邑繁盛可以暢情舒嘯惟有湖山之樂居闉闍而時至者鮮矣列簮紳而時至者益鮮惟漁童樵叟旦暮寢食乎其中而不知味也尉居於斯可以知味矣然盜屏姦薙則靜對湖山神怡意適而有快於心其或無以獲乎上無以安乎下則雖境清居潔心欎欎而不暇顧者多矣繼是而有欲知山水之味如余君盍姑内省其職乎職舉而居葺嵗乆如一日也樓以英㳺名實取東坡帥杭率賔僚來游故事尚書既祠坡仙矣三年仲春與客蒞止君方賛帥幕主賔歡洽而又踵前聞人舊逰不知坡仙時為尉者真見知如此否乎故併書之使來者信余君之獲乎上而安乎下也仁和縣縣治舊在餘杭門裏梅家橋西今北省倉紹興三年縣令孫延直徙于招賢坊紹定五年縣令胡巨卿重建喬魯公行簡記無倦堂淳熈十一年令陳鞏建倪文節公思記安敬堂嘉泰二年建姜䕫記今廢記文喬魯公記仁和在吳越時為錢江縣與錢塘皆附郭皇朝興國三年錢氏奉圖籍入朝改今名建炎南渡二邑俱視赤縣跓蹕之初披荆榛立都邑志不久在吳㑹宫室省府猶曰草剏况令居乎仁和縣宅雖莫詳締建之始距今殆不止百年屋老且腐紹定壬辰胡君巨卿來領縣至之日顧瞻庭宇梁扶棟柱岌岌動揺旦起視事如坐巖墻之下凛乎其將壓焉前是紆墨綰銅不啻數十令堇堇支傾補敗指日以俟踐更何暇為持久計令雖健而決束于枵單末如之何人固不以咎令也今京尹余公宿知其然宰一日上府京尹顧謂之曰君子所居一日必葺况有地百里且附于王畿敝陋若是曽不逮鄙小縣我念此舊矣今其可諉是責於他人乃捐錢四百萬俾更之令承命惟謹即度財賦功增庳培薄易湫隘為顯敞自門向㕔宇廊廡堂皇寢處庖湢無一不撤其舊而新之經始于壬辰之孟秋迄事於癸巳之仲春見者環視拱睨無不洞心駭目是月也木章竹箇悉市之他山庸工如家輿匠肯來一金一粟咸出于公里胥恬不之預盖京尹厚於捐金令尹篤於任責宜其率作興事不勞於民不愆于素起百年之顛仆為一邑之壯觀也始邑之獄舍傾圯門闗殆不容楔縲繫其中者既無以宣其厎滯之氣而令問囚其下幾無立人之所常平係省二庫亦久弗葺至是皆為之更創堅固縝宻足以支久弊極而亨勢固有所待也令尹來諗予曰邑之興作自始事迄落成盡出京尹令官府屹然吏民俱受宏庇願托文辭以記其事予曰是可書也京尹諱天錫今以户部侍郎兼彈壓之任風力强濟多多益辦政平訟清百圯具舉縣宰平易近民居官可紀政以最聞盖不特興廢起弊一事而已是嵗季夏望日之倪文節公記故簡齋先生陳公之孫鞏宰仁和明年稍暇始葺縣舍北鄉數椽為齋名之曰無倦而求文于余其言曰自輦轂駐東南仁和遂視赤縣事之繁劇不待問而知方其紛至而沓來俯仰應酬雖甚精敏窮日之力有不暇給者吾以緜薄不自量而冐焉以居吾甚懼焉是以朝夕黽勉而不敢須㬰以怠又曰縣事雖甚冗吾於退食之餘獨可無一室自休以為思政之地幸縣有廢屋因其舊而稍加闢焉於其成而取吾夫子所以告子路者名之庶有警也其為我記之余于陳君有鄉曲雅素嘗訪焉視其庭無一人急走疾呼者詢之里閭則未嘗有留滯不決之事盖陳君敏而才又能勤以不懈宜其政之治如此抑余聞之古之為政者先民事後之為政者辦官事而已也如先民事則其所汲汲焉者無一不在民故政脩而民以被恵茍徒曰辦官事而已也則其所汲汲焉者乃將有病民者矣夫身以先之又勸相以勞勉之於是而繼之以無倦則吾夫子之告子路無非為民者今縣令困於簿書期㑹訟獄賦斂之間於農桑教化之務凡民事之切者或置不問豈獨其力之不足歟亦其勢之迫使然也若陳君於官事既辦矣於世之所謂能吏則既優為之矣非其力之有所不足而勢有所迫者也茍又於吾夫子之言有得焉以其無倦之情施之民事則夫政績之美當與古循吏比可也今明天子垂意字民之選褒表其尤以風四方偏州下邑罔有遐遺况其近在轂下者乎於今世所謂能吏者且猶選擢不棄况如古所謂循吏者乎陳君勉之無謂古今殊時而以余言為迂也既以告陳君遂書以為記丞㕔在舊西皇坊改為大理寺紹興二十年徙於觀橋北普寧坊丞趙師醇建主簿㕔在縣治東七歩紹興三年主簿歐陽康世建嘉定丁丑展充縣學至今未及再建尉司在艮山門外范浦鎮市紹興元年正月尉髙公泰建買納支鹽㕔在湯村鎮市餘杭縣縣治按輿地志舊在溪南東漢熹平二年令陳渾徙於溪北今在縣城内西北隅宣和中令江袠建後毁於冦建炎三年令張永嗣重建乾道四年改創縣門鼓樓紹定癸巳令趙希磐重建洪忠文公咨䕫記記文洪忠文公記曰餘杭苕霅之津會故冬予奉老親行霅上諸山扁舟循苕溪而下間登岸從牧翁溪媪語人人夸誦吾令年方壯而識老政出清靜民曽不省有官府也因以野服謁訂所聞令肅客于丞舍起訊之故曰縣治舊占溪南後徙于北宣和焚于睦㓂江令袠重建建炎焚于金冦張令永嗣又建閲年百餘浸淫穿蠧凛乎欲壓圖撤而新之治寺吏民之耳目非他役比故不敢不勉予退而心念是邑近在畿内地望非不枵然大也而土薄水淺十日晴則告乾三日雨已相戒為溢偹民以故亡盖蔵而令以負租督過者十七八彼芘于是豈莫為壓焉之懼哉所壓有急於屋者也見大夫以朝士來寧久此茍可撐扶以了嵗月何新為新之寧不勤其民而自為紛紜耶未信潰于成也越嵗月苕人過予門曰縣事成矣治事之㕔退食之堂晏息之室崇楹䆳闥表裏中度發地得中霤遺跡位置面勢且還其初矣屋後惡木冗莽鴟梟狐狸嘯醜舞􅏜之地薙翦不留餘拓圃結亭松竹伍伍氣象一新矣而田里晏然罔聞知嗟夫縣無劇易視令為劇易弱者以茍偷為安遑恤我後强者惟力是矜一役之興萬蹙之乗也於此能於政休俗暇儲材庸力以植壊起仆使吏治尊民瞻聳而一毫不以勤其民至斥圭田再嵗之入以食功可表也已惟昔聖賢道化之盛有本末而無内外其用力自相在爾室始盖萬室之治不如一室之難也言偃宰武城澹臺滅明非公事未嘗至室是室之嚴所親必直諒所講必正大所踐必誠敬詖辭詭行姦聲亂色無一得以揺吾之清明而弦歌之化行矣令其進於是乎役起正月己未訖五月癸丑大尹詳定户部侍郎余公佐其費為多令公族名希磐以進士試刑法中其科嘗為大理評事云紹定癸巳秋七月甲子丞㕔在縣治南主簿㕔在縣治東南尉司在縣治南臨安縣縣治在錢武肅廟西嵗久不葺景定三年令家之巽建有秋軒及元祐學堂咸淳二年令趙汝重建堂屋門廡丞㕔在縣城主簿㕔在縣城尉㕔祥符舊志云在縣城西北五里咸平二年以西市驛置今徙於縣東門外主學㕔在城内於潛縣縣治在石柱峯之右嘉定癸未火衮繡堂獨存寳慶丁亥令方熈重建亭榭池館依山占勝實為他邑之冠思政齋紫薇館深眀軒月華扶春諸亭衮繡堂在㕔事東偏令邵文炳建為記㑹心樓在縣治東洪忠文咨䕫記此君軒在縣齋洪忠文公咨䕫記記文衮繡堂隆興初元緝熈庶績攷覈民庸宰邑有聲必加表厲作新吏治逺邇用勸潛故𨽻丹陽郡山溪深幽傲睨激射其俗儉而質其民勁而武殆不與澤國𩔖既别而州廢而邑離合雖異而遺風餘俗猶有存者吏立故常媮翫不理往往詭以逺陋迺今越在畿内聲教漸摩靡然興于禮義民視吏治良否皆黙識而品第之故常難服而易化茍有以應所傒則相與愛敬而不忘金華葉公之來察里閭情偽鋭於植立求有以稱塞明詔㕔事東偏有堂深静而虚明為退思之所融融萬理出而施之所以洗濯而鼓舞其民者蒸蒸無復茍且之意令行政孚流聲轉聞首被推澤不十年遂宰天下邑人誇詡以為昔所未有後公來者欲踐武増光而亦未能也衮衣繡裳室邇人逺之歎及兹未冺予家晉陵公嘗分符臨吾州頗識公橅榘乃今獲承遺烈三十年之後顧當時所居之堂傾陊摧朽殆將壓焉於是剔蠧扶顛振而新之揭名衮繡不獨慰父老思戀卉木暎帯軒廡欣榮改觀之態亦發越而形見焉夫運天下與治一邑事孰與侔而俱以宰稱均一子惠之道盖非有二本源泉混混放乎四海細之所自也登兹堂而遐觀心存古人夢接千載能使民安其生物得其所薰陶至和追還醇風於以寫鳴弦之遺音歌衮繡之聲詩斯無愧矣雲臺丹青惟身榮之慕則非所敢知也異時名流歛所施以寄百里必有印予言者㑹心樓潛負天目支峯石柱為縣治前繚鳳凰青山右峙岝㠋三面騰躍駿抜多竒觀東山獨庳伏不稱疇昔甞於門阿少左作近民樓以亢厥勢而地迫雜囂非宜火且十年矣今令荆溪張君本來公餘馮髙周覧謂景岡觀泉辨隂陽而位置古人所重相攸衆樂園亭之列岫正枕東麓可駕庳以為崇屬時農隙買材賃力斥亭為重屋三間飛跂縹緲脫氛壒而接雲氣扁㠯㑹心其下軒窓靚深仍列岫之舊名前二十步山碕斗立碕外八十許步灌莽叢葦争長夷為圃以射北有静凉亭環立鉅竹迺取徑于亭之東南涉圃級碕而升樓群山奔奏一攬而有如主人由阼階肅賔及介相與揖遜醻酢於几席間不譁不偪左右具宜邑勢隠然以尊非直為臨眺設也而郤紛領要䟽滌此心之煩欎以熈其民厥有助焉人心元體湛然太虚之涵萬象無主則物誘于外心往㑹境有主則理融於内境來㑹心定而明静而所見物物皆春意斯得所㑹矣君起中興世家年壯而識老氣盛而志立其政以不擾為理以勤為功咳唾指顧几按氷雪而彈琴讀書於退食委蛇之頃泊如韋布坐以静勝雲生前岑鳥啼後塢往往忻然契所適是樓特寄焉爾其成也以紹定辛夘臘月丙子越明年立春後五日此君軒軒舊麗寂照精舍東坡以倅杭行縣為賦不可居無竹之詩隆興初徙於縣治衮繡堂之東開禧間嘗重建寳慶初元避上嫌名令桐江方侯熈易以此君軒仍用坡詩晉王徽之語也君者有徳位之尊稱自萬乗至子男百里之國皆稱君以君名縣齋之竹其尊與君百里等然竹之君以徳言百里之君以位言知君之所以為徳則優於君百里矣易之震為男為蕃鮮為蒼筤竹其於時為春春物之生旉而蕃鮮莫竹若孤根峭植不數嵗被山而雲戴角蠒栗曽幾崇朝已干霄而槊生意勃勃乎其不可禦故欲觀造物生生之徳亦莫竹若也侯政成心休日與君對念吾民生齒之數能如君之蕃乎生飬之具能如君之阜乎襁褓鞠育能如君日夜所息與沆瀣俱升黄髪婆娑能如君什伍相依少長相扶老嵗月飽風霜而無憔悴之色乎以君之生觀民之生侯于此不徒名也吁人未哺吾不可以獨飫人方􅋯吾不可以獨腴對此大嚼奚心哉説詩者以意逆志可也題名記洪忠文公撰六飛都吴邑加重令加選題名昉于隆興甲申續於嘉泰癸亥前後著見者四十有二人石近燬紹定戊子續記自見大夫始舊聞放失矣九華程君燾至精敏而峻絜大不弛綱細不漏目民𨼆吏慝蒐獵幾無遺治行亹亹逼前獻垂滿討諸故府合題名三為一以存往而詔來且追書唐及國朝全盛時賢令十一人于首髙山景行不以耳目所接為僅足也然著記未免於闕文遺風或得於慨想東晉虞府君嘗為吾長吏甚有遺愛志逸其名託錢武肅乾山濟安廟碑以傳邑自漢𨽻丹陽以來為令者知幾人傳者能幾否固幸其不傳臧而不幸不傳者可勝道耶夫士君子立於世豈以傳而為善不傳而遂已也未有為善而必其傳也亦未有善積而名不傳也其亦為所可傳勿為所不可傳而自幸於無傳也雖自幸於無傳而根窳相形其溢於邦之耆老俊秀牙頰間者未嘗不並傳也書曰康乃心顧乃徳逺乃猷裕乃以民寧司民社者尚監茲哉丞㕔舊分縣圃剙建淳熈四年丞婁機脩尉李揆記嘉泰中趙師傃遷於縣倉基重建胡衛記記文李揆記廨宇之設所以嚴官守也丞㕔跨邑邑之東餘百􅑤矣爽塏卓踔他無與並蕪辭累氣弌不厯於心耳居之甚宜且肅也名巒絶巘百里一矚好謀者不待駕而獲好詩者不待索而助好静者修然好裕者熈然好逹者軒然推是𩔖以往率有得于中而感於外比夫側身扃影於湫隘囂塵之間詎可同日語嘉禾婁公機逹於權敏于事朅而佐兹邑予知其羽儀于天朝也匪伊或告之曰更之者匪他異而第俾我來者數數然無寧居何也公得無為後人計廢而復之為是集而循之為非矧古語有之公於是躡舊阯仍舊貫恐其於人侈於費也一切取具于已故其經始也邑人知之其畢役也邑人弗知之且榜其亭曰日哦抑循舊名也公之旨淵乎先是陳公念前此名氏弗克立命予誌其顛末余知其久必復始以微文見意然不知如是之亟也事洄沈而好還乃爾事未可為而為君子以為愎可為而不為君子以為固二者惟當時已矣他有可書此不復書此何以書書時也者胡衛記一縣之政毛舉萬端大者風俗保障小訟獄簿書掌之於令貳之以丞所以參是非之權折諸至當必如家人伯季相視無間斯可矣世衰道微良法美意百不一古位髙而偪自韓退之已有此論如陳南仲于武功簡靖以輔其治逖視來者鮮矣令者令也令人於善也丞者承也承人于善也令不令則丞不承感發之機微而方寸大而治國平天下理歟勢歟潛舊為州規模視他縣為壯獨丞舍更革不常因循寓縣圃前令王公際易于西隅囂塵湫隘不足以尊官守臨吏屬嘉禾婁公機以丞攝邑竟割縣圃大半為之距今三十載棟宇之植者撓矣軒戸之新者剝矣矧左據下瞰識者病之為令者憚于用度不思通變之宜為丞者挟建瓴之勢泥於喬木幽谷之遷皆汭鑿莫入地利不得其正求之人和宜有不可余知顛末之久朅來民社不敢自謂邾小正名為先浚儀趙君師傃適佐斯邑以情商量欲使縣復舊貫丞獲美居迺相地于邑之南五十餘歩役不及民山川協吉為堂二所廊廡森然自門軒至於庖湢莫不偹㕔治巋然視舊而倍將成趙君代去盱江張君國均繼之張君江右名族茂于學業温良之風不待即之知其為君子也視事踰月情好益親一日謂余曰今丞治輪奐新偉皆君之力而園池不足若我之游息何㕔之東有餘地百畆君為我卒成之余迺鳩工度財剗夷荒蕪外列芳甸中蒔荷沼復建一堂鎮其景物前望山翁後負岝㠋華而深廣而麗與縣圃東齋相為頡頏皆一邑之領袖偶閲栁子厚集得述六職之語文與意㑹即取以名少北自堦而升數十級植亭其上環以桂樹命曰凌寒用謝靈運詩兼山與桂而言也㕔之西又闢一室松梅隠暎修竹掀舉其名則舊其景則新謂丞之故嘗有日哦之扁今因之存古也三者之役費加于前往來之人𩔖詫曰目所未覩盖丞之輔于縣者必竭其智故縣之徇於丞者不遺于力侈其居者所以尊其官尊其官者所以使後人多樂就昔退之之記藍田也庭有老槐南牆千挺對二松吟哦其間足以思崔斯立之髙致然占位惟謹不敢畧省負若丞哉今余與張君脱畧邉幅政事必詢而又相從於園囿吟咏之樂視退之所記當有光焉丞㕔畢成於乙丑之九月及予將代始克為之記潛洪忠文公咨䕫撰續題名記吴門葉君芑丞吾諸臺交薦其材垂滿過余以題名更端屬之記且曰官無庳崇職無簡繁事無易難惟敬則行居是官而㒺其思非敬也居是官而出其思亦非敬也上不侵官以僣下不怠官以曠心止於事靡他其適如農有畔行無越思其斯為執事敬乎芑不佞何足以及此惟是常平義倉之賦受丁口力役之簡稽暨上官所以奔走使令之悉惟謹土膏脉奮凍解泉動出入阡陌程督坊瀦日與臺笠襏襫相爾汝過此不問也有堂述六面山而附沼嘉卉美竹參伍布列暇時玩游鱗之溶曵聽幽吭之啁哳弄柔芳而坐宻䕃以休其心負丞不負丞不敢知也予愛其言知敬於職業因筆而畀之石且告來者主簿㕔在縣治東南二十歩開禧中簿邱耒重建王日益記記文開禧丙寅秋予來古潛間過丞尉登述六髙雅二堂見其庭廡峻整園池軒豁而壯之至過簿舍則陋不足以回旋恠而問焉曰前令胡君衛與同官輯和無間均欲作新其居而前簿牽于隂陽拘忌不克承故視佗廨為獨陋越明年夏雨潦淫溢垣宇摧頽簿姑蘇邱君耒請更新之予以未暇辭而請愈力乃始經材飭工貿並居民地而宏其規制䇐事有庭燕居有寢吏舍庖湢前拱後且築堂于左仍舊扁以景覽偉麗倍蓰疇昔費給于節約之餘財而歛不及保伍工僦於游末之餘力而役不及田里薄噐幹優茂以與予有先契俱避出納之嫌設局董以吏而躬不與始事以七月乙未訖事以九月戊寅旣成而落之簿舉酒属予曰微長官不及此予曰不然寓圻邑官府非𢎞麗無以聳視瞻要必人和年豐乃克集事今邉塵未清潛不知有旱因其豐暇為之老令何力之有然吾徒居處寢食當知所自來叶乃心力圖濟斯民美哉輪奐庶無愧簿曰唯因勒諸石以告來者尉司舊在縣南五十五步後遷縣南二里初尉萬逮重建令胡衞記記文環百里而縣有令有尉尉之職不衡于令廼以武事佐令于理所以參相制也成周爵列惟五各世厥祚軍帥以卿天子命之嬴秦郡縣天下郡置都尉縣置尉與守若令峙文武因配大畧舉焉顧慮亦逺矣漢承秦舊縣置尉二人小則一人長安城中有四部尉邉有徼塞尉其制瘉備然材官騎士征調不古都試之法竟罷尉得職盖寡晉隋間縣正書佐令自辟置唐初沿而未改尉權日削不返厥初焉用牛刀若將凂吏吏能一冠畿邑當路轍謂宜自貶抑無獨出人右下弗抗厥任上弗隆厥予設官之㫖豈其然哉為令若尉者儻弗克崇之後將安所稽乎余官于潛一時寮宷簪盍偉望四明萬逮及之實董尉職清敏强幹克振厥事盗賊屏息人無敓攘余以故得悉意字撫民龢吏肅政臻于成及是間暇亷取嗇用以起百廢甓涂梁溠利民之政罔弗舉則又將撤宇廨而新之惟嚴之分水湖之安吉宣之寜國其俗矯健不怗潛實與錯壤征鼓之節表防不肅騎卒之需廐庫不備不可以立武余心恧焉征官之廬貳政之宇既崇既飭鈎稽之所儆肅之司盍以序舉簿忌於興作而辭尉勸於程督而請於是即尉舊治􅗎民之隙鳩工度材以植百礎人厚其傭役不憚勤物倍其售供不告病經始於三月乙亥落成於四月丙午儼堂皇以莅官䆳複屋以退食榱桷楚楚階序翼翼有亭有館有庖有湢門廡軒敞亷隅峻直偉岸雄壓盖十倍其昔習武之區仍彼舊貫峙于右方櫜弓之府閲士之塲甫畧亦備其燕休之堂扁曰梅隠慕子真之清節也其際賔之塾扁曰髙雅景象先之逸躅也取李太白清風佐鳴琴之語命其樓取杜子美風吹錦繡香之語命其亭而髙雅之東有室曰容膝則有陶靖節之所著也各有所志可以逆知垣墉既崇丹艧既施諏龜戒吉式正厥宇風采焜煌人用改觀當此之時豈特尉有以自慰亦足以慰百姓之心矣事已尉過余有請曰願以其實登諸紀載來者將有攷焉余弗克辭則摭尉事始末記之且相與言曰使為令者弗擅而通為尉者弗抗而敏種徳以抉柔立威以戢暴則雖天下可運於掌豈特一邑而已哉遂書以畀之俾勒諸石監稅㕔在南門外富陽縣縣治在縣之東北嘉定己巳令吕昭亮重建丞㕔在縣治西主簿㕔在縣治東有雙眀閣尉司在縣治東監税㕔在縣治東南監酒㕔在縣治東南新城縣縣治丞㕔在縣治北主簿㕔在縣城内以杜陵舊宅為之尉司在縣西六十歩鹽官縣縣治太平興國四年建政和元年令王昞重建縣㕔紹熈元年令陳恕重脩鼓樓清愛堂題詠郭知運清愛堂詩清愛堂前竹色佳留烟帶月翠横斜日長吏散庭空後風景蕭蕭對瀹茶平政堂錦香亭仰髙亭丞㕔在縣東五歩元符元年建淳熈四年脩有挺立軒芸香亭主簿㕔在縣東五十二步元豐八年建紹興十三年徙于縣西五十歩尉司在縣東一十五歩雍熈三年建大中祥符二年重脩淳熈五年增脩題詠梅堯臣送劉少府詩我祖南山尉時危隠去仙劉郎從宦日天子治平年燥茗山中火熬波海上烟吴民不為盗惟此撓君權昌化縣縣治依唐山乾道八年令卞璇始剏園亭堂宇滴翠堂朝陽堂三瑞堂夕霏掬雲主簿㕔在縣西南五十歩淳熈末簿施宿剏瑞應堂尉司在縣南六十歩咸淳臨安志卷五十四
