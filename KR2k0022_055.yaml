事之明年視公儲之充羡嘅舊帑之湫隘乃度地于犒賞庫之側為屋二十五間公宇吏舍各有其所中為搃庫翼以兩廊周以崇垣塼石瓦甓既堅既宻經始于是年之三月越兩月竣事為費十萬楮有竒乃叙其梗㮣屬記于余余作而言曰斯庫之創固上仁下義之明驗也抑余以為財之積固難而守其財者尤難守財者固難而善繼其守者尤難咸淳初元距今將漕者凡七人日積月累涓涓江河不有吳君孰與瀦之非善守之難也有増羡無滲漏庶乎其善繼矣否則有化為無實化為虚雖有此庫誰有此庫哉余于是乎書非徒為吴君喜又將以勉後之人咸淳八年六月朔日公使錢酒庫在本司内提領犒賞酒庫所在樓店務側臨安府倉鎮城倉在餘杭門裏師姑橋淳祐三年趙安撫與􅊸重建為厫二十畿甸重根本倉箱富峙儲自從今以始屢喜有年書咸淳五年安撫潜説友重修常平倉在鎮城倉東淳祐三年趙安撫與􅊸重建場交木場在龍山抽解竹木場在浙江㟁北大場一在打繩巷江漲橋南一在餘杭塘上子場在西溪柴場一在糯米倉新房廊巷一在金波橋南瓦子後河下一在舊糧料院巷内一在太平坊融和坊巷一在俞家園活水巷内一在將作監修文坊巷内一在薦橋上中沙巷内一在睦親坊宗學相對一在新橋油局橋下蠟局内一在鹽橋上八界巷内一在衆安橋北南起居亭一在富樂坊内一在將軍橋大瓦後一在聞扇子巷一在候潮門裏石板巷一在豐樂橋親事營南門投西毛郎巷一在大樹下七郎堂巷内一在糰子巷鵞鴨橋北一在茉莉園軍將橋下參議㕔對庫軍資庫在府衙門左淳祐五年趙安撫與􅊸重建囬易庫在豐樂橋南嘉熙元年趙安撫與懽重建常平庫元在軍資庫内淳祐五年改属通判南㕔公使錢庫在府衙東公使酒庫元在府衙西淳祐六年趙安撫與􅊸改建于西教場東北門甲仗庫元在府衙東淳祐六年趙安撫與􅊸移建于教場東北隅咸淳六年安撫潜説友又移建于玉蓮堂舊址書板庫在公使庫内公使醋庫在府衙後教場角子門紅亭醋庫在菜市橋東街南面北大路營醋庫在小新營上街東棚前醋庫在棚北橋東面西北比較醋庫在都酒務西新房廊相對都醋庫在井亭橋東大街面北朝天門醋庫在朝天門裏大街面西修城北醋庫在鵝鴨橋東大路面北南北較醋庫在三橋大街面北城南醋庫在牛皮巷口龍舌頭停閉日久已行坍倒續據㸃檢所柴客葛太請佃安頓柴薪月納公使庫息錢范浦醋庫在仁和尉司衙側江漲橋醋庫在城北廂醋房巷橋河東㟁務樓店務在府治東中和坊内都税務在壩頭市東大和橋北浙江税務在浙江岸跨浦橋南龍山税務在嘉會門外浙江岸龍山之東唐坰嘗監龍山税見古靈薦稿北郭税務在餘杭門外淳祐六年趙安撫與􅊸重建江漲橋税務在江漲橋鎮市淳祐三年重建院都作院在白龜池諸縣餘杭縣縣倉在縣東税務在溪南臨安縣常平倉在縣南六十歩縣倉在縣治東錢庫在縣治酒務祥符志云在縣南五十歩太平興國五年置税務在縣西市廂去縣三里祥符志云太平興國五年置至道二年徙于縣治太平祥符二年四月徙今處於潜縣縣倉在縣城税務在縣城西二十歩酒務在縣西二十歩乆廢紹興十年以後百姓均納酒課名錢隆興元年縣令葉衡申請抱買開沽富陽縣縣倉在縣城東南一百步依石頭山古名石頭倉城周二里三步俯臨大江寳慶元年燬今徙于縣治之西十步縣庫在縣治抵當庫附于税務酒務在縣治之東去縣二十歩税務在縣治之東南去縣二十步新城縣縣倉在縣治東縣庫在縣治酒務在縣西一百步税務在縣西一百步東安驛之側鹽官縣常平倉在縣西一十五步唐貞元十年置省倉在縣東南一十步紹興八年置酒務在縣北三百步淳化四年置今改為贍軍犒賞所税務在縣北一百步昌化縣縣倉在簿尉㕔舍南酒務在縣市税務在縣治北舘驛樟亭驛晏元獻輿地志云在錢塘縣舊治之南五里今為浙江亭北郭驛亭舊在餘杭門外北郭税務側淳祐六年趙安撫與􅊸重建題詠白樂天樟亭驛見楊九詩往恨今愁應不殊題詩梁下又踟蹰羡君獨夢見兄弟我到天明睡亦無素樟亭雙櫻詩南舘西軒兩樹櫻春條長是夏驛隂成華朱實今雖盡碧葉風來别有情宿樟亭詩夜半樟亭驛愁人起望鄉月明何處見潮水白茫茫鄭谷樟亭驛閣詩故國江山外登臨返照間潮來無別浦木落見他山沙鳥晴飛逺漁人夜唱閒嵗窮歸未得心逐片帆還孟浩然與錢塘令登樟亭驛詩百里聞雷震鳴絃暫輟彈府中聨騎出江上待潮觀照日秋空逈浮雲渤澥寛驚濤來似雪一坐凛生寒林又與杭州司户登樟亭驛詩水樓登一望半出青髙帟幕英寮敞旁筵下客叨山藏伯禹穴城壓伍胥濤今日觀溟漲垂綸欲釣鰲櫓曹既明夜宿浙江亭詩夜半潮聲撼客床卧聽柔閙空江驚囬倦枕鄉闗夢海日烘山上曉忩餘杭苕溪館在縣南少西與鑑亭相近淳祐間徙縣東南半里外舊志即鑑亭非臨安安豐驛在縣南三十步桂芝舘在縣東南二百步按祥符舊志云唐大中十一年縣令陳思復置初號東館咸通十四年天降桂子及産瑞芝改為桂芝館待賔館在縣西南二百步於潜潜溪館在縣西二十步舊名潜川驛紹興四年令邵文炳遷于縣南門外一里芙蓉館去潜溪館七十步鶴山館在縣北二里富陽長夀館去縣四十五里地名官莊馬驛在縣東四十步嘉定壬申令程珌建會江驛嘉定癸酉令程珌于通濟橋東買地創建㨿江山之勝紹定中令周晉闢地創樓扁曰清涵萬象之閣迎恩館在邑庠之南寳慶中令張修建朝天館在縣東廟山二十里令李廸建題詠徐叅政清叟題會江驛詩髙閣盈千丈征人借一棲水連天上下山會浙東西炊甑榮枯幻浮雲出處齊感時心欲醉風雨更凄迷月曹侍郎豳和云未到桐江上先尋