body:
  text: 咸淳臨安志卷五十六宋潛説友撰文事古者天子自治畿內故畿內有王宫國都比閭黨術之教而無侯國之學漢置三輔于京師學校自辟雍外無聞焉非闕歟國朝運應文明教養加備開封得立學以守臣領之寧不以承流宣化儀倡四方然後為首善哉中興因杭之舊為京庠先皇帝垂意表章揭以奎畫恩施遂得視太武二學國有大賚許徑試南宫嵗較藝之優者三百三十人上之禮部率三十取一以補監學弟子員逺方俊乂負笈來逰春秋二選至萬計彬彬盛矣三嵗大比尤稱得人竊嘗恭考髙宗皇帝紹興二年正月車駕至自越方﨑嶇跋履靡所底定而求士之急甚于渴飢三月即講殿臨軒親擢杭人張公九成以冠多士夫人文化成之機一轉移間而追琢其章金玉其相為文王作興已如彼况百四十年泳遊菁莪之澤者乎敘文事府學舊有先聖廟在通越門外宣和中本路廉訪使降御書殿榜曰大成之殿有閣曰稽古以奉御書其後遷徙不常紹興元年始以凌家橋西慧安寺故基建士猶病其湫隘嘉定九年教授袁肅黃灝以告于府上之朝拓而大之略倣成均規制楊文元公簡為記淳祐六年理宗皇帝賜御書二扁十一年趙安撫與􅊸又一新之且增學廩養弟子貟二百人咸淳七年安撫潛説友買民地議增闢八年安撫吳益踵成之大成殿在學之西理宗皇帝御書扁養源堂理宗皇帝御書扁御書閣闕先賢祠堂東八行崔公林公和靖處士諌院錢公張公太師文忠知制誥謝公西濂溪周元公伊川程正公明道程純公橫渠張獻公康節邵公公晦菴朱文涑水司馬文正公東萊吕成公象山陸文安公齋舍舊學有六經齋十二經德兊習進德頤正炳文賁文蒙養履信時升復古益明賔賢紹興重建為齋六升俊彌新經德賁文敦厚富文今齋八安撫吳益又增其二為齋十進德特正興能崇禮登俊致道賔賢尚志闕小學齋一在登俊齋之側記文郡守陳密學勸學文襄嘗謂學校之設非以教人為詞章取利祿而已必將風之德行道藝之術使人陶成君子之器而以興治美俗也杭東南之會藩也其山川清麗人物秀穎宜有美才生于其間然自建學以來絃歌之聲蕭然士之卓然有稱于時者蓋鮮反不逮于支郡何也豈非瀕海之民罕傳聖人之學習俗浮薄趨利而逐末顧雖有良子弟或淪于工商釋老之業曽不知師儒之道尊而仁義之術勝也襄之至是邦也當以教育為先務而必欲學者首明周官三物之要使有以自得于心而形于事業然後可以言仕此所謂學之序也雖然自以愚蔽弗明而力不足且知其任責不逮思得明誠篤學之士相與講議其道而推行之陳密學薦教授劄子新制已前嘗選請到本州進士吳師仁在學充教授體訪得本人履行淳正器識髙逺嘗肄業太學名聞縉紳應舉不第退歸田里甘貧守道専治誠明義理之學而不為異端之説自充教授以來夙夜孜孜誨誘不倦曽未數月學者翕然向風知所勸激使之久處必能成就人才美厚風俗伏望聖慈特賜收采令充本州州學教授東坡謁廟祝文軾以諸生誤蒙選擢昔自太史通守是邦今由禁林出使浙右蒞事之始祇見儒宫聖人臨之敢忘夙學楊文元公學記嘉定九年京庠典教袁肅黃灝顧瞻先聖之宫與夫講學之所庳陋不足使人興敬以助教養矧行都四會觀仰大化本根告于帥請于朝朝旨惠然從請明年孟仲經始越壯月告成闡基崇宇萬目具瞻自昔到今幾于百年始克鼎新大備屬簡識其事以發揮先聖垂教乏大旨啓祐後學簡行年七十有八日夜兢兢一無所知曷以稱塞欽惟舜曰道心非心外復有道道特無所不通之稱孔子語子思曰心之精神是謂聖聖亦無所不通之名人皆有此心未嘗不聖未嘗不精神無體質無際畔無所不在無所不通易曰範圍天地果足以範圍之也中庸曰發育萬物果皆此心之所養育也百姓日用此心之妙而不自知孩提之童無不知愛其親及長無不知敬其兄愛親曰孝敬兄曰弟以此心事君曰忠以此心事長曰順以此心與朋友交曰信其敬曰禮其和曰樂其覺曰知故曰知及之所覺至于純明曰仁此心直而不支離曰德其間有義所當行不可移奪曰義名謂紛紛如耳目鼻口手足之不同而一人也如根幹枝葉華實之不同而一木也此心之虛明廣大無所不通如是故孔子曰學而時習之謂其時而習又曰思而不學則殆何也此心本無過動于意斯有過意動于聲色故有過意動于貨利故有過意動于物我故有過千失萬過皆由意動而生故孔子每戒學者毋意毋必毋固毋我意態無越斯四者故每止絶學者門弟子欲記其言不勝其記故總而記之曰絶四吁本心雖明故習尚熟微蔽尚有日至之外猶有違意動故也月至之外猶有違意動故也顔子三月不違三月而往微動微違不逺而復不動如故純明如故孔子管爾而笑喜也非動乎意也曰野哉由也怒也非動乎意也哭顔淵至于慟哀也非動乎意也日月平常變化之為喜怒哀樂如四時之錯行如日月之代明如鏡中萬象實虛明而無所有夫是之謂時習而説之學夫是之謂孔子為之不厭之學周司業端朝修學增廩記都邑有學輯四方之遺俊號曰外雍非他郡國比也太學視古樂正教養已備都邑其體也毋已多乎昔者周都豐鎬王化流行自上而下既繫之周南召公食畿采為方伯明教以正俗下國化之又繫之召南夫國有大學而方伯無承流宣化之倡是有周南無召南而可乎自秦漢內史分治不復知古方伯之誼至其事權日益繁重獄訟彈壓外無所訾省奚暇于學中興建上庠重廣逰學之路京府亦命教立師顧田入素狹生員用希僅僅餘百數絶少以均來者旁擬太學月帑嵗囷不可望而土著自居都養充足且不得與近輔郡學比上養尊而下就簡數年間為尹嘗議此矣未及裕也紹定四年四明余公以户部侍郎行大尹事剔棼為平轉劇為整始蒞政首趨學宮舍奠如禮會諸生于論堂詢其豐約逸煩之故未幾遂頒公藏斥絶産通萬緡買田贍士俾食無拘員庖有增膳油油翼翼惟課業是程于是教授李君晞顔葉君應輔實紀其政而諸生咸願伐石以永余公之德蓋自昔仁義禮樂之教寄于士制于公侯牧伯公侯牧伯務貴其士而士則務貴其身所以紀倫類而通道德也非居且食之謂也建國設官文法吏治之外上有廟堂之論次有文館之聚中有學校之教不以通工易事而誦習遊息其間日用飲食體察警省以見義理之復欲擇善者相觀而善未成材者覿德而成所以致用而不窮之道也學校下不與百執有司列而上與廟堂等然則豈曰養之而已乎今公以霧隱之舊惟養不給是謀將秬秠厥成以觀其會通而二君精核典學迎受善意以迪其士聲熏氣炙被于百城人節儉正直如召南羔羊之行斯則都邑流化之方也余懼世俗不察徒見招徠滋廣廩稍益豐概之曰養士養士故為敘其所以然之故而命教者考焉趙安撫與􅊸恭跋御書淳祐改元之六年聖天子賜御書府學及養源堂扁臣既欽率諸生奉而揭之又刋之石立之學宫表風厲也唯國家垂意學校數百年間茂異輩出風誼廩廩時方更化將益大豐芑菁莪之澤爰自太武宗三學施及京泮崇奬唯一及緝熙燕間親灑宸翰以寵錫之半水象璜雖差等天子之學而建首善自京師始實同一源奎畫陸離分輝下責恩施甚厚豈直焜耀凡目為諸生榮哉昔魯僖能修泮宫詩人頌之不過侯國事耳夫子至班諸商周之什而况聖天子所以新美是學者乎然其詩曰思樂泮水薄采其芹育材之茂然也又曰濟濟多士克廣德心則黌序之相與周旋揖遜可觀矣臣待罪內史不能明魯僖之德奉宣洪化為承流光大懼弗克塞職諸生藏修于斯其預知所率厲益廣其德心而無俾魯多士専美是惟上不負天子下不負所學其尚欽念之哉堂又恭跋聖天子嘉惠兹學臣既序其凡矣惟養源名實取諸荀卿子臣請因聖翰之頒而妄演其説蓋源即心之謂而萬善之所渾涵者也故養之則存舍之則亡茍得其養則靈明虛靜天理湛如茍失其養則隨物而流人欲濫觴矣可不謹哉然自秦漢以來世無善教學者往往顛迷其性而操守失沉痼其習而趨向謬權術功利捷出乘之反覆萬端先王仁義道德之澤不泯者幾希今諸生幸得遭遇其時上有明君師為之興起目擊道存盍相與疏瀹而心沈潛遊夏之淵涵泳舒向之海玩志説于兊澤酌時中于蒙泉要使禮坊不踰性湍毋決是源常有所養而無害然後功用精深吾心之正流行于日用平施之間而無所慊斯不亦聖天子所望于諸生者乎棫朴之詩曰追琢其章金玉其相美文王作人之辭也臣膚末不足以寫之咏歌抑願率諸生相與講明乎此以仰承九重之德意帝若曰俞哉臣敢不拜手對揚休命奏請蘇文忠公軾奏乞賜杭州州學書板狀伏見本州州學見管生員二百餘人及入學參假之流日益不已蓋見朝廷尊用儒術更定貢舉條法漸復祖宗之舊人人慕義學者日衆若學糧不繼使至者無歸稍稍引去甚非朝廷樂育之意前知州熊本曾奏乞用廢罷市易務書板賜與州學印賃收錢以助學糧或乞賣與州學限十年還錢今蒙指揮只限五年見今轉運司差官重行估價約一千三百餘貫若依限送納即州學嵗納二百六十貫五年之間深為不易學者旦夕闕食而望利于五年之後何補于事而朝廷嵗得二百六十貫如江海之中增損涓滴了無所覺徒使一方士民以謂朝廷既已捐利與民廢罷市易所放欠負動以百萬計農商小民尚蒙聖澤莫知紀極而獨于此飢寒儒素之士惜毫末之費猶以此追收市易之息流傳四方為損不少此乃有司出納之吝而非朝廷寬大之政也臣以侍從備位守臣懷有所見不敢不盡伏望聖慈特出宸斷盡以市易書板賜與州學更不估價收錢所貴稍服士心以全國體謹録奏聞伏候敕旨貼黃臣勘會市易務元造書板用錢一千九百五十一貫四百六十九文自今日以前所收淨利已計一千八百六十九貫九百五十七文今若賜與州學除已收淨利外只是實破官本六十一貫五百一十二文伏望詳酌施行縣學錢塘學舊附京庠嘉熙四年以丞廨改造齋六曰友善辨志教行教信教文教忠吳泳為記記文王畿首善天下有辟雍有泮宫皆所以尊教治達邦法也錢塘在五代時斗僻一方其國儉其民碞船車楫馬輕死好劍率以武力競雖襲封君長緣飾儒術置擇能賢以籠絡吳中之士訖未有聞人我藝祖皇帝迅掃區夏挈錢塘之輿地盡歸職方列聖丕承陶以詩書風之禮義而後賢良方正之士興焉然學猶未暇建也慶厯以來詔天下郡縣皆立學兩浙路獨杭與蘇越得置郡博士增弟子員如縣無校官則命令佐主學事至是江以南彬彬多文學之士矣然附郭之邑猶未置也六龍渡江駐蹕于此戎事才息崇禮考文內興太學外設庠序大抵皆視開封而錢塘為邑至紹興間令昉建天子廟簡肅李公祥識之正朔欵謁春秋奠祀則有其地矣而黌宇尚闕無以為屬民讀法涖士校比之所頃趙侯與歡來尹京兆喟然作曰臨安赤縣二先忠獻宰仁和已建其一豈斯邑亦有社有民而不知教耶乃景岡相基諏日庀徒于縣之東得丞舊寺徙他所遂建學其上命宰與杰鞏耕及簿正王夢得相其役越三年有成宫雍雍在左廟肅肅在右廷殖殖在中門臯如也殿邃如也明倫堂曠如也池疏為二齋列為六宿直之廬公養之廩靡不嚴備像設禮器稍不應圖法則又倣京校取正焉士于是可以藏修遊息已是役也簿正實始終之則貽書潼川吳泳願有述泳謝曰春秋不書修泮宫之義何敢書則又曰今遍州縣皆先民記矣泳蓋不得辭乃以得諸聖賢者而諗多士昔畢命之訓殷士也曰雖收放心間之惟艱不由古訓于何其訓孟子曰學問之道無他求其放心而已矣聖賢設教千條萬目只要人將已放之心斂而歸諸已而學者恈恈然率馳騖于外因物有遷而失其本心者多矣矧囿衆大之區哉利欲之熏心也竒巧之蕩心也紛華之悅心也淫樂慝禮之接心也宫室妻妾之動心也一旦晝之間知誘物化牛羊之濯雞犬之放其所存仁義之良蓋無幾矣資質敏慧者不過競習科舉而亢志于髙明者又不免蘧廬孔孟而歸宿老釋也然則何以長善救失而新美其俗哉畢命所謂收有德義之訓焉孟子所謂求有學問之道焉非必取成于心尊奉其精神屏除其意見絶學捐書不稽古不論業而徑以為是也為語邑之秀民更請擇斯二者仁和縣舊附京庠紹興三年縣令孫廷直于縣治東建文宣王廟嘉定五年姚師虎築屋廟左八年趙公希言創學齋四曰教文教行教忠教信嘉熙四年公之子與歡尹京兆遂遷簿廨以廣學舍立三賢祠禇文公無量許睢陽逺生崔八行先貢淳祐九年令李從重建餘杭縣國初有先聖廟景德三年令章得一重建廟學自為記紹興五年令范仲將徙于法善寺基記文古之教者家有孰黨有庠術有序國有學蓋所以尊師道而崇儒術厚風俗而正人倫也周秦漢魏晉宋齊梁唐而下旋及聖朝厯數千百年其間尊戴夫子之道者未有若唐室暨聖朝之最盛也加王者之衮冕建都邑之祠宇春秋仲月行釋菜之禮唐室之舊典也都邑祠宇咸建講堂召通經者展函丈之儀聖朝之新制也前古未封之命唐室封之矣唐室未行之制聖朝行之矣有以見夫子之道尊而益顯逺而益大是知自生民以來未有如夫子者也得一景德中由廷尉侍授餘杭令時知府薛大諫以掖垣潤色詞臣改諫省論思近職輟甘泉之侍從臨吳會之藩宣政若神明民之父母以為禮不可廢教所由興式嚴闕里之祠以勸互鄉之俗昔文翁之典蜀也范寧之牧豫章也皆大設學校克立政績景仰薛侯之教化蔚有先賢風采今觀魯廟之建置雅合國庠制度儻自郡至于屬邑自屬邑至于鄉黨咸能遵奉薛侯之化則千里之內絃誦之聲相聞十室之間忠信之資必有又何必衛多君子而魯稱善人者乎得一夙夜在公鞅掌從事方萌肯建之意會天王降修講堂之詔是邑也錢氏納土疆于聖朝振聲教于遐俗太平興國中始識尊師之禮是時宰邑者徹城隍之神于他所塑先聖之像于其中庭户喧卑几筵牢落風雨不庇兩楹之飛棟僅存藜蒿並興數仞之蕭墻頓毁得一與寮宷等謀復舊貫別新儒宫役公僕以輸材就鎮城而卜埊未克全繕尚多闕如邑人進士丁文舉服勤于兹黽勉不怠率好事之同道出囊金以助成剞劂圬墁朴斫丹雘工善其事人無告勞端然聖容儼若南面侍坐者入室升堂之子圖壁者從行好學之流冠冕采繪之等威簠簋方圓之規矩悉取則于郡城焉髙門有閌中堂豁如齋莊有室以挈誠也管庫有掌以藏用也必有庖厨具膳羞也必有皂櫪安僕乘也射不主皮取中鵠而為勝智者樂水每觀魚而縱樂闢場圃以立亭戺鑿池沼而瞰厦屋十旬之內厥功告成是役也上以遵明天子之號令次以奉賢太守之政化下以移一邑之風俗邑中之人有能自強不息觀寸隂而是競師逸功倍期九年而大成異時醇儒秀民蟬聨魚貫升名鄉老預賢能之薦書校藝春官擢將相之科級然後佐佑神化輔贊太平寧不由明君新制賢侯異政賤子遵奉行之使然也具題嵗月于左以示來者臨安縣學在縣西一百步咸平三年建後徙于縣城南紹興十六年令王傳重建孫尚書覿為記寶祐二年令王橚重修景定三年令家之巽建師善堂記文三代之學尚矣自京師至于黨庠術序皆有學自幼壯至于老自天子至于公卿大夫士皆不可一日而去乎學養老勞農鄉社飲酒論獄受成獻馘之事一皆出于學而賢能之書考言選藝之政又皆興于學當是時也王道大洽人文化成士有常心家無殊俗自朝廷之上以至四方萬里閨門側陋之隱君子宿道向方小人修慝徙義武夫好德賤妾知命牛羊之牧不踐行葦有一不善如見怪焉固已不容于其間而絃誦之音洋洋然所謂比屋可封者周道衰學校廢時君世主惟錢榖甲兵之問而不及于俎豆于是謀夫説客擊劍扛鼎雞鳴狗盜之徒皆得以靡衣玉食館于上而王者之迹息矣間冇豪傑特起之士雖無文王猶興而卓然自立于一世者道雖不明乎天下必明乎已道雖不行乎天下必行乎妻子孝弟者人子事親之常道也卿大夫得一人焉以為獨行而表其閭忠義者人臣事君之大誼也太史氏得一人焉以為竒節而列于傳唐有陽城隱于中條山而逺近化其德爭訟者不于有司而赴于門太宗以一旅定天下而房杜王魏之勳獨出于王通之子弟嗟夫三代之王同四海于一堂之上人人有士君子之行而世哀道微僅得一二于千萬人之中可悲也已臨安縣舊有學在令治所東南隅自三舍廢罷再更方臘之亂掃地盡矣而縣以春秋釋菜著于令蓋常改寓西郭佛舍之保錦院為學帥其屬以祀孔子紹興十四年詔天下州縣皆立學朝請郎知縣事王侯傳字慶長相其宫湫隘破露上無蓋障旁無師生之廬不足以稱天子隆儒重道教養多士之意乃議徙故地少西屋而垣之一邑之豪欲進子弟于學者相與圖之恐不及于是門闥靖深殿寢崇邃講藝之堂棲士之舍庖湢庫庾皆具又命工更塑先聖先師之像與凡從祀者十人巍冠盛服配食侑坐凜然如生侯乃涓日齋戒屬邑民之秀者陳牲幣三獻之禮禮成父老聚觀太息以為未嘗有也乃為書抵故人孫某曰縣之新學成為我記之臨安東南一大縣在大山谷中桑麻絲枲之富自足而無貧民惟侯好學知方不務立竒以立聲威而以教化禮義為世標表有古循吏之迹俗恬殺牛更數十冬峻笞撲嚴賞捕莫能禁侯至遂徙業人死則習用浮屠法舉而燔之侯教以喪死葬埋之制其俗大變及是奉詔修起學宫士民向化興于行誼彬彬然比躋齊魯焉凡為屋若干楹經始于詔下之十二月而落成于明年九月之望余聞之士非懷居也而環堵之不庇士非謀食也而藜藿之不充于以求道豈不難哉故自一畝之宫進居廟堂論道之地自一簞之食起從九鼎大烹之享皆上之人所以養賢之具夫食焉而怠其事雖圬者不敢一日捨墁而嬉况承學之士蒙教養之澤而忽焉不省哉居相羣出相友鐫磨考煉以充其材窮為匹夫化一鄉達為公卿化天下無愧于中而已於縣學舊在縣南二里崇寧間遷縣北攀龍坊紹興丙寅令何佾重修嘉泰甲子令胡衛建藏書閣寶慶初方熙重建咸淳五年令李仲熊重修記文洪忠文公撰登科續題名記上科詔再頒之嵗冬十月己未邑令程君燾修鹿鳴故事于宣化堂諸生作而言曰士登科有題名自慶元龍飛始閲三十年石且溢矣表先達以厲後進盍續諸令曰唯唯鳯凰鳴矣于彼髙岡地之得也梧桐生矣于彼朝陽時之得也時與地莫難乎兼得士生王國得其地矣雲風感召得其時矣其地得其時又得觀光利賔䇿名奉常以階顯庸顧不謂榮乎抑涵負穹博擇精守固出可以為邦家之光萬民之望然後營名氏之書志榮也鄉校羣居藏修餘隟相與摩挲題刻厯訂平生非其研席之逰從則家庭之詔語疇賢疇不若類荃茅而品椒榝其榮也可不懼乎知所以懼則榮至矣此賢大夫期屬方來之意也富陽縣學在縣東唐武德七年建中燬于盜紹熙十七年令徐端輔重建作稽古閣淳熙乙巳簿葉延年重修嘉定壬申令程珌癸未令李彌髙前後治新之新城縣學在縣東三十步唐長夀中置乾道四年重修徙學門西面崤峰鹽官縣學在縣東二里紹興五年令刁雍撤故老氏宫材即舊址建學胡珵記淳熙四年令魏伯恂廣之鑿池造橋十年令陳申重建戟門等嘉泰四年令沈紡復新之鍾必萬記寶祐二年令施濆創屋五間藏書記文胡珵記杭為東南都會水陸物産之饒甲天下阻山帶江人物間出而鹽官邑其窮處地並海民逐魚鹽為生列肆負販冠帶之俗微矣自國家承平百七十餘年間士而仕于朝才一二人何其鮮也儒有張先生九成者郡人遭亂避地實始來居而以其徒講學焉未幾類試有司居第一擢進士第廷中又居第一而其徒輒第二邑人驚嘆時丹陽刁雍令鹽官為治尚簡清察姦不苛獄訟為衰息民既信化思所以作興善其俗者召父老于庭下令之曰彼張先生亦人耳一旦及其徒俱成名赫然豈他道哉稽古之力也矧是邑古不無聞人禇無量苗裔至今大家而睢陽太守許逺廟食固在也曽謂我宋無一人焉起邑中竊為父老不取且天子以萬戶黔首舉屬之令因求有以善之茍應簿書期會催科勸課負弩矢媚部使妄一胥吏任職可也四方君子將何以觀政我其鄉校是興俾若縣子弟得相率肄業其中不亦可乎民叩頭謝惟令君命故有學在縣治西狄人之退也有司建官府務一切輦取其材改作堂居焉像設風雨吏玩弗疚蓋五年于兹邑有廢老子祠者以奉狂道士號葆真宫者雍嘆曰嫚神誣民吾不忍也命毁之籍其門材相地筮日乃七月甲戌就縣故學基以營焉諸生歡趨更出力佐工役調不斂其民一錢頃之會禮部試羣進士于是第一人張先生徒也蓋師弟子更以儒學成名顯一時三年之間磊落相望邑人蓋以知令君不我欺而學之不可已信也遂以十月丙午學成殿屋六楹堂四楹門四楹齋館廊廡庖湢之舍咸在工既訖涓辰奉安棟宇崇崇像設巍巍幣牲潔修籩豆秩序拜揖降登禮偹無缺吏民觀瞻俗用丕變諸生咸願刻石紀事以示來者雍乃條具本末抵張先生請記于是晉陵胡珵其友也張先生方以太史氏列職東觀于珵為同舍郎顧而屬之記辭不獲命則拱手言曰請考論先生之學以舜為之君而契為司徒書則曰百姓不親五品不遜汝敷五教在寬而已耳三代之學也孟子曰夏曰校商曰序周曰庠皆所以明人倫而已耳所謂五品者何君臣父子夫婦長幼朋友之節也為其不遜也舜則有教焉所謂人倫者何君臣父子夫婦長幼朋友之節也為其不明也三代之王有學焉然則五品茍遜矣舜將何求人倫苟明矣三代之王亦何求而于斯知所以學而自得焉則存乎其人而已矣雖舜與三王不得與于斯矣夫以不孝者位中司而創為學法不忠于君者位宰相而布其法于天下人將焉取師濫觴于元豐稽天子崇寧大觀海內學者靡然同波六經之道誕張士無特操而諂詐不學成風矣始誑其上曰三代洋洋哉不亦異乎夫學者之道夫婦之愚與知焉至也聖人且有所不知焉夫婦之不肖能行焉至也聖人且有所不能焉如是焉以基之如是焉以居之而終焉而不知所以然非一朝一夕之故也學而進斯大矣逺矣欲知張先生之學之傳斯其本矣于收科第取青紫殆其末也歟百里之地果無有人焉乎哉吾不可以不告則鍾必萬記國朝崇尚人文詔天下郡縣立學視三代有光矣鹽官學舊在縣治西紹興中始徙于東偏凡五十六年或葺或否若傳舍然良可歎也吳興沈君紡為縣之明年特因其舊而一新之屬余為記以詔多士余竊自念齒髮如許學不加進朝夕自警且不暇其何以語夫人然自宦逰與夫往來于此餘二十年矣士之扣門者日益衆况今求田問舍欲老于海昌之上則杖履逰從亦有責善之義焉故不辭嗟夫自命鄉論秀之制壞而不復士病于科舉蓋非一日而今之世為尤甚父兄之訓子弟朋友之相講論朝夕之所從事于文詞者惟利祿之是計耳抑不思上之人拳拳教養所望于爾多士者果如此哉聖賢立教所望于天下後世者果何在哉昔者吾夫子不過栖栖一旅人耳講道洙泗固無爵祿可以動學者之心而羣弟子或自齊往或自宋往或自衛往或自他國往不憚其山川之逺道路之勞而所慕有甚于爵祿意者日漸月化莫非道德性命之藴必有出于言意之表及觀耳提面命則皆孝弟忠信之實舉不離于日用之常然後知聖人之所以教人學者之所以用力蓋在此而不在彼也雖然事親從兄處已待人莫非事也而所謂道德性命之藴有外于是乎人惟行之而不著習矣而不察終身由之而不知此所以有待于學矣學以致其知又貴于行其所知也千里之行蓋自足下始足迹不出户庭而謂乘風駕雲可至千里有是理哉况夫求之有道得之有命窮通得喪舉不足以動其心而後可以言修身身修而後可以言事君治民士方未用利祿橫于心及其既用謂無既得患失之心信乎學者盍亦無歆羡乎其外而當用力乎其內事親有不足于孝事長有不足于敬歟推是類而日察之力行之由知至而知終由窮理而盡性至命如是而後為不負上之人所以教養成就之意堂名數易沈君取舊名明倫揭之可以知教人之本矣學比舊氣象殊勝主其後者某昌化縣先聖廟在縣東一百步熙寧中建自是至淳熙凡六遷乾道八年令卞圜始增廣略具學制淳熙七年令錢孜始改卜故饒氏園重建廟學陳居仁記記文杭為古都會自六蜚時巡曰行在肇新府名其地望為尤重昌化蓋支邑施德自近始宜其教明俗成俊秀輩出衣冠相望然僻在岩谷間其俗苐知服勤穡事且盡力于桑麻自唐武德逮于我朝曾未有躡儒科登仕籍者豈天之降才爾殊哉翳長民者之責也夫兵食可去而信不可去餼羊非所愛而禮所必愛教之本如學校顧可置而不省也淳熙四年錢君被命宰是邑始至詣學謁先聖敗屋數楹莫庇風雨像設且浸以頺剝其心惕焉顧以民未見孚役未易興姑舍是乃洗手奉職清省獄訟撙理財用期年而政克有成民安樂而歌舞之君欣然顧謂竂佐曰吾始至是邑見民之務本力田是知常産常心之為可貴雖未讀書固可驅而之善吾之政不少事嚴察而服從勸趍捷于影響吾惟學是崇則風移俗變可跂而待幸帑有餘財不致屈吾民力顧何憚而不為乃以暇時鳩材僝工撤舊屋而一新之經始于己亥仲夏落成于仲冬民不知役役不淹時展敬有殿駕設有堂肄業有齋藏書司膳有庖有庫百里稚耋爭快先覩更相與言曰令君所以惠顧我輩者厚矣既足我以衣食又教我以孝弟其可不圖所以率教哉由是口誦先聖之書耳濡目染先聖之教長長幼幼趨善如不及缿筒既省而訟庭為空教化之移人如是哉政固多術矣或以惠利寬和為行或以發姦撾伏為神剸劇撥煩以舉職亟疾苛察以立威類可以能名而掠近效要非得人心之深者至于扶立教道如文翁之于蜀常衮之于閩韋景駿之于肥鄉則垂芳留馨久且見思臨人之君子盍亦視所適從哉噫十步有茂草三人有我師孰謂近在畿甸而儒服者幾無焉是不以逺且大者望之也今錢君燭照是理理龜抵以決課以近效則訟簡刑清風流令行異時髦俊蝟興超取顯美有聞天朝而文物彬彬如鄒魯未占有孚矣然則我有子弟錢君教之也人之歌令君如鄭人之歌國僑者將亘千祀其不泯余嘉其為政之知所本不區區要譽于一時殆非俗吏之所能為者乃特書以詔後之人君名孜嘉禾人也貢院在錢塘門外王家橋淳熙十二年守張侍郎枃建舊制三嵗解七人崇寧三舍法嵗貢七人宣和五年復科舉三嵗解十四人已上皆據舊志但東坡所序送進士詩云熙寧五年貢者九人與此不同當考紹興二十六年增西北流寓解額三人端平元年增為十九人寶祐三年增二人景定五年增一人共二十二人詩文陳密學襄宴貢士詩登彼公堂燕貢士也因以勉之登彼公堂維水湯湯君子燕湑其言有章登彼公堂有松有柏君子燕湑其儀孔特登彼公堂維山崔巍君子燕湑其志不回登彼公堂鴻飛戾止君子燕湑其維不已陳東坡送進士詩序右登彼公堂四章章四句太守公述古之詩也蘇子曰士之求仕也志于得也仕而不志于得者偽也茍志于得而不以其道視時上下而變其學曰吾期得而已矣則凡可以得者無不為也而可乎昔者齊景公田招虞人以旌不至孔子善之曰招虞人以皮冠夫旌與皮冠于義未有損益也然且不可而况使之棄其所學而學非其道歟熙寧五年錢塘之士貢于禮部者九人十月乙酉燕于中和堂公作是詩以勉之曰流而不返者水也不以時遷者松柏也言水而及松柏于其動者欲其難進也萬世不移者山也時飛時止者鴻雁也言山而及鴻雁于其靜者欲其及時也公之于士也可謂周矣詩曰無言不酬無德不報二三子何以報公乎監試呈諸試官詩我本山中人寒苦盜寸廩文詞雖少作勉強非天稟既得旋廢忘懶惰今十稔麻衣如再著墨水真可飲每聞科詔下白汗如流瀋此邦東南會多士敢題品芻蕘盡蘭蓀香不數葵荏貧家見珠貝眩晃自難審緬懷嘉祐初文格變已甚千金碎全璧百衲收寸錦調和椒桂釅咀嚼沙礫磣廣眉成半額學步歸踔踸維時老宗伯氣壓羣兒凜蛟龍不世出魚鮪初驚淰至音久乃信知味猶食椹至今天下士微管幾左袵謂當千載後石室祠髙眹邇來又一變此學初誰諗權衡破舊法芻豢笑凡飪髙言追衛樂篆刻鄙曹沈先生周孔出弟子淵騫寢却顧老鈍軀頑朴謝鐫鋟諸君况才傑容我懶且噤聊欲廢書眠秋濤舂午枕試院煎茶詩蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠落眩轉繞甌飛雪輕銀瓶㵼湯誇第二未識古人煎水意君不見昔時李生好客手自煎貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病常苦飢分無玉碗捧蛾眉且學公家作茗飲磚爐石銚行相隨不用撑腸拄腹文字五千卷但願一甌常及睡足日髙時簷催試官考較詩八月十五夜月色隨處好不擇茅與市樓况我官居似蓬島鳯咮堂前野橘香劍潭橋畔秋荷老八月十八潮壯觀天下無鵾鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黑沙白浪相吞屠人生會合古難必此景此行那兩得願君聞此添蠟燭門外白袍如立鵠樓八月十七日復登望海樓典試官五人復留五首上煙雲怪不來樓前飛紙落成堆非關文字須重看却被江山未放回莫眼昏燭暗細行斜考閲精強外已誇明日失杯君怪早知安足不成蛇亂山遮曉擁千層睡美初涼撼不應昨夜酒行君屢歎定知歸夢到吳興天台桂子為誰香倦聽空階夜點涼賴有明朝看潮在萬人空巷鬬新粧有秋花不見眼花紅身在孤舟兀兀中細雨作寒知意未教金菊出蒿蓬奏請蘇文忠公軾奏乞詩賦經義各以分數取人狀右臣今月五日據本州進士汪溉等一百四十人詣臣陳狀稱凖元祐四年四月十九日敕詩賦經義各五分取人朝廷以謂學者久傳經義一旦添改詩賦習者尚少遂以五分立法是欲優待詩賦勉進詞學之人然天下學者寅夜競習詩賦舉習率皆成就雖降平分取人之法緣業已習熟不願再有改更兼學者亦以朝廷追復祖宗取士故事以詞學為優故士人皆以不能詩賦為恥比來専習經義者十無二三見今本土及州學生員多從詩賦他郡亦然若平分解名委是有虧詩賦進士難使捐已習之詩賦抑令就經義之科或習經義多少各以分數發解乞據狀敷奏者臣曩者備員侍從實見朝廷更用詩賦本末蓋謂經義取人以來學者爭尚浮虛文字止用一律程試之日工拙無辨既去取髙下不厭外論而已得之後所學文詞不施于用以故更用祖宗故事兼取詩賦而橫議之人欲收姑息之譽爭言天下學者不樂詩賦朝廷重失士心故為改法各取五分然臣在都下見太學士習詩賦者十人而七臣本蜀人聞蜀中進士習詩賦者十人而九及出守東南親厯十郡及多見江湖福建士人皆爭作詩賦其間工者已自追繼前人専習經義士以為恥以此知前言天下學者不樂詩賦皆妄也惟河北河東進士初改聲律恐未甚工然其經義文詞亦自比他路為拙非獨詩賦也朝廷于五路進士自許禮部貢院分數取人必無偏遺一路士人之理今臣所據前件進士汪溉等狀不敢不奏亦料諸處似此申明者非一欲乞朝廷參詳衆議特許將來一舉隨詩賦經義人數之多少各紐分數發解如經義零分不及一人許併入詩賦額中仍除將來一舉外今後只許應詩賦進士舉所貴學者不至疑惑専一從學謹録奏聞伏候敕旨貼黃詩賦進士亦自兼經非廢經義也咸淳臨安志卷五十六
