body:
  text: 咸淳臨安志卷五十七宋潜說友撰武備恭惟髙宗皇帝以神武濟中興因事制變首命三衙增修軍政漸收諸將步騎分𨽻焉乾道間騎司既徙屯金陵而龍衛雲騎等之留行闕者猶以步帥兼領聖上咸淳四年又增置輯擢士以萬計屬之殿嚴制益備具矣無事則宿衛有事則征行凡以壯國勢憺皇威百三十餘年晏然如一日臨安居輦轂下蓋倚以為重而帥守所統則建炎以前之舊也至防虞一軍又必藉禁衛之士别為部伍聽帥守節制以倡率之夫天子之縣內其本末之叙詳略之宜固如此嘗觀漢衛宫衛京既各有兵三輔又有都尉都尉之在三輔者視他郡國特盛夫亦猶身之與臂臂之與指邪然而居重馭輕固有不専在是者叙武備兵制闕忠靖第三指揮元額五百一十人全威第二指揮元額五百一十人威果第五指揮元額五百一十人威果第六指揮元額五百一十人雄節第八指揮元額五百一十人雄節第十六指揮元額五百一十人全捷第二指揮元額五百一十人全捷第三指揮元額五百一十人右東南第三將自國初分𨽻駐劄寨在東青門裏有正副將各一押隊官二元管指揮十大觀三年三月有㫖撥威果第二十八雄節第九全捷第二第三指揮駐平江府宣和二年因討睦寇仍以全捷兩指揮屬本將駐劄見管八指揮元額四千八十人武騎第六指揮元額四百一十人武騎第七指揮元額四百一十人廣勇左一四指揮元額五百一十人廣勇左一五指揮元額五百一十人廣勇左一六指揮元額五百一十人廣捷第四指揮元額五百一十人廣捷第五指揮元額五百一十人廣捷第六指揮元額五百一十人忠節第二指揮元額五百一十人係水軍驍勇第一指揮元額四百一十人神威第七指揮元額五百一十人雄猛第二指揮元額五百一十人雄威第六指揮元額五百一十人效忠第二十四指揮元額五百一十人效忠第七十五指揮元額四百一十人效忠第七十七指揮元額四百一十人右京畿第二將元係東京畿縣陳留雍邱尉氏鄢陵陽武屯駐兵建炎元年十一月劉俊統率來捕陳通存留就糧駐劄營寨在東青門裏有正副將各一押隊官三共管一十六指揮元額七千六百六十人雄節第十七指揮元額四百一十人威果第六十一指揮元額四百一十人全捷第十七指揮元額四百一十人歸逺指揮元額四百一十人龍騎指揮元額四百一十人右兵馬鈐轄司軍兵自熙寧三年以後招置雄節威果全捷三指揮宣和二年宿州龍騎歸逺二指揮來討睦寇因留屯劄營寨在東青門裏並𨽻本府兵馬鈐轄共五指揮元額二千五十人廂軍崇節第一指揮額管五百人崇節第二指揮額管五百人崇節第三指揮額管四百人崇節第四指揮額管四百人崇節第五指揮額管四百人崇節第六指揮額管四百人捍江第一指揮額管四百人捍江第二指揮額管四百人捍江第三指揮額管四百人捍江第四指揮額管四百人捍江第五指揮額管四百人修江指揮額管一百二十人都作院指揮額管四百八十人小作院指揮額管一百人清湖閘指揮額管七十人開湖司指揮額管二百人北城堰指揮額管三十六人西河廣濟指揮額管三百人樓店務指揮額管三百人長安堰閘指揮額管一百人稱斗務指揮額管四十人壯城指揮額管三百人鼓角匠指揮額管二十五人橫江水軍指揮額管二十四人船務指揮額管二百八十人牢城指揮無額乾道五年八月分軍籍見管八百二十四人土軍城東巡檢司寨在新門外姚園寺前額管六十八人城西巡檢司寨在赤山武狀元坊內額管三十人外沙巡檢司寨在候潮門外額管一百二十人海內巡檢司寨在嘉會門外額管一百二十人管界巡檢司寨在餘杭門外額管一百人茶槽巡檢司寨在東青門外額管一百二十人南湯巡檢司寨在錢塘界額管九十六人東梓巡檢司寨在富陽縣界額管一百二十人上管巡檢司寨在鹽官縣界額管一百二十人赭山巡檢司寨在仁和鹽官兩縣界額管一百二十人黃灣巡檢司寨在鹽官縣界額管一百二十人硤石巡檢司寨在鹽官縣界額管一百人奉口巡檢司寨在錢塘縣界額管一百人許村巡檢司寨在鹽官縣界額管一百人弓手錢塘縣元額五十三人仁和縣元額一百人餘杭縣元額七十人臨安縣元額於潛縣元額六十二人富陽縣元額九十人新城縣元額鹽官縣元額昌化縣元額教場春秋二閲教場在東青門內禇堂北即殿前司後軍場旬時教場在府治西嘉定中袁安撫韶創紹定壬辰余安撫天錫移春和樓於此下為觀德堂嘉熙燬淳祐中趙安撫與􅊸即舊址建㕔宇咸淳五年安撫潛說友增多其屋以處將校之屬又築垣于場之南西而徑其外防虞城內諸隅東隅在都稅務南元額一百二人西隅在白龜池都作院南元額一百二人南隅在吳山至德觀後元額一百二人北隅在潘閬巷內元額一百二人上隅在大瓦後三真君廟前元額一百二人中隅在下中沙巷蠟局橋東元額一百二人下隅在修文坊內元額一百二人以上七隅嘉定四年王安撫柟置府隅在府治前元額一百二人嘉定十四年袁安撫韶置新隅在朝天門內元額一百二人紹定四年余安撫天錫置新南隅在候潮門裏元額一百二人淳祐四年新北隅在餘杭門裏元額一百二人淳祐六年新上隅在侍郎橋東元額一百二人淳祐九年趙安撫與􅊸置西南隅在夀域坊內元額一百二人淳祐十二年翁安撫甫置南上隅在麗正門側元額六十一人寶祐四年徐安撫㮚置府治內諸隊帳前四隊在府治大門內元額三百五十人開禧二年廖安撫俁置親兵隊在府治教場內元額二百人嘉熙元年趙安撫與歡置搭材隊在府治教場內元額一百二十八人淳祐四年趙安撫與􅊸置城外諸隅海內隅在浙江亭南元額七十人外沙隅在候潮門外外沙巡司元額六十八人城東隅在新開門外城東巡司元額六十八人茶槽隅在東青門外茶槽巡司元額七十人城西隅在錢湖門外元額六十八人城北上隅在餘杭橋東元額七十人城北下隅在北新橋北元額六十人以上七隅淳祐七年趙安撫與􅊸置錢塘隅在錢塘門外水磨頭元額一百二人淳祐八年闕新西隅在九里松元額一百二人淳祐十一年趙安撫與􅊸置節制司城內四將先是殿步兩司軍兵于本府既無統屬遇有緩急必俟朝省調遣常不及事紹定四年余安撫天錫始請于朝下殿步兩司各差官兵千人于城內置隅分東西南北四壁各管其一殿司差統制二員一以兼正任本府兵馬鈐轄一以兼添差步司統制二員一以兼正任浙西兵馬副都監一以兼添差分隅任責設有不虞即部隅兵以前本府節制自此始東將在軍頭司北馬舊司營內元額五百人西將在三茅觀後步司右軍潛火將內元額五百人南將在東青門裏殿司後軍寨內元額五百人北將在東青門裏殿司䇿選鋒寨內元額五百人城外四壁淳祐四年趙安撫與􅊸請于朝就殿步司營寨在城外四壁者各選軍兵三百人各差統制官二員帶本府鈐轄路分職事分任防虞之責並照城內四壁約束仍𨽻本府節制東壁在東青門外殿司右軍內元額三百人西壁在黃泥嶺步司前軍內元額三百人南壁在候潮門外護聖步軍內元額三百人北壁在餘杭門外殿司神勇軍內元額三百人續轉運司準朝㫖分管北壁救撲遂申請以城內北將城外北壁軍兵通行節制咸淳臨安志卷五十七
