body:
  text: 咸淳臨安志卷五十八宋潜說友撰風土凡杭風土之故皆仍前志無大增損然嘗聞之世道有隆汚地氣有盈涸風俗之媺惡土物之豐耗常必繇之恭惟宋業中天六聖傳緒一是以道德仁義為善俗之本詔書律令下者又時風厲之民生其間陶浸聖化油然興起而不自知所謂商邑翼翼四方之極不其然乎憯莫此談而逺取千百年已陳之迹以為是流風遺俗之廑有存者泥矣溫厚之氣盛于東南庶物露生六府允治草木之名不可殫紀又不特如職方氏揚州所載是豈偶然致之哉雖然魚麗之盛多羔羊節儉之應也亦推其所為而已矣叙風土風俗周官職方氏東南曰揚州吳地古揚州之境其俗躁徑輕揚故曰揚州或云州界多水水波楊也太康地記曰揚州東漸太陽之位履正含文天氣奮揚故取名焉吳越春秋云人性脆而愚水行山處以船為車以楫為馬悅兵而敢死漢志曰吳粵之君皆勇故其民好用劍輕死易發文身斷髮以避蛟龍之害應邵曰常在水中故斷其髮文其身以象龍子故不見傷害也數與楚接戰互相兼并故吳越風俗略與楚同隋志曰江南之俗火耕水耨食魚與稻以漁獵為業雖無蓄積之資然而亦無饑餒其俗信鬼神好淫祀又云吳郡餘杭川澤沃衍有海陸之饒珍異所聚故商賈並凑其人君子尚禮庸庶惇龎故風俗澄清而道教隆洽亦其風氣所為也國史地理志總叙兩浙路以為人性敏柔而慧尚浮屠氏之教厚于滋味急于進取善于圖利户口陳置錢塘隋改杭州户一萬五千三百八十唐貞觀中户三萬五千七十一口一十五萬三千七百二十九唐開元中户八萬六千二百五十八皇朝太平寰宇記錢塘户數主六萬一千六百八客八千八百五十七九域志主一十六萬四千二百九十三客三萬八千五百二十三中興兩朝國史户二十萬五千三百六十九乾道志户二十六萬一千六百九十二口五十五萬二千六百七淳祐志主客户三十八萬一千三百三十五口七十六萬七千七百三十九今主客户三十九萬一千二百五十九口一百二十四萬七百六十錢塘縣乾道志主客户四萬六千五百二十一口六萬八千九百五十一淳祐志主客户四萬七千六百三十一口九萬八千三百六十八今主客户八萬七千七百一十五口二十萬三千五百五十一仁和縣乾道志主客户五萬七千五百四十八口七萬六千八百五十七淳祐志主客户六萬四千一百五口二十二萬二千一百二十一今主客户九萬八千六百一十五口二十二萬八千四百九十五餘杭縣乾道志主客户一萬九千八百一十七口二萬九千九百一十一淳祐志主客户二萬六千五百五十口一十四萬二百八十二今主客户二萬六千五百八十一口一十四萬一千四百臨安縣乾道志主客户二萬四千二百六十一口四萬四千七百四十三淳祐志主客户二萬五十六百五十一口一十二萬七千八百九十九今主客户二萬五千九百七口一十二萬六千九百九十六於潜縣乾道志主客户二萬二百九十五口四萬六千二百九十二淳祐志主客户二萬七百五十一口一十一萬二千二百九十一今主客户二萬八百三口一十一萬一千九百七十富陽縣乾道志主客户一萬九千九百二十三口三萬六千一十七淳祐志主客户三萬六十三口一十五萬五千三百六十九今主客户二萬九千九百八十五口一十四萬九千八百九十八新城縣乾道志主客户一萬二千四百八十三口三萬六百五十一淳祐志主客户一萬七千九百八口八萬七千五百二十八今主客户一萬八千七十一口七萬九千八百一十六鹽官縣乾道志主客户五萬八百三十一口五萬九千三百四十四淳祐志主客户五萬七千三百三口一十四萬五百二十七今主客户五萬六千九百四口一十三萬九千八百七十昌化縣乾道志主客户一萬一十三口一萬四千三十三淳祐志主客户一萬二千七百九十四口二萬八千四百八十一今主客户一萬三千六百七十八口五萬九千一百六十物産榖之品粳早占城早熟紅蓮中熟礌泥烏雪裏盆去聲晚熟赤稻黃秈糯金叉社光頭蠻麥大麥小麥麻白赤烏黃豆大黑大紫大白大黃大青大褐白扁黑扁白小赤小臘月煮粥者吳中風俗也菉小紅樓子菉白江青豌白豌白眼刀其大如小刀羊眼性最凉粟狗尾金罌絲之品綾白文公詩紅袖織綾誇柿蒂注云杭州出柿蒂花者為佳內司有狗蹄綾尤光嚴可愛羅有花素二種結羅染絲織者名熟線羅尤貴錦內司街坊所織以絨背為貴刻絲有花素二種擇絲織者故名杜緙又名起線鹿胎次者為透背皆花紋突起色樣不一紵絲染絲所織有織金閃褐間道等類紗機坊所織有素紗天淨三法新翻粟地紗絹機坊多織唐絹幅狹而機密畫家多用之綿土産以臨安於潛曰而麗密者為貴紬有績綿績線為之者謂之綿線紬土人貴此枲之品桑柘麻苧貨之品茶嵗貢見舊志錢唐寶雲菴産者名寶雲茶下天竺香林洞産者名香林茶上天竺白雲峯産者名白雲茶産東坡詩白雲峯下雨槍新又寶嚴院垂雲亭亦茶東坡有怡然以垂雲新茶見餉報以大龍團戲作小詩妙供來香積珍烹具太官㨂芽分雀舌賜茗出龍團又遊諸佛舍一日飲釅茶七盞戲書有云何須魏帝一丸藥且盡盧同七碗茶蓋南北兩山及外七邑諸名山皆産茶近日徑山寺僧採榖雨前者以小缶貯送鹽漢置海鹽縣有鹽官吳王濞煮海為鹽之地也蜜寰宇記嵗貢蠟與蜜同種紙嵗貢藤紙按舊志云餘杭由拳村出藤紙紙省劄用之富陽有小井紙赤亭山有赤亭菜之品城東橫塘一境種菜最美諺云東菜西水南柴北米臺心矮黃二種春間最盛大白頭小白頭黃芽冬間取巨菜覆以草積久而去其腐葉黃白纎瑩故名芥生菜波稜萵苣食取其根名萵笋苦蕒薑土貢葱出板橋薤韭大蒜小蒜茄梢瓜黃瓜冬瓜葫蘆土人呼曰扁蒲瓠芋山藥形如手掌者名佛手牛蒡蘿蔔一名蘆蔔西溪為勝天目山者亦佳甘露子三四節連生如貫珠茭白蕨芹菌多生山谷竹松間東坡與參寥智果寺園得黃耳菌詩曰老楮忽生黃耳菌故人兼致白芽薑其大者淨白名玉簟最貴黑者名茅赤者名竹孤皆下品果之品橘富陽王洲其地宜橘橙有脆綿木數種梅有消硬糖透數種桃有金銀水蜜紅穰細葉紅等種李有蜜透明等種杏柿有方頂牛心紅椑牛奶水柿大珠等種梨有雪糜玉消數種棗鹽官者最佳然不甚大蓮聚景園後湖中者名繡蓮極貴瓜有青白黃等色類有金皮沙皮蜜甕等筒等名土人尤稱周家青瓜皆不若謝村櫟林者酥白而大藕錢塘有西湖下湖者仁和有北新橋北護安村舊名范堰産扁眼者最著名菱初生嫩者名沙角硬者名餛飩湖中生如栗樣者極鮮秋末古塘産大紅菱尤甘脆東坡望湖樓醉書五絶詩云烏菱白芡不論錢林檎土人以塢氏園者貴謂之花紅木瓜枇杷無核者名椒子出於潜黃嶺前烏巾山小錫塘塢者尤珍白色者上黃次之髙宗皇帝嘗密遣訪倍直酬之櫻桃紫者反不若淡紅之甘楊梅舊載楊梅石塢今在烟霞嶺瑞峯寺之側金姆家者佳東墓嶺十八澗亦盛臯亭山産者尤甜銀杏以三稜者為上雞頭古名芡又名雞壅今錢塘之梁渚頭仁和之藕湖臨平湖所産特嘉西湖者尤勝然不多也可篩為粉蒲萄有黃紫二色紫者稍晚紫黃者名珠子御愛其圓大透明者名瑪瑙甘蔗舊貢今仁和臨平小林地多種之以土窖藏至春夏可經年其味不變小如蘆者曰荻蔗亦甘竹之品竹碧玉間黃筀淡紫斑金鶴膝天竺僧贊寧作譜載出靈隱山節密而內實略如天壇藤間有突起者故名苦笋南路出壜山白象牙哺雞出稍早和靖詩烟崖早笋肥苦端午前多充饋遺以其性涼也黃鶯晚筀出楊墳猫頭大者一莖重數斤品為劣木之品桑數種曰青桑白桑拳桑大小梅紅雞爪之類梓柘柏孤山陳朝柏景古松數種惟天目山者針短而庠健括子松三針華山松四針白公詩拂城松樹一千株指萬松嶺言今多不存九里松猶有合抱者桐檜鹽官悟空塔前雙檜東坡嘗咏以詩楠東坡詩云中和堂後石楠樹與君對床聽夜雨櫧櫟槐杉桂檀槤楓榆栁棕一名栟閭東坡棕筍詩云贈君木魚三百尾中有鵝黃子魚子夜義剖癭欲分甘籜龍藏頭敢言美棕筍可蒸煨食之味微苦青神鳯集見李衛公平泉草木記云木之竒者天目之青神鳯集花之品牡丹昌化富陽者頗大古杭城中吉祥寺最多東坡有詩又有留别釋迦院牡丹詩又有一種冬月開者和述古詩云一朵嬌紅翠欲流春光回照雪霜羞者是也芍藥今艮山門外范浦鎮多植此花冠于諸邑有早緋玉白綴露等名又有千葉白者土人尤貴之梅花白文公去郡後有憶杭州梅花詩孤山之梅自唐以來已著稱和靖居此山詩于梅花最多東坡和秦太虛云西湖處士骨應槁只有此詩君壓倒又云江頭千樹春欲暗竹外一枝斜更好又和楊公濟十詩有云緑鬢尋春湖畔回萬松嶺上一枝開今此花有數品緑蕚千葉香梅尤清絶紅梅舊志有紅梅閣東坡亦有紅梅詩有云寒心未肯隨春態酒暈無端上玉肌今土人有福州紅潭州紅柔枝千葉邵武紅等種蠟梅東坡在杭日有僧趙景貺蠟梅詩云蜜蜂採花作黃蠟取蠟為花亦竒物今此花亦有數品以檀心磬口者為佳碧蟬棣棠海棠羅隱為錢塘令手植海棠王公元之有詩紀之金林檎郁李長春桃花嘉會門南包家山冷水峪舊名桃源花最盛開杏花玉簮水仙薔薇園圃多用以編籬屏有寶象月季等名粉團徘徊此花極香宫院以雜腦麝為佩帶珠佛見笑聚八仙百合滴滴石竹林和靖有石竹二叢詩云深枝冉冉裝溪翠碎片英英剪海霞萱草梔子密友金鐙金沙山丹迎春真珠又名蘸水青條白蕊粲然可愛剪紅羅錦帶錦堂春笑靨大笑蜀葵有紫白黃紅數種小者名胡蜀葵菊荷花白公郡齊詩云繞郭荷花三十里指西湖而言也瑞香舊真覺院有此花東坡詩云幽香結淺紫來自孤雲峯骨香不自知色淺意殊深云云今馬塍種最多大者名錦薰蘢蕙東坡題楊次公蕙花詩蕙本蘭之族依然臭味同曾為水仙佩相識楚詞中蘭東坡題楊次公春蘭詩春蘭如美人不採羞自獻時聞風露香蓬艾深不見云云紫薇東坡有次韵錢穆父紫薇花詩云虛白堂前合抱花秋風落日照橫斜云云紫楊禪宗院山有山花一本色紫而香無人知名白公樂天名為紫楊花賦詩紅辛夷唐時靈隱寺有此花雞冠鳯仙撒子即生紅白璀璨遇霜而隕杜䳌錢塘門外菩提寺有此花甚盛東坡有南漪堂杜䳌花詩今堂基存此花所在山多有之映山紅大概如杜䳌但色淡質粗耳櫻桃花唐時樟亭驛有雙櫻樹白公詩南館西軒兩樹櫻春條長足夏隂成素華朱實今雖盡碧葉風來別有情榴花唐時孤山有石榴花白公有詩云山榴花似結紅巾容艷新妍占斷春色相故開行道地香塵擬觸坐禪人云云靈隱舊亦多海石榴樂天亦有詩云宿因月桂落醉為海榴開木犀有黃紅白三色舊天竺山多有之東坡有天竺山送桂花分贈元素云月闕霜濃紅蕊乾此花原屬桂堂仙鷲峯子落驚前後蟾窟枝空記昔年云云霅川陳大昌衍蕃露載明之士子史有木犀忽變紅色異香因接本以獻闕下髙宗愛賞畫為扇面仍製詩以賜從臣云秋入幽岩桂影團香深粟粟照林丹應隨王母瑶池宴染得朝霞下廣寒木芙蓉東坡倅杭日有和述古中和堂木芙蓉詩今蘇堤及岸湖多種秋日如霞錦云山茶今東西馬塍色品最盛陳了齊有接花詩云花單可使千色黃可使紫末意乃歸于不能違時以謂天者卒不可易也今觀馬塍栽接有一本而十色者有早開而晚發者大率變物之性盜天之氣雖時亦可違矣他花往往皆然惟山茶在今為甚木香酴醿已上二種皆柔條有黃白二種白而心紫者尤香藥之品雲母藁本茵芋鬼臼木鱉已上五種本草載杭州有之地黃嵗貢牛膝仁和繭橋白石多種乾薑上二種舊貢蛇床子生白石躑躅花生錢塘富陽白芷千金草生仁和繭橋白术苦參並生於潛茱茰澤蘭鬼箭烏藥鈎藤覆盆子並生富陽木通富陽小井葳䖅仙何首烏劉寄奴並生富陽小井藜蘆草烏秦皮百部根並生天目山菖蒲桑白皮芍藥荆芥薄荷紫蘇天南星生於潛昌化麥門冬白芨牽牛地骨皮牛蒡地膚百合香附子乾葛出富陽者良天花粉即瓜蔞根馬兜鈴青木香根白薇白鮮皮石竹子名瞿麥山蕷黃精生餘杭於潛山枸杞貫衆生龍井口半夏牡丹皮山豆根茯苓車前子石燕九邑山洞中皆有之枳實續斷千年潤土人呼為地蜈蚣草青蒿子香薷石膏錢塘縣西五十七里有石膏山出石膏若雪瑩白又縣治亥地有嶽産石膏雨霽時出藥用為最益母草生龍井山谷亦名草天麻寒水石軟者寒水石硬者石膏生南髙峯塔山下地扁葍苦練皮蒲黃榆白皮鳯眼草金星草生南髙峯黃皮生於潛舊錢塘雷峯塔亦有之禽之品雀宋書鹽官屢冇白雀之異鵝雞鴨烏鵲鴿鷴雉鵪鷗鷺鸛鳩鶻鷹鷂鴟燕鶯鸜鵒鶺鴒亦名雪姑竹雞鵁鶄鶻鵃紺練鸕鶡亦名鸕鷀鑽沙魚虎章雞白頭翁黃頭青頭烏頭白鵊蠟觜告天百舌和靖詩云百種堪憐好言語一般惟缺好毛衣杜䳌布穀畫眉婆餅焦偷倉即家鷯黃雀亦名披綿提壺和靖過下湖别墅詩多謝提壺鳥留人到落暉鸂鶒和靖春日即事詩鴛鴦如綺杜衡肥鸂鶒夷猶翠㶑微鈎輈和靖詩雲木呌鈎輈獸之品馬昔錢氏牧馬于錢塘門外東西馬塍其馬蕃息至三數萬當時號馬海今餘杭臨安於潛三邑猶有遺種豕牛羊鹿麂狐兔獺狸牛尾玉面於潜昌化山谷有之犬太平廣記載靈隱造北髙峰塔寺有犬自山下銜磚石至顛吻為流血人憐之乃繫磚其背塔成犬斃寺僧葬之寺門八面松下又錢塘地名狗葬橋名良犬故老云昔人被火燎幾斃犬入水以水濡之復蘇犬後死立塜旌之昔賢咏宫中桃花犬著其義以為人戒皆此類也猫都人蓄猫有長毛白色者名曰獅猫蓋不捕之猫徒以觀美特見貴愛蟲魚之品鯉鯽西湖産者骨軟肉鬆鱖西湖獨無此種鱨鯿鱧鯔鱣鱸鱭鯶蒻葉吐哺白頰黃顙鮎石首王右軍帖云此魚首有石云是野鴨所化鰵鯊肋白鰣六和塔江邊生者極鮮腴江北者味差減䱋䱕鰷䱗金魚東坡詩云我識南屏金鯽魚又曰金鯽池邊不見君則是魚固舊所有亦有銀白玳瑁色者今錢塘門外多蓄養入城貨賣名魚兒活龜鰍蚌鱉內骨之屬一名神守蝦湖生者殼青江産者色白蝤蛑産鹽官蟹淮南子云蚌蟹珠龜與月盛衰皆隂屬也西湖舊多葑田産蟹土人呼湖蟹和靖詩云草泥行郭索又西湖晚歸詩云水痕秋落蟹螯肥今湖蟹絶難得螺有田螺螺螄海螺海螄皆螺類蟶産鹽官者犬蜆蛤蟛蚏咸淳臨安志卷五十八
