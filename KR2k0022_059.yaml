body:
  text: 咸淳臨安志卷五十九宋潜說友撰貢賦錢氏擅二浙時總於貨寶夭椓其民民免於兵革之殃而不免於賦斂之毒呌囂呻吟者八十年我太宗皇帝發德音下明詔一切蠲除之又八十年歐公記有美堂則其人富庶安樂邑屋華麗久矣損益之道其繫于民如此哉建紹中天六飛南幸杭之父老子弟如從仁人于邠何其歡欣戀慕不容釋也自時厥後今年蠲諸邑稅租明年免民户和買惠此中國以綏四方忠厚一脈有引勿替暨我聖上首遵先帝遺志罷增進以塞賄門盡弛征商庚以左帑錢如其數意益美恩益厚矣京兆久任職者又推廣上心為中下户代輸至于三四而未止噫我朝勤恤民隱之仁率詳于畿輔彼間架抽𣙜自京師始者何哉叙貢賦土貢揚州厥貢惟金三品瑶琨篠簜厥篚織貝厥包橘柚錫貢右禹貢會稽郡其利金錫竹箭右漢地理志杭州餘杭郡白編綾元豐九域志同緋綾藤紙寰宇記九域志同木瓜橘蜜薑乾薑寰宇記祥符志芑牛膝寰宇記同右唐地理志乾地黃蜜右太平寰宇記糟藏瓜薑右兩朝國史山茶楊梅笋絹紬綿甘蔗右祥符志朝廷蠲免嵗貢指揮免嵗貢御服綾髙宗皇帝紹興二十六年有㫖臨安府嵗貢御服綾一百匹自二十六年以後特與放免免貢嵗近例今上皇帝景定五年十月踐祚之初有㫖蠲免臨安府近例嵗貢續增添進錢隨合錢物計一百二十五萬八千五百四十貫有竒見詔令門田稅二稅元額夏絹九萬五千八百一十三匹二尺四寸三分七釐紬四千四百八十六匹三丈四尺八寸一分二釐綾五千二百三十四匹一丈綿五萬四千一百四兩每嵗婺州給本府衣絹二千五百匹紬三千匹綿三萬五千兩徽州給本府衣絹七千四十五匹綿一萬七千三百五十兩據淳祐志云據嘉熙二年省劄載婺州絹二千五百匹係皇祐年間指揮至紹定六年本府有請于朝住令解赴左藏庫充本府抱納江隂軍和買之數若紬綿與徽州所輸之數漫不可考秋苗米一十三萬二千七百一十三石六斗八升一合一勺七撮茶租錢一萬一千六百八十九貫一百四十三丈內新城縣年額合解四千九百餘貫端平元年有旨特與捐放二千八百貫免役錢一十二萬一千八百八十五貫七百八十五丈和預買絹四萬三百九十九匹二丈六尺二寸三分五釐紬九十五匹折帛錢六十四萬八千三百八十五貫五百一十八文每嵗認發江隂軍和買絹一千五百匹內七十三匹二丈一尺四寸三分五釐係本色一千四百二十六匹一丈八尺五寸折錢九千二百七十八貫五百一十八文檢㸃吏牘建炎間因陳通作過遂將本府和買紬絹權于蘇湖常秀四州寄買是時江隂為常州屬邑分認四千四十三匹紹興十四年諸州以寄買復還本府而江隂升為軍失于撥還寄買如舊乾道二年江隂水灾始于數內撥一千五百匹歸本府輸納餘二千五百四十三匹一丈五寸至紹熙二年江隂復以旱告守尹潘侍郎景圭遂申詣盡與認納至紹定間始將婺州認發本府絹二千五百匹徑解左帑理充此數互見夏稅數內九縣嵗解之額據淳祐志云前所載二稅元額今以九縣嵗解計之大約虧十分之一蓋錢塘仁和兩縣地段之為宫殿官舍寺觀營寨者既不該稅其餘諸邑管下或為水衝或溪湖坍成海者亦難強其所無今故並存之錢塘縣上供折帛錢八萬一千一百二十三貫三百四十三文畸零錢三萬七千一百七十一貫二百五十二文本色絹三千一百三十六匹折綾絹一百二十八匹二丈産綿五千七百一兩二錢四分糯米四百三十四石七斗七升六合白粳一千七百二十石二斗四升糙粳五千九百九十七石六升二勺六杪茶租錢八百九貫二十九文役錢夏秋每料八千一百一十六貫據淳祐志云紹興以後邸第之修營寺觀之免稅有未蠲豁者八十二處計和賣夏稅折帛共七百三十四匹二丈四尺七寸本色三百七匹畸零一百六十九匹二丈八尺七寸苗米一百石五斗六升役錢每料七百三十五貫五百六十七文淳祐九年令吳革申請于府趙安撫與􅊸為之倚閣且議奏免蓋方有此議而曾未奏免不可知也今考案牘但有景定二年正月朝省批送户部備錢塘縣申遞年寺觀邸第官舍帖免合蠲稅賦紐計折帛錢六千三百七十一貫一百七十文計四百三十九匹畸零錢八百八十六貫一百文從本部徑自銷豁尚當參考仁和縣上供折帛六萬七千五百二十一貫五百八十四文用年錢一千三百六十一貫八百七十九文畸零錢三萬九千八百四十五貫八百八十二文據舊志淳祐六年令王亞夫以稅額失陷申請挨究紐虧苗米九百一十五石四斗三升紐增畸零一萬四千一十貫六百文趙安撫與􅊸令以增補虧遂為定額本色絹三千七百五十匹綿五千九百四十九兩四錢苖米糙白糯三色米八千八百四十二石一斗三升九合四勺八抄鹽折稅錢七百貫三百四十二文鹽折米錢二百七十二貫六百文夏秋兩料役錢每料九千四百貫六百四十文嘉熙間江潮衝突臨江太平金浦安西安仁東上五鄉趙安撫與歡申請于朝盡蠲苖稅後水仍故道耕種漸復趙安撫與􅊸申請撥稅額八修江所為修築塘岸之費凡為錢二萬四千四百五十八貫四百三十七文絹三百三十二匹綿二千二十六兩苖米二千四百七十石八斗二升每嵗本所徑行催納餘杭縣折帛錢八萬二百六貫一百三十文夏稅紬絹一萬四千二百七十二匹一尺四寸和買紬絹四千八百八十八匹三丈七尺九寸綿七千一百一十七兩一錢六分苗米一萬八千九十五石三斗一升茶租錢八百七十二貫一百六文役錢一萬二千四百四十三貫八百四十八文臨安縣紬一千九十一匹一丈三尺二寸綾二千七百二十四匹五尺九寸絹五千三百五十匹畸零絹錢八千四百九十八匹三丈九尺四寸綿六千九百四十兩九錢折帛絹八千七百八十六匹苖米一萬一千七百七石八斗五合茶租錢四千六百一十九貫六百九文役錢夏秋每料九千六十六貫六百一十七文於潛縣本色絹八千二百四十匹紬五百四十七匹有竒綿五千六百七十九兩有竒折帛錢一萬五千三百九十九貫內紬絹錢二千六十一匹錢一萬四千四百二十七貫文內折綿錢二千四百三十兩錢九百七十二貫苗米一萬三百八十七石有竒內嘉德鄉紹興三十年水壞民田本縣申請倚閣三十六石有竒乾道五年又倚閣水傷五十六石外實催一萬二百九十五石有竒內本色一千七百八十石有竒逐年科撥不等內折米錢八千五百一十三石有竒錢三萬六千六百六貫文和預買本色絹四千一百五十二匹紬一百七十二匹有竒折帛錢七千二百九十一匹有竒計錢四萬七千三百九十五貫文有竒茶租錢四百七十三貫文免役錢九千二百三十七貫文耆户長錢二千三百三十三貫文府役錢八百五十貫文官户不减半役錢二十八貫文富陽縣折帛錢七萬三百八十三貫二百六十二文本色絹一萬五千五十三匹二尺九寸本色綿七千四百八兩二錢八分折紬錢三千六貫三十文小麥六百二十二石二斗九升秋苗一萬二千三百九十四石一斗五升九合咸淳六年令王積翁申坍逃虧額白米五百九十九石四斗零安撫潛說友請于朝自四年為始永與除豁役錢夏秋每料六千四百八十四貫六百八十四文新城縣和買紬絹一萬二千二百三十一匹綿六千一百八十五兩一錢二分丁身錢六千九百一十四貫五百二十七文茶租錢一千七十一貫一百六十六文苖米七千八百一十六石二斗九升六合二勺役錢夏秋每料五千八百二十七貫三百四十五文鹽官縣夏稅絹一萬三千四百九十九匹三丈五尺三寸二分紬一千一百七十二匹一丈二尺四寸九分綿一萬一千二百一十五兩二錢畸零夏稅紬三百五十六匹三丈八尺三寸二分并和買紬二百三十七匹一丈五尺計錢二千四百六十六貫四百八十二文折退夏稅紬一十二匹絹三十六匹二丈六尺七寸九分折小麥八十六石七斗二升六合營田夏稅絹五十九匹三丈七尺四分計錢三百一十一貫六百一十六文亭户折鹽折夏稅錢七千四百六十二貫四百二十文省除一半發赴轉運司外淨納本府四千八十一貫七十九文夏稅絹七百四十八匹三丈四尺九寸二分夏稅紬二百一十二匹九尺六寸六分綿一千四百五十六兩一錢七分本色夏稅絹一萬六百六十匹二丈一尺六分本色和買絹四千八百九十六匹綿六千六百九十兩八錢五分折帛錢共七萬六千四十六貫四百文和買八千八百一十五匹二丈五尺計錢五萬七千三百一貫四百文夏稅紬五百九十一匹四尺五寸絹一千九百九十三匹三丈五尺有五寸計錢一萬八千九十五貫文綿三千六十八兩一錢八分計錢一千三百五十貫文沙田夏稅錢一百六十三貫四百二十文苗米三萬三千八百九十石四斗三升六合六勺內撥賜靈隱淨慈兩寺水田二千二百九十五畝經界復正米二百二十四石二升四合外淨管三萬三千六百六十六石四斗一升二合六勺苗米一百六十八石七斗二升八勺亭户鹽折米一千三百六十四石八斗七升九合一勺計錢六千八百二十貫七百八十二文省除轉運司催一半外本府淨催六百八十二石四斗三升九合每石折錢五貫計三千四百一十二貫一百九十八文役錢夏秋每料九千九百三十四貫六百九十文昌化縣額管夏稅紬五百六匹四分四釐改正推割四十三匹三丈八尺五分夏稅絹三千三百七十四匹改正推割四百四十三匹一丈二尺四寸苖米五千五百六十七石三斗九升一抄七撮改正推割五百五十一石二斗六升八合五勺綿二千五百七十兩五錢役錢夏秋每料本府代輸畸零咸淳五年冬安撫潛說友申京城內外時䝉朝廷賑恤說友試尹將兩載殊愧未能推廣德意所有九縣咸淳六年畸零稅絹除及尺以下者已凖明堂赦文蠲放其四五等一尺以上者本府更與代輸一次九縣共管絹一十四萬六千五百七十一丈有竒計錢十八界會子四十三萬四千四百八十貫有竒凖省劄京師四方表倡潛安撫能撙節浮費為民代輸有以見奉宣朝廷德意之真深可嘉尚六年夏又申照得咸淳六年九縣四五等户畸零夏稅說友預于去冬已行代輸今刷具九縣六年秋苗除米不及升者已凖明堂赦文蠲放外其升已上至一斗以下者本府併與預行代納九縣共管米八千八百一石有竒計錢十八界會子二十六萬九千五百五十貫有竒凖省劄潛安撫一亷自將百廢具舉又能出所餘積捐以豫民去冬既代輸畸零稅今又代輸畸苗半嵗之間蠲賦者再培植本根表倡郡邑體國愛民委可嘉尚六年冬又申說友非才試尹比及三年殊愧無補於民盍與少寬其力所有咸淳七年四五等户稅畸零更與預行代輸一次九縣計錢四十六萬七千六百四十貫有竒凖省劄潛安撫本以亷介鍵以勤彊遂能損公益私厚為國家培護根本深足嘉尚商稅五稅預元額自趙安撫與􅊸申請減放外一嵗共收四十二萬貫文為額都稅務一十五萬五千三百一十三貫一百五十八文浙江稅務八萬一千八百一十貫二文北郭稅務一十萬八百九十貫四百四十三文龍山稅務三萬六千九百六十八貫九百一文江漲稅務四萬五千一十七貫六百四十七文朝廷免稅指揮景定改元以來朝廷務平物價紆民力節次降黃榜指揮免稅仍令本府具合收錢數申尚書省科還咸淳二年二月十三日凖指揮免稅五月自後接續展放常以五月為期每五月照本府征額撥十八界一十七萬五千貫以補郡計至今行之藏于市出于塗者菒不鼓舞上賜亦前代所罕有也咸淳臨安志卷五十九
