body:
  text: 咸淳臨安志卷六十宋潜說友撰人物一積土成山而風雨興積水成淵而蛟龍生豈錢唐有如是之江山而人物不為天下雄訪大禹之遺航則三代以來之人物可想也緬秦王之渡浙則秦漢以來之人物可想也豈江山有帝王之車轍馬跡而人物不為天下用代逺名湮與時俱化非昔之僻逺無聞乃記録之有闕也越君子之六千吳越之功臣五百不可數已然舉大概則他可推勾踐築館琅邪則有虎視山東之志破虜入雒討卓則有電掃中原之心子陵志凌雲日則有以激東都節義之風許逺挺節雎陽則有以開盛唐剋復之兆孰謂有王者興而名世不出于此歟我宋混一區宇而杭之人才輩出六飛南渡遂為行在所列聖志在恢復于是元氣之會膠轕牛斗而效靈于人物雖三尺童子皆有浮汴洛挾泰華超大河跨幽朔之心則記録其可闕乎舊志粗言之而已抑人有邪正事有詳略詎容以一律齊哉今則網羅散失表其名氏然後倣襄陽耆舊傳以著其所當著者蓋圖經取其易見不得盡如史也表有浮於其傳者存之也傳有不出於表者異之也扶踈者皆鄧林錦出繡沒者皆冀北故述古今人表披沙見金剖璞玉出故繼以皇朝進士表及中興右科進士表髙尚者騎日月際會者感風雲文為之經武為之緯關諸百代可以猛視故述人物列傳清淑無盡塗莘出焉故述后妃汝墳化也行露教也故述列女漢方術唐方技前史不廢故又繼以方外委巷非所訓孝門亦有旌故終以孝感拾遺猶有闕也以俟君子古今人表咸淳臨安志卷六十
