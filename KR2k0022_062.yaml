body:
  text: 咸淳臨安志卷六十三宋潜說友撰人物四列傳晉孫拯字顯世富春人能屬文仕吳為黄門郎孫皓世侍臣多得罪惟拯與顧榮以智全吳平後為涿令有稱績陸機既為孟玖等所誣収拯考掠两踝骨見終不變辭門生費慈宰意二人詣獄明拯拯譬遣之曰吾義不可誣枉知故卿何宜復爾二人曰僕亦安可負君拯遂死獄中而慈意亦死以晉書陸機傳修乾道志淳祐志並以拯係吳然拯既仕晉以死明陸機之誣其名始著則當孫之晉孫惠字徳施富陽人吳豫章太守賁曽孫也惠博學有才識州辟不就永寧初赴齊王景義討趙王倫以功封晉興縣侯辟大司馬户曹椽轉東曹屬齊王驕矜僣侈惠諷以五難四不可不納惠辭疾去成都王頴引惠為大將軍叅軍領奮威將軍白沙督是時頴將征長沙王乂以陸機為前鋒都督惠與機鄉里憂其致禍勸機遜都督于王粹及機兄弟被戮惠甚傷恨之永興元年乗輿幸鄴東海王越舉兵下邳惠乃詭稱南岳逸士秦祕之以書干越勉以勤王康世之畧辭義甚美越省書榜求其人以為記室叅軍専管文䟽預叅謀議除散騎郎太子中庶子復調補司空從事中郎越誅周穆等夜召参軍王廙造表廙戰懼壞数紙不成時惠不在越嘆曰孫中郎在表乆就矣越遷太傅以惠為軍諮祭酒数諮訪得失每造書檄越或驛馬催之應命立成皆有文采除祕書監不拜轉彭城内史廣陵相遷廣武將軍安豊内史以迎大駕之功封臨湘縣公卒惠文翰凡数十首以三國志孫賁傳注及晉書本傳修孫晷字文度富春人吳伏波將軍秀之曽孫也自兒童未曽被呵怒顧榮見而稱之謂其外祖薛兼曰此兒神用清審志氣正立非常童也及長恭孝清約學識有理義毎獨處幽闇之中容止瞻望未嘗傾邪雖侯家豊厚而晷長布衣𬞞食躬親壟卧誦詠不廢欣然獨得父母愍其如此欲加優饒而夙興夜寐無蹔懈也父母起居嘗饌雖諸兄親饋而晷不離左右富春道動經江川父難于風波每行乗籃輿晷躬自扶持所係之處則于門外木下藩屏之間隠息初不令主人知之兄當篤疾經年晷躬自扶侍藥石甘苦必經心目䟦渉山水祈求懇至而聞人之善欣若有得聞人之惡惨若有失見人饑寒並周贍之郷里贈遺一無所受親故有窮老者数人常往来告索人多厭慢之而晷見之欣敬逾甚寒則與同衾食則與同器或觧衣推食以䘏之時年饑糓貴有生刈其稻者晷見而避之湏去而出既而自刈送去之郷隣感愧莫復侵犯司空何充為揚州檄晷為主簿司徒蔡謨辟為掾属並不就尚書張國明州土之望表薦公車特召會卒時年三十八朝野嗟痛之以晉書本傳修范平字子安錢塘人其先銍侯馥避王莾之亂適吳因家焉平研覧墳索遍該百代姚信賀邵之徒皆從受業吳時舉茂才累遷臨海太守政有異能孫晧初謝病還家吳平太康中頻召不起年六十九卒有詔追加諡號曰文正先生賀循勒碑紀其徳行三子奭咸泉並以儒學至大官泉子蔚闗内侯家世好學有書七千餘卷逺近來讀者常百餘人蔚為辦衣食蔚子文才亦知名以晉書本傳修禇陶字季雅錢塘人弱不好弄少而聪慧清閒淡黙以墳典自娛年十三作鷗鳥水磑二賦見者竒之陶嘗謂所親曰聖賢偹在黄卷中捨此何求州郡辟不就吳平召補尚書郎張華見之謂陸機曰君兄弟雲躍龍津顧彦先鳯鳴朝陽謂東南之寶已盡不意復生禇生機曰公但未覩不鳴不躍者耳華曰故知延門之徳不孤川嶽之寶不匱矣遷九真太守轉中尉年五十五卒以晉書本傳修暨遜字茂言餘杭人仕晉為廣昌長封關内侯以孝行著聞咸康五年旌表門閭有碑在餘杭縣西以淳祐志修宋卜天與餘杭人父名祖宋武帝聞其幹力召補隊主從征伐封關中侯歴二縣令天與善射容貎嚴毅文帝使教皇子射元嘉中為廣威將軍領左細仗元㓙劭之變倉卒舊將羅訓徐牢皆望風屈謝天與不暇被甲執刀持弓疾呼左右出戰徐牢曰殿下入汝欲何為天與罵曰只汝是賊手射劭于東堂幾中逆徒擊之臂斷乃見殺孝武即位贈龍驤將軍益州刺史諡曰壯侯子伯宗殿中將軍明帝㤗始初擊南賊于赭圻戰沒次子伯興官至南平昌太守直閣領細仗隊主昇明元年與袁粲同謀以南史本傳修吳喜臨安人本名喜公太宗减為喜少知書領軍將軍沈演之使冩起居注所冩既畢闇誦畧皆上口演之嘗作遜表未奏失本喜經一見即冩無所漏脱演之甚知之因此渉獵史漢頗見古今沈慶之征蠻啟太祖請喜自隨使命未來為世祖所知賞世祖以喜為主書稍見親遇擢為諸王學官令左右尚方令河東太守殿中御史大明中黟歙二縣有亡命数千人攻破縣邑殺害官長豫章王子尚領精甲三千討伐再往失利世祖遣喜將数十人至二縣誘説群賊賊即日歸降太宗初即位四方反叛東兵尤急喜請得精兵二百致死于東上大悦即簡羽林勇士配之議者以喜刀筆主者不為將不可遣中書舍人巢尚之曰喜昔隨沈慶之屢經軍旅性既勇决又習戰陣若任之必有成績諸人紛紛皆是不别才耳喜孝武世見驅使常充使命性寛厚所至人並懐之及東討百姓聞吳河東來便望風降散故喜所至克㨗遷歩兵校尉將軍如故封竟陵縣侯東土平定又率所領南討遷輔國將軍尋陽太守南賊退走喜追討平定荆州遷前軍將軍泰始四年改封東興縣侯除右軍將軍淮陵太守假輔師將軍兼太子左衞率轉驍騎將軍假號太守兼率如故其年虜㓂豫州喜統諸軍出討大破虜于荆亭偽長社公遁走戍主帛乞奴歸降軍返復以本位兼左衛將軍六年又率軍向豫州拒索虜加節督豫州諸軍事以宋書南史本傳修范叔孫錢塘人少而仁厚周窮濟急里人疾病必躬往䘏療或貧無藥餌饘粥資皆給之不吝全活甚衆嵗饑民多疾疫里有父母兄弟同時死者數家䘮尸經日不収親隣畏逺莫敢營視叔孫悉備棺槥親往殯瘞鄉曲貴其義行莫有呼其名者宋孝建初除竟陵王國中軍不就以南史本傳修齊顧歡字景怡一字元平鹽官人家貧父使驅田中雀歡即作黄雀賦而歸雀食過半父欲撻之見賦乃止鄉中有學舍歡貧無以受業于舍壁後倚聼無遺忘者及長篤志好學母年老躬耕誦書夜則燃松節或然糠自照聞吳興東遷邵元之能傳五經文句假為書師從之受業同郡顧覬之臨縣見而異之遣諸子與游歡年二十餘更從豫章雷次宗諮元儒諸義母亡水漿不入口六七日廬于墓次遂隠不仕于剡天台山開館聚徒受業者常近百人歡早孤毎讀詩至哀哀父母輙執書慟泣學者由是廢蓼莪篇太祖輔政悦歡風教召為揚州王簿遣中使迎歡及踐阼乃至稱山谷臣顧歡上表其畧曰臣聞舉網提綱振裘持領綱領既理毛目自張道徳綱也物勢目也是以湯武得勢師道則祚延秦項忽道任勢則身戮謹刪撰老氏獻治綱一卷伏願稽古百王斟酌時用不以蒭蕘棄言則率土之賜臣志静幽深無與榮勢自足雲霞不須祿飬請從此退歡東歸上賜麈尾素琴永明元年召歡為太學博士同郡顧黯為散騎郎黯有隠操與歡俱不就召歡事黄老道解隂陽書為數術多效騐有病邪者問歡歡曰家有何書答曰惟有孝經而已歡曰可取仲尼居置病人枕邉恭敬之自差也後病者果愈人問其故答曰善禳惡正勝邪此病者所以差也將終賦詩云精氣因天行游魂隨物變剋死日卒于郯山歸塟木連理出墓側縣令江山圖表狀世祖詔歡諸子撰歡文義三十卷以南齊書南史本傳修宋廣之字處深錢塘人善清言初顧歡著三名論以正四本之失尚書劉澄臨川王常侍宋廣之並立論難與之往復而廣之才理尤精詣以南史顧歡傳修禇伯玉字元璩錢塘人髙祖含始平太守父逿征虜叅軍伯玉少有隠􅋵寡嗜慾往郯居瀑布山三十餘年隔絶人物王僧逹為吳郡苦禮致之伯玉不得已停郡信宿纔交數言而退寕朔將軍丘珍孫與僧逹書曰聞禇先生出居貴館此子滅景雲棲不事王侯自非折節好賢何以致之昔文舉棲冶城安道入昌門于兹而三焉却粒之士飡霞之人乃可暫致不宜乆覊望其返䇿之日蹔紆清塵亦助為譬説僧逹答曰禇先生從白雲游舊矣古之逸人或留慮兒女或使華隂成市而此子索然為朋松石介于孤峯絶嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪薜蘿若已窺烟波臨滄洲矣君欲見之輙當申譬宋孝建二年散騎常侍樂詢行風俗表薦伯玉加召聘本州議曹從事不就齊髙帝即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志勅于郯白石山立太平館居之建元元年卒年八十六以南齊書南史本傳修杜京産字景齊錢塘人四世祖子恭有道術祖運為劉毅衛軍叅軍父道鞠州從事京産少恬静閉意榮宦頗渉文義專修黄老會稽孔覬清剛有峻節一見而為欵交郡召主簿州辟從事稱疾去除朝請不就與同郡顧歡同契始寕中東山開舍授學建元中武陵王曄為會稽太祖遣儒士劉瓛入東為曄講説曄故往與遊曰杜生當今之臺尚也京産請瓛至山舍講書傾資供侍子栖躬自屣履為瓛生徒下食其禮賢如此孔稚珪周顒謝卄瀹並致書以通慇懃永明十年稚珪及光祿大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融表薦京産曰竊見吳郡杜京産㓗静為心謙虚成性通和發于天挺敏逹表于自然學遍元儒博通史子流連文藝沉吟道奥泰始之朝掛冠辭世遁舍家業隠于太平葺宇窮岩採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡慾麻衣藿食二十餘載雖古之智士何以加之謂宜釋巾幽谷結組登朝則嵒谷含歡薜蘿起忭矣不報建武初以員外散騎侍郎召京産曰莊生持釣豈為白璧所囬辭疾不就以南齊書南史本傳修杜栖字孟山京産子張融與京産相友毎相造言論栖常在側融指栖曰昔陳太丘之召元方方之為劣栖出京師從儒士劉瓛受學善清言能弹琴飲酒名儒貴流多敬待之中書郎周顒與京産書曰賢子學業清標後來之秀刺史豫章王聞其名辟議曹從事仍轉西曹佐竟陵王子良數至禮接國子祭酒何嗣治禮又重栖以為學士掌婚冠儀以父老歸飬怡情壟畆栖肥壯及京産疾旬日間便皮骨自支京産亡水漿不入口七日晨夕不罷哭不食鹽菜每營買祭奠身自看視號泣不自持朔望節嵗絶而復續吐血數升時何嗣謝朏並隠東山遺書曉譬誡以毁滅至祥禫暮夢見其父慟哭而絶初何㸃見栖嘆曰卿風韻如此雖獲嘉譽不永年矣卒時年三十六以南齊書本傳及南史杜京産傳修朱謙之字處光錢塘人父昭之以學觧稱于郷里謙之年數嵗所生母亡昭之假塟田側為族人朱幼方燎火所焚同産姊宻語之謙之雖小便哀戚如持喪年長不娶永明中手自刃殺幼方詣獄自繫縣令申靈表上别駕孔稚珪兼記室劉司徒左西椽張融牋與刺史豫章王曰禮開報仇之典以申孝義之情法斷相殺之條以表權時之制謙之既申私禮又明公法今殺之則成罪人宥之即為孝子殺一罪人未足𢎞憲活一孝子實廣風徳豫章王言之世祖時吳郡太守王慈太常張緒尚書陸澄並表論其事世祖嘉其義慮相復報乃遣謙之随曹虎西行將發幼方子惲于津陽門伺殺謙之謙之兄選之又刺殺惲有司以聞世祖曰此皆義事不可問悉赦之吴興沈覬聞而歎曰弟死于孝兄殉于義孝友之節萃此一門以南齊書孝義傳修吕道惠餘杭人學徒嘗有百數范述曽之師也以梁書范述曽傳修述曽幼師道惠晩始見修梁則道惠非梁人也當附齊梁范元琰字伯珪一字長玉錢塘人祖悦之太學博士召不至父靈瑜居父憂以毁卒元琰時童孺哀慕盡禮及長好學博通經史然謙敬不以所長驕人祖母患癰常自含吮與人言常恐傷物居家不出城市雖獨居如對嚴賔見者莫不改容正色家貧惟以園蔬為業嘗出門見人盗其菘元琰遽退母問盗者為誰答曰向所以退畏其愧耻今言其名願不泄也于是母子秘之或有渉溝盗其笋者元琰因伐木為橋以渡之自是盗者大慚一郷無復草竊齊建武二年召為安北恭軍不赴沛國劉瓛深加噐異嘗表稱之梁天監九年縣令管慧辨上言義行揚州刺史臨川王宏辟命不至十年王拜表薦焉未召其年卒年七十以梁書南史本傳修范述曽字子元一字頴彦錢塘人㓜從餘杭吕道惠受五經道惠曰此子必為王者師齊文惠太子竟陵文宣王㓜時齊髙帝引述曽為之師友起家為宋晉王國侍郎齊初至南郡王國郎中令遷太子歩兵校尉為人謇諤在官所多諌争竟陵王深相器重號為周舍沈約亦以述曽方汲黯明帝即位為永嘉太守為政清平不尚威猛甿俗便之所部横陽縣山谷嶮峻為逋逃所聚前後二千石討捕莫能息述曽下車即開示㤙信凡諸凶黨襁負而出編戸屬籍者二百餘家自是居人安業勵志精白不受餽遺帝下詔褒美召為游擊將軍郡送故舊錢二十餘萬一無所受惟得白桐木火籠朴十餘枚而已吏無荷檐者民無老少皆出拜辭號哭聞數十里東昏時拜中散大夫歸里梁武帝踐祚乃輕行詣闕仍辭歸詔曰述曽昔在齊世忠直奉王往涖永嘉治身亷約冝加禮秩以厲清操可太中大夫述曽生平所得俸祿皆以分施及長壁立無資天監八年卒注易文言著雜詩賦數十篇以梁書南史本傳修戚衮字公文鹽官人祖顯齊給事中父覇梁臨賀王中兵叅軍少聪慧遊學都下受三禮于國子助教劉文紹年十九梁武帝勅䇿孔子正言并周禮禮記義衮對髙第除揚州祭酒從事史就國子博士宋懐方質儀禮義懐方北人自魏携儀禮記禮疏祕惜不傳及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若其不來宜即隨屍而殯為儒者推許如此尋兼太學博士簡文在東宫召衮講論又嘗置宴集元儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辨縱横諸儒懾氣時衮説朝聘義摛與往復衮精采自若領答如流簡文深加歎賞敬帝立為江州長史陳大建十三年卒衮于梁代撰三禮義記逄亂亡失禮記義四十卷行于世以陳書南史本傳修禇修錢塘人父仲都善周易為當時之冠天監中歴五經博士修少傅父業善尺牘辨文章武陵王為揚州引為宣惠叅軍限内記室性至孝父䘮毁瘠過禮及丁母憂水漿不入口二十三日氣絶復甦每號慟嘔血遂以毁卒以梁書南史並入孝義傳修盛紹逺梁封關内侯天監二年聚徒數百人以授業歿後門人相與立碑以旌徳業在餘杭縣以古圖經及淳祐志修陳顧越字允南一字思南塩官人所居新坂黄岡世有郷校由是顧氏多儒學祖道望齊散騎侍郎父仲成梁䕶軍司馬豫章王府諮議叅軍家傳儒學並専門教授越少孤勤苦自立明慧有口辨勵精學業不舍晝夜弱冠游都下通儒碩學必造門質疑至于㣲言妙㫖九章七曜音律圖緯咸盡其精㣲時太子詹事周捨以儒學見重名知人一見歎賞由是聲譽日重又有會稽賀文發學兼經史與越名相埓故都下謂之發越焉初為南平王偉國右常侍與文發俱入府並見禮重大通中詔陳慶之送魏北海王顥返北慶之請越叅其軍事時慶之所向剋㨗直至洛陽既而顥驕縱越料其必敗以疾先返慶之果見摧衂時稱其見幾及武帝撰制㫖新義遣越返吳敷揚講説越徧談經義深明毛詩旁通異義善莊老尤長論難兼工綴文􅈺尺牘長七尺三寸美鬚眉武帝嘗于重雲殿自講老子僕射徐勉舉論義越抗首而講音響若鐘容止可觀帝深贊之尋除五經博士侍宣城王講及侯景之亂越與同志沈文阿等逃歸賊黨數授以爵位誓不受承聖二年詔授宣晉安王府諮議叅軍領國子博士越以世路未平歸隠于武丘山紹泰元年復召為國子博士陳天嘉中詔侍東宫講除東中郎鄱陽王府諮議叅軍甚見優禮尋領羽林監遷給事中黄門侍郎國子博士侍讀如故時朝廷草創疑議多所取决毎侍講東宫皇太子嘗虚已禮接越以宫僚未盡時彦太子仁弱宣帝有奪宗之兆憤激上疏曰惟皇太子天下本養善春宫臣陪侍經籍于今五載如愚所見輔弼丞疑未極時選至如文宗學府廉㓗正人當趨奉龍樓晨游夕論嘗聞前聖格言往賢正道如此則非僻之語無從而入帝深感焉而竟不能革廢帝即位拜散騎常侍兼中書舍人黄門侍郎如故領天保博士掌儀禮猶為帝師時宣帝輔政越因請假免官大建元年卒年七十七所著喪服毛詩老子孝經論語等義疏四十餘卷詩頌碑誌牋表凡二百餘篇以陳書南史本傳修杜之偉字子大錢塘人家世儒學以三禮専門父規梁朝奉朝請與濟陽江革會稽孔休源友善之偉㓜精敏有逸才十五遍觀文史及儀禮故事時軰稱其蚤成僕射徐勉見其文重其有筆力中大通元年勉白補東宫學士與學士劉陟鈔撰羣書各為題目所撰冨教政道二篇皆之偉為序後兼太學限内博士大同七年皇太子釋奠于國學時樂府無孔子顔子登歌詞令之偉製其文再遷安前邵陵王刑獄叅軍之偉以彊識俊才有名當世吏部尚書張纉以為廊廟之器侯景反之偉逃竄山澤及陳髙祖為丞相素聞其名召補記室叅軍遷中書侍郎領大著作髙祖受禪除鴻臚卿餘並如故之偉白求觧著作曰臣以紹泰元年泰中書侍郎掌國史于今四載思報㤙奬不敢廢官皇厯維新驅馭軒昊記言記動未易其人著作之才更宜選衆臣無容遽變市朝再妨賢路優勅不許尋轉大匠卿遷太中大夫仍勅撰梁史卒官贈通直郎騎常侍之偉為文不尚浮華而温雅博贍文集存者十七卷以陳書南史本傳通鑑年月修錢逵字通甫梁大同中為廬陵王國侍郎羽林監及陳祖立遷東海太守娶瑯琊王氏生九子嘗講學及儒菴上後皆掌郡符故其地號九州山在臨安縣有羅隠所為碑記以淳祐志修杜稜字雄盛錢塘人世為大姓稜渉書傳從陳武帝平蔡路飬李遷仕有功梁元帝承制授石州刺史上陌縣侯侯景平武帝鎮朱方以稜監義興瑯琊二郡武帝東征杜翕等留稜與侯安都居守徐嗣徽任約引齊師濟江攻䑓城安都與稜隨方抗拒晝夜警備綏撫士卒未嘗觧帯賊平以功除丹陽尹文帝即位以預建立功改封永城縣侯出為晉陵太守又為丹陽尹廢帝即位加特進侍中大建元年為吳興太守二年召為侍中尋加特進䕶軍將軍三年免四年復為侍中右光祿大夫稜歴事三朝並見㤙寵卒官贈開府儀同三司諡曰成配享武帝廟廷史臣有感會風雲畢力驅馳之贊其子安世嗣以陳書南史本傳修駱文牙一名牙字旗門臨安人祖祕道梁安成王田曹參軍父裕梁鄱陽嗣王中兵叅軍事文牙年十二有善相云此郎容貎非常必將逺致梁太清末陳文帝避地臨安文牙母陵覩帝儀表知非常人賔待甚厚及文帝為吴興太守引文牙為將帥從平杜龕張彪等毎戰先鋒䧟陳勇冠衆軍以功授直閣將軍太平二年以母憂去職文帝鎮會稽為山隂令永定三年鎮冶城尋從文帝拒王琳文帝即位封常安縣侯常安一作臨安尋為臨安令遷越州刺史初文牙母之卒也饑饉兵荒至是始塟詔贈文牙母常安國太夫人諡曰恭遷文牙為正威將軍晉陵太守三年以平周廸功遷冠軍將軍臨川内史大建三年為桂陽太守八年遷散騎常侍入直殿省十年授豊州刺史至徳二年卒贈安逺將軍廣州刺史子義嗣史臣謂駱牙識真有奉知世祖天授之徳盖張良之亞牙母智深先覺符栢谷之明以陳書南史本傳修全緩字𢎞立錢塘人㓜受易于博士禇仲都篤志研翫得其精㣲梁太清初歴王國侍郎奉朝請轉國子助教兼司義郎専講詩易陳大建中累遣始興王府諮議叅軍緩通周易老莊時人推之以陳書南史本傳修隋陸知命字仲通冨春人父敖陳散騎侍郎知命好學識大體以正介自持歴陳太學博士南嶽正及隋晉王廣鎮江都以其三吳之望召令諷諭反者以功拜儀同三司賜以田宅復用其弟恪為汧陽令知命陳遜許之時天下一統知命勸髙祖都洛陽因上太平頌以諷又上表請使髙麗曰昔軒皇馭歴既緩夙沙之誅虞帝握圖猶稽有苖之伐髙麗小醜狼顧燕垂王度含洪毎懐遵飬欲諭之以徳也臣請以一節宣示皇風使彼君臣面縛闕下天子異之尋授普寕鎮將人或言其正直者由是待詔于御史䑓大業初拜侍御史侃然正色百僚所惮帝甚敬之後卒贈御史大夫以北史隋書本傳修顧彪字仲文餘杭人明尚書春秋大業時為秘書學士撰古文尚書義疏二十卷行于世以北史隋書本傳修魯世逹餘杭人大業時為國子助教撰毛詩章句義疏四十二卷行于世以北史隋書本傳修咸淳臨安志卷六十三
