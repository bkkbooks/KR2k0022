body:
  text: 咸淳臨安志卷六十七宋潜説友撰人物八列傳張九成字子韶鹽官人性頴悟八嵗黙誦六經十四郷貢辟雍遊京師從楊時學權貴託人致幣曰從吾遊當薦之館閣九成笑曰王良尚羞與嬖奚乗吾可為貴游客耶紹興二年將䇿士詔考官直言者寘髙等九成對䇿謂禍亂之作天所以開聖人上及两宫忠憤激烈下及閹寺無所顧避髙宗感動擢置第一楊時遺九成書曰廷對自中興以來未之有非剛大之氣不為得䘮囬屈不能為簽判鎮東軍究心視事吏不能欺嘗大書屋壁曰此身茍一日之閑百姓罹無涯之苦民冐鹺禁提刑張宗臣觀望左相逮捕數十人九成力争不從投劾而歸趙鼎薦之召入著庭時樊光逺首南宫汪應辰魁大對上語九成曰殿省舉首皆卿門人對曰臣不敢以利祿之説誘其徒惟知講明經術庶盡忠孝除浙東提刑力辭陳公輔劾其矯餙詔與小郡又辭乃與祠未幾召除宗正少卿遷禮部侍郎尋兼侍講進讀春秋因論日食曰日食之變本于惡氣惡氣之萌本于惡念上觸于天則日月薄蝕五星失序下觸于地則菑及五榖怪妖迭見中觸于人則為兵為火札瘥並至願陛下正心術以格天上聳然曰當為卿戒之上問易牛㣲事耳孟子謂是心足以王朕竊疑之九成曰不忍一牛仁心著見王道之端倪推此心以往則華夏蠻貊根荄鱗介皆在陛下仁政豈非王道乎上謂近臣曰朕于九成所得甚多兼權刑部侍郎先是刑部斷死囚不以請自九成涖職情輕免死者甚衆一日法寺以大辟成案上九成閲始末得其情因請覆實囚果誣服者理官抵罪朝論欲以平反為賞九成曰致人以罸而已幸賞豈士大夫所為固辭上問和議九成曰金情多詐不可不察檜甚惡之九成以趙鼎黨求去上命除待制出守未幾謫守邵州何鑄言其附趙鼎落職丁父憂服除詹大方論其謗訕謫居南安軍凡十四年談經自樂因自號横浦居士檜死以秘撰起知温州去倍輸罷柑宴蠲䘮塟沽酒民至感泣以目疾丐祠紹興己邜卒上嗟悼復敷文閣待制官其子若弟四人學者稱為無垢先生有尚書中庸大學孝經論孟説無垢語錄行于世理宗以九成有明道之功特贈太師追封崇國公諡文忠以國史本傳中興繫年錄中興編年綱目紹興正論小傳無垢語錄淳祐志修凌景夏字季文餘杭人紹興二年對䇿第二吕頥浩稱其詞勝張九成任紹興府觀察推官帥綦崇禮薦于上六年擢秘書省正字八年遷著作佐郎九年景夏與館職胡珵朱松張廣常明范如圭等六人共奏封事言和議非便秦檜憾之除工部員外郎檜罷兵斥景夏知外郡及閑居凡十餘年二十五年檜死二十六年除軍器監尋除起居舍人兼權給事中景夏言紹興二十一年詔臨安府見推排等第依在京例與免令有司仍以和買役錢難以减放止與西北流寓人蠲除土著人户反成偏重夫土著流寓皆陛下赤子徳澤之施寔先京師契看两縣在城營運浮財物力所輸和買絹數止二千六百餘匹望依已降指揮並與蠲免庶使徳澤無偏詔令有信户部看詳如其請遷中書舍人未幾直龍圖閣知撫州二十八年知襄陽府二十九年知鼎州奏免程昌禹所増蔡州官兵衣糧六萬四千餘緡詔减四分之一徙宣州三十年加集英殿修撰三十一年除吏部侍郎景夏言慶厯三年編定勲臣凡二百四家逮建中靖國元年續編一百一十六家許子孫陳乞㤙澤竊謂崇觀以來至陛下即位經渉艱難衛社稷捍牧圉者畧而未編亦一闕也望檢會崇觀以後勛業著于國史者接續編定以勸忠烈事下吏部後不行十月扈從親征三十二年奏論吏部七司有法有例法可按籍而觀例則散于案牘之中匿于胥吏之手官有去來不能遽知故索例而不獲雖有强明徤决之才不敢復議臣愚以為吏部七司冝制例册凡經取㫖或堂白者毎一事已命郎中畫時擬定長貮書之于册以為例毎半年則上于尚書用印給下如此則前後予决悉在有司之目猾吏無所措巧銓綜漸以平允詔吏部措置申省以紹興正論小傳戊午讜議中興繫年錄中興編年綱目修樊光逺字茂寔錢塘人少從張九成學紹興五年南省奏名第一八年除秘書正字九年光逺上疏言臣竊觀今日士大夫之論莫不以金人詭詐為可憂臣獨曰詭詐不足憂而信寔深可懼也臣願陛下弗以得地為喜而常以為耻勿以甘言為悦而常以為憂勿罪忠讜以飬敢言之氣勿喜迎合以開濫進之門勿盡民力宜爱惜之以固根本勿阻士氣宜聳動之以備緩急十年八月秦檜將遂休兵罷為閬州教授二十六年召為秘書丞俄特引對光逺言頃年大臣挾權修怨不平其心䑓諌之所排擊法寺之所煆煉告訐之所中傷其間又有因責降而死者夫嘗與聞朝廷之政親陪甘泉之班矣及子而無一命之祿宜聖心之所深憫望明詔有司凡習任執政侍從死于責降而子孫未有官者許令自陳與復官職錄其子孫上曰甚善當令看詳檢舉上又曰朕與卿不相見今幾年光逺曰臣得外任逮今十有六年上曰朕所以令卿上殿欲除卿察官光逺頓首辭于是遂除監察御史二十七年遷工部員外郎尋請補外知興化軍二十八年除福建路提㸃刑獄二十九年十月徙知嚴州時三衙誘畧近郡平民為軍三十年光逺奏乞禁止今後遇有闕額均下諸州軍招填詔三衙自今止以見管兵為額光逺又言本州嵗輸御爐炭七萬四千五百斤而不償民間之直上亟為罷之以中興小傳修郎曄事同里張九成嘗編横浦日新錄雖從淳熈十四年特奏得官然甚以儒學知名以横浦日新錄海昌圖經修郭知運字次張鹽官人㓜刻志問學弱冠登紹興進士甲科時相强與為姻知運勿樂訖停昏焉仕至荆門守倦求祿仕自號息菴老人卜居䨇廟之西嘗題詩于廟云唐祚中不振孽賊恣姦驕君徳弗克終治亂在一朝渠魁睥神器四海俱動摇向來為厲階其迹已氷消中興功孰甚張許冠百僚堂堂二公烈千古名不凋義膽極華岳忠肝齊斗杓平生慕節義卜居祠匪遥丹青就湮鬰古屋風蕭蕭英靈如可問激懦討惽妖知運有文集四十卷名猥藁云以中興登科錄海昌圖經修施徳操楊子平附字彦執鹽官人學有本末主孟子以排釋氏曰絶人倫漫等級弃禮樂仁義不用為能躐造空無此其深勝處㮣之以道尚自顛倒後先况又餙荒幻報應誑愚取資則尤為世蠧因著為論以曉未悟寔有强立不惑之見楊子平同縣人名犯今上皇帝御名子平其字也安貧樂道不妄取與謹獨之操闇室猶康莊也二人身塞而譽不宏然里人嚮慕與張九成等淳熈四年縣令魏伯恂祠九成于學以徳操子平佐號三先生以刑部侍郎程大昌所撰塩官縣學三先生祠堂記修關注字子東世為錢塘人登紹興五年進士第嘗教授湖州與胡瑗之孫滌裒瑗遺書得易觧中庸義藏之學宫又錄瑗言行為一帙汪藻為之序稱注之意在于美風俗新人材官至太學博士卒注自號香巖居士有關博學集二十卷以汪浮溪文陳直齋書錄觧題修姚興舊名叔興新城姚村人有勇力善武藝為統制官𨽻王權紹興三十一年完顔亮入㓂兵至和州尉子橋興以一軍三千人力戰權置酒仙宗山上擁群刀斧自衛殊不援興興殺冦數百以援不至而沒朝廷為之立祠以表其忠寕宗朝復加追贈制曰烈士徇國未嘗計身後之榮人主褒忠盖將為天下之勸矧予名將著節先朝兹覧從列之抗章追想壯猷而興慨肆頒顯渥用發幽光故右武大夫建康府破敵軍統制贈襲慶軍節度使姚興可特贈開府儀同三司以中興編年綱目百川治迹統類及新城續圖經修楊由義字宜之父奉直建炎初以正將扈蹕寓杭烏珠犯杭奉直禦敵由義將母及妺避地海昌冦卒至母曰汝父必死國難我當死婦節携女沈運河由義被執累日而逸領漕薦不第館于諸公之門吏部朱松嘗延請以誨其子熹後以父㤙補右階監贍軍南庫隆興初盧仲賢使北辱命由義請行以閤門祗候宻院幹官充奉使金國通問審議官金折之使拜由義誓死不屈全節而歸有㫖换通直郎詞曰黒肱之為子木先冀獲成言之信鄭衆不對單于拜葢其自誓之堅後官至刑部侍郎轉朝奉大夫卒于鹽官私第朱熹欲銘其墓嘗曰忠義大節夷夏稱嘆會熹卒不果子九鼎字叔鎮以父任入官帥襄漕䕫有善政後易利漕帥天漢金刼大散關九鼎疾驅駐河池縣復大散關又復皁郊殺偽元帥完顔阿林後金忿兵再至九鼎死守清野原除太府少卿縂領蜀賦時都統吴政戰沒麾下兵潰冦據漢中擣大安軍九鼎檄張威何進勦冦于三泉匹馬不返會蜀有新帥首招潰卒至雞公嶺復叛帥挟印兵以遁有勸九鼎遁者答曰九鼎有職守不可去賊至遂遇害後宣閫戮叛卒奏九鼎以死守職乞厚加䘏典以勸盡忠有㫖贈五官至朝議大夫又于所該㤙澤外特官其子三人以海昌圖經所載家紀修俞烈字若晦杭之臨安人祖徽與張九成凌景夏齊名貢辟雍弗果行烈少警敏淳熈八年試禮部第一十五年以太學錄轉對論浙西圍田為運河及民田之害乞精選郎官與漕臣按視開復孝宗曰如此則是受水之地狭當如卿言遣官相視遷太學博士光宗即位轉對乞酌咸平元祐之制日輪講讀官内直以備訪問又論三省批送文字文移回復為胥吏請求之資乞操縱伸縮權在朝廷無為舊例束縛紹熈改元進國子博士慶元三年為秘書郎年餘出守嘉興上供及額即止恐貽後害不肯増緡錢以受最賞六年為司封郎官論民間義役官司不得干預乞下勅令所公共詳定尋借户部尚書差充接送金國弔祭使除起居舍人明年二月䕶金使元顔充絶江充曰好箇大塹烈曰此謂天塹國信往來幸無風耳充曰舟大何恐烈曰江流湍迅舟大不足恃也語未既風起濤驚舟為俯仰北使皇懼尋充報謝使嘉㤗四年除秘書監尋除中書舍人論駁不撓永州祁陽縣舊有韓两府祖墓有隣近于其墓禁内伐竹十五竿以盖墓蓬法司先引律盗人墓木者杖一百繼以觀望侂胄嫌于太輕輙引持杖竊盗法烈駁奏忤侂胄論去家居五年嘉定初知慶元府鎮以清静移知鎮江府時淮民流移充斥多方拯救孩提弃擲募為鞠飬至春民思歸業厚為資遣郡有大夾崗大夾崗乃漕運路雨餘泥深縴夫失足輙堕數十尺下烈為甓之始無䧟溺嵗旱河澁烈命車江水入裏河舟行無留權吏部侍郎乞浚練湖通漕廣溉兼中書舍人未嘗懲往事少屈勲戚濫㤙貂璫佚罸宫掖夤縁干請多格不行尋兼侍讀真除吏侍進讀通鑑至唐景龍中斜封墨勅因言中宗不用太宗制度不由中書審覆門下審讀人主當以為戒又讀孝宗聖政至郊祀不買象事拱而言淳熈以前郊祀必用象孝宗超然逺覧以為大禮初不繫此唤囬買象使臣可謂逹禮之本矣以六年卒官號盤隠居士有盤隠詩編掖垣制草奏議北征等集以程珌所撰俞侍郎行狀修余古錢塘人光宗初罷遺補官近臣罕進言者紹興二年五月古以布衣上書曰恭惟皇帝陛下春秋鼎盛自即位以來星見再周當思付託之重朝夕勉惟求治之道乃或不然間者側聞宴游無度聲樂不絶晝之不足繼之以夜宫女進獻不時伶人出入無節宦官侵奪權政隨加寵賜或至超遷内中宫殿已歴三朝何陋之有奚用更建樓䑓接于雲漢月榭風亭不輟作深為陛下不取也自古宦官敗國備載方册今上而三省下而百司皆在此曹號令之下盖自副將而至殿歩帥各為髙價但如其價則有特除此為害之大者良由公卿持祿保位備員全身如漢之石慶唐之蘇味道滿朝皆小人也陛下果能以漢文帝為法唐莊宗為戒即乞昭示詔㫖嚴下約束除太常樂工立定員數凡俳優扺戯皆放而為民羙女麗人自今無獻宴開以時酒進有數宦官不得干預朝政侫倖悉去忠良並進陛下求不垂拱以髙揖羲皇亦不可得也問安視膳之餘宫庭燕閒講讀經史頥神飬性享名教不窮之樂固嵩岳無涯之夀豈不休哉帝覧書震怒始議特㫖編管言者救之乃送秀州聽讀以朝野雜記修趙鞏字子固錢塘人登乾道八年進士第嘗使金國金主問皇帝清問下民賦非所作乎嘆服其文學子從游者甚衆號西林先生慶元禁偽學以秘閣修撰知揚州入黨籍云以國史及淳祐志修俞灝字商卿世居杭父徙烏程登紹興四年第仕東淮宣撫丘崈令佐畢再遇救山陽灝料冦必窺采石請囬軍石梁河以遏其鋒冦擣虚不入而遁再遇知揚州盪平湖海多灝計畫再遇欲誅脅從者救活甚衆開禧議開邊政府宻引灝言輕脱寡謀之人不可信趙良嗣張覺往轍可鍳歴麾節皆有聲寶慶二年致仕築室九里松買舟西湖會意處竟日忘返以詩詞自適號青松居士有集以洪平齋所撰行狀修洪咨䕫字舜俞於潜人父鉞號谷隠有詩名咨䕫風骨頎秀為文典麗該洽嘉㤗二年進士第繼中教官調饒州教授應博學宏詞科有司竒其文時相惡人以科目自致報罷遂從崔與之帥淮鎮蜀以直諒風議聞知龍州龍産砂永不取銖两毁鄧艾祠改祠武侯理宗即位除秘書郎遷金部陳朝廷四輕之弊且言濟邸之變非陛下本心時相惡之移考功以李知孝論鐫罷咨䕫出蜀時得書數千卷藏蕭寺父子考論諷誦學益閎肆紹定六年冬理宗始親政召為禮部郎官入對言帝王運英明之畧莫先于飬英明之氣上問今日之務何急咨䕫奏當進君子逺小人開誠心布公道又問近日事體如何咨䕫言進擢収召未免混淆若大受用皇極之道精擇用春秋之法則两盡矣又問在外人物咨䕫言崔與之全徳之老可為朝廷重真徳秀魏了翁當聚之本朝翌日御筆除監察御史即上疏言中書積弊四事凡清議所不與者率論去之端平改元乞降詔求言又奏聖學之所當講明者又乞寛民力條具其目皆剔括宿弊懇懇力言北伐議起咨䕫奏乞厚東南之根本制西北之枝葉時京閫以金滅函獻金主守緒骨將告太廟獻俘受馘咨䕫奏金主自焚撥寒灰認殘骼孰識其真惟當告九廟以祖宗徳澤統緒靈長坐閱大讐之滅不可以俘獲為夸又乞守靖定緩經營一意備守除殿中侍御史王定自都司除察將摇善類咨䕫劾之定左遷咨䕫擢中書舍人益振職繳回三畱守两帥垣之命兼吏部侍郎兼同修國史二年同真徳秀知貢舉多得博洽端亮之士兼直學士院時故相之黨有與祠者咨䕫指其為蔡卞命遂寢兼侍讀又兼給事中上疏謂比年狥私成習以一公鑠萬私惟陛下爾而好樂營繕親厚近屬保䕶舊臣未能無係累又乞為濟邸立後三年除給事中升侍讀仍兼内制時有自詭和韃除刑書者咨䕫繳駮之乃出獻緝熈箴上嘆其忠以病丐閒拜翰林學士知制誥兼侍讀兼修國史除端明殿學士領内祠仍史讀六月薨轉四官遺表聞御筆咨䕫鯁亮忠慤有助親政特與執政㤙例又贈两官諡忠文咨䕫研窮經史馳騖藝文蔚為近世詞宗自號平齋有两漢詔令三十卷擥抄一百卷春秋説三卷外内制及賦詩文三十二卷奏議三卷子勲燾熹皆能紹其家學勲字伯魯以鎻㕔登淳祐四年進士第少為崔與之魏了翁所知仕至兵部尚書嘗為詞臣發明先皇與子之意人稱其有父氣骨贈端明殿學士諡文靖以寔錄附傳平齋文集淳祐志及勲諡議修趙汝談字履常太宗皇帝八世孫居餘杭登淳熈十一年進士甲科周必大見其文異之趙汝愚定大䇿多與㕘訂獨廟議請從朱熹捐節鉞與韓侂胄俾居外汝愚不以為然未幾汝愚去國汝談與弟汝譡昌言侂胄之非于是並罹黨禍斥出國門依祖墓以居者累載因得肆志于學問詞章除太社令侂胄開邊汝談憤形辭色一日登壇讀祝大呼侂胄及陳自强名自强甚不堪汝談不為動以李璧薦召試館職葉適謂二十年館職䇿無此簡切除正字以言去得祠通判嘉興府改知無為軍時金國内變有㫖獻料敵備邊二䇿改湖北提舉時捄荒全活甚衆又以趙蕃黄榦劉宰應詔士論韙之除温州改知西外宗正䝉國貢寶玊稱賀表用却走馬以糞為諷時相不悦語同列曰趙西宗天下秀才宜為文字官惜不少屈除江西提舉理宗即位賀表力寓勸戒真徳秀目為諌書除西江運判以言去家居八年注易詩書三禮語孟荀子莊子通鑑杜詩一字不入修門端平更化以禮部郎召兼學士院權直制詞爾雅深厚盡洗􅊏弱之習除秘書少監兼權直學士院時議北伐汝談力以毋輕試為言三京収復獨有憂色進思無邪毋不敬箴除宗正少卿兼權直學士院又兼崇政殿説書時真徳秀除翰林學士知制誥與汝談並當制號二妙除吏部侍郎陞侍講兼直學士院以言去提學崇禧觀除集英殿修撰知婺州抵郡四月以疾丐祠除權禮部侍郎兼直學士院力辭兼直除侍講又除兼直五辭除給事中權刑部尚書嘉熈元年八月辛丑卒官汝談生乾淳間親炙當世大儒初見朱熹訂疑義十數條首質大學旁及群經熹嗟異稱賞蔡元定願為忘年交又與吕祖儉柴中行項安世輔廣切磋故問學沈著仕進恬然在温陵又與陳孔碩黄幹交好為宻楊長儒時帥閩亦使來問政為文有西漢風其瑰琦精妙又如琅玕瑶碧然模倣者輙不逮子崇豫繼卒至孫必海始請諡景定四年諡文懿以趙汝騰所撰行狀及諡議修趙汝譡字蹈中汝談之弟以祖廕補承務郎韓侂胄逐趙汝愚時汝譡監左藏庫上書乞留汝愚斬侂胄由是侂胄使其黨再攻汝愚以汝譡兄弟為言首坐是廢斥者十年後登嘉定元年進士第除太社令累遷司農丞知漳州遷湖北倉改湖南易江西除憲遷湖南漕除江東憲辭除直祕閣廣東經畧又辭仍舊職知温州以十六年夏卒于郡除直秘閣致仕初侂胄得權汝譡首明其為賊屢瀕于死事定反罹猜忌自號懶菴然將㫖江湖威聲聳動襄帥趙方嘗力薦倚為代嘉定兵端再起獲黄摑阿魯答覊于潭州汝譡時將漕欲存金以藩韃厚遇之黄摑吐寔曰我國若相䝉古結好大朝而専備韃可保無虞以二蠟弹獻汝譡未能白其䇿而死于温黄摑在潭聞之亦死其規畫之不遂者如此汝譡頴悟英特與汝談齊名稱二趙葉適謂其韓篇杜筆髙出于時盖兼言之也然汝談謂已詩不進反推汝譡晚愛韋蘇州詩其在潭州以詩寄適識者謂如髙漸離擊筑過市後挽適有古調朱絃外長謡碧水隂之句世推其工二子崇陶崇龔盖以劉陶劉龔命名云以葉水心文集王象祖所撰行狀王夢龍所撰蹈中詩集序趙汝談䟦修李宗勉字强父富陽人開禧元年試禮部第二為江西運幹真徳秀曹彦約薦之嘉定十四年除吏部架閣紹定元年累遷著作佐郎輪對言山東之旅名曰忠義寔則桀黠資以備冦而備之者甚于冦明年兼權兵部郎官又言虎臥垣牆防姦禦變寧過毋不及時李全叛形已露人莫敢言宗勉獨累疏及之尋改兼侍右郎官四年知台州時洪水蕩析悉力撫綏台人徳之明年直秘閣知婺州六年冬召未赴端平元年進寶章閣因任尋召除尚左郎中兼右司尋兼左司面陳救楮之䇿願自乗輿宫掖下至百司庶府覈冗蠧節浮泛嵗省十萬則十萬之楮可捐省百萬則百萬之楮可捐乆而錢楮相當則盈縮之柄自不在楮擢監察御史時謀出師汴洛宗勉言願愛日力以修内治合人謀以嚴邊防毋以近利妨逺圖毋以虚名受實害諜報䝉古欲入㓂復傳金退宗勉言有餘則宻不足則張揚聲大舉者未必果來卷甲歛藏者未必果静進左司諌明年春兼侍讀四月除殿中侍御史時史嵩之就鄂建閫宗勉言淮西當南北之交乞别除鄂守令嵩之移司齊安又率合䑓奏乞分上流淮西淮東為三帥而以江淮大帥縂之以公私之財分給四處招募强壯大為扞禦之圖七月除工部侍郎兼給事中仍兼侍讀復上疏言憂勤不可移于宴安劘切不可銷于便侫九月除諌議大夫兼侍讀屢言邊事金使王檝冝早遣其囬嘉熈元年二月除端明殿學士同簽書樞宻院事八月進簽書時王檝復來督府主和宗勉言國書不類夷語實有可疑督府職在督戰當埽除邊郡之哨馬焚蕩淮河之賊舟不可以和之一字横于胸中二年進参知政事三年拜左丞相兼樞宻使守法度抑僥倖不私親黨一時善類如袁甫郭磊卿程公許王萬軰皆聚朝廷尤樂聞讜言身居台輔家若貧儒十二月甲子薨于位詔以光祿大夫致仕贈少師諡文清以國史本傳修咸淳臨安志卷六十七
