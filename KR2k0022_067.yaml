body:
  text: 咸淳臨安志卷六十八宋潛説友撰人物九后妃國朝章懿皇后李氏杭州人曽祖應已祖延嗣錢氏時為婺州金華主簿父仁德左班殿直后性莊重寡言入宫事真宗皇帝初為司寢夢以裾承日而生仁宗皇帝封崇陽縣君進才人為婉儀仁宗即位進章獻太后以仁宗為己子而后不敢言中外亦未知也明道元年二月丁邜進位宸妃是日薨年四十六贈三代曽祖及祖為光祿卿父為崇州防禦使母董氏為髙平郡太君二年追册為皇太后諡章懿葬永定陵贈三代祔别廟升祔太廟以東都事略長編修列女孫破虜吳夫人本吳人徙錢塘孫堅聞其才貌娶之生四男一女初夫人孕而夢月入懷既而生䇿及權在孕而又夢日入其懷以告堅堅曰日月者隂陽之精極貴之象吾子孫其興乎䇿嘗以會稽功曹魏騰忤意將殺之夫人乃倚大井而謂䇿曰汝新造江南方當優賢禮士捨過録功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井中耳䇿大驚遽釋騰夫人智略權譎類如此及權少年統業夫人助治軍國甚有補益建安七年操下書責權質任子權將周瑜詣夫人前定議瑜曰今將軍承父兄餘資六郡之衆兵精糧多將士用命鑄山煮海境內富饒人不思亂泛舟舉帆朝發夕到士風徑勇所向無敵有何逼迫而欲送質夫人曰公瑾議是也公瑾與伯符同年小一月耳我視之如子也汝其兄事之遂不送質臨薨引見張昭等屬以後事以三國志本傳及注孫䇿傳周瑜傳通鑑修徐琨母孫氏富春人孫堅之妹堅與琨父真相親故以妹妻焉琨隨堅與䇿征討詳在琨傳琨擊張英于當利口而船少欲駐軍更求孫氏時在軍中謂琨曰恐州家多發水軍來逆人則不利矣如何可駐邪宜伐蘆葦以為泭佐船渡軍琨具啓于䇿䇿即行之衆悉濟遂破英琨生女是為吳主權徐夫人以三國志吳主權徐夫人傳修孫翊妻徐氏翊領丹陽太守時媯覽戴員親近邊鴻等數為翊所困常欲叛逆徐氏頗曉卜翊語徐明日欲為長吏作主人卿試卜之徐言卦不佳可須異日翊以長吏來久宜速遣乃大請賔客翊出入常持刀時空手送客鴻從後斫翊迸走入山徐氏募追捕中宿乃得覽員歸罪殺鴻諸將皆知覽員所為而力不能討覽悉取翊嬪妾欲復取徐徐恐逆之則見害乃紿之曰乞須晦日設祭除服潛語翊舊將孫髙傅嬰等圖之至期設祭哭畢乃除服熏香沐浴更于他室施帷帳覽密使覘視無復疑意徐呼髙嬰與諸婢羅住戶內使人報覽以除凶即吉惟府君命覽盛意入徐出戶拜覽適得一拜徐便大呼二君可起髙嬰俱出共得殺覽餘人即就外殺員徐乃復衰絰奉覽員首以祭翊墓以三國志孫翊傳及孫韶傳注修虞潭母孫氏富春人孫權族孫女也適潭父忠恭順正和甚有婦德及忠亡遺孤藐爾孫氏雖少誓不改節躬自撫飬劬勞備至性聰敏識鑒過人潭始自幼童便訓以忠義故得聲望允洽為朝廷所稱永嘉末潭為南康太守值杜韜叛率衆討之孫氏勉潭以必死之義傾其資産以餽戰士潭遂剋捷及蘇峻亂潭守吳興假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為纍也仍盡發其家僮令隨潭助戰貿其所服佩環以為軍資時會稽內史王舒遣子允之為督護孫氏又謂潭曰王府君遣兒征汝何為獨不潭即以子楚為督護與允之合勢其憂國如此拜武昌侯太夫人加金章紫綬潭立飬堂于家王𨗳以下皆就拜謁咸和末卒年九十五帝遣使弔祭諡曰定夫人以晉書列女傳修孫晷妻虞氏晷居富春聞會稽虞喜隱居海隅有髙世之風欽慕其德聘喜弟預女為妻今虞氏是也喜戒虞氏棄華尚素與晷同志晷性至孝虞氏克相其德舅姑起居饌不離左右躬薪水井臼之勞欣然自得晷篤學容止未嘗傾倚虞氏端莊靖默相敬如賔習俗競事奢麗虞氏多御練葛不為時粧或訝之虞氏曰從吾所好奈何欲相效耶時人號為梁鴻夫婦以晉書孫晷傳及淳祐志修孝婦嚴氏夫孝明失其姓嚴氏事舅姑以孝聞晉咸康五年火時孝明父喪在家未葬而孝明適出嚴氏仰天號哭火為之滅郡以表聞詔旌門閭碣舊在餘杭縣東一十三里以淳祐餘杭圖經修馮孝女唐穆宗時人居錢塘少孤無兄弟母子相依及長不嫁以飬母多病益篤思肉食因刲股為糜以進後母死號慟嘔血哀毁骨立既葬募人結草廬墓下日焚香蔬食刺臂血書佛經仍捨宅為寺以薦母長慶三年守以事聞詔賜束帛仍賜寺額曰報恩竟不嫁死今錢塘縣有孝女墓南北兩鄉又有孝女墓在寺後山古城頭以淳祐志修節婦何氏唐末於潛莫氏之婦夫死年猶盛誓不嫁飬姑至孝禮敬飭備黃巢亂後群盜嘯聚山谷鄰里皆奔徙何氏以姑羸疾臥不可俱行抱姑泣涕賊夜至號慟丐賊曰吾數年寡居以有姑耳今姑老且病不忍去願貸姑死吾死不恨賊捨其姑掠何氏去至巢穴將汚之殺他婦女植刃使懼何氏詭請櫛沐更衣賊許使人伺之須臾具粧舉止言貌自如伺者懈遂解襦自經賊驚視已死義而瘞之以淳祐志修吳越國恭懿太夫人吳氏名漢月錢塘人中直指揮使珂女也幼以婉淑奉文穆王元瓘性慈惠而節儉頗尚黃老學居常布練而已每聞王決事有及重刑者嘗嚬蹙以仁恕為言諸吳每有遷授皆峻阻之及其入對多皆訓勵有過失必面責之故諸吳終夫人之世不甚驕恣敕封吳越國順德太夫人周廣順二年薨年四十諡恭懿實忠懿王俶之母以吳越備史修吳越忠懿王妃孫氏名太真錢塘人性端謹而聰慧每延接姻親洎諸宗屬皆盡恩禮好學讀書通毛詩魯論之義性嚴重而無浸漬之説其下畏而愛之尚儉約居常非受𠫭謁未嘗為盛飾俶之征毗陵也孫氏居國城遣內侍撫問諸將及從征將帥之家中外稟畏如奉王焉漢乾祐二年承制拜夫人周顯德末敕封吳越國賢德夫人國初進封賢德順睦夫人至開寶九年隨俶入覲敕封吳越國王妃制曰以爾賢明有素令淑流芳儷我元臣開于列國推心傾戴金石無渝抗志蕩平煙塵共掃望雲展禮盡室偕來魚軒趨象魏之朝翟衣見珩璜之節以前古未行之典為明朝特出之恩是年得病于途薨年四十五以吳越偹史修孝婦盛氏昌化縣民章欽子婦事舅姑恭謹躬紡績烹飪以飬欽妻何氏性急盛氏怡聲下氣伺顔色終日侍立無惰容處娣姒敬順和睦亦皆化之姑貧病無醫藥資且乞甘旨盛氏鬻簮珥裙襦以供費姑病劇盛氏聞人言病者餔人肝則愈乃閉閣援刀刳脅取肝為常膳以進長姒潘氏亦刲股焉姑食而愈時政和六年七月權知州事轉運使劉既濟上其事詔旌表門閭以國史乾道志淳祐志修凌大淵妻劉氏劉氏於潛縣九里人及笄許嫁同里進士凌大淵已請期而凌卒劉氏聞之號慟告其父母曰兒聞女子以一志為良以死生不易為節兒已許凌君今不幸早世固吾夫也兒將易服奔喪誓守柏舟不更二也其父母曰汝猶木方芽又未嘗身踐其庭何遽若此劉氏泣曰諾人微物死猶不廢况以身許人而背之乎有死而已父母懼而從之于是粗衰赴夫家臨柩伏哭盡哀退修婦道終喪乞兄公之子以飬為之娶婦至于抱孫白首不易其志寶祐間縣令吕沆聞而嘉之為表其居曰烈女坊里人趙景緯為作詩以刻諸路傍詞多不載以趙景緯所作傳贊修傳本作烈女劉氏凡未嫁曰女既嫁曰婦劉氏女也宜本其從夫之志題曰凌大淵妻劉氏咸淳臨安志卷六十八
