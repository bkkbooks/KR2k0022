body:
  text: 咸淳臨安志卷六十九宋潜說友撰人物十方外方士蔡經吳人也吳記云織田有蔡經宅杭州餘杭縣故基存焉吳大璽二年有神仙四人自稱曰東方朔等往來經所居孫皓將亡四人預以告經遂蛇蛻而往升仙年代與神仙傳小異又有沽酒阿母亦在縣界王方平麻姑嘗宴于經家取阿母酒和天上酒以飲也神仙傳拾遺台按顔魯公麻姑壇記王方平過括蒼蔡經家今之仙居括蒼洞之陽有經故宅為隱真宫是也此云宅在餘杭與顔記不合豈仙家居無常所而各記之耶郭文字文舉步檐人餘杭大滌山窮谷無人之地倚木覆苫而居亦無壁障時猛獸害人文獨宿十餘年無害常著鹿裘葛巾不飲酒食肉區種菽麥採竹葉木實貿鹽以自供或酬下價者亦即與之嘗有猛獸張口向文文視其口中有橫骨乃以手探去之猛獸明旦致一鹿于室前餘杭令顧揚與葛洪共造之而携與俱歸揚賜以韋袴褶不納辭歸揚遣置室中文亦無言韋衣乃至爛于户內竟不服用王導聞其名遣人迎之文不就船車荷擔徒行導置之西園朝士咸往觀之頺然踑踞傍若無人溫嶠問曰猛獸害人人之所畏先生獨不畏耶文曰人無害獸之心則獸亦不害人居導園七年未嘗出入後忽逃歸臨安結廬山中臨安令萬寵迎置縣中及蘇峻反破餘杭而臨安獨全人皆異之葛洪庾闡並為作傳贊頌其美以晉書本傳修葛洪字稚川自號抱朴子以儒學知名博聞深洽江左絶倫著述篇章冨于班馬尤好神仙導飬之法于餘杭山見何幼道郭文舉目擊而已各無所言以晉書本傳修許邁字叔元一名映嘗謂餘杭垂􅋼山延陵之茅山是洞庭西門潜通五嶽陳安世茅季偉常所游處于是立精舍于垂􅋼而往來茅嶺之洞室永和二年移入臨安西山登巖茹芝渺然自得有終焉之志乃改名元字逺游著詩十二首論神仙事嘗與王羲之書曰自山隂至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者在焉後人莫測逺遊所終好道者皆謂之羽化矣以晉書本傳修杜子恭錢塘人通靈有道術晉東土豪家及京邑貴望並事之為弟子執在三之敬沈警纍世事道亦敬事子恭宋孔靈産有隱遁之懷立館事道東出過錢塘北郭輒于舟中遙拜子恭墓至道鞠道業富盛以宋書沈約自序南齊書孔稚圭傳及真誥修徐靈府號默希子錢塘天目山人通儒學居天台靈蓋峯虎岩石室中凡十餘年會昌初武宗詔浙東亷使起之辭不復出後遂絶粒嘗著元鑑五卷撰天台山記三洞要略門人得其道者有左元澤以髙士傳修錢道士杭州臨安人初從太守令狐纁至京師因往成都玉局觀觀黃籙道場忽有一道士仗劍持水紫衣巍冠周行醮壇至錢生前以所持水令飲之極甘錢自此絶食乾符間常往來京師以神仙感遇傳修令狐絢餘杭太守纁之子也雅尚𤣥微不求仕進時有神仙降之異香聞于戶外嘗言入靜之時忽有青衣引至髙山之上朝謁老君因見册命張天師元中大法師以代尹真人之任曰羣胡擾于中原不能戢之尹真人之過再立二十四化澤及生靈道陵之功也後西川見張道士言天師降授道法與令狐所說無異以神仙感遇傳修丁飛字翰之濟陽人讀老莊書善飬生能鼓琴居錢塘龍泓洞之左右或憩館深山中蓄妻子事耕稼如常人咸通丙午歲陸龜䝉嘗詣龍泓憩館見其綸巾衣裘貌古意淡好古文樂歌詩問其年曰七十二年矣後十四年道士葛參寥為陸言飛毛髮不衰氣力益壯疏繁導䝉灌溉判剖皆自執綆缶斤劚輩升髙逺望不翅履平地時作細字文紀事皆有楷法意義夜半山靜取琴彈弄少睡寡言與人相接禮簡情至未嘗有罷倦之色又不見有所服餌或問之對曰治心修身之外復有何物陸為作錢塘丁隱君歌而叙其事如此以陸龜䝉作丁隱君歌序文修潘尊師在杭州曹橋福業觀有少年過之欲寄止茅齊潘許之居六十日不飲不食將去再拜致謝曰某曽受正一九州社令籙九州內外吉凶之事靡不知也敢以奉傳若精潔守謹可致長生言訖而去自後果如其言四方之事靈官無不傳報潘曰間人何必知四逺之事乃却之一夕少年復來授以王子符兩道戒曰人有疾苦危難當以吾符救之自是潘以朱篆救人祛災蠲疾赴之者如市既十餘年少年復至宿留逾月尊師一日無疾而終疑其得尸解之道也以神仙感遇傳修馬自然錢塘人名湘其先鹽官人世為小吏湘獨好經史工文學常隨道士遍遊方外至湖州飲酒醉行墜霅溪經日而出衣不沾濕指溪水能令逆流良久指栁木橋令隨水上下指橋令斷復續訪常州太守馬植會飲湘于席上以器皿植瓜須臾生花結實坐客食之皆稱香美或以疾告之即以所拄竹杖指病者曰吹杖頭如雷聲病隨愈跛倚而來者湘以杖叩之應手便伸轉與之財物則以遺貧者于大中祥符九年卒葬于其家之東園明年東川奏劍州梓潼縣道士馬自然白日上升且謂人曰昨已羽化于浙西今玉皇又詔于此上升矣帝命于杭州發其冢視之止存竹杖以續仙傳修管歸真錢塘人年十一入錢明宫雍熙初有青衣過之問其所從來則曰西人也姓邊氏有㸃化黃金之術願以為贈歸真曰歷嵗綿久能無變否曰五百年後當復故爾歸真笑曰得不為後人誤耶青衣以手加額曰先生其真人也吾有紫府符法珍藏之久今得其人尚可隱乎于是跪而受之不踰年符法大振祥符初詔赴闕行符水法病在膏肓者悉為平人鍚豫甚渥以為右街都監賜號元靖後以京師大旱詔歸真臨壇作法噀水結成烟霧空中雲龍飛躍膏雨大霈未幾加賜崇教天聖初遷左街加大法師仍賜正白先生號至四年十月平居呼其徒而告之曰繡衣使者告吾功業上逹帝宸今將往任職矣遂偃然而化熙寧中趙抃守杭記其行事以淳祐志修沈若濟洞元大師字子舟逺祖仕吳越錢氏遂居錢塘于元真觀出家年十三試經為道士兼通諸家百氏之書尤精于醫游茅山居崇禧觀延康殿學士王漢之帥建康即茅山築室為洞陽菴以處之師乃出囊中金大市藥以濟病者徽宗聞其名再詔乃起館于龍德宫數月以疾辭賜道官及金方符紹興初尸解于故菴以淳祐志修徐立之舊名炳一應進士舉不中學老子法易名為立之隱于西湖之回峯人謂之回峯先生不喜俗人知通判都官員外郎蘇為聞其名嘗往見之曰何不仕乎應曰若時與命會然後佐天子福元元不然則悔吝生矣曷若追冥鴻霧豹與孤雲俱為甚敬其言嘗為立傳回峯今雷峯也以蘇為所撰徐先生傳修陸維之字永仲一名凝之字子才號石室餘杭人丰神隽拔議論倜儻少以計偕入汴群法從邀與雜坐命相者某道人視之道人指維之曰秀才叩以科第則曰且歸山道人揖别贈以粒丹曰緩急用之陸下第南歸舟循汴風激浪怒舟不能勝以丹投之風浪始息汴上有呼其姓名者則道人也維之遂有超世之志隱于大滌洞天之石室人因以石室稱之逍遙林谷詩酒自樂時餘杭巨儒陳律民範學士劉堯臣山父蜀髙士楊乃城叔間為方外友太博關注子東贈以詞其序云吾鄉陸永仲博學髙才少時有聲場屋今棲白鹿洞下絶葷酒屏世事自放塵埃之外行將六十而有嬰兒之色非得道者能如是乎白鹿洞即大滌也維之嘗觀潮作酬江月云逺山一帶遡晴空極目天涯浮白楓落鴉翻談笑處不覺雲濤橫席酒病方蘇睡魔猶殢一掃無留跡吳帆越棹恍然飛上空碧長記草賦梁園凌雲筆勢倒三江秋色對此驚心空悵望老作紅塵間客别浦烟平小樓人散回首千波寂西風歸路為君重噴霜笛光堯嘉賔召見辭疾不赴後光堯退處北宫嘗幸大滌憲聖亦侍羽流起居進主觀者問以山中詩客以維之對進其行卷光堯讀數首太息曰布衣入翰林可也欲與孝宗言憲聖曰山林隱士必不要人知要他出山却是苦他遂止未幾以疾卒于家維之嘗進百論有石室小隱集三十卷臨終了然書一詩云嶽南之館白雲端鳯笛龍簫徹廣寒一鶴曉飛冲碧落群仙笑倚玉䦨干以葉紹翁四朝聞見録大滌洞天真境録修王𠂻字天誘政和間郡守監司表薦賜號悟靜處士視朝請大夫俸給徐奭徽宗朝賜號冲晦先生故廬在城中吳山下又嘗居萬松嶺下墓在靈隱山石筍院咸淳臨安志卷六十九
