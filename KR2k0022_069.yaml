body:
  text: 咸淳臨安志卷七十宋潛説友撰人物十一方外僧慧靜本姓邵餘杭人厲行精苦容止可觀顔延之歎曰荆山之玉唯靜是焉著文翰集十卷大藏經髙僧傳慧基本姓耦一作偶年十五宋文帝引見顧問敕于秖洹寺為設會出家車駕親臨幸慧集本姓錢於潛人著毗曇大義疏十萬言法匱本姓阮於潛人淨度宋釋餘杭人少遊獵嘗射乳鹿墮胎鹿母銜痛猶就地舐子因摧弓折矢出家蔬食誦經三十餘萬言常屏處山澤僧瑜本姓周餘杭人以宋孝建二年六月三日滅度後十有四日房中生雙桐其徒以為婆羅寶木因號雙桐沙門吳郡張辨為平南長史且為傳讚僧翼本餘杭人止廬山寺依慧逺修學僧詮宋餘杭方顯寺釋道琳梁冨陽齊堅寺釋僧旻本姓孫冨春人吳大帝其先也梁天監五年遊上都天子禮接甚厚六年制注般若經齊文惠帝竟陵王子良深相貴敬普通後隱居虎丘時蕭昻出守吳興欲過山展禮旻曰吾山藪病人無事見貴二千石昔戴顒隱居宋江夏王詣見髙臥不起吾雖德薄請附戴公矣竟遁去其年皇太子遣通事舍人何思澄命致禮贈以几杖爐奩褥席麈尾拂扇等又為製墓志碑續髙僧傳明徹本姓夏錢塘人齊太傅蕭頴深相欽慕法開本姓俞餘杭人吏部尚書琅琊王俊永嘉太守吳興丘遲皆揖敬推賞後還餘杭止于西寺惠明本姓王杭人居蔣州山間值雪路塞七日不食至荆州四望山見二虎爭鬪自往分解焉曇超靈隱山僧本姓張清和人齊建元末至錢塘靈隱山會久晴禱祠無應超乃徒步至赤亭山遙為龍咒願説法至夕群龍為化人形來詣超所因乞三歸依超請降雨約以明日晡時及期大雨見髙僧傳及錢唐勝迹記真觀南天竺法師字聖逺錢塘人本姓范祖延蒸給事黃門侍郎父兊散騎常侍母任氏因禱佛有妊及真觀誕育竒相不倫左掌仙文右掌人字開皇十四年亢旱刺史劉景安請師講海龍王經序既竟驟雨滂注自後有請隨禱隨應縣西有靈隱山仙靈所居峯吐蓮花洞藏龍穴真觀與道安禪師頭陀石室檀越陳仲寶開山拓基建立精舍號南天竺寺遂棲止終焉及文宣造塔取決于觀乃指崔巍髙石為基鑿石果得銅穴自然天成皋亭神姓陳氏降祝請師講法華一遍遺以錢物又降祝捨其廟屋五間為衆善佛殿大業中出天竺自標葬地未幾歎曰昔六十二應終講法華力更延一紀今七十四生期畢矣白衆而逝嘗作愁賦時人稱賞已上並大藏經續髙僧傳有塔在東岡久廢天禧中王欽若重修道欽徑山禪師唐大歷三年代宗召至闕下親加瞻禮賜號國一禪師負元八年示滅諡大覺禪師蘇州崑山人姓朱開山住持徑山見景德傳燈録刺史王顔尚書職方員外郎丘丹撰塔銘崔元翰李吉甫撰碑銘徐浩作真贊崇寧五年追諡澄悟圓修鳥窠道林禪師富陽人衣衲敝甚寒暑不更棲止山間有鵲巢于其側經四十秋未嘗下山時人謂之鳥窠禪師元和中白居易出守兹郡入山謁禮會通招賢禪師杭人本姓吳幼而聰敏唐德宗時為六宫使後禮鳥窠為僧至武宗時廢寺而莫知其終齊安鹽官禪師杭人本姓李生時神光照室後有異僧謂之曰建無勝幢使佛日回照者豈非汝乎遂無疾宴坐而逝敕諡悟空禪師道標唐律師冨陽人姓秦護戒精嚴永泰中住持南天竺寺其徒多歸之嘗于飛來峯之南西嶺下葺茅為堂號西嶺草堂好作詩與吳興皎然會稽靈徹唱和時人有洞氷雪摩雲霄之譽長慶三年入滅世稱西嶺和尚慧琳唐大歷中僧字抱玉居天目山二十餘年元和初郡守杜陟請至永福寺登壇三年刺史裴常棣請至天竺登壇二十年間前後刺史杜陟裴常棣陸則楊慿盧元輔白居易李幼崔鄯路異凡九人皆造慧琳之室論心要靈照龍華禪師髙麗國人錢王建龍華院命僧住持晉天福二年入滅夀七十八號真覺禪師行修南山法相院僧生有異相耳垂至肩號長耳相禪師崇寧二年賜號崇慧大師幼璋唐相國夏侯啓之子十七為僧夀八十七終錢尚父號志德大師天祐三年賜號瑞龍禪師延夀杭人號抱一子七嵗誦經感群羊跪聼始為吏一日棄其業出家著宗鏡録一百二十卷日課一百八事未嘗暫廢吳越王錢氏請住永明禪寺即淨慈寺凡十五年聚徒幾二千人道播海外髙麗國王遣使齎書敘弟子禮奉金線織成袈裟紫水晶數珠金澡罐等為獻開寶八年入滅號智覺禪師崇寧中追諡宗照志逢餘杭人生惡葷血膚體香潔嘗夢升須彌山睹三佛列坐初釋迦指示之曰此是補彌勒處獅子月佛遂禮覺後閲大藏經乃符所夢天福中扺天台山雲居道場入普賢殿宴坐有神人前跪膝師問為誰曰護戒神也師曰吾患有宿愆汝知之否曰師有何非唯一小過耳凡折鉢水亦施主物師每傾棄非所宜也言訖而隱師自此洗鉢盡飲之因致脾疾十載方愈吳越王號為普覺大師住臨安功臣院至雍熙二年入滅遇安杭人乾德中忠懿王錢氏命住北關傾心院又召入居天龍寺至開寶七年安僖王請居光慶寺號善智禪師淳化初示滅慶祥九曲禪師杭人本姓沈辨才冠衆多聞強記天台門下推為傑出行明開化禪師杭人本姓干先住能仁後忠懿王錢氏又建太和寺延請住持太宗皇帝賜紫衣師號咸平四年入滅已上並景德傳燈録善升錢塘人本姓仲十嵗出家天禧中詔同注釋御製法音集書畢賜號曰日觀大師兼深于琴律皇祐元年范文正公就天竺山見之一日遣侍者告文正公而逝公為作塔銘法照受業水心寺不妄交逰與隱逋髙僧智圓為方外友參政王化基丞相王欽若王隨皆深敬之咸平中撰律鈔義苑説七卷丞相王隨撰塔銘立碑于兜率寺崇寧二年賜號法照大師道誠慧悟大師錢塘人居月輪山天禧中撰釋氏要覽三卷又注王勃所撰釋迦成道記丞相王隨知杭州日有贈慧悟詩豫弼題慧悟禪師上方詩云孤峯牢落幾何年臺殿于今插半天已是精藍誇絶徼更將寶塔在危巔煙霞色任隂晴變鐘磬聲隨上下傳珍重老僧無别境一生幽趣只山川契嵩屯田員外郎陳舜俞撰行業記云禪師字仲靈自號潛子姓李慶歷中居錢塘後遊京師開封尹王仲儀上其所著釋書仁宗覽之詔付傳法院編次仍賜名教師號蔡襄知杭州延置佛日山熙寧五年六月于靈隱寺入寂以釋氏法茶毗而五根不壞世號其塔曰五種不壞之塔贊寧受業于祥符寺學南山律兼通六籍史書莊老百氏之學太平興國三年十月贊寧奉阿育王塔舍歸朝見太宗皇帝于滋福殿一日七召對賜號通慧大師八年秋詔撰大宋髙僧傳三十卷淳化二年預史館集新書五年真宗召對賜坐以為右街僧録三年遷左街崇寧三年賜號通慧圓明大師王內翰元之與詩有詔修僧史浙江濱萬卷書中老一身之句寶逹晦迹靈隱山號剎利法師有剎利院院中有印沙床照佛鑑善持祕咒時浙江潮水大溢以至于激射湖上諸山寶逹誦咒止之一夜有偉人黑冠朱衣謂逹曰吳伍員復求雪耻耳師慈心為佛員已聞命矣言訖而滅自後潮水擊西興而杭州漲沙數里錢塘勝迹記智圓孤山法師錢塘人本姓徐字無外自號中庸子神宇清明道韻凝粹妙年能屬文匪由師授有命湖光文擬韓而作詳見瑪瑙寶勝院遵式本姓葉字知白其母始乞靈于觀音遂生法師學行孤髙博習教觀因苦學嘔血兩足皮裂師願力堅固以死自誓建下天竺寺著淨土懴法金光明觀音諸本懴儀行于世故號慈雲懴主天聖中滅度其日或見大星殞于靈鷲峯度弟子百餘人學徒千數崇寧二年賜號慧通天台教觀益盛于吳越者實師之力侍郎王古述其行事紹興三十年旨賜號曰懴主禪慧大法師塔名瑞光思悟本姓徐父居錢塘幼舍南新縣欣慈院出家既受具宿疾萌發好遊講習信法兼進每誦咒身出舍利所畫千手像誦千眼咒像亦如之今其冡在觀堂香林洞之左元照靈芝大智律師字湛如號安忍子錢塘人本姓唐母竺氏嘗夢異僧託孕幼居祥符寺東藏窮清淨毗尼之學參神悟大師處謙傳天台教觀謙拊其背曰毗尼之宗幾顛覆矣汝可以梁棟是道宗本淨慈圓照禪師字無詰本姓管熙寧初丞相鄭國富公得法于師之門人修顒推尊師承由是聞譽日廣郡守陳襄請住淨慈山越數年神宗皇帝命住相國寺慧林院召對延和殿賜茶諭以朕方欲大興禪宗宜善開導之旨繼入福寧殿説法詔許肩輿入見髙麗王子僧統義來謁師問其所得以華嚴對師摘其微義示之茫然自失善本本開封人幼時母病刲股肉以進疾隨愈力學舉進士于京師得華嚴經開卷恍然歷歷與心契圓照禪師住杭之淨慈招師居上座别開講席助誘方來之士戶外之屨滿矣圓照退居師繼之韓康公綘奏號法涌大師元祐中駙馬都尉張厚禮奏請奉詔住東京法雲寺蘇軾作詩贈行哲宗皇帝遣中使撫問降香及賜髙麗磨衲號大通禪師住持八年得請歸杭州大觀二年終賜號圓定葬于大慈山崇德院號定光塔元淨本姓徐字無象於潛人生而左肩肉起如袈裟絛八十一日乃滅及師之終實八十有一嵗師生十嵗出家二十五賜紫衣及辨才號知杭州吕溱請師住大悲寶閣居十年沈文通治杭命住上天竺乃以教易禪師鑿山增室幾至萬礎重樓傑閣冠于浙西學者數倍其故詔名其院曰靈感觀音居十七年還於潛逾年復歸天竺清獻公趙抃與師為世外友贊之曰師去天竺山空鬼哭天竺師歸道場光輝復留三年謝去老于南山龍井之上與僧熙仲會食仲視師眉間有光如熒遽起攬之得舍利自是常有于其臥處得之者及其將化召常所往來僧道潛告之曰吾西方業成尅期而逝門下侍郎蘇轍撰碑翰林學士蘇軾書集賢校理歐陽棐書額延夀杭州興教小夀禪師初隨天台韶國師普靜聞墮薪而悟天禧中王隨出鎮錢塘往候見去騶從獨步登寢室夀方負暄毳衣自若語笑終日而去以林間録修修廣錢塘人本姓王字叔微有智識度量讀五經知大義頗喜為詩少羸多病學醫既成而有疾者多歸之無貴賤貧冨皆為之盡其術未嘗有所厚薄尤貧者資之藥物衣食雖窮未嘗有所計惜故自京師至于四方自公卿至于學士大夫多知其名而皆樂從之遊師自九嵗出家居明慶院景祐二年賜紫衣五年賜號寶月大師熙寧元年十月率其日會門人與往來學佛之人告以將終沐浴易衣正坐而逝年六十一明年門人為塔南豐曽鞏為之銘以南豐文集修文益本姓魯餘杭人希覺師住育王文益往聼習旁探儒典遊文雅之場希覺師目為孔門之遊夏嘗參琛和尚琛問上座何往文益曰迤邐行腳去曰行腳事如何益曰不知曰不知最親切文益豁然開悟後三住大道場諸方叢林咸遵風化異域有慕其法者涉逺而至悟入者不可勝紀周顯德五年蠲大法眼禪師塔曰無相以傳燈録修道潛於潛浮溪村人字參寥本姓何幼不茹葷以童子誦法華經度為比邱于內外典無所不窺能文章尤喜為詩秦少遊與之有支許之契嘗有臨平絶句云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲蘇軾一見為寫而刻諸石後遇軾于彭城在座賦詩援筆立成軾甚愛之以書告文同謂其詩句清絶與林逋上下而通于道義見之令人蕭然軾謫居齊安道潛不逺二千里相從留期年遇移汝海同遊廬山復歸於潛山中軾有次韻道潛留别詩軾守錢塘卜智果精舍居之入院分韻賦詩軾云雲崖有淺井玉醴常半尋遂名參寥泉可濯幽人襟又為作參寥泉銘軾南遷道潛欲轉海訪之軾以書戒止當路亦捃其詩語謂有刺譏得罪返初服建中靖國初曽肇在翰苑言其非辜詔復祝髮蘇轍每稱其詩無一點蔬笋氣體製絶似儲光羲非近世詩僧比崇寧末歸老江湖既示寂其法孫法頴以其詩集行于世道潛嘗賜號妙總大師以東坡詩集朱辨聘逰集及淳祐志修懷顯西湖持淨大師政和中撰錢塘勝迹記五卷朝請大夫輕車都尉周邠為之序引慧勤餘杭人歐陽文忠公有送僧慧勤詩云越俗僭宫室傾資事雕牆佛屋尤其侈耽耽擬侯王文彩瑩丹漆四壁金焜煌上垂百寶蓋宴坐似方床胡為棄不居棲身客京坊辛勤營一室有類燕巢梁南方精飲食箘笋鄙羔羊飯以玉粒粳調之甘露漿一饌費千金百品羅成行晨興未飯僧日昃不敢嘗乃兹隨北客枯粟充飢腸東南地秀絶山水澄清光餘杭幾萬家日夕焚清香煙霏四面起雲霧雜芬芳豈如車馬塵鬢髮染成霜二者孰苦樂子奚勤四方乃云慕仁義可以治膏肓有志誠可嘉及時宜自強人情重懷土飛鳥思故鄉夜枕聞北雁歸心逐南檣歸兮能來否送子以短章同時有惠思惠思王安石送惠思詩云緑淨堂前湖水緑歸時正復有荷花花前若見餘杭姥為道仙人憶酒家今於潛西菩明智寺有惠思所為浴堂記惟尚本姓曹鹽官人少苦腹疾百藥不治父母憐之祈佛出家七嵗禮慶善寺元辨為師遍𠫭叢林得法于英普照勘辨于新黃龍退歸墓廬嘗住夀聖禪院本雪峯結庵故地荆榛蛇虺莫敢居師住八年創立殿廡為之一新遂謝歸舊隱尋住薦福以病復還舊廬而卒僧念其德葬于院之西南張九成為之作記守璋本姓王鹽官人天資介特凛不可犯七嵗以試經度為僧戒行精潔尤工于詩號文慧禪師有柿園集行于世紹興二年髙宗皇帝幸圓覺寺因覩其集親灑宸翰書其晚春一絶云草深煙景重林茂夕陽微不雨花猶落無風絮自飛德明本姓顧鹽官人守璋弟子也紹興十八年入徑山禮真歇了禪師夜宿山下真歇夢雙月入寺詰朝舉以白衆頃之明至心竊異之相與問答機鋒峻密朝夕講論禪教者凡四年後因觀為溜以杵通竹節有聲豁然開悟其徒因號為竹筒和尚二十三年有旨住崇先顯孝寺二十五年兩宣入慈寧殿升座舉説般若髙廟竒之賜法衣給度牒其徒一人明念璋年老力丐退休兩載復得旨住崇先又二年力辭而退乾道三年無疾卒有淡堂竹筒和尚語録清順可久石林葉夢得云錢塘西湖舊有好事僧往往喜作詩其最知名者熙寧間有清順可久二人順字怡然久字逸老其徒稱順怡然久逸老所居皆湖山勝處而清約介靜不妄與人交無大故不至城士大夫多往就見時有餽之米者所取不過數斗以瓶貯几上日取其三二合食之雖蔬茹亦不常有故人尤重之同時有思聰者亦似之而詩差優宗杲字曇晦本姓奚丞相張浚命主徑山法席學徒一千七百人來者猶未已敞千僧閣以居之號臨濟中興張九成與為方外交秦檜疑其議已言者論其誹謗朝政動搖軍情九成唱之宗杲和之紹興十一年五月詔毁僧牒編置衡州二十二年移海州四方衲子忘軀命往從之二十五年特恩許自便明年復僧伽梨奉朝旨住阿育山逾年復居山孝宗皇帝為吳安郡王時遣內都監入山謁宗杲述偈以獻及在建邸復遣內知客供五百應真請宗杲説法親書妙喜庵三字并製贊以寵之三十一年求解院事得旨退居明月堂隆興改元八月示寂孝宗聞而歎息詔以明月堂為妙喜庵諡曰普覺塔曰寶光宗杲嘗曰瞥起是病不續是藥不怕念起惟恐覺遲佛者覺也為其常覺故謂之大覺然皆從凡夫中做出彼既丈夫我寧不爾其接引方便類此宗杲雖林下人而義篤君親談及時事憂形于色或至垂涕時名公巨卿如李邴汪藻吕本中曽開李光汪應辰趙令襟張孝祥陳之茂皆委已咨叩而張浚雅相推重宗杲有正法眼藏三卷又有武庫若干卷其徒纂法語前後集三十卷浚為序淳熙初詔隨大藏流行以紹興正論小傳修咸淳臨安志卷七十
