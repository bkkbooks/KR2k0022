body:
  text: 咸淳臨安志卷七十一宋潛説友撰祠祀一天子祭天地諸侯祭社稷大夫祭五祀上得以兼下下不得以僣上古之制也列聖咸有一德克典神天自郊丘宗廟社稷與大中小祠之合乎古典者有常所矣十倫之義六祀之辭凡皆與斯民同其福祿長其孝敬措之于仁夀之域而郡祀之在畿內者若土域山海湖江之神若先賢往哲有道有德之祭若禦災捍患以死勤事之族率皆鍚之爵命被之寵光或嵗時薦饗間遣有司行事所以循夫人之所依考諸禮而弗悖其在郡國遵奉唯謹充類而逹之可以存古可以從俗者悉得列焉祀於洛邑咸秩無文或以為周公格君心萃天下之道嘻有旨哉敘祠祀土神城隍廟舊在鳯凰山據國朝會要為永固廟紹興九年移寶月山三十年敕曰錢塘為郡尚矣自版圖歸於我家逾二百年維城與隍必有神主之况嵗之豐凶時之水旱民之疾疫求焉而必應者哉不知郡歷幾將而無一牘之奏以答神之休意者聰明正直交感于幽顯之間固自有時也朕今駐蹕於此視之不異畿甸重侯美號用疏不次之封其歆其承永妥爾祀可特封保順通惠侯乾道六年以後纍加封咸淳八年改輔正康濟廣德顯聖王昭濟廟在候潮門外渾水閘西舊傳為吳王夫差廟淳化五年守王化基建乾道三年周安撫淙修慶元六年賜廟額纍封今為善應安濟孚祐顯衛侯淳祐九年安撫趙與􅊸重建淳祐志序祠廟謂舊志以夫差為首祀乃與子胥並列遂疑其未必為夫差而置諸江神諸祀次忠清之後竊所未安所至祠廟之神其名氏往往皆出流傳孰從而訂其實今既傳曰夫差即為子胥之君矣鬼神之事雖曰難言君臣之義如之何其廢故今特以吳王廟次城隍而忠清又次之忠清廟在吳山神伍氏名員楚大夫奢之子平王以讒殺奢子胥奔吳言伐楚之利欲以報仇後十七年吳與楚戰而勝遂入郢平王之子昭王奔隨又十年吳伐越王闔廬傷而卒王夫差立立三年而入越勾踐棲於會稽使大夫種行成於吳王許之子胥諌不聽曰吳其為沼乎後九年王伐齊越率其衆而朝子胥曰是豢吳也不如早從事焉又不聼子胥欲避吳禍私使人屬其子於鮑氏曰王孫氏王聞之賜之屬鏤以死將死曰植吾墓檟檟可材也吳其亡乎後十二年越果滅吳史記云吳人憐之為立祠於江上因命曰胥山唐元和十年刺史盧元輔修并作胥山銘唐景福二年封惠廣侯國朝載在祀典雍熙二年四月詔重建廟大中祥符五年朝廷以海潮大溢衝激州城詔本州每嵗春秋醮祭學士院撰青詞見詔令門其年賜忠清廟額封英烈王九年以馬亮知杭州詔問捍江之䇿亮至禱於祠下明日潮殺又出橫沙數里堤岸乃成政和六年加封威顯廟燬於建炎兵火興於紹興二十二年至三十年加封忠壯乾道五年十月周安撫淙重修慶元五年至嘉定十七年纍封為忠武英烈威德顯聖王紹定四年廟再燬有旨賜緡錢重建嘉熙三年趙安撫與歡又易而新之廟前舊有星宿閣至是閣成托英衛二字以名理宗皇帝親灑宸翰賜焉寶祐元年又燬二年顔安撫頥仲又建移英衛閣於正殿之後咸淳四年五月積雨廊廡壞安撫潛説友重行修治視舊增壯其封爵自嘉熙至今纍改為忠武英烈顯聖安福王有行祠在仁和縣治東南二十四里按子胥始藉吳報楚而吳遂勝楚終勸吳伐越而吳卒見滅於越非其計之有工拙其君之聼否異也傳之所載止于如此其木末明甚而後人乃於其破楚入郢也為鞭尸藉館之説于其諌吳不聼而死也為浮尸於江激而為潮之説竊意是皆戰國䇿士夸大其詞以緣飾其事如樂毅告燕昭王之類耳太史公既取而載之史子雲又載之法言不為辨正遂使子胥生為僇及死君之臣沒為隨潮往來之鬼豈不大可恨乎蓋終前漢之世左氏未大顯不得列於學官雖以二子博極羣書故亦無所折𠂻獨子長所謂吳人憐之為立祠山上此則人心天理之不可泯沒者其説不可廢也故今所書止據左傳盡削舊志因仍之誤為子胥一洗若其他詩文則姑存其舊云記文王荆公安石撰豫觀子胥出死亡逋竄之中以客寄之一身卒以説吳折不測之楚仇報耻雪名震天下豈不壯哉及其危疑之際能自慷慨不顧死畢諌於所事此其志與夫自恕以偷一時之利者異也孔子論古之士大夫若管夷吾臧武仲之屬茍志於善而有補於當世者咸不廢也然則子胥之義又曷可少耶康定二年余過所謂胥山者周行廟庭嘆吳亡千有餘年事之興壞廢革者不可勝數獨子胥之祠不徙不絶何其盛也豈獨神之事吳之所興蓋亦子胥之節有以動後世而愛尤在於吳也後九年樂安蔣公為杭使其州人力而新之臨川王安石與之銘曰烈烈子胥發節窮逋遂為册臣奮不圖軀諌合謀行隆隆之吳厥發不遂邑都俄墟以智死昏忠則有餘胥山之巔殿屋渠渠千載之祠如祠之初孰作新之民勸而趍惟忠肆懷惟孝肆孚我銘祠庭示後不誣碑亡已久嘉熙四年守趙開府與權重入石又記王安國撰胥山廟者吳人奉事蓋已千有餘年至於今天子命祀而吏之嵗時所祝未嘗懈也嘉祐七年長興沈公作藩於杭政已大成下畏以愛既而雨暘或愆躬禱於廟仍嵗大熟于是邦人皆以為神之賜也乃相與告於公曰願治廟屋以妥神靈公既樂詔教之施能媚於民而又嘉民之不忘神惠而思為報也故聼之八年六月廟成公遂祭享耋稚嗟嘆咸願刻石以詩顯之而使人來請辭於臨川王安國乃作辭曰維此句吳泰伯肇居其後綿綿享有邑都闔廬夫差力欲圖霸有臣子胥才實剛者報楚入郢遂棲越君使國為雄我志獲申彼何宰噽冒貨姦宄我僨於忠國亦隨毁武林之墟胥山之岡立廟以祀民思不忘既歷年久報事不懈以迄於今帝遣祈拜公作邦伯實治庇民每祀必誠獲應於神卒是逾嵗風雨順節謂非神休有或災孽人乃告公廟屋將傾願易而新不戒遽成嚴嚴之堂有翼其廡慿附之威觀者俯僂衆曰迄事公即大祭賔贊肅虔鼓簫喧沸豕羊具肥桂酒香醇神顧享之醉飽欣欣衆願具石刻載厥美繫之銘詩庸告無止英衛閣記守趙開府與歡撰英衛閣者始建吳山忠清廟閣名今上皇帝親灑宸翰以賜者也初山有星宿閣直廟之前堪輿家指為龍首紹定辛卯年燬其後廟雖新而閣不復嘉熙己亥夏六月與歡被命再尹京時水失故道湍激波蕩無虛日沙若摧而陷岸若墜而隤曩時潮所不及地遇大汛彌望七八十里間潰為洪流月塘真如號古剎亦宛在水中沚僉謂此天災難以人力勝日長月益為害滋蔓因就付以隄築事固辭弗俞用欽承休命程土石計徒庸具畚鍤興工役凡人力所至不敢不勉且乞靈於神以相之有請於朝得旨新作臺門仍建傑閣棟梁岧嶤丹青輝焕爰肖神像巍然中居侍衛旁立冠佩陸離羣山四環大江前繞川祗波石罔不帖妥聽命閣甫就而水陸寺前之埧亦不日而成脫蛟龍垂涎之淵為軍民奠枕之地匪人之謀皆神賜也既又托英衛二字以名之又奏乞奎畫以賁之于是新閣偉然冠山椒而特立鎮江濤而不驚顧前之為閣者大有徑庭矣私竊自念神之威靈在天其行事在史其愛在民其功在後世奚以記為然有司職在推廣皇帝答揚神貺之意其可以無述乃為之言曰天地正大剛烈之氣鍾而為神其生也家則為孝子國則為忠臣其沒也上則為星辰下則職江海所謂越宇宙而挺生亘古今而長存者神蓋其人也神不忍宰噽信越之浮詞誘於伐齊之利而忘其玩吳於掌股之上也遂以懇懇之忠極諌於王而不諱屬鏤之賜甘心如飴其為言曰自我死使後世必以我為忠上配夏啇之臣與龍逢比干為友遂伏劍以死每讀吳越春秋至此未嘗不感憤涕落也嗚呼士大夫出身事主患不明國之安危與主之榮辱爾知之明則竭力而為盡忠以告視死生禍福與鴻毛等逮其以言觸咎身膏鈇鉞而其眷眷念國猶不忍替亦以忠義之心知國重於身爾充此志也雖去之千百世之下其英靈衛國凛凛猶生若神者所謂鍾天地正大剛烈之氣者非邪按史記吳人憐之為立祠江上則神之祀於吳蓋有年於兹其英風義氣與江濤俱壯其全名巨節與吳山俱髙至其加愛吳人則千載猶一日越漢歷唐以至於我本朝廟祀之典有崇無墜自六飛駐蹕錢塘以江為重江之神以忠清廟為重故祀尤加嚴而缺典尚多先是神之父國號以楚兄以鄭故老口相傳莫之經見而毋嫂妃猶未錫嘉號遂具疏以聞下奉常褒封追爵父為啓烈侯以母嘉應夫人配兄昭順侯以嫂惠淑夫人配悉像於廟之東房總曰王父之殿尊尊也妃曰協靖夫人新命也大中祥符間著為令每嵗春秋由翰苑降詞命羽流祈福率即殿蕆醮事殊不稱神事帝意爰即故門址改創醮殿表曰延真且俾天明宫道士葉揆辰領廟之管鑰而灑掃之國家崇福廟祀之典至是乃克告備閣經始於是年之七月落成於十有一月殿及延真相繼竣役則嵗庚子四月也皆廟巨事冝牽連特書凡役工三萬五千有竒為屋六十有七楹云題詠曹既明胥山廟詩貫弓執矢一亡臣未洗昭關客路塵道上乞餐逢漂女江邉欲渡得漁人致君豈謂初無術賣國由來别有因文種墓空山脅冷怒潮朝夕怨江濵間關欲雪父兄仇底用平生錫蓋侯寃骨未沉吳月曉征魂初返楚雲秋西施正倚承恩貌范蠡將移去國舟尚向松陵親卻敵藁砧依舊在層樓堂堂武烈與文英引劍呼天氣未平身後端知司禍福生前直欲就功名胥山未盡吳儂意郢水猶傷楚客情俎豆滿前靈宇壯長江千古帶髙清吳越錢武肅王廟在錢湖門外方家峪寶藏寺之左錢氏五王皆祠焉前有豐碑螭首龜跌極髙大雖已駁蝕然細捫之若未嘗刻字者今在陳氏房廊之墻隂山後有井頗大欄甃甚古名烏龍井土人至今名此地為錢大王廟云吳越錢文穆王廟吳越備史云天福七年十二月以龍山武功堂為文穆王廟山川諸神平濟廟在浙江廟子灣乾道初周安撫淙以上旨修築江岸遂建廟詔賜額曰平濟慶元四年封助順侯纍封至咸淳三年為顯烈廣順王廟嘗頺圯端平三年俞存義孫應辰捐金倡率撤而新之視前增壯順濟廟國朝會要云浙江里民馮氏祠紹興三十年賜順濟廟額慶元庚申封靈佑公紹定間重建廟封英烈王嘉定十七年封次子為助寧侯紹定六年加助靈佐順侯記文嘉泰二年兩浙路轉運司主管帳司李長民撰浙江之潮蓋天地間壯偉絶特之觀其江自南蕩之灣距海門百餘里水浩渺無際殆天造是險以示東南形勢自乘輿駐蹕城郭宫闕日以壯麗為四方之極山川之神莫不奔走以祐我王室其浙江有若順濟廟馮公揭靈兹土功效尤炳炳著見享有寵命也固宜乃者慶元庚申崇陵復土朝廷致禱於神又命兩浙轉運副使沈公作賔更新祠宇以祈隂助氛霧頓收晴景晏溫水怪伏藏波平如席蓋彰神感應之速不啻枹鼓旋有詔册神自侯爵為靈祐公而漕司實命其屬梁大亮李長民相與即故祠規度之仍俾長民獨眂其役既增治庭壇改作門觀兩序肆施藻繪于塑像經始以是年十月晦越月草有二日訖止材植工役總之糜錢三百萬有竒方告成長民周視祠宇慨然獨念疇昔曽未有紀述而公之孫崇之進之亦以為言于是私願因今命磨片石以登載神之威德乃即崇之進之所録行實以質以都人所傳而次第之謹按公姓馮諱俊字德明世錢塘人生于熙寧甲寅六月十四日娶郭氏生三子天資剛直幼孤事母孝年十有八夢帝遣神易其肺腑云將有徽命旦寤胸懷豁然開明生不習文藝至是於書傳文義以及字畫驟皆通曉有叩以禍福莫不前知足未嘗履閾人或遇之江海上元祐年中一日有舟渡江值大風濤分必死公即現形其間自言名氏叱吒之頃駭浪恬息又嘗就寢竟日乃寤家眂其嘔吐皆海錯異物怪而問之則云適宴於龍宫大觀三年十一月己未忽語人上帝命司江濤事不得辭越三日不疾而終年三十有六先期旬日于清水閘所居西偏自營兆域既歿靈異尤夥人即所居祠之而次子松年亦以濟人拯物著靈逺近今二孫則幼子椿年所生于是子孫世奉廟事不惟啇賈舟舶之所依怙而環王畿千里之內水旱有扣亟蒙丕答浙江之中流有沙磧能為舟害自顯仁太后及三朝衣冠之藏俱在禹會發引之日有司致禱其沙即平用是洊膺褒典至今又從官給費易故而新之以妥神靈其績效彰灼賜爵受封則具有紹興以來朝廷錫命在惟昔蘇文忠公軾于頴上張龍公祠碑敘述為詳銘詩首言至人變化不私其躬地行為人天飛為龍長民竊誦其語載考行實愧無斯筆為人形容姑識其概庶來者有考豈特慰其子孫之志云耳英顯通應公廟在廟子頭寶祐元年江潮衝齧神顯靈迹塘岸堵安二年十二月加封英顯通應公湯村龍王堂政和二年湯村沙岸為潮水所衝州縣立龍王祠以禱之六年奏請增廣廟祠詳具順濟宫善順廟在白塔嶺舊傳民間建小祠保舟楫往來號平波神祠嘉定十七年易祠為廟咸淳元年詔賜善順為額昭應廟在白塔嶺紹興間建舊傳錢塘順濟龍王咸淳元年詔賜昭應廟為額孚應廟在磨刀坑龍山渡乾道三年九月建舊傳水府龍王咸淳元年詔賜孚應廟廣順廟在龍山舊傳鎮江龍王小祠咸淳元年詔賜廣順廟惠順廟在江塘嘉定五年二月江潮衝齧石塘帥漕建廟以禱咸淳二年旨賜惠順廟為額四年七月夀和聖福皇太后降錢重建順濟龍王廟在湯村鎮政和五年郡守李偃以湯村岩門白石等處江潮侵齧奏請同兩浙運使劉既濟措置用石版砌岸因建廟紹興十四年重修纍封靈應昭應嘉應三王嘉澤廟舊在錢塘門外二里號錢塘湖龍君錢氏表請封廣潤龍王國朝纍封為淵靈溥濟侯廟始梁大同中乾道五年周安撫淙以禱雨應重建淳祐八年趙安撫與􅊸又建且亭其前之井扁曰寒泉寶祐間馬安撫光祖更創咸淳五年安撫潛説友又葺而新之記文吳越王建廟碑蓋聞四靈表瑞則龍神功濟於生民百穀熟成則水旱時關於隂隲而况浙陽重鎮自古吳都襟帶溪湖接連江海賦輿甚廣田畝至多須資灌溉之功用泰耕桑之業錢塘湖者西臨靈隱東枕府城澄千頃之波瀾承諸山之源𣲖梁大同中湖廟嘗置唐咸通年刺史崔彥曽重修鑿石為門蒸沙起岸自豫翊扶聖運移建節旄舊日湖隄盡改為城宇澄滓有同於鏡水濟時每及于生靈一郭軍民盡承甘潤逐年開割渺漢泓迂長居一丈之深淫不竭元陽之失度其中菰蓮鬱茂水族滋繁蒸黎實賴以畋漁河道常資于灌注壯金城之一面不異湯池潤緑野之萬家常如甘澤固有神龍居止水府司存降景祐于生靈興旱涸之風雨原其自編祀典積有嵗年雖陳奠酬之規未施展敬之所况錢塘湖龍君與洞庭龍君青草龍君雁行之序各通天波風雲嵗嵗之去來隂隲常施于萬𣲖古之典籍曽靡既焉日月滋深原無祠廟蓋為古來藩侯牧守不能建立殿堂豫統吳越山河綰天下兵柄前後纍申祈禱皆致感通既荷隂功合崇祠宇昨乃特于湖際選定基坰創興土木之功建立欒櫨之構至于殿庭廊廡門楹階墀悉親起規模指揮擘劃俱臻壯麗以稱精嚴然後慎選良工塑裝神像威容赫奕冠劍森森陳將僚侍衛之儀列鐘鼓籩豆之位以至車輿僕馬帳幄盤筵祭器㸑厨無不臻備馨香荐獻不闕四時况鏡水清流煙波浩渺其湖周百餘里源𣲖數十餘川濟物利人功能及衆亦無龍君之廟貌豫遂與錢塘龍君一時建立殿堂同表奏聞乞加懿號果蒙天澤並降徽章其所奉敕旨具録如後敕錢塘重地會稽名邦垂古今不朽之基繫生聚無疆之福有兹舊迹特創新規豈曰神謀實因心匠蓋水土授天之職庇民之功嵗時罔闕于牲牢祈禱必觀于肹蠁得一方之義化致兩境之安康錢鏐普扇仁風久施異政至誠所切遂致感通其錢塘湖龍王廟冝賜號廣潤龍王鏡湖龍王廟宜賜號贊禹龍王牒至準敕旨若夫人唯神贊神實人依信冥陽共理之言乃幽顯相須之義今者式嚴廟貌永受蒸嘗四時之殷荐不虧萬姓之禱祠無缺神其受大朝之寵千古之光輝常鎮吳邦預銷災沴必使原田肥沃克昌廣潤之名榖稼豐登更表土龍之德今則嚴禋已立邃宇咸周聊記嵗月刻于琬琰後來觀者其鑒之哉時正明二年嵗丙子正月丙辰朔十有五日庚午建立天下兵馬都元師淮南鎮海鎮東等軍節度使尚父守尚書令吳越王錢鏐不凡闕字皆磨滅可認水仙王廟在西湖第三橋北寶慶乙酉袁安撫韶建自為記今在崇真道院記文豫自承乏內史雨暘禬禱數詣所謂水仙王廟者廟有壇壝間于是斬牲瀝酒以起龍蟄穹碑植宇下龜跌隆然摩挲刻文則吳越錢武肅所著其額曰錢唐廣潤龍王廟東偏有堂列三賢像乾道中郡太守周君淙建退而質諸臨安志成周君手且言廣潤龍君祠即水仙王廟按錢塘水仙王事始見蘇文忠公詩公詩石本今存自書其左方曰今西湖有水仙王廟仙之廟於湖公出守時蓋無恙後莫知廟所在六龍南渡杭為帝所絡孤山築殊庭得不廢者惟和靖墓他皆一掃刮絶去荒基老屋漫不見蹤迹廟之廢未必不于此故趙君夔注蘇公詩考驗無所得乃敘夢中語諉以茫昧使龍君之祠是趙復奚所疑哉彼龍君祠與普安佛廬鄰距葛嶺占北岩之阿視湖邈焉牽連就因附祀三賢而祝號以訛好事者又從而井其旁名薦菊以即蘇公句贅矣豫既更三賢祠而水仙廟未有以釐正于是廢酒壚創焉地據湖隄右湖光拍隄平挹千頃仙峩冠佩玉乘風載雲方羊于水月倒景之中仙有靈宜不宜邪昔湘旁黃陵有廟自秦漢迄晉釋詞亂真王逸以為湘君者自其水神而湘夫人乃舜二妃郭璞則又以為天帝二女至昌黎韓公始正娥皇為湘君而湘夫人則女英也異哉水仙之事果相似乎嗟乎自蘇公去杭今百三十有七年水仙有廟名存實亡豫何人乃適有感是孰使之然也或曰事廢興存乎數其又信然耶廟經始于寶慶乙酉冬明年春落成因記其所以又作楚語以展仙之靈其詞曰桂水濶兮仙宫今何為兮山之中羌時俗兮改錯寄嘉名兮土龍卜中洲兮芷閭仙歸兮故居旗芙蓉兮蘭枻詔馮夷兮先驅杜蘅芬兮旅庭酌寒泉兮秋英福帝郊兮塵清終萬古兮揚靈會靈廟在湧金門外即栁洲五龍王廟中燬寓惠明寺慶元六年禱雨應賜廟額曰會靈王安撫補之買地寺旁未鳩工而去開禧元年趙安撫師􅋷淳祐七年趙安撫與􅊸先後創建咸淳五年安撫潛説友又更新之記文李直院璧撰先王之世神人異方不相參混俗無妖淫民用乂安故曰以道涖天下者其鬼不神夫聖人謹于幽明之分也如此然而民事之所關祈報禳禬茍可以措吾力者則又靡不極其至焉社稷山川日月風雨寒暑水旱先嗇司嗇下至表畷防庸貓虎之屬莫不有祀大扺皆民事也後之有國者所以敷政流化調和隂陽銷伏災沴之具雖未必如古然而祭祀之禮為民而設無大廢闕甚者一遇涔旱之變則神鬼之祠老佛之宫與夫神龍之所宅有司奔走用事罔敢弗虔此雖非先王之故而其皇皇為民之意猶可見也錢塘今為駐蹕之地天子在上萬神效職而西湖栁洲有所謂五龍王祠者吐靈垂貺其來最久雨暘致禱無有差忒載之祀典紀之圖經可考不誣曩更兵火祠失其所寓諸栁洲惠明寺慶元六年十一月有旨賜廟名曰會靈京兆尹太府卿王君補之買地寺旁規以立祠祠未立王君去今户部尚書趙公師􅋷繼之慨然嘆曰此民事吾事也其可遂已掄材選工命通判府事鄭擢東南第三將劉公傑實董司之踰兩月告成堂宇蠲飭像設尊嚴都人聳瞻神意昭答時開禧元年六月九日先是五月旁死魄公以雨禱立應已而父老狀言既雨之三日湖山晝冥有二物如大木乘風揚波直湖心而東蜿蜒栁洲茭蒲間視之乃黃黑蛇二長可四五丈是日復有蛇見祠所雷雨大作兼旬乃止嵗以有秋嘻亦異矣公言諸朝乞加神封號制曰可則語璧曰祠吾立之子記之余惟鬼神之道君子所難言今夫能隱能顯者龍能雲能雨者龍龍之為物靈矣吻然而應幡然而作其龍之所自為耶抑固有主之者耶謂龍之所自為則像貌之立命秩之加非所施于龍也謂有主之者存則封爵之書所謂五龍之神皆龍也非有主之者也若是者豫皆不得而知至于曰雨而雨曰暘而暘民事之所關國典之所載雖千萬年敬事無斁是則豫之所知也公材邁倫所至治有異等再為京兆尹名與漢趙張埓初公為揚州嘗建龍祠九曲池天子錫廟名進王號視今舉適相似然君子謂公可謂知所敬矣其事神也周可謂知所愛矣其為民也切李璧記并書龍井惠濟廟在風篁嶺上紹興十八年賜廟額纍封為嘉應廣濟孚惠王咸淳五年安撫潛説友更創祠宇旁有德威亭即舊龍井亭東坡書扁南髙峯龍王祠在榮國寺後鉢盂潭纍封為孚應昭順侯廟廢已久咸淳五年七月安撫潛説友以久晴禱潭上覺微雨沾衣頃之甘澍如傾乃即故址為創廟以答靈貺玉泉龍王廟在淨空院嘉泰初賜廟額曰靈泉嘉定初改仁惠嘉熙四年又改神運淳祐八年趙安撫與􅊸重建廟咸淳三年太傅平章賈魏公又捐錢葺而新之神始封嘉應公後加曰溥澤詳見玉泉及淨空院咸淳臨安志卷七十一
