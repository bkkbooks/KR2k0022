body:
  text: 咸淳臨安志卷七十二宋潜說友撰祠祀二節義旌忠廟在豐樂橋俗曰三聖廟按神一姓髙名永能綏州人一姓景名思誼晉州人一姓程名博古河南府人程氏子孫今有居饒州者元豐元年同為統軍力戰於銀川挺身抗冦以沒始配食於鳯翔府和尚原宣和間方臘寇睦討捕者禱於神凱還奏聞始封侯中興初屢以助順討賊功賜廟曰旌忠加封六字王嘉泰初以平潮著靈加王八字一曰忠烈靈應孚澤昭祐一曰忠顯昭應孚濟廣祐一曰忠惠順應孚祐善利廟舊在清冷橋北紹興十九年楊殿帥存中請以旌忠賜為觀額後因德夀宫門拓徙建今處即覺苑寺廢址也自嘉泰辛酉至淳祐壬子觀凡三燬惟廟巋然獨存記文黃尚書由撰建觀記旌忠觀者為元豐三忠臣作也皇朝承命稽古諏經凡施德於民禦灾捍患死則祀之示褒也鳯翔故有廟今移於行在所謹按髙宗會要杭之廟食𨽻祠官者凡十三而四在畿內曰忠清祚德神應通惠而旌忠不與豈闕文哉鉤考圖牒三神之祠紹興壬子則為廟己巳則為觀其事倡於循王張俊其費成於和王楊存中此建置之本末也三神世系以國史詳之髙諱永能綏州人景諱思誼晋州人程諱博古河南人率𨽻尺籍元豐五祀有事於銀川自謀臣不良以輕誤國合畨漢十餘將西行兵幾十萬髙佐中軍景佐後軍程處偏列方寇薄城下其鋒巨當是二三君同日出戰然竒計祕畫沮於首事之昏躁盛心徑氣絀於大勢之退撓九月己卯冦亟吾攻時中軍曲軫懼見顔色計且未有所出也程曰願當前不濟則敢以死戰即挺身從數百騎力摧其堅以沒是月戊戌冦衆甚迫許從和議初遣吕文思復謀遣曲軫未决景曰願請行不從則誓以死爭及馳見金主辭不為屈竟被囚而殺之至十月丙寅王師疲曳城援孤絶勢岌甚矣髙曰吾自結髮大小百餘戰未嘗敗辱今事至此天也因易敝衣奮戰旋掛弦絶吭死之原其死雖不同大致一於忠而已事聞朝韙其節賚恤休洽尋後廟而祀之夫生為忠義死為明神激烈沉雄昭貫日月而凛然獨存者詎以存亡間之耶宣和中方臘寇睦詔加收捕奉命者請禱寇即銷沴于是肇封髙為感聖侯景為順聖侯程為惠聖侯建炎中魔賊俶擾辛侯企靖以偏師討之次於信上遙伸懇誠恍若有見賊既就執於是增封曰感聖順正曰惠聖順應曰順聖威逺紹興初大業甫濟帝念列神之功議所以尊顯之者禮寺第其績首以三神為最于是升封王爵曰威烈曰威顯曰威惠厥後兀术擁衆窺全蜀時張公浚吳公玠總兵鳯翔真與對壘事亟置祠以禱一日雲豗晝暝鳯翔雨微霑而敵壁乃有大風揚拔之異敵騎驚遁我師乘之大勝凱入二公合詞以聞遂增封曰忠烈靈應曰忠顯昭應曰忠惠順應紹興末阜陵復上龍輴安濟敕議褒典又增封曰忠烈靈應昭祐曰忠顯昭應孚祐曰忠惠順應孚濟至嘉泰初崇陵迄事會越之士民以靈應來上則又封曰忠烈靈應孚澤昭祐曰忠顯昭應孚濟廣祐曰忠惠順應孚祐善利惟爾三神克保於我國家而纍聖崇報既都顯册以彰靈德又化血食而為净供其所以寵賁顯融之者至矣哉初觀之立也實在清冷橋北隆興受禪上欲斥廟垣之地廣飬親之宫乃撤浮屠覺苑寺易之嘉泰辛酉都城不戒於火一夕宫館蕩為遊埃主觀陳元直適會其壞也慨悼成績且不敢以事囏費穰廢由是奮力先斥厥儲初得太師韓王請於朝賜內帑錢五百萬已而循和二王復與巨室之所向慕者益以金幣佐其役始事於是年之夏歷三嵗而克就總為屋四百楹巍殿修廊臺門傑閣雲齊琳館下至於庖湢畢具土木之費為錢七十萬有竒規模視前益侈觀成有訪古者曰祀有廟自夏始也道有觀自唐始也合廟於觀孰為始乎嘗考熙寧中吳越不祀守杭趙抃特為之請乃以龍山祠為觀而賜名表忠此廟為觀之由也然歸覲之義與勤王不同備恪之功與死事自異彼祠宇蕪穢猶加修葺矧茲潜德容可後乎今六合承平百神受職户口蕃庶海嶽宴清念褒德報功固已無違於禮而默贊隂祐則惟爾有神雖日尊嚴既見顯異宜有文字以昭無窮故為紀其顛末而繫之以銘銘曰莫愛於生生或可棄莫畏於死死或莫避猗歟三神凛然同志戮力守城膏身夷裔沈沈隂爽與生不二隲相循和遏攘冦懟大勳為既集靈應益異乃侈王封以崇廟祀比更鬱攸莽牧地慿乃隂威作其圯墜峩峩新宫隆隆向制有雕其桷有瓌其麗春秋奉嘗中外瞻跂詒爾銘詩於千百世靈衛廟在錢塘門側建炎三年十二月乙酉完顔宗弼犯境守臣康允之退保赭山錢塘縣令朱蹕率民兵逆戰傷甚猶叱左右負以擊賊己丑遂遇害時尉曹十將金勝祝威亦以力戰歿鄉民瘞二人於錢塘門外因為立祠其後祠者相踵曰古栁林曰澄寂寺後曰精進寺側皆嚴奉惟謹淳祐十年賜廟額曰靈衛景定二年洪安撫燾為請封爵詔侯二神曰忠佐忠佑咸淳四年漕使又以士民之請上於朝乃封朱令為顯忠侯誥曰神生為烈士歿為明靈宜也矧曰死於王事可不表而出之建炎初金兵犯杭汝時宰錢塘鳩兵千邀擊之設竒疑敵民得逃死身中流矢猶能扶傷尾襲奮勇直前竟以戰歿功烈如此而爵命未加非闕典歟民不能忘合辭請於部使者遂徹豫聞深用嘉歎肇錫侯封仍賁顯號以旌爾尊主庇民之功第廟則附於靈衛於禮未便安撫潜說友見議改建廟設朱令像而坐二神於兩廡云記文太尉姓金諱勝姓祝諱威昔同為錢塘尉曹十將總首建炎己酉臘月金雛烏珠侵犯王略闖兵於杭權守安自强拉州民避寇赭山城無禦偹錢塘宰苕溪朱蹕鳩鄉丁僅二千趣餘杭路邀擊兀术前隊民非素練耳目不熟征幟宰陷障而歿兩太尉集凋兵還據葛嶺編竹覆泥為塗以愚賊越翼日冦騎颷至􅕭踕而踣仆者鱗叠巨刃奮􅓯橫尸山委軍聲大振兀术禠魄辟易數舍退遁赤山執居民為嚮𨗳得由壁而入兩太尉猶力護西隅以寡制衆戰久力疲竟沒王事兀术遂趨越矣鄉民感其忠節具馬革駢塋近郊乃今楊府雲洞之右因立祠於死節之所今錢塘門側是也血食一境已踰百年四時賽祭逺近翕集居者䝉其祐病者禱而痊無疫癘無火灾無橫暴神所賜也云云三山鄭子文撰忠勇廟在九里松神係親衛大夫果州團練司御營宿衛前軍統制張玘紹興三十二年從張子蓋解海州圍玘用命戰歿㫖贈容州觀察使建廟海州其後又詔别建廟於臨安府行春橋本寨之側昭節廟在保明坊廟巷東三班按二神一姓喬名亢字伯仁一姓陸名軌字仲模其先襄漢人同為殿侍在周曰東第三班初藝祖皇帝受禪聖駕自宣祐門入守者拒弗納乃自移門入既受朝賀顧近侍問適移門守者為誰奏曰散直班㫖降充下班又問宣祐守者曰東第三班即令宣引時本班之衆知天命有歸皆引義自殞上大驚趣駕親幸命侍衛馬步軍排陳使黨彥進將數十人往救得不死者二人即喬陸也召見詰其故曰臣止事一主所以乞死上慰勞再三曰汝等皆忠孝遂仍其班不廢且賜名長入祇候從其請駕所幸為前引仍以青紅二色帛為帽飾滿三年授保義郎二神既受㫖各復自盡上憫之厚加贈恤聼本班廟祀南渡初吳山居民不戒於火殿帥楊存中觀緋緑二旗現空中上書喬陸二字火浸息人益神之孝宗皇帝嘗宣問本班宿房以黃羅襆門限何所始左右備奏其故上嘉歎焉寶祐乙卯有㫖賜廟額曰昭節自景定庚申迄甲子凡三加封今喬為忠義威福英惠陸為忠烈威德英祐皆侯爵記文天下之忠一也事人而忠于人則事我也必忠於我未有失節於人可望其能盡節于我者此武王之所以釋箕子而漢髙帝之所以戮丁公也金百死而不變水萬折而東流臣事君以忠夷險一節要不過盡其職分所當然耳在人欲其納我而能拒我在我欲其拒人安得不旌其拒我者乎旌其拒我正將以教天下之忠也孝已愛其親天下欲以為子君獨不願得忠臣耶我藝祖皇帝神聖慈武膺受天命於時東班殿侍守職有嚴帝心嘉之既踐位召至慰拊皆不敢自全其生所存惟喬與陸受誓而退尋亦效死當華夏蠻貊罔不率俾之時而獨不受周粟視倉卒出制書于䄂中者其為人相去何如也忿疾異已人之常情我藝祖方且旌忠顯節洊錫徽稱至名其班曰長入祗候蓋將使熊羆之士不二心之臣視我表厲皆知舍生取義之為忠抑以侍御僕從不可一日而無正人也聖人絶識偉度固非常情所可測識不寧惟是韓通臨難不茍厚葬而贈之中書令衛融不忍忘舊釋罪而擢以太府卿神謨睿略所以扶植綱常更立人紀嗚呼逺哉喬陸二人生負忠節死為明神自國初廟食逮今三百餘年凛凛如生衛國救灾庇民降祉忠烈之為靈昭昭也乃寶祐乙卯奉聖天子明命賜昭節廟為額上以承烈祖創業垂統之盛心下以貽宗社無疆之休慶翼翼廟貌過者必式凡百有位其懋敬之哉喬侯諱亢陸侯諱軌都人士與衆班請紀靈跡於廟敬叙顛末而繫之詩使歌以祀焉其辭曰人戴藝祖如歸堯天之歷數不可逃擁登寶位加黃袍萬神歡唱五嶽朝日月出矣爝火消華夏臣服無昏妖誰與抗節嵩岱髙東班殿侍陸與喬帝命來前宥爾曹折箭為誓加寵褒退即效死悽焄蒿英氣直上干雲霄虎豹控扼天關牢廟貌血食非一朝新錫顯額節愈昭椒漿桂酒兮蘭肴忠魂不待剪紙招追風逐電天馬驕衛㦸在手弓在腰宴埃來鑒沼沚毛感召叶氣延祥颷國祚廟祀同逍遙洪樚撰顯功廟在錢塘門外保叔塔下神姓嶽名仲琚家於霍山為臨安府吏建炎間金兵犯境神輸家財募勇士三百人推錢塘尉曹十將金祝二人為首領事具靈衛廟迎敵死戰合境以安里人懷其功即四聖延祥觀祠事之號保稷山王嘉定初更建廟今處咸淳四年耆老以神未有褒表告於太傅平章魏國賈公乃為奏聞㫖賜廟顯功侯以忠翊制詞曰朕惟六飛南渡舉百二山河無一人敵王所愾每念為之憮然爾神克奮孤忠輸財募死士得二將率衆三百卒奪金兵南下之盛氣而一境賴以安存今經百有餘年二將已都顯號而神獨無以旌其靈可乎哉進錫通侯宜在以勞定國之典廟故卑狹至是增築加崇敞云記文咸淳四年冬十有二月西湖寶嶺顯功廟成始里人以侯建炎間毁家鳩旅能力捍患社而稷之於山之下曰保稷山王云今太傅平章魏公賜第距廟里許父老言侯之福一方舊矣而封爵未加廟貌弗稱于是衆籲于公公曰此義士也具以聞制曰可其賜廟曰顯功神封忠翊侯民侈上賜相與大其殿宇故一室更敞前榮中肖侯象旁立儀衛翼以兩廡由扶欄而上為門四楹過者肅然起敬曰孰仁我民惟侯之功孰旌侯忠惟我魏公惟侯之靈永食兹土乃被石以紀尚俾來世知廟所始用敬事於侯德與宋無極侯嶽氏錢塘人其忠烈事在臨安志中越明年正月望日記仕賢靈惠廟在城北江漲橋鎮界舊志神姓陳名頊字行嵩會稽人仕東晉嘗使虜羈留三年仗節不屈拔劍斫臂復命於朝歷青掦荆廣四州刺史食邑錢塘海鹽鹽官三縣葬於臯亭山因廟焉廟記云梁大同二年封興善王又改封崇善國朝紹興十九年賜靈惠廟為額慶元六年以禱雨驗封福順侯纍封至嘉熙四年為慈祐公又纍至淳祐十二年為慈佑福善昭應公寶祐六年遂列王爵又有行祠在江漲橋鎮及董家巷記文皇帝駐蹕於臨安之十有二年冬臨安府耆老陳德誠等狀於有司曰化度寺有臯亭神祠自隋以來事之至今不絶旱乾水溢有禱必應郡民事無巨細皆請於神應若影響朝廷嵗時降香祈請不異他祠而封爵無加廟額未立蓋闕典也有司以聞明年秋詔用奉常議以靈惠名其廟逺近鼓舞願刻諸石侈大神休以昭天子之寵命寺僧行藴以其紀來請某不得辭謹按神姓陳氏諱某字行嵩會稽人也仕東晉歷青揚荆廣四州刺史以武功食錢塘海鹽鹽官三邑見於李宗諤之圖經者如此梁大同二年敕封興善王後改封崇善王而失其時代嵗月其見於桑衍之圖經者如此隋僧真觀講於衆安寺夜夢神求受净戒仍舍廟屋五間為佛殿見于髙僧傳者又如此爾後寢血食専供伊蒲塞饌見於白居易之祝詞者又如此神嘗使虜留三年乃斷左臂求還遂以胡服報命居喪哀毁過制既卒人嘉其忠且孝立廟於臯亭山之西南而祠之聞於耆舊之傳者如此神既事僧真觀願護伽藍始建廟寺中惟化度寺在唐曰重雲更曰承雲本朝皇祐中始改今名疑即隋之衆安寺也聞於耆舊之傳者又如此考之禮經聖人之制祭祀非有功烈於民者不在祀典而神生則勤於國死則為國家民物禦捍灾患其功烈宜祭祀故當中興盡毁淫祀之際獨以衆請廟得賜額載在祀典與百神受職嗚呼天子之所以愛民而禮神者至矣神之所以承天子之寵命而福斯民者冝何如哉抑嘗聞漢朱邑故為桐鄉吏其民愛之死葬桐鄉西郭西民共為立祠嵗時祠祭夫邑特縣小吏民且不忘况神有武功忠孝昭著宜其舉邑祠之至四十餘所又聞蜀將關羽廟食玉泉山嘗受戒於僧智顗後祭絶葷茹福及荆南神之依嚮釋氏亦無以異也雖然碑版載神之事為多而怪誕不經適足以誣神今特托其可書者以信於天下後世云鮑􅓺記祝文去秋愆陽今夏少雨實憂灾沴重困杭人居易忝奉詔條愧無政術既恐愆序不敢寧居一昨禱伍相神祈城隍祠靈雖應期雨未沾足是用撰日祗祀改請於神恭聞明神禀靈於隂祗資善於釋氏聰明正直潔靖慈仁無幽不通有感必應今請齊心䖍告神其鑒之若四封之間五日之內雨澤沛足稼穡滋稔敢不增修像設重薦馨香歌舞鼓鐘備物以報如此則不獨人之福亦惟神之光若寂寥自居肹蠁無應長吏䖍誠而不答下民顒望而不知坐觀田農使至枯悴如此則不獨人之困亦惟神之羞惟神裁之敬以俟命長慶二年七月白文公嘉澤廟在湧金門西井城下神姓李名泌字長源唐相國鄴侯也德宗興元間守杭有風績郡地苦斥鹵民日汲鹽水侯為鑿六井引西湖水入城中始得飲清泉郡人德之為立祠景定五年勑以嘉澤為額咸淳五年安撫潜說友拓地重建白文公廟見西湖門三賢堂顯應廟在風篁嶺龍井衍慶寺側神姓胡名則婺之永泰人天聖丙寅明道癸酉嘗再守杭有惠政在郡時獨無潮患以兵部侍郎致仕葬錢塘龍井山中建炎間方寇猖獗聚永康方岩山賊夜夢紫袍金帶神人現赤幟於空中隨就勦滅朝廷褒嘉為建廟封顯靈侯自後纍加封其龍井墳賜顯應墓神之赫靈著於方岩此不悉載昭貺廟在候潮門外渾水閘東故司封郎官張夏祠也會要作工部員外郎夏雍邱人景祐中為兩浙漕使江潮為患故堤率用薪土潮水衝擊每繕修不過三嵗輒壞重勞民力夏始作石堤延袤十餘里人感其功慶歷二年立祠堤上嘉祐六年褒贈太常少卿政和二年封寧江侯後改安濟公賜昭貺廟額紹興十二年以後纍封至慶元四年錫以王爵又纍封至今為靈濟顯祐威烈安順王淳祐八年重建廟又有安濟廟在薦橋門外馬婆巷宣和間建蘇文忠公祠見西湖門三賢堂寓賢許基公由以下三十四賢祠見西湖先賢堂潘逍遙祠在潘閬巷即所居宅咸淳臨安志卷七十二
