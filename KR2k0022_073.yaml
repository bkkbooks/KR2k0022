body:
  text: 咸淳臨安志卷七十四宋潛説友撰祠祀四諸縣神祀錢塘縣城隍土地安邑侯廟在縣治東廡仁和縣城隍廟在縣治之東餘杭縣城隍廟在高岡福善王廟在縣東北十五里舊志載故老之言云周赧王廟也唐大歷二年縣西海塘壞邑人大恐走錢塘縣崇化鄉觀山禱於赧王祠下水為絶流於是立廟太平靈衛王廟在縣治神姓陳名渾嘗為令詳見廟記記文熙寧癸丑餘杭令扈大亮撰王自東漢熹平間嘗宰是邑百姓為之立祠後唐長興中封太平靈衛王蓋餘杭為大溪橫截而衆山之水合流其中每遇淫雨天目之源一決則湍悍奔溢勢不可禦邑人患之王以溪南大野其地汙下足以瀦水于是築塘環繞凡三十餘里號曰南湖即湖之西北鑿石門以通大溪鍾泄其水遂無墊溺之患而又徙置縣治葺城池造舟梁置堰開壕至今賴其賜吏民有禱於廟無不響應治平末縣令齊君雖新其廟貌然無以紀其實大亮書此于石以久其傳焉又有假主簿從祀其旁父老相傳云當時同開湖築塘者諸葛使君廟在縣南一十四里斷山斷一作潭下祥符舊志云縣人諸葛琮有賢德後漢時為河間太守居斷山卒葬其旁降神於巫能興雲致雨邑人廟而祠之唐貞觀二年建乾化五年封永昌侯仇王廟舊志云在縣北十五里仇山廟城周回七里約髙一十丈有洗馬池靈雞堆飬馬場紹興二年縣令張承嗣重建廟祝文嘗聞神者所以司土地守山川驅禽獸福生人也餘杭縣自去年冬迄今秋虎暴者非一神其知之乎人死者非一神其念之乎居易于師儒猥居牧宰慙無政化不能使渡江出境是用虔告于神惟神廟居血食非人不立則人神之主也獸神之屬也今縱其屬殘其主于神何利焉于人何辜焉若一酬之後神其有知即能輝靈伸威服猛禁暴是人之福幸亦神之昭昭若人告不聞獸害不去是無神也人何望哉嗚呼正直聰明盍鑒于此長慶二年八月白文公羅平王廟在縣北八十里止戈鄉浮里村臨安縣城隍霸國侯王廟在縣北吳育春卿載錢尚父殺一小吏後見夢因封為屬國侯永為臨安土地詳見後吳越武肅王廟在縣東後唐長興四年建一在縣西保慶王廟在縣南二里後唐同光二年置安國興聖王廟在縣南五里梁乾化三年置靈聖王廟在縣東二十里後唐同光二年置靈靜王廟在縣東二十里後唐同光二年置靈濟王廟在縣北十五里晉開運二年置降福侯廟在縣東二十里光化二年置寧陽廟在縣東南三十里唐光啓三年置安惠侯廟在縣東北一十五里廣愛侯廟在縣西南二十里崇寧侯廟在縣西二十里亷貞侯廟在縣東五里乾化三年置施善王廟善作歸侯在縣東南一十里懷柔王廟在縣北三十里唐咸通十四年置功臣山興國王廟在縣南五里衣錦山霸業王廟在縣南五里東天目開濟山王廟在縣西三十里西天目普惠王廟在縣西四十里永定王廟在縣西北三里唐咸通十四年置舊志云本東晉虞府君也乾寧二年吳越武肅王奏乞追贈敕封濟侯梁乾化三年加封永定王永興王廟在縣西北三里五栁山王廟在縣東北五里唐同光三年置錢明王廟在縣西南十八里長興元年置廣慶王廟在縣西北五里梁正明六年置護國侯祠在縣西三里華石侯祠在縣西南三里柴府君廟在縣南一十里駱府君廟在縣南二里俞府君廟在縣東南三里烏支大王廟在縣南八里蔡明經廟在縣東二十里後唐同光三年置義成王廟在縣東北一里後唐同光三年置五通祠在縣西五里顔堂廟在縣西一十五里石大郎廟在縣東二十里花府君廟在縣東北二十里陳府君廟在縣東北一十里前烏府君廟在縣北七里朗石水府君廟在縣南三十里秦山陳府君廟在縣東五里許明府君廟在縣西二十五里髙陸府君廟在縣北二十五里胡博士廟在縣東南一十五里靈山鮑府君廟在縣西五里羅宅孔三官廟在縣西五里楊府君廟在縣西三十里葉府君廟在縣西北三十五里趙府君廟在縣西北三十里保寧侯廟在縣西二十里朱府君廟在縣西十八里積慶王廟在縣南三十五里彭祖廟在縣東北一十里靈澤廟在徑山能仁寺去縣五十里即唐國一禪師開山時所現龍神也每嵗雨晹愆期邑人禱之多應紹興八年賜靈澤廟額纍封為顯應孚祐昭濟龍王錢王太廟在縣東題咏金華王竹寮執禮逰錢王太廟數間老屋半欹頺宗祏雖存沒草萊尚有遺民呼大廟可堪遊鹿上荒臺花開陌路空餘恨麥被陵陂不盡哀三節還鄉平日志化為杜宇定歸來於潛縣城隍廟舊在白雲菴下隆興初葉衡宰邑徙于縣西酒務之側徐縣尉尹保義有捍禦方寇金人之功因繪像祠于廟廡名曰全節昭應廟在縣北四十五里舊志云天目龍王祠也崇寧三年賜昭應廟額政和三年封淵源侯纍封至今為廣佑靈濟昭應孚惠王普惠大王廟在縣北四十五里梁乾化五年吳越奏封西天目山神云天目山衆聖共居百藥所出自臣討伐凶徒之時皆降隂兵佑助乞依神廟例封山王靈惠廟在縣西南三十五里係浪山龍祠紹熙四年令邵文炳具述靈應嘉泰元年敕賜今額徐偃王廟在縣西十五里一在縣南三十里元和姓纂載偃王之後居於潛為杭望族有偃王祠皆徐氏所建任府君廟在縣南三十五里一在縣南門外按梁任昉字彥升嘗為新安太守為政清省吏民便之百姓立祠於潛新安舊皆𨽻丹陽故皆有祠虞將軍廟在縣北二十一里柯相公廟在縣西南三十五里東嶽别廟在縣西北三里觀山祠山别廟在縣東一里陽山三賢祠在縣西一里野翁亭之右刁璹毛國華為令有德政東坡倅杭行縣至潛皆為賦詩一云三年吠犬足生氂一云蝗自識人人不識道其實也慶元初令趙彥倓立蘇刁祠名二賢堂至開禧二年令胡衛增毛長官像改曰三賢堂以春秋上丁遣學職祭之二賢祠在月池北嘉泰二年令朝百談以前令葉丞相衡嘗為民除無名錢邵中書文炳減山鄉折米之直因民之思立是祠冨陽縣城隍廟在縣治東嚴先生祠在觀山淳祐乙巳令李迪建有堂曰耕春東嶽行祠在縣東北一里靈惠廟在縣西一里一百二十步按郭氏家譜云侯名成字元禮仕吳為黃門侍郎封永興冨春二縣侯後人因為立祠封昭福侯祈禱多應嘉熙四年敕以靈惠為額赤松子廟在縣東十里晏元獻公輿地志赤松子得道駕鶴嘗停於華蓋山有廟水旱禱多應赤松子神農師也嘗至崑崙山止西王母石室中隨風雨上下張明府廟在縣北十里祥符舊志云明府嘗宰是邑百姓德之為立祠宇嵗旱禱即應祠下有泉水遇旱不竭通聖侯廟在縣南十五里舊名宋明王廟五代末縣令陸仁璋因祈禱有應申請封為通聖侯護邑侯廟在縣北十五里每遇水旱禱之多應州縣申請封護邑侯祠山行宫在通濟橋西五顯王行祠在永寧寺後新城縣城隍廟在縣郭東嶽行廟在縣西半里廣利廟在縣北五里地名松溪神姓朱諱徹字仲通仕晉為分水令與郭文為友既卒溪中忽有靴泝回而上者數四居人異之乃即靴之所止立廟吳越錢氏封為安境通靈侯政和四年賜額廣利宗和三年封威顯侯靈休廟靈佑廟在縣治按神張氏范氏睦寇竊發二神俱隂庇是邑宣和三年以江浙淮南等路宣撫使之請賜廟額張曰靈休范曰靈佑靈惠忠烈侯廟在縣西一里塔山唐許逺廟也逺新城人詳見人物門乾道三年間知縣景秉申請於朝賜額靈惠封忠烈侯周侯廟在太平鄉一十三里地名渌渚淳祐間敕賜輔德廟為額封翊應侯後加宣靈五通廟在縣之西杜太師廟在縣西一里按神諱稜為吳越錢王行軍司馬梁光化二年敕許立祠嵗久廢壞僧智澄為重立于護國院潘將軍廟在祥禽鄉换鄉本吳越錢氏之將蕭將軍廟石將軍廟並在廣陵鄉版村陳女仙廟雞鳴山福民侯廟苦竹崇福侯祠杜澤濟民侯祠後村冨民侯祠下泊應瑞侯祠上汪壓境侯祠凌村保民侯祠了港積善侯祠馬鞍山安民侯祠百丈山興慶侯祠汪賴普慶侯祠張員外祠白石府君祠在南新鄉羅明府君祠牢山府君祠在新安鄉葛泰山祠在廣陵鄉朱府君祠裏笋章明府祠在寧善鄉以上神祠自蕭將軍而下皆莫詳始末以鄉民祈禱所趨姑存之鹽官縣城隍廟在縣東許國公廟在縣西半里梁大同二年建縣志云雍熙四年建後增祀張中丞亦號雙廟大觀二年賜睢陽廟額協忠封許逺忠義侯張巡忠烈侯南霽雲忠壯侯賈賁忠濟侯雷萬春忠勇侯紹興八年鹽官令胡兟與邑人禮部侍郎張九成援以請於朝併增祀南霽雲雷萬春姚誾詔許之皆賜上公爵今謂之五國公廟前後邑令崇修惟謹咸淳三年令吳由始以十月十六日率邑官寓士祭於廟識公盡節之日也邑人楊均作侑祭樂歌迎神辭歌辭迎神月惟良兮日既望雁凄凄兮靡草黃潔膋爼兮芬桂觴導迎生氣兮睢之陽龍媒躞蹀兮玄雲翔佇想五公兮下瑶臺僾如在兮曠祀舉肅雍贊列兮羅簮裳奠幣許國公至德元祀兮王正錫之衣履兮干于宋城負君恩兮稱兵奮雌鯢兮雄鯨奪吾峙以資叛兮士靡半菽而呼癸庚彼伯仲以視豫兮吾求急于寧陵嗟血戰以百數兮救一絶而壘傾全本根于江淮兮固有死而實生撫乾斗之庚申兮招神爽于千齡廟食故鄉兮垂休炳靈兮張國公有烈真源兮雍邱起事哭元廟以討逆設帝像而誅二流睢橫潰兮吾惟其砥乘堞雅訊兮故人欲死椎牛臡妾兮淚士如洗甲食裹瘡兮戰百勝而攻不已人畜盡烹兮兵餘其幾西向拜啓兮臣力竭矣生不全城兮為厲為鬼英概不泯兮于千萬世姚國公以烈烈東平相之裔歷尉而守從知己孤墉相守誓死潞府元戎澤其子血食睢祠繪凌煙哀兮榮兮其兩至兮南國公宴挺忠壯兮頓邱義有合兮身留冒圍鐵乞師對樂兮心憂徒示信兮齧指莫之救兮虔劉固將死兮不屈渠違公兮作羞靈連蜷兮于􅏪羌朔吹兮颼飀雷國公儼忠勇兮在唐守雍邱兮毅以強六弩著面兮目不逃將軍令肅兮敵心降壓騎四百兮走披猖城隳身殞兮鴻毛輕千載廟祀兮休有烈光鉞三獻詞霜天曉角千初獻丹楹轉月金繡紛幢勛在有唐宗社人載仰英烈爼惟辰嗟盡節故里昭虔揭臨御雍雍來下歆初薦羞潔亞獻當年宋壁血壅河流赤護東南形勝百易萬五神力人心同奮激立此生民極哀角載歌霜曉㪺瓊􅟍聖容懌終獻忠忱誼愊對越如丹赤緬想遺風餘烈猶身見古顔色佑惟馨非黍稷穆穆歆明德簟灔芳彛須醉廽雲旞鄉國禗送神霄祼獻終禮紀具靈禗廽馭人祗分福祉聚東嶽行祠在縣東南二里朝宗王廟在縣西南七十里白馬王土地廟在縣北二里舊云金人犯境見田野間白馬甚衆竟不敢入臯蘇將軍廟在縣東八十二里金牛山下相傳臯蘇二將逐黃巢死之因祠焉紹興十年嵗旱禱雨應敕賜福濟廟額烏龍大王廟在縣東八十二里金牛山下紹興十一年禱雨應敕以崇佑為額徐偃王廟在縣西十七里西楚霸王廟在縣西三十二里秦王廟在縣東一十八里驃騎蘇將軍廟在縣東南四十五里翁使君廟在縣南二里閻少卿廟在縣西南六十里昌化縣城隍廟在縣西北一里東嶽行祠舊在縣南過溪二里後併入上清宫開禧二年創祠山行祠在縣東南二百步上清宫之西紹熙二年令張任創靈山行祠在縣東南上清宫之東即徐偃王祠衢人有客唐山者始像而祠之慶元間令趙諒因為建廟諒亦衢人靈顯五侯廟在縣東五里溪橋上路轉山回林木蓊鬱挹湍流依峭壁廟貌甚偉威靈茂著焉伍子胥廟在縣南二十五里覽川瀘溪廟在縣東北十五里盛村舊傳其神子胥之族柯相公廟在縣西七里晚村舊傳為錢氏將平葛西廟在縣西四里髙樂廟在縣西二十里杜王廟在縣八里蕭王廟在縣西九十里珋相廟珋音留山有珋相在縣東南一十五里沙幕廟在縣南一十里惠山廟在縣南一十五里匱村廣廟在縣西一十七里上博廟在縣東南一十九里官杜廟在縣南三十里薑公廟在縣南四十五里龍池廟在縣西六十里百丈廟在縣北二十五里湍口廟在縣南泥皛湖廟在縣東南五里朕公廟在縣南三十里有石塘村後有山盤踞平石而極大朕公城在其上城基回環如帶及有造軍器之所歷歷可辨有拾得石鏃金刃者天隂晦或聞戈甲鼓笛聲朕公者舊傳為錢氏將出戰回未及故城死于赤石遂葬其地咸淳臨安志卷七十四
