body:
  text: 咸淳臨安志卷七十五宋潜說友撰寺觀一今浮屠老氏之宫遍天下而在錢塘為尤衆二氏之教莫盛于錢塘而學浮屠者為尤衆合京城內外暨諸邑寺以百計者九而羽士之廬不能什一說者曰清虛寂滅之尚而土木丹雘之貴離世絶俗之髙而榮華富厚之美而其大闕而騖于末流二氏殆無以大相過而道家闕之義嚴尊卑等上下則為浮屠學者不及焉夫憚于闕以為不然君臣尊卑上闕人之所闕設也彼二氏者豈能外闕道而自立哉闕所從入之異路故其為徒闕教服其教闕得不世守其說闕不能自遁于其名要之尊君親上之心則一也今寺若觀率以得列御前為重而其奉三宫元命以祈千萬壽則晨烟夕燈鼓螺鐘磬梵唄之音步虛之聲隱入霄漢而散落林谷者相望不絶也斯亦勤已嗚呼彼于吾儒尊君親上之說概嘗有聞否哉叙寺觀宫觀城內外天慶觀在宰執府後唐時為紫極宫梁開平二年改真聖觀有記錢武肅王立文多闕軼大中祥符二年詔諸郡建天慶觀嘗以元真觀之天禧三年郡守王欽若以朝謁差逺奏徙天慶觀額于此紹興二十六年有㫖重建賜田五百畝除其賦紹定四年燬有㫖重建御書天慶之觀四大字而咸淳六年又增撥官田五百畝給之觀內有真宗皇帝御製賜守臣王欽若詩髙宗皇帝御書老子道德經石刻記文天錫大寶命于我有宋二后受之外薄四海悉主悉臣真宗皇帝襲休紹明澶淵既捷以敉寧武功沾濡浸潤億兆禔福稽古禮文之事煟然勃興乃大中祥符紀元之明年詔天下都邑並建道觀一錫名天慶于以崇清靜而洽醇熙陟降左右丕顯亦臨積厚流光美祥來假五載冬閏誕頒明指諸天慶觀悉嚴奉聖祖天尊大帝像設卓哉皇乎生民尊祖之丕範順天立教之宏規也夫天者羣物之祖聖人繼德測靈昭德揭䖍明有本也日月所照霜露所隊凡有血氣心知之性莫不尊親其所以辨上下定民志之意微矣惟錢塘左江右湖天慶奠址負吳山南鄉中興駐蹕隆上都而觀萬國嵗時尹漕帥屬朝謁如令州縣吏一命以上肅拜而後敢即事遇誕節內而官省外而臺省歸美報上者必于是事隆體特嚴視景靈非他郡可比紹定辛卯秋㕓居畚綆不戒爰暨兹宇皇帝惕懷惟天惟祖宗發祥儲祉之地敢懈欽崇首斥內帑金帛祠牒更創之自宫掖邸第至都人士罔不捐資佐役明年春聖祖殿成藏室承東齊廬延西重門洞開迓雲車風馬之靈祕宇巍擁妥元龜朱蛇之神于時住持觀事臣陳永灝經工庀材實敏實勤上聞而嘉之申以錫賚為錢萬緡俾訖其事又明年三境列真之庭始克備滎溫祕寶有待而啓闕題奎淳祐內出天慶之觀四大字以落之闕下之旋壁輝絢穹偉淵靚陽曜隂藏穆穆焉天壯觀矣自三代衰王教熄異端乘之以禍福誘怵愚俗宫室紺碧幾遍天下其于大倫大法蔑如也疇若建殊庭祗靈貺遡仙源于厥初明天歷之前後使凡為臣子者拜俯其下雖在四方萬里外拱極前定之心油然以生而况首善之地不已重乎初上之御極也眷焉東顧虹流隩區將築天基瑞應宫于是仍命永灝往營之未幾珍臺閒館對峙浙河之上聖祖神孫景光相宣于萬斯年益章章矣昔在炎漢肇基豐沛班彪著論闡明王命序帝世之苖裔表神武之證鑑顯德豐功流澤後世四王再迭珍符有開奸雄懼威疆宇遄復鋪觀聖代跨軼兩都彼唐開紫極崇真元之奉詎可同日語哉於戲據坤靈之首倣太極之形與夭命人心相維于無窮故曰天子建極以順成天慶垂萬世之基也淳祐二年夏四月甲子朝奉郎行祕書郎兼吳益王府教授臣盧壯父記報恩光孝觀在報恩坊清泰四年錢氏建舊號開元宫國朝景德四年改景德觀崇寧二年改崇寧萬壽觀賜鹽官縣田一千畝政和三年改天寧萬壽觀建徽宗皇帝本命殿紹興七年改報恩廣孝觀十三年改賜今額專以追崇徽宗皇帝香火紹定三年得㫖蠲其賦咸淳四年重建鐘樓雲堂兩廡元真觀在禮部貢院西唐中宗景龍二年建遂以景龍名舊志作景隆恐誤後唐改中興觀錢氏改錢明宫相傳錢武肅患目禱而愈遂改今貢院橋下小石碣紀為錢明宫國朝雍熙二年改元真觀大中祥符二年為天慶觀天禧三年守王右相欽若奏徙天慶額于真聖觀而復元真之舊賜田凡五百畝水府淨鑑觀在候潮門外清水閘東舊在嘉會門外桐木園世傳五季馬自然修煉於此龍德三年錢氏號水府院國朝天聖四年詔定天下名山洞府二十錢塘江水府居其一嵗投龍簡政和改淨鑑院七年增水府字仍嵗度道士一人建炎間徙今處乾道四年周安撫淙建水府扶桑大帝殿嘉定七年道士江師隆闢地重建記文寶慶三年翰林學士程珌撰其略曰兩間動物水為夥故海特大乾坤大支𣲖惟江河淮濟四水然皆北東入海故東海為尤大錢塘據上遊六龍來御貢賦梯航吸鯨駕鰲而來渺渺無際靜則吳越千里鏡碧一色少焉溟渤翻山嶽摧不足以喻其勢豈無司之者乎世謂胥君寄宣孤憤安知水馮雍觀非靈均輩耶道家謂水為府有扶桑帝君若意也有理焉觀為古祠在錢氏清賞堂後人傳五季馬自然修煉飛舉其地也錢氏建水府觀已而徙桐木園祠扶桑仁皇天聖定名山而水府居一旱投簡輒雨政和初俾名靜鑑至七年增水府字二嵗度羽士一建炎始賜地清水閘之東今百年屋盡敗且隘不足容嘉定七年知樞密院鄭公昭先命道士江師隆主之乃闢地鼎新云云表忠觀在城南龍山熙寧十年守趙清獻公以錢氏墳廟蕪廢請于朝即龍山廢佛剎妙因院為觀俾錢氏之孫為道士曰自然者首居之仍嵗度其徒一人以供灑掃詔賜額曰表忠詳具蘇公所撰碑紹興間楊節使存中淳祐中趙安撫與􅊸寶祐間顔安撫頥仲前後修葺數久復壞而五王廟在觀之西南數十步外灑掃非便于是屋頺圮久矣咸淳七年安撫濳說友合廟觀為一拓地築基改創三清大殿而即殿之故址創五王廟棟宇宏麗像設森嚴若內外門若兩廡以至鐘樓齊堂雲林閣等或增或葺煥然更新又闢逵而東鑿池而方聖朝褒忠之意至是益大章顯云碑文蘇文忠公撰熙寧十年戊子資政殿大學士右諫議大夫知杭州軍事臣抃言吳越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居于杭及昌以越叛則誅昌而并越盡有浙東西之地傳其子文穆王元瓘至其孫忠顯王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盜名字者不可勝數既覆其族延及于無辜之民罔有孑遺而吳越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲于天下然終不失臣節貢獻相望于道是以其民至于老死不識兵革四時嬉遊歌舞之聲相聞至于今不廢其有德于斯民甚厚皇宋受命四方僭亂以次削平而蜀地江南負其險逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之力僅乃克之獨吳越不待告命封府庫籍郡縣請吏于朝視去其國如去傳舍其有功于朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功德殆過于融而未及百年墳廟不治行道傷嗟甚非所以勸奬忠臣慰答民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其院之淨土寺僧曰道微嵗各度其徒一人使世掌之籍其地之所入以時修其祠宇封植其草木有不治者縣令丞察之甚者易其人庶幾永終不墜以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳯舞萃于臨安篤生異人絶類離倫奮挺大呼從者如雲仰天誓江月星晦䝉強弩射潮江海為東殺宏誅昌奄有吳越金劵玉冊虎符龍節大城其居包絡山川左江右湖控引島蠻嵗時歸休以燕父老曄如神人玉帶毬馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪托國三王相承以待有德既獲所歸弗謀弗咨先王之志我維行之天祚忠厚世有爵邑允文允武子孫千億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋然新宫匪私于錢惟以勸忠非忠無君非孝無親凡百有位視此刻文題詠楊傑贈錢氏孫端靜師詩凰凰鏘鏘出丹山覽輝金闕振羽翰簫韶九奏動天地苑囿何處無琅玕故山惟有千年鶴海上芝田隨飲啄朝市紛華了不知逍遙常在雲林閣東坡送表忠觀道士歸院先王舊德在民心著令稱忠上意深墮淚行看會祠下掛名爭欲刻碑隂凄凉破屋塵凝坐憔悴雲孫雪滿簮未信諸豪容郭解却從他縣施千金旌忠觀在豐樂橋紹興元年宣撫處置使張浚備秦鳯帥吳玠陳請鳯翔府和尚原三聖廟乞賜額曰旌忠三年張循王俊楊和王存中于臨安府踏道橋東立廟紹興十九年楊和王奏請改賜觀額三十二年徙于覺苑寺故基淳祐壬子燬惟廟獨存寶祐丙辰始建屋六楹詳見祠廟門旌忠廟中興觀在吳山大觀中建東嶽行祠規制略具紹興七年鄉民始合民營葺之二十九年有茹氏者捐資訖成之翼以道觀嘉泰辛酉燬包道成募緣重建扁曰崇道菴嘉定己巳始請觀額紹定辛卯嘉熙丁酉仍燬趙安撫與歡議徙他所不果乃即其地改卜北向建廟淳祐壬子趙安撫與􅊸又易向而東明年理宗皇帝御書東嶽之殿四字以賜天明宫在吳山忠清廟後嘉泰中建承天靈應觀在吳山之巔舊故天地水府三官堂紹興間改冲天觀紹定四年燬端平三年重建㫖改賜今額仍建梓潼帝君行祠淳祐十年㫖增建玉皇上帝寶閣至德觀在吳山之巔渾儀臺側即十一曜太嵗堂也元𨽻太史局紹定四年燬羽士請以為廬端平三年成御書其扁曰至德之觀清源崇應觀在吳山寶祐元年蜀士夫牟中書子才等陳請云大江發源實自汶江清源真君廟食其土治水之績為世大利朝廷春秋祀享神實作配㫖就吳山卜地建廟御書清源崇應之觀清源之殿顯惠觀在吳山寶祐間蜀士仕于朝者議建奉顯惠真君香火以為禱祈之地鶴林宫在城內俞家園慶元乙卯旱順濟觀道士劉友真禱而雨紹定辛卯即所寓舍為觀請今額咸淳元年太傅平章賈魏公給田三百畝真聖觀在六和塔側寶慶二年道士江師隆創觀有真武像淳祐間摹本上進理宗皇帝御書御製贊見行在所録御製門觀內舊有歐陽公小草秋聲賦歸雁亭詩石刻及洪容齊撰陳鑄城南堂記記文程內翰珌撰觀記云維此衆大號京邑利祿海山無終極湯沸火炎齊與泊斗柄孰揭指羣迷教化宣明惟聖識既先斯道自躬行更表元風為世式用以顯應鎮其西太一萬壽奠其北延祥四聖位東南三茅冲天乃中立惟有西南號龍山殊庭未睹丹霄逼粵昔紫清玉皇君冲融所育並乾坤逮唐宫正紫極名奉之三百久其齡火樹金乘梁得土日食方還明未普江南乃有勳臣鏐戎馬﨑嶇不廢修絳宇丹樓杭獨盛請更紫極為真聖且謂唐人紫極稱專祈薦福徹天庭今欲更名真與聖庶顯羣心知所敬一函朝奏夕風馳五十年間終不振勃興宋德同天垂兵不一刃謳歌歸坐看五季荒殘復化作無懷清淨時祥符三葉膺圖籙軒昊醇醲調玉燭海不揚波天無風一陶萬宇同薰沐九重閶闔布新綸天慶佳名錫又新于時天下崇元館不復當時真聖名朱梁舊扁空山寂錢氏遺基荒草棘開山隆師善根深一念不移如願力偶因善士施金園從此百間新突兀彈壓吳山與胥江萬年長護雙龍闕景隆觀在新門外舊為通元菴嘉定十四年㫖許建觀以舊修內司營地畀之羽士陳永年出力創造寧宗皇帝御書名扁賜有璇璣殿理宗皇帝御書有景命萬年之閣奉今三殿元命玉虛觀在龍山舊為三官院錢武肅王龍德三年置以奉天地水三官祥符四年賜今額建炎初蕩于兵火紹興初始草創紹定六年羽士陳永錫建三清閣淳祐三年朝廷斥賜焉十一年御書玉虛之觀三官之殿八大字以賜明年又舉御馬院餘地盡畀之仍降度牒造景福萬年殿奉皇帝元命觀西有張氏園願以歸修內司遂併行撥賜即其地為三茅殿玉清宫在錢塘門外葛嶺紹定元年東朝降錢造移賜額二年賜田一千畝崇奉寧宗皇帝恭聖仁烈皇太后神御理宗皇帝御書玉清之宫四字以賜後有葛仙翁煉丹臺旌德觀在蘇堤第一橋寶慶二年守袁同知韶創先賢祠徙玉晨道宫于東北隅以供灑掃請于朝賜額曰旌德有西湖道院有亭曰虛舟曰雲錦皆枕湖雲濤觀在西湖南山雷峯塔後紹定四年創移請今額上清宫在西湖雷峰塔北相傳葛仙翁煉丹舊址淳祐間建理宗皇帝御書清淨道場題詠鄭丞相清之二詩云雨餘日腳到天涯十里平山帶晚霞疑是千紅蟠絳闕頓移光景入仙家緑上清仙腹正便便賸納風光似輞川曉雨洗開新岸晚霞蘸出嫩紅天鞭浮野竹數莖筍葉俯秋荷幾柄蓮不是西湖最佳處更于何處著癯仙冲虛宫在錢塘縣履泰鄉紹定中建名寧壽菴淳祐六年移請今額太清宫在錢塘縣履泰鄉龍井山路紹熙元年建寧宗皇帝御書太清宫嵗寒亭及養性二字以賜又有矩玉亭咸淳四年㫖賜惠順賈貴妃充功德院景星觀在臨平鎮紹興十年建東嶽行祠淳熙六年移請今額順濟宫去城四十里在湯鎮赭山之間元係龍王廟紹熙元年移請雲濤觀為額四年旱禱而雨改賜今額嘉泰二年九月錫三神侯爵曰廣澤曰順澤曰敷澤嘉定九年增封曰廣澤靈應曰順澤昭應曰敷澤嘉應觀側有東嶽行祠女冠新興宫在城南衆惠橋嘉定間女冠王景圓捨宅為宫移請今額福田宫在薦橋門裏舊名彤雲熙寧十年改賜梵嚴觀嘉定中恭聖仁烈皇后賜田一千畝改今額明真宫在九里松步司前軍教場之北嘉定中建寧宗皇帝御書明真二字神仙宫在錢塘門外東山弄承天宫在仁和縣赤岸嘉熙中建寧宗皇帝御書承天二字西靖宫在錢塘門外掃帚塢開禧元年建天清宫在西湖青芝塢靈峯之側冲靖大師沈師謙建寶祐五年移請今額靈耀觀在錢塘縣駝巘嶺下紹定中建常清宫在鮑家田沂靖惠王府香火院道堂崇真道院在蘇公堤咸淳四年太傅平章賈魏公給錢創建仍撥租田以贍雲侣其地舊有水仙王廟并以香火之奉屬焉靈應堂在清波門外聚景園前餘杭縣洞霄宫互見大滌山在縣西南一十八里漢武帝元封三年創公壇于大滌洞前為投龍祈福之所唐髙宗時遷于前谷為天柱觀光化二年錢王更建國朝大中祥符五年漕臣陳文惠公堯佐以三異奏一池泉涌一祥光現一枯木榮賜額為洞霄宫仍賜田十五頃復其賦後燬于兵紹興二十五年㫖賜錢重建乾道二年太上皇帝太上皇后乘輿臨幸御書度人經一卷以賜又明年太上皇后復來游淳熙六年道藏成八年賜藏經孝宗皇帝嘗賜道士俞延禧畫古澗松詩光宗皇帝御書怡然二字賜延熹為齊扁寧宗皇帝御書演教堂理宗皇帝賜內帑鑄鐘御書清淨經一卷及洞天福地四大字以賜按真境録云宫有五洞交扃九峯回挹千巖萬谷秀聚其中或泉飛彤厦之簷或雲鎖碧壇之角祥光神異兼木返于春枝撫掌泉靈更丹藏于翠箬誠姑射之令壤歟晉有郭文舉手植三松于殿前時與猛獸遊息其下大中祥符間陳文惠公堯佐領浙漕語道士馮德之曰嘗夢遊山中見仙人顧豫有鼎鼐之稱既大用遂造紫石大香鼎二置于洞前各為銘以表其異元豐間趙清獻公抃再涖郡抗疏引年甲子秋八月忽促騎來游謂道士沈日益曰近于髙齊夢入一山見宫闕巍峩有道士數人出迓詢之曰洞霄宫覺而思之兩典是郡未嘗一遊故冒暑而來今視其山勢亭宇與夢中無異為留旬浹乃去自晉宋以來得道之士許邁而下凡二十有四人詳見人物門亭館潄玉館超然館稅駕館翠蛟亭飛玉亭宜霜亭聚仙亭神異無骨箬峯之下多生紺箬昔許先生邁謂弟子曰吾有金丹藏無骨箬下他日有緣者遇樵者採箬而歸率不見所謂無骨者及㸑則數得之搗藥禽山多異禽其最異者僅有其一晝隱夜鳴莫得而見其音清亮徹旦不絶殊類杵藥聲重榮木宫外有櫟木一本其大五圍舊傳唐咸通二年吳天師種久之枯悴大中祥符五年忽爾重榮陳文惠圖以進地湧泉見後撫掌泉五色雲見後祥光亭銘記陳文惠公二鼎銘其一曰爐之質刳中起烟人之體虛心養元不用之用自然之然爐兮人兮兹謂道焉二曰山之髙兮巉巉出雲洞之深兮幽幽宅真鸞鶴一瞬鳬鷖百春安得而往葆光嗇神氣陸太史游撰洞霄宫記造化之初崑崙旁薄一既分天積氣于上地積塊于下明為日月幽為鬼神聚為山嶽海瀆散為萬物萬物之至靈為人人之至靈為聖哲為仙真而道為天地萬物之宗幽明巨細之統此虙羲黃帝老子所以握乾坤司變化也其書為易六十四卦道德五千言隂符度人西升生神之經列禦冦莊周關尹喜之書其學者必謝去世俗練精積神棲于名山喬嶽略與浮屠氏同而篤于父子之親君臣之義與堯舜周公孔子遺書無異浮屠氏蓋有弗及也臨安府洞霄宫舊名天柱觀在大滌洞天之下蓋學黃老者之所廬其來久矣至我宋遂與嵩山崇福獨為天下宫觀之首以寵輔相大臣之去位者亦有以提舉洞霄而超拜左相者則其地望之重殆與昭應景靈醲泉萬壽太一神霄寶籙為比他莫敢望在真宗皇帝時始制詔改宫名賜金寶牌又賜仁和縣田四十五頃以奉齊醮悉除其租賦至政和間宫以歷嵗久穿壞漫漶徽宗皇帝降度牒三百命兩浙轉運使復興葺之嵗度童子一人為道士建炎中又廢于兵火髙宗皇帝中興大業聞之當寧嘆息乃紹興二十五年以皇太后之命建昊天殿鐘經二閻表以崇閎繚以修廡費出慈寧宫梓匠工役具以修內步軍司中使臨護犒賜狎至既不以命有司而山麓之民亦晏然不知有役一旦告成金碧之麗光照林谷鐘磬之作聲摩雲霄見者疑其天降地涌而神運鬼輸也可謂盛矣及上脫屣萬幾頥神物表遂以乾道二年自德壽宫行幸山中駐蹕纍日敕太官進蔬膳親御翰墨書度人經以賜自有天地即有此山殊尤之迹今乃創見慶元六年九月葆光大師宫都監潘三華與知宫事髙守中同知宫事水邱居仁以告游曰願有紀以為無窮之傳游以疾未能屬稿同知宫事王思明及其徒李知柔踵至以請會遊被命紬史又不克成嘉泰三年四月史成奏御乃能叙載本末如此且作銘曰在宋祥符帝錫帛書乃作昭應比隆河圖元豐景靈列聖攸居元祐上清以祝帝儲祕字煌煌焕于天衢徽祖神霄誕彌九區逮我髙皇省方東吳眷言天柱鎮兹行都警蹕來臨神明翊扶乃御幄殿穆清齊㡡天日覆照雨露涵濡迄今遺民泣望屬車三聖嗣興光照聖謨千礎之宫鶱騰太虛傑閻鴻鐘震于江湖肆作誦詩億載不渝天曹侍郎叔逺撰新鑄鐘記聖天子握符御極敬愛民遇雨暘稍愆禱于群望所至感格其靈績最著者則杭之大滌也是山居洞天三十有四為天柱福地距行都三舍御前崇奉有年矣宫宇宏壯獨闕巨鐘一使命絡繹奏聞上思所以揭䖍表靈乃紹定己丑月丁亥有㫖命鑄仲秋己未告成夫也山川流峙雲氣出沒神明所以代化工而施利澤霓棟橫空鴻音徹漢聖天子所以鎮名山而昭丕貺也神有顯功上有垕報此殊庭盛事可無紀乎載考圖籍唐大律中有神應鐘台之黃岩因禱旱酬德鄉人每以驗晴雨經建炎煨燼聲弗逮初開禧邊帥畢再遇于淮泗獲景靈舊鐘漕臣黃犖求置之大滌亦既舁止然物久則敝剝極宜復其革故鼎新必須時應數邇者宸命既頒幣出內帑工擇國良賜度牒以資其費融兼金以美其質衆槖一鼓大器立就其形不侈不弇不厚不薄其聲不石不播不柞不鬱鐘成樓亦加肆殆時數之偶歟近臣劉世享承命庀事盡畫宣勞圖形以進天顔闓懌猗歟盛哉聖天子嘉惠名山與先朝賜田臨幸匹休于無窮矣夫形而上者謂之道形而下者為之器鐘器也而道寓焉倘能因器以求道則銷去礦錯保合粹和內明外寂力到功深窮邃徑于華陽侍宸逰于月殿服猛獸于岩前藏金丹于箬下自然山川呈瑞神物薦休鳯鳴髙岡龍蛻幽穴清泉沸井祥光燭天所謂人傑地靈豈昔有而今亡耶無已則澄神寡欲體道修真庶幾善人以多嘉祥自應雨可請暘可祈尚無負于清朝欽崇之意乃若聽考擊于晨暮昭報稱于薰修祝聖壽而保皇圖與洞天福地同其長久者又不待言諭也而吳寶學泳撰演教堂記盤古開闢宇宙天先成地後定故都天之號柱于八極者三不周以北存而弗論可也惟灊山之東杭山之南積氣溫厚有雙柱峙焉以其上通太微之室故曰洞以其中伏三辰之根故曰天柱道家者流好言天與帝而不以地對蓋維持主宰者在上地不過承之而已洞霄舊號天柱觀而演教堂則又接天柱之乳而流出道德者也先是堂列大門外傳者曰神營化造不類目巧之室殆未可知也後遭兵燬更創于正殿後紹興肇其迹開禧奐其宇端平又峻其基室虛而白楹廣而閒雌霓抱梁陽馬承楄堂之背叠石作巘曰聚仙亭翼步櫩而上曰方丈室耽耽乎廣厦真可談混元論黃虞矣矧惟我髙宗皇帝曽手書度人經以鎮清真之場孝宗皇帝御製古澗松詩以尊不老之道玉宇扁于寧考金幣錫于慈皇今主上又敕命冲妙師大明董集斯事列聖修道崇教何其盛也堂甫成大明羽化而師孫處道與監宫大年及大欽述師之志綜其本末求記于潼川吳泳泳曰汝知所謂堂者因教而有堂耶所謂教者因堂而有教耶向者堂敝教亦敝耶今者堂新教亦新耶吾與子言堂有成壞而教無新故仙聖之所重惟教耳然聖人以身教也真人以神聽也以身教故不恱道之華以神聽故不逐言之迹今營一畝之宫築環堵之室既勤朴斫又塗塈茨輪焉奐焉惟欲其美而身有玉廬心有絳宫脾有黃室肺有皓庭面有赤宅耳有三門喉有十一樓兩肩有紫户青房七竅有金闕玉鑰皆自己之堂也而不能媺也指三洞十二部為教母綜五笥七十笈為道樞勃勃啓于珠口團團走于環中便以口之所授為演妙耳之所聞為證真而自有此山以來隂陽之浸昏曉之割日月之相觸雷霆之相蕩飄風暴雨率創于無雕烟鏤霞復歸于朴鳥啼而林幽則動中有靜龍蟄而霧滃則寂中有感變通而為四序流形而為品物不宰之宰不神之神皆自然之教也而莫之悟也處道曰若爾吾記則歷劫以至于今千聖之户庭荒矣雖然吾復為子通之老氏之學與佛者籠罩誕謾之說不同根以清淨虛明行以慈儉忠孝其無為也無不為也近于易不爭也莫之爭也近于謨谷神之說近于虛受嬰兒之喻近于若保修養而引年近于祈天永命真誥謂性與道合由道之體近于中庸王子謂一氣孔神于中夜存近于孟子若夫淮南原道之極至于和與性便父無喪子之憂兄無哭弟之哀童子不孤婦人不孀獸胎不殰鳥卵不殈則又吾孔門家法也作是堂已玉眸詵詵豈無望道而欲見者倘能味法如蜜調心如絃滌神識如鏡為善無近名為學不躐等雖有拱璧駟馬不能易吾進退之心則聖真在已不必問鄰矣霞子妍之哉雲孫瑩之哉舍洪文忠公咨䕫撰檀越施田記洞霄距行闕三而近翠華臨幸舊德典領延緌寺貂榮禱旁午望出璇臺珍館之右星冠羽衣來遊來處常不翅數百千指九霞八景晴霏濕翠朝攬夕挹充然自得而主其徒者每皇皇懼無鞅數衆之弗克淡唐中葉嘗賜觀莊田一所國初錢氏籍以歸有司祥符中賜仁和田一十有五頃除其租紹興創通明殿于宫之東偏又嵗有常餼以給齊祭列聖􅉼育之恩至矣賜田中更多故僅存磽瘠嵗入不足支數月都監宫事龔大明語其徒王思明王大年前是住山潘君三華尚能斥槖裝賣曹橋田以繼粟吾徒可坐睨寬鄉上腴大家腐陳丐彼有餘補吾不足庶幾我疇我耕我庾我積以裕我後之人怡聲勸相堅力經度其志卒以酬畏壘既壤姑射且熟鼓腹升平稽首萬壽欲與是山相為無窮來諗豫為記夫道行乎天地之間日用飲食何者非道先王以是生養天下一夫授田百畝于耜築場有其時紏笠趙鎛有其具堅好穎栗舂揄釋蒸有其成墻屋有桑疆畦有果蓏柵有雞豚沼有魚鱉身勤于所養心安于所止一毫無待于人此王道所以為盛也世降道裂始有食非其力者浮屠氏幼而辨能撼人以禍福塍陌綺錯鉢巾雲趨所在皆是而為老氏之學者大抵以清淨無為為宗須于人者狹故其廬聚不能十佛之一雖名山藏室大洞殊庭號稱海內之望亦往往微常産以自殖其教然也于其教清淨無為之中而能謀長以殖其衆可不謂難乎雖然樂與餌過客止道淡乎其無味視之不可見聽之不可聞而用之不可既耳師之說然也繼今不以口體為心害宜有進乎淡而無味者余家天目之陽去天柱為近間當分半席叩之施者生有祈死有薦其姓氏畝石並附見碑隂云題詠陳文惠公堯佐詩一帆髙掛出紅塵萬仭長歌入紫雲莫道遊仙便無侣玉清冠蓋許同羣谷口停驂上翠微五雲宫殿闢金扉不知何處朝真會却見龍鸞隊仗歸二天封部稼如雲流水清寒出洞門更愛林間盤石上松花飄落羽人樽蕭蕭紅樹碧峯前為愛桃花入洞天偶逐霓旌才百步却憂人世已經年絶趙清獻公詩龍穴藏身穩泉源撫掌清紅塵人慮白日世長生我分諳沖寂誰能顧利名空皈休指笑今作洞霄行間蘇文忠公詩上帝髙居愍世頑故留瓊館在凡青山九鎖不易到作者七人相對閒庭下流泉翠蛟舞洞中飛鼠白鴉翻長松怪石宜霜鬢不用金丹苦駐顔為前生我已到杭州到處長如到舊遊更欲洞霄隱吏一菴閒地且相留陳丞相堯叟詩回合烟光叠翠屏東南山水此為靈鶯花春學蓬瀛樹樓閣夜干牛斗星古檜森羅燒藥灶彩雲飄灑聚仙亭遼天俯近歸期鶴澥谷旁連駭巨溟紫陌紅塵無一㸃緑毛仙骨有千齡錢景諶詩清夜宿瑶宫雲開天柱峯千岩空洞月萬籟古壇松仙馭聞鳴鶴琅輿想六龍朝元步虛罷祥吹引林中瓊入谷初無路山蹊九折回紫庭藏玉室碧落抱臺溪水人間見桃花源上開祇因有仙骨得到洞天來月洞天三十六大滌上清房物外外外雲烟古仙家日長溪流分玉醖岩穴産靈香須信風塵表棲真自有方今方干詩早識吾師頻到此芝童藥犬亦相迎師一去無消息花洞石壇空月明精戴石屏復古詩髙枕清流卧白雲靈龜骨相鶴神凡為九鎖山中客多是羣仙數內人三沐三薰來訪道一觴一咏共談真祥光亭畔蒼松下更借清風洗俗塵天柱峯頭一振衣雲開巖路雨晴時登臨欲訪神仙事紀述都無漢晉碑拍手數聲龍井躍篝燈一覽洞天竒林間安得棲身處欲煉金丹餌玉芝老劉子澄詩青山鎖斷紅塵路石柱干霄藏洞府蛟據窟不可窺千古流泉替渠舞真墟容我輒躋扳心曠方知白日閒飛仙一去忽已逺坐對松梢雲往還髙䟱寮似孫詩洞門金畫翠琅玕杏不多花月溜寒借得御書經日讀松風洗盡石棋盤雲氣常常在上峯松生仙骨盡成龍不通名姓誰談道却得雲邉兩度逢洪忠文公咨䕫贈石室朱修行詩響泉一𣲖落天風人在浮雲柳絮中亭午柴關猶未啓碧玲瓏底拒霜紅落葉堆中折腳鐺白雲煮盡又還生洞門黃鶴婆娑舞留得松風待月明塵王學可亞夫詩天柱峯髙萬壑分故留九鎖限棼泉飛窗牖長為雨日上岡巒半是雲洞擘隂崖通逺岫石生暗暈作奇紋聖朝每為民祈福絶笑求仙漢代君超然館洪忠文公咨夔宿超然館聞鐘太一相過燭未銷朝元鐘動鬱羅蕭身輕不怕瓊臺滑蹴踏青霞上斗杓翠蛟亭鞏栗齊豐詩木石相因依妙處在得水遇其相合時澗蹙水多止巍巍天柱峯雙洞空無底怪石抱山回灌木參天起青蛟走玉骨元脉貫石髓屈折暫得伸掀舞如掉尾亭成是何年不陋亦不侈秋深泉少縮亭影照清泚忽遇水飛流亭在銀濤裏怒蛟捲亭去相拒不盈咫一落墜兩谼力竭勢方已終疑入江湖赴海日千里昨夜山雨豪梧竹盡風靡轟雷與石鬪蛟怒幾欲死吾亭方晏然清曉見窗几因携一樽來與客相料理賸擬畫將歸題詩却留此如趙南塘汝談和幽亭枕蒼峽雲竇通細水百折建瓴㶁㶁鳴不止客來一抽鑰白霧噀岩底倐翕千丈蛟拏空翠濤起天開渾沌竅日洗盤古髓諒匪畜池鱗多應化雷尾馮陵氣易壯怖蕩辭難侈術假金洞元影逾瑶臺泚誰云逰方外巧異緇塵裏坡仙頗年數覿面猶尺咫采句貴自然鞏言良是已珍題豁靈界篆出番君里道人亦多事浮念何時死豫生嗜泉藪痼習牽硯几太息動靜幾于何寄冥理醉倒臥滄浪煩君更評此山趙顯父彥假和天下名洞天有山必有水餘杭水窟神仙所棲止仙人乘雲去玉蛟留潭底至今雷雨夕蛟睡時驚起爪擘崖石裂石罅滴乳髓涓涓泉流出半垂白鳯尾風來琴筑響月照瓔珞侈曲折納深池徹底清且泚築亭當澗衝木石相表裏翠壁潤含烟層峯去天咫道人幻出竒指顧猶未已忽驅蛟赴鬪瞬息八百里怒氣挾奔霆草木為披靡兒童驚震掉面若稿灰死逹人本大觀談笑自隱几須臾群動息靜坐窮物理水石本無心相激一至此兩趙蹈中汝譡和衆峯抱蒼龍蟠屈環翠水放之崖間奔洶不得止濤瀾生席上雷雹轉石底恍疑天柱搖將拔隂洞起蘇公雄氣壓詩骨得山髓指揮驅鯤鯨赫奕動箕尾紛紛下土人蟻蛭自豐侈驟觀目睛眩筆墜汗流泚坐令空谷嘯聲徹霄漢裏君來松根吟仙者相去咫老蛟破鎖出餘怒猶未已决開澗千丈散作霧五里今年溪湖乾草樹生意靡寸泉落山苖靈藥起重死遺吾雲子飯報汝青玉几野人尋泉竇筒壞方復理泓然山巔池冬夏常若此洪忠文公詩壯杉耄檜護嵌空飛墮蜿蜒白玉虹莫道隔凡元有柱胡麻麻麻流出石矼東晴雷碾破白雲窩無數林華衮下坡好把轆轤翻轉著崑崙頂上卷黃河觀張斗野韞詩道人鎖蛟天柱半客來縱蛟作奇飛風動地輷晴雷雄拏怒攫石欲開明珠萬斛撒成雨忽起㳅雲入銀浦仙田種玉耕春烟潤流九里無凶年問蛟飛去何時還道人仰笑意自閒月中携手聽潺湲天柱廨院在縣西南半里大溪之際後唐長興四年建舊名法華廨院至唐咸通八年立為天柱廨院今號洞霄廨院洞晨觀在餘杭界係洞霄廨院至道宫在縣北三十里曹橋鎮之西唐文明元年建舊名福田治平二年改今額臨安縣紫陽宫在縣西北四十里梁大同二年建太清宫後改為天清大中祥符元年改賜今額元寂宫在縣西四里唐乾元中建舊號鶴林觀大中祥符元年改賜今額冲虛觀在縣西一十五里晉時郭文故居也後唐同光四年吳越王建為真君祠大中祥符元年改賜今額崇道宫在縣北二十里相傳唐若舉白日上升即其地為神仙宫唐垂拱四年建治平二年改今額清修觀以下女冠在縣西北三里梁乾化元年建治平二年改賜今額新興女冠宫在縣西北三里梁乾化元年建舊號龍德後改今額於濳縣至道宫在縣北四十五里天目山龍池之下唐天成四年建舊名天目宫治平二年改今額無極宫在縣南二十五里舊志載昔有大徐五寶華真人小徐五含青真人得道上升以其所居宅為宫梁朝名西靖宫治平二年改今額慶元六年移額縣東一里南陽山張真君别廟之東集真觀在縣南四十里舊志載漢天師道陵所生之地元名生仙宫治平二年改今額觀即天師故宅山有丹井尚存許逰觀元在縣西一里有仙人許邁丹井邁嘗隱于此紹興二十六年道士劉冲素請移觀額于縣東二里桃源山重建富陽縣妙庭觀在縣西一十五里舊號明真治平二年改賜今額世傳董雙成故宅今山下多董姓天聖中道士朱去非發地得丹鼎覆以銅盤承以琉璃盆盆破丹亦飛去紹興初建香風堂玉笙菴里人謝伋取李白月華詞名之嘉定中令程珌俾道士王以存移今殿復舊丹壇建新樓于其左紹興初道士董元行掘土得銅牌長寸半有字云我有蟠桃樹千年一度生是誰來摘去須問董雙成字畫清楷其隂有王母乘鳯雲中淳熙丙戌修殿方丈後取土得銅盆三足兩耳側小竅二腹皆鞭暈不類今之模製題詠坡詩人去空山鶴不歸丹亡鼎在世徒悲可憐九轉功成後却把飛升乞肉芝琉璃擊碎走金丹無復神光發舊壇時有世人來䑛鼎欲隨雞犬事劉安丹霞觀在縣東北一里政和元年朝㫖建神霄玉清萬壽宫下院宣和元年改賜今額乾道四年令陸楠重修觀基乃舊真覺院也崇元觀在縣東一十三里淳祐己酉遷于縣西三十五里地名龜川元陽觀在楊漲淳祐七年移建崇親思孝宫初道士李仲端于大源山建崇壽殿紹興二年有㫖崇奉本命嘉泰元年敕以為崇親思孝宫紫霄宫女冠在大元山去縣南三十里前有一石世傳三官下馬石靖康丙午女冠清妙虛心大師孫千霞與其師宋道録自中都來止有山前一夕里人見祥光上騰初結茅以居久之遂成宫觀雅潔幽爽亦縣之勝概也紹興十三年賜今額新城縣景德觀在縣北二里政和七年建請景德觀舊額有葛仙翁浴丹井鹽官縣葆真菴舊在縣西南三里乃馬自然得道之所邑人乞立宫觀宣和二年賜葆真菴額紹興二十三年令劉偉移于縣東二里與嶽廟並昌化縣上清宫在縣東紹興元年余大辨建八年請上清宫舊額咸淳臨安志卷七十五
