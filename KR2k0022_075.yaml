body:
  text: 咸淳臨安志卷七十六宋潛説友撰寺觀二寺院在城明慶寺在木子巷北唐大中二年僧景初建為靈隱院大中祥符五年改今額中興駐蹕凡朝廷禱雨暘宰執百僚建散聖節道場咸在焉淳熙十四年六月嘉熙四年七月皆以禱雨車駕臨幸理宗皇帝回鑾撤蓋甘雨隨至平章喬公行簡獻詩賀上用韻以賜見御製門又御書明慶二大字淳祐六年重建法堂御書南山道場為額景定三年建閣藏御書扁曰宸奎萬壽之閣咸淳三年建祝聖大佛寶殿寺有蘇文忠公書觀音經碑及題識大智祖師書彌陀字碑法喜堂明碧軒並淳祐七年重建題詠王荆公安石為僧修廣作法喜堂詩浮屠之法與世殊洗滌萬事求空虛師心以此不挂物一堂收身自有餘堂隂置石雙嵽嵲石腳立竹青扶疏一來已覺心膽豁况乃宴坐窮朝晡初憶幼時勇自許壯大看俗尤崎嶇豐車肥馬載豪傑少得志願多憂虞始知進退各一理造次未可分賢愚會將築室及耕釣相與此處吟山湖之沈內翰文通詩圂圂學佛者營營良足悲不知佛樂誰使汝學為廣師吾州秀智解乃天資既以法為喜萬緣脫若遺髙客堂滿座妙語破群疑來者豈不辨辨此堂之題王荆公寄題明碧軒詩明碧軒南竹數叢别來江外幾秋風道人無復人間世嗟我今為白髮翁趙忠簡公明慶僧房夜坐月明窗竹冷橫斜坐看風燈落燼花老眼病餘嫌細字枯腸寒食怯清茶囊空豈是久為客夢短其能飛到家但有流年尋鬢髮蕭蕭蓬葆颯霜華仙林慈恩普濟教寺在鹽橋北紹興三十二年僧洪濟大師智卿造賜今額隆興元年賜隆興萬善大乘戒壇額淳祐三年賜淳祐萬善大乘戒壇額又賜寺額及飛天法輪寶藏額皆奎畫也六年賜御製鐘銘見御製門寶祐元年賜內帑錢造大佛寶殿開慶元年降錢買嘉興府田二百畝餘賜名豐禾莊寺有蘇文忠公書金剛經石碑太平興國傳法寺在佑聖觀東先東京太平興國寺有傳法院紹興初普照大師德明隨駕南渡乞建院淳熙二年慧辨大師智覺奏請始賜太平興國傳法寺額淳祐七年賜以御扁及飛天法輪寶藏六字大中祥符寺在禮部貢院西梁大同二年邑人鮑侃捨宅為寺舊名發心唐正觀中改衆善神龍元年改中興三年改龍興本朝大中祥符初改賜今額舊傳寺基廣袤九里有竒南渡初斥為軍器所留西南隅建寺餘地多為民居有諸天千佛二閣為本寺子院大鐵塔一大青石塔二在軍器所作院小石塔二一在寺門內一在居民家大鍋一闊一丈二尺在祥符酒庫又有法華塔端拱元年僧文定建咸平二年賜名戒壇院觀音像唐龍興寺碑大覺禪師塔錢王九百九十眼井今所存者無幾題詠東坡上元祥符寺觀燈詩紗籠擎燭迎門入銀葉燒香見客邀金鼎轉丹光吐夜寶珠穿蟻閙連朝波翻熖裏元相激魚舞湯中不畏焦明日酒醒空想像清吟半逐夢魂消又祥符上元僧可久房寂無燈火云門前歌鼓鬪分明一室清風冷欲氷不把琉璃間照佛始知無盡本無燈曽南豐上元遊祥符寺云月明如晝露華濃錦帳名郎笑語同金地夜寒消美酒玉人春困倚東風紅雲燈火浮滄海碧水樓臺浸逺空白髮蹉跎歡意少強顔猶入少年叢千頃廣化院在木子巷北開平元年吳越王錢氏建舊名千頃大中祥符九年改今額中興後為臨安府祝聖道場所慶元六年僧善彬建張真君行祠六觀堂僧了性作性精于醫善草書東坡嘗為作六觀堂老人草書歌垂慈堂了性所居室守趙清獻公名之仍為作詩敘其療病濟人之功慈化大師塔銘即了性右皆不存題詠東坡草書歌物生有衆乃有滋夢幻無根成斯須方其夢時了非無泡影一失俯仰殊清露未晞電已俱此滅滅盡乃真吾云如死灰實不枯逢場作戲三昧俱化身為醫忘其軀草書非學聊自娛落筆已喚周越奴蒼鼠奮髯飲松腴剡藤玉版開雪膚遊龍天飛萬人呼莫作羞澀羊氏姝參寥子千頃廨院觀司馬才仲道墨詩濛濛春雨暗村橋竹裏禽啼婆餅焦度谷倦聞車軋軋穿林愁聽馬蕭蕭細窺陳迹僧坊靜默想風流鄙吝消浮魄沉魂今已矣無人為作楚詞招淨住院在觀橋東後梁時建舊名慈光錢氏改今額南渡初以其地為禮部貢院寺分為三一曰淨住寶閣律院一曰淨住教院一曰淨住大院舊有丈六彌陀寶閣開寶仁王寺在七寶山先是東京開寶寺有仁王院僧慧照大法師曄隨駕南渡紹興五年奏請權建于七寶山主大內祈禳事紹興三年始賜敕額嘉泰甲子紹定辛卯一再燬僧祖仁重建端平元年尚方鑄鐘以賜淳祐元年御書寺額以賜三年賜田三頃景定五年又燬太傅平章賈魏公施度牒給省劄市村重建記文程直院公許撰重建寺記仁王院舊𨽻東京開寶寺藝祖皇帝六龍御天沙門智曮奉敕興創奕葉纂紹至慧照大師法曄領徒從髙宗大駕南渡奏疏行闕請即錢塘七寶山改建主大內祈禳事如故典制曰可五傳而為文坦嘉泰嵗甲子以居民火延燬坦議起廢而未暇也綿十有七祀易四主僧逮及祖仁以坦嫡傳得次補念先志未就慨然以肯堂自任不數年浸復舊觀再燎于紹定辛卯之季秋瓦礫堆阜諸比邱衆託身靡所祖仁仰天而泣籲曰凡囿形數成壞有時惟大願力歷劫無盡矧兹梵剎肇開寶朝以心傳心同一悲濟河沙可算虛空可量而此至仁不可勝用誓以堅忍期復闕初申祝帝圖配天其永今皇帝嗣履大寶祗畏于天顯民碞躬寶儉慈內帑羡儲絲粟靡耗有以祖仁所發𢎞誓轉而上聞帝若曰嘻兹惟我祖受佛心印貽後之人忽而弗圖寧不忝厥紹亟命司藏輦畀金幣為之經始豪貴風動叶相其成古石佛像觀音臺殿宏麗與三門鼎立相望雲堂丈室庖湢帑廩選僧之所作務之寮繚繞周圍纎悉畢具萬石龍􅙇架以層樓晨昏鏜鞳則端平元年尚方之製作也六字飛白揭之前榮奎璧焜耀則淳祐元年宸翰之賁飾也三頃上腴擇之餘杭香積屬饜則三年上命之頒賚也清淨檀施佛所護念乃若經律論鈔覆以寶藏運以飇輪金碧莊嚴天龍圍繞儼然雙林一會未散無非宫闈錫豫及近侍之臣捐金喜捨出納具圖籍可覆考也祖仁殫勞土木幸訖于成介靈隱禪者宗禮謁直學士院臣公許曰仁王名寺加以開寶紹熙詔旨與聖天子藻翰罔不惟皇祖是憲匪但為宗門龍光而已子執鉛槧直禁林盍為之記期以塵靈增益海嶽臣稽首拜手作禮稱贊昔在覺皇在靈鷲峯為波斯匿等説菩薩摩訶薩現諸王身化導之事住百佛剎修百法門等而上之為千為萬為億為百億千億萬億為百萬徽塵數百萬億阿僧祗微塵數乃至不可説不可議從初一地至後一地自所行處及佛行處修證具有階降化利各有多寡然以甚深般若波羅密多照見一切法皆如則隨所應現利樂有情最初發心與正覺無相殊未可以差别觀也然則佩法王即位天王位為天下一切衆生之所依怙非佛菩薩本所誓願疇克擔荷贊寧僧録對藝祖言見在佛不拜過去佛豈亦有見于此乎梵語釋迦牟尼華譯曰能仁由今觀之唐末五閏豺狼恣睢生齒凋耗大聖人者作揚仁風掃其荒穢灑甘雨蘇其疲瘵揭慧日爍其齒昏然後天統以正地維以張人極以立惻隱一念施及無窮歷三百年銷眚厲卻魔怨繫人心奠國步莫非此念之推也豈若蕭梁李唐諸君規規乎因果報應名相有為者比哉大梁夷門佳氣欎積安知嗜殺之醜徒不為我驅除六飛吉行言啓故都奠九鼎于中州復宏規于開寶梯航萬國仁壽八荒盡十方世界同一道場無有一衆生非我眷屬顧瞻吳會岌立寶峯以智眼觀奚别逺近可使職方氏擅會稽維揚之鎮豈惟奉髙宫聞山呼萬嵗者三先佛世尊住三昧定證我所説真寶不誣于是祖仁偕其徒侣殫指贊嘆歡喜無量請以斯文伐石摹刻昭示未來天長淨心寺在甎街巷南晉天福四年錢氏建舊名天長大中祥符元年改賜今額寺址故廣袤其徒流水相授支𣲖漫演中興析其地大半為軍寨寺日就荒茀咸淳元年主僧寶月大師惟福重建佛殿棲鐘之樓方丈之室咸一新之智聖院天福二年錢氏建舊名衆安治平二年改今額南渡後秀邸以其地建家廟僧衆分居今處永福院嘉定中移請舊額淳祐中主僧祖園重建今為嗣秀王香火院淨戒院在太一宫道院之北龍德二年錢氏建舊名青蓮大中祥符九年改賜今額紹興二十年建祚德廟乃以春秋二仲祠祭屬焉吉祥院在文思院東乾德三年光祿大夫檢校睦州刺史薛溫捨地建寺南渡初斥為文思院軍頭司惟小寺僅存舊傳寺地廣袤最多牡丹名人巨公皆所遊賞具見題咏題詠蔡端明探花詩花未全開月未圓看花俟月思依然明知花月無情物若使多情更可憐蘇公詩人老簮花不自羞花應羞上老人頭醉歸扶路人應笑十里珠簾半上鈎又吉祥花將落而述古期不至今嵗東風巧剪裁舍情只待使君來對花無語花應恨直恐明年便不開又述古期明日同至因用前韻同賦仙衣不用剪刀裁國色初酣卯酒來太守問花花不語為君零落為君開又惜花吉祥寺中錦千堆前年賞花真盛哉道人勸我清明來腰鼓百面如春雷打徹涼州花自開沙河塘上插花回醉倒不覺吳兒咍豈知如今雙鬢摧城西古寺沒蒿萊有僧閉門手自栽千枝萬葉巧剪裁就中一叢何所似瑪瑙盤盛金縷杯而我食菜方清齋對花不飲花應猜夜來雨雹如李梅紅殘緑暗吁可哀又自跋云錢塘吉祥寺花為第一壬子清明賞會最盛金盤綵籃以獻于座者五十三人夜歸沙河塘上觀者如山爾後無復繼也今年諸家園圃花亦極盛而龍興僧房一叢亦奇但衰病牢落自無以發興耳昨日雨雹如此花之存者有幾可為嘆息也濕又冬至日逰吉祥寺井底微陽回未回蕭蕭零雨枯荄何人更似蘇夫子不是花時肯獨來暇後十餘日復至云東君意淺著寒梅千朵深紅未裁安得道人殷七七不論時節遣花開那又吉祥寺僧求閣名一首過眼榮枯電與風久長得似花紅上人宴坐觀空閣觀色觀空色即空廣慧院乾德元年薛溫捨宅建舊名報國羅漢院大中祥符初改賜今額普慧院在餘杭門裏舊名安仁治平二年改今額淳熙七年重建翔鸞院在餘杭門裏後唐清泰元年錢氏建舊名普光天聖間重修治平二年改賜今額建炎三年燬惟佛殿存其後次第興建咸淳三年始告偹普照院在艮山門裏匡武亭天福八年錢氏建舊名報國千佛院大中祥符六年改賜今額淳熙三年重建妙慧院開運元年錢氏建舊名華藏治平六年改賜今額中興後以其地為御園徙今處七寶院在鹽橋東舊在七寶山貞明七年錢氏建舊名上方多福大中祥符初改今額舊有六遊堂元祐中名賢逰者六人逸其姓氏臨輝閣王冀公欽若有詩聖果寺在包家山舊在鳯凰山之右錢氏建有介亭排牙石石同事見本門中興後以其地為殿前司寺從今處崇聖塔在鳯凰山絶頂七級髙二十餘丈晦夜常放光明景祐初僧慧然建慶歷初郡守鄭戩奏賜號崇聖塔石佛梁開平四年錢氏鐫彌陀觀音勢至三佛于石上蔣之奇詩曰巋然三石佛若在嘉州岸題詠王荆公遊聖果寺詩登髙見山水身在水中央下視樓臺處空多樹木蒼浮雲連海氣落日動湖光偶坐吹橫笛殘聲入富陽到唐僧處默留題聖果院路自中峯上盤回出薜蘿江吳地盡隔岸越山多古木叢青靄遙天浸白波下方城郭近鐘磬雜笙歌又僧題萬松嶺上一間屋僧占半間雲半間向曉白雲行雨去回頭却羡老僧間梵天寺乾德中錢氏建舊名南塔治平中改賜今額中興後僅存小寺今地近有塔幢者皆故基也釋迦真身舍利塔吳越備史云錢武肅王于明州育王寺迎釋迦舍利建塔于城南顯德五年火開寶元年忠懿王重建錢氏納土舍利入京置在開寶寺金銀書大藏經吳越忠懿王建大藏經五千四十八卷碧紙銀書每至佛號則以金書牙籖銀軸製甚莊嚴靈鰻井一名聖井詳見井門題詠梵天寺僧志詮小詩云落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨惟聞犬吠聲又入青蘿去東坡一見為和其後曰但聞煙外鐘不見煙中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去新又東坡寒食遊南塔寺寂照堂云城南鐘鼓鬪清端為投荒洗瘴塵總是鏡空堂上客誰為寂照境中人紅稀掃去風驚曉緑葉成隂雨洗春記取明年作寒食杏花曽與此翁鄰廣嚴院在御厨南營裏後唐清泰元年錢氏建于七寶山舊額瑞隆治平二年改賜今額中興後分寺基為御厨營景定初主首惟一重建記文王架閣應鳯撰重建寺記杭之寶山有仁祠焉其初曰瑞隆後唐清泰二年所建也逮治平更號廣岩熙寧間蘇文忠公遊而樂之為賦雙竹湛師房及新開徑諸詩林間煙雨清坐忘憂固已形在江湖而身超祇鷲矣自六飛駐蹕析其地十之八為內饔胥徒之居則履綦轍迹略無可考其在淳熙有僧善資者復蓇之廢地得鐘焉有銘在欒則寺故物也既燬于辛卯而俗以銅鐘名其寺或笑曰是亦鐵爐步之比耶且佛之道大且尊宫而居之必曠如也兹近市而湫隘則非廣近市則非嚴幾于名與實戾惟伽藍劫燼而不滅古井冽寒而如新草創庳陋僅蔽風雨無復仙人碧玉壺之勝概豈以法界為室宇以戒慧為墉户此中空洞自有廣居不待七寶莊嚴而實相常在乎一日過市見壞衣不飾皇皇有求者問之則寺之主首惟一也則又曰昔有雲闍黎不出十五秋師曷與雲異一曰不然出處雖殊致喧靜而皆禪使一當雲之時亦不出矣雲居一之地則有求矣住山出山本無二法自吾師祖慶居是山謀斥而新之尚方長秋皆有賜惠順妃亦如之時太傅大丞相魯公閫東淮施加厚亦既建閣五楹以奉圓通功垂成而飛錫下卓足不越户限者六年而終惟一嗣之丕勤誘掖欲成吾師之志纍積銖黍經始尋尺庶幾先賢勝踐倣佛既存倘亦嗒然如雲則功廢矣余聞而歎曰化人之居與纍塊積蘇非有非空維摩丈室與師子坐無小無大顧宅心何如耳世固有身郊而心市者真離誕勝士羞稱之慶與一師弟身市而心郊不緇囂塵以鳴衆力巧于用狹興于久廢于閣之下為殿像設位置咸與地稱摩竭之室法音之樓爰及庫藏庖湢器用悉偹蓋堅忍精進皆有過人之材吾徒之飽食安步者或愧焉且自謂與雲不異又知動靜之為一源夫鐘之未撞本無聲也無聲之聲不依形而存則銅鐘之名非贅也湛師與二竹君今皆安在回視介然之徑亦已茅塞所遇孰非夢豈獨雲哉湛也雲也慶也心與竹俱空即空皆實相無作之作可無記也一來請益勤曰蘇公能無言而不能無詩子又奚辭遂書以遺之題詠東坡題雲師壁并序云去年秋偶逰寶山上方入一小院閴然無人有一僧隱几低頭讀書與之語漠然不對問其鄰之僧曰此雲闍黎也不出山十五年今年六月自常潤還復至其室則死葬數月矣作詩題其壁詩云雲師來寶山一住十五秋讀書常閉户客至不舉頭去年造其室清坐忘百憂我初無言説師亦無對酬今年復叩門空房但颼颼云已滅無餘薪盡火不留却疑此室中嘗有斯人不所遇孰非夢事過吾何求空又詩云七尺頑軀走世塵十圍便腹貯天真此中洞渾無物何止容君數百人用又寶山新開徑云藤梢橘刺元無路竹杖棕鞋不扶風自逺來聞笑語水分流處見江湖回觀佛國青螺髻踏遍仙人碧玉壺野客歸時山月上棠梨葉戰暝禽呼僧善建題詩云垂手紅塵古所難近天尺五闢禪關玉繩低轉簷楹外宫漏微傳几席間雲響度聲何處笛翠稜當户越州山夢回露滴松梢冷月在三茅萬境間寶月院在寶山龍德三年錢氏建舊名瑞像大中祥符元年賜今額寺西有黑龍潭潭今在內侍續氏園諸天閣華嚴院在井亭橋西晉朝賜額華嚴中燬紹興三年僧守卓始建佛殿旨賜舊額梁丞相克家書華嚴經一部建輪藏淳祐三年又燬唯大士銅像儼然守趙大資與􅊸重建仍作亭相國井上安國羅漢院在井亭橋西相國西井淳熙十一年請移鳯凰山安國羅漢寺為額寶祐五年燬景定四年重建光相壽昌院建隆元年錢氏建舊額光相大中祥符元年改賜今額中興初以其地為祕書省其徒分居今處大覺院元係光相院建炎初以其地為祕書省僧分居今處嘉泰四年移請城東大覺為額祥符教寺在祥符橋北元係祥符寺舊基分建千佛閣安福院在軍器所東紹興五年六月以祥符寺舊基分建淳祐七年重造千佛閣係三藏法師隨駕南渡建立景定四年移請安福廢院為額百福院天祐中錢氏建舊名資壽大中祥符中改賜今額乾道五年徙城中棚心有古井二壽寧院唐咸通三年建舊名法昌淳化三年改賜今額吳山智果院吳越王錢氏建舊名石佛祥符中改賜今額中廢止存星宿閣嘉泰間燬以其地為進奏院撥賜寶積廨宇及扁鵲堂建寺興福院紹興初左丞薛昻以花藥圃施吉祥慧觀大師師肇築菴曰擇勝續創寺宇移請龍山興福院為額百法廣潤院在忠清廟南舊係僧寶寧創百法菴淳熙十四年移湧金門外廣潤院為額上方院後梁貞明七年錢氏建舊額上方多福大中祥符中改今額顯法院在大瓦北元係吳客三真君廟嘉定間請今額崇壽院天福九年錢氏建舊在崇新門外中廢淳熙二年徙今處奉慶院在􅄵西舊美俗坊嘉泰元年僧師智移請今額淨安院舊為永壽廨院嘉定四年僧智雅建紹定五年移請今額能仁寺在涌金門裏嘉定元年移請長橋側廢寺為額按舊志能仁寺在糯米倉廣順元年吳越王錢氏建舊額承天政和四年改賜今額于四溪法華菴白蓮慈雲院元係西北流寓嘉泰中重建題詠陸放翁慈雲寺小憩詩橫閣院東偏翛然佛榻眠香濃煙穗直茶嫩乳花圓巖倚團團桂筒分細細泉憑誰為題版榜作小壺天瑞雲院在吳山中興觀後元係西北流寓寶積廨宇嘉泰二年移請今額千佛寺元係安福菴嘉定元年移請今額上生院天寶元年建建炎初燬嘉泰中僧了華重建靈智院在七寶山舊為聖水菴有觀音岩出泉能療民疾嘉定二年移請今額紹定間重建定水院在修內司營前舊為觀音菴嘉定八年移請今額報恩院在萬松嶺上寺壁有寒山拾得頌濟書記題紹定三年御前宣取顯教院舊為華嚴院紹興二十三年建乾道五年移請今額大佛萬壽院在漾沙坑舊為大佛廨院元係西北流寓紹興初建嘉定二年移請今額國泰院舊為極樂廨院紹定四年移請北山廢今額廣壽慧雲禪院在艮山門裏白洋池張循王之孫鎡捨宅為寺紹興元年賜今額廣濟院在淳祐倉北舊為顯祐王廟開禧二年移請今額淳祐九年斥為淳祐倉别建廟宇安福院舊係福順大王廟淳祐六年移請今額真濟院在梅家橋西無礙院在親事營東門南舊為西北流寓崇福菴淳熙四年移請今額報國院在薦橋東舊為香林廨院紹定間移請今額淳熙五年重建妙喜資福院在水巷東舊為妙喜菴紹興初建慶元六年移請今額崇恩延福院在鹽橋下八界巷北舊係西北流寓濠州鍾離縣孔雀妙明寺淳熙十四年嗣濮王請為功德寺改賜今額國清寺在通江橋四條巷舊係西北流寓吉祥巷慶元二年移請今額方等院在祕書省前寶祐六年移請今額寶山院在旱河頭嘉泰間建紹定間鄭丞相清之重建奉五顯祠咸淳臨安志卷七十六
