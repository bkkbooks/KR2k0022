body:
  text: 咸淳臨安志卷七十七宋潜說友撰寺觀三寺院城外自慈雲嶺郊臺至嘉會門泥路龍山浄明院自郊臺齋宫入天福七年吳越王建舊額廣濟祥符元年改今額院有易安齋梅巖亭高宗皇帝紹興二十五年親郊車駕臨幸有御製梅巖詩孝宗皇帝時在潛邸恭和韻時並見御製門舊有笻舄亭江月菴題詠徐樞宻清叟用御製韻千年奎畫照蒼霞酬唱官梅竹外斜恭想皇靈天闕上歸疆猶惜洛陽花梅又偶因祀事訪丹霞寺古山深石徑斜衝凍細尋信息枝頭喜見状元花鄭丞相清之詩齋宿虚間只浄明俗氛暫洗覺身輕半山雲脚炊烟濕一枕松聲澗水鳴對語老禪真法語譯經新諦出僧檠歸翻貝葉蓮花頌猶帶招提月影清龍華寶乘院開運二年吳越王仁𢎞佐捨瑞蕚内園建仍造傅大士塔大中祥符九年改今額有司馬温公祠堂相傳兵部為守時温公常來省侍司馬兵部題名司馬池周騤錢聿石再寳陳嘉謨謝伯景馬元康同㳺此寺康定元年中秋二十四日元翼題天華寺清泰元年吳越王建係鏡清禪師道塲舊名千春龍冊大中祥符中改今額寺舊有頥軒妙音樓感業寺乾徳三年吳越王建舊名天龍大中祥符元年改今額建炎三年兵燬惟木觀音存勝相院開成四年建舊名龍興千佛寺治平間賜今額建炎冦燬止存五丈觀音像及閣記文程中書珌作寺記曰予比年焚綺硯不復作羨語今壽來千里留之不去者逾月勉即其録而次第之其錄云寺負錢塘龍山唐開成四年建曰龍興千佛寺後有西竺僧曰轉智氷炎一楮袍人呼紙衣道者走海南諸國至日本適吳越忠懿王用五金鑄千萬塔以五百遣使者頒日本使者還智附舶歸風鳴海洶舟且傾智誦如意輪咒俄見如意珠王相十首八臂度高十丈風息遂濟智謀掲髙梁可容十文勝相以荅佛施時千佛寺乃僧光主之有閣髙八丈光請于忠懿以閣為殿立五丈之像者二合為十丈皇朝治平中改賜今額建炎間燬于臘冦惟勝相一閣屹然雲際不墮刦火紹興初光之孠孫曰清中興之清有子琦珍珍之子性奕世經理乃克大備乾道間光堯皇帝聖子神孫三殿臨幸頒賚甚渥由是聲益振今師壽者性之法子也清峻自厲壮髦一日架鐘繚廊宿仆盡起金碧輝煌増光疇昔致䝉東朝出内帑賜之風􅏒遐邇舍予日至且有施田以惠無窮者嗟乎現十丈無影之形而奪海航之人于魚龍之腹要為奇事至于動三殿之臨幸感東朝之恩錫尤豈偶然哉自是此山當為錢塘勝境福被民生當與長江為量數矣偹末之功等乎開山然則壽也實屹立乎三百九十四載之下來者勉諸紹定己丑仲夏大通院顯徳二年吳越王建舊名顯明治平二年改今額天真院龍徳元年吳越王建舊名登雲臺大中祥符元年改今額山頂有靈化洞深入百餘步下濶十餘丈有臺曰登雲錢武肅王置道林院廣順元年吳越王建舊名普濟大中祥符元年改今額大慈寺乾道九年僧徳殊建接待院淳熙四年移請今額般若院乾道四年吳越王子秦王建寶惠院天福二年吳越王建舊名普濟太平興國中改今額長慶崇福院嘉定七年皇叔祖太師和王請充功徳院妙覺院顯徳元年吳越王建舊名妙能治平二年改今額奉聖院開寶元年吳越王建舊名廣福大中祥符改今額水燈廣教院廣順元年吳越王建舊名多寶大中祥符元年改今額真覺院開寶八年建舊名奉慶大中祥符元年改賜今額題詠東坡次韻曹子方龍山真覺院瑞香花詩幽香結淺紫來自孤雲岑骨香不自知色淺意殊深移栽青蓮宇遂冠簷蔔林結為楚臣佩散落天女襟君持風霜節耳泠歌笑音一逢蘭蕙質稍回鐵石心置酒要妍暖養花須晏隂及此隂晴間恐致慳嗇霖彩雲知易散鶗鴂憂先吟明朝便陳迹試看丹青臨魏又同劉景文賞枇杷詩緑暗初迎夏紅殘不及春花非老伴盧橘是郷人井落依山盡岩崖發興新嵗寒君記取松雪看蒼鱗字牡丹松檜一時栽付與春風取次開試問壁間題客㡬人不為看花來日長尋卧劉景文次韻云夏木有餘緑山僧知勝春榻花落㫁㳺人紅斾來雖晩清風到亦新成林盧橘熟翠羽雜金鱗勝參寥子次韻云脫畧今山簡能吟舊子春偶因尋出不為採芳人紅紫千葩盡甘酸萬顆新江雲浮翠壁靄靄散魚鱗法雲院開運元年吳越王建舊名資崇大中祥符中改今額崇先襲慶寺在貌門開慶元年賜今額充皇叔祖少師嗣濮王櫕所興國院在貌門淳祐十二年建寳祐五年移請今額壽聖接待寺在龍山下閘頭寶祐二年醫僧保和大師得寧建接待雲水請今額有觀音泉施水亭記文黄檢閱震寺記自有天地以至于今其始無一日一事不趨于實而天下之所資以為天下者漸以備矣則反又無一日不轉而趨于虚嗚呼異哉其殆始于周之衰乎人之初生惟憂飢無以充爾寒無以禦爾震風凌雨無以芘而疾痛無以為治療爾人生而漸衆則又憂相争相奪之無以禁相親相接之無以敘遺忘之無以記而交易之無以志要約爾它豈其所預知縱他有新奇詭異非常可喜之說亦何救吾實利害也哉天生時地生財凡可救吾實利害者幸已無不有而非聖人則不能致其用聖人者作乃教之食教之衣教之宫室以興其利教之醫藥以去其害而又教之書契從而明三綱五常以經紀人極凡皆人生㫁㫁不可一日無者也皆實者也自羲黄堯舜積而至成周然後漸以大備嘻亦勞矣亦至矣盛矣何可復加毫末于此矣奈之何風氣日開人偽日滋而議論日以勝實之極虚之始時則有若荘周列禦冦之徒食享吾之成而不憂飢也衣因吾之有而不憂寒也宫室居矣不憂風雨而疾痛有藥不待嘗試百草之辛毒也生長于君臣父子之常習于禮樂文物之懿而不復知其得自别于禽獸者皆聖人繼天立極開太平力也于是倨傲鮮腆付天地萬物于一噱而戲言之盡反天下之常以為怪盡嗤鄙人生之㫁㫁不可無者以為不必有竊嘗譬之家之方興祖父銖積以有田廬以知詩書以明訓其子孫為子若孫者不知稼穡之艱難乃諺既誕反笑祖父之無聞知起而馳馬試劒一切從事無益或妄意神仙黄白之術飄飄乎自謂常乘雲帝郷而不知家則索矣談虚者之關世變何以異此後數百年而有西域佛氏之說來其初本以慈悲不殺戒人㫁惡修善而止未㡬世降而晉又降而元魏荘列之說益以泛濫則又溢而勦入佛氏中以其前日紛亂吾聖人之常者而紛之謂善惡為無二謂有心而修善為不可謂無心而殺人為無傷以一切掃除佛氏之初說世既日趨于虚不惟佛之徒習之不悟士大夫類亦浸淫其說以為高而世變如江河益滔滔下矣明溥師大成本佛者也一日介予同年進士徐君徳玉託予記龍山壽聖寺之成乃曰此吾以醫藥之贏為之也初吾法海大師以醫藥濟人三衢猶慮施之未廣也至吾祖保和師得寧來行都傳吾父慧觀師正果以至大成今三世皆益以藥醫濟人而人信之故雖不求贏而贏反多則慨然曰我固以藥昌矣如吾徒之憧憧道途何乃相地徃來之衝負山揖江起寳祐甲寅積十年而成屋數百楹既又曰屋則可至如歸矣如至者無以飯與居而守者無以衣何乃買田吳門千畆買山朱橋數百畆既又復曰吾徒則安矣如過吾前而暑渇者何乃又鑿井得泉名觀音而為亭覆之併使得休䕃其下盖無一非醫藥之贏之為亦無一非醫藥濟人之心之推也余聞之曰然師之事善矣足恢佛氏之初說矣然則實理之在天下亦豈容一日泯者哉置之屋附之田園而醫藥肆之列通都如舊是飢必不可以無食寒必不可以無衣芘風雨必不可以無其屋而疾痛必不可以無藥石也祖孫三世恪守以迄于成且請于朝以甲乙相傳子孫世守之而名之曰祝壽人聖殿閣翬飛齋廬冰浄粥魚飯鼓濟濟就列而又托文墨以誦述之是君臣父子之常必不可廢禮樂文物之懿必不可闕皆實也自荘列而下日趨日盛之虚徒口說耳如以其說也士大夫亦不免淪于虚如以其事也雖佛氏亦終不容不歸于實是尚不足以自反乎抑思得以成此者醫也予聞佛之稱醫王稱藥師非必如今神聖工巧之謂而救人心之病之謂也方今人心之病孰大于談虚試以此語療之可乎永慶寺在貌門充楊節使香火院紹定三年燬景定四年重建一自龍山六和塔沿江至南蕩富陽縣界祖塔法雲院開成二年欽山法師建舊名資慶開運二年改仁壽太平興國六年改今額題詠東坡病中逰祖塔院詩紫李黄瓜村路香烏紗白葛道衣凉閉門野寺松隂轉欹枕風軒客夢長因病得閑殊不惡安心是藥更無方道人不惜階前水借與匏尊自在嘗崇徳院開運二年吳越王建舊名尊勝治平二年改今額有古佛殿或傳魯班造元祐中圓定禪師善本奉詔住東京法雲寺東坡有送行詩題詠東坡送行詩寓形天宇間出處會有役淡然都無營百年何由畢山林等憂患軒冕亦戲劇我來即歸休師寧便安逸王城滿豪傑議論分黒白聖諦第一義對面誰不識師來亦何事孤月掛空碧是身如浮雲安可限南北出岫本無心既雨歸亦得林泉有舊約何年掛瓶錫無相寺廣順二年建舊名真相治平二年四月改今額大觀間生律師塔于寺後寳祐三年重建咸淳四年改賜壽相寺有會正堂紫芝岩右有靈鰻池熙寧七年久旱郡守沈起禱之至晚大雨今號靈澤龍王池法顯院長興三年吳越王建舊名慶恩治平二年改今額永慶院太平興國二年吳越王建舊名崇慶治平二年改今額法華普濟院廣運中吴越王建舊名法華大中祥符元年改今額廣澤院天福六年吳越王建舊名甘露治平二年改今額普安院顯徳四年吴越王建舊為安吴塔院治平三年改今額真教院天福四年吳越王建昭定廣福院天福六年吳越王建舊名昭定熙寧九年改崇聖紹興三十二年改今額安真院開運四年吳越王建舊為安真菴治平四年改今額興善院天福八年吳越王建舊名積善治平二年改今額普澤院顯徳六年吳越王建舊名靈源治平二年改今額孝思慈顯院淳祐元年建定慧院天福五年吳越王建崇福院紹定五年建專充接待記文李秀岩心傳記龍山崇福禪寺者紹定壬辰開山僧宗明所剏也在杭都之南浙江之上郭璞所謂龍蟠鳯舞指其地也建炎以後自川陜荆湖閩廣陸道入京者皆渡濤江而來由西興抵龍山最為冲要而傍江東西曽無次舍之地行者病焉明雖方外士而慨然有濟人利物之心前是十年首建明化寺于西興以為延待徃來之所及是又剏于龍山已而浸至衢建泉福南劍諸州為寺者二為院者四為菴者二十有三起衢逮劍凡山溪之險峻皆平治之買田種山以贍守者俾祁寒暑雨之際勌思憩渇思飲者各有所之盖其所接納行道之人咸及焉匪及緇黄而已既又推其所為病者有藥死者有竁厥惠浸廣人多稱之合菴寺供給之所資田之以畆計者二千有七百園林之在山而以畆計者千有六百稻米之以秤若斛計者四百盖以子本之錢嵗入有差皆明衣缽之所自營未嘗求諸外也崇福既成旋被堂帖俾其徒世守之御史府文移閩浙部使者下令申飭焉明復因新會稽郡通守鄧甥殊求予文以為記余考先王盛時及民之制甚備郊遂都鄙之間十里有廬二十里有市薪蒭委積所在隨之盖濟窮補乏而使行旅樂出于其途實王政之一事非但邦郊為然也逮及唐季猶有巡宫至于國朝亦著驛令渡江多事此制殆廢雖士大夫或露宿風飡之不免明也以一浮屠氏乃能彷彿昔人之遺意舉有司之所未暇及者而盡力以行之豈不可尚哉嘗聞河南夫子因㳺僧舍值其食時顧而嘆曰三代禮樂盡在是矣夫子之歎盖有感也余願學夫子者福田利益之報非所敢知顧以其能充惻隠之端似可為國家仁政之助而士君子之得位者又因以勸則王制可以漸復此予之所以重感也于是乎書慈恩開化教寺開寶三年吳越王就南果園建寺造六和寶塔以鎮江潮宣和燬于兵紹興二十二年北僧智曇以衣缽募緣重造十載始成隆興二年賜今額有秀江亭金魚池題詠東坡六和塔送張吉甫赴閩漕詩羨君超然鸞鶴姿江潮欲下還飛去空使吳兒怨不留青山漫漫七閩路門前江水去掀天寺後清池碧玉環君如大江日千里我如此水千山底蒋之竒金魚池詩全體若金銀深藏如自珍應知嗅餌者固自是常鱗冲師閘溪水軒詩欲放清溪自在流忍教氷雪落沙洲出山定被江潮涴能為山僧更少留靈泉廣福院開運三年吳越王建舊名靈泉治平二年改壽星紹興三十二年改今額有靈泉一泓覆之以亭顯聖院天福中吳越王建舊名顯瑞治平二年四月改今額小浄明院開寶七年吳越王建舊名浄亮後改今額顯親慶逺院淳熙二年建内侍甘氏香燈院旌忠報先禪寺劉鄜王功徳寺紹興十二年賜今額慶善禪院舊號百丈山皇祐二年夏英公竦請充功徳院改今額舊志有迎雲亭百丈亭正觀亭養髙堂今皆廢慈嚴院太康間葛稚川捨宅為寺上元間賜額恩徳天成二年吳越王重建大中祥符二年改今額記文曽旼院記餘杭郡南走四十里有山曰雲泉其寺曰恩徳考之于傳則是山者晉葛稚川之舊居也考之于詩則是寺者唐白杭州之舊游也稚川翁棄俗塵如敝屣而與先聖儷游杭州君以文章有時名而以俗人自愧則是山之所以為聞山者二子發之也元豊建元之仲夏予與昭武虞君用晦暨陽劉君李朴自郡聫鑣來訪是山依半墜之朽崖盤垂屺之峻嶺而下蹈落潮之沙涉溢澗之水步枯彴憩荒館凡經日而後至焉則其來之勤也可知矣及瞻吳山則雖蒼翠孱顔然無與他山異也行其寺則雖棟宇輪奐然亦與他寺等也而山有二穴焉一破山骨面天如突習習清風熟而出一在山麓下芘如屋泠泠清泉源源相續則是山之勝在此二穴而已方是時也火雲流空炎暉方酷居以煩愠行以暍毒而予三人方披襟乎風岩頮面于水谷側耳以聆風之清聲拭鼻以納風之芳馥玩水之清淺而濯纓激水之潺湲而置足盖不知夫天地之有時燠也東南營營杭為大城水陸所會舟縱車横陌中之塵常鼔而不盡渠中之流無時而暫清而是山盤石不動羣峯無聲松竹轉白日之清音禽鳥依茂林而和鳴音迹既逺恬無所驚盖不知夫城市之有紛争也而今日之客仕隠相半仕者畏簡書居者顧舍館于是乎喟然相與而嘆則惜其去之之速而不但忘其來之之勤乃相謂曰是山之勝如前所言㳺者之適也然以久生為羨者知有稚川翁之利而已以愛閑為髙者知有杭州君之名而已其㳺皆未免乎適人之適者多矣寥寥嵗年之間其趣與予三人者合有不知其㡬何人也則予之三人者雖須臾之適而其嵗月可以無記乎乃起而屬筆于予又曰向之所謂不知夫天地之有時燠者是山所獨也所謂不知夫城市之有紛争則凡山之所同而是山亦與有焉耳今日之來其趣盡于此歟又不然先民以為觀水有術則是風岩水谷獨無觀乎夫積不勝以為大勝者風也以天下之至柔馳騁乎天下之至堅者水也故是風是水之所當出雖山之堅石之頑其能禦哉今日之觀仕者體此以御時之消息居者體此而循理以出處豈特視聽身意于須臾而已哉則經日之來鞭轡之困亦又以為無負矣乃握筆而記之題詠許刺史渾詩樓臺横復重猶有半巖空蘿洞淺深水竹房髙下風晴天疎雨外秋樹㫁雲中未盡平生志孤帆又向東風祖無擇詩恩徳傳名乆慈嚴賜號新樓臺甚半闕水憶長春客有披襟者時無洗耳人清音發鐘磬翠色混松筠住合登仙籍來宜出俗塵經年嗟倥偬半日喜逡巡席上詩情逸樽中酒味醇匆匆又歸去自愧使君身真空院開運三年吳越王建舊名雲岫熙寧元年改今額寶相院天福九年吳越王建大智院建隆三年吳越王建舊名靈智治平二年改今額法寶院天福中吳越王建舊名華嚴大中祥符元年改今額常樂院在范村塢乾徳三年吳越王建崇覺報親院大觀三年少宰劉正夫請為功徳院改賜今額法華院乾徳元年吳越王建舊名靈溪治平二年改今額法性院乾徳五年吳越王建舊名彌陁大中祥符中改今額明性院開寶元年吳越王建舊係涌泉菴治平二年改今額真際院乾徳四年吳越王建舊為静慮菴又曰定慧菴大中祥符中改今額寺有五雲山及天井保壽院開寶七年吳越王建舊名萬壽治平二年改今額紹定乙未重建記文趙直院汝談作寺記出臨安城而南沿江西行十餘里又支行逗入山崦五里峰巒錯峙前後環立如屏障複重保壽院于是在焉院山源發天目龍行騎奔𣲖為五雲又别為保壽之山鞍旋鐙廻至是始就坦迤四旁諸山聫絡迴繞如拱如顧如與左右輔翼皆秀媚可愛此保壽山之大畧也院剏始不可考惟額乃治平二年所賜夫以此山之勝建為寳坊浄刹宜其粥魚齋鼔傾動一方而香火寂寥人跡罕到大雄氏之宫鞠為藜藿鼪鼯之墟院僧或浮寄他舍數議興復閴無應者永嘉薛君始徙籍錢塘疎通而喜施僧聞亟見具以復院告属君有悼亡之悲乃捐錢二百萬俾議興葺且以資其室人冥福材葦既集斤鐵叢輳閱月堂廡畧具然力殫粟乏不績于成乃議鬻寺旁閑地君復高其估值酬之為葬金氏之地凡院之田若山估而入于豪家者皆按其籍貲復之而歸諸寺由是傾者畢支敗者畢葺級之闕者亷以正塗之榛者甓以廣屋之廢不存者宇而增壮凡丹黝彩堊之漫剥黯闇者一鮮明之始稱其為佛菩薩仙佛之廬然予聞瞿曇之學本以苦空寂嘿離物觀心以求所謂圓覺了義視其身如夢幻泡影猶且不顧而况土木色相變滅俄頃又幻之尤者于釋氏何有然世奉佛者必高敞𢎞麗如仙宫化人之居而後已豈象法之傳欲先敬信而後可與入道不如是不足以起其敬信與今薛君又以資福于其室夫福豈由外鑠得非欲因一念之精致其敬慤以求著存使幽爽不昧而後福為可致與然則荘嚴梵唄雖非所以求福而一念之精由是以積則所謂福者盖不離乎荘嚴梵唄此佛之徒所以極其嚴麗與薛君之樂于施舍者其意固出于此與薛君名夢桂常預進士舉以文字㳺諸公多愛重者故予記寺之興并及寺之僧幹緣者曰圓曰源其興役以乙未十月迄工于丙申之三月棲真院乾徳五年吳越王建舊名雲棲治平二年改今額保聖院開寳三年吳越王建舊名報國大中祥符中改今額悟空院建隆元年吳越王建舊名龍門治平二年改今額建炎燬于兵淳熙十二年重建布金院開寶三年吳越王建舊名天柱治平二年改今額隆慶院淳祐元年建惠泉院廣順三年吳越王建舊名靈惠治平二年改今額廣福院開運三年吳越王建舊名寶福熙寧元年改壽聖寳福紹興三十年改今額舊志有淵堂噴月泉集福院建隆元年建安定院建隆三年吳越王建舊名廣福治平二年改今額建炎四年改剏定明院建隆三年吳越王建舊名界石治平二年改今額澄寂院清泰二年建舊名龍池治平二年改今額自方家峪至慈雲嶺褒親崇壽寺在鳯凰山後紹興十八年建十九年賜褒親崇壽額為劉貴妃家功徳院有鳯凰泉松雲亭觀音洞筆架池題詠吳剛詩云㘭徑石齖梅枝得竹斜舊封妃子墓殘照覺王家亭砌旋風葉岩流出洞花飽叅塵世味得似野僧茶西蓮瑞相院顯徳元年吳越王建舊名西蓮以本院嘗産青蓮花又有觀音現瑞至今尚存身不惹塵錢氏造寳幢二于殿前紹熙間貴妃黄氏葬焉廣慈院乾徳四年吳越王建舊名廣福治平二年改今額寳藏院長興元年吳越王建有武肅王祠及碑後有古井俗名烏龍井今五王皆祠焉寧親廣福院紹熙三年撥寶藏院前地建舊名報恩廣福為淑妃陳氏香火院紹熙四年正月改今額廣嚴院天福二年建舊名妙嚴治平二年賜今額廣恩院開禧二年八月建賜今額浄教院乾道中僧如浄建賜今額充貴妃蔡氏櫕所安福禪院淳熙四年内侍陳子常請充香火院西林法惠院乾徳元年吳越忠懿王建舊名興慶大中祥符中改今額記文秦少㳺雪齋記雪齋者杭州法惠院言師之所居室之東軒也始言師開此軒汲水以為池纍石以為小山又洒粉于峯巒草木之上以象飛雪之集州倅太史蘇公過而愛之以為事雖類兒戲而意趣湛妙有可以發人嘉興者為名曰雪齋而去後四年公為彭城復命郡從事畢君景儒篆其名并自作詩以記之于是雪齋之名浸有聞于時士大夫喜幽帯尋樂勝選者過杭而不至則以為恨焉杭大州也外濤江漲海之險内抱湖山竹林之勝其俗工巧羞質樸而尚華麗事佛為最勤故佛宫室棋布于境中者殆千有餘區其登覧從游之地不可勝記然獨不至雪齋則人以為恨何也蘇公之才高于天下斥其棄餘以為詞章字畫者亦皆妙絶一時讀而玩之使人超然有孤舉逺擢之意是齋雖褊小無足取稱于人而公所書詩實在其壁士大夫過杭而不能一至其地以寓目焉是豈所謂喜幽尋而樂勝選者哉以為恨焉宜矣昔李約得蕭子雲飛白大書蕭字持歸東洛遂號所置亭為蕭齋予謂後之君子将有聞雪齋之風不可得而見者矣豈特為今日之貴耶言師名法言字無擇泊然蕭洒人也盖能作雪齋從蘇太史㳺則不問可知其為人元豊三年四月十五日記題詠東坡雪齋詩君不見峩眉山西雪千里北望成都如井底春風百日吹不消五月行人如凍蟻紛紛市人争奪中誰信公言似賛公人間熱惱無處洗故向西齋作雪峯我夢扁舟適吳越長廊静院燈如月開門不見人與斗惟見空庭滿山雪咸淳臨安志卷七十七
