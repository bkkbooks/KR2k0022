body:
  text: 咸淳臨安志卷七十八宋潜說友撰寺觀四寺院自南山浄慈至龍井報恩光孝禪寺即浄慈顯徳元年建號慧日永明院太宗皇帝賜壽寧院額紹興十九年改今額中燬孝宗皇帝賜金訖成之既而翠華臨幸嘉泰四年又燬朝廷仍給錢重建嘉定十三年始成閎勝甲湖山獨病逺汲紹定四年主僧法董于佛殿前鑿䨇井淳祐十年建千佛閣理宗皇帝御書華嚴法界正徧知閣八大字景定五年有㫖増賜田寺有慧日閣五百羅漢堂正明二年大鐵鍋舊有慧日峯法華臺銅迦毗羅神像銅深沙神像皆不存記文程内翰珌撰重建寺記西方有異域宫殿皆天化鷲嶺布金園則以人力故惟以人力故則有易與難然而願力堅雖艱亦成就崔巍浄慈山東南推甲乙鉏荒不記年吳越號慧日道潛與延壽相仍坐教席皇皇太宗更號壽寧紹興有制追嚴佑陵載易今名厄度中更佛智道容再堂應真曇宻法進寳殿經營孝宗御歴賜金趣成既成臨幸震動山林嘉泰之四埃于鬰攸退谷義雲載吼龍虯傑閣層空天畫雲浮河沙真諦輟賜龍樓惟是羅漢之林大雄之殿費大莫興星霜㡬換嘉定庚午起禪老崧一顧慨然就振祖風爾議擇材爾謙程工規置堅定一朝屹立都人駭嘆謂出神力無疑廣修尤奉尊者五百鉅人耽耽廣厦功緒方延合而未全乃以小嫌引去翩翩自爾八年住牒四傳漆丹金碧迄未之圓辛已有命以崧再至至不期年始克竣事于是濕紅映地飛翠侵霄簷轉鸞翎堦排雁翅星垂珠網寳殿洞于琉璃日耀題金椽筆聳乎玳瑁良由千秋紀節召入闕庭賜號紫衣殊渥無倫椒殿䆳嚴天賚亦均風動八表歡喜見聞施以金繒川委雲蒸佛行有槖亦復自傾嗟此突兀其工匪易凡二十年始終乃備睠言佛行傳佛照衣有行有法聲傾一時昔去今來了無滯碍以未了故故復重來今既了故所說未了一日杖錫求我說之顧惟天賦寂蔑興墮清幽往來錢塘諸山渺然不記嵗月凡劉道真之所記顧野王之所書鴻漸之所經坤元之所志莫不披宿嵐而挹爽玩夕照以含和或偕釋子道人俱度風篁之嶺或與髙人勝士同登月桂之峯或賦歸而屢宿石橋或乘興而獨飄泠澗或遇葛嶺于北塢或逢仙許于南泉或賡遵式之留笛或聴智僧之長笑或近見法真之張寳帳或遥瞻釋遇之上驪峯盖由前世曽㳺所愧今生失脚已而又循赤嶺過慈雲乃見寳盖威儀隊仗雲行雨布再生彌勒之峯勢就形全雙踞石龍之首更分餘脉復過穿珠一結雷峯穹窿寳塔聳熏爐于前應䕶一氣以中涵三阜横陳雙龍後伏勿輕加于營築庶永閟于靈竒雖然六一居士更有偈言東南地秀絶山水澄清光餘杭㡬萬家日乆聞清香烟霏四面起雲霧雜芬芳其俗事宫室佛屋擬侯王五彩營丹漆四壁金焜煌上埀百寳葢宴坐以胡床南方精飲食玉粒甘露漿晨興未飯僧日昃不敢嘗惟今浄慈林壑之幽宫室之盛羣心之歸視此偈言了無一異但末知雲堂千衆坐卧食息何所解入三世諸佛數千羅漢受此供養果報云何若能以了義度無邉以圓教垂無窮證無生念造不二門食息自如坐卧無嫌至若諸佛以及羅漢能堅初誓化度衆生消一切聲利㫁一切疾苦滿一切願欲昆蟲水旱永絶灾異山河大地悉得安寧則持畣國王大臣是名果報雖然如上荘嚴如上功役猶為有底禪未是離世法須于光明藏中化出白銀地現七寳樓閣如光明如來方實為相一彈指頃遍滿十方如山巍巍永刼不壊以此功徳是為浄慈鄰峯喚起辯才今日同聞知見禪師俗徐氏妙嵩賜號佛印禪師云有鄭丞相清之撰雙井記水于天壤間無所不通然聚焉有會焉舍望洋向若則湖者水之聚江者水之會也錢塘左江右湖湖濵江岸湖之泉皆有所麗而不克以自立方雨盈于澮瀑飛于山濯烟嵐而走塵陌汪洋衍肆可潤而瀦可瀆而注可沚而環也至于遥岑不雲平畦㫁遂水之行乎地中者江湖寔驅而有之或未旱而綆汲匱雖靈山福地不免焉浄慈為寺甲于杭負山面湖出清泚而膠渌浄宜若不嗇于泉也而鏗鯨撃鼉千衲頥哺齋盂茗椀漱風嚥月搰搰乎晨夕之供水之畔湖而私于井者不給則取餘于湖山君恧焉法薫之來馭禪以律而梵榘嚴約衆以已而緇計裕增舊濯新無一或闕定餘周視其庭慨然嘆曰美哉山虖之有斯刹也而猶病于汲以錫扣地而祝曰井于斯泉于斯衆粲然笑謂是信有泉耶薰弗為畫亟召工具畚鍤劚佛殿之前隟為雙井對峙未尋而液未丈而淄及泉而濆涌既甓而泓渟不與時虧溢胥異之噫斯泉之所以異者㴠翠麓之寒清竅靈源而獨出非假道于江而借資于湖也其潛也如遁其見也如期深以蓄其徳高以下其施其猶時立之君子而能擇其人者歟是可尚已薰復崇二亭以賁其上而謁記于予予辭曰孤山六一泉寔歐蘇惠勤之勝迹故以泉名于湖兹泉也固非偶然者若重以記無嫌自詭于先賢乎薫曰天一生水而地以六成之盖未始無配吾將進雙井而友六一則孤山之泉不孤矣否則歐蘇笑人寂寂于記乎何遜余無以辭因識其顛末而繋之以銘云水胎于乾而育于坎凌高沃深不召而感彼悍如恭以血飲兵属韃一呼枯甃儵盈相是幻泉為法之乳寂以心法如子得哺昔泉之閟蟄于九淵垢佛渇祖為薫出焉清夏燠冬蒸雲化雨澤我大地洗衆生苦我笑謂薫口吸西江一滴不嚥付此雙井曹松隐勛撰五百羅漢記臨安都會寔據形勝東連巨浸揖溟渤之空濶西接天目孕山乳之宏秀面朝背負勢兼吴越覆壓千里利盡南服而湖山在其右一水練名岫環叠平碧十餘里旁岸皆僧坊寳社浄慈山報恩光孝禪寺實居其首在錢氏時為永明寺慈化定慧師道潛居之潛有行業一時推重嘗請于忠懿王求塔下金銅羅漢像會王曽夢十六大士從師而行宻符請意因如其求歸于精舍是知多士一旦髙臨于風烟之上者光景固肇于此矣是後智覺壽禪師相繼住持作宗鏡録等數萬言為衲子指南至聖朝神宗皇帝以圓炤禪師宗本大通禪師善本相繼法席英風義㮣聲徹上都詔對殿中名動海内叢林之盛號為南山之冠建炎初寺遭回禄其址坦存褐蕭然遂為荆蓁之地住山者苐辦粥飯已為能事無復有一毫興建意紹興初翠華廵幸暫駐此邦士大夫往往感今懐昔訪尋曩所咸從稍復舊觀日以為念會有薦湖州佛智大師道容住持衆請之容既至開闢堂宇掛塔禪徒魚鼓聲聞一新爽塏又念昔金銅像夢應殊勝且無碍神通有不思議力乃勞心募化㒺憚寒暑能者效勤巧者獻工富者輸財辯者勸施以至行商坐賈田間著姓破慳捨有整平故基創建五百大士釋迦中尊金碧相鮮丹雘有度行列拱對環相序居蕭散契方廣之名荘嚴等石橋之勝榱題煥麗繞以重楹應供之相覺顔間俱有喜色逮及寶幢花幡帳坐供器凡作佛事者靡不畢舉鳩工于癸酉之夏落成于戊寅之春訖嵗五周始即厥緒四方觀者莫不賛嘆規制雄偉像與法稱大江而南得未曽有宜于行都道塲之冠塑者一僧事竟即化原夫湼槃經義謂昔五百商人採寳出海值千盗攘去并剜其目商日夜號痛欲向無所人有告之曰靈鷲佛氏能救汝苦與我重寳引汝見之商且行且捨至大林精舍佛為說法為證阿羅漢果盖其因苦願力普攝無邉散處山林分形顯化作人間福田亦所以示人從生有貪因貪受苦因苦得報囘向正念具大神通成就一切者時勸化有承宣使王公繼先名重一時心存諸佛善緣所在無不導衆心而稱首故兹勝事助緣最于他人自治木塑造装褫修供莫不身親惟興隆之意豈昔因中于儼然未散處自有一種法性不然何皈依嚮導之切也佛智嘗謂予曰物之成毁率繋人念之善惡彼念之不善則寺之殿宇山立岳峙蔽虧日月者可使灰飛烟滅掃地無餘至念之善者慷慨欲復則瓦礫之場化為蓮宇荒穢不治倐爾金碧不疾而速日就有成其于生滅成壊變現須㬰于其中間亦竟何有然所以為不滅計者畢竟不在念外也若至于觀感而化自一郷至一國被于天下後世其利盖可勝言哉心法悉繋于念明矣佛智踐履端粹皆在正受攝相歸性信于諸方屢求文于予予乃摭寺廢興羅漢因果檀那資助佛智竭力及搃費十萬餘緡叙為梗㮣俾覧者具詳衆事于予文施誠不唐捐題詠陳文惠公堯佐游永明寺詩附郭山光峭若𤣥倚空樓殿白雲顛孤軒半出青松杪浩氣疑㳺碧漢邉惜别擬留風外燕傷秋因感雨中蟬人家掩映藏漁浦島樹扶疎没水天痛飲豈同蓮社客狂歌聊許竹林賢㤀形且盡尊前樂休意樓岩與濟川饑東坡寄本長老詩并序僕去杭五年吴中仍嵗大疫故人往往逝去聞湖上僧舍不復徃日繁麗獨浄慈本長老學者益盛作詩云來徃三吳一夢間故人半作冢纍然獨依舊社傳真法要與遺民度厄年趙叟近聞還印綬竺翁先已返林泉何時策杖相携去任性逍遥不學禪云又病中獨㳺浄慈謁本長老周長官以詩見寄和臥聞禪老入南山浄掃清風五百間我與世疎宜獨住君緣詩好不容攀自知樂事年年減難得髙人日日閒欲問雲公覓心地要知何事是無還獨周邠長官詩并序竊聞子贍學士昨日飄然單乘出南屏回至北山窮幽覧勝真得物外自適之趣邠嘗誦歐陽公詩云使君厭騎從車馬留山前行歌招野叟共步清林間然明公今日之樂正得于此因成詩一章上寄云放歸騶騎獨尋山直入青蘿翠靄間謝客杖藜方自適阮公蠟屐許誰攀可愁白髪能添老須信黄金不買閒應向林泉真得趣徜徉終日未經還鄭丞相清之雙井詩水神何時生六融飛出雙泉江練白平湖浸月渺無邊一笑對之成揖客轆轤初動曉星横夜捲寒瓊聲湱湱十年佛殿礎花乾十畆空庭䕃修栢問泉何事逞奇觀故向庭前作真澤昔年何塞今何通泉豈有心猶揀擇若云泉自井中來枯甃㳂山有龜折如信地中泉自見是何年須穿土脉幡風胥動雨無憑細詮此證歸禪伯我方饒舌為作記了不相干勞刻畫寄詩更欲結茶緣付與宗風自鎚拍顯嚴院在雷峯塔開寳中吳越王創皇妃塔遂建院後有雷峯菴郡人雷氏故居治平二年賜顯嚴額宣和間兵燬惟塔存乾道七年重建慶元元年塔院與顯嚴始合為一五年重修咸淳二年于峰頂創通元亭望湖樓題詠趙清獻公謁廣慈師詩乞得隣州樂矣哉雪峯安静此徘徊浙江莫謂音書隔一日潮音两度來時新知越州也普寧寺在雷峰塔下廣順元年建號安吳寺大中祥符初改今額奉成肅皇后香火有銕塔一石塔二浄相院顯徳三年吳越王建舊名瑞相太平興國間改今額紹興初重建佛殿有無盡意閣娱客軒一段竒軒記文倪文節公思撰重建佛殿記由雷峯之隂並湖而行餘里許有院曰浄相背負山麓面瞰平湖松竹森蔚景趣幽雅庭有杜鵑花數本特盛東坡先生所為賦詩也始予在學館遇勝日或休沐時時遊焉盖院占湖山之勝而處地最僻又距城闉不逺此余所以樂數往也當是時院之堂宇雖備而佛殿自建炎燬于兵未克修建主僧師雅指其基謂余曰吾當募衆助而鼎新之期以某年成果成也君為我記之言若無甚難者雖嘉其志許之然意其役費巨未必果如期能成也自是數年余屢膺遷擢事緒滋多無須臾間不至浄相者已久去年春師雅忽造門曰曩所欲建殿今成矣許我記文敢請余疑其成之敏則往觀焉輪奐一新丹雘炳煥中塑像七又圖畫其兩旁皆極嚴麗顧問所以能辦此者則曰吾立志既定堅忍不移隆暑祁寒不辭勞丐謁檀施不憚煩錙銖而累之日月而積之是以役費雖巨而終獲如吾志余又以冗未暇寘思遷延踰年師雅時一造門輒伸前請最為請尤堅余益信其真能有志也人茍有志其何事不立余于此有感焉夫以余昔所嘗游之地又嘉師雅之志而有感且重于食言合是三者記雖欲不作得乎院始于周顯徳間錢忠懿王所剏號瑞相院至太平興國三年改今額宣和中大本禪師嘗敷法席隆興初右街僧録彦觀維持其徒甲乙相嗣三世而至師雅師雅永嘉人禀質純實多與士大夫游有足嘉者殿成于紹熙元年三月記之刻則二年二月也龔頤正書東坡杜鵑花詩貽主僧跋云蘇文忠公賦此詩逮今百餘年雖菩提寺去此不逺未知孰是然此花老榦蕭疎亦意當時物公在頴為詩有醉翁行樂處草木亦堪敬故余于此亦云且書以貽浄相院主僧紹原題詠許參政及之娱客軒詩妙景非聲亦非色非色不應客粉飾東坡妙用去虚空大地山河等兒劇簡齋有句添蛇足雨抹晴粧要娱客皇妃塔邊浄相寺破屋荆榛十年事雅師辦得一片心化出寳坊全體備傑閣巍巍尊大士我已名之無盡意更拈蛇足扁東偏與師餉客為客地東坡仙去可無詩客來了此一段竒未雨未晴還舉似非鬼非仙竟是誰家袁參政說友一段竒軒詩清詩冷閣更佳名一段風太瘦生東老元知有餘樂西湖今可問前盟年來倍覺青山好老去休驚白髪更欲識個中無盡意挑包急急看吾行三許參政及之和詩一段竒中無盡意西湖風月契生只今扁榜成佳話他日尋詩有舊盟得失雞豚隨日了去休鳬雁逐時更痴兒尚欠梅花句已擬長歌出塞行傅公伯壽詩門外紅塵走利名菴中白髪任浮生羨師法窟能深入壓我詩壇已屢盟渺渺水光簾萬里離離梅影雪三更何人薦取真消息試鼔瑶琴一再行處張公抑詩雲山爛熳本難名收拾閒情付此生出自知無上策往來聊欲試同盟門多賢轍人偏静琴鎖師堂嵗㡬更六月岸中來借榻頻遊應不禁船行陳止齋傅良詩齊年兄弟更齊名商畧行藏共此生自昔從君瞻馬首如今輸我與鷗盟讀書松竹交千載曳履星霜數五更為問塞翁誰得失請無一話到留行寳徳院法慧禪師開山楊和王存中舍地創建請今額充三衙建散聖節道塲正覺寺在省馬院内乾徳二年錢氏建舊額羅漢院太平興國元年改賜今額超化院在省馬院内顯徳六年錢氏建塔幢見存興教寺在南屏山開寶五年吳越王建舊名善慶太平興國中改今額詳見南屏山舊有齊雲亭清曠樓米元章琴臺今皆廢題詠東坡訪南屏臻師詩我識南屏金鯽魚重來撫檻散齋餘還從舊社得心印似省前生覓手書葑合平湖久蕪没人經豊嵗尚凋疎誰憐寂寞高常侍老去狂歌憶孟諸楊誠齋題清曠樓詩清曠樓中夕照間落暉殘雨兩生寒樓中看盡南山了又看西湖與北山廣果寺在惠因橋北開寶八年錢忠懿王建舊額香龕大中祥符中改今額有古佛殿紹聖二年造紹興間分省試于兩浙以惠因為大試院廣果為别試惠因藏殿柱刻尚存舊志有虚恱軒棲鳯軒山龕羅漢六通慈徳院在長耳相巷内乾祐二年吳越王建舊名惠徳塔治平二年改今額嘉泰四年充皇子保寧軍節度使櫕所法因院長興四年吳越文穆王建舊額報慈大中祥符元年改今額古屋猶存殿内有古鐵塔錢王古井其水至甘遇旱不竭嘉定十三年充景獻太子櫕所寳林院開寳六年錢鄧王建舊名搃持治平二年改今額乾道三年充荘文太子櫕所香火院有可賦軒題詠張于湖孝祥詩光明獵獵上烏巾不那西湖爛熳春借我繩床對修竹為君一洗輭紅塵修吉寺天成二年吳越王建舊名瑞龍大中祥符元年改賜額今安穆皇后成恭皇后慈懿皇后恭淑皇后櫕宫皆在其地寺内有西湖奇觀南高峯榮國寺天福間建元係塔院奉白龍王祠寶祐五年福王捐施重修請富陽廢寺額咸淳六年安撫潛說友創造華光寶閣門廡齋堂亭臺等屋一切整備且拓徑以便登陟又買官田二百畆為僧供有五顯廣教院在南山方家峪口太平興國二年錢鄧王建舊額香刹治平二年改今額有小南屏山南山昭慶寺長興三年吳越王建惠照院天成三年吳越王建舊名天王大中祥符元年改今額紹興三年㫖充朝廷祭祀齋宫别于西南隅建院正濟院乾徳二年吳越王建舊名普門大中祥符元年改賜今額永慶禪院慶元三年建延長真如院正觀元年建舊名延長治平二年改今額浄梵院廣運中吳越王建舊名瑞峰大中祥符元年改今額清修院廣順三年吳越王建舊額烟霞治平二年改今額有烟霞洞大如屋窈深莫見其極後晉開運元年僧彌洪遇異人指示其處中有石刻羅漢六尊錢氏别刻十二尊足成之洞有巖曰象鼻有石垂下若手曰佛手巖滿覺院天福四年建舊額圓興治平二年改今額水樂浄化院在烟霞嶺下開運間吳越王建名曰西關浄化禪院後廢額徙于南山石塢孝宗皇帝以其地賜李隶因重建佛寺廢土中得錢氏時寺記龕置岩石間咸淳三年今太傅平章魏國公修復水樂勝㮣乃為葺治寺宇還其院額之舊云詳見水樂洞記文大璞未雕性寂則無其執我咸源既泮性生遂有于成身是以四相盛衰三界紛擾本師世雄哀其顛墜憫彼輪迴䜿巨缸而燭幽運廣筏而濟溺立善搆福皆為方便之門舉首低頭盡是可歸之路浄化院者即鍳諸道者之所建也道者永嘉人受業于仙峯䕶國靈隠禪院彌年苦節早嵗勤身着頭陀麄弊之衣修菩薩利樂之行逢緣必作隨處立功建濠河津要之橋梁修府郭壅狹之岐路早臨潭廟中之靈宇宵奉園穹前之浄池其于運力供僧重言化俗苟有一善利于人樂無不為乃曰國王民安君王信向足雲水烟霞之衆缻囊杯錫之㳺其間或有幻相無情塵緣将盡百衲之衣何直周身之具奚求爰尋佛言備得教㫖且西土苾蒭苾蒭尼下至優婆塞優婆夷送往之禮名以闍維闍維之文實火化也棄餘灰于逺水免遺骨于他山牢無煩人置不有地即具以上事達于廟朝剏佛祠于湖山思祈為功徳主上曰六度門中嘗聞喜捨八福田内屢建津梁勤王早立于大勲奉佛素崇于至信聞是善也忻然在懐遂奏勅與請置其所乃于鎮西關之右延壽山之陽郛郭匪遥柴木甚便命開基址式建僧居聖上允俞錫名浄化闍維之道興于此焉由是芸閣勲臣香閨貴戚府郭君子闤闠信人發心無難捨之財集事有易成之力像設畢備舍宇一周香燈含晝夜之輝鐘磬續晨昏之韻仍于院側立此方壇或願闍維不計來衆資其事用給以薪蒸利濟之門無大于此將欲紀録不朽刋刻堅珉海濶山髙莫並有為之福毫枯筆竭難書無盡之功時開運三年二月十日記崇教院開運二年吳越王建舊名薦福大中祥符六年改今額院東有真珠泉廣法院在赤山開寶七年建慶歴中重修有清曠亭後廢淳熙四年開府鄭氏請以為菴額嘉熙四年充皇子齊王櫕宫功徳院大仁院廣運中吳越王建舊為石屋宣和三年改今額有洞曰石屋鐫石作羅漢諸佛像山頂有石菴天成團圓如鑿高丈餘一名天然菴洞崖彷彿有東坡題名傳云黨禁時鐫去咸淳二年創建觀音諸天寳閣太傅平章賈魏公游山題名咸淳三年九月二十八日賈似道領客束元嚞史有之廖瑩中黄公紹王庭來㳺子徳生諸孫蕃世侍記文陳侍郎宜中撰佛閣記南山大仁院廣運中吴越王錢氏建有洞曰石屋因即為名元祐二年改今額洞屋豁闢衍迤凡二丈六尺曩有大知識人鐫洞石作羅漢七百餘尊士民瞻嚮歴載浸乆晶彩阤剥貌像漫漶嘉定間訓武方公俊卜竁瑞峯即院對山也日與主鉢僧文緯者㳺睠言石屋南山勝境不踵前芳林慚澗愧遂鳩工計匠補缺振廢由是荘嚴相貌芒張綵紛過者見者咸以頓還舊觀生歡喜心既而岩罅滴溜滋潤蒸鬰公早夜關心議建寳閣于洞之頂薙榛闢址穿崖引流度材孔將將命斤斧而倐不起有子武經大明愴先志未遂與母安人黄氏謀如家事乃撙費節用鼎創閣宇凡若干楹則嘉熙丁酉之夏也輪奐崔巍如在碧落不増歴級佛地難扳又命僧普照募緣以竟其事則淳祐己巳之秋也二役既畢諸佛尊嚴石屋若闢而宏南山若増而高烟霞松竹若鼓舞而導迎遂為一方偉觀是卜訓武佳城在目武經汲汲于繼志述事之孝且勸施樂誠為大衆作福田利益而已不專焉是不為可書乎惠因院天成二年吳越王建元豐八年髙麗國王子僧統義天入貢因請從靖源法師學賢首教詔許之遂竟其學以歸元祐二年以金書晉譯華嚴五十卷唐則天時譯八十卷徳宗朝譯四十卷共三部附海舟捨入院元符二年又施金建華嚴大閣以崇奉之按本寺題梁云元符二年建而吕惠卿所撰閣記乃云建中靖國元年建今從舊志寧宗皇帝御書華嚴經閣四字及易菴二字賜寂照法師清雅寳慶間建寧廟神御殿及楞麗祝聖期䜟堂續充皇姑成國公主櫕所淳祐十二年有㫖併以廣果院歸焉題詠曹既明有懐湖山留題湖山平生親松竹亦𤓰葛深期說情話跬步成契闊豈無朝夕思或以塵累奪何當淡相從長年席不割法雨院天福六年建舊名水心續改雲龍大中祥符元年改今額三年佛心禪師剏法堂淳祐十二年重剏佛殿鐘樓僧堂廊廡移立鐵塔于法堂前趙清獻公題名資政殿大學士太子少保致仕趙閱道謁法雨禪老己未二月二十三日誌此記文陳天麟撰佛殿記人之性本實而學佛者以性為空性者何倫理是也釋氏明心見性談空說妙紺其宇緇其衣離而父母舍而君臣而倫理之大終不容泯以此見實理無乎不在雖欲異于吾儒之教不可予初㳺法雨荆榛出于垣端不數年先講師支傾補罅予材之未知敬也往來稍稔知其奉母以荅歌羅邏胎育之恩孝養備至擔頭睦州鬼神合爪于是始知其為人因益信實理初未嘗泯而真空不空果非異于吾之所謂教者矧兹寺三百餘年蕪廢之乆一旦殿宇煌煌然法鼓鏗鏗然鐘梵之聲時出于青嵐白雲之上予驚焉曰誰歟施者先曰吾有大功徳尊天降賜僧牒公楮俾中貴人王孝先董役以成此段因緣吾朝于斯夕于斯焚修伽陀于斯于焉報恩以伸華祝予又以知孝親者必愛君均一倫理之實而洋洋然盈天地間凡有血氣莫不尊親空虚𤣥寂孰能違之昔罽賔王持一枝竹挿于佛前曰建立精藍竟佛云如是如是以是精藍含容法界以是供養福越江沙大檀越所施比一枝竹供養福徳可思量不可思量佛如一一法中具法界性一一刹中溥福海法性不空福徳性不空遍法界中無非實理如曰空虚是謂謗法惟兹寺更剏多闕尚冀檀那捐廣大施愈増河沙不可說不可說阿庾多無量福徳毋以罽賔枝竹自多寺晉天福六年建初名水心又改雲龍後改法雨殿重建于寳祐二禩制幹陳巨川捨鑄洪鐘鐵塔乃古婕妤孫氏造植于西偏後移值殿之中唐先講師即今住山都正舊廣果思公上足也思寂後寺併入慧因先公易地建幢斯所謂西没東湧南没北湧思不亡廣果不廢矣來謁記喜為書之法相院天福四年吳越王建舊名長耳相大中祥符九年改今額法興院乾徳二年吳越王建舊名法明治平二年改今額妙浄院乾道五年建保福院乾祐元年吳越王建舊名保慶治平元年改今額浄林廣福院慶元三年楊開府移請為菴額主僧可全創松關南泉芳桂為留憩之地題詠姜白石夔訪全老詩并序嘉泰壬戌上元日姜䕫訪全老于此觀沈傅師碑隆茂宗畫贈師二首深衣跨嬴驂杳杳春山路入寺君未知閑看移桂樹沈碑含秀潤隆畫出神奇道人那得此老子乃眈之絶齋後與全老銛樸翁聰自聞酌龍井而歸賦詩兩四人松下共盤桓研筆花壺石上安今昔興懐同此味老仙留字在孱頑誦年時六月海揚塵遥見青山起白雲聞有高僧來咒岩前抛珓問龍君無垢院光化二年吳越王建舊名無着係無着禪師塔所嘉定十四年移請今額院後有鴉雞岩及仙人臺舊傳有三人入寺㳺有南塢數囘泉石西霞㡬叠烟雲之句人以為仙云事載夷堅志法空寺顯徳五年吳越王建舊名資慶大中祥符元年移額于今處地藏院嘉定二年建崇報顯慶院在放馬塲顯徳四年建舊額棲真熙寧元年改賜壽聖崇寧二年樞宻章楶奏乞充功徳院紹定三年改充皇子永王祈王櫕所龍井延恩衍慶院在風篁嶺乾祐二年居民凌霄募緣建造舊額報國看經院淳祐六年改今額有龍井元豐三年辯才大師元浄自天竺退休兹山始鼎新棟宇及㳺覽之所有過溪亭又曰二老徳威亭歸隠橋方圓菴寂室照閣趙清獻公閑堂在方圓菴東清獻公既掛冠而辯才法師亦退居此山因以名之訥齋潮音堂滌心沼獅子峰薩捶石山川勝㮣一時呈露而二蘇趙秦諸賢皆與辯才為方外交名章大篇照映泉石舊記又有月林堂岩齋風玉軒不知何人所剏龍井古荒刹由是振顯豈非以其人乎互見龍井及風篁嶺東坡題名蘇軾錢勰江公著栁雍同謁龍井辯才元祐六年正月七日元祐庚午辯才老師年始八十道俗相慶施千袈裟飯千僧七日而罷眉山蘇軾子瞻洛陽王瑜中玉安陸張璹金翁九江周燾次元來餽薌茗二月晦日書太傅平章賈魏公題名静菴邱攽賈似道乙未臘月二日來㳺復亨泰侍後三十一年夏閏大丞相魏國公再登揆席少駐湖曲賜第因謁演福來此客廖瑩中陳詩川從子徳生侍記文楊次公撰院記天台宗師辯才浄老坐道塲者四十年指空假中以接人其心契于聖智具戒定慧以行已其徳動于幽潛真有道之士也初住錢塘法惠院之寳閣次住上下二天竺又住南屏山之興教寺往來學徒盖踰萬人分傳教觀多能演其所聞開悟學者師平生未嘗輒有求于人然所至必為四衆依嚮莫不興盛盖其有所致也余在都下時見清獻公與師酬唱偈頌已知師之所存矣及觀蘇子瞻與師詩言其兒初弱不能行因禱師加䕶即壮而能行然後知師功行至矣師一日謂諸徒曰吾筋力衰憊勞于應接安得幽僻處一菴地以養餘年檀越聞之曰辯才師有退居之意吾輩䝉其徳不為不久盍往擇可居之地乃于龍井山得壽聖院敝屋數楹主者不堪其居願人為代以捨去于是請師徒弟懐益主奉香火汲巾侍瓶甲乙相承以嚴佛事其院即吴越王所創國朝賜今額也檀越為師鼎新棟宇不日而成中建尊殿嚴聖像也前有三門示三解脫也鐘鼓有閣警晦明也堂曰潮音信羣聴也齋曰訥欲無言也室曰寂寂而常照也閣曰照照而寂也泉曰冲用不窮也又堂曰閑趙公致政訪師退居二閑人也菴曰方圓不執一也橋曰歸隠退以樂也沼曰滌心淵清徹也群居有寮安其徒也衆山環遶景象會合㫁崖泓澄神物攸宅龍井岩也勢将奮迅百獸竄懾獅子峰也昔人飼虎以度有情薩捶石也修竹森然蒼翠夾道風篁嶺也元豊八年秋余被命陪髙麗國王子祐世僧統訪道吴越嘗謁師于山中乃度風篁嶺窺龍井過歸隠橋鍳滌心沼觀獅子峯望薩捶石升潮音憩訥齋酌冲泉入寂室登照閣臨閑堂會方圓菴從容論議夕而後還師異日遣其徒丐文以紀其本末余既與之記又繋之以詩十三章云東坡撰訥齋記錢塘有大法師曰辯才初住上天竺以天台法化吴越吴越人歸之如佛出世事之如養父母金帛之施不求而至居天竺十四年有利其富者迫而逐之師欣然捨去不以為恨吴越之人從之者如歸市天竺之衆分散四去事聞于朝明年俾復其舊師黽勉而還如不得已吴越之人争出其力以成就廢闕衆復大集無㡬何師告其衆曰吾雖未嘗争也不幸而立于争地乆居而不使去人以已是非彼沙門也天竺之南山山深而木茂泉甘而石峻汝舍我我將老于是言已策杖以往以茅竹自覆聲動吴越人復致其所有巉岒堙圯築室而奉之不期年而荒榛岩石之間臺觀飛湧丹堊炳煥如天帝釋宫師自是謝事不復出入髙郵秦觀少㳺名其所居曰訥齋道潛師參寥屬予為記余聞之師始以法教人叩之必鳴如千石鐘來不失時如滄海潮故人以辯名之及其居此山閉門燕坐寂黙終日菓落根榮如冬枯木風止波定如古澗水故人以訥名之雖然此非師之大全也彼其全者不大不小不長不短不垢不浄不辯不訥而又何以名之雖然樂其出而髙其退喜其辯而貴其訥此衆人意也則其以名齋也亦宜乃作頌曰以辯見我既非見我以訥見我亦㡬于妄有叩而應時止而止非辯非訥如如不動諸佛既然我亦如是才潁濵撰辯才法師塔碑浙江之西有大法師號辯以佛法化人心具定慧學具禪律人無賢不肖見之者如尊其道奉其教凡居上天竺說法齊衆二十年退居龍井燕居行道者十年元祐六年嵗在辛未九月乙卯晦無疾而滅吴越之人失其所歸依奔走號慕如佛滅度乃使其弟子懐楚赴于汝隂請于太守蘇公子瞻以志其塔公曰吾固知師矣予弟子由雖未嘗識師然其知師不在吾後吾為汝請轍以公命不敢辭師姓徐名元浄字無象杭之於潜人家世喜為善師之生也客有過其居者指以語人曰是有佳氣􅓹􅓹上騰當生竒男子師生以左肩肉起如袈裟縧八十一日乃滅其伯父嘆曰是宿世沙門也慎無奪其願長使事佛八十一者殆其算及師之終寔八十有一師生十年從其邑僧法雨出家性不茹葷血每見講堂座輒嘆曰吾願登此說法度人年十六落髪受具足戒十八就學于天竺慈雲師雲門人方盛徒衆欲却之雲曰疇昔吾夢甚異此子殆法器也勿却師日夜勤力學與行進不數年而齒其高弟雲殁復事明智韶師韶嘗講摩訶止觀至方便五緣曰浄名所謂以一食施一切供養諸佛及諸賢聖然後可以食此一方便也師聞之悟曰今乃知色聲香味皆具第一義諦因涕下如雨由此遇物中無疑矣嘗夢與其同門友元素入一寺曰妙樂有僧出師問之曰此非荆谿尊者製法華文句記處耶曰然師訪以尊者遺像相與至東閣見一梵僧趺坐不動容貌其偉謂師曰我汝過去師也當為我作禮師拜已而覺忽若有得年二十五恩賜紫衣及辯才號盖代韶為衆講說者凡十五年知杭州吕公溱始請師住大悲寳閣院師嚴設紀律犯者秋毫皆斥去其徒畏敬之居十年沈公某治杭以謂上天竺本觀音大士道塲以音聲懴悔為佛事非禪那居也乃請師以教易禪師至吴越人争以檀施歸之遂鑿山増室㡬至萬礎重樓傑觀冠于浙西學者數倍其故有禱于大士者亦鮮弗荅詔名其院曰靈感觀音熙寧初祖公無擇在杭言者不恱其政逮制獄事以鑄鐘事與連居其間泰然擬金剛箆撰圓事理脫居十七年有僧文捷者利其富倚權貴人以動轉運使奪而有之遷師于下天竺師恬不為忤捷猶不厭使者復為逐師於潛逾年而捷敗事聞朝廷復以上天竺畀師㨗之在天竺也吴人不恱施者不至岩谷草木為之蕭然及師之復士女不督而集山中百物皆若有喜色清獻趙公抃與師為世外交親見而賛之曰師去天竺山空鬼哭天竺師歸道塲光輝然師復留三年終欲捨去謂其徒曰吾祖智者聖人也猶以急于化人害于行已位本鐵輪而証止五品况吾凡夫也哉因謝去老于南山龍井之上以茒竹自覆吴越聞之争為之築室廬具像設甃瓦金碧咄嗟而就三年復為太守鄧公溫伯請居南屏一年鄧公去乃歸龍井終焉師于講說不擇晝夜嘗曰鬼神威徳不具多畏人畫說或不得至比夜人静庶㡬能聴嘗焚指以供佛左三右二僅能以執其徒有欲效之者輒禁之曰如我乃可平生修西方浄業未嘗以須臾廢行成力具能以其餘見于外者非一也予兄子瞻中子迨生四年不能行請師為落髪摩頂祝之不數日能行如他兒布衣季生者習禪觀甚辯而無行欲從師出家子瞻憐之為請于師未言其名師拒不許若知其為人者秀州嘉興令陶彖有子得魅疾巫醫莫能治師祝之而愈越州諸暨陳氏女子得心疾漫不知人父母以見師警以徽言醒然而悟嘗與僧熙仲會食仲視師眉間有光如螢遽起攬之得舍利自是常有于其卧起得之者及其将化入室宴坐謝賔客止言語飲食召其常所往來僧道潛告之曰吾西方業成如是七日無魔横右脅吉祥而逝吾願足矣至五日出偈告衆七日奄然而寂皆如其素度弟子五十人四方學者不可以數計頗能以其道教化吴越至十月庚午塔成頌曰如來昔在世心禪語為教譬如四大海惟是一濕性扵其濕性中變化千萬億風來為濤潤風去為湛然魚龍所逰戲鬼神所出没船筏借其力網罟取其利其上為洲渚諸國所生育其下為淵谷百怪所藏伏東西出日月上下属河漢觀者不能了􅌓眙何暇說如來知迷悶隨變為解釋因變所說者是則名為教彼善聞教人當知是幻爾既已知是幻則當識其寔我觀世教師皆謂教是寔由謂教寔故則為禪所訶禪雖訶教乎終以教致禪禪若不取教是杜所入門教而不知禪是不識家也辯才真法師扵教得禪那口舌如瀾翻而不失道根心湛如止水得風輒粲然以是于東南普服禪教師士女常奔走金帛若圍繞師惟不取故物來不得拒道成數有盡西方一瞬息西方亦非實要有真實處銘賛辯才心師銘咄哉此身爾生何為資之以食覆之以衣處之以室病之以醫百事將養一時不虧殊不知恩反生怨違四大互惱五臟相欺此身無常一息别離此身不浄九孔常垂百千癰疽一片薄皮此身可惡無貪惜之當使此身依法修持三種浄慈十六思維一行不退安養西歸成無上智是為心師元祐六年中秋寂室書與懐益趙清獻公作辯才真賛師去天竺山空鬼哭天竺師歸道場光輝大士大悲實師焉依師乎真乎真金琉璃教宗智者法嗣紹師須彌有壊至道無為稽首慈相仰之讃之皆無妙幻豈勝言思楊次公讃月白風清雲閑水緑犀柄金爐寄天竺老龍頭角縮寒岩膏雨人間霑足䟦帖東坡跋楚逵二上人書經懐楚比邱示我若逵所書二經經為㡬品品為㡬偈偈為㡬句句為㡬字字為㡬畫其數無量而此字畫平等若一無有髙下輕重大小云何能一以㤀我故若不㤀我一畫之中即見二相而况多畫如海上沙是誰磋磨自然平旋無有麄細如空中雨是誰麾洒自然蕭散無有疎宻咨爾楚逵若能一念了自法門于刹那頃轉八十藏無有忘失一句一偈東坡居士說是法已復還其經元祐七年四月二十五日静坐帖無事静坐便覺一日似兩日若能處置此生常似今日得生七十便是百四十嵗人世間何藥能有此效既無反惡又省藥錢此方人人收得但苦無好湯使多嚥不下祭文東坡祭辯才文并書嗚呼孔老異門儒釋分宫又于其間禪律相攻我見大海有北南東江河雖殊其至則同惟大法師自戒定通律無持破垢浄皆空講無辨訥事理皆融如不動山如常撞鐘如一月水如萬竅風八十一年生雖有終遇物而應施則無窮我初適吳尚見五公講有辯臻禪有璉嵩後二十年獨遺此翁今又往矣後生誰宗道俗欷歔山澤改容誰持一盃往吊井龍我去杭時白叟黄童要我復來已許于中山無此老去將安從噫參寥子往奠必躬豈無他人莫寫我胸題詠楊次公十三詩風篁嶺云微風摇琅玕蕭瑟嶺上道萬帚埽晴空纎塵不可到龍井云岩下一泓泉窈奥莫可測有時靈氣生散作人間澤往歸𨼆橋云道人從此歸影不入㕓市端坐笑浮雲來太多事來滌心沼云縱有狂風生未嘗險浪起何當招世人此鍳清泚獅子峯云岩風壮威猛晴雷𨼆哮吼無心露爪牙百獸自奔走清薩捶石云解虎錫常閑飼虎石常在忘軀度有情風㡬千載潮音堂云潮來音普聞潮平音亦歇孰若此山堂潮音未嘗絶訥齋云天道竟何言四序自流轉乃知毘耶離黙然真大辯器冲泉云不汲泉不盈愈汲泉愈清湛然有常徳隨利犀生寂室云白雲隔塵喧虚室太岑寂寒盡春自來鶯啼報消息花照閣云幽人無適莫乘興登髙閣夜月鎖雲林春繡岩壑閑堂云趙公歸休年訪師翠微間始知浮世上白日兩人閑方圓菴云地方不中矩天圓不中規方圓菴裏叟髙趣有誰知得趙清獻公詩并序予元豊己未仲春甲寅以守杭請歸田出㳺南山宿龍井佛祠今嵗甲子六月朔旦復來六年于兹矣老僧辯才登龍泓亭烹小龍茶以迓予因作四句云湖山深處梵王家半紀重來兩鬢華珍重老師迎意厚龍泓亭上㸃龍茶辯才次云南極星臨釋子家杳然十里祝青華公年自爾増仙籍㡬度龍泓瀹貢茶斾辯才與東坡道潜錢勰倡和詩元浄云暇政去旌杖策訪林邱人惟尚求舊况悲蒲栁秋雲谷一臨照聲光千載留軒眉獅子峯洗眼蒼龍湫路穿亂石脚亭蔽重岡頭湖山一目盡萬象掌中浮煑茗欵道論奠爵致龍優過溪雖犯戒兹意亦風流自惟日老病當期安養㳺願公歸廟堂用慰天下憂然東坡云日月轉雙轂古今同一邱惟此鶴骨老凜不知秋去住兩無碍天人争挽留去如龍出山雷雨卷潭湫來如珠還浦魚鼈争駢頭此生暫寄寓常恐名實浮我比陶令愧師為逺公優送我還過溪溪水當逆聊聊使此山人永記二老㳺大千在掌握寧有離别憂又道潜云逺公吾家傑道妙非壺邱徳傾龍像侣貌盖江湖秋平生經綸學不為名相留滔滔若懸瀑下注萬丈湫昔年謝講事衆挽不轉頭刳心老岩六百念本不浮東南望多士唯見此老優翰林天下公方外寔輩流旌旂虎溪路竟日泉石㳺衆生病未已師意可忘憂又錢勰云幻泡昧空色真夢迷黄邱宦學類狂走爾來三十秋齒髪非他時嵗月不我留古刹挿亂石蟄龍蟠霞湫天人大導師駐錫今白頭安住善䕶念晚節非沉浮昔嘗同出處未用相劣優權寔分二乘股肱均九流今知攪攪者詎得逍遥㳺從兹許禮足尚可治幽憂自潁濵與辯才唱和詩并序轍自績溪䝉恩詔還将宣城沿大江以歸家兄子瞻以書告曰不如道歙溪由錢塘一觀老兄遺跡轍用其言既至吴中廹于水涸不能久留十月八日逰上天竺子瞻昔與辯才師相好今隔南山不見乃作三小詩寄之其詩曰我兄教我過東吴遺跡山間無處無誰信拿舟趂冬閘俗緣深重道心麄山色青冥葉未紅湖光凝碧曉無風行窮上下兩天竺望㫁南山龍井龍井水中藏東海魚側盆翻雨洗凡夫隔山欲共公相見莫道從來一滴無元浄云春去春來冬復冬㡬思虚論未緣逢歙溪道賞兄遺跡勿少龍泓一老龍參寥辯才少㳺倡和詩東坡䟦附參寥云猿鳥投林已寂然芭蕉雨過小樓前雲依絶壁中間破月自遥峯缺處圓照坐不須紅蠟炬可人惟有碧爐烟校讐御府圖書客疇昔還如此夜禪與元浄和云岩棲木食已皤然交舊何人慰眼前素晝公心印合每思秦子性珠圓當時步月來幽谷拄杖穿雲冐夕烟臺閣山林况無異故應文墨未離禪東坡云辯才作此詩時年八十二矣平生初不學作詩如風吹水自成紋理而參寥與吾輩詩乃如巧人織綉耳滄秦少㳺和云遥聞隻履去翛然詩翰纔收數月前海盡頭人滅度亂山深處塔孤圓憶登夜閣天連雁同看秋崖月破烟尚有衆生未成佛肯超欲界入諸禪佛印辯才倡和詩願海談訶五十年舌根功徳綻紅蓮身歸龍井菴中老法是天台意外傳珠網交羅真浄土香雲馚馥似諸天因思永逺東林社未復相逢豈偶然燈辯才和云乆仰真風揚四海今朝邂逅欲生蓮法晃耀皆䝉照佛印靈光孰可傳諸子叢林禪裏老十方塵刹上中天爍迦羅眼周三際豁破群迷量擴然錢龍圖勰詩辯才天人師一意演說法猶如一雨傾藥草皆萌達甕盎及湖海各觀天一月以是度衆生報身隨数滅舊龕留香燈想像瞻華髪應供無時窮龍淵莫之竭的米元章詩竹徑隨泉上山雲觸石生寳樓彈指處的是分明辯才十題孰風篁嶺云風篁䕃修嶺挺節含虚心悠悠徃還客不聆清音龍井亭云虚亭亂石間中有潜虬府澄湛源莫窮旱嵗為霖雨身歸隠橋云謝講竺峯寺歸隠新此橋院幽結林表老寄烟霄潮音堂云真說無所示真聴無所聞海潮山外過妙響入深雲冲泉云物外老餘生泉發幽岩裏自可給瓶盂不羨滄溟水辯訥齋云憶昔毘耶老杜口有誰聴還聞寂寂裡其過雷霆寂室云心寂寂自絶此意焉思說寒雲散空庭獨有月照雪汝照閣云髙峯銜皎月深壑㵼飛湍誰來白雲裡與凭欄看顯獅子峯云獨爾群山裡人稱獅子峯無心自哮吼晦烟雲中薩捶石云巨石如掌平兀然半青嶂欽哉昔道人飼虎兹石上壽少㳺䟦云辯才法師謝天竺講事退休于龍井山聖院凡堂室齋閣山峯水泉皆名以新意復作詩繼之號龍井十題其言清警發人之妙思信非世間音也元豐二年八月髙郵秦觀為寫遺其徒懐楚刻于石崇恩演福禪寺在小麥嶺積慶山淳祐八年充惠順貴妃賈氏櫕所賜今額為教院景定三年周漢國端孝公主祔焉咸淳四年有㫖改禪院太傅平章魏公施貲増造五年聖上御書六大字為扁且益賜平江田為畆為千除其科役苾蒭來駐錫多堅若有梵行一日堂僧曰紹祖者環薪自火趺坐儼然烟熖中探懐出偈付大衆云為我持别平章國公偈曰靈山一别㡬經春今日重來喜見君佛法一肩擔荷却黄鶴樓前第一尊化訖舍利迸流遂塔于寺之西偏記文馮尚書夢得撰寺記恭惟皇上聖性仁孝思皇繼述政教肅穆神天億寧繇即祚以來亦既六載凡可以厚倫紀發幽潜咸用其極其諸布善因資㝠福惟禮制人情之中以承先志焉粤先皇帝在宥以戊申年六月詔有司備禮葬惠順貴妃賈氏扵積慶山之原盖是山自天目蜿蜒邐迤清淑磅礴而金鐘腋龍井並湖諸峯勢若拱揖廼建寳坊賜名崇恩演福教寺越十四年壬戌周漢國端孝公主薨公主妃所出也遂祔于右邇來若干年矣若稽舊刻錫之上腴資薦惠順甚備惟端孝未果輟賜上心慊然及是益以吴門田五千畆蠲其科繇以崇先帝割愛遺育之意始改教為禪宸奎昭回􅖙填龍象時太傅平章魏國公發大施舍建無量福海簷蔔林易丈室而東堂廡寮位内外煥列種種嚴備最上殊勝法筵請衆延領十方𢎞誓圓成將邁南北两山開闡無遮續續未艾以廣上恩命僧可湘主寺事一日杖錫來謁記合衆言曰爾時常韋提希娑竭龍女現身浄妙住無垢世界普發人天我今承㫖掌大摠持即無垢圓與佛三世毫刹相涵名義脗合端的福緣無有際㫁如是故攝末歸本由漸而頓願演諸法一妙音周遍現界夫佛廣說經法以衆生希望煩惱不一故為彼異解令離心意識無上菩提義則不墮今摘葉尋枝紛籍諸境利根蹉過鈍根難入如嚼鐵橛不知毗紐我無一切心何用一切法今大善知識具大力量成就善慧希有功徳饒益化利歡喜畢具會同諸智一性故無為實相由頓而圓可無宣示以永勿墮夢得學自孔氏無外聞見惟方寸心不殊三昧諸學佛者悟無無法是大圓覺如水中月不出不入無所于名强名曰禪大和尚自毗婆尸祖祖相傳迦葉微笑不是㒺人至南能法嗣厥徒萬億今予大善知識自佛地來照見正覺汝往攝大衆滿體精神方能㸃勘譬如落種一旦蠲發如桶底脫得無生息是法界性自相應當證上乘如是我聞從上訓典儒道釋一理儒門廣大平實為善具足性義汝諸佛祖偈言在明真諦唯無所住而生其心即佛心印歸哉是為記旌徳顯慶寺在小麥嶺嘉定初恭聖仁烈皇太后建充后宅功徳院寧宗皇帝御書理宗皇帝益買田以賜凡三千畆有竒聖上為盡復其賦今以奉恭聖仁烈皇太后神御有清壑亭靖雲亭太傅平章賈魏公留題咸淳三年九月二十四日賈似道因展先墓為泉石一來客束元嚞廖瑩中俞昕黄公紹王庭子徳生諸孫蕃世僧法照智印祖印文珦積慶教忠寺在小麥嶺端平元年金樞宻淵剏建理宗皇帝御書積慶山及藏書閣六字以賜又賜寺額曰積慶教忠寺有君子泉在寺之前曩以嵗旱居民乏水父老因鑿泉得古碑曰君子泉天一泉在寺之左隴下清冷而甘平鼎山在外門之左咸淳臨安志卷七十八
