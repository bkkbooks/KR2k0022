body:
  text: 咸淳臨安志卷八十宋潜說友撰寺觀六寺院飛來至上竺景德靈隱寺在武林山東晉咸和元年梵僧慧理建舊名靈隱景德四年改景德靈隱禪寺靈隱天竺兩山由一門而入陸羽記云南天竺北靈隱有百尺彌勒閣蓮峰堂白雲菴千佛殿巢雲亭延賔水閣望海閣孝宗皇帝嘗御製詩頌住持德光見御製門理宗皇帝御書覺皇寶殿及妙莊嚴域大字又御製千佛贊以賜見御製門又有梁簡文石像記司空相國詩般若證論序嵩嶽圭大師影堂記法眼禪師贊蓮峰堂詩并記冷泉池記并詩賜田記僧遵式五峯合澗六詩不悉載太傅平章賈魏公龍泓洞題名咸淳丁卯七月十八日賈似道以嵗事禱上竺回憩于此客東元嚞俞昕張濡黃公紹王庭從子德生侍期而不至者廖瑩中記文羅處約撰寺記天地體也乾坤用也體不可以常寂故以禪而為名用不可以終動故以靜而為本是以境得之而為勝地心得之而為妙道斗牛之下有郡曰錢塘浙水之右有山曰武林居山之寺曰靈隱其得境之勝地乎居寺之徒曰禪侣其得心之妙道乎觀其羣山環倚一峯中斷平湖鑑物洪濤駭人雲生若趨石怪欲語陸羽記東晉咸平初有梵僧慧理由天竺而至嘆曰兹山靈鷲之一峯耳何代飛來乎所携白猿復識其處睨彼故地同乎新豐由是布金其田寶新其剎憩蓮華之石翻貝葉之文洞深有天岩垂為室晉宋已降賢能迭居碑殘簡文之詞榜蠧稚川之字唐大厯六載復新其大壯焉謝亭巋然袁松多夀土運之季國霸為錢雲構之規則又過矣繡桷畫拱霞暈于九霄藻石雕楹花垂于四照修廊重復潛奔濺玉之泉飛閣岧嶤下瞰垂珠之樹風鐸觸鈞天之樂花鬘搜陸海之珍有若碧樹芳枝春榮冬茂翠嵐清籟朝融夕凝呼猿風聞卧龍石老會漢南王籍彼土宇歸我昌期雍熙之二載郡之四衆請月禪師為之首師印可禪那深得其髓越明年春僕自蘇臺抵杭郡弭蓋靈鷲濯纓冷泉山光洗心松聲娛耳堅珉雖揭好詞未刋余斐然者也月禪師俾文其事噫節彼靈山奠兹吳土秀極而為萬狀翠鍾而成一色乍聳而還伏將趨而却屹豈造物者奇詭其勢與心而符契哉不然胡以不違世咫尺而若在溟滓俾仁者樂之其得靜之理乎矧如來密印由飲光而傳達摩由達摩而付南能厥後大有宗師競分支𣲖太虛無狀而楞嚴謂三界忽生湛寂本如而易義稱萬物自動故衆生昧如如之性住我我之所執指為月瞪目成花不有導師孰為法眼若言真于妄則二妄以斯同破有歸無則一邉而為見故融其妄法是名真空真空不空斯為妙有雖揚眉舉足則當體涅槃三界四生則為心境界棲禪于此者其殆庶幾乎偉哉是境也其將以靜為君乎是心也其得本來無物乎所謂得天地之體乾坤之用體用無原水波圓融故若境若心以寂靜攝實觀道之妙乎或曰以兹山得靜之理斯不誣矣言飛來之事何其怪哉余則曰怪神之端子直不語者也蓋以力乘大教翼戴衰周俾季世之人信道彌篤嘻太極剖而為天地遊魂變而知鬼神豈非諸怪者耶因不自揆而書之猶季路之率爾也碑而銘之曰靈鷲一峯飛來竺乾非夸娥負神妙難筌非巨靈擘聖功自然誰識其異慧理明焉翠微之前曹溪之禪隱不違俗靜本乎天四時羣籟萬古寒泉因書真石用紀千年題詠白樂天留題天竺靈隱兩寺在郡六百日入山十二回宿因丹桂落醉為海榴開黃紙除書到青宫詔命催僧徒多悵望賔從亦徘徊寺暗烟埋竹林香雨落梅别橋憐白石辭洞戀青苔漸出松間路猶飛馬上杯誰教冷泉下送我下山來小靈隱寺紅辛夷花詩紫粉筆含尖火熖紅燕脂染蓮花芳情香思知多少惱得山僧悔出家宿楊巨源送章孝標歸杭州詩曽過靈隱江邉寺獨東樓看海門潮色銀河鋪碧落日光金柱出紅盆常權載之天竺靈隱二寺主詩石路泉流兩寺分尋鐘磬隔山聞山僧半在巾峯住共占青猿與白雲打潘逍遙宿靈隱寺詩繞寺千千萬萬峯滿天風雪杉松地爐火暖黃昏睡更有何人似我慵合林逋同運使陳學士遊靈隱寺寓懷詩山壑氣相旦暮生秋隂松門韻虛籟罅若鳴瑶琴舉目羣狀動傾耳百慮沉按部既優遊時此振衣襟泓澄冷泉色寫我清曠心飄颻白猿聲答我雅正吟經臺復丹井捫蘿嘗遍臨鶴蓋青霞映玉趾蒼苔侵溫顔照槁木直性均幽禽所以仁惠政及物一一深灑翰嶙峋壁返駕旃檀林回睨窣堵峯大半千萬尋梅侍讀詢十咏并序云杭州靈隱山天下之泉石刺史白樂天賞之心不斁沒去數百年林泉有羞色我持百里權暇日訪林泉愛之不忍去茹筆屢成篇收攬造化工盡驅詩思中十題四百字他山類磨礱且欲紀遺咏非矜文翰功他年遂招隱來此觀奇蹤塵靈隱寺詩千峯凌紫烟中有梵宫闕靈眄極幽棲心自超越松篁發春靄桂實墜秋月爭得謝世人兹焉老華髮外有水臺盤翻經臺冷泉亭蓮花石飛來峯呼猿澗煉丹井龍泓洞髙峯塔詩各見本門觀蘇文忠公逰靈隱寺次韻君不見錢塘湖錢王壯今已無屋堆黃金斗量珠運盡不勞折簡呼四方宦遊散其孥宫闕留與閒人娛盛衰哀樂兩須臾何用多憂心鬱紆溪山處處皆可廬最愛靈隱飛來孤喬松百丈蒼髯鬚擾擾天下笑栁蒲髙堂會食羅千夫撞鐘擊鼓喧朝晡凝香方丈眠氍毹絶勝絮被縫海圖清風時來驚睡餘遂超羲皇傲几蘧歸時棲鴉正畢逋孤烟落日不可摹立秋日禱雨宿靈隱同周徐二令公云百重堆案掣身閒一葉秋聲對榻眠床下雪霜侵户月枕中琴筑落階泉崎嶇世味嘗應遍寂寞山棲老漸便惟有憫農心尚在起占雲漢更茫然孫雄飛靈隱蓮峯堂詩堂開金色界梵客為鈎簾山影碧侵座水聲清繞簷粉雲埋石腳珠露綴松髯終擬携孤笛憑欄喚玉蟾杜澤子氏逰隱竺二寺詩飽聞勝迹冠禪林一徑盤回古木隂秀嶺飛從西域逺桃花流出武林深月中桂子有時落物外天香無處尋俗吏慙塵土面强乘佳興一登臨下竺靈山教寺在錢塘縣西一十七里隨開皇十五年僧真觀法師與道安禪師建號南天竺唐永泰中賜今額五代時有五百羅漢院後廢大中祥符初改賜靈山寺天禧四年復天竺寺額紹興十四年髙宗皇帝改賜天竺時思薦福寺額為吳秦王香火院慶元三年太皇太后有㫖下竺名剎不欲永占可復元額為天竺靈山之寺寶祐二年改賜天竺靈山教寺為額有御書閣藏纍朝宸翰仁宗皇帝六曰龍鳯曰國泰民安曰升祠曰佛曰安曰佛法髙宗皇帝四曰天竺時思薦福之寺曰天竺寺曰枕流亭曰適安亭憲聖慈烈皇太后二曰金剛經曰般若密多心經寧宗皇帝二曰淨土九品觀堂曰神御之殿理宗皇帝八曰無量夀佛寶閣曰天竺靈山教寺曰金光明三昧堂曰瑞光之塔曰靈應大法師曰靈應正覺廣濟大法師曰靈應正覺廣濟普照大法師有枕流亭在御園內有無竭泉七寶普賢閣香林洞岩下石洞通人往來天竺出茶號香林茶曲水亭一曰流杯亭有水臺盤回軒亭在曲水亭側昔有之西嶺草堂日觀菴七葉堂登嘯亭即舊志觀風亭訪古亭客兒亭已見武林山跳珠泉楓木塢大悲泉石梁翻經臺謝靈運于此與僧將北本涅槃經翻為南本天香亭在山絶頂望海閣之舊址咸淳三年太傅平章賈魏公領客來遊命築亭其處為名曰天香客王庭書扁重榮檜在光懴堂後隋氏所植大十圍髙數丈枯于兵火大中祥符間復茂盛石面靈桃在翻經臺側生石上結實甚大政和間歸京師神尼舍利塔隋仁夀二年遣僧慧誕齎神尼所囑舍利于此造塔發土得石函一因用置所賫舍利石函其中不差分寸人咸異之有旃檀觀音瑞像記海月大師塔銘西嶺和尚行狀慈雲禪師真贊及行業贊真觀大師石龕詩不悉録淳祐志云大凡靈竺之勝周回數十里而巖壑尤美實聚于下天竺靈山寺自飛來峰轉至寺後諸巖洞皆嵌空玲瓏瑩滑清潤如虬龍瑞鳯如層華吐蕚如皺縠叠浪穿幽透深不可名貌林木皆自巖骨拔起不土而生傳言兹巖産玉故腴潤能育焉其間唐宋游人題名不可殫紀殊使覽者顧景增懷云太傅平章賈魏公題名賈似道比以嵗事禱靈隱迄幸有年飯僧已因過此山吳子聰束元嚞邱復亨俞昕廖瑩中張濡黃公紹王庭從焉子德生諸孫蕃世侍僧法照德寧與妙寧俱咸淳三年嵗丁卯十月望記文胡文恭公宿撰寺記粵若能仁出現圓教流通觀音機緣密契于中土善財參禮遍歷于南方曹溪傳于一心天台宗于三觀度門迭起叢林相望異香旃檀居多于此岸大乘氣象兼茂于他邦豈非離之明巽之聰性為般若尤鍾于東南者乎天竺寺者餘杭之勝剎也飛來峯者武林之奇巘也晉有梵僧慧理指此山乃靈鷲之一小嶺耳不知何年飛來至此掛錫置院初曰翻經隋開皇中法師真觀僧廣之改為天竺寺其後大比邱曇超道標領徒唱教名在僧史唐末盜起寺焚略盡吳越王鏐因即舊址建五百羅漢院大宋之興名山精舍申易嘉號錫名曰靈山祥符中州人聨牒叢叩府下請大士遵式領其衆演天台教觀式公辨博明解逺近向慕智者之學自是益振天禧初文穆王冀公臨州一見加禮為奏復天竺舊額遄承可報冀公親題其榜筆力殊徑且有敕㫖許作十方講院主持還朝又表其髙行賜號慈雲仍施錢萬緡為營佛殿雄敞赫敞岌然翬飛未幾侍郎胡公繼典是郡又捐已俸助作三門分施峻廊翼其左右檀施風偃莫不喜捨于是裒合衆施環構群宇殿之後曰法堂其右曰僧堂曰金光三昧堂曰老宿堂其左曰厨曰庫曰浴院曰延壽堂及東西繚廊六十楹井堰舂磑之所最凡百二十餘區皆匪亟而成觀感以化至于金像模肖莫不竒特又造旃檀觀音像置三昧堂中慈明穆如智者之遺法也初寺有檜樹枯死至是柯葉復茂衆目之曰重榮檜乃蘭若中興之兆慈雲告老菴于東嶺傳寺事于明智大師祖韶韶公亦宿植德本密資覺力延棲海衆宴坐道場二紀有餘百事無曠天聖中兩宫外護三寶焉依清淨之風大流率土吉祥之地首眷兹山乃詔乾元長寧二節度僧各一明道至皇祐間二遣近璫黃元吉捨施釋迦文殊普賢阿難迦葉琥珀像五身又施西天靈塔佛骨舍利白等檀香縷金佛菩薩羅漢等像五十二身仍賜飛白御書六軸飛白御書扇子等且有中㫖每嵗增度行者一人韶公欽承聖施寅奉墨寶于法堂後建御書閣三棟以䖍香火閣之東西建方丈二十區北敞虛檻正面鷲石名勝遊士多至其下入于殿之前建鐘經二臺東西對峙三門之左構五百羅漢院右建天台教藏院後曰看經堂北曰泗洲菩薩殿後曰茶堂亭軒房牖之類亦百有二十餘區兹又明智籲諸檀而續之也前後輪奐表裏華潔鐘梵通于霄漢金碧照于岩谷新間春夏衆聲琤然靈峯早暮雲氣馥若疑神物之有護信靈仙之所隱大哉佛以無生之心體無邉之行願應現三界拔濟衆生殫土木之莊嚴未有以稱其德盛金石之篆刻不足以究其功居之者當感被王靈念承法䕃思耕鑿之苦省肯構之勞開發大心紹續慧命以三摩奢為淨體以六波羅密為妙用渡河沙之衆圗報佛恩宣海潮之音答揚帝力緒餘妙利延被有情則此寺之崛興與兹山之共敝韶公以某雅塵禁職緬慕宗乘見托以文且記其事至于龍潭猿澗一邱一壑之勝則有陸鴻漸山記在焉今但記其置寺之本末云强詞部至撰寺記天竺寺東晉慧理始建曰翻經院至隋開皇真觀居之因廣規遂為寺而更以今名曇超道標承之而處巢寇之亂旋罹兵火莊嚴之地鞠為煨燼逮錢氏荒吳土起其廢而新之真廟在宥罷寺為院易榜曰靈山祥符間慈雲遵式師以道風法器為緇俗欽嚮迎置其內日講教觀學徒說之方袍遊夏由是佛壠之道西矣未幾相國王冀公欽若鎮杭雅聞師名延見府署道契吻合一言忘形冀公不知圭衮之所以為泰慈雲不知瓶屨之所以為約也因開陳廢興願復舊額公剡奏列上俞詔隨下乃灑翰為題其榜既而呼主藏者取緡若百萬俾新殿宇後數年二卿胡公則復守此邦繼發信誓乃立三門傅以兩廊于是慈雲始有意于興作矣而王侯輸金聞者自勸不俟誘督爭相委資乃作法堂以演暢佛㫖懴堂以六時行道潔香積之饌蓄蒲塞之供作厨堂庫院就燕寂濯昏垢作僧堂浴室金碧互映目為寶所已而慈雲夏臘髙矣樂退岩屋傳其事于門人髙弟明智祖韶師記慈雲之世凡棟宇之作一百有七楹而明智孤標獨行克遵師業有來斯進故逺邇之學者滿門不妄履域閾而四衆薰善若户到而躬化不嘗勢公卿而薦紳聞誼皆引重而爭慕曷從而得之蓋曰道在而已耳于是作慈雲之所未作成慈雲之所未作即慈雲之所欲成檀信樂施不謀胥協乃建教藏院以聚本經禮也建延夀院以養病患仁也建冀公祠宇不忘外護義也建慈雲真堂不忘先稟孝也是四善皆釋子之難能者而明智兼有焉明道嵗王人左藏黃副使元吉將命過杭得師歡甚因還侍上懇求御書願賜為叢林榮皇祐改元始賜飛白字凡六軸乃度正位構層閣以安之所以尊帝筆而華佛祠於戲浮屠氏能嚴奉其本師張大其本教者或稀矣况能尊天子之書哉明智是舉抑又能釋子之難者嗣事甫二紀而棟宇之作减慈雲者才二楹翬簷鴛瓦焜耀淨域膜拜讃繞咸起恭嚮信東南之福壤而龍象之道場也唐白宫傅作冷泉亭記獨以靈隱為最勝今禪剎講宇迭相為雄使好事者談泉石佛宫之盛必以天竺靈隱為稱首不其韙歟噫皆曰杭人喜奉佛往往浮屠之居有頺墻弊廡不足庇風雨而豪右過之不肯一錢者豈奉佛之心有膠耶抑居或非其人無術以動之耳以是知非明智弗克萌杭人之善心非杭人弗克畢明智之能事蓋相須濟耳寺成韶師以書抵豫曰我先稟慈雲肇圖構葺未訖事而去至韶始成之先正修撰嘗欲記吾寺未作而公亡願執事者成之豫獲書慨然且念韶能繼其師之志構是寺豫忍無詞以成先子志反為韶愧哉遂勉而為之記至和元年某月某日記氏范文正公天竺日觀大師塔記師錢塘人也姓仲名善升十嵗出家十五通誦法華經十七落髮受具戒客京師三十年與儒者遊好為唐律詩且有佛學天禧中詔下僧録簡長等注釋御製法音集師預選中書畢詔賜師名遂還故鄉公卿有詩送行深于琴余嘗聽之愛其神端氣平安坐舒指絃不纎失不少差遲速輕重一二而當故其音清而弗哀和而弗淫自不知其所以然精之至也康定中入天竺山居日觀菴曰吾其止乎不下山者十餘年誦蓮經一萬遍皇祐元年余至錢塘就山中見之康彊精明話言如舊一日遣侍者持書謝豫曰吾願足矣將去人世必藏于浮圖之下願公記焉又一日侍者來告曰師化矣其門人中靄等葬師于塔復以師之言求為之銘銘曰山月亭亭兮師之心山泉泠泠兮師之琴其性存兮孰為古今聊志之兮天竺之岑題詠白樂天七葉堂詩欎欎復欎欎世熱何時畢行入七葉堂煩暑隨步失簷雨稍霏微忩風正蕭瑟清宵一覺睡可以消百疾名翻經臺詩一會靈山猶未散重飛貝葉有來由是精進才開眼岩石無端亦㸃頭屋薛諌議映曲水亭詩臺盤疏石渠激流環四面夏有餘清羽觴隨意轉賔告醉言歸主稱歡未倦雖非禊飲辰豈謝蘭亭燕翻姚起居鉉翻經臺詩康樂悟元機寂寥此棲息經貝葉文臺近蓮花石憑梅學士詢水臺盤詩鶴髮山中人疏泉鑿幽石如青玉案分遞白雲液泠泠濺雕俎瑟瑟穿吟席醉坐三伏中煩襟自消釋深翻經臺詩靈運曽此臺冥心住幽寂重繹葉上書藏林中跡遺文傳竹素野蔓侵苔壁登覽殊未休蒼山日將夕山周次元觀激水詩拳石耆婆色兩青竹龍驅水轉鳴夜深不見跳珠碎只作簷前滴雨聲不東坡和云道眼轉丹青常于寂處鳴早知雨是水作兩般聲參寥子與愚上人宿天竺夕陽山氣藹葱葱路轉松隂復幾重行過石橋人不見數聲先聽寺樓鐘稽留峯北好林泉珍重幽棲得所便柏子烟中能宴坐想無餘習可扳緣霜壓簾櫳露泣條銀河影轉斗隨杓清言共失三更夢錯恨芙蓉漏易消無陪司馬才仲節推諸君遊天竺西郊久不雨草木餘青薄雲弄秋暉山色時晦冥超然五詞客文采披華星聫翩過吾廬車馬紛滿庭相携訪靈鷲細路通岩扃扳翻幽桂叢衣襟襲芳馨流鏡異人書吾詩豈能名詩豪追鄴下妙語逾瓊英願言一揮寫樂事良難并髙空墮海日歸驂尚能停丁石刻桂子詩并序上嗣統之六祀天聖紀號龍集卯秋七八兩月望舒之夕寺殿堂左右天降靈實其繁如雨其大如豆其圓如珠其色白者黃者黑文者時有帶殼者殼味辛識者曰此月中桂子也州牧右諫議大夫胡公則同太常博士陳公詁孫公昱暨冠裳好事者皆封呈咸竒之舊俗所傳月墜桂子惟天竺素有之唐天寶中寺前一子成樹今月桂峯在焉刺史白公居易詩云宿因月桂落醉為海榴開注云天竺有月中桂子落靈隱多海榴花又東城桂詩云子墮本從天竺寺根盤今在闔閭城石又刺史盧公輔句云逺客偏求月桂子老僧不志蓮華凡才士好以詩游勝概者到兹鮮不以月中桂子為奇句焉豫居是山十有二載始此一見之耳因取之播種林下浹旬而甲拆彌月而盈寸雖柔條未抽而枝葉可識明年春移白猿峯下古回軒亭環亭而植凡二十有五株仍改亭為月桂亭作詩二章一章十二句一章八句刻石是亭之側敢告後賢桂子詩月桂生瑶實千年會一時偏從天竺落祗恐月宫知出海光輪滿當軒玉樹㩻嬋娟含素影凌亂下空墀泉客珠連泣秋荷露忽埀林間僧共拾猶誦樂天詩栽種桂詩嫦娥有深意飛桂白雲關為惜仙家樹移佛國山蟾宫人若折鷲嶺世稀扳他日嵗寒裏松杉相倚間觀楊誠齊寒食雨中同舍約遊天竺十六絶呈陸務遊山不合作前期便被山靈聖得知只等五更傾一雨三更猶是月明時外筍輿冲雨復冲泥一徑深深只覺遲孤塔忽從雲出寺門漸近報儂知檜住山何敢望他僧只是逰山也不曽可惜一條杉路都將濕了不教行破雨逰山也莫嫌却緣山色雨中添人家屋裏生松樹穿出茅簷却覆簷小溪曲曲亂山中嫩水濺濺一線通兩岸桃花總無力斜紅相倚卧春風相老檜如幢翠接連山茶作塔緑縈纒山僧相識渾忘不到山中十五年拋三峯小石一方池下有機泉仰面飛坐看跳珠復玉忽然一噴與簷齊清逺溪中小閘頭遮欄溪水不教流山僧為我放一板濺雪奔雷怒未休城裏哦詩枉斷髭山中物物是詩題欲將數句了天竺天竺前頭更有詩湖忽見金絲嫋綺疏又驚寒食到來初不知折盡西栁插遍長安萬户無禪房寂寂水潺潺澗草巖花㸃綴間忽有仙禽發奇響落伽來自補陀山雨裏匆匆怨出郊晴時不出却誰教西湖北畔名園裏無數桃花只見梢人户户遊春不放春只愁春去不愁貧今朝道是逰少處處園亭處處人翻若道尋春被雨催如何隨處兩三杯晚晴曉雨如手有底虧儂不好來萬頃湖光一片春何須剖破損天真却將葑草分疆界葑外埀楊屬别人轎頂花枝儘閙裝遊人未暮已心忙無端更被千株栁展取蘇堤分外香消太傅平章賈魏公天竺山行舊題山北山南雪半村村店店酒旗招春風過處行人少一樹䟱花傍小橋間天竺通元菴分韻得間字千里髙松樹松邉屋數客同終夜話心是一般間燈色難禁雨秋聲不離山明朝分袂去塵事又相關黃初菴升香林洞詩日射岩扉曉霧開杖藜拄石破蒼苔一雙蛺蝶隨人去知是香林洞裡來東坡䖍州天竺寺詩引云豫年十二先君自䖍州歸謂豫言近城山中天竺寺有樂天親書詩云一山門作兩山門兩寺元從一寺分東澗水流西澗水南山雲起北山雲前臺花發後臺見上界鐘清下界聞遙想吾師行道處天香桂子落紛紛筆勢奇逸墨迹如新今四十七年豫來訪之則詩已亡有石刻存耳據此則樂天詩非為杭作故舊志不收但坡公贈杭州上天竺辨才二詩一云想兄南北山花發前後臺一云南北一山門上下兩天竺又皆採樂天語姑附著于此以俟知者靈鷲興聖寺在下天竺北慧理法師卓錫之地開運二年吳越王建舊名靈鷲大中祥符八年改今額嘉熙元年重建淳祐十二年又建靈山海會之閣理宗皇帝御書扁有理公巖龍泓洞滴翠軒九品觀堂東坡祠堂蘇文忠公題名楊繪元素魯有開元翰陳舜俞令舉日蘇軾子瞻同逰熙寧九年九月二十記文樓杖重修寺記云靈隱前天竺後名於天壤介兩山間一蘭若曰靈鷲竇石澗泉嵌空合流中分而兼有之考諸志實惟晉理法師卓錫之始理咸和初自西天來見兹山而驚曰是中天竺國靈鷲山之小嶺不知何年飛來佛在世日多為仙靈所隱今此亦復爾耶乃披荆榛乃闢梵廬地以人而顯至今巖以理名訪其塔猶在更唐表章至吳越尊尚至國朝駐蹕隱竺之價日髙而是剎幾蕪廢不治猶齊魯之邾莒緇素愴焉聞于神臯嘉熙元年秋妙選吳僧行果主之始至喟然曰吾少長兹境目擊而心憫之院無大小也人無古今也是山則前日之舊也吾其勉成之越明年作山門易向而南明年兩廡成又明年觀堂成位置合宜事可則而物皆可久也雅靚邃修丹碧奪目規畫一出其手內外備矣始欲築丈室建寶閣盡挹乎四山之秀不求諸人而聞者樂施不知其役而見者興敬于是靈鷲復粲粲余愛山水成癖坐冷泉憩香林屢嘗造其廬月異而嵗不同難矣哉修鱗泳波茂樹當道徑窈橋橫真使人意消于烟霏空翠之表吁顛而不扶危而不持聖門之所深嘆孰謂浮屠氏其專如果哉果北峯暮年之法子兄事古雲晦嵓遡其源已不凡兼而有常其心休休然士之寓者客而遊者入出一待之以禮察其色久不倦視其槖匪有餘此益有大過人者起廢細行也願力宏固有家法在遂書題詠唐人題靈鷲詩靈鷲名山萬古名幾回無事繞廊行殿前流水晴尤急塔上青雲晚自生鶴傍經床聽梵語鳥窺齊鉢候鐘聲我來借得蒲團坐歸去間眠夢亦清湯侍郎漢詩四首靈鷲古道場攝乎大國間一日忽翬飛四顧無靦顔淙引泉已成沼對石宜破窗他年澗上橋為子書春南澗靜者徒小試扶顛手期畢棟宇上拂衣入岩岫問禪去靈隱聽講去天竺還有無求人來尋靈鷲宿泉王樞密野登新閣詩山從西域來寺自東南有林既竒秀岩穴更深黝世僧奮空拳經始不已久俄然幻傑閣丹碧照林藪相輝靈隱前更勝天竺後理公坐崖屋千嵗骨已朽坡翁昔曽逰遺句今在否洞猿不待呼清晝時一吼尚書潛說友手中烏啄軀頑食詩靈烏渾覺不相猜啄食翩翩手上來自笑老似石被渠認作出生臺窣黃初菴詩屋畔危岑聳佛青客歸僧定掩雲扃洞猿窣循墻過几上偷翻貝葉經中竺天寧萬夀永祚禪寺開皇十七年千嵗寶掌禪師從西土來此山入定建立道場按太平興國元年錢氏建寺舊為崇夀院政和四年改賜今額南渡初有摩利支菩薩感應因命增廣殿宇以禁中所奉佛像賜焉有感應事迹刋于寺華嚴寶閣寶祐五年賜錢重修御書扁記文王給事信華嚴閣記并書錢塘南北山為浮屠氏居者大小幾四百所而授禪家學者三靈隱淨慈地雄勢重易起人嚮慕心故凡事墮欲輒辦惟中天竺蕭然孤立乎上下三大剎之間雖在昔為名山而前後因陋就簡住往不克自振粵僧法華來主大席奮然提空拳于人所不敢為之中而自謂能昌宗風于幾墜之地聞者笑之余亦訝其不量力也淳熙十四年被㫖禱雨大士道過其門則傑閣巋然羣目驚異僧帥其徒要于路請觀之攝衣同登金碧璀璨中設千葉盧舍那像立文殊普賢二菩薩于其旁五十三善知識布列左右而翼以鐘經二臺四山環焉如拱如衛髙欲躡雲俯疑臨淵石梁橫陳清流激湍氣象瓌富非向所見余問之曰師何力辦此誠不易法華曰未也吾將於佛殿而東之方丈法堂廊廡皆撤其故度材計工不辦不已言若大而夸而事已明悉人所樂施豫不敢以為誕法華請記嵗月日經始于癸卯之夏而落成于丙午之秋深辭之不可世言釋氏子能鑿空建事而竟于成歸于其立志果用力專然亦憑佛願力乃克有濟法華身若不勝衣言語無緣飾而短小精悍膽大如斗既動人如此豈非其一念所起勇猛精進足以感發人之善心不然人以為難何為之遽而成之易也法華起而言曰寺闢荒于千嵗寶掌禪師生于周威烈王之十二年至唐顯慶二年而化蓋住世千七十有二年維紀可考也法華灑掃于兹嵗在己亥冬十一月望之夕夢一僧來桂子堂額聳貌古金環貫耳自言為千嵗和尚昔嘗居此今汝能建立吾道興矣言訖不見晨興集大衆焚香作禮像前而致禱焉此其願力也法華何能為余雖未敢遽信其說然觀千嵗歸寂之偈嘗有他生復來之語法華之夢不為無據譬如為山進以一簣虧以一簣法華其勉之上天竺靈感觀音寺後晉天福四年僧道翊結廬山中夜有光就視得奇木命孔仁謙刻觀音像會僧勳從洛陽持古佛舍利來因納之頂間妙相具足錢忠懿王夢白衣人求治其居王感悟乃即其地創佛廬號天竺看經院咸平初郡守張去華以旱迎大士至梵天寺致禱即日雨自是遇水旱必謁焉天聖中僧說夢像浮空而行出小山曰吾欲憩此明日僧寂至語夢協乃謀徙今處乳竇峰矗其前白雲獅子中印諸峯左右環拱嘉祐末守沈禮部文通以為天竺起于司馬晉時踰七百載而觀音發跡西峯甫及百年遂分為二所謂上天竺也大士以聲音為佛事非禪那所居即謝去住持智月以辨才法師元淨為其主仍請于朝以教易禪賜名靈感觀音院時曾魯公公亮為相實奬其事既而蔡端明襄出守魯公以錢十萬為扁委蔡公為書之蓋魯公慶厯間道杭同行僧元達至天竺瞻禮中途見衣素婦人謂達曰上座同曽舍人來耶舍人五十七入中書語訖無所見已而如其言事具石刻元淨乃益鑿山闢地增廣殿宇魯公又以經五千二百三十卷遺元淨即西廡為藏熙寧中詔嵗度僧一朝廷每遣中使謁者致香幣嵗給大農錢作佛事而公卿貴人致幣祈禱者旁午于道紹聖二年郡守陳軒請于朝詔以一路祠廟施利繕修精舍靖康初郡迎大士禱雨于法慧寺屬有兵難僧道元祕大士像于井寺後廢今為臺諫宅第二位㕔事前廡下有觀音泉恐即其處敵退瓦礫中忽鏗然有聲始知井所在得聖像歸之院紹興五年髙宗皇帝嘗臨幸孝宗皇帝初即位以久雨降香致禱即日霽上喜甚賜內府寶玉三品明年御製大士贊見御製門乾道三年淳熙二年翠華一再臨幸殿及門扁咸錫奎章改院為寺又賜金幣創十六觀堂法輪寶藏仍命皇太子大書二扁理宗皇帝賜大士應夢畫像書心經其上仍賜御製贊及殿記見御製門又嘗書唐太宗所製聖教序及白玉香爐以賜如應真閣超諸有海廣大靈感觀音寶殿諸匾皆奎畫也已上並貯于雲漢之閣景定二年今太傅平章賈魏公施田二千畝作佛供自為記寺內堂軒亭館幾五十所內秋芳閣髙宗皇帝車駕嘗憩焉他不悉載寺之外有肅儀亭辨才建蔡襄名梅峯菴琮老橋楊梅塢金佛橋復菴流虹澗夢泉植杖亭謝屐亭凝翠泉觀音泉在大士殿北其味甘專以㵸茗雲液池記文鮑欽止代陳軒撰靈感觀音碑紹聖二年軒自合肥移守錢塘明年奏疏于朝曰臣所領州之西偏湖山之勝甲于天下而天竺山在焉自五代時僧翊得奇木不能名刻為觀音菩薩像僧勳又以佛舍利納置頂間其後像見光怪與人作福祥逺者載金石近者口相傳不絶不復概舉臣自去秋視事民方薦飢今年春夏雨彌月不止吳興苦卑連嵗水災父老日夜憂懼臣即率官屬躬禱像下冲雨入山衣帽霑濕渠決壞道從者皆涉比臣之還天宇開霽纎雲不興白日正中清風穆然邦人合爪嘆息既又輿至城中作佛事與民祈禳已而雨暘有時農不告病稼穡斾斾遂為豐年實兹像之庇此土也所不可忘臣竊考圖志惟天竺山粵自晉末嘗為道場逮聖朝天聖始分上下方而觀音像所在歷載崇奉在治平中賜號靈感因以名寺在熙寧中許寺嵗度一人為僧朝廷每遣中謁者走香幣其所封識用御府寶璽蓋嚴恭如此惟是殿宇之建垂六七十年日就頺敝不足以揭䖍妥靈宜有加飾臣不勝大願願給祠部空名度僧牒數十道貨緡錢市材僦工撤而新之不唯俾東南之人永有瞻式倘遇水旱禍灾吏不能力者亦庶幾有所控告臣皇恐以聞奏下尚書禮部禮部則以敕令從事許裒一路祠廟施利以充其費于是毗陵胡公宗哲番陽張公綬偕為轉運副使特主其事乃得錢五百萬民樂施者又若千萬是役也凡在見聞智者獻謀巧者出技富者薦貨貧者效力良材密石盡山澤之選經始于某年某月而某年某月告成為殿宇若干間髙明奧深嚴翼宏大復闢其前楹以為懴堂金碧丹堊之飾炳煥奪目至于香火之具瓜華之供物無不備晬容妙相巍然益尊過而禮者恍若梵天帝釋之居又疑身在圖畫或以為三昧力所變幻也蓋如是而後足以侈上之賜而顯揚菩薩之威靈以慰夫邦人父老之心四年某移金陵住持某大師某以書來乞銘將作石以詒于後既為撰次其本末又為之贊云白衣仙人無住著補陀落迦眇雲海為大導師安樂國歘然遍應河沙剎世間熱閙或有聞曽弗旋踵垂覆護衆生心念非一種皇皇不足常有求如饑須食渴須水顧亦何從滿其願我觀聖心等太虛其親萬物猶一物細視一物如一身是身四大猶不有萬物何能作留礙殊功妙用濟十方欲求功用不可得群生歸報可兩忘爾固無餘我無缺嘗觀瑞像現寶光如淨明珠時白赤琉瓈琥珀雜蒼玉熒煌璀璨照眉宇山巔或見初日升匹素曵空烟縹眇凡夫顛倒作思維須臾變滅無復初非空非色非有無菩薩應世亦如是堂堂祕殿表東南山君海王盡回嚮觀音智力不思議佛子當作何等觀諸洪內翰邁撰寺碑華藏世界毗盧覺海萬億河沙佛菩薩均以大慈能仁闡豁悲願為出世道師而隨念融攝從聞思修利末劫有生持戴瞻仰如在其上者唯觀音大士為然自給孤靈山騰身贍部兜率毗耶之宫補怛落迦之谷薄于無量無垠魔區鬼窟未有不光赫示化暢宣正機而放大光明覺有緣衆接物利人因病施藥直若家至户到者惟錢塘上天竺為然故其肇始于道翊師示夢于錢忠懿顯祠于咸平浮像于天聖易十方于妙臻還舊貫于元淨塵塵剎剎久而深昭于是有靈感美名之錫當時寶光示現濬發兆祥如赤珠如火燧如琉璃虎魄如蒼玉或粲絢屋翼或隮升山巔衍為朝陽飛烟匹練絳采軒匼寒青上挹霄漢湛然虛明之盛普照四天知制誥吕夏卿龍圖閣學士沈文通寶文閣待制陳軒紀載于前可覆視也遭靖康孽火鞠為灰燼蒿目淺智意其復初為難人天護承否極必泰大駕南巡守正臨是邦紹開中興寧濟方夏雖英謨雄烈大業得以憑藉然窈冥沕穆菩薩焉依凡請雨謁晴不嫌于屢故六七十載昭事愈飭傳序三聖年增嵗加錫鑾和鈴薦枉法駕捐內帑金幣俾建經鐘二樓會法安僧之堂羅漢之閣水陸之宇視所應為次第崇立孝宗創于西北隅啓十六觀賜之玉缶觚彜珠宫金相寶冠瓔珞價值數十萬緡親製贊文特書兩扁終之以法輪寶藏聖安太上亦揭賁雲章今皇帝又申永作天台教寺之㫖凡禪律賢首慈恩異宗毋得窺覦更易然後學者知所䝉賴是教也本于智者建化以妙為宗以如為體以法華三昧為極致以安養國土為依歸以正觀為修證之要蕩一切塵以空而觀立一切法以假而觀究一切性以中而觀以五時八教判釋如來一代訓典迄于無生真諦超最上乘教海淵深義天髙逺業空緣廢理勝惑亡等于太虛無惡不斷厥今水精之域圓滿清淨其門皇燁如其堂殿穹如其觀閣聳如其廂榮邃如群居常寂以智導迷人知選佛之場定在是矣先後住持者曰惟日曰若訥曰師覺曰妙圭皆擢録教門實稱僧中龍象圭遣信求記本末不置既書之而又係偈言其詞曰北山鎮錢塘三竺立分鼎西峯居上頭氣與下中異越其舍衛國千億踰繕那南無觀世音的以何年至至今無作相在此由在彼雖自西徂來而實未嘗動法門元不二一一成菩提應生無住心了不滯空有長松徑九里飛來橫絶之境象非人寰是真佛世界以我清淨眼普鑒阿耨塵白日當空虛豈復留纎翳皇居尺有咫天近聖澤深多羅蓮花臺不與昔時似髙皇屈萬乘孝祖親製文玉觚寶瓶彛冠絡粲珠琲價值百千萬莊嚴不遺力誰言佛土遙小叩則小應炎天六七月要雨雨登來乃至請晴霽隨念便獲感左方十六觀攝彼散亂心天台妙教宗永永傳真諦蕩蕩水精域化樂侔天宫太上及今皇瞻敬更無極咨汝白足士思報君特恩善修成法身一證一切證譬如杭巨海龍驤駕髙檣無風送吹噓難擬徹彼岸珍寶祕幽谷虎豹嚴衛守無人為我先可到不可致菩薩具方便總持觀十方沈沈大道場誓願遍應物紫金光結聚若非烟非雲闡宏慈悲心為汝衆生父念我四天子與佛俱有緣拈花笑世尊咸透第一義功施無盡藏護國并相民剎那彈指間聞見悉成佛惟日暨訥覺于今妙圭師稽首大士前洗我綺語罪乙樓內翰鑰十六觀堂記嘉定改元嵗在戊辰四月巳被命禱雨于上天竺山住持左右街僧録妙圭有請曰公頃年直學士院時嘗許以造修記而去國遂求于內相洪公今公既再入朝而寺之十六觀堂崇成願求記文以踐前言余何辭豫四明人城中延慶教院為東南最盛處嘗讀諫議忠肅陳公所為淨土院記云元豐中比邱介然修西方淨土之法不卧三年謂其同行曰我等各據一室成此勝緣來加衆而室不增多寺之西隅尚有隙地得檀施錢二千餘萬為屋六十餘間中建寶閣立丈六彌陀之身夾以觀音勢至環為十有六室室各兩間外列三聖之像內為禪觀之所殿臨池水水生蓮花不離塵染之中豁開世外之境自是更七寒暑無一不如其志初介然燃手二指誓必成此元符三年三月落成之日復燃三指以增淨誓于是見聞歡喜淨習之士無有虛位期滿者去發志者來依勝境而獲善利者不知其幾何人也了翁洞明教觀其序大略如此仰聞介然願心深切當時一木一石微至磚甓皆以大悲咒歷歷咒之而後授匠者建炎兵燬城郭焚蕩寺亦不存獨所謂淨土院者至今堅緻如故間一至其處幾于未施敬于民而民敬者上天竺山以觀音大士功德殊勝四民所欽孝宗皇帝留心內典乾道三年二月駕幸此山修供大士賜緡二萬俾建此室遂寫延慶規模以為之嚴淨精妙過者必肅又嘗命建于禁中退朝餘暇多燕坐其上或引禪律髙僧設齊講道非人間所可及也光宗皇帝時在潜邸奉㫖書額自此四方修梵行者接迹其中然物必廢興不離乎數開禧二年七月二十六日燈灺為灾悉以煨燼圭公竭力營建成于期年又過于舊金碧輝映稱其所謂淨土之說得㫖再摹光宗御書揭之山去都城最逺幽邃秀潤固已素離塵染况又為此淨處坐進此道者可不勉乎余去已告老不謂復為此來圭云住山十有七年建立勝事又作復庵于山之南為歸老計道俗歸嚮日領三數百衆修進不倦纍朝眷遇至今不衰豫非久于此者將復尋延塵之逰又不能如了翁推明九品十倫之㫖特以圭三請之勤為書其實以遺之退陸待制遊復菴記嘉泰二年上天竺廣慧法師築居于寺門橋南名之曰復菴後負白雲峯前直獅子乳竇二峯帶以清溪環以美箭嘉木凡為屋七十餘間寢有室講有堂中則為殿以奉西方像設殿前闢大池兩序列館以處四方學者炊㸑湢浴皆有其所床敷巾鉢雲布鱗次又以為傳受講習梵唄之勤宜有遊息之地以休其暇日則又作園亭流泉以與學者共之既成命其弟子了懷走山隂鏡湖上從豫求文以記嵗月豫告之曰進而忘退行而忘居知趨前而昧于顧後者士大夫之通患也故朝廷于士之告歸每優禮之而又命有司察其尤不知止者以勵名節而厚風俗士猶有不能决然退者又况物外道人初不踐是非毁譽之途名山大衆以說法為職業愈老而愈尊愈久而人愈歸之雖一坐數十夏何不可者如法師道遇三朝名蓋萬衲自紹熙至嘉泰十餘年間詔書褒録如日麗天學者歸仰如泉赴壑非有議其後者而法師慨然為退居之舉傾竭槖裝無所顧惜雖然以豫觀之師非獨視天竺之衆不啻敝屣加以嵗年功成行著遂為西方之歸則復菴又一敝屣也且而死生去來無常豫老甚矣安知不先在寶池中俟師之來語今日作記事相與一笑乎平章賈魏公施田記釋氏法施為無量施特粗迹爾嗇于豫者率以是藉口似道不謂然直謂捐甚愛而空所有則可以是求福田利則不可捐而空之在我不失為亷如辨求所利于物苐見為貪貪亷係行已界限所貴乎明于利與善之間也似道自以身狥國以來苐見夫仁可成生可舍平日所自有者一不得視為己物而莫甚于己未之終迄于庚申之春命之短長直在屈伸肘間當是時母子骨肉離散他抑可知已人能于此發深省則身且非我有而又何有于外物外物不攝于好則好貨財私妻子之念自可預悟貪風絶而亷道興矣然是心也人固或存于艱急之時而不能不忘于安逸之日以艱急而存于安逸而忘曽是以為悟乎斯心斯語似道常于侍側及之吾母重有感焉一日命似道曰汝能作施捨功德否茍能是汝固為真亷又將以善承吾志為似道奉命唯謹會辛酉春似道所建石橋寺曇華亭成實宦未達時嘗于斯地有心期逮今酬之所撤舊材積于亭側一日晝晦風雨大作及少弛則若有物徙而之他者寸尺不復存矣及供五百聖僧茶茶甌中一一現異花猶夫常也中現四字其文曰大士應供聚觀者神之豈將有所動悟于似道耶夏五月常雨為灾上命近臣詣上天竺禱大士導迎致于明慶寺似道嘗請禱許飯千僧亡何獲嘉應以六月二十八日往謝且酬既遂事佛光法師請于似道曰寺田已損僧飯將絶僧非穀粟不生活饑將奈何納溝若已公志也似道為之動于是蹶然思外物之何有體吾母之所命遡大士之有緣亟輟吳中伏臘之田為畝二千永作常住供養亦布曰空諸所有非以是求福田也吾儒家法福惟自求施求福何以異于市賈之利合而動不惟非所以自待所以待大士也宜不如此吾儕小人朝不謀夕相時射利皇恤厥德似道惟于坡老之言知所涵泳惟大士證明若曰為善必獲福厥應的不爽願以此功德回嚮于君親亦惟大士證明題詠東坡贈上竺辨才師詩南北一山門上下兩天竺中有老法師瘦長如鸛鵠不知修何行碧眼照山谷見之自清涼洗淨煩惱毒坐令一都會男女禮白足我有長頭兒角頰峙犀玉四嵗不知行抱負煩背腹師來為摩頂起來趂奔鹿乃知戒律中妙用謝羈束何必言法華佯狂啖魚肉雨中遊天竺靈感觀音院詩蠺欲老兮麥欲黃前山後山雨浪浪農夫輟耒女廢筐白衣仙人在髙堂八月十五日天竺山送桂花分贈元素云月闕霜濃細蘂乾此花元為桂堂仙鷲峰子落驚前夜蟾窟枝空記昔年破裓髙僧憐耿介練裙溪女鬪清妍願公採擷紉幽佩莫遣孤芳老澗邊聞辨才師復歸上天竺以詩問信云道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開神光出寶髻法雨洗浮埃想見南北山花發前後臺寄聲問道人借禪以為詼何所聞而去何所見而回道人笑不答此意安在哉昔年本不住今者亦無來此語竟非是且食白楊梅又弔天竺海月辨師詩欲尋遺跡強沾裳本自無生可得亡今夜生公講堂月滿庭依舊冷如霜萊生死猶如臂屈伸情鍾我輩一酸辛樂天不是蓬客憑仗西方作主人文欲訪浮雲起滅因無緣却見夢中身安心好住王度此理何須更問人孫雄飛上天竺詩行窮湖上徑迤邐到林巒地瘦馬蹄澀水清山骨寒樓臺棲樹杪鐘磬閙雲端自笑利名役未能來掛冠彌陀興福教院淳熙初慧光法師若訥奉㫖撥賜上天竺空間山地用衣鉢創建孝宗皇帝御製若訥頂相贊又賜宸翰三並見御製門紹熙三年御書彌陀興福教院為額後充皇子兖王櫕所永清寺薛大資昻香火院大觀間建顯親多福院天福五年吳越王建舊名光福治平二年改今額嘉泰元年敕葬韓節使同卿請賜今額大明寺元賜額興國菴淳熙二年法華和尚建淳祐六年移請今額自錢塘門外霍山掃帚塢至西溪黃杜篠山諸鄉寶勝院在石函橋西乾德五年吳越王建舊名應天治平二年改今額長慶院崇奉祠山香火舊係華嚴菴紹興四年請今額淳祐四年趙安撫與􅊸增建寶閣廣照院元係大聖庵紹興五年改今額清心院舊名湧泉天福五年建治平二年改今額對寺門有湧泉精進院在溜水橋東開運元年建舊名精修治平二年改今額充北蠟齊宫延慶院在精進院西元為長慶山興化寺嘉定九年移請今額澄寂院在精進院東桃花弄乾道七年移請今額寧國院在黃山橋淳祐六年自城內橘園亭移建永安院在掃帚塢淳熙間僧道恩建為觀音菴慶元二年發地得石幢有永安寺名廣順二年嵗次壬子二月丙午日建就請為額嘗以奉吳秦王香火有小圃亭曰清芬有太傅平章魏國賈公生祠不空院廣順元年吳越王建舊名傳經治平二年改今額護國仁王禪寺在掃帚塢初慧開禪師休糧禪定于隆興黃龍峰頂自是所至禱雨輒應孟少保珙為捐金買地建寺淳祐五年賜今額七年京師亢旱有㫖宣入選德殿演說雨隨至既還山又遣內侍問何時霑足開對以寂然不動感而遂通是夕雨如傾上大恱賜佛眼禪師錫賚甚渥寺後有龍洞澄深不可測八年鄭丞相清之躬禱而雨賜護國龍祠額未幾錫封侯曰靈濟寶祐六年撥賜平江官田三千畝顯親慈孝院在青枝塢寶慶元年內侍羅舜舉香火院廣恩報德禪院在青枝塢內侍王公昌香火院上關崇先顯慶寺在青枝塢內侍關氏香火院下關寺在王家橋試院西堰橋係上關寺廨院資夀院元係大聖菴淳熙七年移請今額龍居上乘院貞觀十九年建舊名龍居治平間重建改今額有寂觀佛慧寺紹興間益王府移請今額趙山正等院紹興中侍衛馬軍司駐屯于西溪建屋以奉諸軍香火移請今額報先明覺院在西溪建隆二年吳越王建舊名報先治平二年改今額舊有虛心軒崇真院天福六年吳越王建舊名永福治平二年改今額能仁寺在西溪充少師鎮潼軍節度使櫕所自錢塘門外溜水橋東西馬塍至餘杭塘西良渚清修院在西馬塍淳熙十四年建福昌院在東馬塍北湖州市西接待妙行院在湖州市左家橋西大觀間喻彌陀開山智果觀音院在奉口端平元年移請今額長慶崇福院元在長慶山興化寺嘉定九年改今額顯慈院吳越王建舊名靈應治平二年移請今額顯慈院紹定元年移請今額靈感院在餘杭塘新廟寶林院在黃松山淳熙年間建慶雲院元係普寧菴嘉定元年移請今額舍利院在東馬塍乾道七年建安平院在東馬塍淳熙中建元為寶月菴紹興間移請今額豐樂院在清修院北乾德元年吳越臣田氏捨宅為寺舊名嵗豐治平二年改今額勝像院在西馬塍紹熙三年沈氏捨宅建移請今額法雲院在草營巷治平二年改今額觀音妙智院開寶間張彥捨宅為寺舊名報國觀音紹興間改今額羅漢院在餘杭西正等院在調露鄉開寶間建舊名永福治平二年改今額仁壽院淳熙二年建移請今額延慶雙塔院嘉定十四年建移請今額金仙院貞明二年郡人錢宗夀建舊名鳯泉治平二年改今額慶恩院開運元年吳越王建舊名國恩治平二年改今額無淨院天福中建舊額鎮安治平二年改今額禪智院唐穆宗長慶三年以本鄉馮氏刲股救親捨宅為院賜名報恩法華院乾道間建係少傅劉氏香火庵淳熙十年移請今額真寂院開運三年吳越王建舊名雲岫熙寧元年賜今額崇福薦嚴院淳熙七年賜額為劉少師府功德院崇恩顯親院係節使李氏功德院淳熙八年請今額廣恩崇報院紹興元年建賜今額為內侍張氏香火院東連理院紹興間建元為明月菴乾道八年移請今額法昌院淳熙間建移請今額積善院僧妙通結庵移請今額仁夀教院嘉定十五年僧法昌開山請今額寧宗皇帝賜御書顯庵二字大雄教院元係上保菴開運中吳越王建治平二年改今額崇恩永慶院嘉定間建元係清心菴紹定四年改今額光嚴寺在良渚山係張循王府功德院嘉泰元年請今額寧宗皇帝賜御書笑菴二字咸淳臨安志卷八十
