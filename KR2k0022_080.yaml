body:
  text: 咸淳臨安志卷八十一宋潜說友撰寺觀七寺院自嘉㑹門沿江至城東湯鎮上塘保寧院在普濟橋南清泰中吳越王建舊名無量夀治平二年改今額普濟院在欏木橋東太平興國元年吳越王建有理宗皇帝元命殿曰祈永夀和聖福皇太后元命殿曰資福今上皇帝元命殿曰申祐有閣曰圓通寶閣四扁皆兩朝宸翰福田院在浙江欏木橋徐路鈐夢明捨宅建寺寶祐二年移請今額崇先顯孝院紹興初建舊為紫金菴內侍藍圭請為香火院改今額寶積院天福七年施光慶捨宅為寺舊名崇福後改今額紹興十五年以其地為駝坊象院徙今處永寧院在馬婆巷乾德二年錢忠懿王建舊名還鄉治平間改賜今額崇因院舊名大聖菴乾道九年移請今額今為憲節皇帝院在吳王功德院內寶嚴院紹興二十三年建元名興福菴淳熙二年移請今額慈雲院在新門外顯德二年建舊名慈濟大中祥符二年改今額理宗皇帝御書靈感道埸福昌院在候潮門外太平興國三年薛忠捨宅為寺舊名寧邦大中祥符元年改今額演法院元係西北流寓普惠菴淳熙十二年移請今額泗洲戒壇院元係紹興府山隂縣夀量院廨宇端平三年移請今額慧安院舊志作惠安在候潮門外舊為法雲菴淳熙十四年移請今額資賢院舊為姚氏永寧菴慶元間移請今額嘉熙二年壞於潮就螺螄橋僦屋以存香火相國惠嚴院在薦橋門外紹興四年僧淨超建殊勝寺在艮山門外三里建隆元年吳越王建元係最勝寺治平三年改賜今額演法院在東青門外一里元係看經院治平二年改賜今額崇福院在艮山門外元係寶夀院祥符元年改賜今額延夀院在艮山門外臨江鄉白石建隆二年建惠林寺在薦橋門外蒲埸巷去城一里舊在天慶坊係紹興中建以處隨駕僧行嘉定四年燬徙建于報國寺基以奉魏惠憲王沂靖惠王祠堂演教院在新門外惠海法師於建炎間隨駕渡江所建表節崇義寺在四板橋北為李忠襄公謙功德寺開禧元年賜今額法善院元係普賢菴乾道三年內移請今額祗園寺在崇新門外一里嘉定四年建移請今額西北真如院建炎初建以處流寓僧行崇聖院吳越王建舊在鳯凰山淳熙四年移建為澧恭惠王功德院善應院舊為華嚴菴乾道中移請今額觀音法濟院天福間吳越王建舊名觀音治平二年改今額燬於建炎神光夜發僧於瓦礫中得白衣大士相寺以復興惠嚴院紹興四年西北流寓僧淨超建悟空院錢塘亦有之天福七年吳越王建舊名崇新大中祥符元年改今額長明院開寶四年錢忠懿王建舊名法燈治平二年改今額崇寧萬夀教寺紹興初東京僧慈昌始得姚氏園結菴而居至乾道初增創堂殿移請今額淳祐二年重建羅漢殿八十楹及建膺福殿今崇奉理宗皇帝神御慧林寺先是東京大相國寺有慧林禪院隨駕南渡紹興五年以舊額建院于天慶坊紹定四年燬徙建于薦橋門外報國廢寺基充沂靖惠王功德院長夀院在螺螄橋東天福三年吳越王建舊名觀音大中祥符中改今額太平院係張司封祖廟宣和元年建寶祐二年移請今額法雨院淳熙間王俊民捨基為寺移請院額永興院㑹同二年吳越王建嘉熙二年江潮衝壞院僧别僦屋以奉香火傳法五藏院紹興初建以處流寓院有寶藏五輪一輪轉而四輪隨之故以為額普覺院乾德三年錢氏建舊名恩德大中祥符中改今額紹興十五年被㫖園林白地撥充駝坊象院金剛廣福院舊為少師陳氏功德院寶祐間圓通大士光現衆出力建觀音寶閣天龍寺在菜市橋南元係香積院僧了端小菴嘉泰四年移請今額寂照院舊為施水菴慶元六年移請今額資慶院舊為永寧菴紹熙元年建移請今額多福院乾道三年建移請今額如意院建隆中吳越王建舊名報恩大中祥符元年改今額歸仁院吳越王建舊名歸義治平中改今額華藏院清泰二年吳越王建舊額報恩大中祥符元年改今額淳熙十五年重建廣度院顯德二年吳越王建舊名文殊普賢大中祥符二年改今額湖光院舊為文殊菴紹興間建紹熙五年移請今額四向寺紹興間僧思靜建移請今額羅漢院舊為文殊菴淳熙二年建請今額昭化院顯德二年吳越王建舊名龍􅍭大中祥符中改今額紹興二十年改造省倉中界徙建今處有石姥潮王廟歸德院正明元年錢氏建有髙宗皇帝御書古詩云野水參差落漲痕踈林欹倒出霜根扁舟一棹向何處家在江南黃葉村以賜殿司統制劉漢臣後刻之石立東廡因果院開運二年錢忠懿王建舊名崇夀大中祥符元年改今額長生院顯德四年吳越王建紹興十九年㫖充九宫壇殿齊宫開慶元年就壇西半里許建僧舍延夀院應順元年吳越王建真如院淳熙五年建元在月塘嘉熙三年壞于潮淳祐五年重建于何店法明院建炎初建以處流寓嘉泰三年移請今額寶界院元在城中正明間建舊名翠峰治平中改今額今移建于艮山門外仙林定香院舊為積香院在西湖上乾德四年許王建治平二年改定香寶慶間改為旌德觀别建寺于今處紹定五年撥𨽻仙林寺棲禪院在艮山門外半里吳越王建舊為觀音院建炎間改賜今額資福院元係破塘崇善王廟菴淳祐六年建寺移請今額崇福院開運三年郡人以地易仁王院菜園建護國仁王院後改寶夀大中祥符元年改今額延恩院嘉定五年建元係彌勒菴嘉定六年移請今額看經院在范浦鎮河下顯德四年錢氏建自太平橋北前沙河至臨平上塘水陸院淳熙九年重建東坡督開湯鎮運河宿此有詩寄北山清順題詠東坡寄清順詩草沒河堤雨暗村寺藏修竹不知門拾薪煮藥憐僧病掃地燒香淨客魂農事未休侵小雪佛燈初上報黃昏年來漸識間居味思與髙人對榻論覺仁院天寶二年建治平二年改今額法輪院錢氏時有于榛莾中獲觀音泗洲二像知為廢寺遂建僧坊名曰觀音長興中改安國大中祥符間改今額吉祥院神龍間建舊名象光大中祥符間改今額瑞像院舊在城內淳熙十四年僧明祖因夢白衣大士遂建佛宇成之日東楹現蓮花居民異之祈禱者趨焉淳祐五年移請今額保慶院顯德元年錢氏建舊名保安治平間改今額崇善寺天福七年僧處齊建舊名衆善治平二年改今額廣嚴寺在臨平鼎湖吳地記云大中十三年常州督郵陸同芳寓居臨平浚井得石函有華嚴經一部乃奏捨宅建寺遂以華嚴名隋廢唐文明間重修復舊額治平二年改今額梵天院在安仁東鄉天祐元年吳越王建元係順天院治平二年改今額福濟院在亷德鄉之橫塘錢氏時朱可榮捨地建院名資福利濟治平二年改今額理宗皇帝御書無量夀佛之閣福善院在城北五里紹興間移請今額彌勒覺滿院在糴場廟北舊名棲真菴乾道間建端平三年移請今額廣教院天福中吳越王建舊名傾心大中祥符中改今額寶明院在糴場廟後普信院在端平倉東吳越王建紹興十一年重建廣教院在餘杭門外江漲橋東天福間吳越王建大中祥符間改今額寶華院在芳林鄉乾道六年土塘馬宗浩捨宅為菴名寂慶後沂靖惠王及張夫人重建佛殿法堂淳祐七年移請今額寶嚴院在肇元鄉元係寶勝院乾德六年郡人全仁暉捨地建屋治平中改今額政和中住山道崇夜夢白衣夫人來謁始創圓通道場建炎四年遭兵燹院燬盡而大士殿巍然獨存大衆駭異奉泥金法幢佛牙舍利謝罪夜遁去院旁數十里皆以大士得無恙紹興二年重建殿堂廊廡萬安院在大雲鄉顯德間建崇聖院在大雲鄉乾道間建天王院在豐年鄉保江院在豐年鄉開運元年吳越王建蓮華院在永和鄉建隆元年建永慶院在永和鄉桐扣村清泰二年吳越王建明覺院在永和鄉天福三年吳越王建元係丁山羅漢院治平二年改今額勝因顯報院在永和鄉臨平山紹聖二年尚書左丞蔡卞奏請充功德院賜今額超山報慈圓滿院在超山紹興初無礙道人法才建請今額被㫖追嚴顯仁皇后香火內有海雲龍王神祠淨信院在桐扣山天福六年邑人周璉捨宅為寺舊名恩平治平二年改今額自北關門外至臨平下塘諸鄉崇果院顯德二年吳越王建舊名羅漢治平中改今額香積院太平興國三年柯氏捨宅為寺舊額興福大中祥符中改今額化度寺梁朱异捨故居為寺舊名衆安隋改衆善唐改重雲再改承雲治平二年改今額有崇善王廟隋真觀法師夢神人聽戒願割廟廬之半以益佛宇廣教院係密印大師法暉退居菴慶元六年移請今額崇先顯孝華嚴教寺在臯亭山紹興十九年建㫖充顯仁皇太后功德寺二十八年賜崇先顯孝禪寺為額嘉定十二年改充華嚴教寺寧宗皇帝御書臯亭山三字及崇先顯孝華嚴教寺八字以賜有桃花塢龍游洞雲錦亭興教院天福間錢氏建舊名興善治平二年改今額紹興二十六年重建顯寧永報禪寺在真珠塢少宰劉正夫功德院宣和五年賜今額萬安院在大雲鄉顯德間建慧日院在博陸舊在孤山開運元年吳越王建舊名廣熙大中祥符中改今額蓮花院建炎間有廣嚴寺僧移請今額建造報慈圓滿院紹興初胡氏施山園僧法才募緣建被㫖奉顯仁皇太后本命隆興二年改賜今額寺有海雲龍王祠禱雨多應月輪院嘉泰四年建移請今額嘉定五年寧宗皇帝御書普照二字天王院元係永寧菴紹興元年移請今額寶嚴院在肇元鄉乾道間建治平院唐朝建舊額大中治平二年改今額慧覺院淳熙辛丑嵗旱僧梵融鑿井施水因建小菴嘉泰甲子移請今額福安吉祥院紹興間建移請今額崇恩顯義院在臯亭山為太師蒲察氏功德院有髙宗皇帝御書古詩五首及東坡墨竹賦刻石普濟院在肇元鄉治平二年建賜今額普寧院在大雲鄉六都天福間錢氏建治平中改今額傳燈院在奉口崇聖院淳熙間建金佛院開禧二年移請今額慈䕃院紹興間建景靈宫院徙頭顯忠院嘉泰間建貝慶院元係南菴淳熙九年移請今額羅漢院乾道四年移請今額夀寧院咸通三年建舊名法昌淳化三年移請今額龍興院在臨平鎮東紹興六年僧慧文募緣重建安隱院在臨平山之南清泰元年吳越王建舊名安平或謂安平以前又名永興蓋寺外有石幢鐫云于永興寺前建塔治平二年改今額地生曲竹僧多取以為杖故老相傳唐邱隱士丹成羽化植杖于此其竹皆曲竹間有丹井井旁有池名安平泉極甘冽坡公嘗賦詩詩見泉門院之後有黃犢嶺邱真人每乘黃犢採藥故名題詠林次麟詩直節稜稜是此君耳孫却以曲為名首陽山下知誰種亦可斜封向管城吕紘詩云疇昔聞髙隱紅塵隔逺林間乘黃犢出踏破白雲深自得忘歸樂應多叩角吟如今秋草沒幾約與僧尋夀聖禪寺在謝家塘淳祐七年僧懷隱開山創建寶祐二年賜今額記文林直院希逸撰寺記夀聖禪寺開山無住師懷隱所建也寺居臨安東北其地則仁和縣安仁里謝家塘也始為曠土四無人跡夜有異燈鄉人謂之神火師因經行或指以告師熟視喜之謂前臨浙江潮汐可挹兩山曰臨平曰臯阜左右擁如屏此佛地勝境也住錫營草菴日夜危坐祥光焕耀逺近駭之師時仰面上見星斗若無屋然隂晦亦如是聞者傳異緇素爭趨于是木石之事興矣經始以淳祐丁未賜額以寶祐甲寅勤苦二十年而後寺之成規畢備三門兩廡演法有堂庫室鐘樓雲堂方丈潭潭奕奕甲于諸方繼而皇帝本命有殿千佛有閣雄麗尤甚又濬築河堤三里許其廣三十尺通鎮市之舟楫便南北之往來寺前有池龍以時見遂以躍龍名之曰雨曰暘隨禱隨應穆陵聞而嘉之于是明禋虹節元命之辰夏制始終四季節朔宸香必降金帛隨盼遂為御前香火寺科敷借占有㫖蠲除寺之田山園地其在毗陵霅川本邑者為畝四千五百嵗有常賦太傅平章魏公又奏免之一相兩朝共成其志非道力有以動人是肯輕卑哉師再來人也生于杭之蜀山一為緇衣脅不至席常時削髮間有舍利出焉激勵其徒寒暑不少息人無貴賤有問者必以向上事告之其語朴而真破衲敗囊不事儀飾對鏡隨順泛若無心識真之士始知其為有道者也余觀自昔名山巨剎非人不興其始必牽茅䕃松耕墾岩谷以自給卒之崇簷傑閣動千百間鐘魚之㑹其衆如雲逰餐可以來一是皆其德業隆重有以自致焉近時則未有也若師者非今之麟角乎余識師三十年每以為可敬持空拳造此役難矣哉余既知其用心良苦而嘉其底績于成遂為之志其本末云爾大慈院正明二年吳越王建舊名大安治平二年改今額無量夀院淳熙間建移請今額遍福院在赤岸天福七年吳越王建舊名衆善治平二年改今額慶元初重建妙果院在赤岸淳熙間移請今額寶慶院在桐扣嘉定間移請今額佛日淨慧寺天福七年吳越王建為佛日院大中祥符元年改今額東坡題名祖志入山之十三日述古赴南都率景山逹原子中子瞻㑹别于此熙寧七年八月十三日年右文忠公倅杭時送客至佛日山寺壁間所題余十五往來山中常與舉上人游居其下後三十七年舉欲丐縣公勒之石余亦自蜀道東歸因勸成之淳熙丁酉嘉平日吳郡范成大書佛日淨慧禪寺在桐扣黃鶴峯下寺中有池池有渥窪泉東坡先生嘗賦七言絶句所謂細泉幽咽走金沙者堂上留題今既百年而詩僧慧舉乃謀入石可為好事矣桐扣以張華得名俗云同口非也淳熙五年正月九日東里周必大書元象備數知仁和之三月以公事過臨平聞桐扣佛日寺有東坡先生留題肩輿往觀焉字在法堂東壁蓋熙寧七年先生倅杭日太守陳公自杭守宋先生與諸公㑹别於寺所題也先生其年三十九嵗熙寧甲寅距今淳熙戊戌又百有五年堂宇日壞壁且摧剝字將闕蝕可為歎惜因命工摹勒而移之石庶幾可以永其傳云淳熙五年三月十日奉議郎知仁和縣事頴川韓元象題鄒忠公陳忠肅公題名紹聖丙子二月五日闕坦然峴子履志宇瑩中明逺瞻禮懷禪師塔時赴南昌郡淳祐己酉知縣李從命寺僧模以入石跋云物境之勝因人而尤勝如東西二林得平原公上下兩竺得眉山老皆與佳客同游復親題名氏於碑岩之上好事撫拓以為雅玩焉是邑佛日精舍有紹聖三年張子履所題板壁逮今猶存同與游者鄒道鄉陳了翁趙明逺輩若夫鄒陳之賢眼前二公何慊哉主僧本倅指以示豫因浼夀諸石子履名綬是年以朝奉大夫帥鍾陵明逺名士􅌔嘗以清逺軍留後知南外宗政有詞集行世坦然則未詳為何人所缺三字峴字之上必去字耳題詠東坡熙寧六年七月五日自長安堰還來游留贈長老榮公詩五首陶令思歸久未成逺公不出但聞名山中只有蒼髯叟數里蕭蕭管送迎千株玉槊攙雲立一檖珠流落鏡寒何處霜眉碧眼客結為三友冷相看東麓雲根露角牙細泉幽咽走金沙不堪土肉藏山骨未放蒼龍浴渥窪食罷茶甌味要深清風一榻值千金腹搖鼻息庭花落還盡平生未足心日射回廊午枕明水沉銷盡碧烟橫山人睡起無人見惟有飛蚊繞鬢鳴膽楊次公自海上來留題并序云佛日山淨慧道埸禮懷禪師塔時長老弼公即阿育王大覺禪師之嗣也豫出山酌甘泉而别因留詩云佛日山前水行人甘露杯須知源𣲖逺直自四明來人司馬才仲題清冷軒石冷苔生暈風髙竹度凉道何處去春色丰滄浪秦少游題五里喬松徑千年古道埸泉聲與嵐影收拾入僧房西范石湖成大自蜀還呈舉老詩帆掠楓橋意欲飛山雲物欲依依回思客路豈非夢乍聽鄉音真是歸舊事懶從年少問故人稍覺坐中稀不須更說桑榆晚粳稻鱸魚也自肥永慶院清泰二年吳越王建建炎間重建明覺院天福三年吳越王建寶華院乾道六年土人馬宗浩捨宅為菴名慶菴淳祐七年移請今額吉祥院天福五年建舊額福臻紹定四年移請今額廣安廣福院天福八年文穆王建舊額慶安熙寧元年改今額保江院乾道間建移請今額龍華𪠘院紹興間建永清𪠘院紹興間建寺有禹廟咸淳臨安志卷八十一
