body:
  text: 咸淳臨安志卷八十二宋潜說友撰寺觀八尼院城內外妙果院舊為興福菴乾道八年移請在城妙果廢院為額按舊志有妙果尼寺在金地山清泰二年錢氏建號金地寺大中祥符元年改妙果華嚴淨行寺在府學後淳熙間建廣恩院在觀橋普寧坊東淳熙中建今為秀王府香火院明因院在報恩坊巷西舊為雲隱菴嘉泰元年移請今額上方院在豐豫門北牆下舊為西竺菴慶元五年移今額淨勝寺在錢湖門裏祖師喜照於建炎間隨駕來此創菴名淨居紹定四年移請今額理宗皇帝御書淨居菴額以賜淳祐十一年移額於西湖集賢堂後塔菴慧光院在聚景園前乾道間張循王女孫真寂妙明惠懿大師自幼奉敕為尼守慈福宫香火遂建菴以居因佛指放光賜慧光為額至今住持皆張氏女寶林院元係棲隱菴慶元間發地得石塔上有寶林院額尼僧道言於淳祐九年重建因請名以寶林地藏寺嘉泰二年建慈光寺寶慶二年建三年充張府功德菴福全禪院在慈雲嶺下紹興五年請昌化縣廢額未幾燬嘉定十一年重建有圓通閣記文桯中書珌作重建院記福全老禪寒碧如淵姓羅氏新安人故龍圖閣學士吏部尚書汝楫之孫故通判福州皓之子受律六十年氷霜峻厲其徒有過面數不避里中敬憚之一日偕其徒請于豫曰福全故空山也吾師岩室紹逹紹熙間移額建焉無幾輒燬又建之三門兩廡則韜谷慧雲繼之然未有殿也吾與正嚴始作之嚴昌化民家子也與吾同此戒故同此果不幸化矣幸為吾記之豫曰若之所以為寺為殿為諸佛像者何也曰吾祖也往者之住善法堂也其屋皆金銀其器用琉璃瑪瑙今吾弟子不能變化惟以杉松桐柏為材以漆丹鉛黃為飾相與奉吾祖而事之耳豫又曰然則事之者何也曰吾祖自炎劉乘白馬入中上始建伽藍是後役神功驅人力造塔八萬蘭若四萬大寺四千鳴魚撞鐘十方響答蓋設像施化睹物悟心望吾祖之居瞻吾祖之容庶幾一世之人變熱惱而為清凉脫輪廽而超淨界所以貴乎在在大海水處處須彌山也豫曰善哉善哉受而祖之法如吾師者亦何病於法奈何法之不勝人也久矣吾欲㷊之蕩之使之空虗至於無空虗而無所容其人焉不亦善乎曰不然其法在則其人舉其法廢則其人亡人敝法耳非法罔人也豫曰吾以若等為忘而祖之法也今乃未忘焉然而祖之所謂法者不以心亂性不以意生情無妄見無狂華無兩舌無嫌妬無殺心常認光明毋令退轉如其不然從無始際未滅無明雖名出家猶隔日翳此則沙門比邱尼之所同忌者至若身為女人氣稟太隂若欲證佛功力更倍根塵既深縛脫有二使汝輪當出生入死所以若五戒若十戒若善信菩薩二十四戒若沙門二百五十戒獨比邱尼至五百戒若能分别斯為第一知我出家從佛入道雖具戒律入三摩地心常散動未獲無漏今從正攝心覺內明令我虗淨猶如琉璃相漸消鼻息全白以此妙香充滿法界普令一切咸證妙相若能如是則杉柏皆金銀丹漆皆衆寶譬如得水不在月珠我性圓明如空行月於是如來阿難與羅漢衆與人天龍衆悉皆歡喜作禮而退乃書而授之以為記殿作於嘉定十一年三月成於其年五月糜金錢千千緡施之者武節郎陳起宗其子訓武郎陳遵宣城居士汪士隆西方念佛堂作於十六年主其設者無礙道鑑其年孟冬朔日記上石龍永夀寺在慈雲嶺下天福七年吳越王建舊名資賢大中祥符元年改今額寺與石龍相接山石突出宛如龍首故名石崖之上刻仁宗皇帝御製佛牙贊見御製門咸淳元年改為尼寺妙淨寺在候潮門外乾道初尼宗普卓菴於此久之其徒妙勤請今額為寺嘉定庚辰燬恭淑皇后倡諸邸第捐資重建寶祐後智信極力增創由內及外總為屋三百楹其弟智鑒相與經營之有觀音閣曰潮音寧宗皇帝御書有華嚴閣曰華嚴法界理宗皇帝御書清修寺在崇新門外右軍寨前紹興間尼善辨䝉顯肅皇后建仍賜額定慧院在保安門外大德尼寺元係東京大德院扈駕南渡紹興五年建改請今額辨利尼院淳熙八年建元係慶菴嘉泰元年移請今額明因尼寺在臨平鎮崇寧中尼妙湛大師覺成於此立菴禱雨感應崇寧四年賜今額寧宗皇帝御書守內真除外妄修覺慧悟真如十二字恭聖仁烈皇后書衆生自度佛不能度欲正其心先誠其意無視無聼抱神以靜罪從心生還從心滅三十二字並揭於華嚴寶閣廣慈尼院在永和鄉中和四年建元係慈孝院治平二年改今額安福尼院寶祐元年尼普隆創係錢湖門裏淨居子院五年請今額開化寺在南山嘉泰三年妙智大師慧信開山請今額寧宗皇帝御書寂菴二字咸淳四年㫖充皇女潤國公主攢所九曲真覺院乾道元年建元係隱靜菴慶元四年移請今額極樂院在清化路口元係尼僧德勤嘉定二年創小菴淳祐五年移請今額南禪資福院在鮑家田尼惠果開山紹熙元年移請今額景定五年更創佛殿記文安著作劉撰建殿記髙宗皇帝駐蹕錢塘西有湖為群山囿浸成福地舊浮圖尤崇益無藝極至盈數百區有鮑家田最幽阻閴寂以演佛之說為宜自仁師者從開封來唯兹卓菴遵其徒其地猶未寺也紹熙初有果師見謂克增光者㑹南禪敕賜資福寺以承嗣不任廢乃益自厲祈其額焉主比邱戒墉惠户潔淨以樂宫掖向之無嫌礙嘉定壬午恭聖仁烈皇后灑翰錫之是名圓菴山門與額對映于是鮑田寺聲洞逺邇緣法充斥而殿屋未揚厥惟弗稱今師德深喟曰殿以棲像將妥之心逺甚獨早夜貶穡纍銖寸而圖之斂募不跡權貴之門力役不强耕作之夫負大木礱密石者不督而程若出神授殿落成獨搆余記余曰是謂求福田利益者與奈何中人十家之産也爾佛豈願費白日傷貨財者則曰吾仲尼未嘗厭厥居陋而百世道益光明冝乎惡於異端深輒瞪若謂君自孔氏則右其教獨如今之儒冠秩才下大夫腴田豐屋徒以益過子孫未聞守環堵而能棟孔子堂者惟譏吾殿也則工余掩袂稱窮無以詘俯而第其言以為記宅又施田記中國有佛氏非其教也借不深非是宜幽奧之阻絶湫囂之聚可耳密邇都㑹便游觀非其所也非其教是自背所師非其所是自失所尚吾黨何是之取余獨有悟者自國朝駐蹕錢塘王氣浮於耳目湖山南北諸峯隨人意以若媚四序景色易蠱諸欲非齊心理窟萍視俗浮往往胥而游游而恱與桑濮哇俚相競以冨不知復有靜中趣也萬有一生而靜者茍亦知之則見田衣笠首之侣柴立不自勝釡塵不聊生亦且曰寂以自苦未究厥道徒疚厥體于是靜者侵移于動此關于王城雄都之習俗嘗在法制勸懲維持之外今丞相魯國公深洞流情期於默返所性不狥淺識俾有以安其徒施舍既遍寰宇于湖山浮圖尤弗計而南禪資福寺拜公賜其一也蓋為田三百畝尼藉以歸先是比邱德深實主此剎悉力以買尹山之田時使以闢寺址之圃可禾可蔬視昔稍裕然徒曰集曰懼不給今滋飽無匱營衝無威障于其佛之教殆庶乎有游而悅焉知醉夢軟紅之不如也于是公之賜始大普明院在清修院北開禧元年請今額正福院在西馬塍紹定三年重建太平千佛寺元符元年尼僧思景建舊名千佛治平四年改太平安和寺係張循王府香火院慶元六年請建妙慈寺舊在城右二廂建炎初廢紹熙二年移額建於今處定善院嘉定間建移請今額廣福寺嘉泰間建移請今額菴城內外西北保寧菴在太廟前紹興四年建圓通菴在萬松嶺下郭公井淳熙十二年建圓通禪菴在貌門元係五顯行祠寶祐二年創觀音殿五顯殿方丈雲堂等屋又於路旁建施水亭上善菴在包山元係白衣五聖廟淳祐七年易廟為菴扁今額福全菴在包山冷水峪咸淳四年建扁福泉禪菴有龍王泉井方濶丈餘遇旱不竭圓通接待菴在蘇公隄咸淳四年太傅平章賈魏公捐錢創建施往來者茶湯仍籠燈以惠夜行之人石佛接待菴在水樂洞後相傳廣順間有古佛出現化為聖僧頂笠挑包入山隱於石時人於石上鐫成相貌嗣創小菴咸淳元年闢地增建寶林菴在臨平鎮梅墅開慶元年邑人閔道心等建施水接待澄心菴在錢塘縣履泰鄉淳祐八年創崇奉隨州大洪山三聖香火妙智禪菴在棲霞嶺上有洞在菴之左詳見洞門天龍菴在昭慶教場雲洞山後嘉定五年禪師慧開見山間有紫氣如蓋遂結菴其處嗣秀王師彌捐金為增廣之樓恭政鑰書天龍二大字洞明禪菴在西湖石函橋咸淳六年朱端卿捨宅為菴且捐田以助僧嗣源實經始之頗得湖山之勝了義菴在錢塘縣履泰鄉景定三年創佛塔散見諸寺院者此不悉載六和塔在龍山月輪峯即舊夀寧院開寶三年智覺禪師延夀始於錢氏南果園開山建塔因即其地造寺以鎮江潮塔髙九級長五十餘丈內藏佛舍利或時光明焕發大江中舟人瞻見之後廢已而江潮汹湧蕩激石岸舟楫沈匿至紹興二十二年奉㫖重造二十六年僧智曇捐市錢及募檀越因故基成之七層而止自後潮為之却人利賴焉記文曹松隱勛塔記嘗謂天下之事利害相若唯能因利以除害則利斯得而害乃去錢塘昔號都㑹既天子建翠鳯之旗為駐蹕之地可謂據東南天設之險而浙江介於吳越一晝一夜濤頭自海而上者再疾擊而逺馳虎駭而龍怒猛如山立歘如電轉掠隄突岸摧陷莫測甚至於捲民廬舍衝壞田畝為臨安之患久矣雖智者造謀巧者述之莫能禦也故洶然獨起殊百川之進退昔人嘗以為言又謂浙者折也以潮之出海屈折而倒流其地形蟠吳挾越夾羣山而中來折入既深激而成鬪夫以天設之險為東南之固可謂利矣而其奔濤巨浪民不奠居則害可勝言哉冥冥中果有神物典司其事錢氏有吳越時曽以萬弩射潮頭終不能却其勢後有僧智覺禪師延夀同僧統贊寧創建斯塔用以為鎮相傳自爾潮習故道邉江右岸無衝墊之失緣隄居民無驚溺之虞聞者德之而武林郡民日由之而不以為德逮宣和三祀塔與寺為寇盜所爇赤地無餘自是潮復為患嵗加一嵗或疾浪澎湃舞潜蛟躍鰍鱣以是巨浸怒沫頃刻間搗堤壞屋侵附江之陸數十百丈民雖實苦其害然迄無以措手紹興嵗在壬申天子憂之思所以制其害者在廷之臣首以復興斯塔為請詔賜可下有司計度意將官給金幣庀工治材而都下守臣擇可主持斯事得僧智曇蔬食布衣戒行精潔道業堅固可任以幹緣乃縷陳磗石土木方隅廣袤所以復塔之意曇口諾心然願以身任其勞仍不以絲毫出於官請得募民衆畢兹勝事都守即日命住持是院曇自被命如大檀越和義郡王楊存中率先衆力出俸資助又居士董仲永以家之器用衣物咸捨以供費先造僧寮庫司水陸堂藏殿安存新衆俾來者有歸依祈求之地以致中朝蓮社聞風樂施雲臻霧集雖逺在他路亦荷擔而來自癸酉仲春鳩工至癸未之春五層告成是年嵗晚則七級就緒巍然揭立成數十尋跨陸俯川欄楯層繚靣靣門敞寶網鳴鐸光動山海撑空突兀已立于風烟之上外則規制壯麗氣象雄傑日以萬衆歡喜瞻仰得未曽有內則磴道以登環壁刋金剛經列於上下及塑五十三善知識備盡莊嚴至於佛菩薩衆各以次位置凡所以鎮靜山川護持法界調伏魔境者莫不閡而存焉塔興之初土石未及百簣而潮勢雖仍洶湧浪猶暴怒已不復向來之害編氓得袖手坐視略無隱憂矣噫塔之利益果可以除害如此之驗耶曇之願力民緣法乃能興利如此之速耶以故衣緇冠黃耆艾士德曇甚深而拱手贊嘆是塔也不特鎮伏潮不為害又航於海者寅夕昏晦星月沉象舟人未知攸濟則必向塔之方視塔中之燈光以為指南則海航無迷津之憂是致冨啇大舶尤所歸向而喜捨無難色此又塔之利也塔將圓滿寺衆以寺之始末求豫文以記其實曇東人也體識深敏早受律儀持教臨壇已踰三紀信心之士往往聆芳咀妙割縛導迷作大方便護於羣生顧豫知曇之戮力乃申利害之所出陳上聖之憂勞紀廷臣之建言道曇之率衆與夫工役用度之數皆托其實庶知不假聲勢成兹利益備諸難事而盡未來際千百載下僧俗當共謹護以為此邦植福豈不美哉約用工百萬緡錢二十萬云嗚呼佛以像教開示群生而迷妄不靈渾然莫知所為塔之為意蓋稽諸一體內外洞逹于天人嚴持妙圓出乎物表堂堂此塔即此佛也以是威神峙廣大之地四時代謝法體常然屹若佛身臨以願力足能制諸外道降伏天魔此釋伽文所以禮多寶塔也推是在人清修梵行與之齊肩此塔髙廣攝受一切則與冥然日用而不知者固有間矣豫故標此若形理兼宣則自應氷釋云題詠李文清公宗勉題秀江亭詩經行塔下幾春秋每嘆無緣到上頭今日登臨方覺險不如歸去臥林邱兩何宋英題云吳國山迎越國山江流吳越兩山間山相對各無語江自奔波山自間風帆烟棹知多少東去西來何日了江潮淘盡古今人只有青山長不老僧仲殊南柯子詞金甃蟠龍尾蓮開舞鳳頭凉生宫殿不因秋門外莫尋塵世捲地江流霽色澄千里潮聲帶兩州月華清泛浪花浮今夜蓬萊歸夢十二瓊樓南髙峯塔天福中建髙可十丈崇寧二年僧修懿重修乾道五年僧義圓重建記文僧了心重建塔記住南髙峯塔道人義圓一日疏其重建大略來東城退居求拙者語以識之老子曰噫豫方掩關却掃默據團蒲體乎明靜如冬枯木如古澗水口邉白嗅久矣子不憚時流所忌將蕪汙先佛之塔廟也耶止心越三數月圓又來叩請彌篤老子從容合十指爪掌曰諾願從事于斯矣翌日與二士夫過西關入石塢由烟霞嶺得支徑徜徉而上松篁葱舊羊腸頡屈行杳靄間腳膝疲甚遂解衣分塊石而坐取棗栗相勞既而怒䇿藤枝獲小平矌仰視雲根秀拔天骨清臞玉立危層巉巉千仞吾人駭目動心疑將厭焉圓倒屣迎笑如慰如慕者也老子乃肅儀野次拜手稽首獻文字供以塞其望曰聞如是晋天福中有梵僧飛錫至虎林因睥睨南峯最髙頂曰于斯可以立大覺真人之表相些乃探毳囊出舍利一顆傍假比邱尼道圓疏助之力作窣堵波以福來者我聖世至道二年邦人朱氏泉崇寧癸未仁王僧修懿兩嘗葺補爾後跨陟星霜日就朽故紹興二十有一祀石屋宗妙師具箋疏挽今圓道人者居之圓器識周通歷練勤苦志在再新榱栱壯觀兩山于是乎切柏為香鈎簾借月入法性三摩提理事圓修克念伸禱致大居士劉侯伉以青銅錢五衆百萬而成就之今簷楹飛湧瓦甓堅緻耽耽殖殖所恱可龕室之內繪佛菩薩像合二十有四尊嚴雍肅仰止如生衛以天龍部屬十六善神至于案几器用罔不備舉每巡簷張燈或冥冥雨夜海啇山客以此為指南者也四廂闢軒窗以備游覽東瞰平蕪烟消日出盡湖山之觀南俯大江濤洞洄洑舟楫隱見指漁浦蕭然物色如畫西接岩竇怪石翔舞洞穴邃密疇昔紛擾之際脫虎口隱于是者活二千餘人其側有應真瑞像一壇狀貌竒古若鬼工天成北矚陵阜坡陀曼延箭櫪叢出麥牟連雲先是土竅中棲神蝄圓至不復見矣山椒巨石屹如峩冠目之曰先照擅度孫公琦訪求香幹懸以繒幡竪精藍標幟復相其上下纍石梯山乃便于步武者也信士周公紹能鼓鞲為干石鐘舉以重閣昏曉撾之蓋警諸昧昧者也是中或雄傑偉麗岌岌嶪嶪成象于斗牛之間或春蚓秋蛇天矯于晴嵐曉霞之際或鏗金戞玉聲聞于湖渚江皋之上此皆圓道人置力不懈而大居士二檀信毅然而勇施者也題詠楊蟠詩云日氣層層秀連山萬丈孤崔巍天上影一半入江湖郭祥正詩云岌岌穿南斗層層瞰下方揭名湖海頂半夜掛朝陽盡著作郎曹棐登南山塔詩云平生登塔與登樓亂鄉心送盡愁試上南山山下塔依前懷古復悲秋北髙峯塔天寶中邑人建髙七層屢壞屢修中藏古佛舍利元豐間長老圓明大師重建咸淳七年又燬見議鳩工題詠潘閬仙登靈隱塔詩北峯峯上塔竟上最髙層嘗謂人難到何當我獨登天香聞不斷海月見微稜懶下紅塵路重來恐未能聲梅侍讀詢髙峯塔詩髙塔列逺岑亭亭幾百載鈴答夜風輪影落滄海閒雲伴危級曙日平烟彩欲下生暮愁千山閉輕靄東坡游靈隱髙峯塔詩言游髙峯塔蓐食治野裝火雲秋未衰及此初旦凉霧霏岩谷暗日出草木香嘉我同來人久便雲外鄉相勸小舉足前路髙且長古松攀龍蛇怪石坐牛羊漸聞鐘磬音飛鳥皆下翔入門空無有雲海浩茫茫惟見聾道人老病時絶糧問年笑不答但指穴藜床心知不復來欲歸更傍徨贈别留匹布今嵗天早霜楊幡詩杳杳孤峯上寒隂帶逺城不知山下雨奎斗自分明郭祥正詩云翠出諸峯上湖邉正北看夜深雲霧散獨臥斗杓寒保叔塔在巨石山咸平中僧永保重修土人因號保叔塔焉雷峯塔在南山郡人雷氏居焉錢氏妃于此建塔故又名黃妃俗又曰黃皮塔以其地嘗植黃皮蓋語音之訛耳記文吳越王錢俶記敬天修德人所當行之矧俶忝嗣丕圖承平兹久雖未致全盛可不上體祖宗師仰瞿曇氏慈忍力所沾溉耶凡于萬幾之暇口不輟誦釋氏之書手不停披釋氏之典者蓋有深㫖焉諸宫監尊禮佛螺髻髮猶佛生存不敢私祕宫禁中恭率珤貝創窣波于西湖之滸以奉安之規橅宏麗極所未見極所未聞宫監𢎞願之始以千尺十三層為率爰以事力未充姑從七級梯是初志未滿為慊計甎灰土木油錢瓦石與夫工藝像設金碧之嚴通緡錢六百萬視㑹稽之應天塔所謂許元度者出沒人間凡三世然後圓滿願心宫監等合力于彈指頃幻出珤坊信多寶如來分身應現使之然耳顧元度有所不逮塔之成日又鎸華嚴諸經圍繞八面真成不思議劫數大精進幢于是合十指瓜以贊嘆之塔曰黃妃云吳越國王錢俶拜手謹書于經之尾崇聖塔事具聖果寺佛牙塔在定民坊辟支塔事具廣化寺題詠楊蟠詩云佛心隨處見層出更分明不用催燈火天髙月自生郭祥正詩崔巍辟支塔舒卷半腰雲知是藏真骨靈光五色分華嚴塔在南山延夀法顯院側淨因石塔在府治前元係淨因尼院雙塔上刻佛像經咒今在民屋後風雨晦冥間有祥光如然燈咸淳臨安志卷八十二
