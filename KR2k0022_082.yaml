而動靜而不失其時其道光明雖動未嘗不靜也公方昌羊空谷燕坐而山月上長嘯而林華墮閟風霆閣雲雨人莫窺其涘及出而施之詩書仁義之澤滂葩淋漓而春萬象風節所存殆有駭濤怒颶日夜舂撞所不能搖者身在禁闥乃心清泉白石間蓋處亦靜出亦靜也綸巾一壑目擊道存山顧不重耶晉謝太傅髙卧是山石室濬谷之趣自謂伯夷何逺悠悠千古此意惟公識之故併圖其像以慰山靈之思云題詠洪忠文公咨夔次俞紫微止止堂詩佛法元無法人謀盡過謀説空猶是著領妙更何求徑滑松杉古忩虛水石幽琤琤鳴鐵裡安處一時休透又塔院詩僧伽傳法處阿育放光時到頂直無縫心橫有枝梅間詩鳳咮竹裡酒鴟夷醉上危層去空明渺所思寶華院在縣南二十里嘉定十年僧如訥始築菴越六年移請院額理宗皇帝御書無量夀閣四字石照山淨土寺在縣南二里錢武肅王兒時逰息之地同光二年創為塔亭院治平二年改賜今額有錢惟演所撰碑詳具本山題詠家之巽題艮山閣詩樂山仁者寂不動面壁老獅機械深艮背行庭無别義佛心即是伏羲心却一邱兀硉蒼虬住四面森嚴陳馬齊笑白雲無定相長時逐雨過前溪法華院在縣西二里紹興九年韋郡王捨地創建奉顯仁太后香火僧皆業醫普應院在縣西五里景定間請額梵行院以下尼院在縣西北三十里舊名龍華長安二年邑人徐璉建治平二年改今額吉祥院在縣北二十里舊名靈龍政和七年改今額咸淳臨安志卷八十三
