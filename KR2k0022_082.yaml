body:
  text: 咸淳臨安志卷八十三宋潛説友撰寺觀九寺院餘杭縣法喜院在縣郭內溪北舊名吉祥光化二年建大中祥符八年改今額有王荆公安石讀書堂繪公像其中左有亭跨城東坡嘗宿于寺望吳興諸山懷孫莘老留題亭上後人名為懷舊亭紹興五年令范仲將建縣學于此而以舊學基為院院東百餘步有義井題詠荆公詩門前白道自縈回門外青莎間緑苔雜樹繞花鶯引去疏簷無幕燕歸來寂寥誰共樽前酒牢落空留案上杯我憶故鄉情不淺可憐鶗鴂重相催東坡詩徙倚秋原上凄涼晚照中水流天不盡人逺思何窮問諜知秦過看山識禹功稻涼初吠蛤栁老半書蟲荷背風翻白蓮腮雨褪紅追逰慰遲暮覓句效兒童北望苕溪轉遙憐震澤通烹魚得尺素好在紫鬚翁明心院在縣郭內舊名資福廣順元年建紹興五年改今額普救寺在縣溪南一里舊名寶聖光化二年建治平二年改今額建炎燬于兵紹興十年僧智方重造拆而為二有觀音像隨禱而應寶輪寺在縣東南三里舊名建興南齊永明間建大中祥符元年改今額妙智院在縣東南二里舊名觀音乾德五年建治平三年改今額顯聖院在縣東南三里舊名白塔開寶四年建治平二年改今額范文正公嘗經行有詩題詠范文正公詩登臨溪上寺遷客特依依逺水欲無際孤舟曽未歸亂峯藏好處幽鷺得間飛多少天真趣遙心結翠微善法禪院在縣東南三里舊名慶善天福三年建治平二年改今額院前有祝聖放生池紹興十年創寶林院在縣西二里乾道二年建夀聖院在縣南十二里招德鄉舊名福梁顯德二年建治平二年改今額興德院在縣西南二十里招德鄉舊名興善麟德二年建治平二年改今額天真院在縣西南二十里招德鄉舊名真君咸和二年建郭文舉曽于此修道故名治平二年改今額善應院在縣西南二十里招德鄉舊名靈應天成二年建治平二年改今額崇化資福院在縣西南一十二里招德鄉紹興二十九年建靈源院在縣東南一十二里安樂鄉舊名龍泉咸通七年建治平二年改今額題詠唐張承吉留題云四回山一面樓殿倚嵯峨中路見山逺上方行石多天晴花氣漫地暖鳥音和徒潄葛仙井此生其奈何澄鑒院在縣東一十五里安樂鄉紹興二十五年建移請今額定水院在縣東一十五里安樂鄉紹興二十八年建移請今額金山院在縣南一十五里欽德鄉舊名金源廣順二年建治平二年改今額靜林寺在縣東南一十二里欽德鄉蕭梁時建中廢人呼為寺塢林木森隘人迹罕至隂雨時或聞鐘鼓鑼鈸聲有僧利欽築庵塢中漸拓基址得大石龜二斷碑一文磨滅不可辨止存篆文靜林寺記四字又得古井六及階砌隱約尚存于是寺復興紹興四年重建廣福院在縣西一十二里同化鄉舊名興聖廣明元年建熙寧元年改聖夀隆興元年改今額般若院在縣北二十五里孝行鄉舊名長樂闕十一年建大中祥符元年改今額無相寺在縣北三十里孝行鄉舊名無礙永明二年建治平二年改今額無相禪院在縣北四十里孝行鄉舊名吉祥咸通十四年建大中祥符元年改今額慈聖寺在縣東北四十里常熟鄉舊名靈嶽寺唐歐陽詢寺記略云杭州餘杭縣西北有鎮曰曹橋鎮走北十里得精舍曰靈嶽兹寺也建武二年有周閩越王無諸十二代孫搖氏捨宅之所建也後唐天成元年復置治平二年改今額勝因院在縣東五十里常熟鄉舊名報聖開成二年建治平二年改今額大智院在縣東四十里常熟鄉舊名感山同光二年建治平二年改今額崇因報本禪院在縣東三十五里常熟鄉舊名興福乾德四年建大中祥符中改普寧紹興三十一年改今額大覺禪院在縣北四十里常熟鄉紹興三十年建普安院在縣東北三十五里常熟鄉紹興二十七年建請圓教院在縣北四十五里長安鄉舊名法華同光三年建大中祥符元年改今額悟真院在縣東北三十五里長安鄉舊名吳山咸通八年建治平二年改今額題詠王荆公詩野水縱橫漱屋除午忩殘夢鳥相呼春風日日吹香草山北山南路欲無大安院在縣北五十里長安鄉舊名境安咸通十二年建治平二年改今額廣順院在縣北三十里長安鄉舊名安衆同光三年建治平二年改聖夀隆興二年改今額光教院在縣北八十里止戈鄉舊名龍光大同二年建治平二年改今額有清習閣題詠邑尉聞人符題清習閣云清曉捲書坐開簾揖逺峯膩雲留宿潤膏雨沐春容世味生來薄詩愁晚更濃溪山看未足還聽暮樓鐘慈濟院在縣北六十里止戈鄉舊名吳山天成二年建治平二年改今額甘露寺在縣北八十里止戈鄉舊名石泉永泰元年建治平二年改今額慈相院在縣北一百里止戈鄉舊名石佛天成四年建治平二年改今額寶嚴寺在縣北一百二十里止戈鄉舊名寶隆乾元二年建治平二年改今額崇覺院在縣北七十里止戈鄉舊名寶幢乾符元年建治平二年改今額淨嚴院在縣北六十里止戈鄉舊名靈石天福七年建治平二年改今額正觀院以下尼院在縣南一里舊名祈福天監二年建大中祥符元年改今額淨安院在縣一里舊名南禪乾化三年建治平間改今額臨安縣徑山能仁禪院在縣北三十里乃天目之東北山也開山曰國一禪師法欽唐代宗時詔杭州即其庵所建徑山寺詳具徑山乾符六年改為乾符鎮國院大中祥符改賜承天禪院政和七年縣志云開禧元年改今額初師之來是山也猛獸不搏鷙鳥不擊山下之民不漁不獵有白兔二拜跪于杖履間有靈雞常隨法會不食生類及師之長樂雞長鳴三日而死今靈雞冢存焉紹興間大慧妙善禪師宗杲住山衲子雲集乃建千僧閣有妙喜庵孝宗皇帝御書扁顯仁皇太后髙宗皇帝嘗逰幸前後賜賚甚渥乾道四年乃建龍逰閣記文吳尚書泳撰重建寺記國朝駐蹕臨安自西天目龍翔鳯舞舒岡布麓蟠結而為帝王之都者錢塘也自東南天目熊騰馬奔凌深拔峭發越而為梵釋之宫者徑山也山以徑名乃天目之徑路其地尊故鬼神不敢宅其境勝故凡庶不得居必也以大法力建大道場然後能儲精會秀攬光景而納于其中始國一禪師卓錫于此興廢逮今蓋已四百餘年矣先是慶元己未冬龍王殿災精廬佛宇一夕而燼住持僧元聰治故而復新之後三十五年夏再燬無凖師範慨然歎曰曩在育王時曽夢一神人偉衣冠盛儀衛馳騎而前迎疇昔之夜又夢前神人者持念一寶珠以相授曰謹勿訝或謂夢之神即山之龍珠之數即火之日也豈住止成壞皆數耶師于是以精進心轉不退輪以勇健力撾無畏鼓披榛塞竅髙深度材于山視昔所封植可以為榱為梁為杗為角者適飽厥用則鳩工聚糧命幹力之僧相其役一念才起諸天響合上方頒賚甚渥公卿大夫士樂施舍南國之好善者不祈而獻貨不命而獻力越三年考成曰殿曰堂曰門曰廊曰樓觀棲客之廬齋庖之所庫庾井廄靡不畢具最是龍遊閣居翠峯之頂畫栱璇題承雲納日而虛櫩外曰凌霄之閣天空宇迥若與灝氣者遊循而下曰寶殿曰珤所曰靈澤殿曰妙莊嚴閣不但如飛來湧出而宸奎麗畫寶鎮此山實振古所未有舊兩僧堂幼學者居外久習者居內殆非不二法門今則統而為一楹七而室九席七十有四而衲千焉矧翼五鳳而閌離門之虛建萬佛而補艮山之闕皆以大用勝服之若夫乘金相水西奉多聞異僧所云更不道也比年以來嵗數不登諸方寺宇兵殘火燬荒基斷礎相望百不能興一二師乃于艱棘之秋亷以克已勤以募衆竟乘願力成就兹事豈不謂釋中之傑耶雖然豫嘗聞瞿曇氏之為教也旅泊三界木下一宿穴土為廬編茅為菴達磨之不屋也􅌫山之無殿也包攝之不設佛像也楊岐之不蓋僧堂也鳳穴之不葺破院也林洋泰布衲之不飾寺塔不占檀那地也瓦石擊竹無非道山桃開花無非禪地上木庭下柏無非佛安得有宫殿樓閣之華哉無凖曰不也了性者真幻皆性證實者權假皆實一大寶藏半説莊嚴一部華嚴只言現量有是身非旅亭也有是物非寓宇也有是居處室廬非假觀也有是宫殿樓閣非化城也于密屋可以識無漏于鏡壁可以見因果于廣大樓閣可以觀三生立一枯木為象可以起人敬心拈一團泥塗地可以使人不墮惡趣莖草建剎具足大智聚沙為塔皆成佛道安得謂無范金合土塈茨丹雘之事哉豫謂由前之説則一切有為之事俱落虛無由後之説則諸祖無上之宗悉成斷滅泥空則如盲人模象黑山窟裡修行墮有則猶跛鱉困泥濁海波中起沒二説皆非也道有則一塵不立道無則一法不捨於真空而不著頑空於妄有而轉歸妙有性圓而不偏念活而無弊合體性名貌融為一源其庶乎道哉師曰斯事具止善樂院火永邦建之記者張無盡也圜通寺焚師序復之記者周益公也己未之厄聰亦求記於樓學士子舊詞臣也盍為我識之嵗丁酉登山稽首請守寧國又請奉祠龜溪請益勤且曰上纍朌金幣賜御書復賁範以金襴法衣佛鑑師號蓋自靈山付囑以來未有如今天子神聖慈武清心寡欲篤行善道扶立教門如此之力子尚可得而辭耶泳不嘗醍醐不嗅薝蔔枯藤敗筆何能補述盛美然學自孔子所求乎子以事父臣以事君常恐不盡其分無以報國汝等捨世俗家出形色界辭親割愛不拜君父飯以珍厨棲以大厦將于何所求報國恩持經誦咒不足以報談空説妙不足以報殫子之力盡未來世以無量珤聚無量莊嚴不足以報惟發揚大旨警悟羣迷具如來眼踏毗盧囟掘二祖髓御大梅心標俱視指破馬師欽師惑使一切衆生成等正覺此真是報國恩處鑑曰唯乃為之記張魏公浚撰文慧禪師塔銘先是上為普安郡王時聞師名嘗遣內都監至徑山謁師師作偈以獻上甚佳之及在建邸復遣內知客請師山中為衆説法親書妙喜菴大慧禪師明年復取向所賜宸翰以御寶識之恩寵加厚而師亡矣仰惟主上神聖英武資不世出而惠顧一方外之士如此蓋師於釋氏所謂卓然傑出于當世者忠誠感格得之天理是以上動宸心眷知特異吁其盛哉自昔聖賢必傳心為學誠明合體變化興焉西方之教指心空為解脫究竟蓋得一而不見諸用而悟入要處或幾于盡性者所為後世三宗並行臨濟三傳號為得人超出聲塵不立一法根源直截以證為拯焜耀震動卷舒無礙如獅子吼遊戲自在獲大無畏此固不可以智知識識也臨濟六傳至楊岐再世而圓悟禪師克勤得法于五祖演被遇兩朝其道蓋盛行矣師實嗣圓悟益光明焉師諱宗杲宣州寧國人姓奚氏年十七為浮圖不欲居鄉里從經論師即出行四方始從曹洞諸老宿遊既得其説歎曰是果師祖意耶去之謁湛堂凖凖識師眉睫間久謂之曰子談皆通暢特未可以敵生死吾今疾革他日見川勤當能辦子事勤圓即悟師也湛堂死師謁丞相張公無盡求凖塔銘無盡門庭髙于天下士亦少許可見師一言而契即下榻朝夕與語名其庵曰妙喜字之曰曇晦且謂子必見圓悟師吾助子往遂津致行李來京師見勤於天寧一日勤升堂師豁然神悟以語勤勤曰未也子雖有得矣而大法故未明又一日勤舉演大師有句無句語師言下得大安樂法勤拊掌曰始知吾不汝欺也自是縱橫踔厲無所疑於心大肆其説如蘇張之雄辨孫吳之用兵如建瓴水轉圓石于千仭之阪諸老斂袵莫當其鋒于是賢士大夫往往爭與之遊云云浚在蜀時勤親以師囑謂真得法髓浚造朝遂以臨安徑山延之道法之盛冠于一時百舍重趼往謁惟恐後拜其門惟恐不見至無所容敞千僧之閣以居之凡二千餘衆所交皆俊乂當時名公卿如侍郎張公子韶為莫逆交而師亦竟以此遇禍蓋當軸者恐其議已惡之也燬衣焚牒屏居衡州凡十年徙梅州梅州瘴癘寂寞之地其徒裹糧從之雖死不悔噫是非有以真服其心而然耶又五年太上皇帝特恩放還云云將示寂親書遺奏及寄聲告别右相湯公又貽書于浚了賢請偈復取筆大書不少亂師雖方外士而義篤君親每及時事愛君憂時見之詞氣其論甚正確云云使為吾儒豈不為名士而其學佛亦卓然自立於當世非豪傑丈夫哉云云嗚呼我識師之早此心默契未言先同從容酬接達旦不倦人間至樂孰與等擬蓋惜其泯沒山林慧利之不博加於人也然而以道觀之安可以隱顯去來索師于形骸之內哉我實知師宜為之銘曰死生為一非想非説澄徹了悟一息千劫嗟師何為拳拳忠孝欲迪羣迷俾趨正教嘻笑怒罵佛事熾然情生智隔疑諦興焉天目巍巍終古莫移師之道德此山與齊南陸待制遊撰别峯禪師塔銘南山自長安漢中西馳為嶓為岷峨東行紆餘起伏歷蠻夷中跨軼且千里然後秀偉特起為三峯摩星辰蓄雲雨龍蟠鳳翥是名峩眉山通義犍為二郡實在其下人鍾其氣為秀民傑士出而仕者固多以功業文章擅名古今至于厭薄世紛棄捐衣冠木食澗飲自放於塵垢聲利之外而不幸為人知不能遂其隱操亦卒至於光顯暴耀者如别峯禪師是也師名寶印自成童時已博通六經及百家之説至是復從華嚴起信諸名師窮源探賾不髙出同學不止論説雲興泉湧衆請主講席謝不可圓悟克勤禪師有嗣法上首安民號密印禪師説法于中峯道場乃挈一笠往從之一日密印舉僧問巖頭起滅不停時如何巖頭叱曰是誰起滅師豁然大悟自是室中鋒不可觸密印恨得師晚會圓悟自南歸成都昭覺乃遣師往省因隨衆入室圓悟舉從上諸聖自何法接人師舉起拳圓悟曰此是老僧用者孰為從上諸聖用者師即揮拳圓悟亦舉拳相交大笑而罷圓悟歎異之曰是子他日必類我云云久之南遊見溈山佛性泰福嚴月菴果疏山草堂清皆目擊而契或以第一座留之師遁以免最後至徑山見大慧杲大慧問曰上座從何處來師曰西川來大慧曰未出劍門關與汝三十棒了也師曰不合起動和尚時徑山衆千七百雖耆宿名衲以得栖笠地為幸顧為師獨掃一室堂中皆驚云云被敕往徑山淳熙九年五月也七月至行在所至尊夀聖皇帝降中使召入禁中以老病足蹇賜肩輿于東華門內賜食於觀堂引對于選德殿特賜坐勞問良渥師因舉古宿云但透得見聞覺知受用見聞覺知不墮見聞覺知上悅曰此誰語師曰祖師皆如此提倡亦非别人語上為微笑云銘曰圓悟再傳是為别峯坐十道場心法之宗淵識雄辨震驚一世矯乎人中龍也海口電目旄期稱道卓乎澗壑松也叩而能應應已能默渾乎金鐘大鏞也師之出世如日在空升于暘谷不為生隱于崦嵫其可以為終乎萬陸放翁圓覺閣記淳熙十年二月己未徑山興聖夀禪寺西閣成乙丑上賜住持僧寶印御注圓覺經且命寶印為之序既上為嘉歎召見錫賚甚寵于是道俗咸曰賜經與閣成同時宜榜曰圓覺之閣且刻石以侈盛事則又咸曰陸遊宜為記寶印以衆言來諗遊於山隂澤中遊蹴然不敢辭恭惟聖天子以聰明睿智之資體堯蹈舜深造道妙悟一心於萬法之中既以博極皇墳帝典羲圖魯史之祕而象胥所傳木葉旁行亦靡不究覽以大圓覺為我世界悼士之陋多岐私智昧乎大同乃以萬幾之餘親御注釋凡十二大士之所問調御之所説佛陀波羅之所譯宗密之所注裴休之所言皆冰釋縷解于宸筆之下十日並照物無遁形百川東歸海無異味如既望月無有缺減如大寶鏡莫不照了東夷西戎南蠻北狄霜露所墜日月所照莫不共在此大圓覺中魯之縫掖楚之黃冠竺乾之壞衣祝髮平時相與為矛盾為氷炭者亦莫不共在此大圓覺中不偏不欠不迷不謬垂之萬世亦莫不然而寶印以山林枯稿之士道行海內名徹九重得以懷璉入侍仁宗皇帝故事召至便殿者再覲清光承聖問口誦所聞文附巨典有學士大夫學願而不可得者又此閣壯觀首冠一山費至三十萬錢其落成也適當賜經之時山川動色神龍踴躍於呼盛哉方閣之未建東偏有千僧閣紹興中大慧禪師宗杲所營宗杲法門之傑方住山時衆溢千數故以是名閣然自今觀之雖萬億阿僧祗衆猶有限量豈若圓覺之廣大無邉也哉顧遊衰病憔悴之餘學問廢落文思局澀而名山盛事本末閎闊非區區筆力所能演述實以為愧懼云題詠東坡頴濵詩並見徑山所范石湖題徑山凌霄菴峯頭非塵寰一舍誰茇軒眉玉霄近挼指沙螺豁萬山紛纍塊衆水眇聚沫來雲觸石回去鳥墮煙沒向無超俗緣兹路詎可越偕行木上坐同我證解脫山徑山傾蓋亭萬山離立翠雲幢嫋嫋稀聞晚吹香下行人塵撲面誰知世界有清光題徑山寺樓落日蒼茫水捫星縹眇樓神光來燭夜夀木不知秋海內五峯秀天涯雙徑遊愛山吾欲住衰病懶乘流海會寺在縣西二里舊為竹林寺大同中建會昌五年廢大中五年重建大中祥符元年改今額記文蔡端明襄撰杭州臨安縣海會寺梁大同中始作號曰竹林及五代正明之初錢吳越王又新之王縣人也少嘗往來里中困甚已而跨有全吳名貴地大私自省所從來豈非有隂相我者耶且竹林最得山水佳處因大治之益廣前制當是時吳中浮屠居雖百千數無是倫者大中祥符間例易天下寺名遂錫今額天禧五年冬十月火通夕而墟其徒散去總持僧有朋顧思憮然以興所廢為已務每説于衆曰吾師之法或資於塔廟福報之來稱其所出今殿適謀始而大家力饒不能厚施異時名氏不齒篆載反索氣于後人其可乎於是盛仁俊張從實先輸而倡之從而和者數十百人以元一盛鋹兼管度材礱石塈茨陛級之役積費錢三千萬行一十年而後已既成列像其下鐘鼓其中會合邑子而落之墟者復芘而散者復集錢氏以一國之資基之於前而有朋以一已之志繼之於後可謂能且勤矣題詠東坡題海會寺詩籃輿三日山中行山中信美少曠平下投黃泉上清冥線路每與猿狖爭重樓束縛遭澗坑兩股酸哀飢腸鳴北渡飛橋踏彭鏗繚垣百步如古城大鐘一撞千指迎髙堂延客夜不扃杉槽漆斛江湖傾本來無垢洗更輕倒床鼻息四鄰驚紞如五鼓天未明木魚呼粥亮且清不聞人聲聞履聲此又清心堂云南郭子綦初喪我西來達磨尚求心堂不説有清濁逰客自觀隨淺深兩嵗頻為山水役一溪長照雪霜侵紛紛無補竟何事慙愧髙人閉户吟淨土禪寺在縣南二里顯德中吳越王建號光孝明因寺大中祥符元年改今額有石刻妙法蓮華經七卷葉清臣書題詠東坡詩雞鳴發餘杭到寺已亭午參禪因未暇飽食良先務平生睡不足急掃清風宇閉門羣動息香篆起煙縷覺來烹石泉紫笋發輕乳晚涼沐浴罷衰髮稀可數浩歌出門去暮色入村塢微月半隱山圓荷爭㵼露相攜石橋上夜與故人語明朝入山房石鏡炯當路昔照熊虎姿今為猿鳥顧興廢何足弔萬世一仰俯足楊參政棟和云今君督來期書郵日旁午世事不論清遊乃先務明朝叩禪關復此得淨宇淺斟琥珀濃細嚼銀絲縷味雋問牛酥軒髙來燕乳曲折溪屢橫尖圓峯可數萬頃喧桑田一簇靜松塢由來鏡中人不殊草頭露越主朝汴宫蜀客盡吳語剝蝕淨土碑荒殘峽山路桑梓如之何誰能忘一顧日詢錦橋新三歎清流俯淨明院在縣西十五里舊為五峯院天福中建開化禪院在縣南二里乾化五年吳越王建舊名功臣大中祥符元年賜今額題詠東坡自淨土步至功臣寺詩落日岸葛巾晚風吹羽扇松間野步穩竹外飛橋轉神功鑿橫嶺巖石得巨片直渡千人溝下有微流泫岡巒蔚回互金碧爛明絢緬懷異姓王負擔此鄉縣長逄跨下辱屢乞桑間飯誰知山石頑識此希世彥凜然英氣逼屹起猶聳戰他年萬騎歸父老恣歡宴錦繡被原野珠金散貧賤竇融既入朝吳芮空記面榮華坐銷歇閲世如郵傳惟有長明燈依然照深殿崇覺院在縣北三十里舊名合覺院乾德中吳越王建治平二年改今額廣教院在縣南十里舊名寶積治平二年改今額雙林院在縣西北十五里舊名寶林天成元年徑山寺僧景文望南山有祥氣遂廬於山巔大理評事俞夀因捨山為寺於土中得金銅佛像三寺僧寶傳至今五百年矣山南有迎暉亭望錢塘江見東日初升溠水巖在寺山之腰有瀑布泉飛白甚長東流至於海記文建溪黃揆撰院記杭州臨安縣之西北寶林院者即後唐天成初里人大理評事俞夀以其山之髙明深秀真浮圖氏之所居也遂召徑山僧景文廬於其旁巔一夕景文夢有祥氣達天三及覺而異之翌日發地得金仙軀於是俞氏族人盡絶其旁地以為寶林院焉院之建距今百有餘年堂殿摧圯法像潰壞其徒沖廣藴式自嘉祐庚子同心悉力募諸鄉人鄉人樂施其財以成其志以至於今凡八年而工畢其丹漆之宇泥金之相莫不焕然一新矣英宗即位例更天下寺名于是始易今額云夫金輪氏之教自漢明帝時流于中國及晉宋齊梁之間崇尚益甚自是之後夸侈日滋樓觀相望多于㕓野之廬井亦其習俗漸漬而非釋氏之本然也抑嘗聞菩提以法界為居大空為相居以法界則羣生之前萬物之後莫匪佛也相以本空則無倫之大無內之小莫匪佛也然而必宫其居必像其象者蓋為之教而使民得以景仰修省而善之所自歸焉耳沖廣請余書廢興之迹以示於後余嘉其成功而亦明其學佛之本焉題詠邑令李敷詩云雙林髙寺秀峯環我欲題為小徑山炎月一逰神骨爽天風相送出松關令鞏豐詩云我來將值日午時千峰照曜碧玻璃集賢村落俯列屋寶林樹石呈幽姿人言可比雙徑雄妙處乃在阿堵中崇岡展障屹亭左似約老眼專窺東日出烏鳥飛日入牛羊下再遊當與夸父期不用山僧逺迎迓山洪忠文公咨夔詩大徑山髙寺山巔小徑山深寺趾辛夷花開數點雨艾納香空半泓水新新故故自樓閣下下髙高各窗几二三名公詩一束八十老衲畫幾紙雲岑滅沒野屋浮草樹離列渡舟檥露橫斷浦月已髙日落平沙風欲起直疑著我江湖間安得伴君岩壑裡魚肥尚恨絲蓴晚酒酣苦愛葅筍美參寥有句墮杳靄更上迎暉亭徙倚吉祥院在縣東南二十五里光化中僧明曉大師開山舊名平陽治平二年改今額定惠院在縣西三里東晉時號匡瞻院縣有瞻山天禧四年改今額靈峰院在縣東十里舊名靈山長興二年建治平二年改今額興教院在縣東十五里天寶中建吳越王號興王院治平二年改今額演法院在縣西二十里天成四年邑人俞郢建治平二年改今額饒益院在縣東十五里舊名益錢治平二年改今額西化成院在縣西北三十里舊名普門咸通九年建治平二年改今額長清院在縣西北三十里大中間邑人阮章建治平二年改今額無垢院在縣西北二十五里天福三年邑人俞昭建景祐四年賜名靈福治平二年改今額精進院在縣西二十里舊名報恩治平二年改今額太平萬夀院在縣東二十里天祐中吳越王建天聖七年賜今額梵安院在縣西十里舊名九州保安長興元年吳越王建治平二年改今額大仁院在縣北二十五里舊名大祿天成元年建治平二年改今額觀音院在縣東北一里咸通九年建後廢建隆二年邑人吳光祿重建復元額不仁院在縣東南二十里舊名西華咸通二年吳越王建治平二年改今額晝錦院在縣城南舊名妙嚴治平二年改今額光孝院在縣西五里舊名保安天福元年吳越王建國初寺名廣孝紹興十三年改今額禪定院在縣東南二十五里舊名六度同光二年錢氏建治平二年改今額夀安院在縣西二十里舊名長夀天成元年錢氏建治平二年改今額淨應院在縣西三十里舊名應祈天福四年錢氏建治平二年改今額福勝院在縣北二十里舊名福全乾德四年建治平二年改