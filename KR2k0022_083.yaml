body:
  text: 咸淳臨安志卷八十四宋潜說友撰守觀十寺院於潛縣寂照寺在縣南二里豐國鄉舊名吳興大中五年改今名隆興初邑令葉衡重建中書舍人張孝祥書額寺舊有緑筠軒後徙縣齊寶慶初建御名改為此君軒題詠東坡緑筠軒詩可使食無肉不可居無竹無肉令人瘦無竹令人俗人瘦尚可肥士俗不可醫傍人笑此言似髙還似癡若對此君仍大嚼世間那有揚州隺明智寺西菩山在縣西十八里波亭鄉初山之西有光亘天現菩薩像僧道志立茅廬其下元祐間因建佛殿遂名西菩寺治平二年改今額熙寧七年八月蘇文忠公同毛君寶方君武訪參寥辨才遂留西菩山留題建炎間重修秦少游之子湛為記有清涼池明月池雙峯堂滌軒覽秀軒西資閣見山亭記文秦湛作寺記其略云於潜之西菩有光燭天見菩薩像其時僧道志茅廬其下遂聚邑人之錢而廟佛焉號西菩寺實唐天祐中也本朝改曰明智今謂其山猶曰西菩辨才既從此山行道吳越山中之徒思踵其武踴躍精進云云明智以有道者之故棲學佛者望之如仲尼之徒於闕里其氣象景物又蓋境內自於潜十有三里至山之麓未及之五里上松旁澗與道委蛇仰可以䕃俯可以鑒循環曲折乃得平直兩峯屹然如立長人如獲居迎來五老九華未易伯仲泉湧西岩之址盛暑常寒筒引錯落遍於百室是以居者忘出遊者忘歸云云自有此寺已數百年土殞木壞風雨入室像設不嚴威儀不成雙峯既歸未嘗有求邑之富於力者相率施所有寺為之一新云云余先人與辨才善余兒時先人對辨才語必令旁侍其髙世之論至今能記一二而辨才物故前先人十年今龍井天竺間雲容山色或誨人愁其能念前人乎豫每見來自吳越者未嘗不問辨才門人何如故聞雙峯之名久矣杜門錫山之下一旦蒼頭告豫曰門有道人吳語而文亟出見之乃常樂性禪師也謂明智重葺欲豫為記且曰先太史常為辨才記龍井今記明智非子可乎豫不敢辭雖然雞鳳異調大方之家豈不我笑題詠東坡詩推擠不去已三年魚鳥依然笑我頑人未放歸江北路天教看盡浙西山尚書清節衣冠後處士風流水石間一笑相逢那易得數詩狂語不須刪路轉山腰未足移水清石瘦便能竒白雲自占東西嶺明月誰分上下池黑黍黃粱初熟後朱柑緑橘半甜時人生此樂須天賦莫遣兒曹取次知岩王中丞樂道詩云邃壑重巒十里過天圍佛境隱阿儻來功業忘情久暫到山林結意多李祕書公美詩云兩峯直起翠屏開西院流泉湧碧臺不在徑山天目後使人去了又重來治平寺在縣北十里嘉德鄉舊名天目乾寧元年建治平二年改今額記文程北山俱作重建佛殿記餘杭之鎮曰天目山唐人作僧舍於其下號天目寺自㑹昌中廢大中復興更唐末五代至皇朝且數百年巋然嘗為邑里信人之所依向治平中敕賜名曰治平世以夏臘主寺事其徒往往遊楞叩義學師指授演說修多羅教或從善知識傳佛心宗自顯南禪師以來代不絶人宣和庚子盜發新定陷於潜寺焚有邑豪襁負其母避地走山谷過其門望遺址默自誓曰使賊平家脫禍當復新此殿云及賊平其家大小數十人汔無恙明年建大佛殿為佛菩薩大弟子護法神像壯麗輝絢莊嚴殊特悉加於舊焉吾鄉鎮江天寧禪鑒長老道潜實受業治平寺蓋所為從善知識傳佛心宗者之一也數為豫道治平寺且求文以記其本末於今三年矣而請愈堅吾聞志人聞士依真而住非可以國土觀一相無相非可以聲色求不即不離非可以方處攝也又況棟宇之奉像寓之設哉然於無為中示現有為於不住中宣說常住其悲智願力所以開度有情者不廢也故昔釋迦文佛於欲色界中大集羣品說法之餘以四天下二十支提若須彌山頂開華藏殿若震旦漢國那羅耶那以如是等牟尼聖人往昔住處付屬諸龍又以閻浮提中四方國土若若遮波羅處若阿跋多山若善安住塔以如是等諸佛羅漢賢聖天人修行住處付屬星宿天龍藥義大鬼神等分布守護然則名山佛剎所以建立扶持者幽明之際必有尸之者矣兹豈偶然也哉方是寺之存也棟宇像寓屹然如山而惡念人能以一念使與灰燼散滅及其復也有信心者亦以一念能使荒穢瓦礫之區化為梵釋之宫獅子之座甚矣一念之不可思議也方一念之作雖有神智莫得而聞見搏執也然無形而成不疾而速雖無邉如虛空密用如造化堅固如金剛迅速如毗嵐不若是烈也一念為善念念續之不惟成一身仁九族而已擴而濟天下澤百世無難也至於得果成道髙可以超三界下可以生梵天為四果為二乘為菩提薩埵為佛世尊極其原初出於一念之微而其所利益成就至於不可勝言者一念為不善念念續之有至於提戈相尋伏尸流血數百千里人畜草木為空一旦敗禍父母妻子相隨就砧几剝割膾醢肉餧鴟鴉狗鼠死入地獄受無量苦經千萬億劫乃為畜生出入炮烙剖割之間或為餓鬼飢火所燒支節竅户猛焰熾然又千萬億劫極其原亦出於一念之微而流毒之大受報之酷亦至於不可勝言者前日之羣盜是也使橫目之民惟善是念如火傅薪如水趨下而善不可勝用矣一家為善則一家安一鄉為善則一鄉化推而凖之天下則鬪很淩暴之風凶荒疵癘之應何從而有哉是則安樂之土已矣豫因潛之請也以是告於方來使知一念之微不可不基其不可思議力可使利益及於無邉成就至於佛地而塗之人皆可以勉也營事僧曰可先義交道顒住持僧曰希表邑豪曰徐彥通佛殿費蓋無慮二萬緡云常樂教寺在縣南五十里長安鄉舊名樂平建興二年佛圖澄建治平二年改今額元豐間僧保元重建寺有圖澄井圖澄閣廣福院在縣南二里舊云在縣南五十里朱梁太師吳敬忠捨地舊名國泰天福二年建熙寧中改壽聖紹興三十二年避髙宗皇帝殿名改今額舊有放生池有般若莊後因洪水衝蕩遂為寂照寺子院崇壽院在縣西二里岝㠋山舊名興福紹興元年改今額有曠軒雙溪叠嶂跨虛亭開禧三年令王日益始刋錫額之敕於石記文令王日益跋敕額云浮溪之漘有山曰岝㠋瑰石嵌岩拔地千仞繚徑危磴盤空百折椒有精廬縹眇雲目之表負陽崖結屋以凌空濶而納沆瀣是為曠軒轉而西則為雙溪叠嶂暇日領客登眺溪橋橫卧野木旁拱倒景流光上下相屬前峯後巘之奔伏逺洲近溆之分合霽日隂雲朝霞暮烟之開斂吞吐莫不盡於几席之上窮天地之竒變遺氛埃之溷濁長嘯激烈谷應水湧因訪主僧宗照以山中勝事纚纚可聽至立剎之顛末則曰知其為崇壽而已他無考焉潛號山水邦而岝㠋為最管領勝概是剎居多固宜宏扁詳記以聳秀偉傑特之觀顧缺不著得非時移事改漫漶而失其傳歟抑遊者徒耳目之玩隱者唯仁智之樂而不暇及歟退而求諸故府得天聖錫額之敕始以是山具飛來之體而微故因鷲峯之廢而起之端拜肅覩榮光晃蕩遺珠獲於赤水藏簡出於魯壁駭愕疑喜恐得之夢寐而不敢自必其真刋諸琬琰日星絢爛蓋欲侈熙朝之賜補曠世之闕而發山川之靈以慰鳬鷖麋鹿之思也夫天地之於景物往往珍其勝而嗇其全故名山佳剎清泉異石多在隱僻荒翳之境或得之近郊而竒觀又不能皆稱矣非託之名雋榮之錫命雖竒猶未重也岝㠋去縣跬步截立溪流既已清曠絶特而玉局老仙之精爽復往來隱見於其間衆美畢具而寵額之錫猶晦而未彰意天鑒地祕果不以全豫物而今盡得之要必有隂相之者故作而為之書接待普寧院在縣西二里岝㠋山下慶元三年令趙彥倓建嘉泰三年令眺百談祠昭應靈惠二龍君遷錢氏時古佛像嘉定十六年移請今額記文戴燧記遷釋迦像云後二百七十五年當巨宋之嘉泰三年癸亥寺廢已久像亦隨壞於是清豐朝百談宰邑政成適浮橋接待院開山沙門宗浩新作朝陽閣乃命加雅飾而遷焉肖形甚古觀者起敬鄮峯戴燧從旁嘆曰吾佛以寂滅為樂諸有皆空有相無相若不足計然二百七十五年之間世代人物之變何可勝道像廢復興非偶然者昔東坡居士與參寥道人徜徉西菩羣山中其徒至今以為重而名永長存今接待古佛又托侯以不朽山髙水長我侯盛名將與佛法俱無盡矣因喜而書之資聖院在縣東十三里豐國鄉舊名資福光啓三年建治平二年改今額有觀音像祈禱必應布金院在縣東二十里豐國鄉舊名朱金乾寧三年建治平二年改今額廣覺禪院在縣東二十五里豐國鄉舊名落雲相傳俱視道者落雲於此後清泰三年建治平二年改今額三學院在縣南十五里潛川鄉舊名三白光啓三年建治平二年改今額梵興院在縣南二十里潛川鄉舊名國興天福七年建治平二年改今額崇法院在縣西南三十里潛川鄉舊名崇福乾德五年建治平二年改今額悟真院在縣南三十里潛川鄉舊名白龍建龍二年建治平二年改今額福興禪院在縣南五十里潛川鄉馬頭山舊名慈雲天福七年建治平二年改今額廣慈院在縣北四十里惟新鄉天成二年有髙僧建於滴翠峯下梵行精進誦蓮經有功行止有烏隨之僧入滅烏亦隨化故舊名烏息治平二年改今額有隱山堂淨勝教院在縣南六十里長安鄉舊名靖山清泰二年建治平二年改今額西明空院在縣西三十五里波亭鄉舊名朱山大中五年建治平二年改今額妙樂院在縣北十里惟新鄉舊名安樂天福五年建治平二年改今額山有浮石開化院在縣北三十里惟新鄉眉山絶頂之上徽宗皇帝朝崇政殿說書豫章陳安節隱居於此紹興十八年陳與僧福瑛同立精藍初名澄鑒二十五年賜今額有陳公讀書堂基普明院在縣北三十里嘉德鄉舊名普照乾化三年建治平二年改今額北明空院在縣北二十五里嘉德鄉舊名興平文德五年建大中祥符二年改今額佛燈禪師曇印以說法被過理宗皇帝御書松巖及方丈四大字又御製頂相贊以賜嘉熙間建閣安奉寺屢燬咸淳二年僧祖華重創法堂自是佛殿鐘樓皆次第興建云題詠洪平齊題松軒詩蒼官面目冷於冰傾蓋真成耐久朋隨世炎凉渠自爾與時榮悴我何曽聲傳茶鼎風鳴籟影過薰爐月抹楞束絹欲煩三昧手箇中著箇覔詩僧寶福院在縣北四十里嘉德鄉光啓二年頭陀朱道從開山故舊名朱陀皇祐元年賜今額理宗皇帝賜名褒忠為洪端明府香火院淨嚴寺以下係尼寺在縣城北舊名寶成天福五年建治平二年改今額明智寺在縣西南二里惟新鄉舊名保安大中五年建治平二年改今額法㑹院在縣南二里豐國鄉舊名龍華天福七年建治平二年改今額崇仁院在縣東三十里豐國鄉舊名雲峯大順元年建治平二年改今額靖林院在縣南十里潛川鄉舊名扶西乾符二年建治平二年改今額清修院在縣南二十五里潛川鄉舊名報國顯德六年建治平二年改今額妙行院在縣西南三十里潛川鄉舊名西柳乾寧三年建治平二年改今額寂樂院在縣西十五里波亭鄉舊名大同長興二年建治平二年改今額禪定院在縣北二十里嘉德鄉舊名禪林乾寧元年建治平二年改今額白雲僧菴在縣治後東山後燬於火惟鐘樓獨存開禧三年令王日益重建修真道堂在縣西慶雲坊富陽縣永寧院在縣西舊名榮國寺大同三年建大中祥符元年改今額為邑最大剎建散祝聖道場於此嘉定五年令程珌葺新之淨明寺在縣北五里舊普照寺天福五年重建治平二年改今額寺枕髙山名曰舒壁山坳有龍潭澗水橫流上有橋亭有御書閣宣和間燬嘉定十三年重建山門法堂廊廡題詠李翰林白詩天台國清寺天下為四絶今到普照逰到來復何别枿木白雲飛髙僧頂殘雪門前一條水幾回流歲月在徐學士凝詩問人知寺路松竹暗春