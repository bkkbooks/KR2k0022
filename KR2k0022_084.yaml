body:
  text: 咸淳臨安志卷八十五宋潜說友撰寺觀十一寺院新城縣華藏禪院在縣西二里天聖十年賜額興教禪院在縣南三十里地名夏妃舊為興福院長興二年建治平二年改今額多福禪院在縣西七十里地名青牛嶺舊為寶福院同光三年建治平二年改今額昌國院在華藏院之側舊為福安院乾祐五年建大中祥符元年改今額為聖節祝壽道場寺有烏伊軒題詠許廣淵題詩軒開環列萬峯青門對烏伊遂榜名千室樓䑓凭檻盡一溪烟水捲簾明爐烟晨起迷雲色松韵時來雜梵聲峻極秪宜長閉户奈何持鉢入東城多福院在縣治東舊為渌新院景福二年建治平二年改今額為國忌薦嚴道場寺有杜公井唐大順間淮南楊氏遣兵圍城城中乏水兵民穿井及石深百尺餘不得泉杜公稜至誠請之泉立至以此城得不陷遂目為杜公井云題詠邑令許仲蔚詩云德地見圖牒神機發杜稜寇圍炎甚火壺渴洌于冰古邑桑田換雲源鑑面澄如今風月夜煮茗詫山僧䕶國院在縣治東北舊為羅漢院開寶二年建大中祥符元年改今額為延壽道場延壽院在縣西一里舊為興福保壽院廣順三年建治平二年改今額廣福院在昌國院之側舊為水陸院乾化二年建大中祥符元年改今額有僧閣題詠許廣淵題詩溪光山色照天晴開豁襟懷逺眼明毎日風清生竹韻有時雨過沸灘聲夷猶水上漁舟逸奮迅簷前燕翼輕珍重老僧無箇事坐觀羣動競經營興善寺在縣西三里舊為龍華寺上元二年建大中祥符元年改今額有觀音像水旱禱必應有碧玉軒軒前有木樨絶圓正可愛題詠江東羅願題木樨云日照軒前翠已空却驚嘉樹老玲瓏幽芬自出禪枝外圓相長標法窟中過客莫辭三宿戀道人已費十年工要須共結團圞坐賞盡秋清面面風寧國院在縣南七里青巒山晉郭文舉嘗隱於此邑人祠之有禱必應又相與建佛宇於祠之旁隆安五年賜額曰碧流咸通中重建門枕小池吳越王更為碧沼大中祥符元年改今額有白蓮堂妙樂堂定軒碧沼軒題詠方干詩深僻孤髙無四鄰白雲明月自相親海中日出山先曉世上寒輕谷未春窻逼野溪聞隺唳林通村徑見樵人此時惟有雷居士不厭籃輿來去頻牛仙客詩步步穿蘿入徑幽栢髙松老幾人游花開花落非僧事自有清風對碧流葉潘閬詩五峯髙挿雲居勝覽景留題趣味長碧隂山骨潤白蓮花馥水池香隺尋巢徑松千盖僧卧溪流石一牀閑裡不知西月落馬蹄歸去帶斜陽杜荀鶴題碧沼詩山半一山寺野人秋日登就中偏愛石獨上最髙層有果猿摇樹無齋鴿伴僧儒門日多事到此復何能早裴極詩一沼光涵四座寒夕陽囘首更凭欄憑師把香蓮種他日期來結社看杜稜詩石骨生泉冷流來澗沼湄幽禽鳴竹砌游客步階陲滃欝杉松碧隂稠烟靄緇古風吟不足嗟恨老蒼髭清許廣淵詩寺結千峯上門通一徑幽静心無物亂耳有泉流樓閣先知曉園林預覺秋因君題秀句却省昔年游合邑令徐評詩岑寂千山曲縈紆一徑㣲樓䑓青嶂窻户亂雲飛野色侵僧衲池光射客衣偶來修吏隱到此益㤀機寶勝院在縣西七里舊為漁池院天寶十載建相傳為唐人放生之所内有洞下通桐江葛仙翁煉丹於此池寺即其所棲之山也大中祥符元年賜今額有葛仙翁煉丹井放生池題詠許廣淵題煉丹井云葛翁髙隱處鑿井碧山前煉就長生藥空餘白乳泉鼎藏今去水氣吐舊成烟珮還疑羽題放生池云天寶當年午夜風雷作人寺魚池此日存溪移古岸脚殿壓舊山根月照霜鐘逺風開霧閣昏網羅雖廢禁和氣滿乾坤令許仲蔚云唐家舊佛祠樓閣影參差魚散不知處水流無斷時山光朝暮變人事古今移惟有好生德恩波尚滿池壽聖院在縣南三里舊為賢名院皇祐三年建治平二年改今額惠濟院在縣南八里舊為靈泉院乾化五年建治平二年改今額慶恩院在縣南十五里舊為報恩院建隆元年建治平二年改今額總持院在縣北十里地名貝山舊為永慶院乾祐三年建治平二年改今額法惠院在縣北二十五里舊為太平院乾祐二年建大中祥符元年改今額浄名院在縣北二十五里舊為白雲菴開運三年建治平二年改今額題詠許廣淵題杖錫窮危頂茅菴構白雲軒窻半峯出鐘磬别山聞海月晩同色爐烟畫襍薰莫教深静處思慮落塵氛資聖院在縣西北十五里舊為寶安院開運四年建大中祥符二年改今額寺有停雲軒勝因院在縣西二十里舊為棲心菴大觀間邑人徐贇建政和四年賜今額安隱院在縣西三十里舊為龍門院乾祐元年建大中祥符元年改今額浄嚴院在縣西南三十五里舊為隱居院大同元年建治平二年改今額寶乗寺在縣西十八里舊為靈逺寺上元二年建初梓州刺史羅石朔掘地得銅鑄佛像二并鐘載之以歸一旦失鐘與像所在而新城人獲之於野因建寺焉新登鄉有佛嶺事由此會昌間廢大中十三年復建為聖像寺吳越王迎其像入城大中祥符元年改今額有妙香堂深静堂鑑軒緑竹軒分秀軒寺後有蛻龍洞濯龍池噓雲亭刺史白居易贈休糧開士巨川上人詩題詠白樂天贈休糧巨川上人詩三十餘年坐對山只將無事化人間齋時往往聞鐘笑一食何如不食閑所參寥子留題兹山嵯峩冠天下一徑縈雲行兩舍窮絶頂見招提碧閣丹樓屹如畫門前池水滀蜿蜒座上風雷驚晝夜峨眉五䑓誇壯觀品目真㝠此為亞偉哉南禪非古人開荒闢翳初推輪寥寥相望三百載廢興一一難具陳丹丘大夫來鼓舞氣象煥發重増新授金輸贐走南北法雨徧被無涯津虚堂選勝得佳趣隆簷危棟成逡廵窻外洞達舒兩目異景錯出羅蓁蓁朝雲夜月常萬頃寒光炯炯如鎔銀堂中隱几人何似湛若玉兔垂秋旻榜名圓鏡示來客庶使方寸無淄磷三學院在縣北十五里郭文舉舍宅為之舊名靈輝大同二年建改為靈耀治平二年賜今額有仰髙堂題詠晁無咎詩步月尋溪過佛齋溪邉石蘚濕芒鞋虛窻獨卧聽松竹半夜一山風雨來邑令王詩精籃本是真人宅叠嶂今名釋子山緑樹不妨丹寉下白雲長伴老僧閑扶風木任秋蟬䕃積雨庭多石蘚斑儒客坐來除俗態暮鐘飛出望歸還聲祖世英詞洞庭西門天下竒烟巒百轉槃青金堂玉室白雲鎻中有仙客閑栖遲地訪禪方睛秀骨郭文舉孤劍青鞋出岩户朅來此翁共掃松花談太古拏龍忽駕升天行西歸隻履埋岩坰聲㳅影擴遽如許故山唯有松風清道師懷古興不淺堂宇横陳近翠巘悠悠遐想山阿人水帶雲衣猶在眼涼颸五月吹浮埃蕉旗竹篲摇空堦我來箕踞發長嘯月光飛射雲樓開寸心浩蕩逸天外欲去復往聊徘徊永懷西山五色藥服之羽化登蓬萊慈照院在縣西五十一里舊為昕慈院大同元年建治平二年改今額有石壁扁曰雲洲記文鄭丞相清之作石壁雲洲記曰韓潮州生平詆佛海上従大顛語藩拔級夷曠然㤀儒墨畦徑蘇端明文章風局軒豁宇宙至錢唐逢辯才師意所領會如印印泥二公龍騫鳳翥未易廹近乃獨於邂逅之蹔棄其所挾待釋子以莫逆交則知五經之外六合之表别自有人也余夏杪來自成均寓龍丘萬君舉之室一日逋暑相與尋並山佛廬遂至所謂慈照寺者有龎眉老衲肅客入西至石壁下丈室中修簷蔽日曲池横前風蒲水漪意態蕭爽小定毛髮灑淅如窮秋露曉坐水邉籬落間執熱快濯未暇别語予與君舉據胡床熟寢既而黒雲壓浮屠上雨四面至師笑白寒暑一變可起矣予竦然異之試叩其意横貫直騖援引旁午纚纚可聽少焉雨霽月影移數弓暮鐘東西起對語未倦俗累暑氛洒然俱失予始知有世外味為之留再宿而歸師臨分戯余曰來暑去凉何以報我余周視其身如焦穀石女無一可以答師之意者請以子墨客卿助作佛事因取退之家彼吳洲雲之句扁其室曰雲洲而紀其顛末韓蘇方神游八極安知不間至人間乎茍見予文以為非是則大顛辯才可并按也亦以發千載之一笑云時嘉定丙子閏七月也題詠鄭丞相贈雲洲老師詩嘉定丙子斗挿申秋灰出管纔半旬我來適值蒸暑節燭龍吐燄扶桑濱炎官流汗走躑躅金烏啄火焚空旻濕雲擁岫呼不出火雲糊天挂赫日腦脂盖眼壯士眠誰挽天河洗蒸鬱友人萬君家龍丘追涼共作招提游門人指㸃到丈室中有石壁清且幽半月泓澄鎻寒緑氣象凄切涵清秋凜然便覺肌骨爽恍疑石罅蟠蛟虬老師宴坐圓覺場一笑對客雙胡牀雀芽新試蟹眼湯未到舌本先生涼恒河倒流揮玉麈果然驚出蛟龍舞須㬰霧褁浮圖尖地墨天昏作風雨吻端造化轉寒燠約束商羊上天去雲開月明衆峯出指向岩前石應語歸來為乏瓊瑶報清夢安排幾畨到池角土花生碧草逗曉簷前乾鵲噪我承佛勅為行詞可拜雲洲老師號普薰院在縣西五十里舊為香積院同光二年建治平二年改今額普向院在縣西五十里舊為廻源院正明四年建治平二年改今額寺有多寶佛塔記文知貴池縣周燾撰多寶佛塔記道潛書記曰杭州南新普向院僧月言少喜技巧得刻雕三昧稍長為僧鍵其智不得發元祐二年春三月始造木塔於院之西偏而成於四年冬十月既成龍井辯才法師為全書法華經龍女偈置塔之中而塔以閣覆之塔之終始悉出於言手而工無與焉盖言之初嘗謂院之有浮屠猶人之眉目不可一日去之而南新池小院且無塔欲為之而未能一日嘆曰昔多寶佛於法華會中地湧寶塔為一大事而昧者徒知為佛神通能出示現而不知夫一耳目口鼻之妙能使百千萬億具足成就發揚之巧者未嘗異也佛以地湧而吾以手化以為非幻則兩俱不實以為幻出則本出非幻乃相地擇大而經營之運斤風旋迎刃中繩袖手睥睨四旁無人而人不能測其意於是捨其樸而與人游焉起居周旋雍容有餘而未嘗以語曉人故雖其徒有不知者閲兩歲有贏月而塔出矣其崇三十有四尺為層七趾廣六尺重甍累瓦枅櫨柢梧錯出交映蹲獸寶網飛仙摇鐸出入上下如動如響中為佛菩薩如其教意其下為海須彌山魚龍神鬼出於海中皆塗以金彩眩奪人目然後觀者知言之塔磅礴於胸中也久矣平居休佚調伏悦樂則發而出之為佛菩薩悲愍之相勇猛不退剛決難制則為鬼神威武之變涕吐濡濕位不動之地欣榮慕樂之意見於葩華飛摇之間心筭交錯會於起伏盤糾之勢髙廣大小光祥開闔一應於言之頻伸欠呿之中而人不知也後之至者欵户而入形不自名而人能名之千變萬狀安徐決驟怳惚如神而適與意會佛菩薩鬼神一出而所謂言則亦不能自得也鳴呼亦庶幾佛之所謂善巧者歟非耶言與塔予皆未嘗接而參寥師為予道之其本末如此且求予記云元祐八年二月一日資聖院在縣西北三十五里舊為大安院清㤗元年建天聖七年改今額寶林院在縣西四十里舊為上林院中和間建治平二年改今額瑞相院在縣西七十里舊為靈瑞院同光二年建治平二年改今額正覺院在縣西六十里舊為龍門院建隆元年建治平二年改今額明寂院在縣西七十里舊為靈巖院乾德四年建治平二年改今額集福院在縣西五十里舊為福春院廣順二年建治平二年改今額普照院在縣東北十五里舊為普光院天福七年建治平二年改今額題詠許廣淵留題云亂峯環合處中見古精廬萬事盡不到數僧閑有餘嶺雲時聚散松竹晝清虛自辨一泉後多來長者車獨邑令李淛云青山遶屋藍光重流水衝堦碧蘚滋坐午窻誰晤語鷓鴣聲裡竹隂移崇恩報福院在縣南二十里紹興五年改今額妙慈院以下係尼寺在䕶國院之北舊為北禪院大中三年建治平二年改今額梵嚴院在縣西六十五里舊為建興院天成三年建治平二年改今額寶相院在縣西七十五里舊為石佛院天成五年建治平二年改今額持戒院在縣西六十里舊為淨名院建隆三年建治平二年改今額清修院在縣西四十里舊為淨安院天福八年建治平二年改今額法門寺在縣南十五里望仙村舊名淨土咸通十一年建元係空惠尼寺在花浦因水泛坍江遂移今地大中祥符元年改今額通靈塔在縣北二里祥禽鄉地名官塘口塔後即靈休靈祐廟多寶塔在縣西六十里南新鄉地名囘源即普向院也亦名金塔鹽官縣安國禪寺在縣西北二百五十步唐開元元年建名鎮國海昌會昌五年廢大中四年復置名齊豐祥符元年改今額熙寧七年僧居則建大悲閣蘇文忠公題梁明年為之記藏殿後有唐會昌石經幢二寺門東有咸通石幢一在殿下者二無歲月字畫類唐人悟空禪師塔前有古檜宣和間朱勔移以去記文東坡作大悲閣記羊豕以為羞五味以為和秫稻以為酒麯蘗以作之天下之所同也其材同其水火之齊均其寒煖燥濕之候一也而二人為之則美惡不齊豈其所以美者不可以數取歟然古之為方者未嘗遺數也能者即數以得妙不能者循數以得其畧其出一也有不能而精粗見焉人見其二也則求精於數外而棄迹以逐妙曰我知酒食之所以美也而畧其分齊舍其度數以為不在是也而一以意造則其不為人之所嘔棄者寡矣今吾學者之病亦然天文地理音樂律厯宫廟服器冠婚䘮祀之法春秋之所去取禮之所可刑之所禁厯代之所以廢興與其人之賢不肖此學者之所宜盡力也曰是皆不足學學其不可傳於書而載於口者子夏曰日知其所亡月無忘其所能可謂好學也已古之學者其所亡與其所能皆可以一二數而日月見也如今世之學其所亡者果何物而所能者果何事邪孔子曰吾嘗終日不食終夜不寢以思無益不如學也由是觀之廢學而徒思者孔子之所禁而今世之所上也豈惟吾學者至於為佛者亦然齋戒持律講誦其書而崇飾塔廟此佛之所以日夜教人者也而其徒或者以為齋戒持律不如無心講誦其書不如無言崇飾塔廟不如無為則飽食游嬉而已矣是為大以欺佛者也杭州鹽官安國寺僧居則自九歲出家十年而得惡疾且死自誓於佛願持律終身且造千手千眼觀世音佛像而誦其名千萬聲病已而力不給則縮衣節口三十餘年銖積寸累以迄於成其髙九仞為大屋四重以居之而求文以為記予嘗以斯語吿東南之士矣盖僅有從者獨喜則之勤苦從事於有為篤志守節老而不衰異夫為大以欺佛者故為記之且以風吾黨之士云題詠東坡題悟空禪師塔已將世界等㣲塵空裡浮華夢裏身豈為龍顔更分别只應天眼識天人自注云宣宗㣲時師知其非凡人恭又題塔前雙桂當年雙桂是雙童相對無言老更庭雪到腰埋不死如今化作兩蒼龍行又題僧爽白雞斷尾雄雞本畏烹年來聽法伴修還應却置蓮花漏老怯風霜恐不鳴千又題云古邑居民半海濤師來基築便能髙金用盡身無事坐看香烟繞白毫慶善寺在縣西南二百步天監七年士人𢎞靈度因井中有光三日不止舍宅為寺地濱海遂以觀海為名會昌五年廢大中祥符元年改今額有千佛閣門外有唐大中間石經幢有竇思永撰銅僧伽像記葛蘩撰天台教院記不載題詠王兢題圓照堂詩佛心開晦暝覺性極融明寔相自然見客塵何處生銅瓶秋水浄草坐月華清不必曹溪去穿雲振錫行延恩院在縣西北舊係安國寺藏院建炎四年移額重建題詠蘇才翁留題云畫堂三月初三日絮撲紗窻燕拂簷蓮子數杯嘗冷酒柘枝一曲試春衫階臨池面勝看鏡屋映花叢當下簾誰倚南樓指新月玉鈎素手兩纎纎普信院在縣北二里建炎三年移額建常接待遊僧故邑人止以接待名之常樂寺在縣南一里大同二年建舊名永興治平二年改今額惠明院在縣西隆興元年移額建薦福寺在縣西三十六里永明二年建舊名安善會昌五年廢大中十三年重建祥符元年改今額寺有第一代尚禪師塔記文張無垢九成作尚禪師塔記聖王之道有非文字所能書言語所能傳者是故未有六經而堯舜為聖帝禹稷臯夔為賢臣學不到文字言語外而守章句泥訓詁欲以用天下國家猶趨燕南征適越北鄉雖膏車秣馬風飡雨宿徒自苦耳於聖王之道漢如也孔子指二三子以無行而不與之説孟子指齊宣以是心足以王之説此豈可文字語言中求哉豈惟吾儒釋氏與其徒説法凡四十九年其為書五千四十八卷不為不多矣而臨絶之際乃拈花注目傳正法眼藏於迦葉彼前日科分𣲖别皆為無用然文字言語不可欺世而迦葉之傳易以罔人惟天資髙明不肯自昧者乃可以真得末後之學惟尚禪師姓曹氏臨安鹽官人也其上世有仕宦者而世緒不詳少苦腹疾百藥不治父母憐之乃祈佛出家七歲禮慶善寺元辨為師又十年披鬀即徧歴叢林求文字言語外法首叅浄慈本本可之不留再叅明祖圓圓如本也又不留三叅佛光正正如圓又不留四叅梁山會會如正也又不留四叅識超絶門庭穿穴縦横㣲眇老禪宿德有不能屈者印證許可前後相繼而師心不自欺故未幾而舍去謁尊宿凡五六十人最後叅普照英得法於法雲秀而見保寜勇秀得法於天衣懷而見浮山逺秀雖與本會同雲門𣲖同天衣而機鋒穎脱獨出乎諸人之上英似其師秀故用處逈與諸方異師操平昔所得入英之室如圓枘方鑿一皆不契然師意愜焉謂當如是一日舉南泉斬貓語問英師胸中話端凡數條以謂不出是矣英乃曰須是南泉超然出師意外師進止所獲退失故歩茫昧倘怳不知所向心憤口悱慮衡色作神情逼廹未及雲堂豁然氷斷盡見古今機用乃知異時所有皆在私心浮慮中因喟然嘆曰今日方平生事畢不負初心矣再入見英方舉手師用見大愚机以築之自此髙視四海藐焉無人聞黄龍新坐斷江西無敢攖其鋒者師乃自荆南杖錫而往又用子胡斫碑之機以見之既乃退歸故鄉宴坐墓廬爐香瓶水與世相絶然師名横厲天淵韞晦莫遂邑大夫郡太守迎請住壽聖院院本雪峯結菴故地灌莽榛棘之所都狐狸蛇􅚣之所宅師住八年勇者出力富者出財殿宇巍峩堂廡明潔一變為化人之居厥功大矣師眡如涕唾推而不有遂就歸舊隱未幾更薦福為禪居郡縣凡三請乃出就未半歲而病病復歸舊隱未數日而逝享年六十有七實紹興庚申七月三日也壽聖不㤀師德迎葬于院之西偏師機鋒峻宻作用孤髙如雲峯悦如法昌遇學者莫測其端雖度弟子十有六人四方來者前後凡數百輩然其道無傳焉至於戒行精潔節概剛嚴使人見之凜然如入宗廟中自㓜至老如一日也門弟子了觀以師與予善狀行業來謁銘予不得辭也乃為之銘銘曰道在方寸文字莫宣可以神會難用語傳偉哉禪師識超幾先挽而莫留歘然逝川横翔意外髙視大千節如霜筠機如電鞕嗚呼往矣其誰繼焉普安寺在縣西四十里大同元年建治平二年改今額吉祥寺在縣西北四十八里舊名齊明建隆二年重修改名迎祥治平二年改今額覺王寺在縣西北二十五里長興四年建舊名正覺六年重修即吳越王私號寶正六年治平二年改今額寺後有三女堆浄信院在縣西南六十里天福二年置開福寺在縣西三十五里咸通元年建舊名文殊大中祥符元年改今額圓明院在縣西南五十里元和七年建舊名永城大中祥符元年改今額永隆廣福禪院在縣西一十里紹興十八年建定香院在縣西北二十五里開寶元年建名茶毘菴治平二年改今額東堽廣福禪院在縣西南五十里乾德元年建紹興三十二年改今額資聖院在縣西北四十里天福七年建舊名資壽治平二年改今額浄居院在縣西三里隆興二年移額建有童兒塔記文張無垢九成重建童兒塔記壽聖禪師惟尚道眼明徹戒體潔清傳法於普照英公得證於黄龍新公既謝事乃歸老童兒塔之西環堵蕭然而聲震四海其叩門求法者盖肩相摩而袂相屬也予寓居鹽官遇風日清美芒鞋竹杖徑尋師於茂林修竹之間一日予指塔而問其故師出邑人章瑋石刻且曰舊塔廢為道士居者凡二十年矣紹興丁巳主塔僧仲淵之孫德諶痛數百年勝㮣一旦為强有力所奪影滅迹絶了不可尋問乃草衣木食錙儲黍積卜地其東絫甓架屋於莽蒼榛棘中今蘭若窣堵峥嶸突兀鼎鼎一新其勤勞嗣續之功似可記也公其有意乎予笑而不答既而予被召貮玉牒繼擢亞春官侍講金華未暇如師請後予以病乞歸聖天子閔其勤以奉祠寵之居閒日讀方書理藥物亦未暇如師請也予病今少間師來請益勤予乃呼諶而吿之曰堯舜禹湯文武周孔之道具在人心覺則為聖賢惑則為愚不肖聖人懼其惑也乃著之六經使以義理求乃銘之九鼎使以法象求簠簋俎豆火龍黼黻以發之鐘鼓管磬琴瑟竽笙以警之清廟明堂靈䑓辟雍以形之使人目受耳聽心竦意明恍然霧披豁然冰泮乃知千聖雖往此心原不去萬變雖經此心自有餘不然吾聖人豈虛為此紛紛哉子之辛苦經營儻有在於斯乎否則吾不知也諶謝而退乃書以遺之使刻諸石金佛院在縣西一十二里舊名上乘乾道二年改今額報國寺在縣西北四十八里嘉㤗元年建雲龍寺在縣西北一十五里慶元二年建旌忠禪院在縣西北二十五里嘉㤗二年建定善院在縣西南三十里紹興十二年建戒壇院在縣西南三里淳熙九年建崇福寺在縣西六十里乾元元年建舊名靈池會昌五年廢大中元年重建祥符元年改今額惠力寺在縣東北六十里紫㣲山下晉朝建舊名志願大中祥符二年改今額東山廣福院在縣東北六十里熙寧元年賜今額有葛仙翁井題詠楊闕樂題詩云􅋈棹青山下來尋薊子家人魚皆静水木亦清華松老欲成盖菊寒殊未花何須覔勾漏此自有丹砂西山廣福院在縣東北六十里峽石熙寧元年賜今額題詠楊闕洗詩云野寺孤峯上危樓聳翠㣲捲簾滄海近鉢白雲飛竹影臨經案松花㸃衲衣日斜登望處湖畔一僧歸來又地勢連滄海山名號紫㣲景閑僧坐久路僻客稀峽影青相照河流石自圍塵喧都不到安得此㤀歸鐘朱伯虎題鑿石開山已幾年半天䑓殿聳危巒曉聲向雲邉落夜月光從檻底看野色難藏千里秀松風長占一軒寒老僧此處真棲隱應笑塵勞効小官崇教寺在縣東六十里舊名妙果長興二年建四果禪院在縣東北七十里咸通元年置舊名羅漢大中祥符元年改今額真如禪院在縣東七十里黄灣本晉于寶宅周顯德二年置舊名菩提院治平二年賜今額有般若䑓張無垢九成同宰刁文叔來游遂以名䑓上有郭熙畫山水又有靈泉井詳見本山題詠張無垢九成詩髙僧超物外有户晝常扄海濶如天大泉甘識地靈一簾春月静半㸃越山青便作歸歟計移文休勒銘懷黄伯劑和寺古僧應少地偏心自扄慿髙通楚望逺𦕈晋靈深蟄虬藏翠斜飛鷺界青休文今已去佛像寄誰銘䑓張諤題般若䑓旗鼓初從海上囘天風吹我上雄甲披雙木闡西將軍聲俄逐晩潮馬驟群峯驥北材塵世俯窺飛鳥去來誰能為我書岩石他日重游掃緑苔結董將題怪石兹山翠成堆峭骨乃如許化工妙融石罅走青乳當年女媧氏煉此不及補嵒嵒至于今丈室枕其股我來手摩挲松隂日亭午初疑道士羊亦類將軍虎坐久饑腸鳴試作先生煮興福寺在縣東北三十里開寶二年重建熙寧元年賜今額太平廣禪院在縣東五十里乾德二年建名太平菴熙寧元年改今額東庵廣福禪院在縣東南五里雪峯禪師結廬於此人見夜光亘天因名光明菴後稍増屋號光明禪院熙寧元年賜名壽聖紹興三十二年改今額雪峯手鑿一井甚甘冽大旱不竭井中時聞風濤聲題詠施彦執詩何處登臨眼最明雪峯佳處一川平潮邉海月生時上峯在雲天静處横幢盖神扶喬木影風雷井閉古泉聲靈蹤鑿盡翻惆悵何日深山報道成許寺丞應龍詩十年不到雪峯山寂寂春風晝掩闗千載祖師無盡意門前流水緑囘環寶嚴院在縣東六十里紹興元年建延聖院在縣東北六十里紹興元年建勝果院在縣東北六十里紹興三十二年建正法院在縣東北一十五里乾道二年移額建浄信院在縣東北一十八里乾道二年建靈龜寺在縣東北六十里峽石今廢僅存一池猶名靈龜題詠顧況詩家在雙峯蘭若邉數聲清磬發孤烟山連極浦鳥飛盡月上青林人未眠靈寺在峽石市開寶六年重建浄明院在縣東北二十步紹㤗二年建舊名法明後改為浄信尼院治平二年改今名慶元四年移額復為僧院南禪福嚴尼院以下尼院在縣東南建元四年尼僧猛舍宅為寺舊名齊明乾祐中改為䕶國報恩禪院大中祥符元年改今額葆真菴舊在縣西南三里乃馬自然得道之所邑人乞立宫觀宣和二年賜葆真菴額紹興二十三年令劉偉移於縣東二里與嶽廟並昌化縣治平寺在縣西一里舊名忻平大中二年建開平三年改為治平寺熙寧間蘇文忠公自雙溪館步尋溪源至寺有詩題詠東坡詩亂山滴翠衣裘重雙澗響空窻户摇飯食不嫌溪笋瘦穿林閑覔野芎苖却愁縣令知游寺尚喜漁人爭渡橋正似醴泉山下路桑枝刺眼麥齊腰毎見田園輙自招倦飛不擬控扶摇共疑楊惲非鋤豆誰信劉章解立苗老去尚飡彭澤米夢歸時到錦江橋宦游莫作無家客舉族長懸似細腰千頃山龍興寺在縣西北六十里元和間黄蘗禪師開山中和四年賜慈雲禪師額天聖元年祥符寺僧惠新移創於山巔勝絶之境八年賜今額歲度僧五人題詠吳珩詩松檜隂中六月清異花靈草不知名路從瓊液山前過人在水晶宫裡行千尺翠嵐分月色一軒參籟動潮聲登臨不厭躋攀峻貪看雲從足下生慧照院在縣西八十里大中三年建初鹽官悟空禪師開山在大明山上前有鷂子峯崑崙巖神鸞峯白蛇巖後有瀑布泉經兵火徙山下十里即今院是也治平二年改今額鷲峯院在縣西五十三里邑人俱眂道者居之號性空大師大厯二年捨宅為寺賜名龍山治平二年改今額院東揖白潭山相傳性空大師曽留大石鐘閣於山半扣之則鳴音合律吕後溪漲失鐘所在題詠林孝雍詩憶昔俱胝合嵐光翠㶑侵金週山界斷紫碧洞天深有斐瞻淇澳㤀機學漢隂寥寥千古意瑶瑟豈遺音法興院在縣西四十里天福三年建吳越王名為吳興院治平二年改今額梵安院在縣南二十五里天福七年建院後有巨石如筍號石笋山題詠吳珩詩山腰小徑細於繩山鳥關關喜弄晴黄菊有情留客醉白雲無事伴人行野流合處堪分字草藥拈來豈問名囘首渡頭詩思逸漁舟一笛晩風清澄寂院在縣南二十八里舊名石室開寶三年建後有磐陀石其大如屋容二十人名不疑菴菴後有虎威儀治平二年改今額題詠詹覺不疑菴詩巨石勢欲壓僧居常晏然應餘女媧煉不受祖龍鞭促膝無餘地䝉頭莫問禪聖凡歸一致荆棘肯生田普向院在縣南五十里舊名囘向廣順六年吳越王建院後有佛蹟山始獵者見神人雙跡於雪中因名佛跡治平二年改今額題詠鄭君平詩地勝開金刹公餘一訪尋泉傾洗石面雲出罩䑓心谷鳥趨禪座山神聽梵音清風行號令不許有塵侵法會院在縣南三十里舊名龍華乾化五年建有水陸池池中有會聖亭治平二年賜今額題詠吳珩詩地占金山勝泉分銀漢流松篁能䕶翠猿鶴似驚秋秪恨登臨晩寜辭取次游列峯饒逺秀不惜上層樓龍井廣福院在縣西北二十里上元二年建山有龍湫石壁峭立飛泉噴薄前有石壇為禱祭所紹興三十二年賜今額百丈廣福院在縣西二十里舊名寶勝開寶七年建熙寧元年改壽聖院紹興三十二年改今額浄嚴院以下係尼寺在縣西四里舊名永安治平二年改今額明因院在縣東二十里舊名泥郎院建隆元年建治平二年改今額福全院在縣東北五里天福二年建錢氏立院額清修院在縣南四里舊名招賢天福二年建治平二年改今額咸淳臨安志卷八十五
