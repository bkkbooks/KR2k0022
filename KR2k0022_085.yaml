body:
  text: 咸淳臨安志卷八十六宋潛説友撰園亭登臨遊觀之娛末耳雖然隆上都而觀萬國是亦有繫焉昔人有言天下之治亂候於洛陽之盛衰洛陽之盛衰候於園囿之興廢夫善覘人國者乃或於是得之所謂不知其形視其景非邪然園囿一也有藏歌貯舞流連光景者有曠志怡神蜉蝣塵外者有澄想遐觀運量宇宙而遊特其寄焉者嘻使園囿常興而無廢天下常治而無亂非後天下之樂而樂其誰能敘園亭水月園在大佛頭之西紹興中髙宗皇帝撥賜楊和王存中御書水月二字後復獻於御前孝宗皇帝撥賜嗣秀王伯圭中有水月堂俯瞰平湖前列萬栁燕遊者多集焉題詠范石湖雨中集水月詩獻之今年不堪暑天亦相憐病良苦明更中秋法合涼夜半行雲曉行雨蘄州竹簟清如氷飢蚊倔強猶飛鳴下床早喜衣裳健出門更覺山川明曵屐扶藜尋水月不惜垂垂巾角折竹間松下已凄然却要芳樽生暖熱梅莊園在西馬塍韓蘄王園廣一百三十畝堂曰樂靜曰清風及竹軒皆髙宗皇帝御書又有澄緑堂水閣梅坡芙蓉堆及四時花木各有亭水竹院落在西林橋南太傅平章賈魏公别墅先是理宗皇帝御書二閣扁賜公其一曰奎文之閣公遂擇勝地敞層宇以荷上賜閣之下為堂曰秋水觀則今上皇帝宸畫也圃於湖西者大率多幽窈之趣若俯浩蕩眇空碧非穿林越磴意不得騁而快也兹堂枕湖漘左挾孤山右帶蘇堤皆若却立屏侍不敢迫近波光萬頃與闌檻相直無少障礙鳯凰諸山舉頭參前又有道院舫亭等傑然為登覽最其一曰懋德大勳之閣則揭於山隂里第云真珠園在雷峯北張循王園內有真珠泉故以名有髙寒堂秀野園在葛嶺水仙王廟西劉鄜王園內有四并堂雲洞在錢塘門外古桞林楊和王園直抵北關最為廣袤洞築土為之中通往來其上為樓又有堂曰萬景天全群山環列洞之旁為崇山峻嶺有亭曰紫翠間尤可逺眺桂亭曰芳所荷亭曰天機雲錦皆號勝處北園在天水院橋福王府園勝景園在長橋南舊名南園慈福以賜韓托胄後復歸御前理宗皇帝撥賜福王御書勝景二字為扁擇勝園在錢塘門外九曲墻下紹定三年秀王府創有理宗皇帝御書擇勝愛間二扁今徙置它所新園在錢塘門外酒庫側秀王府園隱秀園在錢塘門外城北劉鄜王園環碧園在豐豫門外桞洲寺側楊郡王府園挹秀園在葛嶺水仙王廟前楊府駙馬園謝府新園在惠照齋宫西舊為中常侍甘氏園今屬謝府有道院村莊四面堂水閣等總宜園在斷橋路口中貴張氏園外有濵湖亭宇係官司創建者並載西湖門兹不復出餘杭鑑亭在縣南百步外下瞰大溪清流如鑑因名部伍亭在縣東北二里舊志云吳將凌統家餘杭縣於本邑募鄉兵置部伍於此亭鼇亭晏元獻公輿地志云在縣南五里唐正元初縣令盧鵬建以為遊賞之地在南湖中山上故曰鼇祥符志云亦名南亭嘷亭在縣南五里晉郭文居大滌山常出肆貨藥伏虎於此歸晚則虎嘷故曰嘷亭祥符志云即鼇亭聲之訛爾今山下澗石蒼翠竒怪流水潺湲放龜亭舊在縣南五里其地居山帶湖巨石叢起有類龜形唐正元中令盧鵬創號放龜亭臨安瑞亭在縣治之南二里中和亭在縣治東南二里東亭在縣治之東三里西亭在縣治之西五里青亭在縣治之東一十八里章村亭在縣治西南一十五里馬溪亭在縣治東北五里丁峴亭在縣治之東七里北湖亭在縣治之東三里東風亭在縣治西北三里環錦亭邑人俞氏山園題詠趙公善卞詩百世垂芳在一經茂林修竹讀書聲園池日涉皆成趣景物天然分外清聊復垂綸藏渭釣等間釋耒起莘耕知君自有真良貴豈羡斯亭錦得名趙南塘汝談詩與子鄉鄰信有年故王遺事到今傳爽鳩邑改風煙在散騎園分水竹偏髙架插書供夜讀滿堂成綵敵春妍相如可是區區者戲筆題橋亦偶然携枌社交隂舊有緣蹇驢那得到亭前青山謝傅樽地白水錢王守塜田尚友詩書厪暇日飬親豚韭樂豐年異時駟馬榮歸里虗左相迎更可賢迎暉亭在縣北一十里寶林院山南遙見浙江題詠邑令鞏豐詩我來將值日午時千峯照耀碧玻璃集賢村落俯列屋寶林樹木呈幽姿老人言可比雙徑雄妙處乃在阿堵中崇岡展障屹亭在似約老眼專窺東日出烏鳥飛日入牛羊下再遊當與夸父期不用山僧逺送迓豁然亭在縣北二十里福勝院之北山題詠太守趙仲藏因逰徑山登亭逺望詩千騎踏青霜東遊古道場雲籠山骨秀風引水聲長曉日依稀暖寒花取次香後隨吹管急空谷答宫商錦野亭在西山奎照亭在縣東七里空飛亭在九仙山眉山王橚建海風江月亭在九仙山瀑布前邑令家之巺建三休亭在玲瓏山於潛野翁亭熙寧間令刁璹建東坡為賦詩云山翁不出山溪翁長在溪不如野翁來往溪山間後遂增創三翁亭前挹岝崿下臨浮溪為一邑絶景淳熙初令趙師密更新之題詠東坡於潛令野翁亭山翁不出山溪翁長在溪不如野翁來往溪山間上友麋鹿下鳬翳問翁何所樂三年不去煩推擠翁言此間亦有樂非絲非竹非蛾眉山人醉後鐵冠落溪女笑時銀櫛低我來觀政問風謡皆云吠犬足生氂但恐此翁一旦捨此去長使山人索寞溪女啼山翁亭在縣圃左東山白雲菴側令張大猷建令胡衛昜山巔臨秀亭為之溪翁亭淳熙初令張大猷立亭於縣西北之潘洲亭廢不復治嘉泰元年令朝百談徙於縣北三里後渚橋之東後令胡衛得舊盧瑢正中所書亭扁立於潘洲新亭上遂還舊觀雙溪亭潛之潘洲正在二水合流之中令胡衛築新亭上扁曰雙溪欵乃亭在野翁亭北今廢潺湲亭在縣城見舊志清白泉亭令邵文炳經營浮溪橋之始散步溪岸俯視山麓有泉溜冷然色清味甘因築亭於上且以名其酒此君軒在縣齋軒舊在寂照寺名緑筠東坡倅杭行縣題詩隆興初徙縣治衮繡堂之東寶慶初避御嫌名易以此名記見縣治下東坡詩見寂照寺富陽望仙亭在縣西南二百步後更名春山偉觀近天亭權縣趙師耀建參政樓公鑰書扁折桞亭在縣西今廢知津亭令吕昭亮建今廢入覲亭在觀山東嘉定癸酉令程珌建新城春波亭在登平橋之東端平元年令陳旻建憩莭亭在景德觀之北端平元年令陳旻建陳氏園題詠朝無咎詩二首山園芙蓉開寂寞嵗云晚公來無與同念我百里逺寒飈吹空林白日下重巘興盡還獨歸挑燈古囊滿避讀公栖鴉詩嵗月傷晼晚公胡不念世蠟屐行逺羇烏翔别林歸雲抱孤巘我才不及古歎息襟淚滿窮東坡次韻云荒涼廢圃秋寂厯幽花晚山城已僻况與城相逺我來亦何事徙倚望雲不見苦吟人清尊為誰滿許廣淵詩云今日青蕪滿當年碧瓦稠軒楹無寸木池沼有殘丘過客嗟啼鳥居人竟牧牛子孫誰秀穎念祖力重修七賢鄉唐氏林亭有識春亭四并亭壽豈亭題詠孫郎中邦詩華屋耽耽野外居茂林清蔭繞門閭移花植果心無事抱子弄孫歡有餘間過西疇觀刈穫懶尋南郭命巾車問君為圃嗟豫晚便擬歸休學二疏鹽官緑繞堂張橫浦名取一水繞田之句昌化薦菊亭循雙溪而上數百步溪側有窪其泉甘潔東坡常酌以試茶後人號為東坡泉開禧二年令章伯奮作小亭其左曰薦菊蓋取坡詩一盞寒泉薦秋菊之義也尋源亭在象賢菴之上數十步合溪亭溪之上下皆分流湍激於其中合處橫亘里許平濶深靜開禧元年令章伯奮建記文令章伯奮記雙溪與縣治相直流淺湍激市居叢雜無幽間曠逺之意每憑欄望上流澗處無數百步欲一到未暇也一日有客自逺來語與意合遂駢舟至其處水流無聲緑淨可燭鬚眉極目平逺正在雙澗上下之間面雙峯背武隆野航漁舟日夕往來雲煙收抹頃刻異態舟行容與近一里許石紺白色平鋪水底日光下徹波影內見金緑映漾若織女浪沫循平流徐行散點若殘雪不銷者久之直後夾以蓮蕩屈曲橫亘十數畝或水暴漲巨魚自溪泝流而入掉尾鼓鬛以萬計若爭赴龍門而變化渡溪登南屏山岩壁峭立古木自石出枝幹瘦硬盤屈冬少霜雕之葉幽靜竒絶之觀間見層出不可名狀而前人未有收拾品題之者抑山水顯晦自有時乎於是自雙溪取徑傍東坡泉登荐菊亭由象賢菴跨二橋沿流而入芟翳規址作亭其上榜以合溪或謂唐昌山水之勝萃於此矣亭成父老聚觀士女和會咸曰令君遺我以無窮之勝稔我以去後之思而不與我父同其樂也余聞而愧之因自歎曰峴山因羊叔子而名著後世見之為墮淚蘭亭非王右軍則修竹激湍遂湮沒而無聞山川亭榭未有不資人而彰者豫每臨文太息即是邑有二事而尤有感於豫心焉去縣二十里有灘曰洗耳橋曰白牛山曰箕山問其人則曰巢許常隱於是故因以得名雙溪舊有亭得東坡詩而山水為之增明斯亭亦賴以不朽余貪戀微祿無巢許之髙操拙踈多竒又無東坡之才名今合溪之名既以余辱後必得如東坡者品題之而後名始重故書以示後人鏡紅亭在合溪亭之後十餘步藕池從其前可徑一里開禧二年令章伯奮建取韓詩平鋪紅蕖蓋明鏡之語芳洲亭在雙溪亭南岸之中洲倦飛亭在芳洲之左取坡詩倦飛不擬控扶搖之句芎筍亭在芳洲之右取坡詩溪筍瘦野芎苗之句右三亭開禧元年令章伯奮建清暉亭在水南道院東舊名步虗令錢啓易今名中廢淳祐七年令趙希偦重建捲雪亭在中洲南岸南屏之麓淳熙六年令錢啓建滴翠亭在南屏山淳熙六年令錢啓建許由亭在晚溪去縣西九里旁有箕山下有洗耳灘又橋名白牛亭名許由舊傳巢許曽隱於此卞令圖經以許逺逰嘗居此山下遂有此名蓋得之矣詳見山類桃竹軒題詠參寥子道潛題王悅道桃竹軒餘杭門西山迤邐岌岌千峯插天起窮幽摘勝過三邑隨處雲林皆可喜邇來杖榮到君家始覺溪山逄骨髓爭流萬壑會目前競秀千嵓對忩凡丹楓洗雨秋霽餘白鳥出沒嵐光裏主人韻勝無塵埃翠竹紅桃相間栽良辰樽爼慿誰共月友雲朋自往來銜翠軒題詠葉三錫峽川盛氏銜翠軒詩平生丘壑心漫浪不羈束青山亦解意四時共追逐朝翠空濛時北忩夢清熟晝寂庭户涼坐課黃卷讀此心與山違對面若掩目孱顔儼如故心境兩不觸宴坐搜萬象剖璞出蒼玉木末流夕暉忩户影搖緑相對兩青眼悠然一笑足此意陶潛知不然問玉局滴翠樓序文程內翰珌作堪村徐氏滴翠樓序季登築樓蕭御史名而詩之今三十年自餘杭至新安逹康廬九江又由九江以逹於湖湘梁益凡賢士大夫馳輕車道唐山者莫不登樓賦詩而後去故名章雋語鴻音逸韻爛若編貝前編既盈嗣以今集且屬僕敘之顧僕低頭受吏縳三年坐簿書朱墨叢中望滴翠不三十里寸旌漂搖雙蹻不隨坐想主人角巾鹿裘朝夕其上雲深篆籀風動絲桐山雨溪煙盡顓几席未嘗不臨風自愧也今乃欲僕吐塵土語置諸右簡點浣清景得不為山君所不受乎尚幸四月受代而歸酌雙溪之水洗濯塵容澄滴翠之樓讀滿編之詩平招山色俯挹溪潤聨嵐含輝浮空泛景以遊乎無倪未知季登能延客否慶元五年上元後三日新安程珌序題詠潯陽蕭御史之敏詩并序乾道五年三月十八日過堪村逆旅主人肅容甚恭問之徐其姓季登其字也飲於小樓之上且求樓名於豫豫曰亂山滴翠衣裘濕此東坡昌化之詩也請以滴翠名之可乎季登曰唯唯賦兩絶以志之云一溪流水漾殘春上有髙樓碧瓦新溪路晝隂元不雨却愁空翠染衣巾翠我愛東坡句法遒治平雙澗昔經遊曽吟滴衣裘濕請借佳名榜畫樓靜觀堂蕭源章氏山莊題詠章詡首夏靜觀堂書懷杖䇿下層嶺來憩雲外莊簷低繞頺垣淡泊在一堂山髙户牖虗風清長夏涼翳翳動林影瀲瀲溪浮光心逺與世隔獨有文史香汲井資咽嗽蒔藥助體強園中橘為奴沼內芰堪裳蒼官青不老籬下明秋芳陶情在庶物飬性歸琴觴矯首起遐觀是中有濠梁番昜李逺可靜觀堂詩君不見通都蕩蕩開九逵肩摩轂擊人爭馳危樓百尺獨髙卧下看膠擾無休時又不見滄江茫茫與天逺輕舟出沒風濤險此時著身平地人遙憐棹夫驚破膽靜中有味知者希紅塵拔腳與世違世人顛倒墮醉夢我獨坐照全天機榮名弗羡計非拙浮利勿爭癡更絶騁巧不若拙有餘役智何如癡且愚髙堂縣鏡收赴影對此令人發深省藏春塢題詠宋佽雲老徐氏藏春塢詩屏翳除繁少放寬禮園書圃種仍昆未愁百卉空臺榭長引春風到酒樽早底用黃鍾律管吹間萌剩卉日相隨向平緑纍敕斷荷插伯倫真我師身名漂泊客燈前過眼花枝一夢還爭似不知門外事抱孫携子閲芳妍古迹由今日視前日皆古也况數百年以往之迹乎春秋內外傳所載以地則晉有有莘之虗衛有昆吾之觀鄭有大庭氏之庫以物則夏后氏之璜在宋甲父之鼎在徐肅慎氏之楛矢在陳蓋存古以示後之人固廣記備言之一端也今諸所載凡耆舊所傳聞簡䇿所著記雖不必皆可考證亦因其故而存之庶無舊聞放失之恨云敘古迹風渚郡國志云防風氏所封有金鵝山考晉地理志武康縣注云故防風氏國隋地理志云餘杭縣有金鵝山二者不同未知孰是吳慶忌宅故老云豐儲倉即其故基前有池是慶忌磨劍處餘見詳異門晉郭文宅在新城縣晏元獻輿地志云靈耀寺即郭文故居唐凌凖宅在縣西五十步唐褚無量故居見天竺重榮檜唐朝杉在洞霄宫外凡二耆老傳云唐昭宗景福二年閭丘先生自天台山以盂移植於此圍二丈髙三十餘丈葉雖凋減而枝益堅或圖之以為屏障唐朝櫟見洞霄宫古鐘在祕書省道山堂下宋鼎唐鐘並見行在録三茅觀大鍋在淨慈寺貞明二年三月造粟山石杵太平寰宇記粟山有石杵刻云黃武二年歲在戊午八月三日凡十二字考之吳志黃武二年歲在癸卯後此十五年赤烏元年方是戊午今此刻磨滅不存必記之誤袁公松門在鹽官縣唐羅隱宅在新城縣東五里岑石元在浙江長一丈四尺南北面廣六尺西尺六寸越絶書云秦始皇嘗取此石刻丈六於越東山秦王攬船石在西湖大佛頭詳見石門秦王磨劍石在鹽官縣東六十里審山之巔范蠡塘在鹽官縣西三十五里晉馮氏井在仁和縣臯亭山馮氏於所居發土有古井得石磚八十有四有刻文曰咸和八年十月丁丑朔十日馮氏作皆篆文陳朝柏見孤山隋朝檜靈隱寺路九里松唐刺史袁仁敬所植左右各三行相去八九尺門扁吳説書髙宗皇帝嘗欲易以御畫不果但以金飾其字詳見紀遺咸淳臨安志卷八十六
