body:
  text: 咸淳臨安志卷八十七宋潜說友撰冢墓夏后臯之墓見於晚周女媧氏之墳唐天寶中尚在也夫陵谷變遷髙深易位彼何能久若是哉聞之曰墟墓之間不施哀而人哀此惻隱之真忠厚之至厯古今通上下而一心者也故芻牧有禁耕發有律式祭以致其敬封以篤其恩充類至盡雖蓬顆之不蔽虆梩之不掩吾視之有弗忍况明君賢臣烈士之所藏其能久也固宜然則志也者非託焉以記久耶志為杭作非杭人何以得書司馬牛宋人也避其家之難違之之吳又違之之魯卒於郭門之外葬於兵輿左氏特詳其事說者以為録其卒葬所在愍賢者之失所也嗚呼宇宙亦大矣人以眇然之軀生死於其間固有與之並生而羞道之者司馬氏﨑嶇死於道路窆於他邦而時人賢之君子愍焉秉彛好德之同心猶不於此概見乎叙冢墓漢孫鍾墓在富陽陽平山孫堅之祖鍾性至孝種瓜為業忽有三少年詣鍾乞瓜謂鍾曰此山下可作冢當出天子君可下山百步許顧見我去即可葬也鍾去三十步便反顧見三人並成白鶴飛去鍾死即葬其地冢上數有光怪雲氣五色上屬天衍數里人由是知孫氏必興孫氏墳墓在富陽者又有孫賁孫瑶墓並在縣西南孫皓子希祖墓在縣南漢於潜侯何滕墓在於潜縣南二十里獨角山吳冨春侯郭成墓在富陽樟岩吳選曹尚書暨艷墓在餘杭縣南由拳山之東吳給事驍騎大將軍新豐侯暨惠景墓在餘杭縣東北八里董舍村晋郭文墓見九域志在臨安縣西南一十五里晋常山太守御史尚書俞歸墓在餘杭縣西北三十五里地聨舟枕山晋何史君墓淳熙八年駱忠翊嗣業創祠山别廟於於潜縣東一里南陽山獲古塜陶磚上有太康五年甲辰何史君墓十字宋景侯吳喜墓在餘杭縣西北仇山一里宋侍中王裕之墓在餘杭縣東二十五里按宋書王裕之字敬𢎞琅邪臨沂人嘗為吳興太守舊居餘杭縣薨於所居之舍亭山陳彊陵侯陳法明墓在餘杭縣南一十三里唐苑山中唐章成緬墓在於潜縣南七十里長安鄉兊口村唐杜牧墓在南山東南與佛日山夾境名杜牧塢有數古冢唐徐凝墓在新城縣桐峴鄉唐馬自然墓在鹽官縣梁太師吳敬忠墓在於潜縣南五里豐國鄉東村梁太保饒京墓在昌化縣金山鄉首源林木蓊鬱百尺合抱有犯者必為異物所怖京本青州淄水人梁末為鎮海軍紫溪鎮遏使龍德元年制贈太保吳越武肅王墓在臨安縣城北十三步吳越文穆王墓在龍山之南原和凝撰神道碑吳越忠獻王墓在龍山之南原太常鄉張昭撰神道碑吳越孝懿世子墓在天竺前山吳越忠懿王賢德順睦妃孫氏墓在石人嶺下吳越王妃仰氏墓在龍井山放馬場按表忠觀碑載錢氏墓在錢唐者二十有六在臨安者十有一今不可悉考矣吳越太尉開府儀同三司正顯薛公墓在靈石山冢前生紫藤遍繞三峯之上其後三世孫昻仕國朝至尚書左丞葬天竺山妙法院吳越太師杜􅏢墓在新城縣北三里官塘子建徽墓在縣西十里袁村吳越給事羅隱墓在錢唐縣定山鄉居山里又昌化澞溪之楊村俗號羅公墓彎蓋其祖墓和靖林處士墓在孤山所居側詳見孤山知杭州胡侍郎則墓在西湖龍井廣福院之麓范文正公作墓志銘周都尉邠墓周待制邦彥墓並在南蕩山子孫今居定山之北鄉強文憲公淵明墓在西溪之欽賢鄉劉少宰正夫墓在石姥山嶺之西北真珠塢元少師絳墓在南蕩山章樞密楶墓在寶石山太師張文忠公橫浦先生墓在鹽官縣陳寺丞剛中墓在龍井山風篁嶺沙盆塢公福州閩清人慷慨挺特有志事功建炎二年李易榜登第紹興戊午任太府寺丞應詔上封事主議恢復忤秦檜意同年編修官胡銓以鯁切得罪貶新州作啓賀其行有云屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭經逺之有人遂與張九成等七人同謫送吏部差知䖍州安逺縣士論惜之有詩云同日七人俱去國何時萬里許還家公至縣適有嶺寇之擾䆒心招撫感瘴而歿其妻子扶柩抵臨安得地葬焉其後湘中著紹興正論載公出處甚詳朱文公周益公皆有跋語儀王墓在西湖顯明寺王諱仲湜生也有紫光照室及視則肉塊刃割遂得嬰兒靖康時六軍欲推王而立之杖劍以却曉其徒曰自有真主其徒猶未退則欲自伏劍死六軍遂與王約以踰月而真主不出則王當即大位王陽許而隂實欵其期未幾髙宗皇帝即位於應天王間關而南上屢嘉歎之主祭濮王嘗自贊其容曰熙寧六載嵗在癸丑月在夏五二十有九余乃始生濮祖之後性比山麋貌同野叟隨圓就方以無若有惟忠惟孝不汙不茍皓月清風良朋益友湛然靈臺確乎不朽蓋自叙其推戴事也嘗遊天竺有山禽忽驚起衝落半巖花之句子孫視諸邸為蕃衍蓋為善之報云浙西提刑周龍圖格墓在獨角門步司前軍寨公處州人為直祕閣浙西提刑建炎元年討叛卒陳通與子肇丕俱遇害朝廷嘉其死莭贈中大夫直龍圖閣敕葬此地其子祔焉周殿撰杞墓在九里松滕家原水岡塢公龍圖格之弟也建炎三年知常州值苖劉之變倡義勤王以功除右文殿修撰洪內翰邁跋其檄書謂公聞變憤踊即飛表請反正適忠穆吕衛公制置淮浙兼領建康亟馳介詒書議起兵勤王公偈與協於是忠穆公及諸大將皆提兵道竟上凡軍之百役芻茭薪蒸穀菽泉帛弓刀甲楯車船人徒動以萬計辰索暮辦調胹彌縫不使一間語師既東身獨留張杜要害使去者無郤顧憂取日虞淵功最右席邁常恨世徒知忠穆復辟之功為大而周公首倡大義則少有能言者嶽鄂王飛墓在棲霞嶺下題詠葉靖逸紹翁詩云萬古知心只老天英雄堪恨復堪憐如公更緩須㬰死此敵安能八十年漠漠凝塵空掩月堂堂遺像在凌烟早知埋骨西湖路學取鴟夷理釣船劉龍洲過六州歌頭詞云中興諸將誰是萬人英身草莾人雖死氣填膺尚如生年少起河北劍三尺弓兩石定襄漢開虢洛洗洞庭北望帝京狡兔依然在良犬先烹過舊時營壘荆鄂有遺民憶故將軍淚如傾說當年事知恨若不奉詔僞耶真臣有罪陛下聖可鍳臨一片心萬古任分茅土終不到舊奸臣人世夜白日照忽開明衮佩冕圭百拜九原下榮感君恩看年年二月滿地野花春鹵簿迎神劉鄜王錡墓在定山北鄉敕賜功德院額曰旌忠題詠過客不知名氏題詩云將軍力盡馬蹄穿一片丹心萬古傳叱咤風雲起平地扶持日月麗中天寶刀挂壁血猶在丹詔褒功墨尚鮮到底英雄身不死旌忠長倚碧雲邊襄恪趙公密墓在西溪欽賢鄉中興以戰功顯嘗為殿步帥其子雍登進士第趙都運鞏墓在徐范村之間忠毅畢公再遇墓在錢塘西溪朱祕閣辨墓在西湖公徽州人早嵗遊京洛朝以道喜之歸以從女南渡後授官副王倫使金見執附表云節上之旌盡落口中之舌徒存嘆馬角之未生魂飛雪窖攀龍髯而莫逮淚灑氷天上為感愴後與洪張二公俱歸除直祕閣卒旅殯臨安朱文公為作行狀尤文簡公袤作志銘濟王墓在駝巘嶺下景定五年十一月有㫖追復元贈少師保靜鎮潼軍莭度使仍令所屬討論墳墓之制日下增修丞相李文清公墓在小隱山趙紫芝師秀墓在葛嶺寶嚴院紫芝溫州人有詩集行於世題詠劉後村克莊詩云奪到斯人處詞林亦可悲世間空有集天下便無詩盡出香分妓惟留硯付見傷心湖上冢誰葬復誰碑孫花翁秀蕃墓在水仙王廟側翁名惟信始居婺弃官隱湖山間號花翁工為長短句趙安撫與􅊸葬之後村劉克莊志其墓淳固宋先生斌墓在西湖資國寺之右先生字文叔袁州分宜人弱冠師晦菴先生受四書大義篤實靖重確守師說演繹窮䆒至老不少懈於世味泊如也號庸齊卒年八十衆議私諡為淳固先生相傳古墓吳王夫差舊志據吳越春秋夫差內傳三十三年葬於餘杭山太宰嚭亦葬於旁今按夫差葬秦餘杭山在平江府長州縣西北三十里已詳見吳越考此非漢審食其墓在鹽官縣東六十里審山舊志疑食其不應葬此特此山之審氏墓耳晋杜子恭墓孔稚圭東過錢塘北郭於舟中遙拜杜子恭墓見南齊書趙墓在於潜縣東十二里故老傳趙宣子墓舊有墟塜二十五古溝五通人往來泉流不竭及有石人馬麒麟之屬嵗月浸深頺仆草莾多為鄉民鑿而徙之近即其地得陶磚二有咸和二年九月參軍趙悌建立塜功十四字故又以為趙參軍墓關中侯墓在於潜縣東一里東山塢紹興初謝氏營墳旁逼古塜得印一劍一印龜鈕金鑲篆文曰關中侯印九里松前軍教場墓在九里松行春橋水竹塢教場內俗呼為唐馬三寶墓故老云紹興末步司前軍因增廣教場惟此冢獨髙大寨兵欲去之方舉鍤有黑蜂數百飛出著人不可向是夜步帥戚方夢一人髙冠朱衣若王者服曰吾錢王之子葬此已久祈勿毁辭甚切方怪之詰朝得本軍申遂輟役丁母塜丁蘭故居在今艮山門外三十六里丁橋母死刻木事之如生冢在姥山之東一名桐扣山唐孝女墓在錢塘縣孝女南鄉古老相傳昔有孝女唐醜娘年十二三母病刲腹取肝和粥以進母病愈而醜娘以破瘡風死葬此山里人美其孝故以唐墓名亞父塜在臯亭山亞父陳重生有神異壽百餘而終今顯靈其地有禱皆應世傳為亞父塜木娘墓在艮山門外太平鄉華林里蔡塘東里人朝奉大夫通判瑞州蔡汝揆庶母沈氏卒汝揆尚幼父霖用浮屠法火之汝揆既以父澤入仕每傷無松楸之地言之輒泣刻木為形衣衾棺槨擇地而葬仍置贍營田建菴屋命僧守之鄉人呼為木娘墓上升墓在仙掌山與天目鄰巒舊傳有仙人隱居既沒而葬裂棺飛升板從半空而墜故臨安有上板下板村又二板墜紫溪東岸今名為板塢蘇小墓在西湖上周紫芝有詩題云湖堤步遊客言此蘇小墓也題詠周紫芝詩野水橫分青草陂誰埋玉樹與瓊枝闕山自向人緑闕栁今何處垂行雨行雲渾是夢施朱施粉未相宜一從蕙死蘭枯後剛道桃花好靣皮僧塔互見詩寺院此載其著者宋詮定法師墓在臨安縣西南一十五里郭文墳北十步隋僧真觀法師東岡塔在天竺隋開皇十五年有真觀法師居天竺手標葬處天禧間守王相欽若訪尋得之東岡之下甓甃甚工題詠楊蟠詩云東岡人不識野寺在樵漁落葉年年滿春風為掃除郭祥正詩云窣屠藏真骨束岡氣象殊烟雲掃不盡苔蘚一㾗無唐鳥禪師塔在竹閣恩髙僧塔在碼瑙坡僧晤恩所藏圓公孤山詩有竹䕃髙僧塔之句贊寧塔在放馬場栖真院前法慧大師墳在寶勝院闕圓字闕將終闕所闕為闕其墓又作詩自挽有云陶器一闕芳草任縱橫辨才塔在龍井塔前有海棠二株乃師手植蘇頴濵為撰碑見龍井寺咸淳臨安志卷八十七
