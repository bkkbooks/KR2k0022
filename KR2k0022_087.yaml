body:
  text: 咸淳臨安志卷八十八宋潛説友撰恤民大夏不能無萎草盛世不能無窮民况五方之人之所聚乎凡生死而有不得其分願者五曰孩不舉曰貧無告曰老無依曰病無以療死無以藏也而在位之仁人為之乳保為之室廬為之廪給為之醫藥葬埋然後不得其分願者始庶幾乎王道之無憾焉嗚呼斯民也其亦不幸生於井田廢壞之日而使生死之或無以遂其天也其亦幸闕忠厚積纍之朝闕而書之以見六闕掩骼埋胔之仁何獨三代然哉敘恤民慈幼局在樓店務對河淳祐七年十二月有旨令臨安府創屋為慈幼局一應遺棄小兒民間有願收養者月支錢一貫米三斗盡三嵗止其無人收養者官為雇倩貧婦就局乳視惟謹續有願子之者從官請仍給錢米如式施藥局在慈幼局之北淳祐八年五月有旨以民間病暑者多合思振救趙安撫與􅊸因創局製藥分差職醫家至診視隨症畀藥日以為常十年二月朝廷益以錢十萬令多方措置以賞罰課督醫者月以其數上聞有詣局以病狀自言者亦畀之藥民蒙更生不知其幾養濟院一在寶勝院一在艮山門外又有善化坊四所先是守蘇文忠公嘗於城中創置病坊名曰安樂以僧主之仍請于朝三年醫愈千人乞賜紫衣并度牒一具詔從之崇寧元年八月詔諸路置安濟坊二年五月兩浙運司遂援蘇公之説以請仍改病坊為安濟紹興二年詔臨安府置養濟院十三年十月又因臣寮之請下錢塘仁和兩院踏逐近城寺院充安濟坊籍定老疾貧乏不能自存及乞丐之人自十一月一日起支常平錢米每名日支米一升錢十文小兒半之止次年二月終二十九年以後又屢降指揮展半月或再展仍申嚴奉行滅裂之罰乾道初遂展至四月終猶恐病者未愈至七月終食新方行住支嗚呼仁哉列聖之用心也蘇公有與某宣德書云蒙遣人致金五兩銀一百五十兩為贐軾自黃遷汝亦蒙公厚餉當時鄰于寒殍尚且辭避今沗近臣尚有餘􅅹未即枯竭豈可冒受又恐數逆盛意非朋友之義輒已移杭州作公意捨之病坊此蓋某在杭日所置今已成倫理嵗收租米千斛所活不資故用助買田以養天民之窮者此公家家法故推而行之以資公之福夀某亦與有榮焉想必不訝至于感佩之意與收之囊中了無異也漏澤園錢塘仁和兩縣管下共一十二所先是崇寧三年二月詔諸州擇髙曠不毛之地置漏澤園凡寺觀寄留槥櫝之無主者若暴露遺骸悉瘞其中各置圖籍立筆記識仍置屋以為祭奠之所聽親屬祭饗著為令其在臨安府者中更多故率為官私占佃紹興十四年詔臨安府措置漏澤園遂下錢塘仁和縣悉行拘收為籓籬以限之選僧二名主管月給常平錢五貫米一石瘞及二百人者申朝廷賜紫衣既又有旨令諸路州軍一體措置施行仍委常平司檢察諸縣餘杭養濟院在本縣西門外城濠之北半里安濟坊在縣東半里漏澤園在縣東七里安樂鄉南渠河之南臨安漏澤園在縣西三里於潛養濟院在縣南二里寂照寺漏澤園在縣南三里富陽漏澤園在後嶺去縣一里半鹽官漏澤園在縣西三里昌化開禧間令章伯奮置養濟院為田五十畝嘉定間常平使程珌以筮仕此邑撥錢置居養院田一十七畝既嵗久養濟田十失其八居養田十失其三淳祐八年令葉采請買官田於府益以他費買田遂足元額白之倉臺以養濟田𨽻治平寺以居養田𨽻佑聖堂各命主首掌之主簿司掌之出納吏不得干預漏澤園在縣西二里祥異春秋記災不記瑞孔子不語怪神祥異有志不敢僣經而擬聖也龍見晉郊虎乳楚相鳥鳴亳社蛇出泉臺諸類此者非一春秋所不書孔子所不道而左氏咸録焉何害其為春秋之忠臣而與聖人同其好惡哉敘祥異臨平湖石函臨平湖自漢末穢塞吳天璽元年一夕忽開湖邉得石函中有小青石刻作皇帝字舊言臨平湖塞天下亂開則天下平人以為祥臨平湖寶鼎吳赤烏十二年六月戊戍寶鼎出臨平湖玉册晉元帝移檄召天下兵剋日進討時有玉册見於臨安人以為中興之象人面豕晉成帝咸和六年六月錢塘人家豭豕産兩子皆人面如夷人狀其身猶豕甘露咸和九年四月甲寅甘露降錢塘縣右鄉康巷之栁間白鳶見咸和九年五月癸酉白鳶見於錢塘內史虞潭以獻臨平湖水赤晉安帝元興五年十月錢塘臨平湖水赤野稻生宋文帝元嘉二十三年鹽官縣野稻自生三十許種白雀宋元嘉十八年七月二十四年四月鹽官産白雀太守劉懷慎以獻齊永明七年六月鹽官縣九年七月錢塘縣皆獲白雀連理木泰始七年二月戊寅錢塘木連理生太守王延之以聞禾菌木生李升明元年餘杭舍亭禾菌木生李實禾菌即胡頽木翼異山大水升明二年二月於潛翼異山一夕五十一處水出蒼玉璧永明七年錢塘縣獲蒼玉璧一枚太守江斆以獻浙江靈石永明七年主書朱靈遜於浙江得靈石十人舉乃起在水深三尺而浮世祖親投于天淵池試之刻為佛像海燕出永明九年鹽官縣石蒲有海魚乘潮來水退不得去長三十餘丈黑色無鱗有聲如牛土人呼為海燕取而食之史以為魚孽清泉紫玉梁元帝記曰昔宋人江巖因採藥至富春清泉南見美女衣紫踞石而歌有穿雲裂石之聲其詞曰風凄凄雲溶溶水潺潺兮不息山蒼蒼兮萬重亟往視之遽失所在唯存所踞之石岩剖石得紫玉廣長尺許合歡竹唐正元十九年富陽縣招義鄉安州倉曺許儉家生蔓竹一本合歡郡守白之亷使畫圖表進功臣堂芝草太平興國三年八月庚申杭州言淮海國王舊府功臣堂柱生芝草畫圖來獻臨安縣土地雜志吳育春卿為臨安宰三日謁廟廨後土地稱屬國侯者視之乃十餘嵗小兒故老云錢尚父所用小史一揮扇誤觸臂一於睡時以水添沸湯使無聲悉令誅之揮扇者甘死止沸者稱寃乃赦揮扇者曰吾睡方欲以水添沸湯使無聲此史已先知之矣不可赦後忽見形于前錢嘆曰我戮人無數此小兒乃敢現身封汝為屬國侯永為臨安土地受彼血食遂不見石神王至和中郡守孫沔一夕夢人泣告曰吾兄弟三十六人沉埋市舶司園地久矣願公憐我再夢復如之遂遣人發園中地果得石神王三十六身各坐執寶瓶遂置之廳事前瑞木字文沈括筆談云治平中杭州南新縣民家析柿木中有上天大國四字書法類顔魯公有筆力國字中間仍排起作大口全是顔筆其橫畫即是橫理斜畫即是斜理其木直剖偶當天字中分而天字不破上下兩畫并一腳皆橫挺出半指許如木中之節以兩木合之如合契焉豫親見之珠飯菌菜熙寧八年閏四月杭州言鹽官縣自三月地産物如珠可造飯水産菜如菌可為葅民賴以充食無骨箬見洞霄宫嘉禾景定四年九月昌化縣嘉禾嘉粟生守臣吳華圖以獻詳見御製門磨劍池水涌咸淳六年七月豐儲倉前池忽有風起水立如壁浮萍上屋蕩突久之或云池有大龜數百年此其所為也倉官黃恮目擊其狀扣之土人云池乃吳慶忌磨劍處時有物浮於水上若鐡棺然咸淳臨安志卷八十八
