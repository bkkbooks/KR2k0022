body:
  text: 咸淳臨安志卷八十九宋潜說友撰紀遺紀事提其要纂言鈎其元有是言矣獨不曰記之廣言之備乃史家法乎書成得辭與事之無所比屬者若朝政若民事與夫山川人物土俗以及風人之所賦詠墨客之所論述街談巷議蕞說談語尚多也强而附則贅放而軼則闕然則將安從夫子曰多聞闕疑多見闕殆疑有所未明殆有所未安若是者聖人猶難之故夫聞見非多之為厭而疑與殆之當謹也儻其事核其言不誣吾猶懼夫遺而何敢闕諸此紀遺所為作也紀事晉咸和二年蘇峻作逆明年吳國內史庾氷棄郡奔會稽內史王舒時舒假莭都督行揚州刺史事乃移告屬郡以虞􅔎謝藻率衆一萬與庾俱渡浙江顧衆顧揚等皆起義軍應舒舒亦率衆為後繼氷揚等進據無錫遇賊將張健與戰而敗退於錢塘賊遂入吳舒更遣衆揚守紫壁賊轉攻吳興掠餘杭諸縣義軍沮退或勸衆過浙江衆曰不然今保固紫壁可得全錢塘五縣若越他境便為寓軍控引無所非長計也臨平人范明亦謂衆曰此地險要可以制冦不可委也乃合諸軍復進討健大破之其略已載牧守表褚裒為章安令遷太尉記室參軍名字已顯而位微人多未識公乘估船送故吏數人投錢唐亭住爾時吳興沈縣令嘗送客至浙江客至亭吏驅公移牛屋下潮水至沈令起傍徨問牛屋下是何牧人吏云昨有一傖父來寄亭中有尊貴客權移之令有酒色因遙問傖父欲食餅不姓何等可共語褚因舉手答曰河南褚季野逺近久承名令于是大遽不敢移公便于牛屋下修刺詣公更宰殺為饌且于公前鞭撻亭吏欲以謝慙公與之宴酌顔色無異狀如不覺公送至界宋泰始二年會稽太守孔覬吳郡太守顧琛據郡同反太宗遣巴陵王休若董統東討諸軍建武將軍吳喜屬焉二月一日喜渡水擊諸壘栅東軍一時奔散顧琛與其子寶素携老母泛海奔會稽海鹽令王孚邀討不及其月九日喜等至錢唐令顧昱及孔璪王曇生等奔渡江東喜乃進軍栁浦遣沈思仁等率軍破東軍諸寨乘風舉帆直趨定山斬其大帥孫會之自定山進向漁浦又斬其軍主孔奴其衆於是敗散齊永明三年富陽人唐寓之僑居桐廬父祖以圖墓為業寓之自云其家墓有王氣山中得金印轉相誑惑其年冬聚黨四百人于新城令陸赤奮棄縣走寓之向富陽抄掠令何洵告漁浦邏主發村男丁防援寓之陷富陽會稽太守沈文季遣將吏救援錢塘寓之至錢塘令劉彪拒之力不敵戰敗寓之進栁浦彪棄縣走文季又發吳嘉興海鹽官民丁救之賊分兵出諸縣鹽官令蕭文蔚逃走餘杭令樂琰戰敗乃奔錢塘富人柯隆獻鋌數千為寓之作仗㝢之欲襲會稽至浦陽江郡丞張思祖遣浹口戍主湯休武拒戰大破之帝遣禁兵數千人馬數百匹東討賊衆烏合畏馬官軍至錢唐一戰便散禽斬寓之諸郡縣悉平永明六年會稽西陵戍主杜元懿啓吳興無秋會稽豐登商旅往來倍多常嵗西陵牛埭稅官格日三千五百今可一倍略計年增百萬浦陽南北津及柯浦四埭乞領攝一年格外可增四百許萬世祖敕示郡訪察行會稽郡事顧憲之議曰尋始立牛埭之意非茍逼僦以納稅也當以風濤迅險人力不捷屢致膠溺濟急利物耳所以輸直無怨京師航渡即其例也而後之監領者不達其本各務已功或禁遏别道或空稅江行或撲船倍價凡如此類已䝉停寢吳興頻嵗失稔今兹尤饉去之從豐良由饑棘或齎貨貿粒携纍糊口埭司責稅格外加倍幸灾𣙜利將何以堪敢陳管見世祖從之梁吳興郡屢以水灾失收有言當漕大瀆以瀉浙江中大通二年春詔發吳郡吳興義興三郡民丁就役昭明太子統上疏曰聞吳興屢年失收民頗流移吳郡大城亦不全熟榖價猶貴劫盜屢起所在有司不皆聞奏如復今茲失業慮恐為弊更深不審可得權停否髙祖優詔喻焉陳徐儀東海郯人陵第三子也正明初為尚書殿中郎兼東宫學士陳亡入隋開皇九年隱於錢塘赭山煬帝召為學士尋除著作郎徐孝克陵之弟性至孝梁末侯景冦亂京邑大饑孝克養母饘粥不能給謂妻臧氏曰今饑荒如此供養交闕欲嫁卿與富人望彼此俱濟臧弗許時有孔景行者富於財孝克密因媒者陳意景行逼迎之臧涕泣而去所得榖帛悉以供養孝克亦剃髮為沙門兼乞食以給臧亦私致饋餉後景行死臧謂孝克曰往日之事非為相負今既得脫當歸供養孝克于是歸俗更為夫妻東游居于錢塘之佳義里太建中兼國子祭酒每侍宴取珍果納紳帶中還以遺母髙宗知之敕所司自今宴享孝克前饌並遣將還以餉其母時論美之唐武德元年武康沈法興為吳興太守舉兵以討宇文化及為名比至烏程得精卒六萬遂攻餘杭下之三年李子通攻沈法興于吳郡法興棄城走赴江溺死子通徙都餘杭盡收法興之地北自西湖南至嶺東包會稽西距宣城皆有之四年杜伏威遣其將王雄誕擊子通子通以精兵守獨松嶺雄誕乘髙據險以逼之多張旗幟夜則縳炬火于木布滿山澤子通懼死走杭州雄誕追擊又敗之于城下子通遂降上元元年冬十一月以宋州刺史劉展為都統淮東江西浙西節度使密敕都統李恆圖之展自疑既得節印遂舉兵反恆敗奔宣城副使李藏用謂之曰處人尊位食人重祿臨難而逃之非忠也以數十州之兵食三江五湖之險固不發一矢而棄之非勇也失忠與勇何以事君乃收散卒募壯士得三千人立柵以拒展與展將張景超戰兵敗藏用奔杭州使其將溫義屯餘杭明年展將孫待封自武康南出將會景超攻杭州溫義據險擊敗之待封脫身走及田神功討展展死待封詣藏用降張景超逃入海悉以兵授張法雷使攻杭州藏用擊破之餘黨皆平國朝孫景璠者本杭州水軍篆千字文為五十餘體以獻上善之詔取去黥文𨽻御書院宰相宋琪請授以官秩上曰爵祿非所惜也顧此人面痕尚在豈稱冠帶乎琪固言之乃授國子書學博士太平興國八年以下通鑑長編上遣使取杭州釋迦佛舍利塔置闕下度開寶寺西北隅地造浮屠十一級以藏之上下三百六十尺所費億萬計前後踰八年癸亥工畢巨麗精巧近代所無也知制誥田錫嘗上疏諫其言切直至曰衆以謂金碧熒煌臣以為塗膏釁血上亦不怒端平二年杭州始置織務嵗市諸州絲給其用後罷之至道元年知泰州田錫上疏云云今月十二日有杭州差人齎牒泰州會問公事臣問彼處米價每斗六十五文足彼中難得錢又問疾疫死者多少人稱餓死者不少無人收拾溝渠中皆是死人却有一僧收拾埋藏有一千人作一坑處有五百人作一窖處臣又問有無得雨稱春來亦少雨澤臣問既少雨澤麥苖應損稱彼處種麥稀少咸平三年初錢塘江堤以竹籠石而潮囓之不數嵗輒壞轉運使陳堯佐曰堤以捍患而反病民乃與知杭州戚綸議易以薪土有害其政者言于朝以為不便參知政事丁謂主言者絀堯佐堯佐爭不已謂既徙綸揚州癸巳又徙堯佐京西路發運使李溥請復籠石為堤數載功不就民力大困卒用堯佐議堤乃成遣使巡撫溫處州發廩粟賑貧民因按視杭州江岸大中祥符九年選道士十人校定道藏經命王欽若總領舊藏三千七百三十七卷欽若增六百二十二卷仍令著作佐郎張君房就杭州監寫本令杭州葺故吳越王錢氏廟從其孫惟演之請也天禧四年置杭州清酒務指揮四百人以𨽻酒官酒官舊增取賣酒息錢二千緡雇民充役于是改募兵士其後江寧府請如杭州例置百五十人亦許之乾興元年浙江抱餘杭據岸為二閘互啓閉納溫台衢婺船而潮壞北閘久不治兩路船為之稽壅辛酉侍御史方謹言始奏復之天聖四年廢杭秀二州鹽場明道元年度支判官刑部貟外郎直集賢院假少連為兩浙轉運副使舊使者所至郡縣索簿書不暇殫閲往往委之吏胥持以為貨少連命郡縣上簿書悉緘識遇事間指取一二自閲摘其非是者按之餘不及閲者全緘識以還由是吏不能為奸而州縣簿書莫敢不治部吏有過召詰曰聞子所為若此有之乎有當告我我容汝自新茍以為無吾不使善人被謗即為汝辨明矣吏不敢欺皆以實對少連每得其情諄諄戒飾使去後有能自改過者猶保任之秀州獄死無罪人時少連在杭吏畏恐聚謀僞為死者服罪欵未及綴屬少連已拏舟入城訊獄吏具服請罪以為神明是時龍圖閣直學士鄭向守杭無治才訟者不服往往自州出徑趨少連少連一言處決莫不盡其理向陳留人也景祐二年復置杭秀二州鹽場景祐二年建州布衣徐復賜號冲晦處士復性髙潔而處世未嘗自異後居杭州十數年卒慶歷元年兩浙轉運使請自今杭州專管構一路兵馬鈐轄司事如本路軍人犯法許鈐轄司量輕重指揮從之皇祐元年貶觀文殿學士禮部侍郎知夀州孫沔為檢校工部尚書寧國軍節度副使初臺諫交論沔淫縱不法事詔按其實而使者奏沔在杭州嘗從蕭山民鄭旻市紗旻髙其直沔以為恨會旻貿紗有隱而不稅者事覺沔取其家簿記積計不稅者幾萬端配𨽻旻它州州人許明有大珠百妻弟邊珣以錢三萬三千强市之沔愛明所藏郭䖍暉畫鷹圖明不以獻初明父禱水仙大王廟生明故幼名大王兒沔即捕案明僣稱王取其畫鷹圖刺配之及沔罷去明詣提㸃刑獄斷一臂自訟乃得釋悅州人金氏女白晝使卒輿致亂之有趙氏女許嫁莘旦沔見西湖上令吏戒莘姥絶昏弗許又使官妓戒趙姥趙姥以莘姥為解沔聞莘氏與僧私者得從曉并莘母鞠為姦置之法遂取趙女至州宅與飲食卧起所刺配以百數及罷盜其案去後有訴寃者多以無案不能自解嘉祐四年龍圖閣學士右諌議大夫祖無擇責授檢校工部尚書忠正軍節度副使無擇坐知杭州日貸官錢及借公使酒并乘船過制與部民接坐及聽造景羔羊應岩等曲法請求輔坐主公使阿狥無擇法寺奏已會去年十一月德音內無擇羔羊應岩皆特斷餘如法寺所奏嘉祐中無擇與王安石同知制誥時詞臣許受潤筆物安石因辭一人之饋不獲義不受以其物置舍人院梁上安石以母憂去無擇取為本院公用安石聞而惡之以為不亷安石既當國無擇遂得罪熙寧三年往韓駒南忩雜抄云祖無擇知杭州坐法制勘鄭獬代自開封府移知至郡上疏曰臣過秀州見赤地千里蝗蝻蔽天私怪其故已而見就逮者纍纍道路不絶問之皆坐無擇事追證也無擇官諫議大夫職龍圖閣學士乃以坐法就逮臣不為無擇惜而為聖朝惜也按無擇與官妓薛希濤通然聞希濤榜笞至死事卒無實至于給致仕官張先酒醋歷子及治亭榭不攴瓦木價錢則皆州郡常事且今參政王安石前知江寧蔡襄前知州皆嘗繕營矣豈盡出于家財若所坐止此則願少寬其獄或更他罪則臣請從坐乃詔無擇追一官勒停二駒所云獬自開封移杭州誤也獬自翰林出守在年五月癸未又云無擇追一官勒停皆失實詔江淮發運湖北運司體量殿中丞直史館蘇軾居喪服除往復賈販及令天章閣待制李師中供析照驗見軾妄冒差借兵卒事實以聞侍御史知雜事謝景溫劾奏故也景溫與王安石連姻安石實使之窮治卒無所得軾不敢自明久之乞補外上批出與知州差遣中書不可擬令通判潁州上又批出改通判杭州同上年公軾通判杭州不得其時墓志云知雜御史誣奏過失公未嘗以一言自辨乞外任避之通判杭州然軾自此留京師幾一嵗明年夏末秋初乃出都由陳州赴杭州按軾有與其兄書云六月除杭州倅乃明年事今因謝景溫劾奏遂附見賜米三萬石開蘇杭州運河淺澱元豐三年龍圖閣學士新知杭州蘇軾言竊聞臣僚繳進蔡確詩言涉謗讟此事所係國體至重欲望皇帝陛下降敕追確根勘然後太皇太后內出手詔勿問則二聖仁孝之道實為兩得宣仁心善軾言而不能用軾出郊未發遣內侍賜龍茶銀合用前執政恩例所以慰勞甚厚元祐四年侍御史賈易言蘇軾在杭州務以暴橫立威故决配稅户顔章兄弟皆無罪之人今則漸䝉貸免矣既而専為姑息以邀小人之譽兼設欺弊以竊忠藎之名如纍年災傷不過一二分軾則張大其言以甚於熙寧七八年之患彼年饑饉疾疫人之死亡者十有五六豈有更甚于此者又嘗建言以興修水利者皆為虛妄無實而自為奏請浚治西湖乞賜度牒賣錢雇役聞亦不免科借居民什器畚鍤之類虐使捍江廂卒築為長隄於湖中以事遊觀于公私並無利害監司畏其彊無敢觸其鋒者况敢檢按其不法耶云云宣諭曰賈易排擊人太深須與責降大防對曰易誠過當若欲定叠不若兩罷為便可之元祐六年建炎元年八月戊午杭州軍亂初上之立也遣勤王兵還諸道杭兵才三百其將得童貫下勝捷殘兵與之俱軍校陳通等見杭州富實甲東南因謀為變會軍士以糧衣不足有怨言結約已定而兩浙轉運判官顧彥成行部未返需其還殺之至是彥成歸宿于城外夜三鼓軍士百餘人縱火殺士曹參軍及副將白均等十二人翌日執守臣龍圖閣直學士葉夢得詣金紫光祿大夫致仕薛昻家殺兩浙轉運判官吳昉彥成聞亂亟奔湖州軍士見昻數夢得不給衣糧之罪昻諭遣之衆乃推通等七人為首釋夢得而囚之逼昂權領州事浙東安撫司翟汝文聞變自將七千人屯西興且奏請浙西兵受其節制戊辰江南經制司遣幹辦公事宣教郎鮑貽遜將福建槍杖手二千五百往杭州討叛兵壬申延康殿學士知鎮江府兩浙西路兵馬鈐轄趙子嵩言杭州軍變遣京畿第二將劉俊往捕又命御營統制辛道宗將西兵二千討之丙子浙東安撫使翟汝文以兵七千渡江先是杭賊陳通等紿汝文來受降汝文至城下賊不聽命汝文復還越州于是通等盡刺城中强壯為軍有衆數萬庚辰詔賜杭州黃榜招諭作過軍民若能率衆歸降當赦其罪一切不問仍審量事狀情理命以官資若敢抗拒仍舊為惡則掩殺正賊外父母妻子並行處斬如大兵會合已到城下即令來改過出降放罪推賞指揮更不施行仍令監司召募土豪自率鄉兵會合討蕩亦許先次借補官職建炎後以黃榜招安叛兵自此始九月辛丑杭賊夜劫直祕閣兩浙路提㸃刑獄公事周格寨殺之提刑司所統蘇秀兵遂入杭與賊合時格所部淮南兵不肯從盡為浙兵所害賊復以金帛遣人誘諸郡不逞使據城相應浙東安撫使翟汝文慮變生肘腋遂引兵還越州賊勢愈熾十月甲子初兩浙提㸃刑獄周格既死直龍圖閣知秀州趙叔近權提刑司事招杭賊陳通降之賊聞槍杖手屯秀州界其兵精遂聽命是日叔近以素隊數十人入城通等猶不解甲叔近與通等相見置酒推心腹待之使皆循伏以待朝廷授官之命城中稍定丁卯御營使司都統制王淵為捉殺杭州盜賊制置使仍賜銀帛萬匹兩為軍需十一月丁酉詔江淮發運使幹辦公事鮑貽遜以福建槍杖手移屯江寧給事中劉珏言杭冦猖獗今已數月翟汝文之師既無功于前髙士瞳之兵又潰散于後唯貽遜之師屹然不動蓋杭卒匪茹頗有窺浙西之心所以未敢大肆者以槍杖手為之捍蔽也羣冦之說欲遣散槍杖手乃就招安趙叔近已令退舍而冦猶未降則其說果可信乎願且令在杭州同共討捕候至錢塘蕩平然後遣屯江寧或令歸福建皆未晚也十二月庚申御營使司都統制王淵入杭州初淵至秀州下令治兵十日乃行杭賊陳通等聞之為備稍緩及是淵與統制官張俊馳至城下傳呼秀州趙龍圖來通出不意遂出迎淵慰勞之後二日乃諭以朝廷遣賜告身令通等祗受通等皆喜淵俊入州治命軍士分守諸門通等三百餘人立於譙門之外淵召其首三十人至庭下遽執之通呼曰已受招安何為乃爾淵曰我受詔討賊不知其他遂執其餘黨于門外悉要斬之凡百八十餘人百姓皆相賀俊取杭州甲妓張穠以歸二年正月己亥龍圖閣直學士葉夢得落職提舉江州太平觀坐守杭州軍變故也先是言者論顯謨閣學士知越州翟汝文總兵臨城不肯會戰詔令分析汝文言自杭賊作亂首提孤軍與賊鏖戰而諸將悉為憲臣所制除鮑貽遜槍杖手在城下與臣相聞外無單車一介以為犄角不知使臣與誰會合兼前後請討賊奏牘具在焉可誣也詔降汝文為顯謨閣直學士以下繫年要録三年十二月癸未完顔宗弼自安吉進兵過獨松嶺歎曰南朝可謂無人若以羸兵數百守此吾豈能遽度哉知餘杭縣曽知是金人乃與丞徐聿成率父老具香花迎拜􅘔鞏孫也時尉楊汝為在徑山寺請監寺僧為統領官率强壯以拒金主僧梵仁從之乙酉完顔宗弼犯臨安府錢塘縣令朱蹕率民兵逆戰傷甚猶叱左右負已擊賊守臣浙西同安撫使康允之未知為金人遣將迎敵于湖州市得二級允之視之曰金人也遂棄城遁保赭山時直顯謨閣劉誨自楚州赴召在城中軍民推之以守己丑金人陷臨安府初完顔宗弼既圍城遣前知和州李儔入城招諭儔與權府事劉誨善至是削髮左袵而來二人執手而言儔欷歔不能止有倡言誨欲以城降冦者軍民因殺誨是晚城陷錢塘令朱蹕在天竺山亦遇害後贈誨直龍圖閣四年二月丙戌金人自臨安退兵初完顔宗弼留臨安聞浙西制置使韓世忠自江隂趨鎮江恐邀其後是月庚辰宗弼斂兵于吳山七寶山遂縱火三日夜烟熖不絶癸未火息甲申縱兵大掠且束裝丙戌退軍以鹵掠輜重不可遵陸乃由蘇秀取塘岸路行先是武功大夫成州團練使陸漸迎降宗弼以為臨安府兵馬鈐轄漸勸宗弼括金銀焚臨安因從事北去紹興元年二月辛巳禮部尚書兼侍讀秦檜參知政事龍圖閣待制孫覿時知臨安府啓賀檜有曰盡室航海復還中州四方傳聞感涕交下漢蘇武節旄盡落止得屬國唐杜甫麻鞋入見乃拜拾遺未有如公獨參大政檜以為譏已始大怒之五月戊申臨安府節度推官史祺孫言兩浙擈買坊場一千三百三十四處為淨制錢約八十四萬緡今未賣者五百有竒乞募進納補官之家投買從之二年正月乙邜詔臨安府諸門權勿稅柴薪油麵等物戊午三衙奏定臨安府左右廂巡為百有十五鋪用卒六百七十三人三衙及本府兵各居其半己未詔修臨安城之頽圯者以修內司所集湖秀等五州役卒就築之四月癸未詔臨安府令馬步軍司分左右廂巡警照𬋩七月乙酉詔自今臨安府遭火止令馬步軍司及府兵救撲仍預給色號他軍非奉御前處分者母得擅出營十一月壬申祕閣修撰知臨安府宋輝言本府酒稅課利乞依揚州例權免分撥諸司應赴本府支使俟移蹕日如舊從之四年正月癸酉詔臨安府四至州郡犯罪合配之人毋得配本府俟四鑾日如舊三月甲戌徽猷閣待制知臨安府梁汝嘉請死事之家無人受恩澤者許换給度牒從之度牒直二百千承信郎一資易十四道他視此為差八月乙未詔以餘杭縣南上下湖北置孳生牧馬監命臨安府守臣兼提舉每馬五百匹為一監牡一而牝四之嵗産駒三分斃二分以上皆有賞罰六年二月癸亥詔臨安府民間僦舍錢不以多寡並三分中减一分白地錢减四分之一紹興十三年五月乙亥中書舍人兼侍讀楊願請倣唐乾元及本朝故事詔天下置放生池祝聖夀工部郎中林乂又請以臨安府西湖為放生池從之既而上恐其妨民諭輔臣舊有者令復之不然則否乂尤溪人也七月丙寅上謂秦檜曰朕嘗與卿言候國用足日蠲賦以寬民力若一概除之又恐用或不足浙西駐蹕之久民供不易臨安尤甚本路三等下户與蠲一科庶貧民被實賜也十七年七月乙丑詔臨安府更置庫造祠祭法酒舊取水于西湖上以軍民環居渠流渾濁乃命别醖焉二十三年四月甲戌上謂大臣曰近令臨安府收捕破落户編置外州本為民間除害而所謂小火下者乃為人訴其恐嚇取錢妄有供具甚非為民除害之本意可令有司子細根治務得其實先是行在有號破落户者巧于正晝通衢竊取人所帶之物秦檜得其姓名悉奏分遣外州拘之上恐因而擾人故有是諭二十六年七月辛亥户部尚書兼權知臨安府韓仲通言安撫司回易庫昨將官錢責借油鋪并置米鋪以收利息又居民日用蔬菜果實之類近因牙儈陳獻置團拘賣剋除牙錢太多致細民難于買賣又本府買擈稅錢并新添河渡所納錢物不多因此邀阻往來之人欲乞並行住罷從之三事皆曹泳所創及是因星變而罷三十年三月丁亥詔臨安府在城自紹興二十一年以後官司續置到房廊賃錢並减三分之一錢唐人喜殺日屠百鵝豫自湖上夜歸屠者之門百鵝皆號聲振衢路若有所訴鵝能警盜亦能却蛇有糞殺蛇蜀人園池養鵝蛇即逺去有二能而不能免死又有祈雨之厄悲夫安得人如逸少乎東坡仇池筆記王師征越敗于臨安禆將劉宣傷重卧于死人中至夜有官吏數人持簿編閲死者至宣乃扶起曰此漢非是引出數十步置道左明日賊退乃得歸唐餘録國朝始置諸州通判嘗與知州爭權有錢昆者杭人嗜蟹嘗求外郡上問其所欲昆曰但得有螃蟹無通判處則可矣歐公歸田録王文穆罷相知杭州陳從易學士送詩云千重浪裏平安過百尺竿頭穩下來侯鯖録錢氏時有還鄉和尚每唱云還鄉寂寂杳無踪不掛征帆水陸通踏得故鄉田地穩更無南北與西東或問其說曰明年大家都去有納土之應鄭向知杭州王景為浙漕互有論列而景死鄭往哭之盡哀或曰龍圖素惡端公今何慟哭也范拯曰龍圖待哭斯人久矣張師正倦逰雜録咸淳臨安志卷八十九
