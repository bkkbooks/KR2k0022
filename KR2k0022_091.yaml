body:
  text: 咸淳臨安志卷九十三宋潜說友撰紀遺五紀事餘杭縣吏何某自壮嵗為小胥至押録持心近恕畧無過愆前後縣宰深所倚信又兼領開拆之職毎遇受訟牒日待旦先坐於門一一取閲之有挾詐姦欺者以忠言反覆規曉之曰公門不可容易入所陳既失實空自貽悔何益也聴其言而去者甚衆民犯罪麗于徒刑合解府而顧其情理非重害必委曲白宰就縣斷治其當杖者又徃徃諌使寛釋置兩竹筒于堂擇小錢數千分精粗為二等時擲三兩錢或一錢于筒中諸子問何故曰吾䝉知縣委任凡幹當一事了則投一錢所以分為二者隨事之大小也子竟不深曉迨謝役夀終始告之曰爾曺解吾意乎吾免一人徒罪則投一光錢于左筒免一杖罪及諭解一訟則投一糙錢于右筒宜剖而觀之兩筒既破皆充滿無餘地笑而言曰我無復遺恨如隂隲可慿為後人利多矣遂卒後十年其子伯夀鑄登儒科紹興中位至執政累贈其父太子太師忠訓郎王良佐居臨安觀橋下初為細民負擔販油後家道小康設肆于門稱王五郎夫婦好奉釋氏齋施無虛日淳熙初年二月清旦焚香日中有塔影七層現于側黄碧璀粲宛若新飾金書三字曰寳叔塔私竊自念此塔草創修治全未成緒我今自任其責乃捐力重建造規範雄赫勝于承平之時寺僧塑其夫婦像于第一層上後買給使减年恩補官或云王生少年日因在市闘毆傷人捕繫仁和縣獄適與一重囚同年語話頗欵宻因言我一生做經紀今焉敗獲念殺人負罪决無生理切有心臆之事為君陳之我昔年曽掠富室之物得金銀甚多埋于寳叔塔下左方入地若干尺可悉掘取俟我伏法了幸為收拾骸骨瘞之髙原仍廣作佛事以資超脱遇忌日時節宜飯僧讀經分明囬向則我瞑目不憾矣王出獄悉如所戒徃塔下啟穴果得物可直萬緡因此致富故假塔影之説以盖其事云臨安西湖舊傳南北兩山僧寺大小合三百六十兵革之餘又為軍營禁苑勢人園圃之所包占今存者不滿百唯南山境趣幽寂無繁華腴艶氣象靈石寺僻在深林叢薄中古屋猶不壊屋山有六言詩一首曰南塢數囬泉石西峯㡬叠烟雲登携孰以為侣顔寓李甲蕭耘老僧言昔年有道人四輩來乞食是時午齋已過拒而不與一客取筆題此詩其後好事君子尋繹之曰首句寓吕字次句為洞字又次為賔字下句三人姓名是吕翁與之俱來必皆仙者也乾道四年三月予同三舘之士至彼見其字乃倒書于椽間頗類李北海錢唐頃嵗有葛道人者無他技能孤獨無妻子唯以業屦為生得錢即沽酒放浪于湖山間徃來累年不逄知識一日為寺僧修屨口中微作吟哦聲若運思搜詩者僧訝而問之笑曰今日偶得句但未成章耳僧亦喜此者加禮謂曰可得聞乎曰百囀已休鶯哺子三眠初罷栁飛花僧驚歎宣揚其語自是人始知為非市井凡流時宣和中也後不復審其在亡錢唐舊有長老名重喜會稽人少以捕魚為生業而日誦觀世音菩薩不少休元不識字一日忽能書且又能作偈頌關子東博士及識之記其一頌云地爐無火一嚢空雪似楊花落嵗窮乞得苧蔴縫敗衲不知身在寂寥中味其㫖趣豈捕魚小兒所能萬一解悟如是盖大士智慧力也臨安都税院土地予載田相公一事于支庚矣俗傳為錢王輔臣有功于民者邦人崇事之甚敬而廟字頺圯積久弗治慶元二年冬監官鄱陽宗子趙怡夫到任之初欲加修繕又念彼何功于我便為致力遣征吏告白俟毎月税課増羨則當以此報之未幾隣居人鄭五遭竊禱其神旋即獲盗自擬出錢營建然亦未暇也三年三月十九夜趙夢神命使來召趣行甚速因隨以徃從後殿而過凡廊廡皆有貎位率起立拱揖徐抵正殿神邀坐聚語俄頃夫人携男女各一亦出見因置酒留飯具道隂庇一方之意先是都城頗嚴奉李三二太尉之祀云張王急脚時有靈應小人乗以射利散施符水至處處掲榜唱言今年李太尉行瘟趙惡其惑衆告于府尹王卿㢲澤溉祈革此弊尹捕首惡數輩杖而出諸境仍追罰百千是夕神與趙言及此云聞君理會李太尉事張王甚喜盖為其所玷也繼云吾欲治廟室無肯任責者趙頓憶曩志即對曰當竭愚𠂻神且喜且謝遂呼一僧使説相僧揣摩趙頭曰好似傳二相法他日官爵正如熊震潘文虎遂覺思所謂傳熊潘三人莫知為誰明旦詣土地廟瞻謁宛如所夢始募衆集力一新其居怡夫以書告于弟懌夫慶元二年十月二十夜三更月初出時臨安嘉興兩邦人未寢者皆見其團圓如望夕太史奏是為上瑞吳地當十嵗大稔其冬不雪明春無雨民極以為憂下詔惻怛􅈤祈中夏雨足繼此必有望也紹興中韓郡王既解樞柄逍遥家居常頂一字巾跨駿騾周㳺湖山之間纔以私童史四五人自隨時李如晦晦叔自楚州幕官來改秩而失一舉將憂撓無計當春日同邸諸人相率徃天竺李辭以意緒無聊賴皆曰正宜適野散悶可也强挽之行各假僦鞍馬過九里松值暴雨衆悉迸避李奔至冷泉亭衣袽沾濕愁坐長歎遇韓王亦來相顧揖矜其憔悴可憐之狀作秦音發問曰官人有何事縈心而悒怏若此李雖不識韓但見姿貌魁異頗起敬乃告以實韓曰所欠文字不是職司否荅曰常員也韓曰世忠却有得一紙明日當相贈命一史詳問姓名階位仍詢居止處李遜謝感泣明日一吏持舉牘授之曰郡王送來仍助以錢三百千李遂陞京秩修牋詣韓府欲展門生之禮不復見趙粹中為吏部侍郎夢出至㕔上大門豁開吏報客通謁其長七尺著道士羽服形容端嚴視其刺字曰北方鎮天真武靈應真君趙奉神素謹肅然起敬趨下迎揖不敢以主禮自居神固請趙東向坐曰侍郎是主人今日之事公為政毋用謙辭遂就席局脊而窹是時孝宗于潜邸王宫創建佑聖觀以荅在藩禱祈感騐之貺明日降㫖差趙為奉安聖像使乃悟夢語餘杭洞霄宫昔有主首道士誠敬感神誦度人經掲著竒騐其側則龍潭所在毎就彼持念倐一老人從潭出跪白曰弟子即龍王也毎獲聴經文無任瞻仰但不輙前今所以呈身切有請耳道士曰其説云何對曰師才到潭上則水府幽祗皆當起敬不退殊不自安兹願只宴坐宫中不妨日課庶幾百靈得以休息若慈悲賜許當日供鮮乳二斤以充齋膳道士曰吾意豈在斯謹奉王戒老人喜謝而隐潭上之役遂罷翌日厨僕報几案間得乳兩片極新潔莫測所從來未審堪食否道士云非汝所知宜以餉我小師秤之果重二斤其後日日常然数年後忽失約深訝焉復誦經水次前老人再至曰乳乃世間物弟子忝為龍神可以得之但塵凡中有欺瞞取贏餘者我則隂攝之此去市户董七者好舞秤權用十四兩作斤故即而掠取今其人出外厥父自主舖業淳朴有守未曽罔利故無從可致乳道士歎息不已謂之曰吾欲知其端倪恐身有以詒譴耳然則欺心事那可妄為吾誦經以増之亦亡益也遂周行郊關一意導人于善鄉宿至今尚能言之而忘其姓名及嵗年矣皮場廟在臨安西湖者其威靈不减汴都處州士人葉生游國學賦性若癡昏而誠敬居心事神竭力毎月朔望必一徃拜謁無間于寒暑風雪也因省試下第無聊念歸而囊無一錢可動謂同舍曰吾窮困無筞明當禱皮埸乞三萬錢衆相與嗤笑及還有喜色曰卜之盃珓既許我矣明日當得之衆曰如何送來曰殆不可知也明日兀坐薄晩有近郡太守倩隣齋指名以百千招一習書者充舘客其人亦以失利不肯行葉亟徃自獻隣齋將付所迎之資但請借三十千約自鄉里省母便道赴之遂符昨數皆以為偶然耳又湏一夫力荷擔復齋戒謝神之賜而申此請衆曰此豈難辦所患無錢既有之何必薦凟神祗拒不聴復禱祠下亦有喜色臨束装杳無其人廹于潮信令齋僕齎行衆曰此只可至江下奈渡江乏使何曰吾所恃唯神定非所慮長揖徑出至午僕囬争扣之僕云葉上舍將上船恰一鄉夫自江西來無囬驛正與之是隣人欣然隨去矣于是始異之後数日一同舍自越囬乃與葉同舟者語士友曰神哉皮埸之靈獨私于彼是日到中流風雨驟作吹仆帆檣舟人窘束無措同載百人驚怖誦佛而葉熟寐不知也俄而風定檣正舟人云方危急時見金甲巨神仗劍坐于篷上不審為誰所事實賴其隂助獲免傾覆爾葉竦然改容曰即吾香火所奉皮埸大王也繪軸見在吾笥適于夢寐中固睹之矣臨川游祖武為前廊學録親語其異臨安兩通判官舍一在石板巷曰北㕔一在審計司旁曰南㕔慶元三年北㕔濟南張真卿卒南㕔金華潘好恭坐章罷四明王正民為張代居于石板有道人過門語閽吏曰此宅有怪物故處之者不寧閽入白王亟延問之道人指㕔壁題名記曰正伏于碑石之下王集從卒移石過掘之三尺得大龜徑二尺許亟輦致西湖中未幾王亦卒錢王名其居曰握髪殿吳音握惡相亂錢唐人遂謂其處曰此錢大王惡發殿也已下陸放翁老學菴筆記秦檜之當國有殿司軍人施全者伺其入朝持斬馬刀邀于望仙橋下斫之斷轎子一柱而不能傷誅死其後秦毎出輙以親兵五十人持梃衛之初斬全于市觀者甚衆衆中有一人詬言曰此不了事漢不斬何為聞者皆笑東坡守杭法外刺配顔㢲父子御史論為不法累章不已蘇公雖放罪而顔㢲者竟以朝㫖放自便自是豪猾益甚以藥塗塩鈔而用既毁抹賂主者浸洗之藥盡去而鈔不傷雖老于其事者不能辨他不法尤衆有司稍按治輙刼持之曰某官乃元祐姦黨蘇某親舊故觀望害我公形狀牒時治黨籍方苛峻雖監司郡守得其牒輙畏縮解縱乃已大觀中胡奕修為提舉塩事會計已毁抹塩鈔得其姦奏之黥竄化州籍沒貲産一方稱快杭僧思聪東坡為作字説者大觀政和間挾琹㳺梁日登中貴人之門久之遂還俗為御前使臣才其將冠巾也蘇叔黨因浙僧入都送之詩曰試誦北山移為我招琴聪詩至已無及矣叅寥政和中老矣亦還俗而死然不知其故建炎三年春車駕南渡駐蹕于杭有侍臣召對者既對所陳劄子首曰恭惟陛下嵗二月東巡狩至于錢塘吕相頥浩見之笑曰秀才家識甚好惡大駕初駐蹕臨安故都及四方士民商賈輻輳又創立官府扁榜一新好事者取以為對曰鈐轄諸道進奏院詳定一司勅令所王防禦契聖眼科陸官人遇仙風藥乾濕脚氣四斤丸偏正頭風一字散三朝御裹陳忠翊四世儒醫陸太丞東京石朝議女壻樂駐泊藥舖西蜀費先生外甥冦保義卦肆如此數十聫不能盡記蔡太師父凖塟臨平山山為駞形術家謂駞負重則行故作塔于駞峯而其墓以錢塘江為水越之秦望山為案可謂雄矣然富貴既極一旦喪敗幾于覆族至今不能振俗師之不可信如此慎東美秋夜待潮于錢塘江沙上露坐設大酒樽及一杯對月獨飲意象傲逸吟嘯自若顧臨適遇之亦懐一杯就其樽對酌東美不問臨亦不與之語酒盡各散去秦會之初賜居第時兩浙轉運司置一局曰箔場官吏甚衆専應副賜第事自是訖其死十九年不罷所費不可勝計其孫女封崇國夫人者謂之童夫人盖小名也愛一獅猫忽亡之立限令臨安府訪求及期猫不獲府為捕繫隣居民家且欲劾兵官兵官惶恐歩行求猫凡獅猫悉捕致而皆非也乃賂入宅老卒詢其狀圖百本于茶肆張之府尹因嬖人祈懇乃已樂天有移家詩云移家入新宅罷郡有餘資又有履道新居二十韻盖公平生從仕至是始有俸餘於是定居于洛以為終焉之計唐語林云公罷杭俸多留官庫繼守者公用不足則假而復填如是五十餘年及黄巢至郡文籍多焚其俸乃亡公自言罷郡有餘資而猶有寄留官庫者豈亦如今世有事例而法不應得者乎陳直齋振孫作白文公年譜嘉泰癸亥嵗劉改之在中都時辛稼軒棄疾帥越聞其名遣介招之適以事不及行作書歸輅者因傚辛體沁園春一詞併緘徃下筆便逼真其詞曰斗酒彘肩醉渡浙江豈不快哉彼香山居士約林和靖與蘇公等駕勒吾囬坡謂西湖正如西子濃抹淡粧臨照臺諸人者都掉頭不顧只管傳杯白云天竺去來圖畫裏峥嶸樓觀開看縱横一澗東西水遶兩山南北髙下雲堆逋曰不然暗香踈影只可孤山先探梅蓬萊閣訪稼軒未晩且此徘徊辛得之大喜致餽數百千竟邀之去舘燕彌月酬倡亹亹皆似之逾喜垂别賙之千緡曰以是為求田資改之歸竟蕩于酒不問也詞語峻㧞如尾腔對偶錯綜盖出唐王勃體而又變之余時與之飲西園改之中席自言掀髯有得色余率然應之曰詞句固佳然恨無刀圭藥療君白日見鬼證耳坐中烘堂一笑以下岳尚書桯史秦檜在相位頥指所欲為上下奔走無敢議者曺泳尹天府民間以乏見鏹告貨壅莫售日嚚而争因白之檜檜笑曰易耳即席命召文思院官未至趣者絡繹奔而來亟諭之曰適得㫖欲變錢法煩公依舊夾錫様鑄一緡將以進入盡廢見鏹不用約以翌午畢事院官不敢違唯而退夜呼工鞲液將以及期富家聞之大窘盡輦宿蔵争取金粟物價大昂泉溢于市既而様上省寂無所聞矣都堂左揆閣前有榴毎著實檜嘿數焉忽亡其二不之問一日將排馬忽顧謂左右取斧伐榴有親吏在旁倉卒對曰實甚佳去之可惜檜反顧曰汝盗吾榴吏叩頭服盖其機穽根于心雖巍𤨏弗自覺此所謂莫見乎隐者亦可歎也江山邑寺有緇童眉長踰尺來净慈都人争出視之信然事聞禁中詔給僧牒賜名延慶寺僧日坐之門䕶以行馬士女填咽炷香謂之活羅漢遂裒施貲為殿寺有故銅像甚侈乃位之中不期而成秦檜以紹興十五年四月丙子朔賜第望仙橋丁丑賜銀絹萬疋兩錢千萬綵千縑有詔就第賜燕假以敎坊優伶宰執咸與中席優長誦致語退有叅軍者前褒檜功徳一伶以荷葉交椅從之詼語雜至賔歡既洽叅軍方拱揖謝將就椅忽墜其幞頭乃總髪為髻如行伍之巾後有大巾鐶為雙叠勝伶指而問曰此何鐶曰二勝鐶遽以樸撃其首曰爾但坐太師交椅請取銀絹例物此鐶掉腦後可也一坐失色檜怒明日下伶于獄有死者于是語禁始益繁芮曄令衿等吻禍盖其末流焉劉藴古燕人也逆亮將南冦使之偽降以覘國初吳山有伍員祠瞰闤闠都人敬事之有富民捐貲為扁額金碧甚侈藴古始至輙乞靈焉妄謂有心諾輟俸易牌而刻其官位姓名于旁市人皆驚曰以新易舊惡其不華耳易之而不如其舊其意果何在有右武大夫魏仲昌者獨曰是不難曉他人之歸正者僥倖官爵金帛而已藴古則真細作也夫諜之入境不止一人榜其名所以示踵至者欲其知已至耳聞者憮然不信後卒如言今中都有豢魚者能變魚以金色鯽為上鯉次之貴㳺多鑿石為池寘之簷牖間以供玩問其術祕不肯言或云以闤市洿渠之小紅䖝飼凡魚百日皆然初白如銀次漸黄久則金矣未暇騐其信否也又别有雪質而黒章的皪若漆曰玳瑁魚文采尤可觀逆曦之歸蜀汲湖水浮載凡三巨艘以從詭狀瑰麗不止二種惟杭人能餌蓄之亦挾以自隨余考蘇子美詩曰松橋扣金鯽竟日獨遲留東坡詩亦曰我識南屏金鯽魚則承平時盖已有之特不若今之盛多耳潘閬居錢唐今太學前有潘閬巷俗呼為潘郎閬工唐風歸自富春有漁浦風波惡錢塘燈火微之句識者稱之唯落魄不檢為秦王記室叅軍王坐罪捕閬急甚閬自髠其髪易緇衣持磬出南薫門上怒既怠有為閬説上者曰閬不南走粤則北走胡爾惟上招安之上旋悟時閬已再入京勅授四門助敎閬以老懶不任朝謁為辭自封還勅命時文法踈簡猶若此未幾論者謂閬終秦黨語多怨望編置信上至信上勺道旁聖泉題詩柱上曰炎天闕熱如焚却恨都無一㸃雲不得此泉闕幾乎渴殺老叅軍猶稱記室舊衘也先是盧多遜與潘善故有四門之命多遜譛趙普不行普相多遜罷故閬終不免嘉定間臨安守建先賢堂于西湖欲祀閬于列有風不宜預者遂黜閬事見祠記進徳行而退文藝先節義而後功名以下葉紹翁四朝聞見録光堯幸徑山憇于萬木之隂顧問僧曰木何者為王僧對大者為王光堯曰直者為王有杉小而直因封之光堯為龍君炷香有五色蜴蜥出于塑像下從光堯左肩直下遂登右肩環聖體者數四又拱而朝亦數四光堯注視久之蜴蜥復循憲聖聖體之半拱而不數時貴妃張氏亦綴憲聖覬蜴蜥旋繞僧至諷經嗾之憲聖亦祝曰菩薩如何不登貴妃身蜴蜥終不肯竟入塑像下妃慙沮不復有施利或問予曰今九里松一字門扁吳説所書也字何以用金予謂之曰髙宗聖駕幸天竺由九里松以入顧詹有扁翊日取入欲自為御書黼黻湖山命筆研書數十畨嘆息曰無以易説所書也止命匠就以金填其字復掲之于一字門云説又嘗書東坡寒碧句于寺之髹壁髙宗命借入宫中玩者數日復命還賜本寺説字畫際遇如此今南山慈雲嶺下地名方家峪有劉媫妤寺後贈賢妃泉自鳳山而下注為方池味甚甘美上掲鳯凰泉三字乃于湖張紫㣲孝祥所書夏執中為后兄俗呼為夏國舅偶至寺中謂于湖所書未工遂以已俸刋所自書三字易之孝宗已嘗幸寺中識孝祥所書矣心實敬之及再幸見易以執中所書詔左右劈為薪幸寺僧蔵于湖字故在詔止用孝祥書今復掲執中字桞洲龍王祠開禧中帥臣趙師􅋷重塑五王像旒冕珪服畢具其中三像一模韓侂胄二陳自强三蘇師旦時韓陳猶在䑓臣攻師旦唯于䟽中及師旦自貌其像不敢斥韓陳至今未有易之者過此皆不識三人者恐未必以予言為信而易之然師旦論䟽可考也考亭先生得友人蔡元定字季通號西山而後大明天地之數精詣鐘律之學又緯之以隂陽風水之書先生信用蔡説上書建議乞以武林山為孝宗皇陵且謂會稽之穴淺觕而不利願博訪草澤以决大議其後言者謂先生隂援元定元定亦因是得謫云辨正在丁集黨識龍川陳同甫亮嘗奏書孝宗謂錢塘一隅之地不足以容萬乗山川之氣發泄而無餘故糓粟桑麻絲枲之利嵗耗于一嵗禽獸魚鱉草木之生日㣲于一日力請移都建鄴且建行宫于武昌以用荆襄以制中原上韙其議使宰臣王淮召至都省問下手處陳與考亭先生㳺王素不喜考亭故併陳而嫉之陳至都省不肯盡言度縱言亦未必盡復于上翊日上問以亮所欲言者王對曰秀才説話耳上方鄙遠俗儒遂不復召見時兩學猶用秦檜禁不許上書言事陳嘗逰太學故特棄去用鄉舉名伏麗正門下王又短之以為欺君古篆無佑佑即右賜佑聖扁篆者為右羽流固争以為觀中無人何以自立至訴之禮部㫖從之非篆古也識者謂既從佑字則不當用篆觀為孝宗潜邸先是有神三見于雲端孝宗為之拜跪既即大位賜邸為觀盖龍潜初志也真聖殿潜邸正寢也寢旁規小室若今小學有富貴必從勤苦得男皃湏讀五車書二句刻于石盖宸翰也上自訓莊文讀書之地故書此以厲之慶元初韓侂胄既逐趙忠定太學諸生敖陶孫賦詩于三元楼云左手旋乾右轉坤如何羣小恣流言又曰羣邪相煽動謡言狼胡無地居一作歸姬旦魚腹終天弔一作葬屈原一死固知公所欠孤忠幸有史長存九泉若遇韓忠獻休説如今有末孫又曰休説渠家末世孫陶孫方書於樓之木壁酒一再行壁已不復存陶孫知詩必已為韓所亷則捕者必至急更行酒者衣持煖酒具下捕者與交臂問以敖上舍在否敖對以若問太學秀才耶飲方酣陶孫亟亡命歸走閩後登乙丑第孤山涼堂西湖竒絶處也堂規模壯麗下植梅数百株以備㳺幸堂成中有素壁四堵幾三丈髙宗翌日命聖駕有中貴人相語曰官家所至壁乃素耶宜繪壁亟命御前蕭照徃繪山水照受命即乞尚方酒四斗昏出孤山毎一鼓即飲一斗盡一斗則一堵已成畫若此者四畫成蕭亦醉聖駕至則周行視壁間為之歎賞知為照畫賜以金帛蕭畫無他長唯能使玩者精神如在名山勝水間不知其為畫耳紹翁乙集載吳説所書九里松字詳矣後閲揮麈後録載吳傅朋説知信州朝辭上殿髙宗云朕有一事毎以自慊卿書九里松牌佳甚向來朕亦嘗書之終不迨卿當復以卿書掲之説頓首稱謝是日有㫖物色説書猶蔵天竺僧帑遂復掲之松門傅朋自云如此但至今九里松字尚填以金過者皆見則紹翁乙集所載似是而傅朋不以語揮麈何也以紹翁考之盖不特此按續稽古録紹興二年六月頒黄庭堅戒石銘于郡縣亦用金書聖人不沒人之善如此張巨濟字宏圖福清人嘉泰間上書寧宗以慈懿攅陵今在湖曲若陛下㳺幸則未免張樂此豈履霜露之義寧皇感悟其言旌轉一秩由此湖山遂無清蹕之聲非特儉徳云御鷁至沉于波臣黄洪詩云龍舟大半沒西湖便是先皇節儉圖三十二年安静裡棹歌一曲在康衢髙文虎字炳如號為博洽名儒疾程文浮誕其為小司成専以蔵頭䇿問試士門目必曰有某人某事者士不能應但以也字對者士之憤髙也久矣會京尹趙師􅋷奏請盡以西湖為祝聖池禁捕魚者作亭池上甚偉窮碑略摩雲髙實為記其文有曰鳥獸魚鱉咸若商厯以興既以鋟之石石本流傳殆不可掩改商為夏隐然猶有刋跡無名子作為詞以謔之云髙文虎稱伶俐萬苦千辛做個放生亭記從頭没一句説著朝廷一作官家盡把師􅋷一作太師歸美這老子忒無亷耻不知潤筆能幾夏王説不是啇王只怕伏生是你一作夏王事却作啇王那鳥獸魚鱉是你然無名子之嘲胡可深信今詳載其記于後云盖商字特筆誤而或者乗間而詆之耳丁夘和議金索首謀函首予之或為樂府云寳蓮山下韓家府主人飛頭行北土髙九萬吳山絶句云拂曉官來簿録時未曽吹徹玉參差旁人不忍聴鸚鵡猶向金籠喚太師劉後邨詩話咸淳臨安志卷九十三
