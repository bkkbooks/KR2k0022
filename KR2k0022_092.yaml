body:
  text: 咸淳臨安志卷九十四宋潜說友撰紀遺六紀文賦丹陽葛澧錢塘賦錢塘據東南之都會號天下繁盛之樂土其山川之秀麗井邑之浩穰人物之豐景概之美詳詢熟覽實浮於名考按圖籍見於前人之稱述備矣因摭其大畧總而賦之其辭曰茹華大夫遺棄歊塵采擷芳英窮足力之所暨徧九垓而週行想見東南之域有名區焉據一方之都會萃萬景而敷榮嬴糧道途荐罹寒暑始入其域倘佯踸踔四縱覘矕紛錯呈露莫能識覽目眩神聳惕慓而驚稔聞藻先生謝迹人寰屏除俗慮繹黄庭之秘術韄征僑之髙趣眠雲嘯月隐林泉之勝處廼滌垢心齋鞠躬緩步徐届衡門情懇厥故曰先生髙卧久矣蘄有攸聞願洞開而悉諭先生囅然笑曰眡子辭氣若有所覩有弗當於中心者乎豈生於偏城下邑而未䆒䧺藩巨鎮之浩穰也邪子來前余語汝粤若一氣肇分二儀聿建有清有濁或合或散凝為山嶽融為河漢五方各殊號名爰辨烏䇿篆素文該迹備顧兹都督之大府上當星紀之躔次騐夏書之所别為揚州之内地春秋之際屬吳春秋之後屬越嬴秦統於會稽厯世藩於東北至陳始建錢塘之號當隋重置杭州之額縂管府立於仁夀初餘杭郡更於大業末唐武徳時因名於開皇李子通後嘗陷於公祏及貞觀之休明隷江南之疆場開元中分東道之採訪乾元來歸江南之觀察厥後景福間剏鎮海軍之莭度聖宋淳化置寜海軍而改易有山有川有市有㕓提封千萬井丁黄幾萬千景概之佳美百物之富繁可指而言焉七雉維髙數尋維厚矗然屹然長雲㫁岸敞以髙臺穿以㢋竇甃以陶甓覆以鴛霤其出入有譏其啟閉有守内足以衞居止外足以御戎冦周袤連亘五十餘里耽耽然虎踞麟伏羅峰列岫是為州城城中則有東西之陌南北之阡四逹之衢九出之逵開通且長方軌甚夷清流中貫蕩漾漣漪畫艗來􅋈郵亭枕漘敦禮會别去思披雲寳石七星清輝吳門彩虹横帶欄楯夾烝常樂延寳千秋普明清湖衆安通江都亭綺分𤓰裂各撫界分時則有埧南埧北南城西城開道奉國温泉水明中棚清波朝天清平廵邏糾禁晝警宵繩剖㭊途巷標題坊號時則有通和延福廣大常慶興禮會昌義和從訓慈孝清飌安國延定通寳豐財紫雲立政大書深刻誇詡争勝坊中則有塈茨之垣墉肯剏之堂室上棟下宇以避燥濕欂櫨闗鍵牆輝地闗緑忩朱扉畫簾綉幕聳樓閣兮千門叢綺紈兮萬閾或對牖而胥瞰或面水而稳植崇庳列峙交錯襍出如􅌨宻比如鱗叠集夫家於焉而樂生稚艾於焉而燕息鑿井渇飲實廩飢食漢志載用物常足之言隋史有尚禮敦龎之説牧之具甲於天下之稱居正叙繁會雕麗之迹邑屋華麗文忠公之記可稽萬屋相誇王文公之詠紀實蔡侯云為一都會吕公云為天下據伯鳯言地多竒勝沈立言人物安逸世守良工競精舊業繢畫函韗刮摩搏埴裂帛之槻裁木之䤨剏物器具交持逓挈百所為備纎㣲罔闕啙窳就攻豐阜積墆學古者不知力農之勞通鬻者不知伎巧之法熈熈陶陶含哺鼓腹沐浴皇靈優㳺化國其阜通䌖賄懋遷化居則建垂旌之思次分朝夕之三市旗亭五重俯聺百隧列族聚貨通闠陳次有所次叙冇地度量有式偽餙有禁大質小劑亮執其言胥師肆長各謹其令江帆海舶蜀商閩賈水浮陸趨聫檣接武紅塵四合駢至叢貯㒊譶澩㺒揮袂飌舉息操倍蓰功辨良楛廼有安康之麸金白膠汝南之蓍草龜甲上党之石蜜貲布劍南之縞紵牋錦其他球琳琅玕鉛松怪石蠙珠檿絲杶榦栝栢金錫竹箭丹銀齒革林漆絲枲蒲魚布帛信都之棗固安之㮚暨浦之三如奉化之海錯竒名異状夥够堆積貿易者莫詳其生博洽者疇克編識其承流宣化聴訟訊獄則有官府焉貴有正有貳有寮有屬賤有府有史有胥有徒牧伯之宇雄峙于爽塏㢘按之司對列于通衢綉栭雲楣鏤檻文㮰瓌榦虹梁藻井橑桴長廊廣廡連閣閈庭碝磩緻砌渥彩粉敷塞門内立儀簷豁如於以植其畫㦸於以通於軺車列鍛垂警戒不虞詔條自是以宣揚吏民於焉而犇趨聫識之第等並建征啇之局據要濶居璇扉静兮束矢罕入帑蔵啟兮金帛廣儲鹺礬𣙜酤秉式法而受授常平鎮城積紅腐而羨餘其嵗月有會有計其參署有籍有書庭無壅滯繄師帥之明健人恥閗訟由易俗於恬愉其職供正取時運而益大府之用其休聲美政時傳而逹天子之都毓材養士有學宫焉𨽻集有舍勸講有堂模範有師切偲有友升降以齒而人遵長㓜之序漸磨有素而俗安禮義之守春秋祭饗多儀必舉由是習先王之典嵗時較藝工拙精分由是勵循循之誘故得圃澤之多賢妹邦之君子楚材南金汝潁神錐鼔篋朋來袍紛鷺集俎豆莘莘獻酬交錯歌唐頌虞泳仁蹈徳長者皆不厭不倦㓜者亦克岐克嶷日就月将自强不息人人號為書淫處處稱其傳癖念夏侯拾芥之言慕桓榮稽古之力杏壇茂䕃扇習習之清風泮水澄波漾明明之皓魄衣冠不特盛於鄒魯齗齗豈専美於洙泗輔助文徳有武備焉養以稍食衣以繒帛會以什伍居以營屯駐泊崇莭龍山水軍船務寳興捍江牢城統以莭制訓以五兵焠刄沙浦刷馬江濱大閲有時賞罰有經或揮左或揮右或三令或五申暨暨詻詻堂堂烝烝跿跔揘觱儵胂麠䲔宻須之鼔闕鞏之甲繁弱烏號黄開千鈞枉絜殺鍭龍藻龜文偏重襲矛鋋飄英奮烏合兮其陣猛厲鷹揚兮其敵勍稔坐作進退疾徐䟽數之莭熟鉦鐸鐲鐃旗斿厹矟之名器用犀銳人習精明陣整魚麗法嚴栁營勇者壮者大以備不虞不庭弱者脆者小以充執役使令足以鎮南國之疆宇足以暢皇家之威􅏢府地之北有吳山焉嶻嶭􅴀嶞㟎峞㠔􅧓墱道邐迤刻陗可步英烈廟庭架植其所伊昔楚國有臣子胥憤讒夫之浸潤哀天屬之非辜觧劍以析漁父渡江而犇東吳五戰至郢而昭王大去破塚鞭尸而宿恥已除聲光既振措國彊盛南服越人北威齊晉徙闔閭之撫封實子胥之輔政逮夫差嗣立宰噽用事納勾踐之幣遺欲伐齊而肆志雖輸忠讜之諌覬寤君心莫逃讒佞之謀終行詭計於戯身雖殞而徳愈光事雖往而名彌彰致黔黎之愛慕建祠宇於髙岡以迄於今餘千禩矣囘廊䆳殿覃覃増壮直誠大節藹藹騰芳顔貌如生濟濟鏘鏘孱夫觀之而激懦志烈士過此則厲剛腸駊騀巍巔夏屋大啟夷茀崴㠢䡾䡾嶊嶉越軼埃壒炳耀曄韡仰攀雲兮俯杳𦕈是為堂兮曰有美坻崿棧齴控壓羣峯飛暈老拱誕豁雲際前瞻後盻左顧右睨江潮匒匌波瀾蕩泆翠屏碧嶂極目無翳大尊榮之餙必因聖人吟詠而後得誰其詠之我仁宗皇帝夫景趣之佳必待賢者輯治而後顯疇其輯之前守臣梅摯由是天下想望而玩慕邦人咨嗟而欣喜當其陽和焕發景物華鮮值清明之後或禁火之前依依之緑野無際茸茸之芳草連天撲春歡之燕乳啼春恨之鶯遷汀蒲岸栁之裊娜紅葩緑蕚之芊綿都人士女妬艶争妍鞚香韉擁翠軿闐郛溢郭累跡差肩駢衍佖路要遮鮮扁水畔遲遲問誰人之祓禊林梢隐隐知何處之鞦韆若日山之氣候則變態而無窮却躬逺望穹林隐藪出沒於杳靄嵐光翠色合散於空中移跗近觀低坡崇岌彌絡開奠幽禽野鳥嘲哳舞歡州城之外有西湖焉泉流瀦滙廣深停蓄漴淏澯潾止而清些渹􅝞濍動而聲些沙洲之垂栁綻嫩波心之浮圖弄影湖中乃有千艘荃橈萬舸桂楫紼纚輕維蘭栧開㨗行客逰人旁午襍遝或浮泛緑漪之上或艤泊他山之脅梵宇檏縟峰巒襵濌相携首東水心定水崇福興福恵明妙恵法善土宿其山有若外園其嶺有若鐵埜其亭臺則有衆樂集賢在焉徙屨囘南净慈佛慧招慶普寜净因净相眞如寳林其山有若南屏其嶺有若慈雲其亭觀則有發符白蓮在焉縱步尋西恵因香積法雨法空廣果資國正濟六通其山有若靈石其嶺有若麦嶺其亭檻則有流杯㴠溪在焉隨徑羾比菩提招賢寳積寳雲普濟寳勝智果夀星其山有若巾子其嶺有若衣眉其樓臺則有看經英㳺在焉傍西深入岩谷益秀上下天竺靈隐靈鷲争出竒巘互獻重岫烟籠黛染澤通雲覆十里之松徑隂隂萬脉之列泉溜溜又其西則南北髙峰獨透羣嶺之表亭亭挿天亄費浮雲在其下而可以攀瑶光曵玉純者也植中岩岩則有孤山西林報國崇因廣化開闔扉楹層厠碧瓦或跨閣於陞砌或引泉於堂下在昔林逋傲世嘉遁慕㝠㝠之髙飛潔皎皎而率性幽居遂志遺累深隐飄飄杖履泛泛小艇去尋精刹步隨幽徑縱鶴翔雲延客反命長留長者之車屢至公卿之迎蕙帳久虚而遺跡永存園林幾换而故境猶在芬芬播傳隆而不冺湖山得是以増勝誕安步屧則有長隄隆防障横卧湖心其長千尋其廣並輪増卑培薄完繕砥平跨以徒枉夾以栁隂其他岩曰玉女佛手洞曰烟霞香林石曰䌫船隐士峯曰蓮花白雲亭曰夜講暎發塢曰大慈楓林塔曰慈雲黄皮澗曰呼猿石門井曰金沙烹茗菴曰永安寳雲泉曰虎跑卧犀池曰定箭湧金錢源龍濺袁松陳檜涡渚别嶼塢漾曲水緑竹有並生之竒偃松有八面之美小嶺有飛來之號髙臺有繙經之志畫橋碧沼觸處逢之月觀歡亭時時見矣或逺或近四週環列妙景幽趣殊踪異迹名不可以殫紀足亦囏於徧歴供騷人無窮之吟付丹青意外之茟故張祐載樓臺髙聳翠岑之言賈島有烟濃景晩難状之述春波千頃見文正之句魚躍蟬嘶形舜欽之什楊蟠以百咏而譽佳元之以畫圖而顯餙每嵗孟夏初旬八日郡人數萬以胥會競縱羽鱗而祈福者天禧中故丞相王冀公始請為放生之會也水涸則草生水淺而葑横深虞堙塞之漸力陳浚治之言者元祐嵗前内相蘇東坡敷奏乞興役之䇿也廣乎大哉東抵郭瀝之境西接新安之際申畫郊圻幾七百里之地若稽古先建邦蕃衞以守民社以壮形勢設法備具莫盛於成周之世析之則有鄰有比統之則有鄉有遂豈王畿特私然舉六服皆若是故得内外同歡遐邇均恵國家大猷是經議事以制夐觀典則損益其事縂之有州附之有縣縣則分鄉以識别鄉復分里以表異惟此錢塘疆界既廣故立縣有十而縣之所治九十二鄉鄉之所管四百二十有七里闕邍隰廼疆廼里其為縣也錢唐置號以華信出私錢而築塘餘杭立名因秦始皇捨舟航而登陸於潜䀋官始自漢家臨安富陽更由晉室孫吳分富春而剏新城之邑我宋以仁和而易錢江之目南新立當淳化之年昌化改在太平興國或為緊或為望或為中或為上其為鄉為里制名取義亦各有所因焉如曰七賢因覩仙客如曰新登因更縣額若茲之類有所因而名鄉者也如云勲貴因命錢鏐如云白雀因見白雀若茲之類有所因而名里者也生齒居聚蓄牧養蕃有場有圃有廬有園有桑有梓有林有泉㸑烟相望雞夫相聞隐隐振振繚垣綿聨穱秀菰穂象耕鳥耘賽華薌之重秬散滍辠之香秔俗享再稔之利婦蠶八育之綿家蓄鶴膝之器户衒犀渠之精出入足以相友賙救足以相生閑暇足以相樂急難足以相存頒白不負戴於道㓜疾各得所而安吳地舊俗厯世仍傳尊釋氏以崇奉習巫覡以相先故蓮宫紛置五百三十有二而祠廟建立一百七十有三其為寺也在内則有若承天梵王廣慧竺林浄戒浄住明心法雲寧邦延夀仁王國清寳月翠峯澄鑒福明在外則有若寳輪龍光晝錦瑞竹朱金龍華雲霄浄福靈耀普光圓通正覺昕慈靈岩忻平石室紺園洞啟浄土廣闢殿閣横敞廊廡深邃寳相璘㻞花香列衛光以堊丹飾以金貝珊瑚琳碧瓀珉翟翡藻綉繊縟瑰竒屬綴雕繪椽争華競麗幡幢𤣥出摇摇曵曵梵歌唄音磬低鈸厲晨魚數擊散落民家暮鐘杳杳縱横四起其為廟也近則武烈普濟福安福利福隆廣靈武寧衛寜保定立徳䕶國始興夫差臯亭威勇老人逺則保慶興聖鼓澤七松隆福迎陽安恵桑亭廣慶懐柔徐偃郭文塔山松溪白石崇寧雄姿偉貌仗衛森然或因功血食或以徳顯名或當朝近世或數百千齡載於祀典咸秩其文傳記紀厥美實金石播厥馨芬至若旱潦流行札瘥驟起竭蹷䖍禱肅将祀事立致感格黙符人意故茲信仰弗怠弗替若夫疆圉形勢則有羣山焉鳯凰白鹿秦望鑿石功臣衣錦璧茂安國岝㠋金牛流㐮竣立石甑金現玉座與邑阿頂獨角金樓華石峴曰顧望墩曰仙姥嶺曰金鵞峯曰卓筆岩則虎頭雞棲龍池朱積惟名山暨幽洞多異事及靈迹或振竒於一時或罕聞於曩昔如臨平山石鼔嘗出唯張華有言用蜀桐可擊天井開兮涸溢蔑增損龍洞闢兮源深不可測如仙姥則裴姥嘗居採衆卉之花蘂因釀酒以當壚異人來飲授藥與俱如曰仙坑則有仙客囘鸞駐蹤有獵徒之偶到第見白鶴之飛空如曰金錢有僧智度棲隐山巔忽覩神人之出現因建精舍以相傳言其山勢􅪾㠑崚嶒屹岦岝峉􅒈嶚􅥲峛崺嵽嵲猶雲之蒸猶林之叠猶獸之蹲猶陣之列或如旒垂或如珮委或如鼎峙或如壁植遶者若朝近者若在後若拱居前若揖繚若篆籕妥若弭伏掲若㽅梪赤若秃鬝其上乃有薜荔芷术蒲黄牛膝桃李梅杏柑橘棗栗薑藿芋蒜葵蘇芹蕨榆栁楓檀桑柘梓櫟茥􅶽箭葦苕茅荻髪蔓滋茂雨培露殖攅柯㧝莖重葩掩葉素蘂丹秀紫房青壁麗藻燦燦芳蕤馥馥橚矗森莘冒霜停雪矦樵矦採莫有藝極噫嘻山雖多矣莫若天目為大焉其廣也厜㕒甗隒縈繞盤礴連延負壓週遭有八百里其髙也侵接霄漢彌茫眇眡莫見其脊凡三萬九千尺仰太虚兮日月低坐絶頂兮乾坤窄圍八極於寸眸撫四海於一息帶絡虹蜺襟包坱軋其上則有東西澗可度谷塢澳湖蛟龍池其冡坦平兩湖對立若人之有䨇眸茲其名曰天目又有洞府三十六所每至深秋風雨晦㝠而叵測盖靈異之所潜蔵神仙于焉居宅異時嘗有徐五仙張道陵或餌霞而服氣或舉室而飛昇近世亦聞隐者結廬危層髙卧棲真每下眡山半薈蔚紬隮如聞嬰兒之聲必有霶霈雴霫大雷大霆則其穹窿峻極從可知矣主之有神司之有責飌飄飄兮宣威雲霏霏兮降澤靀靀其零祁祁傳及以沃我田埜以稔我稼穡山所蓲蘛布濩蟬聫觸類推覈斯可略言其木則山榎山樗杻檍椵檹棆楈㮿㰋虆楮㰘楤莖裛葉橋杭樛垂蓊鬰薆薱吐葩颺㽔杉松青青並榦接枝其髙千仞其大百圍臃腫拳曲發􅟨權竒蔓根鏁石落影卧溪其草則有若苜蓿藷薕苓䓪薊萰蘱㫖虉菤菮蓪䕍芊芊散葉茸茸合蔕瓣花黝䨹竦擢艷異萬色争妍千枝闘麗其羽則有若鸑鷟䳺鶙䳭鴒䴑鸝鷤䳏鷦鷯鶢鶋鸍排虛軒翥彳亍參差近呼逺應木巢草棲或曵尾而食或理翮而飛其毛羣則有若􅣕犦白甝羭羖獑麎毚􅛖騃騤瞿彌迒駢田或遁蔵宻林或長養幽岩或馳逐而飌雲起或吟嘯而山谷寒若夫䟽通灌溉則有衆流焉溪則停辭石鑑頰口上愽無他平渡下阮盤石曰苕曰猷曰松曰葛湖則御息明聖陽陂臨平南上南下明星建寧曰查曰北曰髙曰谷渡則䀋橋廟山占渡剡口塘則武丞捍海沙河吳諸潭則浣沙玉兒浦則百尺明珠渠曰五福濠曰中外或始濬或増治或築以去害或開而興利或因事建名或因名顯義如停辭溪始于范蠡欲開鑿為山通浙江之水因民弗願辭訴而停焉如南下湖修于歸珧溉公私之大田興利澤于無窮因對上湖以立名焉在臨平湖則開通壅塞以顯祥得石湖邊以呈瑞築捍海塘則彊弩射濤以弭衝决詩什投海以囘潮勢茲惟神祈之殊迹因以播傳于後世言其經理開竇釃流隄塍相軺或遂之縱或溝之横或洫之廣或澮之深以列以舍以寫以揚以蓄以止以蕩以均潦則引出俾免滔溢暵則通入以遂耕耘噫嘻水雖衆矣莫若浙江為大焉自婺歙之深山合二州而發源潨流會𣲖東下淪􅞹由建徳經富春而後入海昔神禹行水嘗躬臨其厓厥後廵狩横渡會稽想其服乗之車馬儀衞之旌麾鐘鼔撞磕邍埜生輝應足以暢文宣武普暨博施若江流之浩蕩盡目力而渺淼沋浝潚潫從㵅㶎茲其深些蕩涾淢滮浟洃茲其流些貌也浤浤淈淈渳滭㵹潗廣也漭泱瀠澐沺㶍瀿西顧則疑逹濛汜東盻則恐盡扶桑嵗時之潮有信不妄其大必於哉生明月既望其微必于上澣之休下旬之半當星虚之政中異三時之汎濫湧激澎浩溔滉瀁浴日之波浮天之浪沸騰囘復其髙數丈𦕈覿若赴敵大兵貫弓捧㦸攅刃列杖争先槤出猛奔急趨而俯仰又如白練颺空隨狂飈而舒卷飛騰于波面聴之則之聲千車萬馬襍錯轟吼而前鄉又如破山疾靁悸神迅電驚天震地而動蕩西覩浮石之隨出時玩蜃樓之呈像离婁注目而矎矎陽侯傾耳而伎懩眡無巔倪稽盧賦之鋪陳狂抛猛過發羅詩之詠賞雄乎偉哉岷山之江桐栢之淮亦有潮焉異若是也逮其平時則湛湛波光彼蒼一色廼有艅艎䑿䑽䑳䑼䑦􅑳艬舶鷁首載浮鼔棹乗飌破浪以濟以涉自西自東或南或北輕颿楗櫓朝吳暮越以之所産則有若鯄鰼鮦鰶魦魨鯦鮥䱾䱏鮍䱂鯇􅗫鯷鱳鯖鰡鯽鰡鰅鰫鰬魠隨波去來逐流出沒梁笱交設網罟互撒其他水蟲水草水蓄水鳥傳記鮮備方言莫考茟難覼縷而細道至若烏雲入河兮俗仰諸葛之神十石大瓠兮衆嗟張儼之竒光怪生于先壠知孫氏之當興歛板而見長吏美凌統之肅祗柯相同溺舟而顯異元遜以老桑而爛龜寄魚還力兮術嘉子恭靈運欲至兮應夢明師猛獸報郭文之德鄉譽髙叔孫之為却縑顯孫謙之潔猾吏畏允恭之威江岩剖石而獲紫玉之珍亷使繪圖而獻蔓竹之枝仰孝義于公弁之門慕遺德于吳筠之碑詰偽駮假人服其明者祖無擇之牧為叅軍也風流雅韻播于吳中者房孺復之為州也梟尹盧于中江破曹休于石亭征六安不務徼倖圍珠崖力諫無行則全琮之将畧殊于衆也挺直致主剛毅不跲載茟謂君舉必書還笏扼艷嬖之立則遂良之秉莭尤足尚也匠施及泉之工俗享勿慕之利貳叁散處永世叵廢則李泌之政誠可嘉也増築塘堤時其鍾泄以灌以溉勿湮勿窒其居易之澤是足道也禪師振錫而歸浄界徳輿述序以送之恵皎石壁而鏤法華元稹撰記以紀之候仙亭立于韓仲聞之任觀飌亭剏于裴庶子之時見山置于盧子望冷泉建于元左司清輝之榜未掛幽致想嚴郎之飌度胥山之銘已刋叙實見元輔之芳詞虛白花開兮念賢牧之栽植南庭記成兮仰子烈之施為術士識牛斗之王氣紹威荐羅隐之能詩錦樓集成兮傅元瓘之萹章庖人疾愈兮悟靈龜之酬私陳文恵以薪土易籠石而就工杜偉長自官浦至沙徑而築隄范文正發粟㳺宴大施荒政之恵耳沈文通鉏治奸蠧人皆繪像以祠之砌石為函接竹引水以注六井散在閭里而一城足用者長樂陳公之恩以及民也因舊佛祠剏新道觀前旌錢氏之順服後作臣子之奨勸而表忠為名者清獻趙公之請以有立也以至仙人臺髙兮聞琴瑟之音陌上花開兮起緩緩之詠燈市于祥符而尤盛九曲花王有吉祥而冬日艶異亭牓碧波于道左堂標中和于府内南國之萬卉争春别圃之翠幄殊麗羽宫之三教名垂理公之石室仍置百尺之佛樓齊巘後嶺之鰻井洩洩前建後増昔殊今異逺覧近収萃佳擅美棋散域中孰窮孰計先生言未既茹蔕盱衡愕眙曰富哉言乎可謂多聞而博識者也僕嘗聞之有唐之世分符守土多用名曹星郎老成宿望而名世佳士盖嘗酸辛哀鳴投書相府願擁朱轓一闖是境而終不可得者今茲先生羣曉猿侣夜鶴雲冠霞裳鴻飛遁迹藝苑百家飽爛胸臆日玩山川之勝㮣優為聖代之真逸其知幸乎是言也播之天下傳之後世雖千萬齡之永足以知今重熈累洽極富極庶比迹于二帝三王之盛際其蕃方外地尚至于此則内之宸居帝都其皇皇之美赫赫之盛雖駕傾河之辯秃南山之竹亦不能形容其萬一若茲山川祠廟之號名閭里景物之故迹因革廢興之所由人材産殖之攸出括古今之流傳備版圖之闕失則将即此以覈實徐罄折而復請曰我宗中華疆境萬里泰平一家名邦大城特勝相誇如大江之南則有建康劍閣之西則有成都彼二邦者青山碧水與夫邑都非不衆且雄些然莫儷茲之盛者豈有説乎先生曰猗嗟二邦昔事詎忍言哉夫風聲氣俗繫一時理亂而盛衰景趣由羣情憂愉雖厯年已久而未能悉變譬苦病既痊而尚覺纍癯劉備鼎分之時鄧艾鍾會之討伐東晉建都之後祖約蘇峻之戰争去世愈逺姑置勿談至其近代之事則可按典籍而推言稽昔唐季王綱縱弛姦雄伺隙而虓闞攘臂唾掌而競起僣竊位號者有焉逐鹿四方者多矣逮朱梁既立之後咸負固而列峙由是王建據蜀闊眡至後唐荘宗之時當同光乙酉之嵗廼詔軍将曰郭崇韜舉兵往伐所鄉犇潰剪除奸孽削平僣偽即以孟知祥鎮撫而臨治及明宗應順之初知祥復肆其奸計跳梁一方攫拏傲睨豈非僻處方隅保棧閣靈闕之阻又幸中邍之多故因得逞爪牙而搏噬乎當從之時五六十嵗之間經幾戰而幾争封豕其土糜爛其民鉦鼔一過則犬羊竄伏士卒所至則草木戕殘川谷半凝膏血居室盡染腥膻我宋龍飛乾徳二年爰命全斌副以仁瞻統師西征入境問辠故蜀㫤始降而劍嶺屬内若夫建康之事亦大同而小異始唐明宗本以徐温而鎮守至晉天福厥子知誥廼竊位自稱唐裔還姓李氏建國立號昇殂璟嗣恃長江之險保兵甲之利我太祖之御宇應天神而順舉愛惜元元之生命姑與包容之未取待其自悛十有五年輕肆桀驁終昧神天致皇威赫怒而大軍首南擁以羆貅度以龍船驍兵鋭卒既逾采石一入其城李煜遂摛彼二邦者如成都之濯錦江浣花溪武都山錦里城與夫相如之舊壚子雲之故居君平之簭肆子美之草堂之類如建康之龍洞山白鷺洲烏衣巷華林園以至齊武射雉之地鳯凰棲集之臺大江秦淮之波濤茅山蒋山之崔巍之類非無風光之美景物象之繽紛可以搜羅而賦咏可以悦目而娛情奈何自前世之用武罹兵火之蕩滅頽垣廢址䑕穿狐穴殘刻斷礎燒昏塵沒幸逢聖世昌運大來睿澤洋溢而無類鴻恩共被其根荄道綏徳撫薫醲涵浸一百五十載之久矣風聲氣俗雖移易而一于正而山川景趣猶未克逺邁于雅無征戰之邦也如論錢唐請申厥㫖自唐乾符之後擁戎車者接軌徐約劉浩之徒孫儒董昌之輩或毒螫于淮甸之邦或擄掠于二淛之内蘇常近境允常故都鞠為戰場蕩為兵墟至錢唐則不然賴守土以安居雖黄巢之衆不能逾臨安而深入雖田頵之暴弗克破北門而馳驅厯五季之後迄聖朝之初幾百年間按堵無虞干戈有備而不試四民奠枕于閭里方太宗皇帝之當天繄太平興國之三年鏐裔曰俶遂捧圖籍以所管而獻焉是邦之内曰民曰軍詎知血戰之憂苦疇當夫石之辛勤矧厯休平八聖相承鋪鴻藻申景鑠灑徳波散皇明教條備土風純小而任一同之宰皆是榮途之遴選大而擁麾旄之牧莫非鵷行之貴臣勤勞勸課恵養斯民茲其繁富日増者也茹華曰二邦以戰争而其迹若彼錢唐以効順而其盛如此非特其邦也三家苖裔盛衰同之且清時待士如皇天罔私盖有賢而有否豈特用而特遺質以祸福報應之明騐實縁忠順惡逆之殊歸因先王之言将使忠臣義士聞之而咸奮又足以貽萬世奸宄之永戒者也雖然是邦之内或今或古抑有遺美可以為風化之補者乎先生曰昔者范子安不受蒲輪之召命褚伯玉優林泉而自娛或追謚而褒其莭或立館以安其居孫鍾色養而孝行感天成緬廬墓而紫芝顯符或致司命之降顧或得旌表于門閭此其髙尚之操純孝之行尊之榮之足以粉飾王政當今明天子将聖在上賢公相以道弼丞孜孜圖治勉勉厲精惟是崇化阜俗之本常加宵旰探討之誠逸民之舉孝亷之科旌表之式追諡之榮即聞講求而悉行矣茹華曰大哉言矣經國㦤範豈非斐美實美風俗豈伊迹厚足厚人倫儻縁踈逺而難逹葢亦投獻于搢紳或因言以寤意将探摭而申明庶或不負皇皇之言言訖曵踵而退周紫芝酬三賢賦并叙蠅舘主人獨㳺西湖短棹扁舟夷猶孤山之下夜既久而無聲月将曉而始出仰而望之弔三賢之遺踪悵髙風之遼邈叩舷而歌舉酒一酹而賦之嵗𤣥武之宵中兮月既望而時秋鼓蘭舟之桂檝兮採芙蓉乎芳洲夜黮黯其未艾兮驂白鷺以夷猶儼望舒之始駕兮昇素魄于海陬整余冠而仰睇兮叩余舷乎中流望華祠于山河兮眷三士之髙標雖出處之異致兮亦分路以揚鑣維香山之忠正兮耿直節于中朝忤羣奸而見逐兮指新井以䝉嘲彼西蜀之老人兮抱素業于夔臯援斯文于未冺兮障俗學之瀾濤終一斥而不復兮病讒口之囂囂嵗七周于海濱兮脱九死而歸故􅉌痛二老之不遇兮越今昔而同儔豈鸞鶚之不可以争飛兮抑駑驥之難于並㳺豈枘鑿之不可以相入兮抑亦臭味之異于薫蕕棄珠璣而貫魚目兮斥緑耳而駕罷牛笑蹄涔之沮洳兮轉龍驤之巨舟獨髙人之前知兮遂遐舉而莫招爰卜宅于兹山兮侣麋鹿而友漁樵卻鶴書而不受兮恐曉猿之怒號草萋萋其春榮兮葉靡靡而秋凋閲四時而不改其僺兮孰謂山中之不可以久留抗髙風而配逸躅兮追兩軌以奚羞嗟予生之後時兮徒心斾之摇摇瞻清楊于髣髴兮拜遺像之非遥聊舉觴而一酹兮歌三叠而魂消倘㣲辭遙之可格兮兾旋斾而逍咸淳臨安志卷九十四
