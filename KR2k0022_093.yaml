body:
  text: 咸淳臨安志卷九十五宋潛説友撰紀遺七紀文詩沈休文早發定山夙齡愛逺壑晚涖見竒山標峯綵虹外置嶺白雲間傾壁忽斜樹絶頂復孤圓歸海流漫漫出浦水濺濺野棠開未落山櫻發欲然忘歸屬蘭杜懷祿寄芳荃眷言採三秀徘徊望九仙杜荀鶴錢塘寄姚中丞豈謂無心求上第難安帝里為家貧江南江北間為客潮去潮來却老人兩岸雨收鶯語栁一樓風滿角吹春花前不獨垂鄉淚曽是朱門寄食身錢唐别羅隱故國看看逺前程計在誰五更聽角後一葉渡江時吾道天寧喪人情日可疑西陵向西望雙淚為君垂呈錢唐羅判官還鄉夫子遇賢侯撫字情知不自由莫把一名専懊惱放教竹馬絶寃讎猩袍懶著辭公宴鶴氅間披訪道流猶有九華知已在羡君髙卧早回頭權載之富陽道中又入亂峯去逺程殊未歸煙蘿迷客路山果落征衣欹石臨清淺晴雲出翠微漁潭明夜泊心憶謝玄暉送二十叔赴餘杭尉拜首直城隂樽開意不任梅仙歸劇縣阮巷奏離琴春草吳門緑秋濤浙水深十年曽旅寓應愜宦遊心發杭州泛富春江候曉起徒御春江多好風白波連青雲浩蕩晨光中四望浩無際沉憂將此同未離奔走途但恐成悲翁俯見觸餌鱗仰目凌霄鴻纓塵日已厚心纍何時空區區此世人所向皆樊籠唯應杯中物醒醉為窮通故人元圃姿瓊樹紛青蔥終當此山去共結蘭桂藂孟浩然將遊天台留别臨安李主簿枳棘君尚棲匏瓜吾豈繫雖念離當夏漂泊指炎裔一作念離當夏首漂泊捐夷裔江海非遊情田園失歸計空山既早發漁浦亦宵濟泛泛隨波瀾行行任艫枻故林日已逺羣木坐成翳羽人在丹邱吾亦從此逝皇甫冉送元盛一作晟歸潛山一作歸於潛山何如深山秋事早君去復裛露收新稼橡作迎寒葺舊廬題詩即招隱作賦是間居别後空相憶嵇康懶寄書白樂天自中書舍人出守杭州路次藍溪作太原一男子自顧庸且鄙老逢不次恩洗拔出泥滓既居可言地願助朝廷理伏閣三上章戅愚不稱旨聖人存大體優貸容不死鳯詔停舍人魚書除刺史冥懷齊寵辱委順隨行止我自得此心于茲十年矣餘杭乃名郡郡郭臨江泛已想海門山潮聲來入耳昔豫正元來羈旅曽遊此甚覺太守尊亦諳魚酒美因生江海興每羡滄浪水尚擬拂衣行况今兼祿仕青山峯巒接白日煙塵起東道既不通改轅遂南指自秦窮楚越浩蕩五千里聞有賢主人而多好山水是行頗為愜所厯良可紀策馬度藍溪勝遊從此始郡中即事漫漫潮初平熙熙春日至空濶逺江山晴明好天氣外有適意物中無繫心事數篇對竹吟一杯望雲醉行携杖扶力卧讀書取睡久養病形骸深諳間氣味遙思九城陌耰耰趨名利今朝是隻日朝謁多軒騎寵者防悔尤權者懷憂畏為報髙車蓋恐非真富貴官舍髙木换新葉隂隂覆地隅何言太守宅有似幽人居太守卧其下間慵兩有餘起嘗一甌茗行讀一卷書早梅結青實殘櫻落紅珠稚女弄庭果嬉戲牽人裾是日晚彌靜巢禽下相呼嘖嘖護兒鵲啞啞母子烏豈惟云鳥爾吾亦引吾雛南亭對酒送春含桃實已落紅薇花尚熏冉冉三月盡晚鶯城上聞獨持一杯酒南亭送殘春半酣忽長歌歌中何所云云我五十餘未是苦老人刺史二千石亦不為賤貧天下三品官多老于我身同年登第者零落無一分親故半為鬼僮僕多見孫念此聊自解逢酒且歡欣除官去未間除官去未間半月恣遊討朝尋霞外寺暮宿波上島新木少于松平湖半連草躋攀有次第賞玩無昏早有時騎馬醉兀兀冥天造窮通與生死其奈吾懷抱江山信為美齒髮行將老在郡誠未厭歸鄉去亦好三年為刺史二首三年為刺史無政在人口唯向郡城中題詩十餘首慙非甘棠詠豈有思人不兩三年為刺史飲水復食蘖唯向天竺山取得片石此抵有千金無乃傷清白别萱桂使君竟不住萱桂徒栽種桂有留人名萱無忘憂用不如江畔月步步來相送對酒自勉五十江城守停杯一自思頭仍未盡白官亦不全卑榮寵尋過分歡娛已較遲肺傷雖怕酒心健尚誇詩夜舞吳娘袖春歌蠻子詞猶堪三五嵗相伴醉花時晚興極浦收殘雨髙城駐落暉山明虹半出松暗鶴雙歸將吏隨衙散文書入務稀間吟倚新竹筠粉汙朱衣衰病老與病相仍華簮髮不勝行多朝散藥睡少夜停燈祿食分供鶴朝衣減施僧性多移不得郡政謾如繩錢湖州以箬下酒李蘇州以五酘酒相次寄到無因同飲聊詠所懷勞將箬下忘憂物寄與江城愛酒翁鐺腳三州何處會甕頭一盞幾時同傾如竹葉盈樽緑飲作桃花上面紅莫怪殷勤醉相憶曽陪西省與南宫花樓望雪命宴賦詩連天際海白皚皚好上髙樓望一回何處更能分道路此時兼不認池臺萬重雲樹山頭翠百尺花樓江畔開素壁聫題分韻句紅爐巡飲暖寒杯氷鋪湖水銀為面風捲沙汀玉作堆絆惹舞人春艷曵勾留醉客夜徘徊偷將虛白堂前鶴失却樟亭驛後梅别後故情偏憶得曽經窮苦照書來城上城上鼕鼕鼓朝衙復晚衙為君慵不出落盡繞城花醉中訓殷協律泗水城邊一分散浙江樓上重遊陪揮鞭二十年前别命駕三千里外來醉袖放狂相向舞愁眉和笑一時開留君夜住非無分且盡青娥紅燭臺贈沙鷗老逼教垂白宫科遣著緋形骸雖有纍方寸却無機遇酒多先醉逢山愛晚歸沙鷗不知我猶避隼旟飛餘杭形勝餘杭形勝四方無州傍青山縣枕湖繞郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇州西靈隱山上有夢謝亭即是杜明浦夢謝靈運之所因名客兒也蘇小小本錢唐妓人也獨有使君年太老風流不稱白髭鬚木芙蓉花下招客飲晚涼思飲兩三杯召得江頭醉客來莫怕秋無伴醉物水蓮花盡木蓮開江樓晚眺景物鮮竒吟玩成篇寄水部張貟外淡煙踈雨間斜陽江色鮮明海氣涼曙散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁點青天字一行好著丹青圖寫取題詩寄與水曹郎飲後夜醒黃昏飲散歸來卧夜半人扶強起行枕上酒容和睡醒樓前海月伴潮生將歸梁燕還重宿欲滅忩燈却後明直至曉來猶妄想耳中如有管絃聲代賣薪女贈諸妓亂蓬為鬢布為巾曉踏寒山自負薪一種錢唐江畔女著紅騎馬是何人蚤冬十月江南天氣好可憐冬景似春華霜輕未殺萋萋草日暖初乾漠漠沙老柘葉黃如嫩樹寒櫻枝白是狂花此時却羡間人醉五馬無由入酒家與諸客携酒尋去年梅花有感馬上同携今日杯湖邊共覔去春梅年年只是人空老處處何曽花不開詩思又牽吟詠發酒酣間唤管絃來樽前百事皆依舊點檢惟無薛秀才醉送李協律赴湖南辟命因寄沈八中丞富陽山底樟亭畔立馬停舟飛酒盂曽共中丞情繾綣暫留協律語踟蹰紫微星北承恩去青草湖南稱意無不羡君官羡君幕幕中收得阮元瑜正月十五日夜月嵗熟人心樂朝遊復夜遊春風來海上明月在江頭燈火家家市笙歌處處樓無妨思帝里不合厭杭州題州北路傍老栁皮枯緣受風霜久條短為經攀折頻但見半衰當此路不知初種是何人雪花零碎逐年減煙葉稀踈隨分新莫道老株芳意少逢春猶勝不逢春題清頭陀頭陀獨宿寺西峯百尺禪菴半夜鐘煙月蒼蒼風瑟瑟更無雜樹對山松湖上醉中代諸妓寄嚴郎中笙歌杯酒正歡娛忽憶仙郎望帝都借問連宵直南省何如盡日醉西湖蛾眉别久心知否雞舌含多口厭無還有些些惆悵事春來山路見蘼蕪晚興草淺馬翩翩新晴薄暮天栁條春拂面衫袖醉垂鞭立語花隄上行吟水寺前等間消一日不覺過三年竹樓宿小書樓下千竿竹深火爐前一盞燈此處與誰相伴宿燒丹道士坐禪僧戲醉客莫言魯國書生懦莫把杭州刺史欺醉客請君開眼望緑楊風下有紅旗元微之除浙東觀察使喜得杭越鄰州先贈長句稽山鏡水歡遊地犀帶金章榮貴身官職比君雖校小封疆與我且為鄰郡樓對玩千峯月江界平分兩岸春杭越風光詩酒主相看更合是何人答微之上船後留别蜀下樽前一分手舟中岸上兩回頭歸來虛白堂中夢合眼先應到越州答微之泊西陵驛見寄煙波盡處一點白應是西陵古驛臺知在臺邊望不見暮湖空送渡船回答微之誇越州州宅賀上人回得報書大誇州宅似仙居厭看馮翊風沙久喜見蘭亭煙景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如微之重誇州居其落句有西州羅剎之謔因嘲茲石聊以寄懷君問西州城下事醉中疊紙為君書嵌空石面標羅剎壓捺潮頭敵子胥神鬼曽鞭猶不動波濤雖打欲何如誰知太守心相似底滯堅頑兩有餘醉封詩筒寄微之一生休戚與窮通處處相隨事事同未死又鄰滄海郡無兒俱作白頭翁展眉只仰三杯後代面惟憑五字中為向西川郵吏道莫辭來去遞詩筒七言八韻走筆奉答兼呈微之白首餘杭白太守落拓拋名來已久一辭渭北故園春再把江南新嵗酒杯前笑歌徒勉強鏡裡形容漸衰朽領郡慙當潦倒年鄰州喜得平生友長洲草接松江岸曲水花連鏡湖口老去還能痛飲無春來曽作間遊否慿鶯傳語報李六倩雁將書與元九莫嗟一日日催人且貴一年年入手蚤春西湖間遊悵然興懷憶與微之同賞因思在越官重事殷鏡湖之遊或恐未暇偶成十八韻寄微之上馬復呼賔湖邊景氣新管絃三數事騎從十餘人立换登山屐行携漉酒巾逢花看當妓遇草坐為茵西日籠黃栁東風蕩白蘋小橋裝雁齒輕浪甃魚鱗畫舫牽徐轉銀船酌慢巡野情遺世纍醉態任天真彼此年將老平比分最親髙天從所願逺地得為鄰雲樹分三驛煙波限一津翻嗟寸步隔却厭尺書頻浙右稱雄鎮山隂委重臣貴垂長紫綬榮駕大朱輪出動刀鎗隊歸生道路塵雁驚弓易散鷗怕鼓難昕百吏瞻相面千夫捧擁身自然間興少應負鏡湖春答微之見寄可憐風景浙東西先數餘杭次會稽禹廟未勝天竺寺錢湖不羡若耶溪擺塵野鶴春毛暖拍水沙鷗濕翅低更對雪樓君愛否紅欄碧甃點銀泥間卧盡日前軒卧神間境亦空有山當枕上無事到心中簾捲侵床日屏遮入座風望春春不到應在海門東聞歌妓唱嚴郎中詩因以絶句寄之已留舊政布中和又付新詞與艷歌但是人家有遺愛就中蘇小感恩多别州民耆老遮歸路壺漿滿别筵甘棠無一木那得淚潛然稅重多貧户農飢足旱田唯留一湖水與汝救凶年今春增築錢塘湖堤貯水以防天旱故云杭州回舫自别錢塘山水後不多飲酒懶吟詩欲將此意慿回棹與報西湖風月知九日思杭州舊遊寄周判官及諸客匆憶郡南山頂上昔時同醉是今辰笙歌委曲聲延耳金翠動搖光照身風景不隨宫相去歡娛應逐使君新江山賔客皆如舊唯是當筵换主人憶杭州梅花因敘舊遊寄蕭協律三年開悶在餘杭曽與梅花醉幾場伍相廟邊繁似雪孤山園裏麗如粧踏隨遊騎心常惜折贈佳人手亦香賞自初開直至落歡因小飲便成狂薛劉相次埋新隴沈謝雙飛出故鄉薛劉二客沈謝二妓皆當時歌酒之侣也歌伴酒徒零散盡唯殘頭白老蕭郎天竺寺送堅上人歸廬山錫杖登髙寺香爐憶舊峯偶來舟不繫忽去鳥無蹤豈要留離偈寧勞動别容與師俱是夢夢裏暫相逢答客問杭州為我蹰停酒盞與君約略説杭州山名天竺堆青黛湖號錢塘瀉緑油大屋簷多裝雁齒小航船亦畫龍頭所嗟水路無三百官繫何因得再遊送姚杭州與君細話杭州事為我留心莫待間閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹眇虛空裏風月依稀夢想間且喜詩人重管領遙飛一盞賀江山渺渺錢塘路幾千想君到後事依然靜逢竺寺猿偷橘間看蘇家女採蓮故妓數人慿問訊新詩兩首倩留傳舍人雖健無多興老校當時八九年顧况謁邱真人不遇五月五日日卓午獨自騎驢上山塢來到君家不見君下驢倚杖叩君户驚起山童開竹扉黃犬搖尾銜人衣借問先生往何處云入山中採紫薇平明一去今未歸引我池邊看釣磯池中數個白鷗兒見人慣後癡不飛欲待君歸君不歸却復騎驢下翠微韋應物送邱貟外還臨平山居長棲白雲表暫訪髙齋宿還辭郡邑喧歸泛松江渌結茅蒼嶺間伐薪響深谷同是山中人不知往來躅靈芝非定草遼鶴逶池騖終當署里門一表髙陽族方干錢唐旅舍此地似鄉國堪為終夕吟雲藏吳相廟樹引楚山禽潮落海人散鐘遲秋寺深我來無舊識誰見寂寥心溫飛卿錢唐錢唐岸上春如織渺渺寒潮帶晴色淮南逰客馬連嘶碧草迷人歸不得風飄客意如吹煙纎指殷勤傷雁絃一曲堂堂紅燭筵金鯨㵼酒如飛泉張蠙錢唐夜宴留别郡守四方騷動一州安夜列樽罍伴客歡觱篥調高山閣逈蝦蟆更促海城寒屏間珮響藏歌妓幕外刀光走從官沉醉不辭歸棹逺曉帆吹上子陵灘楊公濟錢唐江上一氣連江色寥寥萬古清客心兼浪湧時事與潮生路轉青山出沙空白鳥行幾年滄海夢吟罷獨含情石曼卿送人逰杭激激霜風吹黑貂男兒醉别氣飄飄五湖載酒期吳客六代成詩倍楚橋水樹漸青含晚意江雲初白向春嬌前秋亦擬錢唐去共看龍山八月潮沈內翰文通送施密學守錢塘塞外風煙河上塵歸來始覺二毛新承明自厭頻趨真滄海還思一濯巾幕府旌旗初壓境畫船歌吹便行春湖山滿目舊遊在何日從公醉紫蓴潘逍遙贈林處士雲剪烏紗霧剪衣存神養氣語還稀人人盡唤孫思邈只恐身輕白鳥飛范文正公白塔駐軒亭登臨江上寺遷客特依依逺水欲無際孤舟曽未歸前峯藏好處幽鷺得間飛多少天真事遙心結翠微陳文惠公杭州喜李度支至二首公望當年最得君畫圖城郭喜同羣門前碧浪家家海樹上青山寺寺雲松下玉琴邀鶴聽溪邊苔石共僧分情多景好知難盡且倒金罍任半醺淡薄交情老更濃為君彈瑟送金鍾苧羅香徑無時到姑射仙姿在處逢鸞鶴品流慙晚逹煙霞門户憶先容公餘莫放西湖景步步蒼苔岸岸松杭州蘇長官山亭詩閣城隂裏茅堂住半空鐘聲千寺合樹影萬家同山逺秋泉白溪寒晚日紅相逢吟未足沉醉戀雲中杭州望越亭樹樹西風葉葉秋誰家煙火起滄洲乘間不耐無機性擬動漁翁直釣鈎王元之錢唐縣海棠江東遺迹在錢唐手植庭花滿縣香若使當年歸顯位海棠今日是甘棠王荆公杭州呈勝之遊觀須知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙簫吹落日畫樓燈燭映殘霞如君援茟宜摹寫寄與塵勞北客誇送僧惠思歸錢塘渌淨堂前湖水渌歸時正復有荷花花前不見餘杭姥為道仙人憶酒家送張公赴辟杭州萬屋相誇􅃮與丹笑歌長在綺紜間綵船春戲城邊水畫燭秋尋寺外山憶我屢隨遊客入喜君今赴辟書還遙知曼倩威行久赤箠應從到日間王疇送同年蒲叔範察院杭州監酒釋之久未調王粲常從軍謂言塞垣事壯志橫風雲育材幸明代薦賢無令君如何漢酟冗沉此荆山珍萍氏本幾酒周官有彛倫孝武事攘却志清天地屯連兵無時已四海蕭然貧官始操釀具𣙜之飽師人利源一以泄頽波蕩無垠糜榖費耒耜良蘖爭清醇酒禁著律令犯笞及其身狂藥乃陷穽傷哉堯舜民炎靈屬我后天資英且仁邦力早雄富漢制仍相循嵗賦二千萬經入固已勤彌年擁武莭乘邊清國氛雄雄百萬師跨邁聫燕秦仰給傾府庫賞賚圖戎勳加斂猶不足返古當何云杭城東南據地將湖海鄰𣙜利冠天下旗亭壓重闉彼雖斗筲職亦擇才英臣風露氣已肅溪潭寒彌新沙榜朝泛泛吳濤暮沄沄南州近牛斗氣象雄霜旻汀楓變老枿赤葉晴相紛嘗茶泊幽寺觀魚下輕䑳行當收翹楚寧復混蒸薪無為狎吳叟共戀秋江蓴咸淳臨安志卷九十五
