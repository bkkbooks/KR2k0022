body:
  text: 咸淳臨安志卷九十六宋潜說友撰紀遺八紀文詩林和靖感懐衡宇日蕭寂髙春猶掩扉春風似有舊社鷰亦重歸覽照老已具開樽人向稀頽然此心曲持底屬芳菲西湖與性上人話别秋山與湖水逺近如相送後夜宿扁舟知師有歸夢郊園避暑柴門鮮人事氛垢頗能忘愛彼林間静獲茲池上涼託心時散帙遲客或携觴况有陶廬趣歸禽語夕陽中峯行藥却望北山因而成詠拂石玩林壑曠然空色秋歸雲帶層巘踈葦際滄洲固自堪長往何為難久留庶将濠上想聊作剡中㳺湖舟中值雪浩蕩彌空濶霏霏接水濆舟移忽自却山近未全分凍軫閑清泛温鑪擁薄薫悠然詠招隐何許頓離羣春夕閑詠屐齒徧庭深時為擁鼻吟㣲風引竹籟斜月轉花隂静賞應難極孤懐自不禁蒼然小池上烟露逹青岑山中冬日殘雪照籬落空山無俗喧雞寒懶下樹人晏獨開門廢圃春榮動回塘霧氣昏誰家嵗酒熟輟棹憶西村西村晚泊弭棹危橋外霜村乍夕隂田園向野水樵採語空林白鳥歸飛逺青山重複深那辭遲新月誰復賞㣲吟園池一徑衡門數畆池平湖分漲草含滋㣲風幾入扁舟意新霽難忘獨繭期島上鶴毛遺野跡岸旁花影動春枝東嘉層漪名今在獨愧憑欄負碧送范希文中林蕭寂欵吾廬亹亹猶歡接緒餘去棹自當辨江樹離樽聊為摘園蔬馬卿才大嘗能賦梅福官卑數上書黼座垂精正求治何時條對召公車錢唐仙尉謝君詠物樓成寄題二韻仙人多在麗譙居况對西山爽氣餘若向湖瀕屬佳句莫忘秋水落芙蕖西巖夏日蕙帳蕭閑掩敝廬子真岩石坐來初為驚野鳥巢間乳懶過鄰僧竹裡居新溜迸涼侵静語晚雲浮潤上殘書何煩强捉白團扇一柄青松自有餘山閣夏日寄黄大茂才幾日無縁見叔度令人鄙吝不能忘新篁遶閣薫風細還肯時來納晚涼和謝祕校西湖馬上表𠂻湖山極目春據鞍時此避埃塵蒼蒼烟樹悠悠水除却王維少畫人山中寒食二首方塘波渌杜蘅青布穀提壺已足聴有客新嘗寒具罷據梧慵復散幽經氣象纔過一百五且持春酒養衰年中林不是不禁火其奈山櫻發欲然即席送江夏茂才與君未别且酣飲别後令人空倚樓一㸃風帆若為望海門平濶鷺濤秋送易從師逰金華吟卷田衣嵗向殘孤舟夜泊大江寒前岩數本長松色及早歸來帶雪看易從師山亭林表秋山白鳥飛此中幽致亦還稀西村渡口人烟晚坐見漁舟兩兩歸池上春日一池春水渌于苔水上花枝竹間開芳草得時依舊長文禽無事等閑來年顔近老空多感風雅含情苦不才獨有浴沂遺想在使人終日此徘徊水軒日于詩雅轉沉迷尤愛慿欄此署題紛泊楊花春意晚黄鸝飛過水東西夏日即事石枕涼生菌閣虚已應梅潤入圖書不辭齒髪多衰疾所喜林泉有隐居粉竹亞梢垂宿露翠荷差影聚㳺魚北忩人在羲皇上時為淵明一起予山舍小軒有石竹二叢閧然秀發因成七言二章麝香眠後露檀筠繡在羅衣色未真斜倚細叢如有恨冷摇踈朶欲無春階前紅藥推辭客籬下黄花重古人今日含毫與題品可憐殊不愧清新在青帘有酒不妨賖素壁無詩未足誇所重晚芳聊目可關秋色易為花深枝苒苒装溪翠碎片英英剪海霞莫管金錢好行市寂寥相對是山家易從上人山亭湖水汪灣隔數峯籬門和竹夾西東閑來此地行無厭又共吾廬看不同靈隐路歸秋色裡招賢菴在鳥行中屏風若欲相攙見合把巉岩與畫工梅花吟懐長恨負芳時為見梅花輙入詩雪後園林纔半樹水邊籬落忽横枝人憐紅艷多應俗天與清香似有私堪笑胡雛亦風味解将聲調角中吹山村冬暮蘅茒林麓下春氣已㣲茫雪竹低寒翠風梅落晚香樵期多獨往茶事不全忙雙鷺有時起横飛過野塘和酬天竺慈雲大師林表飛來色猶慚久卜隣沿洄一水路夢想五天人謝絶空園草沉冥滿几塵暮雲如有得寜謝寄聲頻林間石入夜跏趺多待月移時箕踞為看山苔生晚片應知静雲動秋根合見閑瘦鶴獨隨行藥後髙僧相對試茶間踈篁百本松千尺莫怪頻頻此往還西湖孤山寺後舟中寫望天竺横分景色寛孤山背後泊船看林蔵野路秋偏静水映漁家晚自寒拂拂烟雲初淡蕩蕭蕭蘆葦半衰殘舂鋤數㸃誰驚起書破晴雲粉字乾和西湖霽上人寄然社師竹下經房號白蓮社師髙行出人天一齋巾拂晨鐘次數禮香燈夜像前瞑目幾開松下月净頭時動石盆泉西湖舊侣因吟寄憶著深峯萬萬年城中書事一門深掩得閑權純白遺風要獨全強接俗流終反道敢嫌貧病是欺天闕形古寺諳尋鶴照蘚秋廊擬闕未從此免慙岩下者子真髙興蕭然送謝尉試吏才未伸食貧同古人何以贈行色一酌湖水春山園小梅數年閑作園林主未有新詩到小梅摘索又開三兩朶團欒空遶百千廻荒隣獨映山初盡晩景相禁雪欲來寄語清香少愁結為君吟罷一衘杯小圃春日岸幘倚㣲風柴籬春色中草長團粉蝶林暖墜青蟲載酒為誰子移花獨乃翁於陵借隐事清尚未相同聞越僧靈皎遊天竺山因而有寄天竺秋重入招提隔翠林幾囘聞桂子無復憶山隂峯曉雲衣破溪寒石色深捫蘿諸勝㮣孤病負同尋秋日西湖晚歸舟中書事水痕秋落蟹螯肥閑過黄公酒舍歸魚覺船行沈草岸犬聞人語出柴扉蒼山半帶寒雲重丹葉踈分夕照㣲却憶青溪謝太傅當時未觧惜簑衣小園春興草烟横碧露華㣲乗興春園懶欲歸聚散有情輸蛺蝶淺深無色比薔薇浮名莫惜千鍾貴急景湏防百嵗稀一事不堪身衣褐且偷閑眼看芳菲梅花二首幾囘山脚又江頭遶着瑶芳看不休一味清新無我愛十分孤静與伊愁任教月老湏㣲見却為春寒得少留終共公言數來者海棠端的免包着小園烟景正凄迷陣陣寒香壓麝臍池水倒窺踈影動屋簷斜入一枝低畫名空向閑時看詩俗休徴故事題慙愧黄鸝與蝴蝶秪知春色在桃蹊中峯中峯一逕分盤折上幽雲夕照全村見秋濤隔嶺聞長松含古翠衰藥動㣲薰自愛蘇門嘯懐賢事不羣聞靈皎師自信州歸越以詩招之天師蒼翠横金錫地蔵清涼㭺竹扉千里白雲隨野歩一湖明月上秋衣詩尋静語應無極琴弄寒聲轉入㣲我亦孤山有泉石肯來松下共忘機復賡前韻且以陋居幽勝咤而誘之畫共藥材懸屋壁琴兼茶具入船扉秋花抱露明紅粉水鳥衝烟濕翠衣石磴背穿林寺近竹簷横㸃海山㣲百千幽勝無人見説向吾師是洩機雜興四篇短褐蕭蕭頂幅巾擁書纔罷即嚬呻耕樵可似居山者飲饌長如病酒人閉户不無慵荅客焚香除是静朝真前賢風㮣聊希擬一刺偏多井大春散帙揮毫摠不忺病懐愁緒坐相兼苔痕作意生秋壁炎影無端上古簾一壑等閑甘汨汨五門平昔避炎唯應數刻清涼夢時曲顔肱興未厭紅湖上山林畫不如霜天時候属園廬梯斜晩樹收杮筒直寒流得白魚石上琴樽苔野浄籬隂雞犬竹叢踈一闗兼是和雲掩敢道門無卿相車聱掉臂何妨入隐淪髙賢應搃貴全真次山有以稱叟魯望兼之傳散人拂水逺天孤榜晩夾村㣲雨一犁春不知圖畫誰名手状取江潮太古民山北寫望晩來山北景圖畫亦應非村路飄黄落人家濕翠㣲樵當雲外見僧向水邊歸一曲誰横笛蒹葭白鳥飛夏日池上蓮香如綺細濛濛翡翠窺魚褭水葓卷箔未生單簟月凭欄初過一襟風横欹片石安琴荐獨傍新篁看鶴籠沈李凍醪無寄與可憐瀟洒與誰同松逕霜子落秋笻卓破兩釵堆地履拖平不知呵止長安客肯愛深穿冷翠行竹林寺籬斜夾千梢翠山磴深穿萬籜乾却憶貴家㕔舘𠂻粉墻時畫數莖看菱塘含機緑錦翻新葉滿匣青銅瑩古花最愛晚來鷗與鷺宿烟翹雨便為家蓮蕩洛妃臯女一何多裳似芙蓉衣芰荷幾夕霏霏烟露裡竸窺清淺弄晴波葑田㳺泥肥黒稻秧青濶盖春流樹樹生擬倩湖君書版籍水仙今佃老農耕小舟舷低冷戞荷千柄底斜穿月半輪一笠一簑人稳坐晚風蕭䬃弄青蘋鳴臯臯禽名秪有前聞孤引圓吭夜正分一淚便驚寥泬破亦無閑意到青雲呦呦深林摵摵分行響淺葑茸茸叠卧痕春雪滿山人起晩數聲低呌唤籬門湖村晩興滄洲白鳥飛山影落晴暉映竹犬初吠弄舩人合歸水波隨月動林翠帶烟㣲寺近踈鐘作翛然還掩扉贈錢唐邑長髙祕校幾萬人家山水中為官古雅少人同踈簾衙退卷花軸曲檻客來凭竹風唯道簿書多傍俗自憐琴酒未妨公等閑呵止郭門近輕棹遶湖尋佛宫梅花二首宿靄相粘凍雪殘一枝深映竹叢寒不辭日月旁邊立長願年年末上看蘂訝粉綃裁太醉蔕疑紅蠟綴初乾香蒭獨酌聊為夀從此羣芳興亦闌孤根何事在柴荆村色仍将臈候并横隔片烟争向静半粘殘雪不勝清等閑題咏誰為愧子細相看似有情搔首夀陽千載後可堪青草雜芳英將終之嵗自作夀堂因書一絶以誌之湖外青山對結廬墳前修竹亦蕭踈茂陵異日求遺草猶喜曾無封禪書蘇東坡雪後至臨平與栁子玊同至僧舍見陳尉烈落帆古戍下積雪髙如邱强邀詩老出踈髯散颼颼僧房有宿火手足漸和柔静士素寡言相對自忘憂銅爐擢烟穟石鼎浮霜漚我行雖有程坐稳且復留大哉天地間此生得浮逰於潜女青裠縞袂於潜女兩足如霜不穿屨觰沙鬂髪絲穿杼蓬沓障前走風雨老濞宫粧傳父祖至今遺民悲故主苕溪楊栁初飛絮照溪畫眉渡溪去逄郎樵歸方媚嫵不信姬姜有齊魯與臨安令宗人同年劇飲我雖不觧飲把盞歡意足試呼白髪感秋人令唱黄雞催曉曲與君登科如隔晨敝袍霜雪空殘緑如今莫問老與少兒子森森如立竹黄雞催曉不湏愁老盡世人非我獨次韻述古過周長官夜飲二更鐃鼓動諸隣百首新詩間八珍已遣亂蛙成兩部更邀明月作三人雲烟湖寺家家境燈火沙河夜夜春曷不勸公勤秉燭老來光景似奔輪送南屏謙師并引南屏謙師妙于茶事自云得之于心應之于手非可以言傳學到者十二月二十七日聞軾㳺落星逺來設茶作此詩贈之道人曉出南屏山來試㸃茶三昧手忽驚午盞兎毛斑打作春罋鵞兒酒天台乳花世不見玉川風腋今安冇先生有意續茶經會使老謙名不朽䀋官部役戯呈同事兼寄述古新月照水水欲氷夜霜穿屋衣生稜野廬半與牛羊共曉鼔却隨鴉鵲興夜來履破裘穿縫紅頬曲眉應入夢千夫在野口如林豈不懐歸畏嘲弄我州賢将知人勞已釀白酒買豚羔耐寒努力歸不逺兩脚凍硬公湏軟梅聖俞詩中有毛長官者今於潜令國華也聖俞沒十五年而君猶為令捕蝗至其邑作詩戲之詩翁憔悴老一官厭見苜蓿堆青盤歸來羞對妻子自比鮎魚縁竹竿今君滯留生二毛飽聴衙鼔眠黄紬更将嘲笑調朋友人道獼猴騎土牛願君恰似髙常侍暫為小邑仍刺史不願君為孟浩然却遭明主放還山宦㳺逢此嵗年惡飛蝗來時半天黒羡君封境稻如雲蝗自識人人不識初到杭州寄子由二絶眼看時事力難任貧戀君恩退未能遲鈍終湏投劾去使君何日换聾丞頭聖明寛大許全身衰病摧頽自畏人莫上岡苦相望吾方祭灶請比隣和錢四寄其弟龢再見濤頭湧玉輪煩君久駐浙江春年來縂作維摩病堪笑東西二老人常潤道中有懐錢唐寄述古五首從來直道不辜身得向西湖兩看春沂上已成曽㸃服泮宫初采魯侯芹休驚嵗嵗年年貌且對朝朝暮暮人細雨晴時一百六畫船鼉鼓莫違民空草長江南鸎亂飛年來事事與心違花開後院還落燕入華堂怪未歸世上功名何日是樽前㸃檢幾人非去年栁絮飛時節記得金籠放雪衣相浮玉山頭日日風涌金門外已春融二年魚鳥渾識三月鶯花付與公剰看新翻眉倒暈未應泣别臉消紅何人識得相思字寄與江邊北向鴻國艷夭嬈酒半酣去年同賞寄僧簷但知撲撲晴香軟誰見森森曉態嚴穀雨共驚無幾日蜜蜂未許輙先甜應湏火急回征棹一片辭枝可得黏欲恵泉山下土如濡陽羨溪頭米勝珠賣劍買牛吾老殺雞為黍子來無地偏不信容髙盖俗儉真堪著腐儒莫怪江南苦留滯經營身計一生迂九日湖上尋周李二君不見君亦見尋于湖上以詩見寄明日乃次其韻湖上野芙蓉含思愁脉脉娟然如静女不肯傍阡陌詩人杳未來霜艷冷難宅君行逐鷗鷺出處浩莫測葦間開挐音雲表已飛屐使我終日尋逢花不忍摘人生如朝露要作百年客喟彼終嵗勞幸茲一日澤願言竟不遂人事多乖隔悟此知有命沉憂傷魂魄自徑山囘得吕察推詩用其韻招之宿湖上多君貴公子愛山如愛色心隨葉舟去夢遶千山碧新詩到中路令我喜折古來軒冕徒操捨兩悲慄數朝辭簮笏兩脚得暫赤歸來不入府却走湖上宅寵辱吾久忘寧畏官長詣飄然便欲去誰在子思側君能從我㳺出郭及未黑會客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服藹藹君詩似嶺雲從來不許醉紅裙不知野屐穿山翠惟見輕橈破浪紋頗憶呼盧袁彦道難邀罵坐灌将軍晩風落日原無主不惜清涼與子分珠載酒無人過子雲掩闗畫卧客書裙歌喉不共聴貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵞軍慿君徧遶湖邊寺漲渌晴來已十分徑山道中次韻答周長官兼贈蘓寺丞年來戰紛華漸覺夫子勝欲求五畆宅灑埽樂清浄學道恨日淺問禪慙聴瑩聊為山水行遂此麋鹿性獨㳺吾未果覔伴誰復聴吾宗古遺直窮逹付前定餔糟醉方熟洒面呼不醒奈何效燕蝠屢欲争晨暝不如從我㳺髙論發犀柄溪南渡横木山寺稱小徑尋幽自茲始歸路㣲月映南望功臣山雲外盤飛磴三更渡錦水再宿留石鏡緬懐周與李能作洛生詠明朝三子至詩律嚴號令籃輿置紙筆得句輕千乗玲瓏苦竒秀名實巧相稱九仙更幽絶笑語千山應空岩側破甕飛溜洒浮磬山前見虎跡侯吏鐃鼓競我生本艱竒塵土滿釜甑山禽與野獸知我久蹭蹬笑謂侯吏還遇虎吾有命徑山雖云逺行李稍可併頗訝王子猷忽起山隂興但報菊花開吾當理歸榜次韻杭人裴維甫餘杭門外葉飛秋尚記居人挽去舟一别臨平山上塔五年雲夢澤南州淒涼楚些縁君發邂逅秦淮為子由寄謝西湖舊風月故應時許夢中㳺次韻荅劉景文左蔵我老詩壇仆鼓旗借君佳句發良時但空賀監杯中物莫示孫郎帳下兒夜燭催詩金燼落秋芳壓帽露華滋故應好語如爬癢有味難名只自知時在有美堂宴集而景文有詩云雲間獵獵立旌旗公在胥山把酒時笑語幾畨留灌輩風流千載與吳兒湖山日落丹青焕樓閣風収雨露滋誰使管簫江上住胸中事業九門知自注云是日大霈座上復借韻送岢嵐軍通判葉朝奉雲間踏白看纒旗莫忘西湖把酒時夢裡湖山連越嶠樽前羌婦雜胡兒夕烽過後人初醉春燕來時雪未滋為問從軍真樂否書來粗遣故人知次韻周邠南遷欲舉力田科三徑初成樂事多豈意殘年踏朝市有如疲馬畏陵坡羡君同甲心方壮笑我無聊鬂已皤何日西湖尋舊賞淡烟踈雨暗漁蓑次韻聰上人見寄前身本同社宿業獨臨邊一悟鏡空老始知圓澤賢歸心忘犢佩生術寄羊鞭不似歐陽子空留六一泉送杭州杜戚陳三掾罷官歸鄉秋風槭槭鳴枯蓼船閣荒村夜悄悄正當逐客㫁腸時君獨歌呼醉連曉老夫平生齊得䘮尚戀㣲官失輕矯君今憔悴歸無食五斗未可秋毫小君言失意能幾時月啖蝦蟆行復皎殺人無騐中不快此恨終身恐難了徇時所得能幾何隨手已遭憂患繞期君正似種宿麥忍飢待食明年麨杭州牡丹開時僕猶在常潤周令作詩見寄次其韻復次一首送赴闕羞歸應為負花期已見成隂結子時與物寡情怜我老遣春無恨賴君詩玉臺不見朝酣酒金縷猶歌空折枝從此年年定相見欲師老圃問樊遲莫負黄花九日期人生窮達可無時十年且就三都賦萬户終輕千首詩天静傷鴻猶戢翼月明驚鵲未安枝君看六月河無水萬斛龍驤到自遲送襄陽從事李友諒歸錢唐居杭積五嵗自意本杭人故山歸無家欲卜西湖隣良田不難買静士誰當親髯張既超然老潜亦絶倫李子氷玉姿文行兩清淳歸後三人㳺便足了此身公隄不改作姥嶺行開新幽夢隨子去松花落衣巾正月二十二日病後述古邀往城外尋春屋上山禽苦唤人檻前氷沼忽生鱗老來厭伴紅裙醉病起空驚白髪新卧聴使君鳴鼔角試呼稚子整冠巾曲欄幽榭終寒窘一看郊原浩蕩春山村五絶竹籬茅屋趂溪斜春入山村處處花無象太平還有象孤烟起處是人家烟雨濛濛雞犬聲有生何處不安生但令黄犢無人佩布榖何勞也勸耕老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶觧忘味邇來三月食無塩音杖藜裹飯去怱怱過眼青錢轉手空贏得兒童語好一年强半在城中湏竊祿忘歸我自羞豐年底事汝憂愁不更待飛鳶墮方念平生馬少㳺新城道中二首東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日掛銅鉦野桃含笑竹籬短溪栁自摇沙水清西崦人家應最樂煑葵煨笋餉春耕身世悠悠我自行溪邊委轡聴溪聲散材畏見搜林斧疲馬思聞卷斾鉦細雨足時茶户喜亂山深處長官清人間岐路知多少試向桑田問耦耕予去杭十六年而復來留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庶幾焉二月六日來别南北山諸道人而下天竺恵浄師以醜石贈行作三絶句當年霜鬂兩青青强説重臨慰别情衰髪祗今無可白故應相對話前生官出處依稀似樂天敢将衰朽較前賢便從洛社休去猶有閑居二十年在郡依前六百日山中不記幾囘來還将天竺一峯去欲把雲根到處栽和張子野見寄三絶過舊逰前生我已到杭州到處長如到舊逰更欲洞霄為隐吏一菴閑地且相留見題壁狂吟跌宕無風雅醉墨淋浪不整齊應為詩人一囘顧山僧未忍掃黄泥竹閣見憶栢堂南畔竹如雲此閣何人是主人但遣先生披鶴氅不湏更畫樂天真楊次公與髙麗僧統逰錢唐皆以王事而從方外之樂善哉未曽有也作是詩以送之天門夜上賔出日萬里紅波半天赤歸來平地看跳丸一㸃黄金鑄秋橘太華峯頭作重九天風吹灔黄花酒浩歌馳下腰帶鞓醉舞崩崖一揮手神㳺八極萬縁虚下視蚊雷隐汙渠大千一息八十返笑厲東海騎鯨魚三韓王子西求法鑿齒彌天雨勍敵過江風急浪如山寄語舟人好看客杭州㳺山山平村塢迷野寺鐘相荅晩隂生林杪落日猶在塔行招兩社僧共步青雲月送客渡石橋迎客出林樾幽尋本真性往事聴徐説錢王方壮年此邦事輕俠鄉人鄙貧賤異類識英傑立石像興王遺址今岌嶪功勲三吳定富貴四海甲歸來父老蔵崇髙畏輕壓詩人工􅏺病此慾恣挑抉流傳後世人談笑資口舌是非今已矣興廢何倉卒持歸問禪翁笑指浮漚沒雪後便欲與同僚尋春一病彌月雜花都盡獨牡丹在爾劉景文左蔵和順闍黎詩見贈次韻答之殘花怨久病剰雨泣餘妍不見雙旌出空令九陌遷知君苦寂莫妙語嚼芳鮮淺紫從争發浮紅任早蔫天葩尚青蕚國色待華顛載酒邀詩将臞儒不是仙次韻林子中見寄飄零洛社數遺民詩酒當年困惡賓元亮本無通俗韻孝章要是有名人蒜山小隐雖為客江水西來亦帶岷卷却西湖千頃緑笑他魚尾更莘莘次前韻答馬忠玉坡陁巨麓起連峯積累當年慶自鍾靈運子孫俱得鳳慈明兄弟孰非龍河梁會作看雲别詩社何妨載酒從秪有西湖似西子故應宛轉為君容李杞寺丞見和前篇復用元韻獸在藪魚在湖一入池檻歸期無誤隨弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥百日愁歎一日娛白雲舊有終老約朱綬豈合山人紆人生何者非蘧廬故山鶴怨秋猿孤何時自駕鹿車去掃除白髪煩菖蒲麻鞋短後隨獵夫射弋狐兎供朝晡陶潜自作五栁傳潘閬畫入三峯圖吾年凛凜令幾餘知非不去慙衞蘧嵗荒無術歸亡逋鵠則易畫虎難摹再和東望海西望湖山平水逺細欲無野人踈狂逐魚釣刺史寛大容歌呼君恩飽暖及爾孥才者不閑拙者娛穿巖度嶺脚力健未厭山水相縈紆三百六十古精廬出㳺無伴籃輿孤作詩雖未造藩闕破悶豈不賢樗蒲君才敏贍兼百夫朝作千篇日未晡朅來湖上得佳句從此不看營邱圖知君篋櫝富有餘莫惜錦繡償菅遭窮多闘險誰先逋賭取名畫不用摹沈諌議召逰湖不赴明日得雙蓮于北山下作一絶持獻沈既見和又别作一首因用其韻湖上棠隂手自栽問公更得幾回來水仙亦恐公歸去故遣雙蓮一夜開發詔書行捧縷金箋樂府應歌相府蓮莫忘今年花處西湖西畔北山前杭州故人信至齊安昨夜風月清夢到西湖上朝來開好語叩户得吳餉輕圓白曬荔脆釅紅螺醬更将西菴茶觀我洗江瘴故人情義重説我心西向十年兩僕夫千里問無恙相期結書社未怕供詩帳還将夢魂去一夜到江漲觀杭州鈐轄歐育刀劍戰袍青綾衲衫暖襯甲紅線勒帛光遶脅秃襟小袖雕鶻盤大刀長劍龍蛇柙兩軍鼔譟屋瓦墜紅塵白羽紛相雜将軍恩重此身輕笑履鋒鋩如一挿書生只肯坐帷幄談笑毫端弄生殺呌呼擊鼔催上竿猛士應憐小兒黠試問黄河夜偷渡掠面驚沙寒霎霎何如大艦日髙眠一枕清風過苕霅送錢承制赴廣西路分都監當年我作表忠碑坐覺江山氣未衰舞鳯尚從天目下牧駒時有渥洼姿據床到處堪吹笛横槊何人觧賦詩知是丹霞破佛手先聲應已懾羣夷仲元貺王元直自眉山來見予錢唐留半嵗既行作絶句五首送之仲君豈弟多學王子清修寡言病後空驚鶴瘦時來或作鵬騫海角煩君逺訪江源與我同來剰作數詩相送莫教萬里空囘三人一旦同行留下髙齋月明遥想扁舟京口尚餘孤枕潮聲懐更欲留君久住念君去國彌年空使犀鸕玉頰長髯舅悽然為予逺致殷勤瑞草橋邊老人紅帶雅宜華髪白醪光泛新春五月十日與吕仲甫周邠僧恵勤恵思清順可久惟肅義詮同泛湖逰北山三吳雨連月湖水日夜添尋僧去無路瀲瀲水拍簷駕言徂北山得與幽人兼清風洗昏翳晩景分濃纎縹緲朱樓人斜陽半踈簾臨風一揮手悵焉起遐瞻世人騖朝市獨向溪山亷此樂得有命輕薄神所殱明日重九亦以病不赴述古會再用前韻月入秋帷病枕涼霜飛夜簟故衾香可憐吹帽狂司馬空對親舂老孟光不作雍容傾座上翻成骯􅗣倚門傍人間此會論今古細看茱茰感嘆長述古以詩見責屢不赴會復次前韻我生孤癖本無隣老病年來益自珍肯對紅裙辭白酒但愁新進笑陳人北山怨鶴休驚夜南畝巾車欲及辰多謝清詩屢推轂豨膏那觧轉方輪法恵寺横翠閣朝見吳山横暮見吳山從吳山故多態轉側為君容幽人起朱閣空洞更無物惟有千步岡東西作簾額春來故國歸無期人言悲秋春更悲已泛平湖思濯錦更看横翠憶蛾眉琱欄能得幾時好不獨慿欄人易老百年興廢更堪哀懸知草莽化池臺㳺人尋我舊㳺處但覺吳山横處來寺今為臺諫宅寄吕穆仲寺丞孤山寺下水侵門每到先看醉墨痕楚相未忘談笑是中郎不見典刑存君先去踏塵埃陌我亦來尋桑棗村囘首西湖真一夢灰心雙鬂更休論送劉寺丞赴餘姚中和堂後石楠樹與君對床聴夜雨玉笙哀怨不逢人但見香烟横碧縷謳吟思歸出無計坐想蟋蟀空房語明朝開鎻放觀潮豪氣正與潮争怒銀山動地君不看獨愛清香生雲霧别來聚散如宿昔城郭空存鶴飛去我老人間萬事休君亦洗心從佛祖手香新寫法界觀眼浄不覷登伽女餘姚古縣亦何有龍井白泉甘勝乳千金買斷顧渚春似與越人降日注咸淳臨安志卷九十六
