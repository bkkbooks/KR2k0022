body:
  text: 咸淳臨安志卷九十七宋潛説友撰紀遺九紀文詩蘇養直宿飛來峰下吳中未厯佳山水湖山懷思去惘然雲去雲歸兩峰寺鷗飛鷗沒夕陽天客愁官渡落花雨歸夢下湖春水船想得對床成夜雨何須隴月向人圓送子經歸臨安牛背行將老鷗沙盟已寒蓴鱸付張翰書札報任安古學飽胸次驚瀾翻筆端西湖十頃月留取醉時看曽南豐錢塘得雨連章天上乞身間笑入吳船擁莭還一夜風雷驅旱魃始知霖雨出人間正旌旗東下路塵開六月風雲席上回恐一方人暍死直將霖雨過江來李泰伯錢唐毛氏西園昔年曽泛西湖流今君更住西湖頭人生多事未得往地上有天何處求朱樓照影鐘磬曉畫船落手芙蓉秋鯉魚赤鱗應不少待與水仙相伴逰朝以道杭州思歸邱壑情無盡田園興有餘何當厭澤國不奈憶君廬庭户草應長江山木已踈何時整歸棹八月洞庭湖黃山谷錢唐舊遊薄宦飄然笑漫郎瑟洲花草弄幽芳莫教景物添春色轉覺山川是異鄉南北峯岩空入夢短長亭舍自相望湖邊山寺清明後想見蘭開禊水香陳後山過杭留别曹朝奉陳蕃解榻為留連俯仰徒驚嵗月遷敢意斯人奈風雨多情于我獨山川可憐顔貌非前日依舊從前似去年後夜相思隔煙水夢魂空寄過江船郭功父錢唐行東南會府惟錢唐髙門雙開南斗傍門前碧瓦十萬户曉色滿城煙雨香聖祖神宗造區宇應命最先吳越王不經兵火二百載地饒沃衍民康強蓮花紅白西湖芳南山翠影臨滄浪瓊樓寶塔照日月塵埃不到炎天涼畫船羅幕盡髙捲白玉美人遊冶郎年年中秋海潮過萬頃銀山面前墮少年輕命爭弄潮手掣紅旗逆潮簸聞君此行承辟書伯樂能求汗血駒四時風物間吟嘯十郡兵民歸捲舒公間蓄德聊自養承平功業還吾儒况君登朝未四十謹勿出處窮歡娛謹勿出處窮歡娛臨淵履氷佩瓊琚趙循道泛舟晚出北關舟泛寒塘靜人歸一葉間影踈行處栁青逺望中山道在身從老詩窮意覺間到家秋斂足有謂掩柴關上竺真辨師一别支公僅兩年山房髙隱尚恬然心清已徹靈泉奧行峻應磨峭壁堅俗眼不來青嶂裡孤峯誰認白雲邊更期香火深寒夜坐使飛花墜九天陳安行西湖感舊蘇公堤畔採蓮船蘸碧樓臺動管絃山色湖光宛如昔心情不似十年前唐太守彥猷杭州舟中送客山雨霏微不滿空畫船來往疾輕鴻誰知獨卧朱簾裡一榻無塵四面風蔡天啓杭州次周大夫韻使君詩句益超然文陳收工是昔年本自東南遺愛守聊從岩谷甚臞仙莫嫌供給難留客只為湖山已自賢好請東封西狩頌老來詞格似甘泉湖邊蓮葉已田田聞道花開勝去年君不御兮應有恨風其吹汝未應仙韻詞合繼災公作郡守誰如白傅賢却使詩翁間著筆滔滔長句湧言泉和只占西湖不占田六蓮重到欲忘年慙無佳句追靖聊取幽芳荐水仙對面文章能發興脫身朝市已稱賢江邊五月梅天雨擬附齊舲過冷泉孫雄飛錢唐感興百年承襲地和氣媚芳塵車馬當吳會山川與楚鄰酒樓絃管暮花市綺羅春風俗真佳麗多應笑魯民參寥子和湖上晚歸漾舟歸路興何賖水木低涼一道斜菱蔓蒹葭都卷盡芙蓉爛熳獨開花有雲披霞捲仰昭回試望翻經古石臺應秋香生桂樹吹風肯傍暮船來次韻古上人湖上步月尋常西湖月雲霧多襲明茲宵實昭晰似慰詩人情低昻見列宿戢耀非光熒起余二三子微咏哦新聲杖藜山前去雞犬寂不鳴蘭臯宿鷺羣回首時自驚君看南北山氣象真峥嶸參差煙水藂一一含餘清上人江南秀邂逅意所傾夜闌勸復路浩興殊未盈次韻吳承老推官觀開西湖偉人謀議不求多事定紛紛自唯阿盡放龜魚還渌淨肯容蕭葦障前坡一朝美事誰能紀百尺蒼崖尚可磨天上列星當亦喜月明時下浴晴波清明日湖上呈秦少章主簿水邊花霧曉氤氲春入西湖兩岸深冶葉倡條他自媚朽株枯木我何心鞦韆索轉朱樓角博塞聲喧碧桞隂年少故人方感慨未應從俗強浮沉寒食日蘇翰林同馬中玉提刑過訪有詩示怡然并余余次韻使君薄圭組富貴良易足一麾下東南千里爭拭目援毫賦山水詞力㵼溪谷勝逰便杖履聒耳厭絲竹西湖破春水曉漲翻晴渌相將二使軺導從還屏逐後先度岩壑頡頑追鸞鵠樂事殊未央酒行宜局促風流俄醉舞坐客瞻頽玉嵇阮真逹生秦唐漫歌哭斜陽絶湖去兩槳凌波速却尋元龍居隱隱隔喬木到門呼主人展畫滿髙屋夕鼓來逺近雨聲飄斷續籃輿入城市夾道閙燈燭盛事在餘杭他年見圖録次韻周開祖大夫泛湖見訪漾漾清漪十里間畫船人似鏡中安雨催菡蓞幽香發風觸蒲萄細浪寒髙岸烏紗來靜院倒揮白羽傍層欄吟毫所遇無遺景天乞詞源比海寬次韻文饒同是龍井出資國泛舟以歸北山踞虎奔犀列萬形竒觀真已過南屏縈雲細路杳無盡落石飛泉靜有聲十里平湖初卷浪一天秋色共揚舲停橈共過孤山寺寂寂林僧半掩扄訪勤上人斷橋蒼壁倚溪斜赤葉楓林噪晚鴉可怕嶺雲埋徑路會尋流水到君家戲招李無悔秀才淋漓一雨過秋山洗出西湖小霽天炯炯魚鱗含倒影飄飄羊角卷荒阡野塘白芡珠盈斗幽浦紅蕖錦繞船冷炙殘杯當已厭好來波際弄嬋娟雪霽寄彥瞻西湖漫天三日雪上下一色迷空虛層巒呇嶂杳難辨倣佛樓觀疑有無飢雛乳獸失所食飛走阡陌空號呼中園却羡喙木鳥利觜自解謀朝晡曉來鐘鼓報新霽天半稍稍分浮圖試慿髙樓肆逺目千里顛倒羅瓊琚逡巡夜月出海角光彩猛射來城隅方壺貟嶠只在眼綽約恍晤神仙居咄哉浩景似欺壓謂我不足為傳模風流江左杜從事氣格豪贍凌相如安得飄颻跨鸞鵠手指栗尾來為書照閣奉陪辨才法師夜坐懷少遊學士猿鳥投林已寂然芭蕉過雨小樓前雲依絶壁中間破月自遙峯缺處圓照坐不須紅蠟炬可人惟有蕙爐煙校讐御府圖書客疇昔還同此夜彈次韻景文會朱充仁大夫魏敏中朝奉于望湖樓長句髙樓别浮雲下瞰百頃湖清漪照兩岸秀色含孤蒲騷人富筆力領略驚須臾短長隨萬象肯議鶴與鳬二客各英妙溫溫古為徒從公文字飲所樂非歌呼酒酣挹諸山髙下如迎趨籃輿復迤邐逺訪飛來孤炎蒸近亭午天地如大爐石泉領吾廬快意猶過屠松門徹九里始見靈山隅佳名自開皇籍甚聞中區幽芳不時艷地勝乃滋濡招提如四海雄觀宜且無歸途憩夀星寒碧森萬株蕭騷聒衆響孰辨笙與竽擡眸矚新榜蔚蔚氣自殊將軍戀清絶勸客頽玉壺道人烹露芽滿盞浮雲腴倘無方外姿未可同此娛題小溪城根野水緑逶迤裊裊輕舟掠岸過欲採芝蘭無覔處野花汀草占春多楊次公西湖參寥山房我愛參寥一味間岩房占得畫屏間斫開東廡數枝竹放入西湖千里山石底酌泉清徹骨門前逢客強為顔白雲幽鳥應相信出本無心倦即還邱道源錢塘南屏髙瞰府城西畫舸千艘共醉迷四柱臺邊煙是幕百花橋畔葑連隄龍檀咽路迎輿隼綺繡登山汙粉題暮色沉沉郛郭閉寶燈輝映梵天低登西湖北樓尋遊心緒忽闌珊髙處重登始是觀晚吹劃開三面碧晨曦收住一天寒南屏洞户蘿隂合東極鰲峯雪浪漫逺近聲形窮不得離朱師曠漫憑欄澄霽無涯混一區似開塵網到華胥圖抨水墨煙昏處國占清涼月上初雲夢澤寬城邑逺華嚴川好酒肴踈秖期擺脫名韁了來約真仙傍此居王性之送開公歸徑山白頭住世我無日破衲出家師妙年衮繡門庭猶自妄瓶盂蹤迹不離禪雞催曉月人奔渡雁唤西風葉滿船夢境相逢便相别萬峯秋色正磨天許表民晚宿江漲橋鳥徑青山外人家苦竹邊江城懸夜鎖魚市散空船岸靜涵秋月林昏宿水煙又尋僧榻卧夜冷欲無眠鄭毅夫錢塘觀燈碧海芙蓉徹夜開亂花前後盡樓臺坐看萬里河漢外移下一天星斗來醉客倚欄吹玉笛美人弄鏡插香梅誰能飛入月宫去捉住嫦娥不放回王深父回浙江有感候潮門外浙江西曽憶浮舟自此歸萬古波濤今日是一身蹤迹昔人非愁侵北齒頭先白淚入秋風眼易眵日暮倣徨不能去連堤踈栁更依依汪龍溪過臨平二首一别九霄路風煙長滿衣已成身老大無復世輕肥天濶鳥雙下山寒人獨歸曉來何處雨春水半岩扉江睡起涼生岸鈎簾坐小忩麥風能起柂梅雨不鳴往事心長折歸途影自雙依然蒲栁地人老故先降餘杭道中過境全疑道若窮縈紆百轉曲回通人行山頂半天上舟繞溪流亂石中獄訟已無前世號衣冠猶有古人風才歸又見爭相慶共慶歌謡萬室同王中書希吕湖山十詠瑟瑟輕氷拆御溝溝邊栁色弄春柔數聲啼鳥破幽夢斷送西湖尋舊遊春石罅微泉咽淺沙沙頭細草换年華踈籬酒斾管事倚馬短櫩梅著花山南山北異隂晴雨腳垂垂日腳明落盡桃花春事退柔桑深處一鳩鳴冥冥細雨不成泥十里平沙快馬蹄總為好山牽醉眼不知縱轡過西溪湖雨挾東風作嫩寒短墻圍水栁藏煙遊人不出西靜白鷺飛來在畫船經雨後桃花脫瘦紅釣空平揖竹間風文書滿案不意心在西湖山水中山光擁翠落杯中水色天容上下同身入蓬山人不悟碧桃無數倚春風白露葵抱蕊未全開翠竹隂涼蔽緑苔貪看青林飛鳥丁丁喙木又驚回下荷花過眼作鮮妍小艇初疑久自便日日孤山山路紅菱白藕不論錢忩外平疇交逺風豆花成實穀苖豐向來河朔經行地盡在江南煙雨中西湖僧順怡竹詩城中寸土如寸金幽軒種竹只十箇春風謹勿長兒孫穿我階前緑苔破又林下詩久從林下遊頗識林下趣從渠緑隂繁不礙清風度間來石上眠落葉不知數一鳥忽飛來啼破幽寂處趙忠簡公鼎趨三衢别故人時車駕幸杭州傖父何由習楚風家山俱在古河東相逢憔悴干戈後追數悲歡夢寐中摻袂又成千里别放歌空念一樽同他年倘有加飱字試問漁舟鶴髮翁息飄零澤國幾春風又觸驚濤泛短篷四海未知棲地百年半在别離中功名原與世緣薄兵火向來吾道窮獨倚危樓淒望眼青山無數浙江東髙九萬湖上訪僧不遇亂花飛絮趂長髯未訪西湖竹裏菴行盡白雲三十里詩人又在白雲南不乘興尋僧入翠微山中無限野薔薇主人見從誰賞折得繁枝自插歸夜步天街書所見賽罷祠山賽二郎酒行明日欲開張愚民可是多忘本香火何曽到杜康喜杜仲髙移居清湖芙携雞犬入城居無復遊從歎濶踈河水通船堪載酒桐隂近屋可修書飯香休憶辛田米羔美何慙丙穴魚我亦買山湖上住效芹時擬貢園蔬嵗除登岝崿山精舍蕭寺經行無盡情倚欄長是眼增明溪因宿雨十分急山為凝寒一味清竹外飛花隨晚吹樹頭幽鳥試春聲重來又是明年事臨出門猶欵欵行楊炎正錢唐迎酒詩并序閏八月二十有六日官妓迎酒聫鑣穿市觀者如堵作迎酒歌以發同觀諸公一笑云錢塘妓女顔如玉一一紅粧新結束問渠結束何所為八月皇都酒新熟酒新熟浮蛆香十二庫中誰最強臨安大户索酒嘗舊有故事須迎將翠翹金鳯烏雲髻雕鞍玉勒三千騎金鞭爭道萬人看香塵冉冉沙河市琉璃杯深琥珀濃新翻曲調聲摩空使君一笑賜金帛今年酒賽真珠紅畫樓突兀臨官道處處繡旗誇酒好五陵年少事豪華一斗十千誰復校黃公壚下謾徜徉何曽見此大隄倡惜無顔公三十萬往醉金叉十二行繆瑜遇災報應詩并序辛酉錢唐火災延燒居民以七萬計惟吳山上一老翁家獨全翁平時誦經樂施火起之夕以老􅉵不能去遣兒與婦令亟走竟不忍相捨離處烈熖之中全家昏然熟寐至于蒲萄架亦不焚灼夫善積于平日之素而孝感于一念之頃其為神物護持如此行路之人相與言者必曰蒲萄架因詩之以為世人好善者之勸云鬱攸屬者煽災蜚廉縱風相與偕林林生齒七萬户連甍接棟燒成灰如何老翁一區宅間不以寸獨不㶼玉石俱焚勢應爾豈有幻術能然哉聞之翁乃好善者平時事佛經卷開有餘必以濟貧乏不以利欲縈其懷倉卒遂蒙神鬼護萬目注視咸驚猜厥初巨熖天起左顧右盻如蟠柴翁知無地可脫免委身甘作燼與煨麾兒與婦令亟走誓死不去無違乖全家酣寢越信宿如聞大浪聲喧豗及其夢覺火亦息依然一室當崔嵬微如蒲萄不薰灼而况梁棟與桷榱蒼蒼表善有如此餘自作孽何足哀作詩志往勸來者勿以斯語同優俳陸放翁臨安春雨初霽世味年來薄似紗誰憐騎馬客京華小樓昨夜聽春雨深巷今朝賣杏花矮紙斜行間作草晴忩細乳戲分茶素衣莫動風塵嘆猶及清明可到家陳節齋寒食湖上花瘦水肥三月天畫橈雙動木蘭船人家盡换新榆火惟有垂楊帶舊煙太傅平章賈魏公舊題於潛道中數家煙火深村裡幾處牛羊落日中客久不歸心事逺梧桐葉葉是秋風昌化道中西風落葉路漫漫衣袂微生旦暮寒只隔片雲家便到逺山移入夢中看與友人會宿城中江湖相隔久不料宿京城終夜同談笑對床如弟兄濕螢飛復落殘燭滅還明此去仍多事重期未必成咸淳庚午冬大雪遺安撫潛侍郎詩臘前又放玉園林一片花飛一片心瀌奕端由人所召燮調多愧病難任乾坤浩浩無偏處田野穰穰更自今但得諸賢成此樂擢舟我欲去山隂氣安撫潛侍郎説友和并跋詩云海水飛花到上林形和處總由心采薇指日休兵甲宿麥連雲辨輦任熾炭酒行懷往昔老枝詩句詔來今燮調妙用誰知得端在崇陽與抑隂雲氣峥嶸衆俊林聖朝事事合天心梅根依傍蒙嘉澤竹力低垂愧重任有美江山秪如舊無塵宇宙幸逢今坐令清畫間鈴索白戰工夫效汝隂雨跋云咸淳六年閏十月乙邜雪越十一月辛卯大雪太師平章魏國公先生作為詩章為民志喜不鄙微陋而辱貺之説友拜手欽誦竊惟浩浩無偏天地之心也清明虛一其著見固應耳漢中興再傳至于永平號稱熙洽而詔乃曰京師冬無宿雪勞煩有司積精禱求我國家景定以來年榖比登天休滋至亦惟明良心學純懿位育之功度越前代逺甚而説友蒙賴嘉澤匪勞匪煩既與鄉遂之氓歌咏公詩交相慶幸且刻諸石以垂之百世傳之四海云侍從各有和篇并刻之石附載于後炭章侍郎鑑釀成和氣遺林林上宰心通上帝心炙擁爐謀已決龍枝擎玉力能任屢豐兆好彌穹壤寡和詞髙冠古今願乞一蓑歸釣隱兒時執木欲成隂方侍郎逢辰來自周原入禁林升平風露洽民心霸橋驢背詩爭咏魏國龍枝力獨任逺役載塗將撤戍豐年髙廩又從今君王對越加修省却説陽明可勝隂銀陳侍郎宜中瑞霙又報集琪林盡是寬民一點心闕光浮和氣動玉龍力重老枝任鵝池凱奏傳中夜麥壠歇聲沸自今得趂東風同此樂青天何處不喬隂鮑侍郎度一陶催發萬園林平施工夫天地心計出陳竒殱此虜盟推滕六長諸任三登氣象先呈臘一統封疆後視今多謝玉龍擎重力太平蓑笠好溪隂心盧侍郎鉞二首天花六出瑞千林公溥明通造化農望豐年知兆朕物涵生意總懷任兔園奕奕誇圭璧薇戍霏霏詠昔今擎重老枝長玉立主張陽類杜羣隂底用封香禱梵林瑞霙先臘感由心豫知農畝宜禾稼復喜邊儲足輦任民樂齊宫誇往昔捷歌周戍屬斯今燮調妙造推元老治象陽明無伏隂河陳侍郎存先臘吹開萬玉林人心悅處即天心山洞徹重瞳逺宫闕髙寒一柱任瑞應崆洞知有日塵清洄曲在斯今神功變化無留迹便放春陽捲積隂文右史及翁身逰廊廟意山林六出花開一寸心平地尺書叨載史瞻天班賀齒諸任屢豐嵗事常如昔太素風光直到今收斂神功放晴景白河半夜掃層隂寫曹侍郎元發乾坤滿眼盡琪林擎玉詩傳魏國心琰已增天府重掌兵愧匪地官任三千界內清無際數十年來瑞獨今喜雪未幾還喜雨老農歌舞愛春隂再賦二首玉立堂堂君子林由來彥聖好于心時和定是占書嵗賢聚奚須更難任上瑞以人誇自昔太平有象適當今莫令一片花飛却留取春光到緑隂窮年枯坐似禪林為喜祥霙寫我心歸去來兮懷靖莭不能者止愧周任西園佳話從知舊東國諸賢復見今滿斛明珠逾美瑞定應摹刻過碑隂淋安撫潛侍郎再和并跋説詩云突兀瓊樓照武林漓黃榜快羣心成功並平淮度經世誰如釣海任後樂園應看最好屢豐年又數從今太平天子方宵旰想讀豳風到凌隂句落孤山壓老林橫枝解識燮調心衆賢戞擊宗韶頀外域流傳洗靺任不有鹿磯功許大那能兔苑樂如今非才久愧班東上抱甕何當學漢隂跋云右太師平章魏國公先生申賦二章一以酬法從羣彥一以重況説友逺邇傳誦金聲玉振美哉渢渢乎昔者詩人稱上天同雲雨雪氛氛占其豐也而于是懷禹之功焉良以原隰不甸則耕且不得豐于何有公再立乾坤一德寅亮潤澤豐美如川方至顧乃不居其功謂賢聚而治猶雲同而雪也吐握形諸歌咏唯恐賢者一日去朝廷其視西園識度萬有徑庭矣來世其以是見公之志右並刻石府治王帥參洧湖山十景詩蘇堤春曉云孤山落月趂踈鐘畫舫參差栁岸風鶯夢初醒人未起金鴉飛上五雲東待假橋殘雪云望湖亭外半青山跨水修梁影亦寒伴痕邊分草色鶴驚碎玉啄闌干南雷峯夕照云塔影初收日色昏隔墻人語近甘園山逰遍分歸路半入錢唐半暗門曲院風荷云避署人歸自冷泉步頭雲錦晚涼天愛渠香陳隨人逺行過髙橋旋買船平湖秋月云萬頃寒光一席鋪氷輪行處片雲無鷲峯遙度西風冷桂子紛紛點玉壺栁浪聞鶯云如簧巧囀最髙枝苑樹青歸萬縷絲玉輦不來春又老聲聲許與落花知沙花港觀魚云斷汊帷餘舊姓甘倚欄投餌説當年鷗曽見園興廢近日遊人又玉泉晚南屏晚鐘云涑水崖碑半緑苔春遊誰向此山來煙深處蒲牢響僧自城中應供回橫三潭印月云塔邊分占宿湖船寶鑑開奩水接天玉叫雲何處起波心驚覺老龍眠靄兩峯插雲云浮圖對立曉崔巍積翠浮空霽迷試向鳯凰山上望南髙天近北煙低闕記白樂天華嚴經社石記有杭州龍興寺僧南操當長慶二年請靈隱寺僧道峯講大方廣佛華嚴經至華藏世界品聞廣博嚴淨事操歡喜發願願于白黑衆中勸十萬人人轉華嚴經一部十萬人又勸千人人諷華嚴經一卷每嵗四季月其衆大聚會于是攝之以社齊之以齋自二年夏至今年秋凡十有四齋每齋操捧香跪啓于佛曰願我來世生華嚴世界大香水海上寶蓮金輪中毗盧遮那如來前與十萬人俱斯足矣又于衆中募財製良田十頃嵗取其利永給齋用豫前牧杭州時聞操發是願今牧蘇州時見操成是功操自杭詣蘇凡三請于豫曰操八十一矣朝夕逮盡恐社與齋來者不能繼其志乞為記誡俾無廢墜豫即十萬人中一人也宜乎志而贊之噫吾聞一毛之施一飯之供終不壞滅况田千畝齋四時用不竭之征備無窮之供乎噫吾聞一願之力一偈之功終不壞滅况十二部經常出于千人口乎况十萬部經常入于百千人耳乎吾知操徒必果是願若經之句義若經之功神則存乎本傳若社人之姓名若財施之名數則列于别碑斯石之文但敘見願集來緣而已寶歷二年九月二十五日前蘇州刺史白居易記吳郡詩石記正元初韋應物為蘇州牧房孺復為杭州牧皆豪人也韋嗜詩房嗜酒每與賔友一醉一咏其風流雅韻多播于吳中或目韋房為詩酒仙時豫始年十四五旅二郡以幼賤不得與遊宴尤覺其才調髙而郡守尊以當時心言異日蘇杭茍獲一郡足矣及今自中書舍人間領二州去年脫杭印今年佩蘇印既醉于彼又吟于此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始願及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髮非又可嗟矣云云杜樊川杭州新造南亭子記佛著經曰生人既死隂府收其精神校平生行事罪福之坐罪者刑獄皆怪險非人世所為凡人平生一失舉止皆落其間其尤怪者獄廣大千百萬億里積火燒之一日凡千萬生死窮億萬世無有間斷名為無間夾殿宏廊悉圖其狀人未熟見者莫不毛立神駭佛經曰我國有阿闍世王殺父王篡其位法當入所謂獄無間者能求事佛後生為天人况其他罪事佛固無恙梁武帝明智勇武創為梁國者捨身為僧奴至國滅餓死不聞悟况下輩固惑之為工商者雜良以苦偽內而華外納以大稱斛以小出之欺奪村閭憨民銖積粒聚以至于富刑法錢榖小胥出入人性命顛倒埋沒使簿書條令不可究知得財買大第豪奴如公侯家大吏有權力能開庫取公錢緣意恣為人不敢言是此數者心自知其罪皆損已奉佛以求救月日積久曰我罪如是貴富如所求是佛能滅吾罪復能以福與吾也有罪罪滅無福福至生人唯罪福耳雖田婦稚子知所趨避今權歸于佛買福賣罪如持左契交手相付至有窮民啼一稚子無以與哺得前錢召一僧飯之兾佛之助一日獲福若如此雖舉寰海內盡為寺與僧不足怪也屋壁繡紋可矣為金扶踈擎千萬佛僧為具味飯之可矣飯訖持錢與之不大不壯不髙不多不珍竒瓌怪為憂無有人力可及而不為者晉霸主也一銅鞮宫之衰弱諸侯不肯來盟今天下能如幾晉凡幾千銅鞮人得不困哉文宗皇帝嘗語宰相曰古者三人共食一農人今加兵佛一農人乃為五人所食其間吾民尤困于佛帝念其本牢根大不能果去之武皇帝始即位獨奮怒曰窮吾天下也始去其山臺野邑四萬所冠其徒至十萬人後至會昌五年始命西京留佛寺四僧惟十人東京二寺天下所謂莭度觀察同華汝三十四治所得留一寺僧準西京數其他刺史州不得有寺出四御史縷行天下以督之御史乘驛未出關天下寺至于屋基耕而冠之凡除寺四千六百僧尼笄冠二十六萬五百其奴婢十五萬良人枝附為使令者倍笄冠之數良田數千萬頃奴婢口率與百畝編入農籍其餘賤取民直歸于有司寺材州縣得以恣新其公署傳舍今天子即位詔曰佛尚不殺而仁且來中國久亦可助以為治天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉著為定令以徇其習且使後世不得復加也趙郡李子烈播立朝名人也自尚書比部郎中出為錢塘錢塘于江南繁大雅亞吳郡子烈少遊其地委曲知其俗蠧人者剔削一根莭斷其脈絡不數月人隨化之三箋干丞相云濤壞人居不一捍錮敗侵不休詔與錢二千萬築長堤少為數十年計人益安喜子烈曰吳越古今多文士來吾郡遊登樓倚軒莫不飄然而增思吾郡之江山甲于天下信然也佛熾害中國六百嵗生見聖人一揮而幾夷之今不取其寺材立亭勝地以彰聖人之功使文士歌詩之後必有指吾而罵者乃作南亭在城東南隅宏大焕顯工施手目髮豎肉均牙滑而無遺巧矣江平入天越峯如髻越樹如髮孤帆白鳥點盡止凝在半夜酒餘倚老松坐怪石殷殷潮聲起于月外東閩西越宦逰善地也天下名士多往之豫知百數十年後登後南亭者念仁聖天子之神功美子烈之旨迹覩南亭千萬狀吟不能已四時千萬狀吟不能去作為歌詩次之于後不知幾千百人矣陳後山關氏二亭記居則行其仁仕則行其義家非仁不義君臣之際又有義焉仁始于身內有以守同其樂于天外有以安同其好于人故為宫室苑囿以燕其居車馬器服以效其用賔射燕享以廣其意故能羣天下而世守焉錢塘關氏于其居之右積土為坂伐石為壇而藝以藥坂之下有甘井焉挾以二室左竹右木斷而不斫命其坂曰藥坂壇曰芝壇井曰丹井左曰巢亭右曰節亭自是關氏之父兄子弟仕而休者與夫學而未仕者朝夕在焉府縣之吏鄉邑之老與夫四方之過賔間從其遊所樂雖異而各有得焉嗚呼可謂仁其身矣引而近之守莫固焉推而外之政莫善焉關氏為吳大家世有彥士其宦于朝者三人仕于州縣者四人處而學者又十有幾人因而大之其興乎蜀方士李翁曰石有玉可攻甘井可化丹砂而未試也後有貪者將剝石而賈玉竭井以市丹砂關氏盛衰于是見之作亭之明年關氏之良彥瞻來京師以告其僚友舊逰于是士大夫之能詩者皆為賦之而屬豫為之記元祐元年八月丙戌闕敘蘇東坡牡丹記敘熙寧五年三月二十三日余從太守沈公觀花于吉祥寺僧守璘之圃圃中花千本其品以百數酒酣樂作州人大集金槃綵籃以獻于坐者五十有三人飲酒樂甚素不飲者皆醉自輿臺皂𨽻皆插花以從觀者數萬人明日公出所集牡丹記十卷以示客凡牡丹之見于傳記與栽植接養剝治之方古今詠歌詩賦下至怪竒小説皆在余既觀花之極甚與州人共逰之樂又得觀此書之精究博備以為三者皆可紀而公又求豫文以冠于篇蓋此花見重于世三百餘年窮妖極麗以擅天下之觀美而近嵗尤復變態百出務為新竒以追逐時好者不可勝紀此草木之智巧便佞者也今公自耆老重德而豫又方憃迂濶舉世莫與為比則其于此書無乃皆非其人乎然鹿門子常怪宋廣平之為人意其鐵心石腸而為梅花賦則清便艷發得豈朝徐庾體今以豫觀之凡託于椎陋以胘世者又足信哉余雖非其人強為公記之公家書二萬卷博覽強記遇事成書非獨牡丹也錢唐勤上人詩集敘昔翟公罷廷尉賔客無一人至者其後復用賔客欲往翟公大書其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見世以為口實然豫嘗薄其為人以為客則陋矣而公之所以待客者獨不為小哉故太子太師歐陽公好士為天下第一士有一言中于道不逺千里而求之甚于士之求公以故盡致天下豪俊自庸衆人以顯于世者固多矣然士之負公者亦時有蓋嘗慨然太息以人之難知為好士者之戒意公之于士自是少倦而其退老于潁水之上余往見之則猶論士之賢者唯恐其不聞于世也至于負已者則曰是罪在我非其過翟公之客負公于死生貴賤之間而公之士叛公于瞬息俄頃之際翟公罪客而公罪已與士益厚賢于古人逺矣公不喜佛老其徒有治詩書學仁義之説者必引而進之佛者惠勤從公遊三十餘年公嘗稱之為聰明才智有學問者尤長于詩公薨于汝隂豫哭之于其室其後見之語及于公未嘗不涕泣也勤固無求于世而公又非有德于勤者其所以涕泣不忘豈為利也哉豫然後益知勤之賢使其得列于士大夫之間而從事于功名其不負公也審矣求熙寧七年豫自錢唐將赴髙密勤出其詩若干篇豫文以傳於世豫以為詩非待文而傳者也若其為人之大略則非斯文莫之傳也咸淳臨安志卷九十七
