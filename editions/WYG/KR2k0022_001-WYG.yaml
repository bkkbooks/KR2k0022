body:
  text: 咸淳臨安志卷一宋潜說友撰行在所録序録闕駐蹕次第建炎三年二月壬戌髙宗皇帝車駕自揚州幸杭州四月癸丑殿中侍御史王庭秀請進幸江寜丁夘發杭州朝散郎前秀州司録事洪皓上疏論今内患甫平外敵方熾若輕至建康恐金人乘虗侵軼宜遣近臣先往經營庻事告辦鳴鸞未晩也時朝議已定不從五月乙酉至江寜府七月辛夘陞杭州為臨安府閏八月丁丑朔御筆朕欲定居建康不復移蹕與夫右趨鄂岳左駐吳越山川形勢地利人情孰安孰危孰利孰害三省可示行在職事管兵官條具以聞始張浚建武昌之議是日百官封事皆言岳鄂道逺饋餉難繼又慮上駕一動則江北羣盗乗虛過江翌日輔臣入對卒定東巡之策丁亥上召諸將問以移蹕之地張浚辛企宗勸上自岳鄂幸長沙戊子吕頤浩等入對上曰浚企宗不敢戰故欲避於湖南朕以為金人所恃者騎衆耳浙西水鄉騎雖衆不得騁也壬辰監都進奏院周元曜自京太廟奉迎藝祖以下神位九室至臨安壬寅車駕發建康十月癸未車駕自建康府至臨安府庚寅幸浙東壬辰至越州四年四月韓世忠蹙敵江上吕頤浩請上幸浙西甲申下詔親征御史中丞趙鼎言當竢浙西寜静及建康之寇盡渡江然後回蹕紹興元年十一月戊戌詔以會稽漕運不繼移蹕臨安二年正月丙午車駕自紹興府幸臨安府四年十月丙子上諭輔臣曰朕已屈已講和而金復肆侵陵朕當親總六軍往臨大江決於一戰遂詔親征丁丑以參知政事孟庾為行宫留守戊戌發臨安府奉天章閣祖宗神御以行壬寅入居平江行宫五年二月壬午車駕自平江府幸臨安府先是正月癸亥參知政事孟庾上表恭請車駕還臨安府詔答曰朕夙嚴戎駕底定邉虞小次舎於吳門往宅師於建鄴載念江山之勝屢經兵火之餘雖有司板築以時并繕官府城池之役顧斯民襁負而至尚無邑屋廬舍之依復覽封章力祈還幸見官儀而思漢諒南北之一心從仁人而居邠亦父老之誠意勉徇來牘暫議回轅想遲警蹕之音益慰羽旄之喜可依所請暫回臨安府駐蹕户部侍郎兼權知臨安府梁汝嘉率本府父老僧道士庻上表迎回車駕是日賜臨安府官吏軍民等詔書曰朕萬騎時巡方圖逺略九廟未復其敢奠居比臨江上之師覬殄目中之冦遂頒前詔暫議還轅汝等並傾向日之心咸起望雲之意有嘉愛戴諒慰忠忱遂以二月丁丑發平江六年八月甲辰手詔略曰干戈未息疆埸多虞遣戍經時不離甲胄飛芻越險久棄室家爾則效忠朕寜不愧是用當饋投匕未明求衣弗辭馬上之勞以便軍中之務諒彼同舟之衆知我發軔之情咨爾有官各揚其職布告中外悉使聞知時張浚自江上歸力陳建康之行為不可緩朝論不同上獨從其計眉州布衣師維籓上中興十策請車駕視師下其議於朝浚以為可用會諜報劉豫有南窺之意趙鼎乃議進幸平江九月丙寅發臨安府癸酉次平江七年三月辛未幸建康八年二月戊寅車駕自建康府幸臨安府先是七年閏十月趙鼎議回蹕臨安趙鼎事實曰上議回鑾諸公初無異議鼎獨曰今日復回臨安四方必謂朝廷但務退縮無興舉之意豈知陛下聖算初不如此今固不可户曉唯是他日淮上有警却須前進皷作諸軍庻幾進退合宜上嘉納於是降㫖先發百司使民間預知乃以建康守臣兼行宫留守示往復兩都居無常所盖自十二月降㫖至明年二月始離江左期既不廹上下帖然以明年二月七日起發上因諭趙鼎曰建康諸官司及百官廨舍皆令照管他時復來幸免更營造以傷民力鼎等奏已令建康府拘收且言金人遂以大河之南歸我當且駐蹕建康以俟經營既至遂下詔曰昔在光武之興雖定都於洛而車駕往返見於前史者非一用能奮揚英威遞行天討上繼隆漢朕甚慕之朕荷祖宗之休克紹大統夙夜危懼不常厥居比者巡幸建康撫綏淮甸既己申固邊圉奬率六軍是故復還臨安内修政事繕治甲兵以定基業宫闕一大内在鳯凰山即杭州州治建炎三年二月詔以為行宫時執政奏屋宇隘窄上猶以百官六軍未得所居不御紹興元年十一月詔守臣徐康國措置草創有㫖不得華餙僅蔽風雨足矣未睱丹雘亦無害時修内司乞造三百間詔减二百二年九月南門成詔名曰行宫之門三年詔梁汝嘉創廊廡於南門之内以百官遇雨泥行非便十八年名南門曰麗正北門曰和寜門外各有百官待漏院東苑門曰東華二十八年增築皇城東南之外城時禁中間有營建大率因事立制務在儉樸列聖相承罕所增益内廷事秘臣下不能詳知今載大畧如左文徳殿正衙六參官起居百官聴宣布紹興十二年建紫宸殿上夀大慶殿朝賀明堂殿宗祀詳見後明堂門集英殿策士以上四殿皆即文徳殿隨事掲名垂拱殿常朝四參官起居紹興十二年建後殿淳熈六年間建延和殿垂拱及後殿之後皆有此殿遇聖節冬至正旦寒食大禮齋宿或避殿則御焉崇政殿即祥曦殿福寜殿御􅃦復古殿髙宗皇帝建理宗皇帝重修御製記曰復古殿者髙宗皇帝燕閒之所御也惟帝以聖神文武之資履中天艱難之運飈回霧塞民莫底寜先物沈㡬皇威耆定遂能削平羣冦攘却外夷炎徳重輝系隆帝統皇皇乎中興之功視周宣王漢世祖盖有光焉内殿禁嚴名曰復古以為省覽延訪之所厥既躋時乂安王度鼎飭謨烈闕垂祐無窮如豐水有芑數世之仁而兹實源委之所發也如日月照臨顯於西土而兹實光躔之所舎也固宜億萬斯年昭掲敬仰歳久弗葺䆮成陊圮其可緩歟臣以寡昧紹休聖緒奉先帝宫室常恐羞之何敢興創竊嘗肅瞻斯殿有慨慕風烈之心庶幾萬一之願因宿儲餘材益以禁帑命工繕修舊規是仍堅實是務無有逾侈落成協吉忱念保邦致治莫不有本我髙宗皇帝儲精蠖濩明見萬里聖心所運與天同大蓋不勉而中不思而得從容中道上聖之道也臣之菲冲奚可言此惟當堅持誠心祗率憲度周旋遵守如親面命聴言接下則惟忠直是尚安邉厚民則惟恵信是先兼咨訪之長戒清明之汩日積月累可測知祖道之淵源以養天下而愧未能也謹登載梗概併庸自警且以來忠告之善又御製詩曰烈祖謀詒燕冲人命紹龜禁嚴瞻復古締創想當時鳳紀因多厯翬飛欲寖隳端居常念此凉徳恐羞之勉輯炎興業新還舜禹規棟驤非玉瑱樸斵僅塗茨咫尺羮墻見延洪典則貽􅃡懐光宅舊儼若煥章垂聖志惟先定鴻名寓有為風烟沈廟算天日俯疇咨屏翰環方召言謨富卨䕫權綱歸總攬制度永維持養士翔鴛鷺蒐兵振虎貔宣王脩政日光武中興時文治綏函夏英威鬯逺夷萬年丕顯績三紀太平基繼述慙非稱規恢動慨思肯堂心翼翼景行日孜孜載繹車攻雅宜賡考室詩告成書梗概拜手緝蕪辭損齋紹興二十八年十一月内出御製親札損齋記石本賜羣臣諭宰執曰朕宫中嘗闢一室名為損齋屏去聲色玩好置經史古書其中朝夕燕坐亦嘗作記以自警記曰嘗謂當天下之正位撫域中之萬㣲茍日徇異物而無以立其獨則多見弊精神疲志意而不知止廣宴㳺事不急而牽於愛膠膠擾擾莫收其放心顧能回光抑損之道豈不較然有感於斯且漢唐之君樂道為切而未燭元覽者武帝以雄心内慕神仙外攘夷狄窮兵黷武天下騷然矣非用損以持盈也明皇以侈心委信逆臣彌縫斯文耽惑内嬖烟塵四溟矣非知損以守位也推原本指俱失滿戒兹鑒往事夕惕以思凡追逐時好一切長物率屏去不復經意常恐昧於省已積習易溺日叢脞於悔吝几案間但有書史以商畧古今盡撤無益示不貴之化其於蕩心侈目惑志害性者罔不掃除清心寡欲省縁薄費者奉以周旋焉不則染毫弄翰真草自如濃淡斜行茂宻惟意苐於筆硯間有未能忘情似賢乎已夫乾坤之道易簡也易簡則天地之理得矣傳曰器用不作車服從給信斯言哉宵旰餘暇乃闢殿廬之側明忩戸為㳺息之所欣然摭前説榜曰損齋朝夕清燕視以自警庻幾損徳之修自奉養有節式稽于訓選徳殿孝宗皇帝建以為射殿御坐後有大屏分畫諸道列監司郡守為兩行各標職位姓名又圖華夷疆域于屏隂詔學士臣周必大為記并書皇帝踐祚以来宫室苑囿一無所増修獨闢殿于禁垣之東名之曰選徳規橅樸壯為陛一級中設漆屏書郡國守相名氏羣臣有圖方畧來上可採者輒棲之壁以備觀覽數延文武講論治道詢求民隱至于中外奏報若軍國之幾務皆于省省决暇則紬繹經傳或親御弧矢雖大寒暑不廢臣必大俟辠禁林間嘗奉詔獲至焉一日命臣汝為之記臣愚學不足以推廣聖意詞不足以鋪陳事美謹采詩禮古文以射觀徳事及後世得失所繇次第其説禮君世子生三日射人以弧矢六射天地四方其早正素定若此至擇士以祭必於射也進退天下之才與祭者繇是得為諸侯卿大夫若属冇賔客之事燕勞之寵莫不用射詩人又于其獻酧歌咢之餘中度不中度罰爵與否有所休戚美刺以為是王公大人風化黎庻者之本也由是觀之古者君臣周旋禮樂以服習勤苦可不謂先事知懼安而能危者哉是故三代而上卿士皆可為將而兵民為一戎不生心世用底定比其季也徒以為威儀觀美而實不副馳騁弋獵而政不舉則國人為之隐憂而變風作其後王道䆮缺而文武兵農遂分而不合自秦漢而下其興衰治亂鮮不以兵一夫闗弓注矢則途之人往往麕驚兔逸之不暇烽燧纔舉而士大夫至無可使未免㧞將行伍之中何者其具素無也天錫陛下勵精百世之後追蹤太古之初謂射本男子之事非専于用武也射所以觀徳非専于覿威也故為是殿以延羣臣以裁幾務以閲圖史而命名則主乎射焉起居日用之間既已黙示躬行之㫖宜乎大小之臣與夫四方萬里之逺循其理思其義觀感而化從上攸好勝負之争而揖遜之寓勇力之尚而仁義之實閑邪安于真積習貫同乎自然可以興賢能可以詢衆庻合兵民于已判同文武之異轍將于是乎在昔者宣王中興其詩曰射夫既同助我舉柴釋之者曰是小雅盡廢而復古之詩也盖次有先後功在不舍沈潜剛克時乃天道陛下神聖必於此有得焉而臣何足以知之緝熈殿理宗皇帝闢舊講殿為之御製記曰大學曰自天子以至庻人壹是皆以脩身為本朕服膺所言知脩身必昉乎學學之有益於人也信矣在昔盛時創為學制由辟雍宫至于黨庠術序皆此物此志也故八嵗入小學教之灑掃應對進退之節禮樂射御書數之文王公以下與庻人之子弟皆預焉十五則元子衆子公卿大夫士之適子凡民之俊秀皆入大學而敎之窮理盡性修已治人之道夫人不可一日不學也如是况以一身任社稷生靈之寄者可不汲汲于此哉丕惟我國家列聖創述以稽古右文立治道以正身脩身為家法講學之懿超漢軼唐朕以凉薄紹休令緒遹遵成模祇廸懿訓罔敢暇逸師式于前聞眂朝之隟臨經幄日再欵對儒臣商略經史迺即講殿闢舊廬採成王日就月将之意扁以緝熙屏去長物裒置編簡燕閒怡愉蔵修移日習熟滋久若常程然至於繙閲古今尚友賢哲得片言以紬繹有味其㫖則不知萬幾之勞因一理以融會充廣于心則足窺宇宙之大意之所欣時寄翰墨無他嗜也于是天趣深而物交淺泰宇怡而外誘息名教之樂信有餘地視古帝王問學雖未臻閫奥亦将闖其門庭者庻幾増緝廣大進退于光明之境于以修身于以治國平天下期有合于大學之㫖而無負家法之傳顧不韙歟端平三年給事中兼侍讀臣洪咨夔進緝熈箴臣恭覩月正元日皇帝陛下御大慶殿受朝朝退中出奎畫詔増補講讀官夫天下之務衆矣而學為大故二典莫先于若稽古陛下襟道佩徳軌堯矩舜履端于始典學是崇豈特漢世重席于正旦以華觀聴哉虚心遜志日再御緝熙延見儒臣峩冠垂紳魚雅就列凡皇王帝霸之所以治天地民物之所以立莫不聚辨居行以進乎罔覺臣寡陋不足以望日月之末光躐升勸誦榮燭縑簡退惟恭在責難敬在陳善輒効虞人官箴王闕謹拜手稽首裁成一幅昧死塵獻于進讀之始文詞骫骳而翼翼寸衷日以髙明光大望陛下伏惟聖慈特垂采擇其詞曰灝穹生民作之君師中立一身宗主兩儀仁在自𢎞敬在自約剛在自克明在自覺盖尊莫尊于徳性㣲莫㣲于道心正能養于䝉則如泉之始達慾不窒于損則如澤之彌深是以大學止于至善中庸必謹其獨凖䋲規矩檢百為于將動盤杅几杖收一念于未逐惟定可以澄萬化之源惟虚可以来萬善之益惟博易可以培人才之氣惟寛静可以裕民生之力五事乃饗帝之本九經實用世之則關睢麟趾之意存則王政舉棠棣葛藟之義明則民彞植此帝王之所以正心而修身齊家而治國彼恵而姣臨春昭陽豈不爾思伐徳之鋩彼穠而郁糟隄肉林豈不爾思傷生之鐔况淫樂者志必荒沈湎者氣必昏前靡頋乎泰華之壓后遑恤乎滄溟之翻以四海大命供方寸之侈以百世惡名易一息之懽胡不思天命之不易王業之至艱欽哉毋謂天髙厥鑒匪近相在邇室莫見乎隠毋謂民卑其聴易欺鼓鐘于宫莫顕乎㣲故清燕而居必如駿奔在廟之頃向晦而息必如辨色眂朝之時所觀貴大毋梏于隘所慮貴逺毋局于淺毋功之徼惟莠驕驕毋利之涸惟木濯濯毋名之慕而實之棄毋才之尚而徳之遺毋任賢而貳毋去邪而疑毋愛直而疎毋喜正而違事毋輕于舉而中畫令毋易于出而遽移優㳺則威權遷姑息則紀綱壊牽親故之私恩則虧人心之公悦左右之小慧則累君徳之人以至舟偏重則失平樂泛試則徒快朝不和何以和于野内未治何以治乎外是皆有國者之通患願治者之深戒於乎道自學而入治自學而出思王度于祈招知稼穡于無逸惡㫖酒好善言三王四事之樞要放鄭聲逺佞人四代禮樂之根極行必力行積必真積小臣詔讀敢告執㦸熈明殿今上皇帝即東宫新益堂改建以為講讀之所御製記曰學之為王者事其已久矣天地民物之理聖賢言行之則與凡古今立政立事國家大經大法其本末源委精㣲曲折具在典籍博觀而約取之以措諸天下莫不由學學之用大矣中庸自博學審問慎思明辨篤行以至於盡性賛化育大學自致知格物誠意正心脩身以至於齊家治國平天下用此道也我朝烈聖相承汲汲然于是加之意闢書帷禮經士朝日二講寒暑靡倦用能明于理道追蹤帝王以成長治久安之業遺我後人式克至于今日猗歟盛哉朕奉先帝宫室無所改作惟兹廣厦所與士大夫坐而論唐虞之際今我曷敢後此殿之所以作也殿實東宫講堂先皇帝名以新益詔于冲子彞訓諄諄言猶在耳乃咸淳三年春三月落成掲熈明以襲緝熙壹是皆以敬之之意為本夫人之一心虚靈洞徹以該衆理而應萬事天髙地下日升月恒與此心實相為流通渾然之中而燦然無所不具夫是之謂本體之明自古在昔盛帝明王所為念念乎學其精一執中日新又新純亦不已之妙無非于其本然之明充而廣之大之而已故自其本諸精神心術之㣲而達之事事物物之間自其謹諸宫庭隠奥之地而推諸四方萬里之逺以之窮理則無所往而不通以之酬酢則無所處而不當于是其明益熈以廣矣詩曰穆穆文王於緝熙敬止蓋惟敬則有以涵養氣質之粹克去物欲之累洞見義理之實而熙明之功常如一日焉先皇帝以是傳之予一人以是學之佛時仔肩示我顯徳行惟師傅大臣暨厥儒碩益交修予俾予克邁乃訓亦克昭于有乂咸淳三年太傅平章軍國事魏國公臣賈似道以赴經筵進十箴臣聞帝王之盛必有兢業之戒詩書所述每寓箴諫之辭盖持盈思冲聖人之徳憂治危明忠臣之義恭惟陛下作其即位以来罔不惟徳之行臣知陛下可與為帝可與為王然髙明光大在與日以俱新出入起居必無往而不敬無疆惟休亦無疆惟恤於乎戒哉臣幸得出入經帷親承帝學每於入侍常恐膚陋不足補報重惟辨章之官豈當久任會且致為臣而歸則憂愛之懐益無所措兹縁處勞逸之間得研覃之暇因參稽經傳博考往昔竊伏念揚雄執㦸之卑猶有十二箴之諷徳裕賦政于外且進丹扆六箴之作矧備咨訪之末輒不自揆撰成古箴十首心為一身之主道為一心之主作存道心徳勝則性合于氣作尊徳性以位為憂不以天下為樂作思艱難以一人治天下不以天下奉一人作崇節儉樞機所發榮辱之主作謹言動毫釐之差千里之謬作審萬㣲巧言如簧小雅刺之作察邇言繁纓假人春秋譏之作惜公器酣酒為色荒之戒作戒彞酒左道乃亂政之門作屏異端一縷血忠因辭述意陛下不以其愚克永觀省是臣區區追先帝之遇而報陛下之心也涓塵助成于滄岱螢耀增輝于太陽斐然成章不知所裁惟聖明留意謹列十箴于左侵存道心民主于君君主于心本心有主外物莫穹壤中間惟道最大此道此心其大無外寂然不動繄我之天操之則存為聖為賢彼昏罔覺欲動情勝何以保之主一之敬尊徳性天命之性有貴于己相古先民平時顧諟履祇以興受侮以夷性無不善習是逺而喜怒之中常察于未發而中節和斯為貴惟敬故重惟惰乃輕惟徳勝氣乃性其情思艱難藝祖肇圖沐雨櫛風太宗纘之耆定伐功中興間闗惟我髙宗孝宗受之勤于天衷君哉穆考再造人極嫓彼父菑其墾其辟嗣有令緒身克艱難思之又思罔或不艱餘崇節儉大學有云食寡用舒不節之嗟將焉取一臺末耳以費而惜一袴幾何非功者嗇母曰我貴膳服惟王母曰我富凡賜無常利臣導奢倖人蠱嗜惟聖克儉節以有制諸謹言動王言作命君舉必書樞機榮辱可不謹觀聴攸闗莫嚴于朝起居生吝亦孔之昭風霆語黙天地動静一失其則為世所病外禁躁妄内斯静専頥之箴之我韋我弦神審萬幾萬事萬慮出天入塵莫㣲乎㣲其中有秋毫差忒駟追莫反弗畏入畏先患防患勿以細故曽是弗憂勿以小善曽是勿修履霜堅氷而于六月書不云乎兢兢業業察邇言易戒在腹詩畏長舌小信是固小忠是結有言遜志必求諸非誣善之人則㳺其辭日浸月潤惟膚易入百蹊千捷捷緝緝一語或讐讒賊之門舜何人哉猶察邇言惜公器唐宗有言為天下主曽不以我而私一府惟其無私能成其私貴傷于寵如飽嬰兒天此其職神此其器神輕則損天䙝則棄赤芾三百作刺惟鵜反其在笥謹之惜之王戒彞酒酒亂其徳亦自腐腸迺惡厥㫖在昔夏商飲長夜靡靡傾國漢驁浮鐘禍稔于色舞宫酣室二者相因毋腆兹酒以恫乃身此身罔小民之主矣保兹清明萬夀天子身屏異端莫赫匪天莫神匪民君位其間天人一徳能動天福在養人竒衺汚宫周禮斯敗曽謂唐君溺于諷唄名曰福應其應烏在彼何人斯而緇而黄厥有正符師式帝王有詔褒嘉曰朕惟古者師道之教訓傅傳之徳義是以薫陶涵養日進日新顧惟冲菲夙夜兢兢常恐羞先帝之休徳實賴師傅切劘規正陳善格非庻幾日聞儆戒之言輔其不逮師相以元勲碩徳粹學鴻文表儀廟堂領袖旃厦忠言嘉猷沃于朕心若無逸立政之書周公所以誨成王者惟日望之十箴來上肅容披誦正大淵奥表裏六經凡正心修身閑邪存誠克已復禮端本澄源所以防見聞之非節嗜好之過存畏懼之心者至矣盡矣仰惟先帝求哲輔後之意師相忠忱對越在天而淵源綱領根極理要豈六箴五規所能及先儒程頥謂輔飬君徳莫備於周公可謂萬世法今於師相見之尊其所聞行其所知朕曷敢不勉謹當書紳佩服列為屏障以代韋弦猶恐寡昧未足以進于帝王之盛更冀師相特恵藥石之言終始扶翼俾萬年其永觀是為冲人至望睠言忠藎載用褒嘉勤政殿今上皇帝咸淳二年即進食殿改建嘉明殿今上皇帝咸淳二年即東宫繹已堂改建欽先思孝殿紹興十五年建循東都舊制以奉祖宗神御咸淳臨安志卷一
