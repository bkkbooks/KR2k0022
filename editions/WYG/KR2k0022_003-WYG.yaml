body:
  text: 咸淳臨安志卷三宋潜說友撰行在所録郊廟郊丘在嘉會門外南四里龍華寺西紹興十三年正月禮部太常寺請依國朝禮制建壇於國之東南壇側建青城齋宫乃命領殿前都指揮使職事臣楊存中知臨安府臣王㬇等相視脩築為壇四成上成從廣七丈再成十二丈三成十七丈四成二十二丈分十三陛陛七十二級壇及内壝凡九十步中外壝通二十五步燎壇方一丈高一丈二尺在壇南二十步丙地餘四十步以列仗衛惟青城齋宫及望祭殿詔勿營臨事則為幕屋畧倣京師制度大殿曰端誠便殿曰熈成其外為泰禋門是年六月降詔曰朕嗣膺厯服越在東南念初載於維揚常肇禋於泰畤深惟累聖之成憲必遵三嵗之親祠四涓路寢之筵久曠圓壇之禮今日上穹垂祐邉境休兵冦盗弭寜民俗康阜日致慈寜之孝嵗收髙廪之豐格此多祥敢忘大報見祖禰於諸室合丘澤之一祠嘉與臣工共圖熈事朕以今年冬至日有事於南郊咨爾攸司各揚乃職相予肆祀罔或不恭十一月庚申始用元祐郊禮合祭天地設大神大示及太祖皇帝太宗皇帝配位并從祀諸神凡七百七十有一昊天上帝皇地祇位于壇上北方南向西上太祖皇帝太宗皇帝位于壇上東方西向北上席以蒲越天皇大帝五方帝大明夜明北極神州地祇十位于第一龕北斗天一太一帝座五星十二辰河漢等内官五行五嶽神位六十有九于第二龕二十八宿等中宫五鎮四海四瀆神位百七十有二于第三龕外官山林川澤丘陵墳衍原隰神位百五十有六于内壝之内衆星神位三百有六十于内壝之外第一龕席以藁秸餘以莞而席皆内向嘉泰三年増太子星庻子星宋星感生帝四神位設祭器九千二百有五鹵簿萬二千二百有二十人二十五年郊增三千人祭器應用銅玉者權以陶木鹵簿應用文繡者皆以纈代之隆興二年孝宗皇帝始郊改用獻嵗上幸詔曰朕比以軍興未遑郊見欲涓建已之月已戒先庚之期幸消弭於外虞懼稽遲於大報敬惟元日正得上辛合魯經啟蟄之文法周室用騂之禮神釐可逆猶漢帝拜於甘泉祖武是繩盖太宗行於至道式從改卜䖍舉彞章今以來年正月一日有事於南郊先是臣僚言國朝多用冬至乾徳元年藝祖皇帝初行郊禮是年冬至適在二十九日以其近晦遂改用十六日甲子取古人避天忌之説今初郊皆依乾徳故事然冬至亦在二十九日請詳議改用吉日故有是詔三年以寝殿在净明寺易安齋去青城稍逺乃徙寺之舊熈成殿於端誠殿後以充寝殿咸淳二年今上皇帝將親郊詔知臨安府臣洪燾修盖熈成殿寢殿其端誠殿諸門望祭殿仍用幕屋竣事撤之時以丁夘正月上辛行禮用隆興故事也太傅右丞相賈似道恭撰慶成詩以進皇圖新景運明徳典神天大報嚴郊始彌文軼帝先若稽參玉匱穆卜習瓊篿上日虞禋重寅正夏禮顓鴻儀時損益駿命日洪延乾徳垂元範隆興闡聖傳華㽔敷累洽懿鑠炳重宣紫畤觚稜左青城斗極邉雲緌駢蠖略星仗扈蜵蜎太室將晨祼齊宫掲夕䖍靈承懐洞屬稱秩奉明蠲爵羃匏茅秸龍章珽紞綖間鏞儀綷羽衡楅潔純牷衛㦸金枝植峩璋玉佩鋗琮方展黄粹璧美放蒼圓田燭騰熈彩京柴達信煙禮容昭􅆄飾祭本在心淵殷薦初行豫精誠夙厲乾孝思恭諒黙學典就仔肩儉樸丕齊俗寛𢎞大立賢輿圖恢蜀土烽燧息甘泉臘信標虞瑞春曦表物妍交神從可質式禮灼無諐鑾御回端闕雞書舞廣埏夀稱長樂晩嵩呼未央前使領慙雝相伻從忝集竣早衰徒備位知止盍歸田熈事登徽諜㣲忠旅頌篇三靈髙下顧一敬始終堅虎拜歌成昊於皇萬億年謹按國朝祀典嵗中祀上帝者四春祈上辛祈糓夏雩四月冬報冬至日皆即郊壇惟秋饗九月不壇而屋設位於浄明齋宫春夏冬遇雨亦望祭於此皆遣官行事明堂郊丘之嵗則饗報不重舉明堂即文徳殿謹按國初循隋唐制每嵗季秋大饗止於郊壇寓祭皇祐二年始議明堂饗帝饗親詔禮官討論是年九月辛亥行禮自是著為定制紹興四年詔曰朕饗帝以誠為民徼福顧時難備物訂郊報之未遑然禮有從宜用宗祈之繼舉將合袪於天地仍並侑于祖宗即三嵗之當祠裒百神而茂對頗益會稽之近制率循皇祐之前規庻格精禋克臻嘉貺朕以今年九月有事於明堂咨爾列位庇厥攸司相予祀事之恭毋怠官常之責既而太史局言自来明堂用九月上辛紹興元年九月八日辛丑縁未得九月節改用十八日辛亥今初五日辛亥亦未得九月節宜用十五日辛酉係節氣内上辛從之命守臣梁汝嘉同修内司度建禮殿設正配四位增從祀諸神凡七百六十七親灑御筆書明堂及明堂之門六字七年始用先朝親饗故事前二日朝獻景靈宫前一日朝饗太廟初宫廟皆寓温州每大禮率遣官分詣至是已迎奉神主於新太廟而景靈宫猶未建但即嘗御殿設位朝獻皆如南郊之儀孝宗皇帝即位以來四舉郊禮盖當時議者惑於嚴父之説不敢議及宗祀淳熈三年權禮部侍郎李燾始以為請不果行六年禮部尚書兼翰林學士周必大與諸儒再引燾議其説曰宗祀文王乃在成王之世則明堂不専以父配所謂嚴父者盖指周公推本武王之志追尊文王之功自周公言之故曰嚴父今若特舉秋饗於禮為允詔從之是年九月辛未遂合祭於明堂奉太祖太宗配如紹興禮故必大視草赦書明著尊祖之説曰惟成周宗祀洛中陟配於文王惟漢武合祠汶上推嚴於髙帝盖必大所自記云太廟在瑞石山之左紹興四年詔守臣梁汝嘉造用太常少卿江端友之請也正殿七楹分十三室祖宗室十一夾室二五年四月權太常少卿張銖奉迎神主至自温州五月二日車駕行欵謁禮七年改為聖祖殿時駐蹕建康載神主以行遂即建康立太廟十二月復奉神主還臨安十三年禮部太常寺修立郊祀前一日朝饗行禮儀注設七祀位於殿下横街之北司命户竈中霤門厲行又設祀饗功臣位於横街之南皆次内此據會要所書而舊志謂二十七年始復功臣七祀之祭未知何據當考十六年用給事中叚拂請釐正禮器而室隘不可陳列監察御史巫伋請増建廟宇乃從西増六楹通舊十三楹每楹為一室東西二楹為夾室又増廊廡作西神門冊寳殿祭器屋厙屋十九年建齋殿紹定四年燬後重建景定五年以垣南民居逼近厚給之直令徙他處即其地作致齋閣子四十四間前窽墻為小門又斥糧料院白馬神祠依山拓地為廟堧咸淳元年添置理宗皇帝祏室今通為室十四帳座皆當中而少近左盖右壁蔵神主又有二成之臺為祠官升下以奉神主出入之地故也配饗功臣位次太祖韓王趙普周王曹彬太宗太師薛居正太師石熈載鄭王潘美真宗太師李沆太師王旦太師李繼隆仁宗太師王曽太師吕夷簡侍中曹瑋英宗司徒韓琦太師曽公亮神宗太師富弼哲宗太師司馬光徽宗太師韓忠彦髙宗太師吕頥浩特進趙鼎蘄王韓世忠循王張俊孝宗太師陳康伯越王史浩光宗太師葛邲寜宗福王趙汝愚四祖廟在太廟諸室之西紹興五年建奉僖祖順祖翼祖宣祖每三年以孟冬祫饗即廟行禮次詣太廟景靈宫在新莊橋之西中興初四孟朝獻皆於禁中行禮紹興十三年臣寮言景靈宫以奉祖宗衣冠之㳺即漢原廟也按景靈宫本大中祥符五年以聖祖臨降而建神宗皇帝始廣其制今就便朝設位以饗未副廣孝之意遂詔臨安府同修内司相度脩盖即劉光世家所獻賜第基為之門曰思成前為聖祖殿宣祖至徽宗皇帝殿居中東西廊圖配饗功臣於壁元天太聖后與昭憲太后而下諸后殿居後殿各有名見後既成七月上行欵謁禮時神御猶在温州乃設幄行事十月吏部侍郎江邈始迎奉以至二十一年議廣殿宇韓世忠家復以賜第獻遂増建前殿五楹中七楹後十七楹自是齋殿進膳殿更衣殿寢殿次第皆備焉咸淳五年詔守臣潛説友重建後殿殿名聖祖天興后保寜宣祖天元后太始太祖皇武后儷極太宗大定后煇徳真宗熈文后衍慶仁宗美成后繼仁英宗治隆后徽音神宗大明后坤元哲宗重光后柔儀徽宗承元后順承欽宗端慶后纘徳髙宗皇徳后章順孝宗系隆后嗣徽光宗美明后光順寜宗垂光后體徳理宗章熈御圃在東齋殿之西循廡而右為大堂三臨池上左右為明樓旁有蟠桃亭堂之南為西齋殿大禮恭謝畢賜花於此西為流盃堂跨水堂梅亭北為四并堂皆咸淳五年重建又有橘園及桂竹各一區餘雜植四時花果亭宇不能備載崇禋舘在宫之南紹興十八年増建按朝野雜記國朝宗廟之制太廟以奉神主一嵗五饗朔祭而月薦新五饗以宗室諸王朔祭以太常卿行事景靈宫以奉塑像嵗四孟饗上親行之帝后大忌則宰相率百官行香僧道士作法事后妃六宫亦皆繼往天章閣以奉繪像時節朔望帝后生辰日皆徧薦之内臣行事欽先孝思殿亦奉神御上日焚香凡朔望節序生辰皆親酌獻太廟之祭以爼豆景靈宫以牙盤天章閣等以常饌用家人之禮云齋宫在錢湖門外恵照昭慶二院俱為朝廷祠祭奏吿之所恵照有壇殿有燎壇夏至日祭皇地祗立夏祭熒惑立秋祭白帝旁為齋宫昭慶有望祭殿立夏祭南方嶽瀆立秋祭西方嶽瀆兩廡為致齋閣子淳祐間守臣趙與􅊸重修浄明寺齋宫已附見郊丘太社太稷壇在觀橋東北自建炎至紹興初有司但奉行祀典而壇壝未建禮器未備紹興十二年臣僚建請禮寺討論始詔臨安府於城内擇地依制度建築以春秋二仲臘前一日祭其禮典視皇地祗壇之北有靈池遇旱不涸九宫貴神壇在東青門外一里紹興十三年因太常丞朱輅之請以春秋二仲舉行祭禮屋而不壇十八年太常寺主簿林大鼐乞詔有司建壇於國城之東從之壇制二成其一成方各百二十尺再成各百尺髙皆三尺壇四方各出一階西南坤道又為一階各濶五十尺上設小壇九從廣各八尺髙各一尺五寸相去十六尺壇下四面為兩壝各二十五歩禮料一視感生帝其九宫神位北曰太一西南曰攝提正東曰軒轅東南曰招摇中央曰天符西北曰青龍正西曰咸池東北曰太隂正南曰天一耤田先農壇在嘉會門外南四里玉津園之南紹興七年太常博士黄積厚乞享先農既而司封郎中李澗又乞詔有司講求祖宗親耕帝耤故事下臨安府撥田畆營建十五年十一月遂下詔曰朕勵精庻政撫世多虞念稼穡之艱難欲黎元之給足當食而歎靡敢遑寜今兹休兵息民流徙還業然而田疇未闢㳺惰尚多豈其三農失職而訓勉之道有未至歟仰惟前代親耕耤田為天下先醴酪粢盛於是乎出敦龎純固於是乎成使耕與養者知所勸向朕甚慕焉廼飭攸司經營千畝其以來嵗之春祗祓青氊親載黛耜躬三推之禮以風示於四方庻幾力穡服田仰事俯育興於禮義以致丕平顧不韙歟播告邇遐咸知朕意十六年正月親饗於先農壇神農氏南鄉以后稷氏配西鄉禮畢行耕耤有思文殿御耕位觀耕壇自後嵗祀先農於此髙禖壇在嘉會門外南四里中興初寓祭於錢湖門外恵照院齋宫紹興十二年太常寺博士劉爃乞詔有司講求壇位乃令臨安府於行宫東南城外隨宜修建十六年又以監察御史王鎡言下禮寺討論既而禮官援嘉祐二年故事謂宜在東方長男之位今壇在行宫東南巽地未合禮制宜於南郊壇之東相視改築㫖從之其祭禮設青帝神位版於壇上南向以帝伏羲氏帝髙辛氏配西向北上又設從祀簡狄姜嫄位於壇下夘階之南西向北上每嵗春分遣官致祭禮畢收徹二從祀禮饌弓韣刀矢入禁中皇后及宫嬪以次行禮十七年上始親祠海神壇在東青門外太平橋之東淳祐十二年有㫖中興以來依海建都宜以海神為大祀下太常議禮詔守臣馬光祖建殿望祭自寳祐之元嵗以春秋二仲遣從官行事咸淳臨安志卷三
