body:
  text: 咸淳臨安志卷十宋潜說友撰行在所録三衙殿前司在鳯凰山下麗正門之右有乾道四年御書閣凝香堂整暇堂山之上為月巖有亭曰延桂其最髙處曰介亭崖石嶙峋亭之後為冲天樓極海江湖山竒偉之觀侍衛馬軍司乾道七年虞允文為相移屯建康以為出師之漸號馬軍行司以邉帥兼領元有帥衙在保民坊今為司農寺将作監等公宇侍衛歩軍在鐡冶嶺西有乾道七年御書閣湖山堂錦繡樓相公井閤職閣門在和寜門外客省四方館在東華門北客省掌收接諸聖節進奉香及使人徃來接伴之禮四方館掌收接諸朔旦正至表及大禮賀表御前忠佐軍頭引見司在文思院後有等子營内諸司入内内侍省皇城司御藥院内東門司天章閣宴設庫後苑御前庫文字房睿思殿庫内藏庫綱房在六部橋東御前酒庫梅園庫在梅家橋南醋庫在望仙橋北御軍器庫内軍器庫御膳所翰林院禁衛所奉安符寳所主管徃來國信所在都亭驛同文館提舉修内司在孝仁坊内青平山口御前内轄司在東華門外東庫内東庫在東華門外西庫在孝仁坊内南庫在便門南北庫在新門外青器窰在雄武營山上圓壇左右八作司在内轄司東庫内教樂所在東華門外樂器庫在吴山天明宫側外庫慈元殿皇后殿呉益國位淑妃位昭儀位修容位美人位才人位御前應奉所在東華門外置造軍器處内司偹用庫御輦院在東華門外翰林司儀鑾司御服所御絲鞋所萬夀香所在中軍寨側道場庫通進司御馬院在麗正門右嘉惠門外良馬院在嘉會門外祗候庫主管翰林醫官局主管合同憑由局大内鑰匙庫已上司存並領以内侍惟皇城司則閤門御帯環衛官兼幹辨御膳所御酒庫翰林司儀鑾司則右選為幹辦邸第諸后宅昭慈聖獻孟太后宅在後市街顯仁韋太后宅在薦橋東咸淳五年十月朝廷以中興母后之家恩例視開國昭憲杜太后撥降錢米令臨安府重修家廟憲節邢皇后宅在薦橋南憲聖慈烈呉太后宅在州橋東成穆郭皇后宅在佑聖觀側成恭夏皇后宅在豐樂橋北成肅謝皇后宅在豐禾坊南慈懿李皇后宅在後市街恭淑韓皇后宅在軍將橋恭聖仁烈楊太后宅在漾沙坑夀和聖福皇太后宅在後市街今上皇后宅在崇新門内家廟五室諸賜祭器每四孟月以内御厨兵治祭饌以奉常禮直官賛相行禮諸王府濮安懿王府即嗣王所居為府呉王府在後洋街益王府在新橋秀安僖王府在後洋街荘文太子府在井亭橋劉鄜王府在明慶寺南賜第嵗月無所考開禧三年有㫖即賜第基建家廟儀制並同張韓今其家有御書家廟二字為扁子孫莫得而詳故弗及論著楊和王府在洪橋紹興二十六年詔賜家廟仍下将作監為祭器以賜嵗時行禮太常遣賛相者其所居第有閣夤奉御書孝宗皇帝賜奎畫曰風雲慶會之閣太傅平章賈魏公府在葛嶺景定三年正月理宗皇帝内出御札曰朕惟我朝褒表功徳具有彛典如趙普有翊戴之元勲則賜第宅於建隆文彦愽有弼亮之偉績則賜家廟于至和今丞相賈似道忠貫日月身佩安危滌除妖氛再造王室其元勲偉績不在趙普彦愽下宜賜第宅家廟令有司條具以聞公屢辭詔書下者屢公辭益力乃賜御札曰卿茂建元勲超軼千古社稷宗廟亦嘉頼之第宅家廟之賜猶未足以竟朕褒尚之意今卿免櫝屢陳乃以勞民重費其體國一念及此益用敬嘆特從所請仍以集芳園為賜可令封樁庫支撥緡錢百萬展拓規模就建家廟遂雅志也盖公舊有别墅在園之南故以賜焉公又辭上復親札勉諭曰賜卿邸第家廟朕之初意也以卿執謙過甚力控遜牘朕不得已有苑囿緡錢之賜卿乃復以給降之夥而有未安厥心之語卿盍思曩者妖氛未息天下大勢何如也自卿建此不世之殊勲民頼之而保其居朕頼之而保其國今雖竭公帑之儲猶未足以酬卿之萬一緡錢百萬尚奚足惜耶卿宜祗服休命毋復贅詞公猶懇避竟弗許於是奉常已討論禮制上於朝乃按舊典作新廟五室同宇饗以四孟月祭噐皆尚方所賜凡典領官吏掃灑軍馬與花果月頒之𨽻版曹及京兆府者悉如在京諸賜廟之儀資政楊棟撰廟碑宋有天下治出於一君勸臣承率本至孝動天地感鬼神穆穆明明並受多助是以履危而安遇險而平滔天之害禹成厥功冦賊姦宄臯討有罪至于迓續上帝之休建立社稷之䇿培桐梓集麟鳯驅魑魅剪樲棘汎汎國航磐石維之􅋫􅋫皇輿九軌馭之物來而神為之謀事至而人與之會莫知所以然者皆至徳大順之應也景定三年正月詔賜今太傅平章軍國重事魏國賈公忠貫日月身佩安危滌除妖氛再造王室勲績不在趙普文彦博下宜賜第宅家廟令有司條具以聞公以勞民費財辭而天筆下者十數公固辭遂命賜集芳園及緡錢百萬建廟公又辭天筆有曰卿盍思曩者妖氛未息天下大勢何如今民保其居朕保其國顧無以酬卿耳百萬緡何足惜耶天命諄勤不敢不拜乃卜賜園正基治位為門再重為宫五室五代祖太師居中左二室髙祖太師祖太師魏國公居之右二室曽祖太師魏國公王考太師忠肅魏郡王居之皆以妣配東西序為祀堂以祀旁親祭噐在東房名諱爵里譜系在西房庖庫在中門外大抵皆頌臺所定是年四月廟成祖考安樂天子有慶廟以崇徳賜以報功上悦下順休明之典也先是㓙憸當柄政斁備弛實啟戎心寳祐六年冬金空國南冦䝉古入蜀守将望風以城降恭惟理宗皇帝聖明獨㫁将盡付公以兵事明年改元開慶遂命公自樞宻使兩淮宣撫大使知掦州依舊樞宻使除京西湖南北四川宣撫大使提舉兩淮兵甲縂領湖廣江西京西財賦知江陵府尋節制江西二廣公受詔即日趋荆州辭府事進夷陵麾軍赴蜀㫁危梁于麻堆觧重圍于合江䝉古退呉蜀通呼喇初與其主期并入雲南之冦會合而東乃乗沿江隙偷舟羅洑擁衆夜渡公自荆疾馳拒守漢鄂身當百萬師晝夜死戰百餘日四面斬敵敵却走既全漢鄂又遣師勦賊于湘潭敵重兵猶駐鄂下流以俟南來之衆江閫遣将覘敵而舟覆師敗敵勢復壘于白鹿磯浮梁断江東西隔絶烽燧逹甘泉時凶憸雖斥而其醜聚汙合瀆亂中外土堕民觧無足憑者朝廷乃創宣閫于洪聨絡九江倚以扞蔽既而屯将遇敵潰敗敵益深入焚掠江西諸郡京城大震此天筆所謂天下大勢何如之時也于是天子飛親札諭公可移軍九江公讀詔泣下飭制臣謹守武昌獨携數百兵從間路夜穿敵脇冦自江西回適與之遇阨險疾擊斬其将揜其衆以行謂江州逺敵徑渡黄岡出敵之東上拜公特進右丞相樞宻使茂國公至是七閲月矣顧下流諸将制于洪閫事不統一公東望拜相命以右相勒兵泝水而上謂公在鄂旗鼓忽自東來駭汗顛踣遂大破其壘殱之無一得還敵由是大懲不敢窺江今十年矣此天筆所謂再造王室勲績不下趙文二公者也夫狂敵積數十年猾夏之志謀深氣盛卒然遇之如山裂海翻變異不測而公獨揮天戈西撑南擊及鉅狡横衝則親冐鋒鏑扳棘㧞險斡竒飛渡求一生于百死之中豈不知愛其身哉戰陣無勇非孝也聖祖神宗威靈在天乃祖乃父竭忠盡孝不知有身継其志服其事者在此立此心也目中已無敵矣理考念功勞勤之禮偹至兹斥靈囿開珍府成閟宫昭先烈皆所以彰明公志若昔帝王知教孝之光無所不通也感神與征苖同一至諴力溝洫與孝鬼神同一無間臣告君以七世之廟君命臣以世世享徳盤誥聱牙無非上帝先王暨乃父祖馨享之事褒賞申伯曰寖廟既成詠謌中興曰纉戎祖考盖幽顯一源君臣一體祖孫一氣幾動于彼誠動于此神應之妙非上智不足知之公既入相首建議立皇儲以尊宗廟繫四海心于是旌别淑慝登用賢俊㧞去憸邪斥絶苞苴宫府内肅户牖外綢皇綱一振景定五年奉皇太子即位垂紳正笏以安天下四方無虞年榖順成鐘磬鼎彛郊格廟享春秋祭祀逹于黎烝王通有言美哉公旦之為周也曰必使我子孫相承而宗祀不絶也深乎深乎安家者所以寕天下也存我者所以厚蒼生也程純公謂通有格言非荀楊所及其以是歟家國匹休人已俱立仁也孝之至也作廟之七年庭有碑而詞未立公以命棟夫風動四方允頼萬世禹臯之功大矣其必帝舜申之今斯人安居暇食以奉其先孰不樂此功而仰舜之盛徳乃繫之詩以聲于朝其詞曰天作髙山稽山之東兩兩而比神秀有鍾是應㤗階是生元輔匪今所鍾厥有宗祖維周諸姫世徳可推辟雍名流遂昌大之作牧参井悍将盤錯萬里身危能折其角開厥元帥䕶我淮甸聲被齊魯招携察變終老北門遺徳餘威生者有惮死者無歸惟孝有忠代代所授手整堪輿前烈是究先皇神聖逺料窮漢九天專命世臣付托狂敵謀我殆數十年一旦披猖齊入三邉奉辭徃禦震電轟雷天戈所揮䝉斃江開呼喇㓙狡隙罅覷巧揖揖漁艘苛征避撓江北有洑偷渡犬鼠初溱漢鄂百萬其旅順流赴危一以當千公何壮哉叱咤笞鞭麾軍南指衡岳湘潭刲敵無血猶帯嶺嵐冦却且遁睨江洪閫内驚京師殺氣猛狠公怒而起劍屨不俟草坪無路赤壁無艤先有帝敕下流辦賊公拜稽首捐軀臣職躍出其東敵駭旗幢瞻前忽後莫測神蹤厥角如摧弗赦龥哀以快吾事以懲厥魁㨗書夜奏天子断謨帝曰俞哉汝功永孚江湖淮廣酣寢甘飴社稷再安宗廟塤箎天清地寕一人以懌君臣相勑無忘今日何以報功廟宅是營若昔趙文亦有國勲我有靈囿北山之麓其木虬龍其水瑩玉匪我與爾髙皇嘉喜中興以來功孰汝比爰作閟宫㫁度尋尺太常所定桷楹孔碩赫赫官儀五廟帝師翼翼承祀圭衮委蛇相武翊成執競訪落國正法度邉停鉦柝惟彼憸人載媷載芟惟此良士實播實函氣郁和薰上際于天大雅無拂春秋有年黍稷馨止辨章受祉邦家之光與宋千禩子子孫孫載嘗楅衡勿替永年熈我頌聲直學士院劉克荘撰祭噐欵識維景定三年正月乙丑詔太傅丞相賈公似道奕世勲勞再造王室其賜家廟于行都乃作爼豆俾奉時薦萬子孫是永之園當湖山最佳處亭則清勝蟠翠雪香倚繡挹露玉蘃石則翠巖皆髙宗皇帝御扁至是理宗皇帝又賜六大字曰西湖一曲曰竒勛公遂増築二堂奉而掲之竒勛之右曰秋壑一曲之左曰容堂亦皆天筆也又因集芳之舊稍加營葺以侈君賜其尤為竒觀者曰無邉風月夐出林杪可以􅓊江曰見天地心近而湖山逺而胥濤越岫咸獻状於楹簷之下初陽臺正臨其上因築精舍紀葛仙故蹟而熈然臺蒼崖如削則刻賜園嵗月焉景定三年正月八日賈似道䝉上恩賜家廟第宅于行都辭勿獲因集芳園鄰舊居就賜給緡錢使營葺焉用謹欽承子子孫孫其毋忘忠報此其大凡餘不悉紀今上即位之三年公上相印引去詔拜太師鎮東軍節度使侍經筵未幾復相公勉就職再閲嵗引去彌切上莫能奪拜辨章許就居賜第以示優禮乃建節樓於容堂之北又名其西之堂曰遂初喜遂便養初志也堂顔則聖上所賜於是三朝雲漢之章昭回相望盛矣哉集芳之名不敢襲舊而更曰後樂云題詠平章賈魏公庚子歸葛嶺舊居詩罷官歸舊宅山水得頻過息影堤邉樹清心湖面波勞無功可紀頑有命相磨見説連朝雨田家正剪禾咸淳三年生日口號君恩猶使居湖曲年未為髙奈病何做却潞公官職了較來謝事不争多官宇左丞相府右丞相府樞宻知院府參知政事府同知樞宻府簽書樞宻府在太廟北大渠口紹興二十六年詔兩浙轉運司建三執政府又即都省北建左右丞相府後聚建於今處侍從宅在都亭驛東景定四年創為㕔十有二又有堂曰進思理宗皇帝御書刻石堂中吏部尚書陳昉恭䟦臣等恭惟國家駐蹕呉會東南旗盖運應中興太紫圓方侔天作制承平百年官府寺第固已粲乎隠隠各得其所矣爰自紹興給降御前錢造府以居執政乾道闢懐逺驛基以處臺諫而從臣休舍未有攸居國史無述焉景定四年秋從官宅始成其明年夏權禮部尚書臣子才因經度從容奏陳臣等䝉恩獲塵侍從幸得此屋而居又規其南隙地築堂三楹欲為自公退食之餘修進思盡忠之事臣敢昧死請宸翰賜進思二大字示臣子竚瞻秉心宣猷永昭無極奏函朝入天筆夕頒奎章聖藻日月並明旋題雲楣丹雘無色諸臣拜手稽首仰瞻神文相與言曰思之時義大矣哉禹臯之在虞廷其賛賛曰思孜孜曰思周公兼三王思四事孟軻氏兩以思言之荀林甫伯國之臣也其進思盡忠則仲尼取而列之經以為萬世臣子事君之大訓凡士自一命以上莫不職思其憂而侍從者論思獻納之臣也先正司馬文正公光因辭副樞論國事而曰臣未受命則猶從臣也于事無所不可言者古之為從臣盖如此彼有便文自營而謂君子思不出其位者偷也以樂慆憂而謂天下何思何慮者妄也若夫憧憧徃來朋從爾思而所營不過乎患得患失之間其於為人賢不肖又何如哉詩曰倬彼雲漢為章于天於昭皇文丕天之大律也又曰上帝臨汝毋貮爾心論思之臣其勉之臺諫宅在油車巷為㕔五又有㕔為會茶議事之所省院官宅在開元宫前卿監郎官宅在俞家園咸淳七年創七官宅在郭婆井五官宅在仁美坊三官宅在潘閬巷十官宅在舊睦親坊咸淳臨安志卷十
