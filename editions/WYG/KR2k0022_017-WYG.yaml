body:
  text: 咸淳臨安志卷十七宋潜說友撰疆域郡縣境唐元和郡縣志李吉甫州境東西五百五十四里南北八十九里八到西北至上都唐上都長安也三千四百里西北至東都二千五百四十里西南至睦州今建徳府三百一十五里東西至浙江至越州今紹興府一百三十里西至歙州今徽州四百七十里西北至宣州今寧國府四百九十六里東北至浙江入海處約一百里北至蘇州今平江府三百七十里唐不置秀州故無秀州一至皇朝太平寰宇記樂史州境東西六百一十七里南北九十九里四至八到東北至東京二千八十里西北至西京二千五百里西北至長安三千四百里東至蘇州今平江府三百九十里南至越州今紹興府一百二十里北至湖州今安吉州一百九十里西至歙州今徽州四百七十九里東南至思俗山至越州今紹興府縂一百七十里又云渡浙江一百三十里西南至睦州先改嚴州今建徳府三百一十五里西北至宣州今寧國府四百九十六里東北至蘇州今平江府三百六十九里東北浙江入海處一百里或謂寰宇志是唐以來所編而樂史特因之故亦無秀州一至元豐九域志王存東至本州界三百二十九里自界首至秀州今嘉興府一百二十里西至本州界三百三十八里自界首至歙州今徽州一百二十里南至本州界三十四里自界首至越州今紹興府九十里北至本州界六十五里自界首至湖州今安吉州九十里東南至本州界三十六里自界首至越州今紹興府一百三十五里西南至本州界一百六十四里自界首至睦州今建徳府一百五十一里東北至本州界一百一十六里自界首至秀州今嘉興府一十里西北至本州界二百五十里自界首至宣州今寧國府二百三十七里皇朝郡縣志范子長府境東西六百六十七里南北九十九里四至八到東至嘉興府二百四十九里西至徽州三百三十三里南至紹興府一百二十六里北至安吉州一百六十二里東南至紹興府一百七十一里西南至建徳府二百七十四里東北至嘉興府一百九十里西北至寧國府四百八里郡境東西六百六十七里一百三十六步南北九十九里三十三步陸路西至昱嶺二百四十三里入徽州界北至𨗳堆五十四里入安吉州界東北至七里店九十三里入嘉興府界西北至千秋嶺一百九十八里入寧國府界南至白峯鋪一百五十三里入建徳府界水路東至浙江㳂海廓瀝巷一百二十九里入嘉興府界南至浙江中流三十六里入紹興府界寰宇記云渡浙江一百二十里北至下塘大港五十四里入安吉州界東北至上塘運河九十三里入嘉興府界東南至浙江中流三十六里入紹興府界西南自浙江入溪至白峯一百五十三里入建徳府界錢塘縣望紹興二十七年詔依兩赤例堂除京朝官任滿與陞擢在城府治北四里水路五里東西三十二里南北七十五里東至仁和縣以市心大街為界一里南至紹興府蕭山縣以浙江中流為界二十五里西至餘杭縣以西溪閑林酒庫為界三十一里北至安吉州武康縣以狗頭嶺為界五十里東南至紹興府蕭山縣以浙江中流為界三十六里西南至富陽縣以社井為界五十五里東北至安吉州徳清縣界以奉口溪導堆為界五十四里西北至餘杭縣以雙牌為界四十里仁和縣望紹興二十七年詔依兩赤例堂除京朝官任滿與陞擢在城府治北九里水路七里東西六十一里二百步南北八十四里東至鹽官縣以上舍涇為界六十里西至錢塘縣以四姑橋河流為界一里南至紹興府蕭山縣以浙江中流為界三十里北至安吉州徳清縣以奉口溪導堆為界五十里東南至鹽官縣以赭山石橋為界六十里西南至錢塘縣以後洋街路口為界三里東北至安吉州徳清縣以博陸村為界八十里西北至錢塘縣以斜橋中流為界三里陸路東至上舍涇抵鹽官縣界七十里北至奉口導堆抵安吉州徳清縣界五十四里東南至赭山石橋抵鹽官縣界六十六里水路東沿運河至上舍涇港抵鹽官縣界七十里北沿下塘河至奉口溪導堆抵安吉州徳清縣界五十四里東北自江漲橋沿下塘河至博陸村抵安吉州徳清縣界八十八里東南沿湯村塘至赭山石橋抵鹽官縣七十里餘杭縣在府城西四十五里東西三十六里南北八十里東至錢塘縣以閑林為界一十八里西至臨安縣以社塢石橋為界一十八里南至富陽縣以牛竇嶺為界二十九里北至安吉武康縣以白茆山為界五十一里東南至錢塘縣以雙牌為界一十八里西南至富陽縣以顧望山為界二十里東北至錢塘縣以石瀨為界二十六里西北至安吉州安吉縣以獨松嶺為界九十里陸路東至府城四十五里西至臨安縣城四十五里南至富陽縣城四十五里北至安吉州安吉縣城一百三十五里水路東自裏河至本府四十五里西至臨安縣大溪乃天目山水源至本縣四十五里東自本縣至安吉州徳清縣大溪九十里臨安縣望在府治西九十里水路七十里河在二十里外東西五十八里南北七十六里東至餘杭縣以靈鳯鄉杜塢邨為界一十八里西至於潜縣以鳯亭鄉横塘堘為界三十里南至新城縣以鳯翦鄉葱坑為界四十五里北至安吉州安吉縣以大雲鄉合上村為界五十里東南至餘杭縣以平東鄉由拳嶺為界三十里東北至餘杭縣以慶雲鄉進賢村為界二十里西南至新城縣以鳯亭鄉釡嶺為界三十里西北至安吉州安吉縣以大雲鄉㠗嶺為界六十里陸路東至餘杭縣城六十三里西至於潜縣城九十里南至新城縣城一百一十五里北至安吉州安吉縣城一百八十里水路南溪發源于於潜天目山東流入縣四十五里又東入餘杭縣界二十八里於潜縣𦂳在府治西二百三里四十三步東西六十七里南北一百一十里東至臨安縣以横塘堘為界三十里西至昌化縣以新興村為界二十五里南至嚴州今建徳府分水縣以印渚村為界五十七里北至寧國府寧國縣以千秋嶺為界五十五里東南至新城縣以馬嶺為界七十五里西南至昌化縣以錢村為界二十八里東北至臨安縣以太清宫南溪為界四十八里西北至寧國府寧國縣以桐嶺為界七十里陸路東南至臨安縣界四十五里西至昌化縣界二十五里南至嚴州今建徳府分水縣界五十七里北至寧國府寧國縣界五十五里水路浮溪發源於天目山至縣郭七十里入嚴州今建徳府桐廬縣界富陽縣𦂳在府治西南七十三里東西五十八里南北一百三十八里東至錢塘縣以湖塘山為界二十五里西至新城縣以分𣲖峴為界二十五里南至紹興諸暨縣以夾巖山為界一百十里北至餘杭縣以顧望峴為界二十八里東南至紹興府蕭山縣以黄峴為界六十九里西南至婺州浦江以水樂里為界一百八十里東北至錢塘縣以犢峴山為界四十二里西北至臨安縣以頃山為界三十五里陸路東入錢塘縣界二十五里西入新城縣界二十五里南入紹興府諸暨縣界一百一十里北入餘杭縣界二十八里水路浙江在縣之南東入錢塘縣界二十五里西入新城縣界六十四里新城縣上在府治西南一百三十三里水路一百七十里東西九十五里南北九十里東至富陽縣以衆圃雙牌為界二十里西至於潜縣以寳福山為界七十五里南至嚴州今建徳府桐廬縣以小白峯山為界二十五里北至臨安縣以釡嶺為界七十里東南至富陽縣以深浦村為界二十一里西南至嚴州今建徳府分水縣以桐峴為界三十五里東北至臨安府以呉村為界二十五里西北至於潜縣以浮雲嶺為界七十七里陸路自富春門至富陽縣四十五里至餘杭縣九十里自桐江門至桐廬縣四十五里自新鎮門至臨安縣九十里水路自縣溪步東南至大江二十里鹽官縣在府治東一百二十九里東西一百三十里二百步南北七十里二百一十步東至嘉興府海鹽縣以金牛山為界八十三里西至仁和縣以丄舍涇為界四十七里二百步南至紹興府蕭山縣以浙江中流為界四十里二百步北至嘉興府崇徳縣以白塔為界三十里十步東南至紹興府餘姚縣以石碁山為界六十里一百二十步西南至紹興府蕭山縣自赭山入浙江中流為界五十四里二百步東北至嘉興府海鹽縣以横湖為界七十八里西北至安吉州徳清縣以大麻堰為界五十八里一百五十步陸路西北至義亭驛二十五里西至仁和縣界二十五里水路東至嘉興府海鹽縣界八十三里東北至大麻堰入安吉州徳清縣界二十三里昌化縣中在府治西二百四十八里三十步東西一百二十里南北一百四十里東至於潜縣以蘆嶺為界一十里西至徽州歙縣以昱嶺為界九十七里南至嚴州今建徳府淳安縣以黄坑為界七十里北至寧國府寧國縣以頃山為界一十五里西南至嚴州今建徳府淳安縣以沈嶺為界七十里東北至寧國府寧國縣以千秋嶺為界六十里東南至於潜縣以金雞嶺為界一十五里西北至徽州績溪以礲崆為界八十里陸路東至於潜縣城三十五里西去徽州歙縣城二百七里二百四十三步南去嚴州今建徳府淳安縣城一百八十里北去寧國府寧國縣城一百八十里咸淳臨安志卷十七
