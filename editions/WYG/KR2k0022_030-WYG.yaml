body:
  text: 咸淳臨安志卷三十宋潜説友撰山川九石城内外落星石在錢塘門外巨石山南嶺謂之青山頂有二圓石湖中望之若星墜焉郡國志云古塔山北有落星二石石龍在嘉會門外龍華山後下石龍浄勝院山有石突出宛似龍首故名乂有上石龍永夀院排衙石石衕已上二處詳具鳯凰山新婦石祥符志云在錢塘縣東南羅刹石詳具秦望山王子髙石在北郭稅務側驛亭上雲根石上有天亭記秦王纜船石在錢塘門外相傳秦始皇東遊望海􅋈舟於此陸羽武林山記云自錢塘門至秦皇纜船石俗呼西石頭北闗僧思浄刻大石佛於此舊傳西湖本通海東至沙河塘向南一岸皆大江也故始皇纜舟於此靈固石在方家峪水月寺慈雲嶺兩路口道堂後靈石在放馬塲側按祥符志有靈石在崇因報德院山舊嘗有祥光現又古跡事實靈石山在南山棲真院之上晉開運二年建院號興福山水環列松竹扶疎有靈石西菴後為左丞薛昻功徳院半山有菴泉石尤美皆以靈名石屏風在保叔塔崇夀院山卧龍石在石門澗或云在下天竺寺草堂前慈雲法師詩梅有和羮實龍無為雨心石上産梅故云石橋在武林山中詳見武林山石姥石在烏頭山之東髙五十餘丈有嶺南接運河塘石魚石筍在仁和縣超山古跡有石魚石筍錢塘無垢院亦有石筍臨安縣龍口石在縣北髙陸鄉臨溪有石如龍飲水石屏詳見天目山富陽縣三官下馬石在紫霄宫前鹽官縣秦王磨劍石在縣東六十里審山之巔於潜縣圍碁石在縣北五十五里千秋嶺泗洲菴閲武山前其石屹立髙峻上平如砥鄉老傳嘗有神仙圍碁於此道士石在縣東二十五里落雲塢之東其石特立山巔宛如衣羽衣而立又有石洞可環坐數人徐仙姑石菴石城石門石屋石倉石皷石柱石板石屏新郎新婦石望江石鐘樓石圍碁石石巷石菴洪氏可菴山石已上並詳見天目山仙人臺一在縣北四十五里天目山雲封菴北一在縣西岝蕚山虚亭下數歩一在縣西七里山有石壇古傳徐五二仙修真之地上極平曠一在縣東二十五里落雲山之巔四面壁峙上有石棊盤枰路如新下有石室廣十餘丈石室之前列石屏風髙數十仭又有走馬壇一在縣北烏省溪去縣三十五里有灘半里上有人馬足跡大小數百深入寸許明净可數前有山名天王基髙百餘丈四面皆石壘圓正如墓形其巔平地數畝常有泉流亢旱不竭世傳為會𦵏人馬跡新城縣仙人石在縣西六十里新安鄉上有萬年松状如柏與山之石俱以怪得名昌化縣石門在獅子巖西五里兩石壁立如門其中囬環三五里水㶁㶁循門而出俗傳神仙所棲掛簾石在縣南五十里有潘山峻㧞松林二十里山聳片石如室中垂簾下有石碁局松間有置窑造墨處亦神仙所棲金牛跡石在縣南金山二十八里舊傳古有金牛從洪下山透出經行下余村備峰直山腰過外有石壇濶三丈金牛憩石上留十數跡又有牧童卧及笠杖跡石鏡在龍髯嶺廟後瑩徹可鑒毛髪明則霽昏則雨邑人以為侯峪方家峪在錢湖門外路通慈雲嶺梯子嶺有劉娘子寺陳淑妃寺冷水峪在嘉會門外御馬院側夾山多桃花中有流水為城南勝㮣舊呼桃源遊人多集焉毛湫峪在龍山之南六和塔之北衕石衕在殿司山上詳具鳯凰山東山衕在耿家歩之北内有仙姑山唐家衕在九里松慕容妃墓之西馬家衕在九里松歩司前軍寨後塔衕在雷峯之後桃花衕在精進寺側篠衕在錢塘縣欽賢鄉盛家衕在浙江亭下塢城外掃帚塢在錢塘門外黄山橋楊梅塢古跡事實在南山近瑞峯石塢内有一老嫗姓金其家楊梅甚盛俗呼楊梅塢所謂金婆楊梅是也題詠楊蟠詩云夏日紅相照天晴塢自開㐮陽多穉子摘贈故人來郭祥正詩云紅實綴青枝爛熳照前塢不及杏繁時林間有仙虎錦塢在錢塘門外上智果院前寳雲菴下舊多花卉故以名之葛塢在靈隐山呉方士葛元字孝先居焉東晉大著作葛洪字稚川亦隐於此題詠郭祥正詩二葛既成仙猶存煉丹處有時化鶴來徘􅆦不知去楓木塢在中下竺之間今為呉榮王墳舊多楓木故名題詠楊蟠詩云太平雲外客行採老山中莫嘆秋霜早君看世上楓郭祥正詩云一塢藏深林楓葉飜蜀錦寄語别人家路遥露霜凜水竹塢在九里松行春橋南舊有水竹之勝今為歩司軍寨青枝塢在九里松石板巷玉泉後山靈石塢在楊梅塢後山真珠塢在石姥山嶺之西北石人塢在靈隐寺西石人嶺下龍駒塢在錢塘縣西溪中有秀邸墳法華塢在錢塘縣西溪中有嶽祠木塢在錢塘縣西溪中有沈侍郎墳新城縣太師塢在縣西十里折桂鄉袁村杜太師稜墓在其間鄉人不敢樵牧遂以是名塍田埂東西馬塍在餘杭門外土細宜花卉園人工於種接都城之花皆取焉或云堘當為城葢錢王舊城餘杭門外元自有北闗門今夾城巷乃故居也地與此相接題詠葉水心美趙振文游馬堘詩馬堘東西花百里錦雲繡霧参差起長安大車喧廣陌問以馬堘云未識酴醿縛籬金沙墻薜茘樓閣山茶房髙花何啻千金直着價不到宜深藏青鞋翩翩烏鶴䄂嚴勞引前金蒋後隨園摘蕋煎凍酥小分移床獻春酒陳通苖傅昔弄兵此地寂寞狐狸行聖人有道賁草木我輩栽花樂太平知君已於苕水住盡日櫓聲摇上渚無際滄波蓼自分有情碧落鷗徧聚追逐風光天漫許抛擲身世人應怒君不見南宫載寳囬何如趙子穿花去趙蹈中為趙振文賦馬堘歌舊聞城北有馬堘聚花成錦常留春我家苕水近來到輸他年少尋芳人相誇此地百金惜間出竒花萬錢直接貼飜騰費工巧揀樹移将闘顔色園紅愛花如子孫寸生尺長勤培根南隣北隣貧富改獨守養性經凉温凡今已得閑居趣扁舟暫向官塘路扳條摘蕋娯性情對月看雲想風度歌長詞逸不可當鬂髪垂白吟滄浪塵和葉水心馬堘歌昔年家住長安里春風盡日香起紛紛車馬過綺陌買花人多少人識王侯第宅連苑墻燦若瓊蕋敷丹房花窠近取馬堘本曲欄髙檻深宻藏主懽對客小舉䄂擊鼓吹簫滿前後真珠一斛聘國姝琥珀千杯酌天酒幾年農器不鑄兵雨耕雲穫歌且行種花土腴無水旱園稅十倍田租平拏舟來近菰蒲住演漾廽溪通枉渚霜晴沙淺橘林明日暮水渾魚網聚東門故侯應自許霸陵醉尉寕湏怒何當學稼隨老農荷鋤驅犢田中去姚劉後村次水心馬堘歌韻洛陽牡丹隔萬里棘荒魏扶不起馬堘近在杭州陌野人只向詩中識匀朱傅粉初窺墻海棠為屋辛夷房千林春色只呈露一株國艶猶閟藏多情荀令香透䄂俊遊恐落都人後摇鞭深入經雲郷觧衣旋貰黄藤酒淮南􅆚藥初過兵人生何必塞上行墜䄄委壤各有命肯學凍士鳴不平移家欲傍園翁住手開無地通蘋渚尋芳栩栩趂蝶飛逐臭紛紛憐蚋聚君不見元都吟筆妙燕許詩人却遣世人怒君若拏舟獨徃時我亦荷鋤相隨去過張芝田馬堘詩水拍田堘路半斜悄無人跡農家春風自謂専桃李也有工夫到菜花鮑家田在錢塘門外東山衕之北有玉泉水灌溉吳越相鮑君福賜田於錢塘至今名焉詳見人物門題詠呉亷静鮑家田詩摇斾家家酒扶犁處處村草深迷井口槿宻擁籬根緑水明秧本青山失燒痕多應忌蠶事畏客掩柴門羊角埂在錢塘門外溜水橋之北自柴塲至乳臺渡口延袤十餘里介於東西馬堘之間其形彎曲知羊角然闗桃花闗在嘉㑹門外包家山名桃花闗門上舊有蒸霞二字劍門闗在錢塘門外棲霞嶺上舊曰劍門闗亦名劍門嶺咸淳臨安志卷三十
