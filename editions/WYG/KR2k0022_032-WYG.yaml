body:
  text: 咸淳臨安志卷三十二宋潜說友撰山川十一湖上西湖在郡西舊名錢塘湖源岀於武林泉周廻三十里自唐及國朝號遊觀勝地及中興以來衣冠之集舟車之舍民物阜蕃宫室鉅麗尤非昔比先是城中以斥鹵苦於無水唐刺史李鄴侯泌引湖水入城為六井以便民汲刺史白文公居易又築堤捍湖鍾洩其水溉田千頃自為石記然歲久浚治不時往往湮塞錢氏始置撩湖兵士千人至國朝大中祥符初郡守王濟増置斗門以白公舊記刻石湖上焉天禧四年郡守王欽若奏以為祝聖放生池禁採捕及慶厯初守鄭戩發屬縣丁數萬人盡闢豪族僧寺規占之地仁宗嘉之降詔奬諭仍命歲常修導元祐五年守蘇軾奏臣聞天下所在陂湖河渠之利廢興成毁皆若有數惟聖人在上則興利除害易成而難廢昔西漢之末翟方進為丞相始決壞汝南鴻隙陂父老怨之歌曰壞陂誰翟子威飯我豆羮芋魁反乎覆陂當復誰言者兩黄鵠葢民心之所欲而託之天以為有神下吿我也孫皓時吳郡上言臨平湖自漢末草穢壅塞今忽開通長老相傳此湖開天下平皓以為己瑞已而晉武帝平吳由此觀之陂湖河渠之𩔖久廢復開事闗興運雖天道難知而民心所欲天必從之杭州之有西湖如人之有眉目葢不可廢也唐長慶中白居易為刺史方是時湖溉田千餘頃及錢氏有國置撩湖兵士千人日夜開濬自國初以來稍廢不治水涸草生漸成葑田熈寧中臣通判本州則湖之葑合者葢十二三年而今者十六七年之間遂塞其半父老皆言十年以來水淺葑横如雲翳空倐忽便滿更二十年無西湖矣使杭州無西湖如人而去其眉目豈復為人乎臣愚無知竊謂西湖有不可廢者五天禧中故相王欽若始奏以西湖為放生池禁捕魚鳥為人主祈福自是以來每歲四月八日郡人數萬㑹於湖上所活羽毛鱗介以百萬數皆西北向稽首仰祝千萬歲夀若一旦湮塞使蛟龍魚鼈同為涸轍之鮒臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而後食今湖狹水淺六井漸壞若二十年之後盡為葑田則舉城之人復飲鹹苦勢必耗㪚此西湖之不可廢者二也白居易作西湖石函記云放水溉田瀕河千頃可無凶歲今雖不及千頃而下湖數十里間菱茭榖米所獲不貲此西湖之不可廢者三也西湖深濶則運河可以取足於湖水若湖水不足則必取足於江潮潮之所過泥沙渾濁一石五斗不出三歲輙調兵夫十餘萬工開濬此西湖之不可廢者四也天下酒官之盛未有如杭者也歲課二十餘萬緡而水泉之用仰給於湖若湖漸淺狹水不應溝則當勞人逺取山泉歲不下二十萬工此西湖之不可廢者五也臣以侍從出膺寵寄目覩西湖有必廢之漸五不可之憂豈得茍安嵗月不任其責輙己差官打量湖上葑田計二十五萬餘丈度用夫二十餘萬工近者伏䝉陛下以本路饑饉特寛轉運司上供米斛五十餘萬石又特賜本路度牒三百而杭當得百道臣謹以聖意增召入中米減價出賣以濟饑民而増減耗折之餘尚得錢米約共一萬貫石臣輙以此錢米募民開湖度得可十萬工自今月二十八日興工農民父老縱觀太息以謂二聖既捐利與民活此一方而又以其餘興久廢無窮之利使數千人得食其力以度此凶歲葢有泣下者臣伏見民情如此而錢米有限所募未廣葑合之地尚存大半若來者不嗣則前功復棄深可痛惜若更得度牒百道則一舉募民除去净盡不復遺患矣陛下少賜詳覽察臣所論西湖五不可廢之狀利害卓然特出聖斷别賜臣度牒五十道仍勅轉運提刑司于前來所賜諸州度牒二百道内契勘賑濟支用不盡者更撥五十道價錢與臣通成一百道使臣得盡力畢工半年之間自見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同沐聖澤無有窮已臣不勝大願一自來西湖水面不許人租佃惟茭葑之地方許請賃種植今來既將葑田開成水面須至給與人户請佃種茭深慮歲久人戸日漸侵佔舊來水面種植官司無由覺察已指揮本州候開湖了日于今來新開界上立小石塔三五所相望為界應石塔以内水面不得請射及侵占種植如違許人告每丈支賞錢五貫文省以犯人家財充一湖上種茭人湖自來臠割葑地如田塍狀以為疆界縁此即漸葑合不可不禁今來起請應種茭人户只得標插竹木為四至不得以臠葑為界如違亦許人剗賃一本州公使庫自來収西湖菱草蕩課利錢四百五十四貫充公使今來既開草葑盡變為菱蕩給與人戸租佃即今後課利亦必稍増若撥入公使庫未為穏便今來起請欲乞應西湖上新舊菱蕩課利並委自本州量立課額今後永不得増添如人戸不切除治致冇草葑即許人剗賃其剗租人特與權免三年課利所有新舊菱蕩課利錢盡送錢塘縣尉司收管謂之開湖司公使庫更不得支用以備逐年雇人開葑撩淺如敢别將支用並科違制一錢塘縣尉廨宇在西湖上今來起請今後差錢塘縣尉銜位内帯管開湖司公事嘗切點檢纔有茭葑即依法施行或支開湖司錢物雇人開撩替日委後政點檢交割如有茭葑不切除治即申所屬點檢申吏部理為遺闕以上條件並刻石置知州及錢塘縣尉㕔上常切㸃檢此奏藁真蹟見留平章賈魏公家藏紹興十九年以西湖近來穢濁堙塞詔郡守湯鵬舉措置遂用工開撩及修砌六井陰竇水口増置斗門閘板量度水勢通放入井且條具事宜一檢准紹興九年八月指揮許本府招置廂軍兵士二百人見管止有四十餘人今已措置撥填凑及元額葢造寨屋舟船專一撩湖不許他役一契勘紹興九年八月指揮差錢塘縣尉兼管開湖職事臣今欲專差武臣一員知通逐時檢察庻幾積日累月開撩不致依舊堙塞一契勘西湖所種茭菱往往于湖中取泥葑夾和糞穢包根墜種及不時澆灌穢汚紹興十七年六月申明今後永不許請佃栽種今來又復重置蓮荷填塞湖港臣已將蓮荷租課官錢並已除放訖如有違犯之人科罪追賞有官人具申朝廷取㫖施行乾道五年周安撫淙奏臣竊惟西湖所貴深濶而引水入城中諸井尤在涓潔累降指揮禁止抛棄糞土栽植茭菱及澣衣洗馬穢汚湖水罪賞固已嚴備舊招軍兵二百人專一撩湖委錢塘尉主管後來廢闕見存者止三十五名而有力之家又復請佃湖面轉令人戸租賃栽種茭菱因緣包占増叠隄岸日益填塞深慮歲久西湖愈狹水源不通臣近已重修諸井溝口了畢今欲増置撩湖軍兵一百人修葢寨屋置造舟船就委錢塘縣尉并本府壕寨官一員於銜位内帯主管開湖事專一管轄軍兵開撩不許人戸請佃種植茭菱及因而包占増叠隄岸或有違戾許人告捉以違制論㫖從之自後時有申明淳祐丁未大旱水盡涸詔郡守趙與􅊸開濬仍奉朝命自六井至錢塘門上船亭西林橋北山第一橋髙橋蘇堤三塔南新路栁洲寺前凡菱荷芰蕩一切薙去之孤山路在孤山之下北有斷橋南有西林橋其西為裏湖樂天詩誰開湖寺西南路草緑裙腰一道斜自註云孤山寺路在湖洲中草緑時望如裙腰舊志云不知所從始蘇公隄元祐中東坡既奏開浚湖水因以所積葑草築為長堤起南迄北横截湖面綿亘數里夾道雜植花栁中為六橋行者便之坡嘗賦詩云六橋横截天漢上北山始與南屏通忽驚二十五萬丈老葑席卷蒼烟空嗣守林希榜曰蘇公堤邦人祀公隄上後十年郡守吕惠卿奏毁之堤間齧於水郡常隨時修治訖罔克久咸淳五年朝廷給錢命守臣潛說友増築載礫運土填窪益庫通髙二尺袤七百五十八丈廣皆六十尺堤舊有亭九亦治新之仍補種花木數百本小新堤淳祐二年趙安撫與􅊸築自北山第二橋至麴院步夾岸植栁如蘇隄路通靈竺半隄作四面堂一亭三以憇遊人咸淳五年併行修築聚土増髙通二尺許袤凡二百五十丈廣皆二十五尺其費亦朝廷所給賜也豐樂樓在豐豫門外舊名聳翠樓樓據西湖之㑹千峰連環一碧萬頃栁汀花塢歴歴檻欄間而遊橈畫艗櫂歌隄唱往往㑹合於樓下為遊覽最顧以官酤喧雜樓亦卑小弗與景稱淳祐九年趙安撫與􅊸始撤新之瑰麗宏特髙切雲漢遂為西湖之壯其旁花徑曲折亭榭參差與兹樓映帯搢紳多聚拜於此三賢堂孤山竹閣舊有白樂天林和靖蘇東坡三像後廢乾道五年周安撫淙即水仙王廟之東廡祠焉嘉定十五年袁安撫韶請於朝竊見本府三賢堂實為尊禮名勝之所攷之圖經更易非一其始孤山廣化寺有白公竹閣因其遺跡而祀白公後人以東坡和靖附焉南渡之後就孤山剏延祥觀遷廣化於北山路口僅移竹閣而堂廢不存乾道五年知府事周淙乃重建於普安寺側水仙王廟之東廡葢取東坡詩配食水仙王之意殊不知此詩之作特為和靖而樂天東坡併以配食大失本㫖況水仙王儷居其中三賢俛居廡下郡守謁晴禱雨幄帷迫近固已不敢安處而吏卒喧囂箕踞自若慢賢滋甚何以祀為竊惟三賢道德名節震耀今古而祠宇未嚴何以崇教化而厲風俗又其勝踐陳蹤咸在西湖孤山大隄之間今乃僻處巖阿與湖光敻不相接榛莽蔽翳棟宇傾頽位置尤為弗稱韶假守以來即欲更建未得爽塏搜訪久之近踏逐到廢花塢一所正當蘇隄之中前挹平湖氣象清曠背負長岡林樾深窈南北諸峯嵐翠環合遂於此地築叠基址且闢大逵與蘇隄貫連鳩材命工建立堂宇奉安三賢庻幾妥魂得地復還古蹟都邑人士知所尊敬其祠堂之外參錯亭舘周植花竹以顯清㮣續竢工役了畢製畫圖本繳申從之又有堂三曰水西雲北曰月香水影曰晴光雨色吏部侍郎程珌為記先賢堂寶慶二年袁安撫韶又請於朝伏覩乾道中忠定史越王以故相鎮越於鏡湖立先賢祠凡㑹稽先儒髙士掲石分享遂為一郡盛典近者朝家復賜緡錢葺而新之又金陵因卞壼舊宅亦取江左諸賢萃為一祠皆所以見尊禮名勝昭示民則之意杭居呉㑹為列城冠湖山清麗瑞氣扶輿人傑代生踵武相望祠祝未建實為闕文仰惟聖神御極萬化維新飾治以文増光儒道其在首善之地若兹逸禮庸可不搜舉而振起之韶承乏京邑職在宣化昨以三賢祠宇位置弗稱已更諸爽塏獨先賢祠典未秩營度有日擇勝良艱近聞南山之北新堤之上居民有以屋廬園池求售者因捐公帑以酬其直計緡錢七十有畸嘗躬往相視其地前挹平湖四山環合基址夷曠意象窈深今欲建立堂皇表以臺門翼以廊廡繚以墻垣通以橋梁剏為嚴奉先賢之所併欲稽考歴代史傳及百家之書并郡志所載凡忠臣孝子善士名流有德行節義學問功業足以表世厲俗者詮次事實撰述繫贊勒諸堅石列置中堂將以旌前節而淑方來隆上都而觀萬國其於教化實非小補涓日鳩工以次興建所合具申朝廷欲乞劄下本府以憑遵守施行從之乃取本郡自古名德許箕公而下凡三十四人及孫夫人以下五代具述事蹟刻石作贊祠宇雖濱湖入其門一徑縈紆花竹蔽翳亭相望五六來者繇振衣歴古香循清風登山亭憇流芳而後至祠下既又徙玉晨道宫於祠之艮隅以奉灑掃而易曰旌德且為門便其往來直門為堂曰仰髙中書舍人王塈為祠記按許由事出莊子謂不受堯遜而娛於穎陽太史公傳伯夷曰余登箕山其上葢有許由塜且疑孔子序列古之仁聖賢人獨由不少㮣見子長愛竒人也而於逃隠之事猶未之信亦以世逺薦紳先生難言之故耳指為杭人而列之祠固不害為尊賢之意然必實有所據始可傳信淳祐志覺其非以為晉許㳺居昌化晩山即許逺遊也嘗採藥於潛遺跡為許㳺觀葢由㳺二字同音而訛此說是矣然羊裘一翁清風萬古以此託始豈不足為杭重而必牽合傅㑹寓言者以為誇耶湖山堂在南新路第二橋西咸淳三年洪安撫燾買民地創建棟宇雄傑面勢端閎岡巒奔趨水光滉漾四浮圖矗四隅前則雷峯保叔後則南北二髙如武士呵衞回眸顧盼繇後而望則芙蕖菰蒲蔚然相扶若有遜避其前之意後三年安撫潛說友増建水閣六楹又縱為堂四楹以達於閣環之欄檻闢之櫺牖邇延逺挹盡納萬景卓然為西湖最遊者争趨焉玉蓮堂在錢塘門外菩提寺南景定二年馬安撫光祖建明年魏安撫克愚既徙郡治之竹山閣併奉玉蓮堂奎扁掲於此江湖偉觀在葛嶺夀星寺外江内湖一覽在目淳祐十年趙安撫與􅊸重創廣厦危欄顯敞虚曠旁又為兩亭可登山椒望湖樓在錢塘門外一里一名看經樓乾德五年錢忠懿王建十三間樓在錢塘門外大佛頭纜船石山後東坡守杭日多遊處其上今為相嚴院湖堂在豐豫門外堂前有集賢亭右有聳翠樓右望湖樓以下三處今皆廢名賢遺迹不可無傳故特著焉放生池天禧四年守王欽若建請見前明年守王隨記其事元祐五年蘇軾請浚西湖謂每歲四月八日郡人數萬㑹湖上所活羽毛鱗介以百萬數皆西北向稽首祝千萬歲紹興間臣寮言鑾輿駐蹕王氣所存尤宜涵養以示渥澤乞仍以西湖為放生池禁勿採捕慶元四年趙安撫師􅋷創德生堂於石涵橋之西又作二亭其一濱湖為祝網縱鱗之所名曰泳飛其一枕山凡舊刻新銘皆峙焉見髙内翰文虎所為記淳祐八年趙安撫與􅊸既更為堂又新濱湖之亭二扁皆丐理宗皇帝奎畫又有御筆戒烹割刻石立堂上見詔令門其覆碑之亭咸淳六年安撫潛說友所更建咸淳臨安志卷三十二
