body:
  text: 咸淳臨安志卷四十宋潜説友撰詔令一在昔帝王發號施令諭之四方其見於經者繇舜咨牧始杭屬揚州有厚徳允元之澤焉自越有國訖三代之季外史所書撢人所誦無得而詳也髙祖王濞武帝守助選建責成之意具載數十言間猶庶幾於古厥後東晉史厪一二見入國朝播告之修治洋洋著於册嘗拜手敬誦大哉王言省刑罰薄税歛殆什六七蓋列聖仁厚家法於以培億萬年無疆之基者在是聖上嗣大厯服卻貢寛民用為出治綱領而京兆尹以圄空被奬勸者嵗中且至再也嗚呼仁哉叙詔令漢髙祖封吳王吳古之建國也日者荆王兼有其地今死亡後朕欲復立吳王其議可者景帝赦吳吏民廼者吳王濞等為逆起兵相脅詿誤吏民吏民不得已今濞等已滅吏民當坐濞等及逋逃亡軍者皆赦之武帝賜嚴助書制詔會稽太守君厭承明之廬勞侍從之事懷故土出為郡吏會稽東接於海南近諸越北枕大江間者濶焉久不聞問具以春秋對毋以蘓秦從横晉元帝旌録吴髙徳名賢漢髙經大梁美無忌之賢齊師入魯修栁下恵之墓其吳之髙徳名賢或未旌録者具條列以聞恤吳郡饑天下凋弊加以災荒百姓困窮國用並匱吳郡饑人死者百數天生蒸黎而樹之以君選建明哲以左右之當深思以救其弊昔吳起為楚悼王明法審令損不急之官除廢公族疎逺以附益將士而國富兵強况今日之弊百姓凋困耶且當去非急之務非軍事所須者皆省之孝武帝除三吳租布三吳奥壤股肱望郡而水旱併臻百姓失業夙夜惟憂不能忘懷宜時賑卹救其凋困三呉義興晉陵及會稽遭水之縣尤甚者全除一年租布其次聽除半年受賑貸者即以賜之國朝太宗皇帝曲赦兩浙徳音惟皇建極括寓縣以開階惟辟奉天法陽春而流恵我國家丕承大業光宅中區奄三代之提封盡歸王化撫萬邦之生聚皆樂皇風近又吳越國王錢俶逺效忠規嘉逢昌運走梯航而入覲叩宸扆以披誠願輸奕世之土疆盡入大朝之封域睠兹恭順特議允俞言念吳方久疎王澤當混同之資始均茂育以攸宜爰頒在宥之大俾預太平之化應兩浙管内云云於戯四海一家既大同於文軌三吳百越屬初被於照臨固於撫御之間良軫寐興之念彼中官吏差去使臣更施存恤之方廣示懷柔之道令其富庶慰朕焦勞告示遐方知予厚意詔兩浙諸州自太平興國六年逋租及錢俶日無名掊歛吏至今猶征督者悉除之太平興國七年十二月時兩浙運使髙冕條上舊政不便者百餘事故有是詔詔免杭州民間隨税酒錢雍熙二年六月先是兩淅漕司罷杭州𣙜酤令民隨税輸錢既而富家擅利貧弱重困遂詔復舊制停所均錢詔兩浙諸州先是錢俶曰民多流亡棄其地為曠土宜令所在籍其壠畆之數均其租每嵗十分減其三以為定制仍給復五年召游民勸其耕種厚慰撫之以稱吾務農厚本之意淳化元年九月詔兩浙諸州民先負錢俶日官物計錢十一萬七千五百緡並除之淳化五年七月真宗皇帝詔杭州寺院童行錢氏所賦身丁錢悉除之至道三年八月即位未改元詔杭州市舶司自今蕃商賫鍮石至者官為收市斤給錢五百以初立科禁也咸平二年八月時三司定直斤止錢二百上特增詔免杭州中等户今嵗丁身錢咸平二年十月癸酉以旱故也時張詠為守詔奬知杭州張詠咸平四年九月時州民詣闕乞留詔令杭州吳山廟春秋建道塲詔曰杭州吳山廟神實主洪濤聿書往冊頃者湍流暴作閭井為憂致禱之初厥應如響禦災捍患神實能之用竭精衷有加常祀庶憑誠感永庇吾民宜令本州每嵗春秋建道塲三晝夜罷日設醮其青詞學士院前一月降付大中祥符五年五月詔諸州轉賣金箔人並減元犯罪人一等大中祥符五年六月時杭州民周承裕私煉金為箔有鄭仁澤者嘗市得千枚轉鬻於人事敗全家徙配及是本路轉運使陳堯佐上言情異罰同恐傷欽恤之意故有是詔詔杭州發廩賤糶以濟貧民大中祥符六年正月時轉運司陳堯佐言杭州米斗錢六十皆淮泗不稔行商販鬻致有增價乞行禁止詔不許詔近聞杭州葺江岸卒執役水中苦足疾而死者甚衆宜令知州馬亮拯療之大中祥符九年九月賜王欽若判杭州詔曰鈞衡翊贊素彰勤藎之心藩翰鎮臨方佇恵和之績眷言倚任用示褒稱天禧三年六月詔奬判杭州王欽若酒𣙜增羡獄空天禧四年七月仁宗皇帝詔知杭州自今並理三司判官轉運使副資序明道元年七月詔褒諭知杭州俞獻卿作捍江石隄成景祐三年詔知杭州捍江軍士自今無得它役景祐四年六月詔遣中使往杭州致祭江潮景佑四年六月杭州言是月大風江潮溢岸髙六尺壞堤千餘丈故有是命神宗皇帝詔杭州洞霄宫照嵩山崇福宫置管署或提舉官煕寧三年五月時以諸臣厯監司知州有衰老不任職者令與閑局王安石亦欲以處異議者故増宫觀員詔於京東見管軍馬内以三千人戍揚杭江寧熙寜五年七月詔杭州選捍江兵四百人為教閲捍江指揮専習武藝熙寜五年十一月詔杭州録事叅軍係繁難處今後並差職官知縣及奉舉縣令人熙寜五年詔杭州鹽官於潛各増主簿一員熙寧六年十月以事劇從轉運司請也詔以新修經義付杭州鏤版所入錢封椿庫半年一上中書禁私印及鬻之者杖一百許人告賞錢二百千熙寧八年七月從中書禮房請也上批髙麗僧三人見寓杭州天竺寺可令鈐轄司差指使一名乘驛引伴赴闕熙寧九年十二月詔杭州禁民毋以言涉邊機文字鬻髙麗人元豐三年四月詔杭州以錢氏臨安縣田産課入嵗賜表忠觀錢五百千葺吳越王墳廟元豐五年三月詔除杭州買撲場務積欠淨利過月錢元豐五年五月從司農寺丞韓宗良請也哲宗皇帝詔杭州管病坊僧人每三年醫較千人以上特賜紫衣及度牒一道元祐六年八月從蘓軾請也詔卲光與本路監司同導積水元祐六年閏八月時知杭州林希言太湖積水未退乞専委監司開決庶使民田復出流移歸業髙宗皇帝放免租税紹興二年正月朕遭時艱難遂為行國凡駐蹕去處理合優異寛恤民力始稱朕懐其臨安府諸縣人户拖欠税租等物者依去秋明堂赦令合行倚閣者並特與放免如官吏日後復行催納者依沮格詔令科罪罷修造紹興二年正月比移蹕臨安六宫尚留㑹稽者政縁不欲増廣行闕重困民力訪聞行在係官修造去處甚多可日下並罷自今後非得㫖許令増修而輒敢擅役人夫者令御史臺紏彈以聞仍令尚書省出榜曉示頒行太宗皇帝御製戒石銘紹興二年六月近得黄庭堅所書太宗皇帝御製戒石銘恭味㫖意是使民於今不厭宋徳也因思朕異時所厯郡縣其戒石多置欄檻植以草花為守為令者鮮有知戒石之所謂也可令摹勒庭堅所書頒降天下非惟刻諸庭石且令置之座右為晨夕之念豈曰小補之哉左僕射吕頤浩等謹題曰臣等竊惟太祖皇帝武定天下而太宗皇帝文以撫之是時五代之餘遺民赤子新去湯火哀矜優綏寄在守令乃發大訓垂諸庭石如雲漢在天為光昭回其施在下則為露為雨民涵斯澤豈其有極而吏更嵗久或不知誦斯文矣皇帝撥亂愛民規橅祖宗乃六月癸巳詔以黄庭堅所書刻之石將以墨本賜天下使日見而知戒焉嗚呼此盛徳大業之本豈特讀貞觀政要而太息哉臣等材駑不足以任萬分而知賛且勵蓋不獨郡邑之吏恍然于兹賜也謹昧死書于左方禁買花木珍禽紹興二年八月訪聞行在漸賣花木窠株或一二珍禽此風不可長及有舟船興販多以旗幟妄作御前物色可嚴行禁止或官司合行收買者須明坐所属去處其花木窠株珍禽可劄下臨安府諸門曉示不得放入蠲免兩縣民户地基和買紹興三年二月此聞臨安府錢塘仁和兩縣昨經兵火焚毁其民户居止唯存地基而又有為官府營寨拘占者尚依舊家業錢均敷和買絹數既無從出豈免逋負追呼催索在所愍恤可令本府契勘見為官占去處許計家業錢蠲免絹數仍具榜示答參政孟庾請車駕回臨安紹興五年正月十九日答守臣梁汝嘉迎囬車駕賜官吏軍民同日定都臨安府紹興八年已上三詔並見行在所録親耕耤田紹興十六年二月朕惟兵興以來田畆多荒故不憚卑躬與民休息今疆埸罷警流徙復業朕親耕耤田以先黎庶三推復進勞賜耆老嘉與世俗躋於富厚昔漢文帝頻年下詔首推農事之本至於上下給足减免田租光於史冊朕心庶幾焉咨爾中外當體至懐知臨安守臣張澄謹書曰紹興十六年孟春二十有二日上親耕帝耤于國郊之南以為農先禮也于時夙駕天田躬撫御耦三推復進師臣請以耒耜付有司玉㫖申諭力本務農出于誠心遂至五至七至九凡三奏請乃止事已竣復摛宸毫肆發明詔曰兵興以來田畆多荒故不憚卑躬與民休息噫嘻美哉臣竊惟我宋祖功宗徳勤勤懇懇為子孫億萬年計必致孝以躬穡若起后稷而傳文武遺于主上大啟中興之運茂隆再造之基疆埸罷警流徙復業天下喜見太平是以留神農事之本叅稽雍熙明道舊典禮先農耤千畆奉郊廟併粢盛以稱達孝崇敦本之治既筆之史將册書有光焉則不止一舉而二美具也臣叨膺眷寄假守行都蓋嘗肅導根車之清塵與觀盛事其于仰遵詔㫖躬嚴勸課體明天子戢兵卲農之意敢不肅意奉承休命矧兹瞻拜一札細書龍鸞翔越妙絶鍾王誠意精到下觀而感其視載芟之頌異世同符矣念當侈上之賜鑱諸樂石位置㕔事以重京師首善之地以示諸夏根本之教俾四方咸知所勸顧不偉歟戒飭民間醫藥紹興二十五年十月訪聞今嵗患時氣人皆縁謬醫例用發汗性熱等藥及有素不習醫不識脉症但圖目前之利妄施湯藥致死者甚衆深可憫憐據醫書所論凡初得病患頭痛身熱惡風肢節痛者皆須發汗縁即今地土氣令不同宜服疎滌邪毒如小柴胡湯等藥得大便快利其病立愈臨安府可出榜曉示百姓通知守臣曹泳恭䟦曰臣備官版曹兼權府事恭被宸翰以民間時疾戒飭醫藥仰惟皇帝陛下聰明睿知好生憂民周至如此臣敢不竭力盡心推廣聖徳謹勒之金石以傳不朽差醫看診病民給藥紹興二十八年六月時當盛暑恐細民闕藥服餌令翰林院差醫官四員遍詣臨安府城内外看診合用藥令户部於和劑局支撥應付候秋凉日罷孝宗皇帝奬諭獄空乾道四年九年畿方千里是為衆大之居俗具五民盖有竒衺之習趨利者率多於巧偽忘身者公肆於敓攘自昔有聞於今未冺卿中和樂職不事刑威方畧禁姦尤知政要桁楊罕用狴犴一空載覽敷陳不忘嘉歎守臣周淙謹記曰皇帝宅位之六載秋八月戊申臨安府守臣淙以獄空聞辛亥賜璽書奬諭臣下拜登受跪復訓辭謂臣中和樂職不事刑威仰見聖主謙虚遇下不居其功顧臣至愚何足知此然臣嘗讀中庸之書見中和二字乃聖人冶天下國家之要道致中和天地位焉萬物肓焉豈復有乖戾不平之氣奸于其間于斯時也雖五刑不設可也治古既逺淳漓樸散法于是立然猶以五禮防民之偽而教之中以六樂防民之情而教之和禮樂刑政相為表裏未嘗一日而偏廢也周之成康蓋得此道刑措不用餘四十年漢之文景唐之太宗明皇得之未純行之有間僅能幾致刑措而已陛下誠明之性得于生知化育之功見于日用故凡本諸身加乎民無非中和之道乃七月己丑肆御便殿親録要囚悉從原減徳至渥也臣猥以駑才待罪京邑聖恩全覆使得展體率職布宣寛大之意不假刑威姦伏自化王畿千里罔有留獄是豈臣力所能致哉盖天子建中和之極其效如此臣何功之有焉臣方且誦天保之章歸美報上而陛下錫以明綸寵踰華衮退思忝冐惕若履氷臣敢不仰體睿慈勉圖報稱刋之金石昭示萬邦非特以侈上賜俾郡國之吏戮力同心上廣好生之徳期底成康之治臣不勝大願謹拜手稽首書于下方以對揚天子之休命又乾道七年十二月浩穰之地獄市寔蕃訓導難純姦軌不勝非閑之以義守之以信求囹圄之空未易得也卿以吾上嗣尹正是司布政以來風流篤厚禁網踈闊刑罰用稀今焉俾無一人之獄足以副吾欽恤之意矣賀章來上嘉歎不忘時光宗皇帝以皇太子領尹事有記記曰乾道七年五月臣被命領尹臨安惟能薄未習民事即曰上疏辭願得卒業胄學既不獲命則退思所以克承委寄者謂首善之地必有所當先民弗覿徳何以仰對鴻化乃以崇教勵俗大意風曉民吏俾户知趨鄉所在先時府百須貰于民或不還一錢積為緡錢二十九萬有竒命悉償之屬邑經澇吏失檢覈民病于催科命悉蠲之麗罪之人既從于坐又籍入金錢名為贓賞者七十餘條命悉除之乃已逋責乃薄征税乃戒苛刻乃出淹繫凡可以導上徳意者雖既厥心然皆有司常度賴陛下仁聖神化宻移民用觀感重于抵冒嵗十二月獄以空告不勝惓惓歸美之義輒援舊章稱賀以聞陛下天徳地業顧以緒餘推借臣子詔㫖褒諭寵踰華衮承命震悸莫知云報竊伏惟念輦轂之下自昔號為浩穰先漢趙張三王以降吏治率武徤果敢莫救火揚沸始為勝任而臣幸以朝夕得承慈訓惟徳善愛利是間則昔人所以設為方畧鉤距用能極其根株窟穴者於臣何有苐欲取必素學與斯人相期于清浄簡易之域不自意一旦果得以蒸蒸之治孚于衆志形于睿奬此甚盛之美臣何足當之繼自今敢不加之以無倦庶幾風流篤厚刑罰用稀如詔書指以對揚丕顯休命敬刋之樂石附見下方昭示無極又淳熙元年十二月臨安駐蹕之地視古天府民物錯雜獄市繁夥勢則然已爾吏治敏給庭無留訟用能於期月之間使姦民歛迹而狴犴一空非職修事舉之效歟載覽來章不忘嘉歎守臣胡與可謹記曰淳熙元年十二月戊午臨安府三院獄空敬援舊章以聞越日䝉賜壐書奬諭臣盥手跪讀謂臣吏治敏給庭無留訟且有職脩事舉之褒臣仰惟陛下體天地曰生之大徳凡於犴獄深軫宸慮内而京邑命秋官廷尉外而郡縣命監司守臣躬行决遣每當隆暑特御便殿親録要囚悉從生减恵至渥也臣以庸駑承乏天府但知奉行寛大之書以出民于非辜而已囹空之隆皆陛下仁心感格神化宻移所致㣲臣何力之有玉音衮字過被褒寵李官幕僚共霑宴錫祗異渥深榮懼交懐顧臣何人足以當此敬刋之樂石答揚丕顯休命非惟侈一時盛美且垂耀示戒于無窮又淳熙十二年二月天府之地民物浩穰惟時犴獄剸决尤難爾為政敏明事無滯固奉法雅裕下所安賴乃能牢户盡閴訟繫畢蠲使吾寛大之仁孚於四方繄有助焉露章上聞不忘嘉歎守臣張枃恭䟦曰臣淳熙十一年五月被命守臨安既奉職凜凜懼不勝任越九月獄空按已事當聞上下其狀錫璽書寵嘉之臣竊自揣不足以辱大訓聞之詩曰商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生古者天子之都治有所本如此而後世但欲委成于下其道舛矣是以漢之諸臣治京兆著者大抵非法罰不理獨文帝世内史無能人而史氏推本刑措乃在帝以徳化民之後物有本末事有終始維見可睹已恭惟陛下臨御以來哀矜庶獄期于無刑盛徳孚洽效自近著以理揆事具有源委而上辭其美下居其成臣心恧焉昔范百禄守開封嘗謂其属曰以千里之圻而無一人之獄此上徳所格豈尹力耶可謂知本之言矣臣安尚所云然匿指臣則有罪敢不刻之樂石以昭無窮臣謹昧死書于下方賑荒奬諭淳熙十五年七月京師為衆大之地撫属邑以屢豐水旱無捐瘠之民咨守臣而共理粤維舊嵗值彼亢陽忱念農田寖艱粒食内亟圖于賑恤外申飭于拊循卿體國愛人奉公任職酌輕重之宜而發粟究始終之恵以及時迄聞全濟之多搆復阜成之舊敷陳來上嘉歎不忘守臣韓彦質謹記曰臣恭惟皇帝陛下臨御宇内二十有七年于今治民敬天終始惟一用能導迎休嘉雨暘以時農扈屢登有富無寠間遇水旱則取陳發藏猶足以濟乃淳熙丁未夏五月不雨至于秋七月嵗以不登民用艱食上心閔焉亟遣使開倉議所以賑貸之臣以駑材待罪京邑深惟流逋貽當宁憂乃下其事于九邑分属僚吏所以宣布徳意者纎悉罔敢怠起是嵗之秋越明年之夏凡用太倉粟一十有一萬石而民以全安浸復生業竣事上聞有詔賜臣以示褒勸臣伏讀訓詞且懼且恧其敢貪天之功以速大戾謹拜手稽首言曰夫天行靡常凶嵗代有古之聖人不能必天之無水旱而能使水旱之不為灾是故稽天之浸不足以病堯民之時雍而樂石之旱不足以蠧商民之允殖以其備豫之有素也維去嵗之歉若可廩廪而鄉無移民户無耗口者繄聖天子恭儉撙節儲偫充仞恩澤不壅于下流之所致顧惟小臣職司牧養惟謹布宣其何力之有焉敢以明詔勒諸堅珉昭示休徳以詔罔極咸淳臨安志卷四十
