body:
  text: 咸淳臨安志卷四十二宋潜説友撰御製帝王之文與詞人才士不同前所載漢髙武二詔大抵出於二君所自為故簡質明白一見而決蓋不特詔令然也覇心未忘而大風之歌作悔心將萌而秋風之詞著率此𩔖耳吴國非豐沛之舊會稽無河東之祠土壤奥僻山川寂寥昭囬之光衣被弗及豈自知有今日之遭乎故今兹所編斷自我宋開國而後以賜王欽若出守詩為首是詩也真宗皇帝恤黎元之心也南渡而後以中和堂望越詩為首是詩也髙宗皇帝復土宇之志也聖聖相繼吐辭為經二風之作方斯陋矣倬彼雲漢為章于天凡在編者皆杭故也若灝灝噩噩之全則有御府之儲太史之録在叙御製太宗皇帝戒石銘爾俸爾禄民膏民脂下民易虐上天難欺真宗皇帝文臣七條一曰清心謂平心待物則物自正二曰奉公謂公直潔已則民自服三曰修徳謂以徳化人不専猛威四曰責實謂専求實效勿競虚譽五曰明察謂勤察民情勿使賦役不均刑罰不中六曰勸課謂勸諭下民勤于孝弟之行農桑之務七曰革弊謂求民疾苦而釐革之賜守臣王欽若詩蚤自外朝登近侍克符昌運振嘉名一參黄閣推良畫再陟鴻樞顯至榮該博古今常獻納勤勞夙夜每専精石渠撰述多文備月觀崇封大禮成宰府調元心匪懈真宫兼職望彌清龍樓進秩恩尤異熊軾為籓任不輕二浙奥區期恵化三吳佳致悦髙情重重山水舟中見處處壺漿陌上迎既肅邇遐安外域更分宵旰撫黎氓予衷側席方毗倚佇有甘棠播頌聲仁宗皇帝賜守臣梅摯詩地有湖山美東南第一州剖符宣政化持槖輟才流暫出論思列遥分旰食憂循良勤撫俗來暮聴歡謳佛牙賛舊志于上石龍寺載有仁宗皇帝佛牙賛刻石厓上而不著其詞今視之乃唐律一首紹聖元年永夀院僧惟性所刋不知何從得此本觀者當自知之兹不敢録髙宗皇帝中和堂詩六龍轉淮海萬騎臨吴津王者本無外駕者蘓逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉夏禹勤神功既盛大後世䝉其仁願同越勾踐焦思先吾身艱難務遵養聖賢有屈伸髙風動君子属意種蠡臣孟夏壬戌來登斯堂逺矚稽山思夏后之功俯瞰濤江懷子胥之烈賦古詩一首守臣宋輝刻石謹書曰臣仰惟今皇帝即位以來属時多艱廵行方岳撫慰斯民而圖所以恢復大業肅清中原神功聖武且將追配前王貽休後世建炎三年嵗在己酉移蹕錢塘嘗以萬幾之暇登髙望逺賦為此詩前瞻稽山而追懐夏禹之功逺思勾踐而属意種蠡之臣憂民圖治感念瘡痍之意粲然見于篇什之中宸奎睿畫輝映日月傳間四逺民争誦之伏覩今皇帝聖徳日躋克儉克勤虚懐聽言刻意願治而躬行寅畏天命之實禁網不苛賦歛不煩而大敷子恵斯民之政凡注措施設雖非臣愚淺陋所能測知然臣承乏輦轂之下日覩政化之行而退誦雲漢之章蓋無一不合者是宜鑱之斯石以示方來臣謹拜手稽首而識其後中和堂御筆同年月斯堂偉特之觀無愧上都薫風南來我意雖快願與庶人共之守臣宋輝謹書曰臣聞王者以天下為心乃能慰天下之望居九重之安則當念斯民有流離不獲其所者享萬方之奉則當念斯民有饑寒不樂其生者凡出入起居動静食息能舉斯心以加諸彼則天下無愁痛太息之心斯民有愛戴享上之誠而邦基王業可以傳永久而益固矣孟子曰樂以天下憂以天下然而不王者未之有也信哉斯言臣仰惟今皇帝勵精圖治宵旰不遑乃者按蹕錢塘嘗以暇日登堂望逺感薫風之來而思與庶人共之宸畫具在昭若日星蕩蕩乎此堯舜三王與我聖祖聖宗所以恵保斯民之意也臣竊觀比年以來發政施仁輕歛薄賦布寛大之澤下勤恤之令凡可以恵安元元者寜屈已為之而登臨觀覽之際猶不忘庶人之念顧惟仁風徳意所以快斯民之望者可謂至矣然憂勤愛民之心臣恐後世有不得而知者謹刻之石以示將來庶使萬世而下誦其言者皆知歌詠盛徳而見天王之用心此亦臣子之職也浄明院易安齋梅巖詩并序紹興二十五年謁欵泰壇因過易安齋愛其去城不逺巖石幽䆳得天成自然之趣為賦梅巖云怪石蒼巖映翠霞梅梢疎瘦正横斜得因祀事來尋勝試探春風第一花孝宗皇帝潜邸恭和髙宗皇帝淨明院梅巖詩秀色環亭擁霽霞修成氷艷數枝斜東君欲奉天顔喜故遣融和放蚤花賜靈隠住持徳光詩大暑流金石寒風結凍雲梅花香度逺自有一枝春又賜頌欲言心佛難分别俱是精㣲無碍通跳出千重縳不住天涯海角任西風宸翰禪師所奏菩薩十地乃是修行漸次從凡入聖夫復何疑方知脚踏實處十二時中曾無斷間以至圎熟雜染純浄俱成障礙任作止滅脱此禪病當如禪師之言揮劍刃卓起􅆃梁發心精進猶恐退墮每思到此兢兢業業未嘗敢忘今俗人乃有以禪為虚空以語為戲論其不知道也如此兹事至大豈在筆下可窮也聊叙所得耳聖問釋迦佛入山修道六年而成所成者何事請師明説徳光囬奏臣伏䝉陛下親灑宸翰問釋迦佛入山修道六年而成所成者何事請師明説臣自顧庸昧不足以仰副大問謹對云將謂陛下忘却上天竺大士贊并序觀音大士以所謂普門示現神通力故應跡於杭之天竺山其來尚矣朕每有祈禱隨念感應曰雨曰暘不愆晷刻是有助於冲人者也因為作賛曰猗歟大士本自圓通示有言説為世之宗明照無二等觀以慈隨感隨應妙不可思賜興福恵光大師若納頂相賛道本尊嚴體常清浄通佛法僧明戒慧定三乘獨超六根自正龍天所衛叢林所證丹青雖工豈傳妙性頂相端如衆人咸敬宸翰三此虚妄心若無六塵則不能有前次已説身心安和藥病何在近又得圓覺之㫖幻化者煩惱也覺性者解脱也如繩縛體當求脱去言對除也本無所縛於脱何有此佛法也經中説六十二處十八界不盡其妙理否色聲香味不執於離覺性妙明湛然常住賜圓覺寺僧徳信詩古寺春山青更妍長松修竹翠含烟汲泉擬欲增茶興暫就僧房借榻眠坐久方知春晝長静中心地自清凉人人圓覺何曾覺但見塵勞盡日狂寜宗皇帝光宗皇帝尹臨安判押案牘序仰惟聖安夀仁太上皇帝道髙乎兩儀仁周乎四海克勤克儉聲律身度以茂夏禹之績之徳之純儀刑作孚以顯文王之謨専務化民躬行元黙則盛美冠乎孝文厲精為治總覈名實則豐規齊于宣帝事同典謨之載政炳方册之傳乃樂退閑載光㢲䄠粤在乾道之盛深簡聖父之知爰命儲宫尹治京邑班輪宣化式慰于都人雙龍刻符增輝于邦典治以簡約為本教以寛靖為先析滯紓寃咸歸宸斷立政施恵獨運淵謨龍鳯之筆以煥其文河洛之珍以昭其瑞祕在天府積有嵗華臣猥以𦕈躬仰承大統惕思付託靡敢康寜申詔臣工肆嚴彚緝悉以判押紀諸簡編為卷七十有一忠厚之謨寛大之㫖罔不具著猗歟盛哉臣竊惟皇家膺受天命聖作明述固結于民心徳厚仁深繼崇于尹正太宗以神武智勇垂憲于前章聖以喆文叡聰敷猷于後肆惟上皇光于祖武嘗即行闕以雄南衙裕民厚俗之有經御衆牧人之有叙訟欲其省刑欲其平虚圄以清犴塵捐賦以養基本庭無留諍府無宿囚仁聲鬯于黄圖睿渥流于赤縣放之遐邇達之華戎日月所臨舟車所至肇自端尹迄于勌勤凡利於民率由此道顧今䆳門之上寶柙所儲祖徳宗功燦垂乎簡牘奎文璧畫光麗乎縑緗是皆撥叙之精豋奉之肅也臣繼志述事以寳大訓稽經諏律以詔無窮庶幾聖人之言炳若丹青帝王之制坦然明白彼其辨南陽之牘垂鳯諾之牋仰眎閎深莫克參儷是庸闡繹益謹遵承以侈慈極厚民之休以昭有宋燕天之澤書曰臨下以簡御衆以寛好生之徳洽于民心判押之㫖盡在是矣臣敢不勉理宗皇帝昌化縣進嘉禾嘉粟賜賈丞相詩禋禮甫慶成而昌邑以嘉禾嘉粟來進隂陽和而休瑞應此一徳感通之驗也因成一詩以賜一徳交孚叶兩儀嘉禾嘉粟獻珍竒祥呈屬邑信非偶瑞應明禋若有期周紀唐封生秀穎漢歌郊廟産靈芝何如近在王畿内慶典珍符萃一時右丞相臣賈似道恭和臣恭睹法宫儲祉畿内薦嘉黍稷非馨由一純之所格稼穡維寶雖六穗以猶祥矧遇熙成敢忘善頌瞻宸奎之俯逮乃聖製之肆頒帝庸作歌允恊惟時幾之懿臣能歸美敢陳俾戩榖之私臣謹恭和二首仰凟聖聰下情無任忻忭之至紫壇昭事匪多儀畿邑嘉生各效竒天地中間皆景鑠神人和處即昌期祥符内苑歌嘉榖景祐前楹賦瑞芝臣昉臣隨俱被賜㣲生何幸際明時神祗來格鳯來儀應陋歌麟問木竒前席慊非加賈誼親祠知不羡安期豐穰叶氣宜書瑞恭茹清朝即産芝稼穡艱難宸慮切天彰盛徳萃斯時守臣吴革刻石恭書景定四年秋九月辛夘皇帝藏祀于明堂景鑠孔昭熙事用成越翼日壬辰昌化縣以所産瑞禾瑞粟來獻御製詩賜下宰臣乃􅆳載歌有虞明良之盛復見今日四方萬里傳誦鼔舞咸曰時當禋祀宿隂汛掃霄堮澄霽既驗之天氣之和黍馨穡寳叶氣嘉生復形于地産之異非聖君賢相克厚天心曷濟登兹臣叨守畿邦且與聞民部稼省之事親逢兹瑞敢拜手稽首對揚天休嘗伏讀國史皇祐三年眉州上瑞麥圖仁宗皇帝有曰朕嘗禁四方獻瑞兹得西川秀麥圖可謂真瑞矣真之為言蓋以養人之本在是而非他瑞所能擬也今物産之瑞不形之他品而形之糓粟不出于他所而出于畿甸不見于他時而見于禋祀之成天意固有在矣視前代以芝草麒麟寳鼎天馬被之聲歌薦于郊廟者曷若兹瑞之為真哉恭惟皇帝陛下以至誠格上帝以至仁育羣生乾符坤珍駢示期應皆所以丕彰聖徳臣恭覩一徳交孚之句方且推之宰臣不自有其美宰臣恭和亦有稼穡艱難宸慮切為言臣下成政歸羙報上而更相儆戒之意實寓焉益知聖賢相逢所以夀生民之命綿宗社無疆之福者未嘗以休證之來而自泰也是用齋祓摸寫御詩次暨宰臣和篇刻之樂石以昭示萬世云訓守臣十二條厲公㢘施恵愛勤决遣通民情戒科擾平物價絶遺饋節浮費修火政抑彊禦禁鉟銷革侈靡右十二條守而勿失律已治人必務忠實毋急近功日謹一日式資汝能以重京室守臣趙立夫恭書曰臣仰惟皇帝陛下總攬權綱慮周萬物發舒典訓董治羣工乃端月十有九日命臣再行内史事越九日辛酉躬御奎畫煥著乾文詔臣以當謹守者十有二條臣省循庸繆已試罔功時異事殊政懵端緒宸聰四達洞燭厥理雲章下錫至教具該昭然若發矇矣爰自中興駐蹕殆越百年輦下服勤不知其幾龍光䝉被俶見于今臣何人斯獲兹榮異凛對天威大懼亡以稱明詔竊惟天啟神聖猶垂法象君廸臣工可無誨言是以堯有羲和之命舜有羣牧之咨暨于成周以君陳尹正則有命以畢公保釐則有册申申其訓前後一轍在昔帝王曷兹多誥蓋不戒視成非君師之所安也皇上祖述堯舜遵周軌而重商邑不以臣不肖既復使之又丁寜之右疏其目左提厥綱若曰律已治人必務忠實夫不欺之謂忠無妄之謂實真奉行十二條之綱領也臣雖不敏惟既厥心又曰無急近功日謹一日雖銜勒不弛而鞭箠用寛若慮其以廹促害忠實者聖度涵洪與天同宇如此顧猶有一毫不忠不實以隳大猷以千大戾則臣豈敢臣拜手稽首欽承明命日監在兹永矢弗渝詩云恵此京師以綏四國是賜也森嚴簡重文儷六經飛動騰驤書參八法抑非㣲臣所敢私敬刻之琬琰布之天下用永寳于萬世天竺廣大靈感觀音殿記朕聞有感必有應有應復有感感從心起則應從心得非自外求也方佛在耆闍崛山時觀世音菩薩摩頂受記合掌作誓言願以慈悲心救度河沙衆生受諸苦惱凡火坑波濤之難刀鋸杻械之難惡獸蝮蛇之難一切困厄可怖可愕惟能一念歸敬則以變化力逰戱三昧現帝釋身現梵王身現長者身現宰官身慧日慈雲甘露法雨轉熱惱而清涼變急難而安樂随其聲音種種解脱是豈有他故哉佛以如來心濟度人以如來心信向心心相感念念相應則佛即是心心即是佛普門示現皆在靈臺方寸中我聞補陀山宛在海中島是為菩薩現化之地距杭之天竺一潮耳故神通威力每于天竺見之按後晉天福四年僧道翊結廬天竺山得夜明木刻為寳相至錢氏忠懿王俶夜夢白衣始創寺以妥其像我朝天聖初僧銑夢像行山中曰吾欲憩此乃謀更剏面挹乳竇翼以白雲獅子峯一殿中居衆山環拱烟雲縹緲中時聞鐘磬聲恍然天宫化成尋賜名靈感觀音院南渡聖聖相承崇信尤篤凡所禱祈如響斯答紹興有車駕臨幸之寵乾淳中有寳玩御賛之賜亦嘗親枉翠華腆有錫予大書扁額以旌之慶元嘉定間永充教寺有㫖蠲免租役有㫖是豈佞佛者哉所以答景貺也朕以凉徳嗣丕基厯年于兹海宇寜乂繄我佛力曰雨曰暘有請必應其所以福生民夀王國者至矣頃嘗賜像與賛及心經秉爐昭示尊奉之意甲寅秋合宫宗祀假廟之旦雲族族有雨意心香潜禱靈隠隨格隂霾劃劙暘光開霽薦鬯之夕天宇不塵星月明爛神來宴娭熙事用集朕以何因縁獲此嘉應亦惟此心有以感之爾心者何仁是也且佛法自漢永平流行中國今幾千百年矣而大士靈異獨于我朝為最驗盖我祖宗以不妄殺為旦誓以不科歛為家法以愛養百姓為根本惻隠之仁與佛心一真觀清淨觀悲觀及慈觀大士之所以能滅諸苦者仁也祖宗之所以垂裕後昆者亦仁也佛外無心心外無佛感應之機其在是歟若夫建創之嵗月制度之崇庳皆畧不載惟述靈異之跡云仙林寺鐘銘大塊嚂嘘震薄盖輿眷此洪鐘以實出虗欒銑其角十分其鼔豈有鑄鼎牧金遺禹博大闡繹厚薄和鈞上開天閫下徹地垠乃警聾瞶乃割昏曉咨爾有聞孰不心皎以為有聲匪鐘不鳴以為無聲如雷如霆作鎮梵宫法音無際鞏我神臯萬有千嵗六和塔真聖觀真武賛見行在所録佑聖觀不重載少師侍讀鄭清之恭書云臣恭惟皇帝陛下嚴恭寅畏惟典神天如鼔應桴有禱斯格真武聖靈于國家福祐最顯禁中尊奉端自前朝陛下加以㣲稱讃以天筆海内莫不知所敬仰臣于龍山真聖觀因賭鑒義江師隆所藏真武聖像神采雄毅意非吴道子不能作遂俾刻石洎摹本上進䝉御書聖製讃于上方于以傳示萬世與國咸休淳祐六年七月上天竺大士賛神通至妙兮隠顯莫測功徳無邊兮應感奚速時和嵗豐兮祐我生民兵􅃦刑措兮康此王國靈隠千佛讃一佛不二千佛奚别如處處水現在在月無去無來不生不滅梅花開時前邨深雪今上皇帝牧民訓惟天生民惟君司牧都鄙盈區分劃九服乃建州伯此維與宅民吾同胞咨爾保息朕兹念兹用簡畀爾思昔藝祖紫雲一誓睠焉牧養言如天地爾念哉悉爾心祇祇兢兢迺恵迺康惟亷惟平惟爾典常視民如身視郡如家視屬縣如子是可以為民父母矣勉旃俞往各勤我班瑞之分命字民訓昔在先帝字民是訓元元之命繫於縣令肆朕承保亦以命汝凡厥有生皆吾赤子父母於子胡忍弗仁爾㢘斯明爾敬斯勤其率自爾中公乃視聴其簡孚爾衆衡乃今政兹猷告于爾志其使我民孝悌力田庶幾乎三代之醇四善三最治狀以聞我朝彛典尚旌爾庸欽哉守臣潜説友恭書曰臣恭惟皇帝陛下道徳風烈同符藝祖方春和時懼郡國奉吾詔不䖍也乃若稽紫雲樓之誓闡為大訓以告于有司之牧夫羲畫堯文日月千古臣幸得遭遇先萬國拜貺于庭竊伏惟念民天民牧天牧也天不言而託之君是彛是訓于帝其訓其嚴乎凡我友邦冢君曷敢不祗若休命抑古者咨牧以食為先維時屢豐太平初登甸服之内吏不得縁糴以艾民力且將十年門闗委積之待施恵者墉如也夫蓋天子所自治之國三公為佐之六卿共効之如此守臣因得䝉頼用不愆于求蒭而畿内之大夫均被嘉澤如皇祐間詔令盡管牧地衛士母敢牟其稼而字民之志行焉臣恭睹聖明述作之盛于此尤加之意其或字民者之不欽則亦牧民者之責也訓有之眎属縣如于可不謹諸刻是丕謨嫓彼戒石相在爾室具嚴天威其克永省罔攸斁牧民銘天生烝民皆吾同胞痛癢切身勿瘠民膏凡而戚忻繫命爾曹惟既厥心毋憚爾勞繆以千里根于差毫字民銘涖事必公拊民必恵邇者有訓亦既切至咨爾令長守以勿墜宣朕實意斯為豈悌守臣潜説友恭書曰臣恭惟皇帝陛下茂徳上仁洽于烝庶詔書數下猶懼吏不究宣乃作為寳訓猷告爾大都小伯是牧是字欽厥攸同亦既垂日星而流風霆矣天道至教變化無窮且製二銘以申㢲命訓書也銘詩也詩感發情性入人也深風化莫近焉元老大臣務在輔善義揚徳音表請布之天下制曰可臣愚幸獲以牧夫躬被宸貺拜手恭頌大哉王言一哉王心有取先正西銘之㫖夫厚其同胞以視其父母宗子之懿家相之良也越我臣僕奔奏奈何弗敬矧周公述三宅之事諄復致意于牧而曰協于厥邑用丕式四方對揚休命宜自臣始臣敢不夙夜祗服厥銘刻在丹府其永無泐琬琰云乎哉咸淳臨安志卷四十二
