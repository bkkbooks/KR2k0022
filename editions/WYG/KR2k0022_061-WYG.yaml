body:
  text: 咸淳臨安志卷六十二宋潜說友撰人物三列傳闕其館光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理耶光卧而不應良久乃張目熟視曰昔唐堯著徳巢父洗耳士固有志何相迫乎帝曰子陵我竟不能下汝耶升輿嘆息而去引入論舊故相對累日帝從容問曰朕何如昔時對曰陛下差增於往因共偃卧足加帝腹明日太史奏客星犯帝座帝笑曰朕故人嚴子陵共卧耳拜諫議大夫不屈乃耕於富春山建武十七年再召不至年八十終於家詔賜錢百萬穀千斛以後漢書本傳三國志虞翻傳注修按本傳注富春山今杭州富陽縣然傳稱後人指其釣處為嚴陵瀬者今已入桐廬據沈約宋書吴分富春為桐廬則桐廬乃富春舊境也又太平寰宇記云赤亭里嚴子陵釣於此有臺基存又皇朝郡縣志云赤松山在縣東七里亦曰赤亭山嚴子陵釣於此如此則七里瀬雖入桐廬赤亭山自屬富春今富春正自有子陵釣處諸葛琮餘杭人有賢徳後漢為河間太守居斷山塟山旁本祥符舊志餘杭縣有廟孫鍾富春人性至孝種瓜為業今陽平山所謂瓜田者是也嘗有三少年詣鍾獻瓜謂曰予司命也以君孝感於天故來耳遂指山曰此堪為墓鍾志之及卒塟焉或云有二仙人示其塟地坟上嘗有紫雲曼延數里人謂孫氏其興矣鍾即堅之先也以太平寰宇記皇朝郡縣志修舊志謂鍾卒子堅塟鍾於穴按三國志孫堅傳不稱父名寰宇記謂堅所居其祖種瓜郡縣志謂堅其元孫則舊志稱子者非孫堅字文臺容貌不凡濶達好竒少為縣吏與其父共載至錢唐追斬海賊顯聞府召為假尉會稽妖賊許昌起句章堅以郡司馬募精勇與州郡合破之時熹平元年也黄巾賊起漢遣皇甫嵩朱雋討之雋表堅為佐軍司馬大破之拜别部司馬邊章韓遂作亂董卓拒討無功中平三年張温西討表堅叅軍事堅語温以卓三罪宜陳軍法如穰苴斬莊賈魏絳戮楊干温不忍發章遂降軍回議者聞堅勸温斬卓無不嘆息拜議郎長沙賊區星萬餘人攻圍城邑乃以堅為長沙太守旬月克破星等封烏城侯靈帝崩卓擅朝政諸郡興義兵討卓堅亦舉兵袁術表堅行破虜將軍領豫州刺史進軍合戰陽人大破卓軍梟其都督華雄等卓憚堅猛壯遣李傕等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族則吾死不瞑目進軍大谷卓徙都入闗焚燒雒邑堅乃入雒修諸陵平塞卓所發掘初平二年本張璠漢記及吴厯術使堅擊劉表表遣黄祖逆戰堅破之追祖為祖軍士所射卒年三十七子䇿權翊康陳夀評曰堅勇摯剛毅導温戮卓山陵杜塞有忠壯之烈以三國志本傳及通鑑修孫䇿字伯符初堅留家夀春䇿十餘嵗已交結知名周瑜自舒來造勸徙舒江淮間人咸向之堅卒䇿年十七乃渡江居江都䇿舅吴景為丹陽太守䇿載母徙曲阿召募得數百人興平元年䇿到夀春見袁術術以堅餘兵還䇿太傅馬日磾安集闗東以禮辟䇿表拜懷義校尉術大將皆傾心焉術長嘆曰使術有子如孫郎死復何恨䇿説術乞助景等平定江東許之將兵千餘人行收兵比至厯陽衆五六千渡江轉鬭所向皆破莫敢當其鋒軍令整肅百姓懷之䇿為人美姿顔好笑語濶達聴受善用人士民見者莫不盡心樂為致死威震江東䇿引兵渡浙據會稽更置長吏䇿自領會稽太守袁術僭號䇿以書絶之曹操表䇿為討逆將軍封吴侯建安五年操與袁紹相拒官渡䇿欲襲許迎漢帝宻治兵未發為故吴郡太守許貢客所擊傷召張昭等謂曰中國方亂以吴越之衆三江之固足以觀成敗善相吾弟呼權佩以印綬謂曰舉江東之衆决機兩陳之間與天下争衡卿不如我舉賢任能各盡其心以保江東我不如卿卒年二十六權繼襲後建國為吴傳亮休皓凡四世云陳夀評曰䇿英氣傑濟猛鋭冠世覽竒取異志陵中夏以三國志本傳及通鑑修孫瑜字仲異父静字㓜臺堅季弟也静戀墳墓宗族不樂出身終於家五子暠瑜皎奐謙瑜始以恭義校尉領兵時賔客諸將多江西人瑜虚心綏撫得其歡心建安九年領丹陽太守為衆所附至萬餘人加綏逺將軍遷奮威將軍領郡如故自溧陽徙屯牛渚瑜以永安人饒助為襄安長無錫人顔達為居巢長使二府將吏子弟數百人就受業遂立學官臨饗講肄是時諸將皆以軍務為事而瑜好樂墳典雖在軍旅誦聲不絶建安二十年卒以三國志本傳修孫皎字叔明始拜䕶軍校尉領衆二千餘人是時曹公數出濡須皎毎赴拒號為精鋭遷都䕶征虜將軍代程普督夏口黄蓋及兄瑜卒又并其軍賜沙羡雲杜南新市竟陵為奉邑自置長吏輕財能施善與交結與諸葛瑾至厚委廬江劉靖以得失江夏李允以衆事廣陵吴碩河南張梁以軍旅而傾心親待莫不自盡皎嘗遣兵候獲魏邊將吏妻女以進皎皎更其衣服送還之下令曰今所誅者曹氏其百姓何罪自今以往不得繫其老弱由是江淮間多歸附者建安二十四年卒以三國志本傳修孫賁字伯陽父羌字聖壹堅同産兄也賁早失二親弟輔嬰孩賁自贍育友愛甚篤為郡督郵守長堅於長沙舉義兵賁去吏從征伐堅薨賁帥餘衆扶柩後袁術徙夀春賁又依之術遣賁攻破周昻於隂陵表賁領豫州刺史轉丹陽都尉行征虜將軍討平山越為揚州刺史劉繇所迫遂因將士衆還住厯陽頃之術復使賁與吳景共擊樊能張英等䇿東渡助賁景破英能等進擊繇繇走豫章䇿遣賁景報術值術僭號除賁九江太守賁不就還江南賁與䇿征廬江太守劉勲江夏太守黄祖軍回聞繇病死過定豫章上賁領太守後封都亭侯建安十三年使者劉隠奉詔拜賁為征虜將軍領郡如故在官十一年卒以三國志本傳修吴景本吴人徙錢塘早失父母與姊同居姊與孫堅為婚景嘗隨堅征伐有功拜騎都尉袁術上景領丹陽太守討故太守周昕遂據其郡孫䇿與孫何吕範依景合衆共討涇縣山賊祖郎郎敗走會景為劉繇所迫復北依術術以為督軍中郎將與孫賁共討樊能於麋於横江又擊笮融薛禮於秣陵時䇿被創牛渚降賊復反景攻討盡擒之從討劉繇奔豫章䇿遣景賁到夀春報術術方與劉修爭徐州以景為廣陵太守術後僭號䇿以書喻術術不納便絶江津不與通使人告景景即委郡東歸䇿復以景為丹陽太守漢遣議郎王輔衘命南行表景為揚武將軍領郡如故建安八年景卒於官子奮奮授兵為將封新亭侯祺封都亭侯以三國志孫破虜吴夫人傳修徐琨富春人孫堅之甥少仕州郡漢末擾亂去吏隨堅征伐有功拜偏將軍堅薨隨孫䇿討樊能等於横江擊張英於當利口破英擊走笮融劉繇事定䇿表琨領丹陽太守會吴景委廣陵來江東復為丹陽太守琨以督軍中郎將領兵從破廬江太守李術封廣徳侯遷平虜將軍後從討黄祖中流矢卒子矯嗣侯討平山越拜偏將軍卒弟祚襲封亦以戰功至蕪湖督平魏將軍以三國志吴主權徐夫人傳修張儼後漢末餘杭人好學有賢徳不樂榮利嘗開圃種瓠以所貿錢造橋俗謂之葫蘆橋以餘杭土風記及淳熙餘杭圖經修吳孫奐字季明兄皎既卒代統其衆領江夏太守在事一年遵皎舊迹禮劉靖李允吴碩張梁及江夏閭舉等並納其善奐訥於造次而敏於當官軍民稱之黄武五年權攻石陽奐以地主使所部將軍鮮于丹帥五千人先斷淮道自帥吴碩張梁五千人為軍前鋒降髙城得三將大軍引回詔使在前住駕過其軍見奐軍陣整齊權歎曰吾初憂其遲鈍今治軍諸將少能及者吾無憂矣拜揚威將軍封沙羡侯奐亦愛樂儒生復命部曲子弟就業後仕進朝廷者數十人以三國志本傳修孫韶字公禮年十七收伯父何餘衆繕治京城起樓櫓修器備以禦敵權試攻驚之兵皆乗城傳檄備警讙聲動地頗射外人權使曉喻乃止明日見韶甚器之即拜承烈校尉統河部曲後為廣陵太守權稱尊號為鎮北將軍韶為邊將數十年善養士卒得其死力常以警疆場逺斥堠為務先知動静而為之備故鮮有負敗青徐汝沛頗來歸附淮南濵江屯候皆撤兵逺徙徐泗江淮之地不居者各數百里自權西征都武昌韶不進見者十餘年權返建業乃得朝覲權問青徐諸屯要害逺近人馬衆寡魏將帥姓名盡具識之所問咸對身長八尺儀貌都雅權歡悦曰吾久不見公禮不圖進益乃爾加領幽州牧假節赤烏四年卒以三國志本傳修孫隣字公達賁之子也九嵗代領豫章封都鄉侯雅性精敏㓜有令譽在郡二十年討平叛賊政績修理召至武昌為繞帳督潘濬掌荆州事嘗與重安長陳留舒燮相失燮有罪欲置之法論者多為言濬猶不釋隣謂濬曰舒伯膺兄弟争死海内義之伯膺親友為人所殺仲膺為報怨事覺兄弟争死皆得免仲膺又有奉國舊意今君殺其子弟若天下一統中州士人必問仲膺繼嗣答者云潘承明殺燮於事何如濬意即解燮用得濟隣遷夏口沔中督威逺將軍所居任職赤烏十二年卒以三國志孫賁傳修孫亘字叔武何之弟也儀容端正器懷聪徹博學強記能論議應對權嘗稱為宗室顔淵年二十五拜安東中郎將與陸遜共拒劉備亘投刀奮命與遜戮力備遂敗以功拜建武將軍封丹徒侯以三國志本傳修郭成字元禮夙著義節漢末羣雄競逐遂乗扁舟泛五湖逰滄江探幽逐勝書劍自娱至吴黄武三年拜武義校尉五年遷黄門侍郎黄龍元年封永興富春二縣侯食邑五千户卒塟富春樟岩其後枝葉蕃茂英髦俊選不可勝紀以唐咸通六年所建富春郭侯廟碑修凌統字公績餘杭人父操有膽氣孫䇿初興每從征伐常冠軍履鋒守永平長平治山越姦滑歛手遷破賊校尉及權統事從討江夏入夏口先登破其前鋒輕舟獨進中流矢死統年十五左右多稱述者權亦以操死國事拜統别部司馬行破賊都尉使攝父兵權征江夏統為前鋒與所厚健兒數十人共乗一舟常去大兵數十里行入右江軒黄祖將張碩盡獲船人還以白權引軍兼道水陸並集時吕䝉敗其水軍而統先搏其城于是大獲權以統為承烈都尉與周瑜等拒破曹公於烏林遂攻曹仁遷為校尉雖在軍旅親賢接士輕財重義有國士風從征合肥為右部督時權撤軍前部已發魏將張遼等奄至津北權使追還前兵兵去逺勢不相及統率親近三百人陷圍扶扞權出敵已毁橋橋之屬者兩版權䇿馬驅馳統復還戰左右盡死身亦被創所殺數十人度權已免乃還橋敗路絶統被甲潛行權既御船見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人拜偏將軍倍給本兵時有薦同郡盛暹於權者以為梗概大節有過於統權曰且令如統足矣後召暹夜至時統已卧聞之攝衣出門執其手以入其愛人不害如此統以山中人尚多壯悍可以恩威誘也權令東占且討之命勅屬城凡統所求皆先給後聞統素愛士士亦慕焉得精兵萬餘人過本縣步入寺門見長吏恭敬盡禮親舊故人恩意益隆病卒時年四十九權聞之哀不能自止減膳流涕使張承為作銘誄二子烈封年各數嵗權内養於宫愛待與諸子同賔客進見呼示之曰此吾虎子也及八九嵗令葛光教之讀書十日一令乗馬追録統功封亭侯以三國志本傳修全琮字子璜錢塘人父柔漢靈帝時舉孝㢘補尚書郎右丞董卓之亂棄官歸州辟别駕從事詔書就拜會稽東部都尉孫䇿到吴柔舉兵先附䇿表柔為丹陽都尉孫權為車騎將軍以柔為長史徙桂陽太守柔嘗使琮賫米數千斛到吴市易琮皆散用空船而返柔大怒琮頓首曰所市非急而士大夫有倒垂之患故振贍不及啟報柔更竒之時中州士人避亂而南依琮者以百數琮傾家給濟與共有無遂顯名逺近後權以為奮威校尉授兵數千人使討山越因開募召得精兵萬餘人出屯牛渚稍遷偏將軍建安三十四年闗羽圍樊襄陽琮上疏陳羽可討權時已議襲之恐事泄寢不答及禽羽謂琮曰今日之捷亦君之功也于是封陽華亭侯黄武元年魏舟軍大出洞口權使吕範督諸軍拒之敵數以輕船鈔擊琮常帯甲伏兵伺候敵數千人出江中琮擊破之梟其將軍尹靈遷琮綏南將軍進封錢塘侯四年假節領九江太守七年丹陽吴會山民為冦攻沒屬縣權分三郡險地為東安郡琮領太守琮時治富春明賞罰招誘降附數年中得萬餘人權召琮返牛渚罷東安郡黄龍元年遷衛將軍左䕶軍徐州牧尚公主嘉禾二年督騎五萬征六安六安民皆散走諸將欲捕之琮曰分兵捕民得失相半縱有所獲猶不足以弱敵如或邂逅虧損非小琮不敢徼功以負國也赤烏九年遷右大將軍琮為人恭順善於承顔納規未嘗切迕初權將圍珠崖及夷州琮曰殊方異域隔絶障海水土氣毒兵入民出必生疾病轉相汚染往者懼不及所獲何可多致猥虧江岸之兵以兾萬一之利權不聽軍行經嵗疾疫死者十八九權深悔之琮既親重宗族子弟並䝉寵貴賜累千金然猶謙虚接士貌無驕色十一年卒以三國志本傳修禇泰仕吴封錢塘臨平侯禇氏遂為錢塘郡姓厯六朝至唐代有顯人皆其後裔云以元和姓纂太平寰宇記淳祐志修諸葛起字岑仕吴為步兵校尉宗族蕃盛世居山旁因號岑山以餘杭土風記淳祐志修丁諝錢塘人出於孤家顧邵拔而友之為立聲譽揚其善以並陸全之列仕至典軍中郎世以邵為知人以三國志顧邵步隲傳修咸淳臨安志卷六十二
