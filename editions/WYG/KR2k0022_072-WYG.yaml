body:
  text: 咸淳臨安志卷七十三宋潜説友撰祠祀三古神祠大禹廟在錢湖門内周赧王廟在錢塘縣崇化郷觀山見餘杭髙岡福善王廟防風氏廟在亷徳郷朱奥村父老相傳郷民祈求田蚕之所不知何代所立按郡縣志防風氏居金鵝山隋志載金鵝山在今餘杭縣國語載吳伐越堕會稽獲骨大可専車吳使人問於孔子孔子謂昔禹致羣臣於會稽之山防風後至禹戮之其骨節専車申將軍廟在臨平斗門橋北三十歩郷民祈求田蚕古祠父老相傳謂楚申明父白公作亂楚王命明伐之白公殺其父後人為立祠漢留侯祠在吳山端平元年萬殿帥文勝重建漢蕭相國祠在定民坊一在艮山門外賜額靈䕶周絳侯廟在臨平鎮晉建武元年侯裔孫卓卜居臨平郷之大姓俞氏因即其地祠侯建炎冦騎犯境郷民環廟為栅以守冦仰視旌旗蔽空書曰漢絳侯周勃皆羅拜遁去自是靈異著聞雨暘蝗疫有禱必應朝廷下其事奉常見議封爵顯忠廟在長生老人橋西俗名霍使君廟紹興間建初吳王孫皓疾有神降於庭自言為漢霍光求立祠於金山之鹹塘以捍水患見吳越王紀宣和間賜今額紹興初加封忠烈順濟昭應王福徳衍慶真君廟在肇元郷昇平里地名吳下世傳為吳吕䝉曹王廟在長樂郷像光湖南金奥村相傳為曹子建土俗諸祠顯應廟在府治即净因寺土地也寶祐五年賜廟額曰顯應咸淳元年封正祐侯五年安撫潜説友請於朝加封安福翼靈廟在府治相傳為永福鎮安王咸淳三年洪安撫燾重建廟五年潜安撫説友請於朝以翼靈為額旌忠廟在天慶坊神一姓趙名廷翰一姓馬名仁瑀係殿前指揮使左右班藝祖皇帝開基翼衛有功廷翰領彰國軍節度使卒贈侍中仁瑀為朔州觀察使知瀛州卒贈河中軍節度使廟食於杭莫知所自始景定五年两浙運使以耆老之請上於朝賜額曰旌忠金華將軍廟在豐豫門内涌金池前神姓曹名果真定人仕後唐為金華令時郡兵叛神以計平之吳越王嘉其功就擢婺守國初錢氏來朝委以國事嘗即城隅浚三池曰湧金邦人徳之為立祠池上嘉泰辛酉京城灾反風垂應境内無虞耆老以神赫靈而廟弗稱乃合力更築咸淳初李安撫芾又撤而大之且以錢氏湧金池三大字石刻立於廟之右偏廣福廟在塩橋神姓蔣世為杭人生建炎間樂賑施每秋成糴糓預儲貴則賤糶如元價嵗歉或捐以予饑者死之日囑其二弟曰湏存仁心力行好事里人相與祠其像以報人心所趨靈應如響祈卜者肩相摩咸淳初賜廟額曰廣福六年安撫潜説友請於朝封神及其二弟皆列侯曰孚順孚惠孚祐三將軍廟在潘閬巷嘉應公祠在百􅃧巷今秀義坊通應侯祠在開道坊錢氏時建䕶國天王堂白馬神祠附在夀域坊口舊傳有力士遇大蛟㧞劍斬其首土人因置石天王像以鎮之廟元在太廟室南四孟朝獻并大禮駕宿太廟率降香祈禱景定五年燬移創粮料院故基玉仙堂在大隠坊内咸淳六年安撫潜説友重建石姥祠舊志據晏元獻輿地志云芳林鄉有石姥祠吳客三真君廟在石榴園乾道九年曹善應建廟係唐葛周三真君寶慶間燬清元真君義勇武安王廟在西溪法華山紹興三十二年建一在半道紅華嚴菩薩廟在林潭半邏老人廟祥符舊志云在縣東北到縣二十七里覇王廟在芳林郷嘉泰間再建會靈䕶國祠在艮山門外端平橋東土塘上其祠髙僧秀真也秀真華亭人號無隠事見本門靈休廟在城南廂界江岸名七郎堂神係嚴州分水縣弓兵因方㓂擾攘隂衛有功州縣保請於朝立廟紹興戊午江潮大作府城醫士葉永年舍屋建祠雨晹禱輙應咸淳初賜額真聖廟在白塔嶺咸淳二年建半山七娘子廟在臯亭半山舊傳崇善王妺也蘇將軍廟在肇元郷錢氏建按神東晉驃騎將軍蘇氏崇善王之麾下尚將軍廟在肇元鄉去城四十里元係錢氏建更建炎兵火乾道間再建義橋前後廟在肇元鄉按神係崔縂管評事等神錢氏建靈應廟在肇元鄉按神楊都督係臯亭山崇善王之佐將奉王廟在大雲鄉父老相傳神為晉毛實廟其舊宅也廟之西有民田五百畆號奉王埧載於官之版藉民之砧基其舊業也及攷之晉書毛寶傳宅在陽武放龜在武昌守邾城日與石季龍戰更與錢塘塩官皆遼絶况奉王之稱傳亦不載今姑傳疑云福濟王廟在像光湖西濟惠二王廟在像光湖西又一廟在北葛沈村白龍王廟在臨平東山之中亦有龍池在洞側黒龍王廟在超山嘉定間趙忠獻公宰邑禱雨屢驗請於朝賜通靈為額累封通靈惠應宣濟昭惠侯東京舊祠惠應廟即皮塲廟在城中者四一吳山一萬松嶺一侍郎橋一元真觀按國朝會要東京顯仁坊皮塲土地神祠建中靖國元年六月封靈貺侯崇寧元年三月封公四年閏二月封靈惠王七月加封靈惠顯通王十月封其配靈婉夫人十一月改封靈淑夫人大觀元年十一月改封明靈昭惠王三年賜額顯靈應感廟及殿名曰享誠昭福政和五年七月改賜額曰靈應南渡初有商立者携其像至杭舍於吳山看江亭因以為祠都人有疾者禱必應葢以其為神農云紹興四年九月祠燬聖像儼然獨存理宗皇帝賜度牒綾帛命即故址創廟咸淳五年八月夀和聖福皇太后降錢修葺十一月王加封顯佑靈婉加嘉徳靈淑加嘉靖按會要神妃初封靈婉未幾改封靈淑止是一神加封之際乃誤為二小君各給賛書盖有司止據巫祝之言不復考訂耳記文伏稽混沌已分太昊始畫八卦一隂一陽之謂道隂陽不測之謂神惟道也生三混成洞徹于變化惟神也極深研幾妙行乎無有曩自天師偶到衡陽遇耆老言此間有炎帝神靈甚盛遂入相視聖像古跡耆老曰乃古神農皇帝于三皇時都曲阜世人食腥羶者率致物故因集天下孝義勇烈之士二十四人分十二分野播種採藥至今于世極有巨功天師聞言圖畫聖像奏大漢光武皇帝于建武辛未四月十九日降㫖建祠宇于古洛之東後因河北妖人張角邪逆攻䧟邢城嚮望相州皮塲嶺之人䖍誠祈禱雨雪並下殺賊定亂䕶國顯靈獻帝賜號始曰皮塲焉迨唐朝貞觀戊申嵗戊午月丙子日應夢見祥遂立祠長安至五代朝殱㓂助順具有聖跡由是顯徳戊午嵗乙丑月四日甲戌重建廟于古抃東京顯仁坊暨我宋列祖褒揚累封整肅廟祀亦惟神之助國安民昭格威靈不可殚紀盖與聖朝天長地乆用翊億萬年丕基厥功大矣而聖天子之欽崇亦至矣皇乎休哉政和乙未嵗戊子月十有三日丙辰左朝奉郎權發遣荆湖北路提㸃刑獄公事飛騎尉借緋銀袋周秋記二郎祠在官巷紹興元年立舊志云東京有祠即清源真君外郡行祠東嶽廟一在吳山大觀中造詳具中興觀紹興七年郷民合力重修二十九年乃成嘉泰四年淳祐十二年重建者再寶祐元年理宗皇帝賜御書東嶽之殿四大字一在西溪法華山乾道三年建一在湯鎮順濟宫側乾道間徳夀宫行幸賜銀帛建五嶽樓淳祐三年有㫖重修理宗皇帝賜御書東嶽行宫東嶽之殿八大字廣惠廟在錢塘門外霍山按國朝會要神姓張名渤血食廣徳軍之祠山康定元年始封靈濟王崇寧三年賜廟額曰廣惠累封至正祐昭顯威徳聖烈王寶祐丁巳改封真君凡再加令曰正祐聖烈昭徳昌福自祖父以下若弟若子若孫與其婦皆錫爵有差獨家子婦曰王曰妃祠創于乾道庚寅越二十有五年紹熙甲寅始成既而有㫖令修内司别為祠于金地山以便祈禱然都人士女競趨霍山不以一關為惮也景定二年洪安撫燾咸淳四年安撫潜説友前後葺治愈加嚴整云又有祠在棲霞嶺記文慶元丙辰錢塘縣主簿趙師白撰霍山廟者廣徳張王之别祠也王以休功顯徳敷祐生民綿歴數千餘載歴代以來罔不優禮而褒崇之暨入國朝慶膺追錫之命増加王號極其榮美至于王之父母兄弟妃嬪子孫及諸属㜕無不受顯服累嘉封可謂盛矣粤自開迹祠于肇興廟食邦人兢栗以供祀事凡雨晹疵癘之烖㓂攘水火之患有禱于王疾于響荅竒騐異應灼灼駭動人之聞見捄溺拯危轉禍為福載諸傳記不可殚述光靈之逺旁加横被于是離宫行廟金碧丹雘之輝連城夸郡苕蕘相望焉仰惟帝城四方之極百神受職是翼是衛矧王之神斿所止宻拱京甸衆大之區并䝉祉福顧獨未有掲䖍妥靈之地士民相謂不其闕欤乾道庚寅始卜地于霍山裒金鳩工營建棟宇規模位置焕然鼎新奉神之物無一不備盖以便都人之敬而格明神之休也廟成于紹興甲寅正月十二日為費緡錢十萬而判院張宗况施助獨多焉師白兼掌諸祠嘉其成績因攷其顛末而刋之石又記慶元丁巳監潭州南嶽廟裘梓撰國家在宥民生天容地鞠修和輯寜豪盡悉凡為民戕蠧芟獮其大有四曰水旱兵疫凡天下之神賛幽相顯有濟逺功尤祀典所嚴敬凡郡國鄉邑間以水旱兵疫禱不時啟報皆得數數匄封于朝以侈神之休横山祠基于開聖瀆血食其邦歴梁唐暨楊李二偽國陽懇隂祝擇毛錫幣自水部郎中司農少卿禮部尚書進僕射册司徒自廣徳侯升公登王雖聯官叠爵猶未顯甚皇朝康定改元啟封靈濟宣和二年封忠祐紹興两加昭烈正順皆以兵旱昭答不爽臨安嵗毎涸帥閫遣吏走數百里告波餘露積家懐户感乃相率得西湖之北偏霍山地誅茅以基洗石以築厥日對升厥山四朝廣殿修廊嚴嚴䋲䋲工始淳熈己亥而集于積勸之乆日者廣徳累政屢以益羙號為奏太常議爵不踰八字竟碍法止自躋真王五十七載當紹興間後郡守始遂前請再議援泰江寧例易靈濟為威徳命詞給誥都人拱上之賜謂王之靈威神徳奚在奚亡又相為堅刻謀且屬梓叙顛末其姓氏世次有他錄具若嵗時牲酒籩豆間陳笙簫合興尚未有侑祭辭此大闕典乃系之曰羗北峯既東騖兮長湖自西龍䨇峙以奮驤兮紛偃蹇其旁圍屹萬楹欎渠渠兮賓洛烏之進騏歩崔巍戴其翬章兮近天尺五衮褒申以寵更兮幸此分其雨露清飌兮肅朝㫋颺颺兮靈旓馳冕九旒兮佩葳蕤鳳鸞前道兮駕兩螭靈容與兮恍乎若授以綏觴酒豆兮在爼登芡栗兮品菹脯参差吹兮間笙歌靈孔歆兮儼雝雝以愉怡睇横山兮忘遽歸靈往來兮兩宫兵歛疫消兮百榖豐千春萬春兮無終窮仰山二王廟在觀橋東馬軍司西營舊傳本軍嘗遣兵將官市木于袁之分冝值水涸筏滯沙磧乃禱于神丐助以巨漲且約建行祠本軍以報既而水夜長三尺木盡起其人迎小像二亟返筏已出大江矣甫兼旬抵臨安遂即天王堂後為祠以奉香火後營屋燬惟祠獨存人尤異之承事惟謹按宜春志二神姓蕭氏自西漢著靈世列祀典至我國朝靈異尤著自大中祥符錫以王公之爵歴宣和迄乾道父母妻及子若婦皆獲美號開慶己未冦犯衡潭至賣卦嶺景定庚申又廹臨瑞至太平市馬皆不能前宜春之境頼以安堵皆二王之功也明年八月有㫖増封極其褒表咸淳五年十月又易封今為顯徳仁聖忠祐靈濟王福徳聖仁忠惠康濟王祖父母以下與其左右及溈仰二祖師凡列於祠者咸加賚焉顯祐廟在仁和縣百萬新倉西神姓陳名果仁常州晉陵人仕隋至司徒沈法興謀叛忌司徒威名詭召食毒死之忠憤赫靈竟以神矢斃法興唐武徳初嘉其功廟祀焉以忠烈公啟封後梁封福順武烈王至後周加以帝號宣和四年賜常州廟額曰忠佑嘉泰六年臨安以禱雨應乞加封又賜行廟額曰顯佑咸淳四年安撫潜説友以嘗禱雪祠下昭答如響乃崇餙廟貎而新之且識其事於壁五年會常州士民乞加封又為上之朝且以前代封帝為非禮乞於福順武烈顯佑之上更加二字為八字王詔可之加曰福順武烈顯應昭徳乃奉制書馳賜忠佑廟傳以幣板而别為文告於行祠識文咸淳二年十有二月上將郊見天地命臣工祈雪群望説友辱以都曹走顯佑行祠卜籖其繇曰黄龍載書蒼龜負圗天下無事帝王錫符方隅砥平民物繁夥既而大雨雪雪已乃霽蕆事之夕明星有爛三靈顧歆由是嵗屢豊四方無虞兹固聖主元臣一徳丕格然神之預告太平盖有不可度思之妙矣四年説友適尹天府乃因舊祠藻飾之且闢其䦎廡以崇瞻依昭靈貺越明年夏五既望題祝文忠佑廟云延陵舊邑兮溪山淑清王生其間兮為世豪英仕隋之季兮官居地卿孰媢于武兮亂臣逆萌躉起懐袖兮竒禍倐嬰龍亡虎逝兮跳梁鼯鼪王蓄忠憤兮氣干青㝠斃以一矢兮赫然普靈巍巍廟食兮迨于唐興功書史册兮身服寵榮五季分裂兮干戈戰争媚神求逞兮神不汝聴更王而帝兮諏禮弗經好是正直兮王胡肯膺為臣盡忠兮雖死猶生宋徳天覆兮涵濡八紘睦妖猘浙兮闚覦郡城疇使退遁兮我有神明曰維忠佑兮賜額以旌建炎迄今兮拱䕶帝京厥功不一兮可書可銘紅衣仆賊兮黒揵覆􅦬風雹揚威兮幟麾現形肅肅隂旅兮助我師征蘇澤旱暵兮屏除蝗螟能令儉嵗兮化為豐登翁嫗歌呼兮百室其盈京城之北兮行祠所營嘉泰應泰兮顯佑洊名聖皇御極兮郊禋議行下臣承命兮來謁祥靈神錫籖繇兮預告太平剋期而雪兮已雪而晴展采之夕兮燦其明星三靈顧歆兮萬方底寧固有攸召兮惟良佐明不可度思兮亦神足馮乃述顛末兮扣其九閎王封八字兮申俾徽稱恩光舄奕兮綸誥峥嶸上眷孔厚兮王其敬承緘辭馳驛兮薦諸廟庭伊常之人兮來止來迎蕭鼓喧喧兮牲肥酒馨王欣欣以樂兮誕慰輿情有引弗替兮永福我甿田有滯遺兮野無震驚翠鸞擁盖兮玉虬連衡時節宴娛兮于千萬齡顯佑行廟云惟王發跡于陽羡而聲靈被于鄰封立廟于隋唐而祀典迨于我宋説友比以初郊奉朝㫖謁行祠申雪禱籖繇響答預告太平無言不酧厥靈益顯説友亦既刋石以詔不朽近常之士民介郡守言王功適印于心乃述顛末亟聞于上于是易帝號以正季代之謬仍王爵以表大神之忠昭徳顯靈徽稱萃只誥綸來下恩光曄如謹已遣吏緘詞馳送廟下惟行祠在邇盍併薦聞王其益庇都民祗答上賜則民事王亦永永無斁靈順廟即婺源五顯神祠於近郊者凡七一在南高峯頂榮國寺嵗乆頺敝景定間太傅平章賈公捐資葺而新之咸淳六年安撫潜説友即廟後拓地創華光樓旁為射亭為角觝䑓又闢山徑而夷之以便登陟是嵗都人瓣香致敬者咸趨焉一在北髙峯為景徳靈隠禪寺嘉定六年重建咸淳七年燬見議經營一在錢塘門外九曲城下紹興間建一在錢塘縣調露鄉端平二年建一在候潮門外瓶塲灣一在候潮門外欏木教塲之側端平三年重建一在錢塘縣徐村新石塘舊有小祠淳祐九年江潮衝激里人乞靈其下遂相與治新之順濟聖妃廟在艮山門外考之廟記神本莆田林氏女數著靈異祠於莆之聖堆宣和五年賜順濟廟額自紹興二十六年封靈惠夫人紹熈三年改封靈惠妃慶元四年加助順勑曰古以女神列祀典者若湘水之二妃北阪之陳寶西宫之少女南嶽之夫人以至丁婦滕姑亦皆廟食夫生不出於閨門而死乃祠於百世此其義烈有過人者矣靈惠妃宅於白湖福此閩粤雨晹稍愆靡所不應朕惟望舒耀魄其名月妃川祗静波其名江妃爾之封爵既曰妃矣増錫羙號被之綸涣崇大褒顯凡以為民尚體異恩以永厥祀累封至嘉熈三年為靈惠助順嘉應英烈艮山有祠自啇份感夢治開禧寶慶一再創建又有别祠在候潮門外蕭公橋記文丁伯桂作廟記神莆陽湄州林氏女少能言人禍福歿廟祀之號通賢神女或曰龍女也莆臨海有堆元祐丙寅夜現光氣環堆之人一夕同夢曰我湄州神女也宜舘我於是有祠曰聖堆宣和壬寅給事路公允廸載書使髙䴡中流震風八舟沉溺獨公所乗神降于檣獲安濟明年奏于朝錫廟額曰順濟紹興丙子以郊典封靈惠夫人逾年江口又有祠祠立二年海㓂慿陵效靈空中風揜而去州上其事加封昭應其年白湖童卲一夕夢神指為祠處丞相正獻陳公俊卿聞之乃以地劵奉神立祠于是白湖又有祠時疫神降且曰去潮丈許脉有甘泉我為郡民續命于天飲斯泉者立痊掘泥坎甘泉湧出請者絡繹朝飲夕愈甃為井號聖泉郡以聞加封崇福越十有九載福興都廵檢使姜特立捕㓂舟遥禱響應上其事加封善利淳熈甲辰民菑葛侯郛禱之丁未旱朱侯端學禱之庚戌夏旱趙侯彦勵禱之随禱随應累其狀聞于両朝易爵以妃號惠靈慶元戊午甌閩列郡苦雨莆三邑有請于神獲開霽嵗事以豐朝家調發閩禺舟師平大奚㓂神著厥靈霧瘴四塞我明彼晦一掃而滅開禧丙寅金冦淮甸郡遣戍兵載神香火以行一戰花黶鎮再戰紫金山三戰觧合肥之圍神以身現雲中著旗幟軍士勇張凱奏以還莆之水市朔風彌旬南舟不至神為反風人免艱食海㓂入境將掠郷井神為膠舟悉就擒獲積此靈貺郡國部使者陸續奏聞慶元四年加助順之號嘉定元年加顯衛之號十年加英烈之號威徳無窮典寔有限不極不止神雖莆神所福徧宇内故凡潮迎汐送以神為心囬南簸北以神為信邉防里捍以神為命啇販者不問食貨之低昂惟神之聴莆人户祠之若郷若里悉有祠所謂湄州聖堆白湖江口特其大者耳神之祠不獨盛于莆閩廣江淛淮甸皆祠也京畿艮山之祠舊傳監丞啇公份尉崇徳日感夢而建祠臨江滸前有石橋經乆摧剥一日里人取凉于橋坐者滿地忽有白馬自廟突出人悉駭散橋随圯無一䧟者人知神之為也開禧年間始建殿閣地褊且陋觀瞻未稱嵗在丁亥某調郡陛辭偶叨留行因白夕郎陳公卓割飡錢為倡貽書郷之持麾節者咸遣助郷之士友與都人知敬神者竭力效奔走不避寒暑随豐儉捐金錢次冬首役移舊殿閣前架正殿越春殿成又次年門樓廊廡成塑繪丹艧几案簾帷欄楯軒楹聞者争施中外輝暎規撫粗備云云戊子之夏後殿雷震電掣龍爪西楹而翔莆白湖祠亦告斯湍且同其時又一名鼓作雷聲轟轟而鳴豈非先兆與祠成郷人合祠諗某為述顛末姑取前後金石所紀神績者編次之庻來者有考云廣靈廟在石塘埧景定四年九月潮壊江塘里中耆老因立東嶽温太尉廟請于朝賜廣靈為額咸淳五年有㫖封正佑侯餘自李將軍以下九神皆賜侯爵李孚佑錢靈佑劉顯佑楊順佑康安佑張廣佑岳恊佑孟昭佑韋威佑梓潼帝君廟在吳山承天觀端平三年建咸淳臨安志卷七十三
