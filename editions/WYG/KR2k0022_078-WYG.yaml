body:
  text: 咸淳臨安志卷七十九宋潜說友撰寺觀五寺院自湧金門外至錢湖門靈芝崇福寺在湧金門外太平興國元年建本吳越王故苑芝生其間捨以為寺遂號靈芝大中祥符初賜今額元符初律師元照重修建炎初燬于火惟師塔存紹興間析其址為顯應觀乾道間始次第興創紹熙元年四月二年三月五月孝宗皇帝數臨幸御小車至齋堂飯僧坐方丈良久命主僧法光就寺日施食月給内帑錢光遂面湖創堂扁曰依光中設御座又塑千手眼觀音像作水陸大齋所于寺之西偏紹定間朝廷給田七百畆咸淳二年太傅平章賈魏公為蠲和役又捐錢創雲會堂而命金華王庭書其扁有浮碧軒及東坡二石刻舊有夜講亭日觀堂皆廢施食臺惟基存湖中記文東坡阿彌陀頌并序錢塘元照律師普勸道俗歸命西方極樂世界阿彌陀佛眉山蘇軾敬捨亡母蜀郡太君程氏遺留簮珥命工胡錫采畫佛像以薦父母㝠福謹再拜稽首而獻頌曰佛以大圓覺充滿河沙界我以顛倒想出没生死中云何以一念得往生浄土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼔槖雖有大聖智亦不能分别願我先父母與一切衆生在處為西方所遇皆極樂人人無量夀無往亦無來又留題云杭州元照律師志行苦卓教法通洽晝夜行道二十餘年無一念頃有作相自辯才去後道俗皆宗之何參政澹撰寺記沿湖古刹相望以得湖之多為勝既勝矣而去城逺則人倦遊焉靈芝附城瞰湖湖繚其三一走城闉不百步都人士足相踵也寺本吴越王故苑芝生其間捨以為寺號曰靈芝皇朝益崇福二字地既廣袤宇亦雄勝元豐間郡守李悰以僧元照持南山戒律有聲俾闡其化從㳺嘗五百衆照以政和六年九月一日示寂塔全身于寺之西北隅宗緒有傳四衆咸仰建炎兵火焚寺塔存于埃燼衆以為異六飛駐蹕于郡割寺基十八九為顯應王廟羽流復廬其旁一塔之外敗屋殘僧凄然托處香火不絶如綫紹興十一年照門人用欽聚其徒謀曰吾師不徒為後學宗為民有禱靡不應其可無謚號請諸朝得謚大智律師塔曰戒光之塔其徒自是思侈上賜日以興廢為事乾道改元道心律師實來講明宗㫖以化逺近凡土木之役則命寺僧智輝董焉輝練達物情左籌右計不顧其地與力之不足而苦心專志隨方逐圓以寓其巧積銖累寸以陌其成先用日者說易向為東南峙三門翼两序經藏香積次第而舉繼心曰彦熙建善法堂繼熙曰通戒律師端妙仍委輝以役事築基衍址不愆于素佛殿僧堂輪奐壮麗丈室齋寮下屋湢悉具淳熙庚子妙以老退處上下合詞推首座法光為主光推已與人聴講充斥首新大智之塔如生存以事既又增宇以棲雲衲飾館以備檀那潮音大振紹熙元年四月孝宗皇帝幸寺明年上元召光入重華宫親問戒律大義及施食因緣大契㫖三月孝宗再幸賜緡錢五百四月太皇太后臨幸賜白金百两五月孝宗皇帝又幸愒息終日御小車至僧堂飯僧賜襯坐方丈良久顧謂光曰此地清幽施食甚宜如隘陋何光奉詔創大軒三楹于正寝之後帝聞月給内帑就施光積所賜及他檀施别創觀音道塲作水陸大齋所于西偏盡挹湖山之勝像設荘嚴益甚法堂素淺每修浄會道俗交病于是又斥大與堂合而為一工告訖功凡地與屋無欠無餘自心至光人更者五年更者三十九而後大備稍復永平之觀琉璃金碧上下相映木魚鐘鼔見聞咸喜人樂其成而不知成之不易也知成于光而不知光之不有其成也其說曰吾假照之靈成心之志繼妙之緒藉輝之畫而無遺恨也光賢矣哉然亦有數焉歴年多尸席久逮夫緣法既然天人響應寔與聲長事與緣隨如光則雖欲辭而不可得也事患無其志有志矣患心之異心同矣患來者無繼今光與心輝輩志堅心齊後先相須如出一手豈不可尚也哉吾儒喜闢佛氏而立志用心與夫相為終始或反有愧故因光請而樂為之書鄭丞相撰撥賜田産記浮屠氏學以空為門放乎一世之表以之羣居則肆故莫難于律律以畏為宗動為萬法所縛以之謀食則拘故又難于養以律名者眡曰禪曰教不能什之三釋之從事于斯嘻嘻嘻亦勞矣抗之俗佛于錢氏結廬徧人境獨靈芝為古律刹負城闕而挹湖山宅幽賔勝足以囊括雲水頥指烟霞㳺方之士一望輦轂之下首以為六月息之地終冬始春履溢户外無虚日客有過而問曰是能蟬脫塵埃飡沆瀣乎熊經吐納服汞鉛乎將飛錫行空乎抑面壁坐忘乎若猶未也則鏡寒倚蒼秀㡬何不為殷靁之藪耶語未既有老衲笑于旁曰客何識之隘耶吾法有大神力穫于未盡之田殖于不貸之圃坐致香積如天雨花方将属厭方将鼓腹雖然有由也自吾宗師云以耆年清徳為今太傅樞使大丞相魯公所知來董法席學子麋至庖烟属雲間傾囷轑釡憂執事者師謂吾有化菩薩為天帝釋輔方出現世間能續佛慧命誠為汝謀其方他日見魯公誦之不俟詞畢請諸朝畀户絶之田七百畆有竒而粟磷磷矣復出私錢二百萬易沃壤為畆二十有五而茹菁菁矣時紹定元祀也于是踊糴之嵗腐紅積倉隕霜之晨寒綠蔽野鐘魚一震泉石皆七箸聲收鉢敷座則相與嘆曰大哉我公之賜也繼自今食焉而不營居焉而不絀庶無負吾律乎乆匄記于余有以其說告者因筆之以贈且為之言曰公之霖雨四海潤澤羣生也如水行地何適不通至于鑿井得泉直溟渤涓溜耳公于此奚心哉然安居而暇日登高而四顧湖之水清且漣漪不可以療飢湖之山蒼然翠碧不可以為食既飽而嬉翳公之徳山有巔而水有涯公之徳兮無極僉曰然請以是登諸石髙平何欽題蠲免和役石刻云靈芝寺素係律肆政和間有元照師持律精苦四方學子宗慕而來卓為梵宇勝會寺有依光堂臨据湖曲重華聖人屢經逰幸逮今神御崇奉惟謹寺本吴越故苑因産靈芝創為精藍故田畆素薄僧行㡬二千指多持鉢給食史鄭两丞相當國日撥賜霅川沈氏户絶産七百畆有奇上以充神御𤓰華之用下以備寺僧香積之羞常賦和役供輸之餘在寺廩者亦無㡬矣咸淳丙寅有請于今太傅平章賈公遂取和役蠲除之從來竺梵憑藉國王大臣苾蒭咸戴龍天亦皆歡喜無量也主僧宗印既肖公像祝千嵗夀又叙本末勒諸堅珉謹拜手書其下方題詠曹既明與同舍待浴詩一雨洗秋色湖山増眼明番番水中荷作此淒凉聲我輩等憔悴客飯千里程願言滌塵土冠葢臨華京慧明院在湧金門外天福五年建舊額資福大中祥符中改今額紹興間斥為聚景園徙于栁洲龍王堂通元庵延恩院在湧金門外城北今為養魚荘水心保寧寺天福年建舊曰水心寺大中祥符初賜今額舊志有思白堂白樂天舊㳺元豐二年樞宻使林希榜曰思白示懐賢之意好生亭人多放生于此郡守沈文通命曰好生陸蓮菴錢忠懿王時闕冬禪師誦蓮經于水心寺方嚴寒忽有蓮華七本生于庭陸逺近瞻禮禪師以為幻乃命芟去紹興間地入聚景園隆興初嗣濮王請額于欏木橋菴題詠秦淮海送僧歸保寧寺詩西湖環岸皆招提樓閣晦明如臥披保寧復在最佳處水光四合無端倪車塵不來馬足㫁時有海月相因依上人弱齡已𨽻此心目所證惟瑰奇白玉芙蓉出清沼天然不受紅塵擾坐客一語不入意目如明星視飛鳥冠切雲兮佩三難上人顧之真等閒應緣却入人間世興盡却歸湖上山伊余乆欲窺禹六矧今仲父官東越行挽秋風入剡溪為君先醉西湖月興福院開寶二年吳越王建舊有心淵堂清蓮堂凝碧軒今為聚景園移建于清波門城下定水院舊號湖光内有水鑑堂湖光堂檀香千手眼大悲像今為聚景園移額東青門外法善院廣順元年建為䕶國羅漢院大中祥符元年賜今額地入聚景園移額于四板橋普賢菴寶成院天福中吳越王妃仰氏建舊額釋迦大中祥符中改今額寳祐五年賜額曰寳成題詠東坡釋迦院賞牡丹詩春風小院却來時壁間惟見使君詩應問使君何處去憑花說與春風知年年嵗嵗何窮已花似今年人老矣去年崔䕶若重來前度劉郎在千里寶蓮院舊在寳蓮山嘉定十四年移今處永隆院紹興十年有在京毗盧寺僧浄琳即錢湖門外建毗盧廨院乾道丙戌移請今額紹定間燬端平至景定初以次重建圓備記文林直院希逸撰重建院記昔達摩語梁以造寺功徳為小果有漏之因是盖有所諷而言也若皆以為小廢則誤矣吾閩僧寺最多十數年來隳敗者半有棄而不葺者輙借達摩之說以相解余嘗笑而憫之咸淳初元有僧自京圖永隆興復之事求記于溪山余曰固有能若是者耶院處錢湖門外厄以融風之警自紹定辛卯迄今餘三十年始復其舊皆主僧了悟獨力營之端平甲午殿成越七年庚子門成又六年乙巳僧堂厨室两廡成又十年甲寅法堂成又七年庚申鐘樓成除一殿之費得之檀越家餘盡出其手悟貧僧也一鉢之外非有餘貲院無斗升嵗入食于斯者應緣而已積半生之勤而就此大工役難矣哉此荆公所以稱慧禮為材者與吁是豈獨有材者能之余聞悟樸願苦硬自此院既燬已來䆒竭其心以化以勸惡衣糲食銖拾黍絫甘勞苦以成之其材可能也其心不可能也雖然余于是又有感矣寺之始實作于智澄浄琳琳安定府毘盧寺僧也自吾有狄難既遁而南紹興己巳初剏此屋以毘盧廨院名之其心盖未嘗安于此也乾道丙戌方請今額殆有不獲者矣吾國士夫能洒新亭之淚而未能還洛陽之鐘簴湖山豢佚若以為固然紀悟之成事而思琳之初心是固可美亦有可慨者焉此非為悟言也琳而可作于斯云何悟四明人今年六十有五檀越忠恪王節使槦也自錢塘門路由北山至九里松菩提院太平興國二年錢惟演建名惠嚴七年改賜今額建炎間燬先是寺僧募良工孔仁謙作大悲像千手錯出不能盡布夕夢沙門語曰何不分形于寳燄之上如其言而像成迨乾道僧彬再以命工亦難之有媪在旁道之至浄池像忽現水面一晤而媪已失矣乃創閣妥焉寳慶三年恭聖仁烈皇太后賜錢重建殿淳祐六年重建千佛閣舊有堂二曰南漪迎薫軒五曰澄心涵碧􅉊毺玉壺披顥今皆不存題詠東坡南漪堂杜鵑花詩南漪杜鵑天下無披香殿上紅􅉊毺鶴林兵火真一夢不歸閬苑歸西湖濃周紫芝菩提小軒晚晴詩杭潁雌雄本自殊淡粧抹是吴姝滿傾漲玉千鍾酒來看鎔銀百頃湖白鳥去邉山潑黛緑蒲疎處雨跳珠不知能事王摩詰貌得西山落照無九曲法濟院乾徳元年錢氏建舊名觀音治平二年改賜今額燬于建炎創于紹興己未有明軒爽軒今不存妙因院元係慈光菴淳熙六年移請今額九曲寶嚴院紹定三年移請今額大昭慶寺乾徳五年錢氏建舊名菩提太平興國七年改賜今額太平興國三年建戒壇天禧中圓浄大師剏白蓮社有堂二曰緑野曰白蓮軒二曰碧玉曰四觀古刻有白蓮堂詩文殊頌菩提寺記皆燬于火南渡初以其地為策選鋒軍教塲惟存戒壇數間而已自嘉定至寳慶初漸復舊觀記文孫運使何撰白蓮社記達人之大觀也經非紙上詎假乎貝葉之文佛在心中寧勞乎旃檀之象而情由化革識乃悟新非言語無以証四禪非相好無以示三昧鴻漸性海假為筌蹄西湖者餘杭之勝㳺浄行者華嚴之妙品境與心契人将法俱浮屠首常結社于此舉白蓮以喻其潔依止水以方其清棟梁飛動乎溪光雲水參差乎山翠追道安之故事則我在聖朝躡惠逺之遺踪則彼無公輔爾乃鏤香為玉毫之状洒血繕金口之文八十髙僧一千大衆受持正覺勸導迷途故參預蘇貳卿序之于前今承㫖宋尚書碑之于後仍貽麗句以賛真宗輝映士林蔚為唱首于是乎鈞台上列宥宻近臣文昌明卿玉玘内相瑣闥夕拜諌垣大夫綸闥舍人卿寺少列郎曹應宿仙館和鉛曲臺禮樂之司延問著述之士殿省春坊之俊幕府縣道之英凡若干人莫不間發好辭演成盛事摘錦布繡乎堂上合璧連珠于牖間峽路運使史館丁刑部頃嵗将命甌閩息肩隣里復又寫山林之幽勝集羣彦之歌詩作為冠篇鼎峙蘭若雖梁蕭再出裴休復生一字千金無以増捐况何之固陋乎今所叙者始以樞機大臣臺閣名士聞法隨喜之嵗月寄詩入社之後先辨其官班列彼名氏至夫義利交戰道勝者為至人愛惡相攻徳成者為君子若乃混韋布乎公衮等林泉于市朝身在廟堂心在江湖以王謝之名位慕宗雷之風猷者則有相國河内向公貳卿長城錢公在宻地日叅政太原王公夕拜東平吕公在綸閣日宻諫潁川陳公度支安定梁公任省倅日尚書琅琊王公夕拜清河張公在餘杭日侍讀學士東平吕公任司諫日工部侍郎致仕沛國朱公在翰林日大諫始平馮公任翊善日紫薇郎趙郡李公安定梁公洪農梁公在史館日故鄧帥隴西李公在秘閣日故副樞廣平宋公在翰林日故閣老太原王公在揚州日皆文為國華望作人傑仰止師行發為聲詩麗句抄沙孰謂布金之地英詞潤石鬱為羣玉之山大矣哉朝野歡娱車書混一禪扉接影将府署以争輝魚梵交音與頌聲而間作常公定力堅固有自誠而明之心法性圓通有為善最樂之諭欲使人修浄行家習浄名覩相起慈悲之緣披文生利益之意轉置熱惱之衆延集清凉之郷足以發揮後來啟廸先覺住第一義諦不二法門豈徒誇陽春白雪之詞衒螭首龜趺之作翬飛鳥企壮兠率之齋宫鳯䟦龍拏書竺乾之梵夾而已咸平四年常公逺自淛水來乎姑蘇旅寓半年以碑隂為請且就他山之石将刋不朽之名何厠儒家流領太史氏受承㫖尚書之顧三讀為榮忝武功參預之知九原未報丁刑部言揚事舉既接科名心照神交實由道契依經作傳敢萌左氏之詞相質披丈但愧陸機之說與我同志無多誚焉題詠陳文惠公詩湖邉山影裏静景與僧分一榻坐臨水片心閑對雲樹寒時落葉鷗散忽成群莫問紅塵事林間肯暫聞十王元之昭慶寺華嚴社夢幻吾身是偶然勞生四又三年任誇西掖吟紅藥何似東林種白蓮入定雪龕燈熖直誦經霜殿磬聲圓謫官不得餘杭郡空寄髙僧結社篇金牛䕶法院天福五年錢氏建治平二年改今額相嚴院天福七年錢氏建舊為十三間樓石佛院治平二年改賜今額淳祐三年重建舊有冠勝軒大石佛院陸羽武林山記云自錢塘門至秦皇䌫船石俗名西石頭宣和中僧思浄就石鐫成大佛半身淳祐七年趙安撫與􅊸重修舊有二尊殿臨湖就石琢二佛今在私圃中與院相近保叔塔崇夀院開寳元年錢氏建治平中改賜今額西湖北山盡處標以浮圖浙江中流望之最為聳出在湖山間與雷峯塔相應僧永保建故名保叔塔舊又有應天塔極樂菴落星石在焉有屏峯院記封山記石刻今不存金輪梵天院顯徳元年錢氏建舊名金輪治平二年改賜今額有巾子峯在寺後形如巾幘兠率寺顯徳二年錢氏建宣和初燬以其地為副将廨舍有僧思浄俗姓喻善畫彌陀悟筆法之妙世號喻彌陀就多寳山劖石為彌勒像至七年聖相成因移請兠率寺舊額為寺多寶院開運元年錢氏建舊名寳積治平二年改今額舊有緑隂堂普安院乾徳中錢氏建治平二年改今額治平寺建炎初僧法聰始建錦塢菴紹興二十一年移今額寺有閣三間面揖孤山扁曰烟雲四壁舊畫古賢像今尚存一壁李鄴侯白文公趙清獻張忠定范文正蘇文忠諸公像東數步有巨石父老云即巾子山太傅平章賈魏公舊游題名天台賈似道笠澤陸叡新安汪儀鳯永嘉沈厚潘方楊應華周之徳曹元發黄徳方陳淳祖以嘉熙戊戌元日登治平序拜烟雲閣上期而不至者鄭泌安劉翁孟寅趙希􅒷曹良朋曹邍題詠徐逸晝眠治平寺詩頻年逰覽不暫寘野艇往來無水程雨休最好是鷗浴風静更清聞鶴聲酒家新熟欠前賑僧榻借眠餘宿酲崧髙泰華未挂眼鬢影蕭颯難為情上智果院開運元年錢氏建元祐中守蘇文忠公重建法堂有題梁元祐五年嵗次庚午二月辛卯朔二十五日乙卯上梁慶元三年韓松刻曰東坡先生翰墨無不載于碑刻惟智果院法堂脊記獨未入石因命工摹勒以永其傳今堂上有閣廼以真蹟置之梁脊焉有參寥泉僧道潛號參寥子初住智果寺會者十六人用圓覺經以大圓覺為我伽藍身心安居平等性智分韻賦詩東坡得心字景定四年充皇孫鎮安寧武軍節度使開府儀同三司冲善廣王櫕所題詠東坡心字韻詩漲水返舊壑飛雲思故岑念君忘家客亦有懐歸心三間得幽寂數步藏清深攅金盧橘塢散火楊梅林茶筍盡禪味松杉真法音雲崖有淺井玉醴常半尋遂名參寥泉可濯幽人襟相擕横嶺上未覺衰年侵一眼吞江湖萬象涵古今願君更小築嵗晚解我簮參寥子以字韻詩泰山屹天下四海同仰止我公命世英突兀等于是胸中擴秋漢皎絶微雲滓當年事危言軒冕如脫屣正貴知我希寧慚不吾以風雲果再符六翮排空起一昨厭承明抗章求迤邐餘杭古雄藩比屋富生齒立談政即成興不負山水雍容敦末契訪我頑且鄙大斾輝松門禽猿亦驚喜森森門下士左右粲珠履使君道徳姿圭角非所恃軟語如春風薫然著桃李今朝真勝事千載足遺美安得筆如椽磨崖為公記又卜居智果方外以詩見寄次韻奉酬偶來湖上緝衡門桐長修柯竹有孫引策每從佳處去望雲橋下是西村愧青燈殘篆夜寥寥門外秋風振葦蕭慚髙人能見憶為予西望立溪橋夀星院在葛嶺天福八年建有寒碧軒此君軒觀臺即今江湖偉觀杯泉東坡皆有詩按坡公答陳師仲書云在杭州嘗游夀星院入門便悟曽到能言其院後堂殿山石處故詩中嘗有前生已到之語諸詩皆有石刻寺有坡公祠題詠東坡寒碧軒詩清風肅肅摇窗扉窗前修竹一尺圍紛紛蒼雪落夏簟冉冉緑霧沾人衣日髙山蟬抱葉響人静翠羽穿林飛道人絶粒對寒碧為問鶴骨何緣肥僕在黄州偶思夀星竹軒作此詩今録以遺通悟師元祐五年十二月東坡居士書舸此君軒詩臥聴謖謖碎龍鱗俯看蒼蒼立玉身一鴟夷江海去尚餘君子六千人照觀臺詩三界無所住一臺聊自寧塵勞付白骨寂起黄庭殘夢風中溺孤燈雪後青須防戲童子投礫犯清泠狡杯泉詩石眼杯泉舉世無要知杯渡是工夫可憐獪維摩老戲取江河入鉢盂水又次韻周長官夀星院同餞魯少卿詩琉璃百頃仙家風静平湖響釣車寂歴疎松欹晩炤伶俜寒蝶抱秋花困眠不覺依蒲褐歸路相将踏桂花更着綸巾披鶴氅他年應作畫圖誇晁以道詠之夀星寺詩石磴挿青雲禪宫入渺㝠歸雲侵客座流水亂松聲天近月逾白竹多山更青從來邱壑志不獨付孫登寶雲寺乾徳二年錢氏建舊名千光王寺雍熈二年改今額寳慶間為皇弟邳王櫕所舊志有寳雲菴清軒月窟澄心閣南隐堂妙思堂雲巢皆不存古刻有寺記妙思堂詩逰寳寺詩古跡有靈泉井寳雲茶錦塢初陽臺題詠東坡和唐彦猷詩并序云㳺寳雲寺得唐彦猷為杭州日送客舟中手書一絶句云山雨霏微不滿空畫船來往疾輕鴻誰知獨卧朱簾裏一榻無塵四面風明日送彦猷之子坰赴鄂州舟中遇微雨感嘆前事因和其韻作两首送之耳歸其二妙凋零筆法空忽驚雲海戲羣鴻清詩不敢私囊篋人道黄門有父風出處榮枯一笑空十年社燕與秋鴻誰知白首長河路還卧當時送客風又次韻僧仲殊雪中逰西湖寳雲樓閣鬧千門林静初無一鳥喧閉户莫教風掃地捲簾疑有月臨軒水光㶑灔猶浮碧山色空濛已斂昏乞得湯休竒絶句始知鹽絮是陳言瑪瑙寶勝寺開運三年錢氏建治平二年改賜今額寺舊在孤山紹興二十二年以其地為延祥觀而徙寺于葛嶺之東紹定六年剏髙僧閣淳祐八年趙安撫與􅊸重建舊寺有法慧禪師智圓墓今遷塔于寺之後山圓自號中庸子臨寂作詩自悼題詠中庸子自悼詩云平生宗禪亦宗儒竭慮研精四體枯莫待歸全寂無語始知諸法本來無蕭蕭墓後千竿竹欝欝墳前一樹松此處不須兄弟哭自然相對起悲風莫談生滅與無生謾把心神與物争陶器一藏松樹下緑苔芳草自縱横皆刻于重建塔亭太傅陳俞詩云雨霽佛屋明苔逕深曲折樹摇髙露驚草宻暗泉咽前林忽清磬空燈逺欲滅寄謝塵中人與君從此别又雨後過瑪瑙寺云借屋傍精廬無事數來往披草通泉流刻樹記笋長微風四山落小立領松響詎名息諸緣暫喜脫塵網又重㳺云覺聞浴鼓聲衆散我徐赴石槽温泉涌赤脚躡雲霧振衣新筍林岸幘古松樹脫然得輕安水因本無悟委又午睡瑪瑙起赴夀星浴云達人心鏡明直道畧折重來犬不驚到家蟬聲咽君吟有造化我唱無生滅法界即大都山川㡬囘别禪宗院唐徳宗朝郡氏吳元卿為六宫使棄官叅鳥窠禪師建菴修道即會通禪師也開運三年錢氏建院元額招賢治平二年改今額有䝉泉東坡書紹興十四年塟魏婉儀于法堂二十二年安奉欽宗皇帝祔廟神主寶祐三年重建法堂詩頌樂天紫楊花詩并序云招賢寺有山花一株無人知名色紫氣香芳麗可愛頗類仙種因以紫楊花名之詩云何年植向仙壇上早晚移栽到梵家雖在人間人不識與君名作紫楊花寶嚴院後唐天成二年錢氏建舊名垂雲治平二年改今額元豐中僧清順作埀雲亭又有借竹軒秦少㳺曽宿此軒夢天女以維摩求讃淳祐三年理宗皇帝賜僧智光御書晦菴二字續建佛閣賜御書無量福海四字題詠陳古靈賦垂雲亭小亭巉絶出雲間萬象升沉不得閑莫怪詩翁頭白蚤時來向此冩湖山東坡詩云江山雖有餘亭榭着難穏登臨不得要萬象各偃蹇惜哉垂雲亭此地得何晩天功争向背詩眼巧增損路窮朱欄出山破石壁很海門浸坤軸湖尾抱雲巘蔥蔥城郭麗淡淡烟村逺紛紛鳥鵲去一一漁樵返雄觀快新獲微景收莫遁道人真古人嘯咏慕嵇阮空齋卧蒲褐芒屨每自捆天憐詩人窮乞與供詩本我詩久不作荒澀旋鋤墾從君覔佳句咀嚼廢朝飯又卧病彌月垂雲花開順闍黎以詩見招次韻答之曰道人心似水不礙照花姸燕坐春强半清隂月屢遷至山無起滅一念有陳鮮嫋嫋風枝舉離離日蕚蔫狂吟終少味老醉不成顛何必遨頭出湖中有瑞蓮又怡然以垂雲新茶見餉報以大龍團仍戲云妙供來香積真烹具大官㨂芽分雀舌賜茗出龍團曉日雲庵暖春風玉殿寒聊将試道眼莫作两般看定業院唐元和元年刺史裴常棣建鳥窠禪師山門按舊志有環峰堂襲夢軒鳥窠道林禪師塔銘唐白舍人鳥窠禪師問答頌今並不存古跡有石甑山君子泉淳祐四年趙安撫與􅊸始造鳥窠禪師塔亭報恩院開寶七年錢氏建舊名報先在孤山治平二年改今額有六一泉東坡菴蘇公于六一泉後鑿岩為室名曰東坡菴紹興二十一年以其地為延祥觀徙定業院側嘉熙四年安櫕徳國公主題詠東坡尋臻闍黎遂泛小舟至勤師院二首云白髪常嫌嵗月侵病眸兼怕酒杯深南屏老宿閑相過東閣郎君懶重尋試碾露芽烹白雪休拈霜蕋嚼黄金扁舟又載平湖去欲訪孤山支道林湖上青山翠作堆葱葱􅓹􅓹氣佳哉笙歌叢裏抽身出雲水光中洗眼來白足赤髭迎我笑拒霜黄菊為誰開明年桑苧煎茶處憶昔衰翁首重囘吾又云軒軒青田鶴􅓹􅓹在樊籠既為物所縻遂與輩同今來始謝去萬事一笑空新詩如洗出不受塵垢䝉清風入齒牙出語如風松霜髭茁病骨饑坐聴午鐘非詩能窮人窮者詩能工此語信不妄吾聞諸醉翁廣化院在北山舊在孤山天嘉元年建名永福大中祥符改今額有白公竹閣栢堂水鑑堂涵輝亭凌雲閣金沙井辟支佛骨塔陳文帝天嘉元年有天竺僧持支佛頷骨舍利至杭遂于孤山建永福寺立塔會昌之難歸于郡庫大中之後僧方簡建廣化寺奉迎佛骨于塔永福慧琳和尚塔紹興間改剏四聖觀徙今處紹定間守袁同知韶重建竹閣淳祐六年趙安撫與􅊸建白公祠堂于閣後記文鄭丞相清之撰白公竹閣記竹閣白公樂天之遺跡也按唐史及長慶集樂天以中書舍人出守杭暇日有宿竹閣詩此竹閣之始見也又按東坡集白公竹閣在孤山廣化寺與栢臺隣此竹閣之所在也東坡至杭嘗為賦詩有古寺無人竹滿軒之句此閣至我朝而猶存也六飛南渡紹聖間以孤山為四聖觀有㫖令守臣遷竹閣與寺于北山此竹閣遷徙之大畧也天府雄劇曩以能政稱者猶百適是懼閣廢不具漫弗訾省今京尹户部尚書袁公韶填拊清暇援其舊以請廟朝恱從之畀以成材亟就規度秖視倍蓰此竹閣之既圮而復建也先是上美公治行冠壓後前隆以職秩而乆其任嵗更三閏吏肅民和服習其威惠勸趨其唯諾凡所營繕落成而後人知之修仆植僵徧于四境西湖最章章焉頃既裒此邦之先賢廬以居寓討其軼闕碣而賛之祠而祝之三賢之堂水仙之宫左右映發清標獨韻衣被輦下神州奥區山加秀而水増明矣公猶欿然搜攬幽䆳網羅放失而竹閣之建與寺俱新鏡清流屏翠巘晨光夕霏千態萬貌撫物興懐樂天如可作也公方以碩才用世助熙庶績則表賢厲俗首善始于京師是不可以無紀公不鄙謂清之俾繹樂天所以繫邦人之思者夀之于石清之既輯顛末于前復為之言曰召南之棠峴首之碑白之渠預之橋惠也人思之宜也若子陵釣石鄴侯書堂庾于樓陶于菊寓也人思之何也賢者所至其㳺居憩笑之所人必錮而留之有甚于肖形覆武者不然章華虒祈之麗偉阿房驪宫之雄勝闔闢隂陽吞吐日月既埃滅而無餘樂天之閣墁以白雲黼以緑浄祓以清風與烟飄漁屋相為隠見直南柯一息耳乃數百年而復顯樂天文章氣節固昭然莫掩者杭之多秀民也詎能人誦其詩户觀其傳而一談樂天奕奕若前日事㫁碑瘴墨流落野亭荒寺間過者徘徊顧瞻雖蜑夫胡賈亦摩桫太息而去樂天涖是邦獨治潮浚井見于紀載非有大功捍大患而人愛之如此吾是以知竹閣之賢于靈光也方其自放于寛閑之境幅巾短簟逍遥事外間吟肩茶吻塵視圭爵幾于齊物我泯智愚豈自知人世有樂天者况閣乎噫古今之變多矣陵谷之屢遷人物之數化廢興代謝相禪于無窮而賢者之名終不磨滅是必有以致之後之登斯閣也挹香山之髙風思京尹之雅徳當相須不朽云題詠黄宜山題竹閣移自孤山占北山荒凉老屋萬琅玕櫻桃楊栁空花夢千古清風滿閣寒玉泉浄空院在豆腐橋南齊建元中靈悟大師曇超開山卓菴講經演法詳見玉泉及富陽靈巖山天福三年始建寺名浄空院淳祐十一年理宗皇帝賜御書玉泉浄空之院六字咸淳三年太傅平章賈魏公捐錢重修五年省劄撥賜官田三百畆有奇記文周棟撰開山尊者記錢塘靈苑山屹立西湖之北舊無所聞南齊建元末靈悟大師卓菴演經龍君逺來聴法又為師撫掌出泉若珠林勝跡記若髙僧傳僧史具于沙門載籍者四富春二志臨安新志見于府縣紀述者三其說大㮣不殊此事實所由始也寺建于晉天福三年始名浄空今天子賜御書勅額加賜玉泉二字師舊稱南齊尊者嘉定始賜今號嘉應公即發泉龍君也淳祐始賜今封廟額嘉泰初賜靈泉嘉定改賜仁惠嘉熙又改賜神運此爵號次第也淳祐戊申内出金錢増屋二十楹于是靈悟有祠堂龍王有像殿守僧更易不常規制隨圯府尹趙公與􅊸極力外䕶奏仍甲乙住持之舊儀曹為之符下公府寺無常産淳祐庚戌始撥賜官田若干畆此寺計大畧也政和間有㫖與上竺同免科需今俱為御前雨暘祈禱第一所惟上方時有錫賚他無所仰焉師夙具道器為天人師禪定累日不起入山獨處虎兕循伏宋大明中奉詔往遼東宏讃禪道始㳺靈苑說法有老人來聴請曰我龍也世居富春鹿山昆弟五人我為長去冬邑民鑿山陶甓侵我室廬群龍怒而不雨今累月矣諸弟不從吾言願師一往化之師謂此菴亦無水汝能致之乎老人撫掌而泉出今寺西南有泉擊聲如珠纍纍而湧上瀦為前後二沼是也大旱不縮鉅浸不溢魚數百尾泳其中空明可鍳毛髪師将行龍感夢富春官吏其來迎也不約而同師離靈苑雨隨注至觀山結壇浮舟而􅗈洽龍為師建菴靈岩而峻不能陟化為白馬載師以登今石上馬跡岩沼蜴蜥之類存焉其後又以鉢覆小龍五百禜旱則有功詳見富春志其新志則内翰程公珌為宰時重修筆也臨安新志近被㫖修纂常經乙覽信而有證又何疑焉嗚呼靈矣哉師道尊千古名亘一時孤潔之操慈憫之心處則猛獸衛其禪寂出則教道闡于異域其可紀者諒不止靈苑春江二事世殊人逺編簡僅僅如此重可嘆也然錢塘自南齊距今身榮利而名堙没者皆是湖山何幸白衣大士顯于石晉之天福靈悟大師肇于南齊之建元雖功徳有隠顯命數有差等然皆儲祥衍慶遂與天地國家相為終始是可以力勝哉堯水湯旱盛世不能無師應現感物于數百年之先若預知帝王之興于此肇啟聖跡以俟有徳粤自駐蹕叩必契合不爽圭黍其與獨善而忘世者有間矣世徒以水旱神龍所職而不知聞經聴法釋嗔為喜感其不能感者師也師以徳嘉應以功美矣或曰師往富春既雨矣志言羣龍為之建菴不言師還則疑已去此矣是不然方其來靈苑也初何心于富春哉及嘉應勤勤懇懇請命茍存心于澤物不得辭也靈苑之菴師手築也靈岩之菴龍所為也又况神明之隩百靈庀職其亦知所先後矣世之有志而未獲伸者何可勝數使嘉應徒懐憫雨之厪不遇師無以諭羣龍以霈一時之澤師不得泉亦未必為富春之行理數適相符而相感盖有不祈而然者矣不則富春自一雨後未聞明詔再褒其功浄空邇日効靈非一事聖君錫命嘉惠非一端而謂其去而不返也可乎師之有始有卒惟石室祖琇知之通論謂邑宰將具舟迎師遁還靈苑信矣今聖徳休明天順人信醻功之典度越前古五風十雨撃壤歌康使人莫名其功至是而後知師與嘉應之心顧不韙與丙辰秋始識寺僧了圓圓剛介有志士也念師功徳散在紀録未有會粹之者慮其乆而磨滅而不傳也勤以為請及往來山間知師之事尤詳嘗聞至治之世四靈在囿諸福之物畢至然固有是事也近營稿未就夢若與師接可無言乎師諱曇超清河人來靈苑時諸書皆以為南齊之建元僧史則以為宋孝武之大明此于是乎從其衆者顯明院廣順二年吳越孟謙建舊名興福保清大中祥符元年改今額舊志有鑑空閣緑浄堂今廢紹興初為太傅儀王仲湜櫕所題詠東坡和黄秀才鑒空閣詩明月本自明無心孰為境挂空如水鑑寫此山河影我觀大瀛海巨浸與天並九州居其間無異蛇盤鏡空水两無質相照但耿耿妄云桂兎蟇俗說皆可屏我㳺鑒空閣缺月正淒冷黄子寒無衣對月句愈警借君方諸淚一沐管城穎誰言小叢林清絶冠五嶺褒忠衍福院元係智果觀音院嘉定十四年㫖撥充岳忠武王功徳院仍以褒忠衍福禪寺為額永寧崇福院元係内侍陳源花園獻重華宫為小隠御園夀皇聖帝撥賜貴妃張氏為墳寺紹熙元年賜充功徳院改今額淳祐元年㫖專一崇奉孝宗皇帝神御寺前有澗曰雙峯又曰金沙淳祐五年趙安撫與􅊸築小新隄僧道源即寺前建茶湯亭資國院乾徳三年孫賛明捨宅建元名報國治平三年改今名咸淳五年安撫潛說友重修賛明今為履泰郷土神錢氏封為履泰将軍浄嚴廣院内侍董仲永建紹興二十九年奏請充香火院改賜今額榮先資福院鄭節使邦善香火院紹熙壬子請今額慈聖院乾佑元年錢氏建舊名慈雲治平二年改賜今額中興後安櫕潘貴妃李賢妃有聖水池靈峯院開運元年錢氏建舊名鷲峰治平二年改今額舊有容碧軒不存妙智院開寶四年太尉張公建舊名報國觀音院治平二年改今額萬安院天福七年錢氏建舊名清化永安治平二年改今額普向院開運元年錢氏建紹興中殿帥楊存中請移建于北山鮑家田青枝塢專充殿司諸軍瘞所令僧主其香火記文王中書希吕撰紹興十六年朝廷以西湖之隂隙地三百弓為殿前司十三軍之塋地創立精舍為之薦㧞之所遷南蕩之廢寺曰普向者榜其上從故帥太傅楊王存中之請也乾道八年住持僧法千言兹寺之建諸軍之士生死䝉福獨其主帥之屢更敷陳之不時州縣之不相謀故賜額缺焉深恐歴日深久疑信相半本末之不克備無以新衆視示來世朝廷徳意殆成虚美是誠不可緩者敢以為請今殿帥節使王公友直即以其事聞于是有㫖賜以愍忠資福普向之額法千既以勑牒刋之堅珉矣又筆其大㮣使來請文希吕與千同時杖策而南者義不可辭昔先王之治天下其紀綱法度所以維持天下者甚設若其政理則不過曰本諸人情而已人情莫不好生則為之養生之道人情莫不惡死則為之送死之道是故生者遂其生死者得其死而無怨恨不滿之心孟子以養生送死無憾為王道之始揚雄氏亦以病者養死者藏為為政之始此之謂也自兵民始分日尋干戈若齊之誄宏父衛之殤童汪秦之封殽屍晉之收死傷見于傳記班班可攷惟唐太宗既定天下立佛寺十六所以福死士䘏典之有寺當自此始然驅無辜之民置之必死之地雖假手像教以資冥報甚非先王養生送死之意矣本朝聖聖相繼寝兵措刑著為家法今和戎有年邉塵不驚六軍之士安居而飽食優㳺以生死而且賜之塟地守以僧舍錫以美名恩深漏泉徳施㒺極三代以來本朝而止耳夫禮尚往來事有施報施而不報往而不來者世無是理也将有入是寺讀是文者灼然知聖人廣大之徳而潛有以發其忠孝慷慨之心以篤于施報往來之義異日摧城䧟陣立非常之功以上報非常之恩者必有其人矣其詞曰天生衆民作之君師惟君代天職其撫綏于衣其寒載食爾饑生養死藏惟君之為於赫我宋始終以仁二聖嗣理新之又新孰民而兵盛時是逢不戰不征天涵地容有名有糧錢帛既豐不幸而死又終其終耽耽北山古佛所廬喬木巉天下列幽墟鐘鼓朝昏梵唄凌虚死者可作揆安其居大哉天之徳二聖配之二聖之徳惟天似之小臣業儒文以識之尚俾來知寺之始基資徳院紹興二十三年慕容貴妃塟建為墳寺賜今額圓明崇福寺淳熙八年内侍霍汝弼請為香火院賜今額佛光福壽院元係小菴移請今額嘉定十七年佛光法師如坦請為塔院恭聖仁烈皇太后賜錢重建仍撥賜山田寧宗皇帝御書桂堂二字扁之丈室西峯浄嚴院在駞巘嶺下吳越王建今為皇叔祖感義郡王功徳院大明院天福三年吳越王建舊名永寧治平二年改今額普濟院嘉定十一年僧永隆建移請今額南資忠報院初名長夀庵續充徳夀宫張和國墳改賜和國菴慶元六年移請今額三藏塔院紹興初三藏法師法道在城建千佛閣寺是為子院法師之塔在焉崇親資福院在九里松奉張淑妃香火崇夀院在九里松天申萬夀圓覺院舊為修證了義法師塔院紹興初㫖重建圓覺院高宗皇帝御書寺額歸雲堂扁及三昧正受四大字閣扁夀皇聖帝賜御書圓覺經及御書聖製詩二首見御製門兩朝皆臨幸有御座御榻理宗皇帝御書清涼覺地四大字為方丈扁又有御書千字文碑及蘇文忠公書華嚴破地獄偈碑題詠吴寳謨鋼詩二首梵室香飄隔竹聞壁間肆筆爛奎文山深翠輦經行處猶卧從龍數㸃雲地偏境静人無事雨後風柔物可情山鳥定知琴意好倚花渾不作春聲時思薦福寺在九里松石人嶺下為憲聖慈烈太皇太后家墳寺高宗皇帝御書時思薦福之寺及觀音心經一卷太皇太后聖駕一再臨幸御書金剛經題其後云比緣重建天竺時思薦福寺寳塔既成敬書此經寘于塔中永以為鎮所集功徳用祝光堯夀聖憲天體道性仁誠徳經武緯文太上皇帝聖夀無疆今上皇帝夀厯延鴻又恭聖仁烈皇后誌云恭覩憲聖慈烈皇后所書金剛般若波羅宻經仰見毗賛之暇留神翰墨遵奉佛果宜其克享髙夀石本藏諸天竺靈山寺臣妾追慕聖意欲為印造以結善緣所刋之石立于塔院屋壁不佳未便于印造抑亦謭薄慮或擊損由是摹勒别石敬廣其傳所集洪因仰薦聖神上品受樂仍及皇圖永固教乘興隆俯及嫡兄綿延夀考寺有宜對亭通雲亭雙珠亭題詠靖逸葉紹翁詩云講罷閑來立矮欄袈裟衣薄翠光寒請師莫起雲屏想只作當年面壁看北山杜汝能詩云元知山不厭髙處更營亭對面開詩景當空列畫屏藥生香草異葢結古松靈見說師齋暇時來此讀經隆親永福院在靈隠寺西充隨龍温國夫人成氏香火院慶元六年賜今額明惠院開運二年建舊名定慧治平二年改今額見充吳越國忠懿王并賢徳順睦孫妃功徳院普圓院天福二年吳越王建舊名資嚴大中祥符元年改今額古跡有石筍白沙泉鄴公菴熙寧元年諫議大夫祖無擇出守于杭愛石笋之勝僧雲喻公之徒結草為菴取公封國以為名雲知有歌趙清獻公題名南陽公趙抃致政之十日同東堂法雲景徳三禪師上天竺講主浄師逰鄴公菴洎羣峰韜光菴抵暮記此元豐己未仲春二十三日壬戌題詠僧雲知鄴公菴歌云呼猿澗西藏石筍丹桂蒼松達鷲嶺㡬年陳迹絶纎埃一旦佳名出清景山家時喜來五馬相携欵曲空岩下遂許誅茅結小菴異日功成伴瀟灑菴成可以資静觀目前直見江湖寛鄴公政簡每頻到試茶笑傲浮雲端物外似忘軒冕貴此中深得林泉意野人陪着病維摩㳺息自同方丈地芳猷從此流千載且得而今光勝㮣隂趙循道宿普圓寺二首芒鞋侵曉踏青霜九里松引興長雲霧淺深山變態風烟舒卷水晶光千岩寒月籠疎薄一笛西風度渺茫短艇不來人意懶誰知搔首正相望去仙巾鶴氅與雲輕晚出岩梯最上層複複隴頭歸雁隂隂松下逺來僧風吹寒水光成叠木落重巒碧有稜行到湖邉歸興盡畫橋臨水與誰凭北資聖院天福二年吳越王建舊名大明大中祥符元年改賜保寧院天福三年吳越王建舊額保安無量壽院治平二年改今額法安院在靈隠寺西天福三年吳越王建舊額廣嚴唐長慶中有詩僧結庵于院之西自號韜光嘗與樂天唱和大中祥符元年改今額乾道九年充咸安郡王士銖功徳院趙清獻公題名元豐二年己未二月十二日壬戌資政殿大學士太子少師南陽郡公趙抃閱道謂韜光菴主祐光蘇文忠公題名蘇軾張璹楊傑王瑜元祐五年二月二日同逰韜光題詠白侍郎長慶四年正旦請韜光齋云白屋炊香飯葷羶不入家濾泉澄葛粉洗手摘藤花青芥除黄葉紅薑帶紫芽命師相伴食齋罷一甌茶不韜光不赴云山僧野性好林泉每向岩阿倚石眠解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不能飛錫去恐妨鶯囀翠樓前楊僧如璧如琳訪淵公不值詩云紫蕨伸拳筍破稍花飛盡緑隂交道人閉户不知處黄栗留鳴鵲在巢凉興化黄順之云瘦籐拄到古韜光分得山僧半榻幽鳥一聲春夢㫁濕雲漠漠䕶殘香楊蟠詩寂寞菴前草春深鹿自耕老僧垂白髪山下不知名郭功甫詩逢人寂無語結草自棲禪但見巖花笑龎眉不記年慶安院在行春橋南元係水陸菴嘉定十五年充麥嶺旌徳顯慶寺廨院顯慈集慶教寺在九里松淳祐十年創賜貴妃閻氏充香火院賜今額寺扁殿閣亭堂諸處皆理宗皇帝御書規制瑰傑金碧照映為湖山寺宇之冠咸淳臨安志卷七十九
