body:
  text: 咸淳臨安志卷九十一宋潜説友撰紀遺三紀事林逋居杭之孤山真宗賜號和靖處士逋工詩如曰草泥行郭索雲木呌鈎輈頗為士大夫所稱又梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世詠梅者多矣未有此句也又其臨終為句云茂陵他日求遺藁猶喜初無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云林逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録王冀公鎮金陵以書致錢塘講師遵式式將謁公過林逋逋以詩送云虎牙熊軾隐鈴齋棠樹隂隂長碧苔丞相望尊賔謁少清言應喜道人來閑居詩話杭妓胡楚龍靚皆有詩名胡云不見當時丁令威年來處處是相思若將幽恨同芳草却恐青青有盡時張子野老於杭多為官妓作詞而不及靚靚獻詩云天與羣芳十様葩獨分顔色不堪誇牡丹芍藥人題徧自分身如鼓子花子野于是為作詞也後山詩話所至驛舍旅邸留題壁間亦多有可取者見李仲南丙言臨安旅邸壁間一絶云太一峯前是我家滿床書籍舊生涯春城戀酒不歸去老却碧桃無限花庚溪詩話羅隐與桐廬章魯風齊名錢武肅崛起以魯風善筆札召為表奏孔目官魯風不就執之後以羅隐為錢塘令懼而受命因宴獻詩云一個禰衡容不得思量黄祖謾英雄自是始厚之古今詩話鄭毅夫守杭題僧文瑩所居壁云西湖頻送客緑波舟楫輕春入蘿逕静浪花翻逺晴又云東風江雲北飛燕同寄青春不相見又題杭郡閣云雨影横殘虹秋容隂映日寒江帶暮流晚角穿雲出峯蔵翠如織宿鳥去無迹封書寫所懐聊托金門翼時頗訝其氣象不逺後解杭麾將赴青社以病泊舟楚州而卒其語已兆于先矣玉壺清話唐令狐相進李逺為杭州宣宗曰聞李逺有詩云長日惟消一局棋豈可使治郡哉對曰詩人之言不足為實也乃薦逺亷察可任此正説詩者不以辭害志也䂬溪詩話吳仁璧闗右人中第入浙謁錢武肅殊禮之累辟入幕堅辭不就以詩謝云東門上相好知音數盡臺前郭隗金累重雖然容食椹力微無計報焚林弊貂不稱芙蓉幕衰朽仍慚玳瑁簮十里溪光一山月可堪從此負歸心武肅復遣人請撰羅城記仁璧堅不從武肅怒沉于江吳人惜之子野能為詩及樂府至老不衰居錢塘蘇子瞻作倅時年已八十餘視聴不衰家猶蓄聲妓子瞻嘗贈以詩云詩人老去鶯鶯在公子歸來燕燕忙盖全用張氏故事􅃧之石林詩話東坡云軾倅武林日夢神宗召入禁中宫女圍侍一紅衣女童捧紅靴一隻命軾銘之覺而記其一聫云寒女之絲銖積寸累天步所臨雲蒸霧起既畢進御上極歎其敏使宫女送出睇眎裙帶間有六言詩一首云百叠漪漪風縐六銖縰縰雲輕植立含風廣殿微聞環珮摇聲又云軾自蜀應舉京師道過華清宫夢明皇令賦太真妃裙帶詩乃前六言詩也覺而記之今書贈柯山潘大臨邠老二説不同故併録之漁隐叢話熈寧六年任杭州通判時知州係知制誥陳襄字述古是年冬十月内一僧寺開牡丹數朶陳襄作詩四絶軾嘗和云一朶妖紅翠欲流春光囬照雪霜羞化工只欲呈新巧不放閑花得少休又云當時只道鶴林仙解遣秋花發杜鵑誰信詩能囬造化直教霜枿放春妍又云花開時節雨連風猶向霜林染爛紅漏泄春光私一物此心未信出天工又云不憤清霜入小園故將詩律變寒暄使君欲見藍闗詠更請韓郎為染根此詩皆譏諷當時執政大臣以比化工但欲出新意擘劃令小民不得暫閑也以下東坡烏臺詩案熈寧七年為通判杭州于正月二十七日㳺風水洞有本州節推李佖知軾到來在彼等候軾到乃留題于壁其卒章不合云世上小兒誇疾走如君相待今安有以譏世之小人多務急進也其詩即不曽寫與李佖當年再游風水洞又云世事漸艱吾欲去永隨二子脫譏讒意謂朝廷行新法後來世事日益艱難小人多務讒謗軾度斯時之不可以合又不可以容欲棄官隐居也熈寧五年軾任通判杭州于十二月内與發運司勾當公事大理寺丞李杞因獵出㳺孤山作詩四首内第二首有譏諷其意已在王詵項内聲説熈寧六年内游孤山詩寄王詵除無譏諷外有誤隨弓旌落塵土坐使鞭箠環呻呼以譏諷朝廷新法行後公事鞭箠之多也又曰追胥保伍罪及孥百日愁歎一日娛以譏諷朝廷鹽法收坐同保妻子移鄉法太急也又曰嵗荒無術歸亡逋鵠則易畫虎難摸意取馬援言刻鵠不成猶類鶩畫虎不成反類狗言嵗既饑荒我欲出竒畫賑濟又恐朝廷不從乃似畫虎不成反類狗也熈寧六年因徃諸縣提㸃到臨安縣有知縣大理寺丞蘇舜舉來本縣界外太平寺相接軾與本人為同年自來相知本人見軾後言舜舉數日前入州却被訓狐押出軾問其故舜舉言我擘劃得人户供通家業役鈔規例一本甚簡前日將去呈本州諸官皆不以為然呈轉運副使王庭老等不喜差急足押出城來軾取其規例看詳委是簡便因問訓狐事舜舉言自來聞人説一小話云燕以日出為旦日入為夕蝙蝠以日入為旦日出為夕争之不决訴于鳯凰鳯凰是百鳥之王至路次逢一禽謂燕不湏徃訴鳯凰在假或云鳯凰渇睡今不記其詳却是訓狐權攝舜舉意以此譏笑王庭老等不知是非隔得一兩日周邠李行中二人亦來臨安與軾同游徑山蘇舜舉亦來山中相見周邠作詩一首與軾即無譏諷軾次韻和答兼贈舜舉云餔糟醉方熟洒面喚不醒奈何效燕蝠屢欲争晨暝其意以譏諷王庭老等如訓狐不分别是非也熈寧五年六月任杭州通判日寄周邠所作山村詩第三首云烟雨濛濛雞犬聲有生何處不安生但令黄犢無人佩布糓何勞也勸耕軾意言是時販鹽者多帶刀杖故取前漢龔遂令人賣劍買牛賣刀買犢則自力耕不勞勸督也以饑諷朝廷鹽法太峻不便也又第二首云老翁七十自腰䥥慚愧春山筍蕨甜豈是聞韶解忘味邇來三月食無鹽意山中之人饑貧無食縱老猶自採筍蕨充饑時鹽法峻急僻逺之人無鹽食動經數月若古之聖人則能聞韶忘味山中小民豈能食淡而樂乎以譏諷鹽法太急也第四首云杖藜褁飯去怱怱過眼青錢轉手空贏得兒童語音好一年强半在城中意言百姓雖得青苖錢立便于城中浮費使却又言鄉村之人一年兩度夏秋稅又數度請納和預買錢今此更添青苖助役錢因此庄家子弟多在城中不着次第但學得城語音而已以譏諷朝廷新法青苖助役不便也開運鹽河詩云居官不任事蕭散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能䘏農耕薨薨曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒隄上四顧但湖泓綫路不容足又與牛羊争歸田雖賤辱豈失泥中行寄語故山友謹勿厭藜􅅅是時盧秉提舉鹽事擘劃開運鹽河差夫千餘人某于大雨中部役其河只為搬鹽既非農事而役農民秋田未了有妨農事又其河中間有涌沙數里意言開得不便自歎泥雨勞苦羨司馬長卿居官而不任事又愧陶淵明不早棄官歸去也農事未休而役千餘人故云鹽事星火急誰能䘏農耕又言百姓已勞苦不易天雨又助官政之勞民轉致百姓疲弊役人在泥水中辛苦無異鴨與猪又言某亦在泥中與牛羊争路而行若歸田豈失此哉故云寄語故山友謹不可厭藜􅅅而思仕宦以譏開運鹽河不當又妨農事也赴杭州通判弟轍送至頴州作初别詩云征帆掛西風别淚滴清潁留連知無益惜此湏㬰景我生三度别此别尤酸冷念子似先君木訥剛且静寡詞真吉人介石乃機警至今天下士去莫如子猛嗟我久病狂意行無坎井有如醉且墜幸未傷輙醒從今得閑暇黙坐消日永作詩解子憂持用日三省此詩云至今天下士去莫如子猛為弟轍曽差在制置三司條例司充檢詳文字争議新法不合而罷既美弟轍去之果決則意亦是譏新法不便也某初到杭州寄子由詩云眼看時事力難任貪戀君恩退未能遲鈍終湏投劾去使君何日喚聾丞此詩云眼看時事力難任時事謂新法青苖助役等事也言已才力不能勝任意亦是譏新法事煩難了辦也游徑山留題詩云衆峰來自天目山勢若駿馬奔平川中􅂗勒破千里足金鞭玉􅌱相囬旋人言山住水亦住下有萬古蛟龍淵道人天眼識王氣結茅宴坐荒山顛精誠貫山石為裂天女下試顔如蓮寒忩暖足來撲握夜鉢咒水降蜿蜒雪眉老人朝叩門願為弟子長叅禪爾來廢興三百載奔走吳會輸金錢飛樓湧殿壓山破朝鐘暮鼔驚龍眠晴空偶見浮海蜃落日下數投村鳶有生共處覆載内擾擾膏火同烹煎近來愈覺世議隘毎到寛處差安便嗟余老矣百事廢却尋舊學心茫然問龍乞水歸洗眼欲看細字銷長年龍井水洗病眼有效此詩云近來愈覺世議隘以譏近日進用之人多是刻薄議論褊隘不容人過失故見山中寛閑之處為樂也八月十五日觀潮作詩曰吳兒生長狎濤淵冒利忘生不自憐東海若知明主意應教斥鹵變桑田時新有㫖禁弄潮故云吳兒生長狎濤淵冒利輕生不自憐盖言弄潮之人為貪官中利物致其間有溺死者故朝㫖禁斷某為主上好興水利因作此詩言東海若知明主意應教斥鹵變桑田意言東海若知此意當令斥鹵地盡變桑田此事之必不可成者以譏興水利之難成也熈寧八年軾知徐州日有杭州鹽官縣安國寺相識僧居則請軾作大悲閣記意謂舊日科場以賦取人賦題所出多關渉天文地理禮樂律厯故學者不敢不留意于此等事今來科場以文義取人故學者只務空言髙論而無實學以譏諷朝廷改更科場法度不便也開平元年梁太祖即位封錢武肅鏐為吳越王時有諷錢拒其命者錢笑曰吾豈失為一孫仲謀耶拜受之改其鄉臨安縣為衣錦軍是年省塋壟延故老旌鉞鼙吹振耀山谷自昔㳺釣之所盡䝉以錦繡或木石至有封官爵者舊貿鹽肩擔亦裁錦韜之一鄰媪九十餘携壺漿角黍迎于道鏐下車亟拜媪撫其背猶以小字呼之曰錢婆留喜汝長成盖初生時光怪滿室父懼将沉于了溪此媪酷留之遂字焉為牛酒大陳鄉飲别張蜀錦為廣幄以飲鄉婦凡男女八十已上金樽百嵗已上玉樽時黄髪飲玉者尚不减十餘人鏐起執爵于席自唱還鄉歌以娯賔曰三節還鄉兮掛錦衣吳越一王駟馬歸臨安道上列旌旗碧天明明兮愛日輝父老遠近來相隨家山鄉眷兮會時稀斗牛光起兮天無欺時父老雖聞歌進酒都不之曉武肅覺其歡意不甚浹洽再飲髙掲吳喉唱山歌以見意詞曰你輩見儂底歡喜别是一般滋味子永在我儂心子裏歌闋合聲賡賛呌笑振席歡感閭里今山民尚有能歌者湘山野録姚舜明庭輝知杭州有老姥自言故娼也及事東坡先生云公春時每遇休暇必約客湖上早食于山水佳處飯畢毎客一舟令隊長一人各領數妓任其所適晡後鳴鑼以集之復會望湖樓或竹閣之類極歡而罷至一二鼓夜市猶未散列燭以歸城中士女雲集夾道以觀千騎之還實一時之勝事也以下王明清揮麈録及汝隂餘話王文穆欽若以故相來守杭錢塘一老尉蒼頭華髪矣文穆初甚不樂詢其履歴乃同年生惻然哀之遂封章于朝詔特改京秩尉以詩謝之云當年同試大明宫文字雖同命不同我作尉曺君作相東風元沒兩般風蔡元長少年鼎貴建第錢塘極為雄麗全占山林江湖之絶勝今行在殿前司是也宣和末金冦紛亂盡以平日之所積用巨艦泛汴而下置其宅中靖康初下籍沒之詔適毛逹可友守杭州逹可元長門下士也緩其施行宻喻其家蔵隐逾旬所以蔡氏之後皆不貧又嘗以金銀寳貨四十擔寄其族人家海鹽者已而蔡父兄子弟誅竄不暇徃索盡掩為已有至今海鹽蔡氏富冠浙右祐陵時有僧妙應者江南人徃來京洛間能知人休咎其説初不言五行形神且不在人之求而告之佯狂奔走初無定止飲酒食肉不拘戒行人呼之為風和尚元長榹職居錢塘一日忽直造其堂書詩一絶云相得端明似虎形摇頭擺腦得人憎看取明年作宰相張牙劈口喫衆生又書其下云衆生受苦兩紀都闕已而悉如其言紹興初猶在廣中蜕于栁州明清投轄録中亦書其畧張彦實啟番陽人子公叅政大父行有東忩集行于世自知廣徳軍秩滿造朝除著作佐郎秦會之當軸其兄楚材為祕書少監約彦實觀梅于西湖楚材有詩彦實次其韻云天上新驂寳輅囬看花仍趂雪霙開折歸忍負金蕉葉笑挿新臨玉鏡臺女堞未湏翻角調錦囊先喜助詩材少蓬自是調􅅅手葉底應尋好句來時楚材再婚故及玉鏡臺事會之見之大稱賞曰旦夕當以文字官相處遂擢左史再遷而掌外制揚原仲並居西掖代言多彦實與之潤色初亦無他彦寔偶戱成二毫筆絶句云包羞曽借虎皮蒙筆陣仍推兎作鋒未用吹毛强分别即今同受管城封原仲以為誚已大怒愬于會之訹言路彈之彦實以本官罷為宫祠謝表云雖造化之有生有殺本亦何心然臣下之或賞或刑咸其自取宣和初徽宗有意征遼蔡元長鄭逹夫不以為然童貫初亦不敢領畧惟王黼蔡攸將順賛成之有諜者云天祚貌有亡國之相班列中或言陳堯臣者婺州人善丹青精人倫登科為畫學正黼聞之甚喜薦其人于上令銜命以視之擢水部員外郎假尚書以將使事堯臣即挾畫學生二員俱行盡以道中所歴形勢向背且繪天祚像以歸入對即云彼主望之不似人君臣謹寫其容以進若以相法言之亡在旦夕幸速進兵兼弱攻昧此其時也并圖其山川險易以上上大喜即擢堯臣右司諫賜予鉅萬燕雲之役遂決時堯臣方三十三嵗遷至侍御史會蔡元長復將起預政事黼訹堯臣望風上䟽以元長前日不合人情狀攻之初榜朝堂然上猶眷元長黜堯臣為萬州監税而元長竟不告廷堯臣竟􅃦是行黼敗堯臣亦遭斥建炎中監察御史李宷䟽其為黼鷹犬誤國之罪始詔除其名初秦會之主判髙宻堯臣以滄州掾曺同為京東漕司試官因以厚甚會之擅國遂盡復故官雖不敢用招至武林毎延至相府欵宻叙舊堯臣以前所錫萬金築園亭于西湖之上極其雄麗今所謂陳侍御花園是也會之炎炎時前御史敢于國門外建第以此可見越人姚宏字令聲宣和中在上庠有僧妙應者能知人休咎語令聲云君不得以令終候端午日伍子胥廟中見石榴花開則竒禍至矣令聲初任監杭州税在任三載足跡不敢登吳山將赴江山宰自其諸暨所居趨越來訪帥憲既歸出城數里值大風雨亟謁路旁一小廟中見庭下榴花盛開妍甚可愛詢祝史云此伍子胥廟其日乃五月五日令聲惨然登車未幾秦相以宿怨追赴大理而死周美成晚歸錢塘鄉里夢中得瑞鶴仙一闋悄郊原帶郭行路永客去車塵漠漠斜陽映山落歛餘紅猶戀孤城䦨角凌波步弱過短亭何用素約有流鶯勸我重解綉鞍緩引春酌不記歸時早暮上馬誰扶醒眠朱閣驚颷動幕猶殘醉遶紅藥歎西園已是花深無地東風何事又惡任流光過却歸來洞天自樂未幾方臘盗起自桐廬擁兵入杭時美成方會客聞之倉黄出奔趨西湖之墳菴次郊外適際殘臘落日在山忽見故人之妾徒步亦為逃避計約下馬小飲于道旁旗亭聞鶯聲于木杪分背少焉抵菴尚有餘醺因卧小閣之上恍如詞中逾月賊平入城則故居皆遭蹂踐旋營緝而處繼而得請提舉杭州洞霄宫遂老焉悉符前作美成嘗自記甚詳今偶失其本姑追記其略而書于編齋頭頃有沈必先日記言奏事殿中髙宗云近有人自東京逃歸聞張九成見為劉豫用事可怪必先奏云張九成在其鄉里臨安府鹽官縣寄居去行闕無百里而逺兩日前方有文字來乞將磨勘一官囬授父改緋章服幸陛下裁之上云如此則所傳妄矣可笑不若便與一差遣召來盖子韶廷試䇿流播偽齊人悉諷誦故傳疑焉翌日降㫖除祕書郎元祐中東坡守杭毛澤民為法曺掾公以衆人遇之秩滿辭去是夕宴客有籍妓歌贈别小詞卒章云今夜山深處斷魂分付潮囬去公問誰所作妓以毛法􅔟對公語坐客曰郡僚有詞人不及知某之罪也翌日折簡追還留連數月澤民因此得名百家詩選序咸淳臨安志卷九十一
