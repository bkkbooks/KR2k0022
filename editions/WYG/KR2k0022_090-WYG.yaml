body:
  text: 咸淳臨安志卷九十二宋潜說友撰紀遺四紀事歐陽公五代史叙列國年譜云聞于故老謂吳越亦嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之及旁采諸國書與吳越徃來者多矣皆無稱帝之事獨得其封落星石為寳石山制書稱寳正六年辛夘耳王順伯收碑有臨安府石屋崇化寺尊勝幢云時天寳四年嵗次辛未四月某日元帥府府庫使王某又明慶寺白傘盖陀羅尼幢云吳越國女弟子吳氏十五娘建其發願文字曰十五娘生沗覇朝貴彰國懿天寳五年太嵗壬申月日題順伯考其嵗年知非唐天寳而辛未乃梁開平五年其五月改乾化壬申乃二年梁以丁夘纂唐武肅是嵗猶用唐天祐次年自建元也錢唐湖廣潤龍王廟碑云錢鏐正明二年丙子正月建新功臣禪院碑封睦州墻下神廟勅皆正明中登聖寺磨崖梁龍徳元年嵗次辛巳錢鏐建又有龍徳三年上宫詩是嵗梁亡九里松觀音尊勝幢寳大二年嵗次乙酉建衢州司馬墓誌云寳大二年八月歿順伯案乙酉乃唐莊宗同光三年其元年當在甲申盖自壬申以後用梁紀元年至後唐革命復自立正朔也又水月寺幢云寳正元年丙戍十月具位錢鏐建是年為明宗天成招賢寺幢云丁亥寳正二年又小昭慶金牛碼碯等九幢皆二年至五年所刻貢院前橋柱刻寳正六年嵗在辛夘造然則寳大止二年而改寳正寳正盡六年次年壬辰有天竺日觀菴經幢復稱長興三年八月用唐正朔其年三月武肅薨方􅃦病與其子元瓘曰子孫善事中國勿以易姓廢事大之禮于是以遺命去國儀用藩鎮法然則有天寳寳大寳正三名歐陽公但知其一耳通鑑亦然自是厯晋漢周及本朝不復建元今猶有清泰天福開運會同係契丹年乾祐廣順顯徳石刻存者三四十種固未嘗稱帝也已下容齋隨筆王順伯家有錢忠懿一判語其狀云臣賛寧右臣伏奉宣㫖撰文䟽今建呈乞給下取設齋日五更前上塔臣自宣却欲重建乞于仁政殿前夜間化却不然便向塔前化並取聖㫖判曰便要吾人宣讀後于真身塔前焚化二十七日而在前花押予謂錢氏固嘗三改元但或言其稱帝則否也此狀内進呈聖㫖等語盖類西河之人疑子夏于夫子故自貽僣帝之議想他所施行皆然矣東坡在杭州作有美堂會客詩頷聫云天外黒風吹海立浙東飛雨過江來讀者疑海不能立黄魯直曰盖是為老杜所誤因舉三大禮賦朝獻太清宫云九天之雲下垂四海之水皆立以告之二者皆句語雄峻前無古人坡和陶停雲詩有云雲屯九河雪立三江之句亦用此也國朝承平之時四方之人以趨京邑為喜盖士大夫則用功名進取係心啇賈則貪舟車南北之利後生嬉戱則以紛華盛麗而悦夷攷其實非南方比也讀歐陽公送僧慧勤歸餘杭之詩可知矣曰越俗僣宫室傾貲事雕墻佛屋尤其侈耽耽擬侯王文彩瑩丹漆四壁金焜煌上乗百寳盖宴坐以方床胡為棄不居棲身客京坊辛勤營一室有類燕巢梁南方精飲食菌笋比羔羊飯以玉粒粳調之甘露漿一饌費千金百品羅成行晨興未飯僧日昃不敢嘗乃兹隨北客枯粟充飢腸東南地秀絶山水澄清光餘杭幾萬家日夕聞清香烟霏四面起雲霧雜芬芳豈如車馬塵鬂髪染成霜三者孰苦樂子奚勤四方觀此詩中所謂吳越宫室飲食山水三者之勝昔日固如是矣公又有山中之樂三章送之歸勤後識東坡為作詩集序者錢塘關景仁子開為稅官為其下告訐郡守械之獄子開弟子東注徃會稽告急于兵部侍郎汪彦章汪為馳書屬杭守事遂釋子開具書謝汪未逹而死子東為致之汪書其後曰解晏子之驂昔曽伸于賢者挂徐君之劍今有感于斯人已下夷堅志蔡元長初登第為錢塘尉巡捕至湯村薄晩休舍有道人狀貌甚偉求見蔡平日喜接方士亟延與語飲之酒而去明日宿他所復見之又明日泊近村道人復至飲酒盡數斗懇曰夜不能歸願託宿可乎蔡始猶不可其請至再不得已許之且同榻命蔡居外已處其内戒曰中夜有相尋覔者告勿言蔡意其姦盗亡命將有捕者身為尉顧匿之不便也然無可奈何展轉至三更目不交睫聞舍外人聲俄頃漸衆遂排户入曰車四元在此何由可耐欲就床擒之或曰恐并損床外人帝必怒吾屬且獲罪蔡大恐起坐呼從吏無一應者道人安寢自如撼之不動外人云又被渠軃了六十年可怪可怪咨嗟良久聞室内如掲竹紙數萬畨之聲鷄鳴乃寂呼從者始應問所見皆不知道人矍然興謝曰某乃車四元也頼公脱此大厄又可活一甲子已度世第三次矣自此無所患公當貴窮人爵吾是以得免如其不然與公皆死矣念無以為報吾有藥能化紙為鐡鐡為銅銅為銀銀又為金公欲之乎蔡拒不受强語乾汞之術曰他日有急當用之天且明别去後不復見蔡唯以其説傳中子翛蔡死翛家竄廣西賴是以濟蔡之客陳丙嘗為象郡守云然張子韶侍郎謫居大庾得目疾後為永嘉守中風手足不能舉目遂内翳丐祠禄還塩官舊隐紹興二十九年三月望夜夢青衣人引至大寺門金書牌八字但記其二曰開福一僧如禪刹知客見張甚喜延入坐張問主僧為誰曰沈元用給事也張曰吾與沈先生久不相見亟欲謁之命取公服隨語即至見沈再拜沈答其半禮勞苦如平生且曰尊公在此命青衣導徃方丈東小堂其父母方對坐長嘯張趨拜號泣旁人叱曰此不是哭處復至法堂前問曰何故無佛殿青衣曰此以十方法界為佛殿張曰吾病廢又失明未知他日有眼可見佛有口可誦經否曰侍郎何嘗不見佛何嘗不誦經又行及門側有小池清泠外設欄楯青衣曰八功徳水也酌一杯飲之凉徹肌骨西廡一室極潔中挂畫像視之乃張冩真大駭曰何以得此青衣曰異日當主此地然待公見玉帶了即來遂寤遽召門人郎曄使書其事皆謂玉帶為吉證若疾愈且大拜至六月二日兩疾頓除即日出謁先墓繼徃所親家燕集如是五日偶與諸生讀江少虞所集事實類苑至章聖東封丁晉公取玉帶事怒曰丁謂真奸邪雖人主物亦以術取因不懌廢卷而入疾復作不能言翌日卒人始悟玉帶之夢張夀六十八云紹興二十九年閏六月塩官縣雷震先雷數日上管場亭户顧徳謙妻張氏夢神人以宿生事責之曰明當死雷斧下覺而大恐流淚悲噎姑問之不以實對姑怒曰以我嘗貸汝某物未償故耶何至是張始言之姑殊不信明日暴風起天斗暗張知必死易服出屋外桑下立黙自念震死既不可免姑老矣奈驚怖何俄電雷晦𠖇空中有人呼張氏曰汝實當死以適一念起孝天赦汝又曰汝歸益為善以此語世人也浙西兵馬都監康湑居臨安寳蓮山夏夜且睡為蛙聲所聒命小童捕之湑熟􅄰夢十三人乞命湑曰吾職雖兵官非能擅生殺者何以能貸汝死曰但公見許無不可者少焉魘窹告其妻妻曰得非羣蛙乎呼童詰之已置一瓶中騐其數正十三枚也即釋之時紹興二十九年京師人魯畤紹興十一年在臨安送所親于北閘下忘携錢行解衣質于庫見主人如舊熟識者思之而未得退訪北關税官朱子文言及之盖數年前所常見丐者也其人本豪民遭亂家破與妻行乞于市使三子拾楊梅核椎取其實以賣少子嘗見一白䑕在聚核下歸語父父戒曰明日徃捕之得而貨于禽􅃧者必直數百錢勿失也迨旦母與偕行至故處果見䑕逐之及湧金門墻下入穴中而蔵母立不去遣子歸取鍤􅓯地深可三尺望䑕尾猶可見俄得一青石掲去之下有大甕白金滿中遽奔告其父父至不敢取亟詣府自列願以半與官而乞廂吏䕶取府主從其言得銀凡五千兩持所得即日鬻之買屋以居而用其錢為子本遂成富家即庫中主人也臨安萬松嶺上多中貴人宅陳内侍之居最髙紹興十五年盛夏納凉至四鼔未􅃦道上人跡已絶忽見獄卒衣黄衣領三人自北而南一衣金紫者行前其次着紫衫又其次着凉衫到劉供奉門外升階欲上金紫者難之獄卒曰彼中已承當如何不去時已晩請速行乃俛首而入其後二人相謂曰彦通早聴吾言當不至是皆歎息相繼亦入俄聞門媪索燈甚急曰犬生三子毛色甚可愛明日陳具以語劉育于家稍長人或呼彦通則奔走而前竟莫知為何人也塩官縣慶善寺明義大師了宣退居邑人鄒氏菴隆興元年春晨起行徑中見鳩鶵墮地携以歸躬自哺飼兩月乃能飛日縱所適夜則投宿屏几間是嵗十月其徒惠月復主慶善寺迎致其師于丈室之西偏逮暮鳩歸則聞無人矣旋室百匝悲鳴不止守舍者憐之謂曰吾送汝歸老師處明日籠以授宣自是不復出恒狎左右以手摩拊皆不動他人近之輙驚起嗚呼孰謂畜産無知乎紹興二年兩浙進士類試于臨安湖州談誼與鄉友七人謁上天竺觀音祈夢誼夢人以二楪貯六茄為餽惡之惟徐楊夢食巨蟹甚美迨旦同舍聚坐一客語及海物黄甲者揚問其狀曰視蝤蛑差小而比螃蠏為大揚竊喜乃以夢告人以為必中黄甲之兆洎榜出六人皆不利揚獨登科後二年誼復與周元特操赴漕司舉又同詣寺前一夕周夢與諸人同登殿誼先抽籖三反而三不吉餘以次請禱周立于後曰所以來唯欲求夢爾何以籖為衆强之方詣筒下遇婦人被髪如新沐者從佛背趨出謂其貴家人急避之遂寤明晨入寺誼所卜三籖果不吉餘或吉或否周但焚香再拜願得夢是夜夢鄉人徐廣之持省榜至凡列三等已為中等第一人已而賀客四集有道士在焉明年七月省試罷還吳興待榜他日閲市聞呼于後曰元特奉賀奉賀囬顧乃徐廣之也云適過郡門見掲試貼司榜内一人與君姓名同聊相􅃧耳周方譙責之則又有言曰省榜自南門入矣遂相與散歸及家而報至次日數客來賀一道士儼然其中周曰與君不相識何以辱顧我道士笑曰君豈忘之耶去年君過我卜我推君五行知今年必及第今而實然故來賀以印吾術非有所求也遽辭去沉思其人乃開元寺賣卜者始騐昨夢無小不合周果居中等雖非首選而于吳興為第一人夫廣之之戯談黄冠之旅賀皆偶然細事也而夢寐魄兆已先見于旬月之前人生萬事不素定乎國朝故事翰林學士草宰相制或次補執政謂之帶入大觀三年六月八日河清源執中登庸四年六月八日張無盡啇英登庸皆張䑓卿閣草麻竟無遷寵時蔡京責太子少保張當制詆之甚切為搢紳所傳誦京衘之會復相即出張知杭州明年六月八日宴客中和堂忽思前兩嵗宿直命相正與是日同乃作長短句紀其事曰長天霞散遠浦潮平危欄駐目江臯長記年年榮遇同是今朝金鑾兩囬命相對清光頻許揮毫雍容久正茶杯初賜香袖時飄歸去玉堂深夜泥封罷金蓮一寸方燒帝語丁寧曽被華衮親襃如今漫勞夢想歎塵蹤杳隔仙鼇無聊意强當歌對酒怎消觀者美其詞而訝其卒章失意未幾以故物召還遽卒于官夀止四十䑓卿河陽人濟南李茇字定國寓臨安軍營中以聚學自給暇則縱㳺湖山嘗欲詣浄慈寺過長橋于竹徑迷路見青衣道人林下􅓯笋茇揖之道人問所徃曰將徃浄慈瞻禮五百羅漢道人曰未湏去且來同食燒笋食之甚美俄風雨晦𠖇失道人所在茇皇懼伏林間少頃雨止尋徑而出至寺門下覺身輕神逸行步如飛洎歸舍不復飲食其從兄大猷謨為諸王宫教授將之任遣僕致書見其顔如桃紅且能辟糓以語大猷及大猷至則已去云逰茅山矣後又聞入蜀隐青城山大猷為梓路提刑使人至眉訪所在眉守復書報數年前已輕舉乗雲而去今唯繪象存乾道三年秋臨安大雷震軍器所作坊兵龍澤夫婦并小兒曰郭僧凡三人震死于一室初澤父全既死澤妹鐡師居白龜池為娼其母但處女家遇子受俸米則來取三斗去澤夫婦頗厭其至屢出惡言郭僧者亦相與罵侮以乞婆目之故獲此譴同時有嚴州人陳永年同其兄開銀舖于臨安市狂㳺不檢母私儲金十數兩規以送終恐永年求取無度不使知一日開箧永年適自外來見之遽攫而走母恚悶仆絶兄追及争奪僅得其半以歸母母遂病卧是夕永年亦遭震死錢塘江潮八月十八日最大天下偉觀也臨安民俗大半出觀紹興十年秋前二夕江上居民或聞空中語曰今朝當死于橋者數百皆㐫淫不孝之人其間有名而未至者當分遣促之不預此籍則斥去又聞應者甚衆民怪駭不敢言次夜跨浦橋畔人夢有來戒者云來日勿登橋橋且折旦而告其隣數家所夢皆畧同相與危懼比潮將至橋上人已滿得夢者從旁伺之遇親識立于上者宻勸之使下咸以為妖妄不聴湏㬰潮至奔洶異常驚濤激岸橋震壊入水凡壓溺而死數百人既而死者家來號泣收歛道路指言其人盡平日不逞輩也乃知神明罰惡假手致誅非偶然耳臨安塩橋富室李省販海作商毎出必經涉嵗月紹熈元年與同業六七人共宗伴而出亘四年弗反且無音耗其妻絶憂之有與李善者謂妻曰同塗數客已盡歸不應獨後豈非墮于非命乎宜徃占之妻厯訪十餘肆皆云不吉恐難得還妻慟哭而歸召僧建道場招魂挂服聞空中泣聲甚哀出視之見李在渺茫烟霧間宛如存日仍詢問㓜稚婢妾且云賴汝薦㧞之功獲離苦難明日妻買地造塚備極力役之費又一月李泛舟逹江下元不死也黠鬼詐為此態予累書之矣朱思彦則淳熈初知臨安縣因鈎校官物得押録髙生盗侵之過其妻尤貪冒毎攬鄉民納官錢詐給印鈔而私其直時髙以事上府先逮妻送獄髙歸詢詰之應答殊不遜遂并鞠治囚繋月餘日加絣訊一夕亟定牢二人哀泣言楚毒已極恐無生理丞惻然憐之會朱延過客飲宴席未散乃為破城出之使潜竄跡明日丞詣縣與朱言髙某為胥長而夫婦盗沒民錢且對長官咆哮誠宜痛治然久在囹圄昨夜呼其名已困頓不能應不免責出之旋聞皆到家即死幸不殞于獄不必彰聞其子亦願歛瘞既從其請矣失于顓擅此情悚然朱喜丞之同嫉惡又處事委曲無跡致詞言謝迨反室復念彼罪不至死一旦併命異時豈不累已正不然將有隂遣寃􅑂之撓自是寢食為之不寧遂見二鬼裸形披髪箠㾗遍體徑前挽衣裾曰我罪不過徒𨽻乃淪㝠塗又令縣丞屏去骸骨惨忍如是非得爾徃地下證辨斷無相捨之理朱噤不得對遂感疾鬼朝夕在傍丞來問疾朱告之故且曰思不忍一時之忿至不可悔今又奚言丞笑曰兩人實不死吾憫其困而脱之匿諸邑下親戚家而紿以亡告耳朱曰若是則日日現形吾前者為何人丞曰此憂疑太過所致當呼使來甫經宿果至拜于廷下朱登時心志豁然厥疾頓愈命髙復故役焉政和中提舉兩浙路學事楊通貫之按部婺州徃訪一異人坐間典牋吏以錢塘尉書至未開緘異人曰得非求舉削乎楊曰然方欲論薦曰無益也渠為五百鵝訴寃非久于世者楊未之信明日遣駛卒持薦牘徃比至則已殂楊後到錢塘呼尉史問其狀對曰以病死曰嘗殺鵝乎曰平時不曽殺生數月前平江朱文尉託造鵞鮓遂買五百頭醢之楊深加悼歎疑異人者通知幽明之故云乾道六年冬吕徳卿偕其友王季夷嵎魏子正羔如上官公禄仁徃臨安觀南郊舍于黄氏客邸王魏俱夢一人著漢衣冠通名曰班固既相見質問西漢史疑難臨去云明日暫過家間少欵可乎覺而莫能曉各道夢中事大抵畧同適是日案閲五輅四人同出嘉會門外茶肆中坐見幅紙用緋帖尾云今晩講説漢書相與笑曰班孟堅豈非在此耶旋還到省門皆覺微餒就入一食店視其牌則班家四色包子也且笑且嘆因信一憇息一飲饌之微亦顯于夢寐萬事豈不前定乎王仲衡希吕淳熈二年為起居舍人臨安為僦吳山一新宅方徙居次日未曉將赴朝其婢詣厨欲煮湯才開厨門見異物如人在竈下若摇兩扇之狀呼問訶叱皆弗應婢恐而出告于王王未以為然復遣老兵張進携燈徃騐物凝立不動燈亦滅進還報王淮北人有膽勇暗中㧞劍徑趨之物猶自若旋覺有人至疾走赴後門穿狗竇出未半王揮劍斷其身為二取火照視乃曰白鹿也洒血滿地王退朝剥其肉分餉侍從鹿之白者世所鮮有初疑為不祥後一月乃除淮西帥淳熈七年夏秋之交浙西不雨苦旱吴江塔院大古井其水穢黒不堪汲飲僧命匠王大者浚之日亭午外間居人見烈焰從井中出蓬勃丈許匠被爇皮膚皆灼破急出即死一賣果實小民過其傍亦損面又焚井亭自是水清冷可鍳同時有菜户孫氏亦浚井匠入鑿土聞其下人聲良久一衣緑者坐胡床一黄衫卒捧文書一童侍立匠望其處如官府然㕔堂整峻黄衣叱之出急引索而登僅獲免識者疑為龍神所據無復敢窺此井遂廢乾道初臨安靈隐寺後山茁一蕈圓徑二尺寺僕見之喜其光明潤澤採以納長老長老驚詫以為目所未覩謂之曰我固願食異味然合院三百人今不過能及十之一非吾法平等意也于是賫餉楊郡王楊亦訝其大曰是當以奉玉食乃獻奉于孝宗詔以賜靈隐初不知其所從來也迨復持至寺已經日􅌉内頗有汁沾濡兩犬在側争䑛之俄頃間皆跌足若狂眼突毛顫仆地死諸僧乃悟為毒物使之入天庖寧不大為咎累亟瘞諸沉坑而不暇窮其根本惟萬乗所御自有神物䕶持楊王亦大貴人長老不私口腹故皆脱于意外之禍咸淳臨安志卷九十二
