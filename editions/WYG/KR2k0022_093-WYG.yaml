body:
  text: 咸淳臨安志卷九十五宋潜說友撰紀遺七紀文詩沈休文早發定山夙齡愛逺壑晩涖見竒山標峯綵虹外置嶺白雲間傾壁忽斜樹絶頂復孤圓歸海流漫漫出浦水濺濺野棠開未落山櫻發欲然忘歸屬蘭杜懐祿寄芳荃眷言採三秀徘徊望九仙杜荀鶴錢塘寄姚中丞豈謂無心求上第難安帝里為家貧江南江北閑為客潮去潮來却老人兩岸雨収鶯語栁一樓風滿角吹春花前不獨垂鄉淚曽是朱門寄食身錢唐别羅隠故國看看逺前程計在誰五更聴角後一葉渡江時吾道天寜䘮人情日可疑西陵向西望雙淚為君垂呈錢唐羅判官還鄉夫子遇賢侯撫字情知不自由莫把一名専懊惱放教竹馬絶寃讎猩袍懶着辭公宴鶴氅閑披訪道流猶有九華知已在羡君髙卧早囘頭權載之富陽道中又入亂峯去逺程殊未歸烟蘿迷客路山果落征衣欹石臨清淺晴雲出翠㣲漁潭明夜泊心憶謝𤣥暉送二十叔赴餘杭尉拜首直城隂樽開意不任梅仙歸劇縣阮巷奏離琴春草吳門緑秋濤浙水深十年曽旅寓應惬宦㳺心發杭州泛富春江候曉起徒御春江多好風白波連青雲浩蕩晨光中四望浩無際沉憂将此同未離奔走途但恐成悲翁俯見觸餌鱗仰目凌霄鴻纓塵日已厚心累何時空區區此世人所向皆樊籠唯應杯中物醒醉為窮通故人元圃姿瓊樹紛青葱終當此山去共結蘭桂藂孟浩然将㳺天台留别臨安李主簿枳棘君尚棲匏瓜吾豈繫雖念離當夏漂泊指炎裔一作念離當夏首漂泊捐夷裔江海非㳺情田園失歸計空山既早發漁浦亦宵濟泛泛隨波瀾行行任艫枻故林日已逺羣木坐成翳羽人在丹邱吾亦從此逝皇甫冉送元盛一作晟歸潛山一作歸於潛山何如深山秋事早君去復裛露収新稼橡作迎寒葺舊廬題詩即招隐作賦是閑居别後空相憶􅄞康懶寄書白樂天自中書舍人出守杭州路次藍溪作太原一男子自顧庸且鄙老逢不次恩洗拔出泥滓既居可言地願助朝廷理伏閣三上章戅愚不稱㫖聖人存大體優貸容不死鳯詔停舍人魚書除刺史𠖇懐齊寵辱委順隨行止我自得此心于茲十年矣餘杭乃名郡郡郭臨江氾已想海門山潮聲來入耳昔予正元來覊旅曽㳺此甚覺太守尊亦諳魚酒美因生江海興每羨滄浪水尚擬拂衣行况今兼禄仕青山峯巒接白日烟塵起東道既不通改轅遂南指自秦窮楚越浩蕩五千里聞有賢主人而多好山水是行頗為愜所厯良可紀策馬度藍溪勝㳺從此始郡中即事漫漫潮初平熈熈春日至空濶逺江山晴明好天氣外有適意物中無繫心事數篇對竹吟一杯望雲醉行携杖扶力卧讀書取睡久養病形骸深諳閑氣味遥思九城陌櫌櫌趨名利今朝是隻日朝謁多軒騎寵者防悔尤權者懐憂畏為報髙車葢恐非真富貴官舍髙木换新葉隂隂覆地隅何言太守宅有似幽人居太守卧其下閑慵兩有餘起嘗一甌茗行讀一卷書早梅結青實殘櫻落紅珠稚女弄庭果嬉戲牽人裾是日晩彌静巢禽下相呼嘖嘖護兒鵲啞啞母子烏豈惟云鳥爾吾亦引吾雛南亭對酒送春含桃實已落紅薇花尚熏冉冉三月盡晩鶯城上聞獨持一杯酒南亭送殘春半酣忽長歌歌中何所云云我五十餘未是苦老人刺史二千石亦不為賤貧天下三品官多老于我身同年登第者零落無一分親故半為鬼僮僕多見孫念此聊自觧逢酒且歡欣除官去未閒除官去未閒半月恣㳺討朝尋霞外寺暮宿波上島新木少于松平湖半連草躋攀有次第賞玩無昏早有時騎馬醉兀兀𠖇天造窮通與生死其奈吾懐抱江山信為美齒髪行将老在郡誠未厭歸鄉去亦好三年為刺史二首三年為刺史無政在人口唯向郡城中題詩十餘首慙非甘棠詠豈有思人不兩三年為刺史飲水復食蘖唯向天竺山取得片石此抵有千金無乃傷清白别萱桂使君竟不住萱桂徒栽種桂有留人名萱無忘憂用不如江畔月步步來相送對酒自勉五十江城守停杯一自思頭仍未盡白官亦不全卑榮寵尋過分歡娛已較遲肺傷雖怕酒心徤尚誇詩夜舞吳娘袖春歌蠻子詞猶堪三五嵗相伴醉花時晚興極浦収殘雨髙城駐落暉山明虹半出松闇鶴雙歸将吏隨衙散文書入務稀閑吟倚新竹筠粉汙朱衣衰病老與病相仍華簮髪不勝行多朝散藥睡少夜停燈祿食分供鶴朝衣减施僧性多移不得郡政謾如繩錢湖州以箬下酒李蘇州以五酘酒相次寄到無因同飲聊詠所懐勞将箬下忘憂物寄與江城愛酒翁鐺脚三州何處會甕頭一盞幾時同傾如竹葉盈樽緑飲作桃花上面紅莫怪殷勤醉相憶曽陪西省與南宫花樓望雪命宴賦詩連天際海白皚皚好上髙樓望一廻何處更能分道路此時兼不認池臺萬重雲樹山頭翠百尺花樓江畔開素壁聫題分韻句紅爐廵飲暖寒杯氷鋪湖水銀為面風捲沙汀玉作堆絆惹舞人春艷曵勾留醉客夜徘徊偷将虛白堂前鶴失却樟亭驛後梅别後故情偏憶得曽經窮苦照書來城上城上鼕鼕鼔朝衙復晚衙為君慵不出落盡遶城花醉中訓殷恊律泗水城邊一分散浙江樓上重㳺陪揮鞭二十年前别命駕三千里外來醉袖放狂相向舞愁眉和笑一時開留君夜住非無分且盡青娥紅燭臺贈沙鷗老逼教垂白宫科遣着緋形骸雖有累方寸却無機遇酒多先醉逢山愛晚歸沙鷗不知我猶避隼旟飛餘杭形勝餘杭形勝四方無州傍青山縣枕湖遶郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇州西靈隐山上有夢謝亭即是杜明浦夢謝靈運之所因名客兒也蘇小小本錢唐妓人也獨有使君年太老風流不稱白髭鬚木芙蓉花下招客飲晩凉思飲兩三杯召得江頭醉客來莫怕秋無伴醉物水蓮花盡木蓮開江樓晚眺景物鮮竒吟翫成篇寄水部張貟外淡烟踈雨間斜陽江色鮮明海氣涼曙散雲収破樓閣虹殘水照㫁橋梁風翻白浪花千片雁㸃青天字一行好着丹青圖寫取題詩寄與水曹郎飲後夜醒黄昏飲散歸來卧夜半人扶强起行枕上酒容和睡醒樓前海月伴潮生将歸梁鷰還重宿欲滅忩燈却後明直至曉來猶妄想耳中如有管絃聲代賣薪女贈諸妓亂蓬為鬂布為巾曉踏寒山自負薪一種錢唐江畔女着紅騎馬是何人蚤冬十月江南天氣好可憐冬景似春華霜輕未殺萋萋草日煖初乾漠漠沙老柘葉黄如嫩樹寒櫻枝白是狂花此時却羨閑人醉五馬無由入酒家與諸客携酒尋去年梅花有感馬上同携今日杯湖邊共覔去春梅年年只是人空老處處何曽花不開詩思又牽吟詠發酒酣閑唤管絃來樽前百事皆依舊㸃檢惟無薛秀才醉送李恊律赴湖南辟命因寄沈八中丞富陽山底樟亭畔立馬停舟飛酒盂曽共中丞情繾綣暫留恊律語踟蹰紫㣲星北承恩去青草湖南稱意無不羨君官羨君幕幕中収得阮元瑜正月十五日夜月嵗熟人心樂朝㳺復夜㳺春風來海上明月在江頭燈火家家市笙歌處處樓無妨思帝里不合厭杭州題州北路傍老栁皮枯縁受風霜久條短為經攀折頻但見半衰當此路不知初種是何人雪花零碎逐年减烟葉稀踈隨分新莫道老株芳意少逢春猶勝不逢春題清頭陀頭陀獨宿寺西峯百尺禪菴半夜鐘烟月蒼蒼風瑟瑟更無雜樹對山松湖上醉中代諸妓寄嚴郎中笙歌杯酒正歡娛忽憶仙郎望帝都借問連宵直南省何如盡日醉西湖蛾眉别久心知否雞舌含多口厭無還有些些惆悵事春來山路見蘼蕪晚興草淺馬翩翩新晴薄暮天栁條春拂面衫䄂醉垂鞭立語花隄上行吟水寺前等間消一日不覺過三年竹樓宿小書樓下千竿竹深火爐前一盞燈此處與誰相伴宿燒丹道士坐禪僧戲醉客莫言魯國書生懦莫把杭州刺史欺醉客請君開眼望緑楊風下有紅旗元㣲之除浙東觀察使喜得杭越隣州先贈長句稽山鏡水歡㳺地犀帶金章榮貴身官職比君雖校小封疆與我且為隣郡樓對玩千峯月江界平分兩岸春杭越風光詩酒主相看更合是何人答㣲之上舩後留别蜀下樽前一分手舟中岸上兩囘頭歸來虛白堂中夢合眼先應到越州答㣲之泊西陵驛見寄烟波盡處一㸃白應是西陵古驛臺知在臺邊望不見暮湖空送渡船廻答㣲之誇越州州宅賀上人廻得報書大誇州宅似仙居厭看馮翊風沙乆喜見蘭亭烟景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如㣲之重誇州居其落句有西州羅刹之謔因嘲茲石聊以寄懐君問西州城下事醉中叠紙為君書嵌空石面標羅刹壓捺潮頭敵子胥神鬼曽鞭猶不動波濤雖打欲何如誰知太守心相似底滯堅頑兩有餘醉封詩筒寄㣲之一生休戚與窮通處處相隨事事同未死又隣滄海郡無兒俱作白頭翁展眉只仰三杯後代面惟憑五字中為向西川郵吏道莫辭來去逓詩筒七言八韻走筆奉答兼呈㣲之白首餘杭白太守落拓抛名來已久一辭渭北故園春再把江南新嵗酒杯前笑歌徒勉強鏡裡形容漸衰朽領郡慙當潦倒年隣州喜得平生友長洲草接松江岸曲水花連鏡湖口老去還能痛飲無春來曽作閑㳺否慿鶯傳語報李六倩雁将書與元九莫嗟一日日催人且貴一年年入手蚤春西湖閒游悵然興懐憶與㣲之同賞因思在越官重事殷鏡湖之游或恐未暇偶成十八韻寄㣲之上馬復呼賔湖邊景氣新管絃三數事騎從十餘人立换登山屐行携漉酒巾逢花看當妓遇草坐為茵西日籠黄栁東風蕩白蘋小橋装雁齒輕浪甃魚鱗畫舫牽徐轉銀船酌慢廵野情遺世累醉態任天真彼此年将老平比分最親髙天從所願逺地得為隣雲樹分三驛烟波限一津翻嗟寸步隔却厭尺書頻浙右稱雄鎮山隂委重臣貴垂長紫綬榮駕大朱輪出動刀鎗隊歸生道路塵雁驚弓易散鷗怕鼓難昕百吏瞻相面千夫捧擁身自然閑興少應負鏡湖春答㣲之見寄可憐風景浙東西先數餘杭次會稽禹廟未勝天竺寺錢湖不羨若耶溪擺塵野鶴春毛暖拍水沙鷗濕翅低更對雪樓君愛否紅欄碧甃㸃銀泥閒卧盡日前軒卧神閒境亦空有山當枕上無事到心中簾捲侵床日屏遮入座風望春春不到應在海門東聞歌妓唱嚴郎中詩因以絶句寄之已留舊政布中和又付新詞與艷歌但是人家有遺愛就中蘇小感恩多别州民耆老遮歸路壺漿滿别筵甘棠無一木那得淚潜然税重多貧户農飢足旱田唯留一湖水與汝救㓙年今春增築錢塘湖堤貯水以防天旱故云杭州廻舫自别錢塘山水後不多飲酒懶吟詩欲将此意慿廻棹與報西湖風月知九日思杭州舊㳺寄周判官及諸客怱憶郡南山頂上昔時同醉是今辰笙歌委曲聲延耳金翠動摇光照身風景不隨宫相去歡娛應逐使君新江山賔客皆如舊唯是當筵换主人憶杭州梅花因叙舊游寄蕭恊律三年開悶在餘杭曽與梅花醉幾塲伍相廟邊繁似雪孤山園裏麗如粧蹋隨㳺騎心常惜折贈佳人手亦香賞自初開直至落歡因小飲便成狂薛劉相次埋新隴沈謝雙飛出故鄉薛劉二客沈謝二妓皆當時歌酒之侣也歌伴酒徒零散盡唯殘頭白老蕭郎天竺寺送堅上人歸廬山錫杖登髙寺香爐憶舊峯偶來舟不繋忽去鳥無蹤豈要留離偈寧勞動别容與師俱是夢夢裏暫相逢荅客問杭州為我蹰停酒盞與君約畧説杭州山名天竺堆青黛湖號錢塘瀉緑油大屋簷多装雁齒小航船亦畫龍頭所嗟水路無三百官繫何因得再㳺送姚杭州與君細話杭州事為我留心莫待閑閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹緲虚空裏風月依稀夢想間且喜詩人重管領遥飛一盞賀江山渺渺錢塘路幾千想君到後事依然静逢竺寺猿偷橘閑看蘇家女採蓮故妓數人慿問訊新詩兩首倩留傳舍人雖健無多興老校當時八九年顧况謁邱真人不遇五月五日日卓午獨自騎驢上山塢來到君家不見君下驢倚杖叩君户驚起山童開竹扉黄犬摇尾銜人衣借問先生往何處云入山中採紫薇平明一去今未歸引我池邊看釣磯池中數個白鷗兒見人慣後痴不飛欲待君歸君不歸却復騎驢下翠㣲韋應物送邱貟外還臨平山居長棲白雲表暫訪髙齋宿還辭郡邑喧歸泛松江渌結茅蒼嶺間伐薪響深谷同是山中人不知往來躅靈芝非定草遼鶴逶池騖終當署里門一表髙陽族方干錢唐旅舍此地似鄉國堪為終夕吟雲蔵吳相廟樹引楚山禽潮落海人散鐘遲秋寺深我來無舊識誰見寂寥心温飛卿錢唐錢唐岸上春如織淼淼寒潮帶晴色淮南逰客馬連嘶碧草迷人歸不得風飄客意如吹烟纎指殷勤傷雁絃一曲堂堂紅燭筵金鯨㵼酒如飛泉張蠙錢唐夜宴留别郡守四方騷動一州安夜列樽罍伴客歡觱篥調高山閣逈蝦蟆更促海城寒屏間珮響蔵歌妓幙外刀光走從官沉醉不辭歸棹逺曉帆吹上子陵灘楊公濟錢唐江上一氣連江色寥寥萬古清客心兼浪湧時事與潮生路轉青山出沙空白鳥行幾年滄海夢吟罷獨含情石曼卿送人逰杭激激霜風吹黒貂男兒醉别氣飄飄五湖載酒期吳客六代成詩倍楚橋水樹漸青含晩意江雲初白向春嬌前秋亦擬錢唐去共看龍山八月潮沈内翰文通送施宻學守錢塘塞外風烟河上塵歸來始覺二毛新承明自厭頻趨真滄海還思一濯巾幕府旌旗初壓境畫船歌吹便行春湖山滿目舊㳺在何日從公醉紫蓴潘逍遥贈林處士雲剪烏紗霧剪衣存神養氣語還稀人人盡唤孫思邈只恐身輕白鳥飛范文正公白塔駐軒亭登臨江上寺遷客特依依逺水欲無際孤舟曽未歸前峯蔵好處幽鷺得閑飛多少天真事遥心結翠㣲陳文恵公杭州喜李度支至二首公望當年最得君畫圖城郭喜同羣門前碧浪家家海樹上青山寺寺雲松下玉琴邀鶴聴溪邊苔石共僧分情多景好知難盡且倒金罍任半醺淡薄交情老更濃為君彈瑟送金鍾苧羅香徑無時到姑射仙姿在處逢鸞鶴品流慙晩逹烟霞門户憶先容公餘莫放西湖景步步蒼苔岸岸松杭州蘇長官山亭詩閣城隂裏茅堂住半空鐘聲千寺合樹影萬家同山逺秋泉白溪寒晚日紅相逢吟未足沉醉戀雲中杭州望越亭樹樹西風葉葉秋誰家烟火起滄洲乗閒不耐無機性擬動漁翁直釣鈎王元之錢唐縣海棠江東遺跡在錢唐手植庭花滿縣香若使當年歸顯位海棠今日是甘棠王荆公杭州呈勝之㳺觀湏知此地佳紛紛人物敵京華林巒臘雪千家水城郭春風二月花彩舫笙簫吹落日畫樓燈燭暎殘霞如君援茟宜摹寫寄與塵勞北客誇送僧恵思歸錢塘渌浄堂前湖水渌歸時正復有荷花花前不見餘杭姥為道仙人憶酒家送張公赴辟杭州萬屋相誇􅃮與丹笑歌長在綺紜間綵船春戱城邊水畫燭秋尋寺外山憶我屢隨㳺客入喜君今赴辟書還遥知曼倩威行久赤箠應從到日閑王疇送同年蒲叔範察院杭州監酒釋之久未調王粲常從軍謂言塞垣事壮志横風雲育材幸明代薦賢無令君如何漢酟冗沉此荆山珍萍氏本幾酒周官有彛倫孝武事攘却志清天地屯連兵無時已四海蕭然貧官始操釀具𣙜之飽師人利源一以􅂥頽波蕩無垠糜榖費耒耜良蘖争清醇酒禁著律令犯笞及其身狂藥乃陷穽傷哉堯舜民炎靈屬我后天資英且仁邦力早雄富漢制仍相循嵗賦二千萬經入固已勤彌年擁武莭乗邊清國氛雄雄百萬師跨邁聫燕秦仰給傾府庫賞賚圖戎勲加歛猶不足返古當何云杭城東南㩀地将湖海隣𣙜利冠天下旗亭壓重闉彼雖斗筲職亦擇才英臣風露氣已肅溪潭寒彌新沙榜朝泛泛吳濤暮沄沄南州近牛斗氣象雄霜旻汀楓變老枿赤葉晴相紛嘗茶泊幽寺觀魚下輕䑳行當収翹楚寧復混蒸薪無為狎吳叟共戀秋江蓴咸淳臨安志卷九十五
